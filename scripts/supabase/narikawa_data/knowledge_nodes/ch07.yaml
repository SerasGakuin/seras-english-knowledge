check_points:
  - node_id: "nrs-001"
    seq: 1
    question: "等位接続詞の後ろの形を確認するのはなぜか？"
    answer: "後ろの形と対等な関係になる要素を前から探すため。等位接続詞は文法上・意味上対等なものを並べる。"
  - node_id: "nrs-001"
    seq: 2
    question: "andの2つの用法は？"
    answer: "❶ A+B: 同類のものを並べる「AとB」。❷ A→B: 順接「Aそして（だから）B」。"
  - node_id: "nrs-001"
    seq: 3
    question: "but以下にはどのような情報が置かれるか？"
    answer: "筆者の主張や聞き手が知らない新情報が置かれる。情報的にはbutの後ろに重点がある。"
  - node_id: "nrs-002"
    seq: 1
    question: "orの2つの用法は？"
    answer: "❶ A/B: 選択「AまたはB」。❷ A=B: 言い換え「Aすなわち B」。"
  - node_id: "nrs-002"
    seq: 2
    question: "等位接続詞forとsoに共通する制約は？"
    answer: "節と節しか結べない。また文頭では用いない。"
  - node_id: "nrs-002"
    seq: 3
    question: "✕ She went out. Though it was raining. がなぜ不可か？"
    answer: "thoughは従属接続詞であり、主節に従えて使うのが原則。独立文にはできない。等位接続詞butなら独立文にできる。"
  - node_id: "nrs-003"
    seq: 1
    question: "命令文+andと命令文+orの後ろにはそれぞれどんな内容が来るか？"
    answer: "and→プラスの内容（そうすれば）。or→マイナスの内容（さもないと）。"
  - node_id: "nrs-003"
    seq: 2
    question: "A or Bが主語のとき動詞は何に一致するか？"
    answer: "動詞に近いBに一致する。A but Bの場合もBに一致（Bに重点があるため）。"
  - node_id: "nrs-003"
    seq: 3
    question: "Not only the pupils but also the teacher _____ laughing. の空欄は was/were のどちらか？"
    answer: "was。not only A but also BはBに一致するため、the teacher（単数）に合わせる。"

  - node_id: "nrs-004"
    seq: 1
    question: "名詞節と副詞節の違いは何か？"
    answer: "名詞節はSVのカタマリが文の要素(S/O/C等)になり取り去れない。副詞節は取り去っても文が成立する。"
  - node_id: "nrs-004"
    seq: 2
    question: "副詞節のthatが表す意味は何か？"
    answer: "❶感情の原因・判断の根拠（感情/判断の後にthat節）。❷so...that構文で程度・結果。"
  - node_id: "nrs-004"
    seq: 3
    question: "否定文 not so ... that 〜 はどう解釈するか？"
    answer: "「〜するほど…ではない」と程度で解釈するのが原則。結果「とても…だから〜」では意味が通らない場合が多い。"
  - node_id: "nrs-005"
    seq: 1
    question: "同格節のthatと関係代名詞のthatをどう判別するか？"
    answer: "同格節(接続詞)→後ろに完全な文。関係代名詞→後ろに名詞が1つ欠けた不完全な文。"
  - node_id: "nrs-005"
    seq: 2
    question: "強調構文で強調できない要素は何か？"
    answer: "動詞、形容詞、Cになる名詞は強調できない。S/O/副詞(句・節)は強調可能。"
  - node_id: "nrs-005"
    seq: 3
    question: "同格節を導くthatと相性のよい名詞の3グループは？"
    answer: "❶事実・情報・証拠(fact, truth, evidence等)。❷思考・発言(belief, idea, opinion等)。❸可能性(chance, possibility等)。"
  - node_id: "nrs-006"
    seq: 1
    question: "名詞節のifが使える位置はどこに限られるか？"
    answer: "他動詞の目的語の位置にしか置けない。主語・前置詞の後ろ・同格節では使えない。"
  - node_id: "nrs-006"
    seq: 2
    question: "whetherにできてifにできない4つの用法は？"
    answer: "❶文頭で主語となる節、❷前置詞の直後、❸直後にor not、❹直後にto V。"
  - node_id: "nrs-006"
    seq: 3
    question: "✕ I can't make out if or not he likes it. はなぜ不可か？"
    answer: "ifの直後にor notを置くことはできない。whetherなら whether or not で可。"
  - node_id: "nrs-007"
    seq: 1
    question: "asの本質は何か？"
    answer: "同じようなことを並べる、イコール（＝）の関係を導く。前置詞asでも接続詞asでも基本は同じ。"
  - node_id: "nrs-007"
    seq: 2
    question: "接続詞asの3つの用法は？"
    answer: "❶比例「〜につれて」、❷時「〜したとき」、❸様態「〜のように」。すべてasの前後がイコール関係。"
  - node_id: "nrs-007"
    seq: 3
    question: "譲歩のasはどういう条件で成立するか？"
    answer: "接続詞asの前に形容詞・副詞・無冠詞名詞・動詞原形が倒置された場合に限って「〜だけれども」の意味になる。通常語順では譲歩にならない。thoughに書き換え可だがalthoughは不可。"
  - node_id: "nrs-008"
    seq: 1
    question: "becauseとsinceの最大の違いは何か？"
    answer: "because→相手にとって未知の理由（意味が強い、後半に置く）。since→相手にとって既知の理由（意味が弱い、文頭が多い）。"
  - node_id: "nrs-008"
    seq: 2
    question: "not...becauseでコンマの有無により解釈はどう変わるか？"
    answer: "コンマあり→notはコンマまで作用「〜しなかった、なぜなら…」。コンマなし→notは文末まで作用「…だからといって〜したわけではない」。"
  - node_id: "nrs-008"
    seq: 3
    question: "強調構文(It is because〜that...)でsinceは使えるか？"
    answer: "使えない。partly/just/only becauseや強調構文で使えるのはbecauseだけの特権。"
  - node_id: "nrs-009"
    seq: 1
    question: "so that節が「目的」か「結果」かを見分ける手がかりは？"
    answer: "コンマなし+節中に助動詞あり→目的「〜するために」。コンマあり+節中に助動詞なし→結果「その結果〜」。ただしあくまでも目安で最終的には文脈判断。"
  - node_id: "nrs-009"
    seq: 2
    question: "for fear thatの意味と構文は？"
    answer: "「〜するのを恐れて→〜しないように」。for fear (that)+S should/may/might V。lestで書き換え可。thatは省略可。"
  - node_id: "nrs-009"
    seq: 3
    question: "in caseの2つの用法は？"
    answer: "❶「〜の場合に備えて」(事前の用心)、❷「もし〜の場合には」(≒if)。節中は現在形が原則。"
  - node_id: "nrs-010"
    seq: 1
    question: "till/untilとby the timeの違いは？"
    answer: "till/until=「〜までずっと」（継続）。主節には継続性のある動詞(wait, stay等)。by the time=「〜までに」（期限・締切）。"
  - node_id: "nrs-010"
    seq: 2
    question: "no sooner...thanとhardly...whenで対応する語の組み合わせは？"
    answer: "no sooner→than（前に比較級soonerがあるため）。hardly [scarcely]→when [before]。組み合わせを間違えないこと。"
  - node_id: "nrs-010"
    seq: 3
    question: "No sooner had she arrived than...のように否定語が文頭に出ると主節はどうなるか？"
    answer: "主節は疑問文型の倒置になる。No sooner had she..., Hardly had she...の語順。"
  - node_id: "nrs-011"
    seq: 1
    question: "suppose系の条件接続詞の形の特徴は？"
    answer: "Ving(supposing)と原形(suppose)のみ。supposedのようなVp.p.は存在しない。仮定法で使えるのもsuppose系のみ。"
  - node_id: "nrs-011"
    seq: 2
    question: "as long asとas far asの意味の違いは？"
    answer: "as long as=「〜しさえすれば」(≒if only)。本来は時間の制限「〜している間は」から派生。as far as=「〜の範囲内では」。知識・認識の及ぶ範囲を区切る。"
  - node_id: "nrs-011"
    seq: 3
    question: "unlessとif...notの違いは？"
    answer: "unless=さまざまな条件の中から唯一の例外を述べる(≒except that)。実際に起こる確率は低い含み。if...notはそこまで強い意味合いはない。"
  - node_id: "nrs-012"
    seq: 1
    question: "even thoughとeven ifの最大の違いは？"
    answer: "even though=既知の事実を前提に「確かに実際に〜だけれども」。even if=仮定「たとえ〜としても」。even thoughは仮定法で用いないのが通例。"
  - node_id: "nrs-012"
    seq: 2
    question: "whileの3つの用法は？"
    answer: "❶「〜する間に」(原義)、❷「〜なのに対して」(対比)、❸「〜だけれども」(譲歩)。名詞whileの「時間」から派生。whereasで❷❸の書き換え可。"
  - node_id: "nrs-012"
    seq: 3
    question: "Young as he is, ...のasをthough/althoughに書き換えられるか？"
    answer: "thoughへの書き換えは可。Young though he is, ...。ただしalthoughへの書き換えは不可。"
  - node_id: "nrs-013"
    seq: 1
    question: "duringの直後にVingを置けるか？"
    answer: "不可。duringは前置詞で後ろに名詞が必要。✕ During reading I fell asleep. ○ While reading, I fell asleep."
  - node_id: "nrs-013"
    seq: 2
    question: "in spite ofを1語で書き換えると？その際の注意点は？"
    answer: "despite。✕ despite ofとしないこと。in spite ofのofにつられないよう注意。"
  - node_id: "nrs-013"
    seq: 3
    question: "「理由」を表す前置詞句でプラスイメージのものは？"
    answer: "thanks to / by [in] virtue of。マイナスイメージはowing to / due to。両方はbecause of / on account of。"
  - node_id: "nrs-014"
    seq: 1
    question: "✕ Mary is thin, however she is strong. はなぜ不可か？"
    answer: "howeverは接続副詞であり、文と文を直接つなぐことはできない。コンマにもその機能はない。ピリオドかセミコロンで区切る必要がある。"
  - node_id: "nrs-014"
    seq: 2
    question: "接続副詞が文中や文末に置かれていても訳出はどうするか？"
    answer: "文頭で訳す。She is, however, strong. → 「しかしながら、彼女は丈夫だ」。"
  - node_id: "nrs-014"
    seq: 3
    question: "接続副詞としてのthoughの制約は？"
    answer: "文頭では使用不可。文中・文末で挿入的に用いる。althoughには接続副詞としての用法はない。"
  # Part 08 関係詞
  - node_id: "nrs-015"
    seq: 1
    question: "関係詞の働きとは何か？"
    answer: "前にある名詞に情報（説明）を追加する働き。"
  - node_id: "nrs-015"
    seq: 2
    question: "「完全な文」と「不完全な文」の違いは？"
    answer: "完全な文=必要な名詞(S・O・C・前置詞の後ろのⓃ)がすべてそろっている。不完全な文=必要な名詞が1つ欠けている。"
  - node_id: "nrs-015"
    seq: 3
    question: "完全/不完全を判断する際、関係詞そのものはどう扱うか？"
    answer: "関係詞そのものは考慮に入れない。関係詞を含まない残りの部分が完全か不完全かを考える。"
  - node_id: "nrs-016"
    seq: 1
    question: "関係詞を決定する2ステップの手順は？"
    answer: "❶関係詞の後ろが完全な文か不完全な文かを確認する。❷先行詞をチェックする。先行詞だけで決定するのは絶対NG。"
  - node_id: "nrs-016"
    seq: 2
    question: "不完全な文の場合と完全な文の場合、それぞれどの関係詞を使うか？"
    answer: "不完全な文→関係代名詞(who, whom, which, what, that)。完全な文→関係副詞(when, where, why, how)。"
  - node_id: "nrs-016"
    seq: 3
    question: "目的格の関係代名詞の特徴は？"
    answer: "省略するのが通例。thatで代用可。非制限用法ではthat不可。"
  - node_id: "nrs-017"
    seq: 1
    question: "Sが欠けている場合とOが欠けている場合、それぞれどの格を使うか？"
    answer: "Sが欠け→主格(who/which)。Oが欠け→目的格(whom/which)。thatで代用可（ただし非制限用法では不可）。"
  - node_id: "nrs-017"
    seq: 2
    question: "目的格の関係代名詞の省略を発見するヒントは？"
    answer: "❶不自然に名詞が2つ並ぶ、❷2つ目の名詞を含む文が不完全、❸述語動詞が2つあるのに接続詞/関係詞がない、❹したがって省略に気づく。"
  - node_id: "nrs-017"
    seq: 3
    question: "whomの代わりにwho/thatを使ったり省略するのは可能か？"
    answer: "可能。whomは衰退しており、who/thatで代用するか省略するのがふつう。"
  - node_id: "nrs-018"
    seq: 1
    question: "whoseの後ろはなぜ完全な文になるか？"
    answer: "whoseは所有格(my, hisの仲間)で〈whose+名詞〉の形で使う。名詞自体は欠けない（所有格が欠けるだけ）ため、残りの要素はそろっている。"
  - node_id: "nrs-018"
    seq: 2
    question: "✕ whose the car / ✕ whose Maryがなぜ不可か？"
    answer: "whoseは所有格なので、冠詞(the)や固有名詞と並べられない。my the car / my Maryが不可なのと同じ理由。"
  - node_id: "nrs-018"
    seq: 3
    question: "whose carをof whichで書き換えるとどうなるか？"
    answer: "the car of which / of which the carの2パターン。ただし堅苦しい表現なのでwithなどで書き換える方が自然。"
  - node_id: "nrs-019"
    seq: 1
    question: "what節は何を作り、他の関代(who/which等)との最大の違いは？"
    answer: "what節は名詞節を作る。他の関代は先行詞を修飾する形容詞節。whatには先行詞が組み込まれている(≒thing(s) which)ため先行詞は置かない。"
  - node_id: "nrs-019"
    seq: 2
    question: "what節は文中のどの位置に置けるか？"
    answer: "名詞節なのでS/O/C/前置詞の後ろのいずれにも置ける。"
  - node_id: "nrs-019"
    seq: 3
    question: "接続詞thatとの違いは？"
    answer: "接続詞that→後ろは完全な文。関係代名詞what→後ろは不完全な文（名詞が1つ欠ける）。"
  - node_id: "nrs-020"
    seq: 1
    question: "〈前置詞+関代〉の後ろが完全な文になるのはなぜか？"
    answer: "前置詞が関代の前に移動したことで、元の位置の名詞欠落が解消されるため。"
  - node_id: "nrs-020"
    seq: 2
    question: "〈前置詞+関代〉でthatは使えるか？省略は可能か？"
    answer: "thatで代用不可。省略も不可。前+whom（人）/ 前+which（人以外）のみ。"
  - node_id: "nrs-020"
    seq: 3
    question: "頻出の〈名詞+前置詞+which〉の3パターンは？"
    answer: "the reason for which、the extent[degree] to which、the way in which。"
  - node_id: "nrs-021"
    seq: 1
    question: "4つの関係副詞と対応する先行詞は？"
    answer: "when→時(time, day等)、where→場所(place等。case, situation等も可)、why→理由(reason等)、how→the way。"
  - node_id: "nrs-021"
    seq: 2
    question: "✕ the way howがなぜ不可か？代替表現は？"
    answer: "the way「やり方」とhow「方法」で意味が重複するため不可。代替: the way / how / the way in which / the way that。"
  - node_id: "nrs-021"
    seq: 3
    question: "関係副詞where, when, whyの省略条件は？"
    answer: "where=先行詞がplaceの場合のみ省略OK。when/why=省略OK、ただし先行詞と離れている場合は省略不可。"
  - node_id: "nrs-022"
    seq: 1
    question: "関係代名詞whatと関係形容詞whatの違いは？"
    answer: "関代what→後ろ不完全な文、訳「〜こと・もの」。関係形容詞what→〈what+名詞〉で後ろ完全な文、訳「すべての〜」。共通点: どちらも名詞節を作る。"
  - node_id: "nrs-022"
    seq: 2
    question: "what few books / what little moneyの意味は？"
    answer: "「少ないながらもすべての本/お金」。few+可算名詞、little+不可算名詞。"
  - node_id: "nrs-022"
    seq: 3
    question: "関係形容詞whichはどのように使われるか？"
    answer: "原則非制限用法。前の節全体(または一部)を受けて直後の名詞を修飾。〈前置詞+which+名詞〉(例: in which case)の形がほとんど。"
  - node_id: "nrs-023"
    seq: 1
    question: "制限用法と非制限用法の違いは？"
    answer: "制限用法(コンマなし)=同種のものと区別するために限定する。非制限用法(コンマあり)=他に同じものがない前提で補足説明。"
  - node_id: "nrs-023"
    seq: 2
    question: "非制限用法で使えない関係詞と省略制約は？"
    answer: "thatは使用不可。関係詞の省略も不可（目的格でも）。"
  - node_id: "nrs-023"
    seq: 3
    question: "非制限用法のwhichが「前の節全体」を先行詞にできるとはどういうことか？"
    answer: "前の文(節)の内容全体をwhichが受けて補足する用法。, which is surprising等。制限用法では不可能な使い方。"
  - node_id: "nrs-023"
    seq: 4
    question: "あえて非制限用法を用いるのはどんなケースか？"
    answer: "❶前後に論理関係（そして・しかし等）を持たせたい場合。❷書き手の判断・評価を示したい場合。単なる補足ではなく重要情報。"
  - node_id: "nrs-024"
    seq: 1
    question: "連鎖関係詞の攻略法は？"
    answer: "関係詞直後の〈S+V(思考・発言系)〉をいったん飛ばし、前後をつなげて主格/目的格を判断する。"
  - node_id: "nrs-024"
    seq: 2
    question: "連鎖関係詞とthink+O+to be+Cの構文をどう区別するか？"
    answer: "〈S+V〉を除外してもto beが残る場合→連鎖ではなくthink+O+to be+Cの構文。"
  - node_id: "nrs-024"
    seq: 3
    question: "連鎖関係詞で主格の関代が省略可能なのはなぜ特殊か？"
    answer: "通常は主格の関係代名詞は省略不可。連鎖関係詞の場合に限り、S+V(思考・発言)の挿入があるため主格でも省略可能になる。"
  - node_id: "nrs-025"
    seq: 1
    question: "補語(C)が欠けている場合、どの関係代名詞を使うか？"
    answer: "先行詞が人/人以外に関係なくthatを使う。先行詞は職業・地位・性格を表す語句がほとんど。非制限用法ではwhichを使う。"
  - node_id: "nrs-025"
    seq: 2
    question: "関係代名詞asが使われるのはどんな場合か？"
    answer: "先行詞にthe sameやsuchがつく場合。the same...as(同じ種類) vs the same...that(同一物)だが現在は違いはほぼない。"
  - node_id: "nrs-025"
    seq: 3
    question: "関係代名詞butの特徴は？"
    answer: "先行詞に否定語(no等)がつく。主格でしか使わない。but節内の動詞はnotがなくても否定で訳す。現在では非常にまれな表現。"
  - node_id: "nrs-026"
    seq: 1
    question: "複合関係代名詞の名詞節と副詞節はどう判別するか？"
    answer: "文の要素(S/O等)になっていれば名詞節「〜する人/もの/何でもすべて」。取り去っても文が成立すれば副詞節（譲歩）「たとえ〜しようとも」。"
  - node_id: "nrs-026"
    seq: 2
    question: "no matter書き換えはいつ可能か？"
    answer: "副詞節（譲歩）の場合のみ可能。名詞節では不可（no matterは名詞節を作れない）。"
  - node_id: "nrs-026"
    seq: 3
    question: "複合関係形容詞の用法は？"
    answer: "whichever+名詞 / whatever+名詞の形。後ろは完全な文。名詞節「すべての〜」と副詞節（譲歩）「たとえどんな〜でも」の2用法。"
  - node_id: "nrs-027"
    seq: 1
    question: "複合関係副詞は名詞節を作れるか？"
    answer: "作れない。副詞節のみ（名詞節は作らない）。"
  - node_id: "nrs-027"
    seq: 2
    question: "howeverの正しい語順は？"
    answer: "however+形容詞/副詞+S+V。形容詞/副詞がhoweverの直後に移動する。✕ However it may be humble → ○ However humble it may be。"
  - node_id: "nrs-027"
    seq: 3
    question: "however/whenever/whereverのno matter書き換えの可否は？"
    answer: "however→常に可（譲歩しかないため）。whenever/wherever→譲歩の場合のみ可。"

