# Part 07-08: 接続詞・関係詞 (nrs)

knowledge_nodes:
  - id: "nrs-001"
    name: "等位接続詞の基本（and/but）"
    category: "nrs"
    priority: "P1"
    notes: |
      等位接続詞(and, but, or等)は文法上・意味上対等なものを並べる。
      等位接続詞の後ろの形を確認し、それと対等な関係になる前の部分を探すのが読解のコツ。
      and: ❶ A+B（同類を並べる）、❷ A→B（順接「そしてだから」）。
      but: A⇔B（逆接）。but以下に「筆者の主張」や「聞き手が知らない新情報」が置かれる。
      [図表: 構文図 — andが並列する2つの動詞句+when節の対等関係を示す（p.240）]
      別冊ポイント151(and)・152(but)参照
  - id: "nrs-002"
    name: "等位接続詞or・その他の等位接続詞と等位vs従属の区別"
    category: "nrs"
    priority: "P1"
    notes: |
      or: ❶ A/B（選択）、❷ A=B（言い換え「すなわち」）。
      その他の等位接続詞: for（理由の補足「というのは」）、so（結果「だから」）、yet（逆接「しかし」）。
      forとsoは節と節しか結ばず、文頭では用いない。
      等位接続詞vs従属接続詞: 等位接続詞は対等な関係→2文に分けて独立文にできる。
      従属接続詞(though等)は主節に従え使う→独立文にできない。
      ✕ She went out. Though it was raining.（従属接続詞を独立文にするのは不可）
      [図表: イラスト — 等位接続詞は天秤(対等)、従属接続詞は主従関係を示す（p.245）]
      参考書内参照: →p.249（従属接続詞）、→p.265（so that）
      別冊ポイント153参照
      プラスα: 従属節が主節の前→場面設定、後→補足・追加情報
  - id: "nrs-003"
    name: "命令文+and/or・等位接続詞と動詞の一致"
    category: "nrs"
    priority: "P1"
    notes: |
      命令文+and: 「〜しなさい、そうすれば…」→andの後ろにプラスの内容。
      命令文+or: 「〜しなさい、さもないと…」→orの後ろにマイナスの内容。
      等位接続詞と動詞の一致:
      ・A and B → 複数一致（足されて複数）
      ・A or B → Bに一致（動詞に近いBに合わせる）
      ・A but B → Bに一致（Bに重点）
      具体表現: both A and B(複数)、either A or B(B一致)、neither A nor B(B一致)、not only A but also B(B一致)。
      B as well as A = not only A but also B と書き換え可能→Bに一致。
      別冊ポイント154(命令文+and/or)・155(not only A but also B)参照

  - id: "nrs-004"
    name: "従属接続詞thatの用法（名詞節・副詞節）"
    category: "nrs"
    priority: "P1"
    notes: |
      名詞節のthat: SV のカタマリが文の要素(S/O/C/前置詞O)になる。
      ただし前置詞の後ろにthat+SVを置くのは原則不可。
      形式主語itを使って It is ... that SV の形にするのが一般的。
      副詞節のthat: ❶感情の原因・判断の根拠を表す（感情/判断の後にthat節）。
      ❷ so...that構文で程度・結果を表す。
      主節が否定文の場合はthat以下を「程度」で解釈するのが原則。
      別冊ポイント156(代表的な従属接続詞一覧)・158(副詞節を導くthat)参照
  - id: "nrs-005"
    name: "同格のthat・接続詞vs関係代名詞の判別・強調構文"
    category: "nrs"
    priority: "P1"
    notes: |
      同格節を導くthat: 前の特定の名詞の内容を説明。後ろは完全な文。
      同格thatと相性のよい名詞: ❶事実・情報・証拠(fact, truth, evidence等)、
      ❷思考・発言(belief, idea, opinion等)、❸可能性(chance, possibility等)。
      接続詞thatと関係代名詞thatの判別:
      ・接続詞→後ろに完全な文、関係代名詞→後ろに不完全な文（名詞が1つ欠ける）。
      強調構文(分裂文): It is A that ... でAを他と区別し目立たせる。
      ・動詞・形容詞・Cになる名詞は強調不可。
      ・Aが人→thatをwhoに、人以外→whichに書き換え可。
      別冊ポイント157(接続詞thatと関係詞that)・159(同格節のthat)・160(同格と相性のよい名詞)・186(強調構文)・187(強調構文と形式主語構文の判別)参照
  - id: "nrs-006"
    name: "従属接続詞whetherとifの用法・使い分け"
    category: "nrs"
    priority: "P1"
    notes: |
      whetherの訳し方: ❶名詞節「〜かどうか」、❷副詞節「〜であろうとなかろうと」(or付き)。
      ifの訳し方: ❶名詞節「〜かどうか」、❷副詞節「もし〜なら」。
      名詞節ifは他動詞の目的語の位置にしか置けない。whetherは位置を問わない。
      whetherにできてifにできない4用法:
      ❶文頭で主語となる節、❷前置詞の直後、❸直後にor not、❹直後にto V。
      whether同格節: question, choice, decision, doubt等の名詞の直後。ifにこの用法はない。
      ✕ if or not は不可（ifの直後にor notは置けない）。
      別冊ポイント161(whetherとif)参照
      参考書内参照: →p.249（従属接続詞that）
  - id: "nrs-007"
    name: "接続詞asの用法（イコール関係）"
    category: "nrs"
    priority: "P1"
    notes: |
      asの本質: 同じようなことを並べる、イコール（＝）の関係を導く。
      前置詞as: regard A as B（A=B）。
      接続詞as: ❶比例「〜につれて」、❷時「〜したとき」、❸様態「〜のように」。
      すべて「asの前後がイコール関係」という基本で理解可能。
      名詞限定のas: Life as we know it（私たちが知っているような生活）。
      as節中に限定される名詞が代名詞(it)として再登場する特徴。後ろに完全な文→接続詞。
      譲歩のas: 接続詞asの前に形容詞・副詞・無冠詞名詞・動詞原形が倒置された場合のみ「〜だけれども」。
      倒置なしの通常語順ではasは譲歩にならない。thoughに書き換え可だがalthoughは不可。
      名詞倒置時は無冠詞（一般的な性質に重点）。
      [図表: イラスト — him=the best singer in Japanのイコール関係（p.259）]
      [図表: イラスト — as（イコールの関係）を示す人物（p.260）]
      プラスα: asを理由の意味で英作文に使うのは避ける。becauseやsinceを使う。
      プラスα: 名詞限定のasは後ろに完全な文→関係代名詞ではなく接続詞。
      プラスα: 譲歩asの倒置は文頭の要素を際立たせ、後続との対比から逆接の意味が生じる。
      プラスα: 譲歩のthoughをalthoughに書き換えることはできない。
      プラスα: 名詞倒置時の無冠詞は一般的な性質に重点があるため。
      別冊ポイント162(接続詞asの用法)参照
  - id: "nrs-008"
    name: "「理由」を表す接続詞（because/since/now that/for）"
    category: "nrs"
    priority: "P1"
    notes: |
      because: 相手にとって未知の理由。意味は強い。文頭は避け後半に置く。
      ✕ Because you're too young.のように文頭で独立文にしない。
      since: 相手にとって既知の理由。意味は弱い。文頭が多い。
      now (that): 過去との違いを強調して理由を述べる。thatは省略可。
      for(等位接続詞): 理由を補足説明。主節の後ろに「, for」で使う。
      not...because の解釈（コンマの有無）:
      ・コンマあり→notはコンマまで作用「〜しなかった、なぜなら…」
      ・コンマなし→notは文末まで作用「…だからといって〜したわけではない」
      becauseだけの特権: partly/just/only/simply because、強調構文(It is because〜that...)が可能。sinceは不可。
      [図表: 表 — 理由の接続詞4種の比較（文中の位置・使い方）（p.263）]
      参考書内参照: →p.243（等位接続詞for、2で学習）
      プラスα: 未知の情報はなるべく後ろに置くのが英語の原則。Because節を主節の前に置くのはあまりよくない。
      別冊ポイント163(理由の接続詞)・164(not...becauseの解釈)参照
  - id: "nrs-009"
    name: "「目的・結果」を表す接続詞（so that/in order that/for fear that/in case）"
    category: "nrs"
    priority: "P1"
    notes: |
      so that: ❶目的「〜するために」(コンマなし・節中に助動詞)、❷結果「その結果〜」(コンマあり・助動詞なし)。
      thatは省略可。結果のthat省略→「..., so 〜」（だから〜）。
      ただしこれらはあくまでも目安。最終的には文脈判断。
      in order that: 目的のみ。節中に助動詞。thatは省略不可。so thatよりやや堅い。
      in order to V（不定詞）との混同注意。
      否定の目的: for fear (that)+S should/may/might V「〜するのを恐れて→〜しないように」。thatは省略可。
      lest+S should V / lest+S 原形: for fear thatの書き換え。古風で堅い表現。
      in case: ❶「〜の場合に備えて」(事前の用心)、❷「もし〜の場合には」(≒if)。
      in case節中は現在形が原則。
      「目的」には話し手の主観が込められるため、目的節中に助動詞が用いられるのは必然。
      [図表: イラスト — 傘を持った人物と雨の中の人々（p.267）]
      参考書内参照: →p.243（等位接続詞so、2で学習）
      プラスα: in order to Vとin order thatの混同注意。
      プラスα: lestの節中にはshould/may/mightまたは動詞の原形が用いられる。
      プラスα: in case節中はshould使用もあるがやや堅い文体。
      別冊ポイント165(so that)・166(in order that)・167(for fear that)・168(in case)参照
  - id: "nrs-010"
    name: "「時」を表す接続詞（till/until/by the time/as soon as/no sooner...than）"
    category: "nrs"
    priority: "P1"
    notes: |
      till/until: 「〜までずっと」。将来のある時点まで何かが継続する場合に使う。主節にwait, stay, walkなど継続性のある動詞。
      by the time: 「〜までに」。期限・締切を表す。
      as soon as: 「〜するとすぐに」。同義表現: the moment, the instant, the minute, the second, instantly, directly, immediately。
      名詞や副詞にしか見えないものが接続詞になれる。後ろに〈SV〉があれば接続詞の可能性。
      no sooner...than: 「〜するとすぐに」。AとBの間に「時間差(sooner)がゼロ(no)」→連続。
      hardly [scarcely]...when [before]: ほぼ同じ意味。「時の差(when)がほとんどない(hardly)」。
      対応する語の組み合わせ: no sooner→than（前に比較級soonerがあるから）、hardly→when。
      否定語(句)が文頭に出ると主節は疑問文型の倒置になる。
      参考書内参照: →p.496（否定語句の文頭倒置）
      プラスα: instantly/directly/immediatelyを接続詞として用いるのは主にイギリス英語。やや古風。
      プラスα: no sooner...thanでBが過去形のとき、Aはそれより前→過去完了had+p.p.が通例。
      別冊ポイント169(until)・170(by the time)・171(as soon as)・172(重要構文)・173(time接続詞)参照
  - id: "nrs-011"
    name: "「条件」を表す接続詞（if以外の条件表現・as long as vs as far as・unless）"
    category: "nrs"
    priority: "P1"
    notes: |
      if以外の条件接続詞「もし〜なら」:
      supposing (that) / suppose (that)、providing (that) / provided (that)、
      granting (that) / granted (that)、on (the) condition (that)、as [so] long as、given (that)。
      形の注意: provide系とgrant系はVingとVp.p.どちらもある。suppose系はVingと原形のみ(supposedは存在しない)。
      仮定法で使用できるのはsuppose系のみ。provide/grant系は仮定法不可。
      as [so] long as: 本来は時間を制限「〜している間は」(≒while)。
      →「生きている間は→生きていさえすれば」から「（他はいいから）〜しさえすれば」(≒if only)の意味が発生。
      as [so] far as: 知識・認識・関係などが及ぶ範囲を区切る「〜の範囲内では」。
      後ろにknow, see, remember, be concerned等の動詞が多い。
      unless: 「〜する場合を除いて」(≒except that/except if)。さまざまな条件の中から1つだけ例外を言いたい場合に使う。
      unless≠if...not: unlessは唯一の例外→実際に起こる確率は低い含み。if...notはそこまで強い意味合いはない。
      [図表: イラスト — unless節が唯一の例外を示す図解（p.274）]
      プラスα: as far asには前置詞句として「（場所的に）〜まで」の意味もある。
      プラスα: unless節の内容は主節に対する唯一の例外→実際に起こる確率は低い含み。
      別冊ポイント174(条件接続詞)・175(as long as/as far as)・176(unless)参照
  - id: "nrs-012"
    name: "「逆接・譲歩」を表す接続詞（though/even though/even if/while）"
    category: "nrs"
    priority: "P1"
    notes: |
      though/although: 「〜だけれども」。ほぼ同じ意味で使える。
      asの倒置による譲歩(→nrs-007参照): Young as he is = Young though he is。althoughはこのパターン不可。
      even though: 既知の事実に対して「確かに（実際に）〜だけれども」。evenでthoughの意味を強める。
      even if: これから起こることを仮定して述べる「たとえ〜としても」。ifにevenがついたもの。
      even thoughとeven ifの区別: even though=事実前提、even if=仮定。
      while: 名詞では「時間」(for a while)。接続詞whileの広がり:
      ❶「〜する間に」(原義)→❷「〜なのに対して」(対比)→❸「〜だけれども」(譲歩)。
      whereasはwhileの❷対比・❸譲歩の意味で用いられることもある。
      参考書内参照: →nrs-007 p.259（譲歩のas）
      プラスα: even ifは仮定法で使われることもあるが、even thoughは事実前提なので仮定法では用いないのが通例。
      別冊ポイント178(though/although)・179(even if/even though)・180(while)参照
  - id: "nrs-013"
    name: "接続詞 vs. 前置詞（品詞判別と書き換え）"
    category: "nrs"
    priority: "P1"
    notes: |
      接続詞→後ろにSV（節）、前置詞→後ろに名詞。
      while(接続詞)+SV / during(前置詞)+名詞: 「〜間」。
      ✕ during+Ving(動名詞)は不可。while+分詞構文(While reading, ...)は可。
      because(接続詞)+SV / because of(前置詞)+名詞: 「〜ので」。
      「理由」を表す前置詞句のイメージ分類:
      ・プラス/マイナス両方: because of / on account of
      ・マイナスイメージ: owing to / due to
      ・プラスイメージ: thanks to / by [in] virtue of
      though(接続詞)+SV / in spite of(前置詞)+名詞: 「〜にもかかわらず」。
      in spite of = despite（1語書き換え）。✕ despite ofとしない！
      in spite of と regardless of は異なる意味: regardless of = 「〜とは無関係に」。
      by the time(接続詞)+SV / by(前置詞)+名詞: 「〜までに」。
      till/until, before, afterは前置詞と接続詞の形が同じ。
      参考書内参照: →p.269（by the timeの使い方）
      別冊ポイント181(during/while)参照
  - id: "nrs-014"
    name: "接続副詞（接続詞との違い・位置の自由度）"
    category: "nrs"
    priority: "P1"
    notes: |
      接続副詞は副詞であり、文と文を直接つなぐことはできない。
      コンマ(,)にも文と文を直接つなぐ働きはない。
      ✕ Mary is thin, however she is strong.（接続副詞で文をつなぐのは不可）
      接続副詞の正しい使い方:
      ❶ ピリオドで終わらせてから: Mary is thin. However, she is strong.
      ❷ セミコロンを添えて: Mary is thin; however, she is strong.
      等位接続詞(but)は文と文を並べてよい: Mary is thin, but she is strong.
      接続副詞の位置の自由度: 文頭・文中・文末に置ける。
      文中や文末に置かれていても文頭で訳すことを心がける。
      接続副詞としてのthough: 「けれども」。文頭では使用不可。文中・文末で挿入的に用いる。
      ✕ Though, she is strong.（接続副詞thoughは文頭不可）
      althoughには接続副詞としての用法はない（従属接続詞のみ）。
      プラスα: 従属接続詞を主節の後に置く場合、特別な理由がない限り接続詞の前にコンマは打たないのが通例。
      プラスα: althoughには従属接続詞としての用法しかなく、接続副詞としての用法はない。
      別冊ポイント182(howeverの用法)・183(接続副詞)参照
  # === Part 08 関係詞 ===
  - id: "nrs-015"
    name: "関係詞の基本概念（情報追加と完全/不完全な文）"
    category: "nrs"
    priority: "P1"
    notes: |
      関係詞の働き＝前にある名詞に情報［説明］を追加する。
      完全な文: 必要な名詞(S・O・C・前置詞の後ろのⓃ)がすべてそろっている。
      不完全な文: 必要な名詞が1つ欠けている。
      判別のポイント: 意味よりもカタチ（形式）に注目する。自動詞/他動詞の語法や前置詞にも注意。
      関係詞そのものは考慮に入れない。関係詞を含まない残りの部分がどうなっているかを考える。
      whoseの場合は語句の倒置があっても要素がそろっていれば完全な文と見なす。
      [図表: イラスト — 関係詞→前にある名詞に情報追加。the place where he parked his car（p.286）]
      別冊ポイント188(完全な文/不完全な文の見極め)参照
  - id: "nrs-016"
    name: "関係詞の決定手順（関係代名詞vs関係副詞）"
    category: "nrs"
    priority: "P1"
    notes: |
      関係詞を選択する手順:
      ❶ 関係詞の後ろが「完全な文 or 不完全な文」かを確認する
      ❷ 先行詞をチェックする
      先行詞だけで関係詞を決定するのは絶対NG。
      不完全な文→関係代名詞(who, whom, which, what, that)。
      完全な文→関係副詞(when, where, why, how)。
      関係代名詞の格変化: 人→who[that]/whose/whom[that], 人以外→which[that]/whose/which[that]。
      目的格の関係代名詞は省略するのが通例。
      [図表: イラスト — visitは他動詞→Oがない不完全な文、先行詞チェック（p.289-290）]
      別冊ポイント189(格変化)・190(不完全な文をとる関係代名詞)参照
  - id: "nrs-017"
    name: "関係代名詞 who, whom, which の用法と目的格省略"
    category: "nrs"
    priority: "P1"
    notes: |
      主格(Sが欠け)→who/which、目的格(Oが欠け)→whom/which。
      thatで代用可（ただし非制限用法では不可）。
      whomは衰退→who/thatで代用、むしろ省略するのがふつう。
      目的格の関係代名詞は「省略できる」ではなく「省略するのがふつう」。
      省略発見のヒント: ❶不自然に名詞が2つ並ぶ ❷2つ目の名詞を含む文が不完全
      ❸述語動詞が2つあるのに接続詞/関係詞がない ❹したがって省略に気づく。
      英文読解なら❶→❷、整序問題なら❸で気づくはず。
      プラスα: 前置詞の後ろの名詞欠落→「前置詞の目的語」欠落→目的格の関代を補う。
      プラスα: 非制限用法ではthatで代用不可。
      別冊ポイント191(省略のヒント)参照
  - id: "nrs-018"
    name: "関係代名詞 whose の用法（所有格）"
    category: "nrs"
    priority: "P1"
    notes: |
      whoseの後ろは完全な文（他の関代とは異なる特徴）。
      〈whose+名詞〉の形で使う。whoseは所有格(my, hisの仲間)。
      ✕ whose the car（所有格+冠詞は不可）、✕ whose Mary（所有格+固有名詞は不可）。
      whose = the+名詞+of which で書き換え可能だが、元の表現が異なる:
      ・whose → Its等の代名詞の所有格からの変化
      ・the+名詞+of which → of itの前置詞句からの変化
      of whichを節の先頭に移動することも可。堅苦しい表現→with等で書き換えが自然。
      [図表: イラスト — my/hisの仲間であるwhose。冠詞/固有名詞を拒否（p.295）]
      プラスα: whoseの先行詞は人が通例。人以外を認めないネイティブもいる。
  - id: "nrs-019"
    name: "関係代名詞 what の用法（名詞節）"
    category: "nrs"
    priority: "P1"
    notes: |
      whatの後ろは不完全な文（他の関代と共通）。
      what節は名詞節を作る→S/O/C/前置詞の後ろに置ける。
      他の関代(who/whom/which/whose)は先行詞を修飾する形容詞節。
      whatには先行詞が組み込まれている(≒thing(s) which)→先行詞は置かれない。
      訳し方: 基本「〜こと・もの」。文脈によって「意図」「本音」等の意訳も可。
      別冊ポイント192(whatの用法)・193(コト≠what)・194(what慣用表現)参照
  - id: "nrs-020"
    name: "〈前置詞+関係代名詞〉の用法"
    category: "nrs"
    priority: "P1"
    notes: |
      〈前置詞+関代〉→後ろは完全な文（前置詞が移動して名詞欠落が解消）。
      パターンは2つ: 先行詞が人→前+whom、人以外→前+which。
      thatで代用不可。省略も不可。
      前置詞の決定方法:
      ❶ 後ろの語句との関係(熟語的つながり等)
      ❷ 先行詞の名詞との関係(特定の名詞+特定の前置詞)
      頻出3パターン: the reason for which, the extent[degree] to which, the way in which。
      with what(関代what)と〈前+which〉は別物→whatの後ろは常に不完全な文。
      〈前+関代〉は堅苦しい表現→実際は後ろに前置詞を残し目的格関代を省略した形が一般的。
      [図表: イラスト — 名詞と前置詞のペアリング: the reason+for, the way+in（p.302）]
      別冊ポイント195(前+関代のポイント)・196(前置詞の決定)参照
  - id: "nrs-021"
    name: "関係副詞 when, where, why, how"
    category: "nrs"
    priority: "P1"
    notes: |
      関係副詞の後ろは完全な文。先行詞を修飾する形容詞節を作る。
      when→時を表す先行詞(time, day等)。先行詞と関係副詞が離れることもある。
      where→場所を表す先行詞(place等)。広義の「場」: case, situation, point, circumstancesも可。
      why→理由を表す先行詞(reason等)。
      how→先行詞the way。✕ the way howは不可（意味の重複）→どちらか一方を必ず省略。
      関係副詞の省略: where(先行詞place限定で省略OK), when/why(省略OK,ただし先行詞と離れる場合は不可), how(the wayかhowのどちらか必ず省略)。
      先行詞の省略: place, time, reason等は省略OK。howを使うならthe wayは必ず省略。
      the way in whichやthe way thatでthe way howの代替が可能。
      [図表: イラスト — the way how「やり方方法」の重複（p.306）]
      別冊ポイント197(関係副詞)・198(省略)・199(先行詞の省略)・200(howの注意点)参照
  - id: "nrs-022"
    name: "関係形容詞 what・which と疑問詞 what の判別"
    category: "nrs"
    priority: "P1"
    notes: |
      関係形容詞what: 後ろに完全な文。〈what+名詞〉の形。名詞節を作る。「すべての〜」と訳す。
      what few+可算名詞 / what little+不可算名詞 =「少ないながらもすべての〜」。
      関係代名詞whatとの違い: 関代what→後ろ不完全「〜こと・もの」、関係形容詞what→後ろ完全「すべての〜」。
      共通点: どちらも名詞節を作る。
      関係形容詞which: 原則非制限用法で使用。前の節全体(または一部)を受けて直後の名詞を修飾。
      〈前置詞+which+名詞〉の形がほとんど(例: in which case)。
      疑問代名詞whatとの区別: 関代what=「〜こと・もの」、疑問代what=「何が〜か」。
      文脈次第でどちらでも通じることが多い。ask/wonder等は疑問代と相性がよい。
      疑問形容詞what: 「何の〜」「どんな〜」(例: what time)。
      別冊ポイント201(関係形容詞)参照
  - id: "nrs-023"
    name: "非制限用法（制限用法との対比）"
    category: "nrs"
    priority: "P1"
    notes: |
      制限用法(コンマなし): 同種のものと区別するために関係詞節で限定する。
      非制限用法(コンマあり): 他に同じものがない(限定する必要がない)ことを前提に補足説明。
      固有名詞やmy father, the moon等が先行詞なら非制限用法が自然。
      非制限用法の注意点: ❶thatは使用不可 ❷関係詞の省略不可(目的格でも)。
      非制限用法のwhich: 前の節全体(または一部)を先行詞にできる。
      あえて非制限用法を用いるケース:
      ❶ 前後に論理関係(そして・しかし)を持たせたい場合
      ❷ 書き手の判断・評価を示したい場合
      これらは単なる補足説明ではなく内容的に重要な情報。
      [図表: イラスト — 制限用法(限定) vs 非制限用法(補足説明)の比較（p.312）]
      参考書内参照: →p.70 別冊ポイント205(関係代名詞asの位置)
      別冊ポイント202(制限vs非制限)・203(非制限用法の論理関係)・204(特殊な関代as)・205(as節の位置)参照
  - id: "nrs-024"
    name: "連鎖関係詞"
    category: "nrs"
    priority: "P2"
    notes: |
      関係詞の直後に〈S(人)+V(思考・発言系)〉が挿入されているように見える関係詞。
      思考・発言系動詞: think, suppose, believe, say, hope等。
      攻略法: 〈S+V〉をいったん飛ばして前後をつなぐ→飛ばした後ろとの関係で主格/目的格を決定。
      連鎖関係詞では主格の関代でも省略が可能（通常は主格の省略不可）。
      注意: think+O+to be+Cの構文と混同しないこと。
      〈S+V〉を除外してもto beが残る場合→連鎖ではなくふつうの関係代名詞。
      正体: 厳密には挿入ではない。代名詞→関代→移動のプロセスで形成。
      I thought thatのthatは必ず省略される。
      訳出: 〈S+V〉を除外した前後を訳し、先行詞にかける直前に〈S+V〉を足す。
      別冊ポイント207(連鎖関係詞)参照
  - id: "nrs-025"
    name: "その他の関係代名詞（補語の関代 that、as、than、but）"
    category: "nrs"
    priority: "P2"
    notes: |
      補語の関係代名詞: 補語(C)が欠けている場合、先行詞が人/人以外に関係なくthatを使う。
      先行詞は職業・地位・性格を表す語句がほとんど。
      非制限用法ではwhichを使う(thatは非制限用法不可)。
      関係代名詞as: 先行詞にthe sameやsuchがつくと用いられる。後ろは不完全な文。
      the same...as(同じ種類) vs the same...that(同一物)→現在は両者の違いはほぼない。
      関係代名詞than: 先行詞にmoreを伴うのが通例。後ろは不完全な文。
      関係代名詞but: 先行詞に否定語(no等)がつく。主格でしか使わない。
      but節内の動詞はnotがなくても否定で訳す。現在では非常にまれな表現。
      プラスα: 補語の関代で非制限用法のwhichが使えるのは、職業等を「人そのもの」でなく「属性」と捉えているため。
      別冊ポイント206(特殊な関代than, but)参照
  - id: "nrs-026"
    name: "複合関係代名詞・複合関係形容詞（whoever, whichever, whatever）"
    category: "nrs"
    priority: "P1"
    notes: |
      複合関係代名詞(whoever, whichever, whatever): 後ろは不完全な文。先行詞なし。
      名詞節:「〜する人/もの/何でもすべて」、副詞節(譲歩):「たとえ誰/どちら/何が〜しようとも」。
      no matter書き換えは副詞節の場合のみ可。名詞節では不可。
      名詞節 vs 副詞節の判別: 文の要素(S/O等)になっていれば名詞節、取り去っても文が成立すれば副詞節。
      複合関係形容詞(whichever+名, whatever+名): 後ろは完全な文。
      名詞節:「〜するどちら/どんな名でもすべて」、副詞節:「たとえどちら/どんな名が〜でも」。
      関係形容詞whatと複合関係形容詞whatever: 名詞節ではあまり違いがない。
      whateverには譲歩の副詞節用法がある点で大きく異なる。what→whateverで強意。
      複合関係詞は関係詞よりも疑問詞の延長線上で考えた方がよい。
      別冊ポイント208(複合関係代名詞)・210(複合関係形容詞)参照
  - id: "nrs-027"
    name: "複合関係副詞（whenever, wherever, however）"
    category: "nrs"
    priority: "P1"
    notes: |
      複合関係副詞: 後ろは完全な文。先行詞なし。副詞節のみ（名詞節は作らない）。
      whenever:「〜する時はいつでも」/「たとえいつ〜しようとも」(譲歩)。
      wherever:「〜するところはどこでも」/「たとえどこで〜しようとも」(譲歩)。
      however:「たとえどれほど（どのように）〜でも」(譲歩のパターンのみ)。
      howeverの語順注意: however+形容詞/副詞+S+V。形容詞/副詞がhoweverの直後に移動する。
      ✕ However it may be humble → ○ However humble it may be。
      譲歩の見分け: may/mightが置かれることが多い（必須ではない、あくまで目安）。
      no matter書き換え: whenever/whereverは譲歩の場合のみ可。howeverは常に可(譲歩しかないため)。
      別冊ポイント209(複合関係副詞)参照

