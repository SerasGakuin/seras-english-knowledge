check_points:
  # nrv-001
  - node_id: "nrv-001"
    seq: 1
    question: "文の要素とM（修飾語句）の違いは何か？ Mに該当する品詞は？"
    answer: "文の要素はV（動詞）が必要とするS・C・O。副詞や〈前置詞＋名詞〉は原則としてMとなり、文型判別時に除外する。"
  - node_id: "nrv-001"
    seq: 2
    question: "第2文型〈S+V+C〉と第3文型〈S+V+O〉はどう判別するか？"
    answer: "動詞を中心に左右を比べ、S=Cなら第2文型、S≠Oなら第3文型。否定文・受動態でも同じ方法で判別する。"
  - node_id: "nrv-001"
    seq: 3
    question: "S・O・Cになれる品詞はそれぞれ何か？"
    answer: "S・Oになれるのは名詞（代名詞を含む）。Cになれるのは形容詞か名詞がふつう。"
  - node_id: "nrv-001"
    seq: 4
    question: "(✕) We are happiness. はなぜ不可か？"
    answer: "Cに名詞を置く場合、SとCは厳密なイコール関係が必要。happiness（幸福）は人を表すWeと厳密にイコールになれない。正しくは We are happy.（形容詞を使う）。"
  # nrv-002
  - node_id: "nrv-002"
    seq: 1
    question: "第4文型と第5文型の判別方法は？"
    answer: "動詞の後ろに並ぶ2つの要素にイコール関係があるかを確認。不成立→O₁+O₂（第4文型）、成立→O+C（第5文型）。"
  - node_id: "nrv-002"
    seq: 2
    question: "第4文型のO₁・O₂になれる品詞は？"
    answer: "名詞のみ。O₁もO₂もどちらも名詞。"
  - node_id: "nrv-002"
    seq: 3
    question: "〈S+V+O+C〉のCになれる品詞は？ 〈S+V+C〉のCとの違いは？"
    answer: "形容詞と名詞の両方。〈S+V+C〉のCは形容詞がほとんどだが、〈S+V+O+C〉のCには名詞も多い。"
  - node_id: "nrv-002"
    seq: 4
    question: "5文型の判別で一番大切な着目ポイントは？"
    answer: "動詞の後ろに何がどのような順番で置かれているかに着目すること。(M)→第1、C→第2、O→第3、O₁+O₂→第4、O+C→第5。"
  # nrv-003
  - node_id: "nrv-003"
    seq: 1
    question: "同じ動詞getが文型によってどう意味が変わるか？"
    answer: "第1文型（I got to Rome）→到着する、第2文型（She got angry）→変化する、第3文型（I got money）→手に入れる。"
  - node_id: "nrv-003"
    seq: 2
    question: "第1文型に用いられる動詞の意味は主にどんなものか？"
    answer: "存在（be, exist, lie, stand, stay, live）、移動（go, come, move, travel）、出発（leave, start, depart）、到着（arrive, get）。"
  - node_id: "nrv-003"
    seq: 3
    question: "第2文型〈S+V+C〉の動詞の3分類は？"
    answer: "状態（be, remain, keep, stay等）、変化（get, become, go, grow, turn等）、感覚・印象（seem, look, sound, feel, taste, smell等）。"
  - node_id: "nrv-003"
    seq: 4
    question: "found the book easily と found the book easy はどう違うか？"
    answer: "easily（副詞→M）は第3文型でfind=見つける。easy（形容詞→C）は第5文型でfind=わかる。"
  # nrv-004
  - node_id: "nrv-004"
    seq: 1
    question: "第4文型〈S+V+O₁+O₂〉の基本的な意味は？"
    answer: "「SはO₁にO₂を与える」。未知の動詞でも第4文型だとわかれば「与える」で意味を類推できる。"
  - node_id: "nrv-004"
    seq: 2
    question: "第5文型の動詞の2大分類は？"
    answer: "(1)知覚・認識系（see, hear, feel, think, believe, find等）→「OがCだと知覚・認識する」、(2)それ以外（make, have, let等）→「Sが原因でOがCになる」（因果関係）。"
  - node_id: "nrv-004"
    seq: 3
    question: "The student made her angry. でSとO+Cの意味関係は？"
    answer: "因果関係。生徒（原因）→彼女が怒る（結果）。第5文型（知覚・認識系以外）は原因と結果の関係を読み取る。"
  - node_id: "nrv-004"
    seq: 4
    question: "I got her a smartphone. を第4文型の法則で訳すと？"
    answer: "「彼女にスマートフォンを与えた→買ってやった」。getの「得る」の意味から「与える」で類推できる。"
  # nrv-005
  - node_id: "nrv-005"
    seq: 1
    question: "cost+O₁+O₂の根本的な意味は？ costの主語の制約は？"
    answer: "「SによってO₁からO₂が消える」。costの主語は「物事」が原則で、「人」は置かない。"
  - node_id: "nrv-005"
    seq: 2
    question: "spare+O₁+O₂には2つの意味があるが、saveとの共通点・相違点は？"
    answer: "共通: 両方とも「O₁のO₂を省く（軽減する）」の意味がある。相違: spareには「O₁にO₂を割く」の意味もあるが、saveにはない。"
  - node_id: "nrv-005"
    seq: 3
    question: "do+O₁+O₂のO₂に置ける語は？ giveで置き換えられるか？"
    answer: "O₂はgood（利益）、harm（害）、damage（被害）など限定的。giveで置き換えることはできない。"
  # nrv-006
  - node_id: "nrv-006"
    seq: 1
    question: "〈S+V+O+C〉のCに動詞を置くときの原則は？"
    answer: "to V（不定詞）を置くのが原則。toを右向き矢印（→）と考え、Oが→C（toV）へ到達するイメージ。"
  - node_id: "nrv-006"
    seq: 2
    question: "V+O+to Vをとる動詞にはどのような共通的特徴があるか？"
    answer: "忠告・説得・勧誘・強制など、何らかの「働きかけ」をする動詞が多い（advise, persuade, encourage, force等）。"
  - node_id: "nrv-006"
    seq: 3
    question: "Cにto Vを置けない例外的な動詞は？"
    answer: "使役動詞（make, let, have）と知覚動詞（see, hear, feel等）。特別な名前がついている動詞は例外。"
  # nrv-007
  - node_id: "nrv-007"
    seq: 1
    question: "make, let, have, get それぞれのCに置かれる動詞の形は？"
    answer: "make: 能動→原形/受動→Vp.p.。let: 原形のみ。have: 能動→原形/受動→Vp.p.。get: 能動→to V/受動→Vp.p.。"
  - node_id: "nrv-007"
    seq: 2
    question: "make・let・have・get の意味の違いは？"
    answer: "make: 無理強い。let: 自由容認。have: 当然の相手に依頼。get: 説得して頼み込む。"
  - node_id: "nrv-007"
    seq: 3
    question: "have+O+Vp.p.の3つの訳し分けパターンは？"
    answer: "❶依頼・使役（OをCしてもらう）、❷被害（OをCされる）、❸完了（OをCしてしまう）。"
  - node_id: "nrv-007"
    seq: 4
    question: "使役動詞を受動態にできるのはどれか？ その形は？"
    answer: "makeのみ。be made to V の形になる。have, let は受動態にしない。"
  - node_id: "nrv-007"
    seq: 5
    question: "have と get の被害用法の違いは？"
    answer: "have: 意志のある「人」による被害（wallet stolen）。get: 意志のない「もの」による被害（fingers caught in doors）。"
  # nrv-008
  - node_id: "nrv-008"
    seq: 1
    question: "知覚動詞のCに置かれる形は能動・受動それぞれ何か？"
    answer: "能動→V（原形）かVing、受動→Vp.p.（過去分詞）。使役動詞と違い、能動に2つの選択肢がある。"
  - node_id: "nrv-008"
    seq: 2
    question: "I saw my friend walk と I saw my friend walking の意味の違いは？"
    answer: "walk（原形）＝通りを渡る一部始終を見た。walking（Ving）＝渡っている途中を見た。"
  - node_id: "nrv-008"
    seq: 3
    question: "知覚動詞のCにtoVが置けない理由は？"
    answer: "toVは「まだ行われていない・これからのこと」を表す。実際に起きているからこそ見たり聞いたりできるので、toVは似合わない。"
  - node_id: "nrv-008"
    seq: 4
    question: "We heard him sing that song. を受動態にすると？"
    answer: "He was heard to sing that song.　V（原形）のsingがto singに変化する。Vingの場合は受動態にしてもそのまま。"
  # nrv-009
  - node_id: "nrv-009"
    seq: 1
    question: "keep+O+C と leave+O+C の意味の違いは？"
    answer: "keep＝意識して保つ（保持）、leave＝ほったらかし（放置）。"
  - node_id: "nrv-009"
    seq: 2
    question: "I think her (to be) very kind. のto beは省略できるか？ that節に書き換えると？"
    answer: "省略可能。I think that she is very kind. に書き換えられる。"
  - node_id: "nrv-009"
    seq: 3
    question: "I kept the machine ___.(run) の空欄には何が入るか？"
    answer: "running。OとCは能動関係（the machine is running）。keepは保持の意味。"
  - node_id: "nrv-009"
    seq: 4
    question: "make myself (understand / understood) の正解と理由は？"
    answer: "understood。understandは他動詞だが後ろに目的語がない→受動→Vp.p.を選ぶ。"
  # nrv-010
  - node_id: "nrv-010"
    seq: 1
    question: "他動詞と自動詞の一番の違いは？"
    answer: "他動詞は前置詞なしで後ろに名詞を置ける。自動詞は前置詞を置かないと名詞を置けない。"
  - node_id: "nrv-010"
    seq: 2
    question: "mention と refer の違いは？ それぞれ自動詞・他動詞どちらか？"
    answer: "mentionは他動詞（mention the accident）。referは自動詞（refer to the accident）で前置詞toが必要。"
  - node_id: "nrv-010"
    seq: 3
    question: "英語の動詞は自動詞と他動詞のどちらが多い？ 効率的な学習法は？"
    answer: "他動詞が圧倒的に多い。少数派の自動詞を見つけたら積極的に覚えていく方が効率的。"
  - node_id: "nrv-010"
    seq: 4
    question: "lie と lay の意味と活用の違いは？"
    answer: "lie（自動詞）: ある、存在する（lie-lay-lain）。lay（他動詞）: 置く（lay-laid-laid）。"
  - node_id: "nrv-010"
    seq: 5
    question: "大半の動詞は自動詞・他動詞どちらか一方に分類できるか？"
    answer: "一方に分類できるわけではない。大半の動詞は両方の用法を持つ。ただし通常はどちらかに偏る。"
  # nrv-011
  - node_id: "nrv-011"
    seq: 1
    question: "〈V+A+前置詞+B〉を攻略する2つの注目ポイントは？"
    answer: "(1) それぞれの前置詞の意味に注目する。(2) パターンが似ていると意味も似てくるという法則を活用する。"
  - node_id: "nrv-011"
    seq: 2
    question: "〈V+A+with+B〉の2つの意味は？ withの基本イメージとの関係は？"
    answer: "❶与える・供給、❷関連・結合。withの基本イメージ「もって、もっている」から、AがBをもっている→与える。AとBに関連が生まれる→関連・結合。"
  - node_id: "nrv-011"
    seq: 3
    question: "endowの意味を知らなくても、Mr. Lawson endowed the college with a large sum of money. をどう訳せるか？"
    answer: "V+A+with+Bのパターンから❶与える・供給をあてはめ、「大学に多額のお金を与えた（→寄付した）」と推測できる。"
  # nrv-012
  - node_id: "nrv-012"
    seq: 1
    question: "〈V+A+from+B〉の3つの意味は？ fromの基本イメージとの関係は？"
    answer: "fromの基本「出所→切り離す」から: ❶妨害・禁止（AにBさせない）、❷保護（AをBから守る）、❸区別（AをBと区別する）。"
  - node_id: "nrv-012"
    seq: 2
    question: "prevent A from B のBに置かれる形は？ その理由は？"
    answer: "Bには基本的にVing（動名詞）が置かれる。「AがBするのを妨げる」という意味で、Bには動作を表す語が来るため。"
  - node_id: "nrv-012"
    seq: 3
    question: "〈V+A+into+B〉の2つの意味は？ intoの基本イメージとの関係は？"
    answer: "intoの基本「内部への移動→変化」から: ❶AがBの内部に入る（移動）、❷Aが変化してBになる（変化）。「変化」を表すものが多い。"
  - node_id: "nrv-012"
    seq: 4
    question: "She translated an Italian novel into English. のA→Bの関係は「移動」と「変化」のどちらか？"
    answer: "変化。イタリア語の小説（A）が変化して英語（B）になるイメージ。translateは「変化」カテゴリの動詞。"
  # nrv-016
  - node_id: "nrv-016"
    seq: 1
    question: "speak/talk と say/tell の最も基本的な違いは何か？"
    answer: "speak/talk は自動詞（後ろに直接名詞を置けない）、say/tell は他動詞（目的語を直接置ける）。"
  - node_id: "nrv-016"
    seq: 2
    question: "speak と talk の意味の違いは？"
    answer: "speak は一方通行で話す（speech, speaker のイメージ）。talk は双方向で話す（トークショー、会談のイメージ）。"
  - node_id: "nrv-016"
    seq: 3
    question: "say と tell はそれぞれ何文型をとるか？"
    answer: "say は第3文型〈S+V+O（内容）〉。tell は第4文型〈S+V+O₁（相手）+O₂（内容）〉。"
  - node_id: "nrv-016"
    seq: 4
    question: "talk A into Ving はどういう意味か？"
    answer: "Aを説得してVさせる。talkの他動詞用法で、双方向（説得のやりとり）の感覚が残っている。"
  - node_id: "nrv-016"
    seq: 5
    question: "speak が他動詞として使える場合は？"
    answer: "「言語など」を目的語にとる場合（speak Japanese など）。言葉を発することに重点がある動詞だから。"

