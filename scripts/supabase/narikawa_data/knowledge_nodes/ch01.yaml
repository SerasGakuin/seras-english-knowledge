# Part 01: 動詞の語法と文型
# パイロット: Nar_01_01, Nar_01_16

knowledge_nodes:
  - id: "nrv-001"
    name: "第1〜3文型の判別"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ 文の要素（S/V/C/O）と修飾語句（M）の区別
      副詞や〈前置詞＋名詞〉は原則として文の要素にならず、M（修飾語句）として文型判別時に除外する。
      ただし、Mも意味的には重要な情報を伝える（脚注*2）。
      ■ 第1文型〈S+V〉
      Mを除外して S+V のみが残る文。第1文型は〈S+V〉単独で使うことは少なく、何らかのMをともなうのがふつう。
      ■ 第2文型〈S+V+C〉と第3文型〈S+V+O〉の判別
      動詞を中心に左右を比べ、S=C なら第2文型、S≠O なら第3文型。
      否定文でも受動態でも、動詞を中心に左右の関係を考えるのがコツ。
      ■ 品詞の制約
      S・Oになれるのは名詞（代名詞を含む、脚注*3）。
      Cになれるのは形容詞か名詞がふつう。分詞形容詞（→p.235）も広く形容詞として扱う（脚注*4）。
      ■ Cに名詞を置く場合の制限
      〈S+V+C〉のCに名詞を置く場合、SとCは厳密な意味でイコール関係でなければならない。
      (✕) We are happiness. → happinessは「幸福」という抽象名詞で「人」を表すWeとは厳密にイコールになれない。
      Cに名詞も置ける動詞は be動詞・become などの一部に限られ、Cには形容詞が圧倒的に多い。
      [図表: イラスト — イタリアで暮らす女性（p.18）]
      [図表: イラスト — She = an announcer の図解（p.18-19）]
      [図表: イラスト — This suit ≠ her の図解（p.19）]
      参考書内参照: →p.235〈分詞形容詞〉
      別冊ポイント001（第1文型の形式と意味的特徴）、002（第2文型＋SVC動詞リスト）、003（go+形容詞）、004（五感印象動詞）、005（第3文型の形式と意味的特徴）参照

  - id: "nrv-002"
    name: "第4〜5文型の判別"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ 第4文型〈S+V+O₁+O₂〉の判別
      動詞の後ろに文の要素が2つ並んだ場合、2つにイコール関係があるか確認する。
      her ≠ a meal → 両方O（目的語）→ 第4文型。O₁もO₂も名詞のみ。
      ■ 第5文型〈S+V+O+C〉の判別
      her = happy → 2つ目はC（補語）→ 第5文型。
      〈S+V+C〉とは違い、〈S+V+O+C〉のCには形容詞だけでなく名詞も多く置かれる。
      ■ 判別のコツ
      「イコールの関係」は「主語と述語の関係」で考えてもよい（脚注*1）。
      「彼女は食事である」→不成立→O₁+O₂、「彼女は幸せである」→成立→O+C。
      ■ 5文型の全体像
      動詞の後ろに何がどんな語順で置かれるかに着目する。
      S+V+ → (M)第1文型 / C 第2文型 / O 第3文型 / O₁+O₂ 第4文型 / O+C 第5文型
      [図表: イラスト — her ≠ a meal（第4文型）の不等号図（p.20）]
      [図表: イラスト — her = happy（第5文型）のイコール図（p.20）]
      [図表: イラスト — her = chairperson（第5文型Cに名詞）の図（p.21）]
      [図表: 分岐図 — S+V+の後ろのパターンで5文型を分類する体系図（p.21）]

  - id: "nrv-003"
    name: "第1〜3文型の意味的特徴"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ 大原則: 動詞の意味は文型に左右される
      同じ動詞（get, find等）でも文型が変われば意味が変わる。文型判別が英文読解に直結する。
      ■ 第1文型〈S+V(+M)〉の意味的特徴
      用いられる動詞の意味は限定的:
      存在（be, exist, lie, stand, stay, live）、移動（go, come, move, travel, migrate）、
      出発（leave, start, depart）、到着（arrive, get）。
      場所を表すM（修飾語句）と共に使われるのがふつう。
      例: I got to Rome. → toが到達を表すので get=たどり着く。
      ■ 第2文型〈S+V+C〉の意味的特徴
      S=Cの関係は不変。動詞により3パターンに分類:
      (1) 状態: be, remain, keep, stay 等
      (2) 変化: get, become, go, grow, turn 等
      (3) 感覚・印象: seem, look, sound, feel, taste, smell 等
      ■ 第3文型〈S+V+O〉の意味的特徴
      S≠O。「SがOに何らかの影響を与える」が基本だが、パターン化できる訳し方はない。
      ■ 文型で誤読を防ぐ
      find+O（第3文型）＝「Oを見つける」vs find+O+C（第5文型）＝「OがCだとわかる」。
      easily（副詞→M）vs easy（形容詞→C）で文型が変わり、意味が全く異なる。
      [図表: イラスト — 状態/変化/感覚・印象の3パターンを示す女性3人（p.23）]
      [図表: イラスト — I ≠ a lot of money（第3文型）の不等号図（p.23）]
      [図表: イラスト — find+O（見つける）vs find+O+C（わかる）の比較（p.24）]
      別冊ポイント002（第2文型の重要動詞リスト）参照

  - id: "nrv-004"
    name: "第4〜5文型の意味的特徴"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ 第4文型〈S+V+O₁+O₂〉の意味的特徴
      基本的な意味: 「SはO₁にO₂を与える」。
      未知の動詞が出ても第4文型だとわかれば「与える」で類推できる。
      例: I got her a smartphone. → 「彼女にスマートフォンを与えた＝買ってやった」。
      ただし take+O₁+O₂, deny+O₁+O₂ 等「与える」だけでは厳しいものもある。
      ■ 第5文型〈S+V+O+C〉の意味的特徴
      動詞は大きく2分類:
      (1) 知覚・認識系: see, hear, feel, smell, think, believe, find, consider
        → 「OがCだと知覚・認識する」
      (2) それ以外: make, have, let, get, keep, leave
        → 「Sが原因で、結果OがCになる」（因果関係）
      ■ 第5文型の因果関係の読み方
      The student(原因) made her angry(結果) → 生徒が原因で彼女が怒った。
      日本語から最もかけ離れた文型だからこそ、因果関係を意識することが英文読解で応用できる。
      [図表: イラスト — スマートフォン購入と第4文型の「与える」（p.25）]
      [図表: イラスト — 壁を汚す因果関係（SVOC）（p.26）]
      [図表: イラスト — 生徒が先生を怒らせる因果関係（SVOC）（p.27）]
      参考書内参照: → PART 01 §5（「与える」で厳しいもの）
      別冊ポイント009（第4文型の「与える」に該当しない重要動詞）参照

  - id: "nrv-005"
    name: "第4文型をとる重要動詞（cost・spare・save・do）"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ cost+O₁+O₂「SによってO₁からO₂が消える」
      costの主語は「物事」が原則（脚注*1）。
      (a) O₁にO₂（額・費用）がかかる: This bag cost me 10,000 yen.
      (b) O₁にO₂（損失・犠牲）を支払わせる: One mistake can cost a person his life.
      2パターンを個別に覚えなくても「消える」の一語で統一理解できる。
      ■ spare+O₁+O₂
      基本イメージ「使わずにとっておく」。2つの意味:
      (a) 「O₁のO₂を軽減する（省く）」= save と同義
      (b) 「O₁にO₂を割く」（save にはこの意味がない）
      spareは〈人〉を主語にして使うのが原則。
      ■ save+O₁+O₂
      「O₁のO₂（時間・手間・お金など）を軽減する、省く」= spare(a)と同義。
      「割く」の意味はない。
      ■ do+O₁+O₂「O₁にO₂（利益・害など）を与える」
      O₂に置けるものが限定: good（利益）、harm（害）、damage（被害）など。
      giveで置き換えることはできない。
      [図表: イラスト — costのイメージ（10,000円が消える/命が消える）（p.28-29）]
      [図表: イラスト — spareのイメージ（とっておく→割ける）（p.29）]
      [図表: イラスト — do you harmのイメージ（飲み過ぎ→二日酔い）（p.30）]
      別冊ポイント011（spare/saveの比較）、010（doの第4文型）参照

  - id: "nrv-006"
    name: "〈S+V+O+toV〉をとる動詞と原則"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ 〈S+V+O+C〉のCに動詞を置くときの原則
      Cにはto V（不定詞）を置くのが原則。
      toを右向き矢印（→）と考え、「OがCへ到達する」イメージ。
      ■ このパターンをとる動詞の特徴
      「忠告・説得・勧誘・強制」など何らかの働きかけをする動詞が多い:
      advise, persuade, encourage, force, tell, warn, command, order 等。
      ■ Cにto Vを置けない動詞がある
      使役動詞(make, let, have)や知覚動詞(see, hear等)は原則としてCにto Vを置けない。
      → 特別な名前がついている動詞は例外（後続セクション7,8で詳述）。
      [図表: イラスト — force（強制的に署名）vs make（息子に勉強させる）の比較（p.32）]
      別冊ポイント014（V+O+toVの動詞リスト）、015（Cに置かれるもの一覧）参照

  - id: "nrv-007"
    name: "使役動詞のCに置かれる形（make・let・have・get）"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ make: 強い働きかけ（無理強い）
      能動 → C に V（動詞の原形）、受動 → C に Vp.p.（過去分詞）。
      受動態: be made to V（makeだけ受動態あり、have/letはない）。
      ■ let: 自由容認（makeと正反対）
      C に V（動詞の原形）のみ。Vp.p.は置けない（まれにbe+Vp.p.）。
      やりたいように自由にやらせるイメージ。
      ■ have: 依頼（当然の相手に）
      能動 → C に V（原形）、受動 → C に Vp.p.。Ving で継続の意味もあり（脚注*1）。
      業者や部下など、それをやるのが当然の相手に依頼してやってもらう。
      have+O+Vp.p.は「依頼・使役」「被害」「完了」の3パターンに訳し分け。
      ■ get: 説得（頼み込む）
      能動 → C に to V（不定詞）、受動 → C に Vp.p.。
      haveと違って動詞の原形は置けない。相手にそうする義務はないので説得が必要。
      ■ have と get の被害用法の違い（脚注*2）
      have: 意志のある「人」が引き起こす被害（I had my wallet stolen.）
      get: 意志のない「もの」が引き起こす被害（I got my fingers caught in the doors.）
      ■ 使役動詞のCにto Vが似合わない理由
      make: 無理強い→間髪入れず→toの「到達」イメージと合わない
      let: 自由容認→働きかけなし→toが不要
      have: 当然の相手→説得不要→toが不要
      [図表: イラスト — make（宿題させる）/ let（行かせる）の対比（p.33-34）]
      [図表: イラスト — have（ベルボーイに頼む）/ have（髪を切ってもらう）（p.34）]
      [図表: イラスト — 4使役動詞の比較（have/make/let/getの使い分け）（p.35）]

  - id: "nrv-008"
    name: "知覚動詞のCに置かれる形と受動態"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ 知覚動詞のCに置かれる形（統一パターン）
      OとCの関係が「能動」→ V（原形）または Ving
      OとCの関係が「受動」→ Vp.p.（過去分詞）
      代表的な知覚動詞: see, hear, feel, watch, look at, notice, listen to
      ■ V（原形）と Ving の意味の違い
      V（原形）: 動作の一部始終すべてを知覚する
      Ving: 動作の最中・途中を知覚する
      ■ 知覚動詞のCにtoVが置けない理由
      toV = 「まだ行われていない・これからのこと」を表す。
      実際に食事したり歌ったりしているからこそ見たり聞いたりできる → toVは似合わない。
      ■ 受動態での変化
      知覚動詞+O+V(原形)を受動態にすると、V(原形)→toVに変化する。
      例: We heard him sing. → He was heard to sing.
      知覚動詞+O+Vingを受動態にすると、Vingはそのまま。
      使役動詞makeも同様: They made me wait. → I was made to wait. (be made to V)
      have, letは受動態にしない。
      [図表: イラスト — 028(一部始終)と029(途中)の比較（p.36）]
      参考書内参照: →p.193（PART 06 5）toVの特性
      別冊ポイント016（V原形vsVingの違い＋受動態での扱い）、015❸（知覚動詞のCに置かれるもの一覧）参照

  - id: "nrv-009"
    name: "keep・leave・findと思考動詞の〈SVOC〉"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ keep, leave, find の SVOC
      共通点: Cに形容詞・Ving（能動）・Vp.p.（受動）が置かれる。
      keep: 「意識して保つ（保持）」
      leave: 「ほったらかし（放置）」
      find: 「気づく、わかる」
      ■ 思考・認識系動詞の SVOC
      think, consider, believe, find など。
      Cには形容詞/名詞が置かれ、OとCの間にto beが挿入される場合がある（省略も可）。
      that節を用いた書き換えが可能:
      I think her (to be) very kind. = I think that she is very kind.
      ■ 能動/受動の判別テクニック
      日本語の「する/される」だけでは判断困難。Cに入る動詞の語法に注目:
      (1) 自動詞 → そもそも受動態にできない → 能動のVingのみ
      (2) 他動詞 + 後ろに目的語なし → 受動 → Vp.p.
      例: wait(自動詞) → waitingのみ
      例: understand(他動詞) + 目的語なし → understood
      [図表: イラスト — keep(機械を回し続ける)/leave(エンジンつけっ放し)の対比（p.39）]
      [図表: イラスト — find(泣いている人に気づく)（p.40）]
      [図表: イラスト — She is very kind.の吹き出し（SVOC→that節書き換え）（p.40）]
      [図表: 穴埋め図 — make myself understood（目的語なし→受動）（p.41）]
      参考書内参照: →p.85（PART 02 受動態）
      別冊ポイント015❹（keep, leave, findのCに置かれるもの一覧）参照

  - id: "nrv-010"
    name: "自動詞と他動詞の判別"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ 自動詞と他動詞の判別方法
      他動詞: 前置詞なしで後ろに名詞を置ける（mention the accident）
      自動詞: 前置詞を置かないと後ろに名詞を置けない（refer to the accident）
      自動詞: 後ろに名詞を置かなくても文は成立する（We worked together.）
      ■ 効率的な学習戦略
      英語の動詞は他動詞が圧倒的に多く、自動詞は少数派。
      少数派の自動詞を見つけたら積極的にインプットしていくのが効率的。
      ■ 自動詞・他動詞の両方の用法を持つ動詞
      大半の動詞は自動詞と他動詞の両方の用法を持つ（readの例）。
      辞書で上に出てくる用例がより一般的。
      ■ 活用の紛らわしい動詞（lie / lay）
      lie（自動詞）: ある、存在する（lie-lay-lain）
      lay（他動詞）: 置く（lay-laid-laid）
      自動詞lieの過去形layと他動詞layの原形が同じ形のため混乱しやすい。
      [図表: イラスト — 自動詞と他動詞の2つの円（p.43）]
      [図表: イラスト — lie(テーブル上の本)/lay(本を置く女性)の対比（p.43-44）]
      別冊ポイント020（動詞の分類）、021（頻出自動詞リスト）、022（前置詞不要の他動詞リスト）、025（lie/layなど活用の紛らわしい動詞）参照
      脚注*1: 他動詞の後ろの名詞=他動詞の目的語
      脚注*2: 前置詞の後ろの名詞=前置詞の目的語
      脚注*3: 辞書ではVt(他動詞)・Vi(自動詞)で区別

  - id: "nrv-011"
    name: "〈V+A+with+B〉パターンの動詞"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ 5文型は万能ではない
      5文型のパターンだけですべてが解決できるわけではない。
      provideを〈S+V+O+M〉（第3文型）と分類するより、〈provide+A+with+B〉（AにBを与える）
      というパターンでまとめた方がすんなり理解できる。
      ■ 〈V+A+前置詞+B〉を攻略するコツ
      2つの注目ポイント:
      (1) それぞれの前置詞の意味
      (2) パターンが似ていると意味も似てくるという法則
      ■ withの基本イメージ:「〜をもって、もっている」
      〈provide+A+with+B〉= AがBをもって（もっている）。
      AがBをもてば、AとBには何らかの関連・関係が生まれる → withと「関連・結合」の動詞の相性がよい。
      ■ 〈V+A+with+B〉のパターンをとる動詞の2大意味
      ❶ AにBを与える（与える・供給）: provide, supply, present, feed, serve, trust, fill, endow, furnish, equip, burden, face
      ❷ AをBと結びつけて考える（関連・結合）: associate, combine, compare, identify
      ■ 未知の動詞でも意味推測が可能
      endowの意味がわからなくても、V+A+with+Bのパターンから❶か❷をあてはめて推測できる。
      ■ 別冊027の補足ルール
      provide[supply] A with B → AとBを入れ替えるとprovide[supply] B for（またはto）Aの形となる。
      be endowed with A = 「A（才能）を授けられている」（受動態の慣用表現）。
      compare A with B: withはtoとなることもある。「たとえる」の意味ではtoを用いるのが一般的。
        例: Life is often compared to a voyage.（人生は航海にたとえられることがよくある）
      [図表: イラスト — 女の子が本を受け取る（A with B）（p.45）]
      [図表: イラスト — アインシュタインと相対性理論を結びつける（関連・結合）（p.46）]
      別冊ポイント026（with型の中心的意味）、027（V+A+with+B型の動詞リスト）参照

  - id: "nrv-012"
    name: "〈V+A+from+B〉と〈V+A+into+B〉パターンの動詞"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ fromの基本イメージ:「出所」→「切り離す」
      The rumor came from her. → うわさの「出所」が彼女。彼女から切り離された。
      「切り離す」から3つの意味が広がる。
      ■ 〈V+A+from+B〉のパターンをとる動詞の3つの意味
      ❶ AがBしないようにする（妨害・禁止）: prevent, keep, stop, hinder, prohibit, forbid, ban, discourage, dissuade, restrain
        → AとBが切り離される → AにBさせない。Bに置かれるのは基本的にVing（動名詞）。
      ❷ AをBから守る（保護）: protect, rescue, save
        → 危険からAを切り離す → 保護する。
      ❸ AをBと区別する（区別）: distinguish, tell, know
        → AとBを切り離す → 別個にグループ分け → 区別する。
        ※ order A from B（AをBに注文する）もこの型。
      ■ intoの基本イメージ:「内部への移動」→「変化」
      右向き矢印（→）のイメージ。場所でも状況でも。
      ■ 〈V+A+into+B〉のパターンをとる動詞の2つの意味
      ❶ AがBの内部に入る（移動）: put
      ❷ Aが変化してBになる（変化）: change, convert, turn, make, divide, classify, translate, put
        → 「変化」を表すものが多い。
      [図表: イラスト — right/wrongの箱を区別する（from: 区別）（p.48-49）]
      [図表: イラスト — 服をスーツケースに入れる（into: 移動）（p.49）]
      [図表: イラスト — イタリア語→英語の翻訳（into: 変化）（p.49-50）]
      別冊ポイント028（from型の中心的意味）、029（V+A+from+B型の動詞リスト）、030（into型の中心的意味）、031（V+A+into+B型の動詞リスト）参照

  - id: "nrv-013"
    name: "〈V+A+for+B〉と〈V+A+as+B〉パターンの動詞"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ forの基本イメージ:「ある対象に意識が向かう」
      〈V+A+for+B〉では、Bが意識の向かう先。
      ■ 〈V+A+for+B〉の2つの意味
      ❶ Bを理由にAを〜する（賞罰の動詞）: thank, reward, admire, praise, blame, punish, scold, criticize, condemn, excuse, forgive
        → 脚注＊1: これらの動詞を「賞罰の動詞」と呼ぶことがある。
      ❷ AをBと交換する（交換のfor）: exchange, pay, sell, buy, substitute
        → Bに「優位なもの」が置かれる（手に入れたいもの、本来使いたいものなど）。
      ■ substitute A for B → replace B with[by] A の書き換え
      substitute A for B「AをBの代用にする」= replace B with[by] A。AとBの位置が入れ替わる。
      ■ blameの二通りの用法
      blame A for B「Bの責任がAにあると思う」（A=人, B=理由）
      blame B on A「BをAのせいにする」（B=事物, A=人）→ Nar_01_14(on型)参照
      ■ asの基本イメージ:「イコール（＝）」
      〈V+A+as+B〉ではA=Bの意味関係。
      ■ 〈V+A+as+B〉の動詞: 「AをBと見なす・考える」系が多い
      regard, view, look on/upon, think of, see, count, take, consider, treat, describe, refer to, accept, acknowledge, recognize, classify, identify, imagine, define, strike, appoint
      → lookはon[upon]、thinkはofを伴わないとこの形式で使えない。
      → classify A as B（分類する）vs classify A into B（変化のニュアンス）の違い。
      → identify A as B「AがBであるとわかる（確認）」vs identify A with B「AをBと同一視する」。
      → Bには名詞以外にさまざまな品詞が置かれる（例: regard cheating as wrong → Bに形容詞）。
      [図表: イラスト — 古いシャツ(A)から新しいシャツ(B)へforで意識が向かう（p.51）]
      [図表: イラスト — him = the best doctor のasイコール関係（p.52）]
      別冊ポイント032（for型の中心的意味）、033（V+A+for+B型の動詞リスト）、034（V+A+as+B型の動詞リスト）参照

  - id: "nrv-014"
    name: "〈V+A+of+B〉と〈V+A+on+B〉パターンの動詞"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ ofの基本イメージ:「分離」（offの親戚）
      「スイッチoff」→「分離」。ofも基本的には「分離」を表す。
      ■ 〈V+A+of+B〉の2系統の意味
      ❶ AからBを分離・除去する: rob, deprive, strip, cure, clear, relieve, rid
        → rob A of B「AからBを（力ずくで）奪う」vs steal A from B「BからAを（こっそり）盗む」。奪われる人とモノの位置が逆。
      ❷ AにBに関して知らせる: remind, inform, notify, warn, assure, convince, persuade
        → 「分離」から「関連」への意味展開（→p.367参照）。
        → remind, inform, notify, warnはofをaboutにしてもOK。
        → 「知らせる」系動詞はof Bをthat節で書き換え可能。
      ❸ その他: ask, require, beg, expect（AをBに求める）
      ■ onの基本イメージ:「接触」→「のしかかる」「べったり」
      〈V+A+on+B〉ではAがBにのしかかるイメージ。
      ■ 〈V+A+on+B〉の2つの意味
      ❶ AをBに課す: impose, concentrate, base, focus, congratulate, put, force, place
      ❷ A（責任など）をBになすりつける: blame B on A
      [図表: イラスト — 女性からハンドバッグを奪う男（of: 分離）（p.54）]
      [図表: イラスト — たばこに税金を課す（on: のしかかる）（p.55）]
      [図表: イラスト — 非難されて汗をかいている人物（p.56）]
      参考書内参照: →p.367（ofの「分離→関連」の意味展開）
      別冊ポイント035（of型の中心的意味）、036（V+A+of+B型の動詞リスト）、037（on型の中心的意味）、038（V+A+on+B型の動詞リスト）参照

  - id: "nrv-015"
    name: "〈V+A+to+B〉パターンの動詞と注意点"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ toの基本イメージ:「到達」
      〈V+A+to+B〉では「AをBに到達させる」が根本の意味。
      ■ 〈V+A+to+B〉の3つの意味
      ❶ AをBに合わせる: adapt, adjust, apply, conform, relate
      ❷ AをBに加える: add, attach, leave, devote, expose
      ❸ AをBに制限・限定する: limit, restrict, confine, reduce
      ■ 別冊041: -ute動詞のまとめ（紛らわしい3動詞）
      attribute A to B「A(結果)をB(原因)のせいにする」
      contribute A to B「AをBに提供する」（contribute to A「Aに貢献する」も重要）
      distribute A to[among] B「AをBに分配する」
      ■ 注意点: 受動態や省略でパターンが崩れる
      (1) to Bの省略: 何に加えるかが状況から明確ならto Bを書かないことがある。
        例: She added the sliced tomatoes.（to Bなし）
      (2) 受動態でAが移動: remind A of Bを受動態にすると、Aが主語に移動しAの位置が空になる。
        例: She was reminded of her childhood.（Aが主語Sheに）
      動詞を受動態にすると基本パターンが崩れ、パターンに気づきにくくなることがある。
      [図表: イラスト — A(herself)がto(到達)でB(her new life)に向かう（p.57）]
      [図表: イラスト — 油(A)が水(B)にtoで追加される（p.57）]
      参考書内参照: →p.82（受動態）
      別冊ポイント039（to型の中心的意味）、040（V+A+to+B型の動詞リスト）、041（attribute/contribute/distributeのまとめ）参照

  - id: "nrv-016"
    name: "「言う」の動詞の使い分け"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ 自動詞（speak / talk）と他動詞（say / tell）の体系的比較
      speak, talk は自動詞が原則 → 後ろに直接名詞を置けない。
      (✕) speak her / (✕) talk my friend → 相手を置くには to/with などの前置詞が必要。
      say, tell は他動詞。前置詞なしで目的語を直接置ける。
      ■ speak と talk の相違点
      speak: 一方通行で話す（speech, speaker のイメージ）。
      talk: 双方向で話す（トークショー、summit talks のイメージ）。
      speakよりtalkの方がややくだけた言い方だが、ほぼ同じ意味で使われることも多い（脚注*1）。
      speak は「言葉を発する」、talk は「相手を意識して話す」が基本の意味（脚注*2）。
      ■ say と tell の相違点
      say: 第3文型〈S+V+O（内容）〉。相手を置く場合は〈say ... to+相手〉の形。
      tell: 第4文型〈S+V+O₁（相手）+O₂（内容）〉。相手と内容の両方を目的語にとる。
      ■ speak, talk の他動詞用法
      speak: 「言語など」を目的語にとる他動詞用法がある（speak Japanese）。
      talk: talk A into[out of] Ving「Aを説得してVさせる[Vさせない]」の他動詞用法がある。
      双方向のtalkの感覚が残っている（説得＝双方向のやりとり）。
      [図表: 比較図 — speak（一方向）と talk（双方向）の方向性（p.60）]
      [図表: 比較図 — say（内容を伝える）と tell（相手に伝える）の方向性（p.61）]
      別冊ポイント043（「言う」に関する重要動詞）参照

  - id: "nrv-020"
    name: "「盗む、奪う」と「かく」の動詞の使い分け"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ steal と rob の違い
      steal+A+from+B「BからAを盗む」: こっそり盗む。日本語と近い感覚。A=盗まれるモノ。
      rob+A+of+B「AからBを奪う」: 力ずくで奪う。A=場所や人、B=奪われるモノ。
      → stealとrobでは後ろに置かれる要素の位置が逆。
      ■ rob と同じパターンの動詞
      deprive A of B: 権利や能力など目に見えない抽象的なものを奪う。
      rid A of B: 厄介なものを取り除く。
      → rob A of Bのパターンは Nar_01_14（nrv-014）でも既出。
      ■ 「かく」の4動詞
      write: 文字を書く。
      draw: 鉛筆・クレヨン等を使って線で引いて「かく」。drawの基本イメージは「引く」（脚注*1: モノを手で引く、線で引く、預金を引き出す、注意を引く、結論を引き出す等）。
      paint: ペンキや絵の具を用いて「かく」（「塗る」の意味でインプット）。
      mark: 印をつける意味での「かく」。
      [図表: イラスト — steal（こっそり盗む）とrob（銀行強盗）の比較（p.71）]
      [図表: イラスト — write/draw/paintの3つの「かく」の比較（p.72）]
      [図表: イラスト — mark（地図に印をつける）（p.73）]
      別冊ポイント054（「かく」に関する重要動詞）参照

  - id: "nrv-021"
    name: "「思い出す」の動詞の使い分け（remind・remember・recollect・recall）"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ remind: 人の記憶を刺激して思い出させる
      (1) remind A of[about] B「AにB（過去のこと）を思い出させる」: 写真や物をきっかけに過去の記憶を呼び起こす。
      (2) remind A to V「Aに（これから）Vすることを気づかせる」: これからやるべき未来のことを気づかせる。
      → of B = 過去のこと、to V = これからのこと。不定詞が「まだやっていないこと」を表すことと連動。
      ■ remember: 意識して過去のことを思い出す → 覚えている
      基本: 「（意識して）思い出す」→ 記憶に定着 →「（特に意識しなくても）覚えている」。
      remember+that節: 節の内容を覚えている。
      remember A to B「AのことをBによろしく伝える」: 特殊用法。
      remember+to V / Ving: →p.197参照（定番もの）。
      ■ recollect / recall: 意識的に思い出す
      recollect+O: ばらばらになった過去の記憶を思い出す。不定詞は目的語にとれない。
      recall+O: 過去のことを思い出す。不定詞は目的語にとれない。
      [図表: 分岐図 — remind+Aの後にof B（過去）またはto V（未来）が続く構造（p.74）]
      [図表: イラスト — rememberのイメージ（脳内の記憶から人を思い出す）（p.75）]
      参考書内参照: →p.194（不定詞の「まだやっていないこと」）、→p.197（remember+toV/Ving）
      別冊ポイント049（「記憶」に関する重要動詞）参照

  - id: "nrv-022"
    name: "「思いつく」と「着用」の動詞の使い分け"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ 「思いつく」の攻略ポイント: (1)自動詞or他動詞、(2)何が主語に置かれるか
      ■ strike A〈他動詞〉: 「（考えなど）がA（人）の心に浮かぶ」
      基本イメージ「打ち付ける、打ち当たる」→ 考えが人にコツンと当たる。主語は「考え」。
      ■ occur to A〈自動詞〉: 「（考えなど）がA（人）の心に浮かぶ」
      基本イメージ「起こる」→ 考えが人に起こる。occurは自動詞なのでtoが必要。主語は「考え」。
      ■ hit on A / come up with A: 「（人が）A（考えなど）を思いつく」
      人を主語にして使う点がstrikeやoccurと異なる。
      ■ 「着用」は動作と状態の2種類
      put on+O「Oを着る」《動作》: 着る動作そのもの。
      wear+O「Oを着ている」《状態》: 着ている状態。wearは状態動詞が通例。
      dress+O「Oに服を着せる」: be dressed in A「Aを着ている」《状態》、get dressed in A「Aを着る」《動作》。
      in Aの部分は着用する服を話題にしなければ省略可（脚注*1）。
      take off「脱ぐ」: put onの反対。
      ■ 「服」関連の名詞
      clothes: 衣服。cloth: 布きれ。clothing: （集合的に）衣類全般。
      [図表: イラスト — strike（コツンと当たる）とoccur（モヤモヤ浮かぶ）の比較（p.76）]
      [図表: イラスト — put on（着る動作）とwear（着ている状態）の比較（p.77）]
      別冊ポイント050（「思いつく」に関する重要動詞）、051（「着用」に関する重要動詞）参照

  - id: "nrv-023"
    name: "意外な意味をもつ動詞の攻略法"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ 基本原則: 単語の基本的意味は原則1つ
      辞書に多数の意味が載っていても、それらは基本イメージから前後の表現や光の当て方で意味が変わっているだけ。「多義語」で片づけず、意味の最大公約数を探す訓練が有効。
      ■ run: 基本イメージ「止まらずに連続して流れる」
      (1) トラックを流れる少年 → 走る（自動詞）
      (2) 利根川が流れる → 流れる（自動詞）
      (3) 会社が止まらず流れるようにする → 経営する（他動詞）
      ■ meet: 基本イメージ「SとOがあう」
      私と彼があう → 会う / 私と嵐があう → 遭遇する / 新商品とニーズがあう → 満たす。
      ■ pay: 基本イメージ「支払う」
      払った側 → 支出。払われた側 → 利益になる → 割に合う。視点の違いが意味の違いを生む。
      [図表: イラスト — runのイメージ（走る少年・流れる川・会社の売上げグラフ）（p.78）]
      [図表: イラスト — meetのイメージ（人と人が出会う・嵐に遭遇・新商品がニーズを満たす）（p.79）]
      [図表: イラスト — payのイメージ（支払う→利益になる＝割に合う）（p.80）]
      別冊ポイント023（意外な意味をもつ自動詞: work, matter, long, last, run, do, pay + 能動態で受動態の意味をもつsell/read）、024（意外な意味をもつ他動詞: meet, run, book, consult, stand, miss, practice, see, treat, put, sentence, fire, fail, cover, coin, enjoy, drive, produce, address）参照

  - id: "nrv-024"
    name: "受動態の意味的特徴"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ 文末焦点（End-Focus）の原則
      英語は「旧情報」（既知）から始めて「新情報」（重要）を文末に置く傾向がある。受動態はこの情報構造を実現する手段。
      ■ 受動態を使う3つの理由
      (1) 誰がその行為をしたかをあえて表す必要がない（Letters are delivered every day. — 郵便屋さんと言わなくてもわかる）
      (2) 誰がその行為をしたかが不明（The gate was painted last week. — 誰が塗ったかわからない）
      (3) 誰がその行為をしたかをあえて言いたくない（The woman was killed. — 推理小説で犯人を隠す）
      ■ 受動態+by〜の形は実は少ない
      受動態に必ずしも〈by〜〉がつくとは限らない。あえて〈by+行為者〉を置くときは、その部分を「新情報＝重要情報」としてアピールしたいとき。
      ■ 能動態≠受動態
      能動態と受動態の単純な書き換え練習で「両者は意味的に等しい」とするのは百害あって一利なし。受動態には能動態では表現できない意味がある。
      [図表: 情報構造図 — 既出の情報を文頭に、アピールしたい情報は文末へ（p.82）]
      [図表: 旧情報/新情報ラベル — ItとLucyの会話で旧情報(It)と新情報(by a flood)を示す（p.82）]
      [図表: イラスト — 郵便配達員が手紙を配達（p.83）]
      [図表: イラスト — 門が塗装された（誰が？）（p.83）]
      [図表: イラスト — 探偵と犯人特定の場面（p.83-84）]
      参考書内参照: →PART15 **2**（文末焦点の詳細）
      別冊ポイント067（by+A（行為者）が置かれない場合の3つの理由）参照

  - id: "nrv-025"
    name: "受動態の形式的特徴"
    category: "動詞語法と文型"
    priority: "P1"
    notes: |
      ■ 受動態には他動詞が最適
      受動態は目的語を主語に移してつくる。他動詞は後ろに目的語を必要とするので受動態にもってこい。
      脚注*1: 受動態をつくらない他動詞もある: like, want, contain, have, approach, become, cost, enter, reach, resemble等。主語が動詞の作用や行為を受けるわけではない場合。
      ■ 自動詞を使って受動態をつくる抜け道
      laughは自動詞だが、〈laugh at〉を1つのカタマリ（句動詞）と見なすと他動詞と同様に目的語をとれる。受動態にするとatとbyが連続するが、atは省略できない。
      脚注*2: He runs fast. のような自動詞単独の文は受動態にできない。
      ■ 受動態は能動態と比べてOが1つ欠ける
      (a) 〈S+V+O〉→受動態→〈S+V〉（Oが1つ欠落）
      (b) 〈S+V+O₁+O₂〉→受動態→〈S+V+O₂〉（O₁が欠落）
      脚注*3: O₂を主語にすることも可能だが全ての第4文型動詞でできるわけではない。
      (c) 〈S+V+O+C〉→受動態→〈S+V+C〉（Oが欠落）
      [図表: イラスト — シェイクスピアとリア王（能動態→受動態の変換）（p.85）]
      [図表: イラスト — エマと呼ばれる女性（第5文型の受動態）（p.86）]
      別冊ポイント066（受動態の形式的な特徴: 3パターンの詳細）、068（句動詞の受動態: 前置詞の後ろが不足する形）、069（受動態で狙われる句動詞: speak to, take care of, run over, laugh at, look at, look up to）、070（by以外の前置詞と結びつくbe V.p.p.表現: with/at/in）、071（前置詞によって意味変化: be known to/as/for）参照

  - id: "nrv-017"
    name: "「貸し借り」の動詞の使い分け"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ 攻略の2つのコツ
      (1) 無料 or 有料？ (2) どんな文型（パターン）で用いるか？
      ■ 無料での「貸し借り」
      lend+O₁+O₂ [O₂+to+O₁]「O₁にO₂を貸す」: 無料でモノを貸す。
      borrow A from B「BからAを借りる」: 無料で移動可能なものを借りる。
      use+O「Oを借りる」: トイレや場所など移動不可能なものを借りる場合（脚注*1: 実際には区別はあいまい）。
      銀行などからのお金の貸し借り: lend/borrowを使うが利子は発生する。
      ■ 有料での「貸し借り」
      rent+O₁+O₂ [O₂+to+O₁]「O₁にO₂を貸す」/ rent A from B「BからAを借りる」: 家や車などを有料で。
      rentは1つの単語で「貸す」「借りる」のどちらの意味にもなる一挙両得な動詞。
      B（借りる相手）を言いたくないなら省略可能。お金の貸し借りにはrentは使わない。
      hire+O「Oを（一時的に）借りる」: 車を一時的に借りたり、人を一時的に雇ったりする際に最適。
      hire outで「（一時的に）貸す」の意味にもなる（脚注*2）。
      ■ その他
      loan+O₁+O₂ [O₂+to+O₁]: （有利子で）お金を貸す。lendと同様に無料でモノを貸す意味でもよく使われる。
      let+O₁+O₂ [O₂+to+O₁]:「貸す」の意味のrentとほぼ同様。主にイギリス英語。
      lease+O: 契約書を交わして土地・建物・車などを有料で借りる/貸す。
      owe+O₁+O₂: 「O₁にO₂を借りている」（状態動詞）。
      [図表: イラスト — lend（無料で貸す）とborrow A from B（無料で借りる）の対比（p.63）]
      [図表: イラスト — rent（有料で貸す）とrent A from B（有料で借りる）の対比（p.64）]
      別冊ポイント044（「貸し借り」に関する重要動詞の全体整理）参照

  - id: "nrv-018"
    name: "「疑う」の動詞の使い分け（suspect・doubt・wonder）"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ suspectとdoubtは正反対
      suspect that SV ～「（肯定的に）～だと思う」≒ think that SV ～。不審な点があり～だと思う。通例、好ましくないことに用いる。
      doubt that SV ～「（否定的に）～でないと思う」≒ don't think that SV ～。証拠や確信がなく、事実だとは思わないことを表す。
      → 「suspectもdoubtも疑う」では通用しない。
      ■ wonderの正しい意味
      基本の意味: 「～を疑問に思う、不思議に思う」。Alice in Wonderland（不思議の国のアリス）から連想。
      (1) wonder if[whether]+SV ～「～を知りたいと思う」: ifやwhetherの他にwhen, howなどの疑問詞も置ける（脚注*1）。
      (2) wonder that+SV ～「～ということに驚く」: that節をとると「驚く」の意味になることがある。It's a wonder (that)+SV ～とする方が一般的（脚注*2）。
      ■ 接続詞と動詞の相性
      if/whether（～かどうか）→ askやwonderなど「疑問系」の動詞と相性がよい。
      that → 事実や断定的な事柄を述べる際の目印。
      [図表: イラスト — suspect（犯人かなぁ…？）とdoubt（犯人じゃない！）の対比（p.66）]
      別冊ポイント046（「疑う」に関する重要動詞）、047（wonderの語法）参照

  - id: "nrv-019"
    name: "「合う」の動詞の使い分け（fit・suit・match・agree with・become）"
    category: "動詞語法と文型"
    priority: "P2"
    notes: |
      ■ 日本語では「合う」1つで済むが、英語では5つの動詞を使い分ける
      ■ fit: サイズが合う
      サイズや型がピッタリであること。日本語の「フィットする」と同じ感覚。
      ■ suit: そろっている
      スーツ（ジャケット+パンツ）が上下そろっている → 合っている、調和しているに広がる。
      脚注*1: suitの根本の意味は「後に続く」。「一連のもの」から「洋服一式」へ、「一貫した追及」から「訴訟」へ発展。
      ■ match: モノとモノとの調和
      モノと人との調和には使えない。あくまでもモノとモノの調和。
      match ≒ go with で書き換え可能。
      脚注*2: matchは「色や量で同様、釣り合い→調和」、go withは「似合っている」の意味合いが強い。
      ■ agree with: 食べ物・気候など周辺環境との適応
      主に食べ物や気候など周辺環境と人との適応を表す場合に使う。
      ■ become: 達する → 似合う
      基本の意味は「（変化や成長などによってふさわしい状態に）達する」。
      「達する」と「合う」は表裏一体。基準に達している → 基準に合っている。
      脚注*3: becomeを「似合う」の意味で用いるのは現在ではまれ。suitが一般的。
      [図表: イラスト — 靴が足にフィットしている（fit）（p.68）]
      [図表: イラスト — スーツを着た男性（suit）（p.68）]
      [図表: イラスト — ドレスとバッグの調和（match）（p.69）]
      [図表: イラスト — 青いシャツを着た女性（become）（p.70）]
      別冊ポイント048（「似合う・合う」に関する重要動詞）参照

