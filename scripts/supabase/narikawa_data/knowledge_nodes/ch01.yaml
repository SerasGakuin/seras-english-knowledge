check_points:
  # nrv-001
  - node_id: "nrv-001"
    seq: 1
    question: "文の要素とM（修飾語句）の違いは何か？ Mに該当する品詞は？"
    answer: "文の要素はV（動詞）が必要とするS・C・O。副詞や〈前置詞＋名詞〉は原則としてMとなり、文型判別時に除外する。"
  - node_id: "nrv-001"
    seq: 2
    question: "第2文型〈S+V+C〉と第3文型〈S+V+O〉はどう判別するか？"
    answer: "動詞を中心に左右を比べ、S=Cなら第2文型、S≠Oなら第3文型。否定文・受動態でも同じ方法で判別する。"
  - node_id: "nrv-001"
    seq: 3
    question: "S・O・Cになれる品詞はそれぞれ何か？"
    answer: "S・Oになれるのは名詞（代名詞を含む）。Cになれるのは形容詞か名詞がふつう。"
  - node_id: "nrv-001"
    seq: 4
    question: "(✕) We are happiness. はなぜ不可か？"
    answer: "Cに名詞を置く場合、SとCは厳密なイコール関係が必要。happiness（幸福）は人を表すWeと厳密にイコールになれない。正しくは We are happy.（形容詞を使う）。"
  # nrv-002
  - node_id: "nrv-002"
    seq: 1
    question: "第4文型と第5文型の判別方法は？"
    answer: "動詞の後ろに並ぶ2つの要素にイコール関係があるかを確認。不成立→O₁+O₂（第4文型）、成立→O+C（第5文型）。"
  - node_id: "nrv-002"
    seq: 2
    question: "第4文型のO₁・O₂になれる品詞は？"
    answer: "名詞のみ。O₁もO₂もどちらも名詞。"
  - node_id: "nrv-002"
    seq: 3
    question: "〈S+V+O+C〉のCになれる品詞は？ 〈S+V+C〉のCとの違いは？"
    answer: "形容詞と名詞の両方。〈S+V+C〉のCは形容詞がほとんどだが、〈S+V+O+C〉のCには名詞も多い。"
  - node_id: "nrv-002"
    seq: 4
    question: "5文型の判別で一番大切な着目ポイントは？"
    answer: "動詞の後ろに何がどのような順番で置かれているかに着目すること。(M)→第1、C→第2、O→第3、O₁+O₂→第4、O+C→第5。"
  # nrv-003
  - node_id: "nrv-003"
    seq: 1
    question: "同じ動詞getが文型によってどう意味が変わるか？"
    answer: "第1文型（I got to Rome）→到着する、第2文型（She got angry）→変化する、第3文型（I got money）→手に入れる。"
  - node_id: "nrv-003"
    seq: 2
    question: "第1文型に用いられる動詞の意味は主にどんなものか？"
    answer: "存在（be, exist, lie, stand, stay, live）、移動（go, come, move, travel）、出発（leave, start, depart）、到着（arrive, get）。"
  - node_id: "nrv-003"
    seq: 3
    question: "第2文型〈S+V+C〉の動詞の3分類は？"
    answer: "状態（be, remain, keep, stay等）、変化（get, become, go, grow, turn等）、感覚・印象（seem, look, sound, feel, taste, smell等）。"
  - node_id: "nrv-003"
    seq: 4
    question: "found the book easily と found the book easy はどう違うか？"
    answer: "easily（副詞→M）は第3文型でfind=見つける。easy（形容詞→C）は第5文型でfind=わかる。"
  # nrv-004
  - node_id: "nrv-004"
    seq: 1
    question: "第4文型〈S+V+O₁+O₂〉の基本的な意味は？"
    answer: "「SはO₁にO₂を与える」。未知の動詞でも第4文型だとわかれば「与える」で意味を類推できる。"
  - node_id: "nrv-004"
    seq: 2
    question: "第5文型の動詞の2大分類は？"
    answer: "(1)知覚・認識系（see, hear, feel, think, believe, find等）→「OがCだと知覚・認識する」、(2)それ以外（make, have, let等）→「Sが原因でOがCになる」（因果関係）。"
  - node_id: "nrv-004"
    seq: 3
    question: "The student made her angry. でSとO+Cの意味関係は？"
    answer: "因果関係。生徒（原因）→彼女が怒る（結果）。第5文型（知覚・認識系以外）は原因と結果の関係を読み取る。"
  - node_id: "nrv-004"
    seq: 4
    question: "I got her a smartphone. を第4文型の法則で訳すと？"
    answer: "「彼女にスマートフォンを与えた→買ってやった」。getの「得る」の意味から「与える」で類推できる。"
  # nrv-005
  - node_id: "nrv-005"
    seq: 1
    question: "cost+O₁+O₂の根本的な意味は？ costの主語の制約は？"
    answer: "「SによってO₁からO₂が消える」。costの主語は「物事」が原則で、「人」は置かない。"
  - node_id: "nrv-005"
    seq: 2
    question: "spare+O₁+O₂には2つの意味があるが、saveとの共通点・相違点は？"
    answer: "共通: 両方とも「O₁のO₂を省く（軽減する）」の意味がある。相違: spareには「O₁にO₂を割く」の意味もあるが、saveにはない。"
  - node_id: "nrv-005"
    seq: 3
    question: "do+O₁+O₂のO₂に置ける語は？ giveで置き換えられるか？"
    answer: "O₂はgood（利益）、harm（害）、damage（被害）など限定的。giveで置き換えることはできない。"
  # nrv-006
  - node_id: "nrv-006"
    seq: 1
    question: "〈S+V+O+C〉のCに動詞を置くときの原則は？"
    answer: "to V（不定詞）を置くのが原則。toを右向き矢印（→）と考え、Oが→C（toV）へ到達するイメージ。"
  - node_id: "nrv-006"
    seq: 2
    question: "V+O+to Vをとる動詞にはどのような共通的特徴があるか？"
    answer: "忠告・説得・勧誘・強制など、何らかの「働きかけ」をする動詞が多い（advise, persuade, encourage, force等）。"
  - node_id: "nrv-006"
    seq: 3
    question: "Cにto Vを置けない例外的な動詞は？"
    answer: "使役動詞（make, let, have）と知覚動詞（see, hear, feel等）。特別な名前がついている動詞は例外。"
  # nrv-007
  - node_id: "nrv-007"
    seq: 1
    question: "make, let, have, get それぞれのCに置かれる動詞の形は？"
    answer: "make: 能動→原形/受動→Vp.p.。let: 原形のみ。have: 能動→原形/受動→Vp.p.。get: 能動→to V/受動→Vp.p.。"
  - node_id: "nrv-007"
    seq: 2
    question: "make・let・have・get の意味の違いは？"
    answer: "make: 無理強い。let: 自由容認。have: 当然の相手に依頼。get: 説得して頼み込む。"
  - node_id: "nrv-007"
    seq: 3
    question: "have+O+Vp.p.の3つの訳し分けパターンは？"
    answer: "❶依頼・使役（OをCしてもらう）、❷被害（OをCされる）、❸完了（OをCしてしまう）。"
  - node_id: "nrv-007"
    seq: 4
    question: "使役動詞を受動態にできるのはどれか？ その形は？"
    answer: "makeのみ。be made to V の形になる。have, let は受動態にしない。"
  - node_id: "nrv-007"
    seq: 5
    question: "have と get の被害用法の違いは？"
    answer: "have: 意志のある「人」による被害（wallet stolen）。get: 意志のない「もの」による被害（fingers caught in doors）。"
  # nrv-008
  - node_id: "nrv-008"
    seq: 1
    question: "知覚動詞のCに置かれる形は能動・受動それぞれ何か？"
    answer: "能動→V（原形）かVing、受動→Vp.p.（過去分詞）。使役動詞と違い、能動に2つの選択肢がある。"
  - node_id: "nrv-008"
    seq: 2
    question: "I saw my friend walk と I saw my friend walking の意味の違いは？"
    answer: "walk（原形）＝通りを渡る一部始終を見た。walking（Ving）＝渡っている途中を見た。"
  - node_id: "nrv-008"
    seq: 3
    question: "知覚動詞のCにtoVが置けない理由は？"
    answer: "toVは「まだ行われていない・これからのこと」を表す。実際に起きているからこそ見たり聞いたりできるので、toVは似合わない。"
  - node_id: "nrv-008"
    seq: 4
    question: "We heard him sing that song. を受動態にすると？"
    answer: "He was heard to sing that song.　V（原形）のsingがto singに変化する。Vingの場合は受動態にしてもそのまま。"
  # nrv-009
  - node_id: "nrv-009"
    seq: 1
    question: "keep+O+C と leave+O+C の意味の違いは？"
    answer: "keep＝意識して保つ（保持）、leave＝ほったらかし（放置）。"
  - node_id: "nrv-009"
    seq: 2
    question: "I think her (to be) very kind. のto beは省略できるか？ that節に書き換えると？"
    answer: "省略可能。I think that she is very kind. に書き換えられる。"
  - node_id: "nrv-009"
    seq: 3
    question: "I kept the machine ___.(run) の空欄には何が入るか？"
    answer: "running。OとCは能動関係（the machine is running）。keepは保持の意味。"
  - node_id: "nrv-009"
    seq: 4
    question: "make myself (understand / understood) の正解と理由は？"
    answer: "understood。understandは他動詞だが後ろに目的語がない→受動→Vp.p.を選ぶ。"
  # nrv-010
  - node_id: "nrv-010"
    seq: 1
    question: "他動詞と自動詞の一番の違いは？"
    answer: "他動詞は前置詞なしで後ろに名詞を置ける。自動詞は前置詞を置かないと名詞を置けない。"
  - node_id: "nrv-010"
    seq: 2
    question: "mention と refer の違いは？ それぞれ自動詞・他動詞どちらか？"
    answer: "mentionは他動詞（mention the accident）。referは自動詞（refer to the accident）で前置詞toが必要。"
  - node_id: "nrv-010"
    seq: 3
    question: "英語の動詞は自動詞と他動詞のどちらが多い？ 効率的な学習法は？"
    answer: "他動詞が圧倒的に多い。少数派の自動詞を見つけたら積極的に覚えていく方が効率的。"
  - node_id: "nrv-010"
    seq: 4
    question: "lie と lay の意味と活用の違いは？"
    answer: "lie（自動詞）: ある、存在する（lie-lay-lain）。lay（他動詞）: 置く（lay-laid-laid）。"
  - node_id: "nrv-010"
    seq: 5
    question: "大半の動詞は自動詞・他動詞どちらか一方に分類できるか？"
    answer: "一方に分類できるわけではない。大半の動詞は両方の用法を持つ。ただし通常はどちらかに偏る。"
  # nrv-011
  - node_id: "nrv-011"
    seq: 1
    question: "〈V+A+前置詞+B〉を攻略する2つの注目ポイントは？"
    answer: "(1) それぞれの前置詞の意味に注目する。(2) パターンが似ていると意味も似てくるという法則を活用する。"
  - node_id: "nrv-011"
    seq: 2
    question: "〈V+A+with+B〉の2つの意味は？ withの基本イメージとの関係は？"
    answer: "❶与える・供給、❷関連・結合。withの基本イメージ「もって、もっている」から、AがBをもっている→与える。AとBに関連が生まれる→関連・結合。"
  - node_id: "nrv-011"
    seq: 3
    question: "endowの意味を知らなくても、Mr. Lawson endowed the college with a large sum of money. をどう訳せるか？"
    answer: "V+A+with+Bのパターンから❶与える・供給をあてはめ、「大学に多額のお金を与えた（→寄付した）」と推測できる。"
  # nrv-012
  - node_id: "nrv-012"
    seq: 1
    question: "〈V+A+from+B〉の3つの意味は？ fromの基本イメージとの関係は？"
    answer: "fromの基本「出所→切り離す」から: ❶妨害・禁止（AにBさせない）、❷保護（AをBから守る）、❸区別（AをBと区別する）。"
  - node_id: "nrv-012"
    seq: 2
    question: "prevent A from B のBに置かれる形は？ その理由は？"
    answer: "Bには基本的にVing（動名詞）が置かれる。「AがBするのを妨げる」という意味で、Bには動作を表す語が来るため。"
  - node_id: "nrv-012"
    seq: 3
    question: "〈V+A+into+B〉の2つの意味は？ intoの基本イメージとの関係は？"
    answer: "intoの基本「内部への移動→変化」から: ❶AがBの内部に入る（移動）、❷Aが変化してBになる（変化）。「変化」を表すものが多い。"
  - node_id: "nrv-012"
    seq: 4
    question: "She translated an Italian novel into English. のA→Bの関係は「移動」と「変化」のどちらか？"
    answer: "変化。イタリア語の小説（A）が変化して英語（B）になるイメージ。translateは「変化」カテゴリの動詞。"
  # nrv-013
  - node_id: "nrv-013"
    seq: 1
    question: "〈V+A+for+B〉の2つの意味パターンは？"
    answer: "❶Bを理由にAを〜する（賞罰の動詞: thank, blame, punish等）、❷AをBと交換する（交換のfor: exchange, pay, sell, buy, substitute等）。Bに優位なものが置かれる。"
  - node_id: "nrv-013"
    seq: 2
    question: "substitute A for Bの意味は？ replace との書き換えは？"
    answer: "substitute A for B = AをBの代用にする。replace B with[by] Aに書き換え可能。AとBの位置が入れ替わる。"
  - node_id: "nrv-013"
    seq: 3
    question: "〈V+A+as+B〉型の動詞に共通する意味は？ lookやthinkを使う際の注意点は？"
    answer: "「AをBとみなす・考える」。asはA=Bの意味関係を表す。lookはon[upon]、thinkはofを伴わないとこの形式で使えない（look on A as B, think of A as B）。"
  - node_id: "nrv-013"
    seq: 4
    question: "blame A for B と blame B on A の違いは？"
    answer: "blame A for B: Bの責任がAにあると思う（A=人, B=理由）。blame B on A: BをAのせいにする（B=事物, A=人）。AとBの位置が逆。"
  # nrv-014
  - node_id: "nrv-014"
    seq: 1
    question: "〈V+A+of+B〉の2つの主要な意味は？"
    answer: "❶AからBを分離・除去する（rob, deprive, strip, cure等）、❷AにBに関して知らせる（remind, inform, warn, convince等）。ofの基本「分離」と派生「関連」。"
  - node_id: "nrv-014"
    seq: 2
    question: "rob A of B の意味は？ steal との型の違いは？"
    answer: "rob A of B = AからBを（力ずくで）奪う。steal A from B = BからAを（こっそり）盗む。奪われる人とモノの位置が逆。"
  - node_id: "nrv-014"
    seq: 3
    question: "〈V+A+on+B〉の2つの意味は？ onのイメージとの関係は？"
    answer: "❶AをBに課す（impose, force等）、❷A（責任等）をBになすりつける（blame B on A）。onの「接触→のしかかる・べったり」のイメージ。"
  - node_id: "nrv-014"
    seq: 4
    question: "remind A of B の of を別の前置詞に置き換えられるか？ that節での書き換えは？"
    answer: "ofをaboutにしてもOK（remind, inform, notify, warn）。また「知らせる」系動詞はof Bをthat節で書き換え可能（例: convince me of her sincerity = convince me that she was sincere）。"
  # nrv-015
  - node_id: "nrv-015"
    seq: 1
    question: "〈V+A+to+B〉の3つの意味パターンは？"
    answer: "❶AをBに合わせる（adapt, adjust等）、❷AをBに加える（add, attach等）、❸AをBに制限・限定する（limit, restrict, reduce等）。toの「到達」の派生。"
  - node_id: "nrv-015"
    seq: 2
    question: "attribute A to B の意味は？ contribute A to B との違いは？"
    answer: "attribute A to B = A(結果)をB(原因)のせいにする。contribute A to B = AをBに提供する。-ute動詞だが意味は異なる。"
  - node_id: "nrv-015"
    seq: 3
    question: "〈V+A+前置詞+B〉パターンが受動態で崩れる例は？"
    answer: "remind A of B → She was reminded of her childhood. Aが主語に移動しAの位置が空になる。パターンを知っていれば受動態でも理解可能。"
  - node_id: "nrv-015"
    seq: 4
    question: "add A to Bで状況によりto Bやを書かないことがあるか？"
    answer: "ある。何に加えるかが明確ならto Bを省略可能。何を加えるかが明確ならAも省略可能。"
  # nrv-017
  - node_id: "nrv-017"
    seq: 1
    question: "無料で「貸す」「借りる」を表す動詞と文型パターンは？"
    answer: "貸す: lend+O₁+O₂ [O₂+to+O₁]。借りる: borrow A from B（移動可能なもの）、use+O（移動不可能なもの）。"
  - node_id: "nrv-017"
    seq: 2
    question: "rentの「貸す」と「借りる」はどう使い分けるか？"
    answer: "貸す: rent+O₁+O₂ [O₂+to+O₁]。借りる: rent A from B。1つの単語で「貸す」「借りる」の両方の意味で使える。お金の貸し借りには使わない。"
  - node_id: "nrv-017"
    seq: 3
    question: "hireの基本イメージは？ 「貸す」の意味で使えるか？"
    answer: "基本は「一時的」。車を一時的に借りたり、人を一時的に雇う場合に使う。hire outで「一時的に貸す」の意味にもなる。"
  - node_id: "nrv-017"
    seq: 4
    question: "loan, let, leaseの使い分けは？"
    answer: "loan: 有利子でお金を貸す。lendと同様に無料でモノを貸す意味でもよく使われる。let: 有料で部屋等を貸す（主にイギリス英語）。lease: 契約書を交わして土地・建物・車等を有料で貸借。"
  - node_id: "nrv-017"
    seq: 5
    question: "owe+O₁+O₂の意味と注意点は？"
    answer: "「O₁にO₂を借りている」。状態動詞であることに注意（進行形にしない）。"
  # nrv-018
  - node_id: "nrv-018"
    seq: 1
    question: "suspect that SV と doubt that SV の意味の違いは？"
    answer: "suspect that SV = 肯定的に～だと思う（≒ think that SV）。doubt that SV = 否定的に～でないと思う（≒ don't think that SV）。正反対の意味。"
  - node_id: "nrv-018"
    seq: 2
    question: "wonder if SV と wonder that SV の意味の違いは？"
    answer: "wonder if[whether] SV = ～を知りたいと思う、疑問に思う。wonder that SV = ～ということに驚く。接続詞が変わると意味が変わる。"
  - node_id: "nrv-018"
    seq: 3
    question: "if/whetherとthatはそれぞれどんな種類の動詞と相性がよいか？"
    answer: "if/whether（～かどうか）→ ask, wonderなど疑問系の動詞と相性がよい。that → 事実や断定的な事柄を述べる動詞（think, believe等）と相性がよい。"
  # nrv-019
  - node_id: "nrv-019"
    seq: 1
    question: "fitとsuitの「合う」の違いは？"
    answer: "fit: サイズや型がピッタリ合っている。suit: 色・柄・雰囲気などが一式そろって合っている、調和している。"
  - node_id: "nrv-019"
    seq: 2
    question: "matchはどんな「合う」か？ 人に対して使えるか？"
    answer: "matchはモノとモノとの調和。人とモノの調和には使えない。go withとほぼ同義で書き換え可能。"
  - node_id: "nrv-019"
    seq: 3
    question: "agree withはどんな場面で使うか？"
    answer: "食べ物や気候など周辺環境と人との適応を表す場合。例: Pork doesn't agree with her.（豚肉は彼女に合わない）"
  - node_id: "nrv-019"
    seq: 4
    question: "becomeが「似合う」の意味になるのはなぜか？ 現在もよく使われるか？"
    answer: "基本の意味「達する」から、基準に達している→基準に合っている→似合うと広がった。ただし現在ではまれで、suitを使うのが一般的。"
  # nrv-020
  - node_id: "nrv-020"
    seq: 1
    question: "steal A from B と rob A of B の違いは？ A/Bに置かれるものは？"
    answer: "steal A from B: Aは盗まれるモノ、Bは場所や人（こっそり盗む）。rob A of B: Aは場所や人、Bは奪われるモノ（力ずくで奪う）。AとBの位置が逆。"
  - node_id: "nrv-020"
    seq: 2
    question: "deprive A of B と rid A of B の意味の違いは？ rob との共通点は？"
    answer: "deprive A of B: 権利や能力など抽象的なものを奪う。rid A of B: 厄介なものを取り除く。いずれも rob A of B と同じ〈V+A+of+B〉型。"
  - node_id: "nrv-020"
    seq: 3
    question: "drawの基本イメージは？ 「かく」以外にどんな意味があるか？"
    answer: "基本イメージは「引く」。モノを手で引く、線で引いて「かく」、預金を引き出す、注意を引く、結論を引き出す等。"
  - node_id: "nrv-020"
    seq: 4
    question: "write, draw, paint, mark はそれぞれどんな「かく」か？"
    answer: "write: 文字を書く。draw: 鉛筆等で線を引いてかく。paint: ペンキや絵の具を用いてかく（塗る）。mark: 印をつける意味でかく。"
  # nrv-021
  - node_id: "nrv-021"
    seq: 1
    question: "remind A of B と remind A to V の違いは？ なぜ of は過去、to V は未来に対応するか？"
    answer: "of B: A に B（過去のこと）を思い出させる。to V: A に（これから）V することを気づかせる。不定詞は「まだやっていないこと」を表すため、未来と対応する。"
  - node_id: "nrv-021"
    seq: 2
    question: "rememberの意味が「思い出す」から「覚えている」に展開するのはなぜか？"
    answer: "意識して過去のことを思い出す → 記憶に定着 → 特に意識しなくても覚えている、という流れで意味が拡張した。"
  - node_id: "nrv-021"
    seq: 3
    question: "recollect/recall と remember の違いは？ 不定詞との関係は？"
    answer: "recollect/recall: 意識的に過去の記憶を思い出す。不定詞を目的語にとれない。remember: 不定詞も動名詞も目的語にとれる（→p.197）。"
  - node_id: "nrv-021"
    seq: 4
    question: "remember A to B はどういう意味か？"
    answer: "「A のことを B によろしく伝える」。remember の特殊用法。"
  # nrv-022
  - node_id: "nrv-022"
    seq: 1
    question: "strike A と occur to A の違いは？ 主語には何が置かれるか？"
    answer: "strike A: 他動詞（前置詞不要）。occur to A: 自動詞（toが必要）。どちらも主語は「考え」で、人は目的語（A）側に置く。"
  - node_id: "nrv-022"
    seq: 2
    question: "hit on A / come up with A が strike/occur と異なる点は？"
    answer: "hit on A / come up with A は人を主語にして使う。strike/occur は考えが主語。"
  - node_id: "nrv-022"
    seq: 3
    question: "put on, wear, dress の違いは？ dressの受動態は？"
    answer: "put on+O: 着る動作。wear+O: 着ている状態（状態動詞）。dress+O: Oに服を着せる。be dressed in A: Aを着ている（状態）。get dressed in A: Aを着る（動作）。"
  - node_id: "nrv-022"
    seq: 4
    question: "clothes, cloth, clothing の違いは？"
    answer: "clothes: 衣服。cloth: 布きれ。clothing: 集合的に衣類全般。"
  # nrv-023
  - node_id: "nrv-023"
    seq: 1
    question: "runの3つの意味（走る・流れる・経営する）に共通する基本イメージは？"
    answer: "「止まらずに連続して流れる」。少年がトラックを流れる→走る、川が流れる→流れる、会社が止まらず流れるようにする→経営する。"
  - node_id: "nrv-023"
    seq: 2
    question: "meetに「満たす」の意味があるのはなぜか？"
    answer: "meetの基本は「SとOがあう」。新商品とお客のニーズがあう→ニーズを満たす。会うの一種。"
  - node_id: "nrv-023"
    seq: 3
    question: "payに「割に合う」の意味があるのはなぜか？"
    answer: "「支払う」の視点を変えたもの。払った側→支出、払われた側→利益になる。「利益になる」が「割に合う」に展開。"
  # nrv-024
  - node_id: "nrv-024"
    seq: 1
    question: "英語の「文末焦点」の原則とは？ 受動態との関係は？"
    answer: "既知の情報（旧情報）を文頭に、重要な情報（新情報）を文末に置く原則。受動態はこの情報構造を実現する手段。"
  - node_id: "nrv-024"
    seq: 2
    question: "受動態を使う3つの理由は？"
    answer: "(1)誰がしたかを表す必要がない（郵便配達は自明）、(2)誰がしたかが不明（門の塗装者不明）、(3)誰がしたかをあえて言いたくない（推理小説で犯人を隠す）。"
  - node_id: "nrv-024"
    seq: 3
    question: "受動態にby〜を付けるのはどんなときか？"
    answer: "by+行為者を「新情報＝重要情報」として文末でアピールしたいとき。by a floodで「洪水なんだ！」と焦点を当てる。"
  - node_id: "nrv-024"
    seq: 4
    question: "能動態と受動態は意味的に等しいか？"
    answer: "等しくない。受動態には能動態では表現できない意味（情報構造・行為者の隠蔽等）がある。単純な書き換え練習は百害あって一利なし。"
  # nrv-025
  - node_id: "nrv-025"
    seq: 1
    question: "受動態には他動詞が最適である理由は？ 受動態にできない他動詞の例は？"
    answer: "受動態は目的語を主語に移すので、目的語がある他動詞が最適。ただしresemble, contain, cost等は主語が動詞の作用を受けないため受動態にしない。"
  - node_id: "nrv-025"
    seq: 2
    question: "自動詞laughで受動態をつくるにはどうするか？ atは省略できるか？"
    answer: "laugh at を1つの句動詞と見なして他動詞と同様に扱う。Mary was laughed at by her friends. atは省略不可。Maryがatの後ろから移動しただけ。"
  - node_id: "nrv-025"
    seq: 3
    question: "受動態で「Oが1つ欠ける」法則を3パターンで説明せよ。"
    answer: "(a) SVO→SV（Oが欠落）、(b) SVO₁O₂→SVO₂（O₁が欠落）、(c) SVOC→SVC（Oが欠落）。いずれも能動態からOが1つ消えた形。"
  - node_id: "nrv-025"
    seq: 4
    question: "Joe gave me this ring. の受動態を2種類つくれるか？"
    answer: "I was given this ring by Joe.（O₁を主語）と This ring was given to me by Joe.（O₂を主語）。ただし全ての第4文型動詞で2種類つくれるわけではない。"
  # nrv-016
  - node_id: "nrv-016"
    seq: 1
    question: "speak/talk と say/tell の最も基本的な違いは何か？"
    answer: "speak/talk は自動詞（後ろに直接名詞を置けない）、say/tell は他動詞（目的語を直接置ける）。"
  - node_id: "nrv-016"
    seq: 2
    question: "speak と talk の意味の違いは？"
    answer: "speak は一方通行で話す（speech, speaker のイメージ）。talk は双方向で話す（トークショー、会談のイメージ）。"
  - node_id: "nrv-016"
    seq: 3
    question: "say と tell はそれぞれ何文型をとるか？"
    answer: "say は第3文型〈S+V+O（内容）〉。tell は第4文型〈S+V+O₁（相手）+O₂（内容）〉。"
  - node_id: "nrv-016"
    seq: 4
    question: "talk A into Ving はどういう意味か？"
    answer: "Aを説得してVさせる。talkの他動詞用法で、双方向（説得のやりとり）の感覚が残っている。"
  - node_id: "nrv-016"
    seq: 5
    question: "speak が他動詞として使える場合は？"
    answer: "「言語など」を目的語にとる場合（speak Japanese など）。言葉を発することに重点がある動詞だから。"

