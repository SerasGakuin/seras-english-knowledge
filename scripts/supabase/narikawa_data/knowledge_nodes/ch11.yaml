check_points:
  - node_id: "nrh-001"
    seq: 1
    question: "a salmonとsalmonの違いは？"
    answer: "a salmon=丸ごと1匹の具体的なカタチ。salmon=切り身等カタチ不定"
  - node_id: "nrh-001"
    seq: 2
    question: "by trainとby a trainの違いは？"
    answer: "by train=交通手段一般(具体的電車をイメージせず)。by a train=具体的な電車(例:ひかれた電車)"
  - node_id: "nrh-001"
    seq: 3
    question: "I like an apple.はなぜ不適切か？"
    answer: "a+名詞の目的語はoneに置換可能な場合に限る。リンゴ1個だけ好きはありえない。I like apples."
  - node_id: "nrh-002"
    seq: 1
    question: "the Himalayas, the Johnsons, The Beatlesになぜtheがつく？"
    answer: "複数のものを紐でくくって1つにまとめるイメージ。山々→山脈、家族→一家"
  - node_id: "nrh-002"
    seq: 2
    question: "the clockとa clockの違いは？"
    answer: "the clock=部屋に唯一の時計(みんな同じものをイメージ)。a clock=複数あるうちの不特定の1つ"
  - node_id: "nrh-002"
    seq: 3
    question: "the moonとa full moonでなぜ冠詞が違う？"
    answer: "the moon=太陽系に唯一の月。a full moon=月が見せるさまざまな形のうちの1つ"
  - node_id: "nrh-003"
    seq: 1
    question: "chalk(チョーク)やbread(パン)が不可算名詞である理由は？"
    answer: "一部分を取り出しても基本的性質は変わらない(折っても書ける/切ってもパン)"
  - node_id: "nrh-003"
    seq: 2
    question: "furniture, baggageが不可算名詞である理由は？"
    answer: "個々の家具/手荷物をひっくるめる総称語だから"
  - node_id: "nrh-003"
    seq: 3
    question: "work(仕事)が不可算で、a work(作品)が可算になるのはなぜ？"
    answer: "仕事は行為全般で不可算。結果として生み出された作品は具体的カタチがあるので可算"
