  - node_id: "nrh-003"
    seq: 3
    question: "work(仕事)が不可算で、a work(作品)が可算になるのはなぜ？"
    answer: "仕事は行為全般で不可算。結果として生み出された作品は具体的カタチがあるので可算"
  - node_id: "nrh-004"
    seq: 1
    question: "店の客、招待客、訪問客をそれぞれ英語で？"
    answer: "customer(店の客)、guest(招待客/宿泊客)、visitor(訪問客)"
  - node_id: "nrh-004"
    seq: 2
    question: "audience, spectator, viewerの違いは？"
    answer: "audience(コンサート・劇場の聴衆)、spectator(スポーツの観戦客)、viewer(TV視聴者)"
  - node_id: "nrh-004"
    seq: 3
    question: "知識・技術を求めてくる客(弁護士の依頼人等)は？"
    answer: "client"
  - node_id: "nrh-005"
    seq: 1
    question: "priceとpricesの違いは？"
    answer: "price=個々の商品の値段・価格。prices=物価"
  - node_id: "nrh-005"
    seq: 2
    question: "charge, fee, fareの使い分けは？"
    answer: "charge=サービス料金/公共料金。fee=入会金等/専門職への報酬。fare=乗り物の運賃"
  - node_id: "nrh-005"
    seq: 3
    question: "toll, rent, fine/penaltyの意味は？"
    answer: "toll=通行料。rent=家賃。fine/penalty=罰金"
  - node_id: "nrh-006"
    seq: 1
    question: "mannerとmannersの意味の違いは？"
    answer: "manner=方法・やり方。manners=礼儀・行儀(日本語の「マナー」)"
  - node_id: "nrh-006"
    seq: 2
    question: "promise, appointment, reservationの使い分けは？"
    answer: "promise=約束全般。appointment=人と会う約束。reservation=座席・ホテル等の予約"
  - node_id: "nrh-006"
    seq: 3
    question: "habitとcustom(s)の違いは？"
    answer: "habit=個人的習慣・癖。custom=社会的習慣・風習。customs=税関・関税"
  - node_id: "nrh-007"
    seq: 1
    question: "means(手段)やspecies(種)の複数形は？"
    answer: "単複同形。a meansでもtwo meansでも同じ形"
  - node_id: "nrh-007"
    seq: 2
    question: "make friends, change trainsはなぜ複数形？"
    answer: "相互複数。友達関係は最低2人、乗り換えは最低2種類の電車が必要だから"
  - node_id: "nrh-007"
    seq: 3
    question: "The police (is / are) ...？"
    answer: "are。policeは中に複数の警察官がいるイメージ→複数扱い"
  - node_id: "nrh-008"
    seq: 1
    question: "one, it, thatの修飾可否の違いは？"
    answer: "one=前後から修飾可。it=修飾不可。that=後ろからのみ修飾可"
  - node_id: "nrh-008"
    seq: 2
    question: "one of FranceではなくthatOfFranceを使う理由は？"
    answer: "one of ~は「~のうちの1つ」(数詞)と解釈されるため"
  - node_id: "nrh-008"
    seq: 3
    question: "oneが受けられない名詞の種類は？"
    answer: "不可算名詞。oneはone, two, threeのoneだから数えられる名詞のみ"
  - node_id: "nrh-009"
    seq: 1
    question: "the otherとthe othersの使い分けは？"
    answer: "the other=残りが1つ(2者のうちone引く)。the others=残りが複数(全体からsome引く)"
  - node_id: "nrh-009"
    seq: 2
    question: "なぜthe other/the othersにtheがつく？"
    answer: "引き算して残りすべてが確実に特定できるから"
  - node_id: "nrh-009"
    seq: 3
    question: "(✕) Show me other.がなぜ不可？"
    answer: "otherは単独使用不可。the other/others/another等の形で使う"
  - node_id: "nrh-010"
    seq: 1
    question: "anotherとthe otherの違いは？"
    answer: "another=残りの一部(不確定/theなし)。the other=残りすべて(特定/theあり)"
  - node_id: "nrh-010"
    seq: 2
    question: "othersとthe othersの違いは？"
    answer: "others=残りの一部(まだ余っている)。the others=残りすべて(全部引き取る)"
  - node_id: "nrh-010"
    seq: 3
    question: "one thing ... anotherの意味は？"
    answer: "「〜と…は別物だ(雲泥の差がある)」"
  - node_id: "nrh-011"
    seq: 1
    question: "both A and B / either A or B / neither A nor Bの意味は？"
    answer: "both...and=AもBも両方。either...or=AかBのどちらか。neither...nor=AもBもどちらも〜ない"
  - node_id: "nrh-011"
    seq: 2
    question: "either sideとboth sidesの違いは？"
    answer: "同じ「両側」の意味だが、either side(単数名詞)、both sides(複数名詞)"
  - node_id: "nrh-011"
    seq: 3
    question: "neither = ?+?を分解すると？"
    answer: "not + either。neitherのnはnotのn"
  - node_id: "nrh-012"
    seq: 1
    question: "2者と3者以上の対応表（すべて/どれでも/ゼロ）は？"
    answer: "2者: both/either/neither。3者以上: all/any/none"
  - node_id: "nrh-012"
    seq: 2
    question: "no(形容詞)とnone(代名詞)の使い方の違いは？"
    answer: "no=後ろに名詞を伴う(No music)。none=単独使用可/none of~の形(代名詞)"
  - node_id: "nrh-012"
    seq: 3
    question: "someはどんな場面で使う？"
    answer: "allでもnoneでもない、あいまいにぼかしたい場面。人数が多いと「〜なものもある」の意味に"
  - node_id: "nrh-013"
    seq: 1
    question: "itとthatの根本的な違いは？"
    answer: "it=受け専門の代名詞(消極的)。that=直接指し示す指示語(積極的)"
  - node_id: "nrh-013"
    seq: 2
    question: "Who is it?でなぜitを使う？"
    answer: "誰かわからない相手を直接指す(this/that)のは不自然。消極的なitで漠然と受ける"
  - node_id: "nrh-013"
    seq: 3
    question: "this timeとthat timeの違いは？"
    answer: "this time=今回(近い感覚)。that time=あのころ(遠い感覚)"
  # B-14: Part 13 形容詞
  - node_id: "nrh-014"
    seq: 1
    question: "限定用法のみの形容詞の例を3つ挙げよ"
    answer: "main, chief, only, mere, sole, wooden, golden, elder, inner, latter等"
  - node_id: "nrh-014"
    seq: 2
    question: "叙述用法のみの形容詞の共通点は？"
    answer: "aで始まるものが多い(alive, alike, asleep, aware, awake, afraid, alone)"
  - node_id: "nrh-014"
    seq: 3
    question: "(✕) alive animalsの正しい表現は？"
    answer: "live animals, living animals。aliveは叙述用法のみで前から修飾不可"
  - node_id: "nrh-014"
    seq: 4
    question: "live/alive/living/livelyの違いは？"
    answer: "live[laiv]=限定用法のみ、alive=叙述用法のみ、living=両方可、lively=「活発な」"
  - node_id: "nrh-015"
    seq: 1
    question: "present jobとpeople presentの意味の違いは？"
    answer: "present job=現在の仕事(永続的性質)。people present=出席している人々(一時的状態)"
  - node_id: "nrh-015"
    seq: 2
    question: "available(前)とavailable(後)の意味の違いは？"
    answer: "前=いつでも利用できる(永続)。後=いま一時的に利用できる"
  - node_id: "nrh-015"
    seq: 3
    question: "2語以上で前から修飾する方法は？"
    answer: "ハイフンで結ぶ(ten-year-old girl)"
  - node_id: "nrh-016"
    seq: 1
    question: "respective/respectful/respectableの意味は？"
    answer: "respective(-ive)=それぞれの、respectful(-ful)=敬意を払う、respectable(-able)=立派な"
  - node_id: "nrh-016"
    seq: 2
    question: "forgettableとforgetfulの違いは？"
    answer: "forgettable(-able/受動)=忘れられやすい、forgetful(-ful/いっぱい)=忘れっぽい"
  - node_id: "nrh-016"
    seq: 3
    question: "regrettableとregretfulの主語の違いは？"
    answer: "regrettable=人以外が主語(残念な事態)、regretful=人が主語(後悔している)"
  - node_id: "nrh-017"
    seq: 1
    question: "imaginary, imaginative, imaginableの違いは？"
    answer: "imaginary=架空の、imaginative=想像力豊かな、imaginable=想像しうる"
  - node_id: "nrh-017"
    seq: 2
    question: "historicとhistoricalの違いは？"
    answer: "historic=歴史的に有名な、historical=歴史に関する"
  - node_id: "nrh-017"
    seq: 3
    question: "economicとeconomicalの違いは？"
    answer: "economic=経済の、economical=経済的な(節約の)"
  - node_id: "nrh-018"
    seq: 1
    question: "free from AのAにはどんな要素が入る？far from Aは？"
    answer: "free from A=マイナス要素(偏見、ストレス等)。far from A=プラス要素(幸せ等、Aからほど遠い→否定)"
  - node_id: "nrh-018"
    seq: 2
    question: "ableとcapableの主語の違いは？"
    answer: "able=人のみが主語。capable=人+モノが主語(capable of Ving)"
  - node_id: "nrh-018"
    seq: 3
    question: "He is sure to win.とHe is sure of winning.の違いは？"
    answer: "sure to V=話し手がそう確信。sure of=主語(He)自身が確信"
  - node_id: "nrh-018"
    seq: 4
    question: "(✕) I am convenient.がなぜ不可？"
    answer: "convenientは人を主語にとらない。It is convenient for me.が正しい"
  - node_id: "nrh-019"
    seq: 1
    question: "Most students passed.のmostは何詞？"
    answer: "形容詞(studentsという名詞を修飾)"
  - node_id: "nrh-019"
    seq: 2
    question: "(✕) Almost students passed.がなぜ不可？"
    answer: "almost=副詞。名詞は修飾できない。Almost all studentsなら可"
  - node_id: "nrh-019"
    seq: 3
    question: "most of the studentsのtheはなぜ必要？"
    answer: "ofの後のBは全体を表すため、the/these/所有格等の限定詞で特定する必要がある"
  - node_id: "nrh-020"
    seq: 1
    question: "fewとa fewの違いは？"
    answer: "few=ほとんどない(否定的)。a few=少しはある(肯定的)。aがつく方が肯定的"
  - node_id: "nrh-020"
    seq: 2
    question: "not a few, quite a fewの意味は？"
    answer: "どちらも「かなり多い」。not a few=二重否定、quite a few=控えめ表現の逆転"
  - node_id: "nrh-020"
    seq: 3
    question: "many a+名詞の動詞は単数/複数？"
    answer: "単数。many a student has(直前がa studentで単数一致)"
  - node_id: "nrh-020"
    seq: 4
    question: "more than one+名詞の動詞は？"
    answer: "単数(直前のoneに引っ張られる)"
  - node_id: "nrh-021"
    seq: 1
    question: "price/salaryの「高い/低い」は何を使う？"
    answer: "high/low"
  - node_id: "nrh-021"
    seq: 2
    question: "population/numberの「多い/少ない」は何を使う？"
    answer: "large/small"
  - node_id: "nrh-021"
    seq: 3
    question: "「薄いコーヒー」「薄い霧」「薄い色」はそれぞれ？"
    answer: "weak coffee、thin fog、light color"
  - node_id: "nrh-022"
    seq: 1
    question: "形容詞の基本語順は？"
    answer: "冠詞相当語→数量→性質→名詞"
  - node_id: "nrh-022"
    seq: 2
    question: "(✕) these old two carsのどこが間違い？"
    answer: "数量が性質より前。these two old carsが正しい"
  - node_id: "nrh-022"
    seq: 3
    question: "性質の中の並び順は？"
    answer: "評価→大小→新旧→色→材料・出所"
  # B-14: Part 14 副詞
  - node_id: "nrh-023"
    seq: 1
    question: "副詞の立ち位置で「場所」と「時」はどちらが先？"
    answer: "場所→時の順"
  - node_id: "nrh-023"
    seq: 2
    question: "強調の副詞(very等)はどこに置く？"
    answer: "修飾対象の直前"
  - node_id: "nrh-023"
    seq: 3
    question: "頻度副詞(always等)の位置は？"
    answer: "一般動詞の前、be動詞・助動詞の後(notと同じ位置)"
  - node_id: "nrh-024"
    seq: 1
    question: "(✕) very olderと(✕) much beautifulがなぜ不可？"
    answer: "very=原級のみ強調(比較級不可)。much=比較級のみ強調(原級不可)"
  - node_id: "nrh-024"
    seq: 2
    question: "much too heavyは可能か？"
    answer: "可能。tooは原級ではないのでmuchで強調できる"
  - node_id: "nrh-024"
    seq: 3
    question: "頻度副詞をalways→neverの順に並べよ"
    answer: "always→usually→often→sometimes→rarely/seldom→never"
  - node_id: "nrh-024"
    seq: 4
    question: "not(副詞)とno(形容詞)の品詞の違いは？"
    answer: "not=副詞(動詞等を否定)。no=形容詞(名詞を否定/ゼロの意味)"
  - node_id: "nrh-025"
    seq: 1
    question: "hard(一生懸命)に-lyがつくとどうなる？"
    answer: "hardly=ほとんど〜ない(否定語=scarcely)"
  - node_id: "nrh-025"
    seq: 2
    question: "lately, recently, nowadays/these daysの時制との対応は？"
    answer: "lately=現在完了形、recently=過去形が多い、nowadays/these days=現在形"
  - node_id: "nrh-025"
    seq: 3
    question: "ago(過去形)とbefore(過去完了形)の基準点の違いは？"
    answer: "ago=現在から遡る。before=過去の一時点から遡る"
  - node_id: "nrh-026"
    seq: 1
    question: "so beautiful a flowerの語順ルールは？"
    answer: "so/too/how/as + 形容詞 + a[an] + 名詞"
  - node_id: "nrh-026"
    seq: 2
    question: "Fortunately, no one was hurt.のfortunatelyは何を修飾？"
    answer: "文全体を修飾する文修飾の副詞(= It is fortunate that...)"
  - node_id: "nrh-026"
    seq: 3
    question: "(✕) go to abroadはなぜ不可？"
    answer: "abroadは副詞(名詞に見えるが)。前置詞不要。ただしfrom abroadは可"
  # B-14: Part 15 特殊構文
  - node_id: "nrh-027"
    seq: 1
    question: "Not all students passed.は全体否定？部分否定？"
    answer: "部分否定(not+all=「すべてが〜わけではない」)"
  - node_id: "nrh-027"
    seq: 2
    question: "the last person to Vの意味は？"
    answer: "Vする可能性が最も低い人(潜在否定)"
  - node_id: "nrh-027"
    seq: 3
    question: "anything butの意味は？"
    answer: "「決して〜ではない」。〜以外なら何でもOK→〜は絶対ダメ"
  - node_id: "nrh-027"
    seq: 4
    question: "部分否定の訳し方は？"
    answer: "「〜とは限らない」「〜というわけではない」(ぼかす)"
  - node_id: "nrh-028"
    seq: 1
    question: "end-focusの原則とは？"
    answer: "強調したい新情報はなるべく文末に配置する原則"
  - node_id: "nrh-028"
    seq: 2
    question: "Here comes the car.で倒置が起きる理由は？"
    answer: "car(新情報)を文末に配置するend-focusの原則"
  - node_id: "nrh-028"
    seq: 3
    question: "任意倒置の2つの効果は？"
    answer: "❶文末焦点(新情報を後ろに) ❷予想を裏切り目立たせる"
  - node_id: "nrh-029"
    seq: 1
    question: "Never have I seen such a thing.の倒置の理由は？"
    answer: "否定語(Never)が文頭→主節が疑問文型に倒置(強制倒置)"
  - node_id: "nrh-029"
    seq: 2
    question: "Not everyone speaks French.はなぜ倒置しない？"
    answer: "否定語が主語中にある(部分否定)→倒置不要"
  - node_id: "nrh-029"
    seq: 3
    question: "onlyが文頭で倒置を起こす理由は？"
    answer: "only=1つのみ→他を全否定→否定的な語→強制倒置"
  - node_id: "nrh-029"
    seq: 4
    question: "So is Sam.とSo he is.の違いは？"
    answer: "So is Sam.(倒置あり)=Sam新情報「サムもそうだ」。So he is.(倒置なし)=he旧情報「たしかにそうだ」"
  - node_id: "nrh-030"
    seq: 1
    question: "there be構文のAにthe/my等がこないのはなぜ？"
    answer: "Aの位置は新情報を配置する場所。the/myは旧情報のマーカーだから"
  - node_id: "nrh-030"
    seq: 2
    question: "There is a book on the desk.のbe動詞を書き換えると？"
    answer: "exist/lie/stand等の第1文型動詞(There lies a book...)"
  - node_id: "nrh-030"
    seq: 3
    question: "I want there to be no trouble.のthereの役割は？"
    answer: "want+O+to beのOの位置にthere(副詞)が入る形"

