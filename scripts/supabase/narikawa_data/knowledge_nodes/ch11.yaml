# ch11.yaml — Part 11〜15: 品詞・特殊構文 (nrh)

knowledge_nodes:
  - id: "nrh-001"
    name: "不定冠詞a[an]の感覚（具体的カタチのイメージ）"
    category: "nrh"
    priority: "P1"
    notes: |
      a[an]は「1つの具体的なカタチがイメージできるもの」につける。
      a salmon(丸ごと1匹) vs salmon(切り身等、カタチ不定)。
      by train(単数無冠詞、交通手段一般) vs by a train(具体的な電車)。
      目的語の〈a+名詞〉はoneに置き換え可能な場合に限る。
      I like an apple.(△) → I like apples.(○) リンゴ全般が好きなら複数形。
      I like a girl.(ある1人の女の子) vs I like girls.(女の子全般)。
      プラスα: 特定できる電車なら by the train(定冠詞)。
      別冊ポイント244(名詞の捉え方による冠詞の違い)・245(a/anがつく固有名詞)・248(無冠詞の用法)参照
  - id: "nrh-002"
    name: "定冠詞theの使い方（紐でくくる→区別→唯一）"
    category: "nrh"
    priority: "P1"
    notes: |
      theの3段階イメージ:
      (1) 紐でくくる: the Himalayas(山々をまとめる), the Johnsons(一家), The Beatles
      (2) 他のものと区別: catch her by the arm(他部位と区別)
      (3) すべて→それだけ・唯一→みんなが同じものをイメージ: the earth, the sun, the moon
      a shirt(不特定) → the shirt(前出の特定シャツ)。
      the clock(部屋に唯一→みんな同じ時計をイメージ) vs a clock(複数のうちどれか1つ)。
      三日月や満月はさまざまな形のうちの1つ→ a full moon。
      [図表: イラスト — the Himalayas/the Johnsonsの紐でくくるイメージ（p.424）]
      [図表: イラスト — 5人の少年から眼鏡の2人をくくる→すべて=唯一（p.425）]
      [図表: イラスト — 部屋の時計 the clock vs a clock の対比（p.425-426）]
      プラスα: ＊1→別p.89ポイント247(V+A+前+the身体), ＊2→Mars/Jupiter等は固有名詞でtheなし
      別冊ポイント246(theをイメージごとに整理)・247(V+A+前置詞+the身体の部分)参照
  - id: "nrh-003"
    name: "可算名詞と不可算名詞の見極め方"
    category: "nrh"
    priority: "P1"
    notes: |
      不可算名詞の3パターン:
      (1) 一部分を取り出しても基本的性質が変わらない: chalk, bread, paper, water, sugar
      (2) 個々の具体的名詞をひっくるめる: furniture(家具類), baggage(手荷物)
      (3) 目に見えず具体的カタチが描けない: progress, information
      ペンは折ると機能喪失→可算。paper(紙)は不可算、paper(論文)は可算。
      可算/不可算で意味が変わる名詞: work(仕事/不可算)→a work(作品/可算)。
      仕事の結果生み出されたもの→可算に変化。
      [図表: 図解 — chalkを折っても書ける/breadを切ってもパン（p.427）]
      [図表: 図解 — furniture(家具類をひとまとめ)/baggage(手荷物をひとまとめ)（p.427-428）]
      [図表: 図解 — work(仕事)→works(作品)の意味変化（p.428-429）]
      プラスα: 具体的な仕事の種類はjob(可算)。
      別冊ポイント249(不可算名詞リスト)・251(可算・不可算両用名詞)参照
  - id: "nrh-004"
    name: "「お客」の名詞の使い分け"
    category: "nrh"
    priority: "P2"
    notes: |
      場面ごとの「客」の使い分け:
      customer(店の客/最も一般的), consumer(消費者), shopper(買物客)。
      visitor(訪問客) vs guest(招待客/宿泊客)。
      audience(聴衆/コンサート・劇場), spectator(観戦客/スポーツ), viewer(視聴者/TV)。
      client(知識・技術を求める依頼人/弁護士等), patient(患者), passenger(乗客)。
      プラスα: clientはwelfare client(福祉サービス利用者)の用法もある。
      別冊ポイント267(さまざまな「客」)参照
  - id: "nrh-005"
    name: "「料金」の名詞の使い分け"
    category: "nrh"
    priority: "P2"
    notes: |
      場面ごとの「料金」の使い分け:
      price(個々の商品の値段) vs prices(物価)。
      charge(サービスに対する料金/電気・ガス等の公共料金)。
      fee(入会金等の費用全般/医者・弁護士への謝礼・報酬)。
      fare(電車・バス等の運賃), toll(道路・橋の通行料)。
      rent(家賃), fine/penalty(罰金)。
      プラスα: fineの"fin"=「終わり」。犯した罪を終わりにしてくれるもの→罰金。
      別冊ポイント266(さまざまな「料金、お金」)参照
  - id: "nrh-006"
    name: "意味の紛らわしい名詞（単複変化・約束・習慣）"
    category: "nrh"
    priority: "P2"
    notes: |
      単複で意味が変わる名詞:
      manner(方法) vs manners(礼儀・行儀)。日本語の「マナー」=manners。
      air(空気) → airs(気取った態度)。arm(腕) → arms(武器)。
      「約束」の使い分け:
      promise(約束全般/「見込み」の意味も。promising=前途有望な)。
      appointment(人と会う約束/診察の予約)。reservation(座席・ホテルの予約)。
      「習慣」の使い分け:
      habit(個人的習慣/癖) vs custom(社会的習慣/風習)。customs(税関/関税)。
      mind=思考をつかさどる「アタマ」(精神・こころ・頭脳・気質)。
      別冊ポイント257(複数形で意味変化する名詞)・258(意味が紛らわしい名詞)参照
  - id: "nrh-007"
    name: "注意すべき名詞の使い方（単複同形・相互複数・集合名詞）"
    category: "nrh"
    priority: "P2"
    notes: |
      -sで終わるのに単数もある: means(手段), species(種)は単複同形。
      学問名: mathematics, physics, statisticsは-sでも単数扱い。
      chance(可能性) vs opportunity(好機/チャンス)。chance≠日本語の「チャンス」。
      相互複数: 最低2者が必要→常に複数形。
      make friends(友達になる), change trains(乗り換え), shake hands(握手)。
      見た目単数でも複数扱い: police(中に警察官が複数), cattle(牧場の牛)。
      (✕) The police is ... → The police are ...(○)
      別冊ポイント271(-sだが単数扱い)・253(相互複数)・270(複数扱い集合名詞)参照
  - id: "nrh-008"
    name: "one, it, thatの用法（代名詞の使い分け）"
    category: "nrh"
    priority: "P1"
    notes: |
      one: 前出名詞と同種・同類を受ける。可算名詞のみ。前後から修飾可能。
      it: 前出名詞そのものを受ける。可算・不可算の両方OK。修飾不可。
      that: 後ろからのみ修飾可能。可算・不可算の両方OK。
      (✕) one of France → that of France。one of~は「~のうちの1つ」と解釈されるため。
      代名詞(he, she, they等)に修飾語はかけられない。(✕) beautiful she
      oneとthatだけが例外的に修飾可能。
      プラスα: ones(複数形), those(複数形)でも同じルールが適用。
  - id: "nrh-009"
    name: "代名詞の相関的用法: the other / the others"
    category: "nrh"
    priority: "P1"
    notes: |
      「残りすべて」→ theがつく:
      2者のうちone引くと残り1つ → the other。
      複数のうちsome引くと残りすべて → the others。
      引き算して「残りが確実に特定できる」からtheがつく。
      otherは単独使用不可。(✕) Show me other.
      the other, other people, each other, others(=other people)の形で使う。
      each other = 代名詞(副詞ではない)。目的語として機能できる。
      [図表: イラスト — トランプ2枚でone→the otherの関係を図示（p.443）]
      [図表: イラスト — トランプ7枚でsome→the othersの関係を図示（p.443）]
  - id: "nrh-010"
    name: "代名詞の相関的用法: another / others"
    category: "nrh"
    priority: "P1"
    notes: |
      「残りの一部」→ theはつかない:
      複数のうちone引いて残りの一部(1つ) → another(=an+other)。不確定だからa。
      複数のうち引いて残りの一部(複数) → others。まだ余っている。
      one thing ... another = 別物(雲泥の差がある)。
      プラスα: someは実数をぼかしたい場合に使う。10人程度→「何人か」、100人→「〜なものもある」。
      [図表: イラスト — Tシャツ選びでanother/othersの関係を図示（p.445-446）]
  - id: "nrh-011"
    name: "2者に対して使う代名詞（both, either, neither）"
    category: "nrh"
    priority: "P1"
    notes: |
      both: 2者のうち両方。both A and B(AもBも両方)。both hands(両手)。
      either: 2者のうちどちらか一方。either A or B(AかBのどちらか)。
      either side(両側, 単数名詞) = both sides(複数名詞)。sideなど対になる語では「両方」の意味も。
      neither: 2者のうちゼロ。neither A nor B(AもBもどちらも〜ない)。
      neither = not + either(nはnotのn)。
      プラスα: both A and B等のboth/either/neitherは代名詞ではなく副詞。
  - id: "nrh-012"
    name: "3者以上に対して使う代名詞（all, any, none, some）"
    category: "nrh"
    priority: "P1"
    notes: |
      all: 3者以上のすべて。all of~が一般的。
      none: allの反対。no(形容詞/名詞を伴う) vs none(代名詞/単独使用可)。
      any: どれでもOK(3者以上版のeither)。
      some: ぼかし。all(全部)でもnone(ゼロ)でもない中間。
      2者/3者以上の対応表: both↔all(すべて), either↔any(どれでも), neither↔none(ゼロ)。
  - id: "nrh-013"
    name: "it, this, thatの違い（代名詞vs指示語）"
    category: "nrh"
    priority: "P1"
    notes: |
      it: 受け専門の代名詞(消極的)。話し手と聞き手で共有する情報を受ける。
      this: 近い対象を「これ」と直接指す(指示語)。
      that: 遠い対象を「それ/あれ」と積極的に指す(指示語)。
      itの用法: 前出を受ける / 形式主語(It is true that...) / 非人称(It's cold.) / Who is it?
      thatの力強さ: To be or not to be, that is the question.(ハムレット)
      this time(今回/近い) vs that time(あのころ/遠い)。
      別冊ポイント287(再帰代名詞の強調用法)・288(再帰代名詞を用いた定型表現)参照
  # B-14: Part 13 形容詞
  - id: "nrh-014"
    name: "形容詞の働き（限定用法と叙述用法）"
    category: "nrh"
    priority: "P1"
    notes: |
      形容詞=名詞を修飾する語。副詞=名詞以外を修飾する語。
      限定用法(左から直接修飾): a wonderful opportunity。
      叙述用法(右から修飾/補語): This idea is wonderful.
      左からのみ修飾可(限定用法のみ): main, chief, only, mere, sole / wooden, golden / elder, inner, latter。
      右からのみ修飾可(叙述用法のみ): alive, alike, asleep, aware, awake, afraid, alone — aで始まるものが多い。
      (✕) alive animals → live animals, living animals を使う。
      aliveのaはもともと前置詞on(on life → alive)。
      「生きている」の使い分け: live[laiv]=限定用法のみ、alive=叙述用法のみ、living=両方可、lively=「活発な」。
      別冊ポイント292(形容詞の働きとその位置)・293(限定用法のみの形容詞リスト)・294(叙述用法のみの形容詞リスト)・295(「生きている」の用法)参照
  - id: "nrh-015"
    name: "置かれる位置で意味の異なる形容詞"
    category: "nrh"
    priority: "P1"
    notes: |
      前から修飾=永続的な性質 or 他と区別。後ろから修飾=一時的な状態。
      available: 前から=いつでも利用できる、後ろから=いま一時的に利用できる。
      present: 前から=現在の(present job)、後ろから=出席している(people present)。
      presentの語源: pre-+sent=目の前にある。
      2語以上でも前から修飾する場合あり: ハイフン使用(ten-year-old girl)。
      1語でも後ろから修飾する場合あり(一時的状態)。
      別冊ポイント296(前後で意味の異なる形容詞一覧: present/certain/ill/late/able/fond/ready/due)・297(名詞+1語の分詞)参照
  - id: "nrh-016"
    name: "紛らわしい形容詞(1) — 接尾辞による判別"
    category: "nrh"
    priority: "P2"
    notes: |
      接尾辞(単語のおしり)で意味を判別する方法:
      -ive(形容詞化): respective=それぞれの。
      -ful(いっぱい): respectful=敬意を払う。
      -able(受動/可能): respectable=立派な。
      forgettable(忘れられやすい) vs forgetful(忘れっぽい)。
      regrettable(残念な/人以外が主語) vs regretful(後悔している/人が主語)。
      別冊ポイント300(紛らわしい形容詞の包括リスト: sensible/sensitive, imaginary/imaginative/imaginable, economic/economical等)参照
  - id: "nrh-017"
    name: "紛らわしい形容詞(2) — 名詞とセットで覚える"
    category: "nrh"
    priority: "P2"
    notes: |
      形容詞は名詞とセットで覚えるべき(自立心の弱い品詞)。
      imaginary number(架空の数/虚数)、imaginative artist(想像力豊かな芸術家)、
      the worst crime imaginable(想像しうる最も凶悪な犯罪)。
      -ic vs -ical: historic(歴史的に有名な) vs historical(歴史に関する)、
      economic(経済の) vs economical(経済的な/節約の)。
      -yがつくと名詞→形容詞: health→healthy, ease→easy。
      -likeの接尾辞: jellylike, childlike(子どもっぽい)。
      別冊ポイント300参照
  - id: "nrh-018"
    name: "紛らわしい形容詞(3) — free from/far from, able/capable, sure/certain"
    category: "nrh"
    priority: "P2"
    notes: |
      free from[of] A: Aにはマイナス要素(偏見、ストレス等)。
      far from A: Aにはプラス要素(幸せ等)。「Aからほど遠い」→否定。
      able(人のみが主語) vs capable(人+モノが主語。capable of Ving)。
      sure/certain to V: 話し手の確信(John is sure to say no.)。
      sure/certain of ~/that節: 文のSの確信(I'm sure of your innocence.)。
      convenient は人を主語にしない。(✕) I am convenient.
      別冊ポイント298(人を主語にとらない形容詞: convenient/necessary/possible等)・299(人を主語にとる形容詞)・301(far from vs free from)参照
  - id: "nrh-019"
    name: "mostとalmostの攻略"
    category: "nrh"
    priority: "P1"
    notes: |
      most=形容詞(名詞を修飾: Most students)+代名詞(主語: Most of the students)。
      almost=副詞のみ(「一歩手前」の意味)。名詞は修飾できない。
      almost everybody: almostはeveryの部分だけを修飾。
      some of / most of / all of のパターン: ofの後のBには必ずthe/these/所有格等の限定詞がつく。
      A=部分、B=全体、of=仕切り役。
      別冊ポイント302(most=形容詞・代名詞、almost=副詞)参照
  - id: "nrh-020"
    name: "数量表現（few/a few, little/a little, many a等）"
    category: "nrh"
    priority: "P1"
    notes: |
      few(否定的=ほとんどない) vs a few(肯定的=少しはある) — 可算名詞。
      little(否定的) vs a little(肯定的) — 不可算名詞。
      aがつく方が肯定的(存在がイメージできる)。
      not a few / not a little = かなり多い(二重否定)。
      quite a few / quite a little = かなり多い(控えめ表現の逆転)。
      many a + 単数名詞 = 多くの(動詞は単数一致)。
      a great[good] many + 複数名詞 = かなり多くの。
      more than one + 単数名詞(直前のoneに引っ張られ単数扱い)。
      別冊ポイント303(名詞の数量を表す表現の完全一覧)参照
  - id: "nrh-021"
    name: "特定の名詞と数量表現（high/low, large/small, heavy/light）"
    category: "nrh"
    priority: "P2"
    notes: |
      high/lowを用いる名詞: price, fee, wage, salary, income(お金関係)。
      large/smallを用いる名詞: population, number, quantity(=amount)(漠然とした数・量)。
      heavy/lightを用いる名詞: traffic, snow, drinker, losses, responsibility / meal, smoker, punishment。
      「薄い」の使い分け: weak(味: コーヒー等)、thin(濃度・密度: 霧・髪/厚さ)、light(色)。
      [図表: 表 — 「薄い」の使い分け表(p.475)]
      別冊ポイント304(特定名詞の「多い/少ない」)・305(「濃い/薄い」の表現)参照
  - id: "nrh-022"
    name: "形容詞の語順（冠詞→数量→性質→名詞）"
    category: "nrh"
    priority: "P2"
    notes: |
      大前提: 【冠詞相当語】+【数量】+【性質】+【名詞】。
      「変わりやすいもの」から「変わりにくいもの」へ並べる原則。
      性質の中: 評価→大小→新旧→色→材料・出所の順。
      (✕) these old two cars → these two old cars。
      実際は2〜3語の判別ができればOK。
      [図表: 表 — 形容詞の語順公式(p.477)]
      参考書内参照: →p.481(副詞の立ち位置)
      別冊ポイント306(意外な意味の形容詞)・307(each/every)・308(「…ごとに」)・309(some/any)・310(冠詞の前に出る形容詞)・311(the+形)・312(「価値のある」)参照
  # B-14: Part 14 副詞
  - id: "nrh-023"
    name: "副詞の働きと立ち位置"
    category: "nrh"
    priority: "P1"
    notes: |
      副詞=名詞以外(動詞・形容詞・副詞など)の意味を膨らます修飾語。
      副詞の立ち位置: 「場所」→「時」の順。
      強調の副詞(very, considerably, really, extremely)は修飾対象の直前。
      not/neverとalways/sometimesは同じ位置(一般動詞の前、be動詞・助動詞の後)。
      別冊ポイント320(副詞を置く位置: 場所→様子→時、強弱副詞は直前、頻度・程度副詞はnotの位置と同じ)参照
  - id: "nrh-024"
    name: "頻度・程度を表す副詞（veryとmuchの使い分け）"
    category: "nrh"
    priority: "P1"
    notes: |
      副詞の5種類: ❶強弱(very/too/a little) ❷様子(fast/quietly) ❸場所や時(here/now) ❹頻度(never/always) ❺程度(hardly/scarcely)。
      頻度副詞: always(100%)→usually→often→sometimes→rarely/seldom→never(0%)。
      程度副詞: completely→very→quite→slightly→hardly/scarcely→not。
      not=副詞、no=形容詞。
      very=原級の強調可(比較級は不可)。(✕) very older。
      much=比較級の強調可(原級は不可)。(✕) much beautiful。
      much too heavy は可(tooは原級ではない)。
      [図表: 表 — 頻度副詞のパーセント表(p.482)]
      [図表: 表 — 程度副詞の強さ順(p.483)]
      別冊ポイント321(頻度副詞)・329(much/veryが修飾するもの)・330(many more/much more)・331(much too/too much)参照
  - id: "nrh-025"
    name: "-lyの有無で意味が変わる副詞（hard/hardly, ago/before等）"
    category: "nrh"
    priority: "P2"
    notes: |
      -lyがつくと意味が変わる副詞:
      hard(一生懸命)→hardly(ほとんど〜ない/否定語=scarcely)。
      high(高い位置に)→highly(程度の高さ「かなり、大いに」)。
      late(遅れて)→lately(最近)。
      「最近」の使い分け:
      nowadays/these days=現在形と相性。
      recently=過去の一点(過去形が多い)。lately=現在までの継続(現在完了形が多い)。
      ago vs before:
      ago=現在から遡って(過去形)。before=過去の一時点から遡って(過去完了形)。
      before単独=「以前に」(現在完了形・過去形)。
      [図表: 図 — recently/lately vs nowadays/these daysの時間軸(p.485)]
      [図表: 図 — ago vs beforeの基準点の違い(p.486)]
      別冊ポイント322(-lyの有無で意味が異なる副詞: late/lately, hard/hardly, high/highly等)・323(「最近」の区別)・324(ago vs before)・328(紛らわしい副詞)参照
  - id: "nrh-026"
    name: "副詞so/too/howの語順と文修飾の副詞"
    category: "nrh"
    priority: "P1"
    notes: |
      so/too/how/as + 形容詞 + a[an] + 名詞 の語順。
      成り立ち: 副詞が形容詞を前に引っ張り出す。
      文修飾の副詞: 文全体に判断を下す(fortunately, naturally, certainly, probably等)。
      文修飾の副詞→形容詞に置き換え可能(Naturally = It is natural that...)。
      名詞に見えそうな副詞: home, abroad, downstairs, downtown(前置詞不要)。
      (✕) go to abroad → go abroad。ただしfrom abroadのように出所は前置詞が必要。
      参考書内参照: →p.388(asの用法)、→p.422(aの用法)
      別冊ポイント325(文修飾の副詞リスト)・326(名詞と間違いやすい副詞)・327(形式的に注意が必要な副詞)参照
  # B-14: Part 15 特殊構文
  - id: "nrh-027"
    name: "否定表現（全体否定・部分否定・潜在否定）"
    category: "nrh"
    priority: "P1"
    notes: |
      not(副詞) vs no(形容詞): notは名詞以外を否定、noは名詞を否定(ゼロの意味)。
      全体否定(100%否定): not...any, no+名詞。
      部分否定: not + 100%を表す語(always, necessarily, all, every, both, completely, entirely)。
      部分否定の訳し方: 「ぼかす」(〜とは限らない、〜というわけではない)。
      潜在否定(否定語を含まない否定):
      the last person to V = 可能性が最も低い→否定。
      anything but = 〜以外なら何でもOK→〜は絶対ダメ→否定。
      別冊ポイント335(not/no)・336(部分否定/全体否定)・337(部分否定)・338(noと強い否定)・339(弱めの否定)・340(not...anyの語順)・341(二重否定)・342(潜在否定リスト)参照
  - id: "nrh-028"
    name: "倒置(1) — 任意倒置（文末焦点の原則）"
    category: "nrh"
    priority: "P1"
    notes: |
      倒置=語順の入れ替え(意味なく起きない)。
      任意倒置の2つの効果:
      ❶文末焦点(end-focus)の原則: 強調したい新情報はなるべく後ろに配置。
      ❷予想を裏切り目立たせる効果。
      旧情報=前へ、新情報=後ろへ。
      Here comes the car.(carが新情報→文末に)。
      Impossible is Nothing.(語順を裏切り注意を引く)。
      別冊ポイント344(倒置の種類: 強制倒置と任意倒置、代名詞主語は倒置不可)参照
  - id: "nrh-029"
    name: "倒置(2) — 強制倒置（否定語文頭の倒置）"
    category: "nrh"
    priority: "P1"
    notes: |
      強制倒置: 否定語句が文頭→主節が疑問文型の倒置。
      倒置の理由: 否定語が直後の語を否定しているように見えるのを防ぐため。
      前に移動する要素: be動詞/can/will/do/have等(動詞そのものは出さない)。
      (✕) Never I have seen... → Never have I seen...(○)。
      否定語文頭でも倒置しない場合: 主語中に否定語がある(Not everyone speaks French. = 部分否定)。
      only=否定的(1つのみ→他を全否定)→only句が文頭で倒置。
      So is Sam.(倒置あり=Sam新情報) vs So he is.(倒置なし=he旧情報)。
      [図表: 図 — onlyの否定的性質(p.497)]
      別冊ポイント344(倒置の種類)・347(So+V+S/Nor+V+S)・348(さまざまな強調表現)・349(省略を用いた慣用表現)参照
  - id: "nrh-030"
    name: "there be構文（end-focusの応用）"
    category: "nrh"
    priority: "P1"
    notes: |
      there be構文=end-focusの原則の応用。
      thereから始めて新情報(S)を後ろに配置。
      Aには新情報(a+名詞等)が来る。the/my等の旧情報は不自然。
      be動詞を第1文型動詞(exist/live/stand等)に書き換え可能。
      助動詞(must be等)で意味をプラスできる。
      姿を変えたthere be構文:
      ❶ want+there+to be(Oにthere副詞): I want there to be no trouble.
      ❷ It...for there to be(forの後にthere副詞): It is desirable for there to be no trouble.
      参考書内参照: →p.494(桃太郎の書き出し)
      別冊ポイント345(There be A構文: 新情報をAに)・346(beの書き換え動詞リスト)参照

