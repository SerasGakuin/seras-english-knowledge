# Part 06: 準動詞（nrj カテゴリ）

knowledge_nodes:
  - id: "nrj-001"
    name: "準動詞の3つの不確定要素（品詞・時制・主語）"
    category: "準動詞"
    priority: "P1"
    notes: |
      準動詞（to V / Ving / Vp.p.）は単独では述語動詞になれず、3つの不確定要素を持つ:
      ❶ 品詞が見た目で決まらない（to studyは名詞？副詞？）
      ❷ 時制が不明（to studyはいつのこと？）
      ❸ 意味上の主語が不明（to talk withの主語は誰？）
      動詞との共通点を押さえつつ、準動詞特有の不確定さを確定する方法を学ぶことが攻略の基礎。
      [図表: 図解 — to studyの品詞不確定性。名詞か副詞か見た目では判断不可（p.182）]
      [図表: 図解 — to studyの時制不確定性。現在か過去か不明（p.183）]
      [図表: 図解 — to talk withの主語不確定性。friendsかSueか不明（p.183）]
      参考書内参照: →06_02（品詞の決定方法）、→06_13（時制）、→06_10（意味上の主語）
      別冊ポイント119参照（準動詞の全体像）
      *1: want+O+to Vのto Vの用法分析は不要。動詞語法として吸収すべきもの
      *2: 不定詞の名の由来 — 人称・数・時制によって定まった形が存在しないから

  - id: "nrj-002"
    name: "不定詞(toV)の3用法の判別"
    category: "準動詞"
    priority: "P1"
    notes: |
      不定詞の用法を訳し方から確定するのは危険。文の構造から判別する。
      ❶ 名詞用法: 文の要素（S・O・C）になる → 文から取り去ると成立しなくなる
      ❷ 形容詞用法: 文の要素にならず（M）、前の名詞を修飾する
      ❸ 副詞用法: 文の要素にならず（M）、名詞以外（主に動詞）を修飾する
      判別手順: まず名詞用法を確認 → 残りは前の名詞を修飾なら形容詞 → どちらでもなければ副詞
      [図表: Ⓠ — 不定詞の3用法判別フロー（p.187）]

  - id: "nrj-003"
    name: "Vingの3用法（動名詞・現在分詞・分詞構文）"
    category: "準動詞"
    priority: "P1"
    notes: |
      Vingも不定詞と同様に3つの用法を持ち、判別方法も基本的に同じ。
      ❶ 名詞用法（動名詞）: 文の要素（S・O・C）または前置詞の目的語になる
      ❷ 形容詞用法（現在分詞）: 前の名詞を修飾。C（補語）にもなれる
      ❸ 副詞用法（分詞構文）: 名詞以外を修飾。主節の前に置かれると副詞として機能
      *1: standing→S=Cの関係からSVC第2文型のCと判断可能
      *2: 便利テクニック「主節の前は全体で副詞」→主節の述語動詞を修飾

  - id: "nrj-004"
    name: "Vp.p.の2用法と準動詞の全体像"
    category: "準動詞"
    priority: "P1"
    notes: |
      Vp.p.（過去分詞）は原則として名詞用法を持たず、形容詞と副詞の2用法のみ。
      ❶ 形容詞用法: 名詞を修飾する、またはC（補語）になる（SVC/SVOCいずれも）
      ❷ 副詞用法（分詞構文）: beingが省略されVp.p.から始まる分詞構文
      [図表: Ⓠ表 — 準動詞の全体像。to V(3用法)/Ving(3用法)/Vp.p.(2用法)の対応表（p.191）]
      別冊ポイント119参照（準動詞の全体像）
      *1: 主節前テクニック（06_03と同じ）
      著者コメント: Ving/Vp.p.は用法とネーミングの統一感がない（分詞構文=副詞なのに「副詞」の用語なし）

  - id: "nrj-005"
    name: "不定詞と動名詞の意味の違い（動詞との相性）"
    category: "準動詞"
    priority: "P1"
    notes: |
      to VとVingはどちらも名詞として機能できるが、意味的なイメージが異なる。
      ■ to V: 「これから向かっていく、ある行為と向き合う」イメージ。前置詞toの→と親戚関係。
      ■ Ving: 「実際にやっている（ところを想像する）」イメージ。
      不定詞を目的語にとる動詞（3グループ）:
        ❶ これから実行する（hope, want, decide, determine等）
        ❷ 積極的に向き合う（manage, pretend, promise, agree等）
        ❸ 向き合うが実行しない（refuse, hesitate, fail等）
      動名詞を目的語にとる動詞（3グループ）:
        ❶ 実際にやっている（enjoy, finish, admit, practice等）
        ❷ 実際にやっているところを想像（consider, imagine, suggest, mind等）
        ❸ 実際にやることを回避・延期（avoid, escape, postpone等）
      主語補語の違い: dream→to V（未実現）、hobby→Ving（実際にやっている）
      [図表: イラスト — 野球選手を夢見る少年（p.196）]
      [図表: イラスト — 絵画鑑賞する女性（p.196）]
      別冊ポイント139-140参照（動名詞/不定詞を目的語にとる動詞リスト）
      *1: 1（これから実行）と2（積極的に向き合う）は厳密に分ける必要なし

  - id: "nrj-006"
    name: "不定詞と動名詞で意味が変わる動詞"
    category: "準動詞"
    priority: "P1"
    notes: |
      to VとVingで意味に大きく差が出る動詞を理解する。to V/Vingのイメージがそのまま影響。
      remember to V「これからVすることを覚えておく」/ remember Ving「実際にVしたことを覚えている」
      forget to V「これからVすることを忘れる」/ forget Ving「実際にVしたことを忘れる」
      try to V「Vしようとする（未実行）」/ try Ving「試しにVしてみる（実行済み）」
      regret to V「これからVするのが残念だ」/ regret Ving「実際にVしたことを残念に思う」
      stop to V: stopは自動詞「立ち止まる」+副詞用法（目的）→「Vするために立ち止まった」
      stop Ving: stopは他動詞+動名詞（O）→「実際にVしているのをやめる」
      別冊ポイント140参照

  - id: "nrj-007"
    name: "不定詞と分詞の形容詞用法の意味的違い"
    category: "準動詞"
    priority: "P1"
    notes: |
      to V / Ving / Vp.p. はすべて名詞を修飾（形容詞用法）できるが、伝える意味が異なる。
      ■ to Vで修飾: 「これからVする（まだVしていない）」
      ■ Vingで修飾: 「実際にVしている」
      受動の場合も同様:
        to be Vp.p. = 「これから〜される（まだされていない）」
        Vp.p. = 「実際に〜されている」
      Vp.p.の〈完了〉用法: 自動詞がVp.p.になると受動ではなく「〜してしまった」（完了）の意味。
        例: fallen leaves（落ちてしまった葉）、withered flower（しおれてしまった花）
        この用法は多くないので出てくるたびにインプット。
      [図表: Ⓠ表 — 形容詞の働きをする準動詞（to V/Ving/Vp.p.）の抜粋（p.200）]
      [図表: Ⓠ表 — to VとVingの形容詞用法の意味的な違い。to V=これから/Ving=実際に（p.200）]
      別冊ポイント129参照（不定詞の形容詞用法の3パターン: 主格関係/目的格関係/同格関係）
      別冊ポイント130参照（不定詞の形容詞用法 vs 分詞の形容詞用法）
      *1: 名詞を修飾する不定詞すべてを形容詞用法と判断するのはやや乱暴。大まかに3パターン（→別冊129）
      *2: 動名詞と現在分詞の分類は重要だが、Vingは基本イメージ（実際にやっている）が変わらないという視点も重要

  - id: "nrj-008"
    name: "不定詞の副詞用法の5つの意味"
    category: "準動詞"
    priority: "P1"
    notes: |
      不定詞が副詞用法で用いられる場合、ある程度の訳し分けが必要。toの矢印(→)イメージで理解する。
      ❶ 目的: 文頭のときはほぼ目的。in order to V / so as to Vで明確化可能
      ❷ 感情の原因: 前に感情表現（surprised等）あり。矢印(→)の先に原因
      ❸ 判断の根拠: 前に判断表現（crazy等）あり。矢印(→)の先に根拠
      ❹ 結果: grow up to be等の定型表現が多い。toの→で「成長して→小説家に」
      ❺ 程度: enough to V / too〜to V / so〜as to V等の定型表現が多い
      〈目的〉vs〈結果〉の判別: to以下に対して主語の意志が強ければ目的、弱ければ結果
      too〜to V: to Vの「これから→まだやっていない」を否定的に訳す。= so〜that S can't V
      [図表: イラスト — 女の子が成長して小説家になる様子（p.204）]
      [図表: Ⓠ表 — 不定詞の副詞用法の5つの意味。目的/感情の原因/判断の根拠/結果/程度（p.205）]
      別冊ポイント131参照（不定詞の副詞用法と定型表現）
      *1: 条件の用法もあるが主節が仮定法のときのみ有効。避けるネイティブも多い
      *2: 否定の目的: in order not to V / so as not to V。so as to Vは文頭不可
      *3: 結果用法の定型表現（→別冊ポイント131）

  - id: "nrj-009"
    name: "分詞構文の基本（あいまいに訳す）"
    category: "準動詞"
    priority: "P1"
    notes: |
      分詞構文は接続詞を使わず、あいまいに表現したもの。
      訳し方: 「主節に対する追加情報」として、あいまいに訳すのが基本。
      〈時〉〈理由〉〈付帯状況〉等の分類は便宜的なものに過ぎない。
      ■ 接続詞+分詞構文: when/while/after/before/if/unless/though+Vingで意味を明確化できる
      ■ 否定の分詞構文: Not+Ving
      ■ 受動の分詞構文: being省略→Vp.p.から始まる（少数だが重要）
      分詞構文と〈接続詞+SV〉は意味的に完全に同じではない（分詞構文の持ち味がある）。
      Vingの「実際にやっている」イメージは分詞構文でも生きている:
        waving a flag（実際に振っている）、Shopping at the store（実際に買い物をしている）
      [図表: Ⓠ — 分詞構文の訳し方。主節に対する追加情報、あいまいに訳す（p.207）]
      別冊ポイント127参照（分詞構文の訳し方）
      *1: 分詞構文はおもに書き言葉。話し言葉では公的スピーチやニュースで使用
      *2: 分詞構文は同時性(e311: greeted+waving)や連続性(e312: Shopping→ran into)を表せる
      *3: Vp.p.から始まる分詞構文はVingからの分詞構文に比べて少数

