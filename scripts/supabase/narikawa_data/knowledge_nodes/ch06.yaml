check_points:
  - node_id: "nrj-001"
    seq: 1
    question: "準動詞の3つの不確定要素とは何か？"
    answer: "❶品詞（名詞・形容詞・副詞のどれか不明）、❷時制（いつの出来事か不明）、❸意味上の主語（誰がVするか不明）"
  - node_id: "nrj-001"
    seq: 2
    question: "「不定詞」はなぜそう呼ばれるか？"
    answer: "人称・数・時制によって定まった形が存在しないため。述語動詞のように過去形などの定まった形を持たない"
  - node_id: "nrj-001"
    seq: 3
    question: "準動詞の品詞を訳し方から判断する方法の問題点は何か？"
    answer: "大学入試レベルの難文では構造を理解するだけでも困難で、最初から「〜こと」「〜ために」と訳語を決められるとは限らない"
  - node_id: "nrj-002"
    seq: 1
    question: "不定詞の名詞用法をどう見分けるか？"
    answer: "文の要素（S・O・C）になっている場合。文中から取り去ると文が成立しなくなることが目印"
  - node_id: "nrj-002"
    seq: 2
    question: "不定詞の形容詞用法と副詞用法の違いは？"
    answer: "どちらも修飾語（M）だが、形容詞用法は前の名詞を修飾し、副詞用法は名詞以外（主に動詞）を修飾する"
  - node_id: "nrj-002"
    seq: 3
    question: "不定詞の3用法を判別する手順は？"
    answer: "❶文の要素（S・O・C）→名詞用法 ❷文の要素にならず前の名詞を修飾→形容詞用法 ❸どちらでもない→副詞用法"
  - node_id: "nrj-003"
    seq: 1
    question: "Vingが名詞として機能する場合を何と呼ぶか？また判別のポイントは？"
    answer: "動名詞。文の要素（S・O・C）になっている、または前置詞の目的語になっている場合"
  - node_id: "nrj-003"
    seq: 2
    question: "Vingが副詞として機能する場合を何と呼ぶか？"
    answer: "分詞構文。Vingが文の要素にならず、前に修飾する名詞もないので副詞と判断する"
  - node_id: "nrj-003"
    seq: 3
    question: "Vingが補語（C）になるのは形容詞用法か動名詞か？"
    answer: "形容詞用法（現在分詞）。S=Cの関係が成立する場合、Vingは形容詞として補語になっている"
  - node_id: "nrj-004"
    seq: 1
    question: "Vp.p.（過去分詞）にはいくつの用法があるか？名詞用法はあるか？"
    answer: "形容詞用法と副詞用法の2つのみ。the accused等の一部例外を除き、原則として名詞用法はない"
  - node_id: "nrj-004"
    seq: 2
    question: "Vp.p.の副詞用法（分詞構文）でbeingが省略される場合、何から文が始まるか？"
    answer: "Vp.p.（過去分詞）から始まる。例: Written in simple English, the book is..."
  - node_id: "nrj-004"
    seq: 3
    question: "準動詞（to V / Ving / Vp.p.）の用法数はそれぞれいくつか？"
    answer: "to V = 3用法（名詞・形容詞・副詞）、Ving = 3用法（動名詞・現在分詞・分詞構文）、Vp.p. = 2用法（形容詞・副詞/分詞構文）"
  - node_id: "nrj-005"
    seq: 1
    question: "不定詞（to V）の基本イメージは？"
    answer: "「これから向かっていく、ある行為と向き合う」イメージ。前置詞toの→（到達）と親戚関係"
  - node_id: "nrj-005"
    seq: 2
    question: "動名詞（Ving）の基本イメージは？"
    answer: "「実際にやっている（ところを想像する）」イメージ"
  - node_id: "nrj-005"
    seq: 3
    question: "refuse, hesitate, failが不定詞を目的語にとるのはなぜか？"
    answer: "to Vの「これから→まだやっていない」イメージと合致する。向き合ってみたが実行できない。結果的に実行不可能でもtoの向き合うイメージは生きている"
  - node_id: "nrj-005"
    seq: 4
    question: "My dream is to be ... と My hobby is looking ... で準動詞が異なる理由は？"
    answer: "夢=まだ実現していない→to V、趣味=実際にやっていること→Ving。to V/Vingの基本イメージがそのまま適用される"
  - node_id: "nrj-006"
    seq: 1
    question: "remember to Vとremember Vingの意味の違いは？"
    answer: "remember to V「これからVすることを覚えておく（未実行）」、remember Ving「実際にVしたことを覚えている（実行済み）」"
  - node_id: "nrj-006"
    seq: 2
    question: "stop to Vとstop Vingの構造上の違いは何か？"
    answer: "stop to V: stopは自動詞（立ち止まる）+to Vは副詞用法（目的）。stop Ving: stopは他動詞+Vingは目的語（動名詞）"
  - node_id: "nrj-006"
    seq: 3
    question: "try to Vとtry Vingの違いは？"
    answer: "try to V「Vしようとする（まだVしていない）」、try Ving「試しにVしてみる（実際にVしている）」"
  - node_id: "nrj-006"
    seq: 4
    question: "不定詞と動名詞で意味に差が出る代表的な動詞を4つ挙げよ"
    answer: "remember, forget, try, regret。いずれもto V=これから（未実行）、Ving=実際に（実行済み）の対比"
  - node_id: "nrj-007"
    seq: 1
    question: "to Vで名詞を修飾する場合とVingで名詞を修飾する場合の意味の違いは？"
    answer: "to Vは「これからVする（まだVしていない）」、Vingは「実際にVしている」"
  - node_id: "nrj-007"
    seq: 2
    question: "受動の場合、to be Vp.p.とVp.p.の意味の違いは？"
    answer: "to be Vp.p.は「これから〜される（まだされていない）」、Vp.p.は「実際に〜されている」"
  - node_id: "nrj-007"
    seq: 3
    question: "fallen leavesのfallenはどんな用法か？"
    answer: "自動詞fallのVp.p.形容詞用法。受動ではなく〈完了〉の意味（落ちてしまった）"
  - node_id: "nrj-008"
    seq: 1
    question: "不定詞の副詞用法の5つの意味は？"
    answer: "❶目的 ❷感情の原因 ❸判断の根拠 ❹結果 ❺程度"
  - node_id: "nrj-008"
    seq: 2
    question: "too〜to Vの不定詞が否定的に訳せる理由は？"
    answer: "to Vの「これから→まだやっていない」を否定的に読むため。tooは否定的ニュアンスを予感させる副詞"
  - node_id: "nrj-008"
    seq: 3
    question: "〈目的〉と〈結果〉はどう見分けるか？"
    answer: "to以下の行為に対して主語の意志が強く働いていれば〈目的〉、そうでなければ〈結果〉"
  - node_id: "nrj-008"
    seq: 4
    question: "否定の目的「Vしないように」はどう表すか？"
    answer: "in order not to V / so as not to V。単にnot to Vとは通例しない。so as to Vは文頭不可"
  - node_id: "nrj-009"
    seq: 1
    question: "分詞構文の基本的な訳し方は？"
    answer: "主節に対する追加情報としてあいまいに訳す。接続関係を無理に1つに分類しない"
  - node_id: "nrj-009"
    seq: 2
    question: "分詞構文の意味を明確にしたい場合はどうするか？"
    answer: "分詞の前にwhen/while/though等の接続詞を置く（例: Though admitting her guilt）"
  - node_id: "nrj-009"
    seq: 3
    question: "受動の分詞構文でbeingが省略されると何から文が始まるか？"
    answer: "Vp.p.から始まる（例: Seen from a distance, the lake looked beautiful.）"
  - node_id: "nrj-009"
    seq: 4
    question: "分詞構文と接続詞+SVの文は意味が完全に同じか？"
    answer: "同じではない。分詞構文には同時性や連続性を表せる独自の持ち味がある"

