check_points:
  - node_id: "nrj-001"
    seq: 1
    question: "準動詞の3つの不確定要素とは何か？"
    answer: "❶品詞（名詞・形容詞・副詞のどれか不明）、❷時制（いつの出来事か不明）、❸意味上の主語（誰がVするか不明）"
  - node_id: "nrj-001"
    seq: 2
    question: "「不定詞」はなぜそう呼ばれるか？"
    answer: "人称・数・時制によって定まった形が存在しないため。述語動詞のように過去形などの定まった形を持たない"
  - node_id: "nrj-001"
    seq: 3
    question: "準動詞の品詞を訳し方から判断する方法の問題点は何か？"
    answer: "大学入試レベルの難文では構造を理解するだけでも困難で、最初から「〜こと」「〜ために」と訳語を決められるとは限らない"
  - node_id: "nrj-002"
    seq: 1
    question: "不定詞の名詞用法をどう見分けるか？"
    answer: "文の要素（S・O・C）になっている場合。文中から取り去ると文が成立しなくなることが目印"
  - node_id: "nrj-002"
    seq: 2
    question: "不定詞の形容詞用法と副詞用法の違いは？"
    answer: "どちらも修飾語（M）だが、形容詞用法は前の名詞を修飾し、副詞用法は名詞以外（主に動詞）を修飾する"
  - node_id: "nrj-002"
    seq: 3
    question: "不定詞の3用法を判別する手順は？"
    answer: "❶文の要素（S・O・C）→名詞用法 ❷文の要素にならず前の名詞を修飾→形容詞用法 ❸どちらでもない→副詞用法"
  - node_id: "nrj-003"
    seq: 1
    question: "Vingが名詞として機能する場合を何と呼ぶか？また判別のポイントは？"
    answer: "動名詞。文の要素（S・O・C）になっている、または前置詞の目的語になっている場合"
  - node_id: "nrj-003"
    seq: 2
    question: "Vingが副詞として機能する場合を何と呼ぶか？"
    answer: "分詞構文。Vingが文の要素にならず、前に修飾する名詞もないので副詞と判断する"
  - node_id: "nrj-003"
    seq: 3
    question: "Vingが補語（C）になるのは形容詞用法か動名詞か？"
    answer: "形容詞用法（現在分詞）。S=Cの関係が成立する場合、Vingは形容詞として補語になっている"
  - node_id: "nrj-004"
    seq: 1
    question: "Vp.p.（過去分詞）にはいくつの用法があるか？名詞用法はあるか？"
    answer: "形容詞用法と副詞用法の2つのみ。the accused等の一部例外を除き、原則として名詞用法はない"
  - node_id: "nrj-004"
    seq: 2
    question: "Vp.p.の副詞用法（分詞構文）でbeingが省略される場合、何から文が始まるか？"
    answer: "Vp.p.（過去分詞）から始まる。例: Written in simple English, the book is..."
  - node_id: "nrj-004"
    seq: 3
    question: "準動詞（to V / Ving / Vp.p.）の用法数はそれぞれいくつか？"
    answer: "to V = 3用法（名詞・形容詞・副詞）、Ving = 3用法（動名詞・現在分詞・分詞構文）、Vp.p. = 2用法（形容詞・副詞/分詞構文）"
  - node_id: "nrj-005"
    seq: 1
    question: "不定詞（to V）の基本イメージは？"
    answer: "「これから向かっていく、ある行為と向き合う」イメージ。前置詞toの→（到達）と親戚関係"
  - node_id: "nrj-005"
    seq: 2
    question: "動名詞（Ving）の基本イメージは？"
    answer: "「実際にやっている（ところを想像する）」イメージ"
  - node_id: "nrj-005"
    seq: 3
    question: "refuse, hesitate, failが不定詞を目的語にとるのはなぜか？"
    answer: "to Vの「これから→まだやっていない」イメージと合致する。向き合ってみたが実行できない。結果的に実行不可能でもtoの向き合うイメージは生きている"
  - node_id: "nrj-005"
    seq: 4
    question: "My dream is to be ... と My hobby is looking ... で準動詞が異なる理由は？"
    answer: "夢=まだ実現していない→to V、趣味=実際にやっていること→Ving。to V/Vingの基本イメージがそのまま適用される"
  - node_id: "nrj-006"
    seq: 1
    question: "remember to Vとremember Vingの意味の違いは？"
    answer: "remember to V「これからVすることを覚えておく（未実行）」、remember Ving「実際にVしたことを覚えている（実行済み）」"
  - node_id: "nrj-006"
    seq: 2
    question: "stop to Vとstop Vingの構造上の違いは何か？"
    answer: "stop to V: stopは自動詞（立ち止まる）+to Vは副詞用法（目的）。stop Ving: stopは他動詞+Vingは目的語（動名詞）"
  - node_id: "nrj-006"
    seq: 3
    question: "try to Vとtry Vingの違いは？"
    answer: "try to V「Vしようとする（まだVしていない）」、try Ving「試しにVしてみる（実際にVしている）」"
  - node_id: "nrj-006"
    seq: 4
    question: "不定詞と動名詞で意味に差が出る代表的な動詞を4つ挙げよ"
    answer: "remember, forget, try, regret。いずれもto V=これから（未実行）、Ving=実際に（実行済み）の対比"
  - node_id: "nrj-007"
    seq: 1
    question: "to Vで名詞を修飾する場合とVingで名詞を修飾する場合の意味の違いは？"
    answer: "to Vは「これからVする（まだVしていない）」、Vingは「実際にVしている」"
  - node_id: "nrj-007"
    seq: 2
    question: "受動の場合、to be Vp.p.とVp.p.の意味の違いは？"
    answer: "to be Vp.p.は「これから〜される（まだされていない）」、Vp.p.は「実際に〜されている」"
  - node_id: "nrj-007"
    seq: 3
    question: "fallen leavesのfallenはどんな用法か？"
    answer: "自動詞fallのVp.p.形容詞用法。受動ではなく〈完了〉の意味（落ちてしまった）"
  - node_id: "nrj-008"
    seq: 1
    question: "不定詞の副詞用法の5つの意味は？"
    answer: "❶目的 ❷感情の原因 ❸判断の根拠 ❹結果 ❺程度"
  - node_id: "nrj-008"
    seq: 2
    question: "too〜to Vの不定詞が否定的に訳せる理由は？"
    answer: "to Vの「これから→まだやっていない」を否定的に読むため。tooは否定的ニュアンスを予感させる副詞"
  - node_id: "nrj-008"
    seq: 3
    question: "〈目的〉と〈結果〉はどう見分けるか？"
    answer: "to以下の行為に対して主語の意志が強く働いていれば〈目的〉、そうでなければ〈結果〉"
  - node_id: "nrj-008"
    seq: 4
    question: "否定の目的「Vしないように」はどう表すか？"
    answer: "in order not to V / so as not to V。単にnot to Vとは通例しない。so as to Vは文頭不可"
  - node_id: "nrj-009"
    seq: 1
    question: "分詞構文の基本的な訳し方は？"
    answer: "主節に対する追加情報としてあいまいに訳す。接続関係を無理に1つに分類しない"
  - node_id: "nrj-009"
    seq: 2
    question: "分詞構文の意味を明確にしたい場合はどうするか？"
    answer: "分詞の前にwhen/while/though等の接続詞を置く（例: Though admitting her guilt）"
  - node_id: "nrj-009"
    seq: 3
    question: "受動の分詞構文でbeingが省略されると何から文が始まるか？"
    answer: "Vp.p.から始まる（例: Seen from a distance, the lake looked beautiful.）"
  - node_id: "nrj-009"
    seq: 4
    question: "分詞構文と接続詞+SVの文は意味が完全に同じか？"
    answer: "同じではない。分詞構文には同時性や連続性を表せる独自の持ち味がある"
  # B-07: Part 06 後半
  - node_id: "nrj-010"
    seq: 1
    question: "不定詞の意味上の主語を置かない2パターンは？"
    answer: "❶文全体の主語と共通（He was surprised to hear → hearのS'もHe）❷一般の人々（不定詞そのものがS位置で文全体のSと共通にできない場合）"
  - node_id: "nrj-010"
    seq: 2
    question: "too〜to V構文で意味上の主語はどう表すか？"
    answer: "for Aの原則は変わらない（This box is too heavy for a child to move）"
  - node_id: "nrj-010"
    seq: 3
    question: "S+V+O+to V型の動詞で不定詞の意味上の主語は何か？"
    answer: "OがtoVの意味上の主語。OとtoVの間にS'→P'の関係が成立する（I want you to go → youがgoのS'）"
  - node_id: "nrj-011"
    seq: 1
    question: "動名詞の意味上の主語をどう表すか？"
    answer: "所有格（または目的格）+Ving。my paying / me payingのように動名詞の前に置く"
  - node_id: "nrj-011"
    seq: 2
    question: "動名詞の意味上の主語に所有格が使われる理由は？"
    answer: "動名詞は名詞の性質が強い。my bookのmy→my payingと同じ感覚。目的格は前の前置詞/他動詞につられた結果"
  - node_id: "nrj-011"
    seq: 3
    question: "Ving/Vp.p.形容詞用法の意味上の主語は何か？"
    answer: "修飾される名詞。the lady singing → ladyがsingingのS'（能動）、a book read → bookがreadのS'（受動）"
  - node_id: "nrj-011"
    seq: 4
    question: "S+V+O+CのVing/Vp.p.の意味上の主語は何か？"
    answer: "Oが意味上の主語。kept his car parked → carがparkedのS'。S+V+Cの場合はSが意味上の主語"
  - node_id: "nrj-012"
    seq: 1
    question: "独立分詞構文とは何か？"
    answer: "分詞構文の意味上の主語が文全体のSと異なる場合に、分詞構文の前にS'を明示する構文（It being rainy, we stayed home.）"
  - node_id: "nrj-012"
    seq: 2
    question: "There be構文の独立分詞構文はどう書くか？"
    answer: "There being...の形（There being so much wind, we gave up sailing.）"
  - node_id: "nrj-012"
    seq: 3
    question: "付帯状況のwith A+Bで、Bに置けないものは？"
    answer: "不定詞と動詞の原形は置けない。Ving（能動）、Vp.p.（受動）、形容詞などは可"
  - node_id: "nrj-012"
    seq: 4
    question: "付帯状況のwithと独立分詞構文の関係は？"
    answer: "withを消去すれば独立分詞構文と同構造。withは「〜をもって」のイメージを添えた発展形。訳し方が似るのは必然"
  - node_id: "nrj-013"
    seq: 1
    question: "準動詞の時制はどう判断するか？"
    answer: "文全体の述語動詞の時制に準じる。seemed to know → knowも過去と判断"
  - node_id: "nrj-013"
    seq: 2
    question: "完了形の準動詞（to have Vp.p.）は何を表すか？"
    answer: "文全体の述語動詞よりさらに前の時を表す。seems to have known = 現在思われるが、知っていたのは過去"
  - node_id: "nrj-013"
    seq: 3
    question: "準動詞の否定で「✕ having not done it」が誤りである理由は？"
    answer: "準動詞の否定は完了形でもnotを準動詞の前に置く。not having done itが正しい。現在完了形の否定(have not done)との混同に注意"
  - node_id: "nrj-014"
    seq: 1
    question: "タフ構文が成立する2条件は？"
    answer: "❶不定詞の中に名詞が1つ欠けている ❷その欠けている名詞が文全体の主語と一致する"
  - node_id: "nrj-014"
    seq: 2
    question: "It is ... of A to Vで使われる形容詞の特徴は？"
    answer: "「人の性質」を表す形容詞（careless, clever, wise, kind, foolish等）。of Aの前後でA=S', 形容詞=P'の関係が成立"
  - node_id: "nrj-014"
    seq: 3
    question: "代不定詞とは何か？また省略できるか？"
    answer: "繰り返しを避けてV以降を省略しtoだけ残す用法。代不定詞のtoは原則省略不可"
  - node_id: "nrj-015"
    seq: 1
    question: "be to不定詞はなぜ英作文で使用を避けるべきか？"
    answer: "主語以外の第三者の存在が感じられる特殊な表現。個人の意図を表すには不適切。自分の予定なら現在進行形を使う"
  - node_id: "nrj-015"
    seq: 2
    question: "疑問詞+to Vで使えない疑問詞は？"
    answer: "why to Vは通例不可。how/what/which/who/where/when/whetherは可"
  - node_id: "nrj-015"
    seq: 3
    question: "独立不定詞の特徴は？"
    answer: "文全体を修飾する定型表現。意味上のSを文全体のSと合わせる必要がない。needless to say, to tell the truth, so to speak等"
  - node_id: "nrj-016"
    seq: 1
    question: "look forward to Vingのtoは何か？"
    answer: "前置詞to（不定詞のtoではない）。前置詞の後は名詞（相当語句）なのでVingが続く。be used to Ving, when it comes to Ving等も同様"
  - node_id: "nrj-016"
    seq: 2
    question: "need+Vingが「Vされる必要がある」と訳せるのはなぜか？"
    answer: "need+Ving（名詞相当の動名詞）はneed+名詞の延長。タフ構文と同じ2条件（❶名詞欠落 ❷文全体のSと一致）を満たすため受動的に意訳できる"
  - node_id: "nrj-016"
    seq: 3
    question: "a walking stickとa sleeping catのVingの違いは？"
    answer: "walking stick=用途の動名詞（歩くための棒）、sleeping cat=現在分詞の形容詞用法（眠っている猫）。目的と進行の違い"
  - node_id: "nrj-017"
    seq: 1
    question: "surprising と surprised の使い分けのポイントは？"
    answer: "感情を与える原因→Ving（surprising）、感情を抱く側→Vp.p.（surprised）。主語が原因か経験者かで判断する"
  - node_id: "nrj-017"
    seq: 2
    question: "S+V+O+C構文で感情の分詞形容詞を使う場合、O-C間の関係は？"
    answer: "OがS'、CがP'の関係。The story made the children excited → children(S')=excited(P')。Oが感情を抱く側なのでVp.p."
  - node_id: "nrj-017"
    seq: 3
    question: "独立分詞構文の慣用表現を3つ以上挙げよ"
    answer: "all things considered / weather permitting / generally speaking / judging from A / strictly speaking / frankly speaking 等"

