# Part 09-10: 前置詞・比較 (nrp)

knowledge_nodes:
  - id: "nrp-001"
    name: "前置詞byの核心（そば→手段→経由）"
    category: "nrp"
    priority: "P1"
    notes: |
      byの基本イメージは「そば」。ここから手段・基準・経由へと展開する。
      ❶ そば: by the window（窓のそば）
      ❷ 手段: 「そば」にあるものを使って→交通手段(by bike)、通信手段(by fax)、単位(by the basket)
      ❸ 基準・尺度: 「そば」にある時計で時間を知る→by my watch
      ❹ 経由: 地点間の「手段」から→by Honolulu（ホノルル経由で）
      [図表: イラスト — 自転車に乗る女性・ファックスを使う女性・かご売りのイラスト（p.330）]
      [図表: イラスト — 日本からホノルル経由でメキシコへの地図（p.331）]
      プラスα: 「経由」はby way of, via, throughでも表せる
      別冊ポイント211参照
  - id: "nrp-002"
    name: "前置詞byの展開（期限・差・受動態）"
    category: "nrp"
    priority: "P1"
    notes: |
      byの「そば」イメージの続き。期限・差・受動態への展開。
      ❶ 期限: by 5:00＝5時の「そば」→5時までに。瞬間的な動詞(pay back等)と共起
      ❷ until[till]との区別: until＝「〜までずっと」（継続）。継続性の動詞(work, wait)と共起。入試頻出
      ❸ 差・隔たり: 「そば」→対象との間に差がある。by a head（頭1つ分）、by a minute（1分差で）
      ❹ day by day/one by one/step by step/by degrees: 「差」のbyから生まれた表現
      ❺ 受動態のby: 殺した人が「そば」にいた→by Cain。受動態だからbyではなく、「そば」だからby
      ✕ 受動態＝必ずby ではない: He was killed in the accident.（事故の「ワクの中」→in）
      プラスα: day after day「来る日も来る日も」は変化なき継続。day by day「日ごとに」は変化あり
      参考書内参照: →PART09-3（inの詳細）
      別冊ポイント211・212参照
  - id: "nrp-003"
    name: "前置詞inの核心（ワクの中→場所→時間→着用→手段）"
    category: "nrp"
    priority: "P1"
    notes: |
      inの基本イメージは「ワクの中」。場所でも時間でもすっぽり収まっている感覚。
      ❶ 場所: in the cage（かごの中）
      ❷ 時間: in three weeks（3週間で）→時間のワクの中で完了
      ❸ 未来時のin: in two hours＝今から2時間後。afterは過去/未来の一点基準、inは「今」基準
      ❹ 着用: 服の「ワクの中」に体が収まる。in his new shirt、in his red shoes
      ❺ inとonの着用の違い: in＋着用する服(モノ) vs on＋着用する体の部位・場所
      ❻ 伝達の枠組み: in Spanish（スペイン語という枠組みで）
      ❼ 材料: in ink（インクで）、in bronze（青銅で）
      ❽ 形態・配置: in alphabetical order（アルファベット順に）
      プラスα: with a pencil（実際に鉛筆を持って/aつき）vs in pencil（材料としての鉛筆/aなし）
      別冊ポイント213参照
  - id: "nrp-004"
    name: "前置詞inの展開（方向→分野→状態→活動）"
    category: "nrp"
    priority: "P1"
    notes: |
      inの「ワクの中」イメージの続き。方向・分野・状態・活動への展開。
      ❶ 方向・方角: in the east/west。東西南北は360度を4分割した枠組み
      ❷ inとtoの方角の違い: in the east（東に位置）vs to the east of China（中国から東に到達→日本）
      ❸ 分野・範囲の限定: major in law（法学を専攻）、in my opinion（私の考えでは）
      ❹ 〈in+Ving〉＝「〜する際に」: be careful in crossing→どの分野で注意かをinで限定
      ❺ 状態・環境: in heavy rain（土砂降りの中）、in despair（絶望して）。目に見えるものも抽象的なものも可
      ❻ 活動・従事: in politics（政治に携わっている）、in business（仕事に従事）
      プラスα: in business（日常的に仕事に従事）vs on business（観光でなく仕事で→He went to NY on business.）
      別冊ポイント213参照
  - id: "nrp-005"
    name: "前置詞onの核心（接触/べったり→影響→連続・継続）"
    category: "nrp"
    priority: "P1"
    notes: |
      onの基本イメージは「接触 or べったり」。上面だけでなく、下でも側面でもOK。
      ❶ 接触: on the ceiling（天井のハエ）、on the main street（大通り沿い）
      ❷ べったり: put butter on the bread（パンにバターを塗る）
      ❸ 影響・印象: 何かに触れることで影響を受ける→influence/effect/impact on〜、impression on〜
      ❹ 連続・同時: on arriving＝到着と電話が時間的に接触→「すぐに」。= as soon as
      ❺ on+名詞でも可: on my return（帰るとすぐ）
      ❻ 継続: 点と点がつながれば線→on duty（勤務中）、on leave（休暇中）、on strike（ストライキ中）
      別冊ポイント214参照
  - id: "nrp-006"
    name: "前置詞onの展開（依存→日付→について→通信→不利益）"
    category: "nrp"
    priority: "P1"
    notes: |
      onの「べったり」イメージの続き。依存・日付・専門性・通信・不利益への展開。
      ❶ 依存・基礎・根拠: depend on（〜に依存）、act on the instructions（指示に従って行動）
      ❷ 特定の日・曜日: on Monday。暦に「依る(=by=寄り添う)」感覚→on
      ❸ 「〜について」: a book on Shakespeare。べったり→特化・専門性。aboutより専門性が高い
      ❹ 通信手段: on the Internet。情報が電波/電線にのっかって届く感覚
      ❺ 不利益・災難: My wife died on me.（妻に先立たれた）。不利益がのしかかる。Dinner's on me.（私のおごり）
      プラスα: in the morning（朝に）vs on the morning of the last day（最後の日の朝→日付特定→on）
      プラスα: in the newspaper（紙媒体→ワクの中）vs on the map（1枚の紙の上→接触）
      参考書内参照: →PART09-20（aboutの詳細）
      別冊ポイント214参照
  - id: "nrp-007"
    name: "前置詞atの核心（一点集中→時点→地点→目盛り→従事→感情原因）"
    category: "nrp"
    priority: "P1"
    notes: |
      atの基本イメージは「一点集中」。ピンポイントに「点」を指す。
      ❶ 目標: aim at the mark（的をねらう）
      ❷ 時点: at 10:00。inは幅のある時間帯(in July)
      ❸ 地点: at 2415 Kuhio Avenue。地図上でホテルの位置を指さす感じ
      ❹ atとinの場所の使い分け: at the hotel（立ち寄り地点）vs in the hotel（ホテル空間内）。話し手の主観で決まる
      ❺ 目盛りの一点: at 100℃（温度）、at 60 miles an hour（スピード）、at 200 yen（価格）
      ❻ 従事・状態: at play/at work（一点集中）、at table/at night/at peace/at ease/at one's best
      ❼ 瞬間的な感情の原因: surprised/amazed/astonished/shocked at 〜。瞬間的感情はat
      ❽ 継続的感情はwith: satisfied/pleased/bored with 〜。ただしdisappointed at/with/in等、複数使える場合も
      プラスα: in the evening（日没〜就寝の活動時間）、in the night（就寝〜起床）、at night（闇の状態/theなし）
      別冊ポイント215参照
  - id: "nrp-008"
    name: "前置詞fromの核心（出所→出身→起点→原因→原料→判断根拠）"
    category: "nrp"
    priority: "P1"
    notes: |
      fromの基本イメージは「出所（でどころ）」。「〜から」の丸暗記では対応できない多様な展開。
      ❶ 出所: draw information from（情報の出所）
      ❷ 出身: I'm from Japan.
      ❸ 出発点・起点: from A to B。from Rome to Paris
      ❹ 間接的な原因: result from carelessness。fromは「間接的」原因が多い
      ❺ 原料: made from milk（バター←牛乳/原形をとどめない）vs made of wood（テーブル←木/目で見てわかる）
      ❻ 判断の根拠: judging from the evidence（証拠から判断すれば）
      ❼ 観点: from another point of view（別の観点から）
      ✕ begin from 8:00は不可→begin at 8:00（時の一点はat）
      プラスα: die of cholera（直接的原因→of）vs die from overwork（間接的原因→from）。→p.365参照
      参考書内参照: →p.364（ofの原料の詳細）
      別冊ポイント216参照
  - id: "nrp-009"
    name: "前置詞fromの展開（分離→妨害/禁止→区別→保護）"
    category: "nrp"
    priority: "P1"
    notes: |
      fromの「出所」から「離れて（分離）」への展開。動詞パターンとの組み合わせが重要。
      ❶ 分離: start from Kyoto（京都から出発=京都から離れる）、two miles from shore（海岸から2マイル離れて）
      ❷ 妨害・禁止: prevent/prohibit A from Ving。AとVingを切り離す→妨害
      ❸ 区別・相違: distinguish A from B。AとBを切り離す→区別する
      ❹ 保護: protect/rescue/save A from B。AとBを切り離す→保護
      プラスα: distinguish（五感で広く区別）vs tell/know（見分ける）。どれもA from Bパターン
      参考書内参照: →PART01-12（V+A+from+B型の動詞）
      別冊ポイント216参照
  - id: "nrp-010"
    name: "前置詞toの核心（到達→所属/帰属→適合→付加/付着）"
    category: "nrp"
    priority: "P1"
    notes: |
      toの基本イメージは「到達」。fromと対で考えるとよい。右向き矢印（→）のイメージ。
      ❶ 到達: drive to the city。ある地点への到達
      ❷ 所属先・帰属先: belong to the club（所属）、keys to my apartment（鍵の帰属先がアパート）
      ❸ 到達対象→所有者: gave a present to his girlfriend。到達先=所有者とも見なせる
      ❹ 適合・一致: sing to the music（音楽に合わせて歌う）。歌声が音階に「到達」→合っている
      ❺ 付加・追加: add two to seven。2が7に到達→足す
      ❻ 付着: attach a price tag to a garment。toは貼り付けるまでの動作。すでに貼られた状態はon
      プラスα: in/at/toの「方向」の違い: in（枠の中）、at（一点めがけて/攻撃的）、to（到達）。→p.337参照
      参考書内参照: →PART01-15（V+A+to+B型の動詞）
      別冊ポイント217参照

  - id: "nrp-011"
    name: "前置詞toの展開（結果/目的→限界/制限→to one's感情）"
    category: "nrp"
    priority: "P1"
    notes: |
      toの「到達」イメージの続き。結果・目的・限界・制限・感情表現への展開。
      ❶ 結果: starve to death（飢えて→結果→死）。右向き矢印（→）のイメージ
      ❷ 目的: came to my rescue（救助に来た）。結果と目的はコインの表裏
      ❸ 結果 vs 目的の判断基準: to以下に主語の意志が強く働いていれば→「目的」、そうでなければ→「結果」
      ❹ 限界・制限: confine/limit/restrict + to。到達→限界（それ以上は入れない）
      ❺ 〈to one's＋感情名〉: to my regret「残念なことに」。「結果」の仲間。文頭に置かれることが多い
      to one's delight/joy/disappointment/dismay なども同様
      プラスα: to one's感情は文末に置くこともできる（She failed, to her dismay.）
      参考書内参照: →PART01-15（V+A+to+B型の動詞/制限系）
      別冊ポイント217参照
  - id: "nrp-012"
    name: "前置詞forの核心（意識の向かう先→目的地→目的/用途/利益/賛成→理由）"
    category: "nrp"
    priority: "P1"
    notes: |
      forの基本イメージは「意識の向かう先」。到達のtoとの対比が重要。
      ❶ 意識の向かう先: searched for Tommy's ring。みんなの意識が指輪に向いている
      ❷ 目的地: left Tokyo for New York。意識はNYに向いているが、まだ到達していない
      ❸ toとforの違い: sent a letter to Jane（到達済み）vs bought a ring for Jane（意識は向いているが届いていない）
      ❹ 第4文型の書き換え: S+V+O₂+to+O₁（到達）vs S+V+O₂+for+O₁（意識の向かう先）
      ❺ 目的: work for a living（生活のために）
      ❻ 用途: a knife for cutting bread（パン切り用）
      ❼ 利益: act for a client（依頼人のために）
      ❽ 要求: call for more information（詳細を求めて）
      ❾ 賛成: I'm for your plan.（君の計画に賛成）
      ❿ 理由: hospitalized for chest pains。明確な理由にはbecause ofが無難
      プラスα: 理由のforはthank A for B等の定型動詞と使われることが多い
      参考書内参照: →別p.3-4 ポイント007,008、→別p.15 ポイント032,033
      別冊ポイント218参照
  - id: "nrp-013"
    name: "前置詞forの展開（期間→forとduringの違い→代用/交換→判断基準）"
    category: "nrp"
    priority: "P1"
    notes: |
      forの「意識の向かう先」の続き。期間・代用・交換・判断基準への展開。
      ❶ 期間: for three hours。全期間に意識→ずっと継続
      ❷ forとduringの違い: for a week＝単に1週間の長さ。during the week＝特定の期間（theが付く）
      ❸ forは全期間継続。duringは特定期間内で行われれば良く、常に継続の意味があるとは限らない
      ❹ 代用: substituted honey for sugar。本来使いたいのはfor以下
      ❺ 相当・同等: P.M. stands for Prime Minister。代用できる→相当
      ❻ 交換: exchange yen for dollars。相当→交換可能
      ❼ 判断の基準: looks young for his age。実年齢に意識を向けつつ判断
      別冊ポイント218参照
  - id: "nrp-014"
    name: "前置詞ofの核心（分離→3本柱→材料/構成要素）"
    category: "nrp"
    priority: "P1"
    notes: |
      ofの基本イメージは「分離」。offと親戚関係。ケーキのイラストで3本柱を理解。
      ❶ 分離: ホールケーキからピースをカット→分離がofの原点
      ❷ 3本柱: ❶分離 ❷部分 of 全体 ❸所有
      ❸ 分離→独立: independent of her parents
      ❹ 分離→起源: 独立しても性格や容姿の起源は親にある
      ❺ 起源→材料: bars of steel（鉄格子）、made of wood（木造）
      ❻ 起源→構成要素: consists of eight chapters（8章からなる）
      [図表: イラスト — ホールケーキからピースをカット→分離→部分of全体→所有の3本柱の説明（p.363）]
      別冊ポイント219参照
  - id: "nrp-015"
    name: "前置詞ofの展開1（原因→行為者/動作主→部分of全体→同格）"
    category: "nrp"
    priority: "P1"
    notes: |
      ofの3本柱の続き。原因・行為者・部分of全体・同格への展開。
      ❶ 出来事の起源→原因: died of cancer。直接的原因→of。間接的原因→from
      ❷ 行為の起源→行為者・動作主: the arrival of a visitor（客の到着）。「主格のof」
      ❸ 性質の起源→行為者: kind of him（彼が親切）。kindの起源がhim
      ❹ 部分 of 全体: one of the books, some of the books, most of the books
      ❺ 数量表現＋of: A（部分）of B（全体）の関係。ofは仕切り役
      ❻ 同格: A（部分）が100%→all of the books→A＝B→同格
      ❼ 同格の例: the name of Bill（ビルという名前）、the fact of her having seen Bill
      プラスα: all of the booksのofは省略可能（all the books）。A＝Bなので仕切り不要
      プラスα: die of（直接原因）vs die from（間接原因）。現在では区別があいまい
      参考書内参照: →p.348-349（fromの原因）
      別冊ポイント219参照
  - id: "nrp-016"
    name: "前置詞ofの展開2（関連/対象→所有→of+抽象名詞→使用上の注意）"
    category: "nrp"
    priority: "P1"
    notes: |
      ofの3本柱の最終展開。関連・対象・所有・of+抽象名詞・使用上の注意。
      ❶ 関連: speaks of his family（家族について語る）。同格ofから「関連」へ
      ❷ 感情や行為の対象: suspicious of his words（「目的格のof」）、the love of nature
      ❸ 所有: the role of chairperson（議長がもつ役割）、that car of hers（彼女のあの車）
      ❹ of+抽象名詞: of great use＝very useful。「有用さをもった」と理解
      ❺ 強弱の調整: of great use / of some use / of little use / of no use
      ❻ 具体名詞でも可: of the same age（同年齢）、of the same mind（同意見）
      ❼ 使用上の注意: A of B＝「B（全体/親）の中のA（部分/子）」で基本OK
      ❽ 定型表現: a lot of / a cup of / a kind of 等はofを含む定型句として扱う
      別冊ポイント219参照
  - id: "nrp-017"
    name: "前置詞withの核心と展開（もって→付随/道具/原因/比例→一緒/相手/関係）"
    category: "nrp"
    priority: "P1"
    notes: |
      withの基本イメージは「もって、もっている」。手にもてるものだけでなく、気分や原因まで幅広くカバー。
      ❶ 付随: a book with a black cover。黒い表紙をもった本
      ❷ 道具: cut meat with a knife。ナイフをもって→ナイフで
      ❸ 原因: trembled with fear。恐怖でもって→恐怖で
      ❹ 比例: vary with time。時間でもって→時間と共に
      ❺ 一緒（同伴）: played with his child。共に存在→一緒に
      ❻ 相手: argued with my father。一緒にいる→相手
      ❼ 関係: What's the matter with you?。一緒にいれば関係が生まれる
      ❽ with+抽象名詞＝副詞: with care＝carefully。「注意をもって→注意して」
      [図表: イラスト — フォークを持って食べる男性（p.370）]
      [図表: イラスト — 親子がボール遊び（p.371）]
      プラスα: 原因のof（直接的）、from（間接的）、with（状況をともなって）の使い分け
      プラスα: fight with〜はドイツと一緒に戦う/ドイツと戦うの2解釈。fight againstは対抗のみ
      プラスα: What's the matter with you?は不信感。with youなしなら気遣い
      別冊ポイント220参照
  - id: "nrp-018"
    name: "その他の前置詞(1)（over/above/under/below）"
    category: "nrp"
    priority: "P1"
    notes: |
      主要前置詞以外の重要前置詞。上下関係を表す4つの前置詞。
      ❶ over: 「覆いかぶさって、越えて（向こうに）」
      ❷ over→期間: over the years（数年にわたって）
      ❸ over→従事: chatted over coffee（コーヒーを飲みながら）。入試頻出
      ❹ over→支配: rules over the country。権力が国を覆っている
      ❺ above: 「ある基準よりも上（の方）」。above the speed limit
      ❻ overとaboveの違い: overは曲線的な広がり。aboveは点としての上。aboveには「越えて向こうに」の動き用法なし
      ❼ under: overのおおよそ反対。物理的な下＋条件・状態の下
      ❽ under重要表現: under construction（建設中）、under the law（法の下で）、under discussion（議論中）、under way（進行中）、under any circumstances（いかなる状況下でも）
      ❾ below: 「ある基準よりも下（の方）」。aboveの正反対
      ❿ belowは位置だけでなく能力・上下関係も表す: below a president in rank
      [図表: イラスト — テーブルクロスを広げる様子/overの矢印（p.373）]
      [図表: イラスト — コーヒーをまたいで会話/overの矢印（p.373）]
      [図表: イラスト — 椅子の下のネコ/under（p.374）]
      [図表: イラスト — 社長と副社長のピラミッド/below（p.375）]
      別冊ポイント221・222・224参照
  - id: "nrp-019"
    name: "その他の前置詞(2)（beyond/across/between/among/against）"
    category: "nrp"
    priority: "P1"
    notes: |
      その他の重要前置詞の続き。距離・方向・関係・対立を表す5つの前置詞。
      ❶ beyond: 「はるかに超えて（→手が届かない）」。beyond description（言葉では言い尽くせない）
      ❷ across: 「横切る」。crossが含まれている→交差の感覚
      ❸ between: 「AとBとの間」。be(=by)+tween(=two)が語源→原則2者間
      ❹ betweenが3者以上: 各2者間の関係（ペア）が意識されている場合。Switzerland lies between France, Italy, Austria and Germany.
      ❺ among: 通例3者以上。グループ・集合体をイメージ
      ❻ betweenとamongの違い: 数でなく、個々の関係焦点(between) vs 集合体イメージ(among)
      ❼ against: 基本イメージは「⇔」。対立・反対・対照・準備（防御）
      ❽ against→対照: stood out against the blue sky（青空を背景に）
      ❾ against→準備: store food against the winter（冬に備えて）
      [図表: イラスト — acrossで道を横切る（p.376）]
      [図表: イラスト — betweenでNYとボストン間（p.376）]
      [図表: イラスト — amongで木々の間のコテージ（p.377）]
      [図表: イラスト — againstの矢印が向かい合う（p.377）]
      プラスα: fight against〜は対抗の意味が色濃い。fight with〜は相手/一緒の2解釈
      別冊ポイント223参照
  - id: "nrp-020"
    name: "その他の前置詞(3)（about/into/onto/through）"
    category: "nrp"
    priority: "P1"
    notes: |
      その他の重要前置詞の最終回。方向・移動・通過を表す4つの前置詞。
      ❶ about: 「周辺ぐるぐる」。about≒aroundだが「〜について」ではaroundは不可
      ❷ about→周辺→「〜について」: 周辺情報を漠然と。専門的にはon
      ❸ about→雰囲気: something noble about the boy（少年にはどこか高貴なところ）
      ❹ about→不安・心配: worried about his health。頭の中でぐるぐる
      ❺ into: 「ある空間の中へ」。came into the house（家の中へ入った）
      ❻ in/into/out ofの関係: into（中へ入る動き）、in（中にいる状態）、out of（外へ出る動き）
      ❼ into→変化: translate Latin into English
      ❽ onto: 「ある表面の上へ」。到達のto＋接触のon。jumped onto my knee
      ❾ on/onto/offの関係: onto（上へ乗る動き）、on（上にいる状態）、off（離れる動き）
      ❿ through: 「〜を通り抜けて」。pass through a tunnel
      ⓫ through→期間: through the night（夜通し）
      ⓬ through→手段: through the Internet（インターネットを通じて）
      ⓭ acrossとthroughの違い: across＝平面を横切る。through＝立体を通り抜ける
      [図表: イラスト — 家の周りのフェンス/about（p.379）]
      [図表: イラスト — into/in/out ofの3段階（p.380）]
      [図表: イラスト — onto/on/offの3段階（p.380）]
      [図表: イラスト — トンネルを通り抜ける電車/through（p.381）]
      プラスα: about 100 pounds＝100ポンドの周辺→およそ100ポンド
      プラスα: on toと2語にすることもある

