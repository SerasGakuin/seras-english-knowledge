check_points:
  - node_id: "nrp-001"
    seq: 1
    question: "byの基本イメージは何か？"
    answer: "「そば」。手段・基準・経由はすべて「そば」から派生する"
  - node_id: "nrp-001"
    seq: 2
    question: "by the basket, by the barrelのbyは何を表すか？"
    answer: "単位を表す手段。「そば」にあるかご・バレルを使って売る感覚"
  - node_id: "nrp-001"
    seq: 3
    question: "byで「経由」を表す場合、同義の表現は何か？"
    answer: "by way of, via, throughなどで書き換え可能"
  - node_id: "nrp-002"
    seq: 1
    question: "byとuntil[till]の違いは何か？"
    answer: "by＝期限「〜までに」（瞬間的動詞と共起）。until[till]＝継続「〜までずっと」（継続動詞と共起）"
  - node_id: "nrp-002"
    seq: 2
    question: "day by dayとday after dayの違いは何か？"
    answer: "day by day＝「日ごとに」変化あり(=gradually)。day after day＝「来る日も来る日も」変化なし継続"
  - node_id: "nrp-002"
    seq: 3
    question: "受動態で常にbyが使われるわけではない。He was killed __ the accident. の空所に入る前置詞は？"
    answer: "in。事故の「ワクの中」で死んだのでin。「そば」に事故があったわけではないのでbyは不適切"
  - node_id: "nrp-003"
    seq: 1
    question: "inの基本イメージは何か？"
    answer: "「ワクの中」。場所でも時間でもすっぽり収まっている感覚"
  - node_id: "nrp-003"
    seq: 2
    question: "着用を表すinとonの後ろに置くものの違いは何か？"
    answer: "in＋着用する服（モノ）。on＋着用する体の部位・場所"
  - node_id: "nrp-003"
    seq: 3
    question: "「今から2時間後に」はin two hoursとafter two hoursのどちらが正しいか？"
    answer: "in two hours。「今」を基準にした「〜後」はin。afterは過去/未来の一点を基準にする"
  - node_id: "nrp-004"
    seq: 1
    question: "方角でinとtoを使い分ける基準は何か？"
    answer: "in the east＝東西南北の枠組み。to the east of China＝中国から東に到達するので到達のto"
  - node_id: "nrp-004"
    seq: 2
    question: "in businessとon businessの違いは何か？"
    answer: "in business＝日常的に仕事に従事している。on business＝（観光でなく）仕事の目的で"
  - node_id: "nrp-004"
    seq: 3
    question: "in despairのinは何を表すか？"
    answer: "状態・環境。絶望という「ワクの中」にいる感覚"
  - node_id: "nrp-005"
    seq: 1
    question: "onの基本イメージは何か？"
    answer: "「接触」または「べったり」。上面だけでなく下でも側面でもOK"
  - node_id: "nrp-005"
    seq: 2
    question: "influence/effect/impact/impression + on のonは何に由来するか？"
    answer: "「接触」のon。何かに触れることで影響を受けたり印象を抱いたりする"
  - node_id: "nrp-005"
    seq: 3
    question: "On arriving there, he called his father. のon Vingは何を表すか？"
    answer: "「〜するとすぐ」。到着と電話が時間的に接触(on)→すぐに。= As soon as he arrived there"
  - node_id: "nrp-006"
    seq: 1
    question: "depend onのonは何に由来するか？"
    answer: "「べったり」のon。親にべったり→親に依存"
  - node_id: "nrp-006"
    seq: 2
    question: "a book on Shakespeareとa book about Shakespeareの違いは何か？"
    answer: "on＝べったり→専門的。about＝周辺→一般的。onの方がaboutより専門性が高い"
  - node_id: "nrp-006"
    seq: 3
    question: "Dinner's on me.のonは何を表すか？"
    answer: "不利益・災難。夕食代が私にのしかかっている→私のおごり"
  - node_id: "nrp-007"
    seq: 1
    question: "atの基本イメージは何か？"
    answer: "「一点集中」。広い範囲ではなくピンポイントに「点」を指す"
  - node_id: "nrp-007"
    seq: 2
    question: "at the hotelとin the hotelの違いは何か？"
    answer: "at＝地図上の地点・立ち寄り地点。in＝ホテルの空間内（ディナー・宿泊等）。話し手の主観で決まる"
  - node_id: "nrp-007"
    seq: 3
    question: "瞬間的感情と継続的感情で使い分ける前置詞は何か？"
    answer: "瞬間的(surprised/shocked等)→at。継続的(satisfied/pleased/bored等)→with。ただし複数使える場合もある"
  - node_id: "nrp-008"
    seq: 1
    question: "fromの基本イメージは何か？"
    answer: "「出所（でどころ）」。「〜から」の丸暗記では対応できない"
  - node_id: "nrp-008"
    seq: 2
    question: "made from milkとmade of woodの違いは何か？"
    answer: "from＝原形をとどめない原料（牛乳→バター）。of＝目で見て材料がわかる（木→テーブル）"
  - node_id: "nrp-008"
    seq: 3
    question: "✕ begin from 8:00 の正しい形は？"
    answer: "begin at 8:00。8時は時の一点なのでat。fromの出所感覚は時の一点には合わない"
  - node_id: "nrp-009"
    seq: 1
    question: "fromの「出所」からもう1つの表情は何か？"
    answer: "「離れて（分離）」。出発した＝そこから離れた、と考える"
  - node_id: "nrp-009"
    seq: 2
    question: "prevent A from Vingの構造を「分離」の観点で説明せよ"
    answer: "妨げることでAとVingを切り離す(from)→AがVingできなくなる"
  - node_id: "nrp-009"
    seq: 3
    question: "distinguish, tell, knowの使い分けは？"
    answer: "distinguish＝五感で広く区別。tell/know＝見分ける。いずれもA from Bパターン"
  - node_id: "nrp-010"
    seq: 1
    question: "toの基本イメージは何か？"
    answer: "「到達」。右向き矢印（→）のイメージ。fromと対で考える"
  - node_id: "nrp-010"
    seq: 2
    question: "belong to the clubのtoは何に由来するか？"
    answer: "到達の対象に注目→所属先。到達した先に留まっている感覚"
  - node_id: "nrp-010"
    seq: 3
    question: "attach a tag to a garmentとthe label on a bottleで前置詞が異なる理由は？"
    answer: "to＝貼り付けるまでの到達動作。on＝すでに貼られている接触状態"
  - node_id: "nrp-011"
    seq: 1
    question: "starve to deathのtoは何を表すか？"
    answer: "結果。飢えて→到達した結果→死。右向き矢印（→）のイメージ"
  - node_id: "nrp-011"
    seq: 2
    question: "結果のtoと目的のtoを判断する基準は何か？"
    answer: "to以下に主語の意志が強く働いていれば「目的」、そうでなければ「結果」"
  - node_id: "nrp-011"
    seq: 3
    question: "限界・制限のtoと一緒に使われる動詞は？"
    answer: "confine/limit/restrict + to。到達→限界（それ以上は入れない）"
  - node_id: "nrp-011"
    seq: 4
    question: "to my regretはtoのどの用法の仲間か？"
    answer: "「結果」の仲間。感情に到達した結果→残念なことに。to one's delight/joy/disappointment/dismayなども同様"
  - node_id: "nrp-012"
    seq: 1
    question: "forの基本イメージは何か？"
    answer: "「意識の向かう先」。到達のtoとの対比が重要"
  - node_id: "nrp-012"
    seq: 2
    question: "sent a letter to Janeとbought a ring for Janeの違いは？"
    answer: "to＝手紙は到達済み。for＝意識は指輪に向いているが、まだJaneに届いていない"
  - node_id: "nrp-012"
    seq: 3
    question: "I'm for your plan.のforは何を表すか？"
    answer: "賛成。意識の向かう先→支持。反意はagainst"
  - node_id: "nrp-012"
    seq: 4
    question: "理由のforを使う際の注意点は？"
    answer: "明確な理由にはbecause ofが無難。forはthank A for B等の定型動詞との組み合わせで使われることが多い"
  - node_id: "nrp-013"
    seq: 1
    question: "forとduringの違いは何か？"
    answer: "for a week＝単に1週間の長さ。during the week＝特定の期間（theが付く）。forは全期間継続、duringは特定期間内に行われればよい"
  - node_id: "nrp-013"
    seq: 2
    question: "substituted honey for sugarのforは何を表すか？"
    answer: "代用。本来使いたいのはfor以下（砂糖）。蜂蜜で代用した"
  - node_id: "nrp-013"
    seq: 3
    question: "looks young for his ageのforは何を表すか？"
    answer: "判断基準。実年齢に意識を向けつつ→その年齢にしては若く見える"
  - node_id: "nrp-014"
    seq: 1
    question: "ofの基本イメージは何か？"
    answer: "「分離」。offと親戚関係。ホールケーキからピースをカットするイメージ"
  - node_id: "nrp-014"
    seq: 2
    question: "ofの3本柱は何か？"
    answer: "❶分離 ❷部分 of 全体 ❸所有"
  - node_id: "nrp-014"
    seq: 3
    question: "made of woodとmade from milkの違いは何か？"
    answer: "of＝目で見て材料がわかる（木→テーブル）。from＝原形をとどめない（牛乳→バター）"
  - node_id: "nrp-015"
    seq: 1
    question: "die of cancerとdie from overworkの違いは？"
    answer: "of＝直接的原因（癌）。from＝間接的原因（過労）。現在では区別があいまいになりつつある"
  - node_id: "nrp-015"
    seq: 2
    question: "the arrival of a visitorのofは何を表すか？"
    answer: "行為者・動作主。「主格のof」。到着の行為の起源＝客"
  - node_id: "nrp-015"
    seq: 3
    question: "all of the booksのofが省略可能な理由は？"
    answer: "A（部分）が100%→A＝B（同格）なので仕切り役のofが不要。all the booksと書ける"
  - node_id: "nrp-016"
    seq: 1
    question: "of great use = ?（of+抽象名詞の構造）"
    answer: "very useful。「有用さをもった」と理解。of some use / of little use / of no useと強弱調整も可能"
  - node_id: "nrp-016"
    seq: 2
    question: "speaks of his familyのofは何を表すか？"
    answer: "関連。同格のofから「関連」へ展開。suspicious of his wordsのofは感情の「対象」（目的格のof）"
  - node_id: "nrp-016"
    seq: 3
    question: "A of Bの基本公式は？"
    answer: "B（全体/親）の中のA（部分/子）。ただしa lot of / a cup of等はofを含む定型句として扱う"
  - node_id: "nrp-017"
    seq: 1
    question: "withの基本イメージは何か？"
    answer: "「もって、もっている」。手にもてるものだけでなく、気分や原因まで幅広くカバー"
  - node_id: "nrp-017"
    seq: 2
    question: "trembled with fearのwithは何を表すか？"
    answer: "原因。恐怖をもって→恐怖で。原因のof（直接的）、from（間接的）、with（状況をともなって）と使い分ける"
  - node_id: "nrp-017"
    seq: 3
    question: "with care = ?（with+抽象名詞の構造）"
    answer: "carefully。「注意をもって→注意して」。with+抽象名詞＝副詞"
  - node_id: "nrp-017"
    seq: 4
    question: "fight withとfight againstの違いは？"
    answer: "fight with〜は「一緒に戦う/〜と戦う」の2解釈。fight against〜は対抗の意味のみ"
  - node_id: "nrp-018"
    seq: 1
    question: "overとaboveの違いは何か？"
    answer: "over＝曲線的な広がり・「越えて向こうに」の動き用法あり。above＝点としての上・基準より上"
  - node_id: "nrp-018"
    seq: 2
    question: "chatted over coffeeのoverは何を表すか？"
    answer: "従事。コーヒーを飲みながらおしゃべりした。入試頻出"
  - node_id: "nrp-018"
    seq: 3
    question: "under construction, under discussion, under wayのunderは何を表すか？"
    answer: "条件・状態の下。建設中・議論中・進行中。underの「〜の下で」が抽象的な状態に拡張"
  - node_id: "nrp-018"
    seq: 4
    question: "belowは位置以外に何を表すか？"
    answer: "能力・上下関係。below a president in rank（地位で社長の下）"
  - node_id: "nrp-019"
    seq: 1
    question: "beyond descriptionの意味は？"
    answer: "言葉では言い尽くせない。「はるかに超えて→手が届かない」"
  - node_id: "nrp-019"
    seq: 2
    question: "betweenが3者以上で使われるのはどんな場合？"
    answer: "各2者間の関係（ペア）が意識されている場合。Switzerland lies between France, Italy, Austria and Germany."
  - node_id: "nrp-019"
    seq: 3
    question: "stood out against the blue skyのagainstは何を表すか？"
    answer: "対照。青空を背景に目立った。againstの基本「⇔」から対照へ"
  - node_id: "nrp-019"
    seq: 4
    question: "store food against the winterのagainstは何を表すか？"
    answer: "準備（防御）。冬に備えて食料を蓄えた。「⇔」→迎え撃つ→備える"
  - node_id: "nrp-020"
    seq: 1
    question: "aboutの基本イメージは何か？"
    answer: "「周辺ぐるぐる」。about≒aroundだが「〜について」ではaroundは不可"
  - node_id: "nrp-020"
    seq: 2
    question: "in/into/out ofの3段階を説明せよ"
    answer: "into＝中へ入る動き、in＝中にいる状態、out of＝外へ出る動き"
  - node_id: "nrp-020"
    seq: 3
    question: "on/onto/offの3段階を説明せよ"
    answer: "onto＝上へ乗る動き（到達to＋接触on）、on＝上にいる状態、off＝離れる動き"
  - node_id: "nrp-020"
    seq: 4
    question: "acrossとthroughの違いは？"
    answer: "across＝平面を横切る（crossが含まれている）。through＝立体を通り抜ける"

