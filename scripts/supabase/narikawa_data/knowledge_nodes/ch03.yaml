    goal: "過去完了形が「過去の一時点よりもさらに前の時間帯をカバーする」ことを説明できる"
  - node_id: "nrt-005"
    seq: 2
    goal: "過去完了形の乱用を避けるべき場面（等位接続詞で順番通り、before/afterがある場合）を説明できる"
  - node_id: "nrt-005"
    seq: 3
