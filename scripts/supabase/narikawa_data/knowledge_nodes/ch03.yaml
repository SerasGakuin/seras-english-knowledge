    goal: "現在完了形を〈have（現在もっている）+ Vp.p.（過去にVした）〉の分解で理解し、現在に重点があることを説明できる"
  - node_id: "nrt-004"
    seq: 1
    goal: "現在完了形を「経験・継続・完了」に分類せず〈have + Vp.p.〉の統一イメージで説明できる"
  - node_id: "nrt-004"
    seq: 2
    goal: "現在進行形と現在完了進行形の違い（一時的 vs 期間付き継続）を説明できる"
  - node_id: "nrt-004"
