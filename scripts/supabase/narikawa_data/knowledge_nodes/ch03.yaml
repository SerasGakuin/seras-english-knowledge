check_points:
  - node_id: "nrt-001"
    seq: 1
    question: "現在形の核心は何か？"
    answer: "いつも変わらない、安定していることを表す。現在を中心に過去・現在・未来を幅広くカバーする。"
  - node_id: "nrt-001"
    seq: 2
    question: "Vegetarians don't eat meat. はなぜ現在形か？"
    answer: "肉を食べないのは昨日も今日も明日も変わらない安定した習慣だから。"
  - node_id: "nrt-001"
    seq: 3
    question: "Harrods opens at 10:00 a.m. tomorrow. でなぜ現在形で未来を表せるか？"
    answer: "開店時刻は毎日変わらない安定した事実だから。明日も同じことが確実に成り立つ。"
  - node_id: "nrt-001"
    seq: 4
    question: "「現在の習慣」「現在の状態」「不変の真理」の分類について、本書はどう述べているか？"
    answer: "根っこが同じ（変わらない安定）なら分類はどうでもよい。"
  - node_id: "nrt-002"
    seq: 1
    question: "進行形の核心イメージは何か？3つの含意を挙げよ"
    answer: "実際に行為が行われている最中・途中。含意: (1)まだ終わっていない (2)近いうちに終わる (3)その気になればすぐに中断できる"
  - node_id: "nrt-002"
    seq: 2
    question: "(✕) I am knowing Bob. がなぜ不可か？"
    answer: "know（知っている）は中断もできず近いうちに終わることもない状態動詞なので、進行形の「最中・途中」のイメージになじまない"
  - node_id: "nrt-002"
    seq: 3
    question: "You are being kind today. はどんなニュアンスか？現在形 You are kind. との違いは？"
    answer: "進行形により「いつになく」一時的に親切であることを強調。現在形はふだんからの変わらない性質を表す"
  - node_id: "nrt-002"
    seq: 4
    question: "進行形がalways等の反復語句と一緒に使われるとどんな意味になるか？"
    answer: "「いつも〜ばかりしている」で、圧倒的に不快感やいら立ちを表すが、まれに称賛の意味にもなる。文脈判断が大切"
  - node_id: "nrt-003"
    seq: 1
    question: "過去形の基本イメージは何か？"
    answer: "「切れている（離れている）」。現在から切り離された過去のひとコマを伝えるだけで、現在の状況までは伝わらない"
  - node_id: "nrt-003"
    seq: 2
    question: "Can you...? より Could you...? の方が丁寧な理由は？"
    answer: "過去形の「離れている」イメージから相手との距離感を演出でき、初対面・目上の人に対して丁寧・控えめな印象を与える"
  - node_id: "nrt-003"
    seq: 3
    question: "I have lost my watch. を〈have + Vp.p.〉の分解で説明せよ"
    answer: "「時計をなくした(lost my watch)」ことを「現在もっている(have)」→今でも時計が手元にない"
  - node_id: "nrt-003"
    seq: 4
    question: "現在完了形がyesterday等の特定の過去を表す語句と併用できない理由は？"
    answer: "haveを使っている以上、現在がどうかに重点がある。特定の過去に視点を移す語句とは矛盾する"
  - node_id: "nrt-004"
    seq: 1
    question: "I have visited Okinawa many times. を〈have + Vp.p.〉の分解で説明せよ"
    answer: "「沖縄を何度も訪れた」ことを「現在もっている」→今でも頭に思い出として残っている"
  - node_id: "nrt-004"
    seq: 2
    question: "「経験・継続・完了」と分類することについて本書の見解は？"
    answer: "分類して満足するのではなく、have + Vp.p. の根っこをしっかり理解すべき。いちいち3つの用法に分類する必要はない"
  - node_id: "nrt-004"
    seq: 3
    question: "He has repaired the engine. と He has been repairing the engine. の違いは？"
    answer: "現在完了形は修理が終わっている（完了した状態をもっている）。現在完了進行形はまだ修理中（修理している最中の状態をもっている）"
  - node_id: "nrt-004"
    seq: 4
    question: "He is living in India. と He has been living in India for two weeks. の違いは？"
    answer: "現在進行形は今だけ一時的にインドに住んでいる感じ。現在完了進行形は2週間前から今も住み続けている感じで期間付きの継続を表す"
  - node_id: "nrt-005"
    seq: 1
    question: "過去完了形はどんな時制か？"
    answer: "過去の一時点よりもさらに前の時間帯をカバーする時制。〈had + Vp.p.〉の形"
  - node_id: "nrt-005"
    seq: 2
    question: "I lost my key, but it was found in the store. でなぜ had lost ではなく lost を使うのか？"
    answer: "等位接続詞butで起こった順番通りに並べているだけなので、過去完了形で時間の前後関係を明確にする必要がない。こういう場面で過去完了形を使うのはかえって不自然"
  - node_id: "nrt-005"
    seq: 3
    question: "I went out after my brother had left. の had left は left で代用できるか？"
    answer: "代用できる。afterなど時間の前後関係を明確に表す語句があるときは、過去完了形を使わず過去形で代用可能"
  - node_id: "nrt-005"
    seq: 4
    question: "過去完了形を使うための条件は何か？"
    answer: "前後に過去の一時点を表す表現が必要。それがないのに過去完了形単独の文を用いるのは不適切"
  - node_id: "nrt-006"
    seq: 1
    question: "英語に「未来形」は存在しないとはどういうことか？"
    answer: "現在形(study)や過去形(studied)のような特定の活用形は未来にはない。助動詞など様々な表現を借りて未来時を表す。will+原形は「未来形」ではなく助動詞の用法"
  - node_id: "nrt-006"
    seq: 2
    question: "willの2つの基本用法は？"
    answer: "(1)その場での意志表明「〜しよう」 (2)その場での主観的な推量「きっと〜だろう」（十中八九の確信度）"
  - node_id: "nrt-006"
    seq: 3
    question: "will, may, mightの推量の度合いの違いは？"
    answer: "will=十中八九、may=50%（〜かもしれない）、might=さらに低い（ひょっとして〜かもしれない）"
  - node_id: "nrt-007"
    seq: 1
    question: "be going toの2つの基本用法は？"
    answer: "(1)あらかじめ決まっている確実な予定「〜することになっている」 (2)根拠や兆候をもとにした推量「きっと〜だろう」"
  - node_id: "nrt-007"
    seq: 2
    question: "willとbe going toの「推量」の違いは？"
    answer: "willはその場での主観的判断。be going toは天気予報など何らかの客観的根拠や兆候がある場合に使う"
  - node_id: "nrt-007"
    seq: 3
    question: "現在進行形で未来を表す場合のポイントは？"
    answer: "be going toと同様に確実な予定を表す。tomorrowなど未来を表す語句を伴うのがふつう。個人的な予定を述べる場合に使われることが多い"
  - node_id: "nrt-007"
    seq: 4
    question: "Tomorrow is Sunday. はなぜ現在形で、I will be twenty tomorrow. はなぜwillか？"
    answer: "明日が日曜日なのは変わることのない事実なので現在形。一方、現時点では20歳になっていないので事実ではなく、推量のwillを使う"
  - node_id: "nrt-007"
    seq: 5
    question: "未来完了形〈will have + Vp.p.〉をシンプルに理解するには？"
    answer: "現在完了形に推量の助動詞willが加わったもの。I have finished my work. に by Friday が加わると未来のことなので will を添えて I will have finished my work by Friday. となる"
  - node_id: "nrt-008"
    seq: 1
    question: "if/when節中でwillを使わないのはなぜか？"
    answer: "そうなることを「前提」として述べているから。推量のニュアンスがないため、推量のwillは入らない"
  - node_id: "nrt-008"
    seq: 2
    question: "If you will succeed, you must work hard. でwillが入るのはなぜか？"
    answer: "このwillは推量ではなく「意志」を表すwill。「成功する意志があるのなら」の意味"
  - node_id: "nrt-008"
    seq: 3
    question: "He said (that) light travels/traveled faster than sound. で現在形と過去形の違いは？"
    answer: "現在形(travels)は話者がthat以下を疑いもない事実だと見なしている。過去形(traveled)は事実かどうか疑いを持っているニュアンス。過去形の「距離感」が確信度の差を生む"
  - node_id: "nrt-008"
    seq: 4
    question: "時を表す副詞節を導く主な接続詞は？条件を表すものは？"
    answer: "時: when, after, before, till, until, once, as soon as。条件: if, unless, as long as"
  - node_id: "nrt-009"
    seq: 1
    question: "動詞の原形が使われる4つのパターンは？"
    answer: "(1)命令文 (2)不定詞(to+原形) (3)要求・提案・命令・主張を表す動詞のthat節中 (4)原形を用いた譲歩の構文"
  - node_id: "nrt-009"
    seq: 2
    question: "命令文が動詞の原形で始まるのはなぜか？"
    answer: "命令するのはまだ現実になっていないからこそ。覚えていないから「覚えなさい」と言い、静かでないから「静かにしなさい」と言う。原形の「未実現」イメージと合致する"
  - node_id: "nrt-009"
    seq: 3
    question: "My father requested that I be here. でbeが使われる理由は？"
    answer: "要求はまだ現実になっていないことに対して行うもの。主語の人称や時制にかかわらず動詞の原形を使って未実現を表す"
  - node_id: "nrt-009"
    seq: 4
    question: "that節中の〈should+動詞の原形〉のshouldは省略されたものか？"
    answer: "いいえ。shouldは後から発達したもの（省略ではない）。当然のことや本来あるべき姿を表現するのにぴったりな助動詞"
  - node_id: "nrt-010"
    seq: 1
    question: "Be it ever so humble, there is no place like home. の構造は？"
    answer: "動詞の原形を文頭に置いて譲歩（たとえ〜でも）を表す古風な構文。現代では However humble it may be が一般的"
  - node_id: "nrt-010"
    seq: 2
    question: "時・条件の副詞節で現在形を用いるのは歴史的にどう説明されるか？"
    answer: "元々は動詞の原形が使われていた（If it rain tomorrow...）。原形→現在形に変化した。一般動詞は原形と現在形の形が同じものが多く混同が起きた"
  - node_id: "nrt-010"
    seq: 3
    question: "You be quiet; I'll do the talking. はどう解釈するか？"
    answer: "主語youを残した命令文。「主語が省略されているから原形」では説明不十分。原形の「まだ現実になっていない不確実なこと」というイメージで理解する"

