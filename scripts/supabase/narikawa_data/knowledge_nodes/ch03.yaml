# Part 03: 時制
# パイロット: Nar_03_01

knowledge_nodes:
  - id: "nrt-001"
    name: "現在形の本質（変わらない安定）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 現在形≠現在のこと
      「現在形＝現在のことを表す」は誤解。現在形は必ずしも現在のことだけを表しているわけではない。
      ■ 現在形の核心: 「いつも変わらない、安定していること」
      現在を中心に過去・現在・未来のすべてを幅広くカバーしつつ、変化しない安定した内容を表す時制。
      ❶ 習慣: 菜食主義者が肉を食べないのは昨日も今日も明日も同じ（例文121）
      ❷ 状態: 共和党員であるのは今に限ったことではない（例文122）
      ❸ 不変の真理: 光が音より速いのは昨日も今日も明日も変わらない（例文123, 124）
      ■ 分類は「どうでもよい」（脚注*1）
      英文法では「現在の習慣」「現在の状態」「不変の真理」と分類することがあるが、根っこが同じなら分類はどうでもよい。
      ■ 現在形で確実な未来の予定を表す
      時刻表・開館時刻など、変化しない安定したもの（公的なダイヤ・スケジュール）には現在形を使える。
      個人的なスケジュールより、集団に関わる公的な事柄を表すときに使われるのがふつう。
      [図表: イラスト — 昨日も今日も明日も肉を食べない女性（p.90）]
      [図表: イラスト — 太陽が東から昇る（p.91）]
      [図表: イラスト — ハロッズ開店AM10:00（p.91-92）]
      別冊ポイント072（現在形の4用法まとめ: ❶習慣 ❷状態 ❸不変の真理 ❹確実な未来の予定）参照

