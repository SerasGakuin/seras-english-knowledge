check_points:
  - node_id: "nrt-001"
    seq: 1
    question: "現在形の核心は何か？"
    answer: "いつも変わらない、安定していることを表す。現在を中心に過去・現在・未来を幅広くカバーする。"
  - node_id: "nrt-001"
    seq: 2
    question: "Vegetarians don't eat meat. はなぜ現在形か？"
    answer: "肉を食べないのは昨日も今日も明日も変わらない安定した習慣だから。"
  - node_id: "nrt-001"
    seq: 3
    question: "Harrods opens at 10:00 a.m. tomorrow. でなぜ現在形で未来を表せるか？"
    answer: "開店時刻は毎日変わらない安定した事実だから。明日も同じことが確実に成り立つ。"
  - node_id: "nrt-001"
    seq: 4
    question: "「現在の習慣」「現在の状態」「不変の真理」の分類について、本書はどう述べているか？"
    answer: "根っこが同じ（変わらない安定）なら分類はどうでもよい。"
  - node_id: "nrt-002"
    seq: 1
    question: "進行形の核心イメージは何か？3つの含意を挙げよ"
    answer: "実際に行為が行われている最中・途中。含意: (1)まだ終わっていない (2)近いうちに終わる (3)その気になればすぐに中断できる"
  - node_id: "nrt-002"
    seq: 2
    question: "(✕) I am knowing Bob. がなぜ不可か？"
    answer: "know（知っている）は中断もできず近いうちに終わることもない状態動詞なので、進行形の「最中・途中」のイメージになじまない"
  - node_id: "nrt-002"
    seq: 3
    question: "You are being kind today. はどんなニュアンスか？現在形 You are kind. との違いは？"
    answer: "進行形により「いつになく」一時的に親切であることを強調。現在形はふだんからの変わらない性質を表す"
  - node_id: "nrt-002"
    seq: 4
    question: "進行形がalways等の反復語句と一緒に使われるとどんな意味になるか？"
    answer: "「いつも〜ばかりしている」で、圧倒的に不快感やいら立ちを表すが、まれに称賛の意味にもなる。文脈判断が大切"
  - node_id: "nrt-003"
    seq: 1
    question: "過去形の基本イメージは何か？"
    answer: "「切れている（離れている）」。現在から切り離された過去のひとコマを伝えるだけで、現在の状況までは伝わらない"
  - node_id: "nrt-003"
    seq: 2
    question: "Can you...? より Could you...? の方が丁寧な理由は？"
    answer: "過去形の「離れている」イメージから相手との距離感を演出でき、初対面・目上の人に対して丁寧・控えめな印象を与える"
  - node_id: "nrt-003"
    seq: 3
    question: "I have lost my watch. を〈have + Vp.p.〉の分解で説明せよ"
    answer: "「時計をなくした(lost my watch)」ことを「現在もっている(have)」→今でも時計が手元にない"
  - node_id: "nrt-003"
    seq: 4
    question: "現在完了形がyesterday等の特定の過去を表す語句と併用できない理由は？"
    answer: "haveを使っている以上、現在がどうかに重点がある。特定の過去に視点を移す語句とは矛盾する"
  - node_id: "nrt-004"
    seq: 1
    question: "I have visited Okinawa many times. を〈have + Vp.p.〉の分解で説明せよ"
    answer: "「沖縄を何度も訪れた」ことを「現在もっている」→今でも頭に思い出として残っている"
  - node_id: "nrt-004"
    seq: 2
    question: "「経験・継続・完了」と分類することについて本書の見解は？"
    answer: "分類して満足するのではなく、have + Vp.p. の根っこをしっかり理解すべき。いちいち3つの用法に分類する必要はない"
  - node_id: "nrt-004"
    seq: 3
    question: "He has repaired the engine. と He has been repairing the engine. の違いは？"
    answer: "現在完了形は修理が終わっている（完了した状態をもっている）。現在完了進行形はまだ修理中（修理している最中の状態をもっている）"
  - node_id: "nrt-004"
    seq: 4
    question: "He is living in India. と He has been living in India for two weeks. の違いは？"
    answer: "現在進行形は今だけ一時的にインドに住んでいる感じ。現在完了進行形は2週間前から今も住み続けている感じで期間付きの継続を表す"
  - node_id: "nrt-005"
    seq: 1
    question: "過去完了形はどんな時制か？"
    answer: "過去の一時点よりもさらに前の時間帯をカバーする時制。〈had + Vp.p.〉の形"
  - node_id: "nrt-005"
    seq: 2
    question: "I lost my key, but it was found in the store. でなぜ had lost ではなく lost を使うのか？"
    answer: "等位接続詞butで起こった順番通りに並べているだけなので、過去完了形で時間の前後関係を明確にする必要がない。こういう場面で過去完了形を使うのはかえって不自然"
  - node_id: "nrt-005"
    seq: 3
    question: "I went out after my brother had left. の had left は left で代用できるか？"
    answer: "代用できる。afterなど時間の前後関係を明確に表す語句があるときは、過去完了形を使わず過去形で代用可能"
  - node_id: "nrt-005"
    seq: 4
    question: "過去完了形を使うための条件は何か？"
    answer: "前後に過去の一時点を表す表現が必要。それがないのに過去完了形単独の文を用いるのは不適切"
  - node_id: "nrt-006"
    seq: 1
    question: "英語に「未来形」は存在しないとはどういうことか？"
    answer: "現在形(study)や過去形(studied)のような特定の活用形は未来にはない。助動詞など様々な表現を借りて未来時を表す。will+原形は「未来形」ではなく助動詞の用法"
  - node_id: "nrt-006"
    seq: 2
    question: "willの2つの基本用法は？"
    answer: "(1)その場での意志表明「〜しよう」 (2)その場での主観的な推量「きっと〜だろう」（十中八九の確信度）"
  - node_id: "nrt-006"
    seq: 3
    question: "will, may, mightの推量の度合いの違いは？"
    answer: "will=十中八九、may=50%（〜かもしれない）、might=さらに低い（ひょっとして〜かもしれない）"
  - node_id: "nrt-007"
    seq: 1
    question: "be going toの2つの基本用法は？"
    answer: "(1)あらかじめ決まっている確実な予定「〜することになっている」 (2)根拠や兆候をもとにした推量「きっと〜だろう」"
  - node_id: "nrt-007"
    seq: 2
    question: "willとbe going toの「推量」の違いは？"
    answer: "willはその場での主観的判断。be going toは天気予報など何らかの客観的根拠や兆候がある場合に使う"
  - node_id: "nrt-007"
    seq: 3
    question: "現在進行形で未来を表す場合のポイントは？"
    answer: "be going toと同様に確実な予定を表す。tomorrowなど未来を表す語句を伴うのがふつう。個人的な予定を述べる場合に使われることが多い"
  - node_id: "nrt-007"
    seq: 4
    question: "Tomorrow is Sunday. はなぜ現在形で、I will be twenty tomorrow. はなぜwillか？"
    answer: "明日が日曜日なのは変わることのない事実なので現在形。一方、現時点では20歳になっていないので事実ではなく、推量のwillを使う"
  - node_id: "nrt-007"
    seq: 5
    question: "未来完了形〈will have + Vp.p.〉をシンプルに理解するには？"
    answer: "現在完了形に推量の助動詞willが加わったもの。I have finished my work. に by Friday が加わると未来のことなので will を添えて I will have finished my work by Friday. となる"
  - node_id: "nrt-008"
    seq: 1
    question: "if/when節中でwillを使わないのはなぜか？"
    answer: "そうなることを「前提」として述べているから。推量のニュアンスがないため、推量のwillは入らない"
  - node_id: "nrt-008"
    seq: 2
    question: "If you will succeed, you must work hard. でwillが入るのはなぜか？"
    answer: "このwillは推量ではなく「意志」を表すwill。「成功する意志があるのなら」の意味"
  - node_id: "nrt-008"
    seq: 3
    question: "He said (that) light travels/traveled faster than sound. で現在形と過去形の違いは？"
    answer: "現在形(travels)は話者がthat以下を疑いもない事実だと見なしている。過去形(traveled)は事実かどうか疑いを持っているニュアンス。過去形の「距離感」が確信度の差を生む"
  - node_id: "nrt-008"
    seq: 4
    question: "時を表す副詞節を導く主な接続詞は？条件を表すものは？"
    answer: "時: when, after, before, till, until, once, as soon as。条件: if, unless, as long as"
  - node_id: "nrt-009"
    seq: 1
    question: "動詞の原形が使われる4つのパターンは？"
    answer: "(1)命令文 (2)不定詞(to+原形) (3)要求・提案・命令・主張を表す動詞のthat節中 (4)原形を用いた譲歩の構文"
  - node_id: "nrt-009"
    seq: 2
    question: "命令文が動詞の原形で始まるのはなぜか？"
    answer: "命令するのはまだ現実になっていないからこそ。覚えていないから「覚えなさい」と言い、静かでないから「静かにしなさい」と言う。原形の「未実現」イメージと合致する"
  - node_id: "nrt-009"
    seq: 3
    question: "My father requested that I be here. でbeが使われる理由は？"
    answer: "要求はまだ現実になっていないことに対して行うもの。主語の人称や時制にかかわらず動詞の原形を使って未実現を表す"
  - node_id: "nrt-009"
    seq: 4
    question: "that節中の〈should+動詞の原形〉のshouldは省略されたものか？"
    answer: "いいえ。shouldは後から発達したもの（省略ではない）。当然のことや本来あるべき姿を表現するのにぴったりな助動詞"
  - node_id: "nrt-010"
    seq: 1
    question: "Be it ever so humble, there is no place like home. の構造は？"
    answer: "動詞の原形を文頭に置いて譲歩（たとえ〜でも）を表す古風な構文。現代では However humble it may be が一般的"
  - node_id: "nrt-010"
    seq: 2
    question: "時・条件の副詞節で現在形を用いるのは歴史的にどう説明されるか？"
    answer: "元々は動詞の原形が使われていた（If it rain tomorrow...）。原形→現在形に変化した。一般動詞は原形と現在形の形が同じものが多く混同が起きた"
  - node_id: "nrt-010"
    seq: 3
    question: "You be quiet; I'll do the talking. はどう解釈するか？"
    answer: "主語youを残した命令文。「主語が省略されているから原形」では説明不十分。原形の「まだ現実になっていない不確実なこと」というイメージで理解する"
  - node_id: "nrt-011"
    seq: 1
    question: "助動詞の2つの意味とは？"
    answer: "(1)主語の気持ちや主観を表す (2)ある行為を他者（第三者）がどう思っているか（客観的な推量）を表す"
  - node_id: "nrt-011"
    seq: 2
    question: "willの2つの意味を結婚式の例で説明せよ"
    answer: "(1)意志表明: I will.（新婦が夫とすることを意志表明） (2)推量: She will be happy.（参列者が「きっと幸せになるだろう」と推量）。意志表明したからには→きっとやるだろうという流れ"
  - node_id: "nrt-011"
    seq: 3
    question: "mayの2つの意味は？"
    answer: "(1)許可「〜してもよろしい」 (2)推量「〜するかもしれない」。許可されているなら→やるかもしれない"
  - node_id: "nrt-011"
    seq: 4
    question: "mustの2つの意味は？"
    answer: "(1)義務「〜しなければならない」 (2)確信「〜に違いない」。〜しなければならないと言っているなら→その人は〜するに違いない"
  - node_id: "nrt-012"
    seq: 1
    question: "mayの許可用法はどんな場面で使われるか？友人同士では？"
    answer: "上司と部下、大人と子どものように上下関係のある場面で使われることが多い。友人同士のカジュアルな許可にはcanを使う。You may...は高圧的な印象"
  - node_id: "nrt-012"
    seq: 2
    question: "mayの推量の確信度はどの程度か？"
    answer: "50%、降水確率50%の感覚。どっちだかわからない半々な気持ちを表す"
  - node_id: "nrt-012"
    seq: 3
    question: "may notの2つの意味は？"
    answer: "(1)許可の否定「〜してはいけない」（軽い禁止、must notより柔らかい） (2)推量の否定「〜ではないかもしれない」"
  - node_id: "nrt-012"
    seq: 4
    question: "推量のmayを疑問文で使えるか？May～?は何の意味か？"
    answer: "推量のmayは疑問文で使えない。May～?は許可の意味。推量の疑問にはlikelyなどを使う（Are there likely to be any problems?）"
  - node_id: "nrt-013"
    seq: 1
    question: "may well+Vの2つの意味は？"
    answer: "(1)推量+well（強意）→「Vする可能性は十分ある」（50%→70-80%にアップ） (2)許可+well（強意）→「Vしてもおかしくない、当然だ」"
  - node_id: "nrt-013"
    seq: 2
    question: "may as well+Vはどんなニュアンスか？had betterとの違いは？"
    answer: "「やらない理由も特にないのでVでもしようか」という消極的な表現。had betterは「Vしないとまずいことになる」という積極的理由がある全く別物"
  - node_id: "nrt-013"
    seq: 3
    question: "may as well V₁ as V₂の意味は？"
    answer: "「V₂するくらいならV₁した方がましだ」。V₁とV₂は大差ないがwellがある分V₁がまだまし。V₁にありえない表現→mightが好まれる"
  - node_id: "nrt-013"
    seq: 4
    question: "祈りのmayの語順の特徴は？"
    answer: "主語の前にmayが置かれる（May you always be happy!）。ただし現代ではI hope...の方が一般的"
  - node_id: "nrt-013"
    seq: 5
    question: "mayをmightに変えるとどう変わるか？"
    answer: "距離感のあるやや控えめな印象になる（過去形の距離感）。確信度も下がる"
  - node_id: "nrt-014"
    seq: 1
    question: "canの2つの基本用法と、それぞれの否定形の意味は？"
    answer: "(1)実現の可能性「（その気になれば）〜できる」⇔can't「〜できない」 (2)理論上の可能性「（時に）〜する可能性がある」⇔can't「〜のはずがない」"
  - node_id: "nrt-014"
    seq: 2
    question: "canの応用用法2つは？mayの許可との違いは？"
    answer: "(3)軽い許可「〜してもいいよ」: カジュアルで友人同士など対等な関係で使う。mayは上下関係が意識される。(4)強い疑い「一体〜だろうか」: canを疑問文で使う"
  - node_id: "nrt-014"
    seq: 3
    question: "canとbe able toの違いは？助動詞を併用する場合は？"
    answer: "can=実現の可能性を強調。be able to=能力(ability)を強調。会話ではcanが頻繁。受動態もcan。助動詞同士は併用不可なので「〜できるだろう」はwill be able to V"
  - node_id: "nrt-014"
    seq: 4
    question: "過去の1回限りの行為で「Vできた」を表すには？couldが不可な理由は？"
    answer: "was[were] able to V / managed to V を使う。couldは実現の可能性があったことを伝えるだけで、その行為が実際に行われたかは不明だから。否定文ではcouldとwas able toはほぼ同じ意味"
  - node_id: "nrt-015"
    seq: 1
    question: "mustの2つの基本用法は？推量のmustの制限は？"
    answer: "(1)話し手の判断「〜しなければならない」（自発的） (2)話し手の推量「〜に違いない」。推量は現在の状況に対して用いるのが原則で、未来の推量には使えない（(✕) It must rain tomorrow.）"
  - node_id: "nrt-015"
    seq: 2
    question: "mustとhave toの違いは？"
    answer: "must=話し手の自発的な判断で「〜しなければならない」。have to=外部のさまざまな圧力があるせいで「仕方なしに〜しなければならない」。have toは助動詞ではなく一般動詞の延長線"
  - node_id: "nrt-015"
    seq: 3
    question: "must notとdon't have toの意味の違いは？"
    answer: "must not=禁止「〜してはいけない」。don't have to=不必要「〜する必要はない」。否定形で意味が大きく異なるので注意"
  - node_id: "nrt-015"
    seq: 4
    question: "「〜しなければならなかった」はどう表現するか？"
    answer: "mustには過去形がないため、had toを使う"
  - node_id: "nrt-016"
    seq: 1
    question: "shallの基本イメージは？現代で使われる場面は？"
    answer: "「（神の力や法律、運命など、個人の意志をはるかに超えたレベルで）当然〜すべき、当然〜になる」。法律の条文、Shall I〜？/ Shall we〜？の定型表現以外ではほぼ使われない絶滅の危機にある助動詞"
  - node_id: "nrt-016"
    seq: 2
    question: "shouldの2つの用法は？mustと比べた印象は？"
    answer: "(1)話し手の判断「当然〜した方がいい」（助言・アドバイス） (2)話し手の推量「当然〜のはずだ」。shallの過去形でマイルドになったもの。mustやshallと比べるとだいぶマイルド"
  - node_id: "nrt-016"
    seq: 3
    question: "ought to Vについて知っておくべきことは？"
    answer: "shouldとほぼ同じ意味で使える（判断・推量どちらも）。否定形はought not to V（notの位置がtoの前であることに注意）"
  - node_id: "nrt-017"
    seq: 1
    question: "要求・提案のthat節中でshouldが使われる理由は？動詞の原形でも可能な理由は？"
    answer: "要求・提案するときは「当然〜した方がいい」と思っているからshouldが入る。提案段階ではまだ実現していないので、昔の仮定法である動詞の原形も使える"
  - node_id: "nrt-017"
    seq: 2
    question: "判断のthat節と感情のthat節でのshouldの違いは？"
    answer: "判断(necessary等): 「当然だ」の裏にある話し手の気持ちを反映→原形も可。感情(surprising等): 「当然」の期待が裏切られ→意外・驚き・残念→事実なら直説法（現在形・過去形）も可"
  - node_id: "nrt-017"
    seq: 3
    question: "Why should he go for you? はどんな気持ちを表すか？"
    answer: "「当然〜すべきなのか？？」→意外な気持ちの強調。「どうして彼が君の代わりに行かねばならないのか」"
  - node_id: "nrt-017"
    seq: 4
    question: "このセクションのshouldはought toに書き換えできるか？"
    answer: "できない。that節中のshouldの応用用法はought toに書き換え不可"
  - node_id: "nrt-018"
    seq: 1
    question: "推量の助動詞の3本柱と確信度は？"
    answer: "must「〜に違いない」（確信度≒100%）、may「〜かもしれない」（確信度≒50%）、can't「〜のはずはない」（確信度≒0%）"
  - node_id: "nrt-018"
    seq: 2
    question: "推量のmayをmightにすると過去の意味になるか？何が変わるか？"
    answer: "過去の意味にはならない。過去形の「距離感」で確率が下がるだけ。「〜だったかもしれない」にはならない"
  - node_id: "nrt-018"
    seq: 3
    question: "確信度の細分化（脚注*1）の順序は？"
    answer: "must＞will＞may well＞may＞might＞can't＞couldn't"
  - node_id: "nrt-018"
    seq: 4
    question: "助動詞の過去形が単独で過去を表せる場面は？"
    answer: "実に少ない。will→wouldは過去の習慣など一部、can→couldはcouldn'tなど一部に限る。may→mightやshall→shouldはほぼ過去の意味にならない。mustとneedはそもそも過去形がない"
  - node_id: "nrt-019"
    seq: 1
    question: "〈推量の助動詞+have+Vp.p.〉の〈have+Vp.p.〉は現在完了形と同じか？"
    answer: "別物。「過去の意味(Vp.p.)をもたせる(have)」ための形。推量の助動詞は過去形にしても過去にならないので、この形で過去の推量を表す"
  - node_id: "nrt-019"
    seq: 2
    question: "〈should+have+Vp.p.〉の2つの意味は？否定形は？"
    answer: "(1)過去への後悔「〜すべきだったのに（実際にはしなかった）」 (2)過去への推量「〜したはずだ」。否定形はshould not have+Vp.p. [ought not to have+Vp.p.]"
  - node_id: "nrt-019"
    seq: 3
    question: "一般動詞needと助動詞needの違いは？"
    answer: "一般動詞need: 肯定・否定・疑問すべてで使え、過去形もある（didn't need to）。助動詞need: 肯定文では使えず、否定文(need not go)と疑問文(Need he go?)のみ。過去形がないため〈need not+have+Vp.p.〉で過去を表す"
  - node_id: "nrt-019"
    seq: 4
    question: "〈need not+have+Vp.p.〉の意味は？"
    answer: "「〜する必要はなかったのに（実際はした）」。助動詞needには過去形がないため〈have+Vp.p.〉で過去の意味を表す"
  - node_id: "nrt-020"
    seq: 1
    question: "wouldとused toの動詞制限の違いは？"
    answer: "wouldは動作動詞のみ、used toは動作動詞・状態動詞の両方で使える"
  - node_id: "nrt-020"
    seq: 2
    question: "She used to drive to work, but now she doesn't. のused toをwouldに変えられるか？"
    answer: "変えられない。現在との対比で述べるときにwouldは使えず、used toのみ可"
  - node_id: "nrt-020"
    seq: 3
    question: "\"used to\"3兄弟を挙げよ"
    answer: "(1) used to V「かつてVだった」 (2) be used to Ving「Vすることに慣れている」 (3) 受動態のwas used「使われた」"
  - node_id: "nrt-020"
    seq: 4
    question: "would/used toと一緒に使えない語句の種類は？"
    answer: "three timesのような具体的な回数や、for two yearsのような具体的な期間を示す語句"
  - node_id: "nrt-021"
    seq: 1
    question: "had betterの否定形は？"
    answer: "had better not+V。notはbetterの後ろ、Vの前に置く"
  - node_id: "nrt-021"
    seq: 2
    question: "I cannot praise the food too much. のtoo muchをenoughやover-で書き換えよ"
    answer: "I cannot praise the food enough. / I cannot overpraise the food."
  - node_id: "nrt-021"
    seq: 3
    question: "cannot help Vingのhelpはどういう意味か？"
    answer: "「〜を避ける」の意味。「Vすることを避けられない → ついついVしてしまう」"
  - node_id: "nrt-021"
    seq: 4
    question: "cannot help Vingの同義表現を2つ挙げよ"
    answer: "cannot help but V, cannot but V（butは「〜以外」の意味）"
  - node_id: "nrt-022"
    seq: 1
    question: "won'tとwouldn'tの意味の違いは？"
    answer: "won't「どうしても〜しようとしない」（現在の意志の否定）、wouldn't「どうしても〜しようとしなかった」（過去の意志の否定）"
  - node_id: "nrt-022"
    seq: 2
    question: "The key wouldn't turn. でモノにwouldn'tを使えるのはなぜか？"
    answer: "あたかも意志があるかのように擬人化して使っている"
  - node_id: "nrt-022"
    seq: 3
    question: "would rather V₁ than V₂の意味は？"
    answer: "「V₂するよりはV₁したい」"
  - node_id: "nrt-022"
    seq: 4
    question: "How dare you speak to me like that? はどういう意味か？"
    answer: "「よくもそんなふうに私に話しかけられるね」（他者への憤慨を表す）"

