# Part 03-05: 時制・助動詞・仮定法 (nrt)
# パイロット: Nar_03_01

knowledge_nodes:
  - id: "nrt-001"
    name: "現在形の本質（変わらない安定）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 現在形≠現在のこと
      「現在形＝現在のことを表す」は誤解。現在形は必ずしも現在のことだけを表しているわけではない。
      ■ 現在形の核心: 「いつも変わらない、安定していること」
      現在を中心に過去・現在・未来のすべてを幅広くカバーしつつ、変化しない安定した内容を表す時制。
      ❶ 習慣: 菜食主義者が肉を食べないのは昨日も今日も明日も同じ（例文121）
      ❷ 状態: 共和党員であるのは今に限ったことではない（例文122）
      ❸ 不変の真理: 光が音より速いのは昨日も今日も明日も変わらない（例文123, 124）
      ■ 分類は「どうでもよい」（脚注*1）
      英文法では「現在の習慣」「現在の状態」「不変の真理」と分類することがあるが、根っこが同じなら分類はどうでもよい。
      ■ 現在形で確実な未来の予定を表す
      時刻表・開館時刻など、変化しない安定したもの（公的なダイヤ・スケジュール）には現在形を使える。
      個人的なスケジュールより、集団に関わる公的な事柄を表すときに使われるのがふつう。
      [図表: イラスト — 昨日も今日も明日も肉を食べない女性（p.90）]
      [図表: イラスト — 太陽が東から昇る（p.91）]
      [図表: イラスト — ハロッズ開店AM10:00（p.91-92）]
      別冊ポイント072（現在形の4用法まとめ: ❶習慣 ❷状態 ❸不変の真理 ❹確実な未来の予定）参照

  - id: "nrt-002"
    name: "進行形の本質（行為の最中・途中）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 進行形のイメージ: 実際に行為が行われている最中・途中
      〈be+Ving〉の形。最中・途中 → (1)まだ終わっていない (2)近いうちに終わる (3)その気になればすぐに中断できる。
      3つすべてでなくても、どれか1つがあてはまればよい。
      ■ 「〜している＝進行形」ではない
      She usually wears red（現在形＝いつもの安定）/ she is wearing white（進行形＝一時的な行為）。日本語の「〜している」に惑わされないこと。
      ■ 状態動詞は進行形になじみにくい
      know（知っている）等の状態動詞を進行形で用いるのは原則不可。理由: すぐに中断できず、近いうちに終わることもないから。
      (✕) I am knowing Bob. — Bobのことを知っている人に「すぐに記憶から消して！」は無茶。
      ■ be動詞の進行形（一時的な状態を強調）
      状態動詞でも一時的であることを強調したいときには進行形を用いることがある。
      You are kind.（ふだんからの性質） vs You are being kind today.（いつになく一時的に親切）。
      冒頭の wear も同様: 状態動詞とされるが、進行形で「いつになく」のニュアンスを出せる。
      ■ 進行形+always等で不快感・いら立ち
      always, continually, foreverなどの反復語句と進行形が一緒に使われると「いつも〜ばかりしている」のニュアンス。圧倒的に不快感・いら立ちを表すが、まれに称賛にもなる。文脈判断が大切。
      [図表: イラスト — サラの赤い服(現在形)と白い服(進行形)（p.93）]
      [図表: イラスト — ジョンが映画に行く場面。非難(受験生の親)と称賛(映画監督志望の大学生)の両方（p.95）]
      参考書内参照: →このPARTの7（現在進行形が確実な未来の予定を表す用法）
      別冊ポイント075（進行形の5用法: ❶最中・途中 ❷一時的な状態を強調 ❸不快感やいら立ち・賞賛 ❹確実な予定 ❺まだ終わっていない）、076（進行形になりにくい動詞＝状態動詞: ❶状態・所有・所属系 ❷知覚系 ❸思考・認識系 ❹現在形or進行形のどちらでも用いられる動詞）参照

  - id: "nrt-003"
    name: "過去形と現在完了形の基本的違い"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 過去形の基本イメージ: 切れている（離れている）
      過去形は、現在から切り離された過去のひとコマを伝える。
      Paul loved Tiffany.（過去形）→ 以前は愛していたが今は愛情がない感じ。現在の2人の関係ははっきりしない。
      ■ 過去形で丁寧さ・控えめな気持ちを表す
      Can you...? より Could you...? の方が丁寧。親しい間柄では言葉はそれほど丁寧でなくてよいが、初対面・目上の人に対しては過去形を使うことで相手との距離感を演出できる。
      脚注*1: この考え方で仮定法のときに過去形が用いられる理由もしっかり説明できるようになる（→p.157参照）。
      ■ 現在完了形の理解: 〈have + Vp.p.〉の分解
      have = 「現在もっている」、Vp.p. = 「すでに過去にVした」。この2つの足し算で理解する。
      I have lost my watch. → 「時計をなくした（lost my watch）」ことを「現在もっている（have）」→ 今でも時計が手元にない。
      ■ 現在に重点がある
      haveを使っている以上、現在がどうなのかに重点がある。yesterdayやwhen I was in Londonのような特定の過去を表す語句と併用できないのは当然。
      脚注*2: ベートーベンのような故人を主語にした現在完了形は不適切とされるが、あえて使えば現在も身近に感じられていることを表せる。
      脚注*3: since yesterday（昨日以来）のように、現在へとつなぐsinceを用いれば現在完了形を使える。
      [図表: イラスト — Can you..?（カジュアル）vs Could you..?（丁寧）の比較（p.96）]
      参考書内参照: →p.157〈仮定法〉
      別冊ポイント073（過去形の3用法: ❶現在と切れている＝過去のこと ❷現実から離れている＝仮定法 ❸人間関係が離れている＝丁寧表現）、077（現在完了形の3用法+プラスα: 特定の過去を表す語句と併用不可）参照

  - id: "nrt-004"
    name: "現在完了形の深化と完了進行形"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ いちいち3つの用法に分類する必要はない
      現在完了形を「経験・継続・完了・結果」と分類して満足するのではなく、have+Vp.p. の根っこから統一的に理解する。
      I have visited Okinawa many times. → 訪れたことを現在もっている → 今でも思い出として頭に残っている
      I have known her since she was a girl. → 知り合ったことを現在もっている → 今でも関係が続いている
      I have just finished my homework. → 終えたことを現在もっている → 宿題を終えた状態が今ある
      ■ 現在進行形 vs 現在完了進行形
      He is living in India. → 今だけ一時的にインドに住んでいる感じ（現在進行形）
      He has been living in India for two weeks. → 2週間前から今も住み続けている感じ（現在完了進行形）。「住み続けている状況を現在もっている」。
      ■ 現在完了形 vs 現在完了進行形
      He has repaired the engine. → 修理が終わっている（have + 過去分詞 → 完了した状態をもっている）
      He has been repairing the engine. → まだ修理中（have + been Ving → 修理している最中の状態をもっている）
      ■ 過去形と現在完了形のまとめ
      過去形: 切れている（離れている）感じ
      現在完了形: 「Vp.p.（過去にVしたこと）をhave（現在もっている）」が基本。過去の事柄が何らかの意味で現在とつながりをもつ。
      [図表: イラスト — 男女2人の知り合い（p.98）]
      [図表: イラスト — エンジン修理完了（p.99）]
      [図表: イラスト — エンジン修理中（p.99）]
      別冊ポイント077（現在完了形の3用法: ❶経験 ❷完了・結果 ❸継続）、078（動作動詞の現在完了形と現在完了進行形: 完了 vs 未完了）、079（have been to A と have gone to A の違い）参照

  - id: "nrt-005"
    name: "過去完了形の正しい理解と使い方"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 過去完了形: 過去の一時点よりもさらに前の時間帯をカバー
      〈had + Vp.p.〉の形。例: The plane had already left when I got to Haneda Airport.
      got（過去の一時点）よりも前にhad left（さらに前の事柄）。
      ■ 過去完了形の乱用はやめよう
      過去の一時点より前のことはすべて過去完了形にすべきと考えるのは誤り。
      I lost my key, but it was found in the store. → 等位接続詞butで起こった順番通りに並べているだけなので、had lostにする必要なし。かえって不自然。
      ■ before/afterがあれば過去形で代用可能
      I went out after my brother had left. → leftでもOK。時間の前後関係を明確に表す語句があるので過去完了形は不要。
      ■ 過去完了形を使うための条件
      前後に過去の一時点を表す表現が必要。それがないのに過去完了形単独の文を用いるのは不適切。
      [図表: イラスト — 飛行機が飛び立つ場面（p.100）]
      [図表: イラスト — 先生と犬（p.102）]
      別冊ポイント080（過去完了形の用法: ❶さらに前の事柄をカバー ❷等位接続詞で順番通りなら過去完了は不要）参照

  - id: "nrt-006"
    name: "未来形は存在しない — willの基本用法"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 英語に未来形は存在しない
      現在形(study)や過去形(studied)のような特定の活用形は未来にはない（(✕) studyllのような「未来形」はない）。助動詞などさまざまな表現を借りて未来時を表す。借りてくる表現によって伝わる意味も違う。
      ■ willの基本イメージ: その場での意志表明
      I will go to Kyoto next month!（京都に行くわ！）。名詞のwill=「意志」からも連想できる。
      ■ willの推量用法
      意志表明を聞いた側から見れば「きっと〜だろう」という推量になる。willの推量は確信度が高く「十中八九」。
      willの推量はbe going toに比べて話者の主観的判断のニュアンスが強く、その場でとっさに判断している感じが特徴。
      ■ 推量の度合い: will > may > might
      will「きっと〜だろう」（十中八九）→ may「〜かもしれない」（50%）→ might「ひょっとして〜かもしれない」（さらに低い）
      ■ will ≠ be going to
      「will＝be going to」のような単純な書き換えでは済まされない（次セクションで詳述）。
      [図表: イラスト — 意志表明(I will go)と推量(She will go)の対比（p.104）]
      [図表: イラスト — 寝転がって本を読む男性（p.105）]
      別冊ポイント074（未来時を表すさまざまな表現: ❶will ❷be going to ❸現在進行形 ❹現在形 ❺be about to ❻be scheduled to）参照

  - id: "nrt-007"
    name: "未来時表現の全体像（be going to・進行形・その他）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ be going to の2つの用法
      (1) あらかじめ決まっている確実な予定「〜することになっている」。手帳やカレンダーに書き込まれたスケジュール。
      (2) 根拠や兆候をもとにした推量「きっと〜だろう」。willの主観的判断とは異なり、客観的根拠に基づく。
      例: It will rain（主観的推量）vs It is going to rain（天気予報などの根拠に基づく推量）
      ■ 現在進行形で未来の確実な予定
      be going toと同様に確実な予定を表す。tomorrowなど未来を表す語句を伴うのがふつう。個人的な予定を述べる場合に使われることが多い。
      ■ 現在形で未来を表す（変わらない事実）
      Tomorrow is Sunday. → 変わることのない事実なので現在形。
      I will be twenty tomorrow. → 現時点では20歳ではないので推量のwillを使う。
      ■ その他の未来時表現
      be about to V「まさにVするところだ」: aboutは「周囲・周辺」→間近な感じ。
      be supposed to V「（前提として）Vすることになっている」
      be scheduled to V「Vすることが計画されている」
      ■ 未来完了形
      〈will have + Vp.p.〉= 現在完了形に推量の助動詞willが加わったもの。
      I have finished my work. + by Friday → I will have finished my work by Friday.
      脚注*2: 未来完了進行形はあまり用いず、未来完了形を用いるのが通例。
      脚注*3: 推量の度合いを下げたければwillをmayなどに変えることもできる。
      [図表: イラスト — be going toの意志表明と推量（p.106）]
      [図表: イラスト — will rain vs is going to rainの対比（p.107）]
      参考書内参照: →p.91（現在形で未来を表す用法）
      別冊ポイント074（未来時を表すさまざまな表現の6種類）参照

  - id: "nrt-008"
    name: "時・条件の副詞節中の時制と時制の一致"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ if/when節中でwillを使うかどうかの判断基準: 「前提」vs「推量」
      willの推量用法を理解していれば、公式の丸暗記は不要。
      ・そうなることを「前提」にして述べている → 推量のwillは入らない（現在形を使う）
      ・そうなるかどうか「はっきりしていない（グレー）」→ 推量のwillを入れる
      例: I will discuss the matter if he comes home.（帰宅を前提→comes）
      　　I don't know if he will come home.（帰宅するか不明→will come）
      ■ willの「意志」用法なら副詞節中でも使える
      If you will succeed, you must work hard.（成功する意志があるなら）。
      推量ではなく主語の意志を表すwillなので入って当然。ただし入試での出題はきわめてまれ（脚注*3）。
      ■ 時を表す副詞節の主な接続詞
      when, after, before, till, until, once, as soon as（脚注*1）
      条件を表す副詞節: if, unless, as long as
      ■ 時制の一致
      主節の動詞が過去形のとき、従属節の動詞も過去形に合わせる約束事。ただし絶対的ではない。
      He said (that) light travels faster than sound.（現在形 → 話者が疑いもない事実だと見なしている）
      He said (that) light traveled faster than sound.（過去形 → 事実かどうか疑いを持っているニュアンス）
      過去形の「距離感」が事実への確信度の差を生む。「不変の真理は時制の一致を受けない」という公式は不正確。
      [図表: イラスト — 「7時だからもう帰ってくるころね」(前提)と「いつ帰ってくるのかしら」(推量)の対比（p.110）]
      [図表: イラスト — メガネの男性（p.112）]
      参考書内参照: →p.103（willの推量用法）、→p.117（副詞節で現在形を用いる歴史的理由）

  - id: "nrt-009"
    name: "動詞の原形の本質（まだ現実でない不確定な事柄）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 動詞の原形が表すもの: まだ現実になっていない不確実なこと
      動詞の原形が使われる4つのパターンすべてに共通するイメージ。
      ■ パターン1: 命令文
      Memorize a lot of English words. — 命令するのはまだ現実になっていないから。覚えていないからこそ「覚えなさい」と言う。
      ■ パターン2: 不定詞（to+動詞の原形）
      I promised to do it today. — to do it todayの行為はまだ現実になっていない。
      ■ パターン3: 要求・提案・命令・主張を表す動詞のthat節中
      My father requested that I be here. — 要求はまだ現実になっていないことに対して行うもの。
      主語の人称や時制にかかわらず動詞の原形を用いる。
      のちに〈should+動詞の原形〉という形も発達した。shouldは後から加わったもの（省略ではない）。
      脚注*1: 「仮定法現在」と呼ばれることがあるが、「仮定法原形」の方が適切。
      ■ パターン4: 原形を用いた譲歩の構文
      Be it ever so humble, there is no place like home. — 文頭に原形を置いて「たとえ〜でも」の意味。（詳細は次セクション）
      参考書内参照: →PART 04 **6**（shouldの基本用法）、→PART 04 **7**（要求・提案のthat節中のshould）

  - id: "nrt-010"
    name: "動詞の原形の応用（譲歩構文と副詞節の歴史的背景）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 原形を用いた譲歩の構文
      Be it ever so humble, there is no place like home. — 動詞の原形を文頭に置いて「たとえ〜でも」。
      現実にそうだと伝えているのではなく、不確実なこと（まだ現実になっていないこと）を表現。
      脚注*1: 非常に古風な表現。同じ内容は However humble it may be が一般的。
      ■ Believe it or not — 原形の別例
      Believe it or not, he asked me to marry him! — 文頭の believe も原形。信じるという行為がまだ現実のものになっていない。
      脚注*2: Whether you believe it or not に書き換え可能。
      ■ 時・条件の副詞節で現在形を用いる歴史的背景
      16世紀あたりの文献では、時や条件の副詞節中に動詞の原形を使っていた。
      ▶ If it rain tomorrow, we'll stay at home.（原形rain — 主語が3人称単数でも原形）
      雨が降るのはまだ現実になっていない不確定なことなので、原形を使うのは自然。
      時間の経過とともに原形→現在形に変化した。一般動詞は原形と現在形の形が同じものが多く、混同があったと思われる。
      ■ 命令文で主語youが残る例
      You be quiet; I'll do the talking. — 「主語youが省略されているから原形」という説明では不十分。
      原形の「未実現」イメージで理解する方が英語の運用に有効。
      参考書内参照: →p.114（例文172の初出）

  # --- Part 04: 助動詞 ---

  - id: "nrt-011"
    name: "助動詞の2つの意味（主観と客観的推量）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 助動詞の定義: 話し手の気持ちや主観を色濃く表す
      「動詞を助けるもの」ではない。助動詞を使うことで話し手の気持ちが伝わる。
      e176（現在形: 毎朝ジョギング=安定した習慣）vs e177（will: 今週末ジョギングするぞ=強い意志）
      ■ 助動詞の2つの意味
      (1) 主語の気持ちや主観を表す。
      (2) ある行為を他者（第三者）がどう思っているか（客観的な推量）を表す。
      例: 結婚式の場面 — I will.（意志表明） → She will be happy.（参列者の推量）
      ■ 主要助動詞の意味表（主観→推量の流れ）
      will: 〜しよう（意志表明）→ きっと〜するだろう
      may: 〜してもよろしい（許可）→ 〜するかもしれない
      can: 〜できる（実現の可能性）→ 〜する可能性がある（理論上の可能性）
      must: 〜しなければならない → 〜するに違いない（確信）
      should: （当然）〜した方がよい → （当然）〜するはずだ
      [図表: イラスト — 毎日走る人(現在形)と日曜日にジョギングするぞと意志表明する人(will)（p.120）]
      [図表: イラスト — 結婚式でI willと意志表明する新婦(主観)と「きっと幸せになるね」と推量する参列者(推量)（p.121）]
      参考書内参照: →p.103（助動詞willの推量用法はPART 03を参照）
      別冊ポイント084（助動詞の定義: ❶主観 ❷客観的推量）、085（主要助動詞の意味表）参照

  - id: "nrt-012"
    name: "助動詞mayの基本用法（許可と推量）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ mayの許可用法: 「上から目線」の許可
      〈障害や妨げが全くないので〉やってよろしい。
      上司と部下、大人と子どものように上下関係がある場面で使われることが多い。
      友人同士のカジュアルな許可にはcanを使う（脚注*1）。
      You may...は高圧的な印象すら漂うので使う場面に注意。
      ■ mayの推量用法: 降水確率50%の感覚
      どっちだかわからない半々な気持ちを表す。
      e181: He may go home.（許可をもらったからといって帰るとは限らない→推量）
      ■ mayの基本用法まとめ
      (1) 許可「〜してもよろしい」⇔ may not「〜してはいけない（軽い禁止）」
      (2) 推量「〜するかもしれない（確率50%）」⇔ may not「〜ではないかもしれない（否定の推量）」
      ■ 推量のmayは疑問文で使えない
      May～?は許可の意味。推量の疑問にはlikelyなどを使う。
      ■ may not（軽い禁止）vs must not
      may notの方がやや柔らかい印象。規則で禁止している場合に用いることが多い。
      ■ mightとの関係
      mayを過去形mightにしても過去の意味は表さない。単に確信度が低くなるだけ。
      [図表: イラスト — 「You may go home.」許可の場面（上司→部下）と「He may go home.」推量の場面（同僚同士）（p.123）]
      [図表: イラスト — 「I may go.」五分五分の気持ち（p.124）]
      別冊ポイント086（mayの基本用法: ❶許可⇔may not ❷推量≒might⇔may not、推量は疑問文不可）参照

  - id: "nrt-013"
    name: "mayを用いた重要表現"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ may [might] well+V: mayの基本用法にwell（強意）が加わる
      (1) 推量+well → 50%→70-80%にアップ。「Vする可能性は十分ある」
      (2) 許可+well → 「Vしてもおかしくない、当然だ」
      論説文で出てくるmay wellの多くは推量の意味（脚注*1）。
      ■ may [might] as well+V: 消極的な提案
      「やらない理由も特にないのでVでもしようか」。
      had betterとは全く別物。had betterは「Vしないとまずいことになる」という積極的な理由がある。
      ■ may [might] as well V₁ as V₂
      V₁するのとV₂するのは大差ないが、wellがある分V₁の方がまだまし。
      「V₂するくらいならV₁した方がましだ」
      V₁にありえない表現が置かれるとmayよりmightが好まれる傾向。
      ■ 祈りのmay
      主語の前にmayが置かれて「Sが〜でありますように」の意味。
      May you always be happy! — ただし I hope you'll always be happy. の方が一般的。
      ■ mayをmightに変えるとどうなるか
      距離感のあるやや控えめな印象（過去形の距離感）。
      [図表: イラスト — may as well（消極的「出かけたほうがいいんじゃない」）vs had better（積極的「出かけないとまずいぞ！」）の比較（p.127）]
      参考書内参照: →p.150（had betterについてはセクション11を参照）
      別冊ポイント087（may well+V: 推量+強意 / 許可+強意）、088（may as well+V: 消極的提案）、089（may as well V₁ as V₂: V₂するくらいならV₁がまし）参照

  - id: "nrt-014"
    name: "助動詞canの用法（実現・理論の可能性とbe able toとの違い）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ canの基本用法
      (1) 実現の可能性「（その気になれば）〜できる」⇔ can't「〜できない」
      (2) 理論上の可能性「（時に）〜する可能性がある」⇔ can't「〜のはずがない」
      ■ canの応用用法
      (3) 軽い許可「〜してもいいよ」: mayと違ってカジュアル。友人同士など対等な関係で用いる。
      (4) 強い疑い「一体〜だろうか」: canを疑問文で使って表す。
      ■ can vs be able to
      can = 実現の可能性を強調。be able to = 能力(ability)を強調。
      会話で頻繁に使われるのはcan。ableは「人」を主語にするのが通例で、能力をアピールする印象が強く自慢げに聞こえることもある（脚注*1）。
      受動態でもcanを使うのが通例（That can be explained...）。
      助動詞同士は併用不可 → 「〜できるだろう」は will be able to V。
      ■ could vs was[were] able to
      過去の1回限りの行為「（実際に）Vできた」→ couldは不可。was[were] able to V または managed to V を使う。
      couldは実現の可能性があったことを伝えるだけで、その行為が実際に行われたかは不明。
      否定文ではcouldとwas able toはほぼ同じ意味で使える。
      (✕) e193: could finish → was able to finish が正しい
      [図表: イラスト — 実現の可能性（100点の答案）と理論上の可能性（11月でも暖かい）（p.129）]
      [図表: イラスト — 軽い許可（You can count on me.友人同士）と強い疑い（Can it be true?驚く男性）（p.130）]
      別冊ポイント090（canの4用法）、091（推量の助動詞+have+Vp.p.）、092（couldとwas able to）、093（cannot help Ving等）、094（cannot〜too...）参照

  - id: "nrt-015"
    name: "助動詞mustとhave toの使い分け"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ mustの基本用法
      (1) 話し手の判断「〜しなければならない」: 自発的な気持ちで用いる。
      (2) 話し手の推量「〜に違いない」: 現在の状況に対して用いるのが原則。未来の推量には不可。
      (✕) It must rain tomorrow.（→ It will certainly rain tomorrow. などとする）
      ■ have toの基本用法
      「（外部のさまざまな圧力があるせいで）〜しなければならない」
      周囲から強制されたり規則があって「仕方なしに」の感覚。mustの自発的判断とは異なる。
      have toは助動詞ではなく一般動詞の延長線（脚注*2: have + to V「これからやるべきことをもっている」）。
      ■ 否定形の大きな違い
      must not = 禁止「〜してはいけない」
      don't have to = 不必要「〜する必要はない」
      ■ mustには過去形がない
      「〜しなければならなかった」→ had to を使う。
      ■ have to/have got toの推量用法
      最近ではhave toやhave got toでも「〜に違いない」の意味で使うネイティブが増えている。通常はbe動詞と共に用いる（脚注*1）。
      [図表: イラスト — mustの判断（自発的に「帰らなくちゃ」）と推量（「帰るに違いない」）（p.133）]
      [図表: イラスト — have toのイメージ（外部圧力で「戻らなくちゃ」）（p.134）]
      別冊ポイント095（mustの用法: 義務+推量、推量は未来不可）、096（have toの用法: 外部圧力、must vsの比較）参照

  - id: "nrt-016"
    name: "助動詞shouldの基本用法（当然〜すべき / 〜のはずだ）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ shallの基本イメージ
      「（神の力や法律、運命など、個人の意志をはるかに超えたレベルで）当然〜すべき、当然〜になる」
      絶滅の危機にある助動詞。聖書や法律などの条文、Shall I〜？/Shall we〜？の定型表現以外ではほぼ使われない（脚注*1）。
      日本国憲法第25条: All people shall have the right to...
      ■ shouldの基本イメージ: 〈当然〉
      shallの過去形でマイルドになったもの。mustやshallと比べるとだいぶマイルド。
      (1) 話し手の判断「当然〜した方がいい」（助言・アドバイス）
      (2) 話し手の推量「当然〜のはずだ」
      どちらもought to Vとほぼ同じ意味。ought toの否定形はought not to V（notの位置に注意）。
      脚注*1: Shall I〜?は「私が〜しましょうか」だがDo you want me to〜?の方が一般的。Shall we〜?もLet's〜.で十分。
      [図表: イラスト — shallとshouldの比較。左: shall「汝の隣人を愛すべし」石板、右: should「席を譲った方がいいわよ」電車内（p.137）]
      別冊ポイント098（shouldの用法: 判断+推量、≒ought to V）参照

  - id: "nrt-017"
    name: "shouldの応用用法（that節中のshould）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 要求・提案・命令・主張を表すthat節中のshould
      I suggest that you should follow a low-salt diet. — 「当然〜した方がいい」と思っているからshouldが入る。
      提案段階ではまだ実現していない → 昔の仮定法である〈動詞の原形〉も使える。
      ▶ I suggest that you follow a low-salt diet.（原形）
      ■ 判断を表すthat節中のshould
      It is necessary that he should ask for a pay raise. — necessary「必要だ」の裏に「当然だ」の気持ちがある。
      ▶ It is necessary that he ask for a pay raise.（原形、3人称単数のsもつけない）
      ■ 感情を表すthat節中のshould
      It is surprising that he should object to my plan. — 「当然」の期待が裏切られ → 意外・驚き・残念・後悔。
      事実を述べる場合は直説法（現在形・過去形）も可能: It is surprising that he objects to my plan.
      ■ 疑問文のshouldで意外性の強調
      Why should he go for you?（どうして彼が君の代わりに行かねばならないのか）
      ■ このセクションのshouldはought toに書き換え不可
      参考書内参照: →PART 03の9（動詞の原形、nrt-009）
      別冊ポイント100（判断や感情のthat節内should: 形容詞=natural, necessary, important, strange, surprising等、名詞=a pity, a shame, no wonder等）参照

  - id: "nrt-018"
    name: "推量の助動詞の体系（must / may / can't）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 推量の助動詞の3本柱
      must「〜に違いない」（確信度≒100%）、may「〜かもしれない」（確信度≒50%）、can't「〜のはずはない」（確信度≒0%）。
      テストの点数の例で直感的に理解:
      95%とったジョン → must be happy、平均点のメアリー → may be happy、10%のケン → can't be happy
      [図表: 表 — 確信の度合い: 0% can't ← 50% may → 100% must（p.141）]
      ■ 推量の助動詞は過去形にしても過去の意味にならない「お約束」
      may→mightにしても「〜だったかもしれない」にはならない。過去形の「距離感」で確率が下がるだけ。
      can't→couldn'tは「（理論上）本当にありえない！」と強まる感じ。
      mustはそもそも過去形がない。
      ■ 助動詞の過去形まとめ
      will→would: 過去の習慣など一部に限る
      can→could: couldn'tなど一部に限る
      may→might: ほぼ過去の意味にはならない
      shall→should: 過去の意味にはならない
      must: 過去形がない / need: 過去形がない
      [図表: 表 — 助動詞の過去形について（p.141-142）]
      脚注*1: 確信度の細分化 must＞will＞may well＞may＞might＞can't＞couldn't
      脚注*2: 助動詞の過去形が単独で過去を表せない原則は、時制の一致の場合を除く。
      別冊ポイント097（推量の助動詞と対応する副詞）参照

  - id: "nrt-019"
    name: "〈助動詞+have+Vp.p.〉の体系"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 〈推量の助動詞+have+Vp.p.〉= 過去の推量
      推量の助動詞は過去形にしても過去にならない → 〈have+Vp.p.〉をつけて過去の意味を表す。
      この〈have+Vp.p.〉は現在完了形とは別物。「過去の意味(Vp.p.)をもたせる(have)」ための形。
      must+have+Vp.p.「〜だったに違いない」
      may[might]+have+Vp.p.「〜だったかもしれない」
      can't[couldn't]+have+Vp.p.「〜だったはずはない」
      ■ 〈should[ought to]+have+Vp.p.〉の2つの意味
      (1) 過去への後悔「〜すべきだったのに（実際にはしなかった）」
      (2) 過去への推量「〜したはずだ、すでに〜しているはずだ」
      否定形: should not have+Vp.p. [ought not to have+Vp.p.]
      ■ 一般動詞need vs 助動詞need
      一般動詞need: 肯定文・否定文・疑問文すべてで使える。過去形はdidn't need to。使用頻度が高い。
      助動詞need: 肯定文では使えない。否定文 need not [needn't] go / 疑問文 Need he go?。過去形がない。
      ■ 〈need not+have+Vp.p.〉
      「〜する必要はなかったのに（実際はした）」。助動詞needには過去形がないため〈have+Vp.p.〉で過去を表す。
      助動詞needは肯定文では用いないため、〈need+have+Vp.p.〉という肯定の形は存在しない（脚注*2）。
      ■ 〈助動詞+have+Vp.p.〉の共通メッセージ
      「過去の事柄を現在の立場から推測や評価をする」感覚がすべてに共通。
      脚注*1: may have+Vp.p.は未来完了形のwillがmayに変わった用法もある（時を表す語句で判別）。
      ▶ By this time next year I may have married her.
      参考書内参照: →8（推量の助動詞、nrt-018）
      別冊ポイント091（推量の助動詞+have+Vp.p.）、099（should+have+Vp.p.）参照

  - id: "nrt-020"
    name: "wouldとused toの用法"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 〈過去を回想〉するwouldとused to
      wouldは動作動詞と使って「昔はよく〜したものだ」と過去を回想する。
      仮定法のwouldと区別するため、過去を表す語句やoften/usuallyなどの頻度副詞と共に使うのが普通。
      状態動詞とは共に使えない。
      used toは動作動詞・状態動詞のどちらでも使える。
      ■ wouldとused toの使用上の注意
      現在との対比ではwouldは使えない（used toのみ可）。
      used toには「現在はそうでない」というニュアンスが含まれる。
      具体的な回数(three times)や期間(for two years)を示す語句とは両方使えない。
      ■ "used to"3兄弟
      (1) used to V「かつてはVだった」（現在との対比で使う）
      (2) be used to Ving「Vすることに慣れている」（= be accustomed to Ving）
      (3) 受動態のwas used「使われた」+ to V（不定詞の副詞用法/目的）
      脚注*1: wouldは〈意志〉を表すwillの過去形。主語の意志が感じられるため動作動詞と相性が良い。
      別冊ポイント101（will[won't]の意志）、102（used toの用法）参照

  - id: "nrt-021"
    name: "その他の助動詞(1)（had better / cannot V too / cannot help Ving）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ had better
      「〜した方がいい」と訳されるが、気軽なアドバイスではなく軽い脅迫・警告のニュアンス。
      Youを主語にすると脅迫感がさらに強まる（脚注*1）。
      否定形: had better not+V（notの位置はbetterの後、Vの前）。
      ■ cannot V 〜 too ...
      「いくらVしてもし過ぎることはない」。
      cannot「〜ありえない」+ too「〜過ぎ」の組み合わせで理解する。
      [図表: 表 — cannot V too...の理解ヒント: 「ほめ過ぎ」+「ありえない」=「ほめ過ぎはありえない」（p.151）]
      バリエーション: cannot V enough / cannot overV / It is impossible to overV [to V enough / to V too much]
      ■ cannot help Ving
      helpは「〜を避ける」の意味。
      cannot help Ving = cannot help but V = cannot but V
      「Vすることを避けられない → ついついVしてしまう」。自分の意志ではどうにもならない感じ。
      It can't be helped.「仕方がない」もこのhelpの用法（脚注*2）。
      脚注*3: もともとcannot but V（but=「〜以外」「Vすること以外できない→Vするしかない」）という表現があり、cannot help Vingとの混合でcannot help but Vが生まれたとされる。
      別冊ポイント093（cannot help Ving）、094（cannot too）参照

  - id: "nrt-022"
    name: "その他の助動詞(2)（意志のwon't / would rather / have only to / dare）"
    category: "時制・助動詞・仮定法"
    priority: "P1"
    notes: |
      ■ 〈意志〉のwill/won'tとwould/wouldn't
      will「〜しよう」（意志）⇔ won't「どうしても〜しようとしない」（意志の否定）
      would「〜しようとした」（過去）⇔ wouldn't「どうしても〜しようとしなかった」（過去）
      [図表: 表 — will/won't/would/wouldn'tの対応（p.153）]
      モノ(the key等)にもwouldn'tを使える（擬人化）。
      ■ would rather V
      「むしろ〜したい、どちらかと言えば〜したい」。
      否定形: would rather not+V。
      thanを伴って比較: would rather V₁ than V₂「V₂するよりはV₁したい」。
      ■ have only to V
      have to+onlyで「Vしさえすればよい」。
      脚注*1: Vすることで何らかの結果が得られる場面で使う。only have to V ≒ All you have to do is〜。
      ■ 助動詞dare
      How dare SV(原形)〜?「よくもVできるな」（他者への憤慨）。
      dare not V「あえてVする勇気がない」。否定文・疑問文で用いるのが原則。
      一般動詞dareとの書き換え: He doesn't dare (to) complain...
      別冊ポイント101（will[won't]の意志）参照

understanding_goals:
  - node_id: "nrt-001"
    seq: 1
    goal: "「現在形＝現在のこと」が誤解である理由を説明できる"
  - node_id: "nrt-001"
    seq: 2
    goal: "現在形の核心（いつも変わらない安定）を説明し、習慣・状態・不変の真理を統一的に理解できる"
  - node_id: "nrt-001"
    seq: 3
    goal: "現在形で確実な未来の予定を表せる理由を説明できる"
  - node_id: "nrt-001"
    seq: 4
    goal: "現在形で未来を表す用法が公的なスケジュール（時刻表等）に限られる傾向を説明できる"
  - node_id: "nrt-002"
    seq: 1
    goal: "進行形の核心イメージ（行為の最中・途中）を説明し、3つの含意（未完了・近い将来終了・中断可能）を挙げられる"
  - node_id: "nrt-002"
    seq: 2
    goal: "状態動詞が進行形になじみにくい理由を進行形の本質から説明できる"
  - node_id: "nrt-002"
    seq: 3
    goal: "be動詞の進行形やwearの進行形が一時的な状態を強調する用法を説明できる"
  - node_id: "nrt-003"
    seq: 1
    goal: "過去形の基本イメージ「切れている（離れている）」を説明できる"
  - node_id: "nrt-003"
    seq: 2
    goal: "過去形が丁寧さ・控えめな気持ちを表す理由を「距離感の演出」から説明できる"
  - node_id: "nrt-003"
