# Nar_04_05: 助動詞must (p.133-135)

sentences:
  - id: "nar-0405-e196"
    section_id: "Nar_04_05"
    drill: 0
    number: 196
    role: "example"
    english: "It's getting late. I must be back by ten o'clock."
    japanese: "もう遅いなあ。10時までに戻らなくちゃ"
    notes: "mustの基本用法(1): 話し手の判断「〜しなければならない」。自発的な気持ちで用いる"
  - id: "nar-0405-e197"
    section_id: "Nar_04_05"
    drill: 0
    number: 197
    role: "example"
    english: "Hiro must be back by ten o'clock."
    japanese: "ヒロは10時までに帰宅するに違いない"
    notes: "mustの基本用法(2): 話し手の推量「〜に違いない」。現在の状況に対して用いるのが原則"
  - id: "nar-0405-e198"
    section_id: "Nar_04_05"
    drill: 0
    number: 198
    role: "example"
    english: "I have to be back by three o'clock."
    japanese: "3時までには戻らなくちゃ"
    notes: "have toの基本用法: 外部のさまざまな圧力があるせいで「仕方なしに〜しなければ」。mustの自発的判断とは違う"
  - id: "nar-0405-e199"
    section_id: "Nar_04_05"
    drill: 0
    number: 199
    role: "example"
    english: "You must not leave your seat."
    japanese: "席を離れてはいけません"
    notes: "must not = 禁止「〜してはいけない」。don't have to（不必要）との大きな違いに注意"
  - id: "nar-0405-e200"
    section_id: "Nar_04_05"
    drill: 0
    number: 200
    role: "example"
    english: "You don't have to work today."
    japanese: "今日は仕事する必要はない"
    notes: "don't have to = 不必要「〜する必要はない」。must not（禁止）とは全く異なる"
  - id: "nar-0405-e201"
    section_id: "Nar_04_05"
    drill: 0
    number: 201
    role: "example"
    english: "Yesterday, I had to get up at 5:00 in the morning to finish my homework."
    japanese: "昨日、私は宿題を終わらせるために朝5時に起きなければならなかった"
    notes: "mustには過去形がないため、「〜しなければならなかった」にはhad toを用いる"
  - id: "nar-0405-v001"
    section_id: "Nar_04_05"
    drill: 0
    number: 1
    role: "example"
    english: "She has to be an American."
    japanese: "彼女はアメリカ人に違いない"
    notes: "▶ have toの推量用法。最近ではhave to/have got toでも「〜に違いない」の意味で使うネイティブが増えている。たいていはbe動詞と共に用いる"

