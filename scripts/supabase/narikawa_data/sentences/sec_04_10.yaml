# Nar_04_10: wouldとused toの用法 (p.147-149)

sentences:
  - id: "nar-0410-e219"
    section_id: "Nar_04_10"
    drill: 0
    number: 219
    role: "example"
    english: "When we were young, we would often play on the beach."
    japanese: "若いころ、私たちは海辺でよく遊んだものだ"
    notes: "wouldは動作動詞と使って過去を回想。頻度副詞oftenと共に使用"
  - id: "nar-0410-e220"
    section_id: "Nar_04_10"
    drill: 0
    number: 220
    role: "example"
    english: "Joe used to be a nice boy."
    japanese: "ジョーは前はいい子だった（今はそうではない）"
    notes: "used to+状態動詞(be)。「今はそうではない」のニュアンスを含む"
  - id: "nar-0410-e221"
    section_id: "Nar_04_10"
    drill: 0
    number: 221
    role: "example"
    english: "She used to drive to work, but now she doesn't."
    japanese: "彼女は昔はよく車で通勤していたが、今は違う"
    notes: "used toの現在との対比用法。▶ wouldにはできない — 現在との対比ではwouldは使えない"
  - id: "nar-0410-e222"
    section_id: "Nar_04_10"
    drill: 0
    number: 222
    role: "example"
    english: "He is used to handling drugs."
    japanese: "彼は薬品の扱いに慣れている"
    notes: "\"used to\"3兄弟の1つ。〈be used to+Ving〉「Vすることに慣れている」。過去回想のused toとは別物"
  - id: "nar-0410-e223"
    section_id: "Nar_04_10"
    drill: 0
    number: 223
    role: "example"
    english: "Every means was used to solve the problem."
    japanese: "その問題を解決するために、あらゆる手段が使われた"
    notes: "\"used to\"3兄弟の1つ。was usedは単なる受動態、to solve以下は不定詞の副詞用法（目的）。過去回想のused toと混同しないこと"

