# Nar_14_03: 類似品にはご注意 — -lyの有無で意味が変わる副詞 (p.484-486)

sentences:
  - id: "nar-1403-e801"
    section_id: "Nar_14_03"
    drill: 0
    number: 801
    role: "example"
    english: "This stone is hard."
    japanese: "この石はかたい"
    notes: "hard=かたい(形容詞/副詞、-lyなし)"
  - id: "nar-1403-e802"
    section_id: "Nar_14_03"
    drill: 0
    number: 802
    role: "example"
    english: "I can hardly hear her."
    japanese: "彼女の言っていることがほとんど聞き取れない"
    notes: "hardly=ほとんど〜ない(否定語=scarcely)。hardとは全く異なる意味"
  - id: "nar-1403-e803"
    section_id: "Nar_14_03"
    drill: 0
    number: 803
    role: "example"
    english: "The building is 200 feet high."
    japanese: "そのビルは200フィートの高さだ"
    notes: "high=物理的に高い。形容詞/副詞同形"
  - id: "nar-1403-e804"
    section_id: "Nar_14_03"
    drill: 0
    number: 804
    role: "example"
    english: "She is highly intelligent."
    japanese: "彼女は非常に頭がいい"
    notes: "highly=程度の高さを強調「かなり、大いに」。highとは異なる"
  - id: "nar-1403-e805"
    section_id: "Nar_14_03"
    drill: 0
    number: 805
    role: "example"
    english: "I woke up late this morning."
    japanese: "今朝はいつもより遅く目が覚めた"
    notes: "late=時間的に遅れて"
  - id: "nar-1403-e806"
    section_id: "Nar_14_03"
    drill: 0
    number: 806
    role: "example"
    english: "I haven't seen her lately."
    japanese: "最近、彼女には会っていない"
    notes: "lately=最近(現在完了形と相性がよい。継続のニュアンス)"
  - id: "nar-1403-e807"
    section_id: "Nar_14_03"
    drill: 0
    number: 807
    role: "example"
    english: "She bought the bag two days ago."
    japanese: "彼女は2日前にそのバッグを買った"
    notes: "ago=現在からさかのぼって(過去形と使う)"
  - id: "nar-1403-e808"
    section_id: "Nar_14_03"
    drill: 0
    number: 808
    role: "example"
    english: "She had bought the bag two days before."
    japanese: "彼女はその2日前にバッグを買った"
    notes: "before=過去の一時点からさかのぼって(過去完了形と使う)"
  - id: "nar-1403-e809"
    section_id: "Nar_14_03"
    drill: 0
    number: 809
    role: "example"
    english: "We lived in Yokohama before."
    japanese: "私たちは以前は横浜に住んでいた"
    notes: "before単独=「以前に」(現在完了形や過去形で使う)"

