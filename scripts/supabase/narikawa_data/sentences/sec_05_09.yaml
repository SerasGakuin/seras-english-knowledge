# Nar_05_09: 仮定法を使った重要表現(3) — 「〜ならばなぁ」、その他 (p.178-180)

sentences:
  - id: "nar-0509-e263"
    section_id: "Nar_05_09"
    drill: 0
    number: 263
    role: "example"
    english: "I wish I were a dolphin."
    japanese: "イルカならばなぁ"
    notes: "I wish+仮定法過去。wishと同じ時の願望"
  - id: "nar-0509-e264"
    section_id: "Nar_05_09"
    drill: 0
    number: 264
    role: "example"
    english: "I wish Eric had not married her."
    japanese: "エリックが彼女と結婚しなければよかったのに"
    notes: "I wish+仮定法過去完了。wishよりさらに前の時の願望"
  - id: "nar-0509-e265"
    section_id: "Nar_05_09"
    drill: 0
    number: 265
    role: "example"
    english: "I wished my uncle were at home when I visited him."
    japanese: "私が訪ねたとき、おじさんが家にいればいいのにと思った"
    notes: "wishedも過去、願望も同じ過去→ずれていないので仮定法過去。仮定法過去完了ではない"
  - id: "nar-0509-e266"
    section_id: "Nar_05_09"
    drill: 0
    number: 266
    role: "example"
    english: "If only I were a dolphin!"
    japanese: "ああ、イルカだったらどんなにいいだろう"
    notes: "If only: I wishよりさらに強い願望。感嘆符で終わる"
  - id: "nar-0509-e267"
    section_id: "Nar_05_09"
    drill: 0
    number: 267
    role: "example"
    english: "I wish I could go bowling with you."
    japanese: "あなたとボウリングに行けるといいのだけれど"
    notes: "I wish+could: 「〜できたらいいのに」能力・可能性への願望"
  - id: "nar-0509-e268"
    section_id: "Nar_05_09"
    drill: 0
    number: 268
    role: "example"
    english: "I wish he would shut up."
    japanese: "彼が黙ってくれるといいのだけれど"
    notes: "I wish+would: 「〜してくれたらいいのに」その場限りの1回の願望"
  - id: "nar-0509-e269"
    section_id: "Nar_05_09"
    drill: 0
    number: 269
    role: "example"
    english: "I'd rather he went home now."
    japanese: "彼にはもう帰ってもらった方がいい"
    notes: "I'd rather+SV〜「（むしろ）〜した方がよいと思う」。他者への願望で使われることが多い"
  - id: "nar-0509-e270"
    section_id: "Nar_05_09"
    drill: 0
    number: 270
    role: "example"
    english: "It is time you started."
    japanese: "あなたはもう出発していいころだ"
    notes: "It is time+SV（過去形）〜「もう〜してもいいころだ」。highで強調、aboutで緩和。苦情・非難で多用"
  - id: "nar-0509-v001"
    section_id: "Nar_05_09"
    drill: 0
    number: 1
    role: "example"
    english: "It is time for you to start."
    japanese: "あなたはもう出発していいころだ"
    notes: "e270の書き換え。It is time for+名詞+to Vの形の方が実際には多い"
  - id: "nar-0509-v002"
    section_id: "Nar_05_09"
    drill: 0
    number: 2
    role: "example"
    english: "I hope (that) you'll succeed."
    japanese: "君の成功を望む"
    notes: "脚注*1: 現実味のある願望にはwishではなくhopeを用いる"
  - id: "nar-0509-v003"
    section_id: "Nar_05_09"
    drill: 0
    number: 3
    role: "example"
    english: "How I wish I had been there!"
    japanese: "自分がそこにいたらなあ"
    notes: "脚注*2: How I wishはI wishの同意表現。仮定法過去完了の例（wishより前の時）"

