# Nar_03_01: 現在形（p.90-92）

sentences:
  - id: "nar-0301-e121"
    section_id: "Nar_03_01"
    drill: 0
    number: 1
    role: "example"
    english: "Vegetarians don't eat meat."
    japanese: "菜食主義者は肉を食べない"
    notes: "現在形: 習慣（昨日も今日も明日も変わらない）"
  - id: "nar-0301-e122"
    section_id: "Nar_03_01"
    drill: 0
    number: 2
    role: "example"
    english: "John belongs to the Republican Party."
    japanese: "ジョンは共和党の党員である"
    notes: "現在形: 状態（政治信条が変わらなければずっと）"
  - id: "nar-0301-e123"
    section_id: "Nar_03_01"
    drill: 0
    number: 3
    role: "example"
    english: "Light travels faster than sound."
    japanese: "光は音より速く伝わる"
    notes: "現在形: 不変の真理"
  - id: "nar-0301-e124"
    section_id: "Nar_03_01"
    drill: 0
    number: 4
    role: "example"
    english: "The sun rises in the east."
    japanese: "太陽は東から昇る"
    notes: "現在形: 不変の真理"
  - id: "nar-0301-e125"
    section_id: "Nar_03_01"
    drill: 0
    number: 5
    role: "example"
    english: "Harrods opens at 10:00 a.m."
    japanese: "ハロッズは午前10時に開店です"
    notes: "現在形: 変わらない安定した開店時刻"
  - id: "nar-0301-v001"
    section_id: "Nar_03_01"
    drill: 0
    number: 6
    role: "example"
    english: "Harrods opens at 10:00 a.m. tomorrow."
    japanese: "ハロッズは明日午前10時に開店です"
    notes: "▶例文。例文125にtomorrowを加え、現在形で確実な未来の予定を表すことを示す"
  - id: "nar-0301-e126"
    section_id: "Nar_03_01"
    drill: 0
    number: 7
    role: "example"
    english: "The train leaves at six o'clock tomorrow."
    japanese: "その列車は明日の6時に出ます"
    notes: "現在形で確実な未来の予定（公的ダイヤ）"

