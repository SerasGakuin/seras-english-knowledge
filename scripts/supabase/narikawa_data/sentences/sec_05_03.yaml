# Nar_05_03: 仮定法過去完了、仮定法過去と仮定法過去完了の併用 (p.164-166)

sentences:
  - id: "nar-0503-e238"
    section_id: "Nar_05_03"
    drill: 0
    number: 238
    role: "example"
    english: "If you had worked harder, you would have passed your exams."
    japanese: "もっと懸命に勉強していたら、試験に受かっていただろうに"
    notes: "仮定法過去完了。過去の事実と反対（実際は勉強しなかった）"
  - id: "nar-0503-e239"
    section_id: "Nar_05_03"
    drill: 0
    number: 239
    role: "example"
    english: "If he had followed her advice then, he would be happy now."
    japanese: "あの時、もしも彼が彼女の助言に従っていたら、彼は今ごろ幸せだろうに"
    notes: "仮定法過去完了と仮定法過去の併用。if節=過去完了（過去の反事実）、主節=過去形（現在の反事実）。nowがヒント"
  - id: "nar-0503-e240"
    section_id: "Nar_05_03"
    drill: 0
    number: 240
    role: "example"
    english: "I will do it if I can."
    japanese: "私にできるなら、やるつもりだ"
    notes: "直説法。できる能力があり、実際にできる可能性あり。e241（仮定法）との対比"
  - id: "nar-0503-e241"
    section_id: "Nar_05_03"
    drill: 0
    number: 241
    role: "example"
    english: "I would do it if I could."
    japanese: "私にできるなら、やるつもりだ"
    notes: "仮定法過去。実際には能力がなく、できる見込みはない。if節中にもcouldが現れる例"
  - id: "nar-0503-e242"
    section_id: "Nar_05_03"
    drill: 0
    number: 242
    role: "example"
    english: "If he would only try, he could do it."
    japanese: "彼にやってみる気さえあればできるのに"
    notes: "if節中に「意志」のwouldが現れる例。onlyは「〜さえすれば」の強調"

