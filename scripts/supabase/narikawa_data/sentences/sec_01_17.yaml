    drill: 0
    number: 1
    role: "example"
    english: "He lent his car to a friend."
    japanese: "彼は友達に車を貸した"
    notes: "lend+O₂+to+O₁。無料で貸す"
  - id: "nar-0117-e075"
    section_id: "Nar_01_17"
    drill: 0
    number: 2
    role: "example"
    english: "I borrowed the book from him."
    japanese: "私は彼からその本を借りた"
    notes: "borrow A from B。無料で借りる（移動可能なもの）"
  - id: "nar-0117-e076"
    section_id: "Nar_01_17"
    drill: 0
    number: 3
    role: "example"
    english: "The owner rents rooms to students."
    japanese: "家主は学生に部屋を貸している"
    notes: "rent+O₂+to+O₁。有料で貸す"
  - id: "nar-0117-e077"
    section_id: "Nar_01_17"
    drill: 0
    number: 4
    role: "example"
    english: "I rent this apartment from her."
    japanese: "私は彼女からこのアパートを借りている"
    notes: "rent A from B。有料で借りる"
  - id: "nar-0117-e078"
    section_id: "Nar_01_17"
    drill: 0
    number: 5
    role: "example"
    english: "I let a room to him."
    japanese: "私は彼に部屋を貸している"
    notes: "let≒rent。主にイギリス英語。let+O₂+to+O₁"
  - id: "nar-0117-v001"
    section_id: "Nar_01_17"
    drill: 0
    number: 6
    role: "example"
    english: "We hire out tables for parties."
    japanese: "私たちはパーティー用にテーブルを賃貸しする"
    notes: "hire outで「一時的に貸す」。脚注*2の▶例文"

