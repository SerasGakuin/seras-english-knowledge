    role: "example"
    english: "The student I met the other day is the taller of the two."
    japanese: "私が先日会った生徒は2人のうち背が高い方の子だ"
    notes: "the+比較級+of the two。2者のうち一方に決まるのでtheが付く"
  - id: "nar-1007-e674"
    section_id: "Nar_10_07"
    drill: 0
    number: 674
    role: "example"
    english: "I like her all the better for her faults."
    japanese: "欠点があるせいで、私はなおさら彼女が好きだ"
    notes: "all the better for〜。the=指示副詞「その分だけ」、all=強調、for=理由"
  - id: "nar-1007-e675"
    section_id: "Nar_10_07"
    drill: 0
    number: 675
    role: "example"
    english: "If you take a vacation, you will feel all the better."
    japanese: "休暇をとれば、それだけ気分も一新するだろう"
    notes: "all the better。理由表現がif節で表されるパターン"
  - id: "nar-1007-e676"
    section_id: "Nar_10_07"
    drill: 0
    number: 676
    role: "example"
    english: "She was none the wiser because of the seminar."
    japanese: "彼女はそのセミナーを受けたが、それでもわかるようにはならなかった"
    notes: "none the wiser。noneは否定で「少しも〜ない」。allの正反対"

