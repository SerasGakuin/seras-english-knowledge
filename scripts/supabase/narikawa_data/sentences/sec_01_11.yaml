    english: "We associate Einstein with the theory of relativity."
    japanese: "私たちはアインシュタインと言えば相対性理論を連想する"
    notes: "V+A+with+B（関連・結合）。AとBを結びつけて考える"
  - id: "nar-0111-e045"
    section_id: "Nar_01_11"
    drill: 0
    number: 3
    role: "example"
    english: "Mr. Lawson endowed the college with a large sum of money."
    japanese: "ローソン氏はその大学に多額の金を寄付した"
    notes: "V+A+with+B（与える・供給）。未知の動詞endowもパターンから意味推測可能"

