# Nar_09_09: 前置詞 from の用法(2) (p.350-351)

sentences:
  - id: "nar-0909-e553"
    section_id: "Nar_09_09"
    drill: 0
    number: 553
    role: "example"
    english: "We started from Kyoto by train."
    japanese: "私たちは列車で京都を出発した"
    notes: "分離のfrom。京都を出発した＝京都から離れた"
  - id: "nar-0909-e554"
    section_id: "Nar_09_09"
    drill: 0
    number: 554
    role: "example"
    english: "The man was rescued two miles from shore."
    japanese: "その男性は海岸から2マイル離れた所で救助された"
    notes: "分離のfrom。海岸から離れた地点"
  - id: "nar-0909-e555"
    section_id: "Nar_09_09"
    drill: 0
    number: 555
    role: "example"
    english: "Keep away from the fire."
    japanese: "火から離れていなさい"
    notes: "分離のfrom。keep away from＝〜から離れている"
  - id: "nar-0909-e556"
    section_id: "Nar_09_09"
    drill: 0
    number: 556
    role: "example"
    english: "Take a break from your work."
    japanese: "ちょっと仕事から離れてひと休みしなさい"
    notes: "分離のfrom。仕事から離れる＝休憩する"
  - id: "nar-0909-e557"
    section_id: "Nar_09_09"
    drill: 0
    number: 557
    role: "example"
    english: "The snow prevented us from going out."
    japanese: "雪のため私たちは外出できなかった"
    notes: "妨害・禁止のfrom。usとgoing outを切り離す→外出できない。prevent/prohibit A from Ving"
  - id: "nar-0909-e558"
    section_id: "Nar_09_09"
    drill: 0
    number: 558
    role: "example"
    english: "My friend can distinguish peach blossoms from cherry blossoms."
    japanese: "私の友人は桃の花と桜の花を見分けることができる"
    notes: "区別のfrom。AとBを切り離す→区別する。distinguish/separate/differ A from B"
  - id: "nar-0909-e559"
    section_id: "Nar_09_09"
    drill: 0
    number: 559
    role: "example"
    english: "The firefighter was able to rescue them from the burning building."
    japanese: "消防士は燃えている建物から彼らを救出することができた"
    notes: "保護のfrom。彼らと燃える建物を切り離す→救出。protect/rescue/save A from B"
  - id: "nar-0909-e560"
    section_id: "Nar_09_09"
    drill: 0
    number: 560
    role: "example"
    english: "You should protect your skin from UVA."
    japanese: "紫外線から肌を守るべきだ"
    notes: "保護のfrom。肌とUVAを切り離す→保護。protect A from B"
  - id: "nar-0909-v001"
    section_id: "Nar_09_09"
    drill: 0
    number: 1
    role: "example"
    english: "He can tell an expensive diamond from a cheap one."
    japanese: "彼は高価なダイヤと安物のダイヤを見分けられる"
    notes: "▶プラスα例文。tell A from B＝AとBを見分ける。distinguish（広く区別）vs tell/know（見分ける）"

