# Nar_05_02: 仮定法過去 (p.161-163)

sentences:
  - id: "nar-0502-v001"
    section_id: "Nar_05_02"
    drill: 0
    number: 1
    role: "example"
    english: "If it snows heavily tomorrow, we'll have to put off the baseball game."
    japanese: "もし明日、大雪なら、野球の試合は延期しなければならない"
    notes: "直説法の例。真冬の北海道で大雪は現実に十分ありえるので直説法。仮定法過去との対比用"
  - id: "nar-0502-e236"
    section_id: "Nar_05_02"
    drill: 0
    number: 236
    role: "example"
    english: "If it snowed heavily tomorrow, we would have to put off the baseball game."
    japanese: "もしも明日、大雪なら、野球の試合は延期しなければならない"
    notes: "仮定法過去。真夏の沖縄での大雪という現実味のない状況。snows→snowed、will→wouldと過去形に切り離し"
  - id: "nar-0502-e237"
    section_id: "Nar_05_02"
    drill: 0
    number: 237
    role: "example"
    english: "If I had one hundred million yen, I could marry her."
    japanese: "もしも1億円もっていたら、彼女と結婚できるのに"
    notes: "仮定法過去。現在無職・貯金ゼロの男性のセリフ。事実と反対。have→had、can→could"

