# Nar_10_08: 比較級を使った重要表現(2) (p.405-408)

sentences:
  - id: "nar-1008-e677"
    section_id: "Nar_10_08"
    drill: 0
    number: 677
    role: "example"
    english: "The harder you work, the more you earn."
    japanese: "懸命に働けば、それだけ収入が多くなる"
    notes: "The+比較級..., the+比較級〜構文。前半=従属節、後半=主節。比例関係"
  - id: "nar-1008-e678"
    section_id: "Nar_10_08"
    drill: 0
    number: 678
    role: "example"
    english: "The more famous you become, the less privacy you have."
    japanese: "有名になればなるほどプライバシーはなくなる"
    notes: "more famousはセットで移動（分離不可）。less privacyもセット（little privacyの比較級）"
  - id: "nar-1008-e679"
    section_id: "Nar_10_08"
    drill: 0
    number: 679
    role: "example"
    english: "The sooner, the better."
    japanese: "早ければ早いほどよい"
    notes: "主語・動詞の省略パターン。ハイレベル"
  - id: "nar-1008-e680"
    section_id: "Nar_10_08"
    drill: 0
    number: 680
    role: "example"
    english: "The older you grow, the wiser you will become."
    japanese: "年を取るにつれて賢くなるものだ"
    notes: "書き換え: As you grow older, you will become wiser. / You will become wiser with age."

