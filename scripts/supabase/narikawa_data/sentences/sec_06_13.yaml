# Nar_06_13: 準動詞の時制と否定 (p.221-224)

sentences:
  - id: "nar-0613-e331"
    section_id: "Nar_06_13"
    drill: 0
    number: 331
    role: "example"
    english: "Tom seemed to know everything."
    japanese: "トムはすべてを知っているようだった"
    notes: "準動詞の時制❶: 文全体の動詞(seemed=過去)に準じてto knowも過去。= It seemed that Tom knew everything."
  - id: "nar-0613-e332"
    section_id: "Nar_06_13"
    drill: 0
    number: 332
    role: "example"
    english: "Mary decided to be a doctor."
    japanese: "メアリーは医者になると決めた"
    notes: "不定詞は文全体の動詞より先の未来を表すこともある。decided=過去、to be=その先の未来"
  - id: "nar-0613-e333"
    section_id: "Nar_06_13"
    drill: 0
    number: 333
    role: "example"
    english: "Tom seems to have known everything."
    japanese: "トムはすべてを知っていたようだ"
    notes: "完了形の不定詞(to have Vp.p.)で文全体の動詞よりさらに前を表す。seems=現在、to have known=過去。= It seems that Tom knew everything."
  - id: "nar-0613-e334"
    section_id: "Nar_06_13"
    drill: 0
    number: 334
    role: "example"
    english: "She is proud of being rich."
    japanese: "彼女はお金持ちであることを誇りに思っている"
    notes: "動名詞の時制: 文全体の動詞(is=現在)と同じ時。beingも現在"
  - id: "nar-0613-e335"
    section_id: "Nar_06_13"
    drill: 0
    number: 335
    role: "example"
    english: "She is proud of having been rich."
    japanese: "彼女はお金持ちであったことを誇りに思っている"
    notes: "完了形の動名詞(having Vp.p.)で文全体の動詞よりさらに前を表す。is=現在、having been=過去"
  - id: "nar-0613-e336"
    section_id: "Nar_06_13"
    drill: 0
    number: 336
    role: "example"
    english: "Not knowing what to do, I remained standing."
    japanese: "何をしていいのかわからなくて、私は立ったままでいた"
    notes: "分詞構文の時制: 文全体の動詞(remained=過去)と同じ時。Not knowingも過去"
  - id: "nar-0613-e337"
    section_id: "Nar_06_13"
    drill: 0
    number: 337
    role: "example"
    english: "Having finished my work, I went home."
    japanese: "仕事を終えて、私は帰宅した"
    notes: "完了形の分詞構文(Having Vp.p.)で文全体の動詞よりさらに前を表す。went=過去、Having finished=さらに過去"
  - id: "nar-0613-e338"
    section_id: "Nar_06_13"
    drill: 0
    number: 338
    role: "example"
    english: "He warned her not to do it."
    japanese: "彼はそんなことはするなと彼女に警告した"
    notes: "準動詞の否定: 準動詞の前にnotを置く（not to V）"
  - id: "nar-0613-e339"
    section_id: "Nar_06_13"
    drill: 0
    number: 339
    role: "example"
    english: "They complain of not being given responsibility."
    japanese: "彼らは責任を与えられないと不平を言う"
    notes: "動名詞の否定: 動名詞の直前にnotを置く（not being Vp.p.）"
  - id: "nar-0613-e340"
    section_id: "Nar_06_13"
    drill: 0
    number: 340
    role: "example"
    english: "My father is ashamed of not having done it."
    japanese: "父はそれをやらなかったことを恥じている"
    notes: "完了形の準動詞の否定: not+having Vp.p.が正しい。✕ having not done itは誤り"

