# Nar_09_18: その他の前置詞の用法(1) over/above/under/below (p.373-375)

sentences:
  - id: "nar-0918-e615"
    section_id: "Nar_09_18"
    drill: 0
    number: 615
    role: "example"
    english: "My mother spread the cloth over the table."
    japanese: "母は食卓にテーブルクロスを広げた"
    notes: "overの基本「覆いかぶさって」"
  - id: "nar-0918-e616"
    section_id: "Nar_09_18"
    drill: 0
    number: 616
    role: "example"
    english: "We chatted over coffee."
    japanese: "私たちはコーヒーを飲みながらおしゃべりした"
    notes: "over→従事（〜ながら）。コーヒーをまたがって会話。入試頻出"
  - id: "nar-0918-e617"
    section_id: "Nar_09_18"
    drill: 0
    number: 617
    role: "example"
    english: "The king rules over the country."
    japanese: "その王様がその国を支配している"
    notes: "over→支配。王様の権力が国を覆っている"
  - id: "nar-0918-e618"
    section_id: "Nar_09_18"
    drill: 0
    number: 618
    role: "example"
    english: "You were driving above the speed limit."
    japanese: "あなたはスピード制限を超えて運転していた"
    notes: "aboveの基本「ある基準よりも上」。制限速度という基準を超えている"
  - id: "nar-0918-e619"
    section_id: "Nar_09_18"
    drill: 0
    number: 619
    role: "example"
    english: "The cat is under the chair."
    japanese: "そのネコは椅子の下にいる"
    notes: "underの基本。物理的な下"
  - id: "nar-0918-e620"
    section_id: "Nar_09_18"
    drill: 0
    number: 620
    role: "example"
    english: "The road is closed because the new bridge is under construction."
    japanese: "新しい橋が建設中のため、その道路は閉鎖されている"
    notes: "under＋状態名詞。建設中。条件・状態の下"
  - id: "nar-0918-e621"
    section_id: "Nar_09_18"
    drill: 0
    number: 621
    role: "example"
    english: "All citizens are equal under the law."
    japanese: "すべての市民は法の下で平等だ"
    notes: "underの条件・状態。法の下で"
  - id: "nar-0918-e622"
    section_id: "Nar_09_18"
    drill: 0
    number: 622
    role: "example"
    english: "The matter under discussion today is what to do about traffic congestion downtown."
    japanese: "本日議論中の問題は、商業地区の交通渋滞について何をするかだ"
    notes: "under discussion＝議論中。underの条件・状態"
  - id: "nar-0918-e623"
    section_id: "Nar_09_18"
    drill: 0
    number: 623
    role: "example"
    english: "He is against raising taxes under any circumstances."
    japanese: "彼はいかなる状況下でも増税に反対だ"
    notes: "under any circumstances＝いかなる状況下でも"
  - id: "nar-0918-e624"
    section_id: "Nar_09_18"
    drill: 0
    number: 624
    role: "example"
    english: "When I arrived, the meeting was already under way."
    japanese: "私が到着したとき、会議はすでに進行中だった"
    notes: "under way＝進行中"
  - id: "nar-0918-e625"
    section_id: "Nar_09_18"
    drill: 0
    number: 625
    role: "example"
    english: "The sun sank below the horizon."
    japanese: "太陽は地平線に沈んだ"
    notes: "belowの基本「ある基準よりも下」。地平線という基準より下"
  - id: "nar-0918-e626"
    section_id: "Nar_09_18"
    drill: 0
    number: 626
    role: "example"
    english: "A vice-president is below a president in rank."
    japanese: "副社長は社長より地位が低い"
    notes: "below→能力・上下関係。位置だけでなく地位も表す"

