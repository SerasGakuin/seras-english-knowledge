# Nar_13_08: 特定の名詞と数量表現 (p.474-475)

sentences:
  - id: "nar-1308-e787"
    section_id: "Nar_13_08"
    drill: 0
    number: 787
    role: "example"
    english: "Tokyo has a large population."
    japanese: "東京の人口は多い"
    notes: "population→large/smallで多い/少ないを表す"
  - id: "nar-1308-e788"
    section_id: "Nar_13_08"
    drill: 0
    number: 788
    role: "example"
    english: "I was late because of heavy traffic."
    japanese: "私は交通渋滞のため遅刻した"
    notes: "traffic→heavyで「多い」を表す"
  - id: "nar-1308-e789"
    section_id: "Nar_13_08"
    drill: 0
    number: 789
    role: "example"
    english: "The roads were closed due to heavy snow."
    japanese: "大雪のため道路が閉鎖された"
    notes: "snow→heavy"
  - id: "nar-1308-e790"
    section_id: "Nar_13_08"
    drill: 0
    number: 790
    role: "example"
    english: "He used to be a heavy drinker, but he rarely drinks these days."
    japanese: "彼はかつては大酒飲みだったが、近頃はめったに飲まない"
    notes: "drinker→heavy(量が多い)"
  - id: "nar-1308-e791"
    section_id: "Nar_13_08"
    drill: 0
    number: 791
    role: "example"
    english: "The army suffered heavy losses in the battle."
    japanese: "この戦いで軍は大損失を被った"
    notes: "losses→heavy(程度が大きい)"
  - id: "nar-1308-e792"
    section_id: "Nar_13_08"
    drill: 0
    number: 792
    role: "example"
    english: "Protecting our citizens is a heavy responsibility."
    japanese: "市民を守ることは責任の重いことだ"
    notes: "responsibility→heavy(ずっしり重い)"
  - id: "nar-1308-e793"
    section_id: "Nar_13_08"
    drill: 0
    number: 793
    role: "example"
    english: "Let's have a light meal and go for a walk."
    japanese: "軽い食事をして散歩に行こう"
    notes: "meal→light(heavyの反対)"
  - id: "nar-1308-e794"
    section_id: "Nar_13_08"
    drill: 0
    number: 794
    role: "example"
    english: "Cigarettes are harmful even if you're a light smoker."
    japanese: "あまり吸わない人であっても、たばこは害になる"
    notes: "smoker→light(量が少ない)"
  - id: "nar-1308-e795"
    section_id: "Nar_13_08"
    drill: 0
    number: 795
    role: "example"
    english: "He received light punishment."
    japanese: "彼は軽い罰を受けた"
    notes: "punishment→light(程度が小さい)"

