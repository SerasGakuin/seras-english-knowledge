# Nar_13_07: 数量表現 (p.471-473)

sentences:
  - id: "nar-1307-e779"
    section_id: "Nar_13_07"
    drill: 0
    number: 779
    role: "example"
    english: "That store has few books for kids."
    japanese: "その店にはほとんど子供向けの本がない"
    notes: "few(aなし)=否定的。可算名詞と共に使用"
  - id: "nar-1307-e780"
    section_id: "Nar_13_07"
    drill: 0
    number: 780
    role: "example"
    english: "I have a few books to take with me on vacation."
    japanese: "私は休暇に持っていく本を少しは持っている"
    notes: "a few=肯定的(少しはある)。aがつく方が肯定的"
  - id: "nar-1307-e781"
    section_id: "Nar_13_07"
    drill: 0
    number: 781
    role: "example"
    english: "We have little sugar, so I'll use honey instead."
    japanese: "うちにはほとんど砂糖がないので、代わりに蜂蜜を使おう"
    notes: "little(aなし)=否定的。不可算名詞と共に使用"
  - id: "nar-1307-e782"
    section_id: "Nar_13_07"
    drill: 0
    number: 782
    role: "example"
    english: "We have a little sugar but no flour."
    japanese: "砂糖は少しあるが、小麦粉はない"
    notes: "a little=肯定的(少しはある)"
  - id: "nar-1307-e783"
    section_id: "Nar_13_07"
    drill: 0
    number: 783
    role: "example"
    english: "He has written not a few books on the subject."
    japanese: "彼はそのテーマについてかなり多くの本を執筆している"
    notes: "not a few=かなり多い(二重否定: 少なくはない)"
  - id: "nar-1307-e784"
    section_id: "Nar_13_07"
    drill: 0
    number: 784
    role: "example"
    english: "Growing a green lawn requires not a little water."
    japanese: "緑の芝生を育てるにはかなり多くの水が必要だ"
    notes: "not a little=かなり多い(二重否定)"
  - id: "nar-1307-e785"
    section_id: "Nar_13_07"
    drill: 0
    number: 785
    role: "example"
    english: "Many a student has failed this exam."
    japanese: "多くの生徒がこの試験に落ちた"
    notes: "many a+単数名詞=多くの。動詞は単数一致(has)"
  - id: "nar-1307-e786"
    section_id: "Nar_13_07"
    drill: 0
    number: 786
    role: "example"
    english: "A great many students have failed this exam."
    japanese: "かなり多くの生徒がこの試験に落ちた"
    notes: "a great[good] many+複数名詞=かなり多くの"

