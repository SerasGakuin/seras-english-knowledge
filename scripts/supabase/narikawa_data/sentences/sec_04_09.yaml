# Nar_04_09: 〈助動詞+have+Vp.p.〉 (p.143-146)

sentences:
  - id: "nar-0409-e215"
    section_id: "Nar_04_09"
    drill: 0
    number: 215
    role: "example"
    english: "You must have eaten something that didn't agree with you."
    japanese: "体質に合わないものを食べたに違いないわね"
    notes: "must+have+Vp.p.「〜だったに違いない」。文脈: 息子「ひどくおなかが痛いんだ(I have an awful stomachache.)」に対する母の推量"
  - id: "nar-0409-e216"
    section_id: "Nar_04_09"
    drill: 0
    number: 216
    role: "example"
    english: "I should have written to you much earlier."
    japanese: "私はもっと早くあなたに手紙を書くべきだったのに"
    notes: "should[ought to]+have+Vp.p.「〜すべきだったのに（実際にはしなかった）」。否定形はshould not have written [ought not to have written]"
  - id: "nar-0409-e217"
    section_id: "Nar_04_09"
    drill: 0
    number: 217
    role: "example"
    english: "I need not have got up so early."
    japanese: "私はあんなに早く起きる必要はなかったのに"
    notes: "need not+have+Vp.p.「〜する必要はなかったのに（実際はした）」。助動詞needには過去形がないためこの形を使う"
  - id: "nar-0409-e218"
    section_id: "Nar_04_09"
    drill: 0
    number: 218
    role: "example"
    english: "Something must have happened."
    japanese: "きっと何かが起こったはずだ"
    notes: "〈助動詞+have+Vp.p.〉の共通メッセージ: 過去の事柄を現在の立場から推測や評価をする"
  - id: "nar-0409-v001"
    section_id: "Nar_04_09"
    drill: 0
    number: 1
    role: "example"
    english: "By this time next year I may have married her."
    japanese: "来年の今ごろまでには彼女と結婚しているかもしれない"
    notes: "▶ 脚注*1。may have+Vp.p.が未来完了形のwillがmayに変わった用法。時を表す語句で判別"

