    role: "example"
    english: "Mary is thin. However, she is strong."
    japanese: "メアリーはやせている。しかしながら、彼女は丈夫だ"
    notes: "接続副詞howeverの正しい使い方。ピリオドで文を分けるか、セミコロン(;)を使う"
  - id: "nar-0714-e435"
    section_id: "Nar_07_14"
    drill: 0
    number: 435
    role: "example"
    english: "Though Mary is thin, she is strong."
    japanese: "メアリーはやせているけれども、彼女は丈夫だ"
    notes: "従属接続詞thoughによる書き換え。従属接続詞の前にコンマは打たないのが通例"

