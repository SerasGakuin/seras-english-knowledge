# Nar_04_12: その他の助動詞(2) (p.153-156)

sentences:
  - id: "nar-0412-e227"
    section_id: "Nar_04_12"
    drill: 0
    number: 227
    role: "example"
    english: "I won't give you a kiss."
    japanese: "私はどうしてもあなたにはキスしたくない"
    notes: "won't = 意志の否定「どうしても〜しようとしない」"
  - id: "nar-0412-e228"
    section_id: "Nar_04_12"
    drill: 0
    number: 228
    role: "example"
    english: "He tried to open the door, but the key wouldn't turn."
    japanese: "彼はドアを開けようとしたが、鍵がどうしても回らなかった"
    notes: "wouldn't = 過去の意志の否定。the keyの擬人化 — モノにもwouldn'tを使える"
  - id: "nar-0412-e229"
    section_id: "Nar_04_12"
    drill: 0
    number: 229
    role: "example"
    english: "\"Let's go to the movies.\" \"I would rather stay at home.\""
    japanese: "「映画に行こう」「どちらかと言えば私は家にいたい」"
    notes: "would rather V「むしろ〜したい」。否定形はwould rather not V"
  - id: "nar-0412-e230"
    section_id: "Nar_04_12"
    drill: 0
    number: 230
    role: "example"
    english: "I would rather stay at home than go out."
    japanese: "出かけるよりは家にいたい"
    notes: "would rather V₁ than V₂「V₂するよりはV₁したい」"
  - id: "nar-0412-e231"
    section_id: "Nar_04_12"
    drill: 0
    number: 231
    role: "example"
    english: "You have only to wait."
    japanese: "あなたはただ待てばよいのです"
    notes: "have only to V = have to+only「Vしさえすればよい」。Vすることで結果が得られる場面で使う"
  - id: "nar-0412-e232"
    section_id: "Nar_04_12"
    drill: 0
    number: 232
    role: "example"
    english: "How dare you speak to me like that?"
    japanese: "よくもそんなふうに私に話しかけられるね"
    notes: "How dare SV(原形)〜?「よくもVできるな」（他者への憤慨）"
  - id: "nar-0412-e233"
    section_id: "Nar_04_12"
    drill: 0
    number: 233
    role: "example"
    english: "He dare not complain to her."
    japanese: "彼は彼女に文句を言う勇気がない"
    notes: "dare not V「Vする勇気がない」。否定文・疑問文で用いるのが原則。一般動詞dare: He doesn't dare (to) complain...と書き換え可"

