# Nar_07_05: 従属接続詞thatの用法(2) (p.252-254)

sentences:
  - id: "nar-0705-e381"
    section_id: "Nar_07_05"
    drill: 0
    number: 381
    role: "example"
    english: "The rumor that he was killed in the war is not true."
    japanese: "彼が戦死したといううわさは本当ではない"
    notes: "同格節のthat。The rumorの内容を説明。後ろは完全な文"
  - id: "nar-0705-e382"
    section_id: "Nar_07_05"
    drill: 0
    number: 382
    role: "example"
    english: "I cannot believe the fact that she knows."
    japanese: "私は彼女が知っている事実を信じることができない"
    notes: "関係代名詞のthat。knowsの後ろにOがない(不完全な文)→関係代名詞"
  - id: "nar-0705-e383"
    section_id: "Nar_07_05"
    drill: 0
    number: 383
    role: "example"
    english: "I cannot believe the fact that she entered the room."
    japanese: "私は彼女がその部屋に入ったという事実を信じることができない"
    notes: "同格節のthat(接続詞)。that以下は完全な文→接続詞→the factの内容を説明"
  - id: "nar-0705-e384"
    section_id: "Nar_07_05"
    drill: 0
    number: 384
    role: "example"
    english: "It is her lack of experience that irritates us."
    japanese: "私たちをイライラさせるのは彼女の経験のなさだ"
    notes: "強調構文(分裂文)。her lack of experienceをIt is...thatではさんで強調。人→who、人以外→whichに書き換え可"
  - id: "nar-0705-v001"
    section_id: "Nar_07_05"
    drill: 0
    number: 1
    role: "example"
    english: "Her lack of experience irritates us."
    japanese: "彼女の経験のなさが私たちをイライラさせる"
    notes: "▶強調構文の元の文。S V O構文"

