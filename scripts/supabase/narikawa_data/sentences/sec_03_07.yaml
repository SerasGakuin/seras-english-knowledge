# Nar_03_07: 未来を表すさまざまな表現(2)（p.106-109）

sentences:
  - id: "nar-0307-e151"
    section_id: "Nar_03_07"
    drill: 0
    number: 1
    role: "example"
    english: "I am going to go to Kyoto next month."
    japanese: "来月、京都に行くことになっているんだ"
    notes: "be going to: あらかじめ決まっている確実な予定"
  - id: "nar-0307-e152"
    section_id: "Nar_03_07"
    drill: 0
    number: 2
    role: "example"
    english: "She is going to go to Kyoto next month."
    japanese: "彼女は、来月きっと京都に行くだろう"
    notes: "be going toの推量用法: 根拠・兆候に基づく"
  - id: "nar-0307-e153"
    section_id: "Nar_03_07"
    drill: 0
    number: 3
    role: "example"
    english: "It will rain this evening."
    japanese: "今晩、雨が降りそうだね"
    notes: "willの推量: その場での主観的判断"
  - id: "nar-0307-e154"
    section_id: "Nar_03_07"
    drill: 0
    number: 4
    role: "example"
    english: "It is going to rain this evening."
    japanese: "今晩、雨が降るらしいよ"
    notes: "be going toの推量: 天気予報などの客観的根拠をもとにした推量"
  - id: "nar-0307-e155"
    section_id: "Nar_03_07"
    drill: 0
    number: 5
    role: "example"
    english: "I am taking an exam next week."
    japanese: "私は来週、試験を受けることになっている"
    notes: "現在進行形で未来の確実な予定。個人的な予定に使われることが多い"
  - id: "nar-0307-e156"
    section_id: "Nar_03_07"
    drill: 0
    number: 6
    role: "example"
    english: "Tomorrow is Sunday."
    japanese: "明日は日曜日だ"
    notes: "現在形で未来: 変わることのない事実"
  - id: "nar-0307-e157"
    section_id: "Nar_03_07"
    drill: 0
    number: 7
    role: "example"
    english: "I will be twenty tomorrow."
    japanese: "私は明日で20歳になります"
    notes: "will: 現時点では20歳でないので推量のwillを使う"
  - id: "nar-0307-e158"
    section_id: "Nar_03_07"
    drill: 0
    number: 8
    role: "example"
    english: "I am about to leave."
    japanese: "私は今まさに出かけようとしているところだ"
    notes: "be about to V: まさにVするところだ。aboutは「周囲・周辺」→間近な感じ"
  - id: "nar-0307-e159"
    section_id: "Nar_03_07"
    drill: 0
    number: 9
    role: "example"
    english: "She is supposed to be here at ten every day."
    japanese: "彼女は毎日10時にここに来ることになっている"
    notes: "be supposed to V: 前提としてVすることになっている"
  - id: "nar-0307-e160"
    section_id: "Nar_03_07"
    drill: 0
    number: 10
    role: "example"
    english: "He was scheduled to be paroled in two days."
    japanese: "彼は2日後に仮釈放されることになっていた"
    notes: "be scheduled to V: Vすることが計画されている"
  - id: "nar-0307-e161"
    section_id: "Nar_03_07"
    drill: 0
    number: 11
    role: "example"
    english: "I will have finished my work by Friday."
    japanese: "金曜日までに仕事をやり終えているだろう"
    notes: "未来完了形: 現在完了形 + 推量のwill。by Friday が未来のことなのでwillを添える"
  - id: "nar-0307-v001"
    section_id: "Nar_03_07"
    drill: 0
    number: 12
    role: "example"
    english: "I have finished my work."
    japanese: "私は仕事をやり終えた"
    notes: "▶ パターン例文。現在完了形の基本。未来完了形(e161)との対比"

