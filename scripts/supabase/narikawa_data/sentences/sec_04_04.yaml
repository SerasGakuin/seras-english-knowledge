# Nar_04_04: 助動詞can (p.129-132)

sentences:
  - id: "nar-0404-e188"
    section_id: "Nar_04_04"
    drill: 0
    number: 188
    role: "example"
    english: "I can get a perfect score on the next test."
    japanese: "僕は次の試験で満点を取ることが可能だ"
    notes: "canの基本用法(1): 実現の可能性「（その気になれば）〜できる」"
  - id: "nar-0404-e189"
    section_id: "Nar_04_04"
    drill: 0
    number: 189
    role: "example"
    english: "It can be very warm even in November."
    japanese: "11月でもとても暖かいことがある"
    notes: "canの基本用法(2): 理論上の可能性「（時に）〜する可能性がある」。理論や経験に基づいた一般的な可能性"
  - id: "nar-0404-e190"
    section_id: "Nar_04_04"
    drill: 0
    number: 190
    role: "example"
    english: "You can count on me."
    japanese: "君は僕に頼っていいよ"
    notes: "canの応用用法(3): 軽い許可。mayと違いカジュアルで、友人同士など対等な関係で用いる"
  - id: "nar-0404-e191"
    section_id: "Nar_04_04"
    drill: 0
    number: 191
    role: "example"
    english: "Can it be true?"
    japanese: "それは一体、本当だろうか"
    notes: "canの応用用法(4): 強い疑い。「〜する可能性がある」のcanを疑問文で使い「〜する可能性があるの？」の意味"
  - id: "nar-0404-e192"
    section_id: "Nar_04_04"
    drill: 0
    number: 192
    role: "example"
    english: "You will be able to dance next month."
    japanese: "来月には踊れるようになりますよ"
    notes: "助動詞同士は併用不可。「〜できるだろう」はwill be able to Vで表す"
  - id: "nar-0404-e193"
    section_id: "Nar_04_04"
    drill: 0
    number: 193
    role: "example"
    english: "Thanks to his advice, I was able to finish it in time."
    japanese: "彼の助言のおかげで、それを時間までに終えられた"
    notes: "(✕) could。過去の1回限りの行為「（実際に）Vできた」にはcouldは不可。was able to V / managed to Vを使う"
  - id: "nar-0404-e194"
    section_id: "Nar_04_04"
    drill: 0
    number: 194
    role: "example"
    english: "Mike was an excellent runner when he was younger. He could beat anybody."
    japanese: "マイクは若いころは優れたランナーだった。彼は誰にでも勝てた"
    notes: "couldは「実現の可能性があった」だけで実際に行われたかは不明。ここでは「勝てる可能性があった」の意味"
  - id: "nar-0404-e195"
    section_id: "Nar_04_04"
    drill: 0
    number: 195
    role: "example"
    english: "My grandfather wasn't able to read the small print."
    japanese: "祖父は小さい活字が読めなかった"
    notes: "否定文ではcouldとwas[were] able toはほぼ同じ意味で使える。couldn'tでもほぼ同義"

