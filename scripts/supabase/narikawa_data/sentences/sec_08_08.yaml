# Nar_08_08: 関係形容詞 what、その他の what (p.308-311)

sentences:
  - id: "nar-0808-e457"
    section_id: "Nar_08_08"
    drill: 0
    number: 457
    role: "example"
    english: "He had to sell what books he had."
    japanese: "彼は、持っていたすべての本を売らなければならなかった"
    notes: "関係形容詞what。〈what+名詞〉の形。後ろは完全な文(O+S+V)。訳「すべての〜」"
  - id: "nar-0808-e458"
    section_id: "Nar_08_08"
    drill: 0
    number: 458
    role: "example"
    english: "He had to sell what few books he had."
    japanese: "彼は、わずかながら持っていたすべての本を売らなければならなかった"
    notes: "what few+可算名詞=「少ないながらもすべての〜」"
  - id: "nar-0808-e459"
    section_id: "Nar_08_08"
    drill: 0
    number: 459
    role: "example"
    english: "She gave me what little money she had."
    japanese: "彼女は、わずかながら持っていたすべてのお金を私にくれた"
    notes: "what little+不可算名詞=「少ないながらもすべての〜」"
  - id: "nar-0808-e460"
    section_id: "Nar_08_08"
    drill: 0
    number: 460
    role: "example"
    english: "The train might be late, in which case you may take a bus."
    japanese: "電車は遅れるかもしれない。その場合はバスを使ってよい"
    notes: "関係形容詞which。非制限用法で〈前置詞+which+名詞〉の形。先行詞は前の節全体（または一部）"
  - id: "nar-0808-e461"
    section_id: "Nar_08_08"
    drill: 0
    number: 461
    role: "example"
    english: "My mother said she didn't like the story, which opinion surprised me."
    japanese: "母はその物語は好きじゃないと言い、その意見は私を驚かせた"
    notes: "関係形容詞which（前置詞なし）。先行詞はshe didn't like the storyの部分"
  - id: "nar-0808-e462"
    section_id: "Nar_08_08"
    drill: 0
    number: 462
    role: "example"
    english: "He doesn't know what is most important in life."
    japanese: "彼は、人生において最も大切なことがわかっていない"
    notes: "関代what「〜こと」と疑問代名詞what「何が〜か」は文脈次第でどちらでも通じることが多い"
  - id: "nar-0808-e463"
    section_id: "Nar_08_08"
    drill: 0
    number: 463
    role: "example"
    english: "Do you know what time the movie starts?"
    japanese: "映画は何時に始まるのか知っていますか"
    notes: "疑問形容詞what。〈what+名詞〉=「何の〜・どんな〜」。関係形容詞whatと区別する"

