# Nar_03_04: 過去形と現在完了形(2)（p.98-99）

sentences:
  - id: "nar-0304-e137"
    section_id: "Nar_03_04"
    drill: 0
    number: 1
    role: "example"
    english: "I have visited Okinawa many times."
    japanese: "私は何度も沖縄を訪れたことがある"
    notes: "have+Vp.p.: 訪れたことを現在もっている → 今でも頭に思い出として残っている"
  - id: "nar-0304-e138"
    section_id: "Nar_03_04"
    drill: 0
    number: 2
    role: "example"
    english: "I have known her since she was a girl."
    japanese: "私は彼女が少女だった頃からの知り合いだ"
    notes: "have+Vp.p.: 知り合ったことを現在もっている → 今でも関係が続いている"
  - id: "nar-0304-e139"
    section_id: "Nar_03_04"
    drill: 0
    number: 3
    role: "example"
    english: "I have just finished my homework."
    japanese: "私はちょうど宿題を終えたところだ"
    notes: "have+Vp.p.: 終えたことを現在もっている → 宿題を終えた状態が今ある"
  - id: "nar-0304-e140"
    section_id: "Nar_03_04"
    drill: 0
    number: 4
    role: "example"
    english: "He is living in India."
    japanese: "彼はインドに住んでいる"
    notes: "現在進行形: 今だけ一時的にインドに住んでいる感じ"
  - id: "nar-0304-e141"
    section_id: "Nar_03_04"
    drill: 0
    number: 5
    role: "example"
    english: "He has been living in India for two weeks."
    japanese: "彼は2週間インドに住んでいる"
    notes: "現在完了進行形: 2週間前から今も住み続けている感じ"
  - id: "nar-0304-e142"
    section_id: "Nar_03_04"
    drill: 0
    number: 6
    role: "example"
    english: "He has repaired the engine."
    japanese: "彼はエンジンを修理した"
    notes: "現在完了形: 修理が終わっている（完了した状態をもっている）"
  - id: "nar-0304-e143"
    section_id: "Nar_03_04"
    drill: 0
    number: 7
    role: "example"
    english: "He has been repairing the engine."
    japanese: "彼はエンジンを修理している"
    notes: "現在完了進行形: まだ修理中（修理している最中の状態をもっている）"

