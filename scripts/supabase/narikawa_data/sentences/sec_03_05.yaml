# Nar_03_05: 過去完了形（p.100-102）

sentences:
  - id: "nar-0305-e144"
    section_id: "Nar_03_05"
    drill: 0
    number: 1
    role: "example"
    english: "The plane had already left when I got to Haneda Airport."
    japanese: "私が羽田空港に到着したとき、飛行機はすでに飛び立っていた"
    notes: "過去完了形: got（過去の一時点）よりも前にhad left（さらに前の事柄）"
  - id: "nar-0305-e145"
    section_id: "Nar_03_05"
    drill: 0
    number: 2
    role: "example"
    english: "The teacher got angry because we hadn't finished the homework by the deadline."
    japanese: "期限までに宿題を終えなかったので、先生は怒った"
    notes: "過去完了形: 先生が怒った時点より、宿題を終えなかったことの方がさらに前の出来事"
  - id: "nar-0305-e146"
    section_id: "Nar_03_05"
    drill: 0
    number: 3
    role: "example"
    english: "I lost my key, but it was found in the store."
    japanese: "私は鍵をなくしたが、そのお店で見つかった"
    notes: "等位接続詞butで順番通りに並べているだけ。had lostにする必要なし（過去完了の乱用を避ける例）"
  - id: "nar-0305-e147"
    section_id: "Nar_03_05"
    drill: 0
    number: 4
    role: "example"
    english: "I went out after my brother had left."
    japanese: "兄が去った後、私は外出した"
    notes: "afterがあるので had left → left でも代用可能"

