# Nar_09_19: その他の前置詞の用法(2) beyond/across/between/among/against (p.376-378)

sentences:
  - id: "nar-0919-e627"
    section_id: "Nar_09_19"
    drill: 0
    number: 627
    role: "example"
    english: "The nearest village is beyond those mountains."
    japanese: "一番近い村はあの山の向こうにある"
    notes: "beyondの基本「はるかに超えて→手が届かない」"
  - id: "nar-0919-e628"
    section_id: "Nar_09_19"
    drill: 0
    number: 628
    role: "example"
    english: "Be careful when you walk across the street."
    japanese: "通りを歩いて横断するときは気をつけなさい"
    notes: "acrossの基本「横切る」。crossが含まれている→交差の感覚"
  - id: "nar-0919-e629"
    section_id: "Nar_09_19"
    drill: 0
    number: 629
    role: "example"
    english: "The train runs between New York and Boston."
    japanese: "その列車はニューヨーク、ボストン間を走る"
    notes: "betweenの基本。between A and B＝AとBとの間。be(=by)+tween(=two)が語源→原則2者間"
  - id: "nar-0919-e630"
    section_id: "Nar_09_19"
    drill: 0
    number: 630
    role: "example"
    english: "Switzerland lies between France, Italy, Austria and Germany."
    japanese: "スイスはフランス、イタリア、オーストリア、ドイツに囲まれている"
    notes: "betweenが3者以上。各2者間の関係（ペア）が強く意識されている場合に使える"
  - id: "nar-0919-e631"
    section_id: "Nar_09_19"
    drill: 0
    number: 631
    role: "example"
    english: "There was a small cottage among the trees."
    japanese: "木々の間に小さなコテージがあった"
    notes: "among。通例3者以上。グループ・集合体をイメージ"
  - id: "nar-0919-e632"
    section_id: "Nar_09_19"
    drill: 0
    number: 632
    role: "example"
    english: "He fights against the enemy."
    japanese: "彼は敵と戦う"
    notes: "againstの基本「⇔」→対立。fight against〜は対抗の意味が色濃い"
  - id: "nar-0919-e633"
    section_id: "Nar_09_19"
    drill: 0
    number: 633
    role: "example"
    english: "Are you for or against my opinion?"
    japanese: "私の意見に賛成ですか、反対ですか"
    notes: "against→反対。forとの対比"
  - id: "nar-0919-e634"
    section_id: "Nar_09_19"
    drill: 0
    number: 634
    role: "example"
    english: "The church stood out against the blue sky."
    japanese: "その教会は青空を背景にくっきりそびえ立っていた"
    notes: "against→対照（対比）。白い教会⇔青空のコントラスト"
  - id: "nar-0919-e635"
    section_id: "Nar_09_19"
    drill: 0
    number: 635
    role: "example"
    english: "We must store food against the winter."
    japanese: "私たちは冬に備えて食料を蓄えなければならない"
    notes: "against→準備（防御）。冬に対して→冬に備えて"

