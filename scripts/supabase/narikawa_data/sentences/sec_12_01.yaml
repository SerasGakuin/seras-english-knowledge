# Nar_12_01: one, it, thatの用法 (p.439-442)

sentences:
  - id: "nar-1201-e725"
    section_id: "Nar_12_01"
    drill: 0
    number: 725
    role: "example"
    english: "I have lost my smartphone, and I have to buy one."
    japanese: "私はスマートフォンをなくしたので買わなくてはいけない"
    notes: "one=前出名詞と同種の別物。なくしたのとは別のスマートフォン"
  - id: "nar-1201-e726"
    section_id: "Nar_12_01"
    drill: 0
    number: 726
    role: "example"
    english: "I lost my smartphone, but my friend found it."
    japanese: "私はスマートフォンをなくしたが、友達がそれを見つけた"
    notes: "it=前出と全く同じもの（なくしたスマートフォンそのもの）"
  - id: "nar-1201-e727"
    section_id: "Nar_12_01"
    drill: 0
    number: 727
    role: "example"
    english: "Could I have a smaller one, please?"
    japanese: "もっと小さいのをいただけますか"
    notes: "one=前から修飾可能（a smaller one）。代名詞は通常修飾不可だがoneは例外"
  - id: "nar-1201-e728"
    section_id: "Nar_12_01"
    drill: 0
    number: 728
    role: "example"
    english: "\"Which bag is yours?\" \"The one with a zipper.\""
    japanese: "「どっちが君のかばん？」「チャックがついている方だよ」"
    notes: "one=後ろから修飾可能（the one with~）。ただしone of~は不可（数詞と解釈される）"
  - id: "nar-1201-e729"
    section_id: "Nar_12_01"
    drill: 0
    number: 729
    role: "example"
    english: "My experience is different from that of my friends."
    japanese: "私の経験は友人たちのものと違っている"
    notes: "that=後ろからのみ修飾可能（that of~）。one of~が不可な場合にthatを使う"
  - id: "nar-1201-e730"
    section_id: "Nar_12_01"
    drill: 0
    number: 730
    role: "example"
    english: "The coins are rare ones."
    japanese: "そのコインはどれも珍しいものだ"
    notes: "ones=oneの複数形。複数形でも修飾ルールは同様（thoseも同様）"

