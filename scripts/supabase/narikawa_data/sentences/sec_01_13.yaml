# Nar_01_13: パターンで理解する動詞(3) — V+A+for+B / V+A+as+B（p.51-53）

sentences:
  - id: "nar-0113-e052"
    section_id: "Nar_01_13"
    drill: 0
    number: 1
    role: "example"
    english: "I'm leaving for Hawaii soon."
    japanese: "私はハワイに向けてまもなく出発する"
    notes: "forの基本イメージ「意識の向かう先」の導入例"
  - id: "nar-0113-e053"
    section_id: "Nar_01_13"
    drill: 0
    number: 2
    role: "example"
    english: "He blamed me for the accident."
    japanese: "彼はその事故の責任が私にあると思っていた"
    notes: "V+A+for+B（理由）。賞罰の動詞"
  - id: "nar-0113-e054"
    section_id: "Nar_01_13"
    drill: 0
    number: 3
    role: "example"
    english: "Mike exchanged an old shirt for a new one."
    japanese: "マイクは古いシャツを新しいのと取り換えた"
    notes: "V+A+for+B（交換）。Bに優位なもの（新しいシャツ）"
  - id: "nar-0113-e055"
    section_id: "Nar_01_13"
    drill: 0
    number: 4
    role: "example"
    english: "Johnny paid $500 for the ticket."
    japanese: "ジョニーはそのチケットに500ドル払った"
    notes: "V+A+for+B（交換）。お金を払って手に入れたいものはB"
  - id: "nar-0113-e056"
    section_id: "Nar_01_13"
    drill: 0
    number: 5
    role: "example"
    english: "Mary sold the ticket for $50."
    japanese: "メアリーはそのチケットを50ドルで売った"
    notes: "V+A+for+B（交換）。売買で意識の向かう先はB（お金）"
  - id: "nar-0113-e057"
    section_id: "Nar_01_13"
    drill: 0
    number: 6
    role: "example"
    english: "He bought the ticket for $50."
    japanese: "彼はそのチケットを50ドルで買った"
    notes: "V+A+for+B（交換）。売買で意識の向かう先はB（お金）"
  - id: "nar-0113-e058"
    section_id: "Nar_01_13"
    drill: 0
    number: 7
    role: "example"
    english: "I substituted margarine for butter."
    japanese: "マーガリンをバターの代わりにした"
    notes: "V+A+for+B（交換）。本来使いたいものがB（バター）"
  - id: "nar-0113-e059"
    section_id: "Nar_01_13"
    drill: 0
    number: 8
    role: "example"
    english: "I regard him as the best doctor in town."
    japanese: "私は彼を町で一番の名医だと考えている"
    notes: "V+A+as+B。asの基本イメージ「イコール」。him = the best doctor"
  - id: "nar-0113-v001"
    section_id: "Nar_01_13"
    drill: 0
    number: 9
    role: "example"
    english: "I regard cheating as wrong."
    japanese: "ごまかすのは悪いことだと私は思う"
    notes: "V+A+as+B。Bに名詞以外（形容詞wrong）が置かれる例。脚注＊2"

