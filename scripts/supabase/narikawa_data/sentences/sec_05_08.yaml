    number: 260
    role: "example"
    english: "She talked as if she had known the secret."
    japanese: "彼女はまるで秘密を知っていたかのように話した"
    notes: "as if+仮定法過去完了。主節が過去(talked)でas if節の内容がさらに前の過去（前の時→仮定法過去完了）"
  - id: "nar-0508-e261"
    section_id: "Nar_05_08"
    drill: 0
    number: 261
    role: "example"
    english: "You look as if [as though] you are very sleepy."
    japanese: "あなたはとても眠そうに見える"
    notes: "as if+直説法。話し手が現実性が高いと感じている場合。as thoughも同義"
  - id: "nar-0508-e262"
    section_id: "Nar_05_08"
    drill: 0
    number: 262
    role: "example"
    english: "She shook her head as if to say \"Don't trust him.\""
    japanese: "彼女はまるで「彼を信用するな」と言うかのように首を振った"
    notes: "〈as if to V〉「まるでVするかのように」の応用表現"
  - id: "nar-0508-v001"
    section_id: "Nar_05_08"
    drill: 0
    number: 1
    role: "example"
    english: "She walked with difficulty as if in pain."
    japanese: "彼女は痛むかのように歩くのに苦労した"
    notes: "as if+前置詞句の省略構造。脚注*3: as ifの後には分詞・形容詞・前置詞句なども置かれる"

