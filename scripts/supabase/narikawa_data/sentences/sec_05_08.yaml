    role: "example"
    english: "She talks as if she had known the secret."
    japanese: "彼女はまるで秘密を知っていたかのように話す"
    notes: "as if+仮定法過去完了。主節が現在(talks)でas if節の内容がそれより前（前の時→仮定法過去完了）"
  - id: "nar-0508-e260"
