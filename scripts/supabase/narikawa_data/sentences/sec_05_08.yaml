    role: "example"
    english: "She talks as if she knew the secret."
    japanese: "彼女はまるで秘密を知っているかのように話す"
    notes: "as if+仮定法過去。主節が現在(talks)でas if節の内容も現在（同じ時→仮定法過去）"
