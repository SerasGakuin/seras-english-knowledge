# Nar_03_08: 時や条件を表す副詞節中の時制、時制の一致 (p.110-113)

sentences:
  - id: "nar-0308-e162"
    section_id: "Nar_03_08"
    drill: 0
    number: 162
    role: "example"
    english: "I will discuss the matter if he comes home."
    japanese: "彼が帰宅したら、私はそのことについて議論するつもりだ"
    notes: "帰宅を前提→推量のwillは不要→現在形comes"
  - id: "nar-0308-e163"
    section_id: "Nar_03_08"
    drill: 0
    number: 163
    role: "example"
    english: "I don't know if he will come home."
    japanese: "私は彼が帰宅するかどうかはわからない"
    notes: "帰宅するかは不明→推量のwill。162との対比で「前提 vs 推量」を示す"
  - id: "nar-0308-e164"
    section_id: "Nar_03_08"
    drill: 0
    number: 164
    role: "example"
    english: "I wonder when we will meet again."
    japanese: "いつまた会えるだろうか"
    notes: "会えるかどうかグレー→推量のwill"
  - id: "nar-0308-e165"
    section_id: "Nar_03_08"
    drill: 0
    number: 165
    role: "example"
    english: "As soon as we arrive in Tokyo, we'll visit Akihabara."
    japanese: "東京に着いたらすぐに私たちは秋葉原に行きます"
    notes: "東京に着くことを前提→推量のwillは不要→現在形arrive"
  - id: "nar-0308-e166"
    section_id: "Nar_03_08"
    drill: 0
    number: 166
    role: "example"
    english: "If you will succeed, you must work hard."
    japanese: "成功したいのなら、懸命に勉強しなければいけない"
    notes: "条件の副詞節中だがwillが入る。このwillは推量ではなく主語(you)の「意志」。入試出題はきわめてまれ（脚注*3）"
  - id: "nar-0308-e167"
    section_id: "Nar_03_08"
    drill: 0
    number: 167
    role: "example"
    english: "He said that light travels faster than sound."
    japanese: "彼は、光は音よりも速く進むと言った"
    notes: "時制の一致をせず現在形。話者がthat以下を疑いもない事実と見なしている"
  - id: "nar-0308-e168"
    section_id: "Nar_03_08"
    drill: 0
    number: 168
    role: "example"
    english: "He said that light traveled faster than sound."
    japanese: "彼は、光は音よりも速く進むと言った"
    notes: "時制の一致で過去形。167と和訳は同じだが、事実かどうか疑いを持っているニュアンス。過去形の距離感"

