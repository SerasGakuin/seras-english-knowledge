# Nar_09_04: 前置詞 in の用法(2) (p.337-339)

sentences:
  - id: "nar-0904-e514"
    section_id: "Nar_09_04"
    drill: 0
    number: 514
    role: "example"
    english: "The sun rises in the east and sets in the west."
    japanese: "太陽は東から昇り、西に沈む"
    notes: "方向・方角のin。東西南北は360度を4分割した枠組み→in"
  - id: "nar-0904-e515"
    section_id: "Nar_09_04"
    drill: 0
    number: 515
    role: "example"
    english: "Japan is to the east of China."
    japanese: "日本は中国の東方にある"
    notes: "対比用。toは「到達」→中国から東に向かうと日本に到達するのでto"
  - id: "nar-0904-e516"
    section_id: "Nar_09_04"
    drill: 0
    number: 516
    role: "example"
    english: "Harry is majoring in law at university."
    japanese: "ハリーは大学で法学を専攻している"
    notes: "分野・範囲の限定のin。法学という「ワクの中」で専攻"
  - id: "nar-0904-e517"
    section_id: "Nar_09_04"
    drill: 0
    number: 517
    role: "example"
    english: "You should be careful in crossing the street."
    japanese: "道路を渡るときは注意しなさい"
    notes: "〈in+Ving〉＝「〜する際に」。be carefulがどの分野で注意かをinで限定。公式暗記不要"
  - id: "nar-0904-e518"
    section_id: "Nar_09_04"
    drill: 0
    number: 518
    role: "example"
    english: "She walked in heavy rain."
    japanese: "彼女は土砂降りの中を歩いた"
    notes: "状態・環境のin。土砂降りという「ワクの中」にいる感覚"
  - id: "nar-0904-e519"
    section_id: "Nar_09_04"
    drill: 0
    number: 519
    role: "example"
    english: "He is in despair."
    japanese: "彼は絶望している"
    notes: "状態・環境のin（抽象）。絶望という「ワクの中」にいる。目に見えない抽象的な状態でもOK"
  - id: "nar-0904-e520"
    section_id: "Nar_09_04"
    drill: 0
    number: 520
    role: "example"
    english: "Ron is in politics."
    japanese: "ロンは政治に携わっている"
    notes: "活動・従事のin。politicsの「ワクの中」にいる→政治に従事。in businessなら仕事に従事"

