# Nar_13_06: mostやalmostを攻略しよう (p.469-470)

sentences:
  - id: "nar-1306-e772"
    section_id: "Nar_13_06"
    drill: 0
    number: 772
    role: "example"
    english: "Most students are given homework."
    japanese: "大半の生徒に宿題が出された"
    notes: "most=形容詞(名詞studentsを直接修飾)"
  - id: "nar-1306-e773"
    section_id: "Nar_13_06"
    drill: 0
    number: 773
    role: "example"
    english: "Most of the students were on time for class."
    japanese: "生徒たちの大半は時間通りに授業に来た"
    notes: "most=代名詞(Sとして機能)。most of the studentsのtheが必要"
  - id: "nar-1306-e774"
    section_id: "Nar_13_06"
    drill: 0
    number: 774
    role: "example"
    english: "He knows almost all the students in the school by name."
    japanese: "彼は学校のほぼすべての生徒の名前を知っている"
    notes: "almost=副詞(allという形容詞を修飾)。「一歩手前」の意味"
  - id: "nar-1306-e775"
    section_id: "Nar_13_06"
    drill: 0
    number: 775
    role: "example"
    english: "The child almost drank the poison."
    japanese: "その子どもはあやうく毒を飲むところだった"
    notes: "almost=一歩手前→あやうく〜するところだった"
  - id: "nar-1306-e776"
    section_id: "Nar_13_06"
    drill: 0
    number: 776
    role: "example"
    english: "Almost everybody in the movie theater was eating popcorn."
    japanese: "映画館にいたほぼすべての人がポップコーンを食べていた"
    notes: "almostはeverybodyのevery(形容詞)の部分だけを修飾"
  - id: "nar-1306-e777"
    section_id: "Nar_13_06"
    drill: 0
    number: 777
    role: "example"
    english: "Most of the students attended the special lecture."
    japanese: "生徒たちの大半が特別講義に出席した"
    notes: "A of B: A=部分、B=全体。Bにはthe/these/所有格等の限定詞が必要"
  - id: "nar-1306-e778"
    section_id: "Nar_13_06"
    drill: 0
    number: 778
    role: "example"
    english: "Some of these books were donated to the library."
    japanese: "これらの本の何冊かは図書館に寄贈された"
    notes: "some of these books: Bにthese(限定詞)がついている"

