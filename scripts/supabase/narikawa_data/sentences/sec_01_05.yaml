# Nar_01_05: 〈S+V+O₁+O₂〉をとる重要動詞（p.28-30）

sentences:
  - id: "nar-0105-e015"
    section_id: "Nar_01_05"
    drill: 0
    number: 1
    role: "example"
    english: "This bag cost me 10,000 yen."
    japanese: "このかばんは10,000円した"
    notes: "cost+O₁+O₂。「O₁からO₂が消える」→10,000円かかった"
  - id: "nar-0105-e016"
    section_id: "Nar_01_05"
    drill: 0
    number: 2
    role: "example"
    english: "One mistake can cost a person his life."
    japanese: "1つの間違いで人は命を失うことがある"
    notes: "cost+O₁+O₂。「O₁からO₂が消える」→命を失わせる"
  - id: "nar-0105-e017"
    section_id: "Nar_01_05"
    drill: 0
    number: 3
    role: "example"
    english: "I spared her the trouble of coming here."
    japanese: "私は彼女がわざわざここに来る手間を省いた"
    notes: "spare+O₁+O₂「O₁のO₂を省く」の用法"
  - id: "nar-0105-e018"
    section_id: "Nar_01_05"
    drill: 0
    number: 4
    role: "example"
    english: "Could you spare me a few minutes?"
    japanese: "私に少々時間を割いていただけないでしょうか？"
    notes: "spare+O₁+O₂「O₁にO₂を割く」の用法"
  - id: "nar-0105-e019"
    section_id: "Nar_01_05"
    drill: 0
    number: 5
    role: "example"
    english: "Too much drinking will do you harm."
    japanese: "酒の飲み過ぎは体に悪い"
    notes: "do+O₁+O₂。O₂=harm（害）。giveで置き換え不可"

