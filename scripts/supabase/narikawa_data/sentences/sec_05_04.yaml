# Nar_05_04: 仮定法過去の重要表現 (p.167-168)

sentences:
  - id: "nar-0504-e243"
    section_id: "Nar_05_04"
    drill: 0
    number: 243
    role: "example"
    english: "If you should come to Tokyo, please let me know."
    japanese: "万一東京に来ることがあったら、ぜひ知らせてください"
    notes: "If+S+should+V。万一〜なら。主節が命令文の例"
  - id: "nar-0504-e244"
    section_id: "Nar_05_04"
    drill: 0
    number: 244
    role: "example"
    english: "If I should fail, I would try again."
    japanese: "万一失敗しても、またやってみようと思います"
    notes: "If+S+should+V。主節が仮定法過去（would）の例。実現の可能性がほぼないと感じている場合"
  - id: "nar-0504-e245"
    section_id: "Nar_05_04"
    drill: 0
    number: 245
    role: "example"
    english: "If I were to say 'no', what would you do?"
    japanese: "もしも私が「ノー」と言ったら、あなたはどうする？"
    notes: "If+S+were to+V。実現するかは別にして「仮の話」。主節は仮定法過去のみ"

