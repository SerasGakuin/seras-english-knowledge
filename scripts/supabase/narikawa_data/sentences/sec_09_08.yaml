# Nar_09_08: 前置詞 from の用法(1) (p.348-349)

sentences:
  - id: "nar-0908-e545"
    section_id: "Nar_09_08"
    drill: 0
    number: 545
    role: "example"
    english: "The police drew much information from the villagers."
    japanese: "警察は村人から多くの情報を得た"
    notes: "fromの基本イメージ「出所」の典型例。情報の出所→村人"
  - id: "nar-0908-e546"
    section_id: "Nar_09_08"
    drill: 0
    number: 546
    role: "example"
    english: "I'm from Japan."
    japanese: "日本出身です"
    notes: "出身のfrom。出所感覚→自分の出身地。対話例: A: Where are you from? B: I'm from Japan."
  - id: "nar-0908-e547"
    section_id: "Nar_09_08"
    drill: 0
    number: 547
    role: "example"
    english: "He flew from Rome to Paris."
    japanese: "彼はローマからパリまで飛行機で行った"
    notes: "from A to Bパターン。出発点（起点）と到達点（終点）を明示"
  - id: "nar-0908-e548"
    section_id: "Nar_09_08"
    drill: 0
    number: 548
    role: "example"
    english: "The accident resulted from carelessness."
    japanese: "その事故は不注意からきていた"
    notes: "間接的な原因のfrom。事故の出所→不注意。fromは間接的原因が多い"
  - id: "nar-0908-e549"
    section_id: "Nar_09_08"
    drill: 0
    number: 549
    role: "example"
    english: "Butter is made from milk."
    japanese: "バターは牛乳からできている"
    notes: "原料のfrom。原形をとどめない場合→from。バターの出所→牛乳"
  - id: "nar-0908-e550"
    section_id: "Nar_09_08"
    drill: 0
    number: 550
    role: "example"
    english: "This table is made of wood."
    japanese: "このテーブルは木製だ"
    notes: "対比用。目で見て材料がわかる→of。made from（原形なし）vs made of（原形あり）"
  - id: "nar-0908-e551"
    section_id: "Nar_09_08"
    drill: 0
    number: 551
    role: "example"
    english: "Judging from the evidence, Jim must be guilty."
    japanese: "その証拠から判断すれば、ジムは有罪に違いない"
    notes: "判断の根拠のfrom。判断の出所→証拠"
  - id: "nar-0908-e552"
    section_id: "Nar_09_08"
    drill: 0
    number: 552
    role: "example"
    english: "Let's look at the thing from another point of view."
    japanese: "その出来事を別の観点から見てみよう"
    notes: "観点のfrom。出所感覚→別の視点から見る"

