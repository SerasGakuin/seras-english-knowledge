# Nar_07_06: 従属接続詞whetherとifの用法 (p.255-258)

sentences:
  - id: "nar-0706-e385"
    section_id: "Nar_07_06"
    drill: 0
    number: 385
    role: "example"
    english: "I wonder whether she knows everything."
    japanese: "彼女がすべてを知っているかどうかは疑問である"
    notes: "whether名詞節「〜かどうか」。wonderの目的語"
  - id: "nar-0706-e386"
    section_id: "Nar_07_06"
    drill: 0
    number: 386
    role: "example"
    english: "Whether we succeed or not, we have to do our best."
    japanese: "成功しようとしまいと、私たちは最善を尽くさなくてはなりません"
    notes: "whether副詞節「〜であろうとなかろうと」。or付き"
  - id: "nar-0706-e387"
    section_id: "Nar_07_06"
    drill: 0
    number: 387
    role: "example"
    english: "I wonder if she knows everything."
    japanese: "彼女がすべてを知っているかどうかは疑問である"
    notes: "if名詞節「〜かどうか」。他動詞wonderの目的語の位置→if使用可"
  - id: "nar-0706-e388"
    section_id: "Nar_07_06"
    drill: 0
    number: 388
    role: "example"
    english: "If it snows tomorrow, I'll stay at home."
    japanese: "もし明日雪なら、私は家にいるつもりだ"
    notes: "if副詞節「もし〜なら」"
  - id: "nar-0706-e389"
    section_id: "Nar_07_06"
    drill: 0
    number: 389
    role: "example"
    english: "Whether he can live abroad is another matter."
    japanese: "彼が海外で生活できるかどうかは別問題だ"
    notes: "whether名詞節が主語(S)。ifは主語の位置では使用不可"
  - id: "nar-0706-e390"
    section_id: "Nar_07_06"
    drill: 0
    number: 390
    role: "example"
    english: "We argued about whether it was the right answer."
    japanese: "それが正しい答えなのかどうかを私たちは議論した"
    notes: "whether名詞節が前置詞aboutの後ろ。ifは前置詞の直後では使用不可"
  - id: "nar-0706-e391"
    section_id: "Nar_07_06"
    drill: 0
    number: 391
    role: "example"
    english: "The question whether he knew may never be answered."
    japanese: "彼が知っていたかどうかという問題には答えが出ないかもしれない"
    notes: "whether同格節。question, choice, decision, doubt等の名詞の直後。ifにこの用法なし"

