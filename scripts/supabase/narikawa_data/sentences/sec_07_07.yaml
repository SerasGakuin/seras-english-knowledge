# Nar_07_07: asの用法 (p.259-261)

sentences:
  - id: "nar-0707-e392"
    section_id: "Nar_07_07"
    drill: 0
    number: 392
    role: "example"
    english: "I regard him as the best singer in Japan."
    japanese: "私は彼を日本で一番の歌手だと思っている"
    notes: "前置詞as。A(him)=B(the best singer)のイコール関係"
  - id: "nar-0707-e393"
    section_id: "Nar_07_07"
    drill: 0
    number: 393
    role: "example"
    english: "As we grow older, our vision becomes weaker."
    japanese: "私たちは年を取るにつれて、視力が衰える"
    notes: "接続詞as（比例「〜につれて」）。年を取るのと同時に視力が…"
  - id: "nar-0707-e394"
    section_id: "Nar_07_07"
    drill: 0
    number: 394
    role: "example"
    english: "I saw Ann as I was getting off the train."
    japanese: "私が電車から降りようとしたとき、アンを見かけた"
    notes: "接続詞as（時「〜したとき」）。降りようとしたのと同時にアンを見かけた"
  - id: "nar-0707-e395"
    section_id: "Nar_07_07"
    drill: 0
    number: 395
    role: "example"
    english: "Do as we do."
    japanese: "私たちがやるようにしなさい"
    notes: "接続詞as（様態「〜のように」）。私たちがするのと同じようにやりなさい"
  - id: "nar-0707-e396"
    section_id: "Nar_07_07"
    drill: 0
    number: 396
    role: "example"
    english: "Life as we know it wouldn't be possible without electricity."
    japanese: "私たちが知っているような生活は電気なしでは成り立たない"
    notes: "名詞限定のas。Lifeをas節が限定。限定される名詞がas節中に代名詞(it)として再登場"
  - id: "nar-0707-e397"
    section_id: "Nar_07_07"
    drill: 0
    number: 397
    role: "example"
    english: "Tired as I was, I tried to help them."
    japanese: "私は疲れていたけれども、彼らの手伝いをしようとした"
    notes: "譲歩のas。C(Tired)がasの前に倒置→「〜だけれども」。thoughに書き換え可だがalthoughは不可"
  - id: "nar-0707-e398"
    section_id: "Nar_07_07"
    drill: 0
    number: 398
    role: "example"
    english: "Fool as I am, I never completely lost my head."
    japanese: "ばかな私だが、完全に我を忘れてしまったことは一度もない"
    notes: "譲歩のas。無冠詞名詞(Fool)がasの前に倒置。A foolのように冠詞をつけてはいけない"

