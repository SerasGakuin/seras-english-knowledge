# Nar_14_01: 副詞の働き (p.480-481)

sentences:
  - id: "nar-1401-e796"
    section_id: "Nar_14_01"
    drill: 0
    number: 796
    role: "example"
    english: "We went there yesterday."
    japanese: "私たちは昨日そこへ行った"
    notes: "副詞の立ち位置: 場所(there)→時(yesterday)の順"
  - id: "nar-1401-e797"
    section_id: "Nar_14_01"
    drill: 0
    number: 797
    role: "example"
    english: "She is a very good student."
    japanese: "彼女は非常に優秀な生徒だ"
    notes: "強調の副詞(very)は修飾対象(good)の直前"
  - id: "nar-1401-e798"
    section_id: "Nar_14_01"
    drill: 0
    number: 798
    role: "example"
    english: "He is an extremely careful driver."
    japanese: "彼は非常に注意深く運転する"
    notes: "強調の副詞(extremely)もveryと同じ位置(修飾対象の直前)"
  - id: "nar-1401-e799"
    section_id: "Nar_14_01"
    drill: 0
    number: 799
    role: "example"
    english: "He did not go there."
    japanese: "彼はそこに行かなかった"
    notes: "notは一般動詞(go)の前に置かれる"
  - id: "nar-1401-e800"
    section_id: "Nar_14_01"
    drill: 0
    number: 800
    role: "example"
    english: "He always goes there."
    japanese: "彼はいつもそこに行く"
    notes: "頻度副詞(always)はnotと同じ位置=一般動詞の前"

