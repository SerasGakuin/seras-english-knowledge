# Nar_10_02: 原級を用いた表現〈as...as〜〉 (p.387-389)

sentences:
  - id: "nar-1002-e646"
    section_id: "Nar_10_02"
    drill: 0
    number: 646
    role: "example"
    english: "I am very old."
    japanese: "私はとても歳を取っている"
    notes: "veryはoldを修飾する副詞。asとの位置対比用"
  - id: "nar-1002-e647"
    section_id: "Nar_10_02"
    drill: 0
    number: 647
    role: "example"
    english: "She is as old as Mary."
    japanese: "彼女はメアリーと同じ年齢だ"
    notes: "1つ目のas=副詞（veryと同位置）、2つ目のas=接続詞/前置詞"
  - id: "nar-1002-e648"
    section_id: "Nar_10_02"
    drill: 0
    number: 648
    role: "example"
    english: "Sanae has as good a voice as you."
    japanese: "サナエはあなたと同じくらいよい声をしている"
    notes: "as+形容詞+a+名詞の語順。asとgoodが相性よくくっつくため前に出る"
  - id: "nar-1002-e649"
    section_id: "Nar_10_02"
    drill: 0
    number: 649
    role: "example"
    english: "He isn't as [so] earnest as me."
    japanese: "彼は私ほどまじめではない"
    notes: "否定文でもasが主流。肯定文でso...asは不可"

