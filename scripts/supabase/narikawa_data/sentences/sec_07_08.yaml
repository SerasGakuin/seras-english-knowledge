# Nar_07_08: 「理由」を表す接続詞 (p.262-264)

sentences:
  - id: "nar-0708-e399"
    section_id: "Nar_07_08"
    drill: 0
    number: 399
    role: "example"
    english: "You can't go because you're too young."
    japanese: "おまえはまだ小さいから行っちゃだめだ"
    notes: "because（未知の理由）。because節は主節の後ろで使うのが原則。✕ Because you're too young.のように文頭で独立文にしない"
  - id: "nar-0708-e400"
    section_id: "Nar_07_08"
    drill: 0
    number: 400
    role: "example"
    english: "Since the car isn't working, we'll have to take the train."
    japanese: "車が動かないので、私たちは電車で行かなければならないだろう"
    notes: "since（既知の理由）。車が動かないのはみんなにとって既知の事実。文頭が多い"
  - id: "nar-0708-e401"
    section_id: "Nar_07_08"
    drill: 0
    number: 401
    role: "example"
    english: "Now (that) she is rich, she can buy almost everything."
    japanese: "今や金持ちなので、彼女はほぼ何でも買える"
    notes: "now (that)。過去との違いを強調して理由を述べる。thatは省略可"
  - id: "nar-0708-e402"
    section_id: "Nar_07_08"
    drill: 0
    number: 402
    role: "example"
    english: "I lay down, for I was tired from the road trip."
    japanese: "私は横になった。というのも、車での長旅で疲れたからだ"
    notes: "等位接続詞for。理由を補足説明。主節の後に「, for」で使うのが通例"
  - id: "nar-0708-e403"
    section_id: "Nar_07_08"
    drill: 0
    number: 403
    role: "example"
    english: "She didn't marry him, because he was poor."
    japanese: "彼女が彼と結婚しなかったのは、彼が貧しかったからだ"
    notes: "not...because（コンマあり）。notはコンマまで作用→結婚しなかった理由を述べる"
  - id: "nar-0708-e404"
    section_id: "Nar_07_08"
    drill: 0
    number: 404
    role: "example"
    english: "She didn't marry him because he was rich."
    japanese: "彼女は彼が金持ちだったから彼と結婚したわけではない"
    notes: "not...because（コンマなし）。notは文末まで作用→他に結婚を決めた理由があることを暗示"
  - id: "nar-0708-e405"
    section_id: "Nar_07_08"
    drill: 0
    number: 405
    role: "example"
    english: "It is dangerous to think a child is stupid just because he doesn't like school."
    japanese: "子どもが学校が嫌いだというだけでその子が愚かだと思うのは危険である"
    notes: "just because（becauseだけの特権）。副詞を添えて使えるのはbecauseだけ"
  - id: "nar-0708-e406"
    section_id: "Nar_07_08"
    drill: 0
    number: 406
    role: "example"
    english: "It is because he has behaved so badly that he must be punished."
    japanese: "彼はとても行儀が悪かったばかりにお仕置きを受けねばならない"
    notes: "強調構文(It is because〜that...)。becauseだけの特権。sinceは不可"

