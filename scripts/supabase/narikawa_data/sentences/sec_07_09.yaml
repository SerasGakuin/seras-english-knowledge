# Nar_07_09: 「目的・結果」を表す接続詞 (p.265-268)

sentences:
  - id: "nar-0709-e407"
    section_id: "Nar_07_09"
    drill: 0
    number: 407
    role: "example"
    english: "My father works hard so (that) my family will live comfortably."
    japanese: "私の父は家族が楽に暮らせるように、懸命に働いている"
    notes: "so that（目的「〜するために」）。コンマなし・節中に助動詞will"
  - id: "nar-0709-e408"
    section_id: "Nar_07_09"
    drill: 0
    number: 408
    role: "example"
    english: "It was extremely hot, so (that) I took off my coat."
    japanese: "とても暑かったのでコートを脱いだ"
    notes: "so that（結果「その結果〜」）。コンマあり・節中に助動詞なし"
  - id: "nar-0709-v001"
    section_id: "Nar_07_09"
    drill: 0
    number: 1
    role: "example"
    english: "It was extremely hot, so I took off my coat."
    japanese: "とても暑かったのでコートを脱いだ"
    notes: "▶結果のso thatのthat省略形。「..., so 〜」（だから〜）"
  - id: "nar-0709-v002"
    section_id: "Nar_07_09"
    drill: 0
    number: 2
    role: "example"
    english: "My father works hard in order that my family will live comfortably."
    japanese: "私の父は家族が楽に暮らせるように、懸命に働いている"
    notes: "▶e407のin order that書き換え。目的のみ。thatは省略不可。so thatよりやや堅い"
  - id: "nar-0709-e409"
    section_id: "Nar_07_09"
    drill: 0
    number: 409
    role: "example"
    english: "Take care so that you will not catch cold!"
    japanese: "風邪をひかないように気をつけなさい！"
    notes: "so that否定の目的。so that節中を否定文にして「〜しないように」"
  - id: "nar-0709-e410"
    section_id: "Nar_07_09"
    drill: 0
    number: 410
    role: "example"
    english: "My father hid the money for fear (that) my mother should see it."
    japanese: "父は母の目に触れないようにそのお金を隠した"
    notes: "for fear that（否定の目的「〜するのを恐れて→〜しないように」）。thatは省略可"
  - id: "nar-0709-e411"
    section_id: "Nar_07_09"
    drill: 0
    number: 411
    role: "example"
    english: "He took his umbrella lest it (should / might) rain."
    japanese: "雨が降るといけないので彼は傘を持って行った"
    notes: "lest（for fear thatの書き換え）。lest+S should V / lest+S 原形。古風で堅い表現"
  - id: "nar-0709-e412"
    section_id: "Nar_07_09"
    drill: 0
    number: 412
    role: "example"
    english: "Take your umbrella with you in case it rains."
    japanese: "雨の場合に備えて、傘を持って行きなさい"
    notes: "in case（備え「〜の場合に備えて」）。in case節中は現在形が原則"
  - id: "nar-0709-e413"
    section_id: "Nar_07_09"
    drill: 0
    number: 413
    role: "example"
    english: "In case you find the woman, please let me know at once."
    japanese: "もしその女性を見つけたら、すぐ私に知らせてください"
    notes: "in case（条件≒if「もし〜の場合には」）"

