# Nar_01_20: 「盗む、奪う」「書く、描く」の意味をもつ動詞（p.71-73）

sentences:
  - id: "nar-0120-e089"
    section_id: "Nar_01_20"
    drill: 0
    number: 1
    role: "example"
    english: "He stole money from the safe."
    japanese: "彼は金庫から金を盗んだ"
    notes: "steal A from B: BからAを盗む（こっそり盗む）"
  - id: "nar-0120-e090"
    section_id: "Nar_01_20"
    drill: 0
    number: 2
    role: "example"
    english: "The man robbed a bank of three million dollars."
    japanese: "男は銀行から300万ドルを奪った"
    notes: "rob A of B: AからBを奪う（力ずくで奪う）。stealとはA/Bの位置が逆"
  - id: "nar-0120-e091"
    section_id: "Nar_01_20"
    drill: 0
    number: 3
    role: "example"
    english: "The big trees deprived the house of light."
    japanese: "その大きな木々がその家から光を奪った"
    notes: "deprive A of B: 権利や能力など抽象的なものを奪う。robと同じパターン"
  - id: "nar-0120-e092"
    section_id: "Nar_01_20"
    drill: 0
    number: 4
    role: "example"
    english: "I often write a letter in English."
    japanese: "私はよく英語で手紙を書く"
    notes: "write: 文字を書く"
  - id: "nar-0120-e093"
    section_id: "Nar_01_20"
    drill: 0
    number: 5
    role: "example"
    english: "Draw a line here."
    japanese: "ここに線を引きなさい"
    notes: "draw: 鉛筆等で線を引いてかく。基本イメージは「引く」"
  - id: "nar-0120-e094"
    section_id: "Nar_01_20"
    drill: 0
    number: 6
    role: "example"
    english: "They painted the wall green."
    japanese: "彼らは壁を緑色のペンキで塗った"
    notes: "paint: ペンキや絵の具を用いてかく（塗る）"
  - id: "nar-0120-e095"
    section_id: "Nar_01_20"
    drill: 0
    number: 7
    role: "example"
    english: "My mother marked a shop on the map."
    japanese: "母は地図にお店の印をつけた"
    notes: "mark: 印をつける意味でかく"

