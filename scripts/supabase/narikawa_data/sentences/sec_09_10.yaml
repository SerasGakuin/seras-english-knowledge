# Nar_09_10: 前置詞 to の用法(1) (p.352-353)

sentences:
  - id: "nar-0910-e561"
    section_id: "Nar_09_10"
    drill: 0
    number: 561
    role: "example"
    english: "On Saturdays, we always drive to the city and go shopping."
    japanese: "毎週土曜日に、私たちはいつも町まで車を運転して買い物に行く"
    notes: "toの基本イメージ「到達」の典型例。町に到達している感覚。toは右向き矢印（→）"
  - id: "nar-0910-e562"
    section_id: "Nar_09_10"
    drill: 0
    number: 562
    role: "example"
    english: "Mark gave a present to his girlfriend."
    japanese: "マークは彼女にプレゼントを贈った"
    notes: "到達→所属先のto。プレゼントが彼女に到達→彼女が所有者"
  - id: "nar-0910-e563"
    section_id: "Nar_09_10"
    drill: 0
    number: 563
    role: "example"
    english: "He belongs to the baseball club."
    japanese: "彼は野球部に所属している"
    notes: "所属先のto。到達した先に留まる→所属"
  - id: "nar-0910-e564"
    section_id: "Nar_09_10"
    drill: 0
    number: 564
    role: "example"
    english: "I lost the keys to my apartment and had to call my landlord."
    japanese: "私はアパートの鍵をなくしてしまい、大家さんに電話をしなければならなかった"
    notes: "帰属先のto。鍵の帰属先→アパート"
  - id: "nar-0910-e565"
    section_id: "Nar_09_10"
    drill: 0
    number: 565
    role: "example"
    english: "They sang to the music."
    japanese: "彼らは音楽に合わせて歌った"
    notes: "適合・一致のto。歌声が音楽に到達→合っている。adapt A to Bなども同様"
  - id: "nar-0910-e566"
    section_id: "Nar_09_10"
    drill: 0
    number: 566
    role: "example"
    english: "Add two to seven and you get nine."
    japanese: "2を7に足すと9になる"
    notes: "付加・追加のto。2が7に到達→足す"
  - id: "nar-0910-e567"
    section_id: "Nar_09_10"
    drill: 0
    number: 567
    role: "example"
    english: "The clerk attached a price tag to a garment."
    japanese: "店員は正札を衣服につけた"
    notes: "付着のto。toは正札が衣服に到達・貼り付けるまでの動作。すでに貼られた状態はon"
  - id: "nar-0910-e568"
    section_id: "Nar_09_10"
    drill: 0
    number: 568
    role: "example"
    english: "The label on a bottle tells you what medicine is in it."
    japanese: "びんのラベルで何の薬が入っているかわかりますよ"
    notes: "対比用。on＝すでにラベルが貼られている接触状態。toとonの違い"

