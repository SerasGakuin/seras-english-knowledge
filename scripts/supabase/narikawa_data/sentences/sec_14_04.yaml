    drill: 0
    number: 810
    role: "example"
    english: "This is too old a custom."
    japanese: "これはあまりにも古い習わしである"
    notes: "too+形容詞+a+名詞の語順"
  - id: "nar-1404-e811"
    section_id: "Nar_14_04"
    drill: 0
    number: 811
    role: "example"
    english: "I didn't know how big a problem it was."
    japanese: "私はそれがどれほど大きな問題なのかをわかっていなかった"
    notes: "how+形容詞+a+名詞の語順"
  - id: "nar-1404-e812"
    section_id: "Nar_14_04"
    drill: 0
    number: 812
    role: "example"
    english: "I'm as good a cook as she is."
    japanese: "私は彼女と同じくらい料理がうまい"
    notes: "as+形容詞+a+名詞の語順"
  - id: "nar-1404-e813"
    section_id: "Nar_14_04"
    drill: 0
    number: 813
    role: "example"
    english: "Fortunately, no one was hurt in the fire."
    japanese: "幸いにも、その火事でけが人は出なかった"
    notes: "文修飾の副詞(fortunately): 文全体に判断を下す"
  - id: "nar-1404-e814"
    section_id: "Nar_14_04"
    drill: 0
    number: 814
    role: "example"
    english: "Naturally, she wanted an explanation."
    japanese: "当然ながら、彼女は説明を求めた"
    notes: "文修飾の副詞(naturally)"
  - id: "nar-1404-e815"
    section_id: "Nar_14_04"
    drill: 0
    number: 815
    role: "example"
    english: "It is natural that she wanted an explanation."
    japanese: "彼女が説明を求めたのも当然だ"
    notes: "文修飾副詞→形容詞への置き換え: Naturally = It is natural that..."
  - id: "nar-1404-e816"
    section_id: "Nar_14_04"
    drill: 0
    number: 816
    role: "example"
    english: "I got a letter from abroad."
    japanese: "海外からの手紙が来た"
    notes: "abroad=副詞(名詞に見えるが)。from abroadは出所を表す前置詞が必要"

