# Nar_09_07: 前置詞 at の用法 (p.345-347)

sentences:
  - id: "nar-0907-e536"
    section_id: "Nar_09_07"
    drill: 0
    number: 536
    role: "example"
    english: "Aim at the mark."
    japanese: "的をねらえ"
    notes: "atの基本イメージ「一点集中」の典型例。ダーツの矢を一点めがけて投げるイメージ"
  - id: "nar-0907-e537"
    section_id: "Nar_09_07"
    drill: 0
    number: 537
    role: "example"
    english: "The meeting begins at 10:00."
    japanese: "会合は10時に始まる"
    notes: "時点のat。一点集中→時間の一点。inは幅のある時間帯(in July)"
  - id: "nar-0907-e538"
    section_id: "Nar_09_07"
    drill: 0
    number: 538
    role: "example"
    english: "The hotel is at 2415 Kuhio Avenue."
    japanese: "そのホテルはクヒオ通り2415番地にある"
    notes: "地点のat。地図上の位置を指さす感覚。at the hotel（立ち寄り地点）vs in the hotel（空間内）"
  - id: "nar-0907-e539"
    section_id: "Nar_09_07"
    drill: 0
    number: 539
    role: "example"
    english: "Water boils at 100℃."
    japanese: "水は100℃で沸騰する"
    notes: "目盛りの一点→温度のat。温度計の針が一点を指す"
  - id: "nar-0907-e540"
    section_id: "Nar_09_07"
    drill: 0
    number: 540
    role: "example"
    english: "We drove at 60 miles an hour."
    japanese: "私たちは時速60マイルで車を走らせた"
    notes: "目盛りの一点→スピードのat。スピードメーターの針が一点を指す"
  - id: "nar-0907-e541"
    section_id: "Nar_09_07"
    drill: 0
    number: 541
    role: "example"
    english: "Eggs sell at two hundred yen a dozen."
    japanese: "卵はダース200円で売られる"
    notes: "目盛りの一点→価格のat。200円ぴったりに絞られる→at"
  - id: "nar-0907-e542"
    section_id: "Nar_09_07"
    drill: 0
    number: 542
    role: "example"
    english: "He was at play while the rest were at work."
    japanese: "彼は他の人がみな仕事をしているときに遊んでいた"
    notes: "従事・状態のat。一点集中→at play/at work。at table/at breakfast/at night/at peace等も同類"
  - id: "nar-0907-e543"
    section_id: "Nar_09_07"
    drill: 0
    number: 543
    role: "example"
    english: "She was surprised at the news."
    japanese: "彼女はそのニュースに驚いた"
    notes: "瞬間的な感情の原因のat。どの「点」に驚いたか。surprised/amazed/astonished/shocked→at"
  - id: "nar-0907-e544"
    section_id: "Nar_09_07"
    drill: 0
    number: 544
    role: "example"
    english: "I am satisfied with my grades this term."
    japanese: "私は今学期の成績に満足している"
    notes: "対比用。ある程度の時間続く感情→with。satisfied/pleased/bored→with。ただしdisappointed at/with/in等、複数使える場合もあり"

