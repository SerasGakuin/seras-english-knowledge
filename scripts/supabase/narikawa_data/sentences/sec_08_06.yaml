# Nar_08_06: 〈前置詞+関係代名詞〉の用法 (p.300-303)

sentences:
  - id: "nar-0806-e450"
    section_id: "Nar_08_06"
    drill: 0
    number: 450
    role: "example"
    english: "This is the house in which Ohgai Mori was born."
    japanese: "これが森鷗外が生まれた家だ"
    notes: "〈前置詞+関代〉。in the houseがin whichとなって移動→後ろは完全な文"
  - id: "nar-0806-e451"
    section_id: "Nar_08_06"
    drill: 0
    number: 451
    role: "example"
    english: "Do you know the girl to whom Bob spoke?"
    japanese: "ボブが話しかけた少女を知っていますか"
    notes: "先行詞が「人」→〈前置詞+whom〉。speak to〈人〉のtoが前に移動。thatへの置き換え不可"
