# Nar_09_05: 前置詞 on の用法(1) (p.340-341)

sentences:
  - id: "nar-0905-e521"
    section_id: "Nar_09_05"
    drill: 0
    number: 521
    role: "example"
    english: "He was staring at a fly on the ceiling."
    japanese: "彼は天井のハエを見つめていた"
    notes: "onの基本イメージ「接触」。ハエが天井にべたっと張り付いている。上面だけでなく下でも側面でもOK"
  - id: "nar-0905-e522"
    section_id: "Nar_09_05"
    drill: 0
    number: 522
    role: "example"
    english: "I made a toast and put butter on one side of the bread."
    japanese: "私はパンをトーストして片面にバターを塗った"
    notes: "「べったり」のon。パンにべったりバターを塗る感覚"
  - id: "nar-0905-e523"
    section_id: "Nar_09_05"
    drill: 0
    number: 523
    role: "example"
    english: "The article talks about the influence of television on politics."
    japanese: "その記事は政治に及ぼすテレビの影響力について論じている"
    notes: "影響のon。接触→影響を受ける。influence/effect/impact + on"
  - id: "nar-0905-e524"
    section_id: "Nar_09_05"
    drill: 0
    number: 524
    role: "example"
    english: "Einstein had a tremendous impact on modern science."
    japanese: "アインシュタインは近代科学に非常に大きな影響を及ぼした"
    notes: "影響のon。impact on ～"
  - id: "nar-0905-e525"
    section_id: "Nar_09_05"
    drill: 0
    number: 525
    role: "example"
    english: "She made a good impression on me."
    japanese: "彼女は私によい印象を与えた"
    notes: "印象のon。接触→印象を抱く。impression on ～"
  - id: "nar-0905-e526"
    section_id: "Nar_09_05"
    drill: 0
    number: 526
    role: "example"
    english: "On arriving there, he called his father."
    japanese: "そこに到着するとすぐに、彼は父親に電話をした"
    notes: "連続・同時のon。2つの行為が時間的に接触→「すぐに」。= As soon as he arrived there"
  - id: "nar-0905-e527"
    section_id: "Nar_09_05"
    drill: 0
    number: 527
    role: "example"
    english: "A guard on duty told me the store had already closed."
    japanese: "勤務中の守衛は、店はもう閉まっていると私に言った"
    notes: "継続のon。点と点がつながって線→on duty（勤務中）"
  - id: "nar-0905-e528"
    section_id: "Nar_09_05"
    drill: 0
    number: 528
    role: "example"
    english: "She is on leave until March."
    japanese: "彼女は3月まで休暇中だ"
    notes: "継続のon。on leave（休暇中）"
  - id: "nar-0905-e529"
    section_id: "Nar_09_05"
    drill: 0
    number: 529
    role: "example"
    english: "Employees of that company are on strike for better pay."
    japanese: "その会社の従業員たちは、よりよい給与を求めてストライキ中だ"
    notes: "継続のon。on strike（ストライキ中）"

