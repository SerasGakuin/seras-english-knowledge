    english: "The population of Tokyo is six times as large as that of Miyagi."
    japanese: "東京の人口は宮城の人口の6倍だ"
    notes: "thatはthe populationの繰り返しを避ける代名詞。比較対象の対等原則"
  - id: "nar-1001-e643"
