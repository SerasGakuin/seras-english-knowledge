    role: "example"
    english: "I love my son more than her."
    japanese: "私は彼女よりも自分の息子の方を愛している"
    notes: "thanの後がher（目的格）→目的語my sonとの比較"
  - id: "nar-1001-e645"
    section_id: "Nar_10_01"
    drill: 0
    number: 645
    role: "example"
    english: "They can't go faster than me."
    japanese: "彼らは私より速く行くことはできない"
    notes: "thanを前置詞と捉えるとme。接続詞と捉えるとIも可。現在は多くのネイティブがmeを使用"

