    drill: 0
    number: 643
    role: "example"
    english: "I love my son more than she (does)."
    japanese: "私の方が彼女よりも自分の息子を愛している"
    notes: "thanの後がshe does（S+V）→主語同士の比較。代動詞does使用"
  - id: "nar-1001-e644"
    section_id: "Nar_10_01"
    drill: 0
