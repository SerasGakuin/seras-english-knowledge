# Nar_05_01: 直説法と仮定法 (p.158-160)

sentences:
  - id: "nar-0501-e234"
    section_id: "Nar_05_01"
    drill: 0
    number: 234
    role: "example"
    english: "If it rains tomorrow, we'll have to put off the baseball game."
    japanese: "もし明日雨が降れば、野球の試合は延期しなければならない"
    notes: "直説法の例。雨が降ることは十分ありえるので仮定法ではない"
  - id: "nar-0501-e235"
    section_id: "Nar_05_01"
    drill: 0
    number: 235
    role: "example"
    english: "I wish I were a bird."
    japanese: "私が鳥ならいいのになあ"
    notes: "仮定法の例。wishは現在形だがwere（過去形）を使う。時制を切り離して現実離れ感を表す"

