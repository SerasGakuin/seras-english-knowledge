# Nar_13_05: 類似品にはご注意(3) — free from/far from, able/capable, sure/certain (p.467-468)

sentences:
  - id: "nar-1305-e765"
    section_id: "Nar_13_05"
    drill: 0
    number: 765
    role: "example"
    english: "She is free from prejudice."
    japanese: "彼女は偏見のない人だ"
    notes: "free from A: Aにマイナス要素(prejudice)"
  - id: "nar-1305-e766"
    section_id: "Nar_13_05"
    drill: 0
    number: 766
    role: "example"
    english: "She is far from being happy."
    japanese: "彼女は決して幸せではない"
    notes: "far from A: Aにプラス要素(happy)。Aからほど遠い→否定"
  - id: "nar-1305-e767"
    section_id: "Nar_13_05"
    drill: 0
    number: 767
    role: "example"
    english: "She was able to win the gold medal."
    japanese: "彼女は金メダルを受賞することができた"
    notes: "able=人のみが主語"
  - id: "nar-1305-e768"
    section_id: "Nar_13_05"
    drill: 0
    number: 768
    role: "example"
    english: "He is capable of solving this problem."
    japanese: "彼ならこの問題を解決できる"
    notes: "capable=人+モノが主語可。capable of Ving"
  - id: "nar-1305-e769"
    section_id: "Nar_13_05"
    drill: 0
    number: 769
    role: "example"
    english: "The airplane is capable of supersonic speeds."
    japanese: "その飛行機は超音速で飛べる"
    notes: "capable=モノが主語の例"
  - id: "nar-1305-e770"
    section_id: "Nar_13_05"
    drill: 0
    number: 770
    role: "example"
    english: "John is sure to say no to your proposal."
    japanese: "ジョンは君の提案にいいえと言うよ"
    notes: "sure/certain to V=話し手の確信"
  - id: "nar-1305-e771"
    section_id: "Nar_13_05"
    drill: 0
    number: 771
    role: "example"
    english: "I'm sure of your innocence."
    japanese: "私はあなたが無罪だと確信している"
    notes: "sure/certain of ~/that節=文のSの確信。= I'm sure that you are innocent."

