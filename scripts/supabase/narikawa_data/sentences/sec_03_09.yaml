# Nar_03_09: 動詞の原形について考える(1) (p.114-115)

sentences:
  - id: "nar-0309-e169"
    section_id: "Nar_03_09"
    drill: 0
    number: 169
    role: "example"
    english: "Memorize a lot of English words."
    japanese: "たくさんの英単語を暗記しなさい"
    notes: "命令文。動詞の原形で始まる。まだ覚えていないから命令する"
  - id: "nar-0309-e170"
    section_id: "Nar_03_09"
    drill: 0
    number: 170
    role: "example"
    english: "I promised to do it today."
    japanese: "私は今日それをする約束をした"
    notes: "不定詞(to+原形)。to do it todayはまだ現実になっていない行為"
  - id: "nar-0309-e171"
    section_id: "Nar_03_09"
    drill: 0
    number: 171
    role: "example"
    english: "My father requested that I be here."
    japanese: "父は、私にここにいるように要求した"
    notes: "要求を表す動詞のthat節中で原形be。まだ現実になっていないから原形。shouldは後から発達したもの（省略ではない）"
  - id: "nar-0309-e172"
    section_id: "Nar_03_09"
    drill: 0
    number: 172
    role: "example"
    english: "Be it ever so humble, there is no place like home."
    japanese: "たとえどんなに粗末であっても、我が家にまさる所はない"
    notes: "原形を用いた譲歩の構文。文頭にBeを置いて「たとえ〜でも」。詳細解説は03_10。脚注*1: 非常に古風。However humble it may be が一般的"

