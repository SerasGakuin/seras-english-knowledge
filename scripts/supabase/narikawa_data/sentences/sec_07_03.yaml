# Nar_07_03: 等位接続詞を用いた重要表現、動詞の一致 (p.246-248)

sentences:
  - id: "nar-0703-e370"
    section_id: "Nar_07_03"
    drill: 0
    number: 370
    role: "example"
    english: "Be a good boy, and I'll buy you a toy."
    japanese: "いい子にしてなさい、そうすればおもちゃを買ってあげますよ"
    notes: "命令文+and: 「〜しなさい、そうすれば…」→andの後ろにプラスの内容"
  - id: "nar-0703-e371"
    section_id: "Nar_07_03"
    drill: 0
    number: 371
    role: "example"
    english: "Hurry up, or you will be late."
    japanese: "急ぎなさい、さもないと遅れますよ"
    notes: "命令文+or: 「〜しなさい、さもないと…」→orの後ろにマイナスの内容"
  - id: "nar-0703-e372"
    section_id: "Nar_07_03"
    drill: 0
    number: 372
    role: "example"
    english: "Both his wife and he like baseball."
    japanese: "彼の妻も彼も、野球が好きだ"
    notes: "both A and B→複数一致(like)"
  - id: "nar-0703-e373"
    section_id: "Nar_07_03"
    drill: 0
    number: 373
    role: "example"
    english: "Either you or Jane has to do the dishes."
    japanese: "あなたかジェーンのどちらかがお皿を洗わなくてはならない"
    notes: "either A or B→Bに一致(Jane=三単現→has)"
  - id: "nar-0703-e374"
    section_id: "Nar_07_03"
    drill: 0
    number: 374
    role: "example"
    english: "Neither his children nor he likes baseball."
    japanese: "彼の子どもたちも彼も、野球が好きではない"
    notes: "neither A nor B→Bに一致(he=三単現→likes)。norにorが含まれるのでBに一致"
  - id: "nar-0703-e375"
    section_id: "Nar_07_03"
    drill: 0
    number: 375
    role: "example"
    english: "Not only the pupils but also the teacher was laughing."
    japanese: "生徒たちだけでなく先生も笑っていた"
    notes: "not only A but also B→Bに一致(the teacher=単数→was)"
  - id: "nar-0703-v001"
    section_id: "Nar_07_03"
    drill: 0
    number: 1
    role: "example"
    english: "The teacher, as well as the pupils, was laughing."
    japanese: "先生も生徒たちと同様に笑っていた"
    notes: "▶B as well as A→Bに一致。not only A but also Bの書き換え。the pupilsにつられてwereとしない注意"

