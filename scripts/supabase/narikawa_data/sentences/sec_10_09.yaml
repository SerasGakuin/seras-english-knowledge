# Nar_10_09: 比較級を使った重要表現(3) (p.409-411)

sentences:
  - id: "nar-1009-e681"
    section_id: "Nar_10_09"
    drill: 0
    number: 681
    role: "example"
    english: "Bob knows little of mathematics, still less of physics."
    japanese: "ボブは数学はほとんどわからない、まして物理はわかるわけがない"
    notes: "否定的内容に続くstill less=「まして〜ない」"
  - id: "nar-1009-e682"
    section_id: "Nar_10_09"
    drill: 0
    number: 682
    role: "example"
    english: "She was too tired to walk, let alone run."
    japanese: "彼女は歩けないほど疲れていて、まして走るなんてできなかった"
    notes: "let alone=「まして〜ない」。notの否定文でなくても否定的内容なら可"
  - id: "nar-1009-e683"
    section_id: "Nar_10_09"
    drill: 0
    number: 683
    role: "example"
    english: "He can speak French well, and he can speak English even better."
    japanese: "彼は上手にフランス語が話せるし、英語はそれにもましてさらにうまく話せる"
    notes: "肯定的内容にはstill moreではなくeven betterを使う。(✕) still more Englishは不適切"
  - id: "nar-1009-v001"
    section_id: "Nar_10_09"
    drill: 0
    number: 1
    role: "example"
    english: "He can speak French, to say nothing of English."
    japanese: "英語は言うまでもなく、彼はフランス語も話せる"
    notes: "to say nothing of〜=「〜は言うまでもなく」。肯定的内容の書き換え表現"
  - id: "nar-1009-e684"
    section_id: "Nar_10_09"
    drill: 0
    number: 684
    role: "example"
    english: "Mary is more stingy than economical."
    japanese: "メアリーは倹約家というよりむしろけちだ"
    notes: "more原級(A) than原級(B)。同一人物の2性質比較。stingierとしない"
  - id: "nar-1009-e685"
    section_id: "Nar_10_09"
    drill: 0
    number: 685
    role: "example"
    english: "Mary is stingier than Juliet."
    japanese: "メアリーはジュリエットよりもけちだ"
    notes: "2者比較なら通常の比較級stingierを使う"
  - id: "nar-1009-e686"
    section_id: "Nar_10_09"
    drill: 0
    number: 686
    role: "example"
    english: "The exam is less difficult than the last one."
    japanese: "この試験はこの前のものより簡単だ"
    notes: "less...than〜。less=littleの比較級で否定の意味。使用頻度は低く、not as...asの方が普通"

