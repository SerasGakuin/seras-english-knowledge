# Nar_10_04: 原級を使った重要表現(1) (p.393-395)

sentences:
  - id: "nar-1004-e657"
    section_id: "Nar_10_04"
    drill: 0
    number: 657
    role: "example"
    english: "He has seen as many Japanese movies as anybody in his class."
    japanese: "彼はクラスの誰にも劣らず多くの日本映画を見ている"
    notes: "as...as any+単数名。最上級に近い主観的表現。「誰にも劣らないくらいスゴイ」"
  - id: "nar-1004-e658"
    section_id: "Nar_10_04"
    drill: 0
    number: 658
    role: "example"
    english: "Haruichi is as great a guitarist as ever lived."
    japanese: "ハルイチはきわめて偉大なギタリストだ"
    notes: "as...as ever+過去形。今まで生きてきたどの人と比べても同じくらい偉大"
  - id: "nar-1004-e659"
    section_id: "Nar_10_04"
    drill: 0
    number: 659
    role: "example"
    english: "She is as pretty as ever."
    japanese: "彼女は相変わらずかわいらしい"
    notes: "as...as ever（過去形なし）=「相変わらず〜」。今までと同じように"
  - id: "nar-1004-e660"
    section_id: "Nar_10_04"
    drill: 0
    number: 660
    role: "example"
    english: "As many as 100 people were killed in the crash."
    japanese: "その衝突で100人もの人々が死亡した"
    notes: "強調のas many as。100 peopleの数の多さを強調"
  - id: "nar-1004-e661"
    section_id: "Nar_10_04"
    drill: 0
    number: 661
    role: "example"
    english: "He sometimes asks me to be at work as early as 6 o'clock."
    japanese: "彼は、6時という早い時間に出勤するよう私に言うことがある"
    notes: "強調のas early as。6時という早さを強調"
  - id: "nar-1004-e662"
    section_id: "Nar_10_04"
    drill: 0
    number: 662
    role: "example"
    english: "As recently as five years ago, I believed this myth, too."
    japanese: "つい5年ほど前には私もこの神話を信じていた"
    notes: "強調のas recently as。5年前がいかに最近かを強調"

