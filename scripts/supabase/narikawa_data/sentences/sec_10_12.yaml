# Nar_10_12: 最上級相当表現 (p.418-420)

sentences:
  - id: "nar-1012-e691"
    section_id: "Nar_10_12"
    drill: 0
    number: 691
    role: "example"
    english: "Russia is the largest country in the world."
    japanese: "ロシアは世界で最大の面積の国だ"
    notes: "最上級の基本形"
  - id: "nar-1012-e692"
    section_id: "Nar_10_12"
    drill: 0
    number: 692
    role: "example"
    english: "Russia is larger than any other country in the world."
    japanese: "ロシアは世界で最大の面積の国だ"
    notes: "比較級+any other+単数名。トーナメント戦で1対1だから単数。最上級相当表現"
  - id: "nar-1012-e693"
    section_id: "Nar_10_12"
    drill: 0
    number: 693
    role: "example"
    english: "No (other) country in the world is as [so] large as Russia."
    japanese: "ロシアは世界で最大の面積の国だ"
    notes: "No other+名+as...as〜。同じくらいの国がゼロ→実質一番。(△)No other+比較級+thanは不適切"
  - id: "nar-1012-e694"
    section_id: "Nar_10_12"
    drill: 0
    number: 694
    role: "example"
    english: "Nothing is as [so] precious as time."
    japanese: "時間ほど貴重なものはない"
    notes: "Nothing+as...as〜。モノの場合。Noは形容詞、notは副詞→主語にはNothingを使う"
  - id: "nar-1012-e695"
    section_id: "Nar_10_12"
    drill: 0
    number: 695
    role: "example"
    english: "Time is more precious than anything else."
    japanese: "時間ほど貴重なものはない"
    notes: "比較級+anything else。最上級相当表現"
  - id: "nar-1012-e696"
    section_id: "Nar_10_12"
    drill: 0
    number: 696
    role: "example"
    english: "Time is the most precious thing of all."
    japanese: "時間ほど貴重なものはない"
    notes: "最上級の基本形。of allで範囲を示す"
  - id: "nar-1012-e697"
    section_id: "Nar_10_12"
    drill: 0
    number: 697
    role: "example"
    english: "This is the most exciting movie (that) I have ever seen."
    japanese: "これは私が今まで見た中で最もワクワクした映画だ"
    notes: "最上級+(that)+S have ever+過去分詞。「一番」の範囲を「自分が見た中で」に限定"
  - id: "nar-1012-e698"
    section_id: "Nar_10_12"
    drill: 0
    number: 698
    role: "example"
    english: "I have never seen such an exciting movie as this."
    japanese: "これは私が今まで見た中で最もワクワクした映画だ"
    notes: "never+such+a+原級+名+as〜。not+ever=never。最上級相当表現"

