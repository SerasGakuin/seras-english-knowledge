# Nar_06_06: 不定詞の名詞用法vs動名詞(2) (p.197-199)

sentences:
  - id: "nar-0606-e292"
    section_id: "Nar_06_06"
    drill: 0
    number: 292
    role: "example"
    english: "Please remember to call me at six tomorrow morning."
    japanese: "明日の朝6時に私に電話するのを忘れないでください"
    notes: "remember to V「これからVすることを覚えておく」。to call=これから→まだ実行していない"
  - id: "nar-0606-e293"
    section_id: "Nar_06_06"
    drill: 0
    number: 293
    role: "example"
    english: "I remember meeting the man somewhere before."
    japanese: "私はその人に以前どこかで会ったのを覚えている"
    notes: "remember Ving「実際にVしたことを覚えている」。meeting=実際に会った記憶"
  - id: "nar-0606-e294"
    section_id: "Nar_06_06"
    drill: 0
    number: 294
    role: "example"
    english: "He tried to give her presents."
    japanese: "彼は彼女にプレゼントを贈ろうとした"
    notes: "try to V「Vしようとする（実際にはVしていない）」。to give=これから→まだ贈っていない"
  - id: "nar-0606-e295"
    section_id: "Nar_06_06"
    drill: 0
    number: 295
    role: "example"
    english: "He tried giving her presents."
    japanese: "彼は彼女にプレゼントを贈ってみた"
    notes: "try Ving「試しにVしてみる（実際にVしている）」。giving=実際に贈った"
  - id: "nar-0606-e296"
    section_id: "Nar_06_06"
    drill: 0
    number: 296
    role: "example"
    english: "Lily stopped to eat a hamburger."
    japanese: "リリーはハンバーガーを食べようと立ち止まった"
    notes: "stop to V: stopは自動詞「立ち止まる」、to Vは副詞用法（目的）。まだ食べていない"
  - id: "nar-0606-e297"
    section_id: "Nar_06_06"
    drill: 0
    number: 297
    role: "example"
    english: "Lily stopped eating her hamburger."
    japanese: "リリーはハンバーガーを食べるのをやめた"
    notes: "stop Ving: stopは他動詞、Vingは目的語（動名詞）。実際に食べていたのをやめた"

