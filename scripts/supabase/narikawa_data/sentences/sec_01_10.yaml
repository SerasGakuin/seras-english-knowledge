# Nar_01_10: 自動詞と他動詞（p.42-44）

sentences:
  - id: "nar-0110-e036"
    section_id: "Nar_01_10"
    drill: 0
    number: 1
    role: "example"
    english: "He didn't mention the accident."
    japanese: "彼はその事故について語らなかった"
    notes: "mentionは他動詞。前置詞なしで名詞を直接置ける"
  - id: "nar-0110-e037"
    section_id: "Nar_01_10"
    drill: 0
    number: 2
    role: "example"
    english: "He didn't refer to the accident."
    japanese: "彼はその事故について語らなかった"
    notes: "referは自動詞。toなどの前置詞が必要。036のmentionとの対比"
  - id: "nar-0110-e038"
    section_id: "Nar_01_10"
    drill: 0
    number: 3
    role: "example"
    english: "We worked together."
    japanese: "私たちは一緒に仕事をした"
    notes: "自動詞は後ろに名詞を置かなくても文が成立する例"
  - id: "nar-0110-e039"
    section_id: "Nar_01_10"
    drill: 0
    number: 4
    role: "example"
    english: "She read her e-mail last night."
    japanese: "彼女は昨晩メールを読んだ"
    notes: "readの他動詞用法。後ろに目的語あり"
  - id: "nar-0110-e040"
    section_id: "Nar_01_10"
    drill: 0
    number: 5
    role: "example"
    english: "She likes to read."
    japanese: "彼女は読書が好きだ"
    notes: "readの自動詞用法。目的語なし。同じ動詞でも自動詞・他動詞両方の用法がある例"
  - id: "nar-0110-e041"
    section_id: "Nar_01_10"
    drill: 0
    number: 6
    role: "example"
    english: "The book lies on the table."
    japanese: "その本はテーブルにある"
    notes: "lie（自動詞）: ある、存在する。活用 lie-lay-lain"
  - id: "nar-0110-e042"
    section_id: "Nar_01_10"
    drill: 0
    number: 7
    role: "example"
    english: "She laid the book on the table."
    japanese: "彼女はテーブルにその本を置いた"
    notes: "lay（他動詞）: 置く。活用 lay-laid-laid。lieの過去形layと混同注意"

