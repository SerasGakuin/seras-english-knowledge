# Nar_07_10: 「時」を表す接続詞 (p.269-271)

sentences:
  - id: "nar-0710-e414"
    section_id: "Nar_07_10"
    drill: 0
    number: 414
    role: "example"
    english: "Wait here till I come back."
    japanese: "私が帰ってくるまでずっとここで待っていなさい"
    notes: "till/until（継続「〜までずっと」）。主節にwait（継続性のある動詞）"
  - id: "nar-0710-e415"
    section_id: "Nar_07_10"
    drill: 0
    number: 415
    role: "example"
    english: "By the time you arrive, I will have finished it."
    japanese: "あなたが着くころまでに、私はそれを終えているだろう"
    notes: "by the time（期限「〜までに」）。未来完了will have finishedと組み合わせ"
  - id: "nar-0710-e416"
    section_id: "Nar_07_10"
    drill: 0
    number: 416
    role: "example"
    english: "Helen got married as soon as she graduated from college."
    japanese: "ヘレンは大学を卒業するとすぐに結婚した"
    notes: "as soon as（〜するとすぐに）。the moment, instantly等でも書き換え可"
  - id: "nar-0710-e417"
    section_id: "Nar_07_10"
    drill: 0
    number: 417
    role: "example"
    english: "She had no sooner arrived than she fell sick."
    japanese: "彼女は到着するとすぐに病気になった"
    notes: "no sooner...than（〜するとすぐに）。時間差(sooner)がゼロ(no)→連続。= hardly/scarcely...when/before"
  - id: "nar-0710-v001"
    section_id: "Nar_07_10"
    drill: 0
    number: 1
    role: "example"
    english: "No sooner had she arrived than she fell sick."
    japanese: "彼女は到着するとすぐに病気になった"
    notes: "▶e417の倒置形。否定語句(No sooner)が文頭→主節は疑問文型の倒置"
  - id: "nar-0710-v002"
    section_id: "Nar_07_10"
    drill: 0
    number: 2
    role: "example"
    english: "Hardly had she arrived when she fell sick."
    japanese: "彼女は到着するとすぐに病気になった"
    notes: "▶e417の書き換え倒置形。hardly...whenの組み合わせ。Scarcely...when/beforeでも可"
  - id: "nar-0710-v003"
    section_id: "Nar_07_10"
    drill: 0
    number: 3
    role: "example"
    english: "She left instantly she heard the news."
    japanese: "そのニュースを聞くとすぐに彼女は帰った"
    notes: "▶プラスα: instantlyを接続詞として用いる例。主にイギリス英語。やや古風"
  - id: "nar-0710-v004"
    section_id: "Nar_07_10"
    drill: 0
    number: 4
    role: "example"
    english: "I'll come directly I have finished this work."
    japanese: "この仕事が終わり次第、行きます"
    notes: "▶プラスα: directlyを接続詞として用いる例。主にイギリス英語。やや古風"
  - id: "nar-0710-v005"
    section_id: "Nar_07_10"
    drill: 0
    number: 5
    role: "example"
    english: "Let me know immediately you hear from her."
    japanese: "彼女から連絡があったらすぐに知らせてください"
    notes: "▶プラスα: immediatelyを接続詞として用いる例。主にイギリス英語。やや古風"

