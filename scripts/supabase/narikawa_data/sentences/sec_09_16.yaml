# Nar_09_16: 前置詞 of の用法(3) (p.367-369)

sentences:
  - id: "nar-0916-e598"
    section_id: "Nar_09_16"
    drill: 0
    number: 598
    role: "example"
    english: "He never speaks of his family."
    japanese: "彼は自分の家族について決して語らない"
    notes: "関連のof。同格ofから「関連」へ定着"
  - id: "nar-0916-e599"
    section_id: "Nar_09_16"
    drill: 0
    number: 599
    role: "example"
    english: "I was suspicious of his words."
    japanese: "彼の言葉に疑惑を抱いた"
    notes: "対象のof（目的格のof）。suspiciousの対象がhis words"
  - id: "nar-0916-e600"
    section_id: "Nar_09_16"
    drill: 0
    number: 600
    role: "example"
    english: "The love of nature is something we are all born with."
    japanese: "自然への愛は私たちが生まれ持っているものだ"
    notes: "対象のof（目的格のof）。loveの対象がnature"
  - id: "nar-0916-e601"
    section_id: "Nar_09_16"
    drill: 0
    number: 601
    role: "example"
    english: "The role of chairperson is to keep the meeting running smoothly and efficiently."
    japanese: "議長の役割は、会議を円滑、かつ効率的に進行させることだ"
    notes: "所有のof。議長がもつ役割。A of B＝B（全体/親）の中のA（部分/子）とも解釈可能"
  - id: "nar-0916-e602"
    section_id: "Nar_09_16"
    drill: 0
    number: 602
    role: "example"
    english: "I will never ride in that car of hers again!"
    japanese: "彼女のあの車にはもう二度と乗らない！"
    notes: "所有のof。that car of hers＝彼女が所有しているあの車"
  - id: "nar-0916-e603"
    section_id: "Nar_09_16"
    drill: 0
    number: 603
    role: "example"
    english: "This book is of great use."
    japanese: "この本はすごく役に立つ"
    notes: "of+抽象名詞＝形容詞。of great use＝very useful。有用さ(use)をもった(of)。of some use/of little use/of no useと強弱調整可能"
  - id: "nar-0916-e604"
    section_id: "Nar_09_16"
    drill: 0
    number: 604
    role: "example"
    english: "They are of the same age."
    japanese: "彼らは同年齢だ"
    notes: "of+名詞（所有の一種）。同じ年齢をもった"
  - id: "nar-0916-e605"
    section_id: "Nar_09_16"
    drill: 0
    number: 605
    role: "example"
    english: "They are of the same mind."
    japanese: "彼らは同意見だ"
    notes: "of+名詞（所有の一種）。同じ意見をもった"

