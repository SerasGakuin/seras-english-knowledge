# Nar_06_14: 不定詞を用いた重要表現(1) — タフ構文・It is of A to V・代不定詞 (p.225-227)

sentences:
  - id: "nar-0614-e341"
    section_id: "Nar_06_14"
    drill: 0
    number: 341
    role: "example"
    english: "The computer is difficult to operate."
    japanese: "そのコンピューターは操作するのが難しい"
    notes: "タフ構文。to operate内に名詞欠落(目的語)→文全体のS(The computer)と一致。形容詞difficultを限定"
  - id: "nar-0614-e342"
    section_id: "Nar_06_14"
    drill: 0
    number: 342
    role: "example"
    english: "It was very careless of you to leave the door open."
    japanese: "ドアを開けっ放しにしておくとは君はとても不注意だった"
    notes: "It is ... of A to V構文。of Aの前後でA=S'、形容詞=P'の関係（You were very careless）。to leaveは判断の根拠"
  - id: "nar-0614-e343"
    section_id: "Nar_06_14"
    drill: 0
    number: 343
    role: "example"
    english: "Sing if you want to."
    japanese: "歌いたいなら歌いなさい"
    notes: "代不定詞。to sing の sing を省略してtoだけ残す。代不定詞のtoは原則省略不可"

