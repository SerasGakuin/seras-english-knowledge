    drill: 0
    number: 758
    role: "example"
    english: "His lawyer used every means available to prove his innocence."
    japanese: "彼の弁護士は、彼の無実を証明するために利用できるすべての手段を用いた"
    notes: "available(後)=いま一時的に利用できる"
  - id: "nar-1302-e759"
