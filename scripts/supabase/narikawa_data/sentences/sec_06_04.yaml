# Nar_06_04: Vp.p.の2用法 (p.190-192)

sentences:
  - id: "nar-0604-e282"
    section_id: "Nar_06_04"
    drill: 0
    number: 282
    role: "example"
    english: "This is a song composed by Mr. Okano."
    japanese: "これは、岡野氏によって作曲された歌である"
    notes: "Vp.p.形容詞用法の例。composed以下はM、前のa songを修飾"
  - id: "nar-0604-e283"
    section_id: "Nar_06_04"
    drill: 0
    number: 283
    role: "example"
    english: "The man sat surrounded by everyone."
    japanese: "その人はみんなに囲まれて座っていた"
    notes: "Vp.p.形容詞用法（補語C）。satの後でSの状態を補う"
  - id: "nar-0604-e284"
    section_id: "Nar_06_04"
    drill: 0
    number: 284
    role: "example"
    english: "The businessman kept his car parked here without permission."
    japanese: "そのビジネスマンは許可なく車をここに駐車しておいた"
    notes: "Vp.p.形容詞用法（SVOC型のC）。his car=parkedの関係"
  - id: "nar-0604-e285"
    section_id: "Nar_06_04"
    drill: 0
    number: 285
    role: "example"
    english: "Written in simple English, the book is suitable for beginners."
    japanese: "簡単な英語で書かれていて、その本は初学者向きだ"
    notes: "Vp.p.副詞用法（分詞構文）。Written...はMで前に修飾する名詞なし→副詞。beingが省略された形"

