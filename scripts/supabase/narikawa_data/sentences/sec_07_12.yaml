# Nar_07_12: 「逆接・譲歩」を表す接続詞 (p.276-278)

sentences:
  - id: "nar-0712-e426"
    section_id: "Nar_07_12"
    drill: 0
    number: 426
    role: "example"
    english: "Though he is young, he is running a company."
    japanese: "若いけれども、彼は会社を経営している"
    notes: "though（逆接・譲歩「〜だけれども」）。althoughとほぼ同じ意味"
  - id: "nar-0712-e427"
    section_id: "Nar_07_12"
    drill: 0
    number: 427
    role: "example"
    english: "You should climb the mountain even though it is dangerous."
    japanese: "危険ではあるけれども、その山に登るべきだ"
    notes: "even though（既知の事実「確かに/実際に〜だけれども」）。実際に危険だという事実が前提"
  - id: "nar-0712-e428"
    section_id: "Nar_07_12"
    drill: 0
    number: 428
    role: "example"
    english: "You should climb the mountain even if it is dangerous."
    japanese: "危険かもしれないけれど、その山に登るべきだ"
    notes: "even if（仮定「たとえ〜としても」）。実際に危険かどうかは別の問題"
  - id: "nar-0712-e429"
    section_id: "Nar_07_12"
    drill: 0
    number: 429
    role: "example"
    english: "While we were talking, Mr. Brown said nothing."
    japanese: "私たちが話している間、ブラウン氏は何も言わなかった"
    notes: "while（原義「〜する間に」→対比「〜一方で」→譲歩「〜だけれども」）。名詞while=「時間」が根っこ"
  - id: "nar-0712-v001"
    section_id: "Nar_07_12"
    drill: 0
    number: 1
    role: "example"
    english: "Young as he is, he is running a company."
    japanese: "若いけれども、彼は会社を経営している"
    notes: "▶e426のas倒置形。形容詞Youngを文頭に倒置→譲歩の意味。＝Young though he is, ...（althoughは不可）"
  - id: "nar-0712-v002"
    section_id: "Nar_07_12"
    drill: 0
    number: 2
    role: "example"
    english: "Young though he is, he is running a company."
    japanese: "若いけれども、彼は会社を経営している"
    notes: "▶v001のthough書き換え。as倒置→though倒置の書き換え可。althoughへの書き換えは不可"

