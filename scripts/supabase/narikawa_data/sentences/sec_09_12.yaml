# Nar_09_12: 前置詞 for の用法(1) (p.357-359)

sentences:
  - id: "nar-0912-e574"
    section_id: "Nar_09_12"
    drill: 0
    number: 574
    role: "example"
    english: "We searched the whole house for Tommy's ring."
    japanese: "私たちはトミーの指輪を見つけるために家中を捜した"
    notes: "forの基本イメージ「意識の向かう先」の典型例"
  - id: "nar-0912-e575"
    section_id: "Nar_09_12"
    drill: 0
    number: 575
    role: "example"
    english: "He left Tokyo for New York."
    japanese: "彼はニューヨークに向けて東京を発った"
    notes: "意識の向かう先→目的地。まだNYに到達していない"
  - id: "nar-0912-e576"
    section_id: "Nar_09_12"
    drill: 0
    number: 576
    role: "example"
    english: "Fred sent a love letter to Jane."
    japanese: "フレッドがジェーンにラブレターを送った"
    notes: "対比用。到達のto。手紙はJaneに到達済みまたは届くことを前提とした表現"
  - id: "nar-0912-e577"
    section_id: "Nar_09_12"
    drill: 0
    number: 577
    role: "example"
    english: "Fred bought a ring for Jane."
    japanese: "フレッドがジェーンに指輪を買った"
    notes: "対比用。forの意識の向かう先。意識はJaneに向いているが、別の行動を起こさない限り届かない"
  - id: "nar-0912-e578"
    section_id: "Nar_09_12"
    drill: 0
    number: 578
    role: "example"
    english: "My parents work for a living and hate to waste money."
    japanese: "私の両親は、生活のために働き、無駄遣いを嫌っている"
    notes: "目的のfor"
  - id: "nar-0912-e579"
    section_id: "Nar_09_12"
    drill: 0
    number: 579
    role: "example"
    english: "What do you call a knife for cutting bread?"
    japanese: "パン切り用のナイフを何と言いますか"
    notes: "用途のfor"
  - id: "nar-0912-e580"
    section_id: "Nar_09_12"
    drill: 0
    number: 580
    role: "example"
    english: "A lawyer must act for a client with integrity."
    japanese: "弁護士は依頼人のために誠実に行動しなければならない"
    notes: "利益のfor"
  - id: "nar-0912-e581"
    section_id: "Nar_09_12"
    drill: 0
    number: 581
    role: "example"
    english: "Feel free to call for more information at 555-1212."
    japanese: "詳細については555-1212までお気軽にお電話ください"
    notes: "要求のfor"
  - id: "nar-0912-e582"
    section_id: "Nar_09_12"
    drill: 0
    number: 582
    role: "example"
    english: "I'm for your plan."
    japanese: "君の計画に賛成だ"
    notes: "賛成のfor。反対はagainst（→p.377参照）"
  - id: "nar-0912-e583"
    section_id: "Nar_09_12"
    drill: 0
    number: 583
    role: "example"
    english: "She was hospitalized for chest pains."
    japanese: "彼女は胸の痛みで入院した"
    notes: "理由のfor。明確に理由を表したい場合はbecause ofが無難。forは特定の動詞（thank A for B等）と共に使われることが多い"

