    role: "example"
    english: "She wore a purple sweater."
    japanese: "彼女は紫色のセーターを着ていた"
    notes: "wear+O: 着ている《状態》。状態動詞"
  - id: "nar-0122-v002"
    section_id: "Nar_01_22"
    drill: 0
    number: 6
    role: "example"
    english: "They were dressed alike."
    japanese: "彼らは同じような服を着ていた"
    notes: "▶例文（脚注*1）。be dressed in A: Aを着ている（状態）。in A省略可"

