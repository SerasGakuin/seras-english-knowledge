# Nar_11_06: 意味の紛らわしい名詞 (p.434-436)

sentences:
  - id: "nar-1106-e718"
    section_id: "Nar_11_06"
    drill: 0
    number: 718
    role: "example"
    english: "He had very good manners."
    japanese: "彼はとても行儀がよかった"
    notes: "manners(複数形)=礼儀・行儀。単数形mannerに「マナー」の意味はない"
  - id: "nar-1106-e719"
    section_id: "Nar_11_06"
    drill: 0
    number: 719
    role: "example"
    english: "He has his own manner of doing things."
    japanese: "彼には彼なりのやり方がある"
    notes: "manner(単数形)=方法"
  - id: "nar-1106-e720"
    section_id: "Nar_11_06"
    drill: 0
    number: 720
    role: "example"
    english: "He forgot his promise to call his wife."
    japanese: "彼は妻に電話をするという約束を忘れた"
    notes: "promise=約束全般。名詞で「見込み」の意味も。形容詞promising=前途有望な"
  - id: "nar-1106-e721"
    section_id: "Nar_11_06"
    drill: 0
    number: 721
    role: "example"
    english: "He has an appointment with the president."
    japanese: "彼は大統領と会う約束がある"
    notes: "appointment=人と会う約束（診察予約も含む）。promise と違い「全面協力を約束」等には使えない"
  - id: "nar-1106-e722"
    section_id: "Nar_11_06"
    drill: 0
    number: 722
    role: "example"
    english: "I made a reservation for a single room."
    japanese: "私はシングルの部屋を予約した"
    notes: "reservation=乗り物・レストラン座席・ホテル部屋の予約"
  - id: "nar-1106-e723"
    section_id: "Nar_11_06"
    drill: 0
    number: 723
    role: "example"
    english: "We have a right to keep our native customs."
    japanese: "私たちには生来の習慣を守っていく権利がある"
    notes: "custom=社会的な習慣・風習（⇔habit=個人的な習慣・癖）"
  - id: "nar-1106-e724"
    section_id: "Nar_11_06"
    drill: 0
    number: 724
    role: "example"
    english: "We went through customs at Haneda."
    japanese: "私たちは羽田の税関を通過した"
    notes: "customs(複数形)=税関・関税。通行人から徴収する通行税が由来"

