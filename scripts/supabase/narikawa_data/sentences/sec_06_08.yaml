# Nar_06_08: 不定詞と分詞の副詞用法(1) (p.203-206)

sentences:
  - id: "nar-0608-e304"
    section_id: "Nar_06_08"
    drill: 0
    number: 304
    role: "example"
    english: "To study law, she went abroad."
    japanese: "法律を研究するために、彼女は海外に行った"
    notes: "不定詞副詞用法〈目的〉。文頭の不定詞副詞用法はほぼ目的の意味。toの矢印(→)イメージ"
  - id: "nar-0608-e305"
    section_id: "Nar_06_08"
    drill: 0
    number: 305
    role: "example"
    english: "I was surprised to meet Tom at the wedding."
    japanese: "私はその結婚式で、トムに会って驚いた"
    notes: "不定詞副詞用法〈感情の原因〉。前にsurprised（感情表現）あり→原因が矢印(→)の先に"
  - id: "nar-0608-e306"
    section_id: "Nar_06_08"
    drill: 0
    number: 306
    role: "example"
    english: "Bob must be crazy to say that."
    japanese: "そんなことを言うなんて、ボブは気が変になっているに違いない"
    notes: "不定詞副詞用法〈判断の根拠〉。前にcrazy（判断表現）あり→根拠が矢印(→)の先に"
  - id: "nar-0608-e307"
    section_id: "Nar_06_08"
    drill: 0
    number: 307
    role: "example"
    english: "She grew up to be a great novelist."
    japanese: "彼女は成長して偉大な小説家になった"
    notes: "不定詞副詞用法〈結果〉。定型表現grow up to be。toの矢印(→)で「成長して→偉大な小説家に」"
  - id: "nar-0608-e308"
    section_id: "Nar_06_08"
    drill: 0
    number: 308
    role: "example"
    english: "He was kind enough to help me."
    japanese: "彼は親切にも私を助けてくれた"
    notes: "不定詞副詞用法〈程度〉。enough to V構文。=He was so kind as to help me."
  - id: "nar-0608-v001"
    section_id: "Nar_06_08"
    drill: 0
    number: 1
    role: "example"
    english: "He was so kind as to help me."
    japanese: "彼は親切にも私を助けてくれた"
    notes: "e308のso...as to V書き換え。so〜の場合はas to Vの形で〈程度〉を表す"
  - id: "nar-0608-e309"
    section_id: "Nar_06_08"
    drill: 0
    number: 309
    role: "example"
    english: "He was too tired to walk."
    japanese: "彼は歩けないほど非常に疲れていた"
    notes: "不定詞副詞用法〈程度〉。too〜to V構文。to Vの「これから→まだやっていない」を否定的に訳す"
  - id: "nar-0608-v002"
    section_id: "Nar_06_08"
    drill: 0
    number: 2
    role: "example"
    english: "He was so tired that he couldn't walk."
    japanese: "彼はとても疲れていたので歩けなかった"
    notes: "e309のso〜that+SV書き換え。too〜to V = so〜that S can't V"
  - id: "nar-0608-e310"
    section_id: "Nar_06_08"
    drill: 0
    number: 310
    role: "example"
    english: "Yasuko worked hard to save money for college."
    japanese: "ヤスコは大学へ行く資金をためるため懸命に働いた"
    notes: "〈目的〉vs〈結果〉の判別。to以下に対して主語の強い意志→〈目的〉で訳す"

