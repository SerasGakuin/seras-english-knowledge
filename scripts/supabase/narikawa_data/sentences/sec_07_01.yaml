# Nar_07_01: 等位接続詞(and, but, or)の用法(1) (p.240-242)

sentences:
  - id: "nar-0701-e360"
    section_id: "Nar_07_01"
    drill: 0
    number: 360
    role: "example"
    english: "We usually shake our heads when we mean 'no', and nod when we mean 'yes'."
    japanese: "私たちはたいてい、「ノー」を意味するときには首を横に振り、「イエス」を意味するときは首を縦に振る"
    notes: "等位接続詞andの読解法。andの後ろの形(nod+when節)から、前の対等な要素(shake our heads+when節)を見つける"
  - id: "nar-0701-e361"
    section_id: "Nar_07_01"
    drill: 0
    number: 361
    role: "example"
    english: "She was shouting and screaming."
    japanese: "彼女は叫んだり、悲鳴を上げたりしていた"
    notes: "and: 同類(A+B)。shouting と screaming は同類の動名詞"
  - id: "nar-0701-e362"
    section_id: "Nar_07_01"
    drill: 0
    number: 362
    role: "example"
    english: "He washed the dishes and dried them."
    japanese: "彼は皿を洗って、それから乾かした"
    notes: "and: 順接(A→B)。時間順の動作をandでつなぐ"
  - id: "nar-0701-e363"
    section_id: "Nar_07_01"
    drill: 0
    number: 363
    role: "example"
    english: "I like him, but he isn't interested in me at all."
    japanese: "私は彼のことが好きだが、彼は私に全く興味がない"
    notes: "but: 逆接(A⇔B)。but以下に情報の重点がある"

