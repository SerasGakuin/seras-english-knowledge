# Nar_02_02: 受動態の形式的特徴（p.85-88）

sentences:
  - id: "nar-0202-e113"
    section_id: "Nar_02_02"
    drill: 0
    number: 1
    role: "example"
    english: "Shakespeare wrote King Lear."
    japanese: "シェイクスピアは『リア王』を書いた"
    notes: "能動態〈S+V+O〉。受動態との比較用"
  - id: "nar-0202-e114"
    section_id: "Nar_02_02"
    drill: 0
    number: 2
    role: "example"
    english: "King Lear was written by Shakespeare."
    japanese: "『リア王』を書いたのはシェイクスピアだった"
    notes: "受動態。OをSに移した形。見た目は〈S+V〉"
  - id: "nar-0202-e115"
    section_id: "Nar_02_02"
    drill: 0
    number: 3
    role: "example"
    english: "Her friends laughed at Mary."
    japanese: "友達はメアリーのことを笑った"
    notes: "能動態。laughは自動詞だが〈laugh at〉で句動詞→他動詞的"
  - id: "nar-0202-e116"
    section_id: "Nar_02_02"
    drill: 0
    number: 4
    role: "example"
    english: "Mary was laughed at by her friends."
    japanese: "メアリーは友達に笑われた"
    notes: "自動詞+前置詞の受動態。at byが連続するがatは省略不可"
  - id: "nar-0202-e117"
    section_id: "Nar_02_02"
    drill: 0
    number: 5
    role: "example"
    english: "Joe gave me this ring."
    japanese: "ジョーは私にこの指輪をくれた"
    notes: "能動態〈S+V+O₁+O₂〉。第4文型"
  - id: "nar-0202-e118"
    section_id: "Nar_02_02"
    drill: 0
    number: 6
    role: "example"
    english: "I was given this ring by Joe."
    japanese: "私はジョーにこの指輪をもらった"
    notes: "受動態。O₁が欠落して〈S+V+O₂〉の形"
  - id: "nar-0202-e119"
    section_id: "Nar_02_02"
    drill: 0
    number: 7
    role: "example"
    english: "Everyone calls her Emma."
    japanese: "みんなは彼女のことをエマと呼んでいる"
    notes: "能動態〈S+V+O+C〉。第5文型"
  - id: "nar-0202-e120"
    section_id: "Nar_02_02"
    drill: 0
    number: 8
    role: "example"
    english: "She is called Emma by everyone."
    japanese: "彼女はみんなにエマと呼ばれている"
    notes: "受動態。Oが欠落して〈S+V+C〉の形"

