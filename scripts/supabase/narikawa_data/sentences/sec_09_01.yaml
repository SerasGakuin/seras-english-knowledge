# Nar_09_01: 前置詞 by の用法(1) (p.330-331)

sentences:
  - id: "nar-0901-e490"
    section_id: "Nar_09_01"
    drill: 0
    number: 490
    role: "example"
    english: "The telephone is by the window."
    japanese: "電話は窓際にあります"
    notes: "byの基本イメージ「そば」の典型例"
  - id: "nar-0901-e491"
    section_id: "Nar_09_01"
    drill: 0
    number: 491
    role: "example"
    english: "Mary goes to work by bike."
    japanese: "メアリーは自転車で仕事に行く"
    notes: "「そば」→交通手段のby"
  - id: "nar-0901-e492"
    section_id: "Nar_09_01"
    drill: 0
    number: 492
    role: "example"
    english: "Would you be able to send it by fax?"
    japanese: "それをファックスで送っていただけますか"
    notes: "「そば」→通信手段のby"
  - id: "nar-0901-e493"
    section_id: "Nar_09_01"
    drill: 0
    number: 493
    role: "example"
    english: "They sold us oranges by the basket."
    japanese: "オレンジをかごで売ってくれた"
    notes: "「そば」→単位を表す手段のby。「そば」にあるかごを使って商売"
  - id: "nar-0901-e494"
    section_id: "Nar_09_01"
    drill: 0
    number: 494
    role: "example"
    english: "Petroleum is sold by the barrel."
    japanese: "石油はバレル単位で売られている"
    notes: "単位のby。もっと厳密な単位ならキログラムやポンド"
  - id: "nar-0901-e495"
    section_id: "Nar_09_01"
    drill: 0
    number: 495
    role: "example"
    english: "It's 9 o'clock by my watch."
    japanese: "私の時計では9時です"
    notes: "「そば」→基準・尺度のby。そばにある時計で時間を知る"
  - id: "nar-0901-e496"
    section_id: "Nar_09_01"
    drill: 0
    number: 496
    role: "example"
    english: "I will go to Mexico by Honolulu."
    japanese: "私はホノルル経由でメキシコに行くつもりだ"
    notes: "「手段」→「経由」のby。by way of, via, throughでも可"
  - id: "nar-0901-e497"
    section_id: "Nar_09_01"
    drill: 0
    number: 497
    role: "example"
    english: "He came by the shortest way."
    japanese: "彼は最短距離を通ってきた"
    notes: "「経由」の一種。最短ルートを経由した"

