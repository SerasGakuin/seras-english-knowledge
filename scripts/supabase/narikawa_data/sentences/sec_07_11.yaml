# Nar_07_11: 「条件」を表す接続詞 (p.272-275)

sentences:
  - id: "nar-0711-e418"
    section_id: "Nar_07_11"
    drill: 0
    number: 418
    role: "example"
    english: "You can stay here providing (that) you work."
    japanese: "仕事をするならここにいてもよい"
    notes: "providing (that)（if以外の条件接続詞の例）"
  - id: "nar-0711-e419"
    section_id: "Nar_07_11"
    drill: 0
    number: 419
    role: "example"
    english: "Suppose (that) my laptop worked, I could play video games."
    japanese: "もしも私のノートパソコンが作動すれば、テレビゲームができるのに"
    notes: "suppose (that)（仮定法過去）。仮定法で使えるのはsuppose系のみ。Providingなどでの書き換えは不可"
  - id: "nar-0711-e420"
    section_id: "Nar_07_11"
    drill: 0
    number: 420
    role: "example"
    english: "I'll remember it as long as I live."
    japanese: "私が生きている間は忘れない"
    notes: "as long as（時間制限「〜している間は」≒while）。本来の意味"
  - id: "nar-0711-e421"
    section_id: "Nar_07_11"
    drill: 0
    number: 421
    role: "example"
    english: "You can go out as long as you are home for dinner."
    japanese: "夕飯までに帰宅するなら出かけてもいいよ"
    notes: "as long as（条件「〜しさえすれば」≒if only）。時間制限から派生した条件の意味"
  - id: "nar-0711-e422"
    section_id: "Nar_07_11"
    drill: 0
    number: 422
    role: "example"
    english: "As far as I know, she is honest."
    japanese: "私が知る範囲内では、彼女は正直です"
    notes: "as far as（範囲「〜の範囲内では」）。know, see, remember, be concerned等と使う"
  - id: "nar-0711-e423"
    section_id: "Nar_07_11"
    drill: 0
    number: 423
    role: "example"
    english: "You needn't contact me unless there is something new."
    japanese: "何か新しいことがない限り、連絡はよこさなくてよい"
    notes: "unless（唯一の例外「〜する場合を除いて」）。unlessは主節の内容に対する唯一の例外を示す"
  - id: "nar-0711-e424"
    section_id: "Nar_07_11"
    drill: 0
    number: 424
    role: "example"
    english: "We will go on a picnic unless it rains."
    japanese: "雨が降らない限りピクニックに行く"
    notes: "unless（雨が降らないことがピクニックの絶対条件であることを強調）"
  - id: "nar-0711-e425"
    section_id: "Nar_07_11"
    drill: 0
    number: 425
    role: "example"
    english: "We will go on a picnic if it does not rain."
    japanese: "雨が降らなければピクニックに行く"
    notes: "if...not（unlessほど強い意味合いはない。降っても行くかもしれないニュアンス）"
  - id: "nar-0711-v001"
    section_id: "Nar_07_11"
    drill: 0
    number: 1
    role: "example"
    english: "I drove as far as Chicago on Monday."
    japanese: "月曜日にはシカゴまで車で行った"
    notes: "▶プラスα: as far asの前置詞句用法「（場所的に）〜まで」。接続詞用法（範囲）と区別"

