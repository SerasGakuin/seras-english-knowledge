    role: "example"
    english: "The bird is in the cage."
    japanese: "鳥はかごの中にいる"
    notes: "inの基本イメージ「ワクの中」。場所の用法"
  - id: "nar-0903-e505"
    section_id: "Nar_09_03"
    drill: 0
    number: 505
    role: "example"
    english: "I learned to drive in three weeks."
    japanese: "3週間で車の運転を覚えた"
    notes: "時間の「ワクの中」で完了した"
  - id: "nar-0903-e506"
    section_id: "Nar_09_03"
    drill: 0
    number: 506
    role: "example"
    english: "I will come home in two hours."
    japanese: "今から2時間後に帰宅するつもりだ"
    notes: "未来時のin＝「今」基準で「〜後に」。afterは過去/未来の一点基準"
  - id: "nar-0903-e507"
    section_id: "Nar_09_03"
    drill: 0
    number: 507
    role: "example"
    english: "He went to his room and returned in his new shirt."
    japanese: "彼は自分の部屋に行き、新しいシャツを着て戻ってきた"
    notes: "着用のin。服の「ワクの中」に体がすっぽり。in＋着用する服(モノ)"
  - id: "nar-0903-e508"
    section_id: "Nar_09_03"
    drill: 0
    number: 508
    role: "example"
    english: "Roy was in his red shoes."
    japanese: "ロイは赤い靴をはいていた"
    notes: "着用のin。体の一部分(足)でもOK"
  - id: "nar-0903-e509"
    section_id: "Nar_09_03"
    drill: 0
    number: 509
    role: "example"
    english: "The glove on his right hand has a hole in it."
    japanese: "彼の右手にはめた手袋には穴が開いている"
    notes: "着用のon（対比用）。on＋着用する体の部位・場所。inとの情報の並べ方の違い"
  - id: "nar-0903-e510"
    section_id: "Nar_09_03"
    drill: 0
    number: 510
    role: "example"
    english: "I managed to communicate in Spanish."
    japanese: "私はなんとかスペイン語で意思を伝えることができた"
    notes: "伝達の枠組みのin。スペイン語という「ワクの中」で会話が成立"
  - id: "nar-0903-e511"
    section_id: "Nar_09_03"
    drill: 0
    number: 511
    role: "example"
    english: "She writes letters in ink."
    japanese: "彼女はインクで手紙を書く"
    notes: "材料のin。ink/chalk/pencilなど表現の材料。with a pencil（実際に持って/aつき）vs in pencil（材料/aなし）"
  - id: "nar-0903-e512"
    section_id: "Nar_09_03"
    drill: 0
    number: 512
    role: "example"
    english: "There is a statue in bronze at the entrance to the mall."
    japanese: "ショッピングセンターの入り口に青銅でつくった銅像がある"
    notes: "材料のin。in bronzeで青銅製"
  - id: "nar-0903-e513"
    section_id: "Nar_09_03"
    drill: 0
    number: 513
    role: "example"
    english: "Put the name list in alphabetical order."
    japanese: "その名簿をアルファベット順に並べなさい"
    notes: "形態・配置のin。アルファベット順という枠組みで並べる"

