# Nar_09_17: 前置詞 with の用法 (p.370-372)

sentences:
  - id: "nar-0917-e606"
    section_id: "Nar_09_17"
    drill: 0
    number: 606
    role: "example"
    english: "He saw a book with a black cover on the coffee table."
    japanese: "彼はコーヒーテーブルの上にある黒い表紙の本を見た"
    notes: "付随のwith。黒い表紙をもった本"
  - id: "nar-0917-e607"
    section_id: "Nar_09_17"
    drill: 0
    number: 607
    role: "example"
    english: "We're looking for a house with two bedrooms."
    japanese: "私たちは寝室が2つある家を探している"
    notes: "付随のwith。寝室2つをもった家"
  - id: "nar-0917-e608"
    section_id: "Nar_09_17"
    drill: 0
    number: 608
    role: "example"
    english: "We cut meat with a knife and eat it with a fork."
    japanese: "私たちは肉をナイフで切り、フォークで食べる"
    notes: "道具のwith。ナイフをもって→ナイフで。フォークをもって→フォークで"
  - id: "nar-0917-e609"
    section_id: "Nar_09_17"
    drill: 0
    number: 609
    role: "example"
    english: "I want to see Mt. Fuji with my own eyes."
    japanese: "私は自分の目で富士山を見たい"
    notes: "道具のwith。自分の目でもって→自分の目で"
  - id: "nar-0917-e610"
    section_id: "Nar_09_17"
    drill: 0
    number: 610
    role: "example"
    english: "He trembled with fear."
    japanese: "彼は恐怖で震えた"
    notes: "原因のwith。恐怖でもって→恐怖で。of（直接的原因）、from（間接的原因）、with（状況をともなって）"
  - id: "nar-0917-e611"
    section_id: "Nar_09_17"
    drill: 0
    number: 611
    role: "example"
    english: "Fashion trends vary with time."
    japanese: "ファッショントレンドは時間と共に変化する"
    notes: "比例のwith。時間でもって→時間と共に"
  - id: "nar-0917-e612"
    section_id: "Nar_09_17"
    drill: 0
    number: 612
    role: "example"
    english: "He played with his child."
    japanese: "彼は子どもと遊んだ"
    notes: "一緒（同伴）のwith。共に存在→一緒に"
  - id: "nar-0917-e613"
    section_id: "Nar_09_17"
    drill: 0
    number: 613
    role: "example"
    english: "I argued with my father about the next election."
    japanese: "私は次の選挙について父と議論した"
    notes: "相手のwith。一緒にいる→議論の相手"
  - id: "nar-0917-e614"
    section_id: "Nar_09_17"
    drill: 0
    number: 614
    role: "example"
    english: "What's the matter with you?"
    japanese: "あなた一体どうしたの？"
    notes: "関係のwith。あなたに関して何が問題か。with youがつくと不信感・とがめるニュアンス。つかないと気遣い"

