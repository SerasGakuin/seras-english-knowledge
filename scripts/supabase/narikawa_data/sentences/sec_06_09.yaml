# Nar_06_09: 不定詞と分詞の副詞用法(2) (p.207-209)

sentences:
  - id: "nar-0609-e311"
    section_id: "Nar_06_09"
    drill: 0
    number: 311
    role: "example"
    english: "The boy greeted me, waving a flag."
    japanese: "少年は旗を振りながら私を迎えてくれた"
    notes: "分詞構文。主節(The boy greeted me)に対する追加情報。あいまいに訳す（同時並行の動作）"
  - id: "nar-0609-e312"
    section_id: "Nar_06_09"
    drill: 0
    number: 312
    role: "example"
    english: "Shopping at the store, I ran into my friend."
    japanese: "その店で買い物をしていて、私は偶然友達に会った"
    notes: "分詞構文。主節(I ran into my friend)が中心、Shopping〜は追加情報。動作の連続性（①→②）"
  - id: "nar-0609-e313"
    section_id: "Nar_06_09"
    drill: 0
    number: 313
    role: "example"
    english: "Not knowing her telephone number, I can't call her up."
    japanese: "彼女の電話番号がわからなくて、私は彼女に電話ができない"
    notes: "否定の分詞構文（Not+Ving）。主節(I can't call her up)が中心、Not knowing〜は追加情報"
  - id: "nar-0609-e314"
    section_id: "Nar_06_09"
    drill: 0
    number: 314
    role: "example"
    english: "Though admitting her guilt, she still felt no wrong."
    japanese: "彼女は自分の罪を認めたが、依然として罪悪感はなかった"
    notes: "接続詞+分詞構文。あいまいさを避け〈譲歩〉の意味を明確化。when/while/though等が使える"
  - id: "nar-0609-e315"
    section_id: "Nar_06_09"
    drill: 0
    number: 315
    role: "example"
    english: "Seen from a distance, the lake looked beautiful."
    japanese: "遠くから見ると、その湖は美しく見えた"
    notes: "受動の分詞構文。Being省略→Vp.p.から始まる。あいまいに訳す原則は変わらない"

