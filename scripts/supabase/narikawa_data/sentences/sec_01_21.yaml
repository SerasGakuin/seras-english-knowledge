# Nar_01_21: 「思い出す」の意味をもつ動詞（p.74-75）

sentences:
  - id: "nar-0121-e096"
    section_id: "Nar_01_21"
    drill: 0
    number: 1
    role: "example"
    english: "The photo always reminds me of our first date."
    japanese: "その写真を見るたびに初めてのデートを思い出すわ"
    notes: "remind A of B: AにB（過去のこと）を思い出させる"
  - id: "nar-0121-e097"
    section_id: "Nar_01_21"
    drill: 0
    number: 2
    role: "example"
    english: "Remind me to go to the post office."
    japanese: "郵便局へ行くように言ってね"
    notes: "remind A to V: Aに（これから）Vすることを気づかせる"
  - id: "nar-0121-e098"
    section_id: "Nar_01_21"
    drill: 0
    number: 3
    role: "example"
    english: "I suddenly remembered her."
    japanese: "突然、私は彼女を思い出した"
    notes: "remember: 意識して思い出す"
  - id: "nar-0121-e099"
    section_id: "Nar_01_21"
    drill: 0
    number: 4
    role: "example"
    english: "I still remember my promise."
    japanese: "私はまだ約束を覚えている"
    notes: "remember: 記憶に定着して覚えている"
  - id: "nar-0121-e100"
    section_id: "Nar_01_21"
    drill: 0
    number: 5
    role: "example"
    english: "I remember that the house was very hot."
    japanese: "あの家がとても暑かったのを覚えている"
    notes: "remember+that節: 節の内容を覚えている"
  - id: "nar-0121-e101"
    section_id: "Nar_01_21"
    drill: 0
    number: 6
    role: "example"
    english: "Please remember me to your mother."
    japanese: "お母様によろしくお伝えください"
    notes: "remember A to B: AのことをBによろしく伝える（特殊用法）"

