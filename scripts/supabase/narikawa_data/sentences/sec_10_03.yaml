# Nar_10_03: 倍数表現、〈as...as〜〉の注意点 (p.390-392)

sentences:
  - id: "nar-1003-e650"
    section_id: "Nar_10_03"
    drill: 0
    number: 650
    role: "example"
    english: "We got as many students as we expected."
    japanese: "私たちが予想していたのと同じ数の生徒が来た"
    notes: "倍数表現の基礎。as many studentsが基準、as we expectedが対象"
  - id: "nar-1003-e651"
    section_id: "Nar_10_03"
    drill: 0
    number: 651
    role: "example"
    english: "We got five times as many students as we expected."
    japanese: "私たちが予想していた5倍の生徒が来た"
    notes: "倍数表現。最初のasの直前にfive timesを追加。❶倍数+❷基準+❸対象の語順"
  - id: "nar-1003-e652"
    section_id: "Nar_10_03"
    drill: 0
    number: 652
    role: "example"
    english: "The country is twice the size of Japan."
    japanese: "その国は日本の2倍の大きさだ"
    notes: "名詞を使った倍数表現。=twice as large as Japan。size/weight/age等の名詞限定"
  - id: "nar-1003-e653"
    section_id: "Nar_10_03"
    drill: 0
    number: 653
    role: "example"
    english: "This box is four times heavier than that one."
    japanese: "この箱はあの箱より4倍重い"
    notes: "倍数+比較級+than。=four times as heavy as that one。ただしtwiceはas...asが通例"
  - id: "nar-1003-e654"
    section_id: "Nar_10_03"
    drill: 0
    number: 654
    role: "example"
    english: "John is two years older than Mary, and he is as old as Bob."
    japanese: "ジョンはメアリーより2歳年上で、ボブと同い年だ"
    notes: "比較表現中の形容詞の意味希薄化。oldは「年老いた」ではなく年齢の基準を示す。7歳でも可"
  - id: "nar-1003-e655"
    section_id: "Nar_10_03"
    drill: 0
    number: 655
    role: "example"
    english: "Ann is as clever as David."
    japanese: "アンは少なくともデイヴィッドと同じくらいの賢さがある"
    notes: "as...asはA≧Bの含み。「Annの方が賢いかも」くらいのニュアンスあり"
  - id: "nar-1003-e656"
    section_id: "Nar_10_03"
    drill: 0
    number: 656
    role: "example"
    english: "The second sentence was just as long as the first."
    japanese: "2番目の文も最初の文とちょうど同じ長さだった"
    notes: "justを添えてA=Bを正確に表現。exactlyも可"

