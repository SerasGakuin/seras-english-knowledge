# Nar_07_02: 等位接続詞(and, but, or)の用法(2) (p.243-245)

sentences:
  - id: "nar-0702-e364"
    section_id: "Nar_07_02"
    drill: 0
    number: 364
    role: "example"
    english: "Which do you like better, baseball or football?"
    japanese: "あなたは、野球とフットボールのどちらが好きですか"
    notes: "or: 選択(A/B)。2つから1つを選ばせる"
  - id: "nar-0702-e365"
    section_id: "Nar_07_02"
    drill: 0
    number: 365
    role: "example"
    english: "We plan to visit Tokyo, or the capital of Japan, after Kyoto."
    japanese: "私たちは、京都の後、東京、すなわち日本の首都を訪れる予定だ"
    notes: "or: 言い換え(A=B)。Tokyo = the capital of Japan"
  - id: "nar-0702-e366"
    section_id: "Nar_07_02"
    drill: 0
    number: 366
    role: "example"
    english: "She stayed behind, for she was tired by the long walk."
    japanese: "彼女は後に残った。というのも、長いこと歩いて疲れていたからだ"
    notes: "等位接続詞for: 理由の補足。節と節のみ結び、文頭不可"
  - id: "nar-0702-e367"
    section_id: "Nar_07_02"
    drill: 0
    number: 367
    role: "example"
    english: "Peter was out, so I left a message with his secretary."
    japanese: "ピーターが外出中だったので、伝言は彼の秘書に託してきた"
    notes: "等位接続詞so: 結果。so that(→p.265)のthat省略とも考えられる"
  - id: "nar-0702-e368"
    section_id: "Nar_07_02"
    drill: 0
    number: 368
    role: "example"
    english: "She tried hard, yet she could not succeed."
    japanese: "彼女は懸命にやってみたが、うまくいかなかった"
    notes: "等位接続詞yet: 逆接"
  - id: "nar-0702-e369"
    section_id: "Nar_07_02"
    drill: 0
    number: 369
    role: "example"
    english: "It was raining, but she went out."
    japanese: "雨が降っていたが、彼女は外出した"
    notes: "等位接続詞vs従属接続詞の違いの説明用。等位接続詞→2文に分けて独立文にできる"
  - id: "nar-0702-v001"
    section_id: "Nar_07_02"
    drill: 0
    number: 1
    role: "example"
    english: "It was raining. But she went out."
    japanese: "雨が降っていた。しかし彼女は外出した"
    notes: "▶等位接続詞は文頭で独立文にできることを示す例。従属接続詞thoughでは不可(✕ She went out. Though it was raining.)"

