# Nar_04_07: 助動詞should(2) (p.138-139)

sentences:
  - id: "nar-0407-e205"
    section_id: "Nar_04_07"
    drill: 0
    number: 205
    role: "example"
    english: "I suggest that you should follow a low-salt diet."
    japanese: "減塩食にすることをお勧めしたいと思う"
    notes: "要求・提案のthat節中のshould。「当然〜した方がいい」と思っているからshouldが入る"
  - id: "nar-0407-e206"
    section_id: "Nar_04_07"
    drill: 0
    number: 206
    role: "example"
    english: "It is necessary that he should ask for a pay raise."
    japanese: "彼は賃上げを要求する必要がある"
    notes: "判断を表すthat節中のshould。necessary「必要な」の裏に「当然だ」の気持ち"
  - id: "nar-0407-e207"
    section_id: "Nar_04_07"
    drill: 0
    number: 207
    role: "example"
    english: "It is surprising that he should object to my plan."
    japanese: "彼が私の計画に反対するとは驚きだ"
    notes: "感情を表すthat節中のshould。「当然」の期待が裏切られて意外・驚きにつながる"
  - id: "nar-0407-e208"
    section_id: "Nar_04_07"
    drill: 0
    number: 208
    role: "example"
    english: "It is surprising that he objects to my plan."
    japanese: "彼が私の計画に反対するとは驚きだ"
    notes: "e207の直説法バージョン。事実を客観的に述べる場合は現在形・過去形で表現可能"
  - id: "nar-0407-e209"
    section_id: "Nar_04_07"
    drill: 0
    number: 209
    role: "example"
    english: "Why should he go for you?"
    japanese: "どうして彼が君の代わりに行かねばならないのか"
    notes: "shouldを疑問文で用いると「当然なんじゃない？？」→意外な気持ちの強調"
  - id: "nar-0407-v001"
    section_id: "Nar_04_07"
    drill: 0
