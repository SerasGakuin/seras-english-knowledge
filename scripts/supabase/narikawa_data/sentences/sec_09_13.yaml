# Nar_09_13: 前置詞 for の用法(2) (p.360-362)

sentences:
  - id: "nar-0913-e584"
    section_id: "Nar_09_13"
    drill: 0
    number: 584
    role: "example"
    english: "We watched television for three hours last night."
    japanese: "私たちは昨夜テレビを3時間見た"
    notes: "期間のfor。3時間すべてに意識が向けられ、ずっと継続"
  - id: "nar-0913-e585"
    section_id: "Nar_09_13"
    drill: 0
    number: 585
    role: "example"
    english: "She lost two pounds during the week."
    japanese: "彼女はその週に2ポンド体重が減った"
    notes: "対比用。duringは特定の期間（theが付く）。forのような全期間継続の意味があるとは限らない"
  - id: "nar-0913-e586"
    section_id: "Nar_09_13"
    drill: 0
    number: 586
    role: "example"
    english: "We substituted honey for sugar."
    japanese: "私たちは砂糖の代わりに蜂蜜を使った"
    notes: "代用のfor。本来使いたいのはfor以下（砂糖）。蜂蜜で代用"
  - id: "nar-0913-e587"
    section_id: "Nar_09_13"
    drill: 0
    number: 587
    role: "example"
    english: "P.M. stands for Prime Minister."
    japanese: "P.M. は Prime Minister（首相）の略である"
    notes: "相当・同等のfor。P.M.がPrime Ministerに代用できる→相当"
  - id: "nar-0913-e588"
    section_id: "Nar_09_13"
    drill: 0
    number: 588
    role: "example"
    english: "We'll exchange yen for dollars at the airport."
    japanese: "空港で円をドルに交換します"
    notes: "交換のfor。相当→交換可能。意識の向かう先はドル"
  - id: "nar-0913-e589"
    section_id: "Nar_09_13"
    drill: 0
    number: 589
    role: "example"
    english: "He looks young for his age."
    japanese: "彼は年齢のわりには若く見える"
    notes: "判断基準のfor。実年齢に意識を向けつつ（for his age）、若く見えると判断"
  - id: "nar-0913-e590"
    section_id: "Nar_09_13"
    drill: 0
    number: 590
    role: "example"
    english: "It's very warm for January."
    japanese: "1月のわりにはとても暖かい"
    notes: "判断基準のfor。極寒の1月を念頭におきながら暖かいと判断"

