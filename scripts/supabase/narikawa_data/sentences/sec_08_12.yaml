# Nar_08_12: whoever, whichever, whatever の用法 (p.321-324)

sentences:
  - id: "nar-0812-e477"
    section_id: "Nar_08_12"
    drill: 0
    number: 477
    role: "example"
    english: "We'll welcome whoever comes."
    japanese: "来る人は誰でもすべて歓迎だ"
    notes: "複合関係代名詞whoever。名詞節(welcomeのO)。comesのSが欠け→主格"
  - id: "nar-0812-e478"
    section_id: "Nar_08_12"
    drill: 0
    number: 478
    role: "example"
    english: "Whichever she chooses, the result will be the same."
    japanese: "たとえ彼女がどちらを選んでも、結果は同じになるだろう"
    notes: "複合関係代名詞whichever。副詞節(譲歩)。取り去っても主節SVC成立→副詞節→no matter which書き換え可"
  - id: "nar-0812-v001"
    section_id: "Nar_08_12"
    drill: 0
    number: 1
    role: "example"
    english: "No matter which she chooses, the result will be the same."
    japanese: "たとえ彼女がどちらを選んでも、結果は同じになるだろう"
    notes: "▶e478のno matter書き換え。副詞節(譲歩)の場合のみno matter書き換え可能"
  - id: "nar-0812-e479"
    section_id: "Nar_08_12"
    drill: 0
    number: 479
    role: "example"
    english: "Take whichever book you like."
    japanese: "どちらでも好きな本を取りなさい"
    notes: "複合関係形容詞whichever+名詞。名詞節(TakeのO)。後ろは完全な文(O+S+V)"
  - id: "nar-0812-e480"
    section_id: "Nar_08_12"
    drill: 0
    number: 480
    role: "example"
    english: "Whatever language you study, you cannot master it in a short time."
    japanese: "たとえどんな言語を学ぶにしても、短期間では習得できない"
    notes: "複合関係形容詞whatever+名詞。副詞節(譲歩)。後ろは完全な文(O+S+V)"
  - id: "nar-0812-e481"
    section_id: "Nar_08_12"
    drill: 0
    number: 481
    role: "example"
    english: "I will give you what help I can."
    japanese: "私にできる援助は何でも君にするつもりだ"
    notes: "関係形容詞what+名詞（名詞節）。複合関係形容詞whateverとの比較用"
  - id: "nar-0812-e482"
    section_id: "Nar_08_12"
    drill: 0
    number: 482
    role: "example"
    english: "I will give you whatever help I can."
    japanese: "私にできる援助は何でも君にするつもりだ"
    notes: "複合関係形容詞whatever+名詞（名詞節）。名詞節ではwhatとwhateverにあまり違いはない"
  - id: "nar-0812-e483"
    section_id: "Nar_08_12"
    drill: 0
    number: 483
    role: "example"
    english: "My boss fired the man who opposed him."
    japanese: "私の上司は、彼に反対した人をクビにした"
    notes: "ふつうの関係代名詞who。先行詞ありで特に訳さない。複合関係代名詞との対比用"
  - id: "nar-0812-e484"
    section_id: "Nar_08_12"
    drill: 0
    number: 484
    role: "example"
    english: "She got angry with whoever opposed her."
    japanese: "彼女は自分に反対する人は誰でもすべてに腹を立てた"
    notes: "複合関係代名詞whoever（名詞節）。先行詞なし。関代よりは疑問詞の延長線上で考える"
  - id: "nar-0812-e485"
    section_id: "Nar_08_12"
    drill: 0
    number: 485
    role: "example"
    english: "I don't know who sent the flowers."
    japanese: "誰が花を送ったのかわからない"
    notes: "疑問代名詞who「誰が〜か」。複合関係詞は疑問詞の延長線上で考えるとよい"

