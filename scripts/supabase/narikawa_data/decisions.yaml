    topic: "女性/男性の会話（p.62）をノード化しない"
    decision: "教育的導入（talk A into Ving の具体例を示す会話）であり、番号付き例文でもないためノード化・英文登録しない。設計書の方針「教師/生徒対話 → ノード化しない」に準拠。"
  - section_id: "Nar_03_01"
    date: "2026-03-01"
    topic: "▶例文（Harrods opens at 10:00 a.m. tomorrow.）の登録"
    decision: "登録する。IDは nar-0301-v001（v = ▶ variant）。例文125にtomorrowを加えたもので、書籍通し番号はないが、設計書の方針「本冊内の▶パターン例文（完全な文の場合のみ）→ 登録する」に準拠。現在形で確実な未来の予定を表す重要な用法の例示。"
