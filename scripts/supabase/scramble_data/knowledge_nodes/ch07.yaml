knowledge_nodes:
- id: skh-001
  name: 仮定法過去
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 46: 仮定法過去（問題158-160）

    ■ 基本形: If + S + 過去形〜, S'' + 助動詞の過去形 + 原形 ...

    「もし（今）〜なら、…だろう（に）」— 現在の事実に反すること・可能性の低いことを仮定・想像する。

    過去形の動詞を使うので「仮定法過去」と呼ばれるが、内容は現在のことを表す。

    ■ if 節中の be 動詞:

    主語の人称・数に関係なく were を使うのが原則。口語では主語が I や3人称単数なら was も可。

    ■ 主節の助動詞:

    would / could / might + 原形。if 節が過去形なら主節は「助動詞の過去形 + 原形」。

    ■ It is time + S + 仮定法過去:

    「（まだ〜していないが）Sはもう〜してよいころだ」

    time の前に high「とっくに」や about「そろそろ」がつくことがある。

    '
- id: skh-002
  name: 仮定法過去完了
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 47: 仮定法過去完了（問題161-163）

    ■ 基本形: If + S + had done 〜, S'' + 助動詞の過去形 + have done ...

    「もし（あの時）〜だったら、…だっただろう（に）」— 過去の事実に反することを仮定・想像する。

    入試では仮定法過去完了に関する出題が最も多い。

    ■ if 節: 過去完了形（had done）

    ■ 主節: 助動詞の過去形 + have done（would/could/might have done）

    ■ ミックス型（仮定法過去完了 + 仮定法過去）:

    「もし（あの時）〜だったら、（今は）…だろうに」

    if 節は仮定法過去完了、主節は仮定法過去。問題文中の時を表す副詞要素に注目する。

    例: if 節〔last year（過去）〕— 主節〔now（現在）〕

    ■ PU!29 直説法か仮定法かの識別:

    「ありそうなこと」は仮定法ではなく直説法（事実をそのまま述べる）で表す。

    例: If it stops raining soon, shall we go out for a walk?（直説法）

    参照: Theme 7（時・条件を表す副詞節中の時制）

    '
- id: skh-003
  name: shouldとwere toを用いた仮定法
  category: 仮定法・比較
  priority: P2
  notes: 'Theme 48: shouldとwere toを用いた仮定法（問題164-165）

    ■ If + S + should do 〜「万一〜ならば〔すれば〕」:

    「まあ、ないと思うが、万一〜ならば」のニュアンス。

    絶対にあり得ないと思われることには用いない。

    主節: 助動詞の現在形[過去形] + 原形、または命令文。

    ■ If + S + were to do 〜「仮に〜ならば〔すれば〕」:

    絶対にあり得ないと思われることにも、あり得ることにも用いる。

    主節: 必ず「助動詞の過去形 + 原形」が来る。

    ■ should と were to の違い:

    should: 可能性は低いがゼロではない（主節に命令文も可）

    were to: あり得ないことにも使える（主節は必ず助動詞の過去形 + 原形）

    '
- id: skh-004
  name: 願望を表す仮定法
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 49: 願望を表す仮定法（問題166-170）

    ■ wish + S + 仮定法過去「Sが〜ならよいのに（と思う）」:

    現在の事実と反対の願望。wish + S + could 〜「Sが〜できたらよいのに」。

    ■ wish + S + would 〜「Sが〜してくれたらよいのに（と思う）」:

    未来のことに対する願望。意志未来のwillが仮定法過去の形wouldになったもの。

    ■ wish + S + 仮定法過去完了「Sが〜ならよかったのに（と思う）」:

    過去の事実と反対の願望。

    注意: want/likeはthat節を目的語にとらない。hopeはthat節を取るが仮定法は不可。

    比較: I hope I can help you.（手伝えればいいのですが）— hopeは直説法。

    ■ If only + S + 仮定法！「Sが〜ならよいのに〔よかったのに〕」:

    if節だけで独立的に用いられる。If only = I wish。

    仮定法過去（現在の願望）にも仮定法過去完了（過去の願望）にも使える。

    ■ would rather + S + 仮定法「（むしろ）Sに〜してほしい」:

    would rather が that 節を伴うとき、節内には仮定法を用いる。

    I would rather you didn''t 〜「〜しないでほしい」の形での出題が多い。

    thatは通例省略される。

    参照: 問82, 83（would rather + 原形 / than を伴う場合）

    '
- id: skh-005
  name: If it were not forなどの表現
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 50: If it were not forなどの表現（問題171-174）

    ■ If it were not for 〜「もし〜がなければ」（仮定法過去）

    ■ If it had not been for 〜「もし〜がなかったら」（仮定法過去完了）

    ■ Without 〜 / But for 〜:

    「もし〜がなければ[なかったら]」— 仮定法過去・過去完了の両方に使える。

    主節の動詞形で時制を判断する。

    ■ With 〜「もし〜があれば[あったら]」:

    Without 〜 と対になる表現。

    ■ PU!30 「もし〜がなければ[なかったら]」の表し方:

    仮定法過去: If it were not for ~ = Were it not for ~ = But for [Without] ~

    仮定法過去完了: If it had not been for ~ = Had it not been for ~ = But for [Without] ~

    参照: Theme 52（ifを省略した倒置形）

    '
- id: skh-006
  name: as if + 仮定法
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 51: as if [as though] + 仮定法（問題175-176）

    ■ as if [as though] + 仮定法過去「まるで〜のように」:

    「実際にはそうでないが、まるで〜する〔である〕かのように」

    注意: 仮定法は時制の一致が行われないので、主節の動詞の時制が現在でも過去でも

    as if の後ろの動詞の形は変わらない。

    例: He talks [talked / will talk] as if he knew everything.

    ■ as if [as though] + 仮定法過去完了「まるで〜した〔であった〕かのように」:

    例: He looks as if he had seen something horrible.

    ■ as if [as though] + 直説法「〜のようだ」:

    事実をそのまま述べる場合。特に look [seem / appear] + as if 〜 の形で多い。

    例: You look as though you have been crying.

    ■ PU!31（発展）as if の後の省略:

    as if の後の「S + V」が省略されて、副詞句 / to不定詞 / 分詞が続くこともある。

    例: He looked at me as if (he wanted) to ask something.

    例: There she sat as if (she had been) paralyzed by his words.

    '
- id: skh-007
  name: ifを省略した仮定法とif節の代用
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 52+53: ifを省略した仮定法 / if節の代用（問題177-183）

    ■ ifの省略と倒置:

    仮定法のifを省略すると倒置（疑問文と同じ語順）が起こる。

    主語の前に置かれるのは原則として Were / Had / Should の3つ。

    ×Did I know it ← If I knew it（一般動詞の過去形は倒置不可）

    ■ 倒置の3パターン:

    Were I you ← If I were you

    Had I known ← If I had known

    Should anything happen ← If anything should happen

    Were it not for ~ ← If it were not for ~ (参照: 問171)

    Had it not been for ~ ← If it had not been for ~ (参照: PU!30)

    Were S to do ← If S were to do（参照: 問165）

    注意: ifを省略した条件節が主節の後に置かれ、コンマなしの場合は特に注意。

    英文読解でも重要。

    ■ 主語がif節の代わりをする場合:

    例: A secret agency would never let you know ...（主語に仮定の意味）

    ■ otherwise「さもなければ」がif節の代わりをする場合:

    例: I ran to the station. Otherwise, I would have missed the train.

    Otherwise = If I had not run to the station

    ■ to不定詞がif節の代わりをする場合:

    例: To hear him speak in French, you would think him a Frenchman.

    To hear = If you heard

    ■ if節も代用表現もない場合の仮定法:

    主節だけで構成される場合もある。助動詞の過去形が仮定法の目印。

    PU!32（発展）: The town has changed a lot — you wouldn''t recognize it now.

    ■ PU!33 副詞otherwiseの3つの意味:

    1.「さもなければ」(= if ~ not) — 仮定法と共起

    2.「別のやり方で」(= differently) — He thinks otherwise.

    3.「その他の点では」(= in other ways) — The room is small, but otherwise it''s quite comfortable.

    '
