check_points:
- node_id: skh-001
  seq: 1
  question: 仮定法過去の if 節と主節の動詞形をそれぞれ答えよ。
  answer: 'if 節: 過去形。主節: 助動詞の過去形（would/could/might）+ 原形。'
- node_id: skh-001
  seq: 2
  question: 仮定法過去は「過去」のことを表すか？
  answer: いいえ。名前に「過去」とあるが、表すのは現在の事実に反する仮定・想像。
- node_id: skh-001
  seq: 3
  question: If I (be) in your situation のように仮定法過去の if 節で be 動詞を使う場合、何を入れるか？
  answer: were。主語の人称・数に関係なく were が原則（口語では was も可）。
- node_id: skh-001
  seq: 4
  question: It is time we started packing. はどういう意味か？
  answer: もう荷造りを始める時間だ（まだ始めていないが、始めるべきだ）。It is time + S + 仮定法過去。
- node_id: skh-002
  seq: 1
  question: 仮定法過去完了の if 節と主節の動詞形をそれぞれ答えよ。
  answer: 'if 節: 過去完了形（had done）。主節: 助動詞の過去形 + have done。'
- node_id: skh-002
  seq: 2
  question: If I had attended the seminar last year, I would be able to speak English more fluently now. はなぜミックス型か？
  answer: if 節が過去の仮定（last year→仮定法過去完了）、主節が現在の仮定（now→仮定法過去）だから。
- node_id: skh-002
  seq: 3
  question: If it stops raining soon, shall we go out for a walk? は仮定法か直説法か？
  answer: 直説法。「ありそうなこと」は仮定法ではなく直説法で表す。stopsは条件の副詞節中で未来を表す現在形。
- node_id: skh-002
  seq: 4
  question: 仮定法過去完了の主節に来る助動詞の過去形を3つ挙げよ。
  answer: would have done, could have done, might have done。
- node_id: skh-003
  seq: 1
  question: If + S + should do は「絶対にあり得ないこと」に使えるか？
  answer: 使えない。可能性は低いがゼロではない場合に使う（「万一〜ならば」）。
- node_id: skh-003
  seq: 2
  question: If + S + were to do の主節にはどのような制約があるか？
  answer: 必ず「助動詞の過去形 + 原形」が来る。shouldの場合と異なり命令文は不可。
- node_id: skh-003
  seq: 3
  question: If you should have any questions, please let me know. の主節が命令文だが、これは正しいか？
  answer: 正しい。shouldを用いた仮定法では主節に命令文も可能。
- node_id: skh-004
  seq: 1
  question: I wish I (know) her telephone number. の空所を埋めよ。
  answer: knew。現在の事実に反する願望なので仮定法過去。
- node_id: skh-004
  seq: 2
  question: I wish we had reserved a table. の wish を hope に変えられるか？
  answer: 変えられない。hopeはthat節を取るが、節内に仮定法は用いない。
- node_id: skh-004
  seq: 3
  question: If only I knew her number. を I wish で書き換えよ。
  answer: I wish I knew her number. If only = I wish。
- node_id: skh-004
  seq: 4
  question: I'd rather you (not help) me. の空所を正しい形にせよ。
  answer: didn't help。would rather + S + 仮定法過去。否定は didn't + 原形。
- node_id: skh-004
  seq: 5
  question: wish + S + would 〜 はどのような願望を表すか？
  answer: 未来のことに対する願望。「Sが〜してくれたらよいのに」。意志未来のwillが仮定法の形wouldになったもの。
- node_id: skh-005
  seq: 1
  question: 「もし〜がなければ」を表す仮定法過去の表現を3つ挙げよ。
  answer: If it were not for ~ / Were it not for ~ / Without [But for] ~。
- node_id: skh-005
  seq: 2
  question: 「もし〜がなかったら」を表す仮定法過去完了の表現を3つ挙げよ。
  answer: If it had not been for ~ / Had it not been for ~ / Without [But for] ~。
- node_id: skh-005
  seq: 3
  question: Without / But for は仮定法過去と仮定法過去完了のどちらに使えるか？
  answer: 両方に使える。主節の動詞形で時制を判断する。
- node_id: skh-005
  seq: 4
  question: With a little more effort, he would have been a member of our team. の With はどのような意味か？
  answer: 「もし〜があったら」の意味。Without の対義表現。仮定の意味を表す。
- node_id: skh-006
  seq: 1
  question: He talks as if he knew everything. の as if 以下はなぜ仮定法過去か？
  answer: 「実際には知らないが、まるで知っているかのように」— 現在の事実に反する仮定だから。
- node_id: skh-006
  seq: 2
  question: 主節の動詞が He talked (過去) に変わった場合、as if 以下の動詞形は変わるか？
  answer: 変わらない。仮定法は時制の一致を受けないので、knew のまま。
- node_id: skh-006
  seq: 3
  question: It looks as if it is going to snow. の as if 以下は仮定法か直説法か？
  answer: 直説法。事実をそのまま述べている。look/seem/appear + as if で直説法が来ることがある。
- node_id: skh-007
  seq: 1
  question: If I were you を if を省略した形に書き換えよ。
  answer: Were I you。ifを省略すると疑問文と同じ語順（倒置）になる。
- node_id: skh-007
  seq: 2
  question: ifの省略で主語の前に置かれる語は原則としてどの3つか？
  answer: Were / Had / Should。一般動詞の過去形は倒置不可。
- node_id: skh-007
  seq: 3
  question: I ran to the station. Otherwise, I would have missed the train. の otherwise は何の代わりか？
  answer: If I had not run to the station の代わり。「さもなければ」の意味。
- node_id: skh-007
  seq: 4
  question: To hear him speak in French, you would think him a Frenchman. の To hear は何の代わりか？
  answer: If you heard him speak in French の代わり。to不定詞がif節を代用している。
- node_id: skh-007
  seq: 5
  question: He thinks otherwise. の otherwise はどの意味か？
  answer: 「別のやり方で」(= differently)。「彼はそうは考えない」の意味。仮定法のotherwise（さもなければ）とは異なる。
