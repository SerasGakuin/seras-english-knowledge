check_points:
  # sjd-001
  - node_id: "sjd-001"
    seq: 1
    question: "名詞的用法の不定詞が主語になる場合、通例どうするか？"
    answer: "形式主語itを文頭に置き、to不定詞を後に回す（It is ... (for A) to do）。"
  - node_id: "sjd-001"
    seq: 2
    question: "All S can do is (to) do はどのような意味か？《米口語》ではどうなるか？"
    answer: "「Sにできるのは〜だけだ」。《米口語》ではtoが省略されて原形不定詞が来る。"
  - node_id: "sjd-001"
    seq: 3
    question: "疑問詞+to不定詞はどのような名詞句を作るか？"
    answer: "「〜すべきか/〜すればよいか」の意味の名詞句を作り、文中で主語・目的語・補語になる。"
  # sjd-002
  - node_id: "sjd-002"
    seq: 1
    question: "形容詞的用法の不定詞で、修飾される名詞と不定詞の関係は何パターンあるか？"
    answer: "3パターン: ①名詞が不定詞の意味上の主語 ②名詞が前置詞の目的語（前置詞が残る） ③不定詞が名詞の内容を説明。"
  - node_id: "sjd-002"
    seq: 2
    question: "something to write on と something to write with の意味の違いは？"
    answer: "to write on =「書くもの」（紙）。to write with =「書く道具」（ペン等）。前置詞により意味が変わる。"
  - node_id: "sjd-002"
    seq: 3
    question: "疑問詞+to doのうち存在しない形は？"
    answer: "why to doの形はない。"
  # sjd-003
  - node_id: "sjd-003"
    seq: 1
    question: "副詞的用法の主な意味を6つ挙げよ。"
    answer: "①目的 ②結果 ③感情の原因 ④判断の根拠 ⑤形容詞の意味の限定 ⑥条件。"
  - node_id: "sjd-003"
    seq: 2
    question: "...only to doの意味は？"
    answer: "「…だが結局〜する（にすぎない）」（結果）。"
  - node_id: "sjd-003"
    seq: 3
    question: "A is difficult to do の構文で、主語Aはどのような役割を果たすか？"
    answer: "不定詞の意味上の目的語。This question is difficult to answer. = It is difficult to answer this question."
  - node_id: "sjd-003"
    seq: 4
    question: "「結果」を表す不定詞の5つの表現は？"
    answer: "awake [wake up] to find / grow up to be / live to be / ...only to do / ...never to do。"
  # sjd-004
  - node_id: "sjd-004"
    seq: 1
    question: "不定詞の意味上の主語はどう表すか？"
    answer: "「for + 名詞[代名詞目的格]」を不定詞の直前に置く（for me to sit on）。"
  - node_id: "sjd-004"
    seq: 2
    question: "不定詞の否定形はどう作るか？"
    answer: "not [never] を不定詞の直前に置く（not to do / never to do）。×to not do は不可。"
  - node_id: "sjd-004"
    seq: 3
    question: "He seems to have been a popular actor when he was young. のto have beenは何を表すか？"
    answer: "現在のseemsよりも前（過去）のことを、完了形の不定詞で表している。"
  - node_id: "sjd-004"
    seq: 4
    question: "代不定詞とは何か？例を挙げよ。"
    answer: "前出の動詞を含む語句を繰り返さずにtoだけを用いる用法。told him not to = told him not to read my e-mails。"
  # sjd-005
  - node_id: "sjd-005"
    seq: 1
    question: "be+to doの4つの用法は？"
    answer: "①予定・運命 ②義務・命令 ③可能 ④意図・願望。"
  - node_id: "sjd-005"
    seq: 2
    question: "be+to doが「可能」を表す場合の特徴は？"
    answer: "通例否定文で、to be doneの受身形で用いられる（No life form was to be found...）。"
  - node_id: "sjd-005"
    seq: 3
    question: "be to blameの意味は？"
    answer: "「責めを負うべきである/責任がある」。頻出表現。"
  - node_id: "sjd-005"
    seq: 4
    question: "be+to doが「意図」を表す場合、どこで用いられることが多いか？"
    answer: "if節の中（if we are to remain friends...）。"
  # sjd-006
  - node_id: "sjd-006"
    seq: 1
    question: "独立不定詞とは何か？"
    answer: "文の他の部分から独立し、文全体を修飾する副詞的用法の不定詞。慣用句として暗記する。"
  - node_id: "sjd-006"
    seq: 2
    question: "to say nothing of ~ の意味は？同義表現は？"
    answer: "「〜は言うまでもなく」。= not to speak of / not to mention / let alone。"
  - node_id: "sjd-006"
    seq: 3
    question: "to make matters [things] worse の意味は？"
    answer: "「さらに悪いことには」。"
  - node_id: "sjd-006"
    seq: 4
    question: "to tell the truth / to be frank with you / needless to say の意味は？"
    answer: "「実を言うと」/「率直に言って」(= frankly speaking) /「言うまでもなく」。"
  # sjd-007
  - node_id: "sjd-007"
    seq: 1
    question: "too ... to doの意味は？so ... that S can't doとの書き換えで注意すべき点は？"
    answer: "「とても…なので〜できない」。文の主語と不定詞の目的語が一致する場合、不定詞の目的語を省略する（×to drink it → to drink）。"
  - node_id: "sjd-007"
    seq: 2
    question: "enough to doのenoughの位置は？"
    answer: "修飾する形容詞・副詞の後ろに置く（tall enough, ×enough tall）。"
  - node_id: "sjd-007"
    seq: 3
    question: "so as to doとso ... as to doの意味の違いは？"
    answer: "so as to do =「〜するために」（目的）。so ... as to do =「とても…なので〜する」（結果/程度）。"
  - node_id: "sjd-007"
    seq: 4
    question: "so as to doの否定形は？notの位置は？"
    answer: "so as not to do。notは不定詞の直前（×so as to not do）。in order not to doも同様。"

