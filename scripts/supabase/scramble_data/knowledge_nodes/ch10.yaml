check_points:
  - node_id: "shs-005"
    seq: 1
    question: "no dog can と同意の表現は？ また「any dog can't」は可能か？"
    answer: "no dog can = not ... any dog can。ただし「any + 名詞 ... not」の語順は不可なので any dog can't は不可。"
  - node_id: "shs-005"
    seq: 2
    question: "「～ではないと思う」は英語でどう表すのが一般的か？"
    answer: "I don't think ~（notの繰り上げ）。I think ~ not の形はまれ。"
  - node_id: "shs-005"
    seq: 3
    question: "notの繰り上げが行われない動詞の代表は？ その理由は？"
    answer: "hope。常に肯定的な意味を持つため。cf. I hope he won't come.（× I don't hope ~）"

  - node_id: "shs-006"
    seq: 1
    question: "hardly/scarcely はどんな否定を表すか？"
    answer: "「ほとんど～ない」（程度の弱い否定）。一般動詞の前、be動詞・助動詞の後に置く。"
  - node_id: "shs-006"
    seq: 2
    question: "準否定語に not を付けてよいか？"
    answer: "不可。準否定語自体が否定を含むため。× don't seldom → ○ seldom"
  - node_id: "shs-006"
    seq: 3
    question: "hardly any + 名詞 / hardly ever の意味は？"
    answer: "hardly any + 名詞 = ほとんど～がない（almost no）。hardly ever = めったに～ない（seldom / almost never）。"

  - node_id: "shs-007"
    seq: 1
    question: "not all の意味は？ 全体否定はどう表す？"
    answer: "not all = すべてが～というわけではない（部分否定）。全体否定は none / no + 名詞 / not any。"
  - node_id: "shs-007"
    seq: 2
    question: "not both の意味は？ 全体否定はどう表す？"
    answer: "not both = 両方とも～というわけではない（部分否定）。全体否定は neither / not either。"
  - node_id: "shs-007"
    seq: 3
    question: "not necessarily の意味は？ altogether / quite / entirely の場合は？"
    answer: "not necessarily = 必ずしも～というわけではない。not altogether [quite/entirely] = まったく～というわけではない。"

  - node_id: "shs-008"
    seq: 1
    question: "not in the least の意味と同意表現は？"
    answer: "少しも～でない（= not at all）。in the least は at all と同様、否定を強調する。"
  - node_id: "shs-008"
    seq: 2
    question: "by no means の意味は？"
    answer: "決して～でない（どんな手段によっても）。= not ... by any means。"
  - node_id: "shs-008"
    seq: 3
    question: "There is no way to do の意味は？"
    answer: "とうてい～できない。"

  - node_id: "shs-009"
    seq: 1
    question: "cannot ... without doing の意味は？"
    answer: "…すると必ず～する（二重否定 → 強い肯定）。whenever を用いた書き換え可能。"
  - node_id: "shs-009"
    seq: 2
    question: "anything but と nothing but の違いは？"
    answer: "anything but = 決して～でない（= by no means）。nothing but = ～だけ / ～にすぎない（= only）。"
  - node_id: "shs-009"
    seq: 3
    question: "far from と free from の違いは？"
    answer: "far from: A is not C at all（SVCの否定）。free from: A does not have B（SVOの否定）。"
  - node_id: "shs-009"
    seq: 4
    question: "have yet to do の意味と同意表現は？"
    answer: "まだ～していない。= be yet to do = still haven't done。remain to be done も「まだ～されていない」。"
  - node_id: "shs-009"
    seq: 5
    question: "否定副詞句（by no means等）が文頭に出たときの語順は？"
    answer: "倒置（疑問文の語順）になる。By no means is this ... / Under no circumstances should you ..."

