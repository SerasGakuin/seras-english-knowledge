check_points:
  - node_id: "sgi-001"
    seq: 1
    question: "Any dictionary will do.のdoはどういう意味か？"
    answer: "「間に合う/十分である」。will doの形で「それで十分だ」の意味。"
  - node_id: "sgi-001"
    seq: 2
    question: "Bicycles are selling well.のsellはなぜ能動態なのに「売れる」という受動的な意味になるか？"
    answer: "sell/read/cut/wash等は能動態で受動の意味を表す動詞。well/badlyなどの副詞を伴う。"
  - node_id: "sgi-001"
    seq: 3
    question: "I'm coming.はなぜ「行きます」と訳すのか？"
    answer: "comeは「相手のほうへ行く」意味。呼ばれて相手に向かう場面ではgoではなくcomeを使う。"
  - node_id: "sgi-002"
    seq: 1
    question: "meet the deadlineのmeetはどういう意味か？"
    answer: "「（要求・必要・締め切りなど）に応じる/満たす/間に合わせる」(= satisfy)。"
  - node_id: "sgi-002"
    seq: 2
    question: "It struck me that〜はどういう意味か？strikeの意外な用法は？"
    answer: "「〜という考えが心にふと浮かんだ」。strike A as Bで「AにBだと思わせる」もある。"
  - node_id: "sgi-002"
    seq: 3
    question: "His dream came true.をrealizeを使って書き換えるとどうなるか？なぜcome trueの後に目的語は取れないか？"
    answer: "His dream was realized. come trueは自動詞表現なので目的語を取れない。他動詞realizeが必要。"
  - node_id: "sgi-003"
    seq: 1
    question: "room「余地」は可算名詞か不可算名詞か？make room forはどういう意味か？"
    answer: "不可算名詞。make room for〜は「〜のために場所を空ける」。"
  - node_id: "sgi-003"
    seq: 2
    question: "have a good command of Englishのcommandはどういう意味か？"
    answer: "「（特に語学の）運用力/自由に使いこなす能力」。英語が達者であるの意味。"
  - node_id: "sgi-003"
    seq: 3
    question: "It's a shame your wife couldn't come.のshameはどういう意味か？"
    answer: "「残念なこと/遺憾なこと」(= pity)。通例a shameの形で使う。"
  - node_id: "sgi-004"
    seq: 1
    question: "コーヒーの「濃い/薄い」は英語でどう表すか？「霧が濃い」はどうか？"
    answer: "飲み物はstrong/weak。霧はthick/dense/heavy（×deepは不可）。色はdeep/light。"
  - node_id: "sgi-004"
    seq: 2
    question: "My watch is fast.のfastはどういう意味か？fast asleepのfastは？"
    answer: "「（時計が）進んで」(⇔ slow「遅れて」)。fast asleepは「ぐっすり眠って」(= sound asleep)。"
  - node_id: "sgi-004"
    seq: 3
    question: "否定文で「〜もまた」を表すにはtoo/also/eitherのどれを使うか？"
    answer: "either。tooとalsoは肯定文で使う。ただしalso can'tの語順ならalsoも否定文で可。"

