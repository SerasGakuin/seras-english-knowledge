knowledge_nodes:
  - id: "sgi-001"
    name: "意外な意味を持つ自動詞"
    category: "語い"
    priority: "P2"
    notes: |
      Theme 184。多義動詞の「意外な意味」を問う語彙問題。自動詞に焦点。
      do「間に合う/十分である」(will doの形)、pay「利益になる/引き合う」、sell「売れる」、
      cheat「カンニングする」、come「(相手のほうへ)行く」、agree「(食べ物が)合う」、
      read「〜と書いてある」。
      PU!165: 能動態で受動の意味を表す動詞 — sell/read/cut/cook/wash/run/lock。
      形は能動態でも受動的な意味。well/badlyなどの副詞を伴うことが多い。
      参照: as [so] long as〜(⇨ 450)、catch A doing(⇨ 561)、Power Up! 123(say vs read)。

  - id: "sgi-002"
    name: "意外な意味を持つ他動詞"
    category: "語い"
    priority: "P2"
    notes: |
      Theme 185+186統合。他動詞の「意外な意味」を問う語彙問題。
      【Theme 185】fail〜「役に立たない」、meet〜「満たす」(meet the deadline)、
      survive〜「切り抜ける/〜より長生きする」、gain〜「(時計が)進む」(⇔ lose)、
      hold〜「催す/〜と思う」、observe〜「守る」(= obey)、
      realize〜「実現する」(cf. come true=自動詞)、invent〜「でっち上げる」(= make up)。
      【Theme 186】drive〜「追いやる」(SVOC/drive A to do/drive A into B)、
      command〜「見渡す」(command a view of〜)、answer〜「応答する」(answer the phone)、
      strike〜「心に浮かぶ」(It strikes A that〜/strike A as B)、
      put〜「言い表す」(to put it clearly/simply)、recognize〜「それと気づく」、
      move〜「感動させる」(be moved)、see〜「診てもらう」(see a doctor)、
      follow〜「従う/理解する」。
      参照: Power Up! 165(能動態で受動意味)、PU!24(独立不定詞)、PU!123(say)。
      参照: at the last moment(⇨ 197)、occur to(⇨ 1001)、make up(⇨ 901)。

  - id: "sgi-003"
    name: "意外な意味を持つ名詞"
    category: "語い"
    priority: "P2"
    notes: |
      Theme 187+188統合。名詞の「意外な意味」を問う語彙問題。
      【Theme 187】interest「利子/利益」、subject「話題」(= topic)、
      issue「(緊急の)問題点/論争点」、room「場所/余地」(不可算、make room for〜)、
      stranger「不案内な人」(I'm a stranger here.)、respect「点」(in this/every respect)、
      command「運用力」(have a good command of English)。
      PU!166: game「獲物/策略」、well「井戸」、gift「才能」、bill「法案/紙幣」、
      stage「段階/局面」(⇨ 805)、challenge「やりがい/課題」。
      【Theme 188】turn「順番」(take turns doing⇨602、in turn⇨1209)、
      end「目的」(⇔ means「手段」⇨603)、must「必要なもの/必見のもの」(a must)、
      safe「金庫」、shame「残念なこと」(= pity)、change「小銭/つり銭」。
      PU!167: copy「部/冊」、word「約束」(keep/break one's word)、will「遺言書」、
      dish「料理」、picture「映像/画像」。
      参照: be tired of(⇨ 1147)、would like to do(⇨ 80)。
      注意: 「数詞−名詞」が修飾語になる場合、名詞は単数形になる(a five-dollar bill)。

  - id: "sgi-004"
    name: "意外な意味を持つ形容詞・副詞"
    category: "語い"
    priority: "P2"
    notes: |
      Theme 189+190統合。形容詞・副詞の「意外な意味」を問う語彙問題。
      【Theme 189】heavy traffic「多い交通量」⇔ light traffic、
      busy「(電話が)話し中」(the line is busy⇨1342)、
      latest「最新の」(the latest fashion/news)、
      narrow「辛うじての」(have a narrow escape、a narrow victory)、
      flat「空気の抜けた」(have a flat tire)、
      strong「(飲み物が)濃い」⇔ weak「薄い」。
      PU!168: 「濃い/薄い」の形容詞 — strong/weak(飲み物)、thick/thin(濃度・密度)、
      deep/light(色)。霧はdense/heavyも可。色彩語の前ではdarkも可。
      【Theme 190】available「入手できる/利用できる/手が空いている」、
      reasonable「手ごろな/妥当な」、tough「(肉が)かたい」⇔ tender「やわらかい」、
      smart「頭の良い」(≠スマートな体型。slender/slimを使う)、
      sharp「きっかりに/急な」(at four sharp、a sharp turn)、
      fast「(時計が)進んで」⇔ slow「遅れて」、fast「ぐっすり」(fast asleep)、
      either「〜もまた(否定文で)」(⇔ too/also=肯定文)。
      参照: Power Up! 38(latest)、Theme 333(Something is wrong with)、Theme 205(the latter)。

