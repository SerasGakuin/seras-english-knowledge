knowledge_nodes:
  - id: "sid-016"
    name: "前置詞＋名詞のイディオム①②③"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 238+239+240統合。「前置詞+名詞」のイディオム（前半33表現）+ PU!197,198,199。
      【Theme 238】on the contrary「それどころか」(⇔to the contrary「それとは反対の[に]」。on the contraryは文頭、to the contraryは修飾語の後)、in person「直接自分で」(=personally)、at a loss「途方にくれて」(しばしばfor〜や「疑問詞+to do」を伴う。at a loss for words「言葉を失う」)、in the way (of〜)「じゃまになって」(=in A's way。⇔out of the way「じゃまにならないように」=out of A's way)、on [one's] way「途中で」(方向を示す副詞句を伴う。on the way home)、by the way「ところで」(=incidentally。話題転換)、out of the question「問題にならない/不可能」(=impossible)、in general「一般に/概して」(=generally)、in particular「特に/とりわけ」(=particularly。⇔in general)、as a rule「概して/ふつうは」(=in general)、on the whole「概して/大体において」(=in general。⇔as a whole「全体として(の)」)、at large「逃走中で」(また、名詞の後に「全体としての/一般の」: the world at large)。
      【Theme 239】for good「永久に/ずっと」(=forever/permanently)、for nothing「むだに」(go for nothing「水泡に帰す」。「無料で/ただで」(=free)の意味も重要)、in vain「むだに」(=for nothing/to no purpose。only to fail⇨93)、at work「仕事中で」、under way「進行中で」(=in progress)、by chance「偶然に」(=by accident/accidentally。「うっかり」の訳も)、on purpose「故意に/わざと」(=intentionally/deliberately)、on the go「忙しく働いて」(=very busy)、in turn「今度は」(turnは「順番」。「順番に」=by turnsの意味も)、in advance「前もって」(=ahead of time/beforehand)。
      PU!197: 「at+名詞」の表現 — at work, at war, at (the) table, at issue, at play, at rest, at school, at prayer。
      PU!198: 「under+名詞」の表現 — under way, under investigation, under construction, under repair, under consideration, under discussion。
      【Theme 240】once in a while「ときどき」(=sometimes。「忘れたころに」を含意)、from time to time「ときどき」(「やや定期的に」を含意)、on occasion(s)「ときどき」(やや形式的)、out of order「故障して」(⇔in order「順調で」)、out of date「時代遅れの」(⇔up to date「最新の」。out of fashion⇔in fashionも同意)、out of sight「見えないところに」(⇔in sight)、out of hand「手に負えない」(⇔in hand。out of control⇔under controlも同意)、for the time being「当分の間」(=for the present/for the moment)、on end「引き続いて/連続して」(=continuously。「直立して」の意味も: stand an egg on end)、before long「まもなく」(=soon)、(just) in case「万一に備えて」(副詞的に文末で使用⇨848)。
      PU!199: 「out of+名詞」の表現 — out of fashion⇔in fashion, out of control⇔under control, out of place⇔in place, out of shape⇔in shape, out of the way⇔in the way(⇨1192), out of the question(⇨1195), out of the blue「突然」。a bolt out of the blue「青天のへきれき」。

  - id: "sid-017"
    name: "前置詞＋名詞のイディオム④⑤"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 241+242統合。「前置詞+名詞」のイディオム（中盤22表現）+ PU!200。
      【Theme 241】in the long run「結局は/最後には」(=eventually/in the end)、after all「（いろいろあって）結局」(意図・予想に反する結果。「何といっても」の意味も。end up doing⇨1033)、as a matter of fact「実は」(=in fact)、beyond description「言葉では表現できない（ほど）」、behind the times「時代遅れで」(timesは通例複数。⇔behind time「定刻より遅れて」⇔ahead of time「定刻より早く」)、in any case「とにかく」(=anyway/anyhow)、at any rate「とにかく」(=in any case)、on the spot「その場で/即座に」(=at once/immediately/right away⇨1184)、for one thing「1つには」(理由説明。for another (thing)で追加理由)、at ease「気楽な/くつろいで」(⇔ill at ease「不安な/落ち着かない」)。
      語句: save A B「AのBを省く」(⇨531)。
      PU!200: 「beyond+名詞」の表現 — 「（範囲）を越えて」→否定。beyond description(⇨1225), beyond belief「信じられない」, beyond doubt「疑う余地のない」, beyond repair「修理できない」, beyond A's control「手に負えない」, beyond recognition「見分けがつかないほど」。
      【Theme 242】in a hurry「急いで」(=in haste/hastily。get doing「〜し始める」)、above all (things)「とりわけ/中でも」(=especially/particularly)、for sure「確かに/きっと」(=for certain/certainly。know/sayの後で多い。形容詞的にも: That's for sure.)、in earnest「まじめに/本気で」(=seriously)、in detail「詳しく/詳細に」、in no time「すぐに/あっという間に」(inは「時の経過」)、in other words「言い換えれば/つまり」(=that is (to say))、on duty「勤務中で」(⇔off duty「非番で」。onは「接触・従事」、offは「分離」)、at first「初めのうちは」(=in the beginning。「後では変わった」の含み)、for the first time「初めて」(at first/first of allとの区別重要。first of all「まず第一に」)、for the first time in〜years「〜年ぶりに」、behind A's back「Aの陰で」(⇔to A's face「面と向かって」)。

  - id: "sid-018"
    name: "前置詞＋名詞のイディオム⑥⑦"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 243+244統合。「前置詞+名詞」のイディオム（後半23表現）+ PU!201,202,203。
      【Theme 243】on one's own「独力で/ひとりで」(=alone/by oneself⇨340。自分自身に頼って)、of one's own「自分自身の」(混同注意: a room of my own)、to the point「要領を得た/的を射た」(⇔beside[off] the point「的はずれの」)、in time「間に合って」(「やがて/そのうちに」の意味も⇨212)、on time「時間通りに」(=punctually)、to the minute「きっかり」(=sharp⇨773/on time)、by nature「生まれつき」(byは「〜に関しては」)、at hand「すぐ近くに/間近に」(close/nearと共に用いる)、by degrees「徐々に」(=gradually。byは「〜ずつ」)、in short「要するに」(=in brief/to sum up)、without fail「必ず/きっと」(=for certain/for sure⇨1234)。
      PU!201: 「by+名詞」の表現 — by birth「生まれは」, by profession[trade]「職業は」, by name「名前は」, by sight「顔は」。know A by name[sight]「Aの名前[顔]は知っている」。
      PU!202: 「〜ずつ」の意味のbyを用いた表現 — step by step「一歩一歩」, one by one「1つずつ」, day by day「一日一日と」(cf. day after day「来る日も来る日も」), little by little「少しずつ」(=by degrees/gradually)。
      【Theme 244】to some[a certain] extent「ある程度は」(=to some degree。to a great[large] extent「大いに」)、from a〜point of view「〜の見地から」(=from a〜viewpoint[perspective])、in a sense「ある意味では」(=in a way)、within (A's) reach「手の届くところに」(⇔out of[beyond] (A's) reach「手の届かないところに」)、in public「人前で/公然と」(=publicly。⇔in private「内密に」)、at first hand「直接に」(=directly。⇔at second hand「間接に/人づてに」)、at A's disposal「Aの自由になる(ように)」(disposal「処分の自由」)、all at once「突然」(=suddenly)、(all) of a sudden「突然」(=suddenly)、in my opinion「私の考えでは」(=in my view)、on one's face「うつぶせに」(=on one's stomach。⇔on one's back「あおむけに」)、on a diet「ダイエット中で」(be[go] on a diet。onは「状態・従事」)。
      PU!203: 「on+名詞」の表現 — on strike「ストライキ中」, on the rise[increase]「上昇中」, on sale「発売中」(cf. for sale「売り物の」), on (the) air「放送中」, on the way「途中で」(⇨1193), on a diet(⇨1266), on the go(⇨1208), on duty(⇨1239)⇔off duty。

understanding_goals:
  - node_id: "sid-016"
    seq: 1
    goal: "on the contraryとto the contraryの用法の違い（文頭vs修飾語の後）を説明できる"
  - node_id: "sid-016"
    seq: 2
    goal: "in the way（じゃま）とon the way（途中）とby the way（ところで）を区別できる"
  - node_id: "sid-016"
    seq: 3
    goal: "out of+名詞のイディオムが「否定」の意味を作るパターンと、その反意語（in/under）を対にして覚えている"
  - node_id: "sid-016"
    seq: 4
    goal: "「ときどき」を表す複数の表現（once in a while, from time to time, on occasion等）のニュアンスの違いを説明できる"
  - node_id: "sid-016"
    seq: 5
    goal: "for nothingの2つの意味（むだに/無料で）を文脈から区別できる"
  - node_id: "sid-017"
    seq: 1
    goal: "behind the times（時代遅れ）とbehind time（定刻遅れ）の違いを説明できる"
  - node_id: "sid-017"
    seq: 2
    goal: "at first（初めのうちは）とfor the first time（初めて）とfirst of all（まず第一に）を適切に使い分けられる"
  - node_id: "sid-017"
    seq: 3
    goal: "beyond+名詞のイディオムが「不可能」の意味を持つパターンを理解している"
  - node_id: "sid-017"
    seq: 4
    goal: "on duty⇔off dutyのonとoffの意味（接触・従事⇔分離）を説明できる"
  - node_id: "sid-018"
    seq: 1
    goal: "on one's own（独力で）とof one's own（自分自身の）を前置詞から区別できる"
  - node_id: "sid-018"
    seq: 2
    goal: "in time（間に合って/やがて）とon time（時間通りに）の違いを説明できる"
  - node_id: "sid-018"
    seq: 3
    goal: "within reach⇔out of[beyond] reachの対比を理解している"
  - node_id: "sid-018"
    seq: 4
    goal: "by+名詞の「〜に関しては」（by nature等）と「〜ずつ」（step by step等）の2つの用法を区別できる"

check_points:
  - node_id: "sid-016"
    seq: 1
    question: "on the contraryとto the contraryの違いは？"
    answer: "on the contrary「それどころか」は通例文頭で前の発言を否定。to the contrary「それとは反対の[に]」は修飾する語の後で使う。"
  - node_id: "sid-016"
    seq: 2
    question: "out of the questionとout of the wayの意味は？"
    answer: "out of the question「問題にならない/不可能」(=impossible)。out of the way「じゃまにならないように」(⇔in the way「じゃまに」)。"
  - node_id: "sid-016"
    seq: 3
    question: "on the whole と as a whole の違いは？"
    answer: "on the whole「概して/大体において」(=in general)。as a whole「全体として(の)」。意味が異なる。"
  - node_id: "sid-016"
    seq: 4
    question: "for nothingの2つの意味は？"
    answer: "①「むだに」(=in vain)。go for nothing「水泡に帰す」。②「無料で/ただで」(=free)。He fixed my bike for nothing."
  - node_id: "sid-016"
    seq: 5
    question: "on endの2つの意味は？"
    answer: "①「引き続いて/連続して」(=continuously)。②「直立して/まっすぐに」。stand an egg on end「卵をまっすぐ立てる」。"
  - node_id: "sid-017"
    seq: 1
    question: "behind the timesとbehind timeの違いは？"
    answer: "behind the times「時代遅れで」(timesは複数形)。behind time「定刻より遅れて」(⇔ahead of time「定刻より早く」)。"
  - node_id: "sid-017"
    seq: 2
    question: "at firstとfor the first timeとfirst of allの違いは？"
    answer: "at first「初めのうちは」(後で変わった含み)。for the first time「初めて」(最初の経験)。first of all「まず第一に/何よりもまず」。"
  - node_id: "sid-017"
    seq: 3
    question: "at easeの反意表現は？"
    answer: "ill at ease「不安な/落ち着かない」。"
  - node_id: "sid-017"
    seq: 4
    question: "for one thingの後に追加の理由を述べるときの表現は？"
    answer: "for another (thing)。例: For one thing I'm busy. For another I don't have any money."
  - node_id: "sid-018"
    seq: 1
    question: "on one's own と of one's own の違いは？"
    answer: "on one's own「独力で/ひとりで」(=alone/by oneself)。of one's own「自分自身の」。例: a room of my own「自分の部屋」。"
  - node_id: "sid-018"
    seq: 2
    question: "in timeの2つの意味は？"
    answer: "①「間に合って/遅れずに」。just in time to catch the train。②「やがて/そのうちに」。The wounds will heal in time."
  - node_id: "sid-018"
    seq: 3
    question: "at first handとat second handの意味は？"
    answer: "at first hand「直接に/じかに」(=directly)。at second hand「間接に/人づてに」。"
  - node_id: "sid-018"
    seq: 4
    question: "in public の反意語は？"
    answer: "in private「内密に/こっそりと/非公式に」(=privately)。"

node_prerequisites:
  - node_id: "sid-017"
    prerequisite_id: "sid-016"
  - node_id: "sid-018"
    prerequisite_id: "sid-016"
