check_points:
  - node_id: "sgi-014"
    seq: 1
    question: "語根spire(=breathe)から派生するinspire/expire/aspireの意味は？"
    answer: "inspire「励ます/霊感を与える」/expire「期限が切れる」/aspire「熱望する」。"
  - node_id: "sgi-014"
    seq: 2
    question: "語根volve(=roll)から派生するevolve/involve/revolveの意味は？"
    answer: "evolve「進化する/発展する」/involve「巻き込む/含む」/revolve「回転する」。"
  - node_id: "sgi-014"
    seq: 3
    question: "語根ject(=throw)から派生するreject/inject/projectの意味は？"
    answer: "reject「拒絶する」/inject「注射する」/project「計画する」(名)「計画」。"
  - node_id: "sgi-014"
    seq: 4
    question: "語根scribe(=write)から派生するdescribe/prescribe/subscribeの意味は？"
    answer: "describe「述べる/説明する」/prescribe「処方する/規定する」/subscribe「予約購読する」。"
  - node_id: "sgi-015"
    seq: 1
    question: "語根mit(=send)から派生するadmit/submit/commit/permitの意味は？"
    answer: "admit「認める」/submit「提出する」/commit「犯す/委託する」/permit「許す」。"
  - node_id: "sgi-015"
    seq: 2
    question: "語根press(=push)から派生するdepress/impress/suppress/expressの意味は？"
    answer: "depress「落ち込ませる」/impress「感動させる」/suppress「抑える」/express「表現する」。"
  - node_id: "sgi-015"
    seq: 3
    question: "assure/insure/ensureの意味の違いは？assure A that〜の意味は？"
    answer: "assure「保証する/安心させる」/insure「保険をかける」/ensure「確実にする」。assure A that〜=「Aに〜を保証する」。"
  - node_id: "sgi-015"
    seq: 4
    question: "語根duce(=lead)から派生するreduce/produce/introduceの意味は？"
    answer: "reduce「減少させる/（状態に）変える」/produce「生産する」/introduce「導入する/紹介する」。"
  - node_id: "sgi-016"
    seq: 1
    question: "considerate vs considerableの意味の違いは？"
    answer: "considerate「思いやりのある」/considerable「かなりの」。"
  - node_id: "sgi-016"
    seq: 2
    question: "sensible vs sensitiveの意味の違いは？sensoryは？"
    answer: "sensible「分別のある/賢明な」/sensitive「敏感な」/sensory「感覚の/知覚の」。"
  - node_id: "sgi-016"
    seq: 3
    question: "respectable/respective/respectfulの意味の違いは？"
    answer: "respectable「きちんとした/立派な」/respective「それぞれの」/respectful「礼儀正しい/敬意を表する」。"
  - node_id: "sgi-016"
    seq: 4
    question: "valuable vs invaluableの関係は？invaluableの正確な意味は？"
    answer: "反意語ではない。invaluable=priceless「非常に価値のある」（valuableの強意形）。⇔valueless(=worthless)「価値のない」。"

