    goal: "of one's own doingの意味と使い方がわかる"

check_points:
  # sjd-008
  - node_id: "sjd-008"
    seq: 1
    question: "動名詞が文中で果たす4つの役割は？"
    answer: "主語・補語・動詞の目的語・前置詞の目的語。入試では前置詞の目的語が特に重要。"
  - node_id: "sjd-008"
    seq: 2
    question: "動名詞の意味上の主語はどのように表すか？"
    answer: "名詞・代名詞の所有格または目的格を動名詞の前に置く（口語では目的格が多い）。例: my receiving / me receiving"
  - node_id: "sjd-008"
    seq: 3
    question: "完了形の動名詞(having done)はどのような場合に使うか？"
    answer: "述語動詞の表す時よりも前のことを表す場合。例: on suspicion of having killed（殺した容疑で→殺したのは逮捕より前）"
  - node_id: "sjd-008"
    seq: 4
    question: "動名詞の否定形でnot/neverの位置は？意味上の主語がある場合は？"
    answer: "not/neverは動名詞の直前に置く。意味上の主語は否定語の前に置く（例: Jim not coming）。完了形の否定: not having done"
  - node_id: "sjd-008"
    seq: 5
    question: "受動態の動名詞の形は？"
    answer: "単純形: being done「〜されること」、完了形: having been done「〜されたこと」"
  # sjd-009
  - node_id: "sjd-009"
    seq: 1
    question: "look forward to doingのtoは不定詞のtoか前置詞のtoか？なぜdoingが来るか？"
    answer: "前置詞のto。前置詞の後には名詞か動名詞が来るため。to doと混同しないこと。"
  - node_id: "sjd-009"
    seq: 2
    question: "be accustomed to doingとget accustomed to doingの違いは？"
    answer: "be accustomedは状態「〜に慣れている」、get accustomedは動作「〜に慣れる」。同様にbe used to / get used toも同じ関係。"
  - node_id: "sjd-009"
    seq: 3
    question: "inが省略可能な動名詞の慣用表現を3つ挙げよ。"
    answer: "have difficulty [trouble] (in) doing, spend A (in) doing, be busy (in) doing"
  - node_id: "sjd-009"
    seq: 4
    question: "object to doingの意味と書き換えは？"
    answer: "「〜することに反対する」= oppose doing"
  # sjd-010
  - node_id: "sjd-010"
    seq: 1
    question: "There is no doingの意味と3つの書き換えは？"
    answer: "「〜することはできない」= It is impossible to do / We [You] cannot do / No one can do"
  - node_id: "sjd-010"
    seq: 2
    question: "be worth doingで能動形の動名詞が受動の意味を表す点と、worthwhileを使った書き換えは？"
    answer: "This novel is worth reading.（読まれる価値がある）= It is worthwhile reading [to read] this novel. 能動形readingで受動の意味を表す。"
  - node_id: "sjd-010"
    seq: 3
    question: "on doingとin doingの意味の違いは？"
    answer: "on doing「〜するとすぐに」(= as soon as S + V)、in doing「〜する際に/〜するときに」(= while/when S + V)"
  - node_id: "sjd-010"
    seq: 4
    question: "It goes without saying that ~の意味と書き換えは？"
    answer: "「〜は言うまでもない」= Needless to say, S + V"

