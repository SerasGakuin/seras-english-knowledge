# Ch05 動名詞 — sjd-008〜010（3ノード / 5セクション）

knowledge_nodes:
  - id: "sjd-008"
    name: "動名詞の基本用法と動詞的性質"
    category: "準動詞"
    priority: "P1"
    notes: |
      Theme 32+33 統合。動名詞(doing)は動詞にingをつけた名詞の一種。
      文中での4つの働き: 主語/補語/動詞の目的語/前置詞の目的語。
      入試では特に前置詞の目的語になる場合が重要。
      動名詞の動詞的性質:
        ① 目的語や補語、副詞（句）を伴う
        ② 意味上の主語を持つ — 名詞・代名詞の所有格または目的格を動名詞の前に置く（口語では目的格が多い）
        ③ 完了形(having done)と受動態(being done / having been done)がある
        ④ 否定形(not/neverを動名詞の直前に置く)がある
      否定形+意味上の主語: 名詞・代名詞を否定語の前に置く（例: Jim not coming）
      形式主語itを用いた動名詞句: It is ... doing ~ も可能（不定詞と同様）

  - id: "sjd-009"
    name: "前置詞to/inの後の動名詞慣用表現"
    category: "準動詞"
    priority: "P1"
    notes: |
      Theme 34+35 統合。前置詞toの後に動名詞が来る慣用表現（to doと混同注意）。
      前置詞の後には必ず名詞か動名詞が来ることを忘れないように。
      to doing表現:
        - look forward to doing「〜するのを楽しみに待つ」
        - be accustomed to doing「〜することに慣れている」(= be used to doing ⇨問65。よりも硬い表現)
        - when it comes to doing「〜するということになると」
        - object to doing「〜することに反対する」(= oppose doing)
        - What do you say to doing?「〜してはどうですか」(= How/What about doing?)
      比較: be accustomed to(状態) vs get accustomed [used] to(動作)
      in省略可能な表現:
        - have difficulty [trouble] (in) doing「〜するのに苦労する」
          — 程度: a lot of / great / a little / little / no をdifficulty前に入れる
        - spend A (in) doing「A(時間)を〜して過ごす/〜するのに費やす」
          — 比較: spend A on B (⇨1042)
        - be busy (in) doing「〜するのに忙しい」
          — 比較: be busy with [at] + 名詞
      inのない場合はdoingを補語的な働きをする現在分詞と考えることもできる。
      参照: stay up「寝ずに起きている」(= sit up)(⇨892)

  - id: "sjd-010"
    name: "その他の動名詞慣用表現"
    category: "準動詞"
    priority: "P1"
    notes: |
      Theme 36 単独。動名詞を用いた重要慣用表現。
      - There is no doing「〜することはできない」= It is impossible to do / We cannot do / No one can do
      - It is no use [good] doing「〜してもむだである」= It is useless to do
        — goodはuseより口語的。形式主語itを用いた構文。
      - There is no use [good / point] (in) doing = It is no use [good] doing
      - be worth doing「〜する価値がある」
        — 能動態の動名詞で受動の意味「〜される」を表す（重要）
        — 書き換え: It is worthwhile reading [to read] this novel.
      - of one's own doing「自分で〜した」
      - feel like doing「〜したい気がする」= feel inclined to do = want to do
      - It goes without saying that ~「〜は言うまでもない」= Needless to say, S + V (⇨PU!24)
      - on doing「〜するとすぐに」= as soon as S + V
      - 比較: in doing「〜する際に/〜するときに」= while [when] S + V
      参照: so ... that ~「とても…なので〜」(⇨446)

understanding_goals:
