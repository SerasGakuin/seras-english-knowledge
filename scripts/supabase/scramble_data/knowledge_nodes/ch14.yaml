check_points:
  # shs-037: 強調構文と語句による強調
  - node_id: "shs-037"
    seq: 1
    question: "強調構文 It is...that ~ で強調できる要素は何か？強調できないものは？"
    answer: "強調できるのは主語・目的語などの名詞（句・節）と副詞（句・節）のみ。動詞と形容詞は強調できない。"
  - node_id: "shs-037"
    seq: 2
    question: "強調されるものが「人」の場合、thatの代わりに何を使えるか？「人以外」の場合は？"
    answer: "「人」→ who [whom]。「人以外」→ which。"
  - node_id: "shs-037"
    seq: 3
    question: "強調構文と形式主語構文はどう見分けるか？（4パターン）"
    answer: "It is+副詞+that→強調構文。It is+形容詞+that→形式主語構文。It is+名詞+that+不完全な文→強調構文。It is+名詞+that+完全な文→形式主語構文。"
  - node_id: "shs-037"
    seq: 4
    question: "very+名詞、do/does/did+動詞原形、on earth/in the worldの3種類の語句強調の意味は？"
    answer: "very+名詞「まさにその~/ちょうどその~」（形容詞用法）。do [does/did]+動詞原形「本当に~する[した]」（強調の助動詞）。on earth/in the world/ever「いったい（全体）」（疑問詞の直後に置く）。"
  # shs-038: 倒置の用法
  - node_id: "shs-038"
    seq: 1
    question: "never/littleなどの否定語を文頭に出すと語順はどうなるか？"
    answer: "疑問文と同じ語順に倒置される（(助)動詞＋主語）。littleは文頭倒置で「少しも~ない」という強い否定になる。"
  - node_id: "shs-038"
    seq: 2
    question: "only+時の副詞（句・節）を文頭に出すとどうなるか？"
    answer: "倒置が起こり疑問文の語順になる。「~の時になって初めて[やっと]」と訳す。onlyは否定に近い意味を持つため。"
  - node_id: "shs-038"
    seq: 3
    question: "Not only...but alsoが文と文を結ぶ場合のNot only文頭の語順は？"
    answer: "Not onlyの後ろが倒置（疑問文の語順）になる。but also以下は通常の語順のまま。"
  - node_id: "shs-038"
    seq: 4
    question: "so+助動詞[be動詞]+Sはどういう意味を表すか？使い分けのルールは？"
    answer: "前の肯定の内容を受けて「Sもまたそうだ」。一般動詞にはdo/does/did、be動詞にはis/am/are/was/wereを使う。"
  - node_id: "shs-038"
    seq: 5
    question: "neitherとnorの使い分けは？接続詞andとの共起はどうなるか？"
    answer: "neither=副詞→接続詞andと共起可能（and neither do they）。nor=接続詞→接続詞andがある場合は使えない。"
  # shs-039: that節の代用のsoとnot
  - node_id: "shs-039"
    seq: 1
    question: "I hope so. / I hope not.はそれぞれどういう意味か？否定の注意点は？"
    answer: "I hope so.「そうであることを願う/そうだといいね」。I hope not.「そうでないことを願う」。×I don't hope so.の形は不可。"
  - node_id: "shs-039"
    seq: 2
    question: "I'm afraid so. / I'm afraid not.はそれぞれどういう意味か？"
    answer: "I'm afraid so.「残念ながらそうだと思う」。I'm afraid not.「残念ながらそうでないと思う」。×I'm not afraid so.は不可。"
  - node_id: "shs-039"
    seq: 3
    question: "think/supposeの否定はどう表すか？"
    answer: "I don't think [suppose] so. = I think [suppose] not.の2形式が可能。ただしthinkはI don't think so.のほうがふつう。"
  # shs-040: 省略の用法
  - node_id: "shs-040"
    seq: 1
    question: "副詞節中の「S+be動詞」が省略されるのはどういう場合か？主な接続詞は？"
    answer: "副詞節中の主語が主節の主語と同一の場合に多い。while doing/when+形容詞/though+形容詞/once done/if done等の形になる。"
  - node_id: "shs-040"
    seq: 2
    question: "if any / if everはどういう意味で、どんな語の後に使われるか？"
    answer: "if any: few/littleの後で「たとえあるにしても」。if ever: seldom/rarelyの後で「たとえあるにしても」。if anyは「もしあるならば」の意味もある。"
  - node_id: "shs-040"
    seq: 3
    question: "if anythingの意味は？"
    answer: "「どちらかと言えば/むしろ」(= rather)。if anyと同様の「たとえあったとしても」の意味もある。"
  - node_id: "shs-040"
    seq: 4
    question: "A, if not Bはどういう意味か？if notの2つの意味は？"
    answer: "「Bとは言わないまでもA」。if notには(1)「~とは言わないまでも」(2)「もしそうでなければ」の2つの意味がある。"
  - node_id: "shs-040"
    seq: 5
    question: "if possible / if necessary / if soで省略されている部分は何か？"
    answer: "if possible = if it is possible「できたら」。if necessary = if it is necessary「必要ならば」。if so = if S did so「もしそうならば」。"

