knowledge_nodes:
  - id: "shs-037"
    name: "強調構文と語句による強調"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 118+119: 強調構文（It is...that）と語句による強調（very+名詞、do+動詞原形、on earth等）。

      【強調構文 It is...that ~】
      強調したい文の要素をIt isとthatではさんで強調する表現。
      (1) 強調できる要素は、主語、目的語などとして働く名詞（句・節）か副詞（句・節）だけ。動詞と形容詞は強調できない。
      (2) 強調されるものが「人」ならwho [whom]、「人以外」ならwhichをthatの代わりに用いることもある。
      (3) 疑問詞を含む強調構文: 疑問詞 + is it that ~? の形になる。

      [図表: PU!87 強調構文と形式主語構文の見分け方（4パターン分類表）]
      (1) It is + 副詞 + that ~ → 強調構文
      (2) It is + 形容詞 + that ~ → 形式主語構文
      (3) It is + 名詞 + that + 名詞が欠けた文 → 強調構文
      (4) It is + 名詞 + that + 完全な文 → 形式主語構文

      【語句による強調】
      ・very + 名詞「まさにその~/ちょうどその~」— 名詞の強調（形容詞用法）
        例: at that very moment「ちょうどその時」, in this very town「まさにこの町で」
        ※ so, tooは副詞なので直接名詞を修飾できない。muchは不可算名詞を修飾するので人には不適切。
      ・do [does/did] + 動詞の原形「本当に~する[した]」— 動詞の強調（強調の助動詞do）
      ・on earth / in the world / ever — 疑問詞の強調
        疑問詞の直後に置いて「いったい（全体）」の意味を加える。

  - id: "shs-038"
    name: "倒置の用法"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 120+121: 強調のための倒置と慣用的な倒置。

      【強調のための倒置】
      否定語（never/little/rarely/seldom等）を文頭に出すと、主語＋動詞の語順が「(助)動詞＋主語」と逆転する（疑問文と同じ語順）。
      ・littleは文頭に出すと「少しも~ない」という強い否定を表す（通常は「ほとんど~ない」）。
      ・only + 副詞句・副詞節を文頭に出す場合も倒置が起こる。
        〈重要〉only+時の副詞（句・節）→「~の時になって初めて[やっと]」
      ・Not only...but (also) ~ が文と文を結ぶ場合、Not onlyが文頭に出るとNot onlyの後ろが倒置になる。

      【慣用的な倒置】
      ・so + 助動詞[be動詞] + S「Sもまたそうだ」— 前の肯定の内容を受ける
        一般動詞 → do/does/did、be動詞 → is/am/are/was/were
        例: "I'm a student." "So am I."
      ・neither + 助動詞[be動詞] + S「Sもまたそうでない」— 前の否定の内容を受ける
      ・nor + 助動詞[be動詞] + S「Sもまたそうでない」— 前の否定の内容を受ける
        norの後ろに節を続ける場合は「nor + 疑問文の語順」に並べる。

      [PU!88 neitherとnorの使い分け]
      neither = 副詞 → 接続詞andと共起可能（and neither is the second）
      nor = 接続詞 → 接続詞andがある場合は使えない

  - id: "shs-039"
    name: "that節の代用のsoとnot"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 122: that節の代用のsoとnot。

      hope/be afraid/think/supposeなどの目的語が、肯定のthat節ならsoを、否定のthat節ならnotを代用する。

      [PU!89 I hope ~ と I am afraid ~ の4つの用法]
      Will it rain?（雨が降るでしょうか）に対する4つの応答:
      ① I hope so.「降ってほしいですね」
      ② I hope not.「降らなければいいなあ」
      ③ I am afraid so.「残念ながら降るでしょうね」
      ④ I am afraid not.「残念ながら降らないでしょうね」
      ※ so = that it will rain / not = that it will not rain

      hopeとbe afraidの否定形の特殊ルール:
      ・I hope not.（○）/ I don't hope so.（×）
      ・I'm afraid not.（○）/ I'm not afraid so.（×）

      think/supposeの否定形:
      ・I don't think [suppose] so. = I think [suppose] not.（2形式可能）
      ・thinkはI don't think so.のほうがふつう

      問465-467は全て対話問題。Bの応答のみ登録（decision #6）。

  - id: "shs-040"
    name: "省略の用法"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 123+124: 副詞節中の「S+be動詞」の省略と慣用的な省略。

      【副詞節中のS+be動詞の省略】
      副詞節において「S+be動詞」が省略されることがある。
      特に副詞節中の主語が主節の主語と同一である場合に多い。
      主な接続詞: while/when/though [although]/once/if/unless

      [PU!90 副詞節中の省略例]
      ① while doing「~している間」— while (S is) doing
      ② when+前置詞句「~の時」— when (they were) in school
      ③ though+形容詞「~だけれども」— though (I am) tired
      ④ once done「いったん~されたら」— once (it is) signed
      ※ ③のif necessaryは慣用的省略（→Theme 124/PU!91）にも該当
      ※ ④ → 問421（Ch13 時の接続詞）参照

      【慣用的な省略（if節）】
      if節では、主節の主語とif節の主語が違う場合でも、慣用的に「S+V」が省略されることが多い。
      挿入句として使われる重要表現が多いので要注意。

      [PU!91 慣用的な省略7表現]
      □ if any「たとえあるにしても」— few/littleの後で使用。「もしあるならば」の意味もある。
      □ if anything「どちらかと言えば/むしろ」(= rather)。if anyと同様「たとえあったとしても」の意味もある。
      □ if ever「たとえあるにしても」— seldom/rarelyの後で使用。
      □ A, if not B「Bとは言わないまでもA / Bでないにしても A」。
        if notには「もしそうでなければ」の意味もある。
      □ if possible「できるなら/できたら」— if (it is) possibleの省略。
      □ if necessary「必要ならば」— if (it is) necessaryの省略。
      □ if so「もしそうならば」— if (S did) soの省略。

