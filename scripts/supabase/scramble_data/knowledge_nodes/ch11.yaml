check_points:
- node_id: shs-010
  seq: 1
  question: It is ... for A to do と It is ... of A to do の使い分けの基準は？
  answer: forは不定詞の意味上の主語を示す一般的な場合。ofは人の性質（kind, foolish等）を表す形容詞の場合に用いる。ofの場合はAを主語にして書き換え可能。
- node_id: shs-010
  seq: 2
  question: It is natural that節でshouldを用いるのはなぜか？ It is necessary that節ではどうか？
  answer: naturalは感情・価値判断 → shouldで主観を表す。necessaryは要求・願望 → that節中で原形またはshould+原形を用いる。
- node_id: shs-010
  seq: 3
  question: It seems that he had been ill. をto不定詞で書き換えると？
  answer: He seemed to have been ill.（that節の動詞が主節より前の時制なので完了不定詞）
- node_id: shs-010
  seq: 4
  question: It doesn't matter / It makes no difference の後に来る節は？
  answer: whether節。疑問詞節（who/what/when等）も可能（PU!59）。
- node_id: shs-011
  seq: 1
  question: 形式目的語itを用いる代表的な動詞3つは？
  answer: find / think / make。特にfindが頻出。find it difficult to do「～するのは難しいとわかる」。
- node_id: shs-011
  seq: 2
  question: make it a rule to do の意味は？ 同意表現は？
  answer: 「いつも～することにしている」。= be in the habit of doing / have the habit of doing。硬い表現で、日常的にはalways/usuallyを用いる。
- node_id: shs-011
  seq: 3
  question: take it for granted that節の意味は？ itを用いない形は？
  answer: 「～を当然のことと思う」。take A for granted「Aを当然のことと思う」（take A for B のBにgrantedが来た形）。
- node_id: shs-012
  seq: 1
  question: The climate of Sapporo is not as mild as (　) of Tokyo. の空所に入る語は？
  answer: that。the climateの繰り返しを避けるthat。that of ～の形が多い。
- node_id: shs-012
  seq: 2
  question: those present の意味は？ those =「人々」の用法は他にどんな例があるか？
  answer: 「出席者」（= those who were present）。他にthose concerned [involved]「関係者/当事者」。
- node_id: shs-012
  seq: 3
  question: that と it はどちらも the + 単数名詞 の代用だが、どう違うか？
  answer: thatは後ろに修飾語句（of ～等）を伴う。itは単独で用い、修飾語句をつけない。
- node_id: shs-013
  seq: 1
  question: one と it の違いは？
  answer: one = a + 名詞（不特定の同種のもの）。it = the[所有格] + 名詞（前出のそのもの）。itには修飾語がつかない。
- node_id: shs-013
  seq: 2
  question: He likes white wine better than (　). でoneが入らない理由は？
  answer: wineは不可算名詞なのでoneで代用できない。redと省略するか、red wineと繰り返す。
- node_id: shs-013
  seq: 3
  question: ones を単独（修飾語なし）で使えるか？
  answer: 不可。onesは必ず修飾語つきで用いる。a big one / the ones who ... など。
- node_id: shs-014
  seq: 1
  question: one ~ the other と some ~ others の違いは？
  answer: one ~ the other は2つのうち「1つは～、残りの1つは…」。some ~ others は3つ以上で「～のものもあれば…のものもある」。
- node_id: shs-014
  seq: 2
  question: another + 複数名詞 は可能か？
  answer: another + 数詞[few] + 複数名詞 の形なら可能。「さらに～」の意味。another two months has [have] passed。
- node_id: shs-014
  seq: 3
  question: each other は副詞句として使えるか？
  answer: 不可。each otherは代名詞で、常に他動詞や前置詞の目的語になる。×They met to each other → ○They met each other。
- node_id: shs-015
  seq: 1
  question: either / neither は単数扱いか複数扱いか？
  answer: 原則として単数扱い。Either of us has to ask him.
- node_id: shs-015
  seq: 2
  question: neither と none の使い分けは？
  answer: neither は2者について、none は3者以上について用いる。
- node_id: shs-015
  seq: 3
  question: none of A のAに来る名詞にはどんな語が必要か？
  answer: the / this / his のような限定する語が必要。×none of dogs → ○none of the dogs。
- node_id: shs-016
  seq: 1
  question: every of A の形は正しいか？
  answer: 不可。everyは形容詞用法のみなので、every of ... は不可。代名詞用法が必要ならeachを用いる。
- node_id: shs-016
  seq: 2
  question: every other day の意味は？ 同意表現は？
  answer: 「1日おきに」。= every second day = every two days。every other + 単数名詞「1つおきの～」。
- node_id: shs-016
  seq: 3
  question: 「3年ごとに」を every を使って2通りで表すと？
  answer: every three years（every + 基数 + 複数名詞）= every third year（every + 序数 + 単数名詞）。
- node_id: shs-017
  seq: 1
  question: 疑問文でsomeを用いるのはどんな場合か？
  answer: 肯定の答えを予期するとき。何かを依頼したり勧めたりする場合。Will you lend me some money?
- node_id: shs-017
  seq: 2
  question: 肯定文でanyを用いるとどんな意味になるか？
  answer: 「どれでも/どんな～でも」の意味。Any pencil will do.（どんな鉛筆でもいい）
- node_id: shs-017
  seq: 3
  question: some day と the other day の違いは？
  answer: some day =「(将来の)いつか/ある日」。the other day =「先日」。someは未来、the otherは過去を指す。
- node_id: shs-018
  seq: 1
  question: have nothing to do with ～ の意味は？ nothing以外に何が入るか？
  answer: 「～と何の関係もない」。something/much[a lot]/little も入り、関係の程度を表す。
- node_id: shs-018
  seq: 2
  question: nothing but と anything but の違いは？
  answer: nothing but = only「～だけ/～にすぎない」。anything but = by no means「決して～でない」。意味が正反対。
- node_id: shs-018
  seq: 3
  question: do nothing but do の後ろの動詞の形は？
  answer: 原形不定詞（動詞の原形）。does nothing but complain。
- node_id: shs-019
  seq: 1
  question: 再帰代名詞の再帰用法と強調用法の違いは？
  answer: '再帰用法: 動詞・前置詞の目的語（主語=目的語）。強調用法: 主語・目的語・補語の直後に置いて意味を強める（省略可能）。'
- node_id: shs-019
  seq: 2
  question: by oneself と for oneself の違いは？
  answer: by oneself =「ひとりで」（= alone）。for oneself =「独力で」（自分のために自ら）。
- node_id: shs-019
  seq: 3
  question: beside oneself の意味は？
  answer: 「(喜び・怒りなどで)我を忘れて/夢中になって」。be beside oneself with rage「怒りで我を忘れる」。
