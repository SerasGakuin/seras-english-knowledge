knowledge_nodes:
- id: shs-010
  name: 形式主語のit
  category: 品詞・構文
  priority: P1
  notes: 'Theme 78+79+80: 形式主語のitの基本用法と慣用表現。


    Theme 78: 不定詞句やthat節が主語になる場合、形式上の主語itを文頭に置き、

    真の主語を後ろに回す。


    (1) It is ... (for A) to do「(Aが) ～することは…だ」

    ＊forは不定詞の意味上の主語を表す。

    (2) It is ... of A to do「～するとはAは…だ」

    ＊人の性質・行為に対する評価・判断を表す形容詞の場合にof Aを用いる。

    → A を主語にして書き換え可能: A is ... to do

    (3) It is natural that S should do「Sが～するのは当然だ」

    ＊It is の後に感情・価値判断の語 → that節内にshouldを用いることがある。

    《米》ではshouldなしで直説法も多い。

    (4) It is necessary that S (should) do「Sが～することが必要だ」

    ＊necessary/essential等 → that節中で原形またはshould+原形。


    PU!56: of を用いる形容詞:

    kind/nice/good, wise/clever, foolish/stupid/silly, cruel,

    rude/impolite, polite, careless（⇨ 問288）, thoughtful


    PU!57: 感情・価値判断を表す形容詞・名詞:

    surprising/amazing, strange, (un)fortunate, natural/no wonder,

    a pity/a shame（⇨ 問761）, right


    PU!58: 「要求」や「願望」を表す形容詞（that節中でshould/原形）:

    necessary（⇨ 問290）, essential, desirable, advisable,

    important, vital/crucial


    Theme 79: 形式主語のitを用いた慣用表現:

    It takes (+A) + 時間 + to do「(Aが) ～するのに…かかる」（⇨ PU!109）

    It costs (+A) + 費用 + to do「(Aが) ～するのに…かかる」（⇨ 問529）

    It doesn''t matter (to A) whether節「～かどうかは(Aにとって)どうでもよい」

    It makes no difference (to A) whether節 ＝ 上記と同意

    PU!59: It doesn''t matter + 疑問詞節 の形もある。


    Theme 80: It seems that節 / It happens that節 の構文:

    It seems that 節「～のように見える/～らしい」

    ＊この it は形式主語ではない（that節を文頭に置けない）。

    → to不定詞で書き換え: He seems to be ill.

    ＊that節の動詞が主節より前の時制 → 完了不定詞 to have done

    It happens [chances] that節「たまたま～する」

    → happen [chance] to do で書き換え可能。

    PU!60: seem の4つの時制関係:

    (1) It seems that S is = S seems to be

    (2) It seems that S was [has been] = S seems to have been

    (3) It seemed that S was = S seemed to be

    (4) It seemed that S had been = S seemed to have been

    '
- id: shs-011
  name: 形式目的語のitとその慣用表現
  category: 品詞・構文
  priority: P1
  notes: 'Theme 81: SVOCの文型でO が不定詞句やthat節の場合、

    形式上の目的語itをOの位置に置き、真の目的語をCの後ろに回す。

    find / think / make などがこの構文でよく用いられる（特にfindが頻出）。


    基本パターン:

    find it ... to do「～するのは…だとわかる」（⇨ 問297）

    think it ... to do「～することは…と思う」

    make it ... to do「～することを…にする」

    ＊make it possible for A to do「Aが～することを可能にする」


    慣用表現:

    make it a rule to do「いつも～することにしている」

    ＊硬い表現。日常的には always/usually + 動詞。

    ＝ be in the habit of doing / have the habit of doing

    take it for granted that節「～を当然のことと思う」

    ＊take A for granted「Aを当然のことと思う」の形もあり。

    ＊take A for B「AをBだと思う/間違える」（⇨ 問1035）

    see (to it) that節「～するように取り計らう/気をつける」（= make sure that節 ⇨ 問1118）

    ＊口語では to it を省略することが多い。

    ＊see to ～「～を取り計らう/～の世話をする」

    '
- id: shs-012
  name: that/thoseの用法
  category: 品詞・構文
  priority: P1
  notes: 'Theme 82: 前に出た名詞の繰り返しを避ける that / those。


    that = the + 単数名詞 の代用。通例、後ろに修飾語句を伴う。

    that of ～ の形になることが多い。

    ＊it も the + 単数名詞 の代用になるが、it は常に単独で用いる。

    例: The climate of Sapporo vs. that of Tokyo


    those = the + 複数名詞 の代用。

    those of ～ の形が多いが、そうでない場合もある。


    those =「人々」（= (the) people）の意味を表すことがある:

    those present「出席者」（= those who were present）

    〈発展〉those concerned [involved]「関係者/当事者」

    '
- id: shs-013
  name: one/onesの用法
  category: 品詞・構文
  priority: P1
  notes: 'Theme 83: one / ones の用法。


    (1) one = a + 単数名詞（不特定のものを指す）

    ＊it = the [所有格] + 名詞（前出の名詞そのもの）

    例: I forgot a book → I must buy one.（不特定の別の本）

    cf. I''ve lost my book → where is it?（その本そのもの）


    (2) 修飾語がつく場合:

    a [the] + 形容詞 + one（単数）

    (the) + 形容詞 + ones（複数）

    ＊ones は必ず修飾語つきで用いる。

    the one(s) + 関係代名詞節（限定されると定冠詞がつく）

    ＊the one = that, the ones = those のほうが口語的。


    (3) one が使えない場合:

    wine / rice などの不可算名詞の代用にはならない。

    → 前に出た不可算名詞をくり返すか省略する。

    例: white wine vs. red（wine省略）


    PU!62: one と it の使い分け:

    one = a + 名詞 → 同種類だが不特定のものを指す

    it = the [所有格] + 名詞 → 前出の名詞そのものを指す

    it には修飾語がつかないが、one には修飾語をつけることが可能。

    '
- id: shs-014
  name: another/other/othersの用法
  category: 品詞・構文
  priority: P1
  notes: 'Theme 84: another / other / others の用法。


    another（= an + other）:

    「もう1つ[1人](の) / 別の(1つ[1人])」

    ＊other は単独では用いない。

    another + 数詞 [few] + 複数名詞「さらに数日/もう数日」

    ＊数詞+複数名詞を1まとまりとみなす。単数・複数両扱い。


    相関的用法（2つの場合）:

    one ～ the other ...「1つは～、残りの1つは…」

    ＊残りの1つは特定なので the がつく。


    相関的用法（3つ以上の場合）:

    some ～ others ...「～のものもあれば…のものもある」

    some ～ some ... の形もある（⇨ 問314）。

    単数: one ～ another ...「1つは～、また別の1つは…」

    the others「(3つ以上から一部を取った)残り全部」


    その他の重要表現:

    A is one thing, (and [but]) B (is) another「AとBは別物だ」

    each other「お互い」（= one another）

    ＊代名詞であり、他動詞や前置詞の目的語になる（副詞句ではない）。

    one after another「次々に」（3つ以上のものが1つまた1つと）


    PU!63: 相関的に用いる不定代名詞の基本パターン

    [図表: 2者のone/the otherと3者以上のone/another/some/the othersの対比表]

    '
- id: shs-015
  name: both/either/neither/noneの用法
  category: 品詞・構文
  priority: P1
  notes: 'Theme 85: both / either / neither / none の用法。


    both「(2つ[2人]の)両方(の)」:

    代名詞の所有格/the/these の前に置く。

    both his parents = both of his parents

    ＊複数扱い。


    either「(2つ[2人]の)どちらか一方(の)/どちら(の～)も」:

    単数扱い。Either of us has to ...

    形容詞用法: Either day is all right.（= Both days / Each day）

    否定文中: don''t ~ either = neither


    neither「(2つ[2人]の)どちら(の…)も～ない」:

    単数扱い。2者について用いる。


    none「(3つ[3人]以上)どれ[誰]も～ない」:

    none of A の形が多い。Aの名詞には the/this/his 等の限定語が必要。

    A に複数(代)名詞 → ふつう複数扱い。不可算名詞 → 単数扱い。

    ＊neither は2者、none は3者以上。


    PU!64: both/either/neither/none/each/every の使い分け表

    [図表: 2者と3者以上での両方/それぞれ/どちらか/否定の対比表]

    ＊each は3つ以上でも使う。

    ＊every は形容詞用法のみ、none は代名詞用法のみ、他は両用法あり。

    '
- id: shs-016
  name: each/everyの用法
  category: 品詞・構文
  priority: P1
  notes: 'Theme 86: each / every の用法。


    each「(個別的に)それぞれ(の)/めいめい(の)」:

    代名詞・形容詞の両用法あり。

    each of A の形で単数扱い。

    ＊each は2つ以上で使える（3つ以上でも使う）。


    every「どの～もみな」:

    形容詞用法のみ（every of ... は不可）。

    every + 単数名詞（原則）。

    every + 基数 + 複数名詞「～ごとに」

    = every + 序数 + 単数名詞

    例: every three years = every third year「3年ごとに」

    every other + 単数名詞「1つおきの～」

    = every second + 単数名詞 = every two + 複数名詞

    例: every other day = every second day = every two days


    参照: PU!64の使い分け表（⇨ shs-015 notes）

    '
- id: shs-017
  name: some/anyの用法
  category: 品詞・構文
  priority: P1
  notes: 'Theme 87: some / any の用法。


    基本:

    some / any は可算名詞にも不可算名詞にも用いられる。

    「いくつか(の)/いくらか(の)」のばく然とした数量を表す。

    代名詞と形容詞の用法がある。


    原則: some は肯定文、any は疑問文・否定文・条件文。

    ＊ただし例外あり:


    疑問文中の some:

    肯定の答えを予期するとき。依頼・勧めの場合に用いる。

    例: Will you lend me some money?


    some + 単数可算名詞「ある～」:

    some day「(将来の)いつか/ある日」

    ＊cf. the other day「先日」


    肯定文中の any:

    代名詞: any of A「Aの中のどれでも」

    形容詞: any + 単数名詞「どんな～でも」

    例: Any pencil will do.（どんな鉛筆でもいい）

    '
- id: shs-018
  name: something/nothingを用いた慣用表現
  category: 品詞・構文
  priority: P1
  notes: 'Theme 88: something / nothing を用いた慣用表現。


    have nothing to do with ～「～と何の関係もない」

    ＊have の次に nothing/something/much[a lot]/little を入れて関係の程度を表す。

    入試では have nothing to do with の出題が多い。


    nothing but ～「～だけ/～にすぎない」（= only）（← ～以外は何もない）

    ＊but は「～以外は/～を除いて」の前置詞（⇨ 問718）。

    for nothing「無料で/ただで」（= free / free of charge）（⇨ 問1202）


    do nothing but do「～ばかりする」（← ～以外何もしない）

    ＊but の後ろに原形不定詞が来る点に注意。


    Something is wrong [the matter] with ～

    「～はどこか故障している/具合が悪い」

    ＝ There is something wrong [the matter] with ～

    ＝ out of order「故障して」（⇨ 問1214）


    There is something + 形容詞 + about ～

    「～にはどこか…なところがある」

    '
- id: shs-019
  name: 再帰代名詞の用法と慣用表現
  category: 品詞・構文
  priority: P1
  notes: 'Theme 89+90: 再帰代名詞の用法と慣用表現。


    Theme 89: 再帰代名詞 = 人称代名詞の所有格/目的格 + -self/-selves。

    (1) 再帰用法: 動詞や前置詞の目的語（主語＝目的語のとき）

    例: He cut himself with a knife.

    (2) 強調用法: 主語・目的語・補語の直後に置き、意味を強める。

    例: I myself said so. = I said so myself.《口語的》

    ＊主語強調は文末に置くことも多い。


    動詞の目的語: introduce oneself「自己紹介する」

    補語の強調: 抽象名詞 + itself = very + 形容詞

    例: kindness itself = very kind / generosity itself = very generous


    Theme 90: 再帰代名詞を用いた慣用表現:

    help oneself to ～「～を自由に取って食べる[飲む]」

    enjoy oneself「楽しく時を過ごす」（= have a good time）

    make oneself at home「くつろぐ」（= feel at home [at ease] ⇨ 問1231）

    by oneself「ひとりで」（= alone）/ 独力で / [by itself] ひとりでに

    for oneself「独力で」（自分のために自ら）

    beside oneself「(喜び・怒りなどで)我を忘れて/夢中になって」

    in oneself「それ自体では/元来」＊通例 in itself / in themselves


    PU!65: その他の前置詞+oneself:

    to oneself「自分だけに/自分専用に/心中ひそかに」

    例: I want a room to myself. / Keep the secret to yourself.

    between ourselves「ここだけの話だが」（= between you and me）

    in spite of oneself「思わず/我知らず」

    '
