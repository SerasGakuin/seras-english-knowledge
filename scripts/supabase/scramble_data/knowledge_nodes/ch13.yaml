check_points:
  # shs-027: 等位接続詞の基本と命令文+and/or
  - node_id: "shs-027"
    seq: 1
    question: "等位接続詞soとforの違いは何ですか？"
    answer: "soは結果「それで/だから」を表し文頭でも使えるが、forは直前に述べたことの理由を追加的に述べる「というのは〜だから」で文頭では使えない"
  - node_id: "shs-027"
    seq: 2
    question: "「命令文+and」「命令文+or」はそれぞれどのような条件文に書き換えられますか？"
    answer: "「命令文+and」= If you do X, ...（肯定条件）、「命令文+or」= If you don't do X, ... / Unless you do X, ...（否定条件）"
  - node_id: "shs-027"
    seq: 3
    question: "命令文+orのorの代わりに使える語は何ですか？"
    answer: "otherwise（副詞）。例: Leave at once, otherwise you'll be late."
  # shs-028: 等位接続詞を用いた相関的表現
  - node_id: "shs-028"
    seq: 1
    question: "both A and Bが主語の時、動詞は単数・複数のどちらに一致しますか？"
    answer: "複数扱い。例: Both you and I are suspected."
  - node_id: "shs-028"
    seq: 2
    question: "either A or B / neither A nor B / not only A but also Bが主語の時、動詞はA・Bのどちらに一致しますか？"
    answer: "いずれもBに一致する（動詞に近いほう、または意味の重点があるほう）。ただしA as well as Bの場合はAに一致する"
  - node_id: "shs-028"
    seq: 3
    question: "not only A but also Bのonly/alsoを他の語で置き換えるとどうなりますか？"
    answer: "onlyの代わりにmerely / simply / just、alsoの代わりにas wellを用いることがある。例: not merely A but also B / not only A but B as well"
  # shs-029: 名詞節を導くthatとwhether/if
  - node_id: "shs-029"
    seq: 1
    question: "that節は原則として前置詞の目的語になれませんが、例外は何ですか？"
    answer: "in that 〜「〜という点で/〜だから」と except that 〜「〜ということを除いて」の2つ"
  - node_id: "shs-029"
    seq: 2
    question: "whether節が使えてif節が使えない位置はどこですか？"
    answer: "文頭の主語、前置詞の目的語、補語、同格の4つ。if節は動詞の目的語と形式主語構文での真主語でのみ使える"
  - node_id: "shs-029"
    seq: 3
    question: "the fact that節のthatはどのような用法ですか？"
    answer: "同格の名詞節を導くthat。直前の名詞（fact）の具体的内容を説明する。「〜という事実」"
  # shs-030: 接続詞asとwhileの用法
  - node_id: "shs-030"
    seq: 1
    question: "接続詞asの「比例」の用法はどのような構文で使われますか？"
    answer: "grow [become / get]+比較級の構文と一緒に用いることが多い。例: We grow wiser as we grow older."
  - node_id: "shs-030"
    seq: 2
    question: "「様態」のasと同じ意味で口語で使われる表現は何ですか？"
    answer: "the way。例: Life doesn't always go the way you want it to."
  - node_id: "shs-030"
    seq: 3
    question: "whileの「対比」の用法と「譲歩」の用法はどう区別しますか？"
    answer: "「対比」は2つの事柄の違いを述べる(= whereas)。「譲歩」はalthough/thoughと同義で、while節は通常主節の前に置かれる"
  # shs-031: 時を表す接続詞と重要表現
  - node_id: "shs-031"
    seq: 1
    question: "until [till]とby the timeの違いは何ですか？"
    answer: "untilは「〜するまで（ずっと）」で動作・状態の継続期間を表す。by the timeは「〜するまでには」で完了の期限を表す"
  - node_id: "shs-031"
    seq: 2
    question: "「彼が亡くなってから3年になる」を4通りで表現してください"
    answer: "① It is three years since he died. ② Three years have passed since he died. ③ He died three years ago. ④ He has been dead for three years."
  - node_id: "shs-031"
    seq: 3
    question: "It is not until 〜 that ... の倒置形はどのような語順ですか？"
    answer: "Not until 〜 + 倒置（did S V）... 例: Not until my father came home did he notice he had left his laptop behind."
  - node_id: "shs-031"
    seq: 4
    question: "no sooner 〜 than ... の倒置形はどのような語順ですか？"
    answer: "No sooner had S done 〜 than S did ... 例: No sooner had I arrived at the station than the train left. ＊比較構文なのでwhenではなくthanを用いる"
  - node_id: "shs-031"
    seq: 5
    question: "「〜するとすぐに」を表す接続詞的表現を4つ以上挙げてください"
    answer: "as soon as / the moment / the minute / the instant / directly / immediately / instantly / hardly〜when / scarcely〜when / no sooner〜than"
  # shs-032: 理由を表す接続詞
  - node_id: "shs-032"
    seq: 1
    question: "because/since/forの使い分けのポイントは何ですか？"
    answer: "becauseは直接的・新しい理由、sinceは聞き手も知っている既知の理由「〜なので」、forは追加的な理由説明「というのは〜だから」で文頭では使えない"
  - node_id: "shs-032"
    seq: 2
    question: "not...because 〜のnotの否定範囲はどこまでですか？"
    answer: "because以下全体を否定する。「〜だからといって…ではない」。just/simply/merelyと共に用いることが多い"
  - node_id: "shs-032"
    seq: 3
    question: "now (that) はどのような意味を表しますか？"
    answer: "「（今や）〜なので/〜である以上」で、時と理由の両方のニュアンスを持つ。口語ではthatはしばしば省略"
  # shs-033: 譲歩を表す接続詞
  - node_id: "shs-033"
    seq: 1
    question: "even ifとeven thoughの違いは何ですか？"
    answer: "even ifは仮定的な事柄「たとえ〜でも」、even thoughは事実「〜ではあるが」。例: Even if it rains（仮定） / Even though it was raining（事実）"
  - node_id: "shs-033"
    seq: 2
    question: "形容詞+as+S+Vの構文で名詞が文頭に来る場合のルールは？"
    answer: "無冠詞になる。例: child as he is「彼は子どもながらも」（× a child as he is）。ただし現代英語ではまれ"
  - node_id: "shs-033"
    seq: 3
    question: "形容詞+as+S+Vの構文は「譲歩」以外にどのような意味を表しますか？"
    answer: "文脈によっては「理由」を表す。例: Rich as she is, she can afford to travel around the world.「お金持ちなので世界中を旅行する余裕がある」"
  # shs-034: 条件を表す接続詞
  - node_id: "shs-034"
    seq: 1
    question: "unlessとif...notは完全に同じですか？"
    answer: "同じではない。unlessの方が使用範囲が狭い。感情表現（be surprised if...not等）ではunlessは使えない。また意味の違いが生じる場合もある（unlessは「〜な場合は別として」の除外の意味）"
  - node_id: "shs-034"
    seq: 2
    question: "ifの代用語を4つ以上挙げてください"
    answer: "unless / provided [providing] (that) / suppose [supposing] (that) / as [so] long as / on condition (that)"
  - node_id: "shs-034"
    seq: 3
    question: "ifの代用語のうち仮定法の文で使えるのはどれですか？"
    answer: "suppose [supposing] (that) のみ"
  # shs-035: 目的・程度・結果を表す接続詞
  - node_id: "shs-035"
    seq: 1
    question: "「目的」を表すso thatとin order thatの違いは何ですか？"
    answer: "so thatは口語調でthat省略可。in order thatは硬い表現でthat省略不可"
  - node_id: "shs-035"
    seq: 2
    question: "for fear (that)とlestの節内ではどのような動詞の形を使いますか？"
    answer: "for fear (that) S should [may / might / will / would] do。lest S (should)+原形（×lest he fails）。lestは文語調"
  - node_id: "shs-035"
    seq: 3
    question: "so kind a boyとsuch a kind boyの語順の違いは何ですか？"
    answer: "soは「so+形容詞+a [an]+名詞」、suchは「such+a [an]+形容詞+名詞」。意味は同じ"
  - node_id: "shs-035"
    seq: 4
    question: "in caseの2つの意味は何ですか？"
    answer: "① 「〜するといけないから/〜の場合に備えて」② 「もし[万一]〜ならば」(= if)"
  # shs-036: as [so] long asとas [so] far as
  - node_id: "shs-036"
    seq: 1
    question: "as [so] long asの2つの意味は何ですか？"
    answer: "① 「〜する限りは/〜する間は」(= while) — 時間の制限。② 「〜しさえすれば/〜ならば」(= only if) — 条件"
  - node_id: "shs-036"
    seq: 2
    question: "as [so] far asで頻出の表現を3つ挙げてください"
    answer: "① as far as I know「私の知る限りでは」② as far as A is concerned「Aに関する限りでは」③ as far as the eye can see「見渡す限り」"
  - node_id: "shs-036"
    seq: 3
    question: "as long asとas far asの根本的な違いは何ですか？"
    answer: "as long asは時間の制限または条件を表す。as far asは範囲の制限を表す"

