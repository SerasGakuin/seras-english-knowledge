knowledge_nodes:
  - id: "shs-027"
    name: "等位接続詞の基本と命令文+and/or"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 102+103: 等位接続詞の基本用法と命令文+and/orの構文。

      等位接続詞は文法上対等の働きをする語と語、句と句、節と節を結びつける。
      and / but / or 以外に so「それで/だから」/ for「というのは〜だから」/ nor「また〜ない」がある。

      and/but/orが何と何を結んでいるかを見抜くことが英文構造を正しく理解する上で大切。
      3つ以上のものを結ぶ場合は最後の語句の前にandを置く。

      so は本来副詞だが、接続詞として前の文の結果を表す用法がある。
      ...(,) so (that) 〜「それで〜/だから〜」

      命令文+and/or:
      命令文+and「〜しなさい、そうすれば…」= If you do X, ...
      命令文+or「〜しなさい、さもないと…」= If you don't do X, ...
      orの代わりにotherwiseを用いることもある。
      命令文の代わりにYou must / have to / should / had betterなどを用いることも多い。
      名詞句+and/orの変形バージョンもある（例: A little more effort, and ...）。

  - id: "shs-028"
    name: "等位接続詞を用いた相関的表現"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 104: 等位接続詞を用いた相関的表現と動詞の一致。

      PU!75: 動詞をA, Bどちらに一致させるか？
      [図表: 相関的表現と動詞の一致ルール]
      both A and B「AもBも」→ 複数扱い
      either A or B「AかBかどちらか」→ Bに一致（動詞に近いほう）
      neither A nor B「AもBも〜ない」→ Bに一致（= not either A or B）
      not A but B「Aではなく B」→ Bに一致（意味の重点がBに）
      not only A but (also) B「Aだけでなく Bもまた」→ Bに一致
      ＊A as well as B「Bだけでなく Aも」→ Aに一致（= not only B but also Aだが動詞一致は異なる）（→ 194）

      not only A but also Bの変形:
      onlyの代わりにmerely / simply / justを用いることもある。
      alsoの代わりにas wellを用いることもある。

      not because A but because B「Aだからではなく Bだから」
      = not A but Bにbecauseが結びついた構文。

  - id: "shs-029"
    name: "名詞節を導くthatとwhether/if"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 105+106: 名詞節を導くthatとwhether/ifの用法と使い分け。

      thatは名詞節を導いて「〜ということ」を表す。
      (1) 主語: That there was a problem ... is self-evident.
      (2) 目的語: 動詞の目的語としてのthat節（省略可）
      (3) 補語: The trouble is that 〜「困ったことに〜」（主語を副詞的に訳す）
      (4) 同格: the fact that 〜「〜という事実」— 直前の名詞の内容を説明

      例外的にthat節が前置詞の目的語になる場合:
      in that 〜「〜という点で/〜だから」(= because)
      except that 〜「〜ということを除いて」

      PU!76: 名詞節を導くwhetherとifの用法比較
      [図表: whether/ifが使える位置の対照表]
      whether節: 主語○ / 形式主語の真主語○ / 動詞の目的語○ / 前置詞の目的語○ / 補語○ / 同格○
      if節:       主語× / 形式主語の真主語○ / 動詞の目的語○ / 前置詞の目的語× / 補語× / 同格×
      ＊if節は動詞の目的語と形式主語での真主語としてしか使えない。
      ＊口語ではwhetherよりifが好まれる。
      ＊or notは省略可。ifを使うときはor notをつけないことが多い。

  - id: "shs-030"
    name: "接続詞asとwhileの用法"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 107+108: 接続詞asの多義性とwhileの用法。

      PU!77: 接続詞asの用法（6つ）
      (1) 時・同時状況「〜する時（に）/〜と同時に」＊whenより同時性が強い
      (2) 比例「〜するにつれて」＊通例、比較級と一緒に用いる
      (3) 原因・理由「〜なので」＊この意味ではbecause/sinceを多く用いる
      (4) 譲歩「〜だけれど」＊形容詞[副詞/名詞]+as S+Vの形（→ Theme 113）
      (5) 様態「（〜する）ように/〜の通りに」
      (6) 直前の名詞を限定「（〜する）ような/（〜した）時の」

      慣用表現:
      as it is「そのまま（に）/あるがまま（に）」
      leave 〜 as it is「〜をそのままにしておく」
      ＊itは指すものに応じて他の人称代名詞にもなる: as they are等。
      口語ではthe wayがasと同じように用いられる: the way you want it to

      whileの用法（3つ）:
      (1) 時「〜する間/〜している間」
          while節内では動作動詞の進行形か状態動詞を使うことが多い。
          duringは前置詞（後ろに名詞）、whileは接続詞（後ろにS+V）。
      (2) 対比「〜なのに対して/〜である一方」(= whereas)
          some 〜 others ...の表現と共に用いることも多い。
      (3) 譲歩「〜だけれども/〜なのに」(= although/though)
          この場合while節は主節の前に置かれるのが一般的。

  - id: "shs-031"
    name: "時を表す接続詞と重要表現"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 109+110+111: 時を表す接続詞の基本用法、重要表現、「〜するとすぐに」の表現。

      基本の時の接続詞:
      before 〜「〜する前に/〜しないうちに」
      ＊否定的に訳すほうが自然な場合がある。
      〈重要〉before節は時の副詞節→未来のことでも現在形（→ Theme 7）。

      since 〜「〜して以来」— 過去の始点を表す。
      主節は現在完了形、since節には過去形を用いる。

      until [till] 〜「〜するまで（ずっと）」— 動作・状態の継続期間。
      ＊untilとtillは基本的に違いなし。
      発展: ..., until [till] 〜「…して、ついに〜」（前から訳す）。

      by the time 〜「〜するまでには」— 完了の期限。
      〈比較〉by the time（完了の期限）≠ until（継続期間）。

      each [every] time 〜「〜するたびに/〜する時はいつも」(= whenever)
      once 〜「いったん[ひとたび]〜すると」— 時＋条件。

      PU!78: timeを用いた接続詞表現
      by the time / each [every] time / (the) next time / the first time / the last time

      PU!79: 「〜するたびに」の表現
      Each [Every] time〜 / Whenever〜 / When〜always / never〜without doing

      「Sが〜してから…になる」の書き換え（PU!80）:
      ① It is [has been]+時間+since+S+過去形
      ② 時間+have [has] passed since+S+過去形
      ③ S+過去形...+時間+ago
      ④ S have [has] been+形容詞+for+時間
      ＊die(動作動詞)→be dead(状態) の書き換えに注意。

      It will not [won't] be long before 〜「まもなく〜するだろう」
      発展: It is+時間+before 〜「〜するまでに…がかかる」

      It is not until [till] 〜 that ...「〜して初めて…する」
      = not...until [till] 〜のnotとuntil節をIt isとthatの間に入れて強調。
      倒置形: Not until 〜 did S V ...
      参照: get rid of 〜「厄介なものを取り除く」(= remove)（→ 1112）

      「〜するとすぐに」の表現（PU!81）:
      as soon as 〜 — 最もよく使う表現。
      the moment 〜 (= at the moment when) — the instant / the minuteも同様。
      directly 〜《英》— immediately / instantlyも同様。副詞だが接続詞として使う。
      hardly [scarcely] 〜 when [before] ...「〜するとすぐに…」
      ＊「〜」は過去完了形、「...」は過去形。倒置形が入試で重要。
      no sooner 〜 than ...「〜するとすぐに…」
      ＊比較構文なのでwhenではなくthanを用いる点に注意。倒置形が超頻出。
      参照: see A do「Aが〜するのを見る」（→ 554）、代不定詞（→ 100）

  - id: "shs-032"
    name: "理由を表す接続詞"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 112: 理由を表す接続詞の使い分け。

      because 〜: 直接的な理由。
      not...because 〜「〜だからといって…ではない」
      ＊notはbecause以下全体を否定する。ふつうbecauseの前にコンマは置かれない。
      ＊not...simply [merely / just] because 〜「（単に）〜というだけで…ではない」の形が多い。

      since 〜「〜なので/〜である以上」: 聞き手も知っている理由。

      for 〜「というのは〜だから」: 直前に述べたことの理由を追加的に述べる。
      ＊文頭では使えない。

      now (that) 〜「（今や）〜なので/〜である以上」: 時＋理由。
      ＊口語ではthatはしばしば省略される。

  - id: "shs-033"
    name: "譲歩を表す接続詞"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 113: 譲歩を表す接続詞の用法と使い分け。

      although 〜「〜だけれども」(= though 〜)

      even if 〜「たとえ〜でも」— 仮定＋譲歩。
      ＊ifだけでeven ifの意味を表すことがある。

      PU!82: even ifとeven thoughの使い分け
      even if「たとえ〜でも」— 後ろに仮定的な事柄が来ることが多い。
      even though「〜ではあるが」— 後ろに事実が来ることが多い。

      形容詞[副詞/名詞]+as+S+V「Sは〜だけれども」
      = Though S+V+形容詞 の書き換え。
      ＊文頭に名詞が来る場合は無冠詞: child as he is「彼は子どもながらも」
      〈発展〉文脈によっては「理由」を表す場合もある:
      Rich as she is, she can afford to ...「お金持ちなので〜」

      whether 〜 or ...「〜であろうと…であろうと」
      whether 〜 or not「〜であろうとなかろうと」
      ＊名詞節のwhetherについてはTheme 106を参照。

  - id: "shs-034"
    name: "条件を表す接続詞"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 114: 条件を表す接続詞とifの代用語。

      unless 〜「〜でない限り(= except that)/もし〜でなければ(= if...not)」
      ＊否定の条件を表し、節内で仮定法は用いない。

      PU!83: unlessとif...notの違い
      unlessはif...notより使用範囲が狭い。
      感情表現（be surprised if...not等）ではunlessは使えない。
      意味の違いが生じる場合もある:
      if he doesn't come「彼が来なければ（私は出る）」
      unless he comes「彼が来るなら（私は出ない）」— 除外の意味

      PU!84: ifの代用語
      unless 〜「〜でない限り/もし〜でなければ」
      provided [providing] (that) 〜「もし〜ならば/〜という条件で」
      suppose [supposing] (that) 〜「もし〜ならば」
      as [so] long as 〜「〜しさえすれば/〜ならば」（→ Theme 117）
      on condition (that) 〜「〜という条件で/〜ならば」
      ＊仮定法の文で使えるのはsuppose [supposing] (that)のみ。
      参照: in advance「前もって/あらかじめ」（→ 1210）

  - id: "shs-035"
    name: "目的・程度・結果を表す接続詞"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 115+116: 目的を表す接続詞と程度・結果を表す接続詞。

      「目的」の接続詞:
      so that S can [will / may] do 〜「〜するために」
      ＊can/willは口語調、mayは改まった表現。口語ではthat省略可。
      in order that S can [will / may] do 〜 — 同じ意味だが硬い表現。thatは省略しない。

      for fear (that) S should [may / might] do 〜「〜しないように」
      ＊日常的にはso that S can't/won't doを用いる。
      〈発展〉同意表現: lest S (should)+原形 — 文語調だが入試には出る。

      in case S (should) do 〜「〜するといけないから/〜の場合に備えて」
      〈発展〉「もし[万一]〜ならば」(= if)の意味もある。

      「程度・結果」の接続詞:
      so...(that) 〜「とても…なので〜/〜するほど…」
      ＊soは程度・強意の副詞で、後ろに形容詞・副詞を伴う。口語ではthat省略可。
      ＊否定表現: not so...that 〜「〜するほど…（でない）」— 後ろから前に訳す。
      ＊名詞を伴う場合: so+形容詞+a [an]+名詞（→ PU!85）

      such...(that) 〜「とても…なので〜/〜するほど…」
      ＊suchの後ろにa [an]+形容詞+名詞の形が来る。

      PU!85: so...thatとsuch...thatの使い分け
      so+形容詞[副詞]+that / so+形容詞+a [an]+名詞+that
      such+a [an](+形容詞)+名詞+that

      S is such that 〜「Sはたいへんなものなので〜」
      ＊suchが名詞を伴わず、such = so greatと解釈。
      倒置形: Such [So great] is+S+that 〜
      参照: cannot help doing「〜せずにはいられない」（→ 74）

  - id: "shs-036"
    name: "as [so] long asとas [so] far as"
    category: "品詞・構文"
    priority: "P1"
    notes: |
      Theme 117: as [so] long asとas [so] far asの使い分け。

      ともに「〜する限り」と訳されることが多いが、意味・用法は異なる。

      as [so] long as:
      (1) 時間の制限「〜する限りは/〜する間は」(= while)
      (2) 条件「〜しさえすれば/〜ならば」(= only if)
      ＊条件の意味は時間の制限から派生:
      「ルールを守る間は→守りさえすれば」のように理解する。

      as [so] far as:
      範囲の制限「〜する限りでは/〜の範囲内では」

      PU!86: as [so] far asは3つの表現で覚える
      (1) as [so] far as I know「私の知る限りでは」
      (2) as [so] far as A is concerned「Aに関する限りでは」(= as far as A go)
      (3) as [so] far as the eye can see「見渡す限り/目の届く限り」

