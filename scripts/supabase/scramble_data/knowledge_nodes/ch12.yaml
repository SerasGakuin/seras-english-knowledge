check_points:
- node_id: shs-020
  seq: 1
  question: 先行詞が「人以外」で所有格の関係代名詞はどう表すか？
  answer: whose または the + 名詞 + of which の2パターン。whose tuition is high / the tuition of which is high。
- node_id: shs-020
  seq: 2
  question: 目的格関係代名詞はどんな時に省略できるか？
  answer: 関係詞節の中で目的語の働きをしている場合に省略可能。ただし前置詞＋関係代名詞の形では省略不可。
- node_id: shs-020
  seq: 3
  question: The man who I thought was ... のwhoは何格か？ なぜか？
  answer: 主格。whoはI thoughtの目的語ではなく、wasの主語。I thought が割り込んでいる形。
- node_id: shs-021
  seq: 1
  question: This is the office in that he works. は正しいか？
  answer: 不可。thatの前に前置詞は置けない。in which か that ... in の形にする。
- node_id: shs-021
  seq: 2
  question: 前置詞＋関係代名詞の形で関係代名詞を省略できるか？
  answer: 不可。in whichのwhichは省略できない。前置詞を後置して文末に置けば省略可能（the office (　) he works in）。
- node_id: shs-021
  seq: 3
  question: tools with which to fix の構造は？
  answer: 前置詞＋which＋to不定詞の形。直前の名詞toolsを修飾する。= tools to fix ... with。
- node_id: shs-022
  seq: 1
  question: whatとthatの使い分け方は？
  answer: 後ろに主語・目的語が欠けた不完全な文 → what。後ろに完全な文 → that。
- node_id: shs-022
  seq: 2
  question: what S is / what S used to be の意味は？
  answer: what S is =「現在のS」/ what S used to be [was] =「昔のS」。what S is には「Sの人柄」の意味もある。
- node_id: shs-022
  seq: 3
  question: what is called の意味は？ 類似表現は？
  answer: 「いわゆる」(= what we [you/they] call)。so-called も「いわゆる」だが、不信・軽蔑の意を含むことがある。
- node_id: shs-022
  seq: 4
  question: what little money I have の意味は？ 書き換えは？
  answer: 「わずかだが持っているすべてのお金」。= all the little money that I have。関係形容詞としてのwhat。
- node_id: shs-023
  seq: 1
  question: whereとwhichの使い分けの基準は？
  answer: 後ろが完全な文（副詞の働き）→ where。後ろが不完全な文（目的語が欠ける等、代名詞の働き）→ which。
- node_id: shs-023
  seq: 2
  question: the way how は正しいか？
  answer: 不可。howは常に先行詞なしで用いる。This is how ... = This is the way (in which / that) ...。
- node_id: shs-023
  seq: 3
  question: That's why 節と That's because 節の違いは？
  answer: That's why 節 = 「そういうわけで～（結果）」。That's because 節 = 「それは～だからだ（理由）」。理由→why→結果、結果→because→理由。
- node_id: shs-024
  seq: 1
  question: 非制限用法で使えない関係詞は？
  answer: that / why / how。非制限用法は who/whom/which/whose と where/when のみ。
- node_id: shs-024
  seq: 2
  question: 前の節全体を先行詞とする which の例は？ itで代用できるか？
  answer: '..., which was good news = ..., and that [it] was good news。接続詞なしでitは文をつなげないので it 単独は不可。'
- node_id: shs-024
  seq: 3
  question: '..., all of whom ～ の構造は？'
  answer: A of whom/which がセットで関係詞節の先頭に置かれた非制限用法。= ..., and all of them ～。
- node_id: shs-024
  seq: 4
  question: 非制限用法の関係詞はどう訳すのが原則か？
  answer: '「接続詞＋代名詞[副詞]」に置き換え、前から後ろへ順に訳す。例: , who = because he / , when = and then / , where = and there。'
- node_id: shs-025
  seq: 1
  question: such ... as ～ と the same ... as ～ のasの品詞は？
  answer: 関係代名詞。such/the same と相関的に用い、先行詞を修飾する形容詞節を導く。
- node_id: shs-025
  seq: 2
  question: as is often the case の as の位置は？ whichとの違いは？
  answer: as節は主節の前後・挿入いずれも可能。which節は必ず主節の後に置かれる。
- node_id: shs-025
  seq: 3
  question: There is no one but has weaknesses. の意味は？
  answer: 「欠点のない人はいない」。but = that ... not（否定の関係代名詞）。二重否定で肯定の意味。《文語》
- node_id: shs-025
  seq: 4
  question: more medicine than is necessary の than の品詞は？
  answer: 関係代名詞。先行詞が比較級の形容詞を伴う場合に用いられる。than は主語の働きをしている。
- node_id: shs-026
  seq: 1
  question: whoever/whatever が名詞節を導く場合と副詞節を導く場合の見分け方は？
  answer: 名詞節 = any ～ で書き換え可能（文中で主語・目的語等）。副詞節（譲歩）= no matter ～ で書き換え可能。
- node_id: shs-026
  seq: 2
  question: however fast I walked は正しい語順か？ However I walked fast はどうか？
  answer: however fast I walked が正しい。however は「however + 形容詞[副詞] + SV」の語順。However I walked fast は誤り。
- node_id: shs-026
  seq: 3
  question: no matter ～ で書き換えられるのはどんな場合か？
  answer: 「譲歩」の副詞節を導く場合のみ。名詞節（「～する人は誰でも」等）の場合は不可。
