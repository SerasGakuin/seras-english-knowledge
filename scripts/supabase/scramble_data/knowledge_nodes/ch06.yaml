knowledge_nodes:
- id: sjd-011
  name: 分詞の限定用法・叙述用法・There be構文
  category: 準動詞
  priority: P1
  notes: "Theme 37+38+39 統合。\n限定用法（名詞修飾）:\n  - 分詞が単独 → 名詞の前に置く（前置修飾）\n  - 分詞が目的語や副詞句を伴う → 名詞の後ろに置く（後置修飾）\n  - 修飾される名詞と分詞の間に「主語と述語の関係」がある\n  - 能動関係 → 現在分詞(doing): an exciting game\n  - 受動関係 → 過去分詞(done):\
    \ excited fans\n叙述用法（主格補語）:\n  - SVC(分詞)の形で主語を説明\n  - SVC(分詞)をとる代表的動詞: sit / stand / lie / come / go / remain / look\n  - lie → lying に注意(⇨481)\nThere be + S + doing/done:\n  - 通例、直前のSにかかる形容詞用法ではない（著者の指摘）\n\
    \  - SとVの関係: 「Sが〜している/されている」と訳す\n  - 能動: There were people waiting... = People were waiting...\n  - 受動: enough food left = enough food is left\n参照: bring up「〜を育てる」(= raise / rear)(⇨900)\n"
- id: sjd-012
  name: 分詞構文の基本用法・完了形・否定形・受動態
  category: 準動詞
  priority: P1
  notes: "Theme 40+41+42 統合。\n分詞構文: 分詞が接続詞と動詞の働きを兼ねて副詞句を作る形。\n形は「句」だが意味上は「副詞節」に相当。接続詞が明示されないので意味の区別がつかない場合も多い。\n分詞構文の主語は原則として文の主語と一致。\nPU!26 分詞構文の5つの意味:\n  ① 理由「…ので」: Feeling tired, she went to bed early.\n\
    \  ② 時「…時に」: Walking down the street, I met an old friend.\n  ③ 付帯状況「…しながら/…して、そして」: She left the house, carrying a big suitcase. — 最頻出\n    (1) 同時状況「〜しながら」 (2) 動作の連続「〜して、そして」\n  ④ 結果「(〜し)…する」: The\
    \ dog chased the cat, knocking over a vase.\n  ⑤ 条件「…するならば」: Walking along this path, you'll reach the lake.\n分詞構文の位置: 文頭・文中・文末いずれも可。\n完了形: having done — 主節の動詞より前の時を表す。\n否定形: not/neverを分詞の直前に置く。\n受動態:\
    \ being done / having been done → being/having beenは省略可 → 過去分詞で始まることが多い。\ncompared with [to] A「Aと比べると」— イディオム化した受動態の分詞構文。\n参照: compare A with [to] B「AをBと比較する」(withの方がよく使われる)\n"
- id: sjd-013
  name: 独立分詞構文
  category: 準動詞
  priority: P2
  notes: "Theme 43 単独。\n分詞の意味上の主語が文の主語と異なる場合、意味上の主語を分詞の前に置く → 独立分詞構文。\n慣用的な独立分詞構文:\n  - weather permitting「天候が許せば/天気が良ければ」= if the weather permits / if it is fine\n  - all things considered「あらゆることを考えてみると」=\
    \ taking all things [everything] into consideration\n    — all things being considered の being が省略された受動態の独立分詞構文\nThere being A = There is A の分詞構文形。\nIt being Sunday — Itは天気・日時を述べる非人称主語で、分詞の意味上の主語。\n"
- id: sjd-014
  name: 慣用的な分詞構文
  category: 準動詞
  priority: P2
  notes: "Theme 44 単独。\n分詞の意味上の主語がwe/you/one等の一般の人々の場合、文の主語と異なっていても慣用上省略される。\nPU!27 慣用的な分詞構文一覧:\n  - frankly [generally / strictly / roughly] speaking「率直に[一般的に/厳密に/おおざっぱに]言うと」(⇨153)\n    = to be frank with\
    \ you (⇨PU!24)\n  - speaking [talking] of ~「〜と言えば」\n  - judging from ~「〜から判断すると」(⇨154) — 前置詞的に働く\n  - considering ~「〜のわりには(= for)/〜を考えると」\n  - given ~「〜を考慮に入れると/〜と仮定すると(= if)」(⇨155) — 前置詞的に働く\n  - seeing\
    \ that ~「〜ということを見れば/〜だから(= since)」\n  - providing [provided] (that) ~「もし〜ならば(= if)」(⇨441)\n参照: manage to do「なんとか〜する」(⇨501)\n"
- id: sjd-015
  name: 付帯状況のwith + A + 分詞
  category: 準動詞
  priority: P1
  notes: "Theme 45 単独。\nwith + A(名詞) + 分詞: 「Aを〜の状態にして/しながら」（付帯状況のwith構文）。\nAと分詞の関係: 能動→現在分詞(doing)、受動→過去分詞(done)。\n入試ではwith + A + 過去分詞(done)の出題が多い。\nPU!28:\n  発展: with句が直前の名詞を修飾する形容詞句になる場合もある。\n    例: I\
    \ saw a sheep with its wool cut short.（私は毛を短く切られた羊を見た）\n  分詞の代わりに以下も使える(⇨Theme 179):\n    - 形容詞: with your mouth full「口に食べ物をほおばって」\n    - 副詞: with her socks on「靴下をはいて/はいたまま」\n    - 場所を示す句: with tears\
    \ in her eyes「目に涙を浮かべて」\n参照: fall asleep「寝入る」(⇨634)\n"
