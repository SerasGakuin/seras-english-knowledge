check_points:
- node_id: sjd-011
  seq: 1
  question: 分詞が単独で名詞を修飾する場合と、目的語や副詞句を伴う場合の位置の違いは？
  answer: 単独→名詞の前に置く（前置修飾）、目的語や副詞句を伴う→名詞の後ろに置く（後置修飾）
- node_id: sjd-011
  seq: 2
  question: 修飾される名詞と分詞の関係が能動/受動の場合、それぞれどちらの分詞を使うか？
  answer: '能動関係→現在分詞(doing)（例: growing costs「増大するコスト」）、受動関係→過去分詞(done)（例: broken chair「壊れた椅子」）'
- node_id: sjd-011
  seq: 3
  question: SVC(分詞)の形をとる代表的な動詞を7つ挙げよ。
  answer: sit, stand, lie, come, go, remain, look
- node_id: sjd-011
  seq: 4
  question: There be + S + doing/doneの構文で、分詞はどのような働きをし、どう訳すか？
  answer: SとVの関係を表し「Sが〜している/されている」と訳す。形容詞用法（〜しているSがある）とは訳さない。
- node_id: sjd-012
  seq: 1
  question: 分詞構文が表す5つの意味は？
  answer: ①理由「…ので」②時「…時に」③付帯状況「…しながら/…して」④結果「(〜し)…する」⑤条件「…するならば」。付帯状況が最も頻出。
- node_id: sjd-012
  seq: 2
  question: 完了形の分詞構文(having done)はどのような場合に使うか？
  answer: '主節の動詞の表す時よりも前のことを表す場合。例: Having lost his money（お金をなくした→支払えなかった）'
- node_id: sjd-012
  seq: 3
  question: 分詞構文の否定形でnot/neverの位置は？
  answer: '分詞の直前に置く。例: Not knowing what to say, I remained silent.'
- node_id: sjd-012
  seq: 4
  question: 受動態の分詞構文の形と、being/having beenの省略について説明せよ。
  answer: 'being done / having been done。分詞構文ではbeing/having beenを省略でき、過去分詞で始まることが多い。例: Seen from a distance = Being seen from a distance'
- node_id: sjd-012
  seq: 5
  question: compared with [to] Aの意味と出自は？
  answer: 「Aと比べると」。受動態の分詞構文(being compared with A)がイディオム化したもの。withの方がよく使われる。
- node_id: sjd-013
  seq: 1
  question: 独立分詞構文とは何か？通常の分詞構文との違いは？
  answer: '分詞の意味上の主語が文の主語と異なる場合の分詞構文。意味上の主語を分詞の前に明示する。例: It being Sunday, ...'
- node_id: sjd-013
  seq: 2
  question: weather permittingの意味と書き換えは？
  answer: 「天候が許せば/天気が良ければ」= if the weather permits / if it is fine
- node_id: sjd-013
  seq: 3
  question: all things consideredの成り立ちは？
  answer: all things being consideredのbeingが省略された受動態の独立分詞構文。「あらゆることを考えてみると」= taking all things into consideration
- node_id: sjd-014
  seq: 1
  question: 慣用的な分詞構文で意味上の主語が省略される条件は？
  answer: 意味上の主語がwe/you/one等の一般の人々の場合、文の主語と異なっていても慣用上省略される。
- node_id: sjd-014
  seq: 2
  question: frankly/generally/strictly/roughly speakingの意味は？
  answer: 率直に/一般的に/厳密に/おおざっぱに言うと
- node_id: sjd-014
  seq: 3
  question: judging from ~ / considering ~ / given ~の意味の違いは？
  answer: judging from「〜から判断すると」、considering「〜のわりには(=for)/〜を考えると」、given「〜を考慮に入れると/〜と仮定すると(=if)」
- node_id: sjd-015
  seq: 1
  question: with + A + 分詞の構文で、Aと分詞が能動関係の場合と受動関係の場合の形は？
  answer: '能動→with A doing（例: with tears running）、受動→with A done（例: with his arms folded）'
- node_id: sjd-015
  seq: 2
  question: 入試で頻出するのはwith + A + doing/doneのどちらか？
  answer: with + A + done（過去分詞）の出題が多い。
- node_id: sjd-015
  seq: 3
  question: with構文で分詞の代わりに使える要素は？
  answer: 形容詞（with your mouth full）、副詞（with her socks on）、場所を示す句（with tears in her eyes）(⇨Theme 179)
