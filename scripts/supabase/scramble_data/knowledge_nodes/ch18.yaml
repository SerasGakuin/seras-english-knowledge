check_points:
  - node_id: "sgh-031"
    seq: 1
    question: "lateとlatelyの意味の違いは？"
    answer: "late「遅く」、lately「最近」（= recently）。latelyは現在完了時制で用いるのが通例。"
  - node_id: "sgh-031"
    seq: 2
    question: "hardとhardlyの意味の違いは？"
    answer: "hard「一生懸命に」、hardly「ほとんど〜ない」。意味が全く異なる。"
  - node_id: "sgh-031"
    seq: 3
    question: "「家に帰る」はgo to homeか、go homeか？"
    answer: "go home。homeは副詞なので前置詞toは不要。ただし所有格・冠詞がつくとhomeは名詞（go to his home）。"
  - node_id: "sgh-031"
    seq: 4
    question: "abroad, home以外に前置詞不要の副詞を3つ挙げよ。"
    answer: "outdoors/indoors, upstairs/downstairs, downtown, overseasなど。"

  - node_id: "sgh-032"
    seq: 1
    question: "however, therefore, besidesはそれぞれ何を表す接続副詞か？"
    answer: "however「しかしながら」（逆接）、therefore「それゆえに」（結果）、besides「その上」（追加）。"
  - node_id: "sgh-032"
    seq: 2
    question: "nevertheless/nonetheless/all the same/stillに共通する意味は？"
    answer: "いずれも「それにもかかわらず」（逆接）を表す。"
  - node_id: "sgh-032"
    seq: 3
    question: "文修飾の副詞とは何か？ 例を3つ挙げよ。"
    answer: "文全体を修飾し話し手の判断を表す副詞。例: luckily「幸運にも」、evidently「明らかに」、unfortunately「不運にも」。"
  - node_id: "sgh-032"
    seq: 4
    question: "Luckily we got home. をIt is...that構文で書き換えると？"
    answer: "It was lucky that we got home before it started to rain."

  - node_id: "sgh-033"
    seq: 1
    question: "否定文で「まだ〜していない」を表すのはyetかstillか？ 位置の違いは？"
    answer: "どちらも可。yetは文末（haven't done yet）、stillはnot の前（still hasn't done）。stillを使うといら立ちのニュアンスが出る。"
  - node_id: "sgh-033"
    seq: 2
    question: "疑問文でalreadyとyetの使い分けは？"
    answer: "yetは文末で「もう〜したか」（普通の疑問）。alreadyは文中で「もう〜したのか」（驚きのニュアンス）。"
  - node_id: "sgh-033"
    seq: 3
    question: "ten years agoとtwo years beforeの違いは？"
    answer: "ago「今から〜前」→過去形で使用。before「過去のある時点から〜前」→過去完了形で使用。agoは現在完了形・過去完了形と使えない。"
  - node_id: "sgh-033"
    seq: 4
    question: "before を単独で「以前に」の意味で使う場合、どの時制と使えるか？"
    answer: "現在完了形でも過去形でも使える。例: I have seen the picture before. / I saw the picture before."

  - node_id: "sgh-034"
    seq: 1
    question: "「ほとんどの学生」を almost を使って表すには？"
    answer: "almost all students。almostは副詞なので直接名詞を修飾できず、×almost studentsは不可。"
  - node_id: "sgh-034"
    seq: 2
    question: "most of students は正しいか？"
    answer: "不可。most of の後には the や one's が必要。most of the students / most of his students が正しい。"
  - node_id: "sgh-034"
    seq: 3
    question: "I almost missed the train. の意味は？"
    answer: "あやうく列車に乗り遅れるところだった（実際は乗れた）。almost + 動詞で「もう少しで〜するところで」の意味。"

