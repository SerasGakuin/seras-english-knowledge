knowledge_nodes:
  - id: "sgh-031"
    name: "-lyの有無で意味が異なる副詞と名詞に見える副詞"
    category: "語法"
    priority: "P1"
    notes: |
      Theme 169+170 統合。形容詞と同形の副詞と-lyのついた副詞で意味が異なるもの、および名詞と間違えやすい副詞（前置詞不要）を扱う。

      【-lyの有無による意味の違い（Theme 169）】
      〈頻出〉① late「遅く」⇔ lately「最近」（= recently）
      ② hard「一生懸命に」⇔ hardly「ほとんど〜ない」
      ③ near「近くに」⇔ nearly「ほとんど」（= almost）
      ④ pretty「かなり」⇔ prettily「きれいに」
      注意: lately/recentlyは現在完了時制（過去時制も可）、these days/nowadaysは現在時制で用いるのが通例。
      選択肢情報: later「後で」、latest「最新の」、closely「綿密に」、scarcely「ほとんど〜ない」
      参照: ⇨問266（hardly/scarcely）、⇨問202（much+比較級の強調）

      【名詞と間違えやすい副詞（Theme 170）】
      home/abroadなどは副詞なので前置詞toは不要。
      ×get to home → ○get home / ×go to abroad → ○go abroad
      ただし所有格・冠詞がつくとhomeは名詞: get to his home
      比較: get home（帰着に焦点、時間語句を伴う）/ go home（帰る行為に焦点）/ come home（家にいる人の視点）

      PU!153 名詞と間違えやすい副詞（前置詞不要）:
      □ home「家に/へ・自国に/へ」□ abroad「外国に/で/へ」
      □ outdoors「屋外で」⇔ indoors「屋内で」
      □ upstairs「上の階で/へ」⇔ downstairs「下の階で/へ」
      □ downtown「繁華街へ/で」□ overseas「海外に/で/へ」

      問661-666は書き起こしに問題文なし→exam英文0件。解説例文のみ登録。

  - id: "sgh-032"
    name: "接続副詞と文修飾の副詞"
    category: "語法"
    priority: "P1"
    notes: |
      Theme 171+172 統合。接続詞の働きをする副詞（接続副詞）と、文全体を修飾する副詞（文修飾副詞）を扱う。

      【接続副詞（Theme 171）】
      however/therefore等は本来副詞だが、等位接続詞のように前後の節をつなぐ。
      and/butと併用されることもある。

      PU!154 つなぎ語句(1):
      逆接: however「しかしながら」/ nevertheless/nonetheless「それにもかかわらず」/ all the same / still「それでも」/ though「けれども」
      対比: on the other hand「他方」/ instead「代わりに」/ in [by] contrast「それとは対照的に」
      結果: therefore / so「それゆえに」/ consequently「その結果」/ accordingly「したがって」

      PU!155 つなぎ語句(2):
      追加: besides / in addition / moreover / furthermore / what is more「その上」/ then「それに」
      例示: for example / for instance「たとえば」
      換言: that is (to say)「すなわち」/ in other words「言い換えれば」
      参照: ⇨問359（what is more）、⇨問100（代不定詞の否定形）

      【文修飾の副詞（Theme 172）】
      文全体を修飾する副詞。通例文頭に置かれ、話し手の判断や確信度を表す。
      It is + 形容詞 + that SVで書き換えられるものが多い。
      例: Luckily we got home. = It was lucky that we got home.

      PU!156 代表的な文修飾の副詞:
      □ naturally「当然ながら」□ surely/certainly「確かに」
      □ evidently/obviously/clearly「明らかに」
      □ fortunately/luckily「幸運にも」⇔ unfortunately/unluckily「不運にも」
      □ apparently「見たところでは〜らしい」□ wisely「賢明にも」

  - id: "sgh-033"
    name: "already/yet/stillとago/beforeの使い分け"
    category: "語法"
    priority: "P1"
    notes: |
      Theme 173+174 統合。「もう/まだ」を表す副詞と「〜前」を表す副詞の使い分け。

      【already/yet/still（Theme 173）】
      PU!157 使い分け:
      already: 肯定文「もう〜した」/ 疑問文「もう〜したのか」（驚き）
      yet: 否定文「まだ〜していない」（文末）/ 疑問文「もう〜したか」（文末）
      still: 肯定文「まだ〜している」（継続）/ 否定文「まだ〜していない」（still〜not語順、いら立ち）
      注意: yet/alreadyの疑問文での位置に注意。already=文中、yet=文末。
      注意: still + 否定 = still isn't（stillが先、notが後）。

      【ago/before（Theme 174）】
      ago「（今から）〜前に」→ 過去形とともに用いる。×現在完了形
      before「（過去のある時点から）〜前に」→ 過去完了形とともに用いる。×ago + 過去完了
      before単独「以前に」→ 現在完了形・過去形どちらも可。

  - id: "sgh-034"
    name: "almostとmostの使い分け"
    category: "語法"
    priority: "P1"
    notes: |
      Theme 175。almostは副詞で直接名詞を修飾できない。mostは形容詞・名詞の用法がある。

      PU!158 使い分け:
      【限定されない場合】
      almost all + 名詞 = most + 名詞「ほとんどの〜」
      例: almost all students = most students

      【限定された特定の場合】
      almost all (of) the [one's] + 名詞 = most of the [one's] + 名詞「〜のほとんど」
      例: almost all (of) the students = most of the students
      注意: most of の後の名詞には必ず the/one's がつく。×most of students
      注意: 所有格と限定詞は続けて使えない。×most his students（→ most of his students）

      almost + 動詞「あやうく〜するところで（実際は〜していない）」
      例: I almost broke the cup.

      参照: ⇨Theme 159（所有格+限定詞の制約）、⇨PU!42（at most「せいぜい」）

