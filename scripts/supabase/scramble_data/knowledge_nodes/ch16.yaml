check_points:
- node_id: sgh-019
  seq: 1
  question: information, furniture, news, advice, homeworkの共通点は？
  answer: すべて不可算名詞。a/anはつかず、複数形にならない。
- node_id: sgh-019
  seq: 2
  question: 不可算名詞の「多少」を表すにはmany/fewとmuch/littleのどちらを使うか？
  answer: much [a lot of] / littleを使う。many/fewは可算名詞用。ただしsome/anyは両方に使える。
- node_id: sgh-019
  seq: 3
  question: 不可算名詞を「1つの~」と数えるにはどうするか？
  answer: a piece ofを用いる（a piece of advice「1つの忠告」、three pieces of furniture「家具3点」）。
- node_id: sgh-019
  seq: 4
  question: funの強調形として正しいのはvery funとa lot of funのどちら？
  answer: a lot of fun [good/great fun]。funは不可算名詞なのでvery funとは言わない。
- node_id: sgh-020
  seq: 1
  question: 「友達になる」「握手する」「交替で~する」を英語で言うと複数形はどこに使うか？
  answer: make friends, shake hands, take turnsのように、相手が必要な行為は名詞が必ず複数形になる。
- node_id: sgh-020
  seq: 2
  question: arms, customs, goods, spiritsが複数形のときの意味は？
  answer: arms=武器, customs=関税/税関, goods=商品, spirits=気分。単数形とは異なる意味になる。
- node_id: sgh-020
  seq: 3
  question: meansの数の扱いは？
  answer: 「手段」の意味では単複同形で、単数・複数どちらにも扱える（Every possible means has... / All possible means have...）。「資産」の意味では複数扱い。
- node_id: sgh-021
  seq: 1
  question: customer, guest, client, patientはそれぞれどのような「客」か？
  answer: customer=店の顧客、guest=招待客/ホテルの宿泊客、client=弁護士などへの依頼人、patient=患者。
- node_id: sgh-021
  seq: 2
  question: spectatorとaudienceの違いは？
  answer: spectator=スポーツなどの観客、audience=劇などの観客/聴衆。
- node_id: sgh-021
  seq: 3
  question: fare, cost, fine, rentの違いは？
  answer: fare=乗り物の運賃、cost=費用/経費、fine=罰金、rent=家賃/賃貸料。
- node_id: sgh-021
  seq: 4
  question: feeとchargeの違いは？
  answer: fee=専門職への謝礼/入場料、charge=サービス料金/公共料金。
- node_id: sgh-022
  seq: 1
  question: workとjobの違いは？
  answer: work=仕事（不可算名詞）、job=特定の仕事（可算名詞）。ただしworkは「作品/著作」の意味では可算（a work of art）。
- node_id: sgh-022
  seq: 2
  question: occupationとprofessionの違いは？
  answer: occupation=職業（一般的）、profession=知的・専門的な職業。
- node_id: sgh-022
  seq: 3
  question: promiseとappointmentとreservationの違いは？
  answer: promise=一般的な約束、appointment=診察などの予約/面会の約束、reservation=切符・部屋・座席の予約。
- node_id: sgh-022
  seq: 4
  question: do a good jobの意味は？
  answer: 「うまくやってのける」。jobは可算名詞なのでaがつく。
- node_id: sgh-023
  seq: 1
  question: catch A by the arm, pat A on the shoulder, look A in the eyeの前置詞の使い分けは？
  answer: つかむ系(catch/take/hold/grasp)→by、たたく系(strike/hit/pat/tap/kiss)→on、見る系(look/stare)→in。
- node_id: sgh-023
  seq: 2
  question: この表現で身体部位につく冠詞は？
  answer: 通例theがつく（所有格ではない）。口語ではA'sとすることもある。
- node_id: sgh-023
  seq: 3
  question: look A in the eye(s)で注意すべき点は？
  answer: lookは他動詞として使う。×look at A in the eye(s)としない。
- node_id: sgh-024
  seq: 1
  question: 「こんなに面白い映画」をso/suchそれぞれで言うと？
  answer: so funny a movie / such a funny movie。soの場合は形容詞がa/anの前に来る。
- node_id: sgh-024
  seq: 2
  question: 副詞がso/as/too/howの場合、冠詞はどこに置くか？
  answer: 「so [as/too/how] + 形容詞 + a [an] + 名詞」の語順。通常の「a + 形容詞 + 名詞」とは逆になる。
- node_id: sgh-024
  seq: 3
  question: 「私の友人の1人」を英語で言うと？
  answer: a friend of mine（×a my friend / ×my a friend）。所有格はa/this等と並べられないため。
- node_id: sgh-024
  seq: 4
  question: 「メアリーのこの本」を英語で言うと？
  answer: this book of Mary's（×Mary's this book）。名詞の場合はof+所有格を使う。
- node_id: sgh-025
  seq: 1
  question: 「時間単位で」を英語で言うと？
  answer: by the hour。「by the + 単位名詞」では必ずtheを用いる。
- node_id: sgh-025
  seq: 2
  question: by carとin his carの違いは？
  answer: by car（無冠詞）は一般的な手段を表す。名詞に冠詞や所有格がつくとbyではなくin/onを使う。
- node_id: sgh-025
  seq: 3
  question: 大型の乗り物と小型の乗り物でin/onのどちらを使うか？
  answer: 小型の乗り物（車など）はin、大型の乗り物（バス・電車など）やまたがる乗り物（バイク・自転車）はon。
- node_id: sgh-025
  seq: 4
  question: 「電話で」をby以外で言うと？
  answer: on [over] the phone（theがつくことに注意）。
