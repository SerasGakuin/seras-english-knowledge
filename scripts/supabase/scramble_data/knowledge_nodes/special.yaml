check_points:
  # sdr-001
  - node_id: "sdr-001"
    seq: 1
    question: "SVCとSVOの区別方法は？"
    answer: "SVCではSとCに主述関係がある（S=C）。SVOではSとOに主述関係はない（S≠O）。"
  - node_id: "sdr-001"
    seq: 2
    question: "SVOCとSVOOの区別方法は？"
    answer: "SVOCではOとCに主述関係がある（O=C）。SVOOではOとOに主述関係はない。"
  - node_id: "sdr-001"
    seq: 3
    question: "the number of + 複数名詞の動詞は単数？複数？"
    answer: "単数。主語はthe number（数）であり、of以下は修飾語。⇔ a number of + 複数名詞は複数扱い。"
  - node_id: "sdr-001"
    seq: 4
    question: "both A and Bの動詞は？"
    answer: "複数形。bothは常に複数扱い。"
  - node_id: "sdr-001"
    seq: 5
    question: "倒置文(In front of the house + V + S)でのSV一致のポイントは？"
    answer: "動詞は後ろの主語に一致させる。前置詞句に惑わされない。"
  # sdr-002
  - node_id: "sdr-002"
    seq: 1
    question: "If + S + should do〜の意味は？"
    answer: "「万一〜ならば」。未来の可能性の低い仮定を表す。倒置形のShould S do〜も同じ意味（⇨ 164, 180）。"
  - node_id: "sdr-002"
    seq: 2
    question: "It is surprising that S should do〜のshouldは何？"
    answer: "感情・価値判断を表す形容詞の後のthat節で用いるshould。「〜するなんて」の意味（⇨ 289）。"
  - node_id: "sdr-002"
    seq: 3
    question: "助動詞needと一般動詞needの見分け方は？"
    answer: "助動詞need: 後に原形が続き、主に否定文・疑問文で使用。一般動詞need: 後にto doが続く（⇨ 59）。"
  - node_id: "sdr-002"
    seq: 4
    question: "couldの推量用法の意味は？"
    answer: "「〜かもしれない」。may/mightと同様の可能性・推量を表す。"
  # sdr-003
  - node_id: "sdr-003"
    seq: 1
    question: "強調の助動詞doの見分け方は？"
    answer: "doの後に動詞の原形が続き、「確かに/実際に」と肯定の意味を強調する（⇨ 457）。"
  - node_id: "sdr-003"
    seq: 2
    question: "過去の習慣のwouldとused toの違いは？"
    answer: "wouldは過去の動作の反復のみ。used toは過去の状態（There used to be〜）も表せる（⇨ 61, 63, 64）。"
  - node_id: "sdr-003"
    seq: 3
    question: "be used to doing とbe used to doの違いは？"
    answer: "be used to doing: 「〜することに慣れている」(to=前置詞)。be used to do: 「〜するために使われる」(受動態+目的の不定詞)（⇨ 65, PU!17）。"
  # sdr-004
  - node_id: "sdr-004"
    seq: 1
    question: "文頭のTo do〜の後にVがある場合とSVがある場合で用法はどう違う？"
    answer: "V→名詞的用法（主語として機能）。SV→副詞的用法（目的「〜するために」/条件「〜するならば」）。"
  - node_id: "sdr-004"
    seq: 2
    question: "文頭のDoing〜の後にVがある場合とSVがある場合で用法はどう違う？"
    answer: "V→動名詞（主語として機能）。SV→分詞構文（「〜するので/〜する時に」など）。"
  - node_id: "sdr-004"
    seq: 3
    question: "感情の原因を表す副詞的用法の見分け方は？"
    answer: "感情を表す形容詞（surprised/happy/glad等）の後にto doが来る。「〜して（うれしい等）」の意味（⇨ 94）。"
  - node_id: "sdr-004"
    seq: 4
    question: "補語のdoingと動名詞（目的語）のdoingの区別は？"
    answer: "SVC構造の補語（Her activity is climbing = doing）vs 動詞の目的語（enjoy/give up doing）。前置詞の目的語（of doing）も動名詞。"
  # sdr-005
  - node_id: "sdr-005"
    seq: 1
    question: "接続詞thatと関係代名詞thatの区別方法は？"
    answer: "that + 完全な文 → 接続詞that。that + 不完全な文（主語/目的語/補語が欠けた文）→ 関係代名詞that。"
  - node_id: "sdr-005"
    seq: 2
    question: "It is + 副詞 + that ~ は何構文？"
    answer: "強調構文。It is + 形容詞 + that ~ は形式主語構文。"
  - node_id: "sdr-005"
    seq: 3
    question: "It is + 名詞 + that ~ の場合はどう区別？"
    answer: "that以下が完全な文 → 形式主語構文（名詞は同格のthat節で説明される）。that以下が不完全な文 → 強調構文。"
  - node_id: "sdr-005"
    seq: 4
    question: "前置詞asと接続詞asの見分け方は？"
    answer: "直後に名詞 → 前置詞as「〜として」。直後にS+V → 接続詞as（原因/譲歩など）。"
  - node_id: "sdr-005"
    seq: 5
    question: "whateverの副詞節用法と名詞節用法の区別は？"
    answer: "whatever節の前後に完全な文がある → 副詞節「何を〜しても」。whatever節が主語/目的語の働き → 名詞節「〜するものは何でも」。"
  # sdr-006
  - node_id: "sdr-006"
    seq: 1
    question: "and/orによる並列要素の見つけ方は？"
    answer: "and/orの直後に着目し、同じ働きをする語をさかのぼって探す。副詞が間に入る場合はその後ろの語に着目。"
  - node_id: "sdr-006"
    seq: 2
    question: "orの4つの用法は？"
    answer: "選択(A or B「AかB」)、訂正(or more precisely「いやむしろ」)、言い換え(or = すなわち)、命令文+or(「さもないと」⇨ 394)。"
  - node_id: "sdr-006"
    seq: 3
    question: "並列の形の一致とは何か？"
    answer: "and/orの前後で同じ品詞・形を並べる。例: bought and decided(過去形+過去形)、staying or going(動名詞+動名詞)。"
  # sdr-007
  - node_id: "sdr-007"
    seq: 1
    question: "most of の後に何が必要？"
    answer: "the/one'sなどの限定詞 + 名詞。×most of students → most of the students。"
  - node_id: "sdr-007"
    seq: 2
    question: "such + 可算単数名詞の語順は？"
    answer: "such + a/an + 形容詞 + 名詞。例: such a scary story。×such scary story。"
  - node_id: "sdr-007"
    seq: 3
    question: "homeworkの複数形は？"
    answer: "不可算名詞なので複数形なし（×homeworks → homework）。同様: information, advice, furniture, luggage。"

