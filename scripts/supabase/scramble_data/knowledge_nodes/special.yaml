# Special Edition 読解・作文のための文法問題 — sdr-001〜sdr-007

knowledge_nodes:
  # === sdr-001: 特別編1+2 統合 ===
  - id: "sdr-001"
    name: "文構造の識別（文型・SVの把握）"
    category: "読解文法"
    priority: "P1"
    notes: |
      特別編1+2を統合。パターンD: 文法識別の統合演習。
      特別編1: 文型一致問題（5文型の正確な識別）。
      特別編2: 正誤訂正問題（SVの一致・並列構造）。
      CHECK!: 文型の見分け方 — (1)SV: 副詞句を伴う (2)SVC: S=C (3)SVO: S≠O (4)SVOO: O≠O (5)SVOC: O=C。
      参考書内参照: ⇨ PU!109(SVOO), PU!111(SVC), PU!112(SVOC), Theme 25, Theme 40, ⇨ 問題390, 392, 397, 540, 552, 568, 656。

  # === sdr-002: 特別編3 ===
  - id: "sdr-002"
    name: "should/could/needの多義区別"
    category: "読解文法"
    priority: "P1"
    notes: |
      特別編3。パターンD: 用法一致問題（下線部と同じ用法を選ぶ）。
      shouldの4用法: (1)万一の仮定 (2)感情のshould (3)義務「〜すべきだ」 (4)提案・要求のthat節内。
      couldの4用法: (1)過去の能力「〜できた」 (2)仮定法 (3)推量「〜かもしれない」 (4)丁寧な依頼Could you〜?。
      needの3用法: (1)助動詞need（原形が続く/否定・疑問） (2)一般動詞need to do (3)名詞the need to do。
      ★ need doing「〜される必要がある」は一般動詞needの特殊用法（⇨ 508）。
      参考書内参照: ⇨ 59, 164, 180, 289, 508, 572, Theme 46, Theme 145, ⇨ 1335。

  # === sdr-003: 特別編4 ===
  - id: "sdr-003"
    name: "do/would/used toの多義区別"
    category: "読解文法"
    priority: "P1"
    notes: |
      特別編4。パターンD: 用法一致問題。
      doの4用法: (1)強調の助動詞（do+原形, 「確かに」） (2)一般動詞「間に合う/十分である」(⇨ 726) (3)代動詞（前出動詞の繰り返し回避） (4)一般動詞「与える」(do A good「Aのためになる」⇨ 1069)。
      wouldの4用法: (1)過去の習慣「よく〜したものだ」 (2)過去の拒絶「どうしても〜しなかった」 (3)仮定法 (4)丁寧な依頼Would you〜?。
      used toの4形: (1)助動詞used to do「以前は〜した」 (2)get used to doing「〜に慣れる」 (3)be used to do「〜するために使われる」(受動態) (4)be used to doing「〜に慣れている」。
      参考書内参照: ⇨ 61, 62, 63, 64, 65, 119, 457, 726, 1069, 1353, PU!17, PU!22, Theme 46。

  # === sdr-004: 特別編5+6 統合 ===
  - id: "sdr-004"
    name: "to不定詞/doingの用法区別"
    category: "読解文法"
    priority: "P1"
    notes: |
      特別編5+6を統合。パターンD: 用法一致問題。
      CHECK!(不定詞): 文頭のTo do〜の後にV→名詞的用法（主語）、SV→副詞的用法。
      CHECK!(doing): 文頭のDoing〜の後にV→動名詞（主語）、SV→分詞構文。
      to不定詞の副詞的用法6区分: (1)目的(⇨ 91) (2)感情の原因(⇨ 94) (3)結果(live to be〜, grow up to be〜, ⇨ PU!23) (4)判断の根拠(⇨ 95) (5)条件(⇨ 183) (6)形容詞の限定(⇨ 96)。
      doingの区別: (1)分詞構文（文頭/文中/文末） (2)動名詞（主語/目的語/前置詞の目的語/補語） (3)現在進行形 (4)現在分詞（名詞修飾/目的格補語）。
      参考書内参照: ⇨ 85, 86, 89, 91, 94, 95, 96, 111, 112, 113, 136, 142, 143, 144, 183, 287, Theme 25, Theme 29, Theme 32, Theme 40, PU!17, PU!22, PU!23, PU!111, PU!117, PU!121。

  # === sdr-005: 特別編7+8 統合 ===
  - id: "sdr-005"
    name: "多機能語の区別（that/It is...that~/as/whatever）"
    category: "読解文法"
    priority: "P1"
    notes: |
      特別編7+8を統合。パターンD: 用法一致問題。
      CHECK!(that): (1)that+完全な文→接続詞 (2)that+不完全な文→関係代名詞。
      CHECK!(It is...that~): (1)It is+副詞+that~→強調構文 (2)It is+形容詞+that~→形式主語構文 (3)It is+名詞+that+不完全→強調構文 (4)It is+名詞+that+完全→形式主語構文。
      thatの7用法: 同格の接続詞/名詞節の接続詞/主格関係代名詞/目的格関係代名詞/代名詞that(the+名詞の代用)/指示形容詞「あの」/指示代名詞「あれ」/指示副詞「そんなに」。
      asの4用法: 前置詞「〜として」/原因「〜なので」/譲歩「〜だけれど」/副詞「同じくらい」。
      whateverの3用法: 副詞節「何を〜しても」/名詞節「〜するものは何でも」/no+名詞+whatever「少しも〜ない」。
      参考書内参照: ⇨ 184, 190, 277, 303, 344, 346, 382, 383, 405, 446, 447, 725, Theme 78, Theme 105, Theme 118, PU!77, PU!87。

  # === sdr-006: 特別編9 ===
  - id: "sdr-006"
    name: "等位接続詞or/andの区別と並列構造の把握"
    category: "読解文法"
    priority: "P1"
    notes: |
      特別編9。パターンD: 混合問題（用法一致1問 + 正誤訂正2問）。
      CHECK!: and/orによる並列の見抜き方 — (1)直後に着目→同じ働きの語をさかのぼる (2)副詞がある場合→副詞の後に来る語に着目。
      or: 選択/訂正・言い直し/言い換え/命令文+or。
      参考書内参照: ⇨ 390, 394, Theme 40, PU!111。

  # === sdr-007: 特別編10 ===
  - id: "sdr-007"
    name: "名詞・代名詞・冠詞の用法上の注意"
    category: "読解文法"
    priority: "P2"
    notes: |
      特別編10。パターンD: 正誤訂正問題。
      注意すべきポイント:
      - most of の後にはthe/one'sなどの限定詞が必要
      - such + a/an + 形容詞 + 単数名詞の語順（soとは語順が異なる: so + 形容詞 + a/an + 名詞）
      - 不可算名詞は複数形不可（homework, information, advice, furniture, luggage等）
      - talkは自動詞→talk with [to] each other（×talk each other）
      参考書内参照: ⇨ PU!148, Theme 151, Theme 152。

