check_points:
  # sdv-006
  - node_id: "sdv-006"
    seq: 1
    question: "受動態の基本形はどのような形か？"
    answer: "be + done（過去分詞）。能動態の目的語を主語にし、元の主語は by をつけて後に置く。"
  - node_id: "sdv-006"
    seq: 2
    question: "by A が省略されるのはどのような場合か？"
    answer: "動作主が一般の人々（we/you/they等）の場合、または前後の文脈から動作主が明らかな場合。"
  - node_id: "sdv-006"
    seq: 3
    question: "助動詞を含む文を受動態にするとどうなるか？"
    answer: "助動詞はそのままで、後の動詞が be done になる（例: must be controlled）。"
  # sdv-007
  - node_id: "sdv-007"
    seq: 1
    question: "完了形の受動態はどのような形か？"
    answer: "have been done（例: This song has been sung by many singers.）"
  - node_id: "sdv-007"
    seq: 2
    question: "進行形の受動態はどのような形か？"
    answer: "be being done「～されているところだ」（例: A new building is being constructed.）"
  - node_id: "sdv-007"
    seq: 3
    question: "A new building (has / is being) constructed on campus. の正しい形は？"
    answer: "is being。construct は他動詞で目的語がないので受動態。「建てられている」は進行形の受動態。"
  # sdv-008
  - node_id: "sdv-008"
    seq: 1
    question: "laugh at ~ の受動態はどうなるか？"
    answer: "be laughed at (by ~)。群動詞をひとまとまりとして扱い、末尾の前置詞を落とさない。"
  - node_id: "sdv-008"
    seq: 2
    question: "take care of ~ の受動態はどうなるか？"
    answer: "be taken care of (by ~)。「動詞+名詞+前置詞」型も末尾の前置詞を落とさない。"
  - node_id: "sdv-008"
    seq: 3
    question: "受動態の英文を日本語に訳す際、不自然になる場合はどうするか？"
    answer: "能動態に直して訳す（例: It must be done. → すぐにそれをしなければならない）。"
  # sdv-009
  - node_id: "sdv-009"
    seq: 1
    question: "make A do を受動態にするとどうなるか？"
    answer: "A is made to do。原形不定詞が to 不定詞になる。"
  - node_id: "sdv-009"
    seq: 2
    question: "see A do を受動態にするとどうなるか？"
    answer: "A is seen to do。make と同様に原形不定詞が to 不定詞になる。"
  - node_id: "sdv-009"
    seq: 3
    question: "let を受動態にするにはどうするか？"
    answer: "let は受動態にしない。allow で代用する（I was allowed to go.）。have も受動態にしない。"
  # sdv-010
  - node_id: "sdv-010"
    seq: 1
    question: "They say that S + V の2通りの受動態は何か？"
    answer: "(1) It is said that S + V (2) S is said to do ~"
  - node_id: "sdv-010"
    seq: 2
    question: "They say that he lived here. を S is said to ... の形にするとどうなるか？"
    answer: "He is said to have lived here.（that節のVが過去形の場合、完了不定詞を用いる）"
  - node_id: "sdv-010"
    seq: 3
    question: "say 以外にこの受動態の形をとる動詞を3つ挙げよ。"
    answer: "believe, expect, think, report, know のいずれか3つ。"
  # sdv-011
  - node_id: "sdv-011"
    seq: 1
    question: "受動態の「動作」を明確にするには be の代わりに何を使うか？"
    answer: "get / become を使う。特に get は事故など予期しないことに用いることが多い。"
  - node_id: "sdv-011"
    seq: 2
    question: "受動態の「状態」を明確にするには be の代わりに何を使うか？"
    answer: "remain / lie / stay を使う（例: remain closed「閉鎖されたままである」）。"
  - node_id: "sdv-011"
    seq: 3
    question: "The road remained (closing / closed) for a week. の正しい形は？"
    answer: "closed。remain + 過去分詞で「～されたままである」(状態)を表す。"
  # sdv-012
  - node_id: "sdv-012"
    seq: 1
    question: "「～に驚く」を英語の受動態で表すとどうなるか？"
    answer: "be surprised [astonished / amazed] at ~"
  - node_id: "sdv-012"
    seq: 2
    question: "be excited / be satisfied / be absorbed の後に続く前置詞はそれぞれ何か？"
    answer: "be excited about [at] ~ / be satisfied with ~ / be absorbed in ~"
  - node_id: "sdv-012"
    seq: 3
    question: "「けがをする」「死ぬ（事故で）」「にわか雨にあう」を受動態で表すと？"
    answer: "be injured [hurt] / be killed / be caught in a shower"
  - node_id: "sdv-012"
    seq: 4
    question: "なぜ感情・被害の表現で英語は受動態を使うのか？"
    answer: "日本語では「驚く」「死ぬ」と能動態だが、英語では surprise, kill 等が他動詞（～を驚かせる、～を殺す）なので、主語が感情・被害の対象の場合は受動態になる。"
  # sdv-013
  - node_id: "sdv-013"
    seq: 1
    question: "be known to / for / by / as の意味の違いは何か？"
    answer: "to A「Aに知られている」/ for A「Aで知られている」(主語≠A) / by A「Aによってわかる」(判断基準) / as A「Aとして知られている」(主語=A)"
  - node_id: "sdv-013"
    seq: 2
    question: "be filled with ~ と be full of ~ の関係は？"
    answer: "同義。「～で満たされている」。filled は fill（～を満たす）の受動態。"
  - node_id: "sdv-013"
    seq: 3
    question: "get married to ~ と be married to ~ の違いは？"
    answer: "get married to ~ は「結婚する」(動作)。be married to ~ は「結婚している」(状態)。get は動作を明確にする。"
  - node_id: "sdv-013"
    seq: 4
    question: "Please remain (sat / seated). の正しい形は？"
    answer: "seated。seat は「～を着席させる」という他動詞なので、「座る」は be seated。remain + seated で「座っている」(状態)。"

