# Ch02 受動態 — sdv-006〜sdv-013

knowledge_nodes:
  - id: "sdv-006"
    name: "受動態の基本"
    category: "動詞・時制"
    priority: "P1"
    notes: |
      Theme 8: 受動態の基本（問題29-30）
      ■ 受動態の基本形: be + done（過去分詞）
      能動態の目的語(O)を主語(S)にし、動詞部分を be done にする。
      能動態の主語は by をつけて be done の後に置く。
      ■ by A の省略:
      ・動作主が一般の人々（we/you/they等）の場合 → 省略
      ・前後の文脈から動作主が明らかな場合 → 省略
      ■ 助動詞を含む文の受動態: 助動詞 + be done
      助動詞はそのまま、後の動詞が be done になる（⇨問30: must be controlled）
      〈語句〉at any cost「どんなに費用をかけても／どんなことをしても」

  - id: "sdv-007"
    name: "完了形の受動態と進行形の受動態"
    category: "動詞・時制"
    priority: "P1"
    notes: |
      Theme 9: 完了形の受動態／進行形の受動態（問題31-32）
      ■ 完了形の受動態: have been done
      （⇨問31: has been sung — 継続を表す現在完了形の受動態）
      ■ 進行形の受動態: be being done 「～されているところだ」
      （⇨問32: is being constructed）
      〈選択肢〉問32: construct「～を建設する」は他動詞。目的語がないので完了形(has/had)は不可。

  - id: "sdv-008"
    name: "群動詞の受動態"
    category: "動詞・時制"
    priority: "P1"
    notes: |
      Theme 10: 群動詞の受動態（問題33-34）
      ■ 群動詞（2語以上で1つの動詞と同じ働き）をひとまとまりとして扱う。
      ■ ポイント: 末尾の前置詞を落とさない。
      ・laugh at ~ → be laughed at (by ~)
      ・take care of ~ → be taken care of (by ~)
      ■「動詞＋名詞＋前置詞」型の群動詞で名詞に修飾語がある場合:
      動詞の後の名詞を主語にした受動態と、前置詞の後の名詞を主語にした受動態の2通りが可能。
      ・You must take good care of your health.
        → Good care must be taken of your health.
        → Your health must be taken good care of.
      Power Up! 8〈発展〉: 受動態の訳し方 — 日本語では能動態で言うところを英語では受動態で表現することが多い。訳して自然な日本語にならなければ、能動態に直して訳す。特に助動詞を含む受動態がそうである。

  - id: "sdv-009"
    name: "使役動詞・知覚動詞の受動態"
    category: "動詞・時制"
    priority: "P1"
    notes: |
      Theme 11: 使役動詞・知覚動詞の受動態（問題35-36）
      ■ 使役動詞 make の受動態:
      make A do → A is made to do（原形不定詞が to 不定詞になる）
      ■ 知覚動詞 see の受動態:
      see A do → A is seen to do（同上）
      ■ 受動態にできる知覚動詞: see, hear, observe
      その他の知覚動詞（watch, feel等）はふつう能動態で用いる。
      ■ have / let は受動態にしない:
      let は allow で代用する（I was allowed to go to college.）

  - id: "sdv-010"
    name: "目的語がthat節の場合の受動態"
    category: "動詞・時制"
    priority: "P1"
    notes: |
      Theme 12: 目的語がthat節の場合の受動態（問題37-38）
      ■ They say that S + V の2つの受動態:
      (1) It is said that S + V（形式主語 it を用いる）
      (2) S is said to do ~（that節中の主語を文の主語にする）
      ■ V が過去形/現在完了形の場合:
      S is said to have done（完了不定詞を用いる）
      ■ Power Up! 9: この形をとる動詞:
      say, believe(⇨問38), expect, think, report, know

  - id: "sdv-011"
    name: "動作と状態を明確にする表現"
    category: "動詞・時制"
    priority: "P2"
    notes: |
      Theme 13: 動作/状態を明確にする表現（問題39-40）
      受動態は「～される」(動作)と「～されている」(状態)の両方を表しうる。
      ■ 動作を明確にする: be の代わりに get / become を使う
      get + 過去分詞「～される」— 特に事故など予期しないことに用いることが多い
      （⇨問39: got stolen）
      ■ 状態を明確にする: be の代わりに remain / lie / stay を使う
      remain + 過去分詞「～されたままである」
      （⇨問40: remained closed; 参照: 問53 remain seated）

  - id: "sdv-012"
    name: "能動態と間違えやすい受動態"
    category: "動詞・時制"
    priority: "P1"
    notes: |
      Theme 14: 感情・心理状態を表す受動態（問題41-43）+ Theme 15: 被害を表す受動態（問題44-46）
      日本語では能動態で表現するが、英語では受動態で表現するものがある。
      受動態にした場合、動作主は by 以外の前置詞で示されることも多い。
      慣用表現として覚えるべき。
      ■ Power Up! 10: 感情・心理状態の受動態:
      be surprised [astonished/amazed] at ~「～に驚く」
      be shocked「ショックを受ける」 / be excited about [at] ~「～に興奮する」(⇨問41)
      be amused「面白がる」 / be disappointed「失望する」
      be concerned about ~「～を心配する」
      be satisfied with ~「～に満足する」(⇨問42)
      be interested in ~「～に興味がある」
      be convinced of ~「～を確信する」
      be absorbed in ~「～に夢中になっている」(= be lost in)(⇨問43)
      ■ Power Up! 11: 被害の受動態:
      be injured [hurt]「（事故で）けがをする」 / be wounded「（武器で）負傷する」
      be delayed「（電車等が）遅れる」(⇨問44)
      be killed「（事故・戦争で）死ぬ」(= die)(⇨問45)
      be caught in ~「（雨・渋滞等に）あう」(⇨問46)
      be defeated [beaten]「負ける」

  - id: "sdv-013"
    name: "受動態に由来する慣用表現"
    category: "動詞・時制"
    priority: "P1"
    notes: |
      Theme 16: その他の受動態に由来する慣用表現（問題47-53）
      ■ Power Up! 12: be known と結びつく4つの前置詞:
      (1) be known to A「Aに知られている」(⇨問47) — 対象
      (2) be known by A「Aによってわかる」— 判断の基準
      (3) be known for A「Aで知られている」(⇨問48) [主語≠A]
      (4) be known as A「Aとして知られている」 [主語＝A]
      ■ Power Up! 13: その他の慣用表現:
      be filled with ~「～で満たされている」(= be full of ~)(⇨問49)
      be covered with ~「～で覆われている」
      be engaged in ~「～に従事している」
      be involved in ~「～にかかわっている」(⇨問50)
      be crowded with ~「～で混雑している」
      be confronted with ~「～に直面している」
      be [get] married (to ~)「（～と）結婚している[する]」(⇨問51)
      be based on ~「～に基づいている」
      be dressed in ~「～を着ている」(⇨問52)
      be [remain] seated「座る[座っている]」(⇨問53)
      〈語句〉come to do「～するようになる」(問47)
      〈語句〉judging by [from] ~「～から判断すると」(問49)
      参照: Theme 13（get married = 動作の受動態, remain seated = 状態の受動態）

