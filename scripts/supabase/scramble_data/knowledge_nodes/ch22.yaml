check_points:
  - node_id: "sgi-011"
    seq: 1
    question: "bearの「耐える」以外の重要な意味を3つ挙げよ。bear fruitの意味は？"
    answer: "クマ/（花・実を）つける/（恨みなどを）心に抱く。bear fruit=「実をつける/（努力が）実を結ぶ」。"
  - node_id: "sgi-011"
    seq: 2
    question: "missの基本義は何か？入試で特に狙われる意味は？"
    answer: "基本義は「〜しそこなう」（乗りそこなう/見つけそこなう等）。入試では「（人が）いなくて寂しく思う」が狙われる。"
  - node_id: "sgi-011"
    seq: 3
    question: "companyの「会社」以外の重要な意味を2つ挙げよ。enjoy A's companyは？"
    answer: "一緒にいること/来客/仲間。enjoy A's company=「Aと一緒にいると楽しい」。"
  - node_id: "sgi-011"
    seq: 4
    question: "dueの4つの主要な用法と意味は？"
    answer: "due to〜「〜のために」/期日が来て/be due to do「〜する予定」/「（子が）生まれる予定で/到着予定で」。"
  - node_id: "sgi-012"
    seq: 1
    question: "lineの「線/行」以外の意味を3つ挙げよ。"
    answer: "職業・職種(line of work)/方針(take a strong line)/電話(on another line)/列(in line)。"
  - node_id: "sgi-012"
    seq: 2
    question: "meanの形容詞としての意味は？mean to doの意味は？"
    answer: "形:けちな(=stingy)/みすぼらしい。mean to do=「〜するつもりである」。"
  - node_id: "sgi-012"
    seq: 3
    question: "faceの動詞用法で頻出の意味は？be faced with〜は？"
    answer: "「（問題・危険などに）直面する」(=confront)。be faced with〜=「〜に直面している」。"
  - node_id: "sgi-012"
    seq: 4
    question: "caseの「場合」以外の重要な意味は？be the caseは？"
    answer: "症状・患者/真相・事実。be the case=「事実である」。as is often the case=「よくあることだが」。"
  - node_id: "sgi-013"
    seq: 1
    question: "countの「数える」以外の重要な意味を2つ挙げよ。count for nothingは？"
    answer: "勘定に入れる(=include)/重要である(=matter)。count for nothing=「全く重要でない」。"
  - node_id: "sgi-013"
    seq: 2
    question: "termの4つの主要な意味は？in terms of〜の意味は？"
    answer: "学期・期間/観点(in〜terms)/間柄(be on〜terms)/条件。in terms of〜=「〜の観点から」。"
  - node_id: "sgi-013"
    seq: 3
    question: "lastの動詞としての意味は？the last A to doの意味は？"
    answer: "「（ある期間）もつ/続く」(=continue)。the last A to do=「決して〜しないA/最も〜しそうにないA」。"

