knowledge_nodes:
- id: sgi-005
  name: 重要同意語 — 動詞①②
  category: 語い
  priority: P2
  notes: 'Theme 191+192統合。動詞の同意語ペアを問う語彙問題。

    【Theme 191 PU!169】acquire=obtain=gain=get「得る」、anticipate=expect「予想する」、

    identify=determine「特定する」、convince=persuade「納得させる」、

    vanish=disappear「消える」、ban=prohibit=forbid「禁止する」、

    affect=influence=impact「影響を与える」。

    【Theme 192 PU!170】dismiss=fire=discharge「解雇する」、

    overcome=conquer=defeat「打ち勝つ」、predict=forecast=foretell=prophesy「予測する」、

    emphasize=stress「強調する」、fix=repair=mend「修理する」、

    found=establish「設立する」、exhibit=display=show「展示する」、

    refuse=decline=reject「拒絶する」(= turn down⇨935)、overlook=miss「見落とす」。

    参照: cannot〜too...「いくら…しても〜しすぎることはない」(⇨73)。

    参照: That''s why節(⇨370)。

    '
- id: sgi-006
  name: 重要同意語 — 動詞③
  category: 語い
  priority: P2
  notes: 'Theme 193。動詞の同意語ペア（続き）。

    PU!171: mention=remark「言う/述べる」、bother=trouble「困らせる」、

    rear=raise「育てる」(= bring up⇨900)、

    interrupt=disturb=interfere「邪魔する/中断させる」(= cut in on)、

    ensure=guarantee「確実にする/保証する」、

    see=tell=understand=comprehend「理解する/わかる」、

    conceal=hide「隠す」。

    注意: can tell that〜「〜ということがわかる」(see とほぼ同意)。

    注意: interrupt/disturb の紛らわしい選択肢 — interpret「通訳する」(問796)。

    '
- id: sgi-007
  name: 重要同意語 — 名詞①②
  category: 語い
  priority: P2
  notes: 'Theme 194+195統合。名詞の同意語ペアを問う語彙問題。

    【Theme 194 PU!172】approval=consent「承認」、menace=threat「脅威」、

    disease=illness=sickness「病気」、barrier=obstacle=hindrance「障害」、

    characteristic=feature=trait「特徴」、phase=stage「段階/局面」(⇨PU!166)、

    perspective=viewpoint=view「見方/観点」、scarcity=shortage=insufficiency「不足」。

    PU!172追加: fame=reputation「名声」、capacity=ability=faculty「能力」。

    【Theme 195 PU!173】consequence=significance=importance「重要さ」、

    site=location=lot「用地」、accomplishment=achievement「達成/業績」、

    evidence=proof「証拠」、benefit=advantage「利点」、scheme=plan「計画」。

    PU!173追加: destiny=fate=doom「運命」、purpose=aim=object「目的」。

    注意: consequence「結果(=result)/影響(=effect)」の意味も重要。

    語法: of consequence「重要な」= of+抽象名詞=形容詞(⇨710)。

    語法: make A for B「BにとってAになる」(= make BA)。

    語法: hold A (to be) B「AをBと考える/みなす」(問811)。

    参照: stage「段階」(⇨PU!166)。

    '
- id: sgi-008
  name: 重要同意語 — 形容詞①②
  category: 語い
  priority: P2
  notes: 'Theme 196+197統合。形容詞の同意語ペアを問う語彙問題。

    【Theme 196 PU!174】accurate=precise「正確な」、

    indispensable=essential=necessary「不可欠な」、

    obvious=clear=evident「明白な」、decent=respectable「まともな/きちんとした」、

    enormous=immense=huge「巨大な」、elaborate=complicated=complex「凝った/複雑な」、

    sufficient=enough=adequate「十分な」。

    PU!174追加: incredible=unbelievable「信じられない」。

    【Theme 197 PU!175】potential=possible「可能性のある/潜在的な」、

    abundant=plentiful=ample「豊富な」、urgent=pressing「緊急の」、

    sacred=holy「神聖な」、crucial=vital=decisive「きわめて重要な」、

    major=principal=main「主要な」、suitable=appropriate=proper=fit「適切な」、

    fundamental=basic「基本的な」、fragile=breakable=delicate「壊れやすい」。

    PU!175追加: cruel=brutal=heartless「残酷な」。

    注意: decent=respectable「（社会的に）まともな」。respectableは「尊敬」の意味は薄れている(⇨874)。

    注意: sufficient/enough/adequate は「あり余るほど」ではなく「必要を満たすのに十分な」。

    '
- id: sgi-009
  name: 重要同意語 — 形容詞③
  category: 語い
  priority: P3
  notes: 'Theme 198。形容詞の同意語ペア（続き）。

    PU!176: awful=terrible「ひどい/おそろしい」、courageous=brave「勇敢な」、

    rare=uncommon「まれな/珍しい」。

    〈重要〉terrible vs terrific: terrible「とても悪い」⇔ terrific「すばらしい」（反対の意味）。

    a terrific actor「すばらしい俳優」。

    〈重要〉rare vs curious: rare「まれな（貴重さを含む）」≠ curious「珍奇な/奇妙な」。

    a curious incident「奇妙な出来事」。

    '
- id: sgi-010
  name: 重要同意語 — 副詞
  category: 語い
  priority: P2
  notes: 'Theme 199。副詞の同意語ペアを問う語彙問題。

    PU!177: deliberately=intentionally「故意に/わざと」(= on purpose⇨1207)、

    practically=virtually=almost「ほとんど/事実上」、

    eventually=finally「結局は/ついに」(= in the end)、

    initially=originally「最初は」(= at first⇨1240)。

    PU!177追加: approximately=roughly「おおよそ」。

    参照: on purpose(⇨1207)、at first(⇨1240)。

    '
