check_points:
- node_id: sgi-005
  seq: 1
  question: acquire〜と同意の動詞を3つ挙げよ。
  answer: obtain, gain, get。「得る/身につける」の意味。
- node_id: sgi-005
  seq: 2
  question: vanishとdisappearの共通の意味は？banの同意語は？
  answer: vanish=disappear「（急に）消える」。ban=prohibit=forbid「禁止する」。
- node_id: sgi-005
  seq: 3
  question: refuse〜=decline〜の意味は？他に同意のイディオムは？
  answer: 「拒絶する」。turn down〜も同意(⇨935)。rejectも可。
- node_id: sgi-005
  seq: 4
  question: overlook〜=miss〜の意味は？overlookの他の意味と区別できるか？
  answer: 「見落とす」の意味。overlookには「見渡す/大目に見る」の意味もある。
- node_id: sgi-006
  seq: 1
  question: rear〜と同意の動詞を2つ挙げよ。
  answer: raise, bring up。「育てる」の意味。
- node_id: sgi-006
  seq: 2
  question: interrupt〜=disturb〜の意味は？紛らわしい語interpretとの違いは？
  answer: 「邪魔する/中断させる」。interpret「通訳する/解釈する」とは全く別の意味。
- node_id: sgi-006
  seq: 3
  question: I could see/tell that〜の形での共通の意味は？
  answer: 「〜ということがわかる」。see=tell=understand=comprehend（理解する）。
- node_id: sgi-007
  seq: 1
  question: barrier=obstacle=hindranceの共通の意味は？
  answer: 「障害」。
- node_id: sgi-007
  seq: 2
  question: consequenceの2つの主要な意味は？of consequenceはどういう意味か？
  answer: ①重要さ(=significance)、②結果(=result)/影響(=effect)。of consequenceは「重要な」（of+抽象名詞=形容詞）。
- node_id: sgi-007
  seq: 3
  question: evidence=proofの意味は？witnessとの違いは？
  answer: 「証拠」。witness「目撃者」は人を指し、evidence/proofは証拠そのもの。
- node_id: sgi-007
  seq: 4
  question: phase=stageの意味は？stageの注意すべき意味は？
  answer: 「段階/局面」。stageは「舞台」よりも「変化・発達の段階」の意味が重要(⇨PU!166)。
- node_id: sgi-008
  seq: 1
  question: indispensable=essential=necessaryの共通の意味は？
  answer: 「不可欠な/絶対必要な」。
- node_id: sgi-008
  seq: 2
  question: sufficient/enough/adequateの共通する意味と注意点は？
  answer: 「十分な」。ただし「あり余るほど」ではなく「必要を満たすのに十分な/足りるだけの」という意味。
- node_id: sgi-008
  seq: 3
  question: crucial=vitalの意味は？decisiveとの関係は？
  answer: 「きわめて重要な/決定的な」。decisive「決定的な」も同意。
- node_id: sgi-008
  seq: 4
  question: decent=respectableの意味は？respectableに「尊敬」の意味はあるか？
  answer: 「（社会的に）まともな/きちんとした」。respectableは「尊敬」の意味は薄れている(⇨874)。
- node_id: sgi-009
  seq: 1
  question: terribleとterrificは同意語か反意語か？それぞれの意味は？
  answer: 反意語。terrible「とても悪い/おそろしい」⇔ terrific「すばらしい」。
- node_id: sgi-009
  seq: 2
  question: courageous=braveの共通の意味は？
  answer: 「勇気のある/勇敢な」。
- node_id: sgi-009
  seq: 3
  question: rareとcuriousの違いは？rareの同意語は？
  answer: rare「まれな/珍しい（貴重さを含む）」=uncommon。curious「珍奇な/奇妙な」は意味が異なる。
- node_id: sgi-010
  seq: 1
  question: deliberately=intentionallyの意味は？同意のイディオムは？
  answer: 「故意に/わざと」。on purpose(⇨1207)も同意。
- node_id: sgi-010
  seq: 2
  question: practically=virtuallyの意味は？他の同意語は？
  answer: 「ほとんど/事実上」。almostも同意。
- node_id: sgi-010
  seq: 3
  question: eventually=finallyの意味は？initiallyとの関係は？
  answer: 「結局は/ついに」(=in the end)。initially=originally「最初は」(=at first)は反対の時点を表す。
