check_points:
  - node_id: "sgh-001"
    seq: 1
    question: "discuss の後ろに about は必要か？"
    answer: "不要。discuss は他動詞用法のみなので前置詞なしで目的語を直接とる（×discuss about）。"
  - node_id: "sgh-001"
    seq: 2
    question: "apologize の後ろに人と理由を続けるとき、どの前置詞を使うか？"
    answer: "apologize to A for B。謝る相手には to、理由には for。"
  - node_id: "sgh-001"
    seq: 3
    question: "marry の3つの語法を書け。"
    answer: "(1) A marry B (2) A get/is married to B (3) A and B get/are married"
  - node_id: "sgh-001"
    seq: 4
    question: "hope の後ろに名詞を続けるとき、前置詞は何が必要か？"
    answer: "for が必要。hope for ~「~を望む」。hope は名詞が続くとき自動詞用法。"
  - node_id: "sgh-001"
    seq: 5
    question: "「〜を卒業する」は英語で何というか？"
    answer: "graduate from ~。graduate は自動詞用法なので from が必要。"
  - node_id: "sgh-002"
    seq: 1
    question: "lie（横たわる）の活用を書け。"
    answer: "lie - lay - lain - lying。自動詞。過去形 lay は他動詞 lay の原形と同形なので注意。"
  - node_id: "sgh-002"
    seq: 2
    question: "lay（横たえる）の活用を書け。"
    answer: "lay - laid - laid - laying。他動詞。後ろに目的語が来る。"
  - node_id: "sgh-002"
    seq: 3
    question: "rise と raise の違いは何か？"
    answer: "rise は自動詞「上がる/昇る」(rise-rose-risen)、raise は他動詞「〜を上げる」(raise-raised-raised)。後ろに目的語があれば raise。"
  - node_id: "sgh-002"
    seq: 4
    question: "lie には同形の別動詞があるが何か？活用は？"
    answer: "lie「うそをつく」(= tell a lie)。活用は規則的: lie - lied - lied - lying。"
  - node_id: "sgh-003"
    seq: 1
    question: "enjoy の後ろは doing と to do のどちらか？覚え方は？"
    answer: "doing のみ。「メガフェップスはデカイ」(mind/miss/enjoy/give up/admit/finish/escape/postpone(put off)/stop/suggest/deny/evade/consider/avoid/imagine)で暗記。"
  - node_id: "sgh-003"
    seq: 2
    question: "decide の後ろは doing と to do のどちらか？不定詞をとる動詞の特徴は？"
    answer: "to do のみ。不定詞の to は「行きつく先/方向」→「これから〜しよう」という意欲・意図を表す積極的な動詞が多い。"
  - node_id: "sgh-003"
    seq: 3
    question: "remember doing と remember to do の違いは？"
    answer: "doing = 過去「〜したことを覚えている」。to do = 未来「忘れずに〜する」。forget/regret も同パターン。"
  - node_id: "sgh-003"
    seq: 4
    question: "need doing はどういう意味か？"
    answer: "「〜される必要がある」(= need to be done)。動名詞が受動的意味を持つ。want doing / deserve doing も同パターン。"
  - node_id: "sgh-003"
    seq: 5
    question: "not fail to do と never fail to do の違いは？"
    answer: "どちらも「必ず〜する」。not fail to do は1回限りの特定の行為、never fail to do は習慣的な行為に用いる。"
  - node_id: "sgh-004"
    seq: 1
    question: "rob と steal の構文の違いは？"
    answer: "rob A(人・場所) of B(物) / steal B(物) from A(場所)。rob の目的語は人・場所、steal の目的語は物。"
  - node_id: "sgh-004"
    seq: 2
    question: "remind A of B の意味は？追加の用法は？"
    answer: "「AにBを思い出させる」。無生物主語で頻出。追加用法: remind A to do / remind A that〜。"
  - node_id: "sgh-004"
    seq: 3
    question: "convince A of B の受動態は？"
    answer: "A is convinced of B「AはBを確信している」(= A is sure of B)。"
  - node_id: "sgh-004"
    seq: 4
    question: "「分離・剥奪の of」を使う動詞を3つ挙げよ。"
    answer: "rob A of B / deprive A of B / relieve A of B。cure A of B / clear A of B も同パターン。"
  - node_id: "sgh-005"
    seq: 1
    question: "regard A as B の as は何を意味するか？"
    answer: "「〜（である）と / 〜として」の意味。Bは名詞・形容詞。A = Bの補語的関係。"
  - node_id: "sgh-005"
    seq: 2
    question: "refer to A as B の受動態は？"
    answer: "A is referred to as B「AはBと呼ばれている」。to を忘れないこと。"
  - node_id: "sgh-005"
    seq: 3
    question: "regard A as B と同じ意味のパターンを4つ挙げよ。"
    answer: "look on/upon A as B / think of A as B / see/view A as B / consider A (to be) B。"
  - node_id: "sgh-006"
    seq: 1
    question: "prevent A from doing の同意表現は？"
    answer: "keep/stop/hinder A from doing。keep/stop のほうが口語的。"
  - node_id: "sgh-006"
    seq: 2
    question: "discourage A from doing の反意表現は？"
    answer: "encourage A to do「Aが〜するよう励ます/促す」。前置詞パターンが異なることに注意。"
  - node_id: "sgh-006"
    seq: 3
    question: "distinguish A from B の3つの言い換えは？"
    answer: "distinguish between A and B / tell A from B / know A from B。know は Do you know...? の形（×Can you know）。"
  - node_id: "sgh-007"
    seq: 1
    question: "provide A with B を書き換えると？"
    answer: "provide B for [to] A。目的語がBの場合、前置詞が for/to に変わる。supply も同パターン。"
  - node_id: "sgh-007"
    seq: 2
    question: "blame A for B と accuse A of B の前置詞の違いは？"
    answer: "blame は for、accuse は of。意味はほぼ同じ「責める/非難する」だが前置詞が異なるため入試頻出。"
  - node_id: "sgh-007"
    seq: 3
    question: "talk A into doing の反意表現は？"
    answer: "talk A out of doing「Aを説得して〜するのをやめさせる」。persuade も同パターン。"
  - node_id: "sgh-007"
    seq: 4
    question: "present A with B の受動態は？"
    answer: "A is presented with B「AはBを贈られる」。"
  - node_id: "sgh-008"
    seq: 1
    question: "cost A B の意味は？"
    answer: "「AにB（犠牲・損失・費用）を払わせる」。It costs A B to do「Aが〜するのにBがかかる」も重要。"
  - node_id: "sgh-008"
    seq: 2
    question: "explain はSVOOをとれるか？正しい語順は？"
    answer: "とれない。explain B to A の形にする。×explain me it → ○explain it to me。"
  - node_id: "sgh-008"
    seq: 3
    question: "explain の目的語がthat節のとき語順はどうなるか？"
    answer: "explain to A that〜。目的語が長い場合は to A を先に置く。wh-節も同様。"
  - node_id: "sgh-008"
    seq: 4
    question: "spare A B の2つの意味は？"
    answer: "(1)「AにB（時間）をさく」(= spare B for A)。(2)「AのB（手間）を省く」(= save A B)。"
  - node_id: "sgh-009"
    seq: 1
    question: "SVCのCに来るのは形容詞か副詞か？"
    answer: "形容詞[分詞]。副詞は不可。keep quiet(○) / keep quietly(×)。"
  - node_id: "sgh-009"
    seq: 2
    question: "go wrong / go bad の go+形容詞はどんな変化を表すか？"
    answer: "好ましくない状態への変化。go bad「腐る」/ go bankrupt「破産する」。"
  - node_id: "sgh-009"
    seq: 3
    question: "come true の come+形容詞はどんな変化を表すか？"
    answer: "好ましい状態への変化。come alive「生き生きとする」/ come right「うまくいく」。"
  - node_id: "sgh-009"
    seq: 4
    question: "find O C の意味は？"
    answer: "「OがCだとわかる/OをCだと思う」。O=Cの関係が成立。discoverは人を目的語にとるので不可。"
  - node_id: "sgh-010"
    seq: 1
    question: "suggest/hope はSVO to doの形をとれるか？"
    answer: "とれない。suggestはthat節、hopeはhope for A to doの形。"
  - node_id: "sgh-010"
    seq: 2
    question: "get A to doと同義のSVO do形式の表現は？"
    answer: "have A do。get A to do = have A do「Aに〜させる/してもらう」。"
  - node_id: "sgh-010"
    seq: 3
    question: "force A to doと同義のSVO do形式の表現は？"
    answer: "make A do。force[compel/oblige] A to do = make A do「強制的にAに〜させる」。"
  - node_id: "sgh-010"
    seq: 4
    question: "cause A to doの主語は何が多いか？"
    answer: "無生物主語（原因を表す）。「（主語が原因で）Aに〜させる/Aは〜する」。"
  - node_id: "sgh-011"
    seq: 1
    question: "make A doとlet A doの強制力の違いは？"
    answer: "make=「強制的に〜させる」、let=「望み通り[勝手に]〜させる」。have A doはその中間で「当然の立場の人に〜してもらう」。"
  - node_id: "sgh-011"
    seq: 2
    question: "see A doとsee A doingの違いは？"
    answer: "do=動作の始めから終わりまで全体を見る。doing=動作の途中[部分]を見る。"
  - node_id: "sgh-011"
    seq: 3
    question: "have A doneの3つの意味は？"
    answer: "(1)使役「Aを〜してもらう」(2)被害「Aを〜される」(3)完了「（自分が）Aを〜してしまう」。get A doneも同様。"
  - node_id: "sgh-011"
    seq: 4
    question: "make oneself understoodの意味は？"
    answer: "「自分の考え[言うこと]を人に理解してもらう」。make A doneの成句表現。make oneself heardも同類。"
  - node_id: "sgh-011"
    seq: 5
    question: "find A doは正しいか？"
    answer: "正しくない(×)。find A doing/doneの形のみ。catch A doingも同様にdoは不可。"
  - node_id: "sgh-012"
    seq: 1
    question: "keep A doing/doneとleave A doing/doneの違いは？"
    answer: "keep=「意図的に〜の状態にしておく」、leave=「〜の状態のまま放置する」。"
  - node_id: "sgh-012"
    seq: 2
    question: "keep A waitingはどんな意味？"
    answer: "「Aを待たせておく」。keep A doingの最頻出形。I'm sorry to have kept you waiting.が定番。"
  - node_id: "sgh-012"
    seq: 3
    question: "leave A doneの例としてleave A closedはどう訳すか？"
    answer: "「Aを閉じたままにしておく（放置する）」。目的語Aとcloseの受動関係からdoneを選ぶ。"
  - node_id: "sgh-013"
    seq: 1
    question: "suggest that S ( ) + 原形の( )に入る語は？"
    answer: "should（省略可、その場合は原形のみ）。提案・要求・命令の動詞のthat節中で用いる。"
  - node_id: "sgh-013"
    seq: 2
    question: "insist/demandはthat節で原形を用いるか？"
    answer: "「要求」の意味の場合は原形/should+原形を用いる。insistが「主張」の意味の場合は通常の時制。"
  - node_id: "sgh-013"
    seq: 3
    question: "suggestを「遠回しに言う」の意味で使う場合、that節の動詞はどうなるか？"
    answer: "通常の時制を用いる。He suggested that I was wrong.(○) / that I (should) be wrong.(×)"
  - node_id: "sgh-013"
    seq: 4
    question: "that節で原形を用いる動詞を6つ挙げよ。"
    answer: "suggest[propose]/order[command]/demand[require]/advise/insist/recommend。"
  - node_id: "sgh-014"
    seq: 1
    question: "tell/say/speak/talkのうち、人を目的語にとれるのはどれか？"
    answer: "tellのみ。tell A about B / tell A that節 / tell A to doの形。"
  - node_id: "sgh-014"
    seq: 2
    question: "say me thatは正しいか？"
    answer: "正しくない。sayは人を目的語にとれない。tell me thatが正しい。"
  - node_id: "sgh-014"
    seq: 3
    question: "speakが他動詞として使える場合の目的語は？"
    answer: "言語に限られる。speak English / speak a word。それ以外は自動詞。"
  - node_id: "sgh-014"
    seq: 4
    question: "talk about AとdiscussはAの文法的な違いは？"
    answer: "talkは自動詞（talk about A）、discussは他動詞（discuss A / ×discuss about A）。"
  - node_id: "sgh-015"
    seq: 1
    question: "borrowとlendの意味の違いは？"
    answer: "borrow=「（無料で）借りる」、lend=「（無料で）貸す」。方向が逆。"
  - node_id: "sgh-015"
    seq: 2
    question: "家やアパートを借りる場合に使う動詞は？"
    answer: "rent。有料の貸借に使う。borrow/lendは無料の貸借。"
  - node_id: "sgh-015"
    seq: 3
    question: "トイレを借りたい場合、Can I borrow the bathroom?は正しいか？"
    answer: "正しくない。移動不可能なものにはuseを使う。Can I use the bathroom?が正しい。"
  - node_id: "sgh-016"
    seq: 1
    question: "forgiveとpermitの意味の違いは？"
    answer: "forgive=「すでに犯した罪・過ちを許す」（forgive A for B）。permit=「これからあることをする許可を与える」（permit A to do）。"
  - node_id: "sgh-016"
    seq: 2
    question: "forgive/excuseはSVO to doの形をとれるか？"
    answer: "とれない。forgive A for B / excuse A for Bの形。SVO to doはpermit/allowのみ。"
  - node_id: "sgh-016"
    seq: 3
    question: "admitの2つの意味は？"
    answer: "(1)「（仕方なく）〜と認める」admit that〜。(2)「（入ること）を認める/許す」admit A into B。"
  - node_id: "sgh-017"
    seq: 1
    question: "doubt that節とsuspect that節の意味はどう違うか？"
    answer: "doubt=「〜ではないと思う」(that節の内容を否定)。suspect=「〜だと思う」(that節の内容を肯定)。"
  - node_id: "sgh-017"
    seq: 2
    question: "doubt if/whether節の意味は？"
    answer: "「〜かどうか疑わしく思う」。doubt肯定文ではif/whether節、doubt that節は「強い不信」。"
  - node_id: "sgh-017"
    seq: 3
    question: "I am doubting / I am suspectingは正しいか？"
    answer: "正しくない。doubt/suspectは心理状態動詞なので進行形不可。"
  - node_id: "sgh-018"
    seq: 1
    question: "These shoes don't match me.は正しいか？"
    answer: "正しくない。match/go withは物同士の調和で、人を目的語にとれない。match my suitなどが正しい。"
  - node_id: "sgh-018"
    seq: 2
    question: "suitとfitの違いは？"
    answer: "suit=「色・スタイルが似合う」、fit=「サイズ・形が合う」。どちらもBは人。"
  - node_id: "sgh-018"
    seq: 3
    question: "go withとmatchの関係は？"
    answer: "ほぼ同義。A go with B = A match B「A(物)がB(別の物)に合う/調和する」。"

