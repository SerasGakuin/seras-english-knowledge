check_points:
  - node_id: "sgh-001"
    seq: 1
    question: "discuss の後ろに about は必要か？"
    answer: "不要。discuss は他動詞用法のみなので前置詞なしで目的語を直接とる（×discuss about）。"
  - node_id: "sgh-001"
    seq: 2
    question: "apologize の後ろに人と理由を続けるとき、どの前置詞を使うか？"
    answer: "apologize to A for B。謝る相手には to、理由には for。"
  - node_id: "sgh-001"
    seq: 3
    question: "marry の3つの語法を書け。"
    answer: "(1) A marry B (2) A get/is married to B (3) A and B get/are married"
  - node_id: "sgh-001"
    seq: 4
    question: "hope の後ろに名詞を続けるとき、前置詞は何が必要か？"
    answer: "for が必要。hope for ~「~を望む」。hope は名詞が続くとき自動詞用法。"
  - node_id: "sgh-001"
    seq: 5
    question: "「〜を卒業する」は英語で何というか？"
    answer: "graduate from ~。graduate は自動詞用法なので from が必要。"
  - node_id: "sgh-002"
    seq: 1
    question: "lie（横たわる）の活用を書け。"
    answer: "lie - lay - lain - lying。自動詞。過去形 lay は他動詞 lay の原形と同形なので注意。"
  - node_id: "sgh-002"
    seq: 2
    question: "lay（横たえる）の活用を書け。"
    answer: "lay - laid - laid - laying。他動詞。後ろに目的語が来る。"
  - node_id: "sgh-002"
    seq: 3
    question: "rise と raise の違いは何か？"
    answer: "rise は自動詞「上がる/昇る」(rise-rose-risen)、raise は他動詞「〜を上げる」(raise-raised-raised)。後ろに目的語があれば raise。"
  - node_id: "sgh-002"
    seq: 4
    question: "lie には同形の別動詞があるが何か？活用は？"
    answer: "lie「うそをつく」(= tell a lie)。活用は規則的: lie - lied - lied - lying。"
  - node_id: "sgh-003"
    seq: 1
    question: "enjoy の後ろは doing と to do のどちらか？覚え方は？"
    answer: "doing のみ。「メガフェップスはデカイ」(mind/miss/enjoy/give up/admit/finish/escape/postpone(put off)/stop/suggest/deny/evade/consider/avoid/imagine)で暗記。"
  - node_id: "sgh-003"
    seq: 2
    question: "decide の後ろは doing と to do のどちらか？不定詞をとる動詞の特徴は？"
    answer: "to do のみ。不定詞の to は「行きつく先/方向」→「これから〜しよう」という意欲・意図を表す積極的な動詞が多い。"
  - node_id: "sgh-003"
    seq: 3
    question: "remember doing と remember to do の違いは？"
    answer: "doing = 過去「〜したことを覚えている」。to do = 未来「忘れずに〜する」。forget/regret も同パターン。"
  - node_id: "sgh-003"
    seq: 4
    question: "need doing はどういう意味か？"
    answer: "「〜される必要がある」(= need to be done)。動名詞が受動的意味を持つ。want doing / deserve doing も同パターン。"
  - node_id: "sgh-003"
    seq: 5
    question: "not fail to do と never fail to do の違いは？"
    answer: "どちらも「必ず〜する」。not fail to do は1回限りの特定の行為、never fail to do は習慣的な行為に用いる。"
  - node_id: "sgh-004"
    seq: 1
    question: "rob と steal の構文の違いは？"
    answer: "rob A(人・場所) of B(物) / steal B(物) from A(場所)。rob の目的語は人・場所、steal の目的語は物。"
  - node_id: "sgh-004"
    seq: 2
    question: "remind A of B の意味は？追加の用法は？"
    answer: "「AにBを思い出させる」。無生物主語で頻出。追加用法: remind A to do / remind A that〜。"
  - node_id: "sgh-004"
    seq: 3
    question: "convince A of B の受動態は？"
    answer: "A is convinced of B「AはBを確信している」(= A is sure of B)。"
  - node_id: "sgh-004"
    seq: 4
    question: "「分離・剥奪の of」を使う動詞を3つ挙げよ。"
    answer: "rob A of B / deprive A of B / relieve A of B。cure A of B / clear A of B も同パターン。"
  - node_id: "sgh-005"
    seq: 1
    question: "regard A as B の as は何を意味するか？"
    answer: "「〜（である）と / 〜として」の意味。Bは名詞・形容詞。A = Bの補語的関係。"
  - node_id: "sgh-005"
    seq: 2
    question: "refer to A as B の受動態は？"
    answer: "A is referred to as B「AはBと呼ばれている」。to を忘れないこと。"
  - node_id: "sgh-005"
    seq: 3
    question: "regard A as B と同じ意味のパターンを4つ挙げよ。"
    answer: "look on/upon A as B / think of A as B / see/view A as B / consider A (to be) B。"
  - node_id: "sgh-006"
    seq: 1
    question: "prevent A from doing の同意表現は？"
    answer: "keep/stop/hinder A from doing。keep/stop のほうが口語的。"
  - node_id: "sgh-006"
    seq: 2
    question: "discourage A from doing の反意表現は？"
    answer: "encourage A to do「Aが〜するよう励ます/促す」。前置詞パターンが異なることに注意。"
  - node_id: "sgh-006"
    seq: 3
    question: "distinguish A from B の3つの言い換えは？"
    answer: "distinguish between A and B / tell A from B / know A from B。know は Do you know...? の形（×Can you know）。"
  - node_id: "sgh-007"
    seq: 1
    question: "provide A with B を書き換えると？"
    answer: "provide B for [to] A。目的語がBの場合、前置詞が for/to に変わる。supply も同パターン。"
  - node_id: "sgh-007"
    seq: 2
    question: "blame A for B と accuse A of B の前置詞の違いは？"
    answer: "blame は for、accuse は of。意味はほぼ同じ「責める/非難する」だが前置詞が異なるため入試頻出。"
  - node_id: "sgh-007"
    seq: 3
    question: "talk A into doing の反意表現は？"
    answer: "talk A out of doing「Aを説得して〜するのをやめさせる」。persuade も同パターン。"
  - node_id: "sgh-007"
    seq: 4
    question: "present A with B の受動態は？"
    answer: "A is presented with B「AはBを贈られる」。"
  - node_id: "sgh-008"
    seq: 1
    question: "cost A B の意味は？"
    answer: "「AにB（犠牲・損失・費用）を払わせる」。It costs A B to do「Aが〜するのにBがかかる」も重要。"
  - node_id: "sgh-008"
    seq: 2
    question: "explain はSVOOをとれるか？正しい語順は？"
    answer: "とれない。explain B to A の形にする。×explain me it → ○explain it to me。"
  - node_id: "sgh-008"
    seq: 3
    question: "explain の目的語がthat節のとき語順はどうなるか？"
    answer: "explain to A that〜。目的語が長い場合は to A を先に置く。wh-節も同様。"
  - node_id: "sgh-008"
    seq: 4
    question: "spare A B の2つの意味は？"
    answer: "(1)「AにB（時間）をさく」(= spare B for A)。(2)「AのB（手間）を省く」(= save A B)。"

