check_points:
  - node_id: "sid-001"
    seq: 1
    question: "break out / break down / break up はそれぞれ何を意味するか？"
    answer: "break out「（戦争・火災が）勃発する」、break down「（車・機械が）故障する」、break up「（会議・関係が）終わる」。"
  - node_id: "sid-001"
    seq: 2
    question: "come about の他動詞表現は何か？"
    answer: "bring about〜「〜を引き起こす」。come about⇔bring about、come out⇔bring out、come to an end⇔bring〜to an end、come to light⇔bring〜to light。"
  - node_id: "sid-001"
    seq: 3
    question: "turn out (to be)〜 はどういう意味か？"
    answer: "「〜であることがわかる」（= prove (to be)）。"
  - node_id: "sid-001"
    seq: 4
    question: "take off の自動詞用法と他動詞用法をそれぞれ述べよ。"
    answer: "自動詞: 「（飛行機が）離陸する」(⇔land)。他動詞: 「（服を）脱ぐ」(⇔put on)、「（期間の）休みをとる」(take a day off)。"
  - node_id: "sid-002"
    seq: 1
    question: "「動詞+副詞」型の他動詞で、目的語が代名詞の場合の語順ルールは？"
    answer: "必ず「動詞+代名詞+副詞」の語順（例: look it up ○、look up it ×）。名詞なら両方の語順が可能。"
  - node_id: "sid-002"
    seq: 2
    question: "pick up〜の主な3つの意味は？"
    answer: "①車で迎えに行く ②（言語・知識を）身につける ③手に入れる/買う。「選ぶ」の意味はなく、それはpick out。"
  - node_id: "sid-002"
    seq: 3
    question: "take in〜 の2つの意味は？"
    answer: "①〜を理解する（= understand）②〜をだます（= deceive）。"
  - node_id: "sid-003"
    seq: 1
    question: "put on〜 と take off〜 はどのような反意関係か？"
    answer: "put on〜「〜を着る/身につける」⇔ take off〜「〜を脱ぐ」。PU!189: on/offは反意表現をつくる（get on⇔get off、turn on⇔turn off）。"
  - node_id: "sid-003"
    seq: 2
    question: "turn down〜 の2つの意味は？"
    answer: "①「〜を拒絶する」（= refuse/reject）②「（音量など）を小さくする」（⇔ turn up）。"
  - node_id: "sid-003"
    seq: 3
    question: "hand in〜 と turn in〜 の違いは？"
    answer: "どちらも「〜を提出する」（= submit）。hand in/give in《英》は手渡し提出、send inは郵送提出、turn in《米》はどちらの場合にも使える。"
  - node_id: "sid-004"
    seq: 1
    question: "account for〜 の2つの意味は？"
    answer: "①（人が）〜の理由を説明する（= explain）②〜（の割合）を占める。どちらも入試頻出。"
  - node_id: "sid-004"
    seq: 2
    question: "insist on / persist in / stick to に共通する意味と、各動詞の前置詞の違いは？"
    answer: "すべて「固執する/主張する」の意味。insistはon、persistはin、stick[cling]はto。"
  - node_id: "sid-004"
    seq: 3
    question: "result in〜 と result from〜 の因果関係の違いは？"
    answer: "result in〜「〜という結果になる」（A→結果B）、result from〜「〜の結果として起こる」（原因B→A）。A result from B = B result in A。"
  - node_id: "sid-005"
    seq: 1
    question: "「頼る」を表す4つの群動詞は？"
    answer: "depend on[upon]〜 / rely on[upon]〜 / count on[upon]〜 / turn[look] to〜。いずれも A (for B)「（Bを）Aに頼る」の形をとる。"
  - node_id: "sid-005"
    seq: 2
    question: "agree with〜 と agree to〜 の違いは？"
    answer: "agree with〜「（人）と意見が一致する/（食べ物が）合う」、agree to〜「（計画・提案に）同意する/承諾する」。"
  - node_id: "sid-005"
    seq: 3
    question: "apply for〜 と apply to〜 の違いは？"
    answer: "apply for〜「〜を申し込む」（= ask for）、apply to〜「（規則などが）〜に当てはまる」（= be true of）。"
  - node_id: "sid-006"
    seq: 1
    question: "succeed in〜 と succeed to〜 の違いは？"
    answer: "succeed in〜「〜に成功する」（succeed in doing = manage to do）。succeed to〜「〜を相続する/〜のあとを継ぐ」（= inherit/take over）。"
  - node_id: "sid-006"
    seq: 2
    question: "occur to〜 と hit on〜 の主語の違いは？"
    answer: "occur to〜: 考え・アイデアが主語で「人の心に浮かぶ」（It occurs to A that節）。hit on〜: 人が主語で「〜を思いつく」。A good idea occurred to me. = I hit on a good idea."
  - node_id: "sid-006"
    seq: 3
    question: "do without〜 と dispense with〜 はどちらも同じ意味だが、前置詞の違いは？"
    answer: "do without〜 / dispense with〜。どちらも「〜なしですます」だが、doはwithout、dispenseはwithを用いる。"
  - node_id: "sid-007"
    seq: 1
    question: "put up with〜 の同意表現を4つ挙げよ。"
    answer: "endure / stand / bear / tolerate。すべて「〜を我慢する」の意味。"
  - node_id: "sid-007"
    seq: 2
    question: "look up to〜 と look down on〜 はそれぞれ何を意味するか？"
    answer: "look up to〜「〜を尊敬する」（= respect）、look down on[upon]〜「〜を見下す」（= despise）。"
  - node_id: "sid-007"
    seq: 3
    question: "end up の後にはどのような形が続くか？"
    answer: "(by) doing「最後には〜することになる」のほか、in「〜に」/ as「〜として」/ with「〜で」などが続く。He ended up (as) a lawyer [in hospital]."
  - node_id: "sid-008"
    seq: 1
    question: "congratulate と celebrate の目的語の違いは？"
    answer: "congratulate A on B: Aは「人」、Bは「成功・幸運」。celebrate: 目的語は「特別な日・祝い事」であり「人」ではない。"
  - node_id: "sid-008"
    seq: 2
    question: "owe A to B の2つの意味は？"
    answer: "①AはBのおかげである ②A（金）をBに借りている。"
  - node_id: "sid-008"
    seq: 3
    question: "devote A to B / devote oneself to〜 はどういう意味か？"
    answer: "devote A to B「A（努力・時間）をBにささげる」。devote oneself to〜 = be devoted to〜「〜に専念する」。"
  - node_id: "sid-009"
    seq: 1
    question: "take pride in〜 / be proud of〜 / pride oneself on〜 の前置詞の違いは？"
    answer: "pride(名詞)→in、proud(形容詞)→of、pride(動詞)→on。すべて「〜を誇りに思う」の意味。"
  - node_id: "sid-009"
    seq: 2
    question: "give rise to / give birth to / give way to はそれぞれ何を意味するか？"
    answer: "give rise to〜「〜を引き起こす」、give birth to〜「〜を産む」（/引き起こす）、give way to〜「〜に屈する」（give wayのみ=「崩れる」）。"
  - node_id: "sid-009"
    seq: 3
    question: "take A into account と take A into consideration の同意表現は？"
    answer: "take account of〜 / allow for〜 / consider。すべて「〜を考慮に入れる」。"
  - node_id: "sid-010"
    seq: 1
    question: "have words (with〜) と have a word with〜 の違いは？"
    answer: "have words (with〜)「（〜と）口論する」（= quarrel）。have a word with〜「〜とちょっと話をする」。aの有無で意味が全く異なる。"
  - node_id: "sid-010"
    seq: 2
    question: "pull one's leg の正しい意味は？"
    answer: "「〜をからかう」（= tease/ridicule）。「足を引っ張る/邪魔する」の意味では用いない。"
  - node_id: "sid-010"
    seq: 3
    question: "make up one's mind の後にはどのような形が続くか？"
    answer: "wh-節（what to order）、to do、that節、about[on]+名詞。すべて「〜を決心する」（= decide）。"
  - node_id: "sid-010"
    seq: 4
    question: "keep early hours ⇔ keep late hours は何を意味するか？"
    answer: "keep early[good] hours「早寝早起きをする」⇔ keep late[bad] hours「夜ふかしをする」。keep regular hours「規則正しい生活をする」もある。"
  - node_id: "sid-011"
    seq: 1
    question: "run short of〜 と run out of〜 の違いは？"
    answer: "run short of〜「〜が不足する」（まだ完全になくなっていない、進行形が多い）。run out of〜「〜を使い果たす」（完全になくなる）。"
  - node_id: "sid-011"
    seq: 2
    question: "make it の主な意味を3つ挙げよ。"
    answer: "①成功する（= succeed）②（目的地に）たどり着く ③（日時の）都合をつける。itは漠然とした状況を指す。"
  - node_id: "sid-011"
    seq: 3
    question: "take it easy はどのような場面で用いるか？"
    answer: "①「気楽に考える/ゆっくりやる」（⇔ take it seriously「真剣に考える」）②別れの挨拶として用いる（'See you tomorrow.' 'Take it easy.'）。"

