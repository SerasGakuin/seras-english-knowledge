knowledge_nodes:
  - id: "sid-001"
    name: "動詞＋副詞 — 自動詞の働きをするもの①②"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 210+211統合。「動詞+副詞」で自動詞として働くイディオム。
      【Theme 210】show up/turn up「現れる」(=appear)、break out「勃発する」、break down「故障する」、break up「終わる/別れる」、come about「起こる」(=happen)、come out「出版される」(=be published)、come to「意識を取り戻す」(=become conscious。come to oneselfの省略形)、hold out「持ちこたえる/続く」(=last)、stand out「目立つ」。
      PU!187: 自動詞表現と他動詞表現を対にして覚える（come/bring）。come about⇔bring about、come out⇔bring out、come to an end⇔bring〜to an end、come to light⇔bring〜to light。
      プラスα: turn upには他動詞用法「（音量など）を大きくする」(⇔turn down⇨935)もある。break upには「（友情・関係が）終わる」の意味も。hold outには他動詞用法「〜を差し出す」もある。outstanding(形)「目立った/傑出した」。
      【Theme 211】turn out (to be)〜「〜であることがわかる」(=prove)、cut in/break in「口をはさむ」(=interrupt)、pass away「亡くなる」(=die)、stay up/sit up「寝ずに起きている」、watch out/look out「気をつける」、set in「（季節・天候が）始まる」、set out/set off「出発する」(=start)、go off「爆発する」(=explode)、take off「離陸する」(⇔land)、pull up「（車が）止まる」(=stop)。
      プラスα: watch [look] out for〜「〜に気をつける」。set out [off] for〜「〜に向けて出発する」。go offには「（銃が）発射される」「（警報が）鳴り出す」の意味も。take offには他動詞用法「（服を）脱ぐ」(⇔put on⇨923)もある。pull upには他動詞用法「（車を）止める」もある。
      慣句参照: Why not do?「〜してはどうですか」(⇨261)。in the long run「結局は」(⇨1222)。

  - id: "sid-002"
    name: "動詞＋副詞 — 他動詞の働きをするもの①②"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 212+213統合。「動詞+副詞」で他動詞として働くイディオム。
      【Theme 212】bring about〜「〜を引き起こす」(=cause。自動詞come about⇨883)、bring up〜「〜を育てる」(=raise/rear。自動詞grow upと混同注意)、make up〜「〜をでっち上げる」(=invent⇨740)、make out〜/figure out〜「〜を理解する」(=understand)、pick up〜「〜を車で迎えに行く/〜を身につける/〜を買う」、pick out〜「〜を選ぶ」(=select。和製英語ピックアップに注意)、give up〜「〜をあきらめる」(=abandon)、look up〜「〜を調べる」。
      PU!188: 「動詞+代名詞+副詞」の語順。目的語が代名詞の場合、必ず動詞と副詞の間に置く（look it up ○, look up it ×）。名詞ならどちらの語順も可。
      プラスα: grow up(自)「育つ」との比較。make upの自動詞用法「仲直りする/化粧する」。figure out〜=solve「〜を解決する」。pick up〜の3意味：①車で迎える ②（言語・知識を）身につける ③手に入れる/買う。give up doing「（悪習を）やめる」(⇨PU!96)。
      【Theme 213】carry out〜「〜を実行する」(=perform/accomplish)、carry on〜「〜を続ける」(=continue。carry on with〜も同意)、cut down〜「〜を減らす」(=reduce。cut down on〜も同意)、leave〜behind「〜を置き忘れる」、leave out〜「〜を除外する」(=omit)、rule out〜「〜を除外する/否定する」(=exclude)、take in〜「〜を理解する」(=understand)/「〜をだます」(=deceive)、take on〜「〜を引き受ける」(=undertake)/「〜を雇う」/「〜を帯びる」(=assume)、take over〜「〜を引き継ぐ」(=succeed to⇨997)、take up〜「〜を占める」(=occupy)/「〜を始める」、show off〜「〜を見せびらかす」(=display)。
      プラスα: carry it outの語順に注意(⇨PU!188)。take inの「だます」用法(He was taken in by the fraud.)。take onの「雇う」用法(The company took on five new employees.)。take upの「始める」用法(I'm thinking of taking up a new hobby.)。

  - id: "sid-003"
    name: "動詞＋副詞 — 他動詞の働きをするもの③④"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 214+215統合。「動詞+副詞」で他動詞として働くイディオム（続き）。
      【Theme 214】lay off〜「〜を一時解雇する」、put aside〜「〜を蓄える」(=save。put by/lay aside/set asideも同意)、put away〜「〜を片づける」(=tidy)/「〜を蓄える」(=put aside)、put off〜「〜を延期する」(=postpone)、put on〜「〜を着る」(⇔take off⇨897)、try on〜「〜を試着する」、wear out〜「〜を疲れ果てさせる/〜をすり減らす」、put down〜「〜を書き留める」(=write down)、hold back〜「（感情を）抑える」(=restrain)、set up〜「〜を設立する」(=establish)、see〜off「〜を見送る」(⇔meet)。
      PU!189: onとoffの反意表現。get on a bus⇔get off a bus、turn on⇔turn off、put on⇔take off。put off〜は「延期する」の意味で使うのがふつう。
      プラスα: put away〜の「蓄える」用法。hold backの自動詞用法「しり込みする」(=hesitate)。see〜offは名詞目的語でもsee her offの語順がふつう。
      【Theme 215】hand in〜/turn in〜「〜を提出する」(=submit)、turn on〜「〜をつける」/turn off〜「〜を消す」、put out〜「（火を）消す」(=extinguish。go outは自動詞「消える」)、turn down〜「〜を拒絶する」(=refuse/reject)/「（音量を）小さくする」(⇔turn up⇨879)、work out〜「〜を解く」(=solve)、keep up〜「〜を維持する」(=maintain)、call off〜「〜を中止する」(=cancel)、call up〜「〜に電話する」(=ring up)、let〜down「〜を失望させる」(=disappoint)、take off〜「（期間の）休みをとる」(take a day off)。
      プラスα: hand in/give in《英》は手渡し提出、send inは郵送提出、turn in《米》はどちらも。switch on[off]も「つける[消す]」の意味。work outの自動詞用法「うまくいく」。take offの3用法：①離陸する ②脱ぐ ③休みをとる。

  - id: "sid-004"
    name: "動詞＋前置詞①② — ask for/look after/take after/result in等"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 216+217統合。「動詞+前置詞」のイディオム（前半）。
      【Theme 216】ask for〜「〜を求める」(=request)。ask A for B「AにBを求める」。look after〜/care for〜「〜の世話をする」(=take care of)。care for〜は否定・疑問文で「〜を好む」(=like)。look for〜「〜を探す」(=search for)。take after〜「〜に似ている」(=resemble。血縁の年上の人に用いる)。look into〜「〜を調べる」(=investigate)/look over〜「〜にざっと目を通す」(=check)。take to〜「〜を好きになる」(=come to like)/「〜にふける」。account for〜「〜を説明する」(=explain)/「〜を占める」(〈重要〉)。add to〜「〜を増やす」(=increase)。add A to B「AをBに加える」。tell on〜「〜にこたえる」(=affect)。answer for〜「〜の責任を負う」(=be responsible for)。
      PU!190: 「調べる」のイディオム。look into/look over/look up(⇨907)。go over[through]〜「〜をよく調べる」(=examine carefully)(⇨991)。
      プラスα: account for〜の「占める」用法（tourism revenue accounts for at least 20% of GDP）。
      【Theme 217】insist on[upon]〜「〜を強く主張する」。insist on A('s) doing。persist in〜「〜に固執する」。stick to〜/cling to〜「〜に固執する」。前置詞の違い: insistはon、persistはin、stick[cling]はto。stand for〜「〜を表す」(=represent/mean)/「〜を支持する」。stand by〜「〜の味方をする」(=support)。call for〜「〜を必要とする」(=require)。call on〜「（人を）訪ねる」(=visit。場所ならcall at)。call on A for[to do]「Aに〜を求める」。result in〜「〜という結果になる」(=lead to/bring about/give rise to)。result from〜「〜の結果として起こる」。A result from B = B result in A。consist in〜「〜にある」(=lie in)。consist of〜「〜から成り立つ」(=be composed of)。

  - id: "sid-005"
    name: "動詞＋前置詞③④ — depend on/deal with/agree with/apply for等"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 218+219統合。「動詞+前置詞」のイディオム（中盤）。
      【Theme 218】come by〜「〜を手に入れる」(=get/obtain)。run into〜「〜に偶然出会う/〜にぶつかる」(=bump into)。come across〜「〜を偶然見つける/〜に偶然出会う」(=run across。come acrossは物を見つける意味が多い)。depend on[upon]〜/rely on/count on/turn[look] to〜 (A for B)「（Bを）Aに頼る」。depend on〜（無生物主語）「〜次第である/〜によって決まる」。deal with〜「〜を扱う/〜に対処する」(=handle)。deal in〜「〜を商品として扱う」。cope with〜「〜にうまく対処する」(=deal with〜successfully)。aim at〜「〜をめざす」。aim A at B「AをBに向ける」。pay for〜「〜の代金を支払う」。pay A for B「Bの代金としてAを支払う」。
      プラスα: run into/come across/run acrossの比較。depend on/rely on/count on/turn toのグループ。cope with=deal with successfully。
      【Theme 219】agree with〜「（人）と意見が一致する」/「（気候・食べ物が）〜に合う」(⇨731)。agree to〜「（計画・提案に）同意する」。wait on[upon]〜「〜に仕える/〜に応対する」(=serve)。yield to〜「〜に屈する」(=submit to/give in to⇨1031)。major in〜「〜を専攻する」(=specialize in)。amount to〜「総計〜になる」(=total)/「結局〜になる/〜に等しい」。long for〜「〜を切望する」。apply for〜「〜を申し込む」(=ask for)。apply to〜「〜に当てはまる」(=be true of⇨1141)。get over〜「〜を乗り越える」(=overcome)/「〜から回復する」(=recover from)。act on〜「〜に作用する」/「〜に従って行動する」。
      プラスα: Have you been waited on?「ご用をお伺いしていますか」。amount toの「等しい」用法。apply forとapply toの意味の違い。act onの2義。

  - id: "sid-006"
    name: "動詞＋前置詞⑤⑥ — go through/believe in/occur to/lead to等"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 220+221統合。「動詞+前置詞」のイディオム（後半）。
      【Theme 220】fall on〜「（記念日が）〜にあたる」。approve of〜「〜に賛成する」(⇔disapprove of)。go through〜「〜を経験する」(=experience/undergo)/「〜をよく調べる」(⇨PU!190)。believe in〜「〜の存在を信じる/〜の価値を信じる」(cf. believe〜「〜の言うことを信じる」)。make for〜「〜の方へ進む」(=head for)/「〜に寄与する」(=contribute to)。hear from〜「〜から便りがある」(⇔write to)。hear of〜「〜のうわさを耳にする」。succeed in〜「〜に成功する」(⇔fail in)。succeed in doing=manage to do(⇨501)。succeed to〜「〜を相続する/〜のあとを継ぐ」(=inherit。take over⇨916と言い換え可能)。refrain from〜「〜を慎む」(=keep from)。break into〜「〜に押し入る」/「急に〜し始める」(=burst into)。adapt to〜「〜に順応する」(=adjust to)。adapt A to B/adapt oneself to〜。adopt「採用する」との混同注意。
      プラスα: believe inとbelieve〜の違い。make forの「寄与する」用法。hear from/hear ofの使い分け。succeed in/succeed toの使い分け。adapt/adoptのつづり混同注意。
      【Theme 221】occur to〜「（考えが）〜の心に浮かぶ」(=strike)。It occurs to A that節。hit on[upon]〜「〜を思いつく」（人が主語）。do without〜/dispense with〜「〜なしですます」(=go without)。dispenseではwithを用いる点に注意。part with〜「（物を）手放す」/part from〜「（人と）別れる」。lead to〜「〜につながる/〜を引き起こす」(=cause/bring about/result in/give rise to)。die of[from]〜「〜が原因で死ぬ」(of=内的要因, from=外的要因、ただし現在は区別不明確)。send for〜「〜を呼びにやる」(go for〜は自分で行く)。get to〜「〜に到着する」(=arrive at/reach)。refer to〜「〜を参照する」(=consult)/「〜に言及する」。refer to A as B「AをBと呼ぶ」(⇨518)。resort to〜「〜に訴える/〜に頼る」。set about〜「〜に取りかかる」(=go about)。set about doing=set out to do。suffer from〜「〜で苦しむ」。

  - id: "sid-007"
    name: "動詞＋副詞＋前置詞①② — put up with/come up with/keep up with等"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 222+223統合。「動詞+副詞+前置詞」の3語イディオム。
      【Theme 222】put up with〜「〜を我慢する」(=endure/stand/bear/tolerate)。do away with〜「〜を廃止する」(=abolish)。look up to〜「〜を尊敬する」(=respect)。look down on[upon]〜「〜を見下す」(=despise)。make up for〜「〜の埋め合わせをする」(=compensate for)。speak ill[badly] of〜「〜を悪く言う」(=criticize)⇔speak well[highly] of〜(=praise)。think ill/well ofも同様。go in for〜「（競技に）参加する」(=take part in)/「（趣味として）〜をする」。live up to〜「（期待に）応える」(=meet/satisfy)/「（主義に）従って生きる」。stand up for〜「〜を擁護する」(=defend/support)。put up at〜「〜に泊まる」(=stay at)。go on with〜「〜を続ける」(=continue)。go on doing「〜し続ける」(=keep on doing)。get down to〜「〜に本気で取り組む」。
      PU!191: 「すっかり/完全に」のoutとup。fill out[up]「記入する」、wear out「疲れ果てさせる」、be tired[worn] out、die out「死に絶える」、speak out[up]「思い切って意見を言う」、break up「終わる」、eat up「食べつくす」、use up「使い果たす」、dry up「干上がる」、end up。
      プラスα: speak/thinkの代用。live up toの2義。
      参考書内参照: ⇨871 considerate(look up toの例文)、⇨160 It is time+仮定法過去(get down toの例文)。
      【Theme 223】come up with〜「〜を思いつく」(=think of/hit on)/「〜を提案する」(=propose)。catch up with〜「〜に追いつく」(=overtake)。keep up with〜「〜に遅れずについていく」。get through (with)〜「〜をやり終える」(=finish)。drop in[by] at[on]〜「〜に立ち寄る」(=stop by at)。at+場所、on+人。get along with〜「〜とうまくやる」(=get on with)。give in to〜「〜に屈する」(=yield to⇨982/give way to⇨1061)。come home to〜「〜にしみじみこたえる」。bring A home to B「AをBに痛切に感じさせる」。end up (by) doing「結局〜することになる」。end upの後にはin/as/withも続く。run out of〜「〜を使い果たす」。run short of〜(⇨1121)も類似。

  - id: "sid-008"
    name: "動詞＋A＋前置詞＋B — take A for B/owe A to B/devote A to B等"
    category: "イディオム"
    priority: "P2"
    notes: |
      Theme 224単独。「動詞+A+前置詞+B」の構文をとるイディオム。
      take A for B「AをBだと思う/AをBと間違える」(=mistake A for B)。exchange A for B「AをBと交換する」。congratulate A on[upon] B「AのBを祝う」(cf. celebrateの目的語は「祝い事」であり「人」ではない)。help A with B「AのBを手伝う」。owe A to B「AはBのおかげである」(元の意味は「A（金）をBに借りている」)。share A with B「AをBと共有する」。leave A for B「Aを出発してBに向かう」(=start from A for B)。leave for〜「〜に向けて出発する」。spend A on B「A（時間・金）をBに費やす」。spend A (in) doing(⇨124)。name A after[for] B「Bにちなんで名付ける」。name A B after[for] C「Cにちなんで名前Bをつける」。devote A to B「AをBにささげる」。devote oneself to〜「〜に専念する」=be devoted to〜。attribute A to B「AをBのせいにする」(=ascribe A to B)。

  - id: "sid-009"
    name: "特定の名詞を用いる群動詞①②③ — take part in/make use of/give rise to等"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 225+226+227統合。特定の名詞を含む群動詞（前半）。
      【Theme 225】take part in〜「〜に参加する」(=participate in/join in)。get on A's nerves「Aをいらいらさせる」(=irritate。nervesは複数形)。go out of one's way to do/take the trouble to do「わざわざ〜する」。have trouble doing「〜するのに苦労する」(⇨123)と区別。take pride in〜「〜を誇りに思う」(=be proud of/pride oneself on)。前置詞の違い: pride(名)→in、proud(形)→of、pride(動)→on。catch sight of〜「〜を見つける」(=catch a glimpse of)⇔lose sight of〜「〜を見失う」。make use of〜「〜を利用する」(=use/utilize)。make much[full/good] use of「十分に利用」、make the best use of「最大限に利用」。take advantage of〜「〜を利用する」(=make use of)/「〜につけ込む」(=impose on)。put〜to use「〜を利用する」。find fault with〜「〜のあら探しをする」(=criticize)。take hold of〜「〜をつかむ」(catch/get/seize hold ofも可)。
      【Theme 226】lose one's temper「腹を立てる」(=get angry)⇔keep one's temper「平静を保つ」。give rise to〜「〜を引き起こす」(=cause/bring about)。give birth to〜「〜を産む」/「〜を引き起こす」(=give rise to)。give way to〜「〜に屈する」(=yield to/give in to)。give way「崩れる」(=collapse)。take the place of〜「〜に取って代わる」(=replace)。代名詞ならtake A's place。keep an[one's] eye on〜「〜から目を離さない」(=watch)。come to an end「終わる」。bring〜to an end=put an end to〜「〜を終わらせる」。come of age「成年に達する」。have no idea「わからない」。have an effect[influence] on〜「〜に影響を与える」。take delight in〜「〜を楽しむ」(=take pleasure in)。
      PU!192: do(益・害を与える)のその他の熟語。do (A) more harm than good「益よりむしろ害を与える」、do A damage「損害を与える」、do A justice「公平に評価する」。
      【Theme 227】do A good「Aのためになる」(=do good to A)⇔do A harm「Aの害になる」(=do harm to A)。do A a favor「Aの頼みを聞き入れる」。ask a favor of A「Aに頼みごとをする」。learn A by heart「Aを暗記する」(=memorize)。keep[bear] A in mind「Aを覚えておく」。Aがthat節など長い場合はkeep in mind Aの語順。have A in mind「Aを考えている」。have A in common「Aを共通に持つ」(A=much/a lot/something/little/nothing)。take A into account/take A into consideration「Aを考慮に入れる」(=consider)。take account of〜/allow for〜も同意。take A by surprise「Aの不意を打つ/驚かせる」。
      参考書内参照: ⇨151 all things considered、⇨123 have trouble doing。

  - id: "sid-010"
    name: "特定の名詞を用いる群動詞④⑤⑥ — take place/make sense/make up one's mind等"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 228+229+230統合。特定の名詞を含む群動詞（後半）。
      【Theme 228】make much of〜「〜を重視する」(=value)⇔make light[little] of〜「〜を軽視する」。take place「（行事が）行われる」(=be held)/「（事件が）起こる」(=happen)。take one's time「ゆっくりやる」⇔lose no time「すぐに〜する」。kill time「時間をつぶす」。make sense「理解できる/筋が通る」。make sense of〜「〜を理解する」。take care of〜「〜の世話をする」(=look after⇨943/care for⇨944)。see much[a lot] of〜「〜とよく会う」(see something/little/nothing of)。do the dishes「皿洗いをする」。make a face「顔をしかめる」(=frown)。put on weight「太る」(=gain weight)⇔lose weight「やせる」。think better of〜「〜を考え直してやめる」。
      PU!193: do+the[one's]+名詞。do the dishes/do one's room/do the laundry/do one's face/do the shopping[cooking/cleaning]。
      【Theme 229】make fun of〜/make a fool of〜/pull one's leg「〜をからかう」(=ridicule/laugh at/tease)。pull one's legは「足を引っ張る/邪魔する」の意味では用いない。make up one's mind「決心する」(=decide)。後ろにwh-節/to do/that節/about[on]が続く。bring A to light「Aを明るみに出す」(=reveal)⇔come to light「明るみに出る」(⇨PU!187)。get in touch with〜「〜と連絡をとる」(=contact)。keep in touch with〜「〜と連絡をとり合う」。一時的ならget、継続的ならkeep。have[get] one's (own) way「自分の思い通りにする」。hold one's tongue「黙っている」(=keep silent)。hold one's breath「息を止める」。make progress「進歩する」(progressは不可算名詞⇨PU!129)。make one's way「進む」(=proceed)。
      PU!194: make one's wayのバリエーション。feel one's way「手探りで進む」、force one's way「無理やり進む」、elbow[shoulder] one's way「押しのけて進む」、find one's way「やっとたどり着く」。
      【Theme 230】pay attention to〜/take notice of〜「〜に注意を払う」(=attend to/look out for⇨893)。play a part[role] in〜「〜において役割を果たす」(active/important/major等の形容詞を伴うことが多い)。pay[make] a visit to〜「〜を訪問する」(=pay〜a visit)。make a[one's] living「生計を立てる」(earn/get/gain a livingも可)。keep early[good] hours「早寝早起き」⇔keep late[bad] hours「夜ふかし」。keep regular hours「規則正しい生活」。keep one's word「約束を守る」(=keep one's promise)⇔break one's word[promise]「約束を破る」。make (both) ends meet「収支を合わせる」(=live within one's income)。have words (with〜)「口論する」(=quarrel)。have a word with〜「ちょっと話をする」と混同注意。have a look at〜「〜を見る」(=look at/take a look at)。
      PU!195: have a+動詞派生名詞。have a look at/have a dream/have a rest/have a drink/have a try/have a walk。takeにも同様の用法。

  - id: "sid-011"
    name: "その他の動詞中心の重要イディオム"
    category: "イディオム"
    priority: "P2"
    notes: |
      Theme 231単独。上記のパターンに分類しにくいその他の重要イディオム。
      get rid of〜「〜を取り除く」(=remove)/「〜を捨てる」(=discard/dispose of)。目的語で訳が変わる: get rid of a cold「風邪を治す」、get rid of bad habits「悪癖を直す」、get rid of the old custom「慣習を廃止する」(=abolish)。let go of〜「〜から手を離す」(=release)。make believe「ふりをする」(=pretend)。make do with〜「〜で間に合わす」(=do with)。take it easy「気楽に考える」⇔take it seriously「真剣に考える」。take it easyは別れの挨拶にも用いる。make sure (that)節「必ず〜するようにする/〜を確かめる」(=see to it that⇨302)。make sure of+名詞も可。make it「成功する」(=succeed)/「たどり着く」/「間に合う」/「都合をつける」。hold good「有効である」(=hold true)。fall[come] short of〜「〜に達しない」。run short of〜「〜が不足する」(進行形が多い。まだ完全になくなってはいない)。run out of〜(⇨1034)「〜を使い果たす」との違い。

