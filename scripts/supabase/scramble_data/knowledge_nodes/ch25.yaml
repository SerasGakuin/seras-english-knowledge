  - node_id: "sid-012"
    seq: 2
    goal: "be afraid of〜/be ashamed of〜とbe afraid to do/be ashamed to doの意味の違いを説明できる"
  - node_id: "sid-012"
    seq: 3
    goal: "be dependent on〜とbe independent of〜で前置詞が異なることを指摘できる"
  - node_id: "sid-012"
    seq: 4
    goal: "be concerned about〜（心配）とbe concerned with〜（関係・関心）を文脈から区別できる"
  - node_id: "sid-013"
    seq: 1
    goal: "be tired of〜（飽きた）とbe tired from〜（疲れた）の意味の違いを説明できる"
  - node_id: "sid-013"
    seq: 2
    goal: "be sure of〜（本人の確信）とbe sure to do（話し手の確信）の確信主体の違いを説明できる"
  - node_id: "sid-013"
    seq: 3
    goal: "be engaged in〜（従事）とbe engaged to〜（婚約）を前置詞から区別できる"
  - node_id: "sid-013"
    seq: 4
    goal: "be opposed to〜（反対）とbe opposite to〜（正反対）の意味の違いを識別できる"
  - node_id: "sid-014"
    seq: 1
