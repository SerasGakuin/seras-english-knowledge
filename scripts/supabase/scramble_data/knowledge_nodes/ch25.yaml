knowledge_nodes:
  - id: "sid-012"
    name: "be＋形容詞[過去分詞]＋前置詞①②"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 232+233統合。「be+形容詞[過去分詞]+前置詞」のイディオム（前半22表現）。
      【Theme 232】be short of〜「〜が不足している」(⇔run short of〜⇨1121「動作」)、be lacking in〜「〜に欠けている」(=be wanting in)、be familiar to〜「（人に）よく知られている」、be familiar with〜「（物事を）よく知っている/〜に精通している」(A is familiar with B = B is familiar to A)、be at home with[in]〜「〜に精通している」(=be familiar with)、be acquainted with〜「〜に精通している/〜と知り合いである」、be different from〜「〜と異なる」(=differ from。米口語ではthanも可)、be indifferent to〜「〜に無関心である」(=be unconcerned about[with])、be afraid of〜「〜を恐れる」(⇔be afraid to do「怖くて〜できない」)、be ashamed of〜「〜を恥じている」(⇔be ashamed to do「恥ずかしくて〜できない」)。
      比較: become[get] acquainted with〜「〜と知り合いになる」。different than（米口語・節が続く場合）。take a chance[chances]「一か八かやる」。
      【Theme 233】be rich in〜「〜に富んでいる」(=be abundant in/abound in。⇔be poor in〜)、be particular about〜「〜にうるさい/こだわる」、be anxious for〜「〜を切望している」(=wish for)、be anxious about〜/be concerned about〜「〜を心配している」(=be worried about)、be popular with[among]〜「〜に人気がある」、be confronted with〜「〜に直面している」(=be faced with。confront=face⇨846)、be dependent on[upon]〜「〜に依存している」、be independent of〜「〜から独立している」(前置詞ofに注意)、be true of〜「〜に当てはまる」(=apply to)、be true to〜「〜に忠実である」(=be faithful to)、be subject to〜「〜の影響を受けやすい/〜にかかりやすい」。
      比較: be concerned with〜「〜に関係している/〜に関心がある」(=be interested in)とbe concerned about〜「〜を心配」の区別が重要。true to life「本物そっくりの」。

  - id: "sid-013"
    name: "be＋形容詞[過去分詞]＋前置詞③④"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 234+235統合。「be+形容詞[過去分詞]+前置詞」のイディオム（後半22表現）+ PU!196。
      【Theme 234】be equal to〜「〜に耐えられる/匹敵する」(元義「〜に等しい」)、be aware of〜「〜に気づいている」(同意: be conscious of〜)、be ignorant of〜「〜を知らない」(=be unaware of)、be tired of〜「〜にあきている」(⇔be tired from〜「〜で疲れている」。混同注意)、be sick of〜「〜にうんざり」(tired ofより強意。be sick and tired ofの形も)、be fed up with〜「〜にうんざり」(=be tired of。feed up A with Bの受身)、be based on[upon]〜「〜に基づいている」、be characteristic of〜「〜に特有である」、be peculiar to〜「〜に特有である」(=be characteristic of)、be content(ed) with〜「〜にまあまあ満足」(⇔be satisfied with〜「完全に満足」⇨42)、be engaged in〜「〜に従事している」(=be occupied with[in]。⇔be engaged to〜「〜と婚約」)。
      語句: newsは不可算名詞(⇨595)。
      【Theme 235】be composed of〜/be made up of〜「〜から成る」(=consist of⇨965。ofは材料・構成要素)、be opposed to〜「〜に反対」(=be against。⇔be opposite to〜「〜とは正反対」)、be fond of〜「〜が好き」(=like)、be keen on〜「〜が大好き/〜に夢中」(「〜を熱望」の意味も)、be responsible for〜「〜に責任がある」(=answer for〜⇨953)、be sure of〜「〜を確信している」(=be certain of)、be similar to〜「〜に似ている」(=be akin to)、be good at〜「〜が得意」(⇔be poor at〜/be weak in〜「〜が苦手」)、be interested in〜「〜に興味がある」(have[take] interest in〜も)、be noted for〜「〜で有名」(=be famous for)。
      PU!196: be sure ofとbe sure to doの違い — He is sure of success.「彼（本人）が成功を確信」vs He is sure to succeed.「彼はきっと成功する（話し手の確信）」。確信の主体が異なる点が重要。

  - id: "sid-014"
    name: "be＋形容詞[過去分詞]＋to do"
    category: "イディオム"
    priority: "P1"
    notes: |
      Theme 236。「be+形容詞[過去分詞]+to do」のイディオム（11表現）。
      be sure to do/be bound to do「必ず〜する/きっと〜する」(=be certain to do)。boundはbind「束縛する」の過去分詞。〈重要〉be bound for〜「〜行きである」も。be supposed to do「〜することになっている/〜すると思われている」(⇔be not supposed to do「〜してはいけない」)。be willing to do「〜してもよいと思っている」(be ready to doほど積極的でない)。be reluctant to do「〜するのは気が進まない」(=be unwilling to do)。be apt to do「〜しがちである」(=tend to do。liable/prone/inclinedも同意)。be[feel] free to do「自由に〜できる」(Please feel free to doの形が頻出)。be likely to do「〜しそう/可能性が高い」(⇔be unlikely to do)。be about to do「まさに〜しようとしている」(=be on the point of doing。going toより差し迫った未来)。be forced to do「〜せざるを得ない」(=be compelled to do/be obliged to do)。be anxious to do「しきりに〜したがっている」(=be eager to do。⇨be anxious for〜⇨1134)。

  - id: "sid-015"
    name: "その他の形容詞・副詞中心のイディオム"
    category: "イディオム"
    priority: "P2"
    notes: |
      Theme 237。形容詞・副詞を中心としたその他のイディオム（12表現）。
      be well off「裕福である」(=be rich。⇔be badly off「貧乏」)。〈重要〉比較級 be better off⇔be worse off も頻出。by and large「概して」(=in general⇨1196)。on and off「ときどき/断続的に」(=off and on=sometimes。⇔on and on「どんどん/続けて」)。(every) now and then[again]「ときどき」(=occasionally。seldomとsometimesの間)。so far「今までのところ」(=up to now/till now)。as yet「今までのところ」(否定文で用いることが多い)。right away「すぐに」(=immediately/at once。right nowとも)。once (and) for all「きっぱりと/これを最後に」(=finally/definitely)。next to「ほとんど」(=almost。通例否定語の前。「〜の隣の[に]」の意味も)。be second to none「誰にも劣らない」。let alone〜「〜は言うまでもなく」(=much[still] less⇨208。否定文の後で使う)。
      語句: go out with〜「〜と付き合う」。hardly「ほとんど〜ない」(⇨266)。

