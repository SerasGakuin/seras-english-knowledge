check_points:
  - node_id: "sid-012"
    seq: 1
    question: "A is familiar with B と B is familiar to A はどのような関係か？"
    answer: "同じ意味。familiarの後の前置詞で主語と目的語の関係が入れ替わる。withは「（人が）〜をよく知っている」、toは「（物事が）〜に知られている」。"
  - node_id: "sid-012"
    seq: 2
    question: "be afraid of doingとbe afraid to doの違いは？"
    answer: "be afraid of doing「〜することを恐れる（行為そのものへの恐怖）」、be afraid to do「（結果を心配して）怖くて〜できない」。"
  - node_id: "sid-012"
    seq: 3
    question: "be dependent on〜の反意表現 be independent ___〜 の前置詞は？"
    answer: "of。「〜から独立している」は「分離」を表すofを用いる。dependentはon、independentはofと前置詞が異なる。"
  - node_id: "sid-012"
    seq: 4
    question: "be concerned about〜とbe concerned with〜はそれぞれどういう意味か？"
    answer: "be concerned about〜「〜を心配している」(=be worried about)。be concerned with〜「〜に関係している/〜に関心がある」(=be interested in)。"
  - node_id: "sid-013"
    seq: 1
    question: "be tired of〜とbe tired from〜の違いは？"
    answer: "be tired of〜「〜にあきている/〜にうんざり」、be tired from〜「〜で疲れている」。of=飽き、from=疲労の原因。"
  - node_id: "sid-013"
    seq: 2
    question: "He is sure of success. と He is sure to succeed. で確信しているのはそれぞれ誰か？"
    answer: "sure of: 彼（本人）が確信。sure to do: 話し手が確信（彼はきっと成功する）。"
  - node_id: "sid-013"
    seq: 3
    question: "be engaged in〜とbe engaged to〜の意味の違いは？"
    answer: "be engaged in〜「〜に従事している/〜で忙しい」(=be occupied with)。be engaged to〜「〜と婚約している」。"
  - node_id: "sid-013"
    seq: 4
    question: "「〜に特有である」を2つの表現で言うと？"
    answer: "be characteristic of〜 と be peculiar to〜。前置詞がof/toで異なる点に注意。"
  - node_id: "sid-014"
    seq: 1
    question: "be supposed to doの否定形 be not supposed to doはどういう意味か？"
    answer: "「〜してはいけないことになっている」。例: You are not supposed to park here.（ここに駐車してはいけません）"
  - node_id: "sid-014"
    seq: 2
    question: "be willing to doとbe eager to doの積極性の違いは？"
    answer: "be willing to do「〜してもよいと思っている/〜するのをいとわない（消極的同意）」。be eager to do「〜を熱望している（積極的願望）」。be reluctant to doは「気が進まない」。"
  - node_id: "sid-014"
    seq: 3
    question: "be bound to doとbe bound for〜の違いは？"
    answer: "be bound to do「必ず〜する/きっと〜する」(=be certain to do)。be bound for〜「（乗り物が）〜行きである」。例: This train is bound for Hakata."
  - node_id: "sid-015"
    seq: 1
    question: "on and offとon and onの違いは？"
    answer: "on and off「ときどき/断続的に」(=sometimes)。on and on「どんどん/続けて/休まず」(=continuously)。"
  - node_id: "sid-015"
    seq: 2
    question: "next toが「ほとんど」の意味になるのはどのような文脈か？"
    answer: "通例否定語の前で用いる。例: next to impossible「ほとんど不可能」。「〜の隣」の意味もあるので文脈判断が必要。"
  - node_id: "sid-015"
    seq: 3
    question: "let aloneはどのような文の後で使うか？"
    answer: "否定文の後で使う。「〜は言うまでもなく」(=much[still] less)。例: The old dog can hardly walk, let alone run."

