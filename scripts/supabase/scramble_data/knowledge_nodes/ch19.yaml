check_points:
- node_id: sgh-035
  seq: 1
  question: begin/startの後で「9時から始まる」と言う場合の前置詞は？ fromは使えるか？
  answer: at nineが正しい。×begin fromは不可。「日付」ならon、「月/季節」ならinを使う。
- node_id: sgh-035
  seq: 2
  question: byとuntil [till]の違いは？
  answer: by「〜までに（は）」は動作の完了の期限、until [till]「〜まで（ずっと）」は継続の終了時を表す。
- node_id: sgh-035
  seq: 3
  question: forとduringの違いは？ duringの後に動名詞は使えるか？
  answer: 'for: 不特定の期間（for five years）、during: 特定の期間（during my stay）。×during my stayingは不可。while + S + V = during + 名詞。'
- node_id: sgh-035
  seq: 4
  question: 「2週間でそのレポートを完成して」の前置詞は？
  answer: in two weeks（時の経過）。inは未来に、afterは過去に用いることが多い。「〜以内に」を強調するにはwithinを使う。
- node_id: sgh-036
  seq: 1
  question: at the cornerとin the cornerの違いは？
  answer: at the corner of a street「通りの角に」、in the corner of a room「部屋の隅に」。atは地点、inは内部。
- node_id: sgh-036
  seq: 2
  question: A above sea levelの意味は？ 反意語はどう表す？
  answer: 「海抜A」の意味。反意語はA below sea level「海面下A」。aboveは接触せず上方、overは真上。
- node_id: sgh-036
  seq: 3
  question: betweenとamongの使い分けは？ 3者以上でbetweenは使えるか？
  answer: 'between: 原則2者。among: 3者以上（集合体）。ただし3者以上でも個々を念頭に置く場合はbetween可（between Japan, America and China）。'
- node_id: sgh-037
  seq: 1
  question: 「〜の方向へ」はin the direction of〜か、for the direction of〜か？
  answer: in the direction of〜が正しい。directionに惑わされてforを使わない。
- node_id: sgh-037
  seq: 2
  question: 「川に釣りに行く」はgo fishing to the riverか？
  answer: ×go fishing to the river。go fishing in the riverが正しい。go doing in/at/onの形で、toは使わない。
- node_id: sgh-037
  seq: 3
  question: within A of Bの意味は？ なぜfromではなくofか？
  answer: 「B（場所）からA（距離）以内に」。ofは分離を表す前置詞（ofを強調したのがoff）。×within A from Bは不可。
- node_id: sgh-037
  seq: 4
  question: a key to〜とorder A from Bの前置詞で注意すべき点は？
  answer: a key to〜「〜の秘訣/手がかり」は×key of〜。order A from B「AをBに注文する」は×order A to B。日本語の「〜の」「〜に」に惑わされない。
- node_id: sgh-038
  seq: 1
  question: 「口に食べ物をほおばって話すな」を英語で言うと？
  answer: Don't talk with your mouth full.（with + 名詞 + 形容詞で付帯状況）
- node_id: sgh-038
  seq: 2
  question: with A on / with tears in her eyesはそれぞれどんな構造か？
  answer: 'with A on: with + 名詞 + 副詞（onは着用）。with tears in her eyes: with + 名詞 + 場所を示す句。'
- node_id: sgh-038
  seq: 3
  question: withが省略されると何が一緒に省略されることがあるか？
  answer: '冠詞や所有格。例: (with a) pipe in (his) mouth。'
- node_id: sgh-039
  seq: 1
  question: to my great surpriseとmuch to my disappointmentの構造は？
  answer: to one's great + 感情名詞 / much to one's + 感情名詞で「〜が…したことには」を強調。
- node_id: sgh-039
  seq: 2
  question: of importanceとwith easeはそれぞれ何に相当するか？
  answer: of importance = important（形容詞）、with ease = easily（副詞）。of + 抽象名詞 = 形容詞、with + 抽象名詞 = 副詞。
- node_id: sgh-039
  seq: 3
  question: of little importanceの意味は？ of + 抽象名詞にはどんな修飾語がつくか？
  answer: 「ほとんど重要でない」。great/much/no/littleなど程度を表す語がつく。
- node_id: sgh-040
  seq: 1
  question: besidesとbesideの違いは？
  answer: besides「〜に加えて/〜の他に」（前置詞）+ 「その上」（副詞）。beside「〜のそばに」（場所のみ）。
- node_id: sgh-040
  seq: 2
  question: with a pencilとin pencilの違いは？ byは使えるか？
  answer: with a pencil（道具・手段、冠詞あり）= in pencil（無冠詞）。by pencilは不可（byは交通・通信の手段で使い、無冠詞）。
- node_id: sgh-040
  seq: 3
  question: except forとexceptの使い分けは？
  answer: 文頭や全体語(all/every等)がない場合→except forのみ。全体語の直後→except/butのみ。前置詞・接続詞の前→exceptのみ。
- node_id: sgh-041
  seq: 1
  question: for one's ageの意味は？ at his ageとの違いは？
  answer: for one's age「年のわりには」（観点・基準）。at his age「彼の年齢で」。意味が全く異なる。
- node_id: sgh-041
  seq: 2
  question: despiteの後ろにはS+Vが来るか？
  answer: 来ない。despiteは前置詞なので後ろには名詞/動名詞。S+Vが来るのはalthough/though（接続詞）。
- node_id: sgh-041
  seq: 3
  question: as + 役職名のときの冠詞のルールは？
  answer: '1人しかいない役職名の場合はふつう無冠詞。例: He acted as [×a] chairman.'
