knowledge_nodes:
- id: sgh-035
  name: 注意すべき「時」を表す前置詞
  category: 語法
  priority: P1
  notes: 'Theme 176。at/on/inの基本用法と、by/until、for/during、inの時の経過用法を扱う。


    【at/on/inの基本（PU!159）】

    □ at — 時の1点（時刻/正午/真夜中）: at seven, at noon, at midnight

    □ on — 特定の日（日付/曜日）: on Sunday, on my birthday, on May 5th, 2017

    □ in — 比較的長い期間（月/季節/年/午前/午後）: in August, in winter, in 2020, in the morning

    注意: morning/afternoon等が修飾語を伴うとonになる: on the morning of April 6, on Sunday evening, on a dark night


    注意: begin/startの後は×fromではなくat/on/inを使う。

    例: Our school begins at nine. / begins on April 6. / begins in September.


    【by vs until [till]】

    by「〜までに（は）」— 動作の完了の期限

    until [till]「〜まで（ずっと）」— 継続の終了時


    【for vs during】

    for — 不特定の期間（数詞やmany, a fewなどのついた語句）

    during — 特定の期間（theやone''sなどのついた語句）

    注意: while + S + V = during + 名詞（句）[×動名詞（句）]


    【in「〜で/〜の後に」— 時の経過】

    明確な時間経過ではinは未来に、afterは過去に用いることが多い。

    「〜以内に」を強調したい場合はwithinを用いる。

    参照: ⇨問685

    '
- id: sgh-036
  name: 注意すべき「場所」を表す前置詞
  category: 語法
  priority: P1
  notes: 'Theme 177。at/in/onの場所での使い分け、above/over、between/amongなどを扱う。


    【at/in/onの基本（PU!160）】

    □ at — 場所の1点（地点）: at the center, at the corner

    □ in — 広い場所の中/囲まれた内部: in Japan, in the room [building]

    □ on — 面との接触 ⇔ off「〜から離れて」: on the table, on the ceiling, on the wall

    注意: at the corner of a street「通りの角」 vs in the corner of a room「部屋の隅」

    注意: on the coast「海岸沿いの」、on the Mississippi River「川沿い」— 線上の接触もon


    【above/over vs below/under】

    above「〜より上（のほう）に」⇔ below「〜より下に」— 接触せず上方/下方

    over「〜の真上に」⇔ under「〜の真下に」— 離れて真上/真下

    頻出: A above sea level「海抜A」⇔ A below sea level「海面下A」


    【to/on/in the north of A】

    to the north of A「Aの北方に」（離れている）

    on the north of A「Aの北側に」（Aに接する）

    in the north of A「Aの北部に」（Aの中の北部）


    【between vs among】

    between: 原則2者（個々に焦点）。3者以上でも個々を念頭に置く場合はbetween可。

    among: 3者以上（集合体として）。among the + 最上級「〜の中の1つ[1人]で」の意味も重要。

    '
- id: sgh-037
  name: 日本語に惑わされやすい前置詞
  category: 語法
  priority: P1
  notes: 'Theme 178。日本語の感覚で誤った前置詞を選びやすい表現を扱う。


    〈頻出〉in the direction of〜「〜の方向へ」— ×for

    in all directions = in every direction「四方八方に」


    〈頻出〉The sun rises in the east.「太陽は東から昇る」— ×from the east

    go doing in [at / on] A「A（場所）に〜しに行く」— ×to（PU!161）

    PU!161: go fishing [swimming] in the river / go skating on the pond / go shopping at a department store

    doingに用いられるのはfishing/swimming/skating/skiing/jogging/camping/shoppingなどスポーツ・娯楽の語に限定


    within A of B「B（場所）からA（距離）以内に」— ×from（ofは分離を表す）

    begin with〜「〜から始める」— ×begin from。to begin with「まず第一に」（⇨ PU!24）

    begin by doing「〜することから始める」

    order A from B「A（品物）をB（店・人）に注文する」— ×order A to B

    a [the] key to〜「〜の秘訣/手がかり」— ×the key of〜（toは付属・付着）

    '
- id: sgh-038
  name: 付帯状況のwith
  category: 語法
  priority: P1
  notes: 'Theme 179。「with + 名詞 + 補語」で付帯状況を表す構文。


    【パターン】

    ① with + 名詞 + 形容詞: with your mouth full「口に食べ物をほおばって」

    ② with + 名詞 + 副詞: with her socks on「靴下をはいて」（onは着用）

    ③ with + 名詞 + 場所を示す句: with tears in her eyes「目に涙を浮かべながら」


    〈発展〉withを省略すると、冠詞や所有格も一緒に省略されることがある。

    He was reading, (with a) pipe in (his) mouth.


    参照: ⇨Theme 45（分詞を用いた付帯状況の構文）

    '
- id: sgh-039
  name: to one's+感情名詞とof/with+抽象名詞
  category: 語法
  priority: P1
  notes: 'Theme 180+181 統合。感情を表す前置詞句と、of/with+抽象名詞の形容詞的・副詞的用法を扱う。


    【to one''s + 感情名詞（Theme 180, PU!162）】

    「〜が…したことには」の意味。

    強調: to one''s great + 名詞 / much to one''s + 名詞

    □ to one''s surprise「〜が驚いたことには」

    □ to one''s disappointment「〜ががっかりしたことには」

    □ to one''s delight [joy]「〜がうれしかったことには」

    □ to one''s relief「〜が安心したことには」

    □ to one''s regret「〜が残念だったことには」


    【of + 抽象名詞 = 形容詞（Theme 181, PU!163(1)）】

    ofは「〜の性質を持つ（having）」の意味。great/much/no/littleなど程度を表す語がつくことが多い。

    □ of importance = important「重要な」

    □ of interest = interesting「面白い」

    □ of help [service] = helpful「役立つ」

    □ of value = valuable「価値のある」


    【with + 抽象名詞 = 副詞（PU!163(2)）】

    □ with ease = easily「容易に」

    □ with difficulty = barely「やっと」

    □ with patience = patiently「辛抱強く」

    □ with care = carefully「慎重に」

    □ with accuracy = accurately「正確に」

    '
- id: sgh-040
  name: 重要前置詞の用法（1）besides/beside/on/with/for-against/by/except for
  category: 語法
  priority: P1
  notes: "Theme 182。多様な前置詞の重要用法（前半）。\n\n〈付加〉besides「〜に加えて/〜の他に」(= in addition to) — besides being [doing]\n注意: besidesには副詞用法「その上」(= in addition)もある（⇨ 668）\n〈場所・位置〉beside「〜のそばに」— besidesとの違いに注意\n〈関連〉on「〜に関して」—\
    \ aboutやofより詳細・専門的\n〈道具・手段〉with「〜で/〜を使って」— 可算名詞には冠詞がつく(with a pencil)\ncf. by「交通・通信の手段」→無冠詞 / in「〜で」→無冠詞(in pencil = with a pencil)\n〈賛成〉for「〜に賛成して」⇔〈反対〉against「〜に反対して」— for = in favor of（⇨ 1300）\n\
    〈差〉by「〜の差で/〜だけ」— 比較級の後に差を表す語句を置く場合\n〈除外〉except for「〜を除けば」（PU!164）:\n  (1) 全体語(all/every等)が前にある場合→except/butもexcept forも可（直後はexcept/butのみ）\n  (2) 文頭や全体語がない場合→except forのみ可\n  (3) 前置詞・接続詞の前→exceptのみ可\n"
- id: sgh-041
  name: 重要前置詞の用法（2）for/over/to/despite/like/in/as
  category: 語法
  priority: P1
  notes: 'Theme 183。多様な前置詞の重要用法（後半）。


    〈観点・基準〉for「〜にしては/〜のわりには」— for one''s age「年のわりには」が頻出

    〈飲食・従事〉over「〜しながら」— 飲食物・本などの上に覆いかぶさる姿勢から

    fall asleep over one''s work [book]「仕事[読書]の最中に寝入る」

    〈適合・一致〉to「〜に合わせて」— dance to music, tap to the rhythm

    a job to one''s liking [taste]「好みに合った職」

    〈譲歩〉despite「〜にもかかわらず」(= in spite of) — 前置詞なので後ろは名詞/動名詞

    cf. although/thoughは接続詞で後ろに節[S+V]（⇨ 436）

    〈類似〉like「〜に似た/〜のような」⇔ unlike「〜と違って」

    〈着用〉in「〜を身につけて/〜を着て」(= wearing) — in white, in the red dress

    〈役割・機能〉as「〜として（の）」— 1人しかいない役職名は無冠詞: He acted as [×a] chairman.

    '
