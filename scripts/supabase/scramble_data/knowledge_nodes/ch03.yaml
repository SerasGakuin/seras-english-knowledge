check_points:
- node_id: sdv-014
  seq: 1
  question: cannotが「～のはずがない」の意味で使われるのはどのような場面か？
  answer: 話者が強い否定の推量をする場面。must「～にちがいない」の対義。
- node_id: sdv-014
  seq: 2
  question: mayの推量用法「～かもしれない」はmustの推量と比べてどう違うか？
  answer: mayは確信の持てない推量（可能性）、mustは確信のある推量。
- node_id: sdv-014
  seq: 3
  question: '"May your dreams come true!"のmayはどのような用法か？'
  answer: 祈願のmay（文語的）。May A do! の形で「Aが～しますように」。
- node_id: sdv-014
  seq: 4
  question: canの許可用法とmayの許可用法の違いは？
  answer: Can I ~? は口語的、May I ~? はより丁寧。
- node_id: sdv-015
  seq: 1
  question: mustが使えない時制では何を代用するか？
  answer: 'have to。過去: had to do、未来: will have to do。'
- node_id: sdv-015
  seq: 2
  question: don't have to doの同義表現は？
  answer: need not do / needn't do / don't need to do（「～する必要はない」）。
- node_id: sdv-015
  seq: 3
  question: have only to doはどのような意味か？書き換えは？
  answer: 「～しさえすればよい」。= All you have to do is (to) do。
- node_id: sdv-016
  seq: 1
  question: would doが「過去の習慣」を表す場合、どのような副詞（句）を伴うことが多いか？
  answer: often, sometimes, now and then など。
- node_id: sdv-016
  seq: 2
  question: would not doはどのような意味か？
  answer: 「どうしても～しようとしなかった」（過去の拒絶）。will notの過去形。
- node_id: sdv-016
  seq: 3
  question: '"This box will not open."のwill notはどのような意味か？'
  answer: 現在の強い意志（拒絶）「どうしても開かない」。無生物主語でも使える。
- node_id: sdv-017
  seq: 1
  question: used to doとbe used to doingの最も重要な見分け方は？
  answer: toの後ろが原形なら used to do（以前の習慣）、-ingなら be used to doing（慣れている）。toの品詞が異なる（助動詞の一部 vs 前置詞）。
- node_id: sdv-017
  seq: 2
  question: used toとwould doの違いを2つ挙げよ。
  answer: (1) used toは現在と対比（今はしていない）、wouldは回想的に述べるだけ。(2) used toは動作+状態、wouldは動作のみ（状態動詞不可）。
- node_id: sdv-017
  seq: 3
  question: '"There used to be a castle."のused toをwouldに置き換えられるか？'
  answer: 不可。beは状態動詞なのでwouldは使えない。
- node_id: sdv-017
  seq: 4
  question: ① used to doと③ be used to do（受動態）のusedの発音の違いは？
  answer: ① [juːst]（ユースト）、③ [juːzd]（ユーズド）。②も[juːst]。
- node_id: sdv-018
  seq: 1
  question: must have doneとmay have doneの確信度の違いは？
  answer: must have done「～したにちがいない」（確信ある推量）、may have done「～したかもしれない」（確信の持てない推量）。
- node_id: sdv-018
  seq: 2
  question: should have doneの2つの意味は？
  answer: ①「～すべきだったのに」（非難・後悔、実際はしなかった）②「～した[している]はずだ」（推量、by nowとセットが多い）。
- node_id: sdv-018
  seq: 3
  question: needn't have doneとdidn't need to doの違いは？
  answer: needn't have done = 必要なかったのに実際はした。didn't need to do = 必要なかった（実際にしたかは不明）。
- node_id: sdv-018
  seq: 4
  question: cannot have doneの意味は？同義表現は？
  answer: 「～したはずがない」（確信のある否定的推量）。couldn't have doneもほぼ同義。
- node_id: sdv-018
  seq: 5
  question: should not have doneの同意表現と、その否定語の位置は？
  answer: ought not to have done。notはoughtの直後に置く（×ought to not have done）。
- node_id: sdv-019
  seq: 1
  question: cannot ~ too ...はどのような意味か？
  answer: 「いくら…しても～しすぎることはない」。tooの後は形容詞/副詞。
- node_id: sdv-019
  seq: 2
  question: cannot help doingの同義表現を挙げよ。butを使う場合の後ろの形の違いは？
  answer: cannot but do《文語》、cannot help but do《米口語》、have no choice but to do。can/cannotがあればbut+原形、そうでなければbut+to do。
- node_id: sdv-019
  seq: 3
  question: may well doの2つの意味は？
  answer: ①「～するのももっともだ」(= It is natural that ~)  ②「たぶん～だろう」(= It is likely that ~)。②のwellは「十分に」でmay単独より確信が強い。
- node_id: sdv-019
  seq: 4
  question: might as well A as Bの意味は？
  answer: 「BするくらいならAするほうがましだ / Bするのは A するようなものだ」。
- node_id: sdv-020
  seq: 1
  question: had better doはどのようなニュアンスを含むか？目上の人に使えるか？
  answer: 「そうしないと大変な目にあう」という含意がある。目上の人には使わない（忠告・軽い命令の意味合い）。
- node_id: sdv-020
  seq: 2
  question: had better doの否定形は？would rather doの否定形は？
  answer: had better not do（betterの後にnot）。would rather not do（ratherの後にnot）。
- node_id: sdv-020
  seq: 3
  question: ought to doの否定形は？had better notとの語順の違いは？
  answer: ought not to do（notはoughtの後、toの前）。had better notはbetterの後にnot。3つとも否定語の位置が異なる。
- node_id: sdv-020
  seq: 4
  question: would like to doとwant to doの違いは？
  answer: would like to doのほうが丁寧で遠慮がちな願望の表現。
- node_id: sdv-020
  seq: 5
  question: would rather A than Bの形で、AとBはそれぞれ何形か？
  answer: ともに動詞の原形。
