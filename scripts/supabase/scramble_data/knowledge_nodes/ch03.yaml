knowledge_nodes:
- id: sdv-014
  name: can / may / mustの基本用法
  category: 動詞・時制
  priority: P1
  notes: 'Theme 17。can / may / must の基本的な意味を整理。

    can: ①能力「～できる」②許可「～してもよい」③推量（否定）cannot「～のはずがない」（強い否定の推量）

    may: ①許可「～してもよい」②推量「～かもしれない」（可能性）③祈願「～でありますように」（文語、May A do! の形）

    must: ①義務「～しなければならない」②推量 must「～にちがいない」（強い肯定の推量）

    PU!15: その他のcan/mayの用法。許可のcan（Can I ~?）はMay I ~?より口語的。May I ~?のほうが丁寧。祈願のmay（May your dreams come true!）は文語的。

    参照: cannot「～のはずがない」⇔ must「～にちがいない」は対照的（問54 vs 問57）

    '
- id: sdv-015
  name: have to doの用法
  category: 動詞・時制
  priority: P1
  notes: 'Theme 18。have to doの各用法。

    had to do「～しなければならなかった」: 過去・未来ではmustが使えないのでhave toで代用（had to / will have to）。

    don''t have to do「～する必要はない」（= need not do / needn''t do / don''t need to do）。

    have only to do「～しさえすればよい」（= only have to do）。書き換え: All you have to do is (to) do（Allの後ろにthat省略、補語のto doは原形doも可）。

    needの2形態: 助動詞need（否定文・疑問文のみ: need not do）vs 本動詞need（don''t need to do）。

    注意: ① must walk, ③ should walk, ④ need to walk は現在のことを表すので、yesterday のある文では不可。

    '
- id: sdv-016
  name: wouldの注意すべき用法
  category: 動詞・時制
  priority: P2
  notes: 'Theme 19。wouldの過去の習慣・拒絶用法。

    would do「（よく）～したものだ」: 過去の習慣。しばしばoften / sometimes / now and then などの副詞（句）を伴う。

    would not [wouldn''t] do「どうしても～しようとしなかった」: 過去の拒絶。「拒絶」のwill not の過去形。

    比較: will not「現在の強い意志（拒絶）」→ would not はその過去形。

    参照: ⇨PU!16（would doとused to doの違い）でTheme 20と関連

    '
- id: sdv-017
  name: used toとbe used to
  category: 動詞・時制
  priority: P1
  notes: "Theme 20。3つの形のまぎらわしいused toの区別。\n① used to do「（今はしていないが）以前はよく～したものだ」: 現在と対比された過去の習慣・状態。助動詞→後ろは原形。\n② be used to doing [名詞]「～することに慣れている」（= be accustomed to doing）: toは前置詞→後ろは動名詞/名詞。\n③ be used\
    \ to do「～するのに使われる」: 受動態(be used) + 目的の不定詞(to do)。\nusedの発音: ①② [juːst]、③ [juːzd]。\nPU!16: would doとused to doの違い:\n(1) used toは現在と対比（今はしていない）、wouldは回想的に述べるだけで現在との対比なし。\n(2) used toは過去の習慣的動作・状態どちらにも使える。wouldは状態動詞と結びつかない（動作のみ）。\n\
    \  There used to (×would) be a castle on the hill.\nPU!17: ①②③の区別表。usedの発音の違い。\n参照: be used to doing の be accustomed to doing は同義（⇨問65）\n"
- id: sdv-018
  name: 助動詞+have done（推量・非難・後悔）
  category: 動詞・時制
  priority: P1
  notes: "Theme 21+22 統合。助動詞の完了形で過去のことに対する現在の判断を表す。\n【推量（Theme 21 / PU!18）】\n□ must have done「～したにちがいない」: 確信のある推量\n□ may have done「～したかもしれない」: 確信の持てない推量。might have doneもほぼ同義。\n□ cannot [can't] have done「～したはずがない」:\
    \ 確信のある否定的推量。couldn't have doneもほぼ同義。\n【非難・後悔（Theme 22 / PU!19）】\n□ should [ought to] have done「～すべきだったのに」: 過去のことに対する非難・後悔（実際はしなかった）。\n□ should [ought to] have done「～した[している]はずだ」: 推量の用法もある。by now /\
    \ by this timeとセットで使われることが多い。\n□ should not have done「～すべきではなかったのに」（= ought not to have done）: notの位置注意。⇨PU!21\n□ need not have done「～する必要はなかったのに（実際はした）」\n比較: needn't have done vs didn't need to do:\n\
    \  needn't have hurried = 急ぐ必要がなかったのに（急いだ）\n  didn't need to hurry = 急ぐ必要がなかった（急いだかは不明）\n"
- id: sdv-019
  name: 助動詞を用いた慣用表現①（can / may系）
  category: 動詞・時制
  priority: P2
  notes: "Theme 23。can / may / might を用いた慣用表現。\n□ cannot [can't] ~ too ...「いくら…しても～しすぎることはない」: tooの後ろには形容詞/副詞。\n□ cannot [can't] help doing「～せずにはいられない」: helpは「避ける」(= avoid)の意味。\n  同義: cannot but do《文語》、cannot\
    \ help but do《米口語》。butの後ろは原形。\n□ may [might] well do ①「～するのももっともだ」（= It is natural that ~ / have good reason to do）\n  ②「たぶん～だろう」(= It is likely that ~): wellは「十分に」の意味で、may単独より確信が強い。\n□ may [might]\
    \ as well do「（気は進まないが）～するほうがよいだろう」: 元はas notが省略。had betterより弱い。mightのほうが多少控えめだが実質差なし。\n□ might as well A as B「BするくらいならAするほうがましだ / Bするのは A するようなものだ」\nPU!20（発展）: 「～せずにはいられない」の上級表現:\n  have no choice but\
    \ to do / There is nothing for it but to do\n  ＊ can/cannotがあればbut do、そうでなければbut to doと覚える。\n参照: in doing「～する際に」⇨問133\n参照: do well to do「～するのが賢明である」（選択肢の解説）\n"
- id: sdv-020
  name: 助動詞を用いた慣用表現②（had better / would rather系）
  category: 動詞・時制
  priority: P1
  notes: "Theme 24。had better / would like / would rather を用いた慣用表現。\n□ had better do「～するほうがよい / ～しなさい」: 2語で1つの助動詞。後ろは原形。「そうしないと大変な目にあう」含意あり。youが主語の場合は忠告・軽い命令（目下の人や子どもに対して使うことが多い）。\n□ had better not do「～しないほうがよい」:\
    \ 否定はbetterの後にnot。\n□ would like to do「～したいのですが」: want to doより丁寧で遠慮がちな願望。口語で'd like to do。\n□ would like A to do「Aに～してほしいのですが」: would likeの後に目的語A。\n□ would rather A than B「Bするよりもむしろ A したい」: A, Bはともに原形。\n\
    □ would rather do「むしろ～したい」: would rather do than do のthan以下省略形。\n□ would rather not do「むしろ～したくない」: 否定はratherの後にnot。\nPU!21: 否定のnotの位置:\n  had better not do / would rather not do / ought not to do\n\
    \  ＊ 3つとも否定のnotの位置が異なるので注意。\n参照: ⇨問577（speak to ~）、⇨問1140（be independent of ~）、⇨問202（much+比較級）、⇨問620（reservation「予約」）\n"
