check_points:
  # skh-008
  - node_id: "skh-008"
    seq: 1
    question: "「...と同じぐらい〜」と「...ほど〜ではない」を原級比較で書け。"
    answer: "as + 原級 + as ... / not as [so] + 原級 + as ...。否定形はso/asどちらも可（soの方が文語的）。"
  - node_id: "skh-008"
    seq: 2
    question: "「...の2倍〜」を as ~ as で表す場合、X times の代わりに何を使うか？"
    answer: "twice。2倍はtwice、半分はhalf、4分の1はa quarterを使う。3倍以上はX times。"
  - node_id: "skh-008"
    seq: 3
    question: "「彼は私の3倍の本を持っている」を英訳せよ。"
    answer: "He has three times as many books as I (do). 語順注意: as many books as（×books as many as）。"
  - node_id: "skh-008"
    seq: 4
    question: "X times the size of ... はどのような表現と同義か？"
    answer: "X times as large as ...。「the + 名詞 + of」は「as + 形容詞 + as」とほぼ同義。"
  - node_id: "skh-008"
    seq: 5
    question: "twice + 比較級 + than は正しいか？"
    answer: "不可。X times + 比較級 + than は使えるが、twice [half] + 比較級 + than は不可。"
  # skh-009
  - node_id: "skh-009"
    seq: 1
    question: "as + 原級 + as possible を one can 型で書き換えた場合、過去時制ではどう変わるか？"
    answer: "canがcouldになる。例: as carefully as she could（過去時制）。"
  - node_id: "skh-009"
    seq: 2
    question: "not so much A as B と not so much as do の意味をそれぞれ答えよ。"
    answer: "not so much A as B =「AというよりはむしろB」。not so much as do =「〜さえしない」(= not even do)。"
  - node_id: "skh-009"
    seq: 3
    question: "She as well as I (am/is) tired. の動詞はどちらか？"
    answer: "is。A as well as B の主語では動詞はAに一致。She(A) as well as I(B) → Sheに合わせてis。"
  - node_id: "skh-009"
    seq: 4
    question: "as good as dead はどういう意味か？"
    answer: "「死んだも同然」。as good as 〜 =「ほとんど〜も同然」(= almost)。"
  - node_id: "skh-009"
    seq: 5
    question: "I saw three movies in as many days. の as many は何を意味するか？"
    answer: "「同数の」= three (days)。先行する数詞 three を受けて「3日間で3つの映画」の意味。"
  # skh-010
  - node_id: "skh-010"
    seq: 1
    question: "as many as 20 flights の as many as はどのような意味か？"
    answer: "「20便も」— 数の多さを強調する用法。「量」の場合はas much asを使う。"
  - node_id: "skh-010"
    seq: 2
    question: "as early as と as late as の意味をそれぞれ答えよ。"
    answer: "as early as 〜 =「早くも〜には」。as late as 〜 =「つい〜（ほど最近に）」。"
  - node_id: "skh-010"
    seq: 3
    question: "as + 原級 + as any と as + 原級 + as ever lived の違いは何か？"
    answer: "どちらも最上級に近い意味。anyは「どの...にも劣らず」、ever livedは「今までに例を見ないほど」。ever livedはany (+ 名詞 + that) ever livedの省略形と考えられる。"
  - node_id: "skh-010"
    seq: 4
    question: "He is as kind as ever. と He is as kind a man as ever lived. の ever の意味の違いは？"
    answer: "as ever =「相変わらず」。as ever lived =「これまで生きた誰にも劣らず」。混同しないこと。"
  # skh-011
  - node_id: "skh-011"
    seq: 1
    question: "比較級を強める語を3つ挙げよ。また、very は使えるか？"
    answer: "much, far, a lot（ずっと/はるかに）。veryは比較級の強調には使えない。"
  - node_id: "skh-011"
    seq: 2
    question: "「50年前よりずっと多くの女性」を英訳する場合、much more women は正しいか？"
    answer: "不可。複数名詞にはmany more womenを使う。much more は不可算名詞（much more oil）に用いる。"
  - node_id: "skh-011"
    seq: 3
    question: "late の比較級・最上級を2系列とも答えよ。"
    answer: "[時間] later - latest。[順序] latter - last。the latter「後者」⇔ the former「前者」。"
  - node_id: "skh-011"
    seq: 4
    question: "She is 5 centimeters taller than her mother. を by を使って書き換えよ。"
    answer: "She is taller than her mother by 5 centimeters. 差を強調する言い方。"

