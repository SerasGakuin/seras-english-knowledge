knowledge_nodes:
- id: skh-008
  name: 原級比較の基本と倍数表現
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 54+55: 原級比較の基本（問題184-185）+ 倍数の表し方（問題186-188）

    ■ as + 原級 + as ...「...と同じぐらい〜」:

    比較では「何」と「何」が比較されているかを明確にする。比較の対象は必ず同種類のもの。

    後ろのas[接続詞]以下の省略に注意。

    ■ not as [so] + 原級 + as ...「...ほど〜ではない」:

    = less + 原級 + than ...（参照: 問206）

    soよりasのほうが口語的。

    注意: 比較の対象に代名詞 that (= the + 既出名詞) を使う場合がある。

    例: The climate of England vs that of Japan（参照: Theme 82, 問303）

    ■ 倍数表現: X times as + 原級 + as ...「...のX倍〜」:

    2倍: twice（×two times）, 半分: half, 4分の1: a quarter

    3倍以上: three times, four times, ...

    ■ more than twice as + 原級 + as ...「...の2倍以上〜」

    ■ X times as + many 複数名詞 + as ...「...のX倍の（数の）名詞」:

    語順注意: as many books as（×books as many as）

    ■ X times as + much 不可算名詞 + as ...「...のX倍の（量の）名詞」

    ■ X times the size [length/width/height/number] of ...「...のX倍の大きさ[長さ/幅/高さ/数]」:

    the + 名詞 + of の形で倍数を表現。

    例: This dog is about the size of a small cat. = This dog is about as large as a small cat.

    発展: X times + 比較級 + than ... も同じ意味だが、twice [half] + 比較級 + than ... は不可。

    ■ PU!34 倍数の表し方:

    one-third [two-thirds] as + 原級 + as ...「...の3分の1[3分の2]〜」

    half as + 原級 + as ...「...の半分〜」

    one and a half times as + 原級 + as ...「...の1.5倍〜」

    ■ PU!35 (倍数+) the + 名詞 + of 〜:

    the + 名詞 + of は as + 形容詞 + as とほぼ同意。

    '
- id: skh-009
  name: 原級を用いた慣用表現
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 56: 原級を用いた慣用表現（問題189-196）

    ■ as + 原級 + as possible「できるだけ〜」(= as + 原級 + as one can):

    過去時制のときはcanがcouldになる。

    ■ not so much A as B「AというよりはむしろB」(= B rather than A):

    注意: rather thanで書き換えるとAとBが逆になる。

    ■ not so much as do「〜さえしない」(= not even do):

    not so much A as Bと混同しないこと。

    ■ without so much as doing「〜さえないで」(= without even doing):

    without doing + not so much as do の組み合わせ。

    ■ A as well as B「Bと同様にAも」(= not only B but also A):

    主語として用いる場合、動詞はAに一致させるのが原則。

    ■ as good as 〜「（ほとんど）〜も同様[同然]」(= all but / almost):

    通例、形容詞・副詞・動詞の前で用いる。

    発展: be as good as one''s word [promise]「必ず約束を守る」

    ■ as many 〜「（先行する数詞を受けて）同数の〜」:

    例: three movies in as many days「3日間で3つの映画」

    比較: as much 〜「同量の〜」, like so many 〜「まるで同数の〜のように」

    '
- id: skh-010
  name: 強調のas~asと最上級に近い原級表現
  category: 仮定法・比較
  priority: P2
  notes: 'Theme 57+58: 強調のas ~ as（問題197-199）+ 最上級に近い意味を表す原級表現（問題200-201）

    ■ as many as 〜「（数を強調して）〜も（多くの）」

    ■ as much as 〜「（量を強調して）〜も（多くの）」

    ■ as early as 〜「（時期の早さを強調して）早くも〜には」

    ■ as late as 〜「（時期の遅さを強調して）つい〜（ほど最近に）」

    ■ as recently as 〜「（最近を強調して）つい〜（ほど最近に）」

    ■ as often as 〜「（頻度を強調して）〜回も」

    ■ as long as 〜「（時間の長さを強調して）〜も」

    ■ PU!36 強調のas ~ as まとめ

    ■ as + 原級 + as any (+ 単数名詞)「どの...にも劣らず〜」:

    実質的に最上級に近い意味。

    ■ as + 原級 + as ever + 動詞「これまで...したどれにも劣らず〜 / 今までに例を見ないほど〜」:

    as + 原級 + as ever lived の形で用いられることが多い。

    as + 原級 + as any の変種と考えると理解しやすい。

    注意: as excellent a composer の語順（as + 形容詞 + a [an] + 名詞）参照: PU!137

    比較: as + 原級 + as ever「相変わらず〜」と混同しないこと。

    例: He is as kind as ever.（相変わらず親切だ）

    '
- id: skh-011
  name: 比較級の基本と強調
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 59: 比較級の基本と強調（問題202-206）

    ■ 比較級の強調語:

    much / (by) far / a lot + 比較級「ずっと〜 / はるかに〜」

    even / still + 比較級「さらに〜 / いっそう〜」

    a little / a bit + 比較級「少し〜」

    注意: very, moreは比較級の強調には使えない。

    ■ far + 比較級: muchよりも強意的。

    ■ many more + 複数名詞 + than ...「...よりずっと多くの〜」:

    「数がずっと多い」の意味ではmuch more 〜ではなくmany more 〜の形をとる。

    manyの代わりにfar, a lotも可。

    比較: 「量がずっと多い」→ much more + 不可算名詞。

    ■ the latter「後半の / 後者の」⇔ the former「前半の / 前者の」:

    lateの2通りの比較変化（参照: PU!38）

    注意: ① late「故〜」, ② lately「最近」(= of late)

    ■ less + 原級 + than ...「...ほど〜ではない」:

    = not as [so] + 原級 + as ...（参照: 問185）

    やや硬い表現。口語ではあまり使われない。

    ■ PU!37 比較の差を表す形:

    (1) 差をばく然と表す: much/far/a lot（ずっと）, even/still（さらに）, a little/a bit（少し）

    (2) 差を明確に表す: 具体的な数値を比較級の前に置く。

    例: She is 5 centimeters taller than her mother.

    = She is taller than her mother by 5 centimeters.（差を強調する言い方）

    ■ PU!38 不規則変化する形容詞・副詞:

    good/well → better → best

    bad/ill/badly → worse → worst

    many/much → more → most

    little → less → least

    late → later/latter → latest/last

    far → farther/further → farthest/furthest

    old → older/elder → oldest/eldest

    '
- id: skh-012
  name: 比較級を用いた重要表現
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 60+61: 比較級を用いた重要表現（問題207-213）+ 比較級なのに例外的にtheがつく表現（問題214-217）

    ■ more A than B「BよりはむしろA」(= A rather than B / not so much B as A):

    同じ人・物の異なる性質を比べる場合、通常-erの形容詞でもmore A(原級) than B(原級)の形を用いる。

    例: She is more cute than beautiful.（cuter than beautifulは不可）

    ■ 否定文 +, much [still] less 〜「まして〜でない」(= let alone):

    much/still（比較級の強調）+ less（否定で訳す）。名詞だけでなく動詞も置ける。

    比較: 肯定文 +, much [still] more「まして〜である」— 現在ではほとんど用いられない。

    to say nothing of 〜「〜は言うまでもなく」(⇨ 問104)を代わりに使う。

    ■ know better (than to do)「（〜するほど）愚かではない」(= be wise enough not to do):

    文脈上明らかな場合はthan以下を省略可。

    should have known better「もっと分別を持つべきだったのに」(⇨ 問69 助動詞+have done)

    ■ 比較級 + and + 比較級「ますます〜 / だんだん〜」:

    more型の場合: more and more + 原級。

    more and more + 名詞「ますます多くの〜」も重要。

    ■ more or less「多かれ少なかれ / だいたい」

    ■ sooner or later「遅かれ早かれ」:

    比較: in time「やがて / そのうちに」(⇨ 問1247)がほぼ同意。

    ■ no longer 〜「もはや〜でない」(= not 〜 any longer)

    ■ the + 比較級 〜, the + 比較級 ...「〜すればするほど、ますます...」:

    前のthe + 比較級が従属節、後のthe + 比較級が主節。

    注意: 元の文の形容詞を比較級にしてtheをつけて節の頭に置く。

    例: The more I look at this picture, the more attractive it looks.

    ×the more it looks attractive（語順注意）

    ■ (all) the + 比較級 + 理由「〜のためにそれだけますます...」:

    allは強意の副詞（省略可）。理由にはfor+名詞やbecause節を用いる。

    likeにはbetter, loveにはmoreを用いることが多い。

    ■ none the + 比較級 + 理由「〜だからといって少しも...でない」:

    ↑の否定形。none the less for 〜「〜にもかかわらず」は重要イディオム（二重否定→強い肯定）。

    参照: Theme 76（二重否定）

    ■ the + 比較級 + of the two (+ 複数名詞)「2つ[2人]のうちで〜のほう」:

    of the twoで1つに特定されるのでtheが必要。

    '
- id: skh-013
  name: ラテン系比較級
  category: 仮定法・比較
  priority: P2
  notes: 'Theme 62: thanではなくtoを用いる比較級表現（問題218-220）

    ラテン語が語源の形容詞・動詞は比較対象にthanではなくtoを用いる。

    注意: toの後ろに代名詞が来る場合は必ず目的格。than me [I] / to me [×I]

    ■ be superior to 〜「〜より優れている」(= be better than 〜)

    ⇔ be inferior to 〜「〜より劣っている」(= be not as good as 〜)

    しばしば後ろにin ...「...の点で」が続く。

    ■ be senior to 〜「〜より年上である」

    ⇔ be junior to 〜「〜より年下である」

    数量差の表現: He is five years senior to us. = He is five years older than us.

    ■ prefer A to B「BよりAを好む」(= like A better than B):

    A, Bには名詞または動名詞が来る。

    書き換え: prefer to do A rather than (to) do B

    ■ be preferable to 〜「〜より望ましい」:

    形容詞形もtoを用いる。

    ■ PU!39 ラテン系比較級まとめ:

    superior/inferior, senior/junior, prefer, preferable — すべてtoを使う。

    '
- id: skh-014
  name: 否定語を含む比較表現
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 63: 否定語を含む比較表現（問題221-226）

    ■ no more 〜 than ...「...でないのと同様に〜でない」— 両方否定:

    いわゆる「クジラの公式（第一公式）」。thanの後は肯定形だが、両方を打ち消す。

    A whale is no more a fish than a horse is.（馬が魚でないのと同様にクジラは魚ではない）

    ■ not 〜 any more than ...「...でないのと同様に〜でない」:

    no more 〜 than と同義。noがnotとanyに分離された口語的な形。

    ■ no less 〜 than ...「...と同様に〜である / ...に劣らず〜」— 両方肯定:

    「クジラの第二公式」。明らかに肯定できることを引き合いに出して強調。

    A whale is no less a mammal than a horse is.（馬が哺乳類であるのと同様にクジラは哺乳類だ）

    ■ no more than 〜「わずか〜だけ / 〜しかない」(= only / as few [little] as):

    「少なさ」を強調。

    ■ no less than 〜「〜もある」(= as many [much] as):

    「多さ」を強調。

    ■ not more than 〜「多くとも〜 / せいぜい〜」(= at most):

    「〜より多くはない」。

    ■ not less than 〜「少なくとも〜」(= at least):

    「〜より少なくはない」。

    ■ PU!40 no more [less] than vs not more [less] than まとめ:

    no more than = only（少なさ強調）/ no less than = as many as（多さ強調）

    not more than = at most / not less than = at least

    ■ PU!41 no + 比較級 + than 〜 の書き換え公式:

    no + 比較級 + than 〜 = as + 反意語の原級 + as

    noは「決して〜でない」という強い否定で、優劣の比較を全面的に否定。

    例: no bigger than 〜 = as small as 〜

    no better than 〜 = as bad as 〜「〜も同然で」

    no richer than 〜 = as poor as 〜

    '
- id: skh-015
  name: 最上級の表現と書き換え
  category: 仮定法・比較
  priority: P1
  notes: 'Theme 64+65: 最上級を用いた表現（問題227-234）+ 最上級の意味を表す原級・比較級表現（問題235-239）

    ■ 最上級 + of [in] A「Aの中で一番〜」:

    Aが同類の複数を表す語句 → of A。Aが場所や集団を表す単数名詞 → in A。

    原則: 形容詞の最上級にはtheをつけ、副詞の最上級にはtheをつけない。

    ただし特定の人たちの中で一番の場合は副詞にもtheをつけることがある。

    ■ one of the + 最上級 + 複数名詞「最も〜な...の1つ[1人]」

    ■ by far the + 最上級「ずば抜けて一番〜」:

    最上級の強調: by far, much。veryも使えるが語順はthe very + 最上級。

    ×very the best / ○the very best

    ■ the + 最上級 + 名詞 + (that +) S have ever done「Sが今までに〜した中で一番...」:

    先行詞が最上級・first・only・veryで修飾 → 関係代名詞thatを好む。

    ■ the + 序数詞 + 最上級「何番目に〜」:

    the second largest country「2番目に大きな国」

    ■ make the most of 〜「（有利な状況）を最大限に利用する」:

    比較: make the best of 〜「（不利な状況）を精一杯利用する」

    ■ to the best of A''s knowledge「Aの知る限りでは」(= as far as A know ⇨ PU!86)

    ■ PU!42 at + 最上級:

    at most「多くても」⇔ at least「少なくとも」

    at best「よくても」⇔ at worst「最悪の場合でも」

    at latest「遅くとも」⇔ at earliest「早くとも」

    cf. at one''s best「最良の状態で」

    ■ A is + 比較級 + than any other + 単数名詞「Aは他のどんな...より〜」:

    最上級の書き換え。any otherの後は単数名詞。

    発展: 主語Aが複数なら any other + 複数名詞。

    ■ No (other) + 単数名詞 + is so [as] + 原級 + as A「Aほど...な〜はない」

    ■ No (other) + 単数名詞 + is + 比較級 + than A「Aより...な〜はない」

    ■ Nothing is so [as] + 原級 + as A「Aほど...なものはない」:

    比較の対象がはっきりしない場合、No other + 単数名詞の代わりにNothingを用いる。

    = There is nothing so [as] + 原級 + as A

    ■ Nothing is + 比較級 + than A「Aより...なものはない」:

    = There is nothing + 比較級 + than A

    ■ PU!43 最上級の意味を表す原級・比較級表現まとめ:

    特定の対象: No other + 単数名詞, than any other + 単数名詞

    不特定の対象: Nothing/anything else

    比較の対象が人: anyone else

    '
