- node_id: skh-008
  seq: 2
  question: 「...の2倍〜」を as ~ as で表す場合、X times の代わりに何を使うか？
  answer: twice。2倍はtwice、半分はhalf、4分の1はa quarterを使う。3倍以上はX times。
- node_id: skh-008
  seq: 3
  question: 「彼は私の3倍の本を持っている」を英訳せよ。
  answer: 'He has three times as many books as I (do). 語順注意: as many books as（×books as many as）。'
- node_id: skh-008
  seq: 4
  question: X times the size of ... はどのような表現と同義か？
  answer: X times as large as ...。「the + 名詞 + of」は「as + 形容詞 + as」とほぼ同義。
- node_id: skh-008
  seq: 5
  question: twice + 比較級 + than は正しいか？
  answer: 不可。X times + 比較級 + than は使えるが、twice [half] + 比較級 + than は不可。
- node_id: skh-009
  seq: 1
  question: as + 原級 + as possible を one can 型で書き換えた場合、過去時制ではどう変わるか？
  answer: 'canがcouldになる。例: as carefully as she could（過去時制）。'
- node_id: skh-009
  seq: 2
  question: not so much A as B と not so much as do の意味をそれぞれ答えよ。
  answer: not so much A as B =「AというよりはむしろB」。not so much as do =「〜さえしない」(= not even do)。
- node_id: skh-009
  seq: 3
  question: She as well as I (am/is) tired. の動詞はどちらか？
  answer: is。A as well as B の主語では動詞はAに一致。She(A) as well as I(B) → Sheに合わせてis。
- node_id: skh-009
  seq: 4
  question: as good as dead はどういう意味か？
  answer: 「死んだも同然」。as good as 〜 =「ほとんど〜も同然」(= almost)。
- node_id: skh-009
  seq: 5
  question: I saw three movies in as many days. の as many は何を意味するか？
  answer: 「同数の」= three (days)。先行する数詞 three を受けて「3日間で3つの映画」の意味。
- node_id: skh-010
  seq: 1
  question: as many as 20 flights の as many as はどのような意味か？
  answer: 「20便も」— 数の多さを強調する用法。「量」の場合はas much asを使う。
- node_id: skh-010
  seq: 2
  question: as early as と as late as の意味をそれぞれ答えよ。
  answer: as early as 〜 =「早くも〜には」。as late as 〜 =「つい〜（ほど最近に）」。
- node_id: skh-010
  seq: 3
  question: as + 原級 + as any と as + 原級 + as ever lived の違いは何か？
  answer: どちらも最上級に近い意味。anyは「どの...にも劣らず」、ever livedは「今までに例を見ないほど」。ever livedはany (+ 名詞 + that) ever livedの省略形と考えられる。
- node_id: skh-010
  seq: 4
  question: He is as kind as ever. と He is as kind a man as ever lived. の ever の意味の違いは？
  answer: as ever =「相変わらず」。as ever lived =「これまで生きた誰にも劣らず」。混同しないこと。
- node_id: skh-011
  seq: 1
  question: 比較級を強める語を3つ挙げよ。また、very は使えるか？
  answer: much, far, a lot（ずっと/はるかに）。veryは比較級の強調には使えない。
- node_id: skh-011
  seq: 2
  question: 「50年前よりずっと多くの女性」を英訳する場合、much more women は正しいか？
  answer: 不可。複数名詞にはmany more womenを使う。much more は不可算名詞（much more oil）に用いる。
- node_id: skh-011
  seq: 3
  question: late の比較級・最上級を2系列とも答えよ。
  answer: '[時間] later - latest。[順序] latter - last。the latter「後者」⇔ the former「前者」。'
- node_id: skh-011
  seq: 4
  question: She is 5 centimeters taller than her mother. を by を使って書き換えよ。
  answer: She is taller than her mother by 5 centimeters. 差を強調する言い方。
- node_id: skh-012
  seq: 1
  question: She is more cute than beautiful. でなぜ cuter を使わないのか？
  answer: 同じ人の異なる性質を比べるときは、通常-erの形容詞でもmore A(原級) than B(原級)の形を用いる。
- node_id: skh-012
  seq: 2
  question: 否定文の後に「まして〜でない」を表す表現は？ 肯定文の場合はどうするか？
  answer: 否定文 +, much [still] less 〜 (= let alone)。肯定文の場合 much [still] moreは現在ほぼ使われず、to say nothing of 〜を使う。
- node_id: skh-012
  seq: 3
  question: The more I look at this picture, the more attractive it looks. でなぜ the more it looks attractive ではないのか？
  answer: 元の文 it looks attractive の形容詞attractiveを比較級にしてtheをつけ、節の頭に置く。the more attractive it looksが正しい語順。
- node_id: skh-012
  seq: 4
  question: I like her all the better for her weak points. と none the happier for his wealth の意味をそれぞれ答えよ。
  answer: 前者「弱点があるのでそれだけいっそう好きだ」(all the + 比較級 + for)。後者「富があるからといって少しも幸せでない」(none the + 比較級 + for)。
- node_id: skh-012
  seq: 5
  question: Lucy wanted the larger of the two boxes. でなぜ a larger ではなく the larger なのか？
  answer: of the twoで「2つのうちの〜のほう」と1つに特定されるためtheが必要。
- node_id: skh-013
  seq: 1
  question: His paper is superior (than/to) mine. どちらが正しいか？ また、to me ではなく to mine にする理由は？
  answer: toが正しい。ラテン系比較級はthanではなくtoを用いる。比較の対象はhis paperとmy paperなので、mine (= my paper)が正しい。
- node_id: skh-013
  seq: 2
  question: prefer A to B の A, B に動詞を置く場合、どのような形になるか？
  answer: A, Bには名詞または動名詞を置く（prefer reading to going）。不定詞の場合はprefer to do A rather than (to) do Bの形。
- node_id: skh-013
  seq: 3
  question: ラテン系比較級を5つ挙げよ。
  answer: superior to, inferior to, senior to, junior to, prefer A to B。形容詞preferable toも含む。すべてthanではなくtoを用いる。
- node_id: skh-014
  seq: 1
  question: A whale is no more a fish than a horse is. はどういう意味か？ この表現の名称は？
  answer: 「馬が魚でないのと同様にクジラは魚ではない」（両方否定）。クジラの公式（第一公式）と呼ばれる。
- node_id: skh-014
  seq: 2
  question: no more than 1,000 yen と no less than 1,000 yen の意味をそれぞれ答えよ。
  answer: no more than = only（たった千円しかない — 少なさを強調）。no less than = as many/much as（千円も持っている — 多さを強調）。
- node_id: skh-014
  seq: 3
  question: not more than 1,000 yen と not less than 1,000 yen の意味をそれぞれ答えよ。
  answer: not more than = at most（せいぜい千円）。not less than = at least（少なくとも千円）。
- node_id: skh-014
  seq: 4
  question: no bigger than a matchbox を as ~ as で書き換えよ。
  answer: as small as a matchbox。no + 比較級 + than = as + 反意語の原級 + as。
- node_id: skh-015
  seq: 1
  question: 最上級 + of A / in A の使い分けの基準は何か？
  answer: Aが同類の複数を表す語句 → of A（of all the doctors）。Aが場所や集団を表す単数名詞 → in A（in Kyoto）。
- node_id: skh-015
  seq: 2
  question: by far the best / the very best は正しいが、very the best は正しいか？
  answer: 不可。by farは the + 最上級の前に置けるが、veryはthe very + 最上級の語順。×very the best / ○the very best。
- node_id: skh-015
  seq: 3
  question: 「富士山は日本で一番高い山だ」を比較級で2通り書け。
  answer: (1) Mt. Fuji is higher than any other mountain in Japan. (2) No other mountain in Japan is higher than Mt. Fuji.
- node_id: skh-015
  seq: 4
  question: Nothing is so precious as time. を最上級で書け。
  answer: Time is the most precious of all things [thing of all]. Nothingは比較対象が不特定の場合に使う。
- node_id: skh-015
  seq: 5
  question: make the most of と make the best of の違いは？
  answer: make the most of 〜 =（有利な状況を）最大限に利用する。make the best of 〜 =（不利な状況を）精一杯利用する / 前向きに考える。
