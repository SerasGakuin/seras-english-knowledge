knowledge_nodes:
- id: sdv-001
  name: 基本3時制の用法
  category: 動詞・時制
  priority: P1
  notes: 'Theme 1: 基本3時制の用法（問題1-4）

    時制の問題では「時を表す副詞表現」に注目することが重要。

    ■ 現在形の用法:

    ① 現在の事実・状態

    ② 現在の習慣的動作（every day 等の副詞が手がかり）

    ③ 不変の真理・一般的事実（時制の一致を受けない）

    ④ 確定的な未来の予定（公的な予定に用いられることが多い）

    ■ 過去形の用法:

    ① 過去のできごと・状態（ago, when+SV(過去) 等が手がかり）

    ② 過去の習慣的動作

    ■ will を用いた形（未来）:

    ① 単純未来 — 未来のできごと・状態（next time 等が手がかり）

    ② 意志未来 — 話し手や主語の意志

    ■ be going to do:

    ① 根拠に基づく予測・判断「～しそうである」

    ② 話し手の意図・予定・計画「～するつもりである」

    [図表: 表 — 12時制の基本形式一覧（PU!1）]

    Power Up! 1: 現在形・過去形・未来形 × 基本形・進行形・完了形・完了進行形 = 12の形。

    Power Up! 2: 基本形の意味まとめ。現在形4用法・過去形2用法・will 2用法。

    参照: Theme 5（現在完了形とともに使えない語句 — 問題3解説〈選択肢〉）

    '
- id: sdv-002
  name: 進行形の用法と制約
  category: 動詞・時制
  priority: P1
  notes: 'Theme 2: 進行形の用法（問題5-8）+ Theme 3: 進行形にできない動詞（問題9-10）

    ■ 進行形の基本用法（ある時点で進行中の動作を表す）:

    ① 現在進行形（am/is/are doing）: 今まさに進行中の動作

    ② 過去進行形（was/were doing）: 過去のある時点で進行中だった動作

    ③ 未来進行形（will be doing）: 未来のある時点で進行中であろう動作

    ■ 現在進行形の特殊用法:

    確定的な近い未来の予定「～することになっている」を表す（個人的な予定に多い）。

    比較: 現在形の確定的未来は公的な予定に多い（⇨ sdv-001）。

    ■ 進行形にできない動詞（PU!3）:

    (1)「継続的な状態」を表す動詞: be/remain, seem/look/appear, have/own/possess, belong(⇨問9), resemble, contain

    (2)「無意識的な知覚」を表す動詞: see, hear(⇨問10), feel, smell, taste

    (3)「心理状態」を表す動詞: know, like, hate, believe, want, understand

    ※ have は「～を食べる」等の動作の意味では進行形にできる。

    ※ 意識的な動作を表す知覚動詞（look at, watch, listen to, taste「味見する」, feel「手探りする」）は進行形にできる。

    ※ 「一時的な状態」を強調するときは状態動詞でも進行形にできることがある（I''m being serious now.）

    参照: Power Up! 124（talk with Aについて — 問題5語句）

    '
- id: sdv-003
  name: 現在完了の用法と制約
  category: 動詞・時制
  priority: P1
  notes: 'Theme 4: 現在完了の用法（問題11-16）+ Theme 5: 現在完了形とともに使えない語句（問題17-18）

    現在完了形（have/has + 過去分詞）は過去の動作・状態が現在にどうつながっているかを示す時制。

    ■ 3用法:

    ①『完了・結果』「～してしまった」: just, already, now, yet を伴うことが多い

    ②『経験』「～したことがある」: ever, never, before, once, twice, often を伴うことが多い

    ③『継続』「ずっと～である/している」: for ~, since ~, How long ~? を伴うことが多い

    ■ 状態動詞 vs 動作動詞の継続:

    状態動詞（know等）→ 現在完了形で継続を表す（have known）

    動作動詞（collect等）→ 現在完了進行形で継続を表す（have been collecting）

    ■ have been to ~ vs have gone to ~:

    have been to ~「～に行ったことがある」(経験) /「～に行ってきたところだ」(完了)

    have gone to ~「～に行ってしまった（今はいない）」(結果)

    ※《米》では「～に行ったことがある」に have gone to ~ を使うこともある

    ■ 現在完了形とともに使えない語句（PU!5）:

    yesterday, last night/month/year, ~ ago(⇨問17), then, in 1948, when+SV(過去)(⇨問18), When ~?

    → 明らかに過去の時を示す語句とは共起できない。過去形を使う。

    Power Up! 4: 現在完了形とともによく使われる語句一覧（完了・経験・継続別）

    Power Up! 5: 現在完了形とともに使えない語句一覧

    〈選択肢〉問18: 過去完了を使うには過去の基準点が必要。漠然とした広い期間は基準点にならない。

    '
- id: sdv-004
  name: 過去完了形と未来完了形の用法
  category: 動詞・時制
  priority: P1
  notes: 'Theme 6: 過去完了形と未来完了形の用法（問題19-22）

    現在完了形の「現在」という時の基準を、過去/未来のある時点に移行したものと考える。

    [図表: 時間軸図 — 大過去←過去完了→過去←現在完了→現在←未来完了→未来]

    ■ 過去完了形（had + 過去分詞）:

    ① 過去のある時点までの完了（⇨問19: had already arrived）

    ② 過去のある時点までの状態の継続

    ③ 大過去（過去から見た過去）: 過去の2つの出来事で先に起こった方を過去完了形にする（⇨問21）

    ■ 過去完了進行形（had been doing）:

    過去のある時点までの動作の継続を表す（⇨問20: had been drifting）

    ■ 未来完了形（will have + 過去分詞）:

    未来のある時点までの完了を表す。by ~ 等の期限を示す語句と共起（⇨問22）

    '
- id: sdv-005
  name: 時・条件を表す副詞節中の時制
  category: 動詞・時制
  priority: P1
  notes: 'Theme 7: 時・条件を表す副詞節中の時制（問題23-28）

    〈重要〉時制問題では最頻出のルール。

    ■ 基本ルール:

    when や if 等に導かれた「時」「条件」を表す副詞節中では、未来のことでも現在形を用いる。

    ■ 名詞節との区別:

    when/if に導かれていても、名詞節の場合は未来のことは未来形で表す。

    ・when「～する時」(副詞節/接続詞) → 現在形

    ・when「いつ～するか」(名詞節/疑問詞) → will を用いた形

    ・if「もし～なら」(副詞節/接続詞) → 現在形

    ・if「～するかどうか」(名詞節/接続詞) → will を用いた形

    ■ 副詞節中の未来完了:

    副詞節中では未来完了の内容でも現在完了形を用いる（⇨問28: have reached）

    ■ 名詞節に使われる主な動詞: tell, know, wonder 等の目的語として用いられる

    ■ 副詞節を導く接続詞:

    時: when, until/till, as soon as, by the time, after, before 等

    条件: if, unless, in case 等

    ※ when/if 以外の上記接続詞は名詞節を導かない

    Power Up! 6: 副詞節 vs 名詞節の識別表（when/if × 時/条件 × 副詞節/名詞節）

    '
