# Ch01 時制 — パイロット: Scr_001（Theme 1: 基本3時制の用法）

knowledge_nodes:
  - id: "sdv-001"
    name: "基本3時制の用法"
    category: "動詞・時制"
    priority: "P1"
    notes: |
      Theme 1: 基本3時制の用法（問題1-4）
      時制の問題では「時を表す副詞表現」に注目することが重要。
      ■ 現在形の用法:
      ① 現在の事実・状態
      ② 現在の習慣的動作（every day 等の副詞が手がかり）
      ③ 不変の真理・一般的事実（時制の一致を受けない）
      ④ 確定的な未来の予定（公的な予定に用いられることが多い）
      ■ 過去形の用法:
      ① 過去のできごと・状態（ago, when+SV(過去) 等が手がかり）
      ② 過去の習慣的動作
      ■ will を用いた形（未来）:
      ① 単純未来 — 未来のできごと・状態（next time 等が手がかり）
      ② 意志未来 — 話し手や主語の意志
      ■ be going to do:
      ① 根拠に基づく予測・判断「～しそうである」
      ② 話し手の意図・予定・計画「～するつもりである」
      [図表: 表 — 12時制の基本形式一覧（PU!1）]
      Power Up! 1: 現在形・過去形・未来形 × 基本形・進行形・完了形・完了進行形 = 12の形。
      Power Up! 2: 基本形の意味まとめ。現在形4用法・過去形2用法・will 2用法。
      参照: Theme 5（現在完了形とともに使えない語句 — 問題3解説〈選択肢〉）

understanding_goals:
  - node_id: "sdv-001"
    seq: 1
    goal: "every day / yesterday / next time 等の副詞表現から適切な時制を選択できる"
  - node_id: "sdv-001"
    seq: 2
    goal: "現在形の4用法（事実・習慣・真理・確定的未来）を区別できる"
  - node_id: "sdv-001"
    seq: 3
    goal: "不変の真理は時制の一致を受けないことを説明できる"
  - node_id: "sdv-001"
    seq: 4
    goal: "will と be going to の使い分け（単純未来/意志未来 vs 根拠に基づく予測/意図）ができる"

check_points:
  - node_id: "sdv-001"
    seq: 1
    question: "every day のような習慣を示す副詞があるとき、動詞はどの時制にするか？"
    answer: "現在形にする。現在の習慣的動作を表す。"
  - node_id: "sdv-001"
    seq: 2
    question: "「水は100度で沸騰する」のような不変の真理を表すとき、主節が過去形でも従属節はどうなるか？"
    answer: "従属節も現在形のまま。不変の真理は時制の一致を受けない。"
  - node_id: "sdv-001"
    seq: 3
    question: "be going to do の2つの意味は何か？"
    answer: "① 根拠に基づく予測・判断（～しそうだ） ② 話し手の意図・予定・計画（～するつもりだ）"
  - node_id: "sdv-001"
    seq: 4
    question: "英語の時制は全部で何通りの形があるか？"
    answer: "12通り。3時制（現在・過去・未来）× 4形式（基本形・進行形・完了形・完了進行形）。"

