check_points:
- node_id: sdv-001
  seq: 1
  question: every day のような習慣を示す副詞があるとき、動詞はどの時制にするか？
  answer: 現在形にする。現在の習慣的動作を表す。
- node_id: sdv-001
  seq: 2
  question: 「水は100度で沸騰する」のような不変の真理を表すとき、主節が過去形でも従属節はどうなるか？
  answer: 従属節も現在形のまま。不変の真理は時制の一致を受けない。
- node_id: sdv-001
  seq: 3
  question: be going to do の2つの意味は何か？
  answer: ① 根拠に基づく予測・判断（～しそうだ） ② 話し手の意図・予定・計画（～するつもりだ）
- node_id: sdv-001
  seq: 4
  question: 英語の時制は全部で何通りの形があるか？
  answer: 12通り。3時制（現在・過去・未来）× 4形式（基本形・進行形・完了形・完了進行形）。
- node_id: sdv-002
  seq: 1
  question: 進行形にできない動詞にはどのような種類があるか？
  answer: (1)継続的な状態を表す動詞（belong, resemble等）、(2)無意識的な知覚を表す動詞（see, hear等）、(3)心理状態を表す動詞（know, believe等）の3種類。
- node_id: sdv-002
  seq: 2
  question: 現在進行形で「確定的な近い未来の予定」を表す場合、現在形の「確定的な未来の予定」との違いは？
  answer: 現在進行形は個人的な予定に用いられることが多く、現在形は公的な予定に用いられることが多い。
- node_id: sdv-002
  seq: 3
  question: hear は進行形にできないが、listen to は進行形にできる。その理由は？
  answer: hear は「無意識的な知覚」を表すのに対し、listen to は「意識的な動作」を表すため。
- node_id: sdv-002
  seq: 4
  question: 状態動詞でも進行形にできる例外はどのような場合か？
  answer: '「一時的な状態」を強調するとき（例: I''m being serious now.「今はまじめにしているよ」）。'
- node_id: sdv-003
  seq: 1
  question: 現在完了形の「継続」用法で、状態動詞と動作動詞ではどう使い分けるか？
  answer: 状態動詞（know等）は現在完了形（have known）で継続を表し、動作動詞（collect等）は現在完了進行形（have been collecting）で継続を表す。
- node_id: sdv-003
  seq: 2
  question: have been to ~ と have gone to ~ の違いは？
  answer: have been to ~ は「～に行ったことがある」(経験) または「～に行ってきたところだ」(完了)。have gone to ~ は「～に行ってしまった（今はいない）」(結果)。
- node_id: sdv-003
  seq: 3
  question: ten years ago は現在完了形と共起できるか？
  answer: できない。~ ago は明らかに過去の時を示す語句なので、現在完了形ではなく過去形を用いる。
- node_id: sdv-003
  seq: 4
  question: 「完了・結果」用法でよく使われる副詞を3つ挙げよ。
  answer: just（たった今）、already（もう）、yet（疑問文で「もう」/否定文で「まだ」）。
- node_id: sdv-004
  seq: 1
  question: 過去の2つの出来事を述べる場合、先に起こった出来事はどの時制で表すか？
  answer: 過去完了形（had + 過去分詞）で表す。この用法を「大過去」という。
- node_id: sdv-004
  seq: 2
  question: 過去完了形は現在完了形とどのような関係にあるか？
  answer: 現在完了形の「現在」という時の基準を「過去のある時点」に移行したものが過去完了形。
- node_id: sdv-004
  seq: 3
  question: 未来完了形（will have done）はどのような場面で使うか？
  answer: 未来のある時点までに完了しているであろう動作・状態を表す場合に使う。by 等の期限を表す語句とともに用いることが多い。
- node_id: sdv-004
  seq: 4
  question: 過去のある時点までの動作の継続を表す時制は何か？
  answer: '過去完了進行形（had been doing）。例: Bob had been drifting for two days before he was found.'
- node_id: sdv-005
  seq: 1
  question: I will wait until she (comes / will come). の正しい形は？
  answer: comes。until は時を表す副詞節を導くので、未来のことでも現在形を用いる。
- node_id: sdv-005
  seq: 2
  question: I don't know when he (comes / will come). の正しい形は？
  answer: will come。when が導く名詞節（know の目的語）なので、未来のことは未来形で表す。
- node_id: sdv-005
  seq: 3
  question: when/if 節が副詞節か名詞節かを判断する方法は？
  answer: when「～する時」→ 副詞節（接続詞）、when「いつ～するか」→ 名詞節（疑問詞）。if「もし～なら」→ 副詞節、if「～するかどうか」→ 名詞節。
- node_id: sdv-005
  seq: 4
  question: 副詞節中で未来完了の内容を表す場合、どの時制を使うか？
  answer: '現在完了形を使う（例: as soon as you have reached ...）。'
