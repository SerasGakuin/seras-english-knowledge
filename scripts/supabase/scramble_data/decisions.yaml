decisions:
  - id: 1
    date: "2026-03-01"
    section: "Scr_001"
    question: "PU!1の12時制表の形（I do. / I did. 等）はsentencesに登録するか？"
    decision: "登録しない。スケルトン的で完全な文でない。"
    decided_by: "リード"
  - id: 2
    date: "2026-03-01"
    section: "Scr_001"
    question: "PU!2中の例文（Our school festival begins tomorrow. 等）はsentencesに登録するか？"
    decision: "登録する。完全な文で和訳もある。"
    decided_by: "リード"
  - id: 3
    date: "2026-03-01"
    section: "general"
    question: "drill フィールドの値はどうするか？"
    decision: "exam = 1, example = 0。問題集の問題はドリル扱い、例文は非ドリル。"
    decided_by: "リード"
  - id: 4
    date: "2026-03-01"
    section: "Scr_046"
    question: "PU!29はScr_046に含めるか、Scr_047に含めるか？"
    decision: "Scr_047に含める。位置的にTheme 47の直後にある。"
    decided_by: "リード"
  - id: 5
    date: "2026-03-01"
    section: "general"
    question: "解説中の書き換え文（本問 = ... の形）はsentencesに登録するか？"
    decision: "登録しない。構造的パラフレーズで独立した例文でない。"
    decided_by: "リード"
  - id: 6
    date: "2026-03-01"
    section: "general"
    question: "対話形式問題の場合、AとBどちらの文を登録するか？"
    decision: "Bの文のみ登録し、Aの文はnotesに記録。文法ポイントを含む文を優先。"
    decided_by: "リード"
  - id: 7
    date: "2026-03-01"
    section: "general"
    question: "PU!内の用法例示文（He thinks otherwise. / This is ten times the size of that. 等）はsentencesに登録するか？"
    decision: "登録しない。用法の例示としてPU!リスト表の一部であり、notesに記録すれば十分。decision #1（PU!リスト表は登録しない）の延長として統一。"
    decided_by: "リード"
  - id: 8
    date: "2026-03-02"
    section: "general (Part 5)"
    question: "会話セクション（Part 5, Ch28-29）では、A/B対話のどちらの文を登録するか？"
    decision: "主要な対象表現を含む行を登録する（AでもBでも）。1問につき原則1文だが、AとBが独立した会話パターンを問う場合は両方登録可。2-3語の定型応答（Sure. / Not at all. / Thanks.等）はsentences登録せず、notesに記録。decision #6はPart 1-4の文法セクションに適用し、Part 5の会話セクションでは本decisionを適用。"
    decided_by: "リード"
