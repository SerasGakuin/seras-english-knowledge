sentences:
  - id: "scr-193-p01"
    section_id: "Scr_193"
    drill: 1
    number: 793
    role: "exam"
    english: "As I mentioned earlier, you will have a test next Friday."
    japanese: "先ほども言いましたが、次の金曜日にテストをします。"
    notes: "東海大。mention〜=remark〜「言う/述べる」。"
  - id: "scr-193-p02"
    section_id: "Scr_193"
    drill: 1
    number: 794
    role: "exam"
    english: "I hope you won't bother me again."
    japanese: "私にまた面倒をかけないでほしい。"
    notes: "〈発展〉北星学園大。bother〜=trouble〜「悩ませる/困らせる」。"
  - id: "scr-193-p03"
    section_id: "Scr_193"
    drill: 1
    number: 795
    role: "exam"
    english: "He was reared as a Catholic."
    japanese: "彼はカトリック教徒として育てられた。"
    notes: "関西外語大。rear〜=raise〜「育てる」(=bring up⇨900)。選択肢: admit/regard/strike(A as B)との区別。"
  - id: "scr-193-p04"
    section_id: "Scr_193"
    drill: 1
    number: 796
    role: "exam"
    english: "The loud noise interrupted my sleep several times last night."
    japanese: "昨夜、大きな音が何回か私の眠りを妨げた。"
    notes: "〈発展〉interrupt〜=disturb〜「邪魔する/中断させる」(=cut in on)。紛らわしい選択肢: interpret「通訳する」。"
  - id: "scr-193-p05"
    section_id: "Scr_193"
    drill: 1
    number: 797
    role: "exam"
    english: "The first duty of the state is to ensure that people have enough to eat."
    japanese: "国の一番の義務は、人々が食べ物を十分に手に入れられるように保証することだ。"
    notes: "〈発展〉関西外語大。ensure〜=guarantee〜「確実にする/保証する」。"
  - id: "scr-193-p06"
    section_id: "Scr_193"
    drill: 1
    number: 798
    role: "exam"
    english: "I could see from the direction of his gaze that he was looking at my new car."
    japanese: "彼のじっと見ている方向から、彼が私の新車を見ているのがわかった。"
    notes: "関西外語大。see〜=tell〜「理解する/わかる」(=understand)。can tell that〜「〜ということがわかる」。"
  - id: "scr-193-p07"
    section_id: "Scr_193"
    drill: 1
    number: 799
    role: "exam"
    english: "He could not conceal his true feelings when we spoke."
    japanese: "話をしたとき、彼は本当の気持ちを隠すことができなかった。"
    notes: "〈発展〉中央大。conceal〜=hide〜「隠す」。"

