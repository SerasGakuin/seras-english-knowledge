sentences:
  - id: "scr-148-p01"
    section_id: "Scr_148"
    drill: 1
    number: 583
    role: "exam"
    english: "Please forgive me for not having written for a long time."
    japanese: "長い間手紙を書かなかったことをお許しください。"
    notes: "出典: 名古屋外語大。4択問題。forgive A for B「AのBを許す」(= excuse A for B)。admitは「認める/入ることを許す」。allow/permitはallow [permit] A to doの形なので不可（⇨ PU!113）。"
  - id: "scr-148-p02"
    section_id: "Scr_148"
    drill: 1
    number: 584
    role: "exam"
    english: "You are not permitted to take pictures here."
    japanese: "ここで写真を撮ってはいけません。"
    notes: "出典: 神戸学院大。〈頻出〉4択問題。permit A to do「Aが〜するのを許す」(= let A do)の受動態。SVO to doの形をとるのはpermitだけ。admit/excuse/forgiveはSVO to doの形をとれない（⇨ PU!114）。"
  - id: "scr-148-p03"
    section_id: "Scr_148"
    drill: 1
    number: 585
    role: "exam"
    english: "Please allow me to introduce myself."
    japanese: "自己紹介させてください。"
    notes: "出典: 高知大。〈頻出〉4択問題。allow A to do「Aが〜するのを許す」(= permit A to do / let A do)。charge「〜を請求する」、feed「〜にえさをやる」、identify「〜の身元を確認する」。"
  - id: "scr-148-p04"
    section_id: "Scr_148"
    drill: 1
    number: 586
    role: "exam"
    english: "I admit that Tom has worked hard, but it isn't enough."
    japanese: "トムが一生懸命働いていることは認めるけれど、まだ十分ではない。"
    notes: "出典: 慶應大。記述問題。admit that ~「（仕方なく）〜ということを認める」。自分の非や不快なことを事実だと認める場合に使う。〈プラスα〉admit「（入ること）を認める/許す」の意味も重要。"
  - id: "scr-148-e01"
    section_id: "Scr_148"
    drill: 0
    number: 0
    role: "example"
    english: "I admitted him into the room."
    japanese: "私は彼を部屋に入れた。"
    notes: "問586プラスα例文。admit「（入ること）を認める/許す」の用法。admit A into B「AをBに入れる」。"

