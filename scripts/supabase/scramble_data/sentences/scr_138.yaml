sentences:
  - id: "scr-138-p01"
    section_id: "Scr_138"
    drill: 1
    number: 529
    role: "exam"
    english: "Carelessness may cost you your life."
    japanese: "不注意のために命を落とすこともある。"
    notes: "出典: 京都産業大。〈頻出〉4択問題。cost A B「AにB（犠牲・損失）を払わせる/AにB（費用）がかかる」。cause/cost/take が SVOO 可能だが、文意から ② cost が正解。〈重要〉It costs A B to do「Aが〜するのにB（費用）がかかる」（⇨ 292）。"
  - id: "scr-138-p02"
    section_id: "Scr_138"
    drill: 1
    number: 530
    role: "exam"
    english: "Could you spare me a moment? I have to tell you something."
    japanese: "少しお時間をいただけませんか。あなたに伝えなければならないことがあります。"
    notes: "出典: 北星学園大。4択問題。spare A B「AにB（時間など）をさく」(= spare B for A)。〈重要〉spare A B は「AのBを省く」(= save A B)の意味も重要。"
  - id: "scr-138-p03"
    section_id: "Scr_138"
    drill: 1
    number: 531
    role: "exam"
    english: "An email from Paul saved me the trouble of calling her."
    japanese: "ポールがメールをくれたおかげで、彼女に電話をかける手間を省けた。"
    notes: "出典: 神戸学院大。並べ替え問題。save A B「AのB（労力）を省く」。save [spare] A the trouble of doing「Aの〜する手間を省く」。"
  - id: "scr-138-p04"
    section_id: "Scr_138"
    drill: 1
    number: 532
    role: "exam"
    english: "Can you tell me the time, please?"
    japanese: "時間を教えてくれませんか。"
    notes: "出典: 神奈川大。〈頻出〉4択問題。tell A B「AにBを話す/言う」。① say は SVOO 不可。③ speak は基本的に自動詞。④ instruct は「instruct A / instruct A that〜」の形。〈重要〉tell A that〜 も重要（⇨ 574）。"
  - id: "scr-138-p05"
    section_id: "Scr_138"
    drill: 1
    number: 533
    role: "exam"
    english: "I wish you good luck."
    japanese: "ご幸運を祈ります。"
    notes: "出典: 武蔵大。〈発展〉4択問題。wish A B「AにB（幸運・成功等）を祈る」。SVOO の形をとるのは ③ wish のみ。"
  - id: "scr-138-p06"
    section_id: "Scr_138"
    drill: 1
    number: 534
    role: "exam"
    english: "Could you explain it to me?"
    japanese: "私にそれを説明していただけますか。"
    notes: "出典: センター。〈頻出〉4択問題。explain B (to A)「（A（人）に）B（物・事）を説明する」。explain は SVOO 不可。×explain me it → ○explain it to me。Bが短い場合は explain B to A の語順。"
  - id: "scr-138-p07"
    section_id: "Scr_138"
    drill: 1
    number: 535
    role: "exam"
    english: "John didn't know how to explain to his wife that he had quit his job."
    japanese: "ジョンは仕事を辞めたことを妻にどう説明したらよいのかわからなかった。"
    notes: "出典: 南山大。〈頻出〉4択問題。explain (to A) B [that節]「（A（人）に）〜ということを説明する」。Bが that 節/wh-節のように長い場合は to A を前に置く: explain to A that〜。① tell は SVOO 可なので不可。"
  - id: "scr-138-e01"
    section_id: "Scr_138"
    drill: 0
    number: 0
    role: "example"
    english: "I did the work to spare you the trouble."
    japanese: "あなたに面倒をかけたくないのでその仕事をした。"
    notes: "問530解説〈重要〉例文。spare A B「AのBを省く」(= save A B)の用法例。spare の「省く」の意味。"
  - id: "scr-138-e02"
    section_id: "Scr_138"
    drill: 0
    number: 0
    role: "example"
    english: "He explained to his boss why the project was delayed."
    japanese: "彼は上司に、なぜプロジェクトが遅れたのかを説明した。"
    notes: "問535〈プラスα〉例文。explain to A wh-節「Aに〜かを説明する」の用法例。目的語がwh-節の場合は to A を前に置く。"

