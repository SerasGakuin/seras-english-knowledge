sentences:
  - id: "scr-095-p01"
    section_id: "Scr_095"
    drill: 1
    number: 363
    role: "exam"
    english: "Tell me about the city where you grew up."
    japanese: "あなたが育った都市について教えてください。"
    notes: "難易度: 頻出。出典: 湘南工科大。関係副詞where――「場所」を表す語が先行詞"
  - id: "scr-095-p02"
    section_id: "Scr_095"
    drill: 1
    number: 364
    role: "exam"
    english: "The town which I would like to visit with you is in the north of England."
    japanese: "あなたと訪れたいと思っている町は、イングランドの北部にあります。"
    notes: "難易度: 頻出。出典: 清泉女子大。「場所」が先行詞でも後ろが不完全な文ならwhich（目的格関係代名詞）"
  - id: "scr-095-p03"
    section_id: "Scr_095"
    drill: 1
    number: 365
    role: "exam"
    english: "I am sure the day will soon come when we can go abroad again."
    japanese: "私たちがまた海外に行ける日がすぐに来ると確信しています。"
    notes: "出典: 中部大。関係副詞when――「時」を表す語が先行詞。先行詞the dayとwhenが離れている"
  - id: "scr-095-p04"
    section_id: "Scr_095"
    drill: 1
    number: 366
    role: "exam"
    english: "I want to know the reason why you did it."
    japanese: "私はあなたがそれをした理由を知りたい。"
    notes: "出典: 芝浦工大。関係副詞why――先行詞はthe reason"
  - id: "scr-095-p05"
    section_id: "Scr_095"
    drill: 1
    number: 367
    role: "exam"
    english: "This is how I learned to write a novel."
    japanese: "このようにして私は小説を書けるようになった。"
    notes: "難易度: 頻出。出典: 駒澤大。This is how節。howは常に先行詞なし（×the way how）。= This is the way (in which / that) ..."
  - id: "scr-095-e01"
    section_id: "Scr_095"
    drill: 0
    number: 0
    role: "example"
    english: "Kyoto is the city which I want to visit."
    japanese: "京都は訪ねてみたい都市です。"
    notes: "PU!71例文。「場所」が先行詞でも代名詞の働き（目的語）→ 後ろは不完全な文 → which"
  - id: "scr-095-e02"
    section_id: "Scr_095"
    drill: 0
    number: 0
    role: "example"
    english: "Kyoto is the city where I was born."
    japanese: "京都は私が生まれた都市です。"
    notes: "PU!71例文。副詞の働き（文の主要素にならない）→ 後ろは完全な文 → where"

