sentences:
  - id: "scr-249-p01"
    section_id: "Scr_249"
    drill: 1
    number: 1285
    role: "exam"
    english: "According to the weather forecast, there is a slight chance of snow this evening."
    japanese: "天気予報によれば，今夜は雪が降る可能性が少しあるそうだ。"
    notes: "〈基本〉〈超頻〉東京電機大。according to〜「(情報源)によれば」。プラスα:「〜に従って/〜に応じて」の意味も。"
  - id: "scr-249-p02"
    section_id: "Scr_249"
    drill: 1
    number: 1286
    role: "exam"
    english: "Instead of going to the party, Mike studied at home."
    japanese: "マイクはパーティーに行かないで家で勉強をした。"
    notes: "〈頻出〉名古屋外語大。instead of〜「〜の代わりに/〜しないで(doing)」。"
  - id: "scr-249-p03"
    section_id: "Scr_249"
    drill: 1
    number: 1287
    role: "exam"
    english: "We'd like you to write a term paper in place of a final exam."
    japanese: "期末試験に代えて，レポートを書いてもらおうと思います。"
    notes: "静岡大。in place of〜「〜の代わりに」(=instead of)。プラスα: take the place of〜「〜に取って代わる」(⇨1062)。"
  - id: "scr-249-p04"
    section_id: "Scr_249"
    drill: 1
    number: 1288
    role: "exam"
    english: "Education is not to be measured merely in terms of years."
    japanese: "教育は単に年数の点からのみはかるべきものではありません。"
    notes: "〈頻出〉東京理科大。in terms of〜「〜の点から/〜に関して」。"
  - id: "scr-249-p05"
    section_id: "Scr_249"
    drill: 1
    number: 1289
    role: "exam"
    english: "The load was lifted by means of a crane placed on the construction site."
    japanese: "積み荷は建設現場に置かれたクレーンを使って持ち上げられた。"
    notes: "関西外語大。by means of〜「〜によって/〜を用いて」。means「手段/方法」(⇨603)。"
  - id: "scr-249-p06"
    section_id: "Scr_249"
    drill: 1
    number: 1290
    role: "exam"
    english: "Jack is going to fly back to California by way of Hawaii."
    japanese: "ジャックはハワイ経由でカリフォルニアまで飛行機で戻る予定だ。"
    notes: "法政大。by way of〜「〜経由で」(=via)。〈発展〉「〜として/〜のつもりで」の意味も。"
  - id: "scr-249-p07"
    section_id: "Scr_249"
    drill: 1
    number: 1291
    role: "exam"
    english: "Her father worked hard at the expense of his health."
    japanese: "彼女のお父さんは健康を犠牲にして一生懸命働いた。"
    notes: "〈頻出〉西南学院大。at the expense of〜 / at the cost of〜「〜を犠牲にして」(=at the sacrifice of)。"
  - id: "scr-249-p08"
    section_id: "Scr_249"
    drill: 1
    number: 1292
    role: "exam"
    english: "He achieved his dream at the cost of his health."
    japanese: "彼は健康を犠牲にして夢をかなえた。"
    notes: "at the cost of〜「〜を犠牲にして」(=at the expense of / at the sacrifice of)。"
  - id: "scr-249-p09"
    section_id: "Scr_249"
    drill: 1
    number: 1293
    role: "exam"
    english: "The poor little girl was at the mercy of her cruel fate."
    japanese: "かわいそうにその幼い女の子は残酷な運命に翻弄された。"
    notes: "清泉女子大。at the mercy of〜「〜のなすがまま[で]/〜に左右されて」。"
  - id: "scr-249-p10"
    section_id: "Scr_249"
    drill: 1
    number: 1294
    role: "exam"
    english: "Many Japanese moved to South America in search of a better life."
    japanese: "多くの日本人が，よりよい生活を求めて南米に移住した。"
    notes: "神奈川大。in search of〜「〜を探して/〜を求めて」。比較: search for〜との前置詞の違いに注意。"
  - id: "scr-249-p11"
    section_id: "Scr_249"
    drill: 1
    number: 1295
    role: "exam"
    english: "In addition to the data that was given to us, we ourselves have to search for more information."
    japanese: "与えられたデータに加えて，私たち自身がもっと多くの情報を探す必要がある。"
    notes: "〈頻出〉亜細亜大。in addition to〜「〜に加えて/〜の他に」(=besides)。比較: in addition「さらに/その上」は副詞句。"
  - id: "scr-249-p12"
    section_id: "Scr_249"
    drill: 1
    number: 1296
    role: "exam"
    english: "As of January 2014, most students had decided what they wanted to do after leaving school."
    japanese: "2014年1月の時点で，ほとんどの生徒は卒業後に何をしたいかを決めていた。"
    notes: "西南学院大。as of〜「〜の時点で/〜現在で」。"
  - id: "scr-249-e01"
    section_id: "Scr_249"
    drill: 0
    number: 1285
    role: "example"
    english: "Employees are paid according to their experience."
    japanese: "従業員は経験に応じて給料を支払われる。"
    notes: "プラスα。according to〜の「〜に従って/〜に応じて」の意味。"
  - id: "scr-249-e02"
    section_id: "Scr_249"
    drill: 0
    number: 1290
    role: "example"
    english: "He said it by way of an apology."
    japanese: "彼はそれを謝罪のつもりで言った。"
    notes: "〈発展〉by way of〜の「〜として/〜のつもりで」の意味。"
  - id: "scr-249-e03"
    section_id: "Scr_249"
    drill: 0
    number: 1295
    role: "example"
    english: "In addition, there were two other deficiencies in that system."
    japanese: "その上，あのシステムには他にも2つ欠陥があった。"
    notes: "比較。in addition「さらに/その上」は副詞句(前置詞句のin addition to〜と区別)。"

