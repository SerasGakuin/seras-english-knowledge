sentences:
  - id: "scr-246-p01"
    section_id: "Scr_246"
    drill: 1
    number: 1272
    role: "exam"
    english: "He has gone to America for the purpose of studying new technology."
    japanese: "彼は新しい科学技術を学ぶためにアメリカに行った。"
    notes: "〈頻出〉名城大。for the purpose of doing「〜する目的で」。「目的」のfor doingは不可。"
  - id: "scr-246-p02"
    section_id: "Scr_246"
    drill: 1
    number: 1273
    role: "exam"
    english: "I went to the department store with a view to buying a present for my friend."
    japanese: "友人へのプレゼントを買うために私はデパートに行った。"
    notes: "名城大。with a view to doing「〜する目的で/〜するつもりで」。viewは「目的/意図」。やや硬い表現。"
  - id: "scr-246-p03"
    section_id: "Scr_246"
    drill: 1
    number: 1274
    role: "exam"
    english: "She worked hard for fear of failing."
    japanese: "彼女は落第しないように懸命に勉強した。"
    notes: "駒澤大。for fear of doing「〜しないように/〜するといけないから」。= for fear (that) she should fail(⇨444) = so that she would not fail(⇨443)。"
  - id: "scr-246-p04"
    section_id: "Scr_246"
    drill: 1
    number: 1275
    role: "exam"
    english: "He gave up smoking for the sake of his health."
    japanese: "彼は健康のためにタバコをやめた。"
    notes: "駒澤大。for the sake of〜「〜の(利益の)ために」。for A's sakeの形も。プラスα: for the benefit [good] of〜も同意。"
  - id: "scr-246-e01"
    section_id: "Scr_246"
    drill: 0
    number: 1275
    role: "example"
    english: "I lent money to your wife for your sake."
    japanese: "君のために奥さんにお金を貸してあげたんだよ。"
    notes: "補足。for A's sakeの形の例。"

