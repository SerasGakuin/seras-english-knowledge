sentences:
  - id: "scr-173-p01"
    section_id: "Scr_173"
    drill: 1
    number: 675
    role: "exam"
    english: "Have you already done the washing?"
    japanese: "もう洗濯は終わったの？"
    notes: "4択問題。already: 疑問文で「もう〜したのか」と驚きを表す（文中に置く）。yetも疑問文で「もう〜したか」だが文末に置く。"
  - id: "scr-173-p02"
    section_id: "Scr_173"
    drill: 1
    number: 676
    role: "exam"
    english: "I'm interested in the job, but I haven't decided whether to apply yet."
    japanese: "その仕事に興味はあるが、応募するかどうかはまだ決めていない。"
    notes: "〈基本〉4択問題。yet: 否定文で「まだ〜していない」（文末に置く）。stillも否定文で「まだ〜していない」だがstill〜notの語順。"
  - id: "scr-173-p03"
    section_id: "Scr_173"
    drill: 1
    number: 677
    role: "exam"
    english: "It's time to leave for school but Mary is still in her room."
    japanese: "学校に行く時間だが、メアリーはまだ自分の部屋にいる。"
    notes: "出典: 藤女子大。〈基本〉4択問題。still: 肯定文で「まだ〜している/である」（継続を表す）。"
  - id: "scr-173-e01"
    section_id: "Scr_173"
    drill: 0
    number: 0
    role: "example"
    english: "Is she asleep yet?"
    japanese: "彼女はもう寝ましたか。"
    notes: "問675解説例文。yet: 疑問文で文末に置き「もう〜したか」の意味（普通の疑問）。alreadyは文中で驚きのニュアンス。"
  - id: "scr-173-e02"
    section_id: "Scr_173"
    drill: 0
    number: 0
    role: "example"
    english: "Tom still isn't here."
    japanese: "トムはまだ来ていないのか。"
    notes: "問676解説例文。still + 否定の語順: still〜not（stillが先、notが後）。いら立ちのニュアンスがある。"

