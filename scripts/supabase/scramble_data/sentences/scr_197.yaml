sentences:
  - id: "scr-197-p01"
    section_id: "Scr_197"
    drill: 1
    number: 821
    role: "exam"
    english: "An inexperienced pilot is a potential danger."
    japanese: "未熟なパイロットは、危険をもたらす可能性がある。"
    notes: "長崎大。potential=possible「可能性のある/潜在的な」。"
  - id: "scr-197-p02"
    section_id: "Scr_197"
    drill: 1
    number: 822
    role: "exam"
    english: "There is an abundant supply of food in case of unexpected disaster."
    japanese: "思いがけない災害に備えて十分な食料の蓄えがある。"
    notes: "〈発展〉関西外語大。abundant=plentiful「豊富な/あり余るほどの」(=ample)。"
  - id: "scr-197-p03"
    section_id: "Scr_197"
    drill: 1
    number: 823
    role: "exam"
    english: "There are some urgent questions for us to discuss."
    japanese: "私たちには話し合うべき差し迫った問題がいくつかある。"
    notes: "〈発展〉愛知工大。urgent=pressing「緊急の/急を要する/差し迫った」。"
  - id: "scr-197-p04"
    section_id: "Scr_197"
    drill: 1
    number: 824
    role: "exam"
    english: "The Native Americans consider this area sacred."
    japanese: "アメリカ先住民はこの地域を神聖だと考える。"
    notes: "〈発展〉清泉女子大。sacred=holy「神聖な/聖なる」。"
  - id: "scr-197-p05"
    section_id: "Scr_197"
    drill: 1
    number: 825
    role: "exam"
    english: "Quick decisions are crucial in an emergency situation."
    japanese: "緊急事態においてはすばやい決定がきわめて重要である。"
    notes: "〈発展〉明海大。crucial=vital「きわめて重要な/決定的な」(=decisive)。"
  - id: "scr-197-p06"
    section_id: "Scr_197"
    drill: 1
    number: 826
    role: "exam"
    english: "He played a major role in the movie."
    japanese: "彼はその映画で主要な役割を演じた。"
    notes: "東海大。major=principal「主要な」(=main)。"
  - id: "scr-197-p07"
    section_id: "Scr_197"
    drill: 1
    number: 827
    role: "exam"
    english: "Since you know the family well, it would be suitable for you to send a card."
    japanese: "あなたはその家族をよく知っているのだから、あなたがカードを送るのが適切でしょう。"
    notes: "上智大。suitable=appropriate「適切な/ふさわしい」(=proper/fit)。"
  - id: "scr-197-p08"
    section_id: "Scr_197"
    drill: 1
    number: 828
    role: "exam"
    english: "There is a fundamental difference between being alone and feeling lonely."
    japanese: "ひとりでいることと孤独を感じることは基本的に違う。"
    notes: "東洋英和女学院大。fundamental=basic「基本的な」。"
  - id: "scr-197-p09"
    section_id: "Scr_197"
    drill: 1
    number: 829
    role: "exam"
    english: "These products are fragile, so please handle them carefully."
    japanese: "これらの製品は壊れやすいので、注意して扱ってください。"
    notes: "〈発展〉清泉女子大。fragile=breakable「壊れやすい」(=delicate)。"

