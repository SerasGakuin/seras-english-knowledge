sentences:
  - id: "scr-088-p01"
    section_id: "Scr_088"
    drill: 1
    number: 330
    role: "exam"
    english: "Some people think that money has nothing to do with true happiness."
    japanese: "お金は本当の幸福とは何の関係もないと考える人もいる。"
    notes: "難易度: 頻出。出典: 佛教大。整序問題。have nothing to do with ～「～と何の関係もない」"
  - id: "scr-088-p02"
    section_id: "Scr_088"
    drill: 1
    number: 331
    role: "exam"
    english: "He is nothing but a child."
    japanese: "彼は子どもにすぎない。"
    notes: "出典: 西南学院大。共通語を入れる問題のA文。nothing but ～ =「～だけ/～にすぎない」（= only）。but =「～以外は」前置詞（⇨ 問718）"
  - id: "scr-088-p03"
    section_id: "Scr_088"
    drill: 1
    number: 331
    role: "exam"
    english: "She got this book for nothing."
    japanese: "彼女はただでこの本を手に入れた。"
    notes: "出典: 西南学院大。共通語を入れる問題のB文。for nothing =「無料で/ただで」（= free / free of charge）（⇨ 問1202）"
  - id: "scr-088-p04"
    section_id: "Scr_088"
    drill: 1
    number: 332
    role: "exam"
    english: "My father does nothing but complain about the government."
    japanese: "父は政府について文句ばかり言っている。"
    notes: "出典: 中京大。整序問題。do nothing but do「～ばかりする」。butの後は原形不定詞"
  - id: "scr-088-p05"
    section_id: "Scr_088"
    drill: 1
    number: 333
    role: "exam"
    english: "Something is wrong with this copier."
    japanese: "このコピー機は故障している。"
    notes: "出典: 佛教大。Something is wrong [the matter] with ～。= out of order（⇨ 問1214）。= There is something wrong with ～"
  - id: "scr-088-p06"
    section_id: "Scr_088"
    drill: 1
    number: 334
    role: "exam"
    english: "There is something attractive about him."
    japanese: "彼にはどこか魅力的なところがある。"
    notes: "出典: 南山大。There is something + 形容詞 + about ～「～にはどこか…なところがある」"

