    drill: 1
    number: 136
    role: "exam"
    english: "That man walking across the street is my neighbor."
    japanese: "通りを歩いて渡っているあの男性は私の隣人です。"
    notes: "難易度: 基本+頻出; 出典: 東海大; 4択; 名詞を後ろから修飾する現在分詞; across the streetという副詞句を伴うため後置修飾"
  - id: "scr-037-p04"
    section_id: "Scr_037"
    drill: 1
    number: 137
    role: "exam"
    english: "Children brought up by bilingual parents may naturally learn two languages."
    japanese: "バイリンガルの両親に育てられた子どもは、自然に2つの言語を身につけるかもしれない。"
    notes: "難易度: 頻出; 出典: センター; 4択; 名詞を後ろから修飾する過去分詞; childrenとbring upの間に受動関係; who were brought upなら可; 語句: bring up ~「~を育てる」(= raise / rear)(⇨900)"

