    english: "The carpenter repaired the broken chair."
    japanese: "大工は壊れた椅子を修理した。"
    notes: "難易度: 基本; 出典: 清泉女子大; 4択; 名詞を前から修飾する過去分詞; chairとbreakの間に受動関係「椅子が壊された」→過去分詞"
  - id: "scr-037-p03"
