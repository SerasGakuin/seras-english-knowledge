    english: "The company is faced with growing costs of production."
    japanese: "その会社は増大する生産コストに直面している。"
    notes: "難易度: 基本; 出典: 亜細亜大; 4択; 名詞を前から修飾する現在分詞; costsとgrowの間に能動関係「コストが増大する」→現在分詞"
