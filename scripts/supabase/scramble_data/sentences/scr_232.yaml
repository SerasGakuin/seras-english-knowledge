sentences:
  - id: "scr-232-p01"
    section_id: "Scr_232"
    drill: 1
    number: 1122
    role: "exam"
    english: "I'm short of cash. May I use a credit card?"
    japanese: "現金が足りません。クレジットカードを使ってもよろしいですか。"
    notes: "〈基本〉愛知学院大。be short of〜「〜が不足している」。比較: run short of〜「〜が不足する」(⇨1121)。"
  - id: "scr-232-p02"
    section_id: "Scr_232"
    drill: 1
    number: 1123
    role: "exam"
    english: "The lady is beautiful, but she is lacking in intelligence."
    japanese: "あの婦人は美しいが，知性に欠けている。"
    notes: "東京理科大。be lacking in〜「〜に欠けている」(=be wanting in)。"
  - id: "scr-232-p03"
    section_id: "Scr_232"
    drill: 1
    number: 1124
    role: "exam"
    english: "The story is familiar to all of us."
    japanese: "その話はみんながよく知っている。"
    notes: "〈頻出〉高知大。be familiar to〜「（人に）よく知られている」。"
  - id: "scr-232-p04"
    section_id: "Scr_232"
    drill: 1
    number: 1125
    role: "exam"
    english: "All of us are familiar with the story."
    japanese: "私たちは全員，その話をよく知っている。"
    notes: "〈頻出〉青山学院大。be familiar with〜「（物事を）よく知っている/〜に精通している」。A is familiar with B = B is familiar to A。"
  - id: "scr-232-p05"
    section_id: "Scr_232"
    drill: 1
    number: 1126
    role: "exam"
    english: "He is completely at home with geometry."
    japanese: "彼は幾何学に非常に精通している。"
    notes: "名城大。be at home with[in]〜「〜に精通している」(=be familiar with)。"
  - id: "scr-232-p06"
    section_id: "Scr_232"
    drill: 1
    number: 1127
    role: "exam"
    english: "I am well acquainted with the subject."
    japanese: "私はその問題には非常に精通している。"
    notes: "立命館大。be acquainted with〜「〜に精通している/〜と知り合いである」。"
  - id: "scr-232-p07"
    section_id: "Scr_232"
    drill: 1
    number: 1128
    role: "exam"
    english: "We are different from animals in that we can speak."
    japanese: "われわれは話ができるという点で，動物とは違っている。"
    notes: "〈基本〉〈頻出〉慶應大。be different from〜「〜と異なる」(=differ from)。米口語ではthanも可。"
  - id: "scr-232-p08"
    section_id: "Scr_232"
    drill: 1
    number: 1129
    role: "exam"
    english: "In my school days, I was indifferent to current affairs."
    japanese: "学生時代，私は時事問題に無関心だった。"
    notes: "〈頻出〉東京理科大。be indifferent to〜「〜に無関心である」(=be unconcerned about[with])。"
  - id: "scr-232-p09"
    section_id: "Scr_232"
    drill: 1
    number: 1130
    role: "exam"
    english: "Don't be afraid of taking chances and risks."
    japanese: "一か八かやってみることを恐れるな。"
    notes: "〈基本〉〈頻出〉芝浦工大。be afraid of〜「〜を恐れる」。take a chance[chances]「一か八かやってみる」。"
  - id: "scr-232-p10"
    section_id: "Scr_232"
    drill: 1
    number: 1131
    role: "exam"
    english: "You ought to be ashamed of yourself for doing such a silly thing."
    japanese: "そのような愚かなことをしたのだから，あなたは自分を恥ずべきだ。"
    notes: "北星学園大。be ashamed of〜「〜を恥じている」。"
  - id: "scr-232-e01"
    section_id: "Scr_232"
    drill: 0
    number: 1127
    role: "example"
    english: "We became acquainted with our new neighbors."
    japanese: "新しい隣人たちと知り合いになった。"
    notes: "比較。become[get] acquainted with〜「〜と知り合いになる」。状態(be)→動作(become/get)。"
  - id: "scr-232-e02"
    section_id: "Scr_232"
    drill: 0
    number: 1130
    role: "example"
    english: "She was afraid to speak in public."
    japanese: "彼女は怖くて人前で話せなかった。"
    notes: "比較。be afraid to do「（結果を心配して）怖くて〜できない」。of doing=恐怖の対象、to do=結果の心配。"
  - id: "scr-232-e03"
    section_id: "Scr_232"
    drill: 0
    number: 1131
    role: "example"
    english: "I was ashamed to say that I had made a mistake."
    japanese: "恥ずかしくて自分がミスをしたとは言えなかった。"
    notes: "比較。be ashamed to do「恥ずかしくて〜できない[したくない]」。"

