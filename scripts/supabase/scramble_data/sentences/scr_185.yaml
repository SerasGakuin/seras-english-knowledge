sentences:
- id: scr-185-p01
  section_id: Scr_185
  drill: 1
  number: 733
  role: exam
  english: At the last moment her courage failed her, and she started to cry.
  japanese: 土壇場になって彼女は勇気がくじけて泣き出してしまった。
  notes: 〈発展〉。fail〜「（いざというときに）〜の役に立たない」。at the last moment [minute/second]「土壇場で/最後になって」（⇨ 197）。
- id: scr-185-p02
  section_id: Scr_185
  drill: 1
  number: 734
  role: exam
  english: It's only a small house but it meets my needs perfectly.
  japanese: それはほんの小さな家だが、私の要望に完璧に応えている。
  notes: 〈頻出〉センター。meet〜「（要求・必要など）に応じる/〜を満たす」（= satisfy）。
- id: scr-185-e01
  section_id: Scr_185
  drill: 0
  number: 1
  role: example
  english: She stayed up all night to meet the deadline for her report.
  japanese: レポートの締め切りに間に合わせるために、彼女は徹夜した。
  notes: 問734プラスα。meet the deadline「締め切り［納期］に間に合わせる」。頻出表現。
- id: scr-185-p03
  section_id: Scr_185
  drill: 1
  number: 735
  role: exam
  english: Our company survived the crisis that hit the economy last year.
  japanese: わが社は昨年経済界を襲った危機を切り抜けた。
  notes: センター。survive〜「（事故・災害など）を切り抜けて生き残る」。recoverはrecover from〜の形で使うので不可。
- id: scr-185-e02
  section_id: Scr_185
  drill: 0
  number: 2
  role: example
  english: He survived his wife by three years.
  japanese: 彼は妻の死後3年生きた。
  notes: 問735プラスα。survive〜「〜より長生きする」（= live longer than〜/outlive）。
- id: scr-185-p04
  section_id: Scr_185
  drill: 1
  number: 736
  role: exam
  english: This clock gains two seconds a day.
  japanese: この時計は、1日に2秒進みます。
  notes: 亜細亜大。gain〜「（時計が）〜秒［分］進む」（⇔ lose）。
- id: scr-185-e03
  section_id: Scr_185
  drill: 0
  number: 3
  role: example
  english: My watch loses ten minutes a month.
  japanese: 私の時計は月に10分遅れる。
  notes: 問736比較。lose「（時計が）〜秒［分］遅れる」。gainの反意語。
- id: scr-185-p05
  section_id: Scr_185
  drill: 1
  number: 737
  role: exam
  english: The party will be held next Saturday.
  japanese: そのパーティーは次の土曜日に開かれる。
  notes: hold〜「（会・式など）を催す/開く」。「パーティーを開く」はgive [have] a partyのほうが口語的。
- id: scr-185-e04
  section_id: Scr_185
  drill: 0
  number: 4
  role: example
  english: They once held that the earth was flat.
  japanese: 地球は平らだとかつては考えられていた。
  notes: 問737プラスα。hold「〜を心に抱く/〜と思う」の意味。
- id: scr-185-p06
  section_id: Scr_185
  drill: 1
  number: 738
  role: exam
  english: You have to observe the terms of a contract.
  japanese: あなたは契約条件を守らなければいけない。
  notes: 中央大。下線部問題。observe〜「（規則・法律など）を守る」（= obey）。observeには「〜を観察する/（観察して）〜に気づく」の意味もある。term「〔〜s〕（契約・支払いなどの）条件」（⇨ 850(d)）。
- id: scr-185-p07
  section_id: Scr_185
  drill: 1
  number: 739
  role: exam
  english: He wanted to realize his dream of opening his own cafe.
  japanese: 自分のカフェを開くという夢を実現させたかったんだよ。
  notes: 'センター。対話問題（A: Why did Jack quit his job?）。realize〜「（希望・計画など）を実現する［させる］」。come trueは自動詞表現で目的語を取らないので不可。'
- id: scr-185-p08
  section_id: Scr_185
  drill: 1
  number: 740
  role: exam
  english: When her father asked her why she was late, Carol made up a story about a train accident.
  japanese: 父親がなぜ遅れたのかと尋ねた時、キャロルは電車の事故についての話をでっち上げた。
  notes: 〈発展〉関東学院大。下線部問題（made up）。invent〜「（口実など）をでっち上げる」（= make up〜⇨ 901）。inventは「発明する/創作する」の意味が基本。
