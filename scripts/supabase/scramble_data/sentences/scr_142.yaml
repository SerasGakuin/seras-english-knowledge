sentences:
  - id: "scr-142-p01"
    section_id: "Scr_142"
    drill: 1
    number: 556
    role: "exam"
    english: "A lot of people saw him arrested on the street."
    japanese: "大勢の人が彼が通りで逮捕されるのを見た。"
    notes: "出典: 武庫川女子大。〈頻出〉4択問題。see A done「Aが〜されるのを見る」。O=himとarrestの受動関係に注目。seeはCにto doをとらない。"
  - id: "scr-142-p02"
    section_id: "Scr_142"
    drill: 1
    number: 557
    role: "exam"
    english: "I heard my dog barking at someone at the door."
    japanese: "私は犬が玄関で誰かに吠えているのを聞いた。"
    notes: "出典: 大阪経済大。〈頻出〉並べ替え問題。hear A doing「Aが〜しているのが聞こえる」。O=my dogとbarkの能動関係。"
  - id: "scr-142-p03"
    section_id: "Scr_142"
    drill: 1
    number: 558
    role: "exam"
    english: "I heard my name called by someone."
    japanese: "私は自分の名前が誰かに呼ばれるのが聞こえた。"
    notes: "出典: 関西学院大。〈頻出〉4択問題。hear A done「Aが〜されるのが聞こえる」。O=my nameとcallの受動関係。"
  - id: "scr-142-p04"
    section_id: "Scr_142"
    drill: 1
    number: 559
    role: "exam"
    english: "Beth felt the rain falling on her head."
    japanese: "ベスは頭に雨が降りかかっているのを感じた。"
    notes: "出典: 関西外語大。〈頻出〉4択問題。feel A doing「Aが〜しているのを感じる」。O=the rainとfallの能動関係。"
  - id: "scr-142-p05"
    section_id: "Scr_142"
    drill: 1
    number: 560
    role: "exam"
    english: "Philip found himself falling asleep at the desk while he was reading."
    japanese: "フィリップは、本を読んでいるうちに気づくと机で寝てしまっていた。"
    notes: "出典: 学習院大。〈頻出〉4択問題。find oneself doing「気づくと〜している」が頻出形。letとmakeは現在分詞をCにとらない（⇨ PU!119）。"
  - id: "scr-142-p06"
    section_id: "Scr_142"
    drill: 1
    number: 561
    role: "exam"
    english: "The teacher caught the student sleeping in the back row."
    japanese: "先生はその学生が後ろの列で眠っているところを見つけた。"
    notes: "出典不明。4択問題。catch A doing「Aが〜しているところを見つける」。catchはdo/to doをCにとらない。"
  - id: "scr-142-e01"
    section_id: "Scr_142"
    drill: 0
    number: 0
    role: "example"
    english: "I saw a stranger enter that house."
    japanese: "私は見知らぬ人があの家に入るのを見た。"
    notes: "PU!118例文①。知覚動詞+A do: 動作の始めから終わりまで全体を見る。"
  - id: "scr-142-e02"
    section_id: "Scr_142"
    drill: 0
    number: 0
    role: "example"
    english: "I saw a stranger entering that house."
    japanese: "私は見知らぬ人があの家に入っていくところを見た。"
    notes: "PU!118例文②。知覚動詞+A doing: 動作の途中（部分）を見る。"
  - id: "scr-142-e03"
    section_id: "Scr_142"
    drill: 0
    number: 0
    role: "example"
    english: "I saw a stranger murdered."
    japanese: "私は見知らぬ人が殺されるのを見た。"
    notes: "PU!118例文③。知覚動詞+A done: 受動関係（Aが〜される）。"

