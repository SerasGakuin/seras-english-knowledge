sentences:
  - id: "scr-109-p01"
    section_id: "Scr_109"
    drill: 1
    number: 416
    role: "exam"
    english: "Don't buy any food for the picnic before you know how many people will come."
    japanese: "何人来るかわからないうちに、ピクニックの食料を買わないようにね。"
    notes: "難易度: 基本。出典: 共立女子大。before「〜する前に/〜しないうちに」。〈重要〉before節は時の副詞節→未来でも現在形（→ Theme 7）"
  - id: "scr-109-p02"
    section_id: "Scr_109"
    drill: 1
    number: 417
    role: "exam"
    english: "My mother and I have been shopping at this mall since we moved to this city."
    japanese: "この都市に引っ越して以来、母と私はこのショッピングモールで買い物をしている。"
    notes: "難易度: 基本、頻出。出典: 立教大。since「〜して以来」。主節は現在完了形、since節には過去形"
  - id: "scr-109-p03"
    section_id: "Scr_109"
    drill: 1
    number: 418
    role: "exam"
    english: "We kept on walking until we got to the top of the hill."
    japanese: "丘のてっぺんに着くまで、私たちは歩き続けた。"
    notes: "難易度: 頻出。出典: 日本女子大。until [till]「〜するまで（ずっと）」— 動作・状態の継続期間。by the time「完了の期限」との違いに注意。参照:（→ 687）"
  - id: "scr-109-p04"
    section_id: "Scr_109"
    drill: 1
    number: 419
    role: "exam"
    english: "He will have finished the job by the time we arrive."
    japanese: "私たちが到着するまでに、彼は仕事を終えているだろう。"
    notes: "出典: 藤女子大。by the time「〜するまでには」— 完了の期限。by the time ≠ until。参照:（→ 687）"
  - id: "scr-109-p05"
    section_id: "Scr_109"
    drill: 1
    number: 420
    role: "exam"
    english: "Each time I come to this store, it's closed!"
    japanese: "この店に来ると、いつも閉まっている！"
    notes: "出典: 東北学院大。each [every] time「〜するたびに/〜する時はいつも」(= whenever)。wheneverより口語的"
  - id: "scr-109-p06"
    section_id: "Scr_109"
    drill: 1
    number: 421
    role: "exam"
    english: "A bad habit, once formed, cannot easily be gotten rid of."
    japanese: "悪い習慣はいったんつくとなかなか取り除けない。"
    notes: "出典: 青山学院大。once「いったん[ひとたび]〜すると」— 時＋条件。onceの後にit isが省略（→ PU!90）。語句: get rid of 〜「厄介なものを取り除く」(= remove)（→ 1112）"
  - id: "scr-109-e01"
    section_id: "Scr_109"
    drill: 0
    number: 0
    role: "example"
    english: "The candle grew shorter and shorter, until it went out."
    japanese: "ろうそくはだんだん短くなって、ついに消えた。"
    notes: "問418発展例文。..., until [till] 〜「…して、ついに〜」— 前から訳す用法"

