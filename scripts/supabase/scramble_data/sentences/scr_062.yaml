    role: "exam"
    english: "I prefer reading books at home to going out on rainy days."
    japanese: "私は雨の日には出かけるよりも家で本を読みたい。"
    notes: "難易度: 頻出。出典: 摂南大"
  - id: "scr-062-e01"
