sentences:
  - id: "scr-120-e01"
    section_id: "Scr_120"
    drill: 0
    number: 0
    role: "example"
    english: "Never have I seen such a sight."
    japanese: "そんな光景は見たことがない。"
    notes: "Theme 120冒頭例文。否定語neverを文頭に出した倒置文。元の語順: I have never seen such a sight."
  - id: "scr-120-p01"
    section_id: "Scr_120"
    drill: 1
    number: 459
    role: "exam"
    english: "Little did I dream of getting such a wonderful prize."
    japanese: "こんなすばらしい賞品をもらえるとは夢にも思いませんでした。"
    notes: "難易度: 頻出。出典: 佛教大。整序問題。littleは文頭に出した倒置文では「少しも~ない」という強い否定を表す（通常は「ほとんど~ない」）。"
  - id: "scr-120-p02"
    section_id: "Scr_120"
    drill: 1
    number: 460
    role: "exam"
    english: "Only yesterday did I finally understand what she actually wanted to say."
    japanese: "昨日になってやっと、私は彼女が本当に言いたかったことがわかりました。"
    notes: "難易度: 頻出。出典: 白百合女子大。整序問題。only+副詞句を文頭に出す場合も倒置が起こる。〈重要〉only+時の副詞（句・節）→「~の時になって初めて[やっと]」"
  - id: "scr-120-p03"
    section_id: "Scr_120"
    drill: 1
    number: 461
    role: "exam"
    english: "Not only did he forget his smartphone yesterday, but he also left his watch at home."
    japanese: "昨日彼はスマートフォンを忘れただけでなく、時計も家に忘れてきた。"
    notes: "出典: 神奈川大。4択問題。Not only...but (also) ~ が文と文を結ぶ場合、Not onlyが文頭に出るとNot onlyの後ろが倒置（疑問文の語順）になる。④is he forgettingは倒置形だが現在進行形であり、過去のことを表せないので不可。"
  - id: "scr-120-e02"
    section_id: "Scr_120"
    drill: 0
    number: 0
    role: "example"
    english: "Only when it's dark can you see the stars."
    japanese: "暗くなって初めて、星が見える。"
    notes: "問460解説〈重要〉例文。only+時の副詞節を文頭に出した倒置の例。"

