sentences:
  - id: "scr-140-p01"
    section_id: "Scr_140"
    drill: 1
    number: 542
    role: "exam"
    english: "Dr. Ashley often advises her patients to eat a wider variety of foods."
    japanese: "アシュリー先生はよく、彼女の患者たちにより幅広い種類の食べ物を食べるように忠告している。"
    notes: "出典: 獨協大。〈基本〉〈頻出〉並べ替え問題。advise A to do「Aに〜するように忠告する」。"
  - id: "scr-140-p02"
    section_id: "Scr_140"
    drill: 1
    number: 543
    role: "exam"
    english: "I wanted Sandy and her family to come."
    japanese: "私はサンディーとその家族に来てほしいと思った［期待した／頼んだ］。"
    notes: "出典: 関西学院大。〈基本〉〈頻出〉不適切選択問題。want[expect/ask] A to do。② hopeはSVO to do不可。hope for A to doの形（⇨ 480）。"
  - id: "scr-140-p03"
    section_id: "Scr_140"
    drill: 1
    number: 544
    role: "exam"
    english: "It is not easy to get children to study when they are playing video games."
    japanese: "子どもたちがテレビゲームをしているときに勉強をさせるのは容易ではない。"
    notes: "出典: 慶應大。〈頻出〉4択問題。get A to do「Aに〜させる/〜してもらう」(= have A do)。"
  - id: "scr-140-p04"
    section_id: "Scr_140"
    drill: 1
    number: 545
    role: "exam"
    english: "The weight of the snow caused the roof to fall down."
    japanese: "雪の重さのために屋根が崩れ落ちた。"
    notes: "出典: 名城大。〈頻出〉4択問題。cause A to do「（主語が原因となって）Aに〜させる」。SVO to doの形をとるのは④ causeだけ。他はすべてSVO do。"
  - id: "scr-140-p05"
    section_id: "Scr_140"
    drill: 1
    number: 546
    role: "exam"
    english: "The English teacher encouraged her students to read English novels and newspapers."
    japanese: "その英語教師は、彼女の生徒たちに英語の小説や新聞を読むように促した。"
    notes: "出典: 関西学院大。〈頻出〉4択問題。encourage A to do「Aを〜するように励ます[促す]」。③ preventはprevent A from doingの形なので不可（⇨ 519）。〈プラスα〉反意語discourageはdiscourage A from doing（⇨ 520）。"
  - id: "scr-140-p06"
    section_id: "Scr_140"
    drill: 1
    number: 547
    role: "exam"
    english: "Her good language skills enabled her to get a good job."
    japanese: "優れた語学力によって彼女は良い仕事に就くことができた。"
    notes: "出典: 芝浦工大。〈頻出〉4択問題。enable A to do「Aが〜することを可能にする」(= make it possible for A to do)。"
  - id: "scr-140-p07"
    section_id: "Scr_140"
    drill: 1
    number: 548
    role: "exam"
    english: "After three days of asking, I finally persuaded my father to lend me the car."
    japanese: "3日間お願いをした後、私はとうとう父を説得して車を貸してもらった。"
    notes: "出典: 南山大。〈頻出〉4択問題。persuade A to do「Aを説得して〜させる」(= persuade[talk] A into doing)。"

