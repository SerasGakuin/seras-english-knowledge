sentences:
  - id: "scr-196-p01"
    section_id: "Scr_196"
    drill: 1
    number: 814
    role: "exam"
    english: "Can you give me an accurate description of the person who came to the door?"
    japanese: "訪ねてきた人物を、私に正確に描写してくれませんか。"
    notes: "〈頻出〉東洋英和女学院大。accurate=precise「正確な」。"
  - id: "scr-196-p02"
    section_id: "Scr_196"
    drill: 1
    number: 815
    role: "exam"
    english: "An understanding of different cultures is indispensable to the promotion of tourism."
    japanese: "観光事業を進める上で、異文化への理解が不可欠である。"
    notes: "〈頻出〉中央大。indispensable=essential「不可欠な/絶対必要な」(=necessary)。"
  - id: "scr-196-p03"
    section_id: "Scr_196"
    drill: 1
    number: 816
    role: "exam"
    english: "The evidence showed it was obvious that Jack was capable of winning the race."
    japanese: "ジャックがそのレースに勝てることが明白なことをその証拠が示していた。"
    notes: "東海大。obvious=clear「明白な」(=evident)。"
  - id: "scr-196-p04"
    section_id: "Scr_196"
    drill: 1
    number: 817
    role: "exam"
    english: "Every decent man has a number of secrets which he is afraid to tell even to his friends."
    japanese: "きちんとした人でも皆、友達にさえ怖くて言えないような秘密をいくつか抱えている。"
    notes: "〈発展〉北里大。decent=respectable「（社会的に）まともな/きちんとした」。respectableは「尊敬」の意味は薄れている(⇨874)。decent [respectable] clothes「きちんとした服装」。"
  - id: "scr-196-p05"
    section_id: "Scr_196"
    drill: 1
    number: 818
    role: "exam"
    english: "There is an enormous shopping mall in this city."
    japanese: "この町には巨大なショッピングモールがある。"
    notes: "東海大。enormous=immense「巨大な」(=huge)。"
  - id: "scr-196-p06"
    section_id: "Scr_196"
    drill: 1
    number: 819
    role: "exam"
    english: "The curtain had an elaborate pattern of flowers."
    japanese: "そのカーテンには凝った花柄模様があった。"
    notes: "〈発展〉関西外語大。elaborate=complicated「凝った/複雑な」(=complex)。"
  - id: "scr-196-p07"
    section_id: "Scr_196"
    drill: 1
    number: 820
    role: "exam"
    english: "It's very important to get sufficient information before making your final decision."
    japanese: "最終的に決める前に十分な情報を入手することがとても重要です。"
    notes: "愛知学院大。sufficient=enough「十分な」(=adequate)。sufficient/enough/adequateは「あり余るほど」ではなく「必要を満たすのに十分な」。"

