sentences:
  - id: "scr-209-p01"
    section_id: "Scr_209"
    drill: 1
    number: 871
    role: "exam"
    english: "He should have been a little more considerate."
    japanese: "彼はもう少し思いやりを持つべきだったのに。"
    notes: "〈頻出〉〈発展〉群馬大。considerate「思いやりのある」vs considerable「かなりの」。should have done「〜すべきだったのに」(⇨69)。"
  - id: "scr-209-p02"
    section_id: "Scr_209"
    drill: 1
    number: 872
    role: "exam"
    english: "Our coach is imaginative and often comes up with new plans."
    japanese: "私たちのコーチは想像力豊かで、しばしば新しい計画を思いつく。"
    notes: "〈発展〉高知大。imaginative「想像力に富む」vs imaginary「想像上の」(⇔actual/real) vs imaginable「想像できる」。語句: come up with〜「〜を思いつく」(⇨1025)。"
  - id: "scr-209-p03"
    section_id: "Scr_209"
    drill: 1
    number: 873
    role: "exam"
    english: "Ants are industrious insects."
    japanese: "アリは勤勉な昆虫です。"
    notes: "〈頻出〉〈発展〉神奈川大。industrious「勤勉な」(=diligent/hardworking) vs industrial「工業の/産業の」。technical「技術的な」vs technological「科学技術の」。"
  - id: "scr-209-p04"
    section_id: "Scr_209"
    drill: 1
    number: 874
    role: "exam"
    english: "The company requires employees to wear clean and respectable clothes at work."
    japanese: "その会社は、従業員に仕事中は清潔できちんとした服装をするように要求している。"
    notes: "〈頻出〉芝浦工大。respectable「きちんとした/立派な」vs respective「それぞれの」。respectively(副)「それぞれ」、respectful「礼儀正しい」も重要。respectively例: The first and second prizes went to Anna and Mike, respectively.（それぞれアンナとマイクに贈られた）。respectful例: It's important to be respectful of other people's opinions.（他人の意見を尊重することは大切だ）。"
  - id: "scr-209-p05"
    section_id: "Scr_209"
    drill: 1
    number: 875
    role: "exam"
    english: "Literate people make up about 98 percent of the whole population."
    japanese: "読み書きできる人が全人口のおよそ98%を占める。"
    notes: "横浜市大。literate「読み書きのできる」⇔illiterate。literal「文字通りの」→literally(副)。literary「文学の」→literature(名)「文学」。語句: make up〜「構成する」(=compose)。"
  - id: "scr-209-p06"
    section_id: "Scr_209"
    drill: 1
    number: 876
    role: "exam"
    english: "It would have been more sensible to save the money than to spend it all on clothes."
    japanese: "そのお金をすべて服に使うよりも貯金するほうが賢明だったでしょう。"
    notes: "〈頻出〉中央大。sensible「分別のある/賢明な」vs sensory「感覚の」vs sensitive「敏感な」vs sensual「官能的な」。sensory organ「感覚器官」、sensitive skin「敏感肌」。"
  - id: "scr-209-p07"
    section_id: "Scr_209"
    drill: 1
    number: 877
    role: "exam"
    english: "My favorite Italian food is pizza."
    japanese: "私の一番好きなイタリア料理はピザです。"
    notes: "favorite「お気に入りの/一番好きな」vs favorable「好都合の/好意的な」。a favorable comment「好評」。"

