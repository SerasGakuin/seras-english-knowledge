sentences:
  - id: "scr-091-p01"
    section_id: "Scr_091"
    drill: 1
    number: 344
    role: "exam"
    english: "Do you know the people who are talking over there?"
    japanese: "向こうで話をしている人たちを知っていますか。"
    notes: "難易度: 基本、頻出。出典: 共立女子大。「人」が先行詞の主格関係代名詞who [that]"
  - id: "scr-091-p02"
    section_id: "Scr_091"
    drill: 1
    number: 345
    role: "exam"
    english: "An orphan is a child whose parents are both dead."
    japanese: "孤児とは、両親とも亡くなっている子どものことだ。"
    notes: "難易度: 基本、頻出。出典: 昭和女子大。「人」が先行詞の所有格関係代名詞whose"
  - id: "scr-091-p03"
    section_id: "Scr_091"
    drill: 1
    number: 346
    role: "exam"
    english: "The house which he was looking for was on the main street."
    japanese: "彼が捜していた家は本通りに面していた。"
    notes: "難易度: 基本。出典: 関西学院大。「人以外」が先行詞の目的格関係代名詞which [that]"
  - id: "scr-091-p04"
    section_id: "Scr_091"
    drill: 1
    number: 347
    role: "exam"
    english: "Everything you eat will have a lot to do with your body."
    japanese: "あなたが食べるものは、あなたの体に大きく関係するでしょう。"
    notes: "出典: 神戸学院大。整序問題。目的格関係代名詞の省略"
  - id: "scr-091-p05"
    section_id: "Scr_091"
    drill: 1
    number: 348
    role: "exam"
    english: "She goes to an English school whose tuition is high."
    japanese: "彼女は授業料の高い英語学校に通っている。"
    notes: "出典: 関西学院大。「人以外」が先行詞の所有格関係代名詞whose / of which"
  - id: "scr-091-p06"
    section_id: "Scr_091"
    drill: 1
    number: 349
    role: "exam"
    english: "The man who I thought was your brother proved to be the wrong person."
    japanese: "あなたのお兄さんだと思った男性は、実は違う人だった。"
    notes: "難易度: 頻出。出典: 獨協医大。関係代名詞直後のS+Vの割り込み。whoはwasの主語（主格）"

