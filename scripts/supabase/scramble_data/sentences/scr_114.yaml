sentences:
  - id: "scr-114-p01"
    section_id: "Scr_114"
    drill: 1
    number: 440
    role: "exam"
    english: "I'll help you clean the room unless I have too much homework to do."
    japanese: "もし宿題が多くなければ、あなたが部屋を掃除するのを手伝うよ。"
    notes: "難易度: 頻出。unless「〜でない限り/もし〜でなければ」(= if...not)。否定の条件を表し、節内で仮定法は用いない"
  - id: "scr-114-p02"
    section_id: "Scr_114"
    drill: 1
    number: 441
    role: "exam"
    english: "You can get a good seat for the concert, provided you reserve it in advance."
    japanese: "前もって予約しておけばコンサートのいい席が取れます。"
    notes: "出典: 南山大。provided [providing] (that)「もし〜ならば」(= if)。語句: in advance「前もって/あらかじめ」（→ 1210）"
  - id: "scr-114-p03"
    section_id: "Scr_114"
    drill: 1
    number: 442
    role: "exam"
    english: "Suppose you lost your wallet, what would you do first?"
    japanese: "もし財布をなくしたら、あなたはまず何をしますか。"
    notes: "難易度: 発展。suppose [supposing] (that)「もし〜ならば」(= if)。仮定法の文で使えるifの代用語はsuppose/supposingのみ"

