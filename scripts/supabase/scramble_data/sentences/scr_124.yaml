sentences:
  - id: "scr-124-p01"
    section_id: "Scr_124"
    drill: 1
    number: 470
    role: "exam"
    english: "There are few, if any, such good men."
    japanese: "そんないい人たちは、たとえいるにしても、ごく少ない。"
    notes: "出典: 東北学院大。4択問題。if any「たとえあるにしても」— fewの後に来て譲歩の意味。〈発展〉if anyには「もしあるならば」の意味もある。①all but「~の他はみな/ほとんど」, ④if possible「できたら」"
  - id: "scr-124-p02"
    section_id: "Scr_124"
    drill: 1
    number: 471
    role: "exam"
    english: "Contrary to popular belief, aerobic exercise does not make you tired and sleepy. If anything, it helps you concentrate more."
    japanese: "一般的な考えに反して、有酸素運動によって疲れて眠くなることはない。どちらかというと、より集中するのに役立つ。"
    notes: "出典: 立教大。4択問題。if anything「どちらかと言えば/むしろ」(= rather)。〈発展〉if anyと同じ使い方（たとえあったとしても）もある。"
  - id: "scr-124-p03"
    section_id: "Scr_124"
    drill: 1
    number: 472
    role: "exam"
    english: "He seldom, if ever, goes to the movies."
    japanese: "彼は、たとえあるにしても、めったに映画を見に行かない。"
    notes: "出典: 京都産業大。4択問題。if ever「たとえあるにしても」— seldom/rarely「めったに~ない」の後に来て使用。"
  - id: "scr-124-p04"
    section_id: "Scr_124"
    drill: 1
    number: 473
    role: "exam"
    english: "My brother loves baseball. He's an enthusiastic, if not a gifted, player."
    japanese: "私の兄［弟］は野球が大好きです。彼は天賦の才能があるとは言わないまでも、熱心な選手です。"
    notes: "出典: センター。4択問題。A, if not B「Bとは言わないまでもA / Bでないにしても A」。本問: enthusiastic, if not a gifted = if he is not a gifted (player)。A,Bには名詞・形容詞・副詞が来る。〈発展〉if notには「もしそうでなければ」の意味もある。"
  - id: "scr-124-e01"
    section_id: "Scr_124"
    drill: 0
    number: 0
    role: "example"
    english: "Correct errors, if any."
    japanese: "もし誤りがあるならば、訂正しなさい。"
    notes: "問470解説〈発展〉例文。if anyの「もしあるならば」の意味の例。省略を補えば: Correct errors, if (there are) any (errors)."
  - id: "scr-124-e02"
    section_id: "Scr_124"
    drill: 0
    number: 0
    role: "example"
    english: "Little, if anything, can be done to improve the situation."
    japanese: "状況を改善するためにできることは、たとえあったとしても、ほとんどない。"
    notes: "問471解説〈発展〉例文。if anythingの「たとえあったとしても」の意味（if anyと同じ使い方）の例。"
  - id: "scr-124-e03"
    section_id: "Scr_124"
    drill: 0
    number: 0
    role: "example"
    english: "We should leave now; if not, we'll miss the train."
    japanese: "今出発すべきです。そうでなければ、電車に乗り遅れます。"
    notes: "問473解説〈発展〉例文。if notの「もしそうでなければ」の意味の例。if not = if we don't leave now。A, if not Bの「~とは言わないまでも」とは異なる用法。"
  - id: "scr-124-e04"
    section_id: "Scr_124"
    drill: 0
    number: 0
    role: "example"
    english: "Please arrive early, if possible."
    japanese: "できれば早めに到着してください。"
    notes: "PU!91例文。if possible = if (it is) possible「できるなら/できたら」。慣用的省略。"
  - id: "scr-124-e05"
    section_id: "Scr_124"
    drill: 0
    number: 0
    role: "example"
    english: "You can use my car, if necessary."
    japanese: "必要なら私の車を使ってください。"
    notes: "PU!91例文。if necessary = if (it is) necessary「必要ならば」。慣用的省略。"
  - id: "scr-124-e06"
    section_id: "Scr_124"
    drill: 0
    number: 0
    role: "example"
    english: "Did I say something wrong? If so, I apologize."
    japanese: "何か悪いことを言いましたか。もしそうならば謝ります。"
    notes: "PU!91例文。if so = if (I did) so「もしそうならば」。慣用的省略。"

