sentences:
  - id: "scr-123-p01"
    section_id: "Scr_123"
    drill: 1
    number: 468
    role: "exam"
    english: "A plane crashed while attempting to land in Portland."
    japanese: "ポートランドに着陸しようとしている時に、飛行機は墜落した。"
    notes: "難易度: 頻出。出典: 神田外語大。4択問題。while (it was) attemptingのit wasが省略された形。while doing「~している間」"
  - id: "scr-123-p02"
    section_id: "Scr_123"
    drill: 1
    number: 469
    role: "exam"
    english: "She can explain the rules of chess if asked."
    japanese: "求められれば、彼女はチェスのルールを説明できる。"
    notes: "難易度: 頻出。出典: 関西大。4択問題。if (she is) askedのshe isが省略された形。if done「もし~されたら」"
  - id: "scr-123-e01"
    section_id: "Scr_123"
    drill: 0
    number: 0
    role: "example"
    english: "Work hard while young."
    japanese: "若いうちに一生懸命働きなさい。"
    notes: "PU!90①例文。while (you are) youngの省略形。while+形容詞パターン。"
  - id: "scr-123-e02"
    section_id: "Scr_123"
    drill: 0
    number: 0
    role: "example"
    english: "They were good friends when in school."
    japanese: "彼らは学生時代仲良しだった。"
    notes: "PU!90②例文。when (they were) in schoolの省略形。when+前置詞句パターン。"
  - id: "scr-123-e03"
    section_id: "Scr_123"
    drill: 0
    number: 0
    role: "example"
    english: "Though tired, I'll come with you, if necessary."
    japanese: "疲れているけれど、必要なら一緒に行きますよ。"
    notes: "PU!90③例文。though (I am) tiredとif (it is) necessaryの2箇所で省略。though+形容詞パターン。if necessaryは慣用的省略（→PU!91）。"
  - id: "scr-123-e04"
    section_id: "Scr_123"
    drill: 0
    number: 0
    role: "example"
    english: "Once signed, the contract will be valid until the end of March."
    japanese: "いったん署名したら、その契約は3月末まで有効になるだろう。"
    notes: "PU!90④例文。once (it is) signedの省略形。once done「いったん~されたら」パターン。→問421（Ch13 時の接続詞）参照。"

