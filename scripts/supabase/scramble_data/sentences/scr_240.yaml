sentences:
  - id: "scr-240-p01"
    section_id: "Scr_240"
    drill: 1
    number: 1211
    role: "exam"
    english: "They used to pay us a visit once in a while."
    japanese: "彼らは以前ときどき私たちを訪問したものだ。"
    notes: "〈頻出〉亜細亜大。once in a while「ときどき」(=sometimes/occasionally)。from time to time, on occasion(s)も同意。"
  - id: "scr-240-p02"
    section_id: "Scr_240"
    drill: 1
    number: 1212
    role: "exam"
    english: "Trouble like this arises from time to time."
    japanese: "このようなトラブルはときどき起こる。"
    notes: "〈基本〉〈頻出〉大阪経済大。from time to time「ときどき」(=sometimes/occasionally)。"
  - id: "scr-240-p03"
    section_id: "Scr_240"
    drill: 1
    number: 1213
    role: "exam"
    english: "They wear ties on occasion."
    japanese: "彼らはときどきネクタイをしめる。"
    notes: "早大。on occasion(s)「ときどき」(=sometimes/occasionally)。やや形式ばった表現。"
  - id: "scr-240-p04"
    section_id: "Scr_240"
    drill: 1
    number: 1214
    role: "exam"
    english: "The elevator is out of order, so we'll have to use the stairs."
    japanese: "エレベーターが故障しているので，階段を利用しなければならないでしょう。"
    notes: "〈頻出〉愛知学院大。out of order「故障して」⇔in order「順調で/きちんとして」。"
  - id: "scr-240-p05"
    section_id: "Scr_240"
    drill: 1
    number: 1215
    role: "exam"
    english: "This type of shoe is out of date."
    japanese: "このタイプの靴は時代遅れだ。"
    notes: "関西学院大。out of date「時代遅れの」⇔up to date「最新の」。プラスα: out of fashion「すたれて」⇔in fashion「はやって」も同意。"
  - id: "scr-240-p06"
    section_id: "Scr_240"
    drill: 1
    number: 1216
    role: "exam"
    english: "The plane went out of sight before I could take a photo."
    japanese: "写真を撮れないでいるうちに，その飛行機は見えなくなった。"
    notes: "out of sight「見えないところに[の]」⇔in sight「見えるところに[の]」。"
  - id: "scr-240-p07"
    section_id: "Scr_240"
    drill: 1
    number: 1217
    role: "exam"
    english: "The argument between them got out of hand quickly."
    japanese: "彼らの口論はあっという間に手に負えなくなった。"
    notes: "〈発展〉out of hand「手に負えない(で)」⇔in hand「支配[制御]して」。プラスα: out of control⇔under controlも同意。"
  - id: "scr-240-p08"
    section_id: "Scr_240"
    drill: 1
    number: 1218
    role: "exam"
    english: "My doctor has advised me to stop going to aerobics classes for the time being."
    japanese: "主治医は私に当分の間エアロビクスのクラスに通うことをやめるよう忠告した。"
    notes: "〈頻出〉北海学園大。for the time being「当分の間/さしあたり」(=for the present/for the moment)。"
  - id: "scr-240-p09"
    section_id: "Scr_240"
    drill: 1
    number: 1219
    role: "exam"
    english: "During the summer vacation, it rained for a week on end."
    japanese: "夏休み中，1週間雨が降り続いた。"
    notes: "〈発展〉愛知工大。on end「引き続いて/連続して」(=continuously)。「直立して/まっすぐに」の意味も。"
  - id: "scr-240-p10"
    section_id: "Scr_240"
    drill: 1
    number: 1220
    role: "exam"
    english: "According to the weather forecast, it will clear up before long."
    japanese: "天気予報によれば，まもなく晴れるそうです。"
    notes: "〈基本〉名城大。before long「まもなく/すぐに」(=soon)。"
  - id: "scr-240-p11"
    section_id: "Scr_240"
    drill: 1
    number: 1221
    role: "exam"
    english: "I should take an umbrella with me just in case."
    japanese: "万一に備えて，傘を持っていくほうがいいだろう。"
    notes: "〈頻出〉慶應大。(just) in case「万一に備えて」(⇨848(b))。副詞的に文末で使用。"

