sentences:
- id: scr-084-p01
  section_id: Scr_084
  drill: 1
  number: 311
  role: exam
  english: This shirt is too small. Can you show me another?
  japanese: このシャツは小さすぎます。別のものを見せていただけますか。
  notes: '難易度: 基本。出典: 東洋大。another = an + other「もう1つ/別の」。otherは単独で用いない'
- id: scr-084-p02
  section_id: Scr_084
  drill: 1
  number: 312
  role: exam
  english: They liked the town and decided to stay there another few days.
  japanese: 彼らはその町が気に入ったので、もう数日そこにとどまることにした。
  notes: '難易度: 発展。出典: 芝浦工大。another + 数詞[few] + 複数名詞「さらに数日」。単数・複数両扱い'
- id: scr-084-p03
  section_id: Scr_084
  drill: 1
  number: 313
  role: exam
  english: I can't distinguish one from the other.
  japanese: 区別がつかないね。
  notes: '難易度: 基本、頻出。出典: 麗澤大。対話問題Bの文。A: Look, Tim and his brother are very alike. one ~ the other「(2つの)1つは～、残りは…」。distinguish A from B（⇨ 問521）'
- id: scr-084-p04
  section_id: Scr_084
  drill: 1
  number: 314
  role: exam
  english: Some board members agreed with the president's proposal but others didn't.
  japanese: 社長の提案に賛成する役員もいれば、そうでない役員もいた。
  notes: '難易度: 頻出。出典: 愛知学院大。some ~ others ...「～のものもあれば…のものもある」'
- id: scr-084-p05
  section_id: Scr_084
  drill: 1
  number: 315
  role: exam
  english: I have four cards here. One is red and the others are all green.
  japanese: ここに4枚のカードがあります。1枚は赤で、残り全部は緑です。
  notes: '出典: 成城大。the others =「残り全部」。3つ以上からone/someを取った残り'
- id: scr-084-p06
  section_id: Scr_084
  drill: 1
  number: 316
  role: exam
  english: It is one thing to acquire knowledge, but it is quite another to apply it.
  japanese: 知識を得ることと、それを使うことはまったく別物だ。
  notes: '出典: 青山学院大。A is one thing, (and [but]) B (is) another「AとBは別のものだ」'
- id: scr-084-p07
  section_id: Scr_084
  drill: 1
  number: 317
  role: exam
  english: Jack and Brenda met each other for the first time while jogging in Central Park.
  japanese: ジャックとブレンダは、セントラルパークをジョギングしている時に初めてお互いに出会った。
  notes: '難易度: 基本。出典: 南山大。誤り指摘（to each other → each other）。each otherは代名詞で他動詞の目的語。×met to each other'
- id: scr-084-p08
  section_id: Scr_084
  drill: 1
  number: 318
  role: exam
  english: The dog watched people cross the street one after another.
  japanese: その犬は人が次から次へと道を渡るのを見ていた。
  notes: '出典: 追手門学院大。整序問題。one after another「次々に」（3つ以上）。watch A do（⇨ 問555）'
- id: scr-084-e01
  section_id: Scr_084
  drill: 0
  number: 1
  role: example
  english: Another two months has passed.
  japanese: さらに2か月が過ぎた。
  notes: another + 数詞 + 複数名詞。1まとまりとみなし単数・複数両扱い（has/have）
- id: scr-084-e02
  section_id: Scr_084
  drill: 0
  number: 2
  role: example
  english: Some say yes and some say no.
  japanese: 賛成の人もいれば反対の人もいる。
  notes: some ~ some の形。= Not all say yes.（部分否定）
- id: scr-084-e03
  section_id: Scr_084
  drill: 0
  number: 3
  role: example
  english: One wanted to read; another wanted to watch television.
  japanese: 1人は本を読みたがり、別の1人はテレビを見たがった。
  notes: '単数: one ~ another ...「1つは～、また別の1つは…」'
