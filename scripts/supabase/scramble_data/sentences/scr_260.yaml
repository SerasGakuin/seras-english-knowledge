sentences:
  - id: "scr-260-p01"
    section_id: "Scr_260"
    drill: 1
    number: 1357
    role: "exam"
    english: "May I help you?"
    japanese: "いらっしゃいませ，何にいたしましょうか。"
    notes: "〈基本〉〈頻出〉東京国際大。May[Can] I help you?「いらっしゃいませ/何にいたしましょうか」(mayのほうが丁寧)。プラスα: Are you being served[waited on]?=Have you been served?「ご用件はうけたまわっておりますか」。A: の行。"
  - id: "scr-260-p02"
    section_id: "Scr_260"
    drill: 1
    number: 1357
    role: "exam"
    english: "I'm just looking."
    japanese: "ちょっと見ているだけです。"
    notes: "東京国際大。I'm just looking.「見ているだけです」。B: の行。"
  - id: "scr-260-p03"
    section_id: "Scr_260"
    drill: 1
    number: 1357
    role: "exam"
    english: "Take your time, please."
    japanese: "どうぞごゆっくり。"
    notes: "東京国際大。Take your time, please.「どうぞごゆっくり」(⇨1082)。A: の行。Please go ahead.「どうぞご覧ください」とも。"
  - id: "scr-260-p04"
    section_id: "Scr_260"
    drill: 1
    number: 1358
    role: "exam"
    english: "I'm looking for T-shirts."
    japanese: "Tシャツを探しているんですが。"
    notes: "〈頻出〉高崎経済大。I'm looking for A.「Aを探しています」。A: の行。"
  - id: "scr-260-p05"
    section_id: "Scr_260"
    drill: 1
    number: 1358
    role: "exam"
    english: "What type do you have in mind?"
    japanese: "どんな型をお考えですか。"
    notes: "高崎経済大。have A in mind「Aを考えている」(⇨1075)。Do you have anything in mind?「何か決めているものがありますか」。B: の行。"
  - id: "scr-260-p06"
    section_id: "Scr_260"
    drill: 1
    number: 1358
    role: "exam"
    english: "May I try them on?"
    japanese: "試着してもよろしいですか？"
    notes: "高崎経済大。try on〜「〜を試しに着て[はいて/かぶって]みる」(⇨924)。A: の行。応答: Of course. The fitting rooms are on your right.「もちろんです。試着室は右手にございます」。"
  - id: "scr-260-p07"
    section_id: "Scr_260"
    drill: 1
    number: 1359
    role: "exam"
    english: "How much is this jacket?"
    japanese: "このジャケットはいくらですか。"
    notes: "〈基本〉富山大。How much is A?=What[ˣHow much] is the price of A?「Aはいくらですか」。会話ではHow much?だけも多い。B: の行。"
  - id: "scr-260-p08"
    section_id: "Scr_260"
    drill: 1
    number: 1359
    role: "exam"
    english: "I think it's a little expensive. Do you have a cheaper one?"
    japanese: "ちょっと高いですね。もう少し安いのはないですか。"
    notes: "富山大。「(品物などが)高い/安い」はexpensive/cheapを用いる(⇨659)。B: の行。"
  - id: "scr-260-p09"
    section_id: "Scr_260"
    drill: 1
    number: 1359
    role: "exam"
    english: "I'll take it."
    japanese: "それをいただきます。"
    notes: "富山大。I'll take it.「それをいただきます」。買い物で購入を決めたときの定型表現。B: の行。応答: How[What] about this one?「こちらはいかがですか」(⇨263)。"
  - id: "scr-260-e01"
    section_id: "Scr_260"
    drill: 0
    number: 1357
    role: "example"
    english: "Are you being served?"
    japanese: "ご用件はうけたまわっておりますか。"
    notes: "Are you being served[waited on]?=Have you been served[waited on]? 店員が客に声をかけるときの決まり文句。"

