sentences:
  - id: "scr-253-p01"
    section_id: "Scr_253"
    drill: 1
    number: 1319
    role: "exam"
    english: "Thank you so much for all your assistance."
    japanese: "助けてくれて本当にありがとう。"
    notes: "〈基本〉〈頻出〉学習院大。Thank you [Thanks] for〜「〜をありがとう」。応答: Don't mention it.(英)/You're welcome.(米)/That's all right.。A: の行。"
  - id: "scr-253-p02"
    section_id: "Scr_253"
    drill: 1
    number: 1320
    role: "exam"
    english: "It's very kind of you to say so."
    japanese: "そう言ってくれるとありがたいよ。"
    notes: "山梨大・亜細亜大。It is kind [nice] of you to do「〜してくれてありがとう」(⇨208)。A: の行。応答: No problem.。"
  - id: "scr-253-p03"
    section_id: "Scr_253"
    drill: 1
    number: 1321
    role: "exam"
    english: "I would appreciate it if you could show me how to input the data."
    japanese: "データの入力方法を教えていただけたらありがたいです。"
    notes: "〈頻出〉金沢工大。〈重要〉appreciateは「人」を目的語にとらない。if節の内容を受けるitが目的語。"
  - id: "scr-253-p04"
    section_id: "Scr_253"
    drill: 1
    number: 1322
    role: "exam"
    english: "I can go there by myself, thank you anyway."
    japanese: "一人で行けますから，どうも。"
    notes: "〈頻出〉立教大。Thank you [Thanks] anyway.=Thanks just [all] the same.「(とにかく)ありがとう」。相手の好意を断るとき/要望に応えられなかった場合に使用。B: の行。"
  - id: "scr-253-p05"
    section_id: "Scr_253"
    drill: 1
    number: 1323
    role: "exam"
    english: "I am very sorry to have kept you waiting."
    japanese: "お待たせして大変申し訳ありません。"
    notes: "〈基本〉〈頻出〉福島大。=I am very sorry (that) I have kept you waiting.=I am very sorry for having kept you waiting. A: の行。応答: Don't worry./Never mind.(ˣDon't mind.)。"
  - id: "scr-253-e01"
    section_id: "Scr_253"
    drill: 0
    number: 1321
    role: "example"
    english: "I would appreciate hearing from you soon."
    japanese: "すぐにお便りをいただければうれしいのですが。"
    notes: "appreciateの目的語に動名詞を用いた例。= I'd appreciate it if you'd write (to) me soon."

