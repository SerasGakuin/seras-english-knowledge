sentences:
  - id: "scr-175-p01"
    section_id: "Scr_175"
    drill: 1
    number: 680
    role: "exam"
    english: "Almost all of the tickets were sold out."
    japanese: "チケットのほとんどが売り切れていた。"
    notes: "〈頻出〉4択問題。almost all (of) the + 名詞「（限定された特定の）〜のほとんど」。almostは副詞で直接名詞を修飾できない。= most of the tickets。ofは省略可能。"
  - id: "scr-175-p02"
    section_id: "Scr_175"
    drill: 1
    number: 681
    role: "exam"
    english: "Almost all students eat lunch at the cafeteria because there are no good restaurants in the neighborhood."
    japanese: "近所に良いレストランがないので、ほとんどの学生はカフェテリアで昼食をとる。"
    notes: "出典: 日本女子大。〈頻出〉4択問題。almost all + 名詞「（限定されない）ほとんどの〜」= most + 名詞。×Almost students（副詞で直接名詞修飾不可）。×Most of students（most ofの後にはthe/one's必須）。×Most all students（形容詞のmostがallを修飾することはない）。"
  - id: "scr-175-p03"
    section_id: "Scr_175"
    drill: 1
    number: 682
    role: "exam"
    english: "Most Japanese people don't use English in everyday life."
    japanese: "ほとんどの日本人は、日常生活で英語を使わない。"
    notes: "出典: センター。4択問題。most + 名詞「ほとんどの〜」。Almostは副詞で直接名詞修飾不可。Noneには形容詞用法なし。"
  - id: "scr-175-p04"
    section_id: "Scr_175"
    drill: 1
    number: 683
    role: "exam"
    english: "Dr. Wilson was very happy when most of his students did well on the test."
    japanese: "ウィルソン先生は、自分の学生たちのほとんどがテストで良い成績をとったのでとてもうれしかった。"
    notes: "出典: 南山大。〈頻出〉4択問題。most of the [one's] + 名詞「（限定された特定の）〜のほとんど」。所有格と限定詞(most等)は続けて使えない→×most his students（⇨ Theme 159）。almostの場合はalmost all (of) his studentsの形。at most「多くても/せいぜい」（⇨ PU!42）。"
  - id: "scr-175-p05"
    section_id: "Scr_175"
    drill: 1
    number: 684
    role: "exam"
    english: "The bus was so late reaching the station that I almost missed the train."
    japanese: "バスがとても遅れて駅に着いたので、私はあやうく列車に乗り遅れるところだった。"
    notes: "出典: 東海大。4択問題。almost + 動詞「あやうく/もう少しで〜するところで（実際は〜していない）」。"
  - id: "scr-175-e01"
    section_id: "Scr_175"
    drill: 0
    number: 0
    role: "example"
    english: "I almost broke the cup."
    japanese: "もう少しでカップを割るところだった。"
    notes: "問684解説例文。almost + 動詞で「あやうく〜するところで（実際は〜していない）」の用法を示す。"

