sentences:
  - id: "scr-238-p01"
    section_id: "Scr_238"
    drill: 1
    number: 1189
    role: "exam"
    english: "\"He's quiet.\" \"On the contrary, he's talkative.\""
    japanese: "「彼は無口だね」「とんでもない，とてもおしゃべりだよ」"
    notes: "〈頻出〉on the contrary「それどころか」。比較: to the contrary「それとは反対の[に]」は修飾語の後で使用。"
  - id: "scr-238-p02"
    section_id: "Scr_238"
    drill: 1
    number: 1190
    role: "exam"
    english: "You should go and speak to him in person."
    japanese: "君は自分で出かけて直接彼に話すべきだ。"
    notes: "久留米大。in person「直接自分で/本人が」(=personally)。"
  - id: "scr-238-p03"
    section_id: "Scr_238"
    drill: 1
    number: 1191
    role: "exam"
    english: "I was at a loss what to say."
    japanese: "私は何を言ってよいかわからなかった。"
    notes: "〈頻出〉亜細亜大。at a loss「途方にくれて」。for〜や「疑問詞+to do」を伴う。at a loss for words「言葉を失う」。"
  - id: "scr-238-p04"
    section_id: "Scr_238"
    drill: 1
    number: 1192
    role: "exam"
    english: "We'll have to move that big desk; it's really in the way."
    japanese: "あの大きな机を動かさなくてはね。本当にじゃまだから。"
    notes: "センター。in the way (of〜)「（〜の）じゃまになって」(=in A's way)。⇔out of the way。"
  - id: "scr-238-p05"
    section_id: "Scr_238"
    drill: 1
    number: 1193
    role: "exam"
    english: "Please remember to buy some flowers on your way home from work."
    japanese: "仕事の帰りに，花を買ってくるのを忘れないで下さい。"
    notes: "〈基本〉〈頻出〉名古屋学院大。on [one's] way「途中で」。on the way home(⇨665)。"
  - id: "scr-238-p06"
    section_id: "Scr_238"
    drill: 1
    number: 1194
    role: "exam"
    english: "By the way, I hear you've been over to Paris."
    japanese: "ところで，パリに行ったんだってね。"
    notes: "〈基本〉慶應大。by the way「ところで」(=incidentally)。話題転換。"
  - id: "scr-238-p07"
    section_id: "Scr_238"
    drill: 1
    number: 1195
    role: "exam"
    english: "The teacher said it was out of the question to put off the exam since most of the students had arrived on time."
    japanese: "生徒のほとんどが定刻に到着したから，試験の延期は問題外だと先生は言った。"
    notes: "〈頻出〉清泉女子大。out of the question「問題にならない/不可能」(=impossible)。"
  - id: "scr-238-p08"
    section_id: "Scr_238"
    drill: 1
    number: 1196
    role: "exam"
    english: "In general, women live longer than men."
    japanese: "一般に，女性は男性より長生きだ。"
    notes: "〈基本〉〈頻出〉in general「一般に/概して」(=generally)。"
  - id: "scr-238-p09"
    section_id: "Scr_238"
    drill: 1
    number: 1197
    role: "exam"
    english: "In particular, London in early spring seems to suit me."
    japanese: "特に早春のロンドンは私の性に合っているようだ。"
    notes: "〈頻出〉奈良教育大。in particular「特に」(=particularly)。⇔in general。"
  - id: "scr-238-p10"
    section_id: "Scr_238"
    drill: 1
    number: 1198
    role: "exam"
    english: "My father comes home at about eight o'clock as a rule."
    japanese: "私の父はふつう，8時頃に帰宅する。"
    notes: "名城大。as a rule「概して/ふつうは」(=in general/generally)。"
  - id: "scr-238-p11"
    section_id: "Scr_238"
    drill: 1
    number: 1199
    role: "exam"
    english: "On the whole, our company has been successful for the last ten years."
    japanese: "概して，わが社は過去10年間うまくいっている。"
    notes: "中部大。on the whole「概して/大体において」(=in general)。⇔as a whole「全体として(の)」。"
  - id: "scr-238-p12"
    section_id: "Scr_238"
    drill: 1
    number: 1200
    role: "exam"
    english: "He has been at large since last week."
    japanese: "彼は先週以来，逃走中である。"
    notes: "〈発展〉立命館大。at large「逃走中で」。また「全体としての/一般の」の意味も: the world at large。"
  - id: "scr-238-e01"
    section_id: "Scr_238"
    drill: 0
    number: 1199
    role: "example"
    english: "The team as a whole performed excellently."
    japanese: "チーム全体としてすばらしいパフォーマンスを発揮した。"
    notes: "比較。as a whole「全体として(の)」。on the whole（概して）との区別。"

