sentences:
  - id: "scr-177-p01"
    section_id: "Scr_177"
    drill: 1
    number: 691
    role: "exam"
    english: "I parked my car at the corner where the bank is."
    japanese: "私は銀行のある角に駐車した。"
    notes: "出典: 立教大。〈基本〉4択問題。at the corner of a street「通りの角」vs in the corner of a room「部屋の隅」。atは地点、inは内部。"
  - id: "scr-177-p02"
    section_id: "Scr_177"
    drill: 1
    number: 692
    role: "exam"
    english: "My father was born in a small village on the Mississippi River."
    japanese: "私の父はミシシッピ川沿いの小さな村に生まれた。"
    notes: "出典: 西南学院大。4択問題。on「〜に面して/沿って」。onの接触は面だけでなく線上でもよい。on the coast「海岸沿いの」。"
  - id: "scr-177-p03"
    section_id: "Scr_177"
    drill: 1
    number: 693
    role: "exam"
    english: "Mexico City is over 2,000 meters above sea level."
    japanese: "メキシコシティは海抜2,000メートル以上だ。"
    notes: "記述問題。above「〜より上に」（接触せず上方）⇔ below「〜より下に」。A above sea level「海抜A」⇔ A below sea level「海面下A」は頻出表現。"
  - id: "scr-177-p04"
    section_id: "Scr_177"
    drill: 1
    number: 694
    role: "exam"
    english: "A sooty lamp hung over the table."
    japanese: "すすけたランプがテーブルの真上にかけられていた。"
    notes: "出典: 大阪商業大。4択問題。over「〜の真上に」（離れて真上/覆いかぶさって上に）⇔ under「〜の真下に」。"
  - id: "scr-177-p05"
    section_id: "Scr_177"
    drill: 1
    number: 695
    role: "exam"
    english: "My home town is about 35 kilometers to the north of Kobe."
    japanese: "私の故郷は神戸から北におよそ35キロのところにあります。"
    notes: "出典: 神戸親和女子大。4択問題。to the north of A「Aの北方に」（離れている）。on the north of A「北側に」（接する）。in the north of A「北部に」（中の北部）。"
  - id: "scr-177-p06"
    section_id: "Scr_177"
    drill: 1
    number: 696
    role: "exam"
    english: "What is the difference between this and that?"
    japanese: "これとあれの違いは何ですか。"
    notes: "出典: 関東学院大。4択問題。between: 原則2者（個々に焦点）。among: 3者以上（集合体）。3者以上でも個々を念頭に置く場合はbetween可。"
  - id: "scr-177-p07"
    section_id: "Scr_177"
    drill: 1
    number: 697
    role: "exam"
    english: "Hawaii is a popular vacation spot among Japanese people."
    japanese: "ハワイは日本人の間で人気の観光地だ。"
    notes: "出典: 武蔵大。4択問題。among「（3者以上の）の間で/〜の中で」。amongの後は同類・同種の複数名詞[集合名詞]。"
  - id: "scr-177-e01"
    section_id: "Scr_177"
    drill: 0
    number: 0
    role: "example"
    english: "Tokyo is among the most populous cities in the world."
    japanese: "東京は世界で最も人口の多い都市の1つである。"
    notes: "問697解説〈発展〉例文。among「[最上級を伴って]〜の中の1つ[1人]で」= one of the most populous cities。"

