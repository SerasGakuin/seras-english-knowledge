sentences:
  - id: "scr-224-p01"
    section_id: "Scr_224"
    drill: 1
    number: 1035
    role: "exam"
    english: "If you hear her speak, you might take her for a native speaker."
    japanese: "彼女が話すのを聞けば、彼女をネイティブ・スピーカーだと思うでしょう。"
    notes: "金城学院大。take A for B「AをBだと思う/AをBと間違える」(=mistake A for B)。forは「〜として/〜であると」の意味でasに近い。"
  - id: "scr-224-p02"
    section_id: "Scr_224"
    drill: 1
    number: 1036
    role: "exam"
    english: "If you don't like the color, you can exchange it for a different one."
    japanese: "もし色が気に入らなければ、他のものに交換できますよ。"
    notes: "武蔵大。exchange A for B「AをBと交換する」。"
  - id: "scr-224-p03"
    section_id: "Scr_224"
    drill: 1
    number: 1037
    role: "exam"
    english: "We all congratulate you on your success."
    japanese: "ご成功おめでとう。"
    notes: "〈頻出〉清泉女子大。congratulate A on[upon] B「A（人）のB（成功・幸運など）を祝う」。celebrateの目的語は「人」ではなく「特別な日・祝い事」であることに注意。"
  - id: "scr-224-p04"
    section_id: "Scr_224"
    drill: 1
    number: 1038
    role: "exam"
    english: "Can you help me with my homework?"
    japanese: "宿題を手伝ってくれますか？"
    notes: "〈基本〉白百合女子大。help A with B「A（人）のBを手伝う」。withは「〜に関して」の意味で「動作の対象」を表す。"
  - id: "scr-224-p05"
    section_id: "Scr_224"
    drill: 1
    number: 1039
    role: "exam"
    english: "I owe my success in life to him."
    japanese: "私が成功できたのはあの人のおかげだ。"
    notes: "〈頻出〉中央大。owe A to B「AはBのおかげである」。元の意味は「A（金など）をB（人）に借りている」。"
  - id: "scr-224-p06"
    section_id: "Scr_224"
    drill: 1
    number: 1040
    role: "exam"
    english: "We had a project in class, and I was able to share my ideas with my group."
    japanese: "授業でプロジェクトがあり、私は自分の考えをグループと共有できた。"
    notes: "〈頻出〉南山大。share A with B「A（物）をB（人）と分け合う/共有する」。目的語Aは「物」。"
  - id: "scr-224-p07"
    section_id: "Scr_224"
    drill: 1
    number: 1041
    role: "exam"
    english: "We are leaving Japan for Canada next month."
    japanese: "私たちは来月、日本を出発してカナダに向かいます。"
    notes: "〈基本〉〈頻出〉leave A for B「Aを出発してBに向かう」(=start from A for B)。leave for〜「〜に向けて出発する」の形も重要。"
  - id: "scr-224-p08"
    section_id: "Scr_224"
    drill: 1
    number: 1042
    role: "exam"
    english: "Ellen spends a lot of money on clothes."
    japanese: "エレンは衣服にずいぶんお金を使います。"
    notes: "〈基本〉〈頻出〉東海大。spend A on B「A（時間・金）をBに費やす」。spend A (in) doing（⇨124）。"
  - id: "scr-224-p09"
    section_id: "Scr_224"
    drill: 1
    number: 1043
    role: "exam"
    english: "The baby was named after a famous king in French history."
    japanese: "その赤ちゃんはフランスの歴史上の名高い王にちなんで名付けられた。"
    notes: "〈頻出〉中央大。name A after[for] B「Bの名をとってAに名前をつける」。afterは「〜にならって/〜にちなんで」の意味で「模倣」を表す。"
  - id: "scr-224-p10"
    section_id: "Scr_224"
    drill: 1
    number: 1044
    role: "exam"
    english: "Taro is now devoting all his time and energy to studying English."
    japanese: "太郎は今すべての時間と労力を英語の勉強に注いでいる。"
    notes: "〈頻出〉センター。devote A to B「A（努力・時間など）をB（仕事・目的など）にささげる」。devote oneself to〜「〜に専念する」=be devoted to〜。"
  - id: "scr-224-p11"
    section_id: "Scr_224"
    drill: 1
    number: 1045
    role: "exam"
    english: "He often attributes his failure to bad luck."
    japanese: "彼はよく自分の失敗を不運のせいにする。"
    notes: "関西学院大。attribute A to B「AをBのせいにする」(=ascribe A to B)。"
  - id: "scr-224-e01"
    section_id: "Scr_224"
    drill: 0
    number: 1039
    role: "example"
    english: "I owe $500 to my older brother."
    japanese: "私は兄に500ドル借りている。"
    notes: "解説例文。owe A to Bの元の意味「A（金）をBに借りている」。"
  - id: "scr-224-e02"
    section_id: "Scr_224"
    drill: 0
    number: 1041
    role: "example"
    english: "I am leaving for Kyoto tonight."
    japanese: "今夜、京都に向けて出発します。"
    notes: "プラスα。leave for〜「〜に向けて出発する」。目的語を伴わない形。"
  - id: "scr-224-e03"
    section_id: "Scr_224"
    drill: 0
    number: 1043
    role: "example"
    english: "The baby was named John after his grandfather."
    japanese: "その赤ちゃんは祖父にちなんでジョンと名付けられた。"
    notes: "プラスα。name A B after[for] C「Cにちなんで名前Bをつける」の受動態。"
  - id: "scr-224-e04"
    section_id: "Scr_224"
    drill: 0
    number: 1044
    role: "example"
    english: "They are devoting themselves to farming."
    japanese: "彼らは農業に専念している。"
    notes: "プラスα。devote oneself to〜「〜に専念する」=be devoted to〜。"

