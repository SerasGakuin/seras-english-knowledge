sentences:
  - id: "scr-073-p01"
    section_id: "Scr_073"
    drill: 1
    number: 266
    role: "exam"
    english: "Please speak up, as I can hardly hear you."
    japanese: "ほとんど聞こえないので、大きな声で話してください。"
    notes: "難易度: 頻出。出典: 学習院大。hardly「ほとんど～ない」（程度の弱い否定）。一般動詞の前に置く"
  - id: "scr-073-p02"
    section_id: "Scr_073"
    drill: 1
    number: 267
    role: "exam"
    english: "We seldom eat Matsusaka beef since it's so expensive."
    japanese: "松阪牛はとても高いのでめったに食べない。"
    notes: "出典: 南山大。誤り指摘問題。don't seldom → seldom。準否定語にnotを付けない"
  - id: "scr-073-p03"
    section_id: "Scr_073"
    drill: 1
    number: 268
    role: "exam"
    english: "On the day following the party, there was hardly any food left in the refrigerator."
    japanese: "パーティーの翌日、冷蔵庫にはほとんど食べ物が残っていなかった。"
    notes: "難易度: 頻出。出典: 立命館大。hardly any + 名詞 =「ほとんど～がない」（= almost no + 名詞）。参照: There be + S + done（⇨ 問141）"
  - id: "scr-073-p04"
    section_id: "Scr_073"
    drill: 1
    number: 269
    role: "exam"
    english: "He hardly ever goes to the movies."
    japanese: "彼はめったに映画を見に行かない。"
    notes: "出典: 県立広島大。hardly ever =「めったに～ない」（= seldom / almost never）。一般動詞の前に置く"

