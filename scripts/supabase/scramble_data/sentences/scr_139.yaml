sentences:
  - id: "scr-139-p01"
    section_id: "Scr_139"
    drill: 1
    number: 536
    role: "exam"
    english: "Though he disagreed, he kept quiet to avoid conflict."
    japanese: "彼は反対だったが、対立を避けるために黙っていた。"
    notes: "出典不明。keep C「ずっとCのままである」。Cには形容詞が来る。② quietlyと③ silentlyは副詞なので不可。"
  - id: "scr-139-p02"
    section_id: "Scr_139"
    drill: 1
    number: 537
    role: "exam"
    english: "The flowers you gave me yesterday really smell sweet."
    japanese: "昨日あなたが私にくれた花は本当に甘い香りがします。"
    notes: "出典: 亜細亜大。smell C「Cの香り[におい]がする」。知覚動詞の補語は基本的に形容詞。① sweetening「甘味料」、② sweetie「恋人」、④ sweeten「〜を甘くする」。"
  - id: "scr-139-p03"
    section_id: "Scr_139"
    drill: 1
    number: 538
    role: "exam"
    english: "War occurs when something goes wrong with foreign affairs."
    japanese: "何か外交問題がうまくいかないときに戦争は起こる。"
    notes: "出典: 西南学院大。go wrong「失敗する/うまくいかない/(機械などが)故障する」。go+形容詞「〜になる」は通例、好ましくない状態への変化。〈プラスα〉go bad「腐る」/ go bankrupt「破産する/倒産する」。"
  - id: "scr-139-p04"
    section_id: "Scr_139"
    drill: 1
    number: 539
    role: "exam"
    english: "That dream of yours might come true someday."
    japanese: "あなたのあの夢はいつか実現するかもしれない。"
    notes: "出典: 駒澤大。come true「（夢などが）実現する」(= be realized)。come+形容詞「〜になる」は好ましい状態への変化。〈プラスα〉come alive「生き生きとする」/ come right「うまくいく」。"
  - id: "scr-139-p05"
    section_id: "Scr_139"
    drill: 1
    number: 540
    role: "exam"
    english: "This problem makes our relationship more difficult."
    japanese: "この問題のせいで、私たちの関係はよりやっかいなものになっている。"
    notes: "出典: 大阪経済大。〈基本〉並べ替え問題。make O C「OをCにする」。"
  - id: "scr-139-p06"
    section_id: "Scr_139"
    drill: 1
    number: 541
    role: "exam"
    english: "You will find this book very interesting."
    japanese: "この本はとても面白いですよ。"
    notes: "出典: 愛知学院大。〈頻出〉4択問題。find O C「OがCだとわかる/OをCだと思う」。O=C [this book = very interesting]の関係が成立。② discoverはOに「人」をとるので不可。"

