sentences:
  - id: "scr-213-p01"
    section_id: "Scr_213"
    drill: 1
    number: 908
    role: "exam"
    english: "Your idea is very good, but the question is how to carry it out."
    japanese: "あなたの考えはとても良いが、問題はそれをどう実行すべきかだ。"
    notes: "〈頻出〉大阪経大。carry out〜「〜を実行する/〜を成し遂げる」(=perform/accomplish)。carry it outの語順に注意(⇨PU!188)。"
  - id: "scr-213-p02"
    section_id: "Scr_213"
    drill: 1
    number: 909
    role: "exam"
    english: "I tried to carry on the investigation on my own."
    japanese: "私は1人でその調査を続けようとした。"
    notes: "亜細亜大。carry on〜「〜を続ける/〜を進める」(=continue)。carry on with〜も同意。"
  - id: "scr-213-p03"
    section_id: "Scr_213"
    drill: 1
    number: 910
    role: "exam"
    english: "We need to cut down our expenses this month."
    japanese: "私たちは今月、出費を抑える必要がある。"
    notes: "cut down〜「〜を減らす/〜を切りつめる」(=reduce)。cut down on〜も同意。"
  - id: "scr-213-p04"
    section_id: "Scr_213"
    drill: 1
    number: 911
    role: "exam"
    english: "I left my umbrella behind in the train."
    japanese: "私は電車に傘を置き忘れた。"
    notes: "〈基本〉関西外大。leave〜behind「〜を置き忘れる/〜を後に残す」。"
  - id: "scr-213-p05"
    section_id: "Scr_213"
    drill: 1
    number: 912
    role: "exam"
    english: "These two lines should be left out."
    japanese: "この2行は削除すべきだ。"
    notes: "高知大。leave out〜「〜を除外する/〜を省く」(=omit)。"
  - id: "scr-213-p06"
    section_id: "Scr_213"
    drill: 1
    number: 913
    role: "exam"
    english: "We cannot rule out the possibility that some information has been leaked."
    japanese: "情報が漏洩した可能性を否定することはできない。"
    notes: "〈発展〉rule out〜「〜を除外する/〜を否定する」(=exclude)。rule out the possibility that [of]〜の形が頻出。"
  - id: "scr-213-p07"
    section_id: "Scr_213"
    drill: 1
    number: 914
    role: "exam"
    english: "He speaks so fast that I can't take in what he says."
    japanese: "彼はあまり速く話すので何を言っているのか分からない。"
    notes: "駒澤大。take in〜「〜を理解する」(=understand)。take in〜には「〜をだます」(=deceive)の意味も。"
  - id: "scr-213-p08"
    section_id: "Scr_213"
    drill: 1
    number: 915
    role: "exam"
    english: "She will take on the responsibility if they start the project."
    japanese: "プロジェクトが始まったら、彼女が責任を引き受けるだろう。"
    notes: "青山学院大。take on〜「（仕事・責任など）を引き受ける」(=undertake/accept)。take on〜には「〜を雇う」「（性質・外観を）帯びる」(=assume)の意味も。"
  - id: "scr-213-p09"
    section_id: "Scr_213"
    drill: 1
    number: 916
    role: "exam"
    english: "In his childhood days, he had no intention of taking over the family business."
    japanese: "子どものころ、彼は家業を継ぐつもりがなかった。"
    notes: "金城学院大。take over〜「（事業・職務など）を引き継ぐ」(=succeed to⇨997)。"
  - id: "scr-213-p10"
    section_id: "Scr_213"
    drill: 1
    number: 917
    role: "exam"
    english: "These camping items don't take up much room, so I think we only need one car."
    japanese: "これらのキャンプ用品はそれほど場所を取らないので、車は1台だけでいいと思う。"
    notes: "南山大。take up〜「（時間・場所など）を取る/占める」(=occupy)。不可算名詞room「場所/空間」(⇨753)。take up〜の「（趣味として）〜を始める」の意味も重要。"
  - id: "scr-213-p11"
    section_id: "Scr_213"
    drill: 1
    number: 918
    role: "exam"
    english: "She showed off the diamond ring."
    japanese: "彼女はそのダイヤの指輪を見せびらかした。"
    notes: "〈頻出〉慶應大。show off〜「〜を見せびらかす」(=display)。"
  - id: "scr-213-e01"
    section_id: "Scr_213"
    drill: 0
    number: 914
    role: "example"
    english: "He was completely taken in by the fraud."
    japanese: "彼はその詐欺にすっかりだまされた。"
    notes: "プラスα。take in〜の「〜をだます」(=deceive/cheat)用法。受動態。"
  - id: "scr-213-e02"
    section_id: "Scr_213"
    drill: 0
    number: 915
    role: "example"
    english: "The company took on five new employees."
    japanese: "その会社は新しく5人の従業員を採用した。"
    notes: "プラスα。take on〜の「〜を雇う」用法。"
  - id: "scr-213-e03"
    section_id: "Scr_213"
    drill: 0
    number: 917
    role: "example"
    english: "I'm thinking of taking up a new hobby this year."
    japanese: "今年、新しい趣味を始めようかと考えています。"
    notes: "プラスα。take up〜の「（趣味・仕事として）〜を始める」用法。"

