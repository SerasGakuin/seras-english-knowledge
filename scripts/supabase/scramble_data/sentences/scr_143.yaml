sentences:
  - id: "scr-143-p01"
    section_id: "Scr_143"
    drill: 1
    number: 562
    role: "exam"
    english: "They had their pictures taken in front of Tokyo Skytree."
    japanese: "彼らは東京スカイツリーの前で写真を撮ってもらった。"
    notes: "出典: 成城大。〈超頻〉4択問題。have A done「Aを〜してもらう」(= get A done)。「使役」の意味。写真が撮られるという受動関係。"
  - id: "scr-143-p02"
    section_id: "Scr_143"
    drill: 1
    number: 563
    role: "exam"
    english: "Could you give me a ride to the station tomorrow morning? I must get my car repaired at the garage."
    japanese: "明日の朝、駅まで乗せてくれませんか。私の車は工場で修理してもらわないといけないのです。"
    notes: "出典: 東京理科大。〈頻出〉4択問題。get A done「Aを〜してもらう」(= have A done)。「使役」の意味。〈暗記〉give ~ a ride「〜を乗せて行く」。"
  - id: "scr-143-p03"
    section_id: "Scr_143"
    drill: 1
    number: 564
    role: "exam"
    english: "He got his umbrella caught in the door by accident when he boarded the rush hour train."
    japanese: "彼はラッシュ時の電車に乗り込んだ時、うっかりドアに傘をはさまれた。"
    notes: "出典: センター。〈頻出〉4択問題。get A done「Aを〜される」。「被害」の意味。makeには被害の用法はない。by accident = accidentally「誤って/うっかり/偶然に」(= by chance)。"
  - id: "scr-143-p04"
    section_id: "Scr_143"
    drill: 1
    number: 565
    role: "exam"
    english: "We're supposed to have our new project finished by Monday."
    japanese: "月曜日までに新しい計画をやり遂げてしまうことになっている。"
    notes: "出典: 東北学院大。〈発展〉4択問題。have A done「（自分が）Aを〜してしまう」(= get A done)。「完了」の意味。〈暗記〉be supposed to do「〜することになっている」（⇨ 1168）。"
  - id: "scr-143-p05"
    section_id: "Scr_143"
    drill: 1
    number: 566
    role: "exam"
    english: "In the speech contest, I spoke clearly and carefully in order to make myself understood by everyone in the auditorium."
    japanese: "弁論大会では、講堂にいるみんなに自分の考えが伝わるように、はっきりそして注意深く話した。"
    notes: "出典: 成蹊大。〈頻出〉並べ替え問題（1語不要）。make oneself understood「自分の考え［言うこと］を人に理解してもらう」。make A doneの成句。oneselfが理解されるという受動関係に注意。〈プラスα〉make oneself heard「自分の声を聞き取ってもらう」も同類。"
  - id: "scr-143-e01"
    section_id: "Scr_143"
    drill: 0
    number: 0
    role: "example"
    english: "He had to shout to make himself heard over the noise of the crowd."
    japanese: "彼は群衆の騒音の中で自分の声を届かせるために叫ばなければならなかった。"
    notes: "問566プラスα例文。make oneself heard「自分の声を聞き取ってもらう」。make A doneの成句。"

