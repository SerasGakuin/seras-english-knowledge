sentences:
  - id: "scr-201-p01"
    section_id: "Scr_201"
    drill: 1
    number: 840
    role: "exam"
    english: "(a) The company is hoping to expand its operations abroad. (b) They obviously enjoy each other's company. (c) We're expecting company this evening. (d) Men are known by the company they keep."
    japanese: "(a) その会社は海外で事業を拡大したいと思っている。(b) 明らかに、彼らは一緒にいると楽しそうだ。(c) 今晩、来客があります。(d) 人は付き合う仲間によってわかる。"
    notes: "(a)〜(c)上智大・(d)東京経済大。共通語: company。(a)名「会社」(b)名「一緒にいること」(c)名「来客」(d)名「仲間」。enjoy A's company「Aと一緒にいると楽しい」。expect company「客が来る予定」。〈重要〉(d) be known by A「Aによってわかる」(⇨PU!12)。"
  - id: "scr-201-p02"
    section_id: "Scr_201"
    drill: 1
    number: 841
    role: "exam"
    english: "(a) Due to traffic jams, we will arrive a little later than expected. (b) The report is due on Thursday, but I haven't even started writing it. (c) The Olympic Games are due to start next month. (d) Her first baby is due in June."
    japanese: "(a) 交通渋滞のために、到着するのは予想よりも少し遅くなるでしょう。(b) レポートは木曜日が提出期限だが、まだ書き始めてすらいない。(c) オリンピックは来月開幕する予定だ。(d) 彼女の初めての子どもは6月に生まれる予定です。"
    notes: "〈頻出〉(a)関西学院大・(d)駒澤大。共通語: due。(a)前 due to〜「〜のために」(⇨1279) (b)形「期日が来て」(c)形 be due to do「〜する予定」(d)形「生まれる予定で」。"
  - id: "scr-201-p03"
    section_id: "Scr_201"
    drill: 1
    number: 842
    role: "exam"
    english: "(a) Mr. Saito would like to run an Italian restaurant in Shibuya. (b) Buying high quality items will often save you money in the long run. (c) Please clean the rail so you can make the curtain run smoothly. (d) The mayor has chosen not to run in the next election."
    japanese: "(a) サイトウさんは渋谷でイタリアンレストランを経営したいと思っている。(b) 高品質の物を買うことは、長い目で見ればお金の節約になることが多い。(c) カーテンを滑らかに動かせるように、カーテンレールをきれいにしてください。(d) 市長は次の選挙には立候補しないことに決めている。"
    notes: "〈頻出〉(a)國學院大・(b)(c)西南学院大・(d)中央大。共通語: run。(a)動「経営する」(=manage) (b)名 in the long run「結局」(c)動「滑るように動く」(d)動「立候補する」。run は共通語補充問題で頻出。"
  - id: "scr-201-e01"
    section_id: "Scr_201"
    drill: 0
    number: 841
    role: "example"
    english: "The train is due at 6 p.m."
    japanese: "その列車は午後6時に到着予定です。"
    notes: "〈プラスα〉dueの「到着予定で」の用法。"
  - id: "scr-201-e02"
    section_id: "Scr_201"
    drill: 0
    number: 842
    role: "example"
    english: "The director's new movie will run in theaters starting next month."
    japanese: "その監督の新作映画は来月から劇場で上映される。"
    notes: "〈プラスα〉runの「上演［上映］される」の用法。"

