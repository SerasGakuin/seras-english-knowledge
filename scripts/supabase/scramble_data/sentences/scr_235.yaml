sentences:
  - id: "scr-235-p01"
    section_id: "Scr_235"
    drill: 1
    number: 1155
    role: "exam"
    english: "Our bodies are composed of trillions of cells."
    japanese: "私たちの身体は非常に多くの細胞で構成されている。"
    notes: "金沢工大。be composed of〜/be made up of〜「〜から成る」(=consist of⇨965)。ofは材料・構成要素。"
  - id: "scr-235-p02"
    section_id: "Scr_235"
    drill: 1
    number: 1156
    role: "exam"
    english: "Our research team is made up of young researchers from all over the world."
    japanese: "私たちの研究チームは世界中の若い研究者から成る。"
    notes: "〈頻出〉中央大。be made up of〜「〜から成る」(=consist of⇨965)。"
  - id: "scr-235-p03"
    section_id: "Scr_235"
    drill: 1
    number: 1157
    role: "exam"
    english: "Naoko wasn't opposed to the idea, but she wasn't happy about it either."
    japanese: "ナオコはその考えに反対ではなかったが，満足もしていなかった。"
    notes: "南山大。be opposed to〜「〜に反対している」(=be against)。比較: be opposite to〜「〜とは正反対」。"
  - id: "scr-235-p04"
    section_id: "Scr_235"
    drill: 1
    number: 1158
    role: "exam"
    english: "Mary is fond of running because it makes her feel refreshed."
    japanese: "リフレッシュできるので，メアリーはランニングが好きだ。"
    notes: "〈基本〉〈頻出〉学習院大。be fond of〜「〜が好きである」(=like)。make A do(⇨550)。"
  - id: "scr-235-p05"
    section_id: "Scr_235"
    drill: 1
    number: 1159
    role: "exam"
    english: "He is not very keen on classical music."
    japanese: "彼はクラシック音楽はあまり好きではない。"
    notes: "摂南大。be keen on〜「〜が大好きである/〜に夢中である」。「〜を熱望している」の意味も。"
  - id: "scr-235-p06"
    section_id: "Scr_235"
    drill: 1
    number: 1160
    role: "exam"
    english: "He is the boss, so he is responsible for anything that goes wrong."
    japanese: "彼は上司なので，何か不都合が生じれば彼に責任がある。"
    notes: "〈頻出〉関西外語大。be responsible for〜「〜に責任がある」(=answer for⇨953)。"
  - id: "scr-235-p07"
    section_id: "Scr_235"
    drill: 1
    number: 1161
    role: "exam"
    english: "I am sure of your success."
    japanese: "私はあなたの成功を確信している。"
    notes: "〈基本〉慶應大。be sure of〜「〜を確信している」(=be certain of)。比較: be sure to do(⇨1166)。PU!196参照。"
  - id: "scr-235-p08"
    section_id: "Scr_235"
    drill: 1
    number: 1162
    role: "exam"
    english: "My idea is similar to yours."
    japanese: "私の考えはあなたの考えと似ている。"
    notes: "〈頻出〉北星学園大。be similar to〜「〜に似ている」(=be akin to)。"
  - id: "scr-235-p09"
    section_id: "Scr_235"
    drill: 1
    number: 1163
    role: "exam"
    english: "You're not very good at reading maps, are you?"
    japanese: "君は地図を読むのがあまり得意ではないですね。"
    notes: "〈基本〉〈頻出〉国士舘大。be good at〜「〜が得意」。⇔be poor at〜/be weak in〜「〜が苦手」。"
  - id: "scr-235-p10"
    section_id: "Scr_235"
    drill: 1
    number: 1164
    role: "exam"
    english: "Since he will be moving to Japan, Carl is interested in learning Japanese."
    japanese: "日本に引っ越す予定なので，カールは日本語の習得に関心を持っている。"
    notes: "〈基本〉〈頻出〉阪南大。be interested in〜「〜に興味がある」。have[take] interest in〜も。"
  - id: "scr-235-p11"
    section_id: "Scr_235"
    drill: 1
    number: 1165
    role: "exam"
    english: "Korean food is noted for its spicy flavor."
    japanese: "韓国料理は香辛料のきいた味で有名である。"
    notes: "南山大。be noted for〜「〜で有名」(=be famous for)。"
  - id: "scr-235-e01"
    section_id: "Scr_235"
    drill: 0
    number: 1157
    role: "example"
    english: "His personality is opposite to mine."
    japanese: "彼の性格は私とは正反対である。"
    notes: "比較。be opposite to〜「〜とは正反対である」。opposedとoppositeの区別。"
  - id: "scr-235-e02"
    section_id: "Scr_235"
    drill: 0
    number: 1159
    role: "example"
    english: "He is keen on going overseas."
    japanese: "彼は海外へ出かけることを熱望している。"
    notes: "プラスα。be keen on〜の「〜を熱望している」の用法。"

