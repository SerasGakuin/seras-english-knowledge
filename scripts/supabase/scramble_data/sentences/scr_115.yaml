sentences:
  - id: "scr-115-p01"
    section_id: "Scr_115"
    drill: 1
    number: 443
    role: "exam"
    english: "Let's take an express train so that we can get there 20 minutes earlier."
    japanese: "そこへ20分早く着けるように急行電車に乗ろう。"
    notes: "難易度: 頻出。出典: センター。so that S can [will / may] do「〜するために」。can/willは口語調、mayは改まった表現。in order thatは硬い表現でthat省略不可"
  - id: "scr-115-p02"
    section_id: "Scr_115"
    drill: 1
    number: 444
    role: "exam"
    english: "He worked hard for fear he should fail again."
    japanese: "また失敗するといけないから、彼は一生懸命勉強した。"
    notes: "出典: 立命館大。for fear (that) S should [may / might] do「〜しないように」。発展: lest S (should)+原形も同意（文語調）"
  - id: "scr-115-p03"
    section_id: "Scr_115"
    drill: 1
    number: 445
    role: "exam"
    english: "Take your umbrella with you in case it rains."
    japanese: "雨が降るといけないから、傘を持っていきなさい。"
    notes: "難易度: 頻出。出典: 摂南大。in case S (should) do「〜するといけないから/〜の場合に備えて」。節内にshouldを用いることもある"
  - id: "scr-115-e01"
    section_id: "Scr_115"
    drill: 0
    number: 0
    role: "example"
    english: "Let's leave early so we can catch the train."
    japanese: "電車に間に合うように早めに出発しよう。"
    notes: "問443発展例文。口語ではthatが省略されso S can doの形になる"
  - id: "scr-115-e02"
    section_id: "Scr_115"
    drill: 0
    number: 0
    role: "example"
    english: "Please let me know in case he comes."
    japanese: "彼が来たら知らせてください。"
    notes: "問445発展例文。in caseの「もし[万一]〜ならば」(= if)の意味"

