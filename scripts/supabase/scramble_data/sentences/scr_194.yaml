sentences:
  - id: "scr-194-p01"
    section_id: "Scr_194"
    drill: 1
    number: 800
    role: "exam"
    english: "The employees at the company cannot start a new project without the president's approval."
    japanese: "その会社の従業員は社長の承認なしには新しいプロジェクトを始めることができない。"
    notes: "〈発展〉清泉女子大。approval=consent「承認/賛成」。"
  - id: "scr-194-p02"
    section_id: "Scr_194"
    drill: 1
    number: 801
    role: "exam"
    english: "The situation in that part of the world is a real menace to world peace."
    japanese: "その地域の情勢は世界平和にとって本当に脅威となっている。"
    notes: "〈発展〉上智大。menace=threat「脅威」。"
  - id: "scr-194-p03"
    section_id: "Scr_194"
    drill: 1
    number: 802
    role: "exam"
    english: "Everyone recovered from the disease within two weeks."
    japanese: "全員が2週間以内に病気から回復した。"
    notes: "〈頻出〉東海大。disease=illness「病気」(=sickness)。"
  - id: "scr-194-p04"
    section_id: "Scr_194"
    drill: 1
    number: 803
    role: "exam"
    english: "One barrier to world peace is the nuclear arms issue."
    japanese: "世界平和を妨げる1つの障害は、核兵器の問題です。"
    notes: "長崎大。barrier=obstacle「障害」(=hindrance)。the nuclear arms issue「核兵器の問題」。"
  - id: "scr-194-p05"
    section_id: "Scr_194"
    drill: 1
    number: 804
    role: "exam"
    english: "One characteristic of tropical rainforests is their high biodiversity."
    japanese: "熱帯雨林の特徴の1つは、その高い生物多様性である。"
    notes: "characteristic=feature「特徴」(=trait)。"
  - id: "scr-194-p06"
    section_id: "Scr_194"
    drill: 1
    number: 805
    role: "exam"
    english: "The election campaign has now entered a critical phase."
    japanese: "選挙運動は、今や重大な段階に入った。"
    notes: "〈発展〉中部大。phase=stage「段階/局面」。stageは「舞台」よりも「変化・発達の段階」の意味が重要(⇨PU!166)。"
  - id: "scr-194-p07"
    section_id: "Scr_194"
    drill: 1
    number: 806
    role: "exam"
    english: "After talking over the problem with various friends, she realized her perspective had changed."
    japanese: "その問題についてさまざまな友達と話し合った後、彼女は自分の見方が変わったことに気づいた。"
    notes: "〈発展〉東洋英和女学院大。perspective=viewpoint「観点/見方/展望」。"
  - id: "scr-194-p08"
    section_id: "Scr_194"
    drill: 1
    number: 807
    role: "exam"
    english: "The scarcity of good restaurants around here is disappointing."
    japanese: "この辺りに良いレストランが不足しているのは残念だ。"
    notes: "中央大。scarcity=shortage「不足」(=insufficiency)。"

