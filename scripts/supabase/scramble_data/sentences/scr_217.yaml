sentences:
  - id: "scr-217-p01"
    section_id: "Scr_217"
    drill: 1
    number: 954
    role: "exam"
    english: "In spite of my refusal, he insisted on my going there."
    japanese: "断ったのに、彼はどうしても私にそこへ行くようにと言ってきかなかった。"
    notes: "〈基本〉〈頻出〉清泉女子大。insist on[upon]〜「〜を強く主張する」。insist on A('s) doing。参照: insist that S (should) do(⇨571)。"
  - id: "scr-217-p02"
    section_id: "Scr_217"
    drill: 1
    number: 955
    role: "exam"
    english: "Mary persisted in telling the truth though I tried to stop her."
    japanese: "私はやめさせようとしたが、メアリーはあくまで本当のことを言うと言い張った。"
    notes: "大阪電通大。persist in〜「〜をあくまで主張する/〜に固執する」。"
  - id: "scr-217-p03"
    section_id: "Scr_217"
    drill: 1
    number: 956
    role: "exam"
    english: "She stuck to her view without examining the details."
    japanese: "彼女は詳細を調べもせずに自分の意見に固執した。"
    notes: "法政大。stick to〜「〜に固執する」。insistはon、persistはin、stick[cling]はto。"
  - id: "scr-217-p04"
    section_id: "Scr_217"
    drill: 1
    number: 957
    role: "exam"
    english: "He clings to some old ideas."
    japanese: "彼はいくつかの古い考えに固執している。"
    notes: "cling to〜「〜に固執する」(=stick to)。"
  - id: "scr-217-p05"
    section_id: "Scr_217"
    drill: 1
    number: 958
    role: "exam"
    english: "U.S.A. stands for the United States of America."
    japanese: "U.S.A. はアメリカ合衆国を表す。"
    notes: "〈頻出〉愛知学院大。stand for〜「〜を表す/〜を意味する」(=represent/mean)。「〜を支持する」の意味もある。"
  - id: "scr-217-p06"
    section_id: "Scr_217"
    drill: 1
    number: 959
    role: "exam"
    english: "We will stand by him to the last."
    japanese: "私たちは最後まで彼の味方をするつもりです。"
    notes: "立教大。stand by〜「〜の味方をする/〜を支持する」(=support)。"
  - id: "scr-217-p07"
    section_id: "Scr_217"
    drill: 1
    number: 960
    role: "exam"
    english: "\"Phone this number only when you want to call for help,\" he said to his grandmother."
    japanese: "「助けが欲しい時だけこの番号に電話するように」と彼は祖母に言った。"
    notes: "〈頻出〉東京理科大。call for〜「〜を必要とする/〜を要求する」(=require/demand)。"
  - id: "scr-217-p08"
    section_id: "Scr_217"
    drill: 1
    number: 961
    role: "exam"
    english: "My boss called on one of his clients but couldn't get a positive response."
    japanese: "私の上司はある顧客を訪問したが、良い反応を得られなかった。"
    notes: "亜細亜大。call on〜「（人）を訪ねる」(=visit)。場所ならcall at。call on A for[to do]「Aに〜を求める」も重要。"
  - id: "scr-217-p09"
    section_id: "Scr_217"
    drill: 1
    number: 962
    role: "exam"
    english: "The train accident resulted in many victims."
    japanese: "その列車事故で多くの犠牲者が出た。"
    notes: "〈頻出〉摂南大。result in〜「〜という結果になる」(=lead to⇨1005/bring about⇨899/give rise to⇨1059)。"
  - id: "scr-217-p10"
    section_id: "Scr_217"
    drill: 1
    number: 963
    role: "exam"
    english: "The war resulted from mistaken policies."
    japanese: "その戦争は間違った政策から起こった。"
    notes: "〈頻出〉中央大。result from〜「〜の結果として起こる」。A result from B = B result in A。"
  - id: "scr-217-p11"
    section_id: "Scr_217"
    drill: 1
    number: 964
    role: "exam"
    english: "Freedom consists in responsibility."
    japanese: "自由とは責任を持つことにある。"
    notes: "consist in〜「〜にある」(=be in/lie in)。"
  - id: "scr-217-p12"
    section_id: "Scr_217"
    drill: 1
    number: 965
    role: "exam"
    english: "A rugby team consists of fifteen players."
    japanese: "ラグビーチームは15人の選手で構成されている。"
    notes: "〈頻出〉神戸学院大。consist of〜「〜から成り立つ」(=be made up of/be composed of)。"

