sentences:
  - id: "scr-258-p01"
    section_id: "Scr_258"
    drill: 1
    number: 1347
    role: "exam"
    english: "What's the matter?"
    japanese: "どうしたの。"
    notes: "〈基本〉〈頻出〉センター。What's the matter (with you)?=What's wrong (with you)?「どうしましたか」。実際に相手の健康を心配して尋ねる表現。How are you?は単なるあいさつ。A: の行。"
  - id: "scr-258-p02"
    section_id: "Scr_258"
    drill: 1
    number: 1347
    role: "exam"
    english: "I've got a slight cold."
    japanese: "ちょっと風邪をひいているんですよ。"
    notes: "センター。I've got[I have] a slight cold.「少し風邪をひいています」。have a bad cold「ひどい風邪」。B: の行。"
  - id: "scr-258-p03"
    section_id: "Scr_258"
    drill: 1
    number: 1348
    role: "exam"
    english: "What seems to be the trouble?"
    japanese: "どうなさいましたか。"
    notes: "慶應大。What seems to be the trouble[problem]?「どうなさいましたか」。医者に診てもらうときに最初に聞かれる表現。A: の行。"
  - id: "scr-258-p04"
    section_id: "Scr_258"
    drill: 1
    number: 1348
    role: "exam"
    english: "Do you have a fever?"
    japanese: "熱はありますか。"
    notes: "慶應大。have a fever[temperature]「熱がある」。A: の行。"
  - id: "scr-258-p05"
    section_id: "Scr_258"
    drill: 1
    number: 1348
    role: "exam"
    english: "When I took my temperature this morning it was 37.5 degrees."
    japanese: "今朝，体温を測ったときは37.5度でした。"
    notes: "慶應大。take A's temperature「Aの熱を測る」(ˣtake A's feverとは言わない)。B: の行。"
  - id: "scr-258-p06"
    section_id: "Scr_258"
    drill: 1
    number: 1349
    role: "exam"
    english: "I have a headache."
    japanese: "頭が痛いんです。"
    notes: "〈頻出〉清泉女子大・亜細亜大。haveを用いる点に注意。I have a toothache.「歯が痛い」/ I have a stomachache.「おなかが痛い」。A: の行。応答: That's too bad.「それはお気の毒に/それは残念だ」。"
  - id: "scr-258-p07"
    section_id: "Scr_258"
    drill: 1
    number: 1350
    role: "exam"
    english: "I think I've caught a cold. So, I'm afraid I won't be able to come to the party tomorrow."
    japanese: "風邪をひいたみたい。だから，残念ながら明日のパーティーには行けないと思う。"
    notes: "駒澤大。catch (a) cold「風邪をひく」(しばしば無冠詞だが形容詞を伴う場合はaが必要: catch a bad cold)。〈比較〉have a cold「風邪をひいている」(状態)。I'm afraid〜「(残念ながら)〜ではないかと思う」。A: の行。"
  - id: "scr-258-p08"
    section_id: "Scr_258"
    drill: 1
    number: 1350
    role: "exam"
    english: "What a shame! Maybe next time, then."
    japanese: "それは残念だ！じゃまた今度ね。"
    notes: "駒澤大。What a shame[pity]!「それは残念だ」。shame「残念なこと/遺憾なこと」(⇨761,1350)。Maybe next time.「また今度ね/また次の機会にね」。B: の行。"
  - id: "scr-258-e01"
    section_id: "Scr_258"
    drill: 0
    number: 1348
    role: "example"
    english: "I think I'm coming down with the flu."
    japanese: "インフルエンザにかかっているんだと思います。"
    notes: "慶應大。come down with〜「(風邪など一時的な病気)にかかる」。"

