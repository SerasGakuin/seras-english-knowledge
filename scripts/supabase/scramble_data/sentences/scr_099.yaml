sentences:
  - id: "scr-099-p01"
    section_id: "Scr_099"
    drill: 1
    number: 377
    role: "exam"
    english: "I am afraid my time to read is limited. I should read such books as will be instructive."
    japanese: "残念ながら、私の読書時間は限られている。ためになる本を読まなければならない。"
    notes: "出典: 青山学院大。整序問題。such ... as ～「～するような…」。asは関係代名詞（主格）"
  - id: "scr-099-p02"
    section_id: "Scr_099"
    drill: 1
    number: 378
    role: "exam"
    english: "As is often the case with John, he was absent."
    japanese: "ジョンにはよくあることだが、彼は欠席した。"
    notes: "難易度: 頻出。出典: 亜細亜大。as is often the case (with ～)「(～には)よくあることだが」。as節は主節の前後・挿入いずれも可能（which節は主節の後のみ）"
  - id: "scr-099-p03"
    section_id: "Scr_099"
    drill: 1
    number: 379
    role: "exam"
    english: "There is no one but has weaknesses."
    japanese: "欠点のない人はいない。"
    notes: "出典: 関西学院大。関係代名詞としてのbut (= that ～ not)《文語》。二重否定「～しないものはない」。= There is no one that [who] doesn't have weaknesses."
  - id: "scr-099-p04"
    section_id: "Scr_099"
    drill: 1
    number: 380
    role: "exam"
    english: "Even if you are ill, don't take more medicine than is necessary."
    japanese: "たとえ病気だとしても、必要以上の薬を飲まないように。"
    notes: "難易度: 発展。出典: 青山学院大。関係代名詞としてのthan。先行詞が比較級の形容詞を伴う場合に用いる。thanは主語の働き"
  - id: "scr-099-e01"
    section_id: "Scr_099"
    drill: 0
    number: 0
    role: "example"
    english: "He has the same PC as you have."
    japanese: "彼は君と同じパソコンを持っている。"
    notes: "問377解説の比較例文。the same ... as [that]「…と同じ～」。現在ではasとthatの区別なく使われる"

