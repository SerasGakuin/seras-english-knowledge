# Scr_001: Theme 1 基本3時制の用法

sentences:
  # === 問題（exam） ===
  - id: "scr-001-p01"
    section_id: "Scr_001"
    drill: 1
    number: 1
    role: "exam"
    english: "I read an English newspaper before going to work every day."
    japanese: "私は毎日、仕事に行く前に英字新聞を読んでいます。"
    notes: "難易度: 基本, 頻出; 出典: 麗澤大; 対話形式（A: What is your daily routine?）; 現在の習慣的動作→現在形"
  - id: "scr-001-p02"
    section_id: "Scr_001"
    drill: 1
    number: 2
    role: "exam"
    english: "Water boils at a temperature of 100 degrees centigrade."
    japanese: "水は摂氏100度で沸騰する。"
    notes: "難易度: 頻出; 出典: 上智大; 不変の真理→現在形"
  - id: "scr-001-p03"
    section_id: "Scr_001"
    drill: 1
    number: 3
    role: "exam"
    english: "Masato visited Canada when he was five years old."
    japanese: "5歳の時、マサトはカナダを訪れた。"
    notes: "難易度: 基本, 頻出; 出典: 新潟食料農業大; 過去のできごと→過去形; 参照: Theme 5（現在完了形は明らかに過去を示す語句と共に使えない）"
  - id: "scr-001-p04"
    section_id: "Scr_001"
    drill: 1
    number: 4
    role: "exam"
    english: "I do not know when he will come next time."
    japanese: "彼が今度いつ来るのかわからない。"
    notes: "難易度: 基本; 出典: 名城大; 未来のできごと→will"

  # === 例文（example） ===
  - id: "scr-001-e01"
    section_id: "Scr_001"
    drill: 0
    number: 1
    role: "example"
    english: "The teacher said that the Earth goes around the Sun."
    japanese: "地球は太陽の周りを回っていると教師は言った。"
    notes: "問題2プラスα: 不変の真理は時制の一致を受けない"
  - id: "scr-001-e02"
    section_id: "Scr_001"
    drill: 0
    number: 2
    role: "example"
    english: "Look at those fallen leaves. It is going to be winter soon."
    japanese: "あの落ち葉を見てごらん。もうすぐ冬になりそうだ。"
    notes: "問題4プラスα: be going to — 根拠に基づく予測"
  - id: "scr-001-e03"
    section_id: "Scr_001"
    drill: 0
    number: 3
    role: "example"
    english: "I'm very tired, so I'm going to go to bed early tonight."
    japanese: "とても疲れているので、今晩は早く寝るつもりです。"
    notes: "問題4プラスα: be going to — 意図・予定"
  - id: "scr-001-e04"
    section_id: "Scr_001"
    drill: 0
    number: 4
    role: "example"
    english: "Our school festival begins tomorrow."
    japanese: "学園祭が明日から始まる。"
    notes: "PU!2: 現在形で確定的な未来の予定を表す"
  - id: "scr-001-e05"
    section_id: "Scr_001"
    drill: 0
    number: 5
    role: "example"
    english: "He sometimes visited the museum when he was a student."
    japanese: "彼は学生のころ、時々その美術館を訪れた。"
    notes: "PU!2: 過去の習慣的動作"
  - id: "scr-001-e06"
    section_id: "Scr_001"
    drill: 0
    number: 6
    role: "example"
    english: "I will do it, even if it's difficult."
    japanese: "たとえ難しくても私はそれをするつもりだ。"
    notes: "PU!2: 意志未来"

