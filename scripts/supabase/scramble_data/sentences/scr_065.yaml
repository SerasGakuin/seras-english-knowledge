sentences:
  - id: "scr-065-p01"
    section_id: "Scr_065"
    drill: 1
    number: 235
    role: "exam"
    english: "Roy is taller than any other student in his class."
    japanese: "ロイはクラスの中で一番背が高い。"
    notes: "難易度: 基本、頻出。A is + 比較級 + than any other + 単数名詞。主語が複数なら any other + 複数名詞"
  - id: "scr-065-p02"
    section_id: "Scr_065"
    drill: 1
    number: 236
    role: "exam"
    english: "No other language is spoken by so many people as English is."
    japanese: "英語は、世界で最も多くの人によって話されています。"
    notes: "出典: 獨協医大。整序問題。No (other) + 単数名詞 + is so [as] + 原級 + as A"
  - id: "scr-065-p03"
    section_id: "Scr_065"
    drill: 1
    number: 237
    role: "exam"
    english: "No other mountain in Japan is higher than Mt. Fuji."
    japanese: "日本には富士山より高い山はない。"
    notes: "出典: 京都産業大。No (other) + 単数名詞 + is + 比較級 + than A"
  - id: "scr-065-p04"
    section_id: "Scr_065"
    drill: 1
    number: 238
    role: "exam"
    english: "Nothing is so precious as time."
    japanese: "時間ほど貴重なものはない。"
    notes: "同意文選択。Nothing is so [as] + 原級 + as A = A is the most + 原級 + of all things"
  - id: "scr-065-p05"
    section_id: "Scr_065"
    drill: 1
    number: 239
    role: "exam"
    english: "Nothing is more beautiful than the sunrise seen from the top of Mt. Fuji on a fine day."
    japanese: "晴れた日に富士山頂で見る日の出ほど美しいものはない。"
    notes: "難易度: 頻出。出典: 関西学院大。整序問題（the mostが不要）。Nothing is + 比較級 + than A。seen = 過去分詞の後置修飾（⇨ 問137）"

