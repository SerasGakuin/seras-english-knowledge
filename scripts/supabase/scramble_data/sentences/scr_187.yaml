sentences:
- id: scr-187-p01
  section_id: Scr_187
  drill: 1
  number: 750
  role: exam
  english: (a) The current interest on a loan is 3.5 percent. (b) He showed a strong interest in music from an early age.
  japanese: (a) ローンの現在の利子は3.5パーセントである。 (b) 彼は幼いころから音楽に強い興味を示した。
  notes: 立教大。共通語句問題。interest「利子/〔通常〜s〕利益；興味/関心」。show a strong interest in〜「〜に強い興味を示す」。
- id: scr-187-p02
  section_id: Scr_187
  drill: 1
  number: 751
  role: exam
  english: I'm tired of talking about money. Let's change the subject.
  japanese: 私はお金の話に飽きた。話題を変えよう。
  notes: 札幌大。subject「話題（= topic）/主題；学科/科目」。be tired of〜「〜に飽きている/〜にうんざりしている」（⇨ 1147）。
- id: scr-187-p03
  section_id: Scr_187
  drill: 1
  number: 752
  role: exam
  english: If money were not an issue, where would you like to live?
  japanese: もしお金が問題でなければ、どういうところに住んでみたい？
  notes: 〈頻出〉中央大。穴埋め（i-）。issue「（緊急の）問題（点）/論争点；発行」。仮定法過去。would like to do「〜したい」（⇨ 80）。
- id: scr-187-p04
  section_id: Scr_187
  drill: 1
  number: 753
  role: exam
  english: There is plenty of room for improvement in your English writing.
  japanese: あなたの英作文には改善の余地が大いにあります。
  notes: 〈頻出〉立教大。room「場所/空間/余地」（= space）。「場所/余地」の意味では不可算名詞。
- id: scr-187-e01
  section_id: Scr_187
  drill: 0
  number: 1
  role: example
  english: Can you make room for my luggage in the trunk?
  japanese: トランクに私の荷物を置くスペースを空けてくれますか。
  notes: 問753プラスα。make room for〜「〜のために場所を空ける」。頻出表現。
- id: scr-187-p05
  section_id: Scr_187
  drill: 1
  number: 754
  role: exam
  english: I'm sorry but I'm a stranger here.
  japanese: すみません。この辺は初めてなんです。
  notes: '名城大。対話問題（A: Can you tell me where the station is?）。stranger「（場所に）不案内な人；見知らぬ人」。I''m a stranger (around) here.「この辺りは初めてです」（⇨ 1344(B)）。a perfect [complete/total] stranger「赤の他人」。'
- id: scr-187-p06
  section_id: Scr_187
  drill: 1
  number: 755
  role: exam
  english: In many respects the new version is less good than the old one.
  japanese: 多くの点で新版は旧版ほどよくない。
  notes: 中部大。下線部問題（respects）。respect「（注意・配慮すべき）点」。in this [every] respect「この[あらゆる]点で」（⇨ 1271）。
- id: scr-187-p07
  section_id: Scr_187
  drill: 1
  number: 756
  role: exam
  english: She has a good command of English.
  japanese: 彼女は英語を自由に操る。
  notes: '〈発展〉近畿大。書き換え問題（原文: Her ability to use English is marvelous.）。command「（特に語学などの）運用力/自由に使いこなす能力」。have a good command of English「英語が達者である」。'
- id: scr-187-e02
  section_id: Scr_187
  drill: 0
  number: 2
  role: example
  english: Teaching children is a real challenge.
  japanese: 子どもたちを教えるのは本当にやりがいがあることだ。
  notes: PU!166「その他の意外な意味を持つ名詞①」。challenge「やりがい（のある仕事）/（能力が試される）課題/問題」。PU!166にはgame「獲物/策略」、well「井戸」、gift「才能」、bill「法案/紙幣」、stage「段階/局面」（⇨ 805）も収録。
