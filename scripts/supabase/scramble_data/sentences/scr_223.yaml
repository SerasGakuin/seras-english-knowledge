sentences:
  - id: "scr-223-p01"
    section_id: "Scr_223"
    drill: 1
    number: 1025
    role: "exam"
    english: "How did you come up with such a nice idea?"
    japanese: "どうやってそんな良いアイデアを思いついたのですか。"
    notes: "〈超頻〉東北学院大。come up with〜「（考え・答えなど）を思いつく」(=think of/hit on)。「（思いついた考えなど）を出す/提案する」(=propose)の意味も。"
  - id: "scr-223-p02"
    section_id: "Scr_223"
    drill: 1
    number: 1026
    role: "exam"
    english: "You will soon catch up with her if you hurry."
    japanese: "急げばすぐに彼女に追いつくでしょう。"
    notes: "〈頻出〉関西大。catch up with〜「〜に追いつく」(=overtake)。"
  - id: "scr-223-p03"
    section_id: "Scr_223"
    drill: 1
    number: 1027
    role: "exam"
    english: "Many people read newspapers to keep up with the times."
    japanese: "多くの人たちは、時勢に遅れないように新聞を読む。"
    notes: "〈基本〉〈頻出〉金沢工大。keep up with〜「〜に遅れずについていく」。"
  - id: "scr-223-p04"
    section_id: "Scr_223"
    drill: 1
    number: 1028
    role: "exam"
    english: "He was not sure whether or not he could get through his work by next Monday."
    japanese: "彼は来週の月曜までに仕事を終えられるのか、わからなかった。"
    notes: "駒澤大。get through (with)〜「（仕事など）をやり終える」(=finish)。"
  - id: "scr-223-p05"
    section_id: "Scr_223"
    drill: 1
    number: 1029
    role: "exam"
    english: "Mary dropped in at Jim's house."
    japanese: "メアリーはジムの家に立ち寄った。"
    notes: "東海大。drop in[by] at[on]〜「〜をひょっこり訪れる/〜に立ち寄る」(=stop by at)。atの後は「場所」、onの後は「人」（⇨961）。"
  - id: "scr-223-p06"
    section_id: "Scr_223"
    drill: 1
    number: 1030
    role: "exam"
    english: "Mark is a really nice guy. He gets along well with others."
    japanese: "マークは本当にいいやつです。他の人たちと仲良くやっている。"
    notes: "〈超頻〉南山大。get along with〜「〜とうまく［仲良く］やっていく」(=get on with)。"
  - id: "scr-223-p07"
    section_id: "Scr_223"
    drill: 1
    number: 1031
    role: "exam"
    english: "Sometimes it is very easy to give in to temptation and spend too much money."
    japanese: "いとも簡単に誘惑に負けてお金を使いすぎてしまうことが時にある。"
    notes: "関西外語大。give in to〜「〜に屈する/〜に負ける」(=yield to⇨982/submit to/give way to⇨1061)。"
  - id: "scr-223-p08"
    section_id: "Scr_223"
    drill: 1
    number: 1032
    role: "exam"
    english: "The touching episode came home to me."
    japanese: "その感動的なエピソードはしみじみ私の胸にこたえた。"
    notes: "〈発展〉東京外語大。come home to〜「〜にしみじみこたえる/〜に痛切に感じられる」。homeは「ぐさりと/痛切に」の意味の副詞。bring A home to B「AをBに痛切に感じさせる」も重要。"
  - id: "scr-223-p09"
    section_id: "Scr_223"
    drill: 1
    number: 1033
    role: "exam"
    english: "Whenever he drives, we end up taking the wrong way."
    japanese: "彼が運転するといつも、最後には道を間違える。"
    notes: "〈頻出〉〈発展〉中央大。end up (by) doing「最後には〜することになる」。end upの後にはin/as/withなども続く。語句: take the wrong way「道を間違える」。upは「すっかり」の意味で動詞endを強めている（⇨PU!191）。"
  - id: "scr-223-p10"
    section_id: "Scr_223"
    drill: 1
    number: 1034
    role: "exam"
    english: "We might run out of ink before we finish all this printing."
    japanese: "印刷全部が終わらないうちにインクがなくなるかもしれませんね。"
    notes: "〈頻出〉九州産業大。run out of〜「〜を使い果たす/〜を切らす」。run short of〜（⇨1121）も類似。"
  - id: "scr-223-e01"
    section_id: "Scr_223"
    drill: 0
    number: 1025
    role: "example"
    english: "We have to come up with a convincing alternative to the meeting tomorrow."
    japanese: "説得力のある代案を明日の会議に提出しなければならない。"
    notes: "解説例文。come up with〜の「〜を提案する」(=propose)用法。"
  - id: "scr-223-e02"
    section_id: "Scr_223"
    drill: 0
    number: 1028
    role: "example"
    english: "I finally got through with my homework."
    japanese: "私は宿題をやっと終えた。"
    notes: "プラスα。get through with〜の形。"
  - id: "scr-223-e03"
    section_id: "Scr_223"
    drill: 0
    number: 1032
    role: "example"
    english: "His failure brought home to him the importance of hard work."
    japanese: "その失敗は、彼に努力の大切さを痛感させた。"
    notes: "プラスα。bring A home to B「AをBに痛切に感じさせる」。Aが長い場合はBの後に来ることが多い。"

