sentences:
  - id: "scr-259-p01"
    section_id: "Scr_259"
    drill: 1
    number: 1351
    role: "exam"
    english: "Would you like another cup of tea?"
    japanese: "紅茶をもう一杯いかがですか。"
    notes: "〈基本〉立命館大。Would you like〜?「〜はいかがですか」(⇨1328)。A: の行。"
  - id: "scr-259-p02"
    section_id: "Scr_259"
    drill: 1
    number: 1351
    role: "exam"
    english: "No, thank you. I've had enough."
    japanese: "いいえ，結構です。十分いただきました。"
    notes: "立命館大。No, thank you[No, thanks].「いいえ，結構です」。I've had enough.「十分いただきました」(enoughの後にof teaが省略)。B: の行。"
  - id: "scr-259-p03"
    section_id: "Scr_259"
    drill: 1
    number: 1352
    role: "exam"
    english: "Would you like some more salad?"
    japanese: "サラダをもっといかがですか。"
    notes: "〈頻出〉立命館大。Would you like〜?「〜はいかがですか」。Do you want〜?の丁寧表現。A: の行。"
  - id: "scr-259-p04"
    section_id: "Scr_259"
    drill: 1
    number: 1352
    role: "exam"
    english: "I'll help myself."
    japanese: "自分で取ります。"
    notes: "立命館大。help oneself (to)〜「(〜を)自由に取って食べる[飲む]」(⇨337)。B: の行。"
  - id: "scr-259-p05"
    section_id: "Scr_259"
    drill: 1
    number: 1353
    role: "exam"
    english: "Would you pass me the salt?"
    japanese: "すみませんが，塩を取ってください。"
    notes: "〈頻出〉立命館大。Would[Will] you pass (me) the A?「Aを取ってもらえますか」。A: の行。"
  - id: "scr-259-p06"
    section_id: "Scr_259"
    drill: 1
    number: 1353
    role: "exam"
    english: "Here you are."
    japanese: "はい，どうぞ。"
    notes: "立命館大。Here you are.「はい，どうぞ」。相手に物を手渡すときの表現。手渡す相手に重点→Here you are.、物に重点→Here it is.。B: の行。"
  - id: "scr-259-p07"
    section_id: "Scr_259"
    drill: 1
    number: 1354
    role: "exam"
    english: "How do you like your coffee?"
    japanese: "コーヒーはどのようなのがお好きですか。"
    notes: "北海学園大。How do you like A?「どのようなAをお好みですか/Aはどのようにいたしましょうか」。ステーキの焼き加減etc: How do you like your steak? — I like it medium.。A: の行。"
  - id: "scr-259-p08"
    section_id: "Scr_259"
    drill: 1
    number: 1354
    role: "exam"
    english: "I like it strong."
    japanese: "私はコーヒーは濃いのが好きです。"
    notes: "北海学園大。I like my coffee strong. 薄いコーヒーが好きな場合はweakを用いる(⇨768)。B: の行。"
  - id: "scr-259-p09"
    section_id: "Scr_259"
    drill: 1
    number: 1355
    role: "exam"
    english: "Are you ready to order?"
    japanese: "ご注文はお決まりですか。"
    notes: "〈発展〉成蹊大・青山学院大。Are you ready to order?=May I take[have] your order, please?「ご注文はお決まりですか」。A: の行。"
  - id: "scr-259-p10"
    section_id: "Scr_259"
    drill: 1
    number: 1355
    role: "exam"
    english: "I'd like a cup of coffee, please."
    japanese: "ええ，コーヒーを一杯お願いします。"
    notes: "成蹊大・青山学院大。I'd like〜=I would like〜「〜をいただきたい(のですが)」。wouldのほうがwantより丁寧。B: の行。応答: Same here, please.=Same for me, please.「私にも同じものをください」。"
  - id: "scr-259-p11"
    section_id: "Scr_259"
    drill: 1
    number: 1356
    role: "exam"
    english: "How much is the bill?"
    japanese: "いくらですか。"
    notes: "立教大。How much is the bill?「(勘定は)いくらですか」。Bill, please.「お勘定をお願いします」。Let's[We'll] split the bill.=Shall we split the bill?「割り勘にしましょう」。A: の行。"
  - id: "scr-259-p12"
    section_id: "Scr_259"
    drill: 1
    number: 1356
    role: "exam"
    english: "It's on me today."
    japanese: "今日は私がおごります。"
    notes: "立教大。It's on me.「私がおごります」。=This is my treat.=I'll treat you.(こちらのほうが丁寧)。B: の行。"
  - id: "scr-259-e01"
    section_id: "Scr_259"
    drill: 0
    number: 1351
    role: "example"
    english: "I have had enough of his excuses."
    japanese: "彼の言い訳にはもううんざりだ。"
    notes: "have had enough of〜「〜はもううんざりだ」。I've had enough.「十分いただきました」とは異なる意味。"

