sentences:
  - id: "scr-105-p01"
    section_id: "Scr_105"
    drill: 1
    number: 403
    role: "exam"
    english: "That there was a problem in the original plan is self-evident."
    japanese: "元の計画に問題があったことは自明だ。"
    notes: "出典: 青山学院大。主語になる名詞節を導くthat。That節(S)+is(V)+self-evident(C)。whatは後ろが完全文なので不可"
  - id: "scr-105-p02"
    section_id: "Scr_105"
    drill: 1
    number: 404
    role: "exam"
    english: "The trouble is that we are short of money."
    japanese: "困ったことに私たちはお金が不足しているのです。"
    notes: "出典: 立命館大。補語になる名詞節を導くthat。the trouble is that 〜「困ったことに〜」— 主語を副詞的に訳す"
  - id: "scr-105-p03"
    section_id: "Scr_105"
    drill: 1
    number: 405
    role: "exam"
    english: "I have overlooked the fact that the machine was out of order."
    japanese: "私は、その機械が壊れていたという事実を見逃していた。"
    notes: "難易度: 頻出。出典: 愛知工大。整序問題。同格の名詞節を導くthat。that節がthe factの具体的内容を説明"
  - id: "scr-105-p04"
    section_id: "Scr_105"
    drill: 1
    number: 406
    role: "exam"
    english: "Last winter was rather unusual in that very little snow fell in northern Japan."
    japanese: "北日本ではほとんど雪が降らなかったという点で、昨年の冬はかなり異常だった。"
    notes: "難易度: 頻出、発展。出典: センター。in that 〜「〜という点で/〜だから」。that節が前置詞の目的語になる例外的用法"
  - id: "scr-105-e01"
    section_id: "Scr_105"
    drill: 0
    number: 0
    role: "example"
    english: "The plan is good, except that it's too expensive."
    japanese: "お金がかかりすぎることを除いて、その計画は良い。"
    notes: "問406解説例文。except that 〜「〜ということを除いて」。in thatと並ぶ、that節が前置詞目的語になる例外"

