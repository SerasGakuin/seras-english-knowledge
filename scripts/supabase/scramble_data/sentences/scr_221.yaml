sentences:
  - id: "scr-221-p01"
    section_id: "Scr_221"
    drill: 1
    number: 1001
    role: "exam"
    english: "It never occurred to me that the plan would work well."
    japanese: "その計画がうまく行くとはまったく思ってもみないことだった。"
    notes: "〈頻出〉獨協医大。occur to〜「（考えなどが）ふと〜の心に浮かぶ」(=strike⇨744)。It occurs to A that節。〈比較〉hit on[upon]〜「〜を思いつく」（人が主語）。"
  - id: "scr-221-p02"
    section_id: "Scr_221"
    drill: 1
    number: 1002
    role: "exam"
    english: "We cannot do without this book."
    japanese: "この本なしではやっていけない。"
    notes: "〈頻出〉東京国際大。do without〜「〜なしですます」(=go without)。dispense with〜も同意。"
  - id: "scr-221-p03"
    section_id: "Scr_221"
    drill: 1
    number: 1003
    role: "exam"
    english: "I will have to dispense with a car."
    japanese: "私は車なしですまさなければならないだろう。"
    notes: "名古屋外語大。dispense with〜「〜なしですます」(=do without/go without)。dispenseではwithを用いることに注意。"
  - id: "scr-221-p04"
    section_id: "Scr_221"
    drill: 1
    number: 1004
    role: "exam"
    english: "Because I have to pay off a debt, I have ended up parting with my house."
    japanese: "私は、借金を返済しなければならなくなり、この家を手放すはめになった。"
    notes: "成蹊大。part with〜「〜を手放す」。part from〜「（人）と別れる」と区別。語句: end up doing「最後には〜することになる」（⇨1033）。"
  - id: "scr-221-p05"
    section_id: "Scr_221"
    drill: 1
    number: 1005
    role: "exam"
    english: "Good questions often lead to good discussions."
    japanese: "良い疑問は良い議論につながることが多い。"
    notes: "〈頻出〉大阪経済大。lead to〜「〜につながる/〜を引き起こす」(=cause/bring about⇨899/give rise to⇨1059/result in⇨962)。"
  - id: "scr-221-p06"
    section_id: "Scr_221"
    drill: 1
    number: 1006
    role: "exam"
    english: "If you keep smoking so much, you may die of cancer."
    japanese: "そんなにたばこを吸い続けたら、がんで死ぬかもしれないよ。"
    notes: "〈基本〉芝浦工大。die of[from]〜「〜が原因で死ぬ」。ofは内的要因、fromは外的要因とされるが現在は区別が明確ではない。"
  - id: "scr-221-p07"
    section_id: "Scr_221"
    drill: 1
    number: 1007
    role: "exam"
    english: "You must send for the doctor."
    japanese: "医者を呼びにやりなさい。"
    notes: "名古屋工大。send for〜「〜を呼びに行かせる/〜に来るように頼む」。send A for Bの省略形。〈比較〉go for〜「〜を呼びに行く/迎えに行く」。"
  - id: "scr-221-p08"
    section_id: "Scr_221"
    drill: 1
    number: 1008
    role: "exam"
    english: "Thanks to your great directions, I got to Osaka very quickly."
    japanese: "あなたのすばらしい指示のおかげで、私は大阪にとても早く着いた。"
    notes: "青山学院大。get to〜「〜に到着する」(=arrive at/reach)。"
  - id: "scr-221-p09"
    section_id: "Scr_221"
    drill: 1
    number: 1009
    role: "exam"
    english: "Please refer to the dictionary to find the meaning of a word you don't know."
    japanese: "知らない単語の意味を見つけるために辞書を参照してください。"
    notes: "〈頻出〉南山大。refer to〜「〜を参照する」(=consult)。「〜に言及する」の意味も。refer to A as B「AをBと呼ぶ」（⇨518）。"
  - id: "scr-221-p10"
    section_id: "Scr_221"
    drill: 1
    number: 1010
    role: "exam"
    english: "You must never resort to violence."
    japanese: "決して暴力に訴えてはいけない。"
    notes: "関西学院大。resort to〜「（手段など）に訴える/〜に頼る」。"
  - id: "scr-221-p11"
    section_id: "Scr_221"
    drill: 1
    number: 1011
    role: "exam"
    english: "We set about our new project very carefully."
    japanese: "私たちは新しいプロジェクトにとても慎重に取りかかった。"
    notes: "中央大。set about〜「〜に取りかかる/〜を始める」(=go about)。set about doing「〜し始める」(=set out to do)。"
  - id: "scr-221-p12"
    section_id: "Scr_221"
    drill: 1
    number: 1012
    role: "exam"
    english: "Nancy has been suffering from a bad cold for a few days."
    japanese: "ナンシーはひどい風邪でこの数日苦しんでいる。"
    notes: "〈頻出〉高知大。suffer from〜「（病気など）で苦しむ/（病気）にかかる」。fromは「原因」を表す。"

