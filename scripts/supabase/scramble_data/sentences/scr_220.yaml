sentences:
  - id: "scr-220-p01"
    section_id: "Scr_220"
    drill: 1
    number: 989
    role: "exam"
    english: "Christmas Day falls on a Friday this year."
    japanese: "今年のクリスマスは、金曜日にあたる。"
    notes: "西南学院大。fall on〜「（記念日などが）〜にあたる」。"
  - id: "scr-220-p02"
    section_id: "Scr_220"
    drill: 1
    number: 990
    role: "exam"
    english: "I don't approve of the habit of turning wild animals into pets."
    japanese: "野生の動物をペットにする習慣はよくないと思う。"
    notes: "法政大。approve of〜「〜に賛成する/〜をよいと思う」(⇔disapprove of〜)。"
  - id: "scr-220-p03"
    section_id: "Scr_220"
    drill: 1
    number: 991
    role: "exam"
    english: "The researchers went through many difficulties before they found success."
    japanese: "研究者たちは成功する前に多くの困難を経験しました。"
    notes: "〈基本〉〈頻出〉東京理科大。go through〜「〜を経験する」(=experience/undergo)。go through[over]〜「〜をよく見る［調べる］」も重要（⇨PU!190）。"
  - id: "scr-220-p04"
    section_id: "Scr_220"
    drill: 1
    number: 992
    role: "exam"
    english: "The boy still believes in Santa Claus."
    japanese: "その男の子はサンタクロースがいると今でも思っている。"
    notes: "金沢工大。believe in〜「〜の存在を信じる/〜の価値を信じる」。cf. believe〜「〜の言うことを信じる」。"
  - id: "scr-220-p05"
    section_id: "Scr_220"
    drill: 1
    number: 993
    role: "exam"
    english: "She made for the sound in the darkness."
    japanese: "彼女は暗闇の中、音のする方へ向かった。"
    notes: "〈発展〉make for〜「〜のほうへ進んで行く/向かう」(=go toward/head for)。「〜に寄与する/〜に役立つ」(=contribute to)の意味もある。"
  - id: "scr-220-p06"
    section_id: "Scr_220"
    drill: 1
    number: 994
    role: "exam"
    english: "I haven't heard from him for a year."
    japanese: "1年間彼から便りがありません。"
    notes: "〈基本〉中央大。hear from〜「〜から便りがある/連絡がある」(⇔write to〜)。"
  - id: "scr-220-p07"
    section_id: "Scr_220"
    drill: 1
    number: 995
    role: "exam"
    english: "I have never heard of him since then."
    japanese: "私はそれ以来、彼のうわさを耳にしていない。"
    notes: "〈基本〉大阪経済大。hear of〜「〜のうわさを耳にする」。"
  - id: "scr-220-p08"
    section_id: "Scr_220"
    drill: 1
    number: 996
    role: "exam"
    english: "She succeeded in getting what she wanted."
    japanese: "彼女は欲しいものを手に入れることができた。"
    notes: "〈基本〉〈頻出〉藤女子大。succeed in〜「〜に成功する」(⇔fail in〜)。succeed in doing = manage to do（⇨501）。"
  - id: "scr-220-p09"
    section_id: "Scr_220"
    drill: 1
    number: 997
    role: "exam"
    english: "He has no children to succeed to the family business."
    japanese: "彼には家業を継いでくれる子供が一人もいない。"
    notes: "高知大。succeed to〜「〜を相続する/〜のあとを継ぐ」(=inherit)。take over〜（⇨916）と言い換え可能。"
  - id: "scr-220-p10"
    section_id: "Scr_220"
    drill: 1
    number: 998
    role: "exam"
    english: "Please refrain from using your cell phone here."
    japanese: "ここでの携帯電話の使用はご遠慮ください。"
    notes: "福島大。refrain from〜「〜を慎む/〜を差し控える」(=keep from)。refrain from doing。"
  - id: "scr-220-p11"
    section_id: "Scr_220"
    drill: 1
    number: 999
    role: "exam"
    english: "Robbers broke into the house last night."
    japanese: "昨晩、家に泥棒が押し入った。"
    notes: "中央大。break into〜「〜に押し入る」。「急に〜し始める」(=burst into)の意味もある。"
  - id: "scr-220-p12"
    section_id: "Scr_220"
    drill: 1
    number: 1000
    role: "exam"
    english: "It took me a while to adapt to the new culture."
    japanese: "新しい文化に適応するのに、しばらく時間がかかった。"
    notes: "〈頻出〉adapt to〜「（環境など）に順応する」(=adjust to)。adapt A to B「AをBに順応させる」。〈比較〉adoptは「〜を採用する」。"

