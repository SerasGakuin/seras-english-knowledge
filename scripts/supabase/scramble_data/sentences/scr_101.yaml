sentences:
  - id: "scr-101-p01"
    section_id: "Scr_101"
    drill: 1
    number: 386
    role: "exam"
    english: "Joan wears a hat whenever it is cold outside."
    japanese: "外が寒い時はいつも、ジョーンは帽子をかぶる。"
    notes: "出典: 南山大。whenever「～する時はいつでも」(= at any time when)。後ろは完全な文 → 複合関係副詞"
  - id: "scr-101-p02"
    section_id: "Scr_101"
    drill: 1
    number: 387
    role: "exam"
    english: "Wherever he may go, he will be successful."
    japanese: "彼はどこへ行っても成功する。"
    notes: "出典: 近畿大。整序問題（2語不要: no, matter）。wherever「どこへ～しても」(= no matter where)。副詞節（譲歩）"
  - id: "scr-101-p03"
    section_id: "Scr_101"
    drill: 1
    number: 388
    role: "exam"
    english: "However fast I walked, I couldn't catch up with him."
    japanese: "どんなに速く歩いても、彼には追いつけなかった。"
    notes: "難易度: 頻出。出典: 京都産業大。however + 形容詞[副詞]「どんなに～でも」(= no matter how)。語順: however + 副詞 + SV（×However I walked fast）。参照: catch up with ～「～に追いつく」（→ 1026）"
  - id: "scr-101-p04"
    section_id: "Scr_101"
    drill: 1
    number: 389
    role: "exam"
    english: "Don't open the door to any stranger no matter how harmless he seems."
    japanese: "どんなにおとなしそうに見えても、知らない人にはドアをあけないこと。"
    notes: "出典: 名城大。整序問題。no matter how + 形容詞[副詞]「どんなに～でも」(= however)。語順注意: ×no matter how he seems harmless"
  - id: "scr-101-e01"
    section_id: "Scr_101"
    drill: 0
    number: 0
    role: "example"
    english: "Thanks to modern transportation, you can travel wherever you want, whenever you want."
    japanese: "現代の交通手段のおかげで、好きな時に好きな場所へ旅行できる。"
    notes: "PU!74例文。wherever「～するところはどこでも」+ whenever「～する時はいつでも」（時・場所の副詞節）"
  - id: "scr-101-e02"
    section_id: "Scr_101"
    drill: 0
    number: 0
    role: "example"
    english: "You will find him home whenever you may visit."
    japanese: "いつ訪問しても彼は家にいますよ。"
    notes: "PU!74例文。whenever「いつ～しても」（「譲歩」の副詞節 = no matter when）"

