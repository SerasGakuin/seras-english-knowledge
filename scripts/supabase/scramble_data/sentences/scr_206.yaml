sentences:
  - id: "scr-206-p01"
    section_id: "Scr_206"
    drill: 1
    number: 856
    role: "exam"
    english: "I would be grateful if you could extend the deadline for the application."
    japanese: "申し込みの締め切りを延ばしていただけるとありがたいのですが。"
    notes: "麗澤大。語根tend=stretch。extend「延長する」。選択肢: intend「意図する」/pretend「ふりをする」/contend「争う/主張する」。"
  - id: "scr-206-p02"
    section_id: "Scr_206"
    drill: 1
    number: 857
    role: "exam"
    english: "His request was rejected because of some technical issues."
    japanese: "彼の要請はいくつかの技術的な問題のために拒絶された。"
    notes: "広島修道大。語根ject=throw。reject「拒絶する」。選択肢: inject「注射する」/subject「服従させる」/project「計画する」。"
  - id: "scr-206-p03"
    section_id: "Scr_206"
    drill: 1
    number: 858
    role: "exam"
    english: "George has been studying hard, so I think he deserves success in the exam."
    japanese: "ジョージは一生懸命勉強してきたので、彼は試験で成功するに値すると思う。"
    notes: "群馬大。語根serve=serve/keep。deserve「値する」。選択肢: reserve「予約する」/preserve「保存する」/observe「観察する」。"
  - id: "scr-206-p04"
    section_id: "Scr_206"
    drill: 1
    number: 859
    role: "exam"
    english: "It was very hard to describe what had happened at that moment."
    japanese: "そのとき何が起こったのか説明するのはとても難しかった。"
    notes: "〈頻出〉南山大。語根scribe=write。describe「述べる/説明する」。選択肢: prescribe「処方する」/subscribe「購読する」/inscribe「記入する」。"
  - id: "scr-206-p05"
    section_id: "Scr_206"
    drill: 1
    number: 860
    role: "exam"
    english: "Some students in the school contribute their time to community service projects."
    japanese: "その学校の学生の中には、地域奉仕活動に時間を費やす者もいる。"
    notes: "語根tribute=give/assign。contribute「貢献する/寄付する」。選択肢: attribute「せいにする」/distribute「分配する」。"

