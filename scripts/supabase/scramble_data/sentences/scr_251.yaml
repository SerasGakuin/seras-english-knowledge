sentences:
  - id: "scr-251-p01"
    section_id: "Scr_251"
    drill: 1
    number: 1307
    role: "exam"
    english: "How are things going with you?"
    japanese: "調子はどうですか。"
    notes: "センター。How are things (going) (with you)?「調子はどう？」。How's everything?/How's it going?も。How are you (doing)?よりくだけた表現。A: の行。"
  - id: "scr-251-p02"
    section_id: "Scr_251"
    drill: 1
    number: 1309
    role: "exam"
    english: "It's been a long time. How have you been?"
    japanese: "久しぶりだね。その後どうだった？"
    notes: "西南学院大。Long time no see.と同義。How have you been?は久しぶりの再会に使用。A: の行。"
  - id: "scr-251-p03"
    section_id: "Scr_251"
    drill: 1
    number: 1310
    role: "exam"
    english: "Nice to meet you."
    japanese: "はじめまして。"
    notes: "〈基本〉青山学院大。=Glad to meet you. 初対面のあいさつ。How do you do?は硬い表現。比較: Nice meeting you.は別れの表現(⇨1313)。B: の行。A: This is Mary.「こちらがメアリーです」(紹介)。"
  - id: "scr-251-p04"
    section_id: "Scr_251"
    drill: 1
    number: 1311
    role: "exam"
    english: "Where do you come from?"
    japanese: "ご出身はどちらですか。"
    notes: "〈基本〉関西学院大。=Where are you from? 出身を尋ねる決まり文句。現在時制を使う。A: の行。"
  - id: "scr-251-p05"
    section_id: "Scr_251"
    drill: 1
    number: 1312
    role: "exam"
    english: "Who do you work for?"
    japanese: "どちらにお勤めですか。"
    notes: "早大。=Where do you work? 文頭のwhoはforの目的語だが主格whoを用いることが多い(⇨180)。比較: Where does he work? — In a bank.のようにin/atで答える。A: の行。"

