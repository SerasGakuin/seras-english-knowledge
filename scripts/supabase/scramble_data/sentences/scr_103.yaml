sentences:
  - id: "scr-103-p01"
    section_id: "Scr_103"
    drill: 1
    number: 393
    role: "exam"
    english: "Study harder, and you'll be able to pass the exam."
    japanese: "もっと一生懸命勉強しなさい。そうすれば試験に合格できるでしょう。"
    notes: "難易度: 頻出。出典: 愛知学院大。命令文+and「〜しなさい、そうすれば…」= If you study harder, you'll be able to pass the exam."
  - id: "scr-103-p02"
    section_id: "Scr_103"
    drill: 1
    number: 394
    role: "exam"
    english: "Hurry up, or you will be late."
    japanese: "急ぎなさい。さもないと遅刻するよ。"
    notes: "難易度: 基本。出典: 高知大。命令文+or「〜しなさい、さもないと…」= If you don't hurry up, you will be late."
  - id: "scr-103-p03"
    section_id: "Scr_103"
    drill: 1
    number: 395
    role: "exam"
    english: "You've got to be careful or you'll miss it again."
    japanese: "注意しないとだめだよ。さもないとまたやりそこなうよ。"
    notes: "出典: 駒澤大。命令文に準ずる表現+or。have got to《口語》= have to / must"
  - id: "scr-103-p04"
    section_id: "Scr_103"
    drill: 1
    number: 396
    role: "exam"
    english: "A little more effort, and you will succeed."
    japanese: "もう少し努力しなさい。そうすれば成功しますよ。"
    notes: "出典: 清泉女子大。名詞句+and/orの変形バージョン。A little more effort = Make a little more effort"
  - id: "scr-103-e01"
    section_id: "Scr_103"
    drill: 0
    number: 0
    role: "example"
    english: "Leave at once, otherwise you'll be late."
    japanese: "すぐに出発しなさい。さもないと遅れるよ。"
    notes: "問394発展例文。orの代わりにotherwiseを用いた表現"

