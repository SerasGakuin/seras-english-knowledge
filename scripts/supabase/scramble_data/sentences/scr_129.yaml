sentences:
  - id: "scr-129-p01"
    section_id: "Scr_129"
    drill: 1
    number: 503
    role: "exam"
    english: "I remember visiting Kyoto when I was a university student."
    japanese: "私は大学生の時に京都を訪れたことを覚えている。"
    notes: "出典: 名古屋学院大。〈頻出〉4択問題。remember doing「〜したことを覚えている」（過去）。過去の内容に remember having done を用いるのはまれ。"
  - id: "scr-129-p02"
    section_id: "Scr_129"
    drill: 1
    number: 504
    role: "exam"
    english: "Please remember to wake me up at 7 o'clock tomorrow so I can get to school on time."
    japanese: "時間通りに学校に行けるよう、明日は7時に忘れずに私を起こしてください。"
    notes: "出典: 東京経済大。〈頻出〉4択問題。remember to do「〜することを覚えておく/忘れずに〜する」（未来）。Remember to do.「忘れずに〜しなさい」の形で頻出。"
  - id: "scr-129-p03"
    section_id: "Scr_129"
    drill: 1
    number: 505
    role: "exam"
    english: "I'll never forget meeting my friend Brian for the first time."
    japanese: "私は友人のブライアンに初めて会ったことを決して忘れません。"
    notes: "出典: 南山大。〈頻出〉4択問題。forget doing「〜したことを忘れる」（過去）。"
  - id: "scr-129-p04"
    section_id: "Scr_129"
    drill: 1
    number: 506
    role: "exam"
    english: "Don't forget to call me when you get to the airport."
    japanese: "空港に着いたら忘れずに私に電話しなさい。"
    notes: "出典: 佛教大。〈頻出〉4択問題。forget to do「〜することを忘れる」（未来）。Don't forget to do = Remember to do の書き換えを覚えておく。"
  - id: "scr-129-p05"
    section_id: "Scr_129"
    drill: 1
    number: 507
    role: "exam"
    english: "I regret not going to university when I was young."
    japanese: "若い時に大学へ行かなかったことを後悔している。"
    notes: "出典: 青山学院大。4択問題。regret doing「〜したことを後悔する」（過去）。regret not doing の語順。〈比較〉regret to do「残念ながら〜する」（未来）(= be sorry to do)。"
  - id: "scr-129-p06"
    section_id: "Scr_129"
    drill: 1
    number: 508
    role: "exam"
    english: "The building needs repairing."
    japanese: "その建物は修理する必要がある。"
    notes: "出典: 山梨大。4択問題。need doing「〜される必要がある」(= need to be done)。動名詞が受動的意味を持つ。本問 = The building needs to be repaired."
  - id: "scr-129-p07"
    section_id: "Scr_129"
    drill: 1
    number: 509
    role: "exam"
    english: "I'm sorry. I didn't mean to step on your foot."
    japanese: "すみません。あなたの足を踏むつもりはなかったのです。"
    notes: "出典: 中部大。4択問題。mean to do「〜するつもりである」(= intend to do)。〈比較〉mean doing「〜することを意味する」。"
  - id: "scr-129-e01"
    section_id: "Scr_129"
    drill: 0
    number: 0
    role: "example"
    english: "I regret to say that I cannot accept your offer."
    japanese: "残念ながらあなたの申し出をお受けできません。"
    notes: "問507解説〈比較〉例文。regret to do「残念ながら〜する」(= be sorry to do)（未来）の用法例。regret doing（過去）との対比。"
  - id: "scr-129-e02"
    section_id: "Scr_129"
    drill: 0
    number: 0
    role: "example"
    english: "That means running a risk."
    japanese: "そんなことをすれば危険を冒すことになる。"
    notes: "問509解説〈比較〉例文。mean doing「〜することを意味する」の用法例。mean to do「〜するつもりである」との対比。"

