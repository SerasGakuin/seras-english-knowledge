sentences:
  - id: "scr-127-p01"
    section_id: "Scr_127"
    drill: 1
    number: 488
    role: "exam"
    english: "Tom and Jerry often enjoyed playing golf together when they were in their fifties."
    japanese: "トムとジェリーは50代のころ、よく一緒にゴルフを楽しんだ。"
    notes: "出典: 群馬大。〈基本〉〈頻出〉誤り指摘問題。enjoy doing「〜するのを楽しむ」。×to play → ○playing。"
  - id: "scr-127-p02"
    section_id: "Scr_127"
    drill: 1
    number: 489
    role: "exam"
    english: "Dad, if my grades improve by the end of the term, would you mind raising my allowance?"
    japanese: "お父さん、学期末までに成績が上がったら、お小遣いを上げてくれる？"
    notes: "出典: センター。〈基本〉〈頻出〉4択問題。mind doing「〜するのを気にする/いやがる」。Would [Do] you mind doing?「〜していただけませんか」は頻出。後ろに目的語 my allowance があるので他動詞 raise の動名詞 raising（⇨ 487）。"
  - id: "scr-127-p03"
    section_id: "Scr_127"
    drill: 1
    number: 490
    role: "exam"
    english: "George postponed painting the kitchen wall till next month."
    japanese: "ジョージは台所の壁のペンキ塗りを来月まで延ばした。"
    notes: "出典: 亜細亜大。記述問題。postpone doing「〜するのを延期する」(= put off doing)。put off = postpone は頻出同意語（⇨ 922）。"
  - id: "scr-127-p04"
    section_id: "Scr_127"
    drill: 1
    number: 491
    role: "exam"
    english: "According to the survey, about 40% of college students have considered quitting school."
    japanese: "調査によれば、大学生の約40%が退学しようかと考えたことがあるそうだ。"
    notes: "出典: 昭和女子大。4択問題。consider doing「〜しようかと考える」。〈暗記〉according to〜「〜によれば」（⇨ 1285）。"
  - id: "scr-127-p05"
    section_id: "Scr_127"
    drill: 1
    number: 492
    role: "exam"
    english: "The suspect denied having been in the building when the crime took place."
    japanese: "容疑者は、その犯罪が起こった時、その建物にいなかったと言った。"
    notes: "出典: 立命館大。4択問題。deny doing「〜することを否定する/〜し（てい）ないと言う」。deny having been in〜「〜にいたことを否定する」。〈暗記〉take place「（事件が）起こる」(= happen/occur)（⇨ 1081）。"
  - id: "scr-127-p06"
    section_id: "Scr_127"
    drill: 1
    number: 493
    role: "exam"
    english: "He finished writing a letter to his friend."
    japanese: "彼は友人への手紙を書き終えた。"
    notes: "出典: 高知大。〈基本〉〈頻出〉4択問題。finish doing「〜するのを終える/〜してしまう」。"
  - id: "scr-127-p07"
    section_id: "Scr_127"
    drill: 1
    number: 494
    role: "exam"
    english: "You should stop drinking if you want to keep fit."
    japanese: "健康を維持したければお酒をやめるべきです。"
    notes: "出典: 大阪経済大。〈頻出〉4択問題。stop doing「〜するのをやめる」。stop to do「〜するために立ち止まる」の to do は目的語でなく目的の副詞的用法の不定詞。〈暗記〉keep [stay] fit「健康を維持する」。"
  - id: "scr-127-p08"
    section_id: "Scr_127"
    drill: 1
    number: 495
    role: "exam"
    english: "During the meeting, Robert avoided looking at his boss."
    japanese: "会議中、ロバートは上司を見ないようにしました。"
    notes: "出典: 中央大。〈頻出〉4択問題。avoid doing「〜するのを避ける/〜しないようにする」。② keep doing「〜し続ける」、③ resume doing「再び〜し始める」、④ continue to do [doing]「〜し続ける」はいずれも文意に合わない。"

