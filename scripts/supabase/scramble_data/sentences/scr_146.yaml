sentences:
  - id: "scr-146-p01"
    section_id: "Scr_146"
    drill: 1
    number: 573
    role: "exam"
    english: "It was only yesterday that John told me about his plan to go to Europe."
    japanese: "ジョンがヨーロッパに行く計画について私に話したのは、つい昨日のことだ。"
    notes: "出典: 早大。〈頻出〉4択問題。tell A about B「A（人）にBについて話す」。選択肢の中で人を目的語にとるのはtoldだけ。It was ... that ...の強調構文。"
  - id: "scr-146-p02"
    section_id: "Scr_146"
    drill: 1
    number: 574
    role: "exam"
    english: "He told me that he wanted to leave our company."
    japanese: "彼は私に会社を辞めたいと言った。"
    notes: "出典: 上智大。〈頻出〉4択問題。tell A that節「Aに〜ということを話す」。tellは伝える相手が必要（×told that）。sayは人を目的語にとらない（×said me that）。"
  - id: "scr-146-p03"
    section_id: "Scr_146"
    drill: 1
    number: 575
    role: "exam"
    english: "The teacher told his students to open their textbooks."
    japanese: "先生は生徒たちに教科書を開くように言った。"
    notes: "出典: 名城大。〈頻出〉4択問題。tell A to do「A（人）に〜しなさいと言う」。SVO to doの形をとるのはtoldだけ。"
  - id: "scr-146-p04"
    section_id: "Scr_146"
    drill: 1
    number: 576
    role: "exam"
    english: "Mother says that poverty is a virtue."
    japanese: "母は、貧しいことは美徳だと言います。"
    notes: "出典: 青山学院大。〈頻出〉4択問題。say that節「〜と言う/〜と書いてある」。tellがthat節をとる場合はcan tell that ~「〜がわかる」。speak/talkはthat節をとらない。"
  - id: "scr-146-p05"
    section_id: "Scr_146"
    drill: 1
    number: 577
    role: "exam"
    english: "I was spoken to by a stranger in the train."
    japanese: "私は電車の中で見知らぬ人に話しかけられた。"
    notes: "出典: 名古屋学院大。4択問題。speak to A「A（人）に話しかける」の受動態。A is spoken to by ...の形（⇨ Theme 10）。"
  - id: "scr-146-p06"
    section_id: "Scr_146"
    drill: 1
    number: 578
    role: "exam"
    english: "We talked about the problem in class."
    japanese: "私たちは授業でその問題について話した。"
    notes: "出典: 金城学大。〈頻出〉4択問題。talk about A「Aについて話す」(= discuss A)。talkは自動詞。discussed/examinedは他動詞なので前置詞aboutの前では不可。"

