sentences:
  - id: "scr-111-p01"
    section_id: "Scr_111"
    drill: 1
    number: 427
    role: "exam"
    english: "We began to walk again as soon as she was recovered."
    japanese: "私たちは彼女が回復するとすぐに再び歩き始めた。"
    notes: "難易度: 基本、頻出。出典: 愛知学院大。as soon as「〜するとすぐに」。現在・過去・未来すべての時制で使用（→ 28）"
  - id: "scr-111-p02"
    section_id: "Scr_111"
    drill: 1
    number: 428
    role: "exam"
    english: "The child burst into tears the moment he saw his mother enter the room."
    japanese: "子供は、母親が部屋に入ってくるのを見るとわっと泣き出した。"
    notes: "出典: 武蔵大。整序問題。the moment「〜するとすぐに」(= as soon as)。= at the moment whenの省略形。the instant / the minuteも同様。参照: see A do「Aが〜するのを見る」（→ 554）"
  - id: "scr-111-p03"
    section_id: "Scr_111"
    drill: 1
    number: 429
    role: "exam"
    english: "I will go away directly you tell me to."
    japanese: "君が出て行けと言えば、すぐに出て行くよ。"
    notes: "出典: 東京理科大。整序問題。directly「〜するとすぐに」《英》。immediately / instantlyも同様。文末のtoは代不定詞（go awayの省略）（→ 100）"
  - id: "scr-111-p04"
    section_id: "Scr_111"
    drill: 1
    number: 430
    role: "exam"
    english: "Hardly had we reached the cottage when it began to rain."
    japanese: "山小屋に着くとすぐに雨が降り始めた。"
    notes: "難易度: 頻出。出典: 慶應大。hardly〜when [before]...「〜するとすぐに…」の倒置形。hardlyを文頭→疑問文語順。「〜」は過去完了形、「...」は過去形。= We had hardly reached the cottage when it began to rain."
  - id: "scr-111-p05"
    section_id: "Scr_111"
    drill: 1
    number: 431
    role: "exam"
    english: "I had scarcely sat down to read a book when the telephone rang."
    japanese: "本を読もうとして座るか座らないかのうちに、電話が鳴った。"
    notes: "難易度: 頻出。出典: 亜細亜大。scarcely〜when [before]...「〜するとすぐに…」。hardlyの代わりにscarcelyも可。倒置形: Scarcely had I sat down to read a book when the telephone rang."
  - id: "scr-111-p06"
    section_id: "Scr_111"
    drill: 1
    number: 432
    role: "exam"
    english: "No sooner had I arrived at the station than the train left."
    japanese: "私が駅に着くとすぐに列車が発車してしまった。"
    notes: "難易度: 超頻出。出典: 関西学院大。整序問題。no sooner〜than...「〜するとすぐに…」の倒置形。比較構文なのでwhenではなくthanを用いる。= I had no sooner arrived at the station than the train left."
  - id: "scr-111-e01"
    section_id: "Scr_111"
    drill: 0
    number: 0
    role: "example"
    english: "The minute they opened the door, the dog ran out."
    japanese: "彼らがドアを開けたとたん、犬が飛び出した。"
    notes: "問428プラスα例文。the minute「〜するとすぐに」= the moment / as soon as"

