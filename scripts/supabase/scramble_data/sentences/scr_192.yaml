sentences:
  - id: "scr-192-p01"
    section_id: "Scr_192"
    drill: 1
    number: 784
    role: "exam"
    english: "The company dismissed him because he repeatedly violated company policies."
    japanese: "会社の規則に繰り返し違反したことを理由に、その会社は彼を解雇した。"
    notes: "〈発展〉dismiss〜=fire〜「解雇する」(=discharge)。"
  - id: "scr-192-p02"
    section_id: "Scr_192"
    drill: 1
    number: 785
    role: "exam"
    english: "The boy sang loudly, trying to overcome his fear of the darkness."
    japanese: "その少年は、暗やみへの恐怖心に打ち勝とうとして、大声で歌った。"
    notes: "清泉女子大。overcome〜=conquer〜「打ち勝つ/克服する」(=get over)。"
  - id: "scr-192-p03"
    section_id: "Scr_192"
    drill: 1
    number: 786
    role: "exam"
    english: "Is it really possible to predict an earthquake with the latest high-tech advances?"
    japanese: "最新のハイテクの進歩によって、地震を予測することは本当に可能ですか。"
    notes: "上智大。predict〜=forecast〜「予言する/予測する」(=foretell)。"
  - id: "scr-192-p04"
    section_id: "Scr_192"
    drill: 1
    number: 787
    role: "exam"
    english: "You cannot emphasize the point too much."
    japanese: "その点はいくら強調してもしすぎることはない。"
    notes: "〈頻出〉中央大。emphasize〜=stress〜「強調する」。cannot〜too...「いくら…しても〜しすぎることはない」(⇨73)。"
  - id: "scr-192-p05"
    section_id: "Scr_192"
    drill: 1
    number: 788
    role: "exam"
    english: "The man at the service center said he could not fix my car."
    japanese: "サービスセンターの男は、私の車は修理できないと言った。"
    notes: "東海大。fix〜=repair〜「修理する」(=mend)。"
  - id: "scr-192-p06"
    section_id: "Scr_192"
    drill: 1
    number: 789
    role: "exam"
    english: "Mr. Smith is the one who founded the organization. That's why it is called Smith Club."
    japanese: "スミス氏はその団体の設立者です。そういうわけで、スミスクラブと呼ばれています。"
    notes: "清泉女子大。found〜=establish〜「設立する/創立する」。That's why節(⇨370)。"
  - id: "scr-192-p07"
    section_id: "Scr_192"
    drill: 1
    number: 790
    role: "exam"
    english: "The art gallery will exhibit some of Picasso's paintings."
    japanese: "その画廊はピカソの絵画をいくつか展示する予定だ。"
    notes: "関西外語大。exhibit〜=display〜「展示する」。"
  - id: "scr-192-p08"
    section_id: "Scr_192"
    drill: 1
    number: 791
    role: "exam"
    english: "Marilyn asked me so charmingly that I could hardly refuse her request."
    japanese: "マリリンはとてもチャーミングに私に頼んだので、彼女の頼み事を断れなかった。"
    notes: "清泉女子大。refuse〜=decline〜「拒絶する」(=turn down⇨935)。"
  - id: "scr-192-p09"
    section_id: "Scr_192"
    drill: 1
    number: 792
    role: "exam"
    english: "I often overlook mistakes I make while proofreading."
    japanese: "校正をしているとき、私は自分で犯した間違いをよく見落とす。"
    notes: "関西外語大。overlook〜=miss〜「見落とす」。"

