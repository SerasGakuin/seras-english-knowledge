sentences:
  - id: "scr-245-p01"
    section_id: "Scr_245"
    drill: 1
    number: 1267
    role: "exam"
    english: "As for me, I am against the proposal."
    japanese: "私はと言えば，その提案には反対です。"
    notes: "〈頻出〉東北学院大。as for〜「〜について言えば」。通例文頭。= As far as I am concerned(⇨451) = For my part。"
  - id: "scr-245-p02"
    section_id: "Scr_245"
    drill: 1
    number: 1268
    role: "exam"
    english: "After finishing the work given him, he was uncertain as to what should be done next."
    japanese: "与えられた仕事を終えてしまって，彼は次に何をすべきかわからなかった。"
    notes: "〈頻出〉立教大。as to〜「〜について」(=about)。wh-節・句が続く場合に用いられることが多い。"
  - id: "scr-245-p03"
    section_id: "Scr_245"
    drill: 1
    number: 1269
    role: "exam"
    english: "As regards the test, the questions were much harder than I had expected."
    japanese: "テストに関しては，問題が思っていたよりはるかに難しかった。"
    notes: "〈発展〉as regards〜 / with [in] regard to〜 / with [in] respect to〜「〜に関して(は)」(=concerning)。about/onより硬い表現。"
  - id: "scr-245-p04"
    section_id: "Scr_245"
    drill: 1
    number: 1270
    role: "exam"
    english: "With regard to your forthcoming visit, I will be meeting you at the airport."
    japanese: "あなたの今度の訪問に関しては，私があなたを空港に迎えに行くことになるでしょう。"
    notes: "〈頻出〉亜細亜大。with regard to〜「〜に関して」(=concerning)。will be doing(未来進行形)は自然な成り行きで起こりそうなこと(⇨6)。"
  - id: "scr-245-p05"
    section_id: "Scr_245"
    drill: 1
    number: 1271
    role: "exam"
    english: "With respect to these letters, I think the best thing is to burn them."
    japanese: "この手紙に関して一番よいのは燃やしてしまうことだと思う。"
    notes: "〈頻出〉京都産業大。with respect to〜「〜に関して」(=concerning)。regard/respectは「(注意・配慮すべき)点」(⇨755)。"
  - id: "scr-245-e01"
    section_id: "Scr_245"
    drill: 0
    number: 1268
    role: "example"
    english: "As to me, I prefer the blue one."
    japanese: "私としては，青いほうが好きです。"
    notes: "比較。as toが文頭に来るとas forと同じ「〜について言えば」の意味。"

