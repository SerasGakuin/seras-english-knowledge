sentences:
  - id: "scr-242-p01"
    section_id: "Scr_242"
    drill: 1
    number: 1232
    role: "exam"
    english: "I'm in a hurry. I really have to get going now."
    japanese: "急いでいます。本当に今すぐ出かけなければなりません。"
    notes: "亜細亜大。in a hurry「急いで」(=in haste/hastily)。〈重要〉get doing「～し始める」。"
  - id: "scr-242-p02"
    section_id: "Scr_242"
    drill: 1
    number: 1233
    role: "exam"
    english: "Don't mention this to anyone, above all my father."
    japanese: "このことは誰にも言わないように，とりわけお父さんには。"
    notes: "関西外語大。above all (things)「とりわけ/中でも」(=especially/particularly)。"
  - id: "scr-242-p03"
    section_id: "Scr_242"
    drill: 1
    number: 1234
    role: "exam"
    english: "I know for sure that he is a man of great importance."
    japanese: "彼が重要な人物であることは確かだ。"
    notes: "早大。for sure「確かに/きっと」(=for certain/certainly/surely)。know/sayなどの動詞の後で使用。"
  - id: "scr-242-p04"
    section_id: "Scr_242"
    drill: 1
    number: 1235
    role: "exam"
    english: "We'll soon have to tackle the problem in earnest."
    japanese: "私たちはすぐにその問題に本気で取り組まなければならないだろう。"
    notes: "立命館大。in earnest「まじめに/本気で」(=seriously)。"
  - id: "scr-242-p05"
    section_id: "Scr_242"
    drill: 1
    number: 1236
    role: "exam"
    english: "Could you explain a bit more in detail?"
    japanese: "もう少し詳細に説明していただけませんか。"
    notes: "〈頻出〉亜細亜大。in detail「詳しく/詳細に」。"
  - id: "scr-242-p06"
    section_id: "Scr_242"
    drill: 1
    number: 1237
    role: "exam"
    english: "It was no surprise that the new product was sold out in no time at all."
    japanese: "その新商品が，即完売になることも驚くことではなかった。"
    notes: "中央大。in no time「すぐに/あっという間に」。inは「～たつと」の時の経過(⇨690)。"
  - id: "scr-242-p07"
    section_id: "Scr_242"
    drill: 1
    number: 1238
    role: "exam"
    english: "He was not interesting; in other words, boring."
    japanese: "彼はおもしろくない，つまり，退屈な男でした。"
    notes: "〈頻出〉拓殖大。in other words「言い換えれば/つまり」(=that is (to say))。"
  - id: "scr-242-p08"
    section_id: "Scr_242"
    drill: 1
    number: 1239
    role: "exam"
    english: "The policeman is now on duty."
    japanese: "その警察官はいま勤務中です。"
    notes: "青山学院大。on duty「勤務中で/当番で」⇔off duty「勤務時間外で/非番で」。onは「接触・従事」。PU!203参照。"
  - id: "scr-242-p09"
    section_id: "Scr_242"
    drill: 1
    number: 1240
    role: "exam"
    english: "At first they were always arguing, but now they are very good friends."
    japanese: "初めのうちは，彼らはいつも口げんかをしていたが，今ではとても仲良しです。"
    notes: "〈基本〉摂南大。at first「初めのうちは」(=in the beginning)。「後では～となった」という含みを持つ。"
  - id: "scr-242-p10"
    section_id: "Scr_242"
    drill: 1
    number: 1241
    role: "exam"
    english: "When I flew from Japan to Australia, I crossed the equator for the first time in my life."
    japanese: "日本からオーストラリアに飛行機で行ったとき，人生で初めて赤道を越えた。"
    notes: "〈基本〉東京理科大。for the first time「初めて」。at first「初めのうちは」, first of all「まず第一に」との区別。"
  - id: "scr-242-p11"
    section_id: "Scr_242"
    drill: 1
    number: 1242
    role: "exam"
    english: "For the first time in two years, he caught a cold and saw a doctor."
    japanese: "2年ぶりに，彼は風邪をひいて医者に診てもらった。"
    notes: "〈頻出〉青山学院大。for the first time in ～ years [months/days]「～年[月/日]ぶりに」。"
  - id: "scr-242-p12"
    section_id: "Scr_242"
    drill: 1
    number: 1243
    role: "exam"
    english: "Don't speak ill of others behind their backs."
    japanese: "陰で他人の悪口を言ってはいけない。"
    notes: "岐阜大。behind A's back「Aの陰で/Aのいないところで」⇔to A's face「Aに面と向かって/公然と」。"
  - id: "scr-242-e01"
    section_id: "Scr_242"
    drill: 0
    number: 1241
    role: "example"
    english: "First of all, we need to check the budget."
    japanese: "まず最初に，予算を確認する必要があります。"
    notes: "比較。first of all「まず第一に/何よりもまず」。at first, for the first timeとの区別。"

