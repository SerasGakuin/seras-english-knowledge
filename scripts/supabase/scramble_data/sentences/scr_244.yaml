sentences:
  - id: "scr-244-p01"
    section_id: "Scr_244"
    drill: 1
    number: 1255
    role: "exam"
    english: "While I agree with your views to some extent, I cannot support your decision."
    japanese: "ある程度はあなたの見解に賛成するが，その決断については支持できない。"
    notes: "〈頻出〉立教大。to some [a certain] extent「ある程度は/ある程度まで」(=to some [a certain] degree)。比較: to a great [large] extent「大いに」。"
  - id: "scr-244-p02"
    section_id: "Scr_244"
    drill: 1
    number: 1256
    role: "exam"
    english: "The plan is not advisable from a political point of view."
    japanese: "政治的見地からすると，その計画はあまり推薦できない。"
    notes: "〈頻出〉藤女子大。from a ～ point of view「～の見地[観点]からすると」(=from (a) ～ viewpoint [perspective])。"
  - id: "scr-244-p03"
    section_id: "Scr_244"
    drill: 1
    number: 1257
    role: "exam"
    english: "Meeting is, in a sense, the beginning of parting."
    japanese: "ある意味で，出会いは別れの始まりである。"
    notes: "神戸大。in a sense「ある意味では」(=in a way)。"
  - id: "scr-244-p04"
    section_id: "Scr_244"
    drill: 1
    number: 1258
    role: "exam"
    english: "I like to have my dictionary within easy reach."
    japanese: "私は辞書をすぐ手の届くところに置いておきたい。"
    notes: "京都産業大。within (A's) reach「(Aの)手の届くところに」(=within the reach of A)⇔out of [beyond] (A's) reach「手の届かないところに」。"
  - id: "scr-244-p05"
    section_id: "Scr_244"
    drill: 1
    number: 1259
    role: "exam"
    english: "Most Japanese young people enjoy karaoke, so they are not afraid of singing in public."
    japanese: "ほとんどの日本の若い人たちはカラオケを楽しんでいる。だから人前で歌うことを恐れない。"
    notes: "愛知学院大。in public「人前で/公然と」(=publicly)⇔in private「内密に/非公式に」(=privately)。"
  - id: "scr-244-p06"
    section_id: "Scr_244"
    drill: 1
    number: 1260
    role: "exam"
    english: "I don't think he got that information at first hand."
    japanese: "彼はあの情報を直接得たのではないと思う。"
    notes: "立命館大。at first hand「直接に/じかに」(=directly)。比較: at second hand「間接に/人づてに」。"
  - id: "scr-244-p07"
    section_id: "Scr_244"
    drill: 1
    number: 1261
    role: "exam"
    english: "I have much money at my disposal."
    japanese: "私は自由に使える金をたくさん持っている。"
    notes: "〈発展〉金城学院大。at A's disposal「Aの自由になる(ように)」。disposalは「処分の自由/処分権」。"
  - id: "scr-244-p08"
    section_id: "Scr_244"
    drill: 1
    number: 1262
    role: "exam"
    english: "All at once all the lights in the house went out."
    japanese: "家中の明かりが突然消えた。"
    notes: "駒澤大。all at once「突然」(=suddenly)。(all) of a suddenも同意。"
  - id: "scr-244-p09"
    section_id: "Scr_244"
    drill: 1
    number: 1263
    role: "exam"
    english: "All of a sudden, a puppy showed up in front of him out of nowhere."
    japanese: "突然，どこからともなく子犬が彼の前に姿を現した。"
    notes: "関西学院大。(all) of a sudden「突然」(=suddenly)。〈重要〉show up「現れる/姿を見せる」(⇨878), out of nowhere「どこからともなく」。"
  - id: "scr-244-p10"
    section_id: "Scr_244"
    drill: 1
    number: 1264
    role: "exam"
    english: "In my opinion, you should try the exam again."
    japanese: "私の考えでは，君はもう一度試験を受けるべきだ。"
    notes: "〈基本〉立教大。in my opinion「私の考え[意見]では」(=in my view)。"
  - id: "scr-244-p11"
    section_id: "Scr_244"
    drill: 1
    number: 1265
    role: "exam"
    english: "The man sleeping on his face is my husband."
    japanese: "うつぶせに眠っている男性は私の夫です。"
    notes: "高知大。on one's face「うつぶせ[腹ばい]になって」(=on one's stomach)。比較: on one's back「あおむけに」。"
  - id: "scr-244-p12"
    section_id: "Scr_244"
    drill: 1
    number: 1266
    role: "exam"
    english: "The doctor told me to go on a diet to lose weight."
    japanese: "医者は私に体重を減らすためにダイエットをするように言った。"
    notes: "駒澤大。on a diet「ダイエット中で」。be [go] on a diet。onは「状態・従事」。PU!203参照。"
  - id: "scr-244-e01"
    section_id: "Scr_244"
    drill: 0
    number: 1258
    role: "example"
    english: "Keep the medicine out of the children's reach."
    japanese: "その薬は子どもの手の届かないところに置きなさい。"
    notes: "比較。out of [beyond] (A's) reach「(Aの)手の届かないところに」。within reachの反意表現。"

