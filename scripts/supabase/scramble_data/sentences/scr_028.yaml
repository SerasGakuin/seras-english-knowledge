  - id: "scr-028-p01"
    section_id: "Scr_028"
    drill: 1
    number: 97
    role: "exam"
    english: "Is there anything for me to sit on?"
    japanese: "私が腰掛けるものが何かありますか。"
    notes: "難易度: 頻出; 出典: 青山学院大; 4択; 不定詞の意味上の主語「for+代名詞目的格」; anythingを修飾する形容詞的用法の不定詞（⇨問89）"
  - id: "scr-028-p02"
    section_id: "Scr_028"
    drill: 1
    number: 98
    role: "exam"
    english: "The child tried hard not to cry."
    japanese: "その子どもは泣くまいと懸命に努めた。"
    notes: "難易度: 頻出; 出典: 大阪学院大; 4択; 不定詞の否定形 not to do; try not to do「〜しないように努める」"
  - id: "scr-028-p03"
    section_id: "Scr_028"
    drill: 1
    number: 99
    role: "exam"
    english: "He seems to have been a very popular actor when he was young."
    japanese: "彼は若いころ、とても人気のある俳優だったようだ。"
    notes: "難易度: 頻出; 出典: 南山大; 4択; 完了形の不定詞 to have done; 現在のseemsに対して過去のことを完了形で表す; 書き換え: It seems that he was a very popular actor when he was young.; 参照: ⇨PU!60"
  - id: "scr-028-p04"
    section_id: "Scr_028"
    drill: 1
    number: 100
    role: "exam"
    english: "He read my e-mails, though I told him not to."
    japanese: "私が読むなと言ったにもかかわらず、彼は私のメールを読んだ。"
    notes: "難易度: 発展; 出典: 関西学院大; 4択; 代不定詞 not to = not to read my e-mails; 語句: tell A not to do「Aに〜しないように言う」（⇨575）"

