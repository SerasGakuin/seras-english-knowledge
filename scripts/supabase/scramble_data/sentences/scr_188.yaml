sentences:
- id: scr-188-p01
  section_id: Scr_188
  drill: 1
  number: 757
  role: exam
  english: It's your turn.
  japanese: あなたの番です。
  notes: 高知大。穴埋め。turn〔通例one's〜〕「順番」。take turns doing「交替で〜する」（⇨ 602）。in turn「今度は/順番に（= by turns）」（⇨ 1209）。
- id: scr-188-p02
  section_id: Scr_188
  drill: 1
  number: 758
  role: exam
  english: He used dishonest means to achieve his end.
  japanese: 彼は目的を達成するために不正な手段を使った。
  notes: 高知大。end「（究極的な）目的（purpose）/目標（aim）」（⇔ means「手段」⇨ 603）。
- id: scr-188-p03
  section_id: Scr_188
  drill: 1
  number: 759
  role: exam
  english: It was an absolute must for us to cut down on electricity consumption last summer.
  japanese: 昨年の夏は節電が至上命令だった。
  notes: 〈発展〉中央大。整序問題。a must「（絶対）必要なもの［こと］/必見［必読/必修］のもの［こと］」。cut down on〜「〜を削減する」。
- id: scr-188-e01
  section_id: Scr_188
  drill: 0
  number: 1
  role: example
  english: This course is a must for all students.
  japanese: この科目は全学生必修です。
  notes: 問759解説。a must「必修のもの」の別用例。
- id: scr-188-p04
  section_id: Scr_188
  drill: 1
  number: 760
  role: exam
  english: (a) You will be safe if you hide in that cave. (b) Please don't forget to lock the safe when you leave the office.
  japanese: (a) あのほら穴に隠れたら安全でしょう。 (b) 事務所を出るとき、忘れずに金庫にかぎをかけてください。
  notes: '立教大。共通語句問題。safe: (a)は形容詞「安全な」、(b)は名詞「金庫」。'
- id: scr-188-p05
  section_id: Scr_188
  drill: 1
  number: 761
  role: exam
  english: It's a shame your wife couldn't come. I really wanted to meet her.
  japanese: あなたの奥さんが来られなかったのは残念です。私は本当にお会いしたかった。
  notes: 〈発展〉センター。shame〔通例a〜〕「残念なこと/遺憾なこと」（= pity）。sorrowにも「残念/遺憾」の意味はあるが不可算名詞なのでa shameの形にならない。
- id: scr-188-p06
  section_id: Scr_188
  drill: 1
  number: 762
  role: exam
  english: I only have a five-dollar bill. Keep the change.
  japanese: 5ドル紙幣しかありません。おつりはいいです。
  notes: 立命館大。穴埋め（c-）。change「小銭/つり銭」。Keep the change.「おつりは取っておいてください」。「数詞−名詞」が修飾語になる場合、名詞は単数形（a five-dollar bill, a three-year-old girl）。
- id: scr-188-e02
  section_id: Scr_188
  drill: 0
  number: 2
  role: example
  english: I need two copies of today's paper.
  japanese: 今日の新聞が2部必要だ。
  notes: PU!167「その他の意外な意味を持つ名詞②」。copy「（本・雑誌・新聞などの）部/冊」。
- id: scr-188-e03
  section_id: Scr_188
  drill: 0
  number: 3
  role: example
  english: He is a person of his word, so you can trust him.
  japanese: 彼は約束を守る人だから、信頼できる。
  notes: PU!167。word「約束」（= promise）。keep [break] one's word「約束を守る［破る］」。
- id: scr-188-e04
  section_id: Scr_188
  drill: 0
  number: 4
  role: example
  english: He rewrites his will every year.
  japanese: 彼は毎年遺言書を書き直す。
  notes: PU!167。will「遺言書/意志」。
- id: scr-188-e05
  section_id: Scr_188
  drill: 0
  number: 5
  role: example
  english: The picture on the screen froze for a moment.
  japanese: 画面の映像が一瞬止まった。
  notes: PU!167。picture「（テレビ・映画の）映像/画面/画像」。PU!167にはdish「料理/一皿分」も収録（one's favorite dish「好物」）。
