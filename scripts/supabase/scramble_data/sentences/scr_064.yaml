sentences:
  - id: "scr-064-p01"
    section_id: "Scr_064"
    drill: 1
    number: 227
    role: "exam"
    english: "Of all the doctors in the hospital, Dr. Takahashi speaks English the best."
    japanese: "病院の医者の中で、高橋先生が一番上手に英語を話す。"
    notes: "出典: 南山大。副詞の最上級にもtheをつけることがある。of A（複数語句）vs in A（単数名詞）"
  - id: "scr-064-p02"
    section_id: "Scr_064"
    drill: 1
    number: 228
    role: "exam"
    english: "It is said that he is one of the greatest scientists in the United States."
    japanese: "彼はアメリカ合衆国で最も偉大な科学者の一人だそうだ。"
    notes: "出典: 武庫川女子大。整序問題。one of the + 最上級 + 複数名詞"
  - id: "scr-064-p03"
    section_id: "Scr_064"
    drill: 1
    number: 229
    role: "exam"
    english: "We all agree that Jane is by far the best worker in our workplace."
    japanese: "ジェーンが私たちの職場でずば抜けて一番よく働く人であるという点で、みんなの意見が一致している。"
    notes: "出典: 近畿大。by far the + 最上級。very は the very + 最上級の語順"
  - id: "scr-064-p04"
    section_id: "Scr_064"
    drill: 1
    number: 230
    role: "exam"
    english: "That is the best movie that I have ever seen."
    japanese: "それは私が今まで観た中で一番いい映画だ。"
    notes: "難易度: 頻出。出典: 札幌大。整序問題。the + 最上級 + 名詞 + (that +) S have ever done"
  - id: "scr-064-p05"
    section_id: "Scr_064"
    drill: 1
    number: 231
    role: "exam"
    english: "Canada is the second largest country in the world."
    japanese: "カナダは世界で二番目に大きな国です。"
    notes: "出典: 北星学園大。空所補充（l-で始まる語）。the + 序数詞 + 最上級"
  - id: "scr-064-p06"
    section_id: "Scr_064"
    drill: 1
    number: 232
    role: "exam"
    english: "Once you get the scholarship, you should make the most of the chance."
    japanese: "ひとたび奨学金をもらったら、その機会を最大限に利用すべきだ。"
    notes: "難易度: 頻出。出典: 摂南大。make the most of ~ vs make the best of ~。once ~「いったん~すると」（⇨ 問421）"
  - id: "scr-064-p07"
    section_id: "Scr_064"
    drill: 1
    number: 233
    role: "exam"
    english: "To the best of my knowledge, they moved to another town."
    japanese: "私の知る限りでは、彼らは別の町に引っ越した。"
    notes: "出典: 亜細亜大。下線部同意語問題。to the best of A's knowledge = as far as A know（⇨ PU!86）"
  - id: "scr-064-p08"
    section_id: "Scr_064"
    drill: 1
    number: 234
    role: "exam"
    english: "At least 530 of them died in this fire."
    japanese: "この火事で彼らのうち少なくとも530名が亡くなった。"
    notes: "難易度: 頻出。出典: 上智大。at (the) least = not less than（⇨ PU!40）"

