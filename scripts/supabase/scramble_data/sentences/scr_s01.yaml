sentences:
  - id: "scr-s01-p01"
    section_id: "Scr_S01"
    drill: 1
    number: 1
    role: "exam"
    english: "He will make you happy."
    japanese: "彼はあなたを幸せにするでしょう。"
    notes: "特別編1。文型一致問題。SVOC文型。make O C「OをCにする」。形容詞happyがCの働き（⇨ 540）。答: ③。"
  - id: "scr-s01-p02"
    section_id: "Scr_S01"
    drill: 1
    number: 2
    role: "exam"
    english: "She made her daughter some bread."
    japanese: "彼女は娘にパンを作ってあげた。"
    notes: "特別編1。文型一致問題。SVOO文型。make A B「AにBを作ってあげる」。her daughter=A, some bread=B（⇨ PU!109）。答: ④。"
  - id: "scr-s01-p03"
    section_id: "Scr_S01"
    drill: 1
    number: 3
    role: "exam"
    english: "He remained silent."
    japanese: "彼は黙ったままだった。"
    notes: "特別編1。文型一致問題。SVC文型。remain C「Cのままである」。形容詞silentがCの働き（⇨ PU!111）。答: ⑤。"
  - id: "scr-s01-p04"
    section_id: "Scr_S01"
    drill: 1
    number: 4
    role: "exam"
    english: "They couldn't stand the noise any more."
    japanese: "彼らはそれ以上その騒音に耐えられなかった。"
    notes: "特別編1。文型一致問題。SVO文型。他動詞stand「〜を我慢する」（⇨ 1013）。the noiseがOの働き。答: ①。"
  - id: "scr-s01-p05"
    section_id: "Scr_S01"
    drill: 1
    number: 5
    role: "exam"
    english: "My brother remained in the classroom."
    japanese: "私の兄（弟）は教室に残っていた。"
    notes: "特別編1。文型一致問題。SV文型。自動詞remain「残っている」。in the classroomは副詞句（M）。答: ②。"
  - id: "scr-s01-e01"
    section_id: "Scr_S01"
    drill: 0
    number: 0
    role: "example"
    english: "She walks her dog every morning."
    japanese: "彼女は毎朝、犬の散歩をする。"
    notes: "特別編1選択肢①。SVO文型。他動詞walk「〜の散歩をする/〜を歩かせる」。問(4)の答。"
  - id: "scr-s01-e02"
    section_id: "Scr_S01"
    drill: 0
    number: 0
    role: "example"
    english: "He walks around his house every day."
    japanese: "彼は毎日、家の周りを散歩する。"
    notes: "特別編1選択肢②。SV文型。自動詞walk「散歩する/歩く」。around his houseは副詞句。問(5)の答。"
  - id: "scr-s01-e03"
    section_id: "Scr_S01"
    drill: 0
    number: 0
    role: "example"
    english: "He kept me waiting for an hour."
    japanese: "彼は私を1時間待たせた。"
    notes: "特別編1選択肢③。SVOC文型。keep A doing「Aを〜している状態にしておく」（⇨ 568）。問(1)の答。"
  - id: "scr-s01-e04"
    section_id: "Scr_S01"
    drill: 0
    number: 0
    role: "example"
    english: "They asked her if she would come to the party."
    japanese: "彼らはパーティーに来るかどうか、彼女に尋ねた。"
    notes: "特別編1選択肢④。SVOO文型。ask A B「AにBを尋ねる」（⇨ 1364）。問(2)の答。"
  - id: "scr-s01-e05"
    section_id: "Scr_S01"
    drill: 0
    number: 0
    role: "example"
    english: "The tourist spot became famous for its hot springs."
    japanese: "その観光地は温泉で有名になった。"
    notes: "特別編1選択肢⑤。SVC文型。become C「Cになる」。形容詞famousがC。問(3)の答。"

