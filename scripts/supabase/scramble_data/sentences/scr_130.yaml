sentences:
  - id: "scr-130-p01"
    section_id: "Scr_130"
    drill: 1
    number: 510
    role: "exam"
    english: "They robbed him of his watch and ran away."
    japanese: "彼らは彼の時計を奪って逃げた。"
    notes: "出典: 亜細亜大。並べ替え問題。rob A of B「AからBを奪う」。rob の目的語は人・場所。〈比較〉steal の目的語は物（steal B from A）。"
  - id: "scr-130-p02"
    section_id: "Scr_130"
    drill: 1
    number: 511
    role: "exam"
    english: "He was deprived of his driver's license after the accident."
    japanese: "その事故の後で、彼は運転免許証を取り上げられた。"
    notes: "出典: 慶應大。〈頻出〉記述問題。deprive A of B「AからB（物・権利・能力）を奪う」。受動態 A is deprived of B で頻出。"
  - id: "scr-130-p03"
    section_id: "Scr_130"
    drill: 1
    number: 512
    role: "exam"
    english: "Let me relieve you of your baggage."
    japanese: "私にあなたの荷物を持たせてください。"
    notes: "出典: 中央大。4択問題。relieve A of B「AからBを取り除いて楽にさせる」。② relieve 以外の選択肢は A of B の形をとらない。"
  - id: "scr-130-e01"
    section_id: "Scr_130"
    drill: 0
    number: 0
    role: "example"
    english: "Two men robbed the bank of its money."
    japanese: "2人の男が銀行から金を奪った。"
    notes: "問510解説〈比較〉例文。rob の目的語は「人・場所」— rob A(場所) of B(物)の用法例。steal との対比。"
  - id: "scr-130-e02"
    section_id: "Scr_130"
    drill: 0
    number: 0
    role: "example"
    english: "A thief stole some money from the safe."
    japanese: "泥棒が金庫から金を盗んだ。"
    notes: "問510解説〈比較〉例文。steal の目的語は「物」— steal B(物) from A(場所)の用法例。rob との対比。"

