sentences:
  - id: "scr-s08-p01"
    section_id: "Scr_S08"
    drill: 1
    number: 25
    role: "exam"
    english: "It was a fact that he had been to Thailand."
    japanese: "彼がタイに行ったことがあるのは事実だった。"
    notes: "特別編8。用法一致問題。形式主語構文。It is+名詞+that+完全な文→形式主語構文（⇨ Theme 78）。答: ①（It is+形容詞+that〜も形式主語構文）。他選択肢: ②③④はいずれも強調構文（⇨ Theme 118）。CHECK!: It is+副詞+that→強調 / It is+形容詞+that→形式主語（⇨ PU!87）。"
  - id: "scr-s08-p02"
    section_id: "Scr_S08"
    drill: 1
    number: 26
    role: "exam"
    english: "She works as a lawyer."
    japanese: "彼女は弁護士として働いている。"
    notes: "特別編8。用法一致問題。前置詞as「〜として」。直後に名詞→前置詞のas（⇨ 725）。答: ④（I used my jacket as a pillow.も前置詞as）。他選択肢: ①副詞as「同じくらい」（⇨ 184, 190）、②接続詞as「〜なので」原因（⇨ PU!77）、③接続詞as「〜だけれど」譲歩（⇨ PU!77, 438）。"
  - id: "scr-s08-p03"
    section_id: "Scr_S08"
    drill: 1
    number: 27
    role: "exam"
    english: "I won't change my mind whatever you say."
    japanese: "あなたが何を言っても、私は考えを変えない。"
    notes: "特別編8。用法一致問題。副詞節を導くwhatever「何を〜しても」（⇨ 383）。直前に完全な文→副詞節。答: ①（Whatever may happen, I'll support you.も副詞節）。他選択肢: ②no+名詞+whatever「少しも〜ない」（⇨ 277）、③名詞節whatever「〜するものは何でも」（目的語）（⇨ 382）、④名詞節whatever（主語）。"

