sentences:
  - id: "scr-207-p01"
    section_id: "Scr_207"
    drill: 1
    number: 861
    role: "exam"
    english: "The murderer admitted his crime to the police."
    japanese: "殺人犯は警察に対して自らの犯罪を認めた。"
    notes: "芝浦工大。語根mit=send。admit「（しぶしぶ）認める/入学を認める」。選択肢: submit「提出する」/permit「許す」/commit「犯す/委託する」。"
  - id: "scr-207-p02"
    section_id: "Scr_207"
    drill: 1
    number: 862
    role: "exam"
    english: "It appears she's going to succeed you as department manager."
    japanese: "彼女は部長としてあなたの後任となるようですよ。"
    notes: "〈発展〉中央大。対話問題（B文のみ登録）。A文:「Why has Ms. Roberts returned from her overseas assignment?」「What?! Now?! This is news to me. I only just started the position last November!」。語根cede/ceed=go/come。succeed「後を継ぐ」。選択肢: precede「先行する」/proceed「前進する」/concede「譲る」。"
  - id: "scr-207-p03"
    section_id: "Scr_207"
    drill: 1
    number: 863
    role: "exam"
    english: "The guy is a criminal who deceived a lot of elderly people."
    japanese: "その男は多くの高齢者をだました犯罪者です。"
    notes: "中央大。語根ceive=take。deceive「だます」。選択肢: conceive「考えつく」/perceive「理解する」/receive「受け取る」。"
  - id: "scr-207-p04"
    section_id: "Scr_207"
    drill: 1
    number: 864
    role: "exam"
    english: "We must be particularly cautious when we infer that a person is guilty on the basis of circumstantial evidence."
    japanese: "状況証拠をもとにある人を有罪であると推測する際には特に慎重でなければならない。"
    notes: "〈発展〉上智大。語根fer=carry/bring。infer「推測する」。選択肢: confer「相談する」/transfer「移す」/prefer「より好む」。"
  - id: "scr-207-p05"
    section_id: "Scr_207"
    drill: 1
    number: 865
    role: "exam"
    english: "Don't distract me while I am studying."
    japanese: "勉強している間は私の気をそらさないでください。"
    notes: "〈発展〉上智大。語根tract=draw。distract「（注意を）そらす」。選択肢: contract「契約する」/attract「引きつける」/extract「抜き出す」。"

