sentences:
  - id: "scr-063-p01"
    section_id: "Scr_063"
    drill: 1
    number: 221
    role: "exam"
    english: "Tom can no more swim than Mary can."
    japanese: "メアリーが泳げないのと同様に、トムも泳げない。"
    notes: "難易度: 頻出。出典: 中央大。同意文選択"
  - id: "scr-063-p02"
    section_id: "Scr_063"
    drill: 1
    number: 222
    role: "exam"
    english: "Work is not the only object of life any more than play is."
    japanese: "遊びが人生の唯一の目的でないのと同じように、仕事も人生の唯一の目的ではない。"
    notes: "出典: 東海大。not ~ any more than = no more ~ than（口語的）"
  - id: "scr-063-p03"
    section_id: "Scr_063"
    drill: 1
    number: 223
    role: "exam"
    english: "It seems to me that she is no less intelligent than Einstein."
    japanese: "私には、彼女がアインシュタインと同じくらい頭が良いように思える。"
    notes: "出典: 西南学院大。整序問題（lessが不足）"
  - id: "scr-063-p04"
    section_id: "Scr_063"
    drill: 1
    number: 224
    role: "exam"
    english: "Looking at the vast ocean, I felt that my worries were no more than tiny things."
    japanese: "広い海を見ていると、私の悩みなど取るに足らないものだと感じた。"
    notes: "整序問題。no more than = only"
  - id: "scr-063-p05"
    section_id: "Scr_063"
    drill: 1
    number: 225
    role: "exam"
    english: "She had no less than a thousand dollars then."
    japanese: "彼女はその時1,000ドルも持っていた。"
    notes: "出典: 成城大。no less than = as much as"
  - id: "scr-063-p06"
    section_id: "Scr_063"
    drill: 1
    number: 226
    role: "exam"
    english: "John has not more than 200 dollars."
    japanese: "ジョンはせいぜい200ドルしか持っていない。"
    notes: "同意文選択。not more than = at most"

