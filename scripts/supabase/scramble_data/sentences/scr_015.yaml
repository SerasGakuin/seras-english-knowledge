    english: "After the accident, all of the trains were delayed for about an hour."
    japanese: "事故の後、すべての電車が約1時間遅れた。"
    notes: "難易度: 頻出; 出典: 獨協大; be delayed「（電車などが）遅れる」; delay=他動詞「～を遅らせる」; 選択肢: ①absorbed ②advanced ③reflected"
  - id: "scr-015-p02"
    section_id: "Scr_015"
    drill: 1
    number: 45
    role: "exam"
    english: "Many people were killed in the Hanshin earthquake of 1995."
    japanese: "多くの人が1995年の阪神大震災で亡くなった。"
    notes: "出典: 神田外語大; be killed「（事故・戦争などで）死ぬ」(= die); 選択肢: ①had died不可(過去), ③were dead「死んでいた」意味的に不可"
  - id: "scr-015-p03"
    section_id: "Scr_015"
    drill: 1
    number: 46
    role: "exam"
    english: "I was caught in a shower on my way to school."
    japanese: "学校に来る途中で、にわか雨にあったんだ。"
    notes: "難易度: 頻出; 出典: 麗澤大; 対話問題（A: You look so cold. What happened?）; be caught in ~「（雨・渋滞等に）あう」; 語句: on one's way to ~「～への途中で」(⇨問1193)"

