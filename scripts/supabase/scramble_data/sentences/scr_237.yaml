sentences:
  - id: "scr-237-p01"
    section_id: "Scr_237"
    drill: 1
    number: 1177
    role: "exam"
    english: "He owns his house. It seems he is quite well off."
    japanese: "彼は自分の家を持っている。かなり裕福なようだ。"
    notes: "〈頻出〉名城大。be well off「暮らし向きがよい/裕福である」(=be rich)。⇔be badly off。"
  - id: "scr-237-p02"
    section_id: "Scr_237"
    drill: 1
    number: 1178
    role: "exam"
    english: "That actress was badly off before she came to Japan."
    japanese: "その女優は日本にやって来るまでは貧しかった。"
    notes: "立命館大。be badly off「暮らし向きが悪い/貧乏である」。比較級: be better off⇔be worse off。"
  - id: "scr-237-p03"
    section_id: "Scr_237"
    drill: 1
    number: 1179
    role: "exam"
    english: "Her lessons are by and large very interesting."
    japanese: "彼女の授業は概してとてもおもしろい。"
    notes: "名古屋外語大。by and large「概して/一般的に」(=in general⇨1196)。"
  - id: "scr-237-p04"
    section_id: "Scr_237"
    drill: 1
    number: 1180
    role: "exam"
    english: "It has rained on and off these days."
    japanese: "最近は雨が降ったり止んだりだ。"
    notes: "高知大。on and off「ときどき/断続的に」(=sometimes)。=off and on。⇔on and on「どんどん/続けて」。"
  - id: "scr-237-p05"
    section_id: "Scr_237"
    drill: 1
    number: 1181
    role: "exam"
    english: "Now that you have E-mail, be sure to send me a message every now and then."
    japanese: "電子メールがあるんだから，忘れずにときどきメッセージを送ってください。"
    notes: "青山学院大。(every) now and then[again]「ときどき」(=occasionally)。seldomとsometimesの間。"
  - id: "scr-237-p06"
    section_id: "Scr_237"
    drill: 1
    number: 1182
    role: "exam"
    english: "Our task has been easy so far, but it will be difficult from now on."
    japanese: "私たちの仕事は，これまでは簡単だったが，今後は難しくなるだろう。"
    notes: "〈頻出〉亜細亜大。so far「今までのところ」(=up to now/till now)。"
  - id: "scr-237-p07"
    section_id: "Scr_237"
    drill: 1
    number: 1183
    role: "exam"
    english: "The contest has been open for two weeks, but as yet, we have received no entries."
    japanese: "コンテストが始まって2週間経ちますが，今のところ応募は1つもありません。"
    notes: "慶應大。as yet「今までのところ」(=up to now)。否定文で用いることが多い。"
  - id: "scr-237-p08"
    section_id: "Scr_237"
    drill: 1
    number: 1184
    role: "exam"
    english: "You should see a doctor right away."
    japanese: "すぐに医者にみてもらったほうがよい。"
    notes: "〈頻出〉愛知工大。right away「すぐに」(=immediately/at once)。right nowとも。"
  - id: "scr-237-p09"
    section_id: "Scr_237"
    drill: 1
    number: 1185
    role: "exam"
    english: "Mary told him once and for all that she wouldn't go out with him."
    japanese: "メアリーは彼と付き合う気はないときっぱりと告げた。"
    notes: "千葉工大。once (and) for all「きっぱりと/これを最後に」(=finally/definitely)。go out with〜「〜と付き合う」。"
  - id: "scr-237-p10"
    section_id: "Scr_237"
    drill: 1
    number: 1186
    role: "exam"
    english: "It's next to impossible to finish the work by 5 o'clock."
    japanese: "5時までに仕事を終えるのは，ほとんど不可能だ。"
    notes: "〈頻出〉中央大。next to「ほとんど」(=almost)。通例否定語の前。「〜の隣に」の意味も。"
  - id: "scr-237-p11"
    section_id: "Scr_237"
    drill: 1
    number: 1187
    role: "exam"
    english: "As far as English is concerned, he was second to none."
    japanese: "英語に関する限り，彼はだれにも劣らなかった。"
    notes: "法政大。be second to none「誰にも劣らない」。"
  - id: "scr-237-p12"
    section_id: "Scr_237"
    drill: 1
    number: 1188
    role: "exam"
    english: "The old dog can hardly walk, let alone run."
    japanese: "その老犬はあまり歩けないし，まして走ることなどできない。"
    notes: "〈頻出〉成城大。let alone〜「〜は言うまでもなく」(=much[still] less⇨208)。否定文の後で使う。hardly「ほとんど〜ない」(⇨266)。"
  - id: "scr-237-e01"
    section_id: "Scr_237"
    drill: 0
    number: 1178
    role: "example"
    english: "Neil is far better off than he was ten years ago."
    japanese: "ニールは10年前よりずっと暮らし向きがよい。"
    notes: "〈重要〉比較級表現。be better off⇔be worse off。"
  - id: "scr-237-e02"
    section_id: "Scr_237"
    drill: 0
    number: 1180
    role: "example"
    english: "He worked on and on from dawn till dusk."
    japanese: "彼は夜明けから夕暮れまで働き続けた。"
    notes: "比較。on and on「どんどん/続けて/休まず」。on and off（断続）との区別。"
  - id: "scr-237-e03"
    section_id: "Scr_237"
    drill: 0
    number: 1186
    role: "example"
    english: "He seated himself next to her."
    japanese: "彼は彼女の隣に座った。"
    notes: "プラスα。next to「〜の隣の[に]」の意味。「ほとんど」との区別。"

