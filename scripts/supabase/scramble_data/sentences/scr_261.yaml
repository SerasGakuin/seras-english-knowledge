sentences:
  - id: "scr-261-p01"
    section_id: "Scr_261"
    drill: 1
    number: 1360
    role: "exam"
    english: "Do you have the time?"
    japanese: "今，何時ですか。"
    notes: "〈頻出〉東京経済大。Do you have the time?=What time is it?「今何時ですか」。〈比較〉Do you have time?「お時間はありますか」(theの有無で意味が変わる)。A: の行。"
  - id: "scr-261-p02"
    section_id: "Scr_261"
    drill: 1
    number: 1360
    role: "exam"
    english: "Let me see."
    japanese: "えーと。"
    notes: "東京経済大。Let me see.「えーと/そうですね」。即座に返答できないときの決まり文句。B: の行。right now「ちょうど今/現在」(プラスα:「すぐに/直ちに」の意味も⇨1184)。"
  - id: "scr-261-p03"
    section_id: "Scr_261"
    drill: 1
    number: 1361
    role: "exam"
    english: "Guess what! I bumped into Nancy on the street yesterday."
    japanese: "あのねえ。昨日，通りでナンシーにばったり出くわしたんだ。"
    notes: "〈頻出〉立命館大。Guess what!「あのねえ」。意外な話の切り出しに用いる。bump into A「Aにばったり出くわす」。A: の行。"
  - id: "scr-261-p04"
    section_id: "Scr_261"
    drill: 1
    number: 1361
    role: "exam"
    english: "No kidding! I thought she was still away in the U.S."
    japanese: "冗談でしょう。彼女はまだアメリカにいるのかと思っていたわ。"
    notes: "立命館大。No kidding!「冗談でしょう」。=You're kidding!/You must be kidding!。B: の行。"
  - id: "scr-261-p05"
    section_id: "Scr_261"
    drill: 1
    number: 1362
    role: "exam"
    english: "That depends."
    japanese: "それは状況次第ですね。"
    notes: "神奈川大。That depends.「状況次第だ/それは時と場合による」。dependsの後にon (the) circumstances[the case]が省略(⇨973)。=It (all) depends./Depends.。B: の行。A: Will the Japanese soccer team win the World Cup?「日本のサッカーチームはワールドカップで勝てるでしょうか」。"
  - id: "scr-261-p06"
    section_id: "Scr_261"
    drill: 1
    number: 1363
    role: "exam"
    english: "Something has come up and I can't make it to the ball game tonight."
    japanese: "用事ができたので，今晩は野球の試合に行けません。"
    notes: "防衛大・神奈川大。make it「間に合う/都合をつける」(⇨1119)。A: の行。"
  - id: "scr-261-p07"
    section_id: "Scr_261"
    drill: 1
    number: 1363
    role: "exam"
    english: "That's a shame."
    japanese: "それは残念ですね。"
    notes: "防衛大・神奈川大。That's a shame.「それは残念だ」。shame「残念なこと/遺憾なこと」(⇨761,1350)。B: の行。"
  - id: "scr-261-p08"
    section_id: "Scr_261"
    drill: 1
    number: 1364
    role: "exam"
    english: "Would you mind not smoking here?"
    japanese: "ここでタバコを吸うのをやめていただけませんか。"
    notes: "〈発展〉センター。Would you mind not doing?「〜するのをやめていただけますか」(⇨1333)。A: の行。"
  - id: "scr-261-p09"
    section_id: "Scr_261"
    drill: 1
    number: 1364
    role: "exam"
    english: "I beg your pardon?"
    japanese: "何とおっしゃいましたか。"
    notes: "センター。I beg your pardon?「もう一度おっしゃってください」。相手の言ったことが聞き取れなかったとき。=Beg your pardon?/Pardon (me)?。B: の行。"
  - id: "scr-261-p10"
    section_id: "Scr_261"
    drill: 1
    number: 1364
    role: "exam"
    english: "I asked you if you would mind not smoking here."
    japanese: "ここでタバコを吸うのをやめてくれないかと言ったんです。"
    notes: "センター。ask A if[whether] A would[could] do「Aに〜してくれないかと言う」。A: の行。"
  - id: "scr-261-p11"
    section_id: "Scr_261"
    drill: 1
    number: 1365
    role: "exam"
    english: "What has become of her?"
    japanese: "彼女はどうなったのだろうか。"
    notes: "〈頻出〉What has become of A?=What has happened to A?「Aはどうなったのか」(⇨260)。A: の行。"
  - id: "scr-261-p12"
    section_id: "Scr_261"
    drill: 1
    number: 1365
    role: "exam"
    english: "None of your business."
    japanese: "あなたの知ったことではない。"
    notes: "(It's) None of your business.=Mind your own business.「あなたの知ったことではない」。B: の行。"
  - id: "scr-261-e01"
    section_id: "Scr_261"
    drill: 0
    number: 1360
    role: "example"
    english: "I'll send it to you by fax right now."
    japanese: "すぐにそれをファックスで送ります。"
    notes: "right now「すぐに/直ちに」の用例(⇨1184)。「ちょうど今/現在」の意味とは異なる。"

