sentences:
  - id: "scr-255-p01"
    section_id: "Scr_255"
    drill: 1
    number: 1329
    role: "exam"
    english: "May I have some more coffee?"
    japanese: "コーヒーをもう少しいただけますか。"
    notes: "〈基本〉東海大。May I〜?「〜してもよろしいですか」。Can I〜?より丁寧。応答: Why not?「いいですとも」。A: の行。"
  - id: "scr-255-p02"
    section_id: "Scr_255"
    drill: 1
    number: 1330
    role: "exam"
    english: "Is it all right if I ask you one more question?"
    japanese: "あなたにもう1つ質問してもいいですか。"
    notes: "〈頻出〉駒澤大。Is it all right if I〜?「〜してもいいですか」。May I〜?のくだけた言い方。応答: Go ahead.「さあ，どうぞ」/ By all means.「ぜひどうぞ」。A: の行。"
  - id: "scr-255-p03"
    section_id: "Scr_255"
    drill: 1
    number: 1331
    role: "exam"
    english: "Do you mind if I ask you a question?"
    japanese: "質問をしてもいいですか。"
    notes: "〈頻出〉関西大。Do [Would] you mind if I do?「〜してもいいですか」。了承=Not at all. Go ahead.。mindは「いやだと思う」なので「はい，どうぞ」は否定語で答える。A: の行。"
  - id: "scr-255-p04"
    section_id: "Scr_255"
    drill: 1
    number: 1332
    role: "exam"
    english: "Would you mind my leaving my seat for a moment?"
    japanese: "少しの間席を外してもいいですか。"
    notes: "拓殖大。Do [Would] you mind my [me] doing?「〜してもいいですか」(許可)。比較: Do you mind doing?は「〜していただけませんか」(依頼)。応答: Of course not.。A: の行。"
  - id: "scr-255-p05"
    section_id: "Scr_255"
    drill: 1
    number: 1333
    role: "exam"
    english: "Would you mind opening the window, please?"
    japanese: "窓を開けていただけませんか。"
    notes: "〈頻出〉白百合女子大。Do [Would] you mind doing?「〜していただけませんか」(依頼)。「許可」のmind my doing?と混同注意。"
  - id: "scr-255-p06"
    section_id: "Scr_255"
    drill: 1
    number: 1334
    role: "exam"
    english: "I wonder if I might ask you a favor."
    japanese: "お願いがあるんですがよろしいでしょうか。"
    notes: "〈発展〉中央大。I wonder if [whether]〜「〜してもいいでしょうか/〜してくれますか」。ask A a favor「Aに頼みごとをする」(=ask a favor of A⇨1072)。A: の行。"
  - id: "scr-255-p07"
    section_id: "Scr_255"
    drill: 1
    number: 1335
    role: "exam"
    english: "Could you spare me some time today?"
    japanese: "今日少し時間をさいていただけないでしょうか。"
    notes: "駒澤大。Could you〜?「〜していただけないでしょうか」。Can you/Would youより丁寧。spare A B「AにBをさく」(⇨530)。応答: Yes, I'd be glad [happy] to.。A: の行。"

