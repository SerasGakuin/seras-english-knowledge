sentences:
  - id: "scr-141-p01"
    section_id: "Scr_141"
    drill: 1
    number: 549
    role: "exam"
    english: "The president had his secretary reserve a flight for New York."
    japanese: "社長は秘書にニューヨーク行きの飛行機を予約させた。"
    notes: "出典: 駒澤大。〈超頻〉4択問題。have A do「（自分でしないで）Aに〜させる/してもらう」(= get A to do)。使役動詞としてのhaveはmakeほど強制力は強くない。"
  - id: "scr-141-p02"
    section_id: "Scr_141"
    drill: 1
    number: 550
    role: "exam"
    english: "The trainer made the elephant enter the cage by beating it with a stick."
    japanese: "調教師はゾウを棒でたたいておりに入れた。"
    notes: "出典: 高知大。〈基本〉〈頻出〉4択問題。make A do「（強制的に）Aに〜させる」(= force[compel] A to do)。② letは「望み通り〜させる」なので文意が通らない。① gotと④ forcedはSVO to doなので不可。"
  - id: "scr-141-p03"
    section_id: "Scr_141"
    drill: 1
    number: 551
    role: "exam"
    english: "His parents let him go abroad."
    japanese: "彼の両親は彼が海外に行くのを許した。"
    notes: "出典: 青山学院大。〈頻出〉4択問題。let A do「（望み通り[勝手に]）Aに〜させる」(= allow A to do)。① adviseはadvise A to do(⇨542)、④ permitはpermit A to do（⇨ PU!113）なので不可。"
  - id: "scr-141-p04"
    section_id: "Scr_141"
    drill: 1
    number: 552
    role: "exam"
    english: "Would you help me set the table?"
    japanese: "食卓の用意をするのを手伝っていただけますか。"
    notes: "出典: 大阪電通大。〈頻出〉4択問題。help A (to) do「Aが〜するのを手伝う」。doとto do両方可だがdoが多い。目的語Aの省略も可能。〈暗記〉set[lay] the table「食卓の用意をする」⇔ clear the table「食卓を片づける」。"
  - id: "scr-141-p05"
    section_id: "Scr_141"
    drill: 1
    number: 553
    role: "exam"
    english: "I just heard someone call my name."
    japanese: "たった今、誰かが私の名前を呼ぶのが聞こえた。"
    notes: "出典: 金沢工大。〈頻出〉4択問題。hear A do「Aが〜するのが聞こえる」。〈暗記〉just「[完了形とともに]たった今」は〈米〉では過去形とともに用いることも多い。"
  - id: "scr-141-p06"
    section_id: "Scr_141"
    drill: 1
    number: 554
    role: "exam"
    english: "I saw Tom enter the room with his hat on."
    japanese: "トムが帽子をかぶったまま部屋に入るのを見た。"
    notes: "出典: 大阪学院大。〈基本〉〈頻出〉並べ替え問題。see A do「Aが〜するのを見る」。〈暗記〉with his hat on「帽子をかぶったまま」はwith+A+副詞の形（⇨ PU!28）。"
  - id: "scr-141-p07"
    section_id: "Scr_141"
    drill: 1
    number: 555
    role: "exam"
    english: "It is said that some chimpanzees watch the evening sun sink below the horizon."
    japanese: "チンパンジーの中には夕日が沈むのを、じっと眺めているものもいるという。"
    notes: "出典: 立命館大。記述問題。watch A do「Aが〜するのを見守る」。watchは動く対象を関心を持ってじっと目で追う場合に用いる。"
  - id: "scr-141-e01"
    section_id: "Scr_141"
    drill: 0
    number: 0
    role: "example"
    english: "He helped to build the boat."
    japanese: "彼はそのボートを作る手助けをした。"
    notes: "問552解説例文。help (to) doの目的語A省略パターン。help A (to) doのAが省かれることもある。"

