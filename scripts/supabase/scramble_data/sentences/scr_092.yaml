    english: "Soseki Natsume is a man for whom I have the greatest respect."
    japanese: "夏目漱石は私が最も尊敬している人物です。"
    notes: "難易度: 頻出。出典: 神奈川大。前置詞＋関係代名詞 for whom（have respect for ～の for が前に移動）"
  - id: "scr-092-p02"
    section_id: "Scr_092"
    drill: 1
    number: 351
    role: "exam"
    english: "The bed I slept in last night wasn't very comfortable."
    japanese: "私が昨晩寝たベッドはあまり心地よくなかった。"
    notes: "難易度: 頻出。出典: 慶應大。前置詞の後置＋目的格関係代名詞の省略。参照: PU!51（not very「あまり～でない」）"
  - id: "scr-092-p03"
    section_id: "Scr_092"
    drill: 1
    number: 352
    role: "exam"
    english: "Are there any good tools with which to fix the broken desk?"
    japanese: "壊れた机を直したいのですが、何かよい道具はありますか。"
    notes: "難易度: 発展。出典: 成蹊大。整序問題（1語不要: what）。前置詞＋関係代名詞＋to不定詞"

