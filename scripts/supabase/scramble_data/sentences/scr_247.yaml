sentences:
  - id: "scr-247-p01"
    section_id: "Scr_247"
    drill: 1
    number: 1276
    role: "exam"
    english: "Because of the heavy rain, the baseball game was postponed."
    japanese: "大雨のために，野球の試合は延期された。"
    notes: "〈基本〉〈超頻〉阪南大。because of〜「〜のために」。on account of / owing to / due toとほぼ同意で入れかえ可。postpone「〜を延期する」(⇨922)。"
  - id: "scr-247-p02"
    section_id: "Scr_247"
    drill: 1
    number: 1277
    role: "exam"
    english: "The public library was closed on account of budget cuts."
    japanese: "その公共図書館は予算削減のために閉館になった。"
    notes: "〈頻出〉名城大。on account of〜「〜のために」(=because of)。"
  - id: "scr-247-p03"
    section_id: "Scr_247"
    drill: 1
    number: 1278
    role: "exam"
    english: "Owing to the spread of a new type of flu, the school festival is to be postponed."
    japanese: "新型インフルエンザの流行のために，学園祭は延期されることになっている。"
    notes: "〈頻出〉慶應大。owing to〜「〜のために」。is to be postponed「延期されることになっている」(⇨101)。"
  - id: "scr-247-p04"
    section_id: "Scr_247"
    drill: 1
    number: 1279
    role: "exam"
    english: "Due to bad weather, the flight has been canceled."
    japanese: "悪天候のため，フライトは欠航となった。"
    notes: "〈超頻〉due to〜「〜のために」(=because of)。群前置詞としての用法。"
  - id: "scr-247-p05"
    section_id: "Scr_247"
    drill: 1
    number: 1280
    role: "exam"
    english: "Thanks to their hard work, the construction was completed on time."
    japanese: "彼らが熱心に働いてくれたので，建築工事は予定通りに終わった。"
    notes: "〈基本〉〈頻出〉追手門学院大。thanks to〜「〜のおかげで」。皮肉な意味(〜のせいで)でも使用。"
  - id: "scr-247-p06"
    section_id: "Scr_247"
    drill: 1
    number: 1281
    role: "exam"
    english: "Tom always declines invitations to parties on the grounds of ill health."
    japanese: "トムはいつも病気を理由に，パーティーの招待を断っている。"
    notes: "南山大。on (the) grounds of〜「〜という理由で」。groundは「根拠・理由」。of〜の代わりにthat節も可。"
  - id: "scr-247-e01"
    section_id: "Scr_247"
    drill: 0
    number: 1276
    role: "example"
    english: "His failure was due to a lack of preparation."
    japanese: "彼の失敗は準備不足が原因だった。"
    notes: "〈重要〉be due to〜「〜のせいである」の補語用法。群前置詞用法と区別。"
  - id: "scr-247-e02"
    section_id: "Scr_247"
    drill: 0
    number: 1280
    role: "example"
    english: "Thanks to his error, we lost the game."
    japanese: "彼のエラーのせいで試合を落とした。"
    notes: "thanks to〜の皮肉な用法の例。「〜のせいで」。"

