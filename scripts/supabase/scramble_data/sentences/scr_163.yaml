sentences:
  - id: "scr-163-p01"
    section_id: "Scr_163"
    drill: 1
    number: 638
    role: "exam"
    english: "He did not study for the exam at all. He spent too much time playing video games."
    japanese: "彼はまったく試験勉強をしなかった。彼はあまりにも多くの時間をテレビゲームをするのに費やした。"
    notes: "出典: 神奈川大。〈基本〉〈頻出〉4択問題。timeは不可算名詞→much/littleで修飾。many/numerousは可算名詞用。spend A (in) doing「A（時間）を〜するのに費やす」（⇨ 124）。"
  - id: "scr-163-p02"
    section_id: "Scr_163"
    drill: 1
    number: 639
    role: "exam"
    english: "I'm glad to hear that my son made few mistakes in the exam."
    japanese: "私は、息子が試験でほとんど間違いをしなかったと聞いてうれしい。"
    notes: "出典: 名城大。〈基本〉〈頻出〉4択問題。fewは可算名詞について「ほとんど〜ない」（否定的）。I'm glad（うれしい）→否定的な意味のfewが適切。quite a few「かなり多くの」とa few「少しの」は肯定的。littleは不可算名詞用。"
  - id: "scr-163-p03"
    section_id: "Scr_163"
    drill: 1
    number: 640
    role: "exam"
    english: "I didn't eat lunch since I had little money."
    japanese: "私はお金がほとんどなかったので、昼食を食べなかった。"
    notes: "出典: 芝浦工大。〈基本〉〈頻出〉4択問題。moneyは不可算名詞（⇨ PU! 129）→little「ほとんど〜ない」が適切。a little「多少の」は肯定的。few/a fewは不可算名詞に使えない。"
  - id: "scr-163-p04"
    section_id: "Scr_163"
    drill: 1
    number: 641
    role: "exam"
    english: "Quite a few homeless people were coping with the cold last night."
    japanese: "かなり多くのホームレスの人々が、昨夜寒さをなんとか切り抜けようとしていた。"
    notes: "出典: 駒澤大。〈頻出〉4択問題。quite a few = many = not a few「かなり多くの」。複数扱い→wereが正解。last night→現在形areは不可。集合名詞people: 「人々」は常に単数形で複数扱い、「国民・民族」は可算名詞（peoples of Europe）。"
  - id: "scr-163-p05"
    section_id: "Scr_163"
    drill: 1
    number: 642
    role: "exam"
    english: "There is a great deal of pollution on the beaches this summer."
    japanese: "今年の夏の浜辺はたいへん汚れている。"
    notes: "出典: 城西大。4択問題。a great deal of〜「たくさんの〜/多量の〜」(= a lot of〜)。pollutionは不可算名詞。×a great lot ofという表現はない。"
  - id: "scr-163-p06"
    section_id: "Scr_163"
    drill: 1
    number: 643
    role: "exam"
    english: "A great number of people suffered from serious water shortages in various parts of the world last year."
    japanese: "昨年は世界のさまざまな所で、非常に多くの人々が深刻な水不足に苦しんだ。"
    notes: "出典: 名城大。〈頻出〉整序問題。a great number of〜「多くの〜」。〈比較〉a large [great] quantity of〜「大量の〜/多量の〜」。"
  - id: "scr-163-e01"
    section_id: "Scr_163"
    drill: 0
    number: 0
    role: "example"
    english: "He has a lot of coats."
    japanese: "彼はコートをたくさん持っている。"
    notes: "PU!144例文。a lot of / lots of / plenty ofは「数」にも「量」にも用いられる。可算名詞coats（複数形）とともに使用。"
  - id: "scr-163-e02"
    section_id: "Scr_163"
    drill: 0
    number: 0
    role: "example"
    english: "He has a lot of money."
    japanese: "彼は金をたくさん持っている。"
    notes: "PU!144例文。a lot of / lots of / plenty ofは「数」にも「量」にも用いられる。不可算名詞moneyとともに使用。"

