sentences:
  - id: "scr-236-p01"
    section_id: "Scr_236"
    drill: 1
    number: 1166
    role: "exam"
    english: "Be sure to make a reservation before going to the restaurant."
    japanese: "そのレストランに行く前に必ず予約するようにしなさい。"
    notes: "〈頻出〉高崎経済大。be sure to do/be bound to do「必ず〜する/きっと〜する」(=be certain to do)。"
  - id: "scr-236-p02"
    section_id: "Scr_236"
    drill: 1
    number: 1167
    role: "exam"
    english: "We are bound to be late if you don't hurry."
    japanese: "君が急がないと，私たちはきっと遅れるよ。"
    notes: "駒澤大。be bound to do「必ず〜する/きっと〜する」(=be certain to do)。boundはbind「束縛する」の過去分詞。"
  - id: "scr-236-p03"
    section_id: "Scr_236"
    drill: 1
    number: 1168
    role: "exam"
    english: "All the documents are supposed to be submitted by the end of this month."
    japanese: "すべての書類は今月末までに提出することになっています。"
    notes: "〈超頻〉中央大。be supposed to do「〜することになっている/〜すると思われている」。⇔be not supposed to do「〜してはいけない」。"
  - id: "scr-236-p04"
    section_id: "Scr_236"
    drill: 1
    number: 1169
    role: "exam"
    english: "If you're willing to join the team, just let us know."
    japanese: "チームに参加してもよいと思っているのなら，私たちに連絡してください。"
    notes: "〈頻出〉京都産業大。be willing to do「〜してもよいと思っている/〜するのをいとわない」。be ready to doほど積極的でない。"
  - id: "scr-236-p05"
    section_id: "Scr_236"
    drill: 1
    number: 1170
    role: "exam"
    english: "He seemed to be reluctant to join in the meeting."
    japanese: "彼は会合に参加するのは気が進まないようだった。"
    notes: "〈頻出〉名城大。be reluctant to do「〜するのは気が進まない」(=be unwilling to do)。"
  - id: "scr-236-p06"
    section_id: "Scr_236"
    drill: 1
    number: 1171
    role: "exam"
    english: "The idle are apt to miss a good chance."
    japanese: "怠け者は好機を逃しがちです。"
    notes: "九州産業大。be apt to do「〜しがちである」(=tend to do)。liable/prone/inclinedも同意。"
  - id: "scr-236-p07"
    section_id: "Scr_236"
    drill: 1
    number: 1172
    role: "exam"
    english: "Please feel free to have anything in the refrigerator."
    japanese: "冷蔵庫の中のものは何でもご自由にどうぞ。"
    notes: "青山学院大。be[feel] free to do「自由に〜できる」。Please feel free to doの形が頻出。"
  - id: "scr-236-p08"
    section_id: "Scr_236"
    drill: 1
    number: 1173
    role: "exam"
    english: "The company is likely to recover from the recent financial crisis."
    japanese: "その会社は近ごろの金融危機から回復する可能性が高い。"
    notes: "〈超頻〉藤女子大。be likely to do「〜しそう/可能性が高い」。⇔be unlikely to do。"
  - id: "scr-236-p09"
    section_id: "Scr_236"
    drill: 1
    number: 1174
    role: "exam"
    english: "She was about to leave home."
    japanese: "彼女はちょうど家を出るところだった。"
    notes: "〈頻出〉名古屋学院大。be about to do「まさに〜しようとしている」(=be on the point of doing)。going toより差し迫った未来。"
  - id: "scr-236-p10"
    section_id: "Scr_236"
    drill: 1
    number: 1175
    role: "exam"
    english: "He was forced to go back because of the bad weather."
    japanese: "彼は悪天候のため引き返さざるをえなかった。"
    notes: "武蔵大。be forced to do「〜せざるを得ない」(=be compelled to do/be obliged to do)。"
  - id: "scr-236-p11"
    section_id: "Scr_236"
    drill: 1
    number: 1176
    role: "exam"
    english: "Mr. Kubo hurried home because he was so anxious to meet his children."
    japanese: "クボさんは子どもたちに会いたい一心で，急いで帰宅した。"
    notes: "〈頻出〉白百合女子大。be anxious to do「しきりに〜したがっている」(=be eager to do)。be anxious for〜(⇨1134)。"
  - id: "scr-236-e01"
    section_id: "Scr_236"
    drill: 0
    number: 1166
    role: "example"
    english: "This train is bound for Hakata."
    japanese: "この列車は博多行きです。"
    notes: "〈重要〉be bound for〜「（乗り物が）〜行きである」。be bound to do（きっと〜する）との区別。"
  - id: "scr-236-e02"
    section_id: "Scr_236"
    drill: 0
    number: 1168
    role: "example"
    english: "You are not supposed to park here."
    japanese: "ここに駐車してはいけません。"
    notes: "比較。be not supposed to do「〜してはいけないことになっている」。否定形の用法。"
  - id: "scr-236-e03"
    section_id: "Scr_236"
    drill: 0
    number: 1171
    role: "example"
    english: "We are liable to make mistakes."
    japanese: "私たちは間違いを犯しがちだ。"
    notes: "プラスα。liable/prone/inclinedもapt同様「〜しがちである」の意。"
  - id: "scr-236-e04"
    section_id: "Scr_236"
    drill: 0
    number: 1176
    role: "example"
    english: "She is eager to see the results."
    japanese: "彼女は結果を見るのが待ち遠しい。"
    notes: "比較。be eager to do「〜を熱望している」。be anxious to doの同意表現。"

