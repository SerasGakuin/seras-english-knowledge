sentences:
  - id: "scr-183-p01"
    section_id: "Scr_183"
    drill: 1
    number: 719
    role: "exam"
    english: "He's in his early sixties, but he looks quite young for his age."
    japanese: "彼は60代初めなのに、年のわりにはとても若く見える。"
    notes: "出典: 成城大。4択問題。観点・基準のfor「〜にしては/〜のわりには」。for one's age「年のわりには」は頻出。at his ageは「彼の年齢で」の意味で不可。"
  - id: "scr-183-p02"
    section_id: "Scr_183"
    drill: 1
    number: 720
    role: "exam"
    english: "My mother and I often have a chat over a cup of tea."
    japanese: "母と私はお茶を飲みながらよくおしゃべりをする。"
    notes: "出典: 中部大。〈頻出〉4択問題。飲食・従事のover「〜しながら」。飲食物・本などの上に覆いかぶさる姿勢から。fall asleep over one's work [book]「仕事[読書]の最中に寝入る」。"
  - id: "scr-183-p03"
    section_id: "Scr_183"
    drill: 1
    number: 721
    role: "exam"
    english: "It warmed their hearts to see the elderly couple dancing to the music."
    japanese: "お年寄りのカップルが音楽に合わせて踊っているのを見て、彼らは心が温まった。"
    notes: "出典: 早大。4択問題。適合・一致のto「〜に合わせて」。dance to music「音楽に合わせて踊る」。tap to the rhythm「リズムに合わせて拍子をとる」。a job to one's liking [taste]「好みに合った職」。"
  - id: "scr-183-p04"
    section_id: "Scr_183"
    drill: 1
    number: 722
    role: "exam"
    english: "Despite the rain, there were a lot of spectators in the soccer stadium."
    japanese: "雨にもかかわらず、サッカースタジアムにはたくさんの観客がいた。"
    notes: "出典: 佛教大。〈頻出〉4択問題。譲歩のdespite「〜にもかかわらず」（= in spite of）。前置詞なので後には名詞/動名詞。although/thoughは接続詞で後にS+V（⇨ 436）。= Although it was raining, ...。"
  - id: "scr-183-p05"
    section_id: "Scr_183"
    drill: 1
    number: 723
    role: "exam"
    english: "She looks very much like her mother."
    japanese: "彼女は母親にとても似ている。"
    notes: "出典: 青山学院大。4択問題。類似のlike「〜に似た/〜のような」。⇔ 相違のunlike「〜と違って/〜に似ていない」。alikeは叙述用法のみで前置詞用法なし。"
  - id: "scr-183-p06"
    section_id: "Scr_183"
    drill: 1
    number: 724
    role: "exam"
    english: "Which shirt do you think suits me? Do you think I look better in white?"
    japanese: "どちらのシャツが私に似合うと思いますか。私は白いシャツのほうが似合うと思いますか。"
    notes: "出典: 青山学院大。〈頻出〉4択問題。着用のin「〜を身につけて/〜を着て」（= wearing）。色を表す語だけを伴う場合。疑問詞+do you think (+S) +V?（⇨ 249）。suit B「BにAが似合う」（⇨ 591）。"
  - id: "scr-183-p07"
    section_id: "Scr_183"
    drill: 1
    number: 725
    role: "exam"
    english: "Jiro has invited us to his birthday party. What should we get him as a gift?"
    japanese: "ジロウは私たちを誕生日パーティーに招待してくれた。贈り物として彼に何を買ってあげたらいいだろうか。"
    notes: "出典: センター。4択問題。役割・機能のas「〜として（の）」。接続詞のasは多くの意味があるが（⇨ Theme 107）、前置詞のasは多くの場合「〜として」。asに続く名詞が1人しかいない役職名の場合はふつう無冠詞。"
  - id: "scr-183-e01"
    section_id: "Scr_183"
    drill: 0
    number: 0
    role: "example"
    english: "Unlike cats, dogs need frequent walks."
    japanese: "猫とは違い、犬は頻繁に散歩が必要だ。"
    notes: "問723解説プラスα例文。相違のunlike「〜と違って」はlikeの反意語。"
  - id: "scr-183-e02"
    section_id: "Scr_183"
    drill: 0
    number: 0
    role: "example"
    english: "He acted as chairman."
    japanese: "彼は議長を務めた。"
    notes: "問725解説プラスα例文。役割・機能のas「〜として」。1人しかいない役職名はふつう無冠詞（×a chairman）。"

  - id: "scr-183-e03"
    section_id: "Scr_183"
    drill: 0
    number: 0
    role: "example"
    english: "The woman in the red dress is Ms. Smith."
    japanese: "赤いドレスを着ている女性はスミスさんです。"
    notes: "問724解説cf.例文。着用のin「〜を身につけて/〜を着て」。in+服装/色を表す語。"

