sentences:
  - id: "scr-113-p01"
    section_id: "Scr_113"
    drill: 1
    number: 436
    role: "exam"
    english: "Although Tokyo has a relatively small land area, it has a huge population."
    japanese: "東京は比較的小さな面積しかないが、非常に多くの人口を抱えている。"
    notes: "難易度: 頻出。出典: センター。although「〜だけれども」(= though)。butはこの位置では不可、despiteは前置詞、howeverは副詞"
  - id: "scr-113-p02"
    section_id: "Scr_113"
    drill: 1
    number: 437
    role: "exam"
    english: "I'd like to get it even if it costs me lots of money."
    japanese: "たとえ大金がかかっても、それを手に入れたい。"
    notes: "難易度: 頻出。出典: 立命館大。整序問題。even if「たとえ〜でも」— 仮定＋譲歩"
  - id: "scr-113-p03"
    section_id: "Scr_113"
    drill: 1
    number: 438
    role: "exam"
    english: "Different as Warren and Graham were, they shared something in common."
    japanese: "ウォーレンとグレアムは異なっていたが、どこか共通点があった。"
    notes: "難易度: 頻出。出典: 慶應大。形容詞+as+S+V「Sは〜だけれども」。= Though Warren and Graham were different。名詞が文頭→無冠詞: child as he is"
  - id: "scr-113-p04"
    section_id: "Scr_113"
    drill: 1
    number: 439
    role: "exam"
    english: "Whether Marina wins or loses, she always enjoys the competition."
    japanese: "勝とうが負けようが、マリナはいつも競争を楽しんでいる。"
    notes: "出典: 南山大。whether〜or...「〜であろうと…であろうと」— 譲歩。whether〜or not「〜であろうとなかろうと」の形も。名詞節のwhetherはTheme 106参照"
  - id: "scr-113-e01"
    section_id: "Scr_113"
    drill: 0
    number: 0
    role: "example"
    english: "We'll finish it, if it takes us all day."
    japanese: "1日中かかってもそれを仕上げてしまうつもりだ。"
    notes: "問437プラスα例文。ifだけでeven ifの意味を表す例"
  - id: "scr-113-e02"
    section_id: "Scr_113"
    drill: 0
    number: 0
    role: "example"
    english: "Rich as she is, she can afford to travel around the world."
    japanese: "彼女はお金持ちなので、世界中を旅行する余裕がある。"
    notes: "問438発展例文。形容詞+as+S+Vが「理由」を表す場合。文脈で判断"

