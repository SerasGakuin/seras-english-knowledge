sentences:
  - id: "scr-102-p01"
    section_id: "Scr_102"
    drill: 1
    number: 390
    role: "exam"
    english: "On birthdays, some people throw parties, receive gifts, and eat cake."
    japanese: "誕生日には、パーティーを開いたり、プレゼントを受け取ったり、ケーキを食べたりする人がいる。"
    notes: "難易度: 基本。出典: センター。正誤問題（③ receiving → receive）。andが3つの述語動詞（現在形）を結んでいる"
  - id: "scr-102-p02"
    section_id: "Scr_102"
    drill: 1
    number: 391
    role: "exam"
    english: "I think he is a very intelligent person, but many people don't agree with me."
    japanese: "私は彼のことをとても聡明な人だと思うが、私に同意しない人が多い。"
    notes: "難易度: 基本。出典: センター。前後の2文が対立する関係 → but。forでは文意が通らない。whichやwhoは後ろが完全な文なので不可"
  - id: "scr-102-p03"
    section_id: "Scr_102"
    drill: 1
    number: 392
    role: "exam"
    english: "It started snowing, so they had to stop playing tennis."
    japanese: "雪が降り始めた。それで彼らはテニスをやめなければならなかった。"
    notes: "難易度: 頻出。出典: 東京経済大。...(,) so (that) 〜「それで〜/だから〜」。soは本来副詞だが接続詞として結果を表す。参照: in spite of（→ 1282）"

