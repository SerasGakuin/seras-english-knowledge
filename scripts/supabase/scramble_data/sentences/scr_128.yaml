sentences:
  - id: "scr-128-p01"
    section_id: "Scr_128"
    drill: 1
    number: 496
    role: "exam"
    english: "A friend of mine decided to travel abroad for a while to find interesting activities to work on."
    japanese: "私の友人は、取り組むべき面白い活動を見つけるため、しばらくの間海外旅行をすることに決めた。"
    notes: "出典: 清泉女子大。〈基本〉4択問題。decide to do「〜することに決める」(= make up one's mind to do)。〈発展〉decide on doing も可。"
  - id: "scr-128-p02"
    section_id: "Scr_128"
    drill: 1
    number: 497
    role: "exam"
    english: "I hope to go to Canada next year."
    japanese: "来年、カナダに行きたいと思う。"
    notes: "出典: 大阪電通大。4択問題。hope to do「〜したいと思う」。hope for の後は（代）名詞なので ② for going は不可（⇨ 480）。hope は動名詞を目的語にとらない。"
  - id: "scr-128-p03"
    section_id: "Scr_128"
    drill: 1
    number: 498
    role: "exam"
    english: "The teacher promised to take the students to the library in the afternoon."
    japanese: "先生は、生徒たちを午後、図書館に連れて行くと約束した。"
    notes: "出典: 神奈川大。4択問題。promise to do「〜すると約束する」。"
  - id: "scr-128-p04"
    section_id: "Scr_128"
    drill: 1
    number: 499
    role: "exam"
    english: "This book is too expensive. I can't afford to buy it."
    japanese: "この本は高すぎる。私にはそれを買う余裕がない。"
    notes: "出典: センター。〈頻出〉4択問題。afford to do「〜する余裕がある」。afford は can を伴って通例否定文・疑問文で用いる。"
  - id: "scr-128-p05"
    section_id: "Scr_128"
    drill: 1
    number: 500
    role: "exam"
    english: "They failed to recognize how important the data was."
    japanese: "彼らはそのデータがどれほど重要か分かっていなかった。"
    notes: "出典: 藤女子大。〈頻出〉並べ替え問題。fail to do「〜しない/〜できない」(= be unable to do)。"
  - id: "scr-128-p06"
    section_id: "Scr_128"
    drill: 1
    number: 501
    role: "exam"
    english: "After a lot of problems she managed to learn to drive a car."
    japanese: "多くの困難の後、彼女はなんとか車の運転ができるようになった。"
    notes: "出典: センター。〈頻出〉4択問題。manage to do「なんとか〜する」(= succeed in doing ⇨ 996)。① gave up / ③ put off は動名詞を目的語にとるので不可。〈暗記〉learn to do「（努力で）〜するようになる」— learn も不定詞のみ。"
  - id: "scr-128-p07"
    section_id: "Scr_128"
    drill: 1
    number: 502
    role: "exam"
    english: "Ann pretended not to see John when she passed him on the street."
    japanese: "アンは通りでジョンとすれ違った時、彼に気づかないふりをした。"
    notes: "出典: 南山大。〈頻出〉4択問題。pretend to do「〜するふりをする」。pretend not to do の語順（not は to の前）。see「〜に気づく」(= notice)。pass「〜のそばを通り過ぎる/〜とすれ違う」。"
  - id: "scr-128-e01"
    section_id: "Scr_128"
    drill: 0
    number: 0
    role: "example"
    english: "Don't fail to post this letter."
    japanese: "必ずこの手紙を出してください。"
    notes: "PU!98例文。not fail to do「必ず〜する」— 1回限りの特定の行為に用いる。= Be sure to post this letter. = Don't forget to post this letter.（⇨ PU!53）。Don't [×Never] の使い分けに注意。"
  - id: "scr-128-e02"
    section_id: "Scr_128"
    drill: 0
    number: 0
    role: "example"
    english: "He never fails to call his mother on her birthday."
    japanese: "彼は母親の誕生日に必ず電話をする。"
    notes: "PU!98例文。never fail to do「必ず〜する」— 習慣的な行為に用いる。not fail to do（1回限り）との使い分けが重要。"

