sentences:
  - id: "scr-198-p01"
    section_id: "Scr_198"
    drill: 1
    number: 830
    role: "exam"
    english: "He was shocked at the awful news of the nuclear power plant accident which occurred overseas."
    japanese: "彼は海外で起きた原子力発電所の事故のひどいニュースを聞いてショックを受けた。"
    notes: "〈発展〉清泉女子大。awful=terrible「ひどい/おそろしい」。terrible⇔terrific「すばらしい」（反対の意味）。a terrific actor「すばらしい俳優」。"
  - id: "scr-198-p02"
    section_id: "Scr_198"
    drill: 1
    number: 831
    role: "exam"
    english: "This film is based on the story of a courageous man."
    japanese: "この映画は、ある勇敢な男の物語に基づいている。"
    notes: "東海大。courageous=brave「勇気のある/勇敢な」。"
  - id: "scr-198-p03"
    section_id: "Scr_198"
    drill: 1
    number: 832
    role: "exam"
    english: "It is rare to see a sky full of stars in the city."
    japanese: "都会で満天の星空が見えるのはまれだ。"
    notes: "rare=uncommon「まれな/珍しい」。rareは「貴重な」の含意。curious「珍奇な/奇妙な」とは異なる。a curious incident「奇妙な出来事」。"

