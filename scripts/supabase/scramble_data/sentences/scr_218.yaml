sentences:
  - id: "scr-218-p01"
    section_id: "Scr_218"
    drill: 1
    number: 966
    role: "exam"
    english: "It is difficult to come by this jewelry in my home country."
    japanese: "私の祖国ではこの宝石は入手しにくい。"
    notes: "阪南大。come by〜「〜を手に入れる」(=get/obtain)。"
  - id: "scr-218-p02"
    section_id: "Scr_218"
    drill: 1
    number: 967
    role: "exam"
    english: "I ran into my former teacher at the station last night."
    japanese: "昨晩、駅で偶然に恩師と出会った。"
    notes: "〈頻出〉高知大。run into〜「（人）に偶然出会う/〜にぶつかる」(=bump into)。run across〜も同意。"
  - id: "scr-218-p03"
    section_id: "Scr_218"
    drill: 1
    number: 968
    role: "exam"
    english: "I came across an interesting book at the bookstore."
    japanese: "私はその書店で、面白い本を偶然見つけた。"
    notes: "〈頻出〉東京理科大。come across〜「（物）を偶然見つける/（人）に偶然出会う」(=run across)。come acrossは物を見つける意味が多い。"
  - id: "scr-218-p04"
    section_id: "Scr_218"
    drill: 1
    number: 969
    role: "exam"
    english: "She doesn't like to depend on any man for support."
    japanese: "彼女は生活費をどんな男性にも頼りたくない。"
    notes: "〈基本〉〈超頻〉武蔵大。depend on[upon]〜 (A for B)「（Bを）Aに頼る」。rely on/count on/turn toも同意。"
  - id: "scr-218-p05"
    section_id: "Scr_218"
    drill: 1
    number: 970
    role: "exam"
    english: "He is not a man to rely on."
    japanese: "彼は頼れる男ではない。"
    notes: "〈頻出〉上智大。rely on〜「〜に頼る」(=depend on/count on)。"
  - id: "scr-218-p06"
    section_id: "Scr_218"
    drill: 1
    number: 971
    role: "exam"
    english: "You had better not count on your parents' support from now on."
    japanese: "これからは、親の援助を当てにしないほうがいいよ。"
    notes: "〈頻出〉千葉工大。count on〜「〜を当てにする」(=depend on/rely on)。"
  - id: "scr-218-p07"
    section_id: "Scr_218"
    drill: 1
    number: 972
    role: "exam"
    english: "She turned to her friend for advice."
    japanese: "彼女はアドバイスを友だちに求めた。"
    notes: "東京国際大。turn to〜「〜に頼る」(=depend on/rely on)。turn[look] to A for B「BをAに頼る」。"
  - id: "scr-218-p08"
    section_id: "Scr_218"
    drill: 1
    number: 973
    role: "exam"
    english: "Your success depends on your effort and luck."
    japanese: "あなたの成功は努力と運次第だ。"
    notes: "〈超頻〉愛知学院大。depend on[upon]〜（無生物主語）「〜次第である/〜によって決まる」。"
  - id: "scr-218-p09"
    section_id: "Scr_218"
    drill: 1
    number: 974
    role: "exam"
    english: "Top artists can sometimes be difficult to deal with."
    japanese: "一流の芸術家たちは、扱いが難しいことがある。"
    notes: "〈基本〉〈頻出〉東京理科大。deal with〜「〜を扱う/〜に対処する」(=treat/handle)。語句: A is+形容詞+to do(⇨96)。"
  - id: "scr-218-p10"
    section_id: "Scr_218"
    drill: 1
    number: 975
    role: "exam"
    english: "At that store they deal in fish and meat."
    japanese: "あの店では肉と魚を扱っている。"
    notes: "明治薬科大。deal in〜「〜を商品として扱う/〜を売る」。deal with〜との違いに注意。"
  - id: "scr-218-p11"
    section_id: "Scr_218"
    drill: 1
    number: 976
    role: "exam"
    english: "You are so tired you don't have the energy to cope with your children."
    japanese: "君はとても疲れているから、子供たちをうまく扱う気力がないのだ。"
    notes: "〈頻出〉上智大。cope with〜「〜にうまく対処する」。cope with〜 = deal with〜 successfully。"
  - id: "scr-218-p12"
    section_id: "Scr_218"
    drill: 1
    number: 977
    role: "exam"
    english: "The government aims at creating more job opportunities."
    japanese: "政府はより多くの雇用機会の創出を目指している。"
    notes: "aim at〜「〜をねらう/〜をめざす」。aim A at B「AをBに向ける」。"
  - id: "scr-218-p13"
    section_id: "Scr_218"
    drill: 1
    number: 978
    role: "exam"
    english: "He insisted on paying for the meal when we went out on a date."
    japanese: "私たちがデートに出かけたとき、彼は食事代を支払うと言い張った。"
    notes: "北星学園大。pay for〜「〜の代金を支払う」。pay A for B「Bの代金としてAを支払う」。"

