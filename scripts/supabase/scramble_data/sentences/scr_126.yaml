sentences:
  - id: "scr-126-p01"
    section_id: "Scr_126"
    drill: 1
    number: 481
    role: "exam"
    english: "After hard work, my father was lying in bed all day long."
    japanese: "激務の後、父は一日中ベッドで横になっていた。"
    notes: "出典: 名古屋学院大。〈基本〉〈頻出〉4択問題。自動詞 lie「横たわる/横になる」の現在分詞 lying。後ろに目的語がないので自動詞 lie を用いる。動作動詞なので過去進行形 was lying。④ laying は他動詞 lay の進行形なので不可。〈プラスα〉lie + C（形容詞/doing/done）「〜の状態で横になっている/〜の状態にある」"
  - id: "scr-126-p02"
    section_id: "Scr_126"
    drill: 1
    number: 482
    role: "exam"
    english: "She laid herself on the couch."
    japanese: "彼女はソファーに横になった。"
    notes: "出典: 関東学大。〈基本〉〈頻出〉4択問題。他動詞 lay「〜を横たえる」の過去形 laid。後ろに目的語 herself があるので他動詞 lay。〈暗記〉lay oneself「横になる」(= lie)（⇨ Theme 89）"
  - id: "scr-126-p03"
    section_id: "Scr_126"
    drill: 1
    number: 483
    role: "exam"
    english: "He laid the file on the table."
    japanese: "彼はテーブルの上にそのファイルを置いた。"
    notes: "出典: 立命館大。4択問題。他動詞 lay「〜を置く/〜をのせる」の過去形 laid。後ろに目的語 the file。② lay は lays なら可。"
  - id: "scr-126-p04"
    section_id: "Scr_126"
    drill: 1
    number: 484
    role: "exam"
    english: "This hen does not lay eggs at all these days."
    japanese: "このめんどりは最近まったく卵を産まない。"
    notes: "出典: 名城大。4択問題。他動詞 lay の原形。lay an egg「卵を産む」は連語で暗記。① bear は「（女性が子）を産む」(= have)の意味で不可。〈暗記〉not〜at all「まったく〜でない」(= not〜in the least)"
  - id: "scr-126-p05"
    section_id: "Scr_126"
    drill: 1
    number: 485
    role: "exam"
    english: "As the sun rose, the birds began to sing."
    japanese: "太陽が昇ると、鳥たちはさえずり始めた。"
    notes: "出典: 出典不明。〈基本〉〈頻出〉4択問題。自動詞 rise「（太陽・月・星が）昇る/出る」の過去形 rose。raise は他動詞なので不可。lift は自動詞としては「持ち上がる」の意味で不可。"
  - id: "scr-126-p06"
    section_id: "Scr_126"
    drill: 1
    number: 486
    role: "exam"
    english: "You just have to raise your hand and wave it until you are noticed."
    japanese: "気づいてもらえるまで、ただ手を上げて振りさえすればよい。"
    notes: "出典: 獨協大。〈基本〉〈頻出〉4択問題。他動詞 raise「（物・身体の一部）を上げる」。後ろに your hand（目的語）があるので他動詞。"
  - id: "scr-126-p07"
    section_id: "Scr_126"
    drill: 1
    number: 487
    role: "exam"
    english: "The price of fuel will be raised in response to the crisis."
    japanese: "危機に応じて、燃料価格は引き上げられるだろう。"
    notes: "出典: 関西学院大。4択問題。他動詞 raise「（価格・料金・税金）を上げる」の過去分詞 raised。受動態の文。"
  - id: "scr-126-e01"
    section_id: "Scr_126"
    drill: 0
    number: 0
    role: "example"
    english: "The cat lay asleep by the fireplace."
    japanese: "猫は暖炉のそばで眠っていた。"
    notes: "問481解説〈プラスα〉例文。lie + C（形容詞）「〜の状態で横になっている」の用法例。lay は lie の過去形。"

