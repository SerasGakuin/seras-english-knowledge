sentences:
  - id: "scr-257-p01"
    section_id: "Scr_257"
    drill: 1
    number: 1343
    role: "exam"
    english: "Excuse me, but where can I find the post office?"
    japanese: "すみませんが，郵便局はどちらでしょうか。"
    notes: "〈基本〉センター。Excuse me.「失礼ですが」(後ろにbutを入れることも多い。他の用法: ①「ちょっと失礼」人の前を通るとき、②「ごめんなさい」失礼なことをしたとき、③ Excuse me?「もう一度言ってくれますか」=Pardon?)。A: の行。"
  - id: "scr-257-p02"
    section_id: "Scr_257"
    drill: 1
    number: 1343
    role: "exam"
    english: "Go down this street. Turn right at the first light and you'll see it on the left."
    japanese: "この通りをずっと行ってください。最初の信号を右に曲がれば左手に見えるでしょう。"
    notes: "センター。go down A「Aをずっと行く」(downは「に沿って」=along。高低は関係ない)。Turn right[left] at A.「Aを右[左]に曲がってください」。B: の行。応答: That's right.「その通りです」(=That's for sure. 〈比較〉That's all right.は「いいんですよ」お礼・お詫びへの応答⇨1319)。"
  - id: "scr-257-p03"
    section_id: "Scr_257"
    drill: 1
    number: 1344
    role: "exam"
    english: "Could you tell me the way to the station?"
    japanese: "駅に行く道を教えていただけませんか。"
    notes: "大阪学院大。Could[Would] you tell me the way to A?=Could you tell me how to get to A?「Aに行く道を教えていただけませんか」。Couldのほうが丁寧。A: の行。"
  - id: "scr-257-p04"
    section_id: "Scr_257"
    drill: 1
    number: 1344
    role: "exam"
    english: "Sorry, I'm a stranger here too."
    japanese: "ごめんなさい，私もこの辺は初めてなんです。"
    notes: "大阪学院大。I'm a stranger (around) here.「この辺は初めてです」(⇨754)。B: の行。"
  - id: "scr-257-p05"
    section_id: "Scr_257"
    drill: 1
    number: 1345
    role: "exam"
    english: "Excuse me, how can I get downtown from here?"
    japanese: "すみませんが，ここから繁華街へ行くにはどうすればよいのでしょうか。"
    notes: "〈頻出〉名古屋外語大。How can I get to A?「Aにはどうやって行けばいいですか」。get[go] downtown「繁華街へ行く」(downtownは副詞。to downtown不可⇨PU!153)。A: の行。"
  - id: "scr-257-p06"
    section_id: "Scr_257"
    drill: 1
    number: 1345
    role: "exam"
    english: "You can go by bus."
    japanese: "バスで行けますよ。"
    notes: "名古屋外語大。go by bus「バスで行く」(by+無冠詞名詞⇨161。cf. on a bus)。B: の行。"
  - id: "scr-257-p07"
    section_id: "Scr_257"
    drill: 1
    number: 1345
    role: "exam"
    english: "How often do the buses run?"
    japanese: "バスはどれくらいの間隔で走っていますか。"
    notes: "名古屋外語大。How often〜?「どのくらいの頻度で〜？」(⇨242)。A: の行。応答: Every ten minutes.=Every tenth minute.「10分おきに」(every+基数+複数名詞⇨324)。"
  - id: "scr-257-p08"
    section_id: "Scr_257"
    drill: 1
    number: 1346
    role: "exam"
    english: "Here we are at the station. I hope you'll have a nice trip."
    japanese: "さあ，駅につきました。すてきな旅行をしてきてください。"
    notes: "城西大。Here we are.「(目的地に)さあ着きました」。〈比較〉Here you are.「はい，どうぞ」は相手に物を差し出すときの表現(⇨1353)。I hope〜「(望ましいことを予想して)〜と思う」(〈比較〉I'm afraid〜は望ましくないこと⇨PU!89)。A: の行。"
  - id: "scr-257-p09"
    section_id: "Scr_257"
    drill: 1
    number: 1346
    role: "exam"
    english: "Thank you very much for seeing me off."
    japanese: "見送りに来てくださってどうもありがとう。"
    notes: "城西大。see A off「Aを見送る」(⇨929)。B: の行。"

