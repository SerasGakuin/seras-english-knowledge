sentences:
  - id: "scr-191-p01"
    section_id: "Scr_191"
    drill: 1
    number: 777
    role: "exam"
    english: "It took me a long time to acquire the skills to become a professional interpreter."
    japanese: "プロの通訳になるための技能を身につけるのにずいぶん時間がかかった。"
    notes: "清泉女子大。acquire〜=obtain〜「得る/身につける」(=gain/come by)。"
  - id: "scr-191-p02"
    section_id: "Scr_191"
    drill: 1
    number: 778
    role: "exam"
    english: "Everyone in the class anticipates that there will be many problems with the new project."
    japanese: "クラスの誰もが、新しい学習課題にはたくさんの問題が出てくるだろうと予想している。"
    notes: "〈発展〉関東学院大。anticipate〜=expect〜「予想する/楽しみに待つ」(=look forward to)。project「計画/学習課題」。"
  - id: "scr-191-p03"
    section_id: "Scr_191"
    drill: 1
    number: 779
    role: "exam"
    english: "I cannot identify which substances cause my allergies."
    japanese: "どの物質が私のアレルギーを引き起こすのか特定できない。"
    notes: "関西外語大。identify〜=determine〜「特定する/確認する」。"
  - id: "scr-191-p04"
    section_id: "Scr_191"
    drill: 1
    number: 780
    role: "exam"
    english: "Such studies have helped to convince Katie and others that reduced sleep causes weight problems, not the reverse."
    japanese: "このような研究は、ケイティや他の人々に、睡眠時間の減少が体重の問題を引き起こすのであって、その逆ではないと納得させるのに役立ってきた。"
    notes: "上智大。convince〜=persuade〜「納得させる/確信させる」。the reverse「逆/反対」(=the opposite)。"
  - id: "scr-191-p05"
    section_id: "Scr_191"
    drill: 1
    number: 781
    role: "exam"
    english: "Forests vanish mainly when humans cut or burn them."
    japanese: "森林は主に人間がそれを伐採したり焼きはらったりする場合に消滅する。"
    notes: "〈発展〉京都工芸繊維大。vanish=disappear「（急に）消える/姿を消す」。"
  - id: "scr-191-p06"
    section_id: "Scr_191"
    drill: 1
    number: 782
    role: "exam"
    english: "Parking is banned on this street in the morning."
    japanese: "この通りは午前中、駐車禁止だ。"
    notes: "〈発展〉ban〜=prohibit〜「禁止する」(=forbid)。"
  - id: "scr-191-p07"
    section_id: "Scr_191"
    drill: 1
    number: 783
    role: "exam"
    english: "It is a well-known fact that smoking seriously affects the functioning of the heart and lungs."
    japanese: "喫煙が心臓や肺の機能に重大な影響を与えることはよく知られている事実だ。"
    notes: "東京理科大。affect〜=influence〜「影響を与える」(=impact)。"

