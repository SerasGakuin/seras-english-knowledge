sentences:
  - id: "scr-212-p01"
    section_id: "Scr_212"
    drill: 1
    number: 899
    role: "exam"
    english: "Information technology has brought about a great change in our lives."
    japanese: "ITは私たちの生活に大きな変化を引き起こした。"
    notes: "〈頻出〉清泉女子大。bring about〜「〜を引き起こす/〜をもたらす」(=cause/lead to)。自動詞come about「起こる」(⇨883・PU!187)と対。"
  - id: "scr-212-p02"
    section_id: "Scr_212"
    drill: 1
    number: 900
    role: "exam"
    english: "She brings up her children with a lot of love."
    japanese: "彼女は自分の子供たちを、たくさんの愛情を込めて育てている。"
    notes: "〈基本〉〈頻出〉東京経済大。bring up〜「〜を育てる」(=raise/rear)。grow up(自)「育つ」と混同注意。"
  - id: "scr-212-p03"
    section_id: "Scr_212"
    drill: 1
    number: 901
    role: "exam"
    english: "George made up his whole life story, so nothing he said was true."
    japanese: "ジョージは自分の人生の話をすべてでっち上げたので、彼の言ったことは1つも真実ではなかった。"
    notes: "東京経済大。make up〜「〜をでっち上げる/〜を作り上げる」(=invent⇨740)。自動詞用法「仲直りする/化粧する」も重要。"
  - id: "scr-212-p04"
    section_id: "Scr_212"
    drill: 1
    number: 902
    role: "exam"
    english: "John spoke English so fast that we couldn't make out what he said."
    japanese: "ジョンは非常に速く英語をしゃべったので、我々は何を言ったのか理解できなかった。"
    notes: "〈頻出〉名古屋学院大。make out〜「〜を理解する」(=understand/comprehend)。figure out〜も同意。"
  - id: "scr-212-p05"
    section_id: "Scr_212"
    drill: 1
    number: 903
    role: "exam"
    english: "I couldn't figure out what she was trying to say."
    japanese: "私は彼女が言おうとしていることが理解できなかった。"
    notes: "〈頻出〉東海大。figure out〜「〜を理解する」(=understand)。figure out〜には「〜を解決する」(=solve)の意味も。"
  - id: "scr-212-p06"
    section_id: "Scr_212"
    drill: 1
    number: 904
    role: "exam"
    english: "Could you pick me up in the car park next to the station tonight?"
    japanese: "今夜、駅の隣の駐車場まで車で迎えに来ていただけませんか。"
    notes: "〈頻出〉学習院大。pick up〜「〜を車で迎えに行く」。pick me upの語順に注意(⇨PU!188)。pick up〜には他に「（言語・知識を）身につける」「〜を買う」の意味も。"
  - id: "scr-212-p07"
    section_id: "Scr_212"
    drill: 1
    number: 905
    role: "exam"
    english: "Kate picked out five beautiful peaches."
    japanese: "ケイトは5つのきれいな桃を選んだ。"
    notes: "中部大。pick out〜「〜を選ぶ」(=select/choose)。「ピックアップする」は和製英語。pick upには「選ぶ」の意味はない。"
  - id: "scr-212-p08"
    section_id: "Scr_212"
    drill: 1
    number: 906
    role: "exam"
    english: "He went to Africa never to return; he was given up for dead."
    japanese: "彼はアフリカへ行ったきり戻って来なかった。彼は死んだものとあきらめられていた。"
    notes: "〈基本〉〈頻出〉札幌大。give up〜「〜をあきらめる/〜を捨てる」(=abandon)。give up〜for dead「〜を死んだものとあきらめる」。give up doing「（悪習を）やめる」(⇨PU!96)。"
  - id: "scr-212-p09"
    section_id: "Scr_212"
    drill: 1
    number: 907
    role: "exam"
    english: "Unknown words should be looked up in a dictionary."
    japanese: "知らない単語は辞書で調べるべきです。"
    notes: "南山大。look up〜「（辞書・コンピューターなどを使って）〜を調べる」。"
  - id: "scr-212-e01"
    section_id: "Scr_212"
    drill: 0
    number: 900
    role: "example"
    english: "I grew up in a small town by the sea."
    japanese: "私は海辺の小さな町で育った。"
    notes: "プラスα。grow up(自)「育つ」。bring up〜(他)「〜を育てる」と対比。"
  - id: "scr-212-e02"
    section_id: "Scr_212"
    drill: 0
    number: 901
    role: "example"
    english: "After their argument, they decided to make up."
    japanese: "けんかの後、彼らは仲直りすることにした。"
    notes: "プラスα。make upの自動詞用法「仲直りする」。"
  - id: "scr-212-e03"
    section_id: "Scr_212"
    drill: 0
    number: 902
    role: "example"
    english: "I can't figure out this math problem."
    japanese: "この数学の問題が解けない。"
    notes: "プラスα。figure out〜の「〜を解決する」(=solve)用法。"
  - id: "scr-212-e04"
    section_id: "Scr_212"
    drill: 0
    number: 904
    role: "example"
    english: "He picked up some French while living in Paris."
    japanese: "彼はパリに住んでいる間にフランス語を少し身につけた。"
    notes: "プラスα。pick up〜の「（言語・知識を）身につける」用法。"
  - id: "scr-212-e05"
    section_id: "Scr_212"
    drill: 0
    number: 906
    role: "example"
    english: "He gave up smoking 15 years ago."
    japanese: "彼は15年前にタバコをやめた。"
    notes: "プラスα。give up doing「（悪習を）やめる」(⇨PU!96)。"

