sentences:
  - id: "scr-167-p01"
    section_id: "Scr_167"
    drill: 1
    number: 655
    role: "exam"
    english: "Do you know how large the population of Tokyo is?"
    japanese: "東京の人口はどれくらいか知っていますか。"
    notes: "出典: 清泉女子大。4択問題。population「人口」の「多い/少ない」はlarge/small。= Do you know what the population of Tokyo is? = Do you know how many people there are in Tokyo?"
  - id: "scr-167-p02"
    section_id: "Scr_167"
    drill: 1
    number: 656
    role: "exam"
    english: "The number of travelers who visit Japan is very large."
    japanese: "日本を訪れる旅行者の数は非常に多い。"
    notes: "出典: 群馬大。4択問題。number「数」の「多い/少ない」はlarge/small。The number of B（複数名詞）「Bの数」→単数扱い。A number of B（複数名詞）「たくさんのB」→複数扱い。"
  - id: "scr-167-e01"
    section_id: "Scr_167"
    drill: 0
    number: 0
    role: "example"
    english: "A number of people were waiting outside the store."
    japanese: "たくさんの人々が店の外で待っていた。"
    notes: "問656解説例文。A number of B（複数名詞）「たくさんのB」は複数扱い→wereが正しい。The number of B→単数扱いとの対比が重要。"
  - id: "scr-167-p03"
    section_id: "Scr_167"
    drill: 1
    number: 657
    role: "exam"
    english: "The soccer game was shown on a big screen in front of a large audience."
    japanese: "そのサッカーの試合は大観衆の前の大きなスクリーンに映し出された。"
    notes: "出典: センター。4択問題。audience「観衆」の「多い/少ない」はlarge/small。"
  - id: "scr-167-p04"
    section_id: "Scr_167"
    drill: 1
    number: 658
    role: "exam"
    english: "The crowd was larger than usual because it was a holiday."
    japanese: "休日だったので、群衆はいつもより多かった。"
    notes: "4択問題。crowd「群衆」の「多い/少ない」はlarge/small。thanがあるので比較級larger。"
  - id: "scr-167-e02"
    section_id: "Scr_167"
    drill: 0
    number: 0
    role: "example"
    english: "This park is so small that it only has one bench."
    japanese: "この公園はとても狭いので、ベンチが1つしかない。"
    notes: "PU!151〈発展〉例文。large/smallには「面積が広い/狭い」の意味もある。wide/narrow「幅が広い/狭い」と混同しない。"

