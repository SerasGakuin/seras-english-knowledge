sentences:
  - id: "scr-214-p01"
    section_id: "Scr_214"
    drill: 1
    number: 919
    role: "exam"
    english: "Because of the recent scandal, the company had to lay off more than one hundred employees."
    japanese: "最近のスキャンダルのせいで、その会社は100人以上の従業員を解雇しなければならなかった。"
    notes: "北海学園大。lay off〜「〜を一時解雇する」。layoff(名)「一時解雇/レイオフ」。"
  - id: "scr-214-p02"
    section_id: "Scr_214"
    drill: 1
    number: 920
    role: "exam"
    english: "He made it a rule to put aside a certain sum every month."
    japanese: "彼は毎月一定額を貯金することにしていた。"
    notes: "愛知工大。put aside〜「〜を蓄える/〜をとっておく」(=put by/save)。lay aside/set asideも同意。"
  - id: "scr-214-p03"
    section_id: "Scr_214"
    drill: 1
    number: 921
    role: "exam"
    english: "Put everything away neatly."
    japanese: "すべてのものをきちんと片づけなさい。"
    notes: "西南学院大。put away〜「〜を片づける」(=clear/tidy)。目的語がeverything(代名詞)なのでput everything awayの語順。put away〜には「〜を蓄える」(=put aside)の意味も。"
  - id: "scr-214-p04"
    section_id: "Scr_214"
    drill: 1
    number: 922
    role: "exam"
    english: "Jason decided to put off taking his summer vacation because he was too busy at work."
    japanese: "仕事がとても忙しかったので、ジェイソンは夏期休暇をとるのを先延ばしにすることに決めた。"
    notes: "〈基本〉〈超頻〉南山大。put off〜「〜を延期する」(=postpone)。"
  - id: "scr-214-p05"
    section_id: "Scr_214"
    drill: 1
    number: 923
    role: "exam"
    english: "You'd better put on a coat when you go out. It's really cold today."
    japanese: "出かけるときはコートを着て行きなさい。今日は本当に寒いから。"
    notes: "〈基本〉亜細亜大。put on〜「〜を着る/身につける」(⇔take off〜「〜を脱ぐ」⇨897)。"
  - id: "scr-214-p06"
    section_id: "Scr_214"
    drill: 1
    number: 924
    role: "exam"
    english: "This is a cool hat! Can I try it on?"
    japanese: "すてきな帽子ですね。試着してもいいですか。"
    notes: "〈基本〉try on〜「〜を試しに着て［はいて/かぶって］みる」。try it onの語順(⇨PU!188)。"
  - id: "scr-214-p07"
    section_id: "Scr_214"
    drill: 1
    number: 925
    role: "exam"
    english: "The long sail across the Atlantic Ocean wore us out."
    japanese: "大西洋を横断する長い航海によって、私たちは疲れ果てた。"
    notes: "日本女子大。wear out〜「〜を疲れ果てさせる」。元の意味は「〜をすり減らす/〜を使い古す」。"
  - id: "scr-214-p08"
    section_id: "Scr_214"
    drill: 1
    number: 926
    role: "exam"
    english: "Put down your name on the last line of this document."
    japanese: "この書類の最後の行にあなたの名前を書いてください。"
    notes: "日本女子大。put down〜「（考え・名前など）を書き留める」(=write down)。"
  - id: "scr-214-p09"
    section_id: "Scr_214"
    drill: 1
    number: 927
    role: "exam"
    english: "John was able to hold back anger and avoid a fight."
    japanese: "ジョンは怒りを抑え、けんかを避けることができた。"
    notes: "明海大。hold back〜「（感情など）を抑える/控える」(=restrain)。自動詞用法「しり込みする/ためらう」(=hesitate)も。"
  - id: "scr-214-p10"
    section_id: "Scr_214"
    drill: 1
    number: 928
    role: "exam"
    english: "The government set up a commission to inquire into the problem of unemployment."
    japanese: "政府は失業問題を調査するために委員会を設立した。"
    notes: "立教大。set up〜「〜を設立する」(=establish/found)。"
  - id: "scr-214-p11"
    section_id: "Scr_214"
    drill: 1
    number: 929
    role: "exam"
    english: "A large number of people have come to the airport to see her off."
    japanese: "多くの人が彼女を見送るために空港に来た。"
    notes: "金沢工大。see〜off「〜を見送る」(⇔meet「〜を出迎える」)。名詞目的語でもsee her offの語順がふつう。"
  - id: "scr-214-e01"
    section_id: "Scr_214"
    drill: 0
    number: 921
    role: "example"
    english: "Emily put away some money for her vacation."
    japanese: "エミリーは休暇のためにお金をためた。"
    notes: "プラスα。put away〜の「〜を蓄える」(=put aside)用法。"

