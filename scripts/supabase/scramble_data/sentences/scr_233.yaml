sentences:
  - id: "scr-233-p01"
    section_id: "Scr_233"
    drill: 1
    number: 1132
    role: "exam"
    english: "Oranges are often said to be rich in vitamin C."
    japanese: "オレンジはビタミンCが豊富だとよく言われる。"
    notes: "〈基本〉中央大。be rich in〜「〜に富んでいる」(=be abundant in/abound in)。⇔be poor in〜「〜に乏しい」。"
  - id: "scr-233-p02"
    section_id: "Scr_233"
    drill: 1
    number: 1133
    role: "exam"
    english: "Some people are very particular about what they eat."
    japanese: "食べ物の好みにとてもうるさい人もいる。"
    notes: "中部大。be particular about〜「〜について好みがうるさい/〜にこだわる」。"
  - id: "scr-233-p03"
    section_id: "Scr_233"
    drill: 1
    number: 1134
    role: "exam"
    english: "People all over the world are anxious for peace."
    japanese: "世界中の人々が平和を切望している。"
    notes: "拓殖大。be anxious for〜「〜を切望している」(=wish for)。比較: be anxious to do(⇨1176)。"
  - id: "scr-233-p04"
    section_id: "Scr_233"
    drill: 1
    number: 1135
    role: "exam"
    english: "I heard a friend of mine went into the hospital, and I am anxious about his condition."
    japanese: "友人が入院したと聞き，彼の状態を心配している。"
    notes: "中央大。be anxious about〜/be concerned about〜「〜を心配している」(=be worried about)。比較: be concerned with〜「〜に関係している/〜に関心がある」。"
  - id: "scr-233-p05"
    section_id: "Scr_233"
    drill: 1
    number: 1136
    role: "exam"
    english: "Mike doesn't look well. I'm really concerned about his health."
    japanese: "マイクは具合が悪そうです。彼の健康状態が本当に心配です。"
    notes: "〈頻出〉南山大。be concerned about〜「〜を心配している」(=be worried about)。"
  - id: "scr-233-p06"
    section_id: "Scr_233"
    drill: 1
    number: 1137
    role: "exam"
    english: "The café is very popular with the staff in the office."
    japanese: "そのカフェはオフィスのスタッフにとても人気がある。"
    notes: "〈基本〉be popular with[among]〜「〜に人気がある」。withは「〜に対して」で対象を表す。"
  - id: "scr-233-p07"
    section_id: "Scr_233"
    drill: 1
    number: 1138
    role: "exam"
    english: "I was confronted with many problems."
    japanese: "私は多くの問題に直面していた。"
    notes: "東海大。be confronted with〜「〜に直面している」(=be faced with)。confront=face(⇨846)。"
  - id: "scr-233-p08"
    section_id: "Scr_233"
    drill: 1
    number: 1139
    role: "exam"
    english: "He is entirely dependent on his father."
    japanese: "彼は父親にまったく頼りきっている。"
    notes: "〈基本〉〈頻出〉神奈川大。be dependent on[upon]〜「〜に頼っている/〜に依存している」。"
  - id: "scr-233-p09"
    section_id: "Scr_233"
    drill: 1
    number: 1140
    role: "exam"
    english: "Mary is independent of her parents."
    japanese: "メアリーは両親から独立している。"
    notes: "〈頻出〉be independent of〜「〜から独立している」。dependentはon、independentはofと前置詞が異なる。"
  - id: "scr-233-p10"
    section_id: "Scr_233"
    drill: 1
    number: 1141
    role: "exam"
    english: "This is true of all people to some degree."
    japanese: "これはすべての人にある程度あてはまる。"
    notes: "西南学院大。be true of〜「〜に当てはまる」(=apply to)。to some degree「ある程度は」(⇨1255)。"
  - id: "scr-233-p11"
    section_id: "Scr_233"
    drill: 1
    number: 1142
    role: "exam"
    english: "She is always true to her beliefs."
    japanese: "彼女は常に自分の信念に忠実だ。"
    notes: "〈発展〉be true to〜「〜に忠実である」(=be faithful to)。true to life「本物そっくりの」。"
  - id: "scr-233-p12"
    section_id: "Scr_233"
    drill: 1
    number: 1143
    role: "exam"
    english: "Japan is subject to earthquakes."
    japanese: "日本は地震が起こりやすい。"
    notes: "〈頻出〉〈発展〉清泉女子大。be subject to〜「〜の影響を受けやすい/〜にかかりやすい」。"
  - id: "scr-233-e01"
    section_id: "Scr_233"
    drill: 0
    number: 1135
    role: "example"
    english: "The book is concerned with the history of Japan."
    japanese: "その本は日本の歴史に関するものだ。"
    notes: "比較。be concerned with〜「〜に関係している/〜に関心がある」(=be interested in)。aboutとの区別が重要。"
  - id: "scr-233-e02"
    section_id: "Scr_233"
    drill: 0
    number: 1143
    role: "example"
    english: "Children are subject to colds in the winter."
    japanese: "子どもは冬に風邪をひきやすい。"
    notes: "プラスα。be subject to〜の別用例。"

