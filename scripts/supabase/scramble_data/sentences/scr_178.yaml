sentences:
  - id: "scr-178-p01"
    section_id: "Scr_178"
    drill: 1
    number: 698
    role: "exam"
    english: "The thief ran away in the direction of the beach."
    japanese: "泥棒はビーチのほうへ走り去った。"
    notes: "出典: 立命館大。4択問題。in the direction of〜「〜の方向へ」。directionに惑わされてforを選択しないこと。〈発展〉in all directions = in every direction「四方八方に」。"
  - id: "scr-178-p02"
    section_id: "Scr_178"
    drill: 1
    number: 699
    role: "exam"
    english: "The sun rises in the east and sets in the west."
    japanese: "太陽は東から昇り西に沈む。"
    notes: "〈基本〉4択問題。方向・方角を表すin。日本語の「〜から」に惑わされて×rises from the eastとしないこと。"
  - id: "scr-178-p03"
    section_id: "Scr_178"
    drill: 1
    number: 700
    role: "exam"
    english: "I would often go fishing in that river with my sister when I was a child."
    japanese: "子供のころ姉とよくあの川に釣りに行った。"
    notes: "出典: 慶應大。1語不要の整序問題（toが不要）。go doing in [at/on] A「A（場所）に〜しに行く」（⇨ PU!161）。日本語の「〜に」に惑わされて×go fishing to the riverとしないこと。"
  - id: "scr-178-p04"
    section_id: "Scr_178"
    drill: 1
    number: 701
    role: "exam"
    english: "The hotel is located within two miles of the station."
    japanese: "そのホテルは駅から2マイル以内のところにある。"
    notes: "出典: 亜細亜大。4択問題。within A of B「B（場所）からA（距離）以内に」。「〜から」に惑わされてofをfromにしないこと。ofは分離を表す（offの弱形）。"
  - id: "scr-178-p05"
    section_id: "Scr_178"
    drill: 1
    number: 702
    role: "exam"
    english: "This problem is too hard to solve. So you had better begin with that one."
    japanese: "この問題は難しくて解けない。だから、あなたはあの問題から始めたほうがよい。"
    notes: "出典: 静岡大。記述問題。begin with〜「〜から始める」。「〜から」に惑わされて×begin fromとしないこと。to begin with「まず第一に」（⇨ PU!24）。begin at [on/in]〜「〜から始まる」（⇨ 685）。"
  - id: "scr-178-p06"
    section_id: "Scr_178"
    drill: 1
    number: 703
    role: "exam"
    english: "He ordered another bottle of soda water from the waiter."
    japanese: "彼はウエイターに炭酸水をもう一本注文した。"
    notes: "出典: 獨協医大。4択問題。order A from B「AをB（店・場所・人）に注文する」。「〜に注文する」に惑わされて×order A to Bとしないこと。"
  - id: "scr-178-p07"
    section_id: "Scr_178"
    drill: 1
    number: 704
    role: "exam"
    english: "Lifetime employment was a key to Japan's postwar economic success."
    japanese: "戦後日本の経済成長の秘訣は終身雇用制度にあった。"
    notes: "出典: 成城大。4択問題。a [the] key to〜「（成功など）の秘訣/（理解・解決など）の手がかり」。付属・付着を表すto。×the key of〜としないこと。"
  - id: "scr-178-e01"
    section_id: "Scr_178"
    drill: 0
    number: 0
    role: "example"
    english: "The children ran in all directions."
    japanese: "子どもたちは四方八方に走って行った。"
    notes: "問698解説〈発展〉例文。in all directions = in every direction「四方八方に」。"
  - id: "scr-178-e02"
    section_id: "Scr_178"
    drill: 0
    number: 0
    role: "example"
    english: "We live within ten minutes' walk of my parents' house."
    japanese: "私たちは、私の両親の家から歩いて10分以内のところに住んでいます。"
    notes: "問701解説例文。within A of B「B（場所）からA（距離・時間）以内に」の用法を示す。"

