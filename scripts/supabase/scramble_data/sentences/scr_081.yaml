sentences:
  - id: "scr-081-p01"
    section_id: "Scr_081"
    drill: 1
    number: 297
    role: "exam"
    english: "People find it extremely difficult to concentrate when they are tired."
    japanese: "疲れている時、集中するのは非常に難しい。"
    notes: "難易度: 頻出。出典: 中央大。find it ... to do「～するのは…だとわかる」"
  - id: "scr-081-p02"
    section_id: "Scr_081"
    drill: 1
    number: 298
    role: "exam"
    english: "I think it better not to go out because it is raining today."
    japanese: "今日は雨だから、外に出ない方がいいでしょう。"
    notes: "出典: 中央大。整序問題。think it ... to do「～することは…と思う」"
  - id: "scr-081-p03"
    section_id: "Scr_081"
    drill: 1
    number: 299
    role: "exam"
    english: "The Internet makes it possible for anyone to obtain large amounts of information."
    japanese: "インターネットにアクセスすると、だれでも大量の情報を得ることができる。"
    notes: "出典: 成蹊大。整序問題。make it possible for A to do。enablesが不要"
  - id: "scr-081-p04"
    section_id: "Scr_081"
    drill: 1
    number: 300
    role: "exam"
    english: "I make it a rule to walk one hour a day."
    japanese: "1日に1時間は歩くようにしている。"
    notes: "難易度: 頻出。出典: 名古屋学院大。整序問題。make it a rule to do「いつも～することにしている」。= be in the habit of doing"
  - id: "scr-081-p05"
    section_id: "Scr_081"
    drill: 1
    number: 301
    role: "exam"
    english: "I took it for granted that you would like Italian food."
    japanese: "あなたはもちろんイタリア料理が好きだろうと思った。"
    notes: "難易度: 頻出。出典: 成城大。take it for granted that節「～を当然のことと思う」。take A for B（⇨ 問1035）のBにgrantedが来た形"
  - id: "scr-081-p06"
    section_id: "Scr_081"
    drill: 1
    number: 302
    role: "exam"
    english: "Please see to it that all the doors are locked."
    japanese: "必ずすべてのドアに鍵をかけておいてください。"
    notes: "難易度: 頻出。出典: 専修大。see (to it) that節「～するように取り計らう」（= make sure that節 ⇨ 問1118）。口語では to it を省略"

