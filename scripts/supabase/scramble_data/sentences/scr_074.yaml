sentences:
  - id: "scr-074-p01"
    section_id: "Scr_074"
    drill: 1
    number: 270
    role: "exam"
    english: "Not all of us can dance well."
    japanese: "私たち全員がうまく踊れるわけではない。"
    notes: "難易度: 頻出。出典なし。not all =「すべてが～というわけではない」（部分否定）。全体否定: None of us can dance well."
  - id: "scr-074-p02"
    section_id: "Scr_074"
    drill: 1
    number: 271
    role: "exam"
    english: "I didn't read both of the books."
    japanese: "私はその本の両方を読んだわけではない。"
    notes: "出典なし。not both =「両方とも～というわけではない」（部分否定）。全体否定: I didn't read either / I read neither"
  - id: "scr-074-p03"
    section_id: "Scr_074"
    drill: 1
    number: 272
    role: "exam"
    english: "You do not necessarily have to know what you are talking about to get media attention."
    japanese: "メディアで注目されるには、語っていることについて必ずしも知っている必要はない。"
    notes: "難易度: 頻出。出典: 東京理科大。not necessarily =「必ずしも～というわけではない」（部分否定）"
  - id: "scr-074-p04"
    section_id: "Scr_074"
    drill: 1
    number: 273
    role: "exam"
    english: "What he told us about his past does not seem to be altogether true."
    japanese: "彼の過去についての話は、完全に本当のことというわけではなさそうだ。"
    notes: "出典なし。整序問題。not altogether =「まったく～というわけではない」。altogether の代わりに quite/entirely/wholly/completely も同意"
  - id: "scr-074-e01"
    section_id: "Scr_074"
    drill: 0
    number: null
    role: "example"
    english: "I'm not very tall, just average."
    japanese: "背はあまり高くありません、ごくふつうです。"
    notes: "PU!51。not very =「あまり～でない」（部分否定）"
  - id: "scr-074-e02"
    section_id: "Scr_074"
    drill: 0
    number: null
    role: "example"
    english: "This dictionary is not exactly cheap, but it's worth the price."
    japanese: "この辞書は必ずしも安いとは言えないが、値段に見合った価値はある。"
    notes: "PU!51。not exactly =「正確には必ずしも～でない」（部分否定）"
  - id: "scr-074-e03"
    section_id: "Scr_074"
    drill: 0
    number: null
    role: "example"
    english: "I don't really like her."
    japanese: "私は彼女をそれほど好きでない。"
    notes: "PU!51。not really =「本当に～というわけではない/あまり～でない」（部分否定）"

