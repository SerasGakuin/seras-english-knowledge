sentences:
  - id: "scr-100-p01"
    section_id: "Scr_100"
    drill: 1
    number: 381
    role: "exam"
    english: "A reward will be given to whoever finds the missing cat."
    japanese: "謝礼金は、誰であれその迷子の猫を見つけた人に渡される。"
    notes: "難易度: 頻出。出典: 駒澤大。名詞節を導くwhoever「～する人は誰でも」(= anyone who)。whoever節全体が前置詞toの目的語"
  - id: "scr-100-p02"
    section_id: "Scr_100"
    drill: 1
    number: 382
    role: "exam"
    english: "You may order whatever you want."
    japanese: "欲しいものは何でも注文してよろしい。"
    notes: "出典: 大阪経済大。名詞節を導くwhatever「～するものは何でも」(= anything (that))。whatever節全体がorderの目的語"
  - id: "scr-100-p03"
    section_id: "Scr_100"
    drill: 1
    number: 383
    role: "exam"
    english: "He's determined to finish the job whatever happens."
    japanese: "彼は何が起ころうと、その仕事を終えようと決心している。"
    notes: "出典: 立命館大。副詞節を導くwhatever「何が～しても」(= no matter what)。whatever節は副詞節（譲歩）"
  - id: "scr-100-p04"
    section_id: "Scr_100"
    drill: 1
    number: 384
    role: "exam"
    english: "Please give me whatever information you get as soon as possible."
    japanese: "あなたが得たどんな情報でも、できるだけ早く私に教えてください。"
    notes: "出典: センター。複合関係形容詞whatever + 名詞「～するどんなAでも」(= any A (that))。名詞節"
  - id: "scr-100-p05"
    section_id: "Scr_100"
    drill: 1
    number: 385
    role: "exam"
    english: "Whoever may come to the door, tell them I am out."
    japanese: "たとえ誰が玄関にやって来ても、私は外出していると言ってくれ。"
    notes: "難易度: 頻出。出典: 駒澤大。whoever（譲歩の副詞節）= no matter who。助動詞mayは譲歩を強調（文語的）"
  - id: "scr-100-e01"
    section_id: "Scr_100"
    drill: 0
    number: 0
    role: "example"
    english: "You can take whichever bus you like."
    japanese: "どちらでも好きなバスに乗ってください。"
    notes: "PU!73補足例文。複合関係形容詞whichever + 名詞（名詞節）"
  - id: "scr-100-e02"
    section_id: "Scr_100"
    drill: 0
    number: 0
    role: "example"
    english: "Whichever train you take, you'll still arrive on time."
    japanese: "どの電車に乗っても、時間通りに着きますよ。"
    notes: "PU!73補足例文。複合関係形容詞whichever + 名詞（「譲歩」の副詞節 = no matter which）"

