sentences:
  - id: "scr-094-p01"
    section_id: "Scr_094"
    drill: 1
    number: 356
    role: "exam"
    english: "I'll give you what little money I have now."
    japanese: "わずかだが今もっているお金をすべて君にあげよう。"
    notes: "難易度: 発展。出典: 東海大。整序問題。what (few [little]) + 名詞「少ないながらも～するすべての…」（関係形容詞）"
  - id: "scr-094-p02"
    section_id: "Scr_094"
    drill: 1
    number: 357
    role: "exam"
    english: "My mother made me what I am today."
    japanese: "母のおかげで今日の私がある。"
    notes: "難易度: 頻出。出典: 日本女子大。what S is「現在のS」"
  - id: "scr-094-p03"
    section_id: "Scr_094"
    drill: 1
    number: 358
    role: "exam"
    english: "The scenery around here is quite different from what it used to be."
    japanese: "この辺の景色は昔とはかなり違う。"
    notes: "出典: 東京経済大。整序問題。what S used to be [was]「昔のS（の姿）」"
  - id: "scr-094-p04"
    section_id: "Scr_094"
    drill: 1
    number: 359
    role: "exam"
    english: "She learns fast, and what is more, she doesn't forget easily."
    japanese: "彼女は習得が速い。そのうえ、簡単には忘れない。"
    notes: "難易度: 頻出。出典: 北星学園大。what is more「その上/おまけに」(= besides / in addition)"
  - id: "scr-094-p05"
    section_id: "Scr_094"
    drill: 1
    number: 360
    role: "exam"
    english: "It was getting dark, and what was worse, we couldn't find our hotel."
    japanese: "暗くなっていた。そしてさらに悪いことに、泊まるホテルが見つからなかった。"
    notes: "出典: 立命館大。what is worse「さらに悪いことには」（本問は過去形 what was worse）⇔ what is better"
  - id: "scr-094-p06"
    section_id: "Scr_094"
    drill: 1
    number: 361
    role: "exam"
    english: "John is what is called a man of culture."
    japanese: "ジョンはいわゆる文化人［教養の高い人］です。"
    notes: "出典: 関東学院大。what is called「いわゆる」(= what we [you/they] call)。比較: so-called（不信・軽蔑の意を含むことがある）"
  - id: "scr-094-p07"
    section_id: "Scr_094"
    drill: 1
    number: 362
    role: "exam"
    english: "Reading is to the mind what food is to the body."
    japanese: "読書の精神に対する関係は、食物の肉体に対する関係に等しい。"
    notes: "難易度: 発展。出典: 武蔵大。整序問題。A is to B what C is to D「AとBの関係はCとDの関係と同じだ」(whatの代わりにasも可)"
  - id: "scr-094-e01"
    section_id: "Scr_094"
    drill: 0
    number: 0
    role: "example"
    english: "True friendship depends not so much on what someone has as on what they are."
    japanese: "真の友情は、財産よりもむしろ人柄に左右される。"
    notes: "問357プラスα例文。what S has「Sの財産」⇔ what S is「Sの人柄」。参照: 問191（not so much A as B「AというよりはむしろB」）"
  - id: "scr-094-e02"
    section_id: "Scr_094"
    drill: 0
    number: 0
    role: "example"
    english: "People are not always what they appear to be."
    japanese: "人は見かけによらない。"
    notes: "PU!69例文。what S appears [seems] to be「Sの見かけの姿」。部分否定 not always"

