sentences:
  - id: "scr-208-p01"
    section_id: "Scr_208"
    drill: 1
    number: 866
    role: "exam"
    english: "He was rejected by all the top schools in the country and it made him terribly depressed."
    japanese: "国内のトップ校をすべて不合格になったので、彼はひどく落ち込んだ。"
    notes: "上智大。語根press=push。depress「押し下げる/がっかりさせる」。選択肢: impress「感動させる」/express「表現する」/suppress「抑える」。"
  - id: "scr-208-p02"
    section_id: "Scr_208"
    drill: 1
    number: 867
    role: "exam"
    english: "Customers are expressing outrage at the charges banks impose on them for using automated teller machines."
    japanese: "顧客たちは、ATMの利用に対して銀行が彼らに課す手数料に怒りを表明している。"
    notes: "〈発展〉東京理科大。語根pose=put。impose「課す」。選択肢: compose「構成する」/dispose「処理する」/expose「さらす」。"
  - id: "scr-208-p03"
    section_id: "Scr_208"
    drill: 1
    number: 868
    role: "exam"
    english: "I assure you that the wedding will take place as planned."
    japanese: "結婚式は予定通り行われると私が保証します。"
    notes: "武蔵大。語根sure=safe。assure「保証する/安心させる」。選択肢: insure「保険をかける」/ensure「確実にする」/sure(形)「確かな」。assure A that〜「Aに〜を保証する」の形に注意。"
  - id: "scr-208-p04"
    section_id: "Scr_208"
    drill: 1
    number: 869
    role: "exam"
    english: "The fire reduced the house to ashes."
    japanese: "その火事で家は灰になった。"
    notes: "〈頻出〉南山大。語根duce=lead。reduce「減少させる/（ある状態に無理に）変える」。選択肢: induce「誘う」/produce「生産する」/introduce「導入する」。reduce A to B「AをBの状態に変える」。"
  - id: "scr-208-p05"
    section_id: "Scr_208"
    drill: 1
    number: 870
    role: "exam"
    english: "Please inform me when you know the results of the test."
    japanese: "テストの結果がわかったら私に知らせてください。"
    notes: "麗澤大。語根form=form。inform「知らせる」(⇨514)。選択肢: reform「改革する」/conform「一致させる」/perform「遂行する」。"

