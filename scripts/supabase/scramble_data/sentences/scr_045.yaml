    role: "exam"
    english: "Brenda suddenly turned her back and walked away with tears running down her cheeks."
    japanese: "ブレンダは突然背を向け、頬に涙を流しながら歩き去った。"
    notes: "難易度: 超頻出; 出典: 獨協大; 4択; with + A + doing（付帯状況のwith構文）; tearsとrunの間に能動関係「涙が流れる」→現在分詞"
  - id: "scr-045-p02"
    section_id: "Scr_045"
    drill: 1
    number: 157
    role: "exam"
    english: "He lay on the sofa with his arms folded and soon fell asleep."
    japanese: "彼は腕を組んでソファーに横たわっていたが、すぐに寝入ってしまった。"
    notes: "難易度: 頻出; 出典: センター; 4択; with + A + done（付帯状況のwith構文）; armsとfoldの間に受動関係「腕が組まれる」→過去分詞; 入試ではwith + A + doneの出題が多い; 語句: fall asleep「寝入る」(⇨634)"

  # === 例文（example）: PU!28 ===
  - id: "scr-045-e01"
    section_id: "Scr_045"
    drill: 0
    number: 1
    role: "example"
    english: "I saw a sheep with its wool cut short."
    japanese: "私は毛を短く切られた羊を見た。"
    notes: "PU!28発展; with句が直前の名詞を修飾する形容詞句になる場合; cutは過去分詞"

