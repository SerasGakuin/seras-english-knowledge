sentences:
  - id: "scr-068-p01"
    section_id: "Scr_068"
    drill: 1
    number: 245
    role: "exam"
    english: "Somebody rang my doorbell, but I don't know who it was."
    japanese: "誰かが玄関のベルを鳴らしたが、誰だったかわからない。"
    notes: "難易度: 頻出。出典: センター。間接疑問の基本形: 疑問詞 + S + V"
  - id: "scr-068-p02"
    section_id: "Scr_068"
    drill: 1
    number: 246
    role: "exam"
    english: "Mr. Suzuki looks very sad today. I wonder what happened to him."
    japanese: "スズキさんは今日、とても悲しそうに見える。彼の身に何が起こったのだろうか。"
    notes: "難易度: 頻出。出典: 大阪学院大。疑問代名詞が主語の間接疑問は疑問文と同じ語順"
  - id: "scr-068-p03"
    section_id: "Scr_068"
    drill: 1
    number: 247
    role: "exam"
    english: "Tell me when you came to the United States for the first time."
    japanese: "君が初めてアメリカに来たのはいつなのか教えてください。"
    notes: "難易度: 頻出。出典: 立教大。When ~?は現在完了形とともに使えない（⇨ PU!5）"
  - id: "scr-068-p04"
    section_id: "Scr_068"
    drill: 1
    number: 248
    role: "exam"
    english: "Do you know where I can buy a birthday cake for my daughter?"
    japanese: "娘のためのバースデーケーキをどこで買えるか知っていますか。"
    notes: "出典: 関東学院大。Do you know + 疑問詞（+ S）+ V?"
  - id: "scr-068-p05"
    section_id: "Scr_068"
    drill: 1
    number: 249
    role: "exam"
    english: "How long do you think this bridge is?"
    japanese: "この橋の長さはどのくらいだと思いますか。"
    notes: "難易度: 頻出。出典: 藤女子大。整序問題。疑問詞 + do you think（+ S）+ V? が最頻出パターン"

