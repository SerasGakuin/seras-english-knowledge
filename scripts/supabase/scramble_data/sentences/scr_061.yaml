sentences:
  - id: "scr-061-p01"
    section_id: "Scr_061"
    drill: 1
    number: 214
    role: "exam"
    english: "The more I look at this picture, the more attractive it looks."
    japanese: "この絵は見れば見るほど魅力的です。"
    notes: "難易度: 頻出。出典: 札幌大。整序問題"
  - id: "scr-061-p02"
    section_id: "Scr_061"
    drill: 1
    number: 215
    role: "exam"
    english: "I like her all the better for her weak points."
    japanese: "私は彼女に弱点があるので、よりいっそう好きだ。"
    notes: "出典: 関西学院大。整序問題"
  - id: "scr-061-p03"
    section_id: "Scr_061"
    drill: 1
    number: 216
    role: "exam"
    english: "He seems to be none the happier for his wealth."
    japanese: "彼はお金持ちだが、ちっとも幸せではないように思える。"
    notes: "難易度: 発展"
  - id: "scr-061-e01"
    section_id: "Scr_061"
    drill: 0
    number: 216
    role: "example"
    english: "They trusted her none the less for her inexperience."
    japanese: "彼女の経験不足にもかかわらず、彼らは彼女を信頼した。"
    notes: "解説例文。none the less for 〜 = にもかかわらず（二重否定→強い肯定）。参照: Theme 76"
  - id: "scr-061-p04"
    section_id: "Scr_061"
    drill: 1
    number: 217
    role: "exam"
    english: "Lucy wanted the larger of the two boxes."
    japanese: "ルーシーは2つの箱のうち大きいほうを欲しいと思った。"
    notes: "難易度: 頻出。出典: 青山学院大"

