sentences:
  - id: "scr-075-p01"
    section_id: "Scr_075"
    drill: 1
    number: 274
    role: "exam"
    english: "They were not in the least anxious about it."
    japanese: "彼らはそのことを少しも心配していなかった。"
    notes: "出典: 関西学院大。not in the least =「少しも～でない」（= not at all）。be anxious about ～（⇨ 問1135）"
  - id: "scr-075-p02"
    section_id: "Scr_075"
    drill: 1
    number: 275
    role: "exam"
    english: "The coach was by no means satisfied with the way his baseball team played."
    japanese: "コーチは野球チームのプレーの様子に決して満足していなかった。"
    notes: "難易度: 頻出。出典: 南山大。by no means =「決して～でない」。= not ... by any means"
  - id: "scr-075-p03"
    section_id: "Scr_075"
    drill: 1
    number: 276
    role: "exam"
    english: "On no account must strangers be let in."
    japanese: "見知らぬ人は決して中に入れてはいけない。"
    notes: "難易度: 発展。出典: 関西外語大。on no account =「決して～でない」。文頭に出ると倒置（疑問文の語順）。= by no means"
  - id: "scr-075-p04"
    section_id: "Scr_075"
    drill: 1
    number: 277
    role: "exam"
    english: "Facing tough situations, top players often seem to have no fear of losing whatever."
    japanese: "困難な状況に直面しても、トップ選手たちは負ける不安をまったく抱いていないように思えることが多い。"
    notes: "出典: 中央大。no + 名詞 + whatever =「少しの～もない/まったく～ない」。nothingの後にもwhatever/whatsoeverを置ける"
  - id: "scr-075-p05"
    section_id: "Scr_075"
    drill: 1
    number: 278
    role: "exam"
    english: "There is no way to know the exact number of stars in the sky."
    japanese: "空にある星の正確な数を知ることはとうていできない。"
    notes: "難易度: 発展。出典: 神奈川大。There is no way to do =「とうていできない」。〈発展〉No way!（間投詞）「いやだ/とんでもない」"

