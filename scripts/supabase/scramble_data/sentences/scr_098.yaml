sentences:
  - id: "scr-098-p01"
    section_id: "Scr_098"
    drill: 1
    number: 374
    role: "exam"
    english: "The typhoon suddenly became weaker, which was good news for the village."
    japanese: "台風の勢力は急に弱まったが、そのことは村にとって良い知らせだった。"
    notes: "難易度: 頻出。出典: センター。前の節全体を先行詞とするwhich（非制限用法）。thatとwhatは非制限用法不可"
  - id: "scr-098-p02"
    section_id: "Scr_098"
    drill: 1
    number: 375
    role: "exam"
    english: "I am trying to save up money for travel, which I find to be difficult."
    japanese: "私は旅行のために貯金をしようとしているが、難しいと思う。"
    notes: "難易度: 頻出。出典: 追手門学院大。前の節の一部（to save up money for travel）を先行詞とするwhich"
  - id: "scr-098-p03"
    section_id: "Scr_098"
    drill: 1
    number: 376
    role: "exam"
    english: "We were told to go not by bus but by subway, which advice we followed."
    japanese: "私たちはバスではなく地下鉄で行くように言われたので、その忠告に従った。"
    notes: "難易度: 発展。出典: 東京芸術大。非制限用法で用いる関係形容詞which + 名詞《文語》。「前置詞 + which + 名詞」の形もある"

