sentences:
  - id: "scr-239-p01"
    section_id: "Scr_239"
    drill: 1
    number: 1201
    role: "exam"
    english: "I resolved to quit drinking for good."
    japanese: "これから先ずっと酒をやめる決心をした。"
    notes: "〈頻出〉国士舘大。for good「永久に/ずっと」(=forever/permanently)。"
  - id: "scr-239-p02"
    section_id: "Scr_239"
    drill: 1
    number: 1202
    role: "exam"
    english: "All my efforts have gone for nothing."
    japanese: "私の努力はすべてむだになってしまった。"
    notes: "神奈川大。for nothing「むだに」(=in vain)。go for nothing「水泡に帰する」。「無料で」の意味も重要。"
  - id: "scr-239-p03"
    section_id: "Scr_239"
    drill: 1
    number: 1203
    role: "exam"
    english: "Many attempts have been made in vain."
    japanese: "いろいろな試みがなされてきたが，うまくいかなかった。"
    notes: "〈超頻〉立命館大。in vain「むだに」(=for nothing/to no purpose)。only to fail(⇨93)。"
  - id: "scr-239-p04"
    section_id: "Scr_239"
    drill: 1
    number: 1204
    role: "exam"
    english: "The man was at work till late last night."
    japanese: "その男性は昨夜，遅くまで仕事をしていた。"
    notes: "at work「仕事中で」。atは「〜の最中で」で活動従事中を表す。PU!197参照。"
  - id: "scr-239-p05"
    section_id: "Scr_239"
    drill: 1
    number: 1205
    role: "exam"
    english: "Plans are under way to build a new high school."
    japanese: "新しい高校を建てる計画が進行中である。"
    notes: "東京理科大。under way「進行中で」(=in progress)。PU!198参照。"
  - id: "scr-239-p06"
    section_id: "Scr_239"
    drill: 1
    number: 1206
    role: "exam"
    english: "She ran into her old friend by chance at the folk festival."
    japanese: "彼女はフォーク・フェスティバルで旧友に偶然出会った。"
    notes: "〈頻出〉立命館大。by chance「偶然に」(=by accident/accidentally)。「うっかり」の訳も。"
  - id: "scr-239-p07"
    section_id: "Scr_239"
    drill: 1
    number: 1207
    role: "exam"
    english: "I'm sure he did it on purpose."
    japanese: "彼はきっとそれを故意にやったんですよ。"
    notes: "〈頻出〉東海大。on purpose「故意に/わざと」(=intentionally/deliberately)。"
  - id: "scr-239-p08"
    section_id: "Scr_239"
    drill: 1
    number: 1208
    role: "exam"
    english: "Emily is on the go from morning till night."
    japanese: "エミリーは朝から晩まで働きづめである。"
    notes: "〈発展〉摂南大。on the go「忙しく働いて」(=very busy)。PU!203参照。"
  - id: "scr-239-p09"
    section_id: "Scr_239"
    drill: 1
    number: 1209
    role: "exam"
    english: "She helped him, and he in turn supported her."
    japanese: "彼女は彼を助け，今度は彼が彼女を支えた。"
    notes: "〈頻出〉in turn「（代わって）今度は」。turnは「順番」(⇨757)。「順番に」(=by turns)の意味も。"
  - id: "scr-239-p10"
    section_id: "Scr_239"
    drill: 1
    number: 1210
    role: "exam"
    english: "It's cheaper if you book the airplane tickets in advance."
    japanese: "前もって飛行機のチケットを予約すれば，安くなる。"
    notes: "〈超頻〉関東学院大。in advance「前もって」(=ahead of time/beforehand)。"
  - id: "scr-239-e01"
    section_id: "Scr_239"
    drill: 0
    number: 1202
    role: "example"
    english: "He fixed my bike for nothing."
    japanese: "彼は私の自転車をただで修理してくれた。"
    notes: "〈重要〉for nothing「無料で/ただで」(=free)。「むだに」とは別の意味。"
  - id: "scr-239-e02"
    section_id: "Scr_239"
    drill: 0
    number: 1209
    role: "example"
    english: "They took care of the baby in turn."
    japanese: "彼らは順番に赤ちゃんの世話をした。"
    notes: "プラスα。in turn「順番に」(=by turns)。「今度は」とは別の意味。"

