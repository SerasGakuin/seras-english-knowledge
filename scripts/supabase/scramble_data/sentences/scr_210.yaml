sentences:
  - id: "scr-210-p01"
    section_id: "Scr_210"
    drill: 1
    number: 878
    role: "exam"
    english: "I waited for two hours at the station but he didn't show up."
    japanese: "私は駅で2時間待ったが、彼は現れなかった。"
    notes: "上智大。show up/turn up「現れる」(=appear/come/arrive)。"
  - id: "scr-210-p02"
    section_id: "Scr_210"
    drill: 1
    number: 879
    role: "exam"
    english: "I'm sure she will turn up soon."
    japanese: "きっと彼女はもうすぐ来るよ。"
    notes: "東京理科大。turn up「現れる」(=appear)。turn upには他動詞用法「（音量など）を大きくする」もある(⇔turn down⇨935)。"
  - id: "scr-210-p03"
    section_id: "Scr_210"
    drill: 1
    number: 880
    role: "exam"
    english: "I had to leave my home country because war broke out."
    japanese: "戦争が起こったので、祖国を出なければなりませんでした。"
    notes: "〈頻出〉麗澤大。break out「急に起こる/勃発する」。戦争・火災・暴動・嵐などが主語。"
  - id: "scr-210-p04"
    section_id: "Scr_210"
    drill: 1
    number: 881
    role: "exam"
    english: "I couldn't arrive at class on time because my bicycle had broken down."
    japanese: "自転車が故障したので、授業に間に合わなかった。"
    notes: "〈頻出〉東京電機大。break down「（車・機械などが）故障する/だめになる」。break up「終わる/別れる」(⇨PU!191)。"
  - id: "scr-210-p05"
    section_id: "Scr_210"
    drill: 1
    number: 882
    role: "exam"
    english: "The meeting yesterday broke up at five."
    japanese: "昨日の会議は5時に散会した。"
    notes: "break up「（会議などが）終わる」(=come to an end)。break upには「（結婚生活・友情・関係などが）終わる」の意味も。"
  - id: "scr-210-p06"
    section_id: "Scr_210"
    drill: 1
    number: 883
    role: "exam"
    english: "How did the accident at school come about?"
    japanese: "学校での事故はどのように起きたのですか。"
    notes: "〈頻出〉青山学院大。come about「起こる/生じる」(=happen/occur)。他動詞表現bring about〜「〜を引き起こす」と対(⇨899・PU!187)。"
  - id: "scr-210-p07"
    section_id: "Scr_210"
    drill: 1
    number: 884
    role: "exam"
    english: "His new novel will come out next month."
    japanese: "彼の新作小説は来月出版される。"
    notes: "慶應大。come out「出版される/発売される」(=be published)。他動詞表現bring out〜「〜を出版する」も。"
  - id: "scr-210-p08"
    section_id: "Scr_210"
    drill: 1
    number: 885
    role: "exam"
    english: "When he came to, he found himself lying on his bed at home."
    japanese: "意識が回復すると、彼は自宅のベッドに横たわっていた。"
    notes: "〈発展〉獨協医大。come to「意識［正気］を取り戻す」(=become conscious)。come to oneselfの省略形。"
  - id: "scr-210-p09"
    section_id: "Scr_210"
    drill: 1
    number: 886
    role: "exam"
    english: "Stay here as long as the food supply holds out."
    japanese: "食糧の供給が続く限り、ここにとどまりなさい。"
    notes: "〈発展〉青山学院大。hold out「持ちこたえる/（蓄えなどが）もつ/続く」(=last⇨851)。hold outには他動詞用法「〜を差し出す」も。"
  - id: "scr-210-p10"
    section_id: "Scr_210"
    drill: 1
    number: 887
    role: "exam"
    english: "Why not change the font color here into yellow and make it stand out?"
    japanese: "この文字の色を黄色に変えて目立たせたらどう？"
    notes: "〈頻出〉獨協大。stand out「目立つ」。outstanding(形)「目立った/傑出した」。語句: Why not do?「〜してはどうですか」(⇨261)。"
  - id: "scr-210-e01"
    section_id: "Scr_210"
    drill: 0
    number: 879
    role: "example"
    english: "Don't turn up the radio."
    japanese: "ラジオの音を大きくしないで。"
    notes: "プラスα。turn upの他動詞用法「（音量など）を大きくする」(⇔turn down⇨935)。"
  - id: "scr-210-e02"
    section_id: "Scr_210"
    drill: 0
    number: 881
    role: "example"
    english: "Their friendship has broken up."
    japanese: "彼らの友情は終わった。"
    notes: "プラスα。break upの「（関係が）終わる」用法。"
  - id: "scr-210-e03"
    section_id: "Scr_210"
    drill: 0
    number: 886
    role: "example"
    english: "He held out his hand."
    japanese: "彼は手を差し出した。"
    notes: "プラスα。hold outの他動詞用法「〜を差し出す」。"

