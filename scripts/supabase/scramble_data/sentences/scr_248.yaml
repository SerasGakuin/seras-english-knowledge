sentences:
  - id: "scr-248-p01"
    section_id: "Scr_248"
    drill: 1
    number: 1282
    role: "exam"
    english: "In spite of the rain, many people showed up for the outdoor concert."
    japanese: "雨にもかかわらず，多くの人が野外コンサートにやって来た。"
    notes: "〈頻出〉上智大。in spite of〜「〜にもかかわらず」(=despite⇨722)。"
  - id: "scr-248-p02"
    section_id: "Scr_248"
    drill: 1
    number: 1283
    role: "exam"
    english: "For all our efforts, the plan ended in failure."
    japanese: "私たちの努力にもかかわらず，その計画は失敗に終わった。"
    notes: "関西学院大。for all〜「〜にもかかわらず」(=in spite of)。プラスα: with all〜も同意。"
  - id: "scr-248-p03"
    section_id: "Scr_248"
    drill: 1
    number: 1284
    role: "exam"
    english: "We'll hold the tennis tournament as planned, regardless of the weather."
    japanese: "天候にかかわらず，予定通りテニス大会を開催します。"
    notes: "〈頻出〉法政大。regardless of〜「〜にかかわらず/〜にかまわず」。as planned「予定通りに」。"
  - id: "scr-248-e01"
    section_id: "Scr_248"
    drill: 0
    number: 1282
    role: "example"
    english: "In spite of myself, I laughed at his joke."
    japanese: "私は思わず彼のジョークに笑ってしまった。"
    notes: "〈重要〉in spite of oneself「思わず/われ知らず」。自分自身の気持ちにもかかわらず→思わず。"
  - id: "scr-248-e02"
    section_id: "Scr_248"
    drill: 0
    number: 1283
    role: "example"
    english: "I still like him with all his faults."
    japanese: "彼には欠点があるが，それでも私は彼が好きだ。"
    notes: "プラスα。with all〜「〜にもかかわらず」(=for all / in spite of)。"

