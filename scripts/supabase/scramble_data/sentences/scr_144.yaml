sentences:
  - id: "scr-144-p01"
    section_id: "Scr_144"
    drill: 1
    number: 567
    role: "exam"
    english: "Keep your eyes closed until I tell you to open them."
    japanese: "私が開けていいと言うまで目を閉じていなさい。"
    notes: "出典: 佛教大。〈頻出〉並べ替え問題。keep A done「Aを〜された状態にしておく」。O=your eyesとcloseの受動関係。〈暗記〉tell A to do「Aに〜しなさいと言う」（⇨ PU!113）。"
  - id: "scr-144-p02"
    section_id: "Scr_144"
    drill: 1
    number: 568
    role: "exam"
    english: "I'm sorry to have kept you waiting so long."
    japanese: "長い間お待たせしてすみません。"
    notes: "出典: 獨協大。〈頻出〉4択問題。keep A doing「Aを〜している状態にしておく」。keep A waitingは最頻出表現。本問 = I'm sorry I've kept you waiting so long."
  - id: "scr-144-p03"
    section_id: "Scr_144"
    drill: 1
    number: 569
    role: "exam"
    english: "I think it's better to leave that mysterious box closed."
    japanese: "その謎の箱は閉じたままにしておいたほうがよいと思います。"
    notes: "出典: 日本女子大。〈頻出〉4択問題。leave A done「Aを〜されたままにしておく」。O=that mysterious boxとcloseの受動関係[that mysterious box is closed]に注意。keepは意図的に状態にしておく、leaveは放置しておくという違い。"

