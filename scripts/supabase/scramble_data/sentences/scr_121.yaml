sentences:
  - id: "scr-121-p01"
    section_id: "Scr_121"
    drill: 1
    number: 462
    role: "exam"
    english: "Susan likes chocolate and so does Hiroshi."
    japanese: "スーザンはチョコレートが好きで、ヒロシもまたそうだ。"
    notes: "難易度: 頻出。出典: 青山学院大。4択問題。so+助動詞[be動詞]+S「Sもまたそうだ」— 前の肯定の内容を受ける。一般動詞likes→doesを使う。be動詞の場合はis/am/are/was/wereを使う。例: \"I'm a student.\" \"So am I.\"（私もです）"
  - id: "scr-121-p02"
    section_id: "Scr_121"
    drill: 1
    number: 463
    role: "exam"
    english: "We don't want to go there, and neither do they."
    japanese: "私たちはそこに行きたくないし、彼らも行きたくない。"
    notes: "難易度: 頻出。出典: 関西学院大。4択問題。neither+助動詞[be動詞]+S「Sもまたそうでない」— 前の否定の内容を受ける。問462の否定形。"
  - id: "scr-121-p03"
    section_id: "Scr_121"
    drill: 1
    number: 464
    role: "exam"
    english: "We don't want to give it up, nor do they."
    japanese: "私たちはあきらめたくないし、彼らもそうだ。"
    notes: "難易度: 頻出。出典: 武庫川女子大。4択問題。nor+助動詞[be動詞]+S「Sもまたそうでない」。neitherとnorの違いはPU!88参照。〈重要〉norの後ろに節を続ける場合は「nor+疑問文の語順」に並べる。"
  - id: "scr-121-e01"
    section_id: "Scr_121"
    drill: 0
    number: 0
    role: "example"
    english: "They didn't understand the instructions, nor did they ask for help."
    japanese: "彼らは指示を理解していなかったし、助けを求めることもしなかった。"
    notes: "問464解説〈重要〉例文。norの後ろに節を続ける場合の例。nor+疑問文の語順（nor did they ask）。"
  - id: "scr-121-e02"
    section_id: "Scr_121"
    drill: 0
    number: 0
    role: "example"
    english: "The first isn't good and neither is the second."
    japanese: "最初のはよくないし、2番目もよくない。"
    notes: "PU!88例文（京都産業大）。neitherとnorの使い分け: neither=副詞→接続詞andと共起可能。nor=接続詞→接続詞andがある場合は使えない。本問はandがあるのでneitherが正解。"

