sentences:
  - id: "scr-176-p01"
    section_id: "Scr_176"
    drill: 1
    number: 685
    role: "exam"
    english: "Our school begins at nine."
    japanese: "私たちの学校は9時から始まる。"
    notes: "出典: 松本歯科大。〈基本〉〈頻出〉4択問題。begin/startの後は×fromではなくat/on/inを使う。時刻→at、日/曜日→on、月/季節/年→in（⇨ PU!159）。"
  - id: "scr-176-p02"
    section_id: "Scr_176"
    drill: 1
    number: 686
    role: "exam"
    english: "My daughter was born on the morning of April 5th."
    japanese: "私の娘は4月5日の朝に生まれました。"
    notes: "出典: 東京経済大。〈頻出〉4択問題。morning/afternoon等が修飾語句を伴うとinではなくonを用いる。on the morning of April 6 / on Sunday evening / on a dark night。"
  - id: "scr-176-p03"
    section_id: "Scr_176"
    drill: 1
    number: 687
    role: "exam"
    english: "The deadline is 6 p.m. I must finish this work by that time."
    japanese: "締め切りは午後6時だ。その時間までにこの仕事を終えなければならない。"
    notes: "出典: 青山学院大。〈頻出〉4択問題。by「〜までに（は）」は動作の完了の期限。until [till]「〜まで（ずっと）」は継続の終了時。"
  - id: "scr-176-p04"
    section_id: "Scr_176"
    drill: 1
    number: 688
    role: "exam"
    english: "I have been living in Canada for almost five years."
    japanese: "私はほぼ5年間カナダに住んでいます。"
    notes: "出典: 拓殖大。〈頻出〉4択問題。for: 不特定の期間（数詞やmany, a fewなどのついた語句）。during: 特定の期間（theやone'sなどのついた語句）。"
  - id: "scr-176-p05"
    section_id: "Scr_176"
    drill: 1
    number: 689
    role: "exam"
    english: "During my stay in Paris, I visited the Eiffel Tower."
    japanese: "私はパリ滞在中にエッフェル塔を訪れた。"
    notes: "〈頻出〉書き換え問題。while + S + V = during + 名詞（句）。×during my staying（動名詞不可）。= While I was staying in Paris, I visited the Eiffel Tower."
  - id: "scr-176-p06"
    section_id: "Scr_176"
    drill: 1
    number: 690
    role: "exam"
    english: "Please finish that report in two weeks."
    japanese: "2週間でそのレポートを完成してください。"
    notes: "出典: 名古屋学院大。〈頻出〉4択問題。in「今から〜で/の後に」は時の経過。inは未来に、afterは過去に用いることが多い。within「〜以内に」で強調。"

