  - id: "scr-010-p01"
    section_id: "Scr_010"
    drill: 1
    number: 33
    role: "exam"
    english: "She was laughed at by her friends when she came to a class party in pajamas."
    japanese: "クラスのパーティーにパジャマでやって来た時、彼女は友人たちから笑われた。"
    notes: "難易度: 頻出; 出典: 立命館大; laugh at ~の受動態→be laughed at (by ~)"
  - id: "scr-010-p02"
    section_id: "Scr_010"
    drill: 1
    number: 34
    role: "exam"
    english: "The boy was very sick, so he was taken care of by his mother all night."
    japanese: "その男の子はとても具合が悪かったので、母親が夜通し世話をした。"
    notes: "難易度: 頻出; 出典: 神戸学院大; take care of ~の受動態→be taken care of (by ~)"

  # === 例文（example） ===
  - id: "scr-010-e01"
    section_id: "Scr_010"
    drill: 0
    number: 1
    role: "example"
    english: "It must be done at once."
    japanese: "すぐにそれをしなければならない。"
    notes: "PU!8: 受動態の訳し方; 能動態に直して訳す例（= We must do it at once.）"
  - id: "scr-010-e02"
    section_id: "Scr_010"
    drill: 0
    number: 2
    role: "example"
    english: "Your clock can't be repaired."
    japanese: "あなたの時計は修理できない。"
    notes: "PU!8: 受動態の訳し方; 能動態に直して訳す例（= We can't repair your clock.）"

