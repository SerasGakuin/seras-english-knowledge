sentences:
  - id: "scr-106-p01"
    section_id: "Scr_106"
    drill: 1
    number: 407
    role: "exam"
    english: "His mother asked him if he had been to the bank."
    japanese: "彼の母親は彼に銀行に行ってきたかどうか尋ねた。"
    notes: "難易度: 頻出。出典: 拓殖大。動詞の目的語になるif節「〜かどうか」。口語ではwhetherよりifが好まれる"
  - id: "scr-106-p02"
    section_id: "Scr_106"
    drill: 1
    number: 408
    role: "exam"
    english: "Whether the news is true is questionable."
    japanese: "その知らせが本当かどうかは疑わしい。"
    notes: "難易度: 頻出。出典: 金城学院大。主語になるwhether節。if節は文頭で主語になれない。形式主語構文: It is questionable whether [if] the news is true."
  - id: "scr-106-p03"
    section_id: "Scr_106"
    drill: 1
    number: 409
    role: "exam"
    english: "I'm worried about whether she is happy."
    japanese: "私は彼女が幸せかどうか心配している。"
    notes: "出典: 立命館大。前置詞の目的語になるwhether節。if節は前置詞の目的語になれないのでabout ifは不可"

