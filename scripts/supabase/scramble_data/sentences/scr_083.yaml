sentences:
  - id: "scr-083-p01"
    section_id: "Scr_083"
    drill: 1
    number: 306
    role: "exam"
    english: "I forgot to bring a book to read for the long flight. I must buy one at the airport."
    japanese: "長時間のフライト中に読むための本を持ってくるのを忘れた。空港で買わなければならない。"
    notes: "難易度: 基本、頻出。出典: 静岡大。誤り指摘（it→one）。one = a + 単数名詞（不特定）。it は特定のものを指す"
  - id: "scr-083-p02"
    section_id: "Scr_083"
    drill: 1
    number: 307
    role: "exam"
    english: "A few months ago, I was thinking about buying a used car, but I decided to buy a new one."
    japanese: "数か月前、私は中古車を買おうと考えていたが、新車を買うことに決めた。"
    notes: "出典: 亜細亜大。a new one = a new car。修飾語がつくと冠詞がつく"
  - id: "scr-083-p03"
    section_id: "Scr_083"
    drill: 1
    number: 308
    role: "exam"
    english: "I have a new bag and several old ones."
    japanese: "私は新しいかばんを1個と古いかばんを数個持っている。"
    notes: "出典: 愛知工大。old ones = old bags。onesは必ず修飾語つきで用いる"
  - id: "scr-083-p04"
    section_id: "Scr_083"
    drill: 1
    number: 309
    role: "exam"
    english: "This book is not so exciting as the one I read last year."
    japanese: "この本は去年読んだ本ほど面白くない。"
    notes: "出典: 共立女子大。the one + 関係代名詞節（限定されるとthe）。the one = the book。口語的には that でも可"
  - id: "scr-083-p05"
    section_id: "Scr_083"
    drill: 1
    number: 310
    role: "exam"
    english: "He likes white wine better than red."
    japanese: "彼は赤ワインより白ワインが好きだ。"
    notes: "難易度: 発展。出典: 法政大。oneはwine等の不可算名詞の代用にならない。redとwineを省略"

