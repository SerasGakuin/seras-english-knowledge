sentences:
  - id: "scr-231-p01"
    section_id: "Scr_231"
    drill: 1
    number: 1112
    role: "exam"
    english: "You should get rid of the books that you no longer read as soon as possible."
    japanese: "もう読まない本はできるだけ早く処分すべきだ。"
    notes: "〈頻出〉関西外語大。get rid of〜「（厄介なもの）を取り除く」(=remove)/「（不要なもの）を捨てる/処分する」(=discard/dispose of)。目的語で訳が変わる: get rid of a cold「風邪を治す」、get rid of bad habits「悪癖を直す」、get rid of the old custom「慣習を廃止する」(=abolish)。"
  - id: "scr-231-p02"
    section_id: "Scr_231"
    drill: 1
    number: 1113
    role: "exam"
    english: "The child tried not to let go of her mother's hand in the crowd."
    japanese: "その子どもは人ごみの中で母親の手を離さないようにした。"
    notes: "let go of〜「〜から手を離す/〜を手放す」(=release)。"
  - id: "scr-231-p03"
    section_id: "Scr_231"
    drill: 1
    number: 1114
    role: "exam"
    english: "The children like to make believe that they are pirates."
    japanese: "子供たちは海賊ごっこが好きです。"
    notes: "高知大。make believe「ふりをする」(=pretend)。make people believe（人に信じさせる）の目的語省略からきた表現。後ろにthat節が続く場合が多い。"
  - id: "scr-231-p04"
    section_id: "Scr_231"
    drill: 1
    number: 1115
    role: "exam"
    english: "Though it wasn't enough, we had to make do with what we had."
    japanese: "十分ではなかったが、あるもので間に合わせなければならなかった。"
    notes: "〈発展〉早大。make do with〜「〜で間に合わす/〜ですます」(=do with)。"
  - id: "scr-231-p05"
    section_id: "Scr_231"
    drill: 1
    number: 1116
    role: "exam"
    english: "As Akio was nervous about the entrance exam, his mother told him to take it easy."
    japanese: "アキオが入学試験で緊張していたので、彼の母は彼に気楽に考えるよう言った。"
    notes: "青山学院大。take it easy「気楽に考える/ゆっくりやる」⇔take it seriously「真剣に考える」。別れの挨拶にも用いる。"
  - id: "scr-231-p06"
    section_id: "Scr_231"
    drill: 1
    number: 1117
    role: "exam"
    english: "The old rule still holds good."
    japanese: "その古い規則は依然として有効である。"
    notes: "hold good「有効である/あてはまる」(=hold true)。"
  - id: "scr-231-p07"
    section_id: "Scr_231"
    drill: 1
    number: 1118
    role: "exam"
    english: "Before the movie begins, make sure your mobile phone is switched off."
    japanese: "映画が始まる前に、携帯電話の電源を必ず切ってください。"
    notes: "〈頻出〉センター。make sure (that)節「必ず〜するようにする/〜を確かめる」(=see to it that⇨302)。thatは省略可。make sure of+名詞の形も。"
  - id: "scr-231-p08"
    section_id: "Scr_231"
    drill: 1
    number: 1119
    role: "exam"
    english: "With your talent, I'm sure you'll make it in the entertainment world."
    japanese: "あなたの才能をもってすれば、きっと芸能界で成功しますよ。"
    notes: "〈発展〉愛知学院大。make it「成功する/うまくやる」(=succeed)。itは目標・目的（地）・定刻などを漠然と指す「状況」のit。「（目的地に）たどり着く」「（乗り物・会合に）間に合う」「（日時の）都合をつける」の意味も。"
  - id: "scr-231-p09"
    section_id: "Scr_231"
    drill: 1
    number: 1120
    role: "exam"
    english: "The money John has now falls short of what he needs."
    japanese: "ジョンが今持っているお金では必要額に足りない。"
    notes: "武蔵大。fall[come] short of〜「（目標・基準など）に達しない/届かない」。"
  - id: "scr-231-p10"
    section_id: "Scr_231"
    drill: 1
    number: 1121
    role: "exam"
    english: "When we are running short of calcium, we tend to get irritated easily."
    japanese: "カルシウムが不足すると、すぐにいらいらしてしまう。"
    notes: "〈頻出〉東京理科大。run short of〜「〜が不足する/〜を切らす」。run out of〜(⇨1034)とは異なり、まだ完全になくなった状態ではないので進行形が多い。"
  - id: "scr-231-e01"
    section_id: "Scr_231"
    drill: 0
    number: 1118
    role: "example"
    english: "You should make sure of the rules before playing the game."
    japanese: "ゲームをする前にルールをしっかり確認したほうがいいよ。"
    notes: "プラスα。make sure of+名詞「〜を確かめる」。that節でなく名詞が続く形。"
  - id: "scr-231-e02"
    section_id: "Scr_231"
    drill: 0
    number: 1119
    role: "example"
    english: "I made it to the airport in time for the flight."
    japanese: "私はフライトに間に合うように空港に到着した。"
    notes: "プラスα。make it「（目的地に）たどり着く」用法。"
  - id: "scr-231-e03"
    section_id: "Scr_231"
    drill: 0
    number: 1119
    role: "example"
    english: "Sorry, I can't make it next Saturday."
    japanese: "ごめん、次の土曜日は都合がつかないんだ。"
    notes: "プラスα。make it「（日時の）都合をつける」用法。"

