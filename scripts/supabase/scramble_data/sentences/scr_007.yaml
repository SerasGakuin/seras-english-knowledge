# Scr_007: Theme 7 時・条件を表す副詞節中の時制 → sdv-005

sentences:
  # === 問題（exam） ===
  - id: "scr-007-p01"
    section_id: "Scr_007"
    drill: 1
    number: 23
    role: "exam"
    english: "Could you ask Mary to call me back when she comes home?"
    japanese: "メアリーが帰ったら、折り返し電話するよう彼女にお願いしていただけませんか。"
    notes: "難易度: 頻出; 出典: 共立女子大; when節=時の副詞節→現在形; 語句: Could you do ~?=依頼"
  - id: "scr-007-p02"
    section_id: "Scr_007"
    drill: 1
    number: 24
    role: "exam"
    english: "I will wait here until she comes."
    japanese: "彼女が来るまでここで待っています。"
    notes: "難易度: 頻出; 出典: 北海学園大; until節=時の副詞節→現在形"
  - id: "scr-007-p03"
    section_id: "Scr_007"
    drill: 1
    number: 25
    role: "exam"
    english: "The concert will be put off until next Saturday if it rains tomorrow."
    japanese: "明日雨が降ったら、コンサートは来週の土曜日まで延期されるだろう。"
    notes: "難易度: 頻出; 出典: 東京経済大; if節=条件の副詞節→現在形"
  - id: "scr-007-p04"
    section_id: "Scr_007"
    drill: 1
    number: 26
    role: "exam"
    english: "Yes, I wonder when he will return it."
    japanese: "はい、いつ返してくれるんだろうと思っているのですが。"
    notes: "難易度: 頻出; 出典: センター; 対話形式（A: Is Bill still using your car?）; when節=名詞節（wonderの目的語）→未来形"
  - id: "scr-007-p05"
    section_id: "Scr_007"
    drill: 1
    number: 27
    role: "exam"
    english: "I don't know if she will come to the party tomorrow."
    japanese: "明日のパーティーに彼女が来るかどうかは、私にはわかりません。"
    notes: "難易度: 頻出; 出典: 不明; if節=名詞節（knowの目的語）「～するかどうか」→未来形"
  - id: "scr-007-p06"
    section_id: "Scr_007"
    drill: 1
    number: 28
    role: "exam"
    english: "Please inform the chair as soon as you have reached a conclusion on this matter."
    japanese: "この問題について結論に達したらすぐに、議長に知らせてください。"
    notes: "難易度: 頻出; 出典: 関西学院大; as soon as節=時の副詞節→未来完了の内容でも現在完了形"

  # === 例文（example） ===
  - id: "scr-007-e01"
    section_id: "Scr_007"
    drill: 0
    number: 1
    role: "example"
    english: "I'll tell it to him when he comes."
    japanese: "彼が来たら、それを彼に話します。"
    notes: "PU!6: when=副詞節（接続詞）→現在形"
  - id: "scr-007-e02"
    section_id: "Scr_007"
    drill: 0
    number: 2
    role: "example"
    english: "I don't know when he will come."
    japanese: "彼がいつ来るか知らない。"
    notes: "PU!6: when=名詞節（疑問詞）→未来形"
  - id: "scr-007-e03"
    section_id: "Scr_007"
    drill: 0
    number: 3
    role: "example"
    english: "I'll stay at home if it rains tomorrow."
    japanese: "もし明日雨ならば私は家にいます。"
    notes: "PU!6: if=副詞節（接続詞）「もし～なら」→現在形"
  - id: "scr-007-e04"
    section_id: "Scr_007"
    drill: 0
    number: 4
    role: "example"
    english: "I wonder if it will rain tomorrow."
    japanese: "明日は雨が降るかしら。"
    notes: "PU!6: if=名詞節（接続詞）「～するかどうか」→未来形"

