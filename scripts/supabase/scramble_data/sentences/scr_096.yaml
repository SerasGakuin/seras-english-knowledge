    role: "exam"
    english: "There are numerous cases where Japanese modesty causes misunderstanding."
    japanese: "日本人の謙虚さが誤解を生じさせる場合が多い。"
    notes: "出典: 城西大。whereの先行詞が「場所」以外の場合（case「場合/事例」/ situation / point）"
  - id: "scr-096-p02"
    section_id: "Scr_096"
    drill: 1
    number: 369
    role: "exam"
    english: "Put the book back to where it was when you're through with it."
    japanese: "その本を読んでしまったら元の場所へ返しておいてください。"
    notes: "難易度: 発展。出典: 東京経済大（整序問題）。関係副詞whereの先行詞省略（the placeが省略）。be through with ～「～をし終わっている」"
  - id: "scr-096-p03"
    section_id: "Scr_096"
    drill: 1
    number: 370
    role: "exam"
    english: "Michael works very hard. That's why I respect him."
    japanese: "マイケルはとても一生懸命働く。だから私は彼を尊敬している。"
    notes: "難易度: 頻出。出典: センター。That's why節「そういうわけで～」⇔ That's because節「それは～だからだ」。関係副詞whyの先行詞省略"

