sentences:
  - id: "scr-110-p01"
    section_id: "Scr_110"
    drill: 1
    number: 422
    role: "exam"
    english: "It's been nearly a month since I last ate fish."
    japanese: "最後に魚を食べてからほとんど1か月になる。"
    notes: "難易度: 超頻出。出典: 佛教大。It is [has been]+時間+since+S+過去形「Sが〜してから…になる」。= I haven't eaten fish for nearly a month."
  - id: "scr-110-p02"
    section_id: "Scr_110"
    drill: 1
    number: 423
    role: "exam"
    english: "Three months have passed since she started for New York."
    japanese: "彼女がニューヨークへ発ってから3か月が過ぎました。"
    notes: "出典: 近畿大。対話問題（A: How long has it been?）。整序問題。時間+have passed since+S+過去形「Sが〜してから…になる」"
  - id: "scr-110-p03"
    section_id: "Scr_110"
    drill: 1
    number: 424
    role: "exam"
    english: "He has been dead for three years."
    japanese: "彼が亡くなって3年になる。"
    notes: "出典: 東北学院大。S have been+形容詞+for+時間「Sが〜してから…になる」。= It is three years since he died. dieは動作動詞→継続にbe deadを使う"
  - id: "scr-110-p04"
    section_id: "Scr_110"
    drill: 1
    number: 425
    role: "exam"
    english: "It will not be long before we know the truth."
    japanese: "私たちは真相をまもなく知るだろう。"
    notes: "出典: 摂南大。整序問題。It will not be long before 〜「まもなく〜するだろう」。before節は時の副詞節→未来でも現在形（→ Theme 7）"
  - id: "scr-110-p05"
    section_id: "Scr_110"
    drill: 1
    number: 426
    role: "exam"
    english: "It was not until my father came home that he noticed he had left his laptop behind."
    japanese: "父は、家に帰ってきて初めてノート型パソコンを忘れたことに気づいた。"
    notes: "難易度: 頻出。出典: 関東学院大。整序問題。It is not until 〜 that ...「〜して初めて…する」。倒置形: Not until my father came home did he notice ..."
  - id: "scr-110-e01"
    section_id: "Scr_110"
    drill: 0
    number: 0
    role: "example"
    english: "It was two full hours before he got out of the traffic jam."
    japanese: "彼はまる2時間たってようやく交通渋滞から抜け出た。"
    notes: "問425発展例文。It is+時間+before 〜「〜するまでに…（の時間）がかかる」の基本形"

