# Scr_011: Theme 11 使役動詞・知覚動詞の受動態 → sdv-009

sentences:
  # === 問題（exam） ===
  - id: "scr-011-p01"
    section_id: "Scr_011"
    drill: 1
    number: 35
    role: "exam"
    english: "I was made to wait for months until she agreed to see me."
    japanese: "彼女が会ってくれるまで、何か月も待たされました。"
    notes: "難易度: 準出; 出典: 成城大; make A doの受動態→A is made to do; 原形不定詞がto不定詞に変化; 本問=I was forced to wait for months...（この表現のほうがふつう）"
  - id: "scr-011-p02"
    section_id: "Scr_011"
    drill: 1
    number: 36
    role: "exam"
    english: "She was seen to enter the building with a woman carrying a red suitcase."
    japanese: "彼女は赤いスーツケースを持った女性とともに建物に入るのを見られた。"
    notes: "出典: 中央大; see A doの受動態→A is seen to do"

  # === 例文（example） ===
  - id: "scr-011-e01"
    section_id: "Scr_011"
    drill: 0
    number: 1
    role: "example"
    english: "I was allowed to go to college."
    japanese: "私は大学に行かせてもらった。"
    notes: "発展: letは受動態にしない→allowで代用; have/letは受動態不可"

