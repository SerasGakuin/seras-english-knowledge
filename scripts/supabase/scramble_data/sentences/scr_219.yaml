sentences:
  - id: "scr-219-p01"
    section_id: "Scr_219"
    drill: 1
    number: 979
    role: "exam"
    english: "Although she was against me at first, after a long talk, she finally agreed with my position."
    japanese: "彼女は最初、私に反対していたが、長い話し合いの末に私の立場に賛成した。"
    notes: "〈基本〉〈頻出〉北海学園大。agree with〜「（人）と意見が一致する/（人の意見・考え）に賛成する」。agree with〜の「（気候・食べ物などが）〜に合う」の意味も頻出（⇨731）。"
  - id: "scr-219-p02"
    section_id: "Scr_219"
    drill: 1
    number: 980
    role: "exam"
    english: "She agreed to our plan."
    japanese: "彼女は私たちの計画を承諾してくれた。"
    notes: "〈基本〉agree to〜「（計画・提案など）に同意する/を承諾する」。"
  - id: "scr-219-p03"
    section_id: "Scr_219"
    drill: 1
    number: 981
    role: "exam"
    english: "There was no one in the shop to wait on me."
    japanese: "その店には、私に応対してくれる人は一人もいなかった。"
    notes: "慶應大。wait on[upon]〜「（人）に仕える/（客）に応対する」(=serve)。"
  - id: "scr-219-p04"
    section_id: "Scr_219"
    drill: 1
    number: 982
    role: "exam"
    english: "Patients often die simply because they yield to their diseases."
    japanese: "患者は単に病気に気持ちが負けてしまうために死ぬことがよくある。"
    notes: "拓殖大。yield to〜「〜に屈する/〜に負ける」(=submit to/surrender to/give in to⇨1031/give way to⇨1061)。"
  - id: "scr-219-p05"
    section_id: "Scr_219"
    drill: 1
    number: 983
    role: "exam"
    english: "My cousin Bob majored in French in college."
    japanese: "いとこのボブは大学でフランス語を専攻した。"
    notes: "名古屋大。major in〜「〜を専攻する/〜を専門にする」(=specialize in)。"
  - id: "scr-219-p06"
    section_id: "Scr_219"
    drill: 1
    number: 984
    role: "exam"
    english: "The number of applicants amounted to 10,000."
    japanese: "応募者の数は総計1万人になった。"
    notes: "国士館大。amount to〜「総計〜になる」(=total/add up to)。「結局〜になる/〜に等しい」の意味もある。"
  - id: "scr-219-p07"
    section_id: "Scr_219"
    drill: 1
    number: 985
    role: "exam"
    english: "After living in the city for years, she longs for nature."
    japanese: "何年も都会で暮らしたあと、彼女は自然を切望している。"
    notes: "long for〜「〜を切望する/〜にあこがれる」。"
  - id: "scr-219-p08"
    section_id: "Scr_219"
    drill: 1
    number: 986
    role: "exam"
    english: "Tim applied for a scholarship to study abroad."
    japanese: "ティムは留学するため、奨学金に申し込んだ。"
    notes: "〈頻出〉apply for〜「〜を申し込む/〜を求める」(=ask for)。〈比較〉apply to〜「（規則などが）〜に当てはまる」(=be true of⇨1141)。"
  - id: "scr-219-p09"
    section_id: "Scr_219"
    drill: 1
    number: 987
    role: "exam"
    english: "It took me more than a week to get over my headache."
    japanese: "頭痛を治すのに1週間以上かかった。"
    notes: "〈頻出〉金城学院大。get over〜「（困難など）を乗り越える(=overcome)/（病気・精神的痛手）から回復する(=recover from)」。"
  - id: "scr-219-p10"
    section_id: "Scr_219"
    drill: 1
    number: 988
    role: "exam"
    english: "The new medicine acts on the nervous system."
    japanese: "その新しい薬は神経系に作用する。"
    notes: "act on[upon]〜「〜に作用する」。「〜に基づいて行動する/〜に従う」の意味もある。"

