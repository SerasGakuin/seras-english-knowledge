sentences:
  - id: "scr-243-p01"
    section_id: "Scr_243"
    drill: 1
    number: 1244
    role: "exam"
    english: "Did you go to New York on your own, or with friends?"
    japanese: "あなたはニューヨークにひとりで行ったのですか，それとも友達と一緒ですか。"
    notes: "久留米大。on one's own「独力で/ひとりで/独立して」(=alone/by oneself⇨340)。〈注意〉of one's own「自分自身の」と混同注意。"
  - id: "scr-243-p02"
    section_id: "Scr_243"
    drill: 1
    number: 1245
    role: "exam"
    english: "My grandfather didn't talk much, but he spoke to the point."
    japanese: "祖父は口数は少なかったが，要領を得た話をする人だった。"
    notes: "〈頻出〉獨協医大。to the point「要領を得た/的を射た/適切な」。"
  - id: "scr-243-p03"
    section_id: "Scr_243"
    drill: 1
    number: 1246
    role: "exam"
    english: "What you said is beside the point."
    japanese: "あなたの言うことは要領を得ない。"
    notes: "東京電機大。beside [off] the point「要領を得ない/的はずれの」(=beside [off] the mark/wide of the mark)⇔to the point。"
  - id: "scr-243-p04"
    section_id: "Scr_243"
    drill: 1
    number: 1247
    role: "exam"
    english: "I arrived at the station just in time to catch the eleven o'clock train."
    japanese: "私は11時の列車に乗るのにぎりぎり間に合って駅に着いた。"
    notes: "〈基本〉〈頻出〉名城大。in time「間に合って/遅れずに」。プラスα: in time「やがて/そのうちに」の意味も(⇨212)。"
  - id: "scr-243-p05"
    section_id: "Scr_243"
    drill: 1
    number: 1248
    role: "exam"
    english: "Trains often do not come on time in other countries."
    japanese: "他の国々では，列車が時間通りに来ないことがよくある。"
    notes: "〈頻出〉東海大。on time「時間通りに」(=punctually)。"
  - id: "scr-243-p06"
    section_id: "Scr_243"
    drill: 1
    number: 1249
    role: "exam"
    english: "Students come at nine to the minute."
    japanese: "生徒たちは9時ぴったりに来る。"
    notes: "武庫川女子大。to the minute「(1分もたがわずに)きっかり」(=sharp⇨773/on time⇨1248)。"
  - id: "scr-243-p07"
    section_id: "Scr_243"
    drill: 1
    number: 1250
    role: "exam"
    english: "He is by nature a lazy person; don't expect too much from him."
    japanese: "彼は生まれつき怠け者です。彼に期待しすぎないように。"
    notes: "芝浦工大。by nature「生まれつき」。byは「～に関しては」で関連・関係を表す。PU!201参照。"
  - id: "scr-243-p08"
    section_id: "Scr_243"
    drill: 1
    number: 1251
    role: "exam"
    english: "The day of departure is near at hand."
    japanese: "出発日はもうすぐだ。"
    notes: "at hand「(時間的・位置的に)すぐ近くに/間近に」。しばしばclose/nearと共に用いる。"
  - id: "scr-243-p09"
    section_id: "Scr_243"
    drill: 1
    number: 1252
    role: "exam"
    english: "The country's economy will improve by degrees."
    japanese: "その国の経済は徐々によくなるだろう。"
    notes: "愛知学院大。by degrees「徐々に/次第に」(=gradually)。byは「～ずつ」の意味。PU!202参照。"
  - id: "scr-243-p10"
    section_id: "Scr_243"
    drill: 1
    number: 1253
    role: "exam"
    english: "In short, what I mean to say is that life is not a paradise."
    japanese: "要するに，私の言いたいことは，人生は楽園ではないということだ。"
    notes: "〈頻出〉早大。in short「要するに/手短に言えば」(=in brief/to sum up)。"
  - id: "scr-243-p11"
    section_id: "Scr_243"
    drill: 1
    number: 1254
    role: "exam"
    english: "You must return my money next Friday without fail."
    japanese: "来週の金曜日に必ずお金を返してください。"
    notes: "亜細亜大。without fail「必ず/きっと/間違いなく」(=for certain/for sure⇨1234/certainly/surely)。"
  - id: "scr-243-e01"
    section_id: "Scr_243"
    drill: 0
    number: 1244
    role: "example"
    english: "I want a room of my own."
    japanese: "私は自分の部屋が欲しい。"
    notes: "比較。of one's own「自分自身の」。on one's own(独力で)との区別。"
  - id: "scr-243-e02"
    section_id: "Scr_243"
    drill: 0
    number: 1247
    role: "example"
    english: "The wounds will heal in time."
    japanese: "やがて傷は癒える。"
    notes: "プラスα。in time「やがて/そのうちに」(⇨212)。「間に合って」とは別の意味。"
  - id: "scr-243-e03"
    section_id: "Scr_243"
    drill: 0
    number: 1251
    role: "example"
    english: "Keep a dictionary close at hand."
    japanese: "辞書をすぐ手元に置いておきなさい。"
    notes: "プラスα。at hand「すぐ近くに」の位置的用法。close/nearと共起。"

