sentences:
  - id: "scr-069-p01"
    section_id: "Scr_069"
    drill: 1
    number: 250
    role: "exam"
    english: "Our task is to finish the work within a couple of hours, isn't it?"
    japanese: "私たちの任務は2、3時間以内にこの仕事を終えることですね。"
    notes: "難易度: 基本。出典: 上智大。肯定文 + 否定の付加疑問（be動詞）"
  - id: "scr-069-p02"
    section_id: "Scr_069"
    drill: 1
    number: 251
    role: "exam"
    english: "Bill hasn't ever played the drums, has he?"
    japanese: "ビルはドラムをたたいたことがないのですね。"
    notes: "難易度: 基本。出典: 聖心女子大。否定文 + 肯定の付加疑問（完了形）"
  - id: "scr-069-p03"
    section_id: "Scr_069"
    drill: 1
    number: 252
    role: "exam"
    english: "Come and stay with us for the weekend, won't you?"
    japanese: "週末わが家に泊まりに来なさいよ。"
    notes: "出典: 東海大。命令文 + will you? / won't you?。否定命令文はwill you?のみ"
  - id: "scr-069-p04"
    section_id: "Scr_069"
    drill: 1
    number: 253
    role: "exam"
    english: "Let's hike to the top of that mountain, shall we?"
    japanese: "あの山の頂上までハイキングに行きましょうよ。"
    notes: "出典: 高知大。Let's ~ + shall we?"
  - id: "scr-069-e01"
    section_id: "Scr_069"
    drill: 0
    number: 253
    role: "example"
    english: "There is no gasoline left, is there?"
    japanese: "ガソリンは残っていないですよね。"
    notes: "PU!47例文。否定語がnot以外（no）でも付加疑問は肯定形"
  - id: "scr-069-e02"
    section_id: "Scr_069"
    drill: 0
    number: 253
    role: "example"
    english: "She seldom answers her phone, does she?"
    japanese: "彼女はめったに電話に出ないね。"
    notes: "PU!47例文。否定語がnot以外（seldom）でも付加疑問は肯定形"

