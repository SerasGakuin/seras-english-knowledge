sentences:
  - id: "scr-117-p01"
    section_id: "Scr_117"
    drill: 1
    number: 449
    role: "exam"
    english: "As long as I live, I will not let you do such a thing."
    japanese: "私が生きている限りは、あなたにそんなことはさせない。"
    notes: "難易度: 頻出。出典: 立命館大。as [so] long as「〜する限りは/〜する間は」(= while) — 時間の制限"
  - id: "scr-117-p02"
    section_id: "Scr_117"
    drill: 1
    number: 450
    role: "exam"
    english: "As long as you come back home by ten, you may go out."
    japanese: "10時までに帰ってくれば、出かけてもよい。"
    notes: "難易度: 頻出。出典: 亜細亜大。as [so] long as「〜しさえすれば/〜ならば」(= only if) — 条件"
  - id: "scr-117-p03"
    section_id: "Scr_117"
    drill: 1
    number: 451
    role: "exam"
    english: "As far as I am concerned, the performance tonight was perfect."
    japanese: "私に関する限り、今夜の演奏は完璧でした。"
    notes: "難易度: 頻出。出典: 青山学院大。as [so] far as「〜する限りでは/〜の範囲内では」— 範囲の制限。as far as I'm concerned「私に関する限りでは」"
  - id: "scr-117-e01"
    section_id: "Scr_117"
    drill: 0
    number: 0
    role: "example"
    english: "You won't get into trouble as long as you follow the rules."
    japanese: "ルールを守りさえすれば、トラブルにはならないだろう。"
    notes: "問450解説例文。as long asの「条件」の意味が時間の制限から派生する例。「守る間は→守りさえすれば」"

