sentences:
  - id: "scr-250-p01"
    section_id: "Scr_250"
    drill: 1
    number: 1297
    role: "exam"
    english: "It is up to you to tell everybody what you have in mind."
    japanese: "君が何を考えているのか，みんなに話すことが君の責任だ。"
    notes: "〈超頻〉東京理科大。up to〜「〜の責任[義務]で/〜次第で」。It is up to A to do / whether〜の形。"
  - id: "scr-250-p02"
    section_id: "Scr_250"
    drill: 1
    number: 1298
    role: "exam"
    english: "On behalf of the organizing committee, I would like to thank you all for your participation."
    japanese: "組織委員会を代表して，皆様のご参加にお礼申し上げます。"
    notes: "〈頻出〉関西学院大。on [in] behalf of〜「〜を代表して/〜に代わって」(=in place of)。represent「〜を代表する」。"
  - id: "scr-250-p03"
    section_id: "Scr_250"
    drill: 1
    number: 1299
    role: "exam"
    english: "A welcome meeting was held in honor of Mr. Smith."
    japanese: "歓迎会がスミス氏のために開かれた。"
    notes: "早大。in honor of〜「〜に敬意を表して/〜のために」。"
  - id: "scr-250-p04"
    section_id: "Scr_250"
    drill: 1
    number: 1300
    role: "exam"
    english: "We are not in favor of his opinion."
    japanese: "私たちは彼の意見に賛成ではない。"
    notes: "〈頻出〉名古屋学院大。in favor of〜「〜に賛成して」(=for⇨716)。"
  - id: "scr-250-p05"
    section_id: "Scr_250"
    drill: 1
    number: 1301
    role: "exam"
    english: "The person in charge of a ship and its crew is called a captain."
    japanese: "船と乗組員を任されている人のことを船長と呼ぶ。"
    notes: "〈頻出〉成城大。in charge of〜「〜を担当[世話/管理]して」。プラスα: take charge of〜「〜を担当する」。"
  - id: "scr-250-p06"
    section_id: "Scr_250"
    drill: 1
    number: 1302
    role: "exam"
    english: "Contrary to my expectations, he failed."
    japanese: "私の予想に反して，彼は失敗しました。"
    notes: "國學院大。contrary to〜「〜に反して」。比較: on the contrary「それどころか」(⇨1189)と区別。"
  - id: "scr-250-p07"
    section_id: "Scr_250"
    drill: 1
    number: 1303
    role: "exam"
    english: "Apart from the great expense, I simply didn't like traveling by air."
    japanese: "費用が高いのは別にして，私はどうしても飛行機で行くのが嫌いだった。"
    notes: "〈頻出〉獨協医大。apart from〜「〜は別として/〜はさておき」(=aside from)。"
  - id: "scr-250-p08"
    section_id: "Scr_250"
    drill: 1
    number: 1304
    role: "exam"
    english: "He went forward in the face of many obstacles."
    japanese: "彼は数々の障害をものともせず前進した。"
    notes: "名古屋外語大。in the face of〜「〜に直面して/〜をものともせず」。"
  - id: "scr-250-p09"
    section_id: "Scr_250"
    drill: 1
    number: 1305
    role: "exam"
    english: "The thief ran away at the sight of a policeman."
    japanese: "どろぼうは警官を見て逃げ去った。"
    notes: "センター。at the sight of〜「〜を見て」。= when he saw a policeman。"
  - id: "scr-250-p10"
    section_id: "Scr_250"
    drill: 1
    number: 1306
    role: "exam"
    english: "We want to give you this little present in return for your kindness."
    japanese: "親切にしてくれたお返しに，あなたにこのささやかな贈り物をしたい。"
    notes: "立命館大。in return for〜「〜のお返しに/〜の返礼として」。for以下なくin returnだけでもよく使う。"
  - id: "scr-250-e01"
    section_id: "Scr_250"
    drill: 0
    number: 1297
    role: "example"
    english: "It's up to you whether we go or stay."
    japanese: "行くか残るかは，あなた次第だ。"
    notes: "It is up to A whether〜の形。up to「〜次第で」。"
  - id: "scr-250-e02"
    section_id: "Scr_250"
    drill: 0
    number: 1297
    role: "example"
    english: "His TOEIC score is now up to 750."
    japanese: "彼のTOEICの点数は750まで上がった。"
    notes: "up toの意味①「(数値など)〜まで/〜に至るまで」。"
  - id: "scr-250-e03"
    section_id: "Scr_250"
    drill: 0
    number: 1297
    role: "example"
    english: "It seems that he is up to something bad."
    japanese: "彼は何か良からぬことをたくらんでいるようだ。"
    notes: "up toの意味②「(通例悪事など)をたくらんで」。"
  - id: "scr-250-e04"
    section_id: "Scr_250"
    drill: 0
    number: 1298
    role: "example"
    english: "I want to take action on behalf of the refugees."
    japanese: "難民のために行動を起こしたい。"
    notes: "プラスα。on behalf of〜の「〜のために」の意味。"
  - id: "scr-250-e05"
    section_id: "Scr_250"
    drill: 0
    number: 1301
    role: "example"
    english: "She will take charge of our children during the trip."
    japanese: "旅行の間，彼女が子どもたちの世話をしてくれる。"
    notes: "プラスα。take charge of〜「〜を担当[世話/管理]する」。"

