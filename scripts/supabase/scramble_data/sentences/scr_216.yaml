sentences:
  - id: "scr-216-p01"
    section_id: "Scr_216"
    drill: 1
    number: 942
    role: "exam"
    english: "Don't be afraid of asking for help when it is needed."
    japanese: "助けが必要な時は、助けを求めることを恐れるな。"
    notes: "〈基本〉〈頻出〉立教大。ask for〜「〜を求める」(=request/demand)。ask A for B「AにBを求める」。"
  - id: "scr-216-p02"
    section_id: "Scr_216"
    drill: 1
    number: 943
    role: "exam"
    english: "When my sister was sick, my parents looked after her."
    japanese: "妹が病気の時、両親が彼女の世話をした。"
    notes: "〈基本〉〈頻出〉慶應大。look after〜「〜の世話をする」(=take care of/care for)。"
  - id: "scr-216-p03"
    section_id: "Scr_216"
    drill: 1
    number: 944
    role: "exam"
    english: "Lucy doesn't care for spicy food."
    japanese: "ルーシーは辛い料理が好きではない。"
    notes: "〈頻出〉care for〜[否定・疑問文で]「〜を好む」(=like/love)。肯定文では「〜の世話をする」(=look after)。"
  - id: "scr-216-p04"
    section_id: "Scr_216"
    drill: 1
    number: 945
    role: "exam"
    english: "I can't find my keys. Could you help me look for them?"
    japanese: "キーが見つからない。探すのを手伝ってくれませんか。"
    notes: "〈基本〉〈頻出〉芝浦工大。look for〜「〜を探す」(=search for)。"
  - id: "scr-216-p05"
    section_id: "Scr_216"
    drill: 1
    number: 946
    role: "exam"
    english: "She takes after her mother in that she is fond of sports."
    japanese: "彼女は、スポーツが好きだという点で彼女の母親に似ている。"
    notes: "〈頻出〉高知大。take after〜「〜に似ている」(=resemble/look like)。血縁関係がある年上の人に用いる。"
  - id: "scr-216-p06"
    section_id: "Scr_216"
    drill: 1
    number: 947
    role: "exam"
    english: "The committee will look into the cause of the disaster."
    japanese: "委員会はその災害の原因を調査する予定だ。"
    notes: "〈頻出〉神戸学院大。look into〜「（問題・事件など）を調べる」(=investigate/examine)。"
  - id: "scr-216-p07"
    section_id: "Scr_216"
    drill: 1
    number: 948
    role: "exam"
    english: "I always look over my homework before I turn it in."
    japanese: "私は提出前にいつも宿題にざっと目を通す。"
    notes: "関西外大。look over〜「（書類など）にざっと目を通す」(=check)。turn it in「提出する」(⇨930)。"
  - id: "scr-216-p08"
    section_id: "Scr_216"
    drill: 1
    number: 949
    role: "exam"
    english: "Everyone in the class took to him at once."
    japanese: "クラスのみんながすぐに彼のことを好きになった。"
    notes: "東海大。take to〜「〜を好きになる」(=come to like)。take to〜には「〜にふける」の意味も(take to drinking)。"
  - id: "scr-216-p09"
    section_id: "Scr_216"
    drill: 1
    number: 950
    role: "exam"
    english: "The teacher asked Jack to account for his absence from school."
    japanese: "先生はジャックに学校を休んだ理由を説明するように言った。"
    notes: "〈頻出〉亜細亜大。account for〜「〜の理由を説明する」(=explain)。〈重要〉「〜を占める」の意味も頻出。"
  - id: "scr-216-p10"
    section_id: "Scr_216"
    drill: 1
    number: 951
    role: "exam"
    english: "Sharply rising land prices added to the high cost of housing in Vancouver."
    japanese: "急激に上昇する地価が、バンクーバーの住宅費の高騰に拍車をかけた。"
    notes: "獨協大。add to〜「〜を増やす/増す」(=increase)。add A to B「AをBに加える」。"
  - id: "scr-216-p11"
    section_id: "Scr_216"
    drill: 1
    number: 952
    role: "exam"
    english: "A succession of late nights are beginning to tell on my health."
    japanese: "夜ふかしの連続が私の体にこたえ始めてきた。"
    notes: "青山学院大。tell on〜「（人・健康など）にこたえる/影響する」(=affect)。"
  - id: "scr-216-p12"
    section_id: "Scr_216"
    drill: 1
    number: 953
    role: "exam"
    english: "You will have to answer for this waste."
    japanese: "君はこのようなむだ使いの責任を取らなければならないだろう。"
    notes: "〈発展〉青山学院大。answer for〜「〜の責任を負う」(=be responsible for)。"
  - id: "scr-216-e01"
    section_id: "Scr_216"
    drill: 0
    number: 950
    role: "example"
    english: "In some countries, tourism revenue accounts for at least 20% of GDP."
    japanese: "一部の国では、観光収入がGDPの少なくとも20%を占めている。"
    notes: "〈重要〉account for〜「〜（の割合）を占める」の用法。"

