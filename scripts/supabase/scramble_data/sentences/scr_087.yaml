sentences:
  - id: "scr-087-p01"
    section_id: "Scr_087"
    drill: 1
    number: 326
    role: "exam"
    english: "Will you lend me some money?"
    japanese: "いくらかお金を貸してくれませんか。"
    notes: "出典: 東海大。疑問文中のsome: 依頼・勧めの場合（肯定の答えを予期）"
  - id: "scr-087-p02"
    section_id: "Scr_087"
    drill: 1
    number: 327
    role: "exam"
    english: "I hope you would become a leader some day."
    japanese: "君がいつかリーダーになることを願っている。"
    notes: "出典: 青山学院大。some + 単数可算名詞「ある～」。some day =「(将来の)いつか」。cf. the other day「先日」"
  - id: "scr-087-p03"
    section_id: "Scr_087"
    drill: 1
    number: 328
    role: "exam"
    english: "You can catch any of these buses. They all go downtown."
    japanese: "これらのバスのどれに乗ってもいいですよ。すべて中心街に行きますから。"
    notes: "出典: 東京理科大。肯定文中のany: any of A「Aの中のどれでも」"
  - id: "scr-087-p04"
    section_id: "Scr_087"
    drill: 1
    number: 329
    role: "exam"
    english: "Any pencil will do. I just need to quickly take down his number."
    japanese: "どんな鉛筆でもいい。彼の電話番号を急いで書き留める必要があるんだ。"
    notes: "出典: 亜細亜大。肯定文中のany: any + 単数名詞「どんな～でも」。S will do（⇨ 問726）"

