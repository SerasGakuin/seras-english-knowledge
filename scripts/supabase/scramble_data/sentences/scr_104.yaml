sentences:
  - id: "scr-104-p01"
    section_id: "Scr_104"
    drill: 1
    number: 397
    role: "exam"
    english: "Both you and I are suspected by the police."
    japanese: "あなたも私も警察に疑われている。"
    notes: "難易度: 基本。出典: 駒澤大。both A and Bが主語 → 動詞は複数扱い"
  - id: "scr-104-p02"
    section_id: "Scr_104"
    drill: 1
    number: 398
    role: "exam"
    english: "Either David or Mary has to attend the next meeting."
    japanese: "デイビッドかメアリーのどちらかが次の会議に出席しなければならない。"
    notes: "難易度: 頻出。出典: 芝浦工大。either A or Bが主語 → 動詞はBに一致"
  - id: "scr-104-p03"
    section_id: "Scr_104"
    drill: 1
    number: 399
    role: "exam"
    english: "It was neither easy nor difficult."
    japanese: "易しくも難しくもなかったよ。"
    notes: "難易度: 頻出。出典: 法政大。対話問題（A: How did you do on the exam yesterday? B: I'm not sure.）。neither A nor B「AもBも〜ない」(= not either A or B)。Bに動詞一致"
  - id: "scr-104-p04"
    section_id: "Scr_104"
    drill: 1
    number: 400
    role: "exam"
    english: "Tom is not a teacher but a politician."
    japanese: "トムは教師ではなく政治家だ。"
    notes: "難易度: 基本、頻出。出典: 東京経済大。not A but B「AではなくB」。butは「しかし」と訳さない。発展: B, and not A / B, not Aの形でBを前に出せる"
  - id: "scr-104-p05"
    section_id: "Scr_104"
    drill: 1
    number: 401
    role: "exam"
    english: "Not only the employees but also the president is optimistic about the outcome of the new project."
    japanese: "従業員だけでなく社長も新しいプロジェクトの結果に楽観的です。"
    notes: "難易度: 頻出。出典: 中央大。not only A but (also) B → 動詞はBに一致。語句: outcome「結果/成果」"
  - id: "scr-104-p06"
    section_id: "Scr_104"
    drill: 1
    number: 402
    role: "exam"
    english: "I didn't go not because I was tired but because I didn't want to."
    japanese: "疲れていたからではなく、行きたくなかったので行かなかったのです。"
    notes: "出典: 大阪学院大。整序問題。not because A but because B「Aだからではなく Bだから」= not A but Bにbecauseが結びついた構文"

