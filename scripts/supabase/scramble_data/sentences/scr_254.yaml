sentences:
  - id: "scr-254-p01"
    section_id: "Scr_254"
    drill: 1
    number: 1324
    role: "exam"
    english: "Won't you have dinner with us at my house?"
    japanese: "私の家で食事をご一緒しませんか。"
    notes: "〈基本〉拓殖大。Will [Won't] you〜?「〜しませんか」。Won'tのほうが親しみのこもった言い方。応答: With pleasure.「喜んで」/ Certainly./ Sure.。A: の行。"
  - id: "scr-254-p02"
    section_id: "Scr_254"
    drill: 1
    number: 1325
    role: "exam"
    english: "Let's have a dance party next weekend, shall we?"
    japanese: "来週末，ダンスパーティーを開きましょうよ。"
    notes: "愛知学院大。Let's〜 (, shall we?)「〜しようよ」。shall we?で口調がやわらかくなる(⇨253)。応答: Yes, let's.「そうしましょう」。A: の行。"
  - id: "scr-254-p03"
    section_id: "Scr_254"
    drill: 1
    number: 1326
    role: "exam"
    english: "How about having a drink together after work?"
    japanese: "仕事が終わったら一杯飲みに行かないか。"
    notes: "〈頻出〉駒澤大。How [What] about doing?=What do you say to doing?「〜しませんか」(⇨263)。名詞も続く: How about some pizza? A: の行。"
  - id: "scr-254-p04"
    section_id: "Scr_254"
    drill: 1
    number: 1327
    role: "exam"
    english: "Why don't we go out somewhere tonight?"
    japanese: "今晩どこかに出かけないか。"
    notes: "〈頻出〉センター。Why don't we do?=Why not do?「〜しませんか」(自分を含めた提案)。比較: Why don't you do?は相手への提案・勧誘(⇨261)。応答: That sounds good [great].。A: の行。"
  - id: "scr-254-p05"
    section_id: "Scr_254"
    drill: 1
    number: 1328
    role: "exam"
    english: "Would you like to go to the movies?"
    japanese: "映画に行きませんか。"
    notes: "青山学院大。Would you like to do?「〜しませんか」。〈重要〉Would you like [care for]+名詞?「〜はいかがですか」(⇨1352)。応答: That's a good idea.。A: の行。"

