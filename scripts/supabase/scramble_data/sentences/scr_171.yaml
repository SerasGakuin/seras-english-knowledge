sentences:
  - id: "scr-171-p01"
    section_id: "Scr_171"
    drill: 1
    number: 667
    role: "exam"
    english: "At first glance the idea appears to be attractive; however, there are some problems to be solved."
    japanese: "一見、その考えは魅力的に見える。しかし、解決すべき問題がいくつかある。"
    notes: "出典: 清泉女子大。〈頻出〉4択問題。however「しかしながら」（逆接）。therefore「それゆえに」、furthermore = in addition「その上」。at first glance「一見したところでは」(= at first sight)。"
  - id: "scr-171-p02"
    section_id: "Scr_171"
    drill: 1
    number: 668
    role: "exam"
    english: "It's too late to go out now. Besides, it's starting to rain."
    japanese: "もう出かけるには遅すぎる。その上、雨も降り出している。"
    notes: "出典: センター。〈頻出〉4択問題。besides「その上/さらに」（追加）= moreover / in addition / furthermore。All the same「それにもかかわらず」(= nevertheless)、At least「少なくとも」。"
  - id: "scr-171-p03"
    section_id: "Scr_171"
    drill: 1
    number: 669
    role: "exam"
    english: "The temperature has been rising in recent years. Therefore the sales of air conditioners are very high."
    japanese: "近年気温が上昇している。したがってエアコンがよく売れている。"
    notes: "出典: 芝浦工大。〈頻出〉4択問題。therefore「それゆえに/したがって」（結果）。soより硬い語。"
  - id: "scr-171-p04"
    section_id: "Scr_171"
    drill: 1
    number: 670
    role: "exam"
    english: "We all knew that there was nothing we could do to prevent him from leaving our team. Nevertheless, we could not help asking him not to."
    japanese: "彼が退部するのを止めるために、私たちにできることは何もないとみんなわかっていた。それでも、退部しないでと頼まずにはいられなかった。"
    notes: "出典: 中央大。4択問題。nevertheless「それにもかかわらず」（逆接）= all the same。Moreover「その上」、Specifically「明確に」。代不定詞の否定形: ask him not to = ask him not to leave（⇨ 100）。"
  - id: "scr-171-p05"
    section_id: "Scr_171"
    drill: 1
    number: 671
    role: "exam"
    english: "It rained heavily all night, and consequently, the river overflowed."
    japanese: "一晩中激しい雨が降り、その結果、川が氾濫した。"
    notes: "4択問題。(and) consequently「その結果」（結果）。(and) yet「しかし」、otherwise「そうでなければ」、instead「代わりに」。"
  - id: "scr-171-p06"
    section_id: "Scr_171"
    drill: 1
    number: 672
    role: "exam"
    english: "He has treated you badly; still, he's your brother and you ought to help him."
    japanese: "彼は君にひどい仕打ちをしてきたが、それでも彼は君の兄弟なのだから、助けてあげるべきだ。"
    notes: "出典: 東京電機大。4択問題。still「それでも」（逆接）。althoughに接続副詞の用法はない。then「それに/その上」では文意不通。"

