sentences:
  - id: "scr-222-p01"
    section_id: "Scr_222"
    drill: 1
    number: 1013
    role: "exam"
    english: "I can't put up with that noise from outside. That really makes me annoyed."
    japanese: "外からの騒音に我慢できない。本当にいらいらする。"
    notes: "〈超頻〉北里大。put up with〜「〜を我慢する」(=endure/stand/bear/tolerate)。"
  - id: "scr-222-p02"
    section_id: "Scr_222"
    drill: 1
    number: 1014
    role: "exam"
    english: "I hear that the organization will do away with the rule."
    japanese: "その機関はルールを廃止するらしい。"
    notes: "中部大。do away with〜「（規則・慣行など）を廃止する」(=abolish)。"
  - id: "scr-222-p03"
    section_id: "Scr_222"
    drill: 1
    number: 1015
    role: "exam"
    english: "She was looked up to as a considerate nurse at the hospital."
    japanese: "彼女はその病院で思いやりのある看護師として尊敬された。"
    notes: "〈頻出〉名城大。look up to〜「〜を尊敬する」(=respect)。語句: considerate「思いやりのある」（⇨871）。"
  - id: "scr-222-p04"
    section_id: "Scr_222"
    drill: 1
    number: 1016
    role: "exam"
    english: "You should never look down on a man merely because he is poor."
    japanese: "単に貧しいからといって人を見下してはいけない。"
    notes: "〈頻出〉慶應大。look down on[upon]〜「〜を見下す/〜を軽べつする」(=despise)。"
  - id: "scr-222-p05"
    section_id: "Scr_222"
    drill: 1
    number: 1017
    role: "exam"
    english: "Since I came in an hour later this morning, I have to work until 7:30 to make up for it."
    japanese: "今朝1時間遅れて来たので、その埋め合わせをするために7時半まで働かなくてはなりません。"
    notes: "〈頻出〉成城大。make up for〜「〜の埋め合わせをする/〜を償う」(=compensate (for)/make amends for)。"
  - id: "scr-222-p06"
    section_id: "Scr_222"
    drill: 1
    number: 1018
    role: "exam"
    english: "You shouldn't speak ill of others without reason."
    japanese: "何の根拠もなく他人のことを悪く言わない方がいいよ。"
    notes: "高知大。speak ill[badly] of〜「〜のことを悪く言う/〜をけなす」(=criticize)。⇔speak well[highly] of〜「〜のことをよく言う/〜をほめる」(=praise)。"
  - id: "scr-222-p07"
    section_id: "Scr_222"
    drill: 1
    number: 1019
    role: "exam"
    english: "She is going in for the 100-meter race."
    japanese: "彼女は100メートル競走に出場します。"
    notes: "〈発展〉青山学院大。go in for〜「（競技）に参加する(=take part in)/（試験）を受ける」。「（好きで）〜をする」の意味も。"
  - id: "scr-222-p08"
    section_id: "Scr_222"
    drill: 1
    number: 1020
    role: "exam"
    english: "I couldn't live up to his expectations."
    japanese: "彼の期待に応えられませんでした。"
    notes: "〈頻出〉東京理科大。live up to〜「（期待など）に添う/応える」(=meet/satisfy)。「（主義など）に従って生きる」の意味も。"
  - id: "scr-222-p09"
    section_id: "Scr_222"
    drill: 1
    number: 1021
    role: "exam"
    english: "Parents need to stand up for their children."
    japanese: "親は子供を擁護しなければならない。"
    notes: "大阪経済大。stand up for〜「〜を擁護する(=defend)/〜を支持する(=support)」。"
  - id: "scr-222-p10"
    section_id: "Scr_222"
    drill: 1
    number: 1022
    role: "exam"
    english: "They put up at a luxury hotel by the beach."
    japanese: "彼らはビーチのそばの高級ホテルに泊まった。"
    notes: "put up at〜「〜に泊まる」(=stay at)。"
  - id: "scr-222-p11"
    section_id: "Scr_222"
    drill: 1
    number: 1023
    role: "exam"
    english: "Go on with the treatment. It is doing you good."
    japanese: "治療を続けなさい。良くなってきていますから。"
    notes: "青山学院大。go on with〜「〜を続ける」(=continue)。go on doing「〜し続ける」(=keep on doing)。"
  - id: "scr-222-p12"
    section_id: "Scr_222"
    drill: 1
    number: 1024
    role: "exam"
    english: "It's time you got down to work."
    japanese: "そろそろ仕事に取りかかる頃だよ。"
    notes: "〈発展〉愛知学院大。get down to〜「〜に取りかかる/〜に本気で取り組む」。語句: It is time+S+仮定法過去（⇨160）。"
  - id: "scr-222-e01"
    section_id: "Scr_222"
    drill: 0
    number: 1020
    role: "example"
    english: "She wants to live up to her values in any situation."
    japanese: "彼女はどんな状況でも自分の価値観に従って生きたいと思っている。"
    notes: "プラスα。live up to〜の「（主義など）に従って生きる」用法。"
  - id: "scr-222-e02"
    section_id: "Scr_222"
    drill: 0
    number: 1023
    role: "example"
    english: "The children went on playing even though it started raining."
    japanese: "雨が降り始めても子どもたちは遊び続けた。"
    notes: "解説例文。go on doing「〜し続ける」(=keep on doing)。"

