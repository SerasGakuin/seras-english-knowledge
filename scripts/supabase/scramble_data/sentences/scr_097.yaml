sentences:
  - id: "scr-097-p01"
    section_id: "Scr_097"
    drill: 1
    number: 371
    role: "exam"
    english: "Her hat, which is blue, goes well with her hair."
    japanese: "彼女の帽子は青色だが、彼女の髪によく合っている。"
    notes: "出典: 成蹊大。非制限用法の関係代名詞which。thatは非制限用法では使えない"
  - id: "scr-097-p02"
    section_id: "Scr_097"
    drill: 1
    number: 372
    role: "exam"
    english: "The company plans to hire 10 people, all of whom should have college degrees."
    japanese: "その会社は10人を雇う予定で、その全員が大学の学位を取得していなければならない。"
    notes: "難易度: 発展。出典: 金城学院大。「A of + 関係代名詞」の非制限用法。A: all/most/some/many/both/neither等"
  - id: "scr-097-p03"
    section_id: "Scr_097"
    drill: 1
    number: 373
    role: "exam"
    english: "I went to the supermarket near my house, where I happened to meet one of my old friends."
    japanese: "私は家の近くのスーパーに出かけ、そこで旧友の1人に偶然出会った。"
    notes: "出典: 愛知学院大。非制限用法の関係副詞where（= and there）。happen to do「偶然～する」"
  - id: "scr-097-e01"
    section_id: "Scr_097"
    drill: 0
    number: 0
    role: "example"
    english: "He dismissed the man, who was lazy."
    japanese: "彼はその男を解雇した、怠け者だったからだ。"
    notes: "PU!72例文。非制限用法の意味のとり方: , who = because he（接続詞+代名詞に置き換え）"
  - id: "scr-097-e02"
    section_id: "Scr_097"
    drill: 0
    number: 0
    role: "example"
    english: "She sat up until midnight, when she heard a strange noise."
    japanese: "彼女は真夜中まで起きていた、するとその時、奇妙な物音が聞こえた。"
    notes: "PU!72例文。非制限用法の意味のとり方: , when = and then（接続詞+副詞に置き換え）"

