sentences:
  - id: "scr-076-p01"
    section_id: "Scr_076"
    drill: 1
    number: 279
    role: "exam"
    english: "I cannot walk along this street without running into someone I know."
    japanese: "この通りを歩くと、必ず知り合いに出会ってしまう。"
    notes: "難易度: 頻出。出典: 近畿大。整序問題。cannot ... without doing =「…すると必ず～する」（二重否定→強い肯定）。= Whenever I walk along this street, I run into someone I know. run into ～（⇨ 問967）"
  - id: "scr-076-e01"
    section_id: "Scr_076"
    drill: 0
    number: null
    role: "example"
    english: "In no way is this your fault."
    japanese: "これがあなたのせいだなんてことは決してない。"
    notes: "PU!52。in no way =「決して～でない」。文頭に出ると倒置"
  - id: "scr-076-e02"
    section_id: "Scr_076"
    drill: 0
    number: null
    role: "example"
    english: "Under no circumstances should you give up."
    japanese: "決してあきらめてはならない。"
    notes: "PU!52。under no circumstances =「決して～でない」。文頭に出ると倒置"
  - id: "scr-076-e03"
    section_id: "Scr_076"
    drill: 0
    number: null
    role: "example"
    english: "It never rains but it pours."
    japanese: "降れば必ずどしゃ降り（2度あることは3度ある）。"
    notes: "PU!53①。ことわざ。but =「～しないでは」の接続詞。= It never rains without pouring."
  - id: "scr-076-e04"
    section_id: "Scr_076"
    drill: 0
    number: null
    role: "example"
    english: "Not a week passed without some unexpected problem arising."
    japanese: "毎週必ず予期せぬ問題が起こった。"
    notes: "PU!53②。Not a ... without ～「毎～必ず…する」（二重否定）"
  - id: "scr-076-e05"
    section_id: "Scr_076"
    drill: 0
    number: null
    role: "example"
    english: "There is no rose without a thorn."
    japanese: "とげのないバラはない（バラには必ずとげがある）。"
    notes: "PU!53③。ことわざ。There is no ... without ～「～のない…はない」（二重否定）"
  - id: "scr-076-e06"
    section_id: "Scr_076"
    drill: 0
    number: null
    role: "example"
    english: "He never fails to show up on time."
    japanese: "彼は必ず時間通りに現れる。"
    notes: "PU!53④。never fail to do「必ず～する」（⇨ PU!98）（二重否定）"
  - id: "scr-076-e07"
    section_id: "Scr_076"
    drill: 0
    number: null
    role: "example"
    english: "Rain in this desert is not unusual during the winter months."
    japanese: "この砂漠で冬の間に雨が降るのはごくふつうのことだ。"
    notes: "PU!53⑤。not unusual =「ごくふつうの」（二重否定→肯定）"

