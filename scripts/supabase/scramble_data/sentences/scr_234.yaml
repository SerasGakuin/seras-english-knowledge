sentences:
  - id: "scr-234-p01"
    section_id: "Scr_234"
    drill: 1
    number: 1144
    role: "exam"
    english: "He is equal to the difficult task."
    japanese: "彼にはその難しい仕事をするだけの力がある。"
    notes: "〈頻出〉be equal to〜「（人・能力などが）〜に耐えられる/匹敵する」。元義「〜に等しい」。"
  - id: "scr-234-p02"
    section_id: "Scr_234"
    drill: 1
    number: 1145
    role: "exam"
    english: "As our society becomes more globalized, we need to be more aware of cultural differences."
    japanese: "私たちの社会がよりグローバル化するにつれて，私たちは文化の違いをより意識する必要がある。"
    notes: "〈頻出〉南山大。be aware of〜「〜に気づいている/〜を知っている」。同意: be conscious of〜。"
  - id: "scr-234-p03"
    section_id: "Scr_234"
    drill: 1
    number: 1146
    role: "exam"
    english: "It seems that he is entirely ignorant of the matter."
    japanese: "彼はその件についてはまったく知らないようだ。"
    notes: "武蔵大。be ignorant of〜「〜を知らない」(=be unaware of)。"
  - id: "scr-234-p04"
    section_id: "Scr_234"
    drill: 1
    number: 1147
    role: "exam"
    english: "They are tired of Chinese food."
    japanese: "彼らは中華料理にあきている。"
    notes: "〈基本〉〈頻出〉愛知学院大。be tired of〜「〜にあきている」。比較: be tired from〜「〜で疲れている」。"
  - id: "scr-234-p05"
    section_id: "Scr_234"
    drill: 1
    number: 1148
    role: "exam"
    english: "I've heard so much news about the scandal that I'm sick of it."
    japanese: "そのスキャンダルのニュースは聞きすぎてうんざりしている。"
    notes: "センター。be sick of〜「〜にうんざり」。tired ofより強意。be sick and tired ofの形も。newsは不可算名詞(⇨595)。"
  - id: "scr-234-p06"
    section_id: "Scr_234"
    drill: 1
    number: 1149
    role: "exam"
    english: "I'm fed up with so many boring TV commercials every day."
    japanese: "つまらないテレビコマーシャルが多すぎて，私は毎日うんざりしている。"
    notes: "愛知学院大。be fed up with〜「〜にうんざり」(=be tired of/be sick of)。feed up A with B「Aに〜をあきるほど食べさせる」の受身。"
  - id: "scr-234-p07"
    section_id: "Scr_234"
    drill: 1
    number: 1150
    role: "exam"
    english: "The movie was based on a true story."
    japanese: "その映画は実話に基づいていた。"
    notes: "〈頻出〉東京理科大。be based on[upon]〜「〜に基づいている」。base A on B「Aの基礎をBに置く」の受身。"
  - id: "scr-234-p08"
    section_id: "Scr_234"
    drill: 1
    number: 1151
    role: "exam"
    english: "The use of bright colors is characteristic of his paintings."
    japanese: "鮮やかな色使いは，彼の絵に特有のものである。"
    notes: "be characteristic of〜/be peculiar to〜「〜に特有である」。"
  - id: "scr-234-p09"
    section_id: "Scr_234"
    drill: 1
    number: 1152
    role: "exam"
    english: "You can see bowing in many places in East Asia; this custom is not peculiar to Japanese people."
    japanese: "東アジアの多くの場所でお辞儀が見られる。この習慣は日本人に特有ではない。"
    notes: "東海大。be peculiar to〜「〜に特有である」。前置詞がofではなくtoであることに注意。"
  - id: "scr-234-p10"
    section_id: "Scr_234"
    drill: 1
    number: 1153
    role: "exam"
    english: "Bob asked me if I was content with my present job."
    japanese: "ボブは私に今の仕事に満足しているかどうか聞いた。"
    notes: "〈頻出〉昭和女子大。be content(ed) with〜「（完全にとは言えないが）〜に満足している」。比較: be satisfied with〜「完全に満足」(⇨42)。"
  - id: "scr-234-p11"
    section_id: "Scr_234"
    drill: 1
    number: 1154
    role: "exam"
    english: "She was engaged in writing a letter."
    japanese: "彼女は手紙を書くのに没頭していた。"
    notes: "関東学院大。be engaged in〜「〜に従事している/〜で忙しい」(=be occupied with[in])。比較: be engaged to〜「〜と婚約」。"
  - id: "scr-234-e01"
    section_id: "Scr_234"
    drill: 0
    number: 1145
    role: "example"
    english: "They are conscious of the risks."
    japanese: "彼らはリスクに気づいている。"
    notes: "プラスα。be conscious of〜「〜を意識している/〜に気づいている」。be aware ofの同意表現。"
  - id: "scr-234-e02"
    section_id: "Scr_234"
    drill: 0
    number: 1153
    role: "example"
    english: "I am satisfied with your work."
    japanese: "私はあなたの仕事に満足しています。"
    notes: "比較。be satisfied with〜「（完全に）満足している」。contentより満足度が高い。"

