sentences:
  - id: "scr-151-p01"
    section_id: "Scr_151"
    drill: 1
    number: 593
    role: "exam"
    english: "Could you give me some information about the project?"
    japanese: "その計画について情報をもらえますか。"
    notes: "出典: 中部大。〈頻出〉4択問題。informationは不可算名詞。×an information、×many informations。some+不可算名詞「いくらかの~/何かの~」。"
  - id: "scr-151-p02"
    section_id: "Scr_151"
    drill: 1
    number: 594
    role: "exam"
    english: "Most of the furniture was already in the moving van, and the only thing left was a chandelier."
    japanese: "家具のほとんどはすでに引っ越しトラックに積み込まれ、残っているのはシャンデリアだけだった。"
    notes: "出典: 早大。〈頻出〉正誤問題（were→was）。furnitureは常に単数形で単数扱いする不可算名詞。most of the Aが主語の場合、動詞はAに一致させる。"
  - id: "scr-151-p03"
    section_id: "Scr_151"
    drill: 1
    number: 595
    role: "exam"
    english: "There is not much good news for the economy this year."
    japanese: "今年、経済について良いニュースはあまりない。"
    notes: "出典: 獨協大。〈頻出〉4択問題。newsは不可算名詞なのでmuchが正解。not much「あまり~でない」は部分否定（⇨ PU! 51）。"
  - id: "scr-151-p04"
    section_id: "Scr_151"
    drill: 1
    number: 596
    role: "exam"
    english: "They gave me a piece of advice on job seeking."
    japanese: "彼らは求職活動について私に1つのアドバイスをくれた。"
    notes: "出典: 立命館大。〈頻出〉4択問題。不可算名詞adviceを数える場合はa piece ofを用いる。information, furniture, news, baggage等も同様。"
  - id: "scr-151-p05"
    section_id: "Scr_151"
    drill: 1
    number: 597
    role: "exam"
    english: "Playing football is always fun."
    japanese: "フットボールをするのはいつも楽しい。"
    notes: "出典: 京都産業大。4択問題。funは不可算名詞。×a fun、×funs。強調形は×very funではなくa lot of fun / good [great] fun。be fun / It is fun to do [doing] / have funの形で使う。"
  - id: "scr-151-p06"
    section_id: "Scr_151"
    drill: 1
    number: 598
    role: "exam"
    english: "The teacher gave us some homework."
    japanese: "先生が私たちに宿題を出した。"
    notes: "出典: 九州産業大。4択問題。homeworkはworkと同様に不可算名詞。肯定文なのでanyではなくsomeを使う。"
  - id: "scr-151-e01"
    section_id: "Scr_151"
    drill: 0
    number: 0
    role: "example"
    english: "Most of the dogs in the park were playing happily."
    japanese: "公園にいる犬のほとんどが楽しそうに遊んでいた。"
    notes: "問594の対比例文。most of the Aが主語の場合、Aが複数名詞（dogs）なら動詞は複数形（were）。不可算名詞（furniture→was）との対比。"

