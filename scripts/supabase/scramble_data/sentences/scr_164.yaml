sentences:
  - id: "scr-164-p01"
    section_id: "Scr_164"
    drill: 1
    number: 644
    role: "exam"
    english: "This experiment is really exciting in that it has paved the way to the exploration of outer space."
    japanese: "この実験は宇宙探査への道を開いたという点で、本当に刺激的なものである。"
    notes: "出典: 早大。〈基本〉〈頻出〉正誤問題。①excited→excitingに訂正。主語がThis experiment（物事）→現在分詞。in that〜「〜という点で/〜だから」（⇨ 406）。pave the way to [for]〜「〜への道を開く」。"
  - id: "scr-164-p02"
    section_id: "Scr_164"
    drill: 1
    number: 645
    role: "exam"
    english: "The movie I saw last night was very interesting."
    japanese: "昨夜見た映画はとても面白かった。"
    notes: "出典: 高崎経済大。〈基本〉〈頻出〉4択問題。主語がThe movie（物事）→現在分詞interesting。②interested「興味を持って」は人が主語の場合。"
  - id: "scr-164-p03"
    section_id: "Scr_164"
    drill: 1
    number: 646
    role: "exam"
    english: "We found his speech extremely boring."
    japanese: "私たちは彼のスピーチを極めて退屈だと思った。"
    notes: "出典: 京都産業大。4択問題。find O C「OがCだとわかる/思う」（⇨ 541）。O=his speech（物事）→現在分詞boring。①a bore「退屈な人[物]」、③bored「退屈して」は人が主語の場合。"
  - id: "scr-164-p04"
    section_id: "Scr_164"
    drill: 1
    number: 647
    role: "exam"
    english: "I was really bored, so I decided to go for a run."
    japanese: "本当に退屈だったので、私はランニングに行くことに決めた。"
    notes: "出典: 麗澤大。4択問題。主語がI（人）→過去分詞bored「退屈させられた→退屈した」。②boredom「退屈/倦怠」(名詞)、③boresome/④boring「退屈させる」は物事が主語の場合。"
  - id: "scr-164-p05"
    section_id: "Scr_164"
    drill: 1
    number: 648
    role: "exam"
    english: "I was so surprised that I could get my driver's license on the first try."
    japanese: "私は一度で運転免許証をとることができたのでとても驚いた。"
    notes: "出典: 白百合女子大。〈頻出〉4択問題。主語がI（人）→過去分詞surprised。本問のso...thatのthatは「程度・結果」ではなく「〜なので/〜とは」（判断の理由・根拠）。①disappointed「失望して」は文脈不適切。"
  - id: "scr-164-p06"
    section_id: "Scr_164"
    drill: 1
    number: 649
    role: "exam"
    english: "We were pleased that they accepted our invitation."
    japanese: "彼らが私たちの招待を受けてくれてうれしかった。"
    notes: "出典: 追手門学院大。〈頻出〉4択問題。主語がWe（人）→過去分詞pleased「喜ばされた→喜んだ」。①pleasant/②pleasing「（物事が）楽しい/愉快な」。pleasantのほうが一般的。④please「〜を喜ばせる」(動詞)。"

