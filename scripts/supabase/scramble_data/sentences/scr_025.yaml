    english: "It is almost impossible to revise my report in such a short period of time."
    japanese: "こんな短期間に報告書を書き直すのはほぼ不可能だ。"
    notes: "難易度: 基本; 出典: 東北学院大; 整序問題; 形式主語構文 It is ... (for A) to do; 元の形: To revise my report ... is almost impossible.（⇨287）"
  - id: "scr-025-p02"
    section_id: "Scr_025"
    drill: 1
    number: 86
    role: "exam"
    english: "All he could do was to cry for help."
    japanese: "彼にできることは助けを求めて叫ぶことだけだった。"
    notes: "出典: 法政大; 整序問題; 補語になる場合; 〈重要〉All + S + can do is (to) do「Sにできるのは〜だけだ」; 《米口語》ではtoが省略されて原形不定詞"
  - id: "scr-025-p03"
    section_id: "Scr_025"
    drill: 1
    number: 87
    role: "exam"
    english: "How to use the library is the key to a successful college life."
    japanese: "図書館をどのように利用するかは充実した大学生活への手がかりである。"
    notes: "難易度: 基本; 難易度: 頻出; 出典: 中京大; 整序問題; 疑問詞+to不定詞（how to do）が主語; 語句: the key to ~「〜の秘訣/手がかり」（⇨704）"

