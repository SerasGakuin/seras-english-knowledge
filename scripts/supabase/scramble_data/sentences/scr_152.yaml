sentences:
  - id: "scr-152-p01"
    section_id: "Scr_152"
    drill: 1
    number: 599
    role: "exam"
    english: "I made friends with some foreigners at the party last night."
    japanese: "私は昨晩パーティーで何人かの外国人と友達になった。"
    notes: "出典: 九州産業大。〈頻出〉4択問題。make friends with ~「~と友達になる」。friendsと必ず複数形。"
  - id: "scr-152-p02"
    section_id: "Scr_152"
    drill: 1
    number: 600
    role: "exam"
    english: "They are on good terms with their neighbors."
    japanese: "彼らは隣人と仲がよい。"
    notes: "出典: 学習院大。〈頻出〉4択問題。be on good terms with ~「~と仲がよい」。termsは「間柄」の意味で複数形（⇨ 850(c)）。"
  - id: "scr-152-p03"
    section_id: "Scr_152"
    drill: 1
    number: 601
    role: "exam"
    english: "He has been on bad terms with his father for years."
    japanese: "彼は父親と何年にもわたって仲が悪い。"
    notes: "出典: 中央大。〈頻出〉整序問題（1語不要: related with）。be on bad terms with ~「~と仲が悪い」。"
  - id: "scr-152-p04"
    section_id: "Scr_152"
    drill: 1
    number: 602
    role: "exam"
    english: "Since there was only one washing machine, we had no choice but to take turns using it."
    japanese: "洗濯機が1台しかなかったので、交替で使わざるを得なかった。"
    notes: "出典: 獨協医大。〈頻出〉〈発展〉4択問題。take turns (at [in]) doing「交替で~する」。turnは「順番」の意味で必ず複数形。have no choice but to do「~するしかない」（⇨ PU! 20）。"
  - id: "scr-152-p05"
    section_id: "Scr_152"
    drill: 1
    number: 603
    role: "exam"
    english: "I will make contact with Professor Smith by some means or other."
    japanese: "スミス教授にはどうにかして連絡を取ります。"
    notes: "出典: 獨協医大。〈頻出〉4択問題。by some means or other「何らかの方法で/何とかして」。meansは「手段/方法」の意味では単複同形。"
  - id: "scr-152-p06"
    section_id: "Scr_152"
    drill: 1
    number: 604
    role: "exam"
    english: "Despite the long bus ride, she was in high spirits."
    japanese: "長時間のバス移動にもかかわらず、彼女は上機嫌だった。"
    notes: "出典: 立教大。〈発展〉4択問題。be in high [good/great] spirits「上機嫌である」(= be in a good mood)。⇔ be in low [poor] spirits「機嫌が悪い/元気がない」。spiritsは「気分」(= mood)の意味。"
  - id: "scr-152-p07"
    section_id: "Scr_152"
    drill: 1
    number: 605
    role: "exam"
    english: "The government intends to cut expenditures on arms."
    japanese: "政府は軍事費を削減するつもりである。"
    notes: "出典: 亜細亜大。4択問題。armsは「（軍隊用の）武器/兵器」(= weapons)の意味で常に複数形。下線部言い換え問題。"
  - id: "scr-152-e01"
    section_id: "Scr_152"
    drill: 0
    number: 0
    role: "example"
    english: "She is on friendly terms with her neighbors."
    japanese: "彼女は隣人たちと仲良くしている。"
    notes: "問601プラスα例文。be on ... terms with ~のtermsの前にはgood/bad以外にfriendly/speaking/visitingなども用いられる。"
  - id: "scr-152-e02"
    section_id: "Scr_152"
    drill: 0
    number: 0
    role: "example"
    english: "Every possible means has been tried."
    japanese: "ありとあらゆる方法が試された。"
    notes: "問603解説例文。meansは「手段」の意味では単複同形。Every ... means has（単数扱い）。= All possible means have been tried.（複数扱い）。"

