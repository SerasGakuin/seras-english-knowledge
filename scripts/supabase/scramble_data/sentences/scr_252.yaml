sentences:
  - id: "scr-252-p01"
    section_id: "Scr_252"
    drill: 1
    number: 1313
    role: "exam"
    english: "I am afraid I must be going now."
    japanese: "そろそろおいとましなければなりません。"
    notes: "関西学院大。別れを切り出す表現。=I've got to go now. / I'd better be going. / I must be going [leaving] now. A: の行。"
  - id: "scr-252-p02"
    section_id: "Scr_252"
    drill: 1
    number: 1313
    role: "exam"
    english: "I am glad to have met you."
    japanese: "お会いできてよかったです。"
    notes: "関西学院大。=Nice meeting you. 比較: Nice meeting you.は別れの表現、Nice to meet you.は初対面のあいさつ(⇨1310)。B: の行。"
  - id: "scr-252-p03"
    section_id: "Scr_252"
    drill: 1
    number: 1314
    role: "exam"
    english: "I've got to go now."
    japanese: "もう行かなくちゃ。"
    notes: "大阪経済大。別れの切り出し。=I must be going now. 〈重要〉別れのあいさつ: Take it easy.「元気で」/ Take care!「気をつけて」/ So long!「それじゃ，また」。A: の行。"
  - id: "scr-252-p04"
    section_id: "Scr_252"
    drill: 1
    number: 1315
    role: "exam"
    english: "I'll miss you."
    japanese: "寂しくなりますね。"
    notes: "〈頻出〉しばらく会えなくなる人との別れの表現(⇨839(c))。A: の行。"
  - id: "scr-252-p05"
    section_id: "Scr_252"
    drill: 1
    number: 1315
    role: "exam"
    english: "Take care of yourself."
    japanese: "お体を大切にしてください。"
    notes: "〈頻出〉Take care!「気をつけて」より実際に相手の健康面を気遣う表現。B: の行。"
  - id: "scr-252-p06"
    section_id: "Scr_252"
    drill: 1
    number: 1316
    role: "exam"
    english: "Say hello to Mariko, please."
    japanese: "マリコによろしく伝えてください。"
    notes: "〈頻出〉関西学院大。Say hello to A.「Aによろしくね」。応答: I sure will./Yes, I will./OK, I will.など。A: の行。"
  - id: "scr-252-p07"
    section_id: "Scr_252"
    drill: 1
    number: 1317
    role: "exam"
    english: "Please give my best regards to your family."
    japanese: "ご家族によろしくお伝えください。"
    notes: "〈頻出〉札幌大。Give my (best) regards to A.はSay hello to A.より礼儀正しい。regardsの前にbest/kind(est)がつくことが多い。A: の行。"
  - id: "scr-252-p08"
    section_id: "Scr_252"
    drill: 1
    number: 1318
    role: "exam"
    english: "Please remember me to your father."
    japanese: "お父様によろしくお伝えください。"
    notes: "Remember me to A.「Aによろしく」。Say hello to A./Give my regards to A.のほうが一般的。"

