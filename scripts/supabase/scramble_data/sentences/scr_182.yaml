sentences:
  - id: "scr-182-p01"
    section_id: "Scr_182"
    drill: 1
    number: 712
    role: "exam"
    english: "Besides being a mother of three, Mrs. Ogawa is an excellent executive."
    japanese: "小川さんは3人の子どもの母親であるだけでなく、優れた経営幹部でもある。"
    notes: "出典: 愛知学院大。〈頻出〉4択問題。付加のbesides「〜に加えて」（= in addition to）。besides doing「〜するだけでなく」。副詞用法の「その上」（= in addition）もある（⇨ 668）。"
  - id: "scr-182-p02"
    section_id: "Scr_182"
    drill: 1
    number: 713
    role: "exam"
    english: "They set up a tent beside the tree."
    japanese: "彼らはその木のそばにテントを張った。"
    notes: "4択問題。場所・位置のbeside「〜のそばに」。besides「〜に加えて」との違いに注意。"
  - id: "scr-182-p03"
    section_id: "Scr_182"
    drill: 1
    number: 714
    role: "exam"
    english: "My brother is an authority on philosophy."
    japanese: "私の兄は哲学の権威だ。"
    notes: "出典: 中央大。4択問題。関連のon「〜に関して」。aboutやofよりも内容が詳細で専門的な場合に用いる。withにも「〜に関して」の意味があるが、成句の形で用いられることが多い。"
  - id: "scr-182-p04"
    section_id: "Scr_182"
    drill: 1
    number: 715
    role: "exam"
    english: "George drew a picture with a pencil."
    japanese: "ジョージは鉛筆で絵を描いた。"
    notes: "〈基本〉4択問題。道具・手段のwith「〜で/〜を使って」。可算名詞には冠詞がつく（with a pencil）。by「〜で」は交通・通信手段で無冠詞。in pencil = with a pencilだがinも無冠詞。through「〜を通じて」は仲介的手段。"
  - id: "scr-182-p05"
    section_id: "Scr_182"
    drill: 1
    number: 716
    role: "exam"
    english: "Are you for or against his proposal?"
    japanese: "あなたは彼の提案に賛成ですか？ それとも反対ですか？"
    notes: "出典: 高知大。〈頻出〉記述問題。賛成のfor「〜に賛成して」⇔ 反対のagainst「〜に反対して」。for = in favor of（⇨ 1300）。"
  - id: "scr-182-p06"
    section_id: "Scr_182"
    drill: 1
    number: 717
    role: "exam"
    english: "She is younger than her brother by three years."
    japanese: "彼女は兄より3歳年下だ。"
    notes: "出典: 群馬大。〈頻出〉4択問題。差を表すby「〜の差で/〜だけ」。= She is three years younger than her brother.（こちらがふつう）。miss the train by a minute「ちょっとの差で列車に乗り遅れる」。"
  - id: "scr-182-p07"
    section_id: "Scr_182"
    drill: 1
    number: 718
    role: "exam"
    english: "This book is very interesting except for a few mistakes."
    japanese: "この本は2、3の間違いを除けばとても面白い。"
    notes: "出典: 慶應大。〈発展〉4択問題。除外のexcept for「〜を除けば」。文中にall/everyなどの全体語がなくても使える。except/butは全体語が必要。PU!164: (1)全体語あり→except/but/except forいずれも可。(2)文頭や全体語なし→except forのみ。(3)前置詞・接続詞の前→exceptのみ。"

  - id: "scr-182-e01"
    section_id: "Scr_182"
    drill: 0
    number: 0
    role: "example"
    english: "He got the job through my help."
    japanese: "彼は私のつてでその職についた。"
    notes: "問715解説〈選択肢〉例文。through「〜を通じて/〜によって」は仲介的な手段を表す。with（道具・手段）との違いに注意。"

