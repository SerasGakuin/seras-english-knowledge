sentences:
  - id: "scr-159-p01"
    section_id: "Scr_159"
    drill: 1
    number: 627
    role: "exam"
    english: "I didn't bring anything to write with; can I borrow that pen of yours?"
    japanese: "書くものを何も持ってきませんでした。あなたのそのペンを借りてもいいですか。"
    notes: "出典: 東海大。4択問題。that pen of yours「あなたのそのペン」。thatと所有格は並べて使えないため、of yoursの形を使う。×that your pen。"
  - id: "scr-159-p02"
    section_id: "Scr_159"
    drill: 1
    number: 628
    role: "exam"
    english: "John, a friend of mine, asked me if I could jump over the fence."
    japanese: "友達のジョンは、僕がその塀を飛び越えることができるかどうかきいた。"
    notes: "出典: 名古屋学院大。整序問題。a friend of mine「私の友人の1人」。aと所有格myは並べて使えないため、a friend of mineの形を使う。×a my friend。"

