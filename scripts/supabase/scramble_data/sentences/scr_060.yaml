sentences:
  - id: "scr-060-p01"
    section_id: "Scr_060"
    drill: 1
    number: 207
    role: "exam"
    english: "I think my girlfriend is more cute than beautiful."
    japanese: "私の彼女はきれいというよりもかわいいと思う。"
    notes: "出典: 県立広島大"
  - id: "scr-060-p02"
    section_id: "Scr_060"
    drill: 1
    number: 208
    role: "exam"
    english: "I can't play the piano, much less the violin."
    japanese: "私はピアノを弾けない。ましてバイオリンを弾くことなどできない。"
    notes: "難易度: 頻出。出典: 法政大"
  - id: "scr-060-e01"
    section_id: "Scr_060"
    drill: 0
    number: 208
    role: "example"
    english: "I don't have time to clean the house, much less organize the garage."
    japanese: "家を掃除する時間はないし、ましてやガレージを整理する時間などない。"
    notes: "プラスα例文。much lessは名詞だけでなく動詞も置ける"
  - id: "scr-060-p03"
    section_id: "Scr_060"
    drill: 1
    number: 209
    role: "exam"
    english: "You ought to know better than to spend lots of money on such worthless junk."
    japanese: "そんな二束三文のがらくたに大金をつぎ込むようなことはすべきでない。"
    notes: "難易度: 頻出。出典: 成蹊大。整序問題（noが不要）"
  - id: "scr-060-e02"
    section_id: "Scr_060"
    drill: 0
    number: 209
    role: "example"
    english: "You should have known better."
    japanese: "君はもっと分別を持つべきだったのに。"
    notes: "解説例文。than以下が省略された形。参照: 問69（助動詞+have done）"
  - id: "scr-060-p04"
    section_id: "Scr_060"
    drill: 1
    number: 210
    role: "exam"
    english: "I'm glad to see your work getting better and better."
    japanese: "あなたの仕事がますます良くなっていくのを見ることができてうれしい。"
    notes: "出典: 日本大"
  - id: "scr-060-e03"
    section_id: "Scr_060"
    drill: 0
    number: 210
    role: "example"
    english: "The air pollution became more and more serious."
    japanese: "大気汚染がますます深刻になった。"
    notes: "解説例文。more型の場合: more and more + 原級"
  - id: "scr-060-e04"
    section_id: "Scr_060"
    drill: 0
    number: 210
    role: "example"
    english: "More and more people are choosing to work from home."
    japanese: "ますます多くの人が在宅勤務を選ぶようになっている。"
    notes: "プラスα例文。more and more + 名詞の形"
  - id: "scr-060-p05"
    section_id: "Scr_060"
    drill: 1
    number: 211
    role: "exam"
    english: "Well, I think she's more or less finished it."
    japanese: "うーん、だいたい終わっていると思うよ。"
    notes: "難易度: 頻出。出典: センター。対話問題Bの文。A: Is Satoko still writing her research paper?"
  - id: "scr-060-p06"
    section_id: "Scr_060"
    drill: 1
    number: 212
    role: "exam"
    english: "Sooner or later he'll see what is right and wrong."
    japanese: "遅かれ早かれ、彼にも善悪がわかるようになるだろう。"
    notes: "出典: 駒澤大。下線部同意語問題。in time「やがて」がほぼ同意（⇨ 問1247）"
  - id: "scr-060-p07"
    section_id: "Scr_060"
    drill: 1
    number: 213
    role: "exam"
    english: "A space trip is no longer just a fantastic dream."
    japanese: "宇宙旅行はもはやただの途方もない夢ではない。"
    notes: "難易度: 頻出。出典: 金沢工大。no longer = not ~ any longer"

