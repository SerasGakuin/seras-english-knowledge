sentences:
  - id: "scr-211-p01"
    section_id: "Scr_211"
    drill: 1
    number: 888
    role: "exam"
    english: "The craziest ideas often turn out to be the most interesting and useful ones in the long run."
    japanese: "最もばかげた考えが、長い目で見れば、最も興味深くて役に立つ考えであると、わかることがよくある。"
    notes: "〈頻出〉立教大。turn out (to be)〜「〜であることがわかる」(=prove (to be))。語句: in the long run「結局は/最後には」(⇨1222)。"
  - id: "scr-211-p02"
    section_id: "Scr_211"
    drill: 1
    number: 889
    role: "exam"
    english: "You should not cut in when someone else is talking."
    japanese: "だれかがしゃべっているときに、口をはさむべきではない。"
    notes: "中央大。cut in/break in「（話などに）口をはさむ/割り込む」(=interrupt)。cut in on〜=break in on〜。"
  - id: "scr-211-p03"
    section_id: "Scr_211"
    drill: 1
    number: 890
    role: "exam"
    english: "Please don't break in on our conversation."
    japanese: "私たちの会話に割り込まないでください。"
    notes: "大阪電通大。break in on〜「〜に口をはさむ」(=interrupt)。"
  - id: "scr-211-p04"
    section_id: "Scr_211"
    drill: 1
    number: 891
    role: "exam"
    english: "My grandfather passed away when I was 10 years old."
    japanese: "祖父は、私が10歳のときに亡くなりました。"
    notes: "〈頻出〉成城大。pass away「亡くなる/死ぬ」。dieの遠回しな表現。"
  - id: "scr-211-p05"
    section_id: "Scr_211"
    drill: 1
    number: 892
    role: "exam"
    english: "I stayed up late last night studying for the English test."
    japanese: "英語の試験のために、昨晩遅くまで起きていました。"
    notes: "〈基本〉福島大。stay up「寝ずに起きている」(=sit up)。sit upはstay upより硬い言い方。"
  - id: "scr-211-p06"
    section_id: "Scr_211"
    drill: 1
    number: 893
    role: "exam"
    english: "Watch out! There is a snake in the bush."
    japanese: "気をつけろ！ 茂みにヘビがいるぞ。"
    notes: "〈頻出〉亜細亜大。watch out「気をつける/用心する」(=look out)。watch [look] out for〜「〜に気をつける」。"
  - id: "scr-211-p07"
    section_id: "Scr_211"
    drill: 1
    number: 894
    role: "exam"
    english: "The rainy season will set in soon."
    japanese: "まもなく雨季が始まるでしょう。"
    notes: "set in「（季節・天候などが）始まる」(=begin/start)。"
  - id: "scr-211-p08"
    section_id: "Scr_211"
    drill: 1
    number: 895
    role: "exam"
    english: "He set out at four in the morning."
    japanese: "彼は朝の4時に出発した。"
    notes: "中京大。set out「出発する」(=start/set off)。set out [off] for〜「〜に向けて出発する」。"
  - id: "scr-211-p09"
    section_id: "Scr_211"
    drill: 1
    number: 896
    role: "exam"
    english: "The time bomb went off and five people were injured."
    japanese: "時限爆弾が爆発し5人が負傷した。"
    notes: "関西外大。go off「（爆弾などが）爆発する」(=explode)。go offには「（銃が）発射される」「（警報が）鳴り出す」の意味も。"
  - id: "scr-211-p10"
    section_id: "Scr_211"
    drill: 1
    number: 897
    role: "exam"
    english: "The plane couldn't take off because of bad weather."
    japanese: "その飛行機は悪天候のため離陸できなかった。"
    notes: "〈基本〉名城大。take off「（飛行機などが）離陸する」(⇔land「着陸する」)。他動詞用法「（服を）脱ぐ」(⇔put on⇨923)も。"
  - id: "scr-211-p11"
    section_id: "Scr_211"
    drill: 1
    number: 898
    role: "exam"
    english: "The big car pulled up at the traffic light."
    japanese: "その大きな車は信号で止まった。"
    notes: "大阪電通大。pull up「（車などが）止まる」(=stop)。pull upには他動詞用法「（車など）を止める」も。"
  - id: "scr-211-e01"
    section_id: "Scr_211"
    drill: 0
    number: 893
    role: "example"
    english: "Watch out for cars when crossing the street."
    japanese: "通りを渡るときは車に注意して。"
    notes: "プラスα。watch [look] out for〜「〜に気をつける」。"
  - id: "scr-211-e02"
    section_id: "Scr_211"
    drill: 0
    number: 895
    role: "example"
    english: "We set out for the summit before sunrise."
    japanese: "私たちは日の出前に山頂へ向けて出発した。"
    notes: "プラスα。set out [off] for〜「〜に向けて出発する」。"
  - id: "scr-211-e03"
    section_id: "Scr_211"
    drill: 0
    number: 896
    role: "example"
    english: "The alarm clock went off at 6 a.m."
    japanese: "その目覚まし時計は午前6時に鳴った。"
    notes: "プラスα。go offの「（警報が）鳴り出す」用法。"
  - id: "scr-211-e04"
    section_id: "Scr_211"
    drill: 0
    number: 897
    role: "example"
    english: "When he entered the room, he took off his jacket."
    japanese: "部屋に入ると、彼は上着を脱いだ。"
    notes: "プラスα。take offの他動詞用法「（服を）脱ぐ」(⇔put on⇨923)。"

