sentences:
  - id: "scr-071-p01"
    section_id: "Scr_071"
    drill: 1
    number: 256
    role: "exam"
    english: "How come you didn't attend the meeting yesterday?"
    japanese: "どうして昨日は会議に出席しなかったのですか。"
    notes: "難易度: 頻出、発展。出典: 成蹊大。整序問題（whyが不要）。How come + S + V?（平叙文の語順）"
  - id: "scr-071-p02"
    section_id: "Scr_071"
    drill: 1
    number: 257
    role: "exam"
    english: "She doesn't know what it is like to live in the countryside."
    japanese: "彼女は田舎での暮らしがどのようなものか知らない。"
    notes: "難易度: 頻出。出典: 日本大。整序問題。What is A like? = A はどのようなものか。itは形式主語"
  - id: "scr-071-p03"
    section_id: "Scr_071"
    drill: 1
    number: 258
    role: "exam"
    english: "I keep wondering what this is all about."
    japanese: "これは一体どういうことなのかと、ずっと考え込んでいる。"
    notes: "難易度: 発展。出典: 成城大。What is A all about? = A はいったい何ですか"
  - id: "scr-071-p04"
    section_id: "Scr_071"
    drill: 1
    number: 259
    role: "exam"
    english: "What are you following me for?"
    japanese: "なぜ私の後をつけてくるの？"
    notes: "出典: 成城大。What ~ for? = Why ~?"
  - id: "scr-071-p05"
    section_id: "Scr_071"
    drill: 1
    number: 260
    role: "exam"
    english: "Do you know what has become of him?"
    japanese: "彼がどうなったか知っていますか。"
    notes: "難易度: 頻出。出典: 北海学園大。What has become of ~? = What has happened to ~?"
  - id: "scr-071-p06"
    section_id: "Scr_071"
    drill: 1
    number: 261
    role: "exam"
    english: "Why don't you get a new one? There's a sale on this week."
    japanese: "新しいのを買ったらどう？ 今週はセール中だよ。"
    notes: "難易度: 頻出。出典: 北星学園大。対話問題Bの文。A: My winter coat is so old. Why don't you do? = ~してはどう"
  - id: "scr-071-p07"
    section_id: "Scr_071"
    drill: 1
    number: 262
    role: "exam"
    english: "Ken is in hospital now. Why don't we go and cheer him up?"
    japanese: "ケンが入院しているんだ。励ましにお見舞いに行かないか。"
    notes: "出典: 日本大。整序問題。Why don't we do? = （一緒に）~しましょうよ。cheer him up（⇨ PU!188）"
  - id: "scr-071-p08"
    section_id: "Scr_071"
    drill: 1
    number: 263
    role: "exam"
    english: "How about having lunch here?"
    japanese: "ここで昼食を食べるのはどうですか。"
    notes: "難易度: 頻出。出典: 亜細亜大。同意文選択。= Let's have lunch here, shall we?（⇨ 問253）= What about ~?（⇨ 問122）"

