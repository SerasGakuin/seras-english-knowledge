sentences:
- id: scr-079-p01
  section_id: Scr_079
  drill: 1
  number: 291
  role: exam
  english: It took me a few minutes to realize that his email was a kind of joke.
  japanese: 彼のメールがある種の冗談だと気づくのに数分かかった。
  notes: '難易度: 頻出。出典: 関西学院大。It takes (+A) + 時間 + to do（⇨ PU!109）'
- id: scr-079-p02
  section_id: Scr_079
  drill: 1
  number: 292
  role: exam
  english: It costs me $1,500 to live in New York City every month.
  japanese: 私がニューヨークで生活するのに毎月1,500ドルかかる。
  notes: '難易度: 頻出。出典: 群馬大。It costs (+A) + 費用 + to do。cost も二重目的語を取れる（⇨ 問529）'
- id: scr-079-p03
  section_id: Scr_079
  drill: 1
  number: 293
  role: exam
  english: It doesn't matter whether you need that book or not.
  japanese: あなたがその本を必要とするかしないかは、関係ありません。
  notes: '出典: 麗澤大。整序問題。It doesn''t matter (to A) whether節「～かどうかはどうでもよい」'
- id: scr-079-p04
  section_id: Scr_079
  drill: 1
  number: 294
  role: exam
  english: It makes no difference to me whether God exists or not.
  japanese: 神が存在するかしないかは、私にとってどうでもよい。
  notes: '出典: 中京大。整序問題。It makes no difference (to A) whether節 = It doesn''t matter'
- id: scr-079-e01
  section_id: Scr_079
  drill: 0
  number: 1
  role: example
  english: It doesn't matter to me what he does.
  japanese: 彼が何をしようと私にはどうでもよい。
  notes: PU!59。It doesn't matter + 疑問詞節の形。= It makes no difference to me what he does.
