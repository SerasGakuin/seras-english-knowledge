sentences:
  - id: "scr-241-p01"
    section_id: "Scr_241"
    drill: 1
    number: 1222
    role: "exam"
    english: "Buying high quality items will often save you money in the long run."
    japanese: "高品質なものを買うことは，結局はお金の節約になることが多い。"
    notes: "〈頻出〉西南学院大。in the long run「(長い目で見れば)結局は/最後には」(=eventually/in the end)。〈重要〉save A B「AのB(労力・費用など)を省く」(⇨531)。"
  - id: "scr-241-p02"
    section_id: "Scr_241"
    drill: 1
    number: 1223
    role: "exam"
    english: "She looked for her son again. But she ended up not finding him after all."
    japanese: "彼女は息子をもう一度捜した。しかし，結局見つけられずに終わった。"
    notes: "〈頻出〉慶應大。after all「(いろいろな経過の後)結局」。結果が意図・予想に反する。〈重要〉end up doing「最後には～することになる」(⇨1033)。プラスα: after all「何といっても(やはり)」の意味も。"
  - id: "scr-241-p03"
    section_id: "Scr_241"
    drill: 1
    number: 1224
    role: "exam"
    english: "As a matter of fact, I have been to Paris."
    japanese: "実は，私はパリに行ったことがある。"
    notes: "〈頻出〉東京理科大。as a matter of fact「実際のところ/実は」(=in fact)。"
  - id: "scr-241-p04"
    section_id: "Scr_241"
    drill: 1
    number: 1225
    role: "exam"
    english: "My regret is beyond description."
    japanese: "この無念さは言葉では表現できない。"
    notes: "〈頻出〉高知大。beyond description「言葉では表現できない(ほど)」。PU!200参照。"
  - id: "scr-241-p05"
    section_id: "Scr_241"
    drill: 1
    number: 1226
    role: "exam"
    english: "The magazine is considerably behind the times."
    japanese: "その雑誌は，かなり時代遅れになっている。"
    notes: "西南学院大。behind the times「時代遅れで/時勢に遅れて」。times(時代)は通例複数形。比較: behind time「定刻より遅れて」⇔ahead of time「定刻より早く」。"
  - id: "scr-241-p06"
    section_id: "Scr_241"
    drill: 1
    number: 1227
    role: "exam"
    english: "In any case, let's not worry too much about it."
    japanese: "とにかく，あまり気にしないでおこう。"
    notes: "in any case「とにかく/いずれにしても」(=anyway/anyhow)。"
  - id: "scr-241-p07"
    section_id: "Scr_241"
    drill: 1
    number: 1228
    role: "exam"
    english: "At any rate, I will do my best."
    japanese: "いずれにしても，最善を尽くすつもりです。"
    notes: "at any rate「とにかく/いずれにしても」(=in any case)。"
  - id: "scr-241-p08"
    section_id: "Scr_241"
    drill: 1
    number: 1229
    role: "exam"
    english: "The policeman arrested the man on the spot."
    japanese: "警察官はその男を現行犯逮捕した。"
    notes: "〈発展〉東海大。on the spot「その場で/即座に」(=at once/immediately/right away⇨1184)。"
  - id: "scr-241-p09"
    section_id: "Scr_241"
    drill: 1
    number: 1230
    role: "exam"
    english: "It is, for one thing, to bathe in the sun that people gather in such spacious outdoor places."
    japanese: "人々がそんな広々した屋外の場所に集まるのは，一つには日光浴をするためである。"
    notes: "〈発展〉静岡大。for one thing「1つには」(=for one reason)。理由の説明に使用。長文中で空所補充問題として出題。プラスα: for another (thing)で別の理由を追加。"
  - id: "scr-241-p10"
    section_id: "Scr_241"
    drill: 1
    number: 1231
    role: "exam"
    english: "Nurses do all they can to make patients feel at ease."
    japanese: "看護師は患者を安心させるためにできることは何でもします。"
    notes: "〈頻出〉西南学院大。at ease「気楽な[に]/くつろいで」⇔ill at ease「不安な/落ち着かない」。"
  - id: "scr-241-e01"
    section_id: "Scr_241"
    drill: 0
    number: 1225
    role: "example"
    english: "The town has changed beyond recognition."
    japanese: "その町は，まったく見分けがつかないほど変わってしまった。"
    notes: "PU!200。beyond recognition「まったく見分けがつかないほど」。beyond+名詞で「否定」の意味を形成。"
  - id: "scr-241-e02"
    section_id: "Scr_241"
    drill: 0
    number: 1230
    role: "example"
    english: "For one thing I'm busy. For another I don't have any money."
    japanese: "1つには忙しい。また，金もない。"
    notes: "プラスα。for one thing ... for another (thing) ...「1つには…また…」。理由を列挙する表現。"
  - id: "scr-241-e03"
    section_id: "Scr_241"
    drill: 0
    number: 1231
    role: "example"
    english: "He looked ill at ease during the interview."
    japanese: "面接の間，彼は落ち着かない様子だった。"
    notes: "比較。ill at ease「不安な/落ち着かない」。at ease(くつろいで)の反意表現。"

