sentences:
  - id: "scr-256-p01"
    section_id: "Scr_256"
    drill: 1
    number: 1336
    role: "exam"
    english: "Hello, this is Kenji speaking. May I speak to Demi?"
    japanese: "もしもし，こちらケンジですが，デミさんをお願いします。"
    notes: "〈基本〉東京経済大。This is A (speaking).「こちらAです」(通例I am Aとは言わない)。May I speak to C?=Can I talk to C, please?=I'd like to speak to C, please.「Cさんをお願いします」。A: の行。応答: Sorry, she isn't in now.「あいにく外出中です」(=C is out./C is not here.)。"
  - id: "scr-256-p02"
    section_id: "Scr_256"
    drill: 1
    number: 1337
    role: "exam"
    english: "I'm afraid you have the wrong number."
    japanese: "すみませんが，電話番号をお間違えだと思います。"
    notes: "〈頻出〉東京経済大。You have the wrong number.「番号違いですよ」。I'm afraid/I'm sorryで語調をやわらげることが多い。B: の行。A: Is this Mr. Smith?「スミスさんですか」(Is this C?「Cさんですか」)。"
  - id: "scr-256-p03"
    section_id: "Scr_256"
    drill: 1
    number: 1338
    role: "exam"
    english: "Hello. Is Mr. Tanaka there?"
    japanese: "もしもし，タナカさんはいらっしゃいますか。"
    notes: "Is C there?「Cさんはいらっしゃいますか」。A: の行。"
  - id: "scr-256-p04"
    section_id: "Scr_256"
    drill: 1
    number: 1338
    role: "exam"
    english: "Who's calling, please?"
    japanese: "どちらさまですか。"
    notes: "Who's calling, please?=Who is this[it], please?「どちらさまですか」。B: の行。"
  - id: "scr-256-p05"
    section_id: "Scr_256"
    drill: 1
    number: 1339
    role: "exam"
    english: "Can I take a message?"
    japanese: "ご伝言をうかがいましょうか。"
    notes: "〈頻出〉拓殖大。take a message「伝言をうかがう(受ける側)」。〈比較〉leave a message「伝言を残す/頼む(残す側)」: May I leave a message for John with you?「ジョンあての伝言を頼んでもいいですか」。A: の行。"
  - id: "scr-256-p06"
    section_id: "Scr_256"
    drill: 1
    number: 1339
    role: "exam"
    english: "Yes, please ask him to call me back soon."
    japanese: "はい，彼に折り返しすぐに電話するよう伝えてください。"
    notes: "拓殖大。call〜back「〜に折り返し電話する」。Shall I have him call you back?「折り返し彼に電話させましょうか」。B: の行。"
  - id: "scr-256-p07"
    section_id: "Scr_256"
    drill: 1
    number: 1340
    role: "exam"
    english: "Mr. Carter, you are wanted on the phone."
    japanese: "カーターさん，あなたに電話ですよ。"
    notes: "東京電機大。You are wanted on the phone.=There is someone for you on the phone.「あなたに電話です」。A: の行。応答: I'll be there right away.「すぐに行きます」。"
  - id: "scr-256-p08"
    section_id: "Scr_256"
    drill: 1
    number: 1341
    role: "exam"
    english: "Please put me through to extension 356."
    japanese: "内線356番につないでください。"
    notes: "東京理科大。put A through to C「Aの電話をCにつなぐ」。extension「内線（番号）」: (May I have) extension 375, please?「内線375番をお願いします」。A: の行。応答: Just a moment[minute/second], please.=Wait a moment, please.「ちょっとお待ちください」。"
  - id: "scr-256-p09"
    section_id: "Scr_256"
    drill: 1
    number: 1342
    role: "exam"
    english: "Shall I hang up, operator?"
    japanese: "オペレーターさん，私が電話を切りましょうか。"
    notes: "〈頻出〉中部大。hang up「電話を切る」(受話器を電話機にぶら下げる動作から)。A: の行。"
  - id: "scr-256-p10"
    section_id: "Scr_256"
    drill: 1
    number: 1342
    role: "exam"
    english: "No, sir, hold the line, please."
    japanese: "いいえ，どうぞそのままお待ちください。"
    notes: "中部大。hold the line=hold on「(電話を切らないで)待つ」。プラスα: The line is busy.「お話し中です」(⇨764)。B: の行。"

