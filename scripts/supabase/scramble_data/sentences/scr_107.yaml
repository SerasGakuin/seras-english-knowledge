sentences:
  - id: "scr-107-p01"
    section_id: "Scr_107"
    drill: 1
    number: 410
    role: "exam"
    english: "We do not necessarily grow wiser as we grow older."
    japanese: "人は年をとるにつれて賢くなるとはかぎらない。"
    notes: "難易度: 頻出。出典: 成城大。「比例」のas「〜するにつれて」。grow+比較級の構文と共に用いる。not necessarily「必ずしも〜ない」（部分否定）"
  - id: "scr-107-p02"
    section_id: "Scr_107"
    drill: 1
    number: 411
    role: "exam"
    english: "I wish we had done as we were told."
    japanese: "私たちは言われた通りにしたらよかったのだが。"
    notes: "難易度: 頻出。出典: 奈良女子大。「様態」のas「〜の通りに」(= the way)。wish+S+仮定法過去完了「Sが〜ならよかったのに」（→ 168）"
  - id: "scr-107-p03"
    section_id: "Scr_107"
    drill: 1
    number: 412
    role: "exam"
    english: "You had better leave the matter as it is."
    japanese: "その件はそっとしておいたほうがいいよ。"
    notes: "出典: 東北学院大。整序問題。as it is「そのまま（に）/あるがまま（に）」。leave 〜 as it is「〜をそのままにしておく」"
  - id: "scr-107-e01"
    section_id: "Scr_107"
    drill: 0
    number: 0
    role: "example"
    english: "Life doesn't always go the way you want it to."
    japanese: "人生は必ずしも思い通りには進まないものだ。"
    notes: "問411発展例文。口語ではthe wayがasと同じように用いられる"
  - id: "scr-107-e02"
    section_id: "Scr_107"
    drill: 0
    number: 0
    role: "example"
    english: "See things as they are."
    japanese: "物事をありのままに見なさい。"
    notes: "問412プラスα例文。as it isのitが他の人称代名詞になる例"

