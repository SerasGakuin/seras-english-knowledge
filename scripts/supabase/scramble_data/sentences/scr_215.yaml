sentences:
  - id: "scr-215-p01"
    section_id: "Scr_215"
    drill: 1
    number: 930
    role: "exam"
    english: "I need to hand in the essay tomorrow morning."
    japanese: "明日の朝、作文を提出しなければならない。"
    notes: "〈頻出〉中央大。hand in〜/turn in〜「〜を提出する」(=submit)。hand in/give in《英》は手渡し提出、send inは郵送提出、turn in《米》はどちらも。"
  - id: "scr-215-p02"
    section_id: "Scr_215"
    drill: 1
    number: 931
    role: "exam"
    english: "Two weeks later the student finally turned in the homework."
    japanese: "その学生は、2週間後にやっと宿題を提出した。"
    notes: "〈頻出〉上智大。turn in〜「〜を提出する」(=submit)。"
  - id: "scr-215-p03"
    section_id: "Scr_215"
    drill: 1
    number: 932
    role: "exam"
    english: "Once you turn on the computer, the main menu will appear automatically."
    japanese: "そのコンピューターの電源を入れると、メインメニューが自動的に現れる。"
    notes: "〈基本〉青山学院大。turn on〜「（テレビ・ラジオ・電灯など）をつける」。"
  - id: "scr-215-p04"
    section_id: "Scr_215"
    drill: 1
    number: 933
    role: "exam"
    english: "Remember to turn off the lights before you go to bed."
    japanese: "寝る前に忘れずに電気を消してください。"
    notes: "〈基本〉清泉女子大。turn off〜「（テレビ・電灯など）を消す」。switch on[off]も同意。"
  - id: "scr-215-p05"
    section_id: "Scr_215"
    drill: 1
    number: 934
    role: "exam"
    english: "The fire fighters will put out the fire soon."
    japanese: "消防士たちはすぐにその火事を消し止めるだろう。"
    notes: "〈基本〉〈頻出〉阪南大。put out〜「（火・電灯など）を消す」(=extinguish)。put out[×turn off] a fire。go out(自)「消える」と区別。"
  - id: "scr-215-p06"
    section_id: "Scr_215"
    drill: 1
    number: 935
    role: "exam"
    english: "The mayor turned down the proposal by the committee member."
    japanese: "市長は委員からの提案を拒絶した。"
    notes: "〈頻出〉高知大。turn down〜「〜を拒絶する」(=refuse/reject)。turn down〜「（音量など）を小さくする」(⇔turn up⇨879)も重要。"
  - id: "scr-215-p07"
    section_id: "Scr_215"
    drill: 1
    number: 936
    role: "exam"
    english: "The English teacher gave us five minutes to work out the problem."
    japanese: "英語の先生はその問題を解くのに私たちに5分時間を与えた。"
    notes: "〈頻出〉亜細亜大。work out〜「（問題など）を解く/解決する」(=solve)。自動詞用法「（計画が）うまくいく」も重要。"
  - id: "scr-215-p08"
    section_id: "Scr_215"
    drill: 1
    number: 937
    role: "exam"
    english: "It is difficult to keep up these old houses."
    japanese: "これらの古い家を維持するのは難しい。"
    notes: "keep up〜「〜を維持する」(=maintain)。"
  - id: "scr-215-p09"
    section_id: "Scr_215"
    drill: 1
    number: 938
    role: "exam"
    english: "Our school trip was called off because of bad weather."
    japanese: "天気が悪くて、遠足は取りやめになった。"
    notes: "〈頻出〉中央大。call off〜「〜を中止する/〜を取り消す」(=cancel)。"
  - id: "scr-215-p10"
    section_id: "Scr_215"
    drill: 1
    number: 939
    role: "exam"
    english: "She called up her boss."
    japanese: "彼女は上司に電話をかけた。"
    notes: "〈基本〉call up〜「〜に電話をかける」(=ring up《英》/telephone)。upを省略してcallだけでも可。"
  - id: "scr-215-p11"
    section_id: "Scr_215"
    drill: 1
    number: 940
    role: "exam"
    english: "Bob let me down again."
    japanese: "ボブはまた私を失望させた。"
    notes: "中央大。let〜down「（人）を失望させる」(=disappoint)。目的語は代名詞が多く、let me downの語順がふつう。"
  - id: "scr-215-p12"
    section_id: "Scr_215"
    drill: 1
    number: 941
    role: "exam"
    english: "Why don't you take a day off today?"
    japanese: "今日1日休みにしたら？"
    notes: "〈頻出〉〈発展〉センター。take off〜「〜の期間休みをとる」。take a day off「1日休みをとる」。A文:「I don't feel well at all. I've got an awful headache.」(気分が全くすぐれない。ひどい頭痛がするんだ)。語句: Why don't you do?「〜してはどう」(⇨261)。"
  - id: "scr-215-e01"
    section_id: "Scr_215"
    drill: 0
    number: 934
    role: "example"
    english: "The lights in the corridor went out."
    japanese: "廊下の明かりが消えた。"
    notes: "プラスα。go out(自)「消える」。put out(他)「消す」と対比。"
  - id: "scr-215-e02"
    section_id: "Scr_215"
    drill: 0
    number: 935
    role: "example"
    english: "Could you turn down the music? It's too loud."
    japanese: "音楽の音量を下げていただけますか。うるさすぎます。"
    notes: "プラスα。turn down〜の「（音量など）を小さくする」用法(⇔turn up)。"
  - id: "scr-215-e03"
    section_id: "Scr_215"
    drill: 0
    number: 936
    role: "example"
    english: "Unfortunately, the plan didn't work out."
    japanese: "残念ながら、その計画はうまくいかなかった。"
    notes: "プラスα。work outの自動詞用法「（計画などが）うまくいく」。"

