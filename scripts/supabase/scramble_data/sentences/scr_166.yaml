sentences:
  - id: "scr-166-p01"
    section_id: "Scr_166"
    drill: 1
    number: 652
    role: "exam"
    english: "We were able to hand in the report in time."
    japanese: "私たちはレポートを期限内に提出することができた。"
    notes: "出典: 東京経済大。4択問題。A is able to do「Aは〜できる」。possibleは人を主語にしない。capableはbe capable of doingの形。hand in〜「〜を提出する」（⇨ 930）。"
  - id: "scr-166-p02"
    section_id: "Scr_166"
    drill: 1
    number: 653
    role: "exam"
    english: "That school needs some people who are capable of teaching English."
    japanese: "あの学校では英語を教えられる人を何人か必要としている。"
    notes: "出典: 亜細亜大。〈頻出〉4択問題。A is capable of doing「Aは〜できる」。ableはbe able to doの形なので不可。possibleは人を主語にしない。"
  - id: "scr-166-p03"
    section_id: "Scr_166"
    drill: 1
    number: 654
    role: "exam"
    english: "Is it possible for you to help me with this homework?"
    japanese: "あなたは私のこの宿題を手伝うことができますか。"
    notes: "出典: 名城大。4択問題。It is possible for A to do「Aは〜できる」。possibleは人を主語にしない→②Are you possibleは不可。capableはbe capable of doingの形→①Are you capable / ③Is it capableは不可。"
  - id: "scr-166-e01"
    section_id: "Scr_166"
    drill: 0
    number: 0
    role: "example"
    english: "She is able to teach French."
    japanese: "彼女はフランス語を教えることができる。"
    notes: "PU!149例文。A is able [unable] to do — A（主語）は「人」。able/capable/possibleの3パターン書き換え。"
  - id: "scr-166-e02"
    section_id: "Scr_166"
    drill: 0
    number: 0
    role: "example"
    english: "She is capable of teaching French."
    japanese: "彼女はフランス語を教えることができる。"
    notes: "PU!149例文。A is capable [incapable] of doing — A（主語）は「人」「物」。able/capable/possibleの3パターン書き換え。"
  - id: "scr-166-e03"
    section_id: "Scr_166"
    drill: 0
    number: 0
    role: "example"
    english: "It is possible for her to teach French."
    japanese: "彼女はフランス語を教えることができる。"
    notes: "PU!149例文。It is possible [impossible] for A to do — 「人」を主語にしない。able/capable/possibleの3パターン書き換え。"

