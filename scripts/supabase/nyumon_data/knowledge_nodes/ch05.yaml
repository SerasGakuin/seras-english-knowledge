knowledge_nodes:
  - id: "nhk-001"
    name: "比較対象の把握"
    category: "比較"
    priority: "P1"
    notes: |
      Point分類: ❺〔比較〕（問49）
      比較構文で何と何が比較されているかを正確に把握する。比較対象は常に文法的に同じもの。
      ■ more A than B =「BではなくむしろA」（問49 ❺）:
        more through experience than through prejudice
        → through experience と through prejudice が比較対象（共に〈前置詞+名詞〉）。
        「偏見を通じてではなく、経験を通じて進化してきた」。
        共通部分の復元:
        the existing systems have usually evolved more through experience
        than [the existing systems have usually evolved through] prejudice
      ■ 比較対象は文法的に同じもの:
        比較されるのは常に同じ文法的役割・形式を持つ要素。
        ただし、一語とは限らない。句（through+名詞）が比較されることもある。
      ■ since の判定:
        (1)「〜以来」（通例、現在完了とともに使う）
        (2)「〜だから」（聞き手にとって常識的/既知の理由）
        本文: 主節が make（現在時制）→ (1)ではなく (2)。
      ❶（問49）governments の複数形:
        government は「(ある国の)政府」と「(地方の)自治体」がある。
        本文は連邦政府と各州政府 → 複数形。
      ❷（問49）relating to 以下:
        現在分詞。legislation を修飾する形容詞的用法。
        英語では2語以上のかたまりの形容詞は名詞の後ろに置くのが原則。
      ❸（問49）make dramatic changes:
        法律の劇的・抜本的な変更を行う。
      ❹（問49）however の位置:
        however は副詞（butは接続詞）。
        副詞の位置は比較的自由: (1)文頭 (2)主語直後 (3)文末。

  - id: "nhk-002"
    name: "比較構文の共通要素省略と復元"
    category: "比較"
    priority: "P1"
    notes: |
      Point分類: ❺〔比較〕（問50）、❷❸〔比較〕（問51）
      thanは接続詞であり、後ろにはS+Vが続く。共通要素は省略される。比較級の文を元の2文に復元して構造を理解する。
      ■ thanは接続詞（問50 ❺, 問51 ❷❸）:
        He is older than Bob. = He is older than Bob is old.
        共通要素の is old が省略される。
        比較の理解にはthan＝接続詞の認識が必須。
      ■ 元の文への復元（問50 ❺）:
        it was once much warmer than it currently is [warm]
        → wasとisの比較（現在と過去は動詞と動詞の比較）。
        共通要素 warm が後半の文から省略されている。
      ■ much＋比較級 =「ずっと〜」（問50 ❺）:
        much warmer =「ずっと暖かい」。
        muchは比較級を強調する副詞。
      ■ 動名詞句同士の比較（問51 ❸）:
        reading for fun, even a little every day（動名詞句=主語）
        vs spending many hours reading for studying and gathering information（動名詞句）
        比較対象は文法的に同じもの（動名詞句同士）。
        than以下を元の文に復元:
        than just spending ... is beneficial
      ■ thanの後の省略と復元（問51 ❷）:
        those who do not [read daily for pleasure]
        = students who do not read daily for pleasure
        共通要素を復元する。「わかりきっているから省略される」。
      ❶（問50）lack a complete understanding:
        lackは「〜が欠けている」。「完全な理解が欠けている」→「完全には理解していない」。
      ❷（問50）all over its surface:
        allは副詞句を強調する副詞。all over the world「世界中で」。
      ❸（問50）chemistry:
        「化学反応」→「化学組成」と意味が発展。単語は文中で予想外の意味を持ちうる。
      ❹（問50）and so:
        and soで因果関係を示す。「それで，だから」。thinkの主語は文頭のWe。
      ❻（問50）in order to V:
        toの目的用法を強調。「〜するために」。全体で副詞句。
      ❶（問51）who はどこにつながる？:
        studentsを説明する関係代名詞節。who ... for pleasureまでが主語。
      ❹（問51）andは何と何をつなぐ？:
        forの後の2つの動名詞 studying と gathering information をつなぐ。

  - id: "nhk-003"
    name: "there is more...thanの構造"
    category: "比較"
    priority: "P1"
    notes: |
      Point分類: ❹〔比較〕（問52）
      there is more ... than ... の構文で、比較級の元の2文を復元して意味を把握する。
      ■ 比較級を見たら元の2文を復元する（問52 ❹）:
        There is more (to be worried about)
        than (there is) a possible increased risk of cancer.
        → there is が共通要素として省略。
        「心配することの量」＞「がんになるリスクの増加」
        → 「がんのリスク増加よりも、もっと心配すべきことがある」。
      ■ moreの二重品詞:
        moreは文の主語（名詞の働き）であると同時に、比較級として形容詞・副詞の役割も兼ねる。
        このような語を二重品詞と呼ぶことがある。
      ❶（問52）has been:
        期間を示す副詞句 For more than 50 years により現在完了「継続」。
        3人称単数の主語(the health)なので has been。
        more than 50 years: thanには等号(＝)は含まないので「50年より前から」。
      ❷（問52）let O 原形不定詞:
        let + O + 原形不定詞 =「Oが〜するのを許す」。
        NASA does not let the risk ... rise =「リスクが上昇するのを許さない」。
      ❸（問52）more than three percent:
        rise (by) more than three percent。
        increase/rise by〜 の by は自明のため省略される傾向がある。
        byは「増加分・減少分」を示す前置詞。100から150まで増加すれば媒介は50でby 50。

  - id: "nhk-004"
    name: "the＋比較級, the＋比較級"
    category: "比較"
    priority: "P1"
    notes: |
      Point分類: ❹〔比較〕（問53）
      〈the＋比較級, the＋比較級〉で比例関係を表す構文。接続詞を必要としない。
      ■ the＋比較級, the＋比較級の構造（問53 ❹）:
        前半が従属節、後半が主節。
        The older you get, the more forgetful you become.
        「年をとればとるほど，物忘れがひどくなる」
        元の文: You get older. / You become more forgetful.
        本来 As you get older, you become more forgetful. のように接続詞Asが必要だが、
        比較級にtheをつけて文頭に移動することで接続詞なしで2文をつなげる。
      ■ 本文の元の文:
        The leaf goes through this reaction process longer.（longerは副詞）
        Its taste and smell become stronger.（strongerは形容詞）
        → 茶葉が反応過程を経る時間と味・香りの強さが比例する。
      ■ 訳出のコツ:
        「〜すればそれだけ，…となる」と比例関係を前面に出す。
      ❶（問53）can be divided:
        助動詞＋受動態。「分類されることができる」→「分類できる」と能動で訳す。
        into several types は be divided を修飾する副詞句。
      ❷（問53）based on:
        be divided を修飾する副詞句。「〜に基づいて」。基準を示す表現。
      ❸（問53）how much ... :
        疑問詞が後ろの文を1つの名詞にまとめる。「どれほど〜かということ」。
        文中に入った場合は疑問形の語順にしない。
        tea leaves: 名詞 tea が形容詞のように leaf を修飾（名詞の形容詞的用法）。

  - id: "nhk-005"
    name: "as〜as構文の構造把握"
    category: "比較"
    priority: "P1"
    notes: |
      Point分類: ❸〔比較〕（問54）、❶〔比較〕（問55）、❸〔比較〕（問56）
      as〜as構文の正確な構造理解。最初のas＝副詞、2番目のas＝接続詞。
      ■ as〜as構文の基本（問54 ❸）:
        (1) 両者の程度を比較して「だいたい等しい」
        (2) as〜asの「〜」には形容詞・副詞の原級が入る
        最初のas＝副詞、2番目のas＝接続詞。
        正しくは ～ as ... [as ～] という2分割。2番目のasの前後に独立した文がある。
        Tom runs as fast as Bob. = Tom runs as fast [as Bob runs (fast)].
      ■ as much money as（問54 ❸）:
        Only half of them make as much money [as their parents did].
        did = made (much money)。現在と過去の比較は動詞と動詞の比較。
        make（現在時制）vs did=made（過去時制）。
      ■ as much ... as（副詞句を挟む場合）（問55 ❶）:
        最初のasの後ろには形容詞・副詞は置けるが、〈前置詞＋名詞〉の副詞句は置けない。
        muchは、asと副詞句 on the basis of をつなぐ働きをする。
        元の2文:
        Pop singers are often judged as much on the basis of how they look
        as they are judged much on the basis of how they sound.
        共通部分 they are judged much on the basis of が省略。
        「容姿で判断される程度」＝「歌声で判断される程度」。
      ■ neither as A nor as B の構造（問56 ❸）:
        as〜asの as〜 部分が2つあり、neither A nor B で結ばれた形。
        neither as simple nor as solitary an activity as it might sound
        → 最後のasは接続詞で、共通要素が省略されている:
          neither as simple [as it might sound simple]
          nor as solitary an activity [as it might sound like a solitary activity]
        soundは sound+形容詞「〜に聞こえる」/ sound like+名詞「〜のように聞こえる」。
      ■ as＋形容詞＋a/an＋名詞 の語順変化（問56 ❸）:
        副詞asの影響で形容詞が冠詞の前に出る。
        as solitary an activity = as solitary an activity（通常: a solitary activity）
        例: I do not think that I am as good a cook as you are.
        「私はあなたほど料理がうまいとは思わない」
      ❶（問54）ダッシュ（同格）:
        babies born in 1980 と today's 36-year-olds が同格。
        ダッシュはコンマより切れ目を明確にする場合に使用。
      ❷（問54）コロン:
        前後の文が密接な関係にあることを示す。
        本文: 「指標は50%に下がった」→（コロン）→「半数しか親と同じだけ稼いでいない」。
      ❷（問55）performing（分詞構文）:
        主語直後にコンマで挟まれた V-ing は分詞構文（副詞句）。
        influenced は過去分詞で audiences を修飾。
      ❸（問55）expected to be:
        expect O to V の受動態。動作主は「世間の人々」。
      ❹（問55）and の直後に副詞が挿入される場合:
        and の直後の副詞 possibly をいったん無視し、その後ろの harmful と同種の語を前方に探す。
        unrealistic と harmful（形容詞同士）が and でつながれている。
      ❶（問56）Scientific knowledge is based on observations:
        科学の基本プロセス — 仮説→観察→理論化→検証→発表→他者検証→確定。
        本文はこの(2)「観察により仮説を理論化」に焦点。
      ❷（問56）observing の働き（動名詞）:
        他動詞+名詞を動名詞にした場合、分詞・形容詞のように訳すのは誤り。
        Influencing other people is not easy.「他者に影響を与えることは簡単ではない」（influence=他動詞）
        vs We must deal with a growing population.「増大する人口」（grow=自動詞）

