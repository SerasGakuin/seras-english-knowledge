check_points:
  - node_id: "nhk-001"
    seq: 1
    question: "more through experience than through prejudice で比較されているのは何と何か？"
    answer: "through experience と through prejudice（共に〈前置詞+名詞〉の副詞句）が比較されている。evolved を修飾する副詞句同士。「偏見を通じてではなく、経験を通じて進化してきた」。"
  - node_id: "nhk-001"
    seq: 2
    question: "more A than B の意味を説明せよ。"
    answer: "「BではなくむしろA」の意味。比較級を使った対比表現。A のほうが程度が大きいことを示す。than 以下の共通部分は省略される。"
  - node_id: "nhk-001"
    seq: 3
    question: "比較対象を特定する基本原則は何か？"
    answer: "比較されるのは文法的に同じもの（同じ文法的役割・形式を持つ要素）。ただし一語とは限らず、句や節が比較対象になることもある。"

  - node_id: "nhk-002"
    seq: 1
    question: "He is older than Bob. を元の2文に復元せよ。"
    answer: "He is older than Bob is old. thanは接続詞で後ろにS+Vが続き、共通要素 is old が省略されている。"
  - node_id: "nhk-002"
    seq: 2
    question: "it was once much warmer than it currently is で比較されているのは何と何か？"
    answer: "wasとis（動詞と動詞の比較）。現在と過去の比較は動詞で表す。共通要素 warm が省略されている。much は比較級を強調する副詞で「ずっと」の意味。"
  - node_id: "nhk-002"
    seq: 3
    question: "reading for fun ... is more beneficial than just spending ... で比較されているのは何と何か？"
    answer: "reading for fun（動名詞句）と spending many hours reading for studying and gathering information（動名詞句）。文法的に同じもの（動名詞句同士）が比較されている。"

  - node_id: "nhk-003"
    seq: 1
    question: "there is more to be worried about than a possible increased risk of cancer を元の2文に復元せよ。"
    answer: "There is more (to be worried about) / than there is a possible increased risk of cancer. 共通要素 there is が省略。「がんのリスク増加以上に心配すべきことがある」。"
  - node_id: "nhk-003"
    seq: 2
    question: "この文の more の品詞は何か？"
    answer: "moreは名詞（文の主語 = there is の S）であると同時に比較級として形容詞の役割を兼ねる（二重品詞）。"
  - node_id: "nhk-003"
    seq: 3
    question: "「比較級を見たら元の2文を考える」とはどういう手法か？"
    answer: "I am older than Bob. → I am old / Bob is old の2文を想定し、比較の構造を理解する手法。thanは接続詞なので後ろにS+Vの完全な文が存在し、共通要素が省略されていると考える。"

  - node_id: "nhk-004"
    seq: 1
    question: "〈the＋比較級, the＋比較級〉の構造を説明せよ。"
    answer: "前半が従属節、後半が主節。比較級にtheをつけて文頭に移動することで、接続詞なしで2つの文をつなげ、比例関係を表す。「〜すればそれだけ，…となる」。"
  - node_id: "nhk-004"
    seq: 2
    question: "The older you get, the more forgetful you become. を元の2文に復元せよ。"
    answer: "You get older.（より年をとる）/ You become more forgetful.（より物忘れがひどくなる）。本来 As you get older, you become more forgetful. のように接続詞Asが必要。"
  - node_id: "nhk-004"
    seq: 3
    question: "なぜこの構文では接続詞が不要なのか？"
    answer: "元の文の形容詞（または副詞）の比較級にtheをつけて文頭に移動する操作自体が、接続詞の機能を果たすため。theが従属節を示すマーカーとして働く。"

  - node_id: "nhk-005"
    seq: 1
    question: "as〜asの最初のasと2番目のasの品詞は何か？"
    answer: "最初のas＝副詞、2番目のas＝接続詞。正しくは ～ as ... [as ～] の2分割。2番目のasの前後に独立した文がある。"
  - node_id: "nhk-005"
    seq: 2
    question: "as much money as their parents did を元の文に復元せよ。"
    answer: "Only half of them make as much money [as their parents made (much) money]. did = made。共通要素 much money が省略。現在と過去の比較は動詞と動詞の比較（make vs did=made）。"
  - node_id: "nhk-005"
    seq: 3
    question: "as much on the basis of how they look as how they sound で、muchの役割は何か？"
    answer: "muchは、副詞のasと副詞句 on the basis of をつなぐ働きをする。最初のasの後には形容詞・副詞は置けるが〈前置詞＋名詞〉の副詞句は直接置けないため、muchが仲介する。"
  - node_id: "nhk-005"
    seq: 4
    question: "neither as simple nor as solitary an activity as it might sound の構造を説明せよ。"
    answer: "as〜asの as〜 部分が2つあり、neither A nor B で結ばれた形。最後のasは接続詞で、共通要素が省略されている。solitary an activity は副詞asの影響で形容詞が冠詞の前に出た語順（通常は a solitary activity）。「単純でも孤独な活動でもない」。"

