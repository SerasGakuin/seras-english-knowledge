    goal: "moreの二重品詞（名詞＋形容詞/副詞）を理解できる"

check_points:
  - node_id: "nhk-001"
    seq: 1
    question: "more through experience than through prejudice で比較されているのは何と何か？"
    answer: "through experience と through prejudice（共に〈前置詞+名詞〉の副詞句）が比較されている。evolved を修飾する副詞句同士。「偏見を通じてではなく、経験を通じて進化してきた」。"
  - node_id: "nhk-001"
    seq: 2
    question: "more A than B の意味を説明せよ。"
    answer: "「BではなくむしろA」の意味。比較級を使った対比表現。A のほうが程度が大きいことを示す。than 以下の共通部分は省略される。"
  - node_id: "nhk-001"
    seq: 3
    question: "比較対象を特定する基本原則は何か？"
    answer: "比較されるのは文法的に同じもの（同じ文法的役割・形式を持つ要素）。ただし一語とは限らず、句や節が比較対象になることもある。"

  - node_id: "nhk-002"
    seq: 1
    question: "He is older than Bob. を元の2文に復元せよ。"
    answer: "He is older than Bob is old. thanは接続詞で後ろにS+Vが続き、共通要素 is old が省略されている。"
  - node_id: "nhk-002"
    seq: 2
    question: "it was once much warmer than it currently is で比較されているのは何と何か？"
    answer: "wasとis（動詞と動詞の比較）。現在と過去の比較は動詞で表す。共通要素 warm が省略されている。much は比較級を強調する副詞で「ずっと」の意味。"
  - node_id: "nhk-002"
    seq: 3
    question: "reading for fun ... is more beneficial than just spending ... で比較されているのは何と何か？"
    answer: "reading for fun（動名詞句）と spending many hours reading for studying and gathering information（動名詞句）。文法的に同じもの（動名詞句同士）が比較されている。"

  - node_id: "nhk-003"
    seq: 1
    question: "there is more to be worried about than a possible increased risk of cancer を元の2文に復元せよ。"
    answer: "There is more (to be worried about) / than there is a possible increased risk of cancer. 共通要素 there is が省略。「がんのリスク増加以上に心配すべきことがある」。"
  - node_id: "nhk-003"
    seq: 2
    question: "この文の more の品詞は何か？"
    answer: "moreは名詞（文の主語 = there is の S）であると同時に比較級として形容詞の役割を兼ねる（二重品詞）。"
  - node_id: "nhk-003"
    seq: 3
    question: "「比較級を見たら元の2文を考える」とはどういう手法か？"
    answer: "I am older than Bob. → I am old / Bob is old の2文を想定し、比較の構造を理解する手法。thanは接続詞なので後ろにS+Vの完全な文が存在し、共通要素が省略されていると考える。"

