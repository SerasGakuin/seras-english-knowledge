check_points:
  - node_id: "nta-001"
    seq: 1
    question: "仮定法過去の基本形を述べよ。"
    answer: "〈If S'＋動詞の過去形 ..., S would[could/might/should]＋動詞の原形 ...〉。形は過去だが過去のことではなく、「可能性が低い」と本人が見積もっている場合に使う。"
  - node_id: "nta-001"
    seq: 2
    question: "本文の筆者はなぜ仮定法を使ったのか？"
    answer: "countless times（何度も何度も大変な目にあう）に対して「そこまでのことはそう起こらないよな」と可能性を低く見積もっているから。日本語の「〜たら」では区別しないが、英語では仮定法で区別する。"
  - node_id: "nta-001"
    seq: 3
    question: "If every choice you made carried consequences you would bear の構造を分析せよ。"
    answer: "every choice (which) you made = If節の主語（関代省略）。carried consequences = V+O。consequences (which) you would bear = 関代省略で consequences を修飾。not once but countless times = not A but B で bear を修飾する副詞句。"

  - node_id: "nta-002"
    seq: 1
    question: "the same way that you would at home の would はなぜ仮定法か？"
    answer: "同時期・同条件の仮定法。2つのものを比較する場合、条件を変えるのはフェアではないと考え、「もし同じ時間に母国でふるまうとして」という仮定の気持ちでwouldを使う。wouldの後にbehaveが省略されている。"
  - node_id: "nta-002"
    seq: 2
    question: "To do so would suggest の構造を説明せよ。"
    answer: "To do so が主語（do so = take wine to a dinner party）。「もしそうするとしたら」という仮定の気持ちが含まれるためwouldが使われる。主語にto不定詞を置くのはまれだが仮定法では可能。to不定詞は「これから行うこと」を表す。"
  - node_id: "nta-002"
    seq: 3
    question: "同時期・同条件の仮定法とは何か？ 例を挙げて説明せよ。"
    answer: "2つのものを比較する際、時間や条件を同一に揃えて仮定法で表す用法。例: 「この講習会では、他の授業では習えないようなことを教えてもらえる」の「習えないような」は、同じ時間に他の授業を聞くという仮定を含むため仮定法が可能。"

  - node_id: "nta-003"
    seq: 1
    question: "〈If S' were to V', S would V〉はどのような意味か？ were to の由来も含めて説明せよ。"
    answer: "「仮にS'がV'するとしたら，SはVするだろう」という空想世界の仮定法。were to (V) は元は be to (V)「Vの方向へ進むなら」の意味。仮定法では主語の人称にかかわらずbe動詞はwereを使う（元々仮定法のbe動詞はwereにする決まりがあった）。"
  - node_id: "nta-003"
    seq: 2
    question: "「仮定法は事実の逆」という説明はなぜ不正確か？"
    answer: "仮定法の「法」= mood =「気分」で、「(主観的な)仮定の気分」の意味。筆者が「可能性は低そうだ」と思えば仮定法を使う。結果的に事実の逆になることもあるが、そうでない場合もある。仮定法過去完了は「過去の事実の逆」のみだが、仮定法過去は主観の問題。"
  - node_id: "nta-003"
    seq: 3
    question: "直説法 If S'+V', S will V と仮定法 If S'+V'(過去形), S would V の違いを説明せよ。"
    answer: "直説法: 起こる可能性が高いと話者が考える仮定。主節の助動詞(will)は省ける。仮定法: 起こる可能性が低いと話者が考える仮定。主節の助動詞(would/could/might/should)は省けない。"

  - node_id: "nta-004"
    seq: 1
    question: "強調構文の基本形を述べよ。"
    answer: "〈It is＋名詞＋that＋主語あるいは目的語のない文〉。強調したい要素をIt isとthat[who]で挟み込んだ構造。強調構文でなければit=指示代名詞、that=関係代名詞だが、そのような文はまれ。"
  - node_id: "nta-004"
    seq: 2
    question: "It was the Church that helped the poor. を強調構文として元の文に復元せよ。"
    answer: "The Church helped the poor. 強調構文の It was ... that を外し、挟まれた要素(the Church)を元の位置(主語)に戻す。"
  - node_id: "nta-004"
    seq: 3
    question: "強調構文の訳出法を述べよ。"
    answer: "強調された名詞Aを最後に置き「〜なのはAだ」とするのが一般的。例: It was the Church that helped the poor. →「貧しい者を助けたのは教会だった」。"

  - node_id: "nta-005"
    seq: 1
    question: "副詞を強調する強調構文の形を述べよ。名詞の強調との違いは何か？"
    answer: "〈It is＋副詞＋that＋1つの完全な文〉。名詞の強調ではthat以降に主語または目的語が欠けるが、副詞の強調ではthat以降が完全な文になる。副詞は1語・副詞句・副詞節の3種類がある。"
  - node_id: "nta-005"
    seq: 2
    question: "人を強調する強調構文はどのような形になるか？ 例を挙げよ。"
    answer: "〈It is＋人＋who＋主語または目的語の欠けた文〉。例: Bob takes Jim to school. の主語Bobを強調 → It is Bob who takes Jim to school. 目的語Jimを強調 → It is Jim who Bob takes to school."
  - node_id: "nta-005"
    seq: 3
    question: "It's only when we stop trying that our conscious mind fades into the background. を強調構文として元の文に復元し、only when の訳し方を述べよ。"
    answer: "Only when we stop trying, our conscious mind fades into the background. only when〜 =「〜して初めて」。〈only＋時を示す副詞(語/句/節)〉は「～して初めて」と訳す。"

  - node_id: "nta-006"
    seq: 1
    question: "ダッシュ(―)による同格とは何か？"
    answer: "英語では発信者に説明責任があるため、わからない名詞の後にダッシュを置き、後の名詞（句）で内容を説明する。最初の名詞と後の名詞が「同格の関係」にある。"
  - node_id: "nta-006"
    seq: 2
    question: "a 'Create Your Taste' kiosk ― an automated touch-screen system that allows ... の構造を説明せよ。"
    answer: "ダッシュ以降の an automated touch-screen system [that allows customers to create their own burgers without interacting with another human being] という名詞句全体が、直前の a 'Create Your Taste' kiosk と同格。that は主格の関係代名詞で system を修飾。"
  - node_id: "nta-006"
    seq: 3
    question: "英文を読んでいて「わからない名詞」が出てきた場合、どう対処すべきか？"
    answer: "焦らずに読み進める。英語では発信者に説明責任があるため、後で必ず説明がなされる（ダッシュ、同格、関係代名詞節など）。"

  - node_id: "nta-007"
    seq: 1
    question: "コンマによる同格とは何か？ 日本語との違いを含めて説明せよ。"
    answer: "名詞を書いたあとで、接続詞も何も使わないで別の名詞を並べて説明する構造。日本語では「犬のトム」「先生である竹岡氏」のように接続するものが必要だが、英語では不要。例: Watson, IBM's artificial intelligence program（ワトソンというIBM社のAIプログラム）。"
  - node_id: "nta-007"
    seq: 2
    question: "文と名詞(句)の同格とは何か？ どう解釈すればよいか？"
    answer: "1つの文を書いたあとに、その文を名詞(句)で要約する構造。and this is を補って解釈する。本文: ... helped doctors ... detect ― possibly the first case in Japan ... は、前文全体を the first case in Japan で要約している。日本語でも「一大事！」のように最後に名詞1語でまとめることがある。"
  - node_id: "nta-007"
    seq: 3
    question: "Watson, IBM's artificial intelligence program, helped doctors rapidly discover ... の構造を分析せよ。"
    answer: "Watson と IBM's artificial intelligence program がコンマによる同格。helped doctors rapidly discover は help+O+原形不定詞（toが摩耗して消えた使役構造）。that conventional tests had failed to detect は目的格の関係代名詞節（detectの目的語がない）。ダッシュ以降は文と名詞の同格。"

  - node_id: "nta-008"
    seq: 1
    question: "otherwiseの語源と意味を説明せよ。"
    answer: "in other waysが変形されてできた副詞。すでに述べた文（またはその一部）を受けて、その逆を仮定して「もしそうでなければ」という意味で使う。if not で書き換えが可能。"
  - node_id: "nta-008"
    seq: 2
    question: "He will arrive at 10; otherwise, call me. の otherwise を if not で書き換えよ。"
    answer: "otherwise = if he does not arrive at 10。「彼は10時に到着します。もし来なかったら私に電話してください」。otherwiseは前文の内容を受けてその逆を仮定している。"
  - node_id: "nta-008"
    seq: 3
    question: "本文で otherwise が because 節の冒頭に挿入されている理由を説明せよ。"
    answer: "otherwiseは前文の内容（switch off their phones）を受けており、文の流れをスムーズにするために because 節の冒頭に挿入されている。otherwise = if our members do not switch off their phones で、前文の内容と逆の仮定を示す。"

  - node_id: "nta-009"
    seq: 1
    question: "despiteの品詞は何か？ 後ろにどのような要素が続くか？"
    answer: "前置詞。後ろには名詞が続く。動詞を置く場合には動名詞にする。本文: despite spending ...（spendを動名詞spending にしている）。意味は「～にもかかわらず」。"
  - node_id: "nta-009"
    seq: 2
    question: "「にもかかわらず」を表す英語を品詞別に4パターン挙げよ。"
    answer: "前置詞: despite ～（後ろに名詞）。群前置詞: in spite of ～（後ろに名詞）。接続詞: though / although S+V（後ろにS+V）。副詞: nevertheless / nonetheless（単独で使う）。"
  - node_id: "nta-009"
    seq: 3
    question: "S+V that 副詞句, S'+V' のパターンで、副詞句がthat直後に置かれる理由を説明せよ。"
    answer: "副詞句がV'を修飾していることを明確にするため。もし S+V that S'+V' 副詞句 と書くと、副詞句がVとV'のどちらを修飾するか曖昧になる。that直後に副詞句を置くことで修飾先を明確にし、情報の焦点（S'+V'）を後ろに置く効果もある。"

  - node_id: "nta-010"
    seq: 1
    question: "否定文のanyとnoの関係を説明せよ。"
    answer: "否定文のanyは「（少しも）～ない」の意味。noはanyの強意形。You don't get anywhere = You get nowhere。get nowhere / not get anywhere は直訳「どこにも到着しない」から抽象化して「成功しない」「何も得られない」の意味にもなる。"
  - node_id: "nta-010"
    seq: 2
    question: "You don't get anywhere by not \"wasting\" time. の否定の構造を分析せよ。"
    answer: "don'tは文否定で、影響範囲は右側全体（「～によって成功を得る」全体を否定）。by not \"wasting\" のnotは語否定で\"wasting\"だけを否定している。全体で「時間を浪費することをしなければ何も得られない」。引用符はぶらぶらすることが浪費ではないという筆者の考えを示す。"
  - node_id: "nta-010"
    seq: 3
    question: "引用符（\" \"）が英文中で使われる場合、どのような意味を持つか？"
    answer: "筆者がその語に疑念や特別な意味を抱いている場合に使う。本文の\"wasting\"は、一般に「浪費」とされるがアインシュタインのぶらぶらは浪費ではないという筆者の考えを示す。訳す場合には「　」をつける。"

  - node_id: "nta-011"
    seq: 1
    question: "hard, late, highに-lyが付くとそれぞれどんな意味になるか？"
    answer: "hardly =「ほとんど～ない」（hardの「熱心に」とは全く違う意味の否定語）。lately =「近頃」（lateの「遅く」とは違う意味）。highly =「おおいに」（highの「高く」とは違う意味）。"
  - node_id: "nta-011"
    seq: 2
    question: "we're hardly aware of the things around us を訳し、hardlyの働きを説明せよ。"
    answer: "「私達の周りのものをほとんど意識しない」。hardlyは準否定語で「ほとんど～ない」の意味。notと同じ位置に置かれる（we're hardly = we're not とほぼ同じ構造）。"
  - node_id: "nta-011"
    seq: 3
    question: "形容詞と副詞が同形の語を3つ挙げよ。"
    answer: "late（遅い/遅く）、fast（速い/速く）、hard（かたい・困難な/熱心に）、early（早い/早く）、high（高い/高く）など。これらは形容詞と副詞で同じ形。ただしhard→hardly, late→lately, high→highlyのように-lyを付けると別の意味になるものがあるので注意。"

  - node_id: "nta-012"
    seq: 1
    question: "部分否定とは何か？ 全否定との違いを例を挙げて説明せよ。"
    answer: "not + all/always/both/completely/every/necessarily 等の語が続く場合の否定で、「すべてが～なわけではない」のように一部を否定する。全否定（none/never/neither等）は全体を否定する。例: not all =「すべてが～なわけではない」（部分否定）、none =「1つも～ない」（全否定）。"
  - node_id: "nta-012"
    seq: 2
    question: "not necessarily の意味を述べよ。"
    answer: "「必ずしも～なわけではない」という部分否定。necessarily =「必ず」にnotが付いて部分否定になる。例: You don't necessarily have to do the work.「あなたは必ずしもその仕事をしなくてもよい」。"
  - node_id: "nta-012"
    seq: 3
    question: "I don't always use this PC. を訳し、部分否定を指摘せよ。"
    answer: "「いつもこのパソコンを使うわけではない」。not + always（「いつも」）で部分否定。「いつも使わない」（全否定）ではなく「使うときもあるが使わないときもある」という意味。"

