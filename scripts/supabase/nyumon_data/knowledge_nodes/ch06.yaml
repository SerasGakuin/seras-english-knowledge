check_points:
  - node_id: "nta-001"
    seq: 1
    question: "仮定法過去の基本形を述べよ。"
    answer: "〈If S'＋動詞の過去形 ..., S would[could/might/should]＋動詞の原形 ...〉。形は過去だが過去のことではなく、「可能性が低い」と本人が見積もっている場合に使う。"
  - node_id: "nta-001"
    seq: 2
    question: "本文の筆者はなぜ仮定法を使ったのか？"
    answer: "countless times（何度も何度も大変な目にあう）に対して「そこまでのことはそう起こらないよな」と可能性を低く見積もっているから。日本語の「〜たら」では区別しないが、英語では仮定法で区別する。"
  - node_id: "nta-001"
    seq: 3
    question: "If every choice you made carried consequences you would bear の構造を分析せよ。"
    answer: "every choice (which) you made = If節の主語（関代省略）。carried consequences = V+O。consequences (which) you would bear = 関代省略で consequences を修飾。not once but countless times = not A but B で bear を修飾する副詞句。"

  - node_id: "nta-002"
    seq: 1
    question: "the same way that you would at home の would はなぜ仮定法か？"
    answer: "同時期・同条件の仮定法。2つのものを比較する場合、条件を変えるのはフェアではないと考え、「もし同じ時間に母国でふるまうとして」という仮定の気持ちでwouldを使う。wouldの後にbehaveが省略されている。"
  - node_id: "nta-002"
    seq: 2
    question: "To do so would suggest の構造を説明せよ。"
    answer: "To do so が主語（do so = take wine to a dinner party）。「もしそうするとしたら」という仮定の気持ちが含まれるためwouldが使われる。主語にto不定詞を置くのはまれだが仮定法では可能。to不定詞は「これから行うこと」を表す。"
  - node_id: "nta-002"
    seq: 3
    question: "同時期・同条件の仮定法とは何か？ 例を挙げて説明せよ。"
    answer: "2つのものを比較する際、時間や条件を同一に揃えて仮定法で表す用法。例: 「この講習会では、他の授業では習えないようなことを教えてもらえる」の「習えないような」は、同じ時間に他の授業を聞くという仮定を含むため仮定法が可能。"

  - node_id: "nta-003"
    seq: 1
    question: "〈If S' were to V', S would V〉はどのような意味か？ were to の由来も含めて説明せよ。"
    answer: "「仮にS'がV'するとしたら，SはVするだろう」という空想世界の仮定法。were to (V) は元は be to (V)「Vの方向へ進むなら」の意味。仮定法では主語の人称にかかわらずbe動詞はwereを使う（元々仮定法のbe動詞はwereにする決まりがあった）。"
  - node_id: "nta-003"
    seq: 2
    question: "「仮定法は事実の逆」という説明はなぜ不正確か？"
    answer: "仮定法の「法」= mood =「気分」で、「(主観的な)仮定の気分」の意味。筆者が「可能性は低そうだ」と思えば仮定法を使う。結果的に事実の逆になることもあるが、そうでない場合もある。仮定法過去完了は「過去の事実の逆」のみだが、仮定法過去は主観の問題。"
  - node_id: "nta-003"
    seq: 3
    question: "直説法 If S'+V', S will V と仮定法 If S'+V'(過去形), S would V の違いを説明せよ。"
    answer: "直説法: 起こる可能性が高いと話者が考える仮定。主節の助動詞(will)は省ける。仮定法: 起こる可能性が低いと話者が考える仮定。主節の助動詞(would/could/might/should)は省けない。"

  - node_id: "nta-004"
    seq: 1
    question: "強調構文の基本形を述べよ。"
    answer: "〈It is＋名詞＋that＋主語あるいは目的語のない文〉。強調したい要素をIt isとthat[who]で挟み込んだ構造。強調構文でなければit=指示代名詞、that=関係代名詞だが、そのような文はまれ。"
  - node_id: "nta-004"
    seq: 2
    question: "It was the Church that helped the poor. を強調構文として元の文に復元せよ。"
    answer: "The Church helped the poor. 強調構文の It was ... that を外し、挟まれた要素(the Church)を元の位置(主語)に戻す。"
  - node_id: "nta-004"
    seq: 3
    question: "強調構文の訳出法を述べよ。"
    answer: "強調された名詞Aを最後に置き「〜なのはAだ」とするのが一般的。例: It was the Church that helped the poor. →「貧しい者を助けたのは教会だった」。"

