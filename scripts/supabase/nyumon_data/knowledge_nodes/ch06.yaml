knowledge_nodes:
  - id: "nta-001"
    name: "仮定法過去の基本"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❶〔仮定法〕（問57）
      仮定法過去の基本形と、仮定法を使う判断基準を理解する。
      ■ 仮定法過去の基本形（問57 ❶）:
        〈If S'＋動詞の過去形 ..., S would[could/might/should]＋動詞の原形 ...〉
        形は過去だが、過去のことを示しているわけではない。
        「もし雨が降ったら」（日常的）と「もし宝くじで1億当たったら」（人生でほぼ起こらない）は
        日本語ではどちらも「〜たら」だが、英語では可能性の見積もりで使い分ける。
      ■ 仮定法を使う判断基準（問57 ❶）:
        その可能性を本人がどう見積もっているかで決まる。
        「可能性が低いな」と思えば仮定法を使う。
        本文: countless times に対して「そこまでのことはそう起こらないよな」→仮定法。
      ❷（問57）choice you — 目的格の関係代名詞の省略:
        every choice (which/that) you made。名詞の直後に代名詞が連続し、
        madeの目的語がない → 目的格の関係代名詞の省略。
        consequences you would bear も同様（bearは他動詞）。
      ❸（問57）not once but countless times:
        not A but B「AでなくB」。countless = count + -less =「数えることができない」→「無数の」。
        全体で「一度ではなく何度も」。
      ❹（問57）youは一般の人:
        手紙文・対話文以外では、youは特定の「あなた」ではなく一般の人を示す。
        consequenceはマイナスイメージ → 「大変な目にあう」と訳す。
      ❺（問57）decision you — 目的格の関係代名詞の省略:
        a decision (which/that) you might later regret。
        名詞の後に代名詞が連続し、regretに目的語がない → 関代省略。
        certainlyは文修飾語 = It is certain that S+V。「きっと〜は確実だ」。

  - id: "nta-002"
    name: "仮定法の応用パターン"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❷〔仮定法〕（問58）、❺〔仮定法〕（問58）
      If節なしの仮定法: 同時期・同条件の仮定法と、主語位置のto不定詞＋wouldの構造。
      ■ 同時期・同条件の仮定法（問58 ❷）:
        英語には「同時期・同条件の場合には仮定法」という決まりがある。
        2つのものを比較する場合、条件（受講時期など）を変えるのはフェアではないと考える。
        「もし同じ時間にほかのどこかで授業を聞くとして、その場合には習えないようなこと」→仮定法。
        本文: the same way that you would (behave) at home
        「同じ時間に母国でふるまうだろうのと同じやり方で」→仮定法。
      ■ 主語位置のto不定詞＋would（問58 ❺）:
        To do so would suggest that ...
        to do soが主語で、do so = take wine to a dinner party。
        「もしそうするとしたら」→仮定の気持ちが含まれる→仮定法。
        主語にto不定詞を置くのはまれだが、仮定法では可能。
        to不定詞は「これから行うこと」を表す。
        第1文で動名詞(behaving)を使っているので形の連続を避ける効果もある。
      ❶（問58）the way (that) S+V:
        thatは関係副詞で「〜のやり方」の意味。wouldの後にbehaveが省略。
      ❸（問58）land の意味:
        英語では名詞と動詞が同形になることがよくある。
        landは「陸」以外に land ... in〜「…を〜に陥らせる」の意味がある。
      ❹（問58）形式主語it:
        to take wine to a dinner party が真主語。長い主語の代わりにitを置く。
        standardは「普通の、特別でない」という意味の形容詞。
      ❻（問58）or がつなぐもの:
        are unable to の後の2つの動詞 choose と afford をつなぐ。
        a good bottle (of wine) は共通の目的語。

  - id: "nta-003"
    name: "仮定法 were to V と直説法との使い分け"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❶❸〔仮定法〕（問59）、❶〔仮定法〕（問60）
      〈If S' were to V', S would V〉の形と、仮定法の本質（主観）、直説法との使い分けを理解する。
      ■ were to V の構造（問59 ❶、問60 ❶）:
        〈If S' were to (V'), S would[could/might/should] V.〉で空想世界を示す。
        「仮にS'がV'するとしたら，SはVするだろう」という意味。
        were to (V) は元は be to (V)「Vの方向へ進むなら」の意味。
        仮定法では主語の人称にかかわらずbe動詞はwereを使う
        （元々仮定法のbe動詞はwereにする決まりがあった）。
      ■ 仮定法の本質は主観（問59 ❶）:
        「仮定法は事実の逆」は不正確。仮定法の「法」= mood =「気分」。
        筆者が「ありそうだ」と思えば仮定法は不要、
        「可能性は低そうだ」と思えば仮定法を使う。
        本文: 実際にそのような質問を受ける可能性はとうてい高くない → 仮定法。
        仮定法過去完了は「過去の事実の逆」しか表さないが、
        仮定法過去は「現在の事実の逆」に限らない。
      ■ 主節の助動詞（問59 ❸）:
        would を含む文の前に If節で仮定法が使われていれば、
        主節も仮定法に合わせて would/could/might/should を使う。
        第2文: if節の代わりに to learn〜「(もし)～を知れば」で仮定法。
      ■ 直説法と仮定法の使い分け（問60 ❶）:
        (1) 直説法: If S'+V', S (will)+V「S'がV'なら，SはV(だろう)」
            → 起こる可能性が高いと話者が考える仮定。主節の助動詞は省ける。
        (2) 仮定法: If S'+V'(過去形), S would[could/might/should]+V
            → 起こる可能性が低いと話者が考える仮定。主節の助動詞は省けない。
      ❷（問59）what language = 疑問形容詞:
        疑問代名詞: What do you like?「何が好きなの」
        疑問形容詞: What time is it now?「今何時ですか」
        〈what＋名詞〉の形。本文では what language「どんな言語」。
      ❹（問59）that that:
        最初のthatは接続詞（learnの目的語を導く）。
        次のthatは形容詞「その」でanswerを修飾。
        that answerは前文の"English, of course!"を指す。
        however は副詞。文と文をつなぐことはできない。
      ❷（問60）see+O+V-ing = SVOC:
        see[hear]+O+原形不定詞「Oが～するのを見る[聞く]」
        see[hear]+O+(V)ing「Oが～しているのを見る[聞く]」
        本文: see a boy (in the water) screaming for help
        ×「助けを求めて叫んでいる水の中の少年を見る」ではない。
      ❸（問60）and がつなぐもの:
        leap in と pull him to safety が一連の動作。
        toが1つだけ → 一連の動作であることを示す。
      ❹（問60）2つのif節同士の比較:
        A: 1人でいるとき → 少年を助けたいと思う衝動の強さ
        B: 集団の一部でいるとき → 少年を助けたいと思う衝動の強さ
        不等号 A＞B。much は greater を強調する副詞。
        than以下にif節がある場合「～の場合より」と訳す。

  - id: "nta-004"
    name: "強調構文の基本"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❹〔強調構文〕（問61）
      It is...that の強調構文の識別・構造理解・訳出法を学ぶ。
      ■ 強調構文の基本形（問61 ❹）:
        〈It is＋名詞＋that＋主語あるいは目的語のない文〉→ まず強調構文と考える。
        強調したい要素を It is と that[who] で挟み込んだ構造。
        例: I like these dogs. → It is these dogs that I like.
        強調構文でなければ it=指示代名詞, that=関係代名詞だが、そのような文はまれ。
      ■ 訳出法（問61 ❹）:
        強調された名詞Aを最後に置き「〜なのはAだ」とするのが一般的。
        本文: 「貧しい者を助けたのは教会だった」
      ❶（問61）the poor = the＋形容詞「〜な人々」:
        〈the＋形容詞〉で「～な人々」の意味。ただしどの形容詞でも使えるわけではない。
        long は副詞「長い間」。
        consider O C の受動態: O be considered C by S。
        能動態: Major religions have long considered helping the poor an obligation.
      ❷（問61）They = major religions:
        They は直前の最も近い複数形名詞を指す。
        helping less fortunate people は動名詞でthat節中の主語。
        less は「程度がより少なく」で fortunate の度合いを弱める。
        less fortunate people ≒ the poor。
      ❸（問61）For example以降:
        「主な宗教は貧しき者を救うのは責務と考えてきた」の具体例が展開される。
      ❺（問61）those in need:
        元の形は those who were in need。
        those who〜「〜する人達」の who+be動詞が省略。
        in need =「何かを必要としている状態の」→「困っている」。

  - id: "nta-005"
    name: "強調構文の応用: 副詞の強調と人の強調"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❶〔強調構文〕（問62）、❶〔強調構文〕（問63）
      強調構文で副詞（句・節）や人を強調するパターンの識別と訳出を学ぶ。
      ■ 副詞を強調する強調構文（問62 ❶、問63 ❶）:
        〈It is＋副詞＋that＋1つの完全な文〉は強調構文。
        It is[It's]で始まる文を見たら強調構文の可能性を考え、後ろにthat[who]を探す。
        副詞の3種類:
        (1) 1語の副詞: yesterday「昨日」
        (2) 〈前置詞＋名詞〉からなる副詞句: during this period「この期間中に」
        (3) 〈接続詞＋SV〉からなる副詞節: when I was young「私が若かった頃」
        名詞の強調(nta-004)との違い: 副詞の強調ではthat以降が「完全な文」になる。
      ■ 人を強調する場合（問63 ❶）:
        〈It is＋人＋who＋主語または目的語の欠けた文〉。
        例: I takes Jim to school. → ①主語強調: It is Bob who takes Jim to school.
        ②目的語強調: It is Jim who Bob takes to school.
      ■ 強調された副詞の訳出:
        強調された副詞(句・節)Aを最後に置き「〜なのはAだ」とするのが一般的。
      ❷（問62）only when = 「～して初めて」:
        〈only＋時を示す副詞(語/句/節)〉=「～して初めて」。
        例: only yesterday「昨日になって初めて」。
        He buys things only after his wife agrees to.
        「彼は奥さんが同意して初めて物を買う」。
      ❸（問62）fade into the background:
        「意識が背景(意識できないところ)の中に消えていく」。
        好きな歌を口ずさむ時「歌が独りでに口から出てくる」ような現象。
      ❹（問62）take over:
        「義務や責任などを引き受ける」「取って代わる」。
        overは弧を描くイメージ。
      参考書内参照: →問36（問62は問36に続く文）
      ❷（問63）enough to V:
        〜enough to V「…するくらいの～」。enoughは形容詞の後ろに置く。
        old enough = 「…するくらいの年齢だ」（×「十分に年寄り」ではない）。
        consider O C「OをCとみなす」。
      ❸（問63）other more critical roles as citizens:
        市民としての他のもっと重要な役割（兵役、投票、納税など）。
      ❹（問63）drinking = 名詞「飲酒」:
        名詞が2つ並ぶ形: 前の名詞が形容詞のように後ろの名詞を説明。
        the drinking issue「飲酒問題」。theは「読み手も知っている例の問題」を特定。

  - id: "nta-006"
    name: "説明要素の後置: ダッシュによる同格"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❹❼〔その他〕（問64）
      ダッシュ(―)以降で名詞を同格で説明する構造を学ぶ。
      ■ ダッシュによる同格（問64 ❹）:
        英語では「発信者に説明責任」がある（日本語は受信者が推測する）。
        わからない名詞が出てきたら、後で必ず説明がなされるので焦らず読み進める。
        最初の名詞を後の名詞で説明している場合「名詞と名詞が同格の関係にある」と言う。
      ■ 同格の構造把握（問64 ❼）:
        a "Create Your Taste" kiosk — an automated touch-screen system [that ... human being]
        ダッシュ以降の名詞句全体が直前の名詞と同格。
        関係代名詞節 that ... human being は system を修飾。
      ❶（問64）not A but B:
        be動詞の否定がbe動詞の直後でない場合 → not A but B「AではなくてBだ」を予想。
        本文: are welcomed not by a cashier ..., but by a kiosk。
      ❷（問64）waiting to take:
        cashierを修飾する現在分詞（形容詞句）。
        to take their order = to不定詞の副詞用法（目的）。
        「注文を取るために待っているレジ係」。
      ❸（問64）a "Create Your Taste" kiosk:
        わからない名詞は後で説明される → 焦らず読み進める。
      ❺（問64）that = 主格の関係代名詞:
        that節中にallowsの主語がない → thatは主格の関係代名詞でsystemを説明。
        allow O to V「OがVするのを可能にする」。own は所有格の強調（対比で使用）。
      ❻（問64）without + 動名詞:
        前置詞withoutの後ろに動詞を置く場合は動名詞にする。
        interact with〜「〜と交流する、やり取りする」。

  - id: "nta-007"
    name: "同格の応用: コンマによる同格と文の同格"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❶〔その他〕（問65）、❹〔その他〕（問65）
      名詞と名詞の同格のバリエーション: コンマによる同格と、文と名詞(句)の同格を理解する。
      ■ コンマによる同格（問65 ❶）:
        名詞を書いたあとで、接続詞も何も使わないで別の名詞を最初の名詞の後ろに並べる。
        日本語では「犬のトム」「英語の先生である竹岡氏」など接続するものが必要だが、
        英語では必要ない。
        本文: Watson, IBM's artificial intelligence program
        訳: 「ワトソンというIBM社の人工知能プログラム」
        または「IBM社の人工知能プログラムであるワトソン」。
      ■ 文と名詞(句)の同格（問65 ❹）:
        名詞(句)と名詞(句)の同格だけでなく、文と名詞(句)の同格関係も存在する。
        1つの文を書いたあとに、その文を名詞(句)で要約する。
        本文: ... helped doctors ... detect ― possibly the first case in Japan ...
        and this is を補って解釈する。
        日本語でも「一大事！」のように最後に名詞1語でまとめることがある。
      ❷（問65）help+O+原形不定詞:
        使役動詞makeと同様に、helpも昔は〈help+O+to V〉だったが、
        長年の使用でtoが摩耗し、現在では〈help+O+原形不定詞〉が普通。
        日本語の「食べられる」→「食べれる」（ら抜き言葉）と同様の変化。
      ❸（問65）that = 目的格の関係代名詞:
        thatの後ろにあるdetectの目的語がない → 目的格の関係代名詞。
        先行詞は a rare type of cancer。
      ❺（問65）that = 関係副詞:
        case「場合」は元々「入れ物」という場所のイメージがあるため、
        関係副詞を従える場合にはwhereが用いられる。
        ただし先行詞にfirstという強い限定を表す形容詞がついているため、
        それに引きずられてthatが使われている。
        whereの代わりにthatを用いる場合、先行詞はplace, somewhere,
        anywhere, everywhere, nowhereに限られる。

  - id: "nta-008"
    name: "副詞 otherwise の働き"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❹〔副詞〕（問66）
      otherwise の意味・使い方と、副詞の挿入位置を理解する。
      ■ otherwise の働き（問66 ❹）:
        otherwiseは副詞で、in other waysが変形されてできた単語。
        すでに述べた文(またはその一部)を受けて、
        その逆を仮定して「もしそうでなければ」という意味で使う。
        if not で書き換えが可能。
        例: He will arrive at 10; otherwise, call me.
        「彼は10時に到着します。もし来なかったら私に電話してください」
        （otherwise = if he does not arrive at 10）。
        本文: otherwise = if our members do not switch off their phones。
        because節の冒頭に挿入されているのは、前文の内容を受けていて
        文の流れをスムーズにするため。
      ❶（問66）have to の2つの可能性:
        関係代名詞節の中のhave toは、(1) have to V（助動詞）と
        (2) have～to V（動詞＋名詞＋to不定詞）の2つの可能性がある。
        歴史的には(1)から(2)が生まれた（～とto Vが入れ替わった）。
        「～する必要がある」と訳して違和感がある場合は have～to V と考える。
        本文ではどちらの解釈も可能。
      ❷（問66）too = 否定表現:
        副詞のtooは「～しすぎる」という一種の否定表現。
        She is too beautiful. は原則マイナスイメージ
        （「きれいすぎて好きではない」「きれいすぎて近づけない」）。
      ❸（問66）give+O+O + 関代省略:
        give your kids and husband the time で〈give+O+O〉。
        they needは、the timeを説明する関係詞節でtheyの直前に
        関係代名詞which/thatが省略されている（needの目的語がない）。

  - id: "nta-009"
    name: "that節直後の副詞句の前置"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❶〔前置詞〕（問67）
      前置詞despiteの用法と、that節直後に副詞句を前置するパターンを理解する。
      ■ despite + 動名詞（問67 ❶）:
        despiteは前置詞で「～にもかかわらず」の意味。
        前置詞なので後ろには名詞、動詞を置く場合には動名詞にする。
        本文: despite spending ...（spendを動名詞にしている）。
      ■ 「にもかかわらず」の品詞別整理:
        前置詞: despite ～（後ろには名詞）
        群前置詞: in spite of ～（後ろには名詞）
        接続詞: though S+V / although S+V（後ろにはS+V）
        副詞: nevertheless / nonetheless（単独で使う）
      ■ that節直後の副詞句の前置パターン（問67 ❶）:
        S+V that 副詞句, S'+V' ... の形。
        that節中のS'+V'を修飾する副詞句を、that直後に置くことで
        修飾先を明確にし、情報の焦点を後ろに置く。
        もし S+V that S'+V' 副詞句 と書くと、副詞句がVとV'のどちらを
        修飾するのか曖昧になるため、わざわざthat直後に副詞句を置く。
      ❷（問67）over+数字:
        〈over+数字〉は「～より多く」の意味。
        more than ～と同様に等号は入らないので厳密には「～以上」ではないが、
        訳す場合には「～以上」でも許容される。

  - id: "nta-010"
    name: "否定の仕組み: anyとno、否定語の影響範囲"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❷〔否定〕（問68）
      否定文のanyとnoの関係、否定語の影響範囲、文否定と語否定の区別を理解する。
      ■ 否定文のanyとno（問68 ❷）:
        否定文のanyは「（少しも）～ない」の意味。
        強意なのがnoで、You get nowhere = You don't get anywhere。
        get nowhere / not get anywhere は直訳「どこにも到着しない」から
        抽象化して「成功しない」「いい結果が何も得られない」の意味にもなる。
      ■ 否定語の影響範囲（問68 ❷）:
        否定語の影響範囲は否定語の右側全体に及ぶ。
        You don't get anywhere by ~ing のdon'tは文の最後まで支配し
        「～によって何かの成功を得る」全体を否定している。
      ■ 語否定のnot（問68 ❷）:
        前置詞byの後のnot "wasting"のnotは語否定で
        "wasting"だけを否定している（文否定ではない）。
      ■ 引用符の意味（問68 ❷）:
        引用符は筆者がその発言に疑念や特別な意味を抱いている場合に使う。
        筆者は「ぶらぶらすることは時間の浪費ではない」と考えている。
        訳す場合には「　」をつける。
      ❶（問68）文頭の〈前置詞＋名詞〉は副詞句:
        名詞直後の〈前置詞＋名詞〉は形容詞句。
        両側にコンマが打たれた〈前置詞＋名詞〉は副詞句。
        代名詞(his)がそれが指す名詞(Albert Einstein)より先に置かれることもある。
      ❸（問68）文と名詞の同格:
        somethingが直前の「時間を浪費しなければ何も得られない」全体を受ける。
        問65と同じ文と名詞の同格パターン。

  - id: "nta-011"
    name: "準否定語 hardly と-ly副詞の意味変化"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❹〔否定〕（問69）
      hardlyの意味と、-lyが付くと意味が変わる副詞を理解する。
      ■ hardly =「ほとんど～ない」（問69 ❹）:
        形容詞と副詞が同形の語がある:
        late（遅い/遅く）、fast（速い/速く）、hard（かたい・困難な/熱心に）、
        early（早い/早く）、high（高い/高く）。
        注意すべきはhard, late, highに-lyが付くと違う意味になること:
        hardly「ほとんど～ない」、lately「近頃」、highly「おおいに」。
        hardlyは否定語なので、notと同じ位置に置かれる。
        本文: we're hardly aware of = we're not aware of とほぼ同じ位置。
      ❶（問69）形式主語it + to不定詞:
        it's not easy ... to define sleep precisely。
        itは形式主語、to define以降が真主語。
        頭でっかちの文を避け「一番言いたいことを文末に置く」end focus（文末焦点）の法則。
        ダッシュに挟まれた even for scientists は不定詞の意味上の主語。
      ❷（問69）文修飾の副詞 basically:
        語修飾「基本的に」、文修飾「基本的に言えば、実のところ」。
        文修飾の副詞は文頭に置くのが基本で、後ろにコンマを伴う。
      ❸（問69）when接続詞:
        疑問文の形でなければ接続詞「～するとき」で副詞節を形成。
        when節が and で結ばれた2つの主節を同時に修飾している。

  - id: "nta-012"
    name: "部分否定"
    category: "その他"
    priority: "P1"
    notes: |
      Point分類: ❸〔否定〕（問70）
      部分否定の概念と6つのパターンを理解する。
      ■ 部分否定（問70 ❸）:
        以下の語がnotのあとに置かれている場合は部分否定となる。
        all「すべて」 → not all ~「すべてが～なわけではない」
        always「いつも」 → not always ~「いつも～なわけではない」
        both「両方の」 → not both ~「両方とも～なわけではない」
        completely「完全に」 → not completely ~「完全に～なわけではない」
        every「皆」 → not every ~「皆が～なわけではない」
        necessarily「必ず」 → not necessarily ~「必ずしも～なわけではない」
        例: I don't always use this PC.「いつもこのパソコンを使うわけではない」
        He doesn't completely agree with the plan.「完全に同意しているわけではない」
        You don't necessarily have to do the work.「必ずしもしなくてもよい」
      ■ 文脈からの意味推測（問70 ❸）:
        butの前後で対比を読み取る。前が「アメリカ人はsorryを本気で言う」なら、
        後ろは「イギリス人にはそう聞こえない」と予想できる。
      ❶（問70）mean it:
        itがsorryを指し「sorryが表す文字どおりのことを意味する」。
        mean it =「本気で言っている」（日常でもよく使う表現）。
      ❷（問70）代名詞の指示対象の探し方:
        「その前にある一番近い名詞」をまず考える。
        だめならその前の名詞を探す。
        本文: 2番目のtheyの最も近い複数形名詞はBritish earsだが、
        文脈が合わないのでAmericansを指すと判断。

