knowledge_nodes:
  - id: "nks-001"
    name: "関係代名詞の識別"
    category: "関係詞"
    priority: "P1"
    notes: |
      Point分類: 〔関係詞〕
      ■ 関係代名詞の識別:
        名詞の直後に that があり、その後に主語または目的語の欠けた不完全な文が続く場合、
        that は関係代名詞。先行詞（直前の名詞）を説明する形容詞節を導く。
      ■ 訳し方: 関係代名詞節を先に訳し「〜した（名詞）」の形にする。that 自体の訳は出ない。
      ■ 関代 vs 同格 that の区別:
        - 関係代名詞: that の後に主語/目的語の欠けた不完全な文
        - 同格の接続詞: that の後に完成した文（主語・目的語の欠けなし）
        例: the stereotype that has long existed → 関代（主語欠如）
            the view that boys tend to excel → 同格（完成した文）
      ❶ for + 名詞 + to V: to不定詞の意味上の主語。〈for A to V〉=「Aが〜すること」
        この for は「〜のための」ではない。後ろに to V があるかで判別する。
        〈for＋名詞〉の後ろに to V の有無をチェックすること。
      ❸ コロン(:)の働き: 前の文の具体的な説明や具体例を示す。
        本文では「固定観念」の具体的内容をコロン以下で述べている。
      ❹ seem to V: SVC構造（S=主語, V=seems, C=to V以下）。
        seem to は助動詞のような働きで「〜のようだ」。
        本文の This は前文のコロン以下の内容（=女性はこの仕事に適していないという固定観念）を指す。
      ❺ the view that S+V: 名詞と that 節が同格の関係。「〜という見方」と訳す。
      ❻ and の接続先判別: and の後ろの動詞(are)を見て、前にある同じレベルの動詞(tend)を探す。
        excel と are ではなく tend と are をつないでいる（excel と are なら be にする必要がある）。
      be well-suited = suit の受動態 + 副詞 well

  - id: "nks-002"
    name: "前置詞＋関係代名詞"
    category: "関係詞"
    priority: "P1"
    notes: |
      Point分類: ❷〔関係詞〕（問21）❸〔関係詞〕（問22）
      ■ 〈前置詞＋関係代名詞〉: 関係代名詞の前に前置詞がつく形。
        理解困難なときは、関係代名詞の代わりに普通の代名詞を入れて読む。
        例: for which they were initially designed
          → for it(=the need) they were initially designed
          → they were initially designed for it
          → 「それらが最初設計されたときの目的であった必要性」
      ■ put A to B:「AをBの状態にする」。put his invention to ten uses = 10種類のやり方で使用する。
      ■ 先行詞が複数なら it ではなく them で置き換える。
      ❶（問21）that の直後に meet という動詞 → that はその主語になる関係代名詞。
        meet は「会う」が基本だが「（必要性・期待）を満たす」の意味もある。
      ❸（問21）prove: 後ろに形容詞（valuable）が補語 → 「〜だと判明する」。
        目的語をとる場合は「〜を証明する」。
      ❹（問21）meeting unforeseen needs: 前置詞 at の後 → meet が動名詞に。
        〈V-ing＋名詞〉でVが他動詞 → 「（名詞）を〜すること」。
        自動詞なら「〜している（名詞）」で現在分詞。例: a flying saucer。
      ❶（問22）When は接続詞「〜なとき」。Edison〜1877が副詞節。
      ❷（問22）proposing ten uses: 現在分詞。article を修飾する形容詞句。
      ❹（問22）and は included の目的語3つの動名詞をつなぐ。A, B, and C の形。
        preserving ..., recording ..., and teaching。
        spell は動詞「綴る」なので「綴り」は spelling。

  - id: "nks-003"
    name: "those whoの用法"
    category: "関係詞"
    priority: "P1"
    notes: |
      Point分類: ❸〔関係詞〕
      ■ those who 〜 = 「〜な人々」。漠然と those「あれらの」と言ってから
        who 〜 で具体的に説明する（those people who 〜 の people 省略とも考えられる）。
      ■ 同格の挿入: about three to five cups a day は a moderate amount of coffee と同格。
        a day の a は「〜につき」の意味。
      ❶ The combined data: 冠詞(the)＋過去分詞(combined)＋名詞(data)。
        combined は「結合された」。the はこの前の文の内容を受けて「その」。
      ❷ showed that: show は他動詞で目的語が必要 → that は接続詞（文を名詞にまとめる）。
      ❹ at the lowest risk for problems: 〈前置詞＋名詞〉は原則副詞だが、
        形容詞的に捉えれば SVC の C としても解釈可能（どちらでも可）。
      ❺ problems: 冠詞 the がなく複数形 → 「いろいろな健康上の問題」。
        problem には「健康上の問題」の意味もある。
      ❻ no higher risk: 〈no＋比較級〉の no は「あるものとあるものとの差がゼロ」
        または「同じくらいの程度でしかない」ことを示す。
        例: He is no older than I am. = 「彼と私との年齢に差はない」
        本文: 5杯以上飲む人と全く飲まない人の危険性に差がない。

