check_points:
  - node_id: "nks-001"
    seq: 1
    question: "名詞の直後の that が関係代名詞であると判断する根拠は何か？"
    answer: "that の後に主語または目的語の欠けた不完全な文が続いている場合、that は関係代名詞。that は欠けた要素の代わりを果たす。"
  - node_id: "nks-001"
    seq: 2
    question: "関係代名詞を含む英文はどのように日本語に訳すか？"
    answer: "関係代名詞節を先に訳し「〜した（先行詞）」の形にする。関係代名詞 that 自体の訳は出ない。"
  - node_id: "nks-001"
    seq: 3
    question: "the stereotype that has long existed と the view that boys tend to excel の that の違いは何か？"
    answer: "前者は関係代名詞（後に主語欠如の不完全な文）。後者は同格の接続詞（後に完成した文）。"
  - node_id: "nks-001"
    seq: 4
    question: "関係代名詞の that と同格の that を区別するポイントは？"
    answer: "that の後の文に主語や目的語の欠けがあれば関係代名詞、完成した文なら同格の接続詞。"
  - node_id: "nks-001"
    seq: 5
    question: "the view that boys tend to excel の that は関係代名詞か接続詞か？ なぜそう判断できるか？"
    answer: "同格の接続詞。that の後に boys tend to excel という完成した文（主語・動詞が揃った文）が続いているため。関係代名詞なら後に主語や目的語の欠けた不完全な文が来る。"
  - node_id: "nks-002"
    seq: 1
    question: "for which they were initially designed の for which はどこにつながるか？ どう読み解くか？"
    answer: "先行詞は the need。関係代名詞 which を普通の代名詞 it に置き換えると: they were initially designed for it(=the need)。「その必要性のために発明品は元々設計された」→「それらが最初設計されたときの目的であった必要性」。"
  - node_id: "nks-002"
    seq: 2
    question: "to which his invention might be put の to which はどう理解するか？"
    answer: "関係代名詞 which を代名詞 them(=ten uses) に置き換え、to them を文末に置く: his invention might be put to them。put A to B = 「AをBの状態にする」で「彼の発明品が10種類のやり方で使用されるかもしれない」。"
  - node_id: "nks-002"
    seq: 3
    question: "〈前置詞＋関係代名詞〉の意味を理解するための基本手順は？"
    answer: "関係代名詞を普通の代名詞に戻し、前置詞＋代名詞を元の位置（通常は文末）に置いて読む。先行詞が複数なら it ではなく them で置き換える。"
  - node_id: "nks-003"
    seq: 1
    question: "those who consumed a moderate amount of coffee の those who はどういう意味か？"
    answer: "「〜な人々」。those（あれらの人）と漠然と言ってから who 以下で具体的に説明する形。those people who の people 省略とも考えられる。「適度な量のコーヒーを消費する人々」。"
  - node_id: "nks-003"
    seq: 2
    question: "Those who consumed five or more cups a day had no higher risk than those who consumed none. の no higher risk はどういう意味か？"
    answer: "〈no＋比較級〉は「差がゼロ」を示す。5杯以上飲む人とまったく飲まない人の健康リスクの高さに差がない、という意味。"
  - node_id: "nks-003"
    seq: 3
    question: "about three to five cups a day は文中でどのような働きをしているか？"
    answer: "a moderate amount of coffee と同格の関係。「適度な量のコーヒー」を具体化して「1日に約3〜5杯」と説明している。a day の a は「〜につき」の意味。"

