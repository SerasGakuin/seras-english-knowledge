knowledge_nodes:
  - id: "nks-001"
    name: "関係代名詞の識別"
    category: "関係詞"
    priority: "P1"
    notes: |
      Point分類: 〔関係詞〕
      ■ 関係代名詞の識別:
        名詞の直後に that があり、その後に主語または目的語の欠けた不完全な文が続く場合、
        that は関係代名詞。先行詞（直前の名詞）を説明する形容詞節を導く。
      ■ 訳し方: 関係代名詞節を先に訳し「〜した（名詞）」の形にする。that 自体の訳は出ない。
      ■ 関代 vs 同格 that の区別:
        - 関係代名詞: that の後に主語/目的語の欠けた不完全な文
        - 同格の接続詞: that の後に完成した文（主語・目的語の欠けなし）
        例: the stereotype that has long existed → 関代（主語欠如）
            the view that boys tend to excel → 同格（完成した文）
      ❶ for + 名詞 + to V: to不定詞の意味上の主語。〈for A to V〉=「Aが〜すること」
        この for は「〜のための」ではない。後ろに to V があるかで判別する。
        〈for＋名詞〉の後ろに to V の有無をチェックすること。
      ❸ コロン(:)の働き: 前の文の具体的な説明や具体例を示す。
        本文では「固定観念」の具体的内容をコロン以下で述べている。
      ❹ seem to V: SVC構造（S=主語, V=seems, C=to V以下）。
        seem to は助動詞のような働きで「〜のようだ」。
        本文の This は前文のコロン以下の内容（=女性はこの仕事に適していないという固定観念）を指す。
      ❺ the view that S+V: 名詞と that 節が同格の関係。「〜という見方」と訳す。
      ❻ and の接続先判別: and の後ろの動詞(are)を見て、前にある同じレベルの動詞(tend)を探す。
        excel と are ではなく tend と are をつないでいる（excel と are なら be にする必要がある）。
      be well-suited = suit の受動態 + 副詞 well

  - id: "nks-002"
    name: "前置詞＋関係代名詞"
    category: "関係詞"
    priority: "P1"
    notes: |
      Point分類: ❷〔関係詞〕（問21）❸〔関係詞〕（問22）
      ■ 〈前置詞＋関係代名詞〉: 関係代名詞の前に前置詞がつく形。
        理解困難なときは、関係代名詞の代わりに普通の代名詞を入れて読む。
        例: for which they were initially designed
          → for it(=the need) they were initially designed
          → they were initially designed for it
          → 「それらが最初設計されたときの目的であった必要性」
      ■ put A to B:「AをBの状態にする」。put his invention to ten uses = 10種類のやり方で使用する。
      ■ 先行詞が複数なら it ではなく them で置き換える。
      ❶（問21）that の直後に meet という動詞 → that はその主語になる関係代名詞。
        meet は「会う」が基本だが「（必要性・期待）を満たす」の意味もある。
      ❸（問21）prove: 後ろに形容詞（valuable）が補語 → 「〜だと判明する」。
        目的語をとる場合は「〜を証明する」。
      ❹（問21）meeting unforeseen needs: 前置詞 at の後 → meet が動名詞に。
        〈V-ing＋名詞〉でVが他動詞 → 「（名詞）を〜すること」。
        自動詞なら「〜している（名詞）」で現在分詞。例: a flying saucer。
      ❶（問22）When は接続詞「〜なとき」。Edison〜1877が副詞節。
      ❷（問22）proposing ten uses: 現在分詞。article を修飾する形容詞句。
      ❹（問22）and は included の目的語3つの動名詞をつなぐ。A, B, and C の形。
        preserving ..., recording ..., and teaching。
        spell は動詞「綴る」なので「綴り」は spelling。

  - id: "nks-003"
    name: "those whoの用法"
    category: "関係詞"
    priority: "P1"
    notes: |
      Point分類: ❸〔関係詞〕
      ■ those who 〜 = 「〜な人々」。漠然と those「あれらの」と言ってから
        who 〜 で具体的に説明する（those people who 〜 の people 省略とも考えられる）。
      ■ 同格の挿入: about three to five cups a day は a moderate amount of coffee と同格。
        a day の a は「〜につき」の意味。
      ❶ The combined data: 冠詞(the)＋過去分詞(combined)＋名詞(data)。
        combined は「結合された」。the はこの前の文の内容を受けて「その」。
      ❷ showed that: show は他動詞で目的語が必要 → that は接続詞（文を名詞にまとめる）。
      ❹ at the lowest risk for problems: 〈前置詞＋名詞〉は原則副詞だが、
        形容詞的に捉えれば SVC の C としても解釈可能（どちらでも可）。
      ❺ problems: 冠詞 the がなく複数形 → 「いろいろな健康上の問題」。
        problem には「健康上の問題」の意味もある。
      ❻ no higher risk: 〈no＋比較級〉の no は「あるものとあるものとの差がゼロ」
        または「同じくらいの程度でしかない」ことを示す。
        例: He is no older than I am. = 「彼と私との年齢に差はない」
        本文: 5杯以上飲む人と全く飲まない人の危険性に差がない。

  - id: "nks-004"
    name: "関係代名詞の非制限用法"
    category: "関係詞"
    priority: "P1"
    notes: |
      Point分類: ❷〔関係詞〕（問24）❸〔関係詞〕（問25）❹〔関係詞〕（問26）
      ■ 非制限用法の3つの特徴:
        ① コンマ＋関係代名詞の形。制限用法にはコンマなし。
        ② 挿入か文末: 文の途中に挿入されるか文末に付加される。
        ③ 固有名詞の後: 固有名詞（1つに特定できる名詞）の場合は非制限用法を使う。
      ■ 非制限用法の which は「それ」と代名詞に置き換えて読む。
        例: some of which was good → some of it(=feedback) was good
      ■ 制限用法 vs 非制限用法（問25）:
        - 制限用法: a girl who is from Japan → 日本出身の女の子（複数人の中から限定）
        - 非制限用法: Tokyo, which is the capital of Japan → 東京は日本の首都だが（補足説明）
        - コンマの有無で判別: hunting, which was not regulated → 非制限用法
          which を it(=hunting) に置き換えて「狩猟、それは政府に規制されていなかった」
      ■ which の先行詞の特定（問26）:
        非制限用法の which の先行詞は必ずしも直前の名詞ではない。
        which は人以外を受けるため、先行詞の候補から「人」を除外して判定する。
        例: our good friends, which could result in ends →
          先行詞は good friends(人) ではなく conflicts(事)。
          全体の意味: 「対立に直面するかもしれず、それが友情の終わりにつながりうる」
      ❶（問24）that は接続詞。told that 〜 で「〜と伝えられた」。
      ❸（問24）which は疑問詞。asked which they wanted 〜 で「どちらを〜したいか尋ねられた」。
      ❶（問25）had declined: 過去完了形。1920年代までに減少が完了していた。
      ❷（問25）by the 1920s の by は「〜までに」、through hunting の through は「〜を通じて」。
      ❹（問25）Ranchers on large farms raising ... の raising は現在分詞で farms を修飾。
        cattle, horses, and sheep の3つを and でつないでいる。
      ❶（問26）that は接続詞。pointed out that 〜 で「〜を指摘した」。
      ❷（問26）lead us to a better understanding: lead A to B「AをBに導く」。
        この to は前置詞なので後ろは名詞（understanding）。
      ❸（問26）not only with acquaintances but even with our good friends:
        not only A but B「AだけでなくB」。even は「〜さえ」で強調。

  - id: "nks-005"
    name: "関係副詞"
    category: "関係詞"
    priority: "P1"
    notes: |
      Point分類: ❷❸〔関係詞〕（問27）❷〔関係詞〕（問28）
      ■ 関係副詞の4種類と先行詞:
        - when: 時を表す語（year, time）。time は省略されることがある。
        - where: 場所を表す語（place）。place は省略されることがある。
        - why: reason。reason は省略されることがある。
        - how: the way は必ず省略される。the way を書いた場合は how が省略される。
      ■ 関係副詞節の中は主語・目的語に欠けのない完全な文となる。
        例: This is the reason why he gave a car to us.（完全な文）
           cf. This is the reason which he gave to us.（Oの欠落）
      ■ 関係副詞 vs 関係代名詞の3つの違い（問28）:
        (1) 関係副詞には when/where/why/how の4種類がある
        (2) 関係副詞節の中は完全な文（主語・目的語の欠けなし）
        (3) 自明の先行詞は省略されることがある
      ■ 非制限用法（問28）:
        コンマ＋関係副詞の形で追加的な説明を述べる。
        非制限用法のときは先行詞は省略されない。
        例: This is Hawaii, where I was born.（ハワイに情報を追加）
      ■ when 節が主語になる場合（問27）:
        the time when 〜 から the time が省略され、when 節全体が主語となる。
        本文: just when the young are ... wise enough ... is not the time
        → [just when ...] が主語、is が動詞、the time が補語。
      ❶（問27）Becoming an adult: 動名詞が主語。「大人になること」。
      ❹（問27）to give them free access to the drinks bar: the time を修飾する
        不定詞の形容詞用法。〈the time + to V〉=「〜する時間」。
      ❺（問27）the drinks bar: 総称の the。誰もがイメージできる「酒場」。
        〈the＋単数形の名詞〉で総称を示す用法（take the train = 電車全般）。
      ❻（問27）最終文の主語: 動名詞 drinking by the young「若者による飲酒」。
      ❶（問28）that は目的格の関係代名詞。see O as C =「OをCと考える」。
        see の目的語が欠落 → that が関係代名詞。先行詞は a scene of daily life。
      ❸（問28）the services they need: 名詞＋名詞の連続。
        need の目的語が欠落 → they の前に目的格の関係代名詞 which/that が省略。

  - id: "nks-006"
    name: "whatの用法"
    category: "関係詞"
    priority: "P1"
    notes: |
      Point分類: ❶〔関係詞〕（問29）
      ■ what は名詞節を作り、文中で主語・目的語・補語になる。
      ■ 2つの用法（形の面では区別できないので訳を当てはめて判断）:
        (1) 疑問詞「何が・何を」:
          I wonder [what he is going to do].
          「彼は何をしようとしているのだろうか」
          → what は wonder の目的語になる名詞節を作る。what 節内では do の目的語。
        (2) 関係代名詞「〜なこと」:
          I agree with [what you say].「あなたの言うことに賛成です」
          → what は with の目的語になる名詞節を作る。what 節内では say の目的語。
      ■ 本問: what we need most が that 節内の主語。
        「私達が最も必要とすること」→ 関係代名詞の用法。
      ❷（問29）most: 副詞 much の最上級「最も」。副詞の最上級の場合 the は多くの場合省かれる。
        most の3つの意味:
        ① 「最も・一番」（副詞の最上級）
        ② 「大半・ほとんど」（名詞）: Most of the Japanese high schools have libraries.
        ③ 「たいていの」（形容詞）: Most teenagers have their own phones.
      ❸（問29）and は a strong desire と common sense をつなぐ。
        to work は desire を修飾する to 不定詞の形容詞用法。
        主語（what we need most）が単数で補語が A and B の形 → 筆者が A と B を1セットと考えている。
        simply は only と同じ「〜だけ」の意味。

