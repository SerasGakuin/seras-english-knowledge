check_points:
  - node_id: "nks-001"
    seq: 1
    question: "名詞の直後の that が関係代名詞であると判断する根拠は何か？"
    answer: "that の後に主語または目的語の欠けた不完全な文が続いている場合、that は関係代名詞。that は欠けた要素の代わりを果たす。"
  - node_id: "nks-001"
    seq: 2
    question: "関係代名詞を含む英文はどのように日本語に訳すか？"
    answer: "関係代名詞節を先に訳し「〜した（先行詞）」の形にする。関係代名詞 that 自体の訳は出ない。"
  - node_id: "nks-001"
    seq: 3
    question: "the stereotype that has long existed と the view that boys tend to excel の that の違いは何か？"
    answer: "前者は関係代名詞（後に主語欠如の不完全な文）。後者は同格の接続詞（後に完成した文）。"
  - node_id: "nks-001"
    seq: 4
    question: "関係代名詞の that と同格の that を区別するポイントは？"
    answer: "that の後の文に主語や目的語の欠けがあれば関係代名詞、完成した文なら同格の接続詞。"
  - node_id: "nks-001"
    seq: 5
    question: "the view that boys tend to excel の that は関係代名詞か接続詞か？ なぜそう判断できるか？"
    answer: "同格の接続詞。that の後に boys tend to excel という完成した文（主語・動詞が揃った文）が続いているため。関係代名詞なら後に主語や目的語の欠けた不完全な文が来る。"
  - node_id: "nks-002"
    seq: 1
    question: "for which they were initially designed の for which はどこにつながるか？ どう読み解くか？"
    answer: "先行詞は the need。関係代名詞 which を普通の代名詞 it に置き換えると: they were initially designed for it(=the need)。「その必要性のために発明品は元々設計された」→「それらが最初設計されたときの目的であった必要性」。"
  - node_id: "nks-002"
    seq: 2
    question: "to which his invention might be put の to which はどう理解するか？"
    answer: "関係代名詞 which を代名詞 them(=ten uses) に置き換え、to them を文末に置く: his invention might be put to them。put A to B = 「AをBの状態にする」で「彼の発明品が10種類のやり方で使用されるかもしれない」。"
  - node_id: "nks-002"
    seq: 3
    question: "〈前置詞＋関係代名詞〉の意味を理解するための基本手順は？"
    answer: "関係代名詞を普通の代名詞に戻し、前置詞＋代名詞を元の位置（通常は文末）に置いて読む。先行詞が複数なら it ではなく them で置き換える。"
  - node_id: "nks-003"
    seq: 1
    question: "those who consumed a moderate amount of coffee の those who はどういう意味か？"
    answer: "「〜な人々」。those（あれらの人）と漠然と言ってから who 以下で具体的に説明する形。those people who の people 省略とも考えられる。「適度な量のコーヒーを消費する人々」。"
  - node_id: "nks-003"
    seq: 2
    question: "Those who consumed five or more cups a day had no higher risk than those who consumed none. の no higher risk はどういう意味か？"
    answer: "〈no＋比較級〉は「差がゼロ」を示す。5杯以上飲む人とまったく飲まない人の健康リスクの高さに差がない、という意味。"
  - node_id: "nks-003"
    seq: 3
    question: "about three to five cups a day は文中でどのような働きをしているか？"
    answer: "a moderate amount of coffee と同格の関係。「適度な量のコーヒー」を具体化して「1日に約3〜5杯」と説明している。a day の a は「〜につき」の意味。"
  - node_id: "nks-004"
    seq: 1
    question: "some of which was good の which は何を指し、どう読み解くか？"
    answer: "which は feedback を指す非制限用法の関係代名詞。which を it(=feedback) に置き換えて some of it was good「その一部はよいものだった」と読む。コンマ＋which の形が非制限用法の目印。"
  - node_id: "nks-004"
    seq: 2
    question: "制限用法と非制限用法の違いは何か？ どう見分けるか？"
    answer: "制限用法は先行詞を限定する（a girl who is from Japan = 日本出身の女の子）。非制限用法は先行詞に補足説明を加える（Tokyo, which is the capital = 東京、それは首都だが）。コンマの有無で見分ける。"
  - node_id: "nks-004"
    seq: 3
    question: "hunting, which was not regulated by the government の which はどう理解するか？"
    answer: "非制限用法の which で先行詞は hunting。which を it(=hunting) に置き換えて「狩猟、それは政府によって規制されていなかった」と読む。コンマがあるので非制限用法。"
  - node_id: "nks-004"
    seq: 4
    question: "our good friends, which could result in ends の which の先行詞は何か？ なぜそう判断できるか？"
    answer: "先行詞は good friends ではなく、前方の conflicts。which は人以外を受けるため、人を表す good friends は先行詞になれない。「対立に直面するかもしれず、それ(=対立)が友情の終わりにつながりうる」。"
  - node_id: "nks-005"
    seq: 1
    question: "just when the young are finally wise enough ... is not the time の when はどのような用法か？"
    answer: "関係副詞 when。先行詞 the time が省略されており、when 節全体が文の主語として機能している。「若者が最終的に若い大人として扱われるくらい賢明になるちょうどその時」。"
  - node_id: "nks-005"
    seq: 2
    question: "関係副詞の先行詞はどのような条件で省略されるか？"
    answer: "place(where), time(when), reason(why) は省略されることがある。how の場合は the way が必ず省略される（the way を書くと how が省略される）。ただし非制限用法（コンマ付き）では先行詞は省略されない。"
  - node_id: "nks-005"
    seq: 3
    question: "関係副詞と関係代名詞はどう違うか？"
    answer: "(1) 関係副詞は when/where/why/how の4種類がある。(2) 関係副詞節の中は主語・目的語に欠けのない完全な文。(3) 自明の先行詞は省略されることがある。関係代名詞の場合は節内に主語・目的語の欠けがある。"
  - node_id: "nks-005"
    seq: 4
    question: "Japan's \"super smart society,\" where all individuals can receive ... の where はどのような用法か？"
    answer: "関係副詞の非制限用法。コンマ＋where で「そこでは」と追加的説明を加えている。先行詞は super smart society。非制限用法なので先行詞は省略されない。"
  - node_id: "nks-006"
    seq: 1
    question: "what we need most is simply a strong desire ... の what はどのような用法か？"
    answer: "関係代名詞の what で「〜なこと」の意味。what we need most 全体が that 節内の主語。「私達が最も必要とすること」。what 節内では need の目的語として機能している。"
  - node_id: "nks-006"
    seq: 2
    question: "what の疑問詞用法と関係代名詞用法はどう判別するか？"
    answer: "形の面では区別できないので、訳を当てはめてみて適切なほうを選ぶ。「何が・何を」（疑問詞）か「〜なこと」（関係代名詞）か。例: I wonder what he is going to do.（疑問詞）vs I agree with what you say.（関係代名詞）。"
  - node_id: "nks-006"
    seq: 3
    question: "I wonder what he is going to do. と I agree with what you say. の what の用法の違いは何か？"
    answer: "前者は疑問詞の what「何を」で、wonder の目的語になる名詞節を作る。後者は関係代名詞の what「〜なこと」で、with の目的語になる名詞節を作る。どちらも what 節内では動詞の目的語として機能している。"

