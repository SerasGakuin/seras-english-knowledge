check_points:
  - node_id: "njd-001"
    seq: 1
    question: "going to college and doing well is ... の going/doing は何か？ その判断根拠は？"
    answer: "動名詞。後ろに is があるので、going ... well 全体が文の主語。動詞を名詞にまとめる働き → 動名詞。"
  - node_id: "njd-001"
    seq: 2
    question: "A and B の動名詞句が主語の場合、動詞は常に複数扱いか？"
    answer: "いいえ。一般にはA and Bは複数扱いだが、AとBが「ひとまとまり」と書き手が判断した場合は単数扱い（is）。例: Jam and bread is enough for my breakfast."
  - node_id: "njd-001"
    seq: 3
    question: "文中のV-ingが動名詞なのか進行形の一部なのかを見極める方法は？"
    answer: "be動詞の有無で判断。be動詞 + V-ingなら進行形。V-ingが主語・目的語・補語の位置にあれば動名詞。"
  - node_id: "njd-002"
    seq: 1
    question: "前置詞の後にV-ingが来た場合、なぜ動名詞だと判断できるか？"
    answer: "前置詞の後ろには名詞が必要。V-ingが名詞の働きをする → 動名詞。"
  - node_id: "njd-002"
    seq: 2
    question: "without being registered there の being は何か？ 構造を説明せよ。"
    answer: "受動態〈be + registered〉が動名詞化した形。前置詞 without の後は名詞が必要 → being registered は動名詞。there は副詞「そこで」。"
  - node_id: "njd-002"
    seq: 3
    question: "having to think about exams の having は何か？ 構造を説明せよ。"
    answer: "〈have to V〉が動名詞化した形。普通の助動詞は動名詞にできないが、have to は可能。without having to V = 「Vする必要もなく」。"
  - node_id: "njd-003"
    seq: 1
    question: "evidence for modern humans using の using は動名詞か現在分詞か？ 判断理由は？"
    answer: "動名詞。(1)現在分詞として humans を修飾すると「人類の証拠」となり意味不明。(2)動名詞として modern humans を意味上の主語と読むと「人類が利用した証拠」で意味が通る。"
  - node_id: "njd-003"
    seq: 2
    question: "〈名詞＋V-ing〉を見たとき、どのような2つの可能性を検討すべきか？"
    answer: "(1) 現在分詞として名詞を後置修飾（「Vしている名詞」）。(2) 動名詞で前の名詞が意味上の主語（「名詞がVすること」）。意味の整合性で判断する。"
  - node_id: "njd-003"
    seq: 3
    question: "動名詞と現在分詞の文中での働きの違いは何か？"
    answer: "動名詞は名詞の働き（主語・補語・目的語）。現在分詞は形容詞の働き（名詞修飾）または副詞の働き（分詞構文・SVOCのC）。"
  - node_id: "njd-003"
    seq: 4
    question: "準動詞（動名詞・分詞）は時制を持つか？"
    answer: "持たない。いつの時点のことかは文脈で判断する。例: evidence for humans using → 証拠の話なので過去 →「用いた」と訳す。"

