knowledge_nodes:
  - id: "njd-001"
    name: "動名詞の主語用法"
    category: "準動詞"
    priority: "P1"
    notes: |
      Point分類: ❸〔動名詞〕
      ■ V-ingが文の主語の位置にある場合、動名詞（動詞を名詞にまとめる働き）。
        例: going to college and doing well is ... → going と doing は動名詞。
        後ろに is があるので、going ... well 全体が主語と確認できる。
      ■ A and B のV-ing句が「ひとまとまり」の場合、単数扱い（動詞は is）。
        一般にはA and Bは複数扱いだが、書き手がひとまとまりと判断した場合は単数。
        例: Jam and bread is enough for my breakfast.「私の朝食はジャムを塗ったパンで十分です」
      ■ go to college: college に冠詞がないのは「学びのために通う」という抽象的な意味。
        do well: 学校なら「成績がよい」、仕事なら「いい仕事をする」。
      ❶ for は前置詞（for + 名詞）。〈for S + V〉なら接続詞（等位接続詞）。
        接続詞の for は「というのも…だから」（= because）。
        most は「大半の」であり「多くの」ではない。
      ❷ though は副詞用法（ディスコースマーカー）。
        (1) 両側にコンマで挿入 (2) 文末にコンマ付きで配置。
        前に述べたことを弱めたり異なることを述べるときに使う。
        英語では therefore/however 等が文中に挿入されるが、日本語ではつなぎ語は文頭に置く。
      ❹ 文構造 SVC: the best way は補語。still は副詞「いまだに」。
        to master the tools は way を修飾する形容詞用法の to不定詞。
        tools に the がつくのは後ろに修飾語（needed for many careers）があり限定されるため。
      ❺ needed は過去分詞（後置修飾）。文がすでにSVCで完結しているため過去形ではない。
        for many careers は needed を修飾する副詞句。

  - id: "njd-002"
    name: "前置詞の目的語としての動名詞"
    category: "準動詞"
    priority: "P1"
    notes: |
      Point分類: ❹〔動名詞〕
      ■ 前置詞の後ろは名詞 → V-ingが来れば動名詞。
      ■ 受動態の動名詞: being + V-pp
        例: being registered there = 「そこで登録されること」
        受動態〈be + registered〉が動名詞化した形。
      ■ have to の動名詞化: having to V
        普通の助動詞は動名詞にできないが、have to は可能。
        without having to V = 「Vする必要もなく」。
      ■ 〈without A or B〉= 「AもBもなく」。
      ❶ 大文字で始まる単語は固有名詞（地名・人名・作品名等）。
        著者名が作品を指すことがある。例: She plays Mozart well.「彼女はモーツァルトを弾くのが上手い」
      ❷ and は was reading と attending を接続。attending にも was を補って読む。
        occasional = 「時おりの」（頻繁ではない）。
      ❸ at the University of Pavia は形容詞句（lectures を修飾）。
        for pleasure は副詞句（attending を修飾）。
      ❺ without ... 全体は副詞（attending を修飾）。for pleasure を具体化した副詞句。
      [図表: 樹形図 — reading/attending と without の修飾関係を示す（p.53）]

  - id: "njd-003"
    name: "動名詞と現在分詞の判別"
    category: "準動詞"
    priority: "P1"
    notes: |
      Point分類: ❶〔動名詞〕
      ■ 〈名詞＋V-ing〉には2つの解釈がある:
        (1) 現在分詞として名詞を後置修飾 → 「Vしている名詞」
        (2) 動名詞で名詞が意味上の主語 → 「名詞がVすること」
        意味の整合性で判断する。
      ■ 動名詞と現在分詞の働き一覧:
        | 種類 | 文中での働き | 文中での要素 |
        | 動名詞 | 名詞になる | 主語、補語、動詞や前置詞の目的語 |
        | 現在分詞 | 形容詞になる | 名詞を前や後ろから修飾する |
        | 現在分詞 | 副詞になる | 分詞構文、SVOCのC |
      ■ 準動詞は時制を持たない。「いつの時点のことか」は文脈で判断。
        例: evidence for humans using ... → 証拠なので過去の話 → 「用いた」
      ■ early = 「ある時間軸の前半」。early in the morning = 朝早く。本文では「最古の」。
      ❷ 〈名詞＋名詞〉で前の名詞が後ろを修飾。
        例: rainforest environments = 「熱帯雨林という環境」。
        an enemy ship = 「敵の船」。
      ❸ 〈be動詞＋from〉= 「～から来た」「～出身だ」。本文では「～のものだった」。
      ❹ seem = 「～と思われる」。日本語では受動態的だが英語では受動態にしない。
      ❺ 〈for A to V〉= 「AがVする」。for A は to不定詞の意味上の主語。
        an unlikely place for early humans to live = 「初期の人間が住みそうにもない場所」。
        for ... to live は an unlikely place を修飾する形容詞用法の to不定詞。

  - id: "njd-004"
    name: "前置詞の後のV-ingの判別"
    category: "準動詞"
    priority: "P1"
    notes: |
      Point分類: ❶〔分詞〕
      ■ 〈名詞＋V-ing〉の直前に前置詞がある場合、まずはV-ingを動名詞と見る。
        しかし意味が通らなければ、V-ingは分詞（形容詞）として名詞を修飾すると判断する。
      ■ 判断手順:
        (1) 動名詞と仮定して意味をとる
        (2) 意味が通らなければ分詞と判断
        例: studies looking at ... → 「研究が見ている」は不自然 → looking は分詞（studies を修飾）
      ■ 「どんな研究だろう？ このあとに説明があるよね」と読み進めるのが適切な読み方。
      ❷ a systematic review of studies: 長い主語の構造。
        systematic =「きちんと計画を立てて一定の順序・ルールで行う」。
        review = 「検証すること」。
      ❸ and がつなぐもの: long-term consumption of coffee と the risk of cardiovascular disease。
        後者だけに the がつくのは、「心臓血管病のリスク」は読者が特定できるため。
        前者に the がないのは、「どのくらいの期間でどのくらいの量」は個人差があり1つのイメージがないため。
        [図表: 樹形図 — looking at の目的語が A and B の並列関係を示す（p.57）]
      ❹ involving は分詞: find O（36 studies）で文が完結しているため、
        involving 以降は修飾語。studies を修飾する形容詞句。

  - id: "njd-005"
    name: "文末の分詞構文"
    category: "準動詞"
    priority: "P1"
    notes: |
      Point分類: ❹〔分詞〕（問16・問17共通）
      ■ 文が完結した後の V-ing / V-pp = 修飾語。コンマで文が切れている → 副詞の可能性が高い。
      ■ 文末に置かれた V-ing, V-pp などの副詞は「分詞構文」と呼ばれ、
        「前文の具体化、補足をする働き」を持つ。追加的に後で訳すのが普通。
      ■ 関係代名詞 which V-ed で置き換え可能（非制限用法）。
        例: ..., allowing athletes ... = ..., which allowed athletes ...
      ■ 〈allow O to V〉: 主語が「物や事柄」の場合「OがVするのを可能にする」。
      ■ 分詞構文が that節を伴う場合: showing that S V ... の that は省略可。
        例: showing our ancestors were living ... = showing that our ancestors were living ...
      ■ 分詞の基本整理:
        | 種類 | 意味 | 働き① | 働き② |
        | 過去分詞 | ～される | 形容詞として名詞を修飾 | 副詞になる（分詞構文） |
        | 現在分詞 | ～している | 形容詞として名詞を修飾 | 副詞になる（分詞構文） |
        ※ 現在完了・受動態・進行形の構成要素にもなる。SVOCのCにもなる。
      ❶ there is/are 構文: 〈There is [are] + 名詞〉で「～がある」。名詞が実質的な主語。
        there は特に意味を持たない（注意を促すマーク）。
      ❷ some は「漠然とした不定量・数」。文脈により「数人」「一部の」「少し」等。
      ❸ events = 「（競技）種目」（文脈による訳語の変化。辞書で確認する習慣を）。
      ❶ published は過去分詞（a study を修飾する形容詞）。前置詞のついた名詞は主語にならない。
      ❷ have + now + accurately + dated: 現在完了の have と pp が副詞の挿入で離れている。
        動詞を修飾する副詞は原則的に動詞の前後に置かれる。
      ❸ discovered は過去分詞（teeth を修飾）。目的語がない → 過去分詞形。
        the island of Sumatra: 「スマトラの島」ではなく「スマトラという島」。同格関係を示す of。
      ❺ showing that ... の that 省略: show は他動詞で後ろに名詞か that節をとる。
        showing + 完全な文 → that が省略されている。were は that節内の過去進行形。
      一言（問17）: 後置修飾を理解することが英語学習では非常に重要。

  - id: "njd-006"
    name: "付帯状況のwith"
    category: "準動詞"
    priority: "P1"
    notes: |
      Point分類: ❹〔分詞〕❺〔分詞〕
      ■ 分詞構文の意味上の主語が文の主語と異なる場合、分詞の前に主語を置いて示す。
        この形を独立分詞構文と呼ぶ。独立分詞構文にはしばしば with がつく。
        これを一般に「付帯状況を示す with」と呼ぶ。
      ■ 文中に〈with＋名詞〉があったら付帯状況を予想し、後ろに V-ing や過去分詞を探す。
        例: with competitors facing obstacles → 「競技者達が困難に直面していて」
      ■ 訳出: 人物描写を除き、主文を補足するような追加的な訳をするのが普通。
      ■ 分詞の ranging from A to B は通例、名詞の直後に置かれ形容詞句として
        その名詞の範囲を特定する働きをする。2語以上の修飾語句は名詞の後ろに置かれる。
      ❶ even though: 接続詞 though に強調の even がついた形。
        even though に続く内容は「現実・事実」を表す（even if は仮定）。
        訳は though と同様「～だけれども」で十分。
        代名詞 they が先に置かれ、主節の the London Paralympic Games を指す例。
      ❷ that は admit の目的語となる接続詞の that。後続の文を名詞にまとめる。
      ❸ under-represented: 〈under＋動詞〉は「不十分・少ない」の意味が加わる。
        represent「代表する」→ under-represented「参加が少ない」。
        underestimate「過小評価する」、underemphasize「あまり強調しない」も同パターン。

  - id: "njd-007"
    name: "完了分詞構文"
    category: "準動詞"
    priority: "P1"
    notes: |
      Point分類: ❹〔分詞〕
      ■ having + V-pp = 完了形の分詞構文。
        主節より前の時点に起きたことを示すために完了形になる。
        元の文: I have experienced city life in New York and Tokyo.
      ■ 分詞構文は「文と文を緩くつなぐ」もの。
        日本語にするときは「～なので」のようにつなぎ言葉を加えるとうまくいく。
      ❶ 接続詞 As は「～するとき」。as の基本イメージは「だいたい等しい」。
        まず「（～と）同じくらい」を当てはめ、しっくりいかなければ
        「～のように」「～するとき」「～なので」を当てはめる。
      ❷ Vancouver, where I was born and raised: 関係副詞 where の非制限用法。
        先行詞が固有名詞の場合、関係副詞の前にコンマを打つのが英語の決まり。
        コンマがないと「自分が生まれ育ったほうのバンクーバー」と限定的な意味になる。
      ❸ To me = 「私にとって」。文頭の〈前置詞＋名詞〉は副詞句。
      ❺ how little I knew: how は感嘆文を作る how が文中に入った形。
        疑問文の how か感嘆文の how かは意味で判断する。
        文末に「？」→ 疑問文、「！」→ 感嘆文。文中では意味で決める。

