knowledge_nodes:
  - id: "njd-001"
    name: "動名詞の主語用法"
    category: "準動詞"
    priority: "P1"
    notes: |
      Point分類: ❸〔動名詞〕
      ■ V-ingが文の主語の位置にある場合、動名詞（動詞を名詞にまとめる働き）。
        例: going to college and doing well is ... → going と doing は動名詞。
        後ろに is があるので、going ... well 全体が主語と確認できる。
      ■ A and B のV-ing句が「ひとまとまり」の場合、単数扱い（動詞は is）。
        一般にはA and Bは複数扱いだが、書き手がひとまとまりと判断した場合は単数。
        例: Jam and bread is enough for my breakfast.「私の朝食はジャムを塗ったパンで十分です」
      ■ go to college: college に冠詞がないのは「学びのために通う」という抽象的な意味。
        do well: 学校なら「成績がよい」、仕事なら「いい仕事をする」。
      ❶ for は前置詞（for + 名詞）。〈for S + V〉なら接続詞（等位接続詞）。
        接続詞の for は「というのも…だから」（= because）。
        most は「大半の」であり「多くの」ではない。
      ❷ though は副詞用法（ディスコースマーカー）。
        (1) 両側にコンマで挿入 (2) 文末にコンマ付きで配置。
        前に述べたことを弱めたり異なることを述べるときに使う。
        英語では therefore/however 等が文中に挿入されるが、日本語ではつなぎ語は文頭に置く。
      ❹ 文構造 SVC: the best way は補語。still は副詞「いまだに」。
        to master the tools は way を修飾する形容詞用法の to不定詞。
        tools に the がつくのは後ろに修飾語（needed for many careers）があり限定されるため。
      ❺ needed は過去分詞（後置修飾）。文がすでにSVCで完結しているため過去形ではない。
        for many careers は needed を修飾する副詞句。

  - id: "njd-002"
    name: "前置詞の目的語としての動名詞"
    category: "準動詞"
    priority: "P1"
    notes: |
      Point分類: ❹〔動名詞〕
      ■ 前置詞の後ろは名詞 → V-ingが来れば動名詞。
      ■ 受動態の動名詞: being + V-pp
        例: being registered there = 「そこで登録されること」
        受動態〈be + registered〉が動名詞化した形。
      ■ have to の動名詞化: having to V
        普通の助動詞は動名詞にできないが、have to は可能。
        without having to V = 「Vする必要もなく」。
      ■ 〈without A or B〉= 「AもBもなく」。
      ❶ 大文字で始まる単語は固有名詞（地名・人名・作品名等）。
        著者名が作品を指すことがある。例: She plays Mozart well.「彼女はモーツァルトを弾くのが上手い」
      ❷ and は was reading と attending を接続。attending にも was を補って読む。
        occasional = 「時おりの」（頻繁ではない）。
      ❸ at the University of Pavia は形容詞句（lectures を修飾）。
        for pleasure は副詞句（attending を修飾）。
      ❺ without ... 全体は副詞（attending を修飾）。for pleasure を具体化した副詞句。
      [図表: 樹形図 — reading/attending と without の修飾関係を示す（p.53）]

  - id: "njd-003"
    name: "動名詞と現在分詞の判別"
    category: "準動詞"
    priority: "P1"
    notes: |
      Point分類: ❶〔動名詞〕
      ■ 〈名詞＋V-ing〉には2つの解釈がある:
        (1) 現在分詞として名詞を後置修飾 → 「Vしている名詞」
        (2) 動名詞で名詞が意味上の主語 → 「名詞がVすること」
        意味の整合性で判断する。
      ■ 動名詞と現在分詞の働き一覧:
        | 種類 | 文中での働き | 文中での要素 |
        | 動名詞 | 名詞になる | 主語、補語、動詞や前置詞の目的語 |
        | 現在分詞 | 形容詞になる | 名詞を前や後ろから修飾する |
        | 現在分詞 | 副詞になる | 分詞構文、SVOCのC |
      ■ 準動詞は時制を持たない。「いつの時点のことか」は文脈で判断。
        例: evidence for humans using ... → 証拠なので過去の話 → 「用いた」
      ■ early = 「ある時間軸の前半」。early in the morning = 朝早く。本文では「最古の」。
      ❷ 〈名詞＋名詞〉で前の名詞が後ろを修飾。
        例: rainforest environments = 「熱帯雨林という環境」。
        an enemy ship = 「敵の船」。
      ❸ 〈be動詞＋from〉= 「～から来た」「～出身だ」。本文では「～のものだった」。
      ❹ seem = 「～と思われる」。日本語では受動態的だが英語では受動態にしない。
      ❺ 〈for A to V〉= 「AがVする」。for A は to不定詞の意味上の主語。
        an unlikely place for early humans to live = 「初期の人間が住みそうにもない場所」。
        for ... to live は an unlikely place を修飾する形容詞用法の to不定詞。

