check_points:
  - node_id: "njd-001"
    seq: 1
    question: "going to college and doing well is ... の going/doing は何か？ その判断根拠は？"
    answer: "動名詞。後ろに is があるので、going ... well 全体が文の主語。動詞を名詞にまとめる働き → 動名詞。"
  - node_id: "njd-001"
    seq: 2
    question: "A and B の動名詞句が主語の場合、動詞は常に複数扱いか？"
    answer: "いいえ。一般にはA and Bは複数扱いだが、AとBが「ひとまとまり」と書き手が判断した場合は単数扱い（is）。例: Jam and bread is enough for my breakfast."
  - node_id: "njd-001"
    seq: 3
    question: "文中のV-ingが動名詞なのか進行形の一部なのかを見極める方法は？"
    answer: "be動詞の有無で判断。be動詞 + V-ingなら進行形。V-ingが主語・目的語・補語の位置にあれば動名詞。"
  - node_id: "njd-002"
    seq: 1
    question: "前置詞の後にV-ingが来た場合、なぜ動名詞だと判断できるか？"
    answer: "前置詞の後ろには名詞が必要。V-ingが名詞の働きをする → 動名詞。"
  - node_id: "njd-002"
    seq: 2
    question: "without being registered there の being は何か？ 構造を説明せよ。"
    answer: "受動態〈be + registered〉が動名詞化した形。前置詞 without の後は名詞が必要 → being registered は動名詞。there は副詞「そこで」。"
  - node_id: "njd-002"
    seq: 3
    question: "having to think about exams の having は何か？ 構造を説明せよ。"
    answer: "〈have to V〉が動名詞化した形。普通の助動詞は動名詞にできないが、have to は可能。without having to V = 「Vする必要もなく」。"
  - node_id: "njd-003"
    seq: 1
    question: "evidence for modern humans using の using は動名詞か現在分詞か？ 判断理由は？"
    answer: "動名詞。(1)現在分詞として humans を修飾すると「人類の証拠」となり意味不明。(2)動名詞として modern humans を意味上の主語と読むと「人類が利用した証拠」で意味が通る。"
  - node_id: "njd-003"
    seq: 2
    question: "〈名詞＋V-ing〉を見たとき、どのような2つの可能性を検討すべきか？"
    answer: "(1) 現在分詞として名詞を後置修飾（「Vしている名詞」）。(2) 動名詞で前の名詞が意味上の主語（「名詞がVすること」）。意味の整合性で判断する。"
  - node_id: "njd-003"
    seq: 3
    question: "動名詞と現在分詞の文中での働きの違いは何か？"
    answer: "動名詞は名詞の働き（主語・補語・目的語）。現在分詞は形容詞の働き（名詞修飾）または副詞の働き（分詞構文・SVOCのC）。"
  - node_id: "njd-003"
    seq: 4
    question: "準動詞（動名詞・分詞）は時制を持つか？"
    answer: "持たない。いつの時点のことかは文脈で判断する。例: evidence for humans using → 証拠の話なので過去 →「用いた」と訳す。"
  - node_id: "njd-004"
    seq: 1
    question: "studies looking at long-term consumption の looking は動名詞か分詞か？ 判断理由は？"
    answer: "分詞（現在分詞）。動名詞と仮定すると「研究が見ていること」となり意味不明。分詞として studies を後置修飾すると「長期消費に焦点を当てた研究」で意味が通る。"
  - node_id: "njd-004"
    seq: 2
    question: "前置詞の後の〈名詞＋V-ing〉を見たとき、どのような手順で判別するか？"
    answer: "(1) まず動名詞と仮定して意味をとる。(2) 意味が通らなければ、V-ing は分詞（形容詞）として名詞を修飾すると判断する。"
  - node_id: "njd-004"
    seq: 3
    question: "36 studies involving more than 1,270,000 participants の involving は何か？ 判断理由は？"
    answer: "分詞（現在分詞）。found 36 studies で文が完結（SVO）しているため、involving 以降は修飾語。studies を修飾する形容詞句。"
  - node_id: "njd-005"
    seq: 1
    question: "..., allowing athletes from different countries to participate together の allowing は何か？"
    answer: "分詞構文（現在分詞の副詞用法）。文が完結した後のコンマ＋V-ing → 副詞（分詞構文）。前文の結果を補足・具体化する働き。"
  - node_id: "njd-005"
    seq: 2
    question: "文末の分詞構文はどのような働きをするか？"
    answer: "前文の具体化・補足をする働き。追加的に後で訳すのが普通。関係代名詞 which V-ed（非制限用法）で置き換え可能。"
  - node_id: "njd-005"
    seq: 3
    question: "showing our ancestors were living ... の showing の後には何が省略されているか？"
    answer: "接続詞 that が省略されている。show は他動詞で後ろに名詞か that節をとる。showing + 完全な文 → that が省略されていると判断。"
  - node_id: "njd-005"
    seq: 4
    question: "過去分詞と現在分詞が形容詞・副詞として働く場合の違いは？"
    answer: "過去分詞は「～される」、現在分詞は「～している」。どちらも形容詞として名詞を修飾する働きと、副詞になる働き（分詞構文）を持つ。"
  - node_id: "njd-006"
    seq: 1
    question: "with competitors facing obstacles の文法的な構造を説明せよ。"
    answer: "独立分詞構文に with がついた付帯状況の構文。分詞構文の意味上の主語（competitors）が文の主語（Developing nations）と異なるため、分詞の前に主語を置いている。with は付帯状況を示す。"
  - node_id: "njd-006"
    seq: 2
    question: "独立分詞構文はどのような場合に用いられるか？"
    answer: "分詞構文の意味上の主語が文の主語と異なる場合。分詞の前に主語を置いて示す。しばしば with がつく（付帯状況の with）。"
  - node_id: "njd-006"
    seq: 3
    question: "ranging from prejudice against disability to the high cost の ranging は何か？"
    answer: "分詞（現在分詞）。名詞 obstacles の直後に置かれ、形容詞句としてその名詞の範囲を特定する後置修飾。from A to B で範囲を示す。"
  - node_id: "njd-007"
    seq: 1
    question: "having experienced city life in New York and Tokyo の having experienced は何か？"
    answer: "完了形の分詞構文。主節（I have to admit）より前の時点に起きたことを示すために、having + V-pp の完了形になっている。"
  - node_id: "njd-007"
    seq: 2
    question: "完了分詞構文と通常の分詞構文の違いは何か？"
    answer: "通常の分詞構文（V-ing）は主節と同時点の出来事。完了分詞構文（having + V-pp）は主節より前の時点に起きた出来事を表す。"
  - node_id: "njd-007"
    seq: 3
    question: "having experienced を元の文の形に直すとどうなるか？"
    answer: "I have experienced city life in New York and Tokyo. 完了形の分詞構文は現在完了の文を分詞構文にしたもの。"

