knowledge_nodes:
  - id: "nbk-001"
    name: "品詞の働き: 名詞"
    category: "基本講義"
    priority: "P1"
    notes: |
      名詞とは、人や動物やモノやコトを表す言葉。
      ■ 抽象名詞: 形のない感情や概念を表す名詞（例: love「愛情」, information「情報」）
      ■ 固有名詞: 地名や人の名前。最初の1字を大文字で表す（例: Kyoto, Japan）
      ■ 代名詞: I, they, it, this など、文中に出てくる名詞の代わりに用いられる語
      ■ 可算名詞: 数えられる名詞。1つなら冠詞 a[an] + 単数形、2つ以上は複数形（例: a desk / desks）
      ■ 不可算名詞: 数えられない名詞。複数形を持たず冠詞 a もつかない（例: water）
      ■ 注意: information は不可算名詞。数える場合は a piece of information とする。日本語の感覚は通じない

  - id: "nbk-002"
    name: "品詞の働き: 動詞"
    category: "基本講義"
    priority: "P1"
    notes: |
      動詞とは、動き（動作）を表す言葉。日本語で言い切りの形がウ段で終わるもの。
      例: put「置く」, go「行く」, change「変える」
      ■ 状態動詞: be動詞, become「〜になる」, remain「〜のままである」, seem「〜に思える」
        など存在や状態を表すのも動詞に含まれる。
      ■ 時制:
        - 過去: walked / wrote（語尾変化で過去を示す）
        - 未来: will walk / will write（〈will + 動詞の原形〉）
        - 現在進行形: is walking / is writing（〈be + V-ing〉）
        - 現在完了: have walked / have written（〈have + 過去分詞〉）
      ■ 規則動詞: 語尾に -ed を加えて過去形・過去分詞形を作る（walk → walked）
      ■ 不規則動詞: 不規則な過去形・過去分詞形を持つ（write → wrote → written）

  - id: "nbk-003"
    name: "品詞の働き: 形容詞"
    category: "基本講義"
    priority: "P1"
    notes: |
      形容詞とは、名詞に情報を加える（＝修飾する）言葉。
      ■ 2つの働き:
        (1) 名詞を修飾する: cold water「冷たい水」
        (2) 名詞の状態を表す「（名詞は）〜だ」: The house is big.
      ■ 形容詞の位置:
        - 1語 → 名詞の前に置く（前置修飾）: a running dog
        - 2語以上の句 → 名詞の後ろに置く（後置修飾）:
          a dog running in the park「公園を走っている犬」
          a machine broken by the storm「嵐によって壊された機械」
      ■ 関係代名詞節も名詞の説明に使われる:
        The small dog that is running over there is mine.
      ■ SVC構造での形容詞:
        be動詞の他に become, seem, look などの動詞の後ろにも置かれる。
        They seemed happy.（He = happy の関係）

  - id: "nbk-004"
    name: "品詞の働き: 副詞"
    category: "基本講義"
    priority: "P1"
    notes: |
      副詞とは、動詞・形容詞・副詞・文全体に情報を加える（＝修飾する）言葉。
      時・場所・頻度・程度・様態などの情報を加える。
      ■ 副詞の修飾先:
        - 動詞を修飾: stop suddenly「突然止まる」
        - 動詞を修飾（句）: buy apples to bake a pie「パイを焼くためにリンゴを買う」
        - 形容詞を修飾: a very interesting book「とても面白い本」
        - 文全体を修飾: The game will probably be canceled.
        - 主節を修飾（節）: The game was canceled because it rained.
      ■ 副詞の形:
        - 形容詞に -ly を付けて副詞にする: quick → quickly, easy → easily
        - 形容詞と副詞が同形のもの: early, fast, enough, long
          例: a fast runner（形容詞）/ He runs fast.（副詞）
      ■ 副詞も2語以上の句や〈S + V〉を含む節の形をとることがある。

  - id: "nbk-005"
    name: "文の要素: 主語"
    category: "基本講義"
    priority: "P1"
    notes: |
      主語とは、文の中で「〜は[が]」に当たり、文の動作を行うまたは文の主題を示す語。
      記号: S（subject）
      ■ 主語になるのは名詞（代名詞）。
      ■ 英語では命令文を除いて基本的に主語は省略できない。
      ■ 形式主語 It:
        主語が (for 〜) to + 動詞 の場合、形式的に it を主語に置き、真主語を後ろに置く。
        例: It is dangerous for children to swim in the river.
      ■ 動名詞の主語:
        動詞を主語にする場合、動名詞にするのが一般的。
        例: Reading newspapers is my morning routine.
      ■ There is 構文:
        There is 〜. では「〜」に当たる部分が主語。
        例: There is a big supermarket near the school. → 主語は a big supermarket
      ■ 命令文には原則として主語がない。

  - id: "nbk-006"
    name: "文の要素: 動詞と文型"
    category: "基本講義"
    priority: "P1"
    notes: |
      動詞は文の中で「〜だ」「〜する」の述語に当たる。
      記号: V（verb）
      ■ 英語では原則として主語の後ろに述語動詞が来る。
      ■ 語順は動詞によって決定される。
      ■ 5文型:
        第1文型〈S + V〉: go, cry, fly, stand 等
        第2文型〈S + V + C〉: be動詞, become, seem, look 等
        第3文型〈S + V + O〉: have, want, say, know 等
        第4文型〈S + V + O + O〉: give, lend, show, tell 等
        第5文型〈S + V + O + C〉: call, keep, leave, make 等

  - id: "nbk-007"
    name: "文の要素: 目的語"
    category: "基本講義"
    priority: "P1"
    notes: |
      目的語とは、動作などの対象になる語。
      記号: O（object）
      ■ 目的語になるのは名詞。
      ■ 目的語の形態:
        - 名詞: four seasons（Japan has four seasons.）
        - 動名詞: singing songs（I like singing songs.）
        - to不定詞: to eat the cake（I want to eat the cake.）
        - that節: that you like her（I know that you like her.）
          接続詞 that で1つの文を名詞化する。that は省略可。
      ■ 間接目的語と直接目的語:
        第4文型〈S + V + O + O〉では2つの目的語を取る。
        例: The man asked me(O:間接) the way to the station(O:直接).
      ■ 形式目的語 it:
        〈S + V + O + C〉で目的語が to不定詞のとき、形式的に it を置き、真の目的語を後ろに置く。
        例: I found it hard to go there by myself.

understanding_goals:
  - node_id: "nbk-001"
    seq: 1
    goal: "名詞を他の品詞（動詞・形容詞・副詞）と区別して識別できる"
  - node_id: "nbk-001"
    seq: 2
    goal: "抽象名詞・固有名詞・代名詞の違いを説明できる"
  - node_id: "nbk-001"
    seq: 3
    goal: "可算名詞と不可算名詞を区別し、適切な冠詞と数の形を選べる"
  - node_id: "nbk-001"
    seq: 4
    goal: "不可算名詞の数え方（a piece of information 等）を説明できる"

  - node_id: "nbk-002"
    seq: 1
    goal: "動詞を他の品詞と区別して識別できる"
  - node_id: "nbk-002"
    seq: 2
    goal: "be動詞・become・remain・seem 等の状態動詞を動詞として認識できる"
  - node_id: "nbk-002"
    seq: 3
    goal: "動詞の4つの時制形式（過去・未来・進行形・完了）の作り方を説明できる"
  - node_id: "nbk-002"
    seq: 4
    goal: "規則動詞と不規則動詞の違いを説明できる"

  - node_id: "nbk-003"
    seq: 1
    goal: "形容詞を他の品詞と区別して識別できる"
  - node_id: "nbk-003"
    seq: 2
    goal: "形容詞の2つの働き（名詞修飾と状態表現）を説明できる"
  - node_id: "nbk-003"
    seq: 3
    goal: "形容詞の位置ルール（1語→前置、2語以上の句→後置）を適用できる"
  - node_id: "nbk-003"
    seq: 4
    goal: "SVC構造で補語になる形容詞を識別できる（be動詞・seem・look 等の後ろ）"

  - node_id: "nbk-004"
