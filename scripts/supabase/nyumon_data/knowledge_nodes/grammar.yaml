check_points:
  - node_id: "nbk-001"
    seq: 1
    question: "名詞とは何を表す言葉か？"
    answer: "人や動物やモノやコトを表す言葉。cat, desk, Kyoto, love などが名詞にあたる。"
  - node_id: "nbk-001"
    seq: 2
    question: "抽象名詞とは何か？ また固有名詞にはどのようなルールがあるか？"
    answer: "抽象名詞は形のない感情や概念を表す名詞（love, information 等）。固有名詞は地名や人の名前で、最初の1字を大文字にする。"
  - node_id: "nbk-001"
    seq: 3
    question: "可算名詞と不可算名詞の違いは何か？"
    answer: "可算名詞は数えられ、1つなら a[an]+単数形、2つ以上は複数形にする。不可算名詞は数えられず、複数形も冠詞 a もつかない。"
  - node_id: "nbk-001"
    seq: 4
    question: "information を数えるにはどうするか？"
    answer: "a piece of information のように助数表現を使う。information は不可算名詞であり、*informations や *an information とはできない。"

  - node_id: "nbk-002"
    seq: 1
    question: "動詞とは何を表す言葉か？"
    answer: "動き（動作）を表す言葉。日本語で言い切りの形がウ段で終わるもの。put, go, change などが動詞にあたる。"
  - node_id: "nbk-002"
    seq: 2
    question: "be動詞・become・remain・seem はなぜ動詞なのか？"
    answer: "これらは存在や状態を表す動詞（状態動詞）である。動作を表さなくても、述語として文の中で「〜だ」「〜になる」「〜のままである」を表す。"
  - node_id: "nbk-002"
    seq: 3
    question: "英語で未来を表すにはどうするか？"
    answer: "〈will + 動詞の原形〉の形にする。例: will walk, will write。"
  - node_id: "nbk-002"
    seq: 4
    question: "規則動詞と不規則動詞の違いは何か？"
    answer: "規則動詞は語尾に -ed を加えて過去形・過去分詞形を作る（walk→walked）。不規則動詞は不規則な変化をする（write→wrote→written）。"

  - node_id: "nbk-003"
    seq: 1
    question: "形容詞とは何か？ 2つの働きを述べよ。"
    answer: "名詞に情報を加える言葉。(1) 名詞を修飾する（cold water）、(2) 名詞の状態を表す（The house is big.）の2つの働きがある。"
  - node_id: "nbk-003"
    seq: 2
    question: "形容詞が名詞の前に来る場合と後ろに来る場合の違いは？"
    answer: "1語の形容詞は名詞の前（a running dog）。2語以上の句になると名詞の後ろ（a dog running in the park）。"
  - node_id: "nbk-003"
    seq: 3
    question: "a machine broken by the storm の broken by the storm はなぜ名詞の後ろにあるか？"
    answer: "2語以上の形容詞句は名詞の後ろに置く（後置修飾）ため。broken 1語なら a broken machine と前置できる。"
  - node_id: "nbk-003"
    seq: 4
    question: "They seemed happy. の happy は何か？"
    answer: "形容詞で、補語（C）の働き。seem の後ろに置かれ、主語 They の状態を表す。SVC構造。"

  - node_id: "nbk-004"
    seq: 1
    question: "副詞とは何か？ どのようなものを修飾するか？"
    answer: "動詞・形容詞・副詞・文全体に、時・場所・頻度・程度・様態などの情報を加える言葉。"
  - node_id: "nbk-004"
    seq: 2
    question: "形容詞から副詞を作る一般的な方法は？ また例外は？"
    answer: "形容詞に -ly を付ける（quick→quickly, easy→easily）。ただし形容詞と副詞が同形のものもある（fast, early, enough, long）。"
  - node_id: "nbk-004"
    seq: 3
    question: "fast が形容詞のときと副詞のときの違いは？"
    answer: "a fast runner の fast は名詞を修飾するので形容詞。He runs fast. の fast は動詞を修飾するので副詞。形は同じだが働きが異なる。"
  - node_id: "nbk-004"
    seq: 4
    question: "The game was canceled because it rained. の because it rained は何か？"
    answer: "副詞節。〈S + V〉を含む節の形をとった副詞で、主節 The game was canceled を修飾している。"

  - node_id: "nbk-005"
    seq: 1
    question: "主語とは何か？ 何が主語になれるか？"
    answer: "文の中で「〜は[が]」に当たり、文の動作を行うまたは主題を示す語。主語になるのは名詞（代名詞）。"
  - node_id: "nbk-005"
    seq: 2
    question: "It is dangerous for children to swim in the river. の主語は何か？"
    answer: "形式上の主語は It。真主語は for children to swim in the river。主語が長い場合に形式主語 it を置き、真主語を後ろに回す。"
  - node_id: "nbk-005"
    seq: 3
    question: "There is a big supermarket near the school. の主語は何か？"
    answer: "a big supermarket。There is 構文では、There は主語ではなく、is の後ろの名詞が主語。"
  - node_id: "nbk-005"
    seq: 4
    question: "英語で主語を省略できるのはどのような場合か？"
    answer: "命令文の場合のみ。それ以外は基本的に主語を省略できない（日本語と異なる点）。"

  - node_id: "nbk-006"
    seq: 1
    question: "英語の述語動詞は文のどこに来るか？"
    answer: "原則として主語の後ろに来る（日本語の「文末」とは異なる）。"
  - node_id: "nbk-006"
    seq: 2
    question: "第2文型〈S + V + C〉と第3文型〈S + V + O〉の違いは何か？"
    answer: "第2文型は S = C の関係（He looks happy → He = happy）。第3文型は V の動作の対象を O が示す（Japan has four seasons → Japan ≠ four seasons）。"
  - node_id: "nbk-006"
    seq: 3
    question: "第4文型と第5文型の違いは何か？"
    answer: "第4文型〈S+V+O+O〉は2つの目的語を取る（give me the book）。第5文型〈S+V+O+C〉は O = C の関係がある（call me John → me = John）。"
  - node_id: "nbk-006"
    seq: 4
    question: "第2文型を取る代表的な動詞を3つ挙げよ。"
    answer: "be動詞、become、seem（他に look, remain 等）。これらの後ろに来る語は補語 C。"

  - node_id: "nbk-007"
    seq: 1
    question: "目的語とは何か？"
    answer: "動作などの対象になる語。記号 O。目的語になるのは名詞。"
  - node_id: "nbk-007"
    seq: 2
    question: "動名詞・to不定詞・that節が目的語になる例をそれぞれ挙げよ。"
    answer: "動名詞: I like singing songs. / to不定詞: I want to eat the cake. / that節: I know that you like her."
  - node_id: "nbk-007"
    seq: 3
    question: "The man asked me the way to the station. の目的語は何か？"
    answer: "me（間接目的語）と the way to the station（直接目的語）の2つ。第4文型〈S+V+O+O〉。"
  - node_id: "nbk-007"
    seq: 4
    question: "I found it hard to go there by myself. の it は何か？"
    answer: "形式目的語。真の目的語は to go there by myself。〈S+V+O+C〉の目的語が to不定詞のとき、形式的に it を置き、真の目的語を後ろに回す。"

