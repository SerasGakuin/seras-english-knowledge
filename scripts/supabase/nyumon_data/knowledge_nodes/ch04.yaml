check_points:
  - node_id: "nst-001"
    seq: 1
    question: "describes the terrorists as 'them' and 'evil' and the victims as 'us' and 'good' の2つ目の and は何をつないでいるか？"
    answer: "the terrorists as 'them' and 'evil' と the victims as 'us' and 'good' をつないでいる。describes が共通部分として省略されている。「テロリストを『彼ら』『悪』と述べ、犠牲者を『私達』『善』と述べる」。"
  - node_id: "nst-001"
    seq: 2
    question: "X-rays allowed them to look into their patients, identify where there were problems, and cure them. の and は何をつないでいるか？"
    answer: "look, identify, cure の3つの原形動詞をつないでいる（A, B, and C の並列）。いずれも to 不定詞の中の動詞で、allow O to V の V にあたる。"
  - node_id: "nst-001"
    seq: 3
    question: "等位接続詞の接続先を判別する基本手法は何か？"
    answer: "and/or の後ろを見て、前方に同じ形（同じ品詞・同じ文法的役割）を探す。例: or finding → 前方の diagnosing（共にV-ing形）。文法的に等しいものをつなぐのが原則。"
  - node_id: "nst-001"
    seq: 4
    question: "brought new understandings and methods for diagnosis and treatment の2つの and はそれぞれ何をつないでいるか？"
    answer: "最初の and は understandings と methods をつなぐ（new は両方を修飾）。2つ目の and は diagnosis と treatment をつなぐ（for 以下は形容詞句で understandings and methods 全体を修飾）。"
  - node_id: "nst-001"
    seq: 5
    question: "she saw the poverty of her people and the hard lives of so many women who were fighting... の最初の and は何をつないでいるか？"
    answer: "the poverty of her people と the hard lives of so many women をつないでいる。共に saw の目的語。who 以下は so many women のみを修飾（her people の後にコンマがないため）。"
  - node_id: "nst-002"
    seq: 1
    question: "neither ~ nor が主語になったとき、動詞はどちらに合わせるか？"
    answer: "B（nor の後ろ）に合わせる。例: Neither you nor she has to go.（she に合わせて has）。一方、both A and B は複数扱いで are。"
  - node_id: "nst-002"
    seq: 2
    question: "本文の neither take up much space, eat much food, nor release much greenhouse gas の構造は？"
    answer: "〈neither A, B, nor C〉で3つの動詞句が並列。take up / eat / release の3つ。「あまり場所も取らないし、あまりエサも食べないし、またあまり温室効果ガスを出さない」。"
  - node_id: "nst-002"
    seq: 3
    question: "5つの相関語句を列挙し、それぞれの意味を述べよ。"
    answer: "both A and B「AもBも」、either A or B「AかBか」、neither A nor B「AもBもない」、not only A but (also) B「AだけでなくBも」、A rather than B「Bではなくむしろ A」。"
  - node_id: "nst-003"
    seq: 1
    question: "We may sit and stare ... but so long as we're still trying, we're likely to fail. の may はどのような用法か？"
    answer: "譲歩の may。推量「〜かもしれない」ではなく、あとに but が来ることで「〜するかもしれないが」と相手の反論を先に述べる譲歩表現。may を見たら but がないか探すことが大切。"
  - node_id: "nst-003"
    seq: 2
    question: "譲歩を示す目印として may 以外に何があるか？"
    answer: "It is true that S+V「SVは本当だ」、certainly「確かに」。いずれも後ろに but が来て本題（自分の主張）が続く。"
  - node_id: "nst-003"
    seq: 3
    question: "but so long as we're still trying, we're likely to fail. で so long as 節が but の直後に置かれている理由は？"
    answer: "従属接続詞節を後ろに置くと前の文にも影響する可能性があるため。〈but + 接続詞 + S'V', SV〉の語順にすることで so long as 節が we're likely to fail にのみかかることを明確にする。"
  - node_id: "nst-004"
    seq: 1
    question: "shocked the world when it defeated ... の when はどのような働きか？"
    answer: "従属接続詞。when 以下の文を副詞節にまとめ、主節（shocked the world）に「〜するときに」という時の情報を付加する。when 節は修飾語（M）。"
  - node_id: "nst-004"
    seq: 2
    question: "副詞節を作る従属接続詞を4つのカテゴリに分類せよ。"
    answer: "時: when/as/while/until/since。理由: because/since/as。条件: if/unless。譲歩: though/although。"
  - node_id: "nst-004"
    seq: 3
    question: "接続詞 as が文脈によって持つ3つの意味は何か？"
    answer: "(1) 様態「〜のように」、(2) 時「〜しながら」、(3) 理由「〜なので」。基本の意味は「だいたい等しい」。文脈から判断する。"
  - node_id: "nst-005"
    seq: 1
    question: "Although we know that the earth revolves around the sun, we cannot recite ... の Although はどのような意味か？"
    answer: "譲歩の接続詞で「〜だけれども」の意味。〈Although S'V', SV〉で「S'V'だけれど SV」。though と同じ意味。地球が太陽の周りを回っていることを知っているけれども、という譲歩。"
  - node_id: "nst-005"
    seq: 2
    question: "even if と even though の違いは何か？"
    answer: "even if は「仮定」を示す（例: even if he leaves = 仮に彼が抜けても）。even though は「現実」を示す（例: even though he left = 実際に彼が抜けたが）。"
  - node_id: "nst-005"
    seq: 3
    question: "譲歩を表す接続詞を5つ以上挙げよ。"
    answer: "although[though]、even if、even though、while、whereas、whether〜or...、no matter＋疑問詞（how/what/when/where/who/which）。"
  - node_id: "nst-006"
    seq: 1
    question: "While robots have been utilized ... の While は3つの意味のうちどれか？"
    answer: "譲歩「〜だが」。While節「ロボットが何十年も使われてきた」と主節「先進国の多くが用意できていない」が相反する内容なので、(3)譲歩の意味。"
  - node_id: "nst-006"
    seq: 2
    question: "while が「〜だが」（譲歩）を表すかどうかをどうやって判断するか？"
    answer: "While 節と主節の内容を比較する。相反する内容であれば譲歩。単に同時進行なら「時」、対照的な2つの事実を並べるなら「対比」。文脈から判断する。"
  - node_id: "nst-006"
    seq: 3
    question: "while の3つの意味を列挙し、それぞれ例を示せ。"
    answer: "(1)時「〜する間に」: While I was sleeping, the phone rang. (2)対比「〜の一方で」: While he likes coffee, she prefers tea. (3)譲歩「〜だが」: While robots have been utilized..., experts predict... は相反する内容で譲歩。"
  - node_id: "nst-007"
    seq: 1
    question: "whether の2つの働きとそれぞれの意味は？"
    answer: "(1)名詞節を作る:「AかBかということ」。例: I do not know whether he will come or not. (2)副詞節を作る:「AであってもBであっても」。例: Whether you like it or not, you have to go."
  - node_id: "nst-007"
    seq: 2
    question: "the answer depends on whether you are focused on your mood or on changing your behavior の whether 節はどちらの用法か？"
    answer: "名詞節。depend on の on の後ろに置かれているので、前置詞の目的語になる名詞節。「自分の気分に重きを置いているのか、自分の行動を変えることに重きを置いているのかということ」。"
  - node_id: "nst-007"
    seq: 3
    question: "whether を if に置き換えられない場合はどのような場合か？"
    answer: "副詞節の whether（「〜であっても」の意味）は if では置き換えられない。名詞節の「〜かどうか」の意味では if でも置き換え可能。"

  - node_id: "nst-008"
    seq: 1
    question: "thatの直後が完全な文（主語・動詞が揃っている）の場合、thatは何か？"
    answer: "接続詞（名詞節を作る）または関係副詞。不完全な文（主語or目的語の欠落）なら関係代名詞。"
  - node_id: "nst-008"
    seq: 2
    question: "接続詞thatの作る名詞節の4つの働きは何か？"
    answer: "①動詞の目的語（say/think/believe等の後）、②補語、③主語（形式主語Itの真主語）、④名詞と同格。目的語の場合thatはしばしば省略される。"
  - node_id: "nst-008"
    seq: 3
    question: "believe that willpower is a limited resource のthatの働きは何か？どう判断するか？"
    answer: "接続詞。that以下が完全な文（willpowerが主語、isが動詞、a limited resourceが補語）なので関係代名詞ではない。believeの目的語を作る名詞節の接続詞。"
  - node_id: "nst-008"
    seq: 4
    question: "the main reason that some of us fail to achieve our goals のthatは関係代名詞か関係副詞か？"
    answer: "関係副詞。that以下が完全な文（some of usが主語、failが動詞、our goalsが目的語）なので関係代名詞ではない。reasonの後のthatで完全な文なら関係副詞。"
  - node_id: "nst-009"
    seq: 1
    question: "Chopik says he isn't suggesting we ignore our families のsaysとsuggestingの後で省略されているものは何か？"
    answer: "いずれも接続詞that。says (that) he isn't suggesting (that) we ignore...。目的語になるthat節のthatはしばしば省略される。"
  - node_id: "nst-009"
    seq: 2
    question: "suggestが「提案する」の意味で使われる場合、that節内の動詞はどうなるか？"
    answer: "(should)＋原形不定詞で表す。要求・提案・命令を表す動詞（demand/suggest/insist等）の目的語のthat節内に適用されるルール。"
  - node_id: "nst-009"
    seq: 3
    question: "not A but B構造でbutの後のthatが省略されなかった理由は何か？"
    answer: "複数のthat節があるため、saysの目的語であることを明確に示すために省略されなかった。thatの有無で文構造の明確さが変わる。"
  - node_id: "nst-010"
    seq: 1
    question: "fears that some jobs will be lost のthatの働きは何か？どう判断するか？"
    answer: "同格の接続詞。that以下が完全な文（some jobsが主語、will be lostが動詞）なので関係代名詞ではない。名詞fearsの内容をthat節で具体的に説明する同格関係。「職業が失われるという恐怖」。"
  - node_id: "nst-010"
    seq: 2
    question: "同格のthatを取る名詞にはどのようなものがあるか？"
    answer: "fact, truth, rumor, news, claim, idea, thought, belief, demand, feeling, anxiety, fear, hope など。多くが「考え・主張・事実」の類い。"
  - node_id: "nst-010"
    seq: 3
    question: "名詞の後のthatが関係代名詞か同格の接続詞かをどう判別するか？"
    answer: "that節内が完全な文（主語・目的語の欠けなし）なら同格の接続詞、不完全な文（主語or目的語が欠けている）なら関係代名詞。"
  - node_id: "nst-010"
    seq: 4
    question: "be afraid that S+V の構造はどう成り立っているか？"
    answer: "本来 be afraid of＋名詞 の形だが、that節を従える場合にofが脱落し、be afraid that S+V となる。「…ではないかと恐れている」の意味。be sure that も同様にofが脱落。"

