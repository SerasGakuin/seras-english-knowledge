knowledge_nodes:
  - id: "nst-001"
    name: "等位接続詞の接続先判別"
    category: "接続詞"
    priority: "P1"
    notes: |
      Point分類: ❹〔接続詞〕（問32）❶❹❺〔接続詞〕（問33）❶❷❹〔接続詞〕（問34）
      ■ 等位接続詞の基本特徴:
        and: AとB / AそしてB
        but: AだがB
        or: AかそれともBか
        ① 語・句・節をつなぐ。文法的に等しいものをつなぐ（ただし必ずしも同じ形とは限らない）。
        ② 3つ以上のものをつなぐときは A, B, and C の形（コンマ＋最後にand/or）。
      ■ 接続先の判別法: and/or の後ろを見て、前方に同じ形を探す。
        例: or finding → 前方の diagnosing（共にV-ing形）
        例: and cure → 前方の look, identify（共に原形動詞）
      ■ 共通部分の省略: 英語では似た文構造が続く場合、共通部分を省略する傾向がある。
        例: describes [the terrorists as 'them' and 'evil'] and [the victims as 'us' and 'good']
        → describes が共通なので2つ目が省略。
      ■ 前置詞句の and: against〜 and against〜 のように前置詞句同士が and でつながる。
        前方の against と同じ形を探すことで接続先を特定する。
      ■ 修飾語の作用範囲: new understandings and methods → new は両方を修飾。
        for diagnosis and treatment → for 以下は understandings and methods 全体を修飾する形容詞句。
      ❶（問32）media reaction: 〈名詞＋名詞〉で前の名詞が後ろを形容詞的に修飾。
        日本語の「幼児教育」と同じ構造。
      ❷（問32）describe O as C =「OをCと述べる」。as は前置詞「〜として」。
        regard O as C =「OをCと認識する」も同構造。
      ❸（問32）引用符 ' ' / " ": 他の人の発言を引用、または特別な意味を込める場合に使う。
        the terrorists の the: 読み手にも想像できると筆者が考えているための the。
        them/us: 二項対立。英語で we と言った場合、背後に they が隠れている。
      ❷（問33）so many women: so は「あれほど」の意味の副詞。「とても」ではない。
        so〜that構文:「あまりにも〜なので…」。目的の so that「〜するように」と区別。
      ❸（問33）who の先行詞判定: 〈A and B＋修飾語〉は通常 A と B 両方を修飾。
        ただし固有名詞・one's＋名詞・this＋名詞が先行詞の場合はコンマ付きが原則。
        本文: her people の後にコンマなし → who の先行詞は so many women のみ。
      ❸（問34）where: 間接疑問「どこに問題があるか」、または関係副詞「問題があるところ」。
        identify の目的語になる名詞のかたまり。

  - id: "nst-002"
    name: "相関語句"
    category: "接続詞"
    priority: "P1"
    notes: |
      Point分類: ❷〔接続詞〕（問35）
      ■ 相関語句（相関接続詞）: 副詞のような働きをする。
        - both A and B:「AもBも」。動詞は複数主語に合わせる。
        - either A or B:「AかBか」。
        - neither A nor B:「AもBもない」。動詞はBに合わせる。
        - not only A but (also) B:「AだけでなくBも」（both A and B に近い）。
        - A rather than B:「Bではなくむしろ A」。動詞はAに合わせる。
      ■ 3つ以上の並列: 〈neither A, B, nor C〉「AでもBでもCでもない」の形もある。
        本文: neither take up much space, eat much food, nor release much greenhouse gas
        → 3つの動詞句（take up / eat / release）が並列。
      ■ 主語になったときの注意:
        Both you and he are ...（複数に合わせる）
        Neither you nor she has ...（Bに合わせる）
      ❶（問35）Raising insects: 動名詞が主語。can は「〜な可能性がある」。
      ❸（問35）making ... の分詞構文: 文末に置かれた分詞構文の意味上の主語は
        (1) 前の文の主語、または (2) 前の文全体か一部。
        本文: (2)の「前の文全体が主語」。making them an ideal alternative food
        =「そのことによってそれらは理想的な代替食になる」。
      ❹（問35）benefits of using: 同格関係を示す of。「〜という」と訳す。
        use O as C =「OをCとして利用する」。
        The evidence の the: 今まで述べてきた内容を受ける the。

  - id: "nst-003"
    name: "譲歩のmay...but"
    category: "接続詞"
    priority: "P1"
    notes: |
      Point分類: ❶〔助動詞〕〔接続詞〕（問36）
      ■ may の譲歩用法:
        may は「〜かもしれない」（推量）だけでなく「譲歩」を示すことがある。
        英文法の「譲歩」: 自分の主張を有利に進めるために、あらかじめ相手が
        言いそうな反論を先に述べてしまうこと。
        may を見たら「あとに but がないかな？」と思うことが大切。
      ■ 譲歩を示す他の目印:
        - It is true that S+V「SVは本当だ」
        - certainly「確かに」
      ■ but + 従属接続詞の語順:
        but の直後に従属接続詞節（so long as ~）が挿入される。
        理由: 従属接続詞節を後ろに置くと、前の文にも影響する可能性があるため。
        〈and/but + 接続詞 + S'V', SV〉の形が適切。
      ■ so long as 〜 =「〜な限りは」。3語で1つの接続詞。
      ❷（問36）trying to figure something out: 分詞構文。「…しながら」の意味。
        文尾の (V)ing は副詞の働き。while (V)ing の while が省略された形とも考えられる。
        while (V)ing の場合、(V)ing が中心的な動作であることを明確に示す。
      ❸（問36）so long as の位置: but の直後に挿入。
        参考書内参照: →問62はこの続きの英文。

  - id: "nst-004"
    name: "従属接続詞（副詞節）"
    category: "接続詞"
    priority: "P1"
    notes: |
      Point分類: ❸〔接続詞〕（問37）
      ■ 従属接続詞: 後ろの文を副詞節にまとめる働き。主節に付加する。
        名詞節を作るもの（that, whether, if）と副詞節を作るものがある。
      ■ 副詞節を作る主な従属接続詞:
        時: when / as「〜するときに」、while「〜する間に」、until[till]「〜するまで」、since「〜して以降」
        理由: because / since / as「なぜなら〜」
        条件: if「もし〜なら」、unless「〜の場合を除いて」
        譲歩: though[although]「〜だけれども」
      ■ as の3つの意味（文脈で判断）:
        (1) 様態「〜のように」
        (2) 時「〜しながら」
        (3) 理由「〜なので」
        基本の意味は「だいたい等しい」。
      ■ while: 文脈によって譲歩や対比の意味にもなる。
      ❶（問37）the AI-based computer program AlphaGo:
        the AI-based computer program と AlphaGo を並べて書く同格表現。全体で1つの名詞（主語）。
      ❷（問37）developed by DeepMind: 過去分詞。by があるので受動の意味。
        主語の直後にコンマで挟まれた現在分詞・過去分詞は分詞構文の扱い。
        shocked が本文の中心の動詞。shock は他動詞「〜に衝撃を与える」。
      ❹（問37）that requires deep insight: 主格の関係代名詞。
        先行詞は the ancient board game（＝碁）。
        〈the＋名詞＋関係代名詞節〉で「〜の唯一の…」の意味になることがある。

