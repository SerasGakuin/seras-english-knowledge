  - node_id: "nsv-009"
    seq: 3
    goal: "長い主語内の過去分詞を形容詞と認識し、名詞修飾と判断できる"
  - node_id: "nsv-009"
    seq: 4
    goal: "形式主語構文 it seems/is ... that ... の構造を理解し、真の主語を特定できる"

check_points:
  - node_id: "nsv-001"
    seq: 1
    question: "文頭に〈前置詞＋名詞〉がある場合、その名詞は主語になるか？"
    answer: "ならない。文頭の〈前置詞＋名詞〉は副詞句であり、主語はその後に来る。"
  - node_id: "nsv-001"
    seq: 2
    question: "前置詞で始まる文で主語を見つけるにはどうするか？"
    answer: "前置詞句の後のコンマ直後にあるものが主語。また動詞を見つけてそこから逆算する方法もある。"
  - node_id: "nsv-001"
    seq: 3
    question: "「前置詞のついた名詞は主語にならない」の例外を挙げよ。"
    answer: "a lot of + 名詞、a kind of + 名詞、a large number of + 名詞 など。これらは全体で1つの形容詞として扱い、後ろの名詞が主語になる。"
  - node_id: "nsv-001"
    seq: 4
    question: "主語を特定するための「両輪」とは何か？"
    answer: "形の上のルール（前置詞の有無等で排除する）と、意味として通るかどうか（動詞との整合性）の両方で判断すること。"
  - node_id: "nsv-002"
    seq: 1
    question: "受動態が使われる理由を2つ挙げよ。"
    answer: "(1) 行為者が不明、または示す必要がない・示せないとき。(2) 情報の流れを「既知→未知」にするとき。"
  - node_id: "nsv-002"
    seq: 2
    question: "My purse was stolen. はなぜ受動態が使われているか？"
    answer: "行為者（盗んだ人）が不明であるため。能動態では主語（行為者）を示す必要があるが、この場合は示せない。"
  - node_id: "nsv-002"
    seq: 3
    question: "These games were attended by thousands of spectators. がなぜ受動態なのか？"
    answer: "These games（既知の情報）を先に出し、thousands of spectators（新しい情報）を後に置くことで、「既知→未知」の情報の流れを作るため。"
  - node_id: "nsv-002"
    seq: 4
    question: "英語の情報の流れの原則とは何か？"
    answer: "「既知のこと」を先に出し、「未知のこと・新しい情報」をその後ろに置く原則。受動態はこの情報の流れを実現する手段の一つ。"
  - node_id: "nsv-003"
    seq: 1
    question: "〈report A as B〉を受動態にするとどうなるか？"
    answer: "〈A be reported as B〉となる。「AはBと報告される」の意味。"
  - node_id: "nsv-003"
    seq: 2
    question: "Most of the friendships were reported as being supportive. の as being は何か？"
    answer: "as は前置詞で「～として」の意味。being は be supportive を動名詞化したもの（as は前置詞なので後ろに名詞形が必要）。"
  - node_id: "nsv-003"
    seq: 3
    question: "as + 名詞の原則的な訳し方と、その例外は何か？"
    answer: "原則「～として」と訳す。例外: as a child / a boy / a girl は「子どもの頃に / 少年の頃に / 少女の頃に」と訳す。"
  - node_id: "nsv-004"
    seq: 1
    question: "〈find O to V〉を受動態にするとどうなるか？ またその意味は？"
    answer: "〈O be found to V〉となる。「OはVだとわかる」の意味。"
  - node_id: "nsv-004"
    seq: 2
    question: "be allowed to V / be told to V / be asked to V の意味をそれぞれ述べよ。"
    answer: "be allowed to V「Vすることを許される」、be told to V「Vするように言われる」、be asked to V「Vするように頼まれる」。"
  - node_id: "nsv-004"
    seq: 3
    question: "〈S is said to V〉を It を主語にして書き換えるとどうなるか？"
    answer: "〈It is said that S + V〉となる。日本語にすると「SはVと言われている」で同じ意味。"
  - node_id: "nsv-004"
    seq: 4
    question: "Forming a reading habit in childhood is said to be associated with later reading proficiency. の is said to be associated の構造を説明せよ。"
    answer: "〈S is said to V〉の形で、V の部分が be associated with（～と関連がある）。「～と関連があると言われている」の意味。It is said that forming ... is associated with ... と書き換えられる。"
  - node_id: "nsv-004"
    seq: 5
    question: "〈S is said to V〉と〈It is said that S + V〉のうち、日本語に訳したとき差が出るか？"
    answer: "差は出ない。どちらも「SはVと言われている」と同じ訳になる。"
  - node_id: "nsv-005"
    seq: 1
    question: "〈catch O V-ing〉はどういう意味か？ また受動態にするとどうなるか？"
    answer: "「OがVしているところを見つける」。受動態は〈O is caught V-ing〉で「OはVしているところを見つかる」。"
  - node_id: "nsv-005"
    seq: 2
    question: "〈help O V〉と〈help O to V〉の違いは何か？"
    answer: "意味は同じで「OがVするのを助ける」。現代英語ではtoは通例省略される。"
  - node_id: "nsv-005"
    seq: 3
    question: "知覚動詞see/hearの後に来る〈O + V-ing〉と〈O + V-pp〉の違いは？"
    answer: "V-ingは「OがVしている」（能動・進行）、V-ppは「OがVされる」（受動）を表す。"
  - node_id: "nsv-005"
    seq: 4
    question: "使役動詞make/let/haveの後に来る形と各動詞の意味の違いは？"
    answer: "いずれも〈O + V（原形）〉。makeは「（強制的に）させる」、letは「するのを許す」、haveは「してもらう」。"
  - node_id: "nsv-006"
    seq: 1
    question: "文中の-ed形が過去形なのか過去分詞形なのかを見極める方法は？"
    answer: "(1) 他動詞の場合、目的語があれば過去形、なければ過去分詞の可能性。(2) 過去形と解釈して文意が通るか確認。(3) 同じ文にすでに中心の動詞があれば過去分詞。"
  - node_id: "nsv-006"
    seq: 2
    question: "considered C の形が文中に出現したとき、過去形ではなく分詞だと判断する根拠は？"
    answer: "considered を過去形とすると主語が「～を考えた」となり文意が通らない。また後ろに別の中心の動詞（can be found等）があるため、considered は分詞構文（being considered の being が省略）。"
  - node_id: "nsv-006"
    seq: 3
    question: "2語以上の形容詞句（分詞句含む）は名詞のどこに置かれるか？"
    answer: "名詞の後ろ（後置修飾）。例: aircraft flown by female pilots「女性パイロットによって操縦された航空機」。1語なら前置も可（例: hidden meaning）。"
  - node_id: "nsv-006"
    seq: 4
    question: "conducted と showed が同じ文にある場合、どちらが文の中心の動詞か判定する方法は？"
    answer: "conducted は他動詞だが目的語がないため過去分詞形。showed が中心の動詞。conducted は a previous analysis を修飾する過去分詞（形容詞句）。"
  - node_id: "nsv-007"
    seq: 1
    question: "when writing an article の省略を復元するとどうなるか？"
    answer: "when (he was) writing an article. 接続詞 when の後の主語（主節の主語と同一）と be動詞が省略されている。"
  - node_id: "nsv-007"
    seq: 2
    question: "〈when S + be + V-ing〉の〈S + be動詞〉が省略される条件は？"
    answer: "従属節の主語が主節の主語と同じ場合。while, if などでも同様の省略が起こる。"
  - node_id: "nsv-007"
    seq: 3
    question: "an article summarizing his theory の summarizing は何か？"
    answer: "summarize の現在分詞形で、直前の名詞 an article を修飾する形容詞の働き。「彼の理論を要約した論文」の意味。"
  - node_id: "nsv-008"
    seq: 1
    question: "According to a report published ... University, の部分は文のどの要素か？ また文の主語はどこか？"
    answer: "文全体を修飾する副詞句。主語はコンマの後の researchers。"
  - node_id: "nsv-008"
    seq: 2
    question: "published jointly in December 2015 by ... が過去分詞だと判定する根拠は？"
    answer: "a report には前置詞 according to がついているため主語ではない。published を過去形とすると目的語がない。よって過去分詞で a report を修飾する形容詞句。"
  - node_id: "nsv-008"
    seq: 3
    question: "predicted that advanced robots and AI would replace ... の would は何を表すか？"
    answer: "時制の一致。predicted が過去形であるため will → would に変化した。未来の予測内容を過去時制の中で表している。"
  - node_id: "nsv-009"
    seq: 1
    question: "The history of the development of numbers の主語はどの語か？"
    answer: "The history. of the development of numbers は形容詞句で history を修飾。前置詞のついた名詞（development, numbers）は主語にならない。"
  - node_id: "nsv-009"
    seq: 2
    question: "researchers into clay tokens の into clay tokens は何を修飾するか？ work ではない理由は？"
    answer: "researchers を修飾。work into ～ という形は使わないが、research/researchers into ～ は使われるため。"
  - node_id: "nsv-009"
    seq: 3
    question: "found all over the Middle East の found は過去形か過去分詞形か？ その判定根拠は？"
    answer: "過去分詞形。過去形なら目的語が必要だが、直後は副詞句 all over the Middle East なので目的語がない。直前の clay tokens を修飾する形容詞の働き。"
  - node_id: "nsv-009"
    seq: 4
    question: "it now seems probable that mathematics was invented ... の it は何を指すか？"
    answer: "形式主語（仮主語）。that 以下（mathematics was invented before writing itself）が真の主語。主語が長くなるのを避けるため it を仮の主語として置いている。"

