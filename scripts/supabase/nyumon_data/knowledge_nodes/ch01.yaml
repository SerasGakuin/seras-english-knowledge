knowledge_nodes:
  - id: "nsv-001"
    name: "前置詞句による主語の識別"
    category: "主語と動詞の把握"
    priority: "P1"
    notes: |
      Point分類: 〔副詞〕〔前置詞〕
      ■ 文頭の〈前置詞＋名詞〉は副詞句または形容詞句の働きをする。主語にはならない。
      ■ 前置詞のついた名詞は主語にはならない。
        例外: a lot of + 名詞、a kind of + 名詞、a large number of + 名詞 など。
        これらは全体で1つの形容詞として扱う。
      ■ 前置詞で始まる文は、たいてい後ろにコンマがある。そのコンマ直後にあるものが主語。
      ■ 主語を探す2つの方法:
        (1) 前置詞の有無による排除（形のルール）
        (2) 動詞の位置からの逆算（意味のルール）
        形と意味の「両輪」で判断すること。
      ❷ 形容詞の並列コンマ: 〈形容詞＋形容詞＋名詞〉は通常コンマなし。
        例: traditional Japanese buildings「伝統的な日本の建築物」（コンマなし）
        ただし2つの形容詞が似た意味の場合はコンマが打たれる。
        例: accurate, reliable information「正確で信頼できる情報」
        「似たような意味かどうか」は筆者が判断する。
        本文では disposable と packaged が「捨てることができる」点で共通と判断された。
      ❹ with の意味判別: 基本は「～と共に」だが、文脈により「～につれて」
        「～が増えると共に」等になる。前半と後半の関係から意味を判断する。

  - id: "nsv-002"
    name: "受動態の使用理由"
    category: "主語と動詞の把握"
    priority: "P1"
    notes: |
      Point分類: 〔態〕
      ■ 受動態が使われる場面:
        (1) 行為者が不明、または示す必要がない・示せないとき
          例: My purse was stolen.（行為者不明）
          例: Most of the reservations were canceled.（行為者を示す必要なし）
        (2) 情報の流れを「既知→未知」にするとき
          英語は「既知のこと（聞き手が既に知っている情報）」→「未知のこと（新しい情報）」
          の順にするのが原則。受動態にすることでこの情報の流れを作れる。
          例: These games were attended by thousands of spectators.
          （These games は既知、観戦者数が新情報）
      ❶ for example の挿入: 文中に挿入された副詞。日本語では文頭に置いて訳す。
      ❷ more than ~: 「~を超える」の意。than は等号(=)を含まないので、
        more than 100 は「100以上」ではなく「100を超える」。
      ❸ 主語直後のコンマなし〈前置詞＋名詞〉は形容詞の働き:
        例: A man from Japan visited me.（from Japan が形容詞として man を修飾）
        ※文頭の〈前置詞＋名詞〉は副詞句（→nsv-001参照）
      ❺ and がつなぐものの探し方:
        and の直後にあるものに注目し、それと同じ形を and の前方に探す。
        例: attended ... and watched → 過去分詞同士がつながっている

  - id: "nsv-003"
    name: "受動態 + as 補語"
    category: "主語と動詞の把握"
    priority: "P1"
    notes: |
      Point分類: 〔態〕
      ■ 〈report A as B〉→ 受動態〈A be reported as B〉:
        「AをBと報告する」→「AはBと報告される」
        as の後ろに名詞がある場合は原則「～として」と訳す。
        例外: as a child / a boy / a girl 「子どもの頃に / 少年の頃に / 少女の頃に」
      ■ as の後ろには名詞だけでなく形容詞も来ることがある:
        本文では being supportive（be supportive を動名詞化したもの）。
        as は前置詞なので後ろに名詞形が必要。
      ❶ Most of ~ の主語と動詞の一致:
        Most of ~ が主語の場合、動詞の形は of の後の名詞が単数か複数かで決まる。
        例: Most of the friendships → were（複数）
        前置詞のついた名詞(the friendships)は主語にならない。most が主語。
      ❸ 抽象→具体の読み方:
        英文は抽象的なことを先に述べ、具体的に説明する流れが多い。
        第1文がわからなくても先に進めば後でわかることが多い。
      ❹ however は副詞:
        接続詞ではなく副詞。主語の直後に挿入されることがある。
        同様の副詞: for example, moreover, therefore
        日本語では訳語を文頭に置く。
      ❻ 集合名詞:
        family は集合名詞。1つのまとまり→単数形 / 1人1人の集まり→複数形。
        同様: class, committee, public
      ❼ little + 不可算名詞 = 「ほとんどない」:
        little は数えられる名詞では「小さい」、数えられない名詞では「ほとんどない」。
        influence は不可算名詞 → little influence「ほとんど影響がない」

  - id: "nsv-004"
    name: "受動態 + to不定詞"
    category: "主語と動詞の把握"
    priority: "P1"
    notes: |
      Point分類: 〔態〕
      ■ 〈be + 過去分詞 + to V〉のパターン:
        能動態〈V O to V〉の受動態。代表的な動詞と意味:
        (1) 許可・依頼・命令系:
          be allowed to V「Vすることを許される」
          be asked to V「Vするように頼まれる」
          be told to V「Vするように言われる」
        (2) 認識・判断系:
          be found to V「Vだとわかる」
          be considered to V「Vと考えられる」
          be believed to V「Vと信じられている」
          be expected to V「Vと予想される」
          be known to V「Vと知られている」
      ■ 〈S is said to V〉=〈It is said that S + V〉の書き換え:
        | it を主語にした文               | S を主語にした受動態        | 意味                       |
        | It is said that S + V           | S is said to V              | SはVと言われている         |
        | It is thought that S + V        | S is thought to V           | SはVと考えられている       |
        | It is believed that S + V       | S is believed to V          | SはVと信じられている       |
        日本語にするとどちらも同じ訳になることに注意。
      ❶ I think (that) students: think の後ろに接続詞 that が省略されている。
        think の後に名詞を直接置く場合は think about/of ~ の形が必要。
        I think students で切ると should reduce の主語が不足 → that 省略と判断。
      ❷ and がつなぐもの: should reduce と should read の並列。
        [図表: 樹形図 — and がつなぐ should reduce と should read の並列関係を示す（p.34）]
      ❸ Forming a reading habit: form に -ing がつき動名詞として全体を名詞化。
        動名詞句全体が is said の主語。
        reading habit は〈名詞+名詞〉の形で、前の名詞が後ろの名詞を形容詞的に修飾。
      ❺ later =「（もっと）あとの」: 子ども時代を過ぎた成長後を指す。
        reading proficiency も〈名詞+名詞〉の形。「読む力」の意味。

  - id: "nsv-005"
    name: "SVOC構文のCが動詞形"
    category: "主語と動詞の把握"
    priority: "P1"
    notes: |
      Point分類: ❸〔動詞〕❹〔動詞〕
      ■ 〈catch O V-ing〉: 「OがVしているところを見つける」。
        受動態: 〈O is caught V-ing〉「OはVしているところを見つかる」
      ■ 〈help O (to) V〉: 「OがVするのを助ける」。
        現代英語ではtoは通例省略される。
      ■ 後ろに〈O + V形〉を置く動詞一覧:
        知覚動詞 see/hear + O + V/V-ing/V-pp「OがVする[している/される]のを見る/聞く」
        使役動詞 make/let/have + O + V「OにVさせる[するのを許す/してもらう]」
        keep + O + V-ing「Oを～（の状態）にしておく」
      ❶ 文頭の〈前置詞＋名詞〉は副詞句（→nsv-001参照）。
        本文では In 1844 が副詞句。
      ❷ A named[called] B「Bという名のA」:
        過去分詞形 named が直前の名詞を修飾する形容詞的用法。
      ❺ 英語の住所表記は狭い所→広い所の順。
        例: Pensacola, Florida（日本語とは逆順）。
        州名は略号も使われる（例: Pensacola, FL）。

  - id: "nsv-006"
    name: "分詞と動詞の区別"
    category: "主語と動詞の把握"
    priority: "P1"
    notes: |
      Point分類: Ny_06❷〔分詞〕、Ny_07❷〔分詞〕、Ny_07❹〔分詞〕
      ■ -ed形の見極め方法:
        (1) 他動詞の場合: 目的語があれば過去形、なければ過去分詞の可能性
        (2) 文意の整合性: 過去形と解釈して意味が通るか確認
        (3) 同じ文にすでに中心の動詞があれば、-edは過去分詞
      ■ 〈considered C〉: 「Cだと考えられている/みなされている」。
        分詞構文（being省略）として副詞句。
        前の名詞を修飾する形容詞句とする見方も可能。
      ■ 2語以上から成る形容詞句（分詞句含む）は普通、名詞の後ろにつける（後置修飾）。
        例: hidden meaning（1語→前置修飾）
        　　the moon hidden by clouds（2語以上→後置修飾）
        　　aircraft flown by female pilots（2語以上→後置修飾）
      ■ conducted vs showed の判定例:
        conducted は他動詞だが目的語がない→過去分詞形。
        analysis を修飾する形容詞句。showed が文の中心の動詞。
      Ny_06❶ like = 前置詞「～のような」:
        動詞「好き」と紛らわしいが、動詞とすると文意が通らない→前置詞と判断。
        形容詞句として直前の名詞を修飾。
      Ny_06❸ quite ordinary in the West は considered の補語部分。
      Ny_06❹ but の接続範囲:
        but は文と文だけでなく、語・句・節もつなぐ。
        本文では quite ordinary ... と not a part of ... をつないでいる。
        [図表: 樹形図 — considered の補語における but の接続構造（p.39）]
      Ny_06❺ can be found が文の中心の動詞。
      Ny_07❶ may は弱い推量「～かもしれない」:
        英文中のmayは通常「かもしれない」。許可のmayは定型表現以外では稀。
        may ... but は「～かもしれないが、実は……」の頻出パターン。
      Ny_07❸ 受動態の理由: 「既知→未知」の情報の流れ（→nsv-002参照）。
        their concerns（既知）→ are not supported by data（新情報）。
      Ny_07❺ no + 名詞の否定:
        英語では否定語が名詞につくことがある。
        no = not any と分解すると「どんな～もない」と訳せる。

  - id: "nsv-007"
    name: "接続詞節の主語と動詞の省略"
    category: "主語と動詞の把握"
    priority: "P1"
    notes: |
      Point分類: ❹〔接続詞〕
      ■ 〈when/while/if + S + be動詞 + V-ing〉の場合、〈S + be動詞〉が省略されることがある。
        条件: 従属節の主語が主節の主語と同じ場合。
        例: when (he was) writing → when writing
      ■ summarizing his theory:
        summarize の現在分詞形が直前の名詞 an article を修飾する形容詞の働き。
        「彼の理論を要約した（論文）」。
      ❶ what は関係代名詞「～こと」:
        what we know about gravity = 「重力に関して私達が知っていること」。
        what節全体が前置詞 with の目的語。→第3章で詳しく解説。
      ❷ how は疑問副詞/関係副詞:
        how things fall = 「どのようにして物が落ちるのか」「物の落下の仕方」。
        how節全体が前置詞 with の目的語（名詞のかたまり）。
      ❸ 文を指す代名詞 this/that:
        普通「もの・事柄」を指す代名詞は it だが、文全体の内容を指す場合は this/that。
        ただし it が if/when 節の内容を指す場合は it でもOK。

  - id: "nsv-008"
    name: "文頭の長い副詞句と主語の識別"
    category: "主語と動詞の把握"
    priority: "P1"
    notes: |
      Point分類: ❶〔分詞〕
      ■ 文頭に長い〈前置詞＋名詞＋分詞句〉がある場合、全体が副詞句。
        主語はその後（通常コンマの後）に来る。
      ■ according to ～ の to ～ には「調査結果」「研究の結果」「天気予報」等が置かれる。
        自分の主張を有利に進めるために資料を持ち出すときに使う。
      ■ published は過去分詞: a report に前置詞 according to がついているため主語ではない。
        published を過去形とすると目的語がない → 過去分詞形。
        published ... University 全体で a report を修飾する形容詞句。
      ❷ 接続詞 that（文を名詞化する働き）:
        predict の目的語として、that 以降の文全体を1つの名詞にする。
        that advanced robots を「その進化したロボット」と読むのは不可（those なら可）。
      ❸ 時制の一致: predicted が過去形 → will → would に変化。
        内容は未来の予測だが、語り手の視点が過去なので would を使う。
      ❹ within 10 to 20 years: 前置詞+名詞=副詞句。
        〈from A to B〉の from が名詞の前では省略されることがある。
        例: a nine to five job「9時から5時までの仕事」

  - id: "nsv-009"
    name: "長い主語の構造把握"
    category: "主語と動詞の把握"
    priority: "P1"
    notes: |
      Point分類: ❸〔形容詞〕❹〔分詞〕
      ■ 複数の前置詞句・分詞句を含む長い主語の解析方法:
        前置詞のついた名詞は主語にならないルールを繰り返し適用する。
        例: The history of the development of numbers → 主語は The history
      ■ 前置詞句の修飾先の判断:
        into clay tokens は researchers を修飾（work ではない）。
        work into ～ という形は使わないが、research/researchers into ～ は使われる。
      ■ found = 過去分詞（clay tokens を修飾）:
        過去形なら目的語が必要だが、直後は副詞句 all over the Middle East。
        目的語がない → 過去分詞形で、直前の clay tokens を修飾。
      ❶ of the development of numbers は形容詞句として history を修飾。
      ❷ still not fully understood: 部分否定。
        not fully = 「十分には～ない」。still = 「依然として」。
      ❺ 〈give O O〉: 「OにOを与える」。
        us = 一般人（研究者 they に対して）。picture = 「イメージ、全体像」。
      ❻ 形式主語構文 it seems probable that ...:
        it は仮の主語。that節が真の主語。
        it is probable that ... の is を seems に置き換えた形。
      ❼ 再帰代名詞 oneself:
        (1) 主語と目的語が一致する場合: You shouldn't blame yourself.
        (2) 〈名詞 + oneself〉で名詞を強調: writing itself「文字そのもの」

