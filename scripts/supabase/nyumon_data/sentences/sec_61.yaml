sentences:
  - id: "ny-61-s1"
    section_id: "Ny_61"
    drill: 61
    number: 1
    role: "exercise"
    english: "Helping the poor has long been considered an obligation by major religions."
    japanese: "貧しい人々を助けることは，主要な宗教によって責務であると長い間考えられてきた。"
    notes: ""

  - id: "ny-61-s2"
    section_id: "Ny_61"
    drill: 61
    number: 2
    role: "exercise"
    english: "They teach that helping less fortunate people is important."
    japanese: "そうした宗教は，恵まれない人々を助けることは重要だと教える。"
    notes: ""

  - id: "ny-61-s3"
    section_id: "Ny_61"
    drill: 61
    number: 3
    role: "exercise"
    english: "For example, in Europe during the Middle Ages, it was the Church that helped the poor by providing food and money for those in need."
    japanese: "例えば，ヨーロッパでは中世に困っている人々に食べ物とお金を与えることによって貧しき者を助けたのは教会だった。"
    notes: "* the Middle Ages「中世」（問題文の語彙注釈）"

