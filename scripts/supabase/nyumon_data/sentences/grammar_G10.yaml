sentences:
  - id: "ny-G10-s1"
    section_id: "Ny_G10"
    drill: 0
    number: 1
    role: "example"
    english: "I turned sixteen last month."
    japanese: "私は先月16歳になった。"
    notes: "基本講義Qの例文。下線部 last month = 句（副詞句、turned を修飾）。"
  - id: "ny-G10-s2"
    section_id: "Ny_G10"
    drill: 0
    number: 2
    role: "example"
    english: "They sat in the chairs by the window."
    japanese: "彼らは窓のそばの椅子に座った。"
    notes: "基本講義Qの例文。下線部 in the chairs by the window = 句（副詞句、sat を修飾）。"
  - id: "ny-G10-s3"
    section_id: "Ny_G10"
    drill: 0
    number: 3
    role: "example"
    english: "It is dangerous for children to swim in the river."
    japanese: "子どもがその川で泳ぐのは危険だ。"
    notes: "基本講義Qの例文。下線部 to swim in the river = 句（名詞句、真主語）。Ny_G05, G08 でも使用。"
  - id: "ny-G10-s4"
    section_id: "Ny_G10"
    drill: 0
    number: 4
    role: "example"
    english: "I think that she likes cats."
    japanese: "私は、彼女はネコが好きだと思う。"
    notes: "基本講義Qの例文。下線部 that she likes cats = 節（名詞節、think の目的語）。従属接続詞 that。"
  - id: "ny-G10-s5"
    section_id: "Ny_G10"
    drill: 0
    number: 5
    role: "example"
    english: "When I came home, my mother was sleeping."
    japanese: "私が帰宅したとき、母は眠っていた。"
    notes: "基本講義Qの例文。下線部 When I came home = 節（副詞節、was sleeping を修飾）。従属接続詞 When。"

