    role: "exercise"
    english: "We may sit and stare at the computer screen or our notes trying to figure something out, but so long as we're still trying, we're likely to fail."
    japanese: "私達は座ってコンピュータのスクリーンやメモを見つめそして何か理解しようと頑張るかもしれないが，そうしたとしても，そのような試みをしている限り，失敗してしまう可能性が高い。"
    notes: "出典: 埼玉大学"

