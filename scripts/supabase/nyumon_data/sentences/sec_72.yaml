sentences:
  - id: "ny-72-s1"
    section_id: "Ny_72"
    drill: 72
    number: 1
    role: "exercise"
    english: "Once a device had been invented, the inventor then had to find an application for it."
    japanese: "いったんある装置が発明されれば，その発明家はその用途を発見せねばならなかった。"
    notes: "出典: 熊本大学"
  - id: "ny-72-s2"
    section_id: "Ny_72"
    drill: 72
    number: 2
    role: "exercise"
    english: "Only after it had been in use for a considerable time did consumers come to feel that they \"needed\" it."
    japanese: "それが使われ始めてかなりの時間が経ってようやく，消費者はそれが「必要である」と感じるようになった。"
    notes: "出典: 熊本大学"

sentence_structures:
  - sentence_id: "ny-72-s1"
    label: "overall"
    value: "従属節(Once) S V O"

  - sentence_id: "ny-72-s1"
    label: "details"
    value: "[Once(従接「いったん～すれば」) {S}a device {V}had been invented(過去完了:受動態、完了)](M:副詞節), {S}the inventor then(副詞、訳さなくてよい) {V}had to find {O}an application (for it)(M:形容詞句)"

  - sentence_id: "ny-72-s1"
    label: "partial_translations"
    value: |
      ❶ いったんある装置が発明されれば（Once=接続詞「いったん～すれば」、had been invented=過去完了で「発明が完了した」時点を示す）
      ❷ その用途を発見せねばならなかった（application=動詞の名詞形「応用したもの」→「用途」、findの目的語なので具体的な意味）

  - sentence_id: "ny-72-s2"
    label: "overall"
    value: "Only+副詞節 倒置(did S V) O[that節]"

  - sentence_id: "ny-72-s2"
    label: "details"
    value: "[Only(否定的意味「～しかない」) after(従接) {S}it {V}had been (in use)(C:形容詞句) (for a considerable time)(M:副詞句)](M:否定的副詞節、文頭→倒置) did(助動詞:倒置形) {S}consumers {V}come to feel(come to V「Vするようになる」) {O}[that(接続詞) {S}they {V}\"needed\"(引用符=筆者の疑い) {O}it](O:名詞節)"

  - sentence_id: "ny-72-s2"
    label: "partial_translations"
    value: |
      ❸ 使われ始めてかなりの時間が経ってようやく消費者はそれが「必要である」と感じるようになった（Only after+副詞節が文頭→主節が倒置、did+S+Vの疑問文語順。倒置前: consumers came to feel ... only after ...）
      引用符の"needed": 発明前は必要かどうかわからないのに「必要だった」と言っている筆者の疑い

