sentences:
  - id: "ny-G07-s1"
    section_id: "Ny_G07"
    drill: 0
    number: 1
    role: "example"
    english: "Japan has four seasons."
    japanese: "日本には四季がある。"
    notes: "基本講義Qの例文。目的語 = four seasons。Ny_G05, G06 でも使用。"
  - id: "ny-G07-s2"
    section_id: "Ny_G07"
    drill: 0
    number: 2
    role: "example"
    english: "I like singing songs."
    japanese: "私は歌を歌うのが好きだ。"
    notes: "基本講義Qの例文。動名詞 singing songs が目的語。songs は singing の目的語。"
  - id: "ny-G07-s3"
    section_id: "Ny_G07"
    drill: 0
    number: 3
    role: "example"
    english: "I want to eat the cake."
    japanese: "私はそのケーキが食べたい。"
    notes: "基本講義Qの例文。to不定詞 to eat the cake が目的語。the cake は eat の目的語。"
  - id: "ny-G07-s4"
    section_id: "Ny_G07"
    drill: 0
    number: 4
    role: "example"
    english: "I know that you like her."
    japanese: "私はあなたが彼女を好きなことを知っている。"
    notes: "基本講義Qの例文。that節 that you like her が目的語。that は省略可。her は like の目的語。"
  - id: "ny-G07-s5"
    section_id: "Ny_G07"
    drill: 0
    number: 5
    role: "example"
    english: "The man asked me the way to the station."
    japanese: "その男性は私に駅までの道を尋ねた。"
    notes: "基本講義Qの例文。me = 間接目的語、the way to the station = 直接目的語。Ny_G06 でも使用。"
  - id: "ny-G07-s6"
    section_id: "Ny_G07"
    drill: 0
    number: 6
    role: "example"
    english: "She always makes me laugh."
    japanese: "彼女はいつも私を笑わせる。"
    notes: "基本講義Qの例文。me が目的語。第5文型〈S+V+O+C〉。"
  - id: "ny-G07-s7"
    section_id: "Ny_G07"
    drill: 0
    number: 7
    role: "example"
    english: "I found it hard to go there by myself."
    japanese: "私はそこへ1人で行くのは難しいと思った。"
    notes: "基本講義Qの例文。形式目的語 it。真の目的語は to go there by myself。"

