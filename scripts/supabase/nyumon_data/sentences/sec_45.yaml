sentences:
  - id: "ny-45-s1"
    section_id: "Ny_45"
    drill: 45
    number: 1
    role: "exercise"
    english: "When we recognize an emotion in a character in a story, our brains generate the same emotion, so we are simulating the character's emotional state."
    japanese: "物語に出てくる登場人物の中にある感情を認識するとき，私達の脳は同じ感情を生み出し，つまり私達はその登場人物の情緒的状態を追体験しているのだ。"
    notes: ""

  - id: "ny-45-s2"
    section_id: "Ny_45"
    drill: 45
    number: 2
    role: "exercise"
    english: "This working out of what fictional characters are thinking and feeling becomes a powerful rehearsal for living in the real world."
    japanese: "架空の人物が考えたり感じたりしていることを，このように自分もたどることは，現実の世界で生きるための強力な予行演習になる。"
    notes: ""

