    role: "exercise"
    english: "For babies born in 1980 — today's 36-year-olds — the index of the American dream has fallen to 50 percent: Only half of them make as much money as their parents did."
    japanese: "1980年に生まれた赤ん坊，つまり今36歳の人々だが，彼らにとってアメリカンドリームの指標は50％にまで下がった，すなわち，自分の親達と同じだけ稼いでいるのは彼らのたった半数にすぎないのだ。"
    notes: "出典: 首都大学東京"

