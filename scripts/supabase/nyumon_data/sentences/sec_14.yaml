sentences:
  - id: "ny-14-s1"
    section_id: "Ny_14"
    drill: 14
    number: 1
    role: "exercise"
    english: "The earliest evidence for modern humans using rainforest environments was from around 45,000 years ago in Niah Cave, Borneo."
    japanese: "現生人類が熱帯雨林という環境を利用していたことの最古の証拠は，ボルネオのニア洞窟の中にあったおよそ45,000年前のものである。"
    notes: "出典: お茶の水女子大学。* Niah Cave「ニア洞窟」（問題文の語彙注釈）"
  - id: "ny-14-s2"
    section_id: "Ny_14"
    drill: 14
    number: 2
    role: "exercise"
    english: "These regions seem an unlikely place for early humans to live."
    japanese: "こうした地域は初期の人間が住んでいそうにはない場所のように思われる。"
    notes: "出典: お茶の水女子大学"

