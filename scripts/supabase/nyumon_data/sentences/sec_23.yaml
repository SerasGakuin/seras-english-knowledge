sentences:
  - id: "ny-23-s1"
    section_id: "Ny_23"
    drill: 23
    number: 1
    role: "exercise"
    english: "The combined data showed that those who consumed a moderate amount of coffee, about three to five cups a day, were at the lowest risk for problems."
    japanese: "合算されたそのデータによると，適量のコーヒー，つまり1日におよそ3〜5杯を飲んでいる人々は，いろいろな健康上の問題に対する危険性が最も低いことがわかった。"
    notes: "出典: 愛知教育大学"
  - id: "ny-23-s2"
    section_id: "Ny_23"
    drill: 23
    number: 2
    role: "exercise"
    english: "Those who consumed five or more cups a day had no higher risk than those who consumed none."
    japanese: "1日に5杯以上飲んでいる人々は，まったくコーヒーを飲んでいない人と同じ程度の危険性だった。"
    notes: "出典: 愛知教育大学"

