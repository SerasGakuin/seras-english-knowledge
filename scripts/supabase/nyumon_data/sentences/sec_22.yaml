sentences:
  - id: "ny-22-s1"
    section_id: "Ny_22"
    drill: 22
    number: 1
    role: "exercise"
    english: "When Edison built his first phonograph in 1877, he published an article proposing ten uses to which his invention might be put."
    japanese: "エジソンが1877年に初めて蓄音機を作ったとき，彼はその発明品の可能な使用方法を10種類提案する論文を発表した。"
    notes: "出典: 熊本大学。* phonograph「蓄音機」（問題文の語彙注釈）"
  - id: "ny-22-s2"
    section_id: "Ny_22"
    drill: 22
    number: 2
    role: "exercise"
    english: "They included preserving the last words of dying people, recording books for blind people to hear, and teaching spelling."
    japanese: "その中には臨終を迎える人の最後の言葉を保存すること，本を録音して目の見えない人が聞くことができるようにすること，それに綴りを教えることなどがあった。"
    notes: "出典: 熊本大学"

