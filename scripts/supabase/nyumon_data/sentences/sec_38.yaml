    english: "Although we know that the earth revolves around the sun, we cannot recite the astronomical observations and calculations that led to that conclusion."
    japanese: "地球は太陽の周りを回っているということを私達は知っているが，その結論を導いた天文学的な観察や計算を挙げることはできない。"
    notes: "出典: 京都府立医科大学"

