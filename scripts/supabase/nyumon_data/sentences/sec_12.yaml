    english: "For most young people, though, going to college and doing well is still the best way to master the tools needed for many careers."
    japanese: "しかし，大半の若者にとっては，大学に通いよい成績をとることは，今でも多くの仕事にとって必要とされる道具を習得するための最善の方法だ。"
    notes: "出典: 岡山大学"
  - id: "ny-12-s2"
    section_id: "Ny_12"
    drill: 12
    number: 2
    role: "example"
    english: "Jam and bread is enough for my breakfast."
    japanese: "私の朝食はジャムを塗ったパンで十分です。"
    notes: "❸の解説中の例文（A and B がひとまとまり→単数扱い）"

