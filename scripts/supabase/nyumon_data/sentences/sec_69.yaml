sentences:
  - id: "ny-69-s1"
    section_id: "Ny_69"
    drill: 69
    number: 1
    role: "exercise"
    english: "According to Dr. Carter, it's not easy ― even for scientists ― to define sleep precisely."
    japanese: "カーター博士によれば，睡眠を厳密に定義することは，科学者にとってさえ簡単ではない。"
    notes: ""
  - id: "ny-69-s2"
    section_id: "Ny_69"
    drill: 69
    number: 2
    role: "exercise"
    english: "Basically, when we're asleep we're hardly aware of the things around us and we don't move much."
    japanese: "基本的に，眠っているときには，周りのものをほとんど意識しないしあまり動かない。"
    notes: ""

