sentences:
  - id: "ny-15-s1"
    section_id: "Ny_15"
    drill: 15
    number: 1
    role: "exercise"
    english: "Just last year, a systematic review of studies looking at long-term consumption of coffee and the risk of cardiovascular disease was published."
    japanese: "昨年，コーヒーの長期にわたる消費と心臓血管病のリスクに焦点を当てた研究を体系的に見直した結果が発表された。"
    notes: "出典: 愛知教育大学。* cardiovascular disease「心臓血管病」（問題文の語彙注釈）"
  - id: "ny-15-s2"
    section_id: "Ny_15"
    drill: 15
    number: 2
    role: "exercise"
    english: "The researchers found 36 studies involving more than 1,270,000 participants."
    japanese: "その研究者は，127万人超の当事者がかかわった36の研究を見つけたのだ。"
    notes: "出典: 愛知教育大学"

