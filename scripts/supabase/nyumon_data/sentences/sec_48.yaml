sentences:
  - id: "ny-48-s1"
    section_id: "Ny_48"
    drill: 48
    number: 1
    role: "exercise"
    english: "People may think the way they do things or the way they view the world is \"natural\" and \"correct.\""
    japanese: "人は自分の物事のやり方や世界の見方が「当然」で「正しい」と思うかもしれない。"
    notes: ""

  - id: "ny-48-s2"
    section_id: "Ny_48"
    drill: 48
    number: 2
    role: "exercise"
    english: "When they encounter someone doing things differently, they regard it as \"strange\" or \"wrong.\""
    japanese: "物事を異なるやり方でやっている人に出会うと，それを「奇妙である」とか「間違っている」とみなす。"
    notes: ""

  - id: "ny-48-s3"
    section_id: "Ny_48"
    drill: 48
    number: 3
    role: "exercise"
    english: "Having an awareness of intercultural communication can help us understand and deal with misunderstandings when they arise."
    japanese: "異文化間コミュニケーションを認識することは，誤解が生じたときにそれを理解して対処するのに役立ちうる。"
    notes: ""

