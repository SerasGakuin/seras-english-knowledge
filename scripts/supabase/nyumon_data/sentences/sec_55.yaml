sentences:
  - id: "ny-55-s1"
    section_id: "Ny_55"
    drill: 55
    number: 1
    role: "exercise"
    english: "Pop singers are often judged as much on the basis of how they look as how they sound."
    japanese: "ポップ歌手はたいてい歌声と同じくらい外見に基づいて判断される。"
    notes: ""

  - id: "ny-55-s2"
    section_id: "Ny_55"
    drill: 55
    number: 2
    role: "exercise"
    english: "Therefore, opera singers, performing to audiences influenced by this popular culture, are now expected to be \"models who sing.\""
    japanese: "それゆえ，オペラ歌手はこの大衆文化に影響された観客を相手に演じているため，今や「歌うモデル」であることを求められる。"
    notes: ""

  - id: "ny-55-s3"
    section_id: "Ny_55"
    drill: 55
    number: 3
    role: "exercise"
    english: "These demands may be unrealistic and possibly harmful."
    japanese: "これらの要求は非現実的で，もしかすると有害かもしれない。"
    notes: ""

