sentences:
  - id: "ny-27-s1"
    section_id: "Ny_27"
    drill: 27
    number: 1
    role: "exercise"
    english: "Becoming an adult is a step-by-step process, and just when the young are finally wise enough to be treated as young adults is not the time to give them free access to the drinks bar."
    japanese: "人は，段階を経て徐々に大人になっていくのだ。若者が最終的に若い大人として扱われるくらい賢明になるちょうどその時でも，若者に酒場に出入りする自由な権利を与える時ではない。"
    notes: "出典: 慶應義塾大学"
  - id: "ny-27-s2"
    section_id: "Ny_27"
    drill: 27
    number: 2
    role: "exercise"
    english: "... drinking by the young leads to accidents, injuries, and deaths."
    japanese: "若者による飲酒は事故，けがや死につながる。"
    notes: "出典: 慶應義塾大学"

