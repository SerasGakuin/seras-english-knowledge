sentences:
  - id: "ny-46-s1"
    section_id: "Ny_46"
    drill: 46
    number: 1
    role: "exercise"
    english: "While approximately two-thirds of Americans believe that robots will perform most of the work currently done by human beings during the next 50 years, about 80% also believe their current jobs will either \"definitely\" or \"probably\" exist in their current form within the same period."
    japanese: "アメリカ人のおよそ3分の2が，今後 50 年の間に，現在人間が行っている仕事の大半をロボットがするようになると信じていて，そして同じくアメリカ人の約 80％は，今後 50 年の間に，彼らの現在の仕事は「間違いなく」あるいは「おそらく」現在の形態で存在するだろうと信じている。"
    notes: "出典: 岩手大学"

