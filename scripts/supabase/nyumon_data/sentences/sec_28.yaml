    role: "exercise"
    english: "This is a scene of daily life that the government sees as the future of Japan's \"super smart society,\" where all individuals can receive the services they need regardless of age, gender, region or language."
    japanese: "これは，政府が日本の「超スマート社会（そこでは，すべての個人が，年齢，性別，地域，言語とは無関係に，必要とするサービスを受けることができる）」の未来だと考えている日常生活の一場面である。"
    notes: "出典: 鳥取大学"

