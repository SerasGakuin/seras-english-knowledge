sentences:
  - id: "ny-31-s1"
    section_id: "Ny_31"
    drill: 31
    number: 1
    role: "exercise"
    english: "Traveling to different countries can bring you a wealth of experience."
    japanese: "様々な国を旅行することによって多くの経験を得る可能性がある。"
    notes: "出典: 関東学院大学"
  - id: "ny-31-s2"
    section_id: "Ny_31"
    drill: 31
    number: 2
    role: "exercise"
    english: "The problem is learning how to interpret what you see."
    japanese: "ここで問題になるのは，見えるものをいかに解釈するかを学び身につけるということだ。"
    notes: "出典: 関東学院大学"
  - id: "ny-31-s3"
    section_id: "Ny_31"
    drill: 31
    number: 3
    role: "exercise"
    english: "Appearances can be deceptive."
    japanese: "外見は裏切る可能性がある。"
    notes: "出典: 関東学院大学"
  - id: "ny-31-s4"
    section_id: "Ny_31"
    drill: 31
    number: 4
    role: "exercise"
    english: "Things aren't always what they seem."
    japanese: "物事はいつも見たままであるということではない。"
    notes: "出典: 関東学院大学"

