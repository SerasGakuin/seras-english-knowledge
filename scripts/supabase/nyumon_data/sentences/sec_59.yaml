sentences:
  - id: "ny-59-s1"
    section_id: "Ny_59"
    drill: 59
    number: 1
    role: "exercise"
    english: "If someone were to ask you what language people in the United States speak in their own homes, your answer would probably be, \"English, of course!\""
    japanese: "アメリカ合衆国の人々は自宅でどんな言語を話していますかと誰かが尋ねたら，おそらく「もちろん，英語だよ」と答えるだろう。"
    notes: "出典: 広島経済大学"

  - id: "ny-59-s2"
    section_id: "Ny_59"
    drill: 59
    number: 2
    role: "exercise"
    english: "You might be surprised to learn, however, that that answer would be only partly correct."
    japanese: "しかし，その答えは部分的にしか正しくないとわかれば驚くだろう。"
    notes: "出典: 広島経済大学"

