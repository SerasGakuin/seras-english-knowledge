    english: "... hungry customers are welcomed not by a cashier waiting to take their order, but by a \"Create Your Taste\" kiosk ― an automated touch-screen system that allows customers to create their own burgers without interacting with another human being."
    japanese: "空腹の客を出迎えるのは注文を取るために待っているレジ係ではなく，「クリエイト・ユア・テイスト・キオスク」だ。それは，別の人間とやり取りすることなしに客が自分自身のハンバーガーを作り出すことを可能にする自動化されたタッチスクリーンのシステムだ。"
    notes: "出典: 岩手大学"

