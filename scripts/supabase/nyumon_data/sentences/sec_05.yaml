sentences:
  - id: "ny-05-s1"
    section_id: "Ny_05"
    drill: 5
    number: 1
    role: "exercise"
    english: "In 1844, a sea captain named Jonathan Walker was caught helping eight slaves escape by boat from Pensacola, Florida."
    japanese: "1844年ジョナサン・ウォーカーという名の船長が8人の奴隷がフロリダ州ペンサコラから船で逃げるのを手伝っているところを見つかった。"
    notes: "出典: 成蹊大学"
  - id: "ny-05-s2"
    section_id: "Ny_05"
    drill: 5
    number: 2
    role: "example"
    english: "The police officer caught a man stealing money."
    japanese: "警察官はある男が金を盗んでいるところを見つけた"
    notes: "❸の例文。〈catch O V-ing〉の能動態の例。"
  - id: "ny-05-s3"
    section_id: "Ny_05"
    drill: 5
    number: 3
    role: "example"
    english: "He was caught stealing money."
    japanese: "彼は金を盗んでいるところを見つかった"
    notes: "❸の例文。〈catch O V-ing〉の受動態の例。"
  - id: "ny-05-s4"
    section_id: "Ny_05"
    drill: 5
    number: 4
    role: "example"
    english: "She helped me to finish the assignment."
    japanese: "彼女は私が課題を終えるのを手伝ってくれた"
    notes: "❹の例文。〈help O to V〉の例。＝ She helped me finish the assignment.（toは通例省略）"
  - id: "ny-05-s5"
    section_id: "Ny_05"
    drill: 5
    number: 5
    role: "example"
    english: "I heard my name called."
    japanese: "自分の名前が呼ばれるのを聞いた"
    notes: "❹の例文。知覚動詞〈hear O V-pp〉の例。"
  - id: "ny-05-s6"
    section_id: "Ny_05"
    drill: 5
    number: 6
    role: "example"
    english: "He made me run."
    japanese: "彼は私を走らせた"
    notes: "❹の例文。使役動詞〈make O V〉の例。"
  - id: "ny-05-s7"
    section_id: "Ny_05"
    drill: 5
    number: 7
    role: "example"
    english: "They kept me waiting."
    japanese: "彼らは私を待たせたままにした"
    notes: "❹の例文。〈keep O V-ing〉の例。"

