sentences:
  - id: "ny-49-s1"
    section_id: "Ny_49"
    drill: 49
    number: 1
    role: "exercise"
    english: "Our governments can change legislation relating to the voting age, for example, or marriage age."
    japanese: "政府は，例えば投票権取得年齢や婚姻可能年齢に関する法律を変更できる。"
    notes: "出典: 慶應義塾大学"

  - id: "ny-49-s2"
    section_id: "Ny_49"
    drill: 49
    number: 2
    role: "exercise"
    english: "They rarely make dramatic changes, however, since the existing systems have usually evolved more through experience than through prejudice."
    japanese: "しかし，現行の制度は通例，偏見よりもむしろ経験を通じて進化してきたものなので，政府が劇的な変更を行うことはまれである。"
    notes: "出典: 慶應義塾大学"

