sentences:
  - id: "ny-68-s1"
    section_id: "Ny_68"
    drill: 68
    number: 1
    role: "exercise"
    english: "In his youth, Albert Einstein spent a year idling aimlessly."
    japanese: "アルベルト・アインシュタインは，若い頃，一年を目的もなくぶらぶら過ごしたことがある。"
    notes: "出典: 信州大学"
  - id: "ny-68-s2"
    section_id: "Ny_68"
    drill: 68
    number: 2
    role: "exercise"
    english: "You don't get anywhere by not \"wasting\" time ― something, unfortunately, which the parents of teenagers tend frequently to forget."
    japanese: "時間を「浪費する」ことをしなければ何も得られない。これは，残念ながら，ティーンエイジャーの子を持つ親がしばしば忘れがちなことである。"
    notes: "出典: 信州大学"

