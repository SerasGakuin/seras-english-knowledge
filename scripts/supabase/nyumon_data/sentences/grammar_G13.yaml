sentences:
  - id: "ny-G13-s1"
    section_id: "Ny_G13"
    drill: 0
    number: 1
    role: "example"
    english: "This T-shirt is too small to wear."
    japanese: "このTシャツは小さすぎて着ることができない。"
    notes: "基本講義Qの例文。副詞用法。too ... to V「Vするには〜すぎる」。直訳は「着るには小さすぎる」。"
  - id: "ny-G13-s2"
    section_id: "Ny_G13"
    drill: 0
    number: 2
    role: "example"
    english: "Be careful not to make the same mistakes."
    japanese: "同じ間違いをしないように注意しなさい。"
    notes: "基本講義Qの例文。副詞用法。not to V で否定の to不定詞。careful を修飾。"
  - id: "ny-G13-s3"
    section_id: "Ny_G13"
    drill: 0
    number: 3
    role: "example"
    english: "They worked hard in order to finish it."
    japanese: "彼らはそれを終わらせるために頑張った。"
    notes: "基本講義Qの例文。副詞用法（目的）。in order to = 目的を明示。in order なしでも同義。"
  - id: "ny-G13-s4"
    section_id: "Ny_G13"
    drill: 0
    number: 4
    role: "example"
    english: "He asked his boss to give him a short break."
    japanese: "彼は上司に少し休ませてくれるように頼んだ。"
    notes: "基本講義Qの例文。名詞用法（asked の直接目的語）。* short break「小休止」（問題文の語彙注釈）。"
  - id: "ny-G13-s5"
    section_id: "Ny_G13"
    drill: 0
    number: 5
    role: "example"
    english: "She has many friends to help her."
    japanese: "彼女のことを助けてくれる友達が彼女にはたくさんいる。"
    notes: "基本講義Qの例文。形容詞用法。many friends を修飾。"
  - id: "ny-G13-s6"
    section_id: "Ny_G13"
    drill: 0
    number: 6
    role: "example"
    english: "We have a plan to go camping."
    japanese: "私達はキャンプに行く計画がある。"
    notes: "基本講義Qの例文。形容詞用法。a plan を修飾。"
  - id: "ny-G13-s7"
    section_id: "Ny_G13"
    drill: 0
    number: 7
    role: "example"
    english: "We waited for a while to get tickets for the concert."
    japanese: "そのコンサートチケットを入手するために私達はしばらく待った。"
    notes: "基本講義Qの例文。副詞用法（目的）。waited を修飾。"
  - id: "ny-G13-s8"
    section_id: "Ny_G13"
    drill: 0
    number: 8
    role: "example"
    english: "It was not easy to solve the math problem."
    japanese: "その数学の問題を解くのは簡単ではなかった。"
    notes: "基本講義Qの例文。名詞用法（真主語）。形式主語 it。* math problem「数学の問題」（問題文の語彙注釈）。"
  - id: "ny-G13-s9"
    section_id: "Ny_G13"
    drill: 0
    number: 9
    role: "example"
    english: "It is very kind of you to invite me."
    japanese: "私を招待してくれるなんてあなたは本当に親切だ。"
    notes: "基本講義Qの例文。副詞用法（感情の原因「〜するとは」）。it は状況を示す it。"
  - id: "ny-G13-s10"
    section_id: "Ny_G13"
    drill: 0
    number: 10
    role: "example"
    english: "I didn't know what to do."
    japanese: "何をしてよいのかわからなかった。"
    notes: "基本講義Qの例文。名詞用法。what to do 全体で know の目的語（疑問詞 + to不定詞）。"
  - id: "ny-G13-s11"
    section_id: "Ny_G13"
    drill: 0
    number: 11
    role: "example"
    english: "He is old enough to travel alone."
    japanese: "彼は1人で旅行できるぐらいの年齢だ。"
    notes: "基本講義Qの例文。副詞用法。old enough を修飾。〜 enough to V「Vできるほどの〜」。"

