sentences:
  - id: "ny-30-s1"
    section_id: "Ny_30"
    drill: 30
    number: 1
    role: "exercise"
    english: "Computer games are a form of story, and human beings are devoted storytellers."
    japanese: "コンピュータゲームは物語の一形態であり，人間は熱心な語り手である。"
    notes: "出典: 上智大学"
  - id: "ny-30-s2"
    section_id: "Ny_30"
    drill: 30
    number: 2
    role: "exercise"
    english: "As Yuval Noah Harari argues in his book Sapiens, the ability to create binding fictions is what enabled us to become the most dominant species on the planet."
    japanese: "ユヴァル・ノア・ハラリが自著の『サピエンス全史』で主張しているように，結びつける力を持つ虚構を創る能力は，私達が地球上で最も支配的な種になることを可能にした。"
    notes: "出典: 上智大学。* Yuval Noah Harari「ユヴァル・ノア・ハラリ：イスラエル人の歴史学者」* Sapiens『サピエンス全史』* binding fictions「結びつける力を持つ虚構」（問題文の語彙注釈）"

