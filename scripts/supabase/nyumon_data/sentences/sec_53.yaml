    drill: 53
    number: 1
    role: "exercise"
    english: "Tea can be divided into several types based on how much the picked tea leaves react to oxygen."
    japanese: "お茶は，その摘まれた茶葉がどの程度酸素に反応するかに応じていくつかの種類に分類できる。"
    notes: ""

  - id: "ny-53-s2"
    section_id: "Ny_53"
    drill: 53
    number: 2
    role: "exercise"
    english: "The longer the leaf goes through this reaction process, the stronger its taste and smell become."
    japanese: "茶葉がこの反応過程を長時間経ればそれだけ，その味と香りが強くなる。"
    notes: ""

