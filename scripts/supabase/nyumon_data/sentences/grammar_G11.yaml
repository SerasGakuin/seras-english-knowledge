sentences:
  - id: "ny-G11-s1"
    section_id: "Ny_G11"
    drill: 0
    number: 1
    role: "example"
    english: "It is dangerous for children to swim in the river."
    japanese: "子どもがその川で泳ぐのは危険だ。"
    notes: "基本講義Qの例文。名詞用法（真主語）。for 〜 は to不定詞の意味上の主語。Ny_G05, G08, G10 でも使用。"
  - id: "ny-G11-s2"
    section_id: "Ny_G11"
    drill: 0
    number: 2
    role: "example"
    english: "I want to eat the cake."
    japanese: "私はそのケーキが食べたい。"
    notes: "基本講義Qの例文。名詞用法（want の目的語）。Ny_G07 でも使用。"
  - id: "ny-G11-s3"
    section_id: "Ny_G11"
    drill: 0
    number: 3
    role: "example"
    english: "I know that you like her."
    japanese: "私はあなたが彼女を好きなことを知っている。"
    notes: "基本講義Qの例文。名詞節（know の目的語）。Ny_G07 でも使用。"
  - id: "ny-G11-s4"
    section_id: "Ny_G11"
    drill: 0
    number: 4
    role: "example"
    english: "He looked surprised at the news."
    japanese: "彼はその知らせに驚いたように見えた。"
    notes: "基本講義Qの例文。形容詞用法。〈look + 形容詞〉で「〜に見える」。"
  - id: "ny-G11-s5"
    section_id: "Ny_G11"
    drill: 0
    number: 5
    role: "example"
    english: "The small dog that is running over there is mine."
    japanese: "向こうで走っている小さな犬は私の犬だ。"
    notes: "基本講義Qの例文。形容詞用法。関係代名詞（関代）that 節が The small dog を修飾。Ny_G03 でも使用。"
  - id: "ny-G11-s6"
    section_id: "Ny_G11"
    drill: 0
    number: 6
    role: "example"
    english: "I ran to the station to catch the last train."
    japanese: "最終電車に乗るために、私は駅まで走った。"
    notes: "基本講義Qの例文。副詞用法。to catch the last train が ran を修飾。"
  - id: "ny-G11-s7"
    section_id: "Ny_G11"
    drill: 0
    number: 7
    role: "example"
    english: "When I came home, my mother was sleeping."
    japanese: "私が帰宅したとき、母は眠っていた。"
    notes: "基本講義Qの例文。副詞節。When I came home が was sleeping を修飾。Ny_G10 でも使用。"

