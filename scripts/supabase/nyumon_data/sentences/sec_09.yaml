    role: "exercise"
    english: "According to a report published jointly in December 2015 by Nomura Research Institute and Oxford University, researchers predicted that advanced robots and AI would replace about 49 percent of Japan's workforce within 10 to 20 years."
    japanese: "野村総合研究所がオックスフォード大学と共同して2015年12月に発表した報告によると，進化したロボットと人工知能は今後10年から20年以内に日本の労働力のおよそ49パーセントに取って代わると研究者は予測した。"
    notes: "出典: 鳥取大学。* AI: Artificial Intelligence「人工知能」（問題文の語彙注釈）"

