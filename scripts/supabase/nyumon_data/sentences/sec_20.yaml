sentences:
  - id: "ny-20-s1"
    section_id: "Ny_20"
    drill: 20
    number: 1
    role: "exercise"
    english: "One potential obstacle for women to become pilots might be the stereotype that has long existed in many societies: women are not well-suited for this job."
    japanese: "女性がパイロットになることに対する1つの潜在的な障害は，多くの社会で長い間存在してきた固定観念，つまり，女性はこの仕事にあまり適していないというものなのかもしれない。"
    notes: ""
  - id: "ny-20-s2"
    section_id: "Ny_20"
    drill: 20
    number: 2
    role: "exercise"
    english: "This seems to arise partly from the view that boys tend to excel in mechanics and are stronger physically than girls."
    japanese: "この考えは，1つには，少年は機械工学が得意な傾向にあって少女よりも肉体的に強靱であるという見方から生じているように思える。"
    notes: "* mechanics「機械工学，力学」（問題文の語彙注釈）"

