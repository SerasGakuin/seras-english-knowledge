sentences:
  - id: "ny-11-s1"
    section_id: "Ny_11"
    drill: 11
    number: 1
    role: "exercise"
    english: "Opera is an art form that celebrates the human voice at its highest level of expression."
    japanese: "オペラは最も高いレベルの表現に達した人間の声を賛美する芸術形態である。"
    notes: ""
  - id: "ny-11-s2"
    section_id: "Ny_11"
    drill: 11
    number: 2
    role: "exercise"
    english: "No other art form creates excitement and moves the heart in the way that opera does, especially when performed by a great singer."
    japanese: "どのような芸術形態も，オペラのように，特にそれが偉大な歌手によって演じられたときに，興奮を生み出し，心を動かすものは他にない。"
    notes: ""
  - id: "ny-11-s3"
    section_id: "Ny_11"
    drill: 11
    number: 3
    role: "example"
    english: "While traveling abroad, I made a lot of friends."
    japanese: "外国を旅している間に多くの友達ができた。"
    notes: "❺の解説中の例文（接続詞後のS+be省略）"
  - id: "ny-11-s4"
    section_id: "Ny_11"
    drill: 11
    number: 4
    role: "example"
    english: "If kept in this box, the cake can be preserved for a week."
    japanese: "この箱の中に入れておけば，ケーキは一週間保存可能だ。"
    notes: "❺の解説中の例文（接続詞後のS+be省略）"

