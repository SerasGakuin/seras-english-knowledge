    english: "But which is actually better for us, getting good news first or bad?"
    japanese: "しかし，実際，どちらのほうが私達にとっていいのであろう，よい知らせを先に受け取るのと悪い知らせを先に受け取るのでは。"
    notes: "出典: 静岡県立大学"
  - id: "ny-40-s2"
