    role: "exercise"
    english: "A third study suggests that the answer to this important question depends on whether you are focused on your mood or on changing your behavior."
    japanese: "この重要な問題に対する答えは，自分の気分に重きを置いているのか，それとも自分の行動を変えることに重きを置いているのかで決まるということを3番目の研究は示唆している。"
    notes: ""

