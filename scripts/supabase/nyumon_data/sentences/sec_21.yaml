    english: "Even inventions that meet the need for which they were initially designed may later prove more valuable at meeting unforeseen needs."
    japanese: "当初設計された目的であった必要性を満たす発明品でさえ，のちに，予想もつかない必要性を満たすのにもっと有用だと判明することもあるかもしれない。"
    notes: "出典: 熊本大学"

