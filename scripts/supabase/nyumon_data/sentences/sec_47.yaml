sentences:
  - id: "ny-47-s1"
    section_id: "Ny_47"
    drill: 47
    number: 1
    role: "exercise"
    english: "Regardless of what happened at the beginning of time, we know there was a period 13.8 billion years ago when the part of the Universe that we can see today, containing over 350 billion large galaxies and with a diameter of over 90 billion light years, was compressed into a region of space smaller than a single atom."
    japanese: "時間の始まりに何が起きたかとは無関係に，宇宙の中の今日私達が見ている部分は3,500億を超える巨大な銀河を含み，直径が900億光年を超えるが，それが圧縮されてたった1つの原子より小さな空間領域になった時代が，138億年前にあったことを私達は知っている。"
    notes: "出典: 東北大学"

