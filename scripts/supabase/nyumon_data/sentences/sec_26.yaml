    drill: 26
    number: 1
    role: "exercise"
    english: "Psychologists have pointed out that well-established friendships lead us to a better understanding of ourselves."
    japanese: "心理学者の指摘では，十分に確立した友情を持てば私達は自分自身のことをよりよく理解できるということだ。"
    notes: ""
  - id: "ny-26-s2"
    section_id: "Ny_26"
    drill: 26
    number: 2
    role: "exercise"
    english: "They have also noted that we might face conflicts not only with acquaintances but even with our good friends, which could result in ends to some of our friendships."
    japanese: "また彼らは，知人だけでなく親友とも対立し，それによって友情が終わってしまう場合があるかもしれない，ということをも指摘している。"
    notes: ""

