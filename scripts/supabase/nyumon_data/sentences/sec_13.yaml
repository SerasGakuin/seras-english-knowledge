    drill: 13
    number: 1
    role: "exercise"
    english: "Albert was reading Kant and attending occasional lectures at the University of Pavia for pleasure, without being registered there or having to think about exams."
    japanese: "アルベルトはカントを読んだり，そして履修登録を出さず試験について考える必要もなく，楽しみのためにパヴィア大学での時おりの授業を聴講したりしていた。"
    notes: "出典: 信州大学。* Albert「アルベルト・アインシュタイン」（問題文の語彙注釈）。* Kant「イマヌエル・カント」（問題文の語彙注釈）。* the University of Pavia「パヴィア大学」（問題文の語彙注釈）"

