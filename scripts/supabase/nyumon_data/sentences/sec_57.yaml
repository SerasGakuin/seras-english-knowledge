    drill: 57
    number: 1
    role: "exercise"
    english: "If every choice you made carried consequences you would bear not once but countless times, you would certainly think hard before making a decision you might later regret."
    japanese: "自分が行った選択によって，その後，一度ならず何度も大変な目にあうことになってしまうのなら，あとになって後悔するかもしれないような決断をしてしまう前に，きっとしっかり考えるようになるだろう。"
    notes: "出典: 武蔵大学"

