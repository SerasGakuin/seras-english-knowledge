sentences:
  - id: "ny-G08-s1"
    section_id: "Ny_G08"
    drill: 0
    number: 1
    role: "example"
    english: "This flower is beautiful."
    japanese: "この花は美しい。"
    notes: "基本講義Qの例文。補語 = beautiful（形容詞）。S = C の関係（This flower = beautiful）。"
  - id: "ny-G08-s2"
    section_id: "Ny_G08"
    drill: 0
    number: 2
    role: "example"
    english: "He looks happy."
    japanese: "彼は幸せそうに見える。"
    notes: "基本講義Qの例文。補語 = happy（形容詞）。S = C の関係（He = happy）。Ny_G06 でも使用。"
  - id: "ny-G08-s3"
    section_id: "Ny_G08"
    drill: 0
    number: 3
    role: "example"
    english: "The leaves turn yellow in fall."
    japanese: "葉は秋に黄色くなる。"
    notes: "基本講義Qの例文。補語 = yellow（形容詞）。S = C の関係（The leaves = yellow）。in fall は副詞。"
  - id: "ny-G08-s4"
    section_id: "Ny_G08"
    drill: 0
    number: 4
    role: "example"
    english: "It is dangerous for children to swim in the river."
    japanese: "子どもがその川で泳ぐのは危険だ。"
    notes: "基本講義Qの例文。補語 = dangerous（形容詞）。形式主語 It = (for children to swim in the river) = dangerous。Ny_G05 でも使用。"
  - id: "ny-G08-s5"
    section_id: "Ny_G08"
    drill: 0
    number: 5
    role: "example"
    english: "They call me John."
    japanese: "彼らは私をジョンと呼ぶ。"
    notes: "基本講義Qの例文。補語 = John（名詞）。O = C の関係（me = John）。〈call O + C〉。"
  - id: "ny-G08-s6"
    section_id: "Ny_G08"
    drill: 0
    number: 6
    role: "example"
    english: "They left the door broken."
    japanese: "彼らはドアを壊れたまま放っておいた。"
    notes: "基本講義Qの例文。補語 = broken（過去分詞）。O = C の関係（the door = broken）。〈leave O + C〉。"
  - id: "ny-G08-s7"
    section_id: "Ny_G08"
    drill: 0
    number: 7
    role: "example"
    english: "The teacher kept him standing."
    japanese: "その教師は彼を立たせたままにした。"
    notes: "基本講義Qの例文。補語 = standing（現在分詞）。O = C の関係（him = standing）。〈keep O + C〉。"

