    english: "She also saw the poverty of her people and the hard lives of so many women who were fighting against such basic problems as lack of food, firewood and water, and against unemployment ...."
    japanese: "彼女がまた同様に見たのは，同胞の貧困と，食料，たきぎ，水の不足といった基本的な問題や失業と闘う多くの女性達の厳しい生活であった。"
    notes: "出典: 愛媛大学"

