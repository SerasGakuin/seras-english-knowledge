sentences:
  - id: "ny-18-s1"
    section_id: "Ny_18"
    drill: 18
    number: 1
    role: "exercise"
    english: "Even though they involved athletes from 164 countries, officials admit that the London Paralympic Games were not a truly global event."
    japanese: "ロンドンパラリンピックは，164か国の選手が参加したが，それは本当の意味で世界的な催しではなかったと委員達は認めている。"
    notes: "出典: 共立女子大学。* Paralympic Games「パラリンピック競技」（問題文の語彙注釈）"
  - id: "ny-18-s2"
    section_id: "Ny_18"
    drill: 18
    number: 2
    role: "exercise"
    english: "Developing nations were under-represented, with competitors facing obstacles ranging from prejudice against disability to the high cost of wheelchairs and artificial limbs."
    japanese: "発展途上国からの参加は少なく，そして競技者達は障害に対する偏見から，車椅子や義肢の値段が高いことまで，数々の困難に直面した。"
    notes: "出典: 共立女子大学。* wheelchair「車椅子」* artificial limb「義肢」（問題文の語彙注釈）"

