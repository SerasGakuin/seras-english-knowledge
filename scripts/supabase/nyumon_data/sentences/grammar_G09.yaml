    drill: 0
    number: 3
    role: "example"
    english: "I cannot live without my smartphone."
    japanese: "私はスマートフォンなしで暮らせない。"
    notes: "基本講義Qの例文。〈前置詞+名詞〉without my smartphone = 副詞（cannot live を修飾）。"
  - id: "ny-G09-s4"
