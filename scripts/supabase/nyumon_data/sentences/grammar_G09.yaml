    role: "example"
    english: "He was born in this town."
    japanese: "彼はこの町で生まれた。"
    notes: "基本講義Qの例文。〈前置詞+名詞〉in this town = 副詞（was born を修飾）。"
  - id: "ny-G09-s2"
