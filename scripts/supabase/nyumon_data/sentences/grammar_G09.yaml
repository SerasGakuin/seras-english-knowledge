    drill: 0
    number: 4
    role: "example"
    english: "Many boys in this park are fourth graders."
    japanese: "この公園の多くの少年が4年生だ。"
    notes: "基本講義Qの例文。〈前置詞+名詞〉in this park = 形容詞（名詞 Many boys を修飾）。"
  - id: "ny-G09-s5"
    section_id: "Ny_G09"
    drill: 0
    number: 5
    role: "example"
    english: "They sat by the window."
    japanese: "彼らは窓のそばに座った。"
    notes: "基本講義Qの例文。〈前置詞+名詞〉by the window = 副詞（sat を修飾）。"

