    drill: 0
    number: 2
    role: "example"
    english: "On Sunday I met her."
    japanese: "日曜日に私は彼女と会った。"
    notes: "基本講義Qの例文。〈前置詞+名詞〉On Sunday = 副詞（met を修飾）。"
  - id: "ny-G09-s3"
