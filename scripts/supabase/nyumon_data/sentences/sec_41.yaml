sentences:
  - id: "ny-41-s1"
    section_id: "Ny_41"
    drill: 41
    number: 1
    role: "exercise"
    english: "Willpower is a mysterious force that helps us control our actions and achieve our goals."
    japanese: "意志の力は，私達が自分の行動を制御し目標を達成するのに役立つ不思議な力である。"
    notes: "出典: 東京経済大学\n* willpower「意志の力」（問題文の語彙注釈）"

  - id: "ny-41-s2"
    section_id: "Ny_41"
    drill: 41
    number: 2
    role: "exercise"
    english: "Psychologists who believe that willpower is a limited resource say using up our willpower is the main reason that some of us fail to achieve our goals."
    japanese: "意志の力は有限の資質であると信じている心理学者は，意志の力を使い尽くすことが，私達の中で自分の目標を達成できない者がいることの主な理由であると言う。"
    notes: "出典: 東京経済大学"

