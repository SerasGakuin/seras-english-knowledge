    drill: 25
    number: 1
    role: "exercise"
    english: "The wolves' numbers had declined by the 1920s through hunting, which was not regulated by the government."
    japanese: "政府が狩猟を規制することがなかったため，オオカミの数は狩猟によって1920年代までに減少していた。"
    notes: "* rancher「牧場経営者」（問題文の語彙注釈）"
  - id: "ny-25-s2"
    section_id: "Ny_25"
    drill: 25
    number: 2
    role: "exercise"
    english: "Ranchers on large farms raising cattle, horses, and sheep did not like wolves because they killed their animals."
    japanese: "牛，馬，羊を飼っている大規模な農場の牧場経営者は，オオカミを好まなかった。なぜならオオカミは彼らの動物を殺してしまうからだ。"
    notes: ""

