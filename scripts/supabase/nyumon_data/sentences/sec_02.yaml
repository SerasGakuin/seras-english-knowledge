sentences:
  - id: "ny-02-s1"
    section_id: "Ny_02"
    drill: 2
    number: 1
    role: "exercise"
    english: "At the 2012 Summer Olympics, for example, more than 10,000 competitors from 204 nations and regions participated."
    japanese: "例えば，2012年の夏季オリンピックでは204の国や地域から1万人を超える選手が参加した。"
    notes: "出典: 東海大学"
  - id: "ny-02-s2"
    section_id: "Ny_02"
    drill: 2
    number: 2
    role: "exercise"
    english: "These games were attended by thousands of spectators and watched by millions of people on television."
    japanese: "このオリンピックを観戦した人はかなりの人数であり，テレビで観た人は相当な人数であった。"
    notes: "出典: 東海大学"
  - id: "ny-02-s3"
    section_id: "Ny_02"
    drill: 2
    number: 3
    role: "example"
    english: "A man from Japan visited me."
    japanese: "日本から来た男が私のところを訪れた"
    notes: "❸の例文。主語直後の〈前置詞+名詞〉が形容詞の働きをする例。"
  - id: "ny-02-s4"
    section_id: "Ny_02"
    drill: 2
    number: 4
    role: "example"
    english: "\"Episode VII\" will be released this summer."
    japanese: "『エピソード7』はこの夏に公開される"
    notes: "❹の例文。行為者不明の受動態の例。"
  - id: "ny-02-s5"
    section_id: "Ny_02"
    drill: 2
    number: 5
    role: "example"
    english: "My purse was stolen."
    japanese: "財布を盗まれた"
    notes: "❹の例文。行為者不明の受動態の例。"
  - id: "ny-02-s6"
    section_id: "Ny_02"
    drill: 2
    number: 6
    role: "example"
    english: "Most of the reservations were canceled."
    japanese: "予約の大半がキャンセルされた"
    notes: "❹の例文。行為者を示す必要がない受動態の例。"

