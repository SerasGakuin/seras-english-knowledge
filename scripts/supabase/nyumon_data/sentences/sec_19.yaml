sentences:
  - id: "ny-19-s1"
    section_id: "Ny_19"
    drill: 19
    number: 1
    role: "exercise"
    english: "As I stood in Shinjuku, I thought about Vancouver, where I was born and raised."
    japanese: "新宿に立っていたとき，生まれ育ったバンクーバーのことを考えた。"
    notes: ""
  - id: "ny-19-s2"
    section_id: "Ny_19"
    drill: 19
    number: 2
    role: "exercise"
    english: "To me it was a great city, but having experienced city life in New York and Tokyo, I have to admit how little I knew back in Vancouver."
    japanese: "私にとってはそれ（＝バンクーバー）は大都市だったが，ニューヨークや東京で都市生活を経験してきたので，故郷のバンクーバーにいたとき，自分がどれほど物事を知らなかったかを認めざるをえない。"
    notes: ""

