sentences:
  - id: "ny-71-s1"
    section_id: "Ny_71"
    drill: 71
    number: 1
    role: "exercise"
    english: "\"Oh, here's that delicious chicken dish we had in that little town in Louisiana.\""
    japanese: "「ああ，ここにあるのはルイジアナの小さな町で私達が食べたあの美味しい鶏肉料理よ。」"
    notes: ""
  - id: "ny-71-s2"
    section_id: "Ny_71"
    drill: 71
    number: 2
    role: "exercise"
    english: "\"Remember that?\" my sister says as we look through some of the pictures."
    japanese: "「そのことを覚えている？」と，妹はその写真の一部をざっと見ているときに言う。"
    notes: ""
  - id: "ny-71-s3"
    section_id: "Ny_71"
    drill: 71
    number: 3
    role: "exercise"
    english: "Not only do such pictures remind us of the common activities that make up our actual lives, but they also teach us to appreciate these everyday experiences."
    japanese: "そのような写真は私達に私達の実生活を構成するありふれた活動を思い出させるだけでなく，こうした日常の体験のよさをありがたく感謝するということも教えてくれるのだ。"
    notes: ""

