    english: "One group was told that they were going to get feedback, some of which was good and some of which was bad, and were asked which they wanted to hear first."
    japanese: "1つのグループには，意見（その一部はよいものであり，別の一部は悪いものである）を受け取ることになると伝えられ，そしてどちらを最初に聞きたいかを尋ねられた。"
    notes: "出典: 静岡県立大学"

