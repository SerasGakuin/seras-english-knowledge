sentences:
  - id: "ny-35-s1"
    section_id: "Ny_35"
    drill: 35
    number: 1
    role: "exercise"
    english: "Raising insects can be environmentally friendly as they neither take up much space, eat much food, nor release much greenhouse gas."
    japanese: "昆虫はあまり場所も取らないし，あまりエサも食べないし，またあまり温室効果ガスを出さないため，それらを育てることは環境にやさしい可能性がある。"
    notes: ""
  - id: "ny-35-s2"
    section_id: "Ny_35"
    drill: 35
    number: 2
    role: "exercise"
    english: "Most are able to survive with little water, making them an ideal alternative food for locations with severe water shortages."
    japanese: "大半の昆虫はほとんど水がなくても生きのびることができるので，厳しい水不足の場所では理想的な代替食になる。"
    notes: ""
  - id: "ny-35-s3"
    section_id: "Ny_35"
    drill: 35
    number: 3
    role: "exercise"
    english: "The evidence shows that there are many benefits of using insects as food."
    japanese: "そうした証拠が昆虫を食料として使うことの利点が多いことを示している。"
    notes: ""

