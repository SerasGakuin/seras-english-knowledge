sentences:
  - id: "ny-44-s1"
    section_id: "Ny_44"
    drill: 44
    number: 1
    role: "exercise"
    english: "We want to find out to what extent domestic cats are influenced by the language and dialect that humans use to speak to them, because it seems that cats use slightly different dialects in the sounds they produce."
    japanese: "家で飼っているネコは，人間が彼らに話しかけるために使う言語や方言によってどの程度影響されるのかを私達は知りたいと考えている。なぜなら，ネコは自らが生み出す音を使って，わずかに異なる方言を使っているように思われるからだ。"
    notes: "出典: 麗澤大学"

