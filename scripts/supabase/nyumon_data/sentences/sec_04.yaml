sentences:
  - id: "ny-04-s1"
    section_id: "Ny_04"
    drill: 4
    number: 1
    role: "exercise"
    english: "I think students should reduce their time in front of screens and should read books every day even for a short time."
    japanese: "学生は画面の前で過ごす時間を減らして，毎日ほんの少しの時間でも本を読むべきだと私は思う。"
    notes: ""
  - id: "ny-04-s2"
    section_id: "Ny_04"
    drill: 4
    number: 2
    role: "exercise"
    english: "Forming a reading habit in childhood is said to be associated with later reading proficiency."
    japanese: "子どもの頃に読書習慣をつけることは，大きくなったときの読む力と関連していると言われている。"
    notes: ""
  - id: "ny-04-s3"
    section_id: "Ny_04"
    drill: 4
    number: 3
    role: "example"
    english: "It is said that forming a reading habit in childhood is associated with later reading proficiency."
    japanese: "子どもの頃に読書習慣をつけることは，大きくなったときの読む力と関連していると言われている。"
    notes: "❹の書き換え例。〈S is said to V〉→〈It is said that S + V〉。"

