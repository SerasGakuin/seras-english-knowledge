sentences:
  - id: "ny-60-s1"
    section_id: "Ny_60"
    drill: 60
    number: 1
    role: "exercise"
    english: "If you were to walk on a bridge and see a boy in the water screaming for help, you would feel a much greater urge to leap in and pull him to safety than you would if you were part of a crowd."
    japanese: "もし仮に橋の上を歩いていて水の中にいる少年が助けを求めて叫んでいるのを見たら，群衆の一部である場合よりずっと強く，水の中に飛び込みその少年を安全な場所まで引き上げなければならないと思うでしょう。"
    notes: "出典: 神戸大学"

sentence_structures:
