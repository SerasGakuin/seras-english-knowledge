sentences:
  - id: "ny-G12-s1"
    section_id: "Ny_G12"
    drill: 0
    number: 1
    role: "example"
    english: "He can swim."
    japanese: "彼は泳げる。"
    notes: "基本講義Qの例文。助動詞 can「〜できる」。"
  - id: "ny-G12-s2"
    section_id: "Ny_G12"
    drill: 0
    number: 2
    role: "example"
    english: "It may rain."
    japanese: "雨が降るかもしれない。"
    notes: "基本講義Qの例文。助動詞 may「〜かもしれない」。"
  - id: "ny-G12-s3"
    section_id: "Ny_G12"
    drill: 0
    number: 3
    role: "example"
    english: "You must go to bed."
    japanese: "あなたは寝なければならない。"
    notes: "基本講義Qの例文。助動詞 must「〜しなければならない」。"
  - id: "ny-G12-s4"
    section_id: "Ny_G12"
    drill: 0
    number: 4
    role: "example"
    english: "It cannot be true."
    japanese: "それは本当のはずがない。"
    notes: "基本講義Qの例文。助動詞 cannot「〜のはずがない」。"
  - id: "ny-G12-s5"
    section_id: "Ny_G12"
    drill: 0
    number: 5
    role: "example"
    english: "You should stay home."
    japanese: "あなたは家にいるべきだ。"
    notes: "基本講義Qの例文。助動詞 should「〜すべきだ、〜したほうがよい」。"
  - id: "ny-G12-s6"
    section_id: "Ny_G12"
    drill: 0
    number: 6
    role: "example"
    english: "I will try again."
    japanese: "私はもう一度挑戦するつもりだ。"
    notes: "基本講義Qの例文。助動詞 will「〜するつもりだ」。未来を表す働きもある。"
  - id: "ny-G12-s7"
    section_id: "Ny_G12"
    drill: 0
    number: 7
    role: "example"
    english: "We had to wait for a while."
    japanese: "私達はしばらく待たなければならなかった。"
    notes: "基本講義Qの例文。助動詞 had to（have to の過去形）「〜する必要があった」。"
  - id: "ny-G12-s8"
    section_id: "Ny_G12"
    drill: 0
    number: 8
    role: "example"
    english: "The runner may have been injured."
    japanese: "そのランナーはけがをしていたのかもしれない。"
    notes: "基本講義Qの例文。〈may have + 過去分詞〉で過去のことを「〜だったかもしれない」と表す。"
  - id: "ny-G12-s9"
    section_id: "Ny_G12"
    drill: 0
    number: 9
    role: "example"
    english: "You ought to have finished it earlier."
    japanese: "あなたはそれをもっと早く終えておくべきだったのに。"
    notes: "基本講義Qの例文。〈ought to have + 過去分詞〉で「〜すべきだったのに」。ought to = should。"

