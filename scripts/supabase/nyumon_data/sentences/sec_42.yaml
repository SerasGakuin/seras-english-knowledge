sentences:
  - id: "ny-42-s1"
    section_id: "Ny_42"
    drill: 42
    number: 1
    role: "exercise"
    english: "Chopik says he isn't suggesting we ignore our families, but that friends make us feel better."
    japanese: "チョピックは，家族を無視すべきだと提案しているのではなく，友人のほうが気分をよくしてくれると言っている。"
    notes: "出典: 藤女子大学"

  - id: "ny-42-s2"
    section_id: "Ny_42"
    drill: 42
    number: 2
    role: "exercise"
    english: "With friends you are more likely to do activities — they provide an outlet."
    japanese: "友人と一緒にいる場合は，さまざまな活動をする可能性がより高い。つまり，友人は，はけ口を提供してくれるのだ。"
    notes: "出典: 藤女子大学"

  - id: "ny-42-s3"
    section_id: "Ny_42"
    drill: 42
    number: 3
    role: "exercise"
    english: "You can say things to friends and they are less judgmental."
    japanese: "友人には色々なことを言えるし，友人は家族ほどには批判的ではない。"
    notes: "出典: 藤女子大学"

