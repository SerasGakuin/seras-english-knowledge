sentences:
  - id: "ny-50-s1"
    section_id: "Ny_50"
    drill: 50
    number: 1
    role: "exercise"
    english: "We also lack a complete understanding of Mars's history."
    japanese: "私達はまた，火星の歴史を完全には理解していない。"
    notes: |
      出典: 九州大学
      * Mars「火星」（問題文の語彙注釈）

  - id: "ny-50-s2"
    section_id: "Ny_50"
    drill: 50
    number: 2
    role: "exercise"
    english: "We see signs of past water all over its surface and in its chemistry, and so think it was once much warmer than it currently is in order to support liquid water."
    japanese: "私達はその表面全体とその化学組成に，過去に水が存在した痕跡を見る。そしてそれゆえ，液体の水を維持するためにかつては現在よりはるかに暖かかったと私達は考えている。"
    notes: "出典: 九州大学"

