sentences:
  - id: "ny-07-s1"
    section_id: "Ny_07"
    drill: 7
    number: 1
    role: "exercise"
    english: "People may be concerned about the safety of aircraft flown by female pilots, but their concerns are not supported by data."
    japanese: "人々は女性パイロットが操縦する航空機の安全性について心配しているかもしれない。しかし，そうした心配はデータによって裏付けられているものではない。"
    notes: ""
  - id: "ny-07-s2"
    section_id: "Ny_07"
    drill: 7
    number: 2
    role: "exercise"
    english: "For example, a previous analysis of large pilot databases conducted in the United States showed no meaningful difference in accident rates between male and female pilots."
    japanese: "例えば，アメリカで行われた，パイロットに関わる巨大なデータベースを以前に分析したものは，事故率にかかわる男性パイロットと女性パイロットとの有意味な差を示さなかった。"
    notes: ""

