    drill: 8
    number: 1
    role: "exercise"
    english: "... his theory of relativity does not fit with what we know about gravity, namely with how things fall."
    japanese: "彼の相対性理論は，重力に関して私達が知っていること，すなわち，物の落下の仕方とは合わない。"
    notes: "出典: 信州大学。文頭の ... は原文が中途からの抜粋であることを示す。"
  - id: "ny-08-s2"
    section_id: "Ny_08"
    drill: 8
    number: 2
    role: "exercise"
    english: "He came to realize this when writing an article summarizing his theory ...."
    japanese: "彼は，彼の理論を要約する論文を書いているときにこのことに気がついた。"
    notes: "出典: 信州大学。末尾の .... は原文に後続があることを示す。"

