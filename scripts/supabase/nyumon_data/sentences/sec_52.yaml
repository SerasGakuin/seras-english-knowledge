sentences:
  - id: "ny-52-s1"
    section_id: "Ny_52"
    drill: 52
    number: 1
    role: "exercise"
    english: "For more than 50 years, the health of American astronauts has been a concern of NASA — the National Aeronautics and Space Administration."
    japanese: "50年よりも前から，アメリカの宇宙飛行士の健康はNASA(アメリカ航空宇宙局)の懸念であった。"
    notes: |
      出典: 東京経済大学
      * NASA（National Aeronautics and Space Administration）「アメリカ航空宇宙局」（問題文の語彙注釈）

  - id: "ny-52-s2"
    section_id: "Ny_52"
    drill: 52
    number: 2
    role: "exercise"
    english: "NASA does not let the risk of cancer for its astronauts rise more than three percent during their lifetime."
    japanese: "NASAは宇宙飛行士にとってのがんの危険性が，生涯にわたり一般より3パーセントを上回ることを許さない。"
    notes: "出典: 東京経済大学"

  - id: "ny-52-s3"
    section_id: "Ny_52"
    drill: 52
    number: 3
    role: "exercise"
    english: "But there is more to be worried about than a possible increased risk of cancer."
    japanese: "しかし，がんの危険性が増加する可能性を上回る懸念されることがあるのだ。"
    notes: "出典: 東京経済大学"

