    section_id: "Ny_65"
    drill: 65
    number: 1
    role: "exercise"
    english: "... Watson, IBM's artificial intelligence program, helped doctors rapidly discover a rare type of cancer that conventional tests had failed to detect ― possibly the first case in Japan that an AI-powered program contributed to saving a patient's life."
    japanese: "IBM社の人工知能プログラムであるワトソンは，従来の検査では見落とされていたまれな種類のがんを，医者がすぐに発見するのに役立った。これは，おそらく，人工知能を搭載したプログラムが患者の命を救うのに貢献した，日本における最初の事例であろう。"
    notes: "出典: 鳥取大学"

