    role: "exercise"
    english: "Vegetables like red peppers, broccoli or asparagus, considered quite ordinary in the West but not a part of the traditional Indian food culture, can now be found at subzimandis."
    japanese: "赤ピーマンやブロッコリーやアスパラガスのような野菜は，西洋ではごく普通だけれどもインドの伝統的な食文化の一部ではないと思われているが，今ではインドの野菜市場で見つけることができる。"
    notes: "出典: 首都大学東京。* subzimandi「インドの野菜市場」（問題文の語彙注釈）"

