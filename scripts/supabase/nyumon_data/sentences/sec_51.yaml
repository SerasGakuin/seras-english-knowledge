    drill: 51
    number: 1
    role: "exercise"
    english: "Research has shown that students who read daily for pleasure perform better on tests than those who do not."
    japanese: "研究によると，毎日楽しみのために読書している学生はそうでない学生より試験の成績がよいということだ。"
    notes: ""

  - id: "ny-51-s2"
    section_id: "Ny_51"
    drill: 51
    number: 2
    role: "exercise"
    english: "Researchers have also found that reading for fun, even a little every day, is actually more beneficial than just spending many hours reading for studying and gathering information."
    japanese: "また毎日ほんの少しでも楽しみのために読書することは，勉強や情報収集のためにただ何時間も何かを読むより実際有益であることも研究者は発見した。"
    notes: ""

