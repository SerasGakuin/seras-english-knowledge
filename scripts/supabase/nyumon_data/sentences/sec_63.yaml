    english: "It is precisely because society considers young people old enough to perform other more critical roles as citizens that the drinking issue has arisen."
    japanese: "飲酒の問題が生じたのは，若者が市民としての他のもっと重要な役割を果たすくらいの年齢に達していると社会が考えているからにほかならない。"
    notes: "出典: 慶應義塾大学"

