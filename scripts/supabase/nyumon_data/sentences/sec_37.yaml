    english: "In March, the AI-based computer program AlphaGo, developed by DeepMind, shocked the world when it defeated South Korean go grandmaster Lee Sedol in a five-game match of the ancient board game that requires deep insight."
    japanese: "3月，ディープマインド社によって開発された人工知能を基にしたコンピュータプログラムであるアルファ碁は，深い洞察力を必要とするその古くからのボードゲームの五番勝負で韓国の碁の名人であるイ・セドルを打ち破り世界に衝撃を与えた。"
    notes: "出典: 鳥取大学。* AlphaGo「アルファ碁：囲碁の人工知能ソフト」（問題文の語彙注釈）"

