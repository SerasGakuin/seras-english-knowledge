    drill: 67
    number: 1
    role: "exercise"
    english: "Researchers have found that despite spending the vast majority of our waking hours in effortful thought, over 40 percent of our creative ideas appear during breaks."
    japanese: "研究者達は，私達は起きている時間の大半を努力して考えることに費やしているにもかかわらず，私達の創造的な考えの40％以上は休憩中に思いつくものなのだということを発見した。"
    notes: "出典: 埼玉大学"

