sentences:
  - id: "ny-43-s1"
    section_id: "Ny_43"
    drill: 43
    number: 1
    role: "exercise"
    english: "Every new technology raises fears that some jobs will be lost and hopes that new jobs will be created."
    japanese: "新たな技術はどれも，職業の中には失われるものがあるという恐怖をかき立て，新たな仕事が創られるだろうという希望を抱かせる。"
    notes: "出典: 慶應義塾大学"

  - id: "ny-43-s2"
    section_id: "Ny_43"
    drill: 43
    number: 2
    role: "exercise"
    english: "After the Industrial Revolution, for example, workers were afraid that they would be replaced by machines."
    japanese: "例えば，産業革命の後，労働者は機械に取って代わられるのではないかと恐れていた。"
    notes: "出典: 慶應義塾大学"

