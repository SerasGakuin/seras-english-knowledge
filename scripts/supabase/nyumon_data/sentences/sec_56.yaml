    drill: 56
    number: 2
    role: "exercise"
    english: "But observing the natural world is neither as simple nor as solitary an activity as it might sound."
    japanese: "しかし，自然の世界を観察することは，その響きほど単純でも，また，孤独な活動でもない。"
    notes: "出典: 三重大学"

