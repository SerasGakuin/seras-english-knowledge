    english: "With more and more disposable, packaged goods, the average household's volume of garbage skyrocketed."
    japanese: "使い捨ての包装された商品が増えると共に，平均的な世帯のゴミの量が劇的に増えた。"
    notes: "出典: 津田塾大学。* skyrocket「急増する」（問題文の語彙注釈）"
