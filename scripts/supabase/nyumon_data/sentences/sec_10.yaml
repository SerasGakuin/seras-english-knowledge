sentences:
  - id: "ny-10-s1"
    section_id: "Ny_10"
    drill: 10
    number: 1
    role: "exercise"
    english: "The history of the development of numbers is still not fully understood, but recent work by researchers into clay tokens found all over the Middle East has given us a better picture."
    japanese: "数の発達の歴史はいまだに十分には理解されていない。しかし，中東全域で発見された粘土の塊を研究する研究者による最近の調査によってよりはっきりとイメージがつかめるようになった。"
    notes: "出典: 名城大学。* clay token「粘土の塊」（問題文の語彙注釈）"
  - id: "ny-10-s2"
    section_id: "Ny_10"
    drill: 10
    number: 2
    role: "exercise"
    english: "Thanks to this research, it now seems probable that mathematics was invented before writing itself."
    japanese: "この研究のおかげで，数学はおそらく文字そのものより前に発明されたらしいということが今わかっている。"
    notes: "出典: 名城大学"

