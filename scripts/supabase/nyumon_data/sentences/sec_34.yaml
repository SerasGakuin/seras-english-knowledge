sentences:
  - id: "ny-34-s1"
    section_id: "Ny_34"
    drill: 34
    number: 1
    role: "exercise"
    english: "Doctors often had difficulty diagnosing illnesses or finding problems inside the body."
    japanese: "医師達は病気を診断したり，体内の問題を見つけたりするのに苦労することが多かった。"
    notes: ""
  - id: "ny-34-s2"
    section_id: "Ny_34"
    drill: 34
    number: 2
    role: "exercise"
    english: "X-rays allowed them to look into their patients, identify where there were problems, and cure them."
    japanese: "X線のおかげで彼らは患者の体内を調べ，問題箇所がどこにあるのかを特定して，治療することができるようになった。"
    notes: ""
  - id: "ny-34-s3"
    section_id: "Ny_34"
    drill: 34
    number: 3
    role: "exercise"
    english: "This use of X-rays brought new understandings and methods for diagnosis and treatment."
    japanese: "X線のこうした使い方によって，診断と治療に，新たな理解と手法が生まれた。"
    notes: ""

