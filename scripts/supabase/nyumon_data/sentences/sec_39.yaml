sentences:
  - id: "ny-39-s1"
    section_id: "Ny_39"
    drill: 39
    number: 1
    role: "exercise"
    english: "While robots have been utilized in several industries for decades, including the manufacturing sector, experts now predict that a turning point in robotic automation is approaching rapidly ― and that much of the developed world simply isn't prepared for such a radical transition."
    japanese: "ロボットは何十年にもわたり，製造業部門を含むいくつかの産業で使われてきたのだが，専門家は，ロボットによる自動化の転換期が急速に近づいてきており，世界の先進国の多くはそのような抜本的な変遷に対して用意ができていないと予測する。"
    notes: "出典: 岩手大学"

