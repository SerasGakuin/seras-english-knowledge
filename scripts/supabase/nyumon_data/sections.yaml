sections:
  # === 基本講義（13セクション） ===
  - id: "Ny_G01"
    book: "入門英文問題精講"
    title: "名詞"
    pages: "p.10"
    type: "grammar_lecture"
    notes: "講義動画: 第1回"
  - id: "Ny_G02"
    book: "入門英文問題精講"
    title: "動詞"
    pages: "p.10-12"
    type: "grammar_lecture"
    notes: "講義動画: 第2回"
  - id: "Ny_G03"
    book: "入門英文問題精講"
    title: "形容詞"
    pages: "p.12-13"
    type: "grammar_lecture"
    notes: "講義動画: 第3回"
  - id: "Ny_G04"
    book: "入門英文問題精講"
    title: "副詞"
    pages: "p.13-14"
    type: "grammar_lecture"
    notes: "講義動画: 第4回"
  - id: "Ny_G05"
    book: "入門英文問題精講"
    title: "主語"
    pages: "p.14-15"
    type: "grammar_lecture"
    notes: "講義動画: 第5回"
  - id: "Ny_G06"
    book: "入門英文問題精講"
    title: "動詞と文型"
    pages: "p.15-17"
    type: "grammar_lecture"
    notes: "講義動画: 第6回"
  - id: "Ny_G07"
    book: "入門英文問題精講"
    title: "目的語"
    pages: "p.17-18"
    type: "grammar_lecture"
    notes: "講義動画: 第7回"
  - id: "Ny_G08"
    book: "入門英文問題精講"
    title: "補語"
    pages: "p.18-19"
    type: "grammar_lecture"
    notes: "講義動画: 第8回"
  - id: "Ny_G09"
    book: "入門英文問題精講"
    title: "前置詞＋名詞"
    pages: "p.19-20"
    type: "grammar_lecture"
    notes: "講義動画: 第9回"
  - id: "Ny_G10"
    book: "入門英文問題精講"
    title: "句と節"
    pages: "p.20-21"
    type: "grammar_lecture"
    notes: "講義動画: 第10回。本編では「完成した文」「欠けのある文」など、節を「文」と表現することがある旨の注意あり。"
  - id: "Ny_G11"
    book: "入門英文問題精講"
    title: "句と節の働き"
    pages: "p.21-22"
    type: "grammar_lecture"
    notes: "講義動画: 第11回。関代（関係代名詞）の略称を導入。"
  - id: "Ny_G12"
    book: "入門英文問題精講"
    title: "助動詞"
    pages: "p.22-23"
    type: "grammar_lecture"
    notes: "講義動画: 第12回"
  - id: "Ny_G13"
    book: "入門英文問題精講"
    title: "to不定詞"
    pages: "p.23-25"
    type: "grammar_lecture"
    notes: |
      講義動画: 第13回。Section 14「英文の要素のまとめ」(p.24-25) を含む。
      Section 14 は復習セクション（15英文中6つが新出、9つが既出）で、新概念の導入なし。
      新出英文は既存ノードの実践例であるため独立ノード化せず。

  # === 第1章 主語と動詞の把握（11セクション） ===
  - id: "Ny_01"
    book: "入門英文問題精講"
    title: "主語の把握（前置詞＋名詞）"
    pages: "p.28-29"
    type: "exercise"
    notes: |
      読むヒント: 主語はどこにある？
      一言: disposable は dispose「処分する」+ -able「できる」からできた単語。直訳は「処分可能な」だが、しばしば「使い捨ての」の意味で使う。a disposable razor は「使い捨ての剃刀の刃」。
  - id: "Ny_02"
    book: "入門英文問題精講"
    title: "動詞の把握（受動態）"
    pages: "p.30-31"
    type: "exercise"
    notes: |
      読むヒント: 第2文はなぜ受動態になっているの？
      一言: and がつなぐものを探す作業は非常に大切です。これは決して忘れないでくださいね。
  - id: "Ny_03"
    book: "入門英文問題精講"
    title: "動詞の把握（受動態＋不定詞）①"
    pages: "p.32-33"
    type: "exercise"
    notes: |
      読むヒント: were found の後ろの to have はどこにつながる？
      一言: supportive の意味は「支えてくれる」ぐらいで十分。a supportive friend で「支えになる友人」。このあとに問題42の英文が続く。
  - id: "Ny_04"
    book: "入門英文問題精講"
    title: "動詞の把握（受動態＋不定詞）②"
    pages: "p.34-35"
    type: "exercise"
    notes: |
      読むヒント: is said の後ろの to be associated はどこにつながる？
      一言: 高校生になってから，こんな文章を読まされても困りますよ。こういうことは，小学生のときに言ってほしいですね。
  - id: "Ny_05"
    book: "入門英文問題精講"
    title: "動詞の把握（SVOCのCが〈V-ing〉）"
    pages: "p.36-37"
    type: "exercise"
    notes: |
      読むヒント: was caught helping の，catch と help の作る文型は？
      一言: ジョナサン・ウォーカーは The Man with the Branded Hand（烙印の手を持つ男）で知られる，奴隷解放に人生を捧げた人物。奴隷を盗んだとしてアメリカ政府から手に SS（Slave Stealer）の烙印を押された。アメリカの奴隷制は17世紀初頭から南北戦争を経て，1863年にリンカーン大統領による「奴隷解放宣言」Emancipation Proclamation まで続いた。
  - id: "Ny_06"
    book: "入門英文問題精講"
    title: "動詞の把握（分詞との区別）①"
    pages: "p.38-39"
    type: "exercise"
    notes: |
      読むヒント: この like の働きは？
      一言: インドの野菜市場では，インドの地の野菜が所狭しと並んでいる。そこでは西洋ではよく見られる赤ピーマン，ブロッコリーなどは珍しい。一昔前の日本でも同じような状況だった。
  - id: "Ny_07"
    book: "入門英文問題精講"
    title: "動詞の把握（分詞との区別）②"
    pages: "p.40-41"
    type: "exercise"
    notes: |
      読むヒント: conducted と showed はどちらが動詞？
      一言: 「女性のほうがコミュニケーション力が高い」「男性のほうが論理的だ」などの通説は，多くの場合，先入観によって作り出されたもの。男女差というより個体差のほうが大きい。
  - id: "Ny_08"
    book: "入門英文問題精講"
    title: "主語と動詞の省略"
    pages: "p.42-43"
    type: "exercise"
    notes: |
      読むヒント: when の後ろに足りないものは？
      一言: 相対性理論で述べていることは「光の速さで移動する物体は縮む」などの現象。「重力に関して私達が知っていることと合わない」というのは，この理論が誤りだということではない。
  - id: "Ny_09"
    book: "入門英文問題精講"
    title: "主語の把握（文頭の長い副詞句）"
    pages: "p.44-45"
    type: "exercise"
    notes: |
      読むヒント: どこに主語がある？
      一言: Oxford University は英語圏で最古の歴史（およそ900年）を誇り，ケンブリッジ大学と共にイギリスを代表する大学。50名以上のノーベル賞受賞者を輩出。Oxford English Dictionary は総収録語数600,000語超の大辞典でギネスに認定されている。
  - id: "Ny_10"
    book: "入門英文問題精講"
    title: "主語の把握（長い主語）"
    pages: "p.46-47"
    type: "exercise"
    notes: |
      読むヒント: 文の主語はどこまで？
      一言: 「数学のほうが文字より早い段階で発明された」とは，文字はないが数字はあったということ。人間は損得・金銭勘定をまず発達させた。
  - id: "Ny_11"
    book: "入門英文問題精講"
    title: "主語の把握（否定語）"
    pages: "p.48-49"
    type: "exercise"
    notes: |
      一言: 「オペラが素晴らしい」という感覚は日本人にはなかなか難しいが，劇場へ足を運べばその素晴らしさが実感できるだろう。

  # === 第2章 準動詞（8セクション） ===
  - id: "Ny_12"
    book: "入門英文問題精講"
    title: "〜ingの働き（動名詞）①"
    pages: "p.50-51"
    type: "exercise"
    notes: |
      一言: 「若者にとって大学へ行きよい成績を収めることが将来のキャリアに重要だ」というのは当たり前だが，「よい成績を収める」のは実現が難しい。
  - id: "Ny_13"
    book: "入門英文問題精講"
    title: "〜ingの働き（動名詞）②"
    pages: "p.52-53"
    type: "exercise"
    notes: |
      一言: 大学に入ったらぜひ単位と無関係の授業を聴講してみてほしい。楽しいですよ。
  - id: "Ny_14"
    book: "入門英文問題精講"
    title: "〜ingの働き（動名詞か現在分詞か）①"
    pages: "p.54-55"
    type: "exercise"
    notes: |
      一言: 熱帯雨林で生き抜くには技術の改良・革新と高度な狩猟技術を要する。彼らはどのように利用し生きていたのか。
  - id: "Ny_15"
    book: "入門英文問題精講"
    title: "〜ingの働き（動名詞か現在分詞か）②"
    pages: "p.56-57"
    type: "exercise"
    notes: |
      一言: just last year の just は「ちょうど」の意味だが、適切な日本語訳がない。just the other day「つい最近」、just a year ago「ほんの1年前」とは異なり「つい昨年」「ほんの昨年」は日本語として落ち着きが悪い。
  - id: "Ny_16"
    book: "入門英文問題精講"
    title: "〜ingの働き（分詞構文）①"
    pages: "p.58-59"
    type: "exercise"
    notes: |
      一言: 英単語の訳語が1つに決まることはまずない。例えば disorder は「秩序がない状態」で、mental disorders は「精神障害」、functional disorders は「機能障害」、digestive disorders は「消化不良」。「1つの単語の訳語は1つでよい」というのは長い目で見てよいことは言えない。
  - id: "Ny_17"
    book: "入門英文問題精講"
    title: "〜ingの働き（分詞構文）②"
    pages: "p.60-61"
    type: "exercise"
    notes: |
      一言: 後置修飾について。日本語では形容詞は名詞の前に置くが、英語では長い修飾語は名詞の後ろに置かれる（後置修飾）。この後置修飾を理解することが英語学習では非常に重要。
  - id: "Ny_18"
    book: "入門英文問題精講"
    title: "〜ingの働き（付帯状況）"
    pages: "p.62-63"
    type: "exercise"
    notes: ""
  - id: "Ny_19"
    book: "入門英文問題精講"
    title: "〜ingの働き（完了分詞構文）"
    pages: "p.64-65"
    type: "exercise"
    notes: |
      一言: バンクーバーはカナダ連邦にある人口約60万の都市。ニューヨーク（人口860万）や東京23区（人口950万）よりはるかに小さいが「本当に美しい」都市。

  # === 第3章 関係詞（12セクション） ===
  - id: "Ny_20"
    book: "入門英文問題精講"
    title: "関係代名詞"
    pages: "p.66-67"
    type: "exercise"
    notes: |
      読むヒント: the stereotype that の that の後ろは？
      一言: 日本語では「私は彼に会った男」とは普通言わないが、英語では the man whom I met「男＋彼に私は会った」という形が成立する。
  - id: "Ny_21"
    book: "入門英文問題精講"
    title: "前置詞＋関係代名詞①"
    pages: "p.68-69"
    type: "exercise"
    notes: |
      一言: ジェームズ・ワットの蒸気機関は当初の目的（鉱山の排水ポンプ改良）が別の目的（機関車・船舶・工業機械の動力源）に応用された例。正確には蒸気機関はニューコメンらが発明し、ワットは改良を行った。
  - id: "Ny_22"
    book: "入門英文問題精講"
    title: "前置詞＋関係代名詞②"
    pages: "p.70-71"
    type: "exercise"
    notes: |
      一言: エジソンの蓄音機は録音した音を再生できる最初のもの。音声でも動画でも携帯端末に保管し再生できる現代だが、礎を築いたエジソンはすごい。
  - id: "Ny_23"
    book: "入門英文問題精講"
    title: "関係代名詞(those who)"
    pages: "p.72-73"
    type: "exercise"
    notes: |
      一言: 「過ぎたるはなお及ばざるがごとし」。何ごとも適量が一番。「身体によいから飲む・飲まない」ではなく「ほっと一息つくために」飲むほうが健全。
  - id: "Ny_24"
    book: "入門英文問題精講"
    title: "関係代名詞の非制限用法①"
    pages: "p.74-75"
    type: "exercise"
    notes: |
      一言: この話は「悪い知らせとよい知らせのどちらを先に聞きたいか」という問いに対して，多くの人は悪いほうを先に，よいほうをあとに聞くと答えるそうですが，人に反省を促すなら「最後に悪いこと」を言うべきだという話。
  - id: "Ny_25"
    book: "入門英文問題精講"
    title: "関係代名詞の非制限用法②"
    pages: "p.76-77"
    type: "exercise"
    notes: |
      一言: 関係代名詞の非制限用法と同じく，「直前の名詞を補足的に説明する働き」を持つものに分詞構文がある。伝統的な分類では分詞構文は副詞の働きだが，形容詞の働きをしているととらえられることもある。
  - id: "Ny_26"
    book: "入門英文問題精講"
    title: "関係代名詞の非制限用法③"
    pages: "p.78-79"
    type: "exercise"
    notes: |
      一言: この文のあとに続く文では「幸運にも，そういう対立が起きるとしても，友情を維持する方法を見つけることは可能だ」とある。「友情」とはお互いへの気遣いから成り立つ。
  - id: "Ny_27"
    book: "入門英文問題精講"
    title: "関係副詞(when)"
    pages: "p.80-81"
    type: "exercise"
    notes: |
      読むヒント: just when以降の主語はどこ？
      一言: 中略した部分には「獲得して間もない知恵や分別はあまりに早く失われる」とある。大人として認められるくらいに賢明になったからといって、すぐに若者にお酒を飲ませるのはよくないという飲酒年齢引き下げ反対論の一部。
  - id: "Ny_28"
    book: "入門英文問題精講"
    title: "関係副詞の非制限用法"
    pages: "p.82-83"
    type: "exercise"
    notes: |
      読むヒント: where以下は何を説明しているのか？
      一言: I visited a town, where ... は「ある町を訪れた。そこでは」（筆者は特定の町を想定）。I visited a town where ... は「…な町を訪れた」（色々ある町のうちの1つ）。両者を機械的に区別するのは難しい。
  - id: "Ny_29"
    book: "入門英文問題精講"
    title: "主語になるwhat"
    pages: "p.84-85"
    type: "exercise"
    notes: |
      読むヒント: that 以降の主語はどこ？
      一言: "We Are the World" の題名は S=複数形(We) で C=単数形(The world)。S＝Cと習うため数が一致すべきと思う人が多いが、実際には必ずしも一致しない。
  - id: "Ny_30"
    book: "入門英文問題精講"
    title: "補語になるwhat"
    pages: "p.86-87"
    type: "exercise"
    notes: |
      読むヒント: 文中の what はどんな働きをする？
      一言: Sapiens とは世界的なベストセラーの『サピエンス全史』のこと。大学生になったらぜひ読んでみてほしい。
  - id: "Ny_31"
    book: "入門英文問題精講"
    title: "目的語になるwhat"
    pages: "p.88-89"
    type: "exercise"
    notes: |
      読むヒント: interpret の目的語はどこ？
      一言: いくら外国へ行って色々なものを見ても、表面的なものだけでは得ることが少ない。目に映るものの本質を見る力を養う必要がある。

  # === 第4章 接続詞（17セクション） ===
  - id: "Ny_32"
    book: "入門英文問題精講"
    title: "等位接続詞and①"
    pages: "p.90-91"
    type: "exercise"
    notes: |
      読むヒント: 2つ目の and は何と何をつないでいる？
      一言: 英語は二項対立を多用する。we と言った場合には背後に they が隠れている。英文中で we を見たら「何が they にあたるのだろうか？」と考える癖をつけよう。
  - id: "Ny_33"
    book: "入門英文問題精講"
    title: "等位接続詞and②"
    pages: "p.92-93"
    type: "exercise"
    notes: |
      読むヒント: 3つの and の前後はそれぞれどうなっている？
      一言: 「食料，たきぎ，水の不足といった基本的な問題」の「たきぎ」は，ガスや電気が存在しない貧しい地域のこと。これはケニヤの環境保護活動家ワンガリ・マータイ氏についての英文。
  - id: "Ny_34"
    book: "入門英文問題精講"
    title: "等位接続詞and③"
    pages: "p.94-95"
    type: "exercise"
    notes: |
      読むヒント: and がつなぐのは2者とは限らない
      一言: and がつなぐものは本当に面倒で丁寧に追いかけないと間違える。入試の下線部訳で and のつなぐものを間違えると大幅な減点になる。
  - id: "Ny_35"
    book: "入門英文問題精講"
    title: "相関語句"
    pages: "p.96-97"
    type: "exercise"
    notes: |
      読むヒント: neither は何とセットになっている？
      一言: この文の続きに「ただし，昆虫を食べることに関する人々の意識を変えるには時間がかかるかもしれない」とある。納得。
  - id: "Ny_36"
    book: "入門英文問題精講"
    title: "may…but"
    pages: "p.98-99"
    type: "exercise"
    notes: |
      読むヒント: may を見たら何かを探そう
      一言: 意識的に解決できないことに出会ったら一旦意識的な努力をやめなさいという話。問題62の英文はこの続き。
      参考書内参照: →問62
  - id: "Ny_37"
    book: "入門英文問題精講"
    title: "従属接続詞when"
    pages: "p.100-101"
    type: "exercise"
    notes: |
      読むヒント: 何がショックだったの？
      一言: 将棋でもAIの予想は裏切られた。今後AIが人間を超越するかもしれない。AIに負けない何かを身につけることが大切。
  - id: "Ny_38"
    book: "入門英文問題精講"
    title: "従属接続詞although"
    pages: "p.102-103"
    type: "exercise"
    notes: |
      読むヒント: although節と主節の関係は？
      一言: the がついた名詞に関係代名詞節や分詞がなければ「暗黙の了解でわかる」の the。本文では後ろに関代節がある。
  - id: "Ny_39"
    book: "入門英文問題精講"
    title: "従属接続詞while"
    pages: "p.104-105"
    type: "exercise"
    notes: |
      読むヒント: whileの原義は「S'V'の間にSV」だが……
      一言: AI の発展によりロボットの守備範囲は一気に広がった。「ロボット自動化の転換期」とはAIが人間の仕事の大半に取って代わることを示唆する。
  - id: "Ny_40"
    book: "入門英文問題精講"
    title: "従属接続詞whether"
    pages: "p.106-107"
    type: "exercise"
    notes: |
      読むヒント: thatやwhetherの前にある語は何？
      一言: 良い知らせと悪い知らせの順序で行動を改めるかが決まるという話。問題24も同じ文章からの抜粋。
      参考書内参照: →問24
  - id: "Ny_41"
    book: "入門英文問題精講"
    title: "that節"
    pages: "p.108-109"
    type: "exercise"
    notes: |
      読むヒント: that は全部で3つある。それぞれの that の後ろは完全な文？
      一言: 竹岡の「意志の力」エピソード — 「もうアカン」と思っても「なにくそ，負けるものか」と頑張ること
      that節の4つの働き表（目的語/補語/主語/同格）を掲載
      that判別法: that節中が完全な文かどうか → 不完全=関係代名詞 / 完全=接続詞or関係副詞
  - id: "Ny_42"
    book: "入門英文問題精講"
    title: "thatの省略"
    pages: "p.110-111"
    type: "exercise"
    notes: |
      読むヒント: but の後ろに that があるということは……
      一言: 家族と友人の関係 — 「家族だから」という理由で他人には言わないことを言ってしまう
      not A but B 構造の樹形図を掲載（says の目的語分岐）
      suggest の2義（示唆/提案）と that節内の should+原形不定詞ルール
  - id: "Ny_43"
    book: "入門英文問題精講"
    title: "従属接続詞that(同格)"
    pages: "p.112-113"
    type: "exercise"
    notes: |
      読むヒント: that の後ろは完全な文？ 不完全な文？
      一言: fears that S+V は同格の説明だけでなく、動詞 fear の名詞構文とも見なせる
      同格のthatを取る名詞の一覧（fact/truth/rumor/news/claim/idea/thought/belief/demand/feeling/anxiety）を掲載
      be afraid that / be sure that: 本来の of が脱落するパターン
  - id: "Ny_44"
    book: "入門英文問題精講"
    title: "節＋節①"
    pages: "p.114-115"
    type: "exercise"
    notes: |
      読むヒント: to what 以下はどのようになっている？
      一言: 言語と方言の区分は実は非常に困難。方言の定義を「方言間で相互に意思疎通ができるもの」とすると、相互理解可能なノルウェー語・スウェーデン語・デンマーク語が方言になる。青森と沖縄の方言で意思疎通不可能なら、それぞれが言語扱いに。
  - id: "Ny_45"
    book: "入門英文問題精講"
    title: "節＋節②"
    pages: "p.116-117"
    type: "exercise"
    notes: |
      読むヒント: 第1文の主節はどこ？
      一言: 小説を読んで登場人物の経験を追体験することで、実社会でも人の気持ちを察することができるという話。
  - id: "Ny_46"
    book: "入門英文問題精講"
    title: "節＋節③"
    pages: "p.118-119"
    type: "exercise"
    notes: |
      読むヒント: もう1つのthatはどこにある？
      一言: 今後50年でロボットが人間の仕事をすると思いながら、多くの人が「自分の仕事はなくならない」と信じている。人間は「自分だけは例外」と思いたい楽観的な生き物。
  - id: "Ny_47"
    book: "入門英文問題精講"
    title: "節＋節④"
    pages: "p.120-121"
    type: "exercise"
    notes: |
      読むヒント: 節を作るのはどれとどれ？
      一言: 先行詞と関係代名詞［関係副詞］節が離れている場合がある。読んでいけば自然とわかる。「対話をしながら読め」は蓋し名言。
  - id: "Ny_48"
    book: "入門英文問題精講"
    title: "節＋節⑤"
    pages: "p.122-123"
    type: "exercise"
    notes: |
      読むヒント: thinkは目的語を必要とするから……
      一言: 知覧飛行場の近くのお寺に「人は正しいと思えばどんな残酷なこともやる」という言葉。教育とは「正しい」をできるだけ「正しい」に近づけていくこと。

  # === 第5章 比較（8セクション） ===
  - id: "Ny_49"
    book: "入門英文問題精講"
    title: "比較対象の把握①"
    pages: "p.124-125"
    type: "exercise"
    notes: |
      読むヒント: 比較対象は文法的・意味的に同じもの
      一言: 日本の飲酒年齢について、客観的で信頼性の高い資料や証拠を持って主張する練習を。声の大きさや口調の激しさでは人は説得できない。
  - id: "Ny_50"
    book: "入門英文問題精講"
    title: "比較対象の把握②"
    pages: "p.126-127"
    type: "exercise"
    notes: |
      読むヒント: 比較対象は文法的・意味的に同じもの
  - id: "Ny_51"
    book: "入門英文問題精講"
    title: "比較対象の把握③"
    pages: "p.128-129"
    type: "exercise"
    notes: |
      読むヒント: thanは接続詞で本来はS+Vが続く
      一言: 論語の中に「知之者不如好之者，好之者不如楽之者」（これを知る者はこれを好む者にしかず，これを好む者はこれを楽しむ者にしかず）とあり，知識を持っている者より好きな者が勝り，好きな者より楽しむ者が勝るという意味。
  - id: "Ny_52"
    book: "入門英文問題精講"
    title: "比較対象の把握④"
    pages: "p.130-131"
    type: "exercise"
    notes: |
      読むヒント: 第3文のthere is moreの後ろには……
      一言: 宇宙飛行士が受ける可能性のある苦難は想像できない。「未知への挑戦のために命がけでやっている」ということ。
  - id: "Ny_53"
    book: "入門英文問題精講"
    title: "the＋比較級，the＋比較級"
    pages: "p.132-133"
    type: "exercise"
    notes: |
      読むヒント: The longerとくれば後ろには……
      一言: 同じ茶葉でも酸素に触れさせる時間で味や香りが変わり，緑茶・ウーロン茶・紅茶などと名前が変わる。
  - id: "Ny_54"
    book: "入門英文問題精講"
    title: "as〜as①"
    pages: "p.134-135"
    type: "exercise"
    notes: |
      読むヒント: their parents didは具体的にどんなこと？
      一言: アメリカンドリームはベトナム戦争の敗戦で終わったと言われるが、Amazonのジェフ・ベゾス氏のように自宅ガレージから起業して総資産14兆円の成功者もいる。
  - id: "Ny_55"
    book: "入門英文問題精講"
    title: "as〜as②"
    pages: "p.136-137"
    type: "exercise"
    notes: |
      読むヒント: 何と何が同じなのか？
      一言: ヨーロッパでは「痩せすぎたモデルは雇わない」風潮が出てきている。
  - id: "Ny_56"
    book: "入門英文問題精講"
    title: "as〜as③"
    pages: "p.138-139"
    type: "exercise"
    notes: |
      読むヒント: 最後のasは接続詞
      一言: 自然の観察は望遠鏡1つで誰でもできそうに思えるが、学問としての観察は単純ではなく、また1人でやるものでもない。現代では全世界の科学者が観察し検証し合う。「孤独な科学者」は昔のイメージ。

  # === 第6章 その他の重要項目（16セクション） ===
  - id: "Ny_57"
    book: "入門英文問題精講"
    title: "仮定法①"
    pages: "p.140-141"
    type: "exercise"
    notes: |
      読むヒント: どんなときに懸命に考えるのだろう？
      一言: 受験や就職など人生の岐路では必死で考えるが、「分かれ道だ」と意識していないときの決断がその先大いに影響することもある。それが実感としてわかっていれば、あらゆる選択の際にもっと考え真剣になるにちがいない。
  - id: "Ny_58"
    book: "入門英文問題精講"
    title: "仮定法②"
    pages: "p.142-143"
    type: "exercise"
    notes: |
      読むヒント: なぜwouldなんだろう？
  - id: "Ny_59"
    book: "入門英文問題精講"
    title: "仮定法③"
    pages: "p.144-145"
    type: "exercise"
    notes: |
      読むヒント: こんな質問されるだろうか？
      一言: 「仮定法」は主観の問題で，「事実」は客観です。両者は水と油ぐらい違います。「仮定法は事実の逆」なんていう間違ったイメージが一刻も早く日本から消え去ることを祈っています。
  - id: "Ny_60"
    book: "入門英文問題精講"
    title: "仮定法④"
    pages: "p.146-147"
    type: "exercise"
    notes: |
      読むヒント: あなたの身に起きるだろうか？
      一言: 「比較」はとにかく「何と何をどのような基準で比較しているか」を考えることが大切です。いつもいつもそのように考えてください。
  - id: "Ny_61"
    book: "入門英文問題精講"
    title: "強調構文①"
    pages: "p.148-149"
    type: "exercise"
    notes: |
      読むヒント: itとその後ろのthatで……
      一言: 「貧しき者を助ける」というのは当たり前だと思うが，「実際にどんなことをしているか」と問われると言葉の持つ意味に気づかされる。中世の頃には奴隷制度があるような時代では，そのような発想の人々は教会を除くと少なかっただろう。
  - id: "Ny_62"
    book: "入門英文問題精講"
    title: "強調構文②"
    pages: "p.150-151"
    type: "exercise"
    notes: |
      読むヒント: 問題36に続く文です。
      一言: 何かを「意識的にする」というのは精神にとっては不自然な状況。煮詰まったときはぼーっとするのが最善。
      参考書内参照: →問36
  - id: "Ny_63"
    book: "入門英文問題精講"
    title: "強調構文③"
    pages: "p.152-153"
    type: "exercise"
    notes: |
      読むヒント: 後半のthatはどこにつながる？
      一言: アメリカの飲酒年齢引き下げに賛成する人の文。「兵役を果たす」「車の運転をしてもよい」「銃を持ってもよい」年齢なのに「なぜ飲酒はいけないのか」ということを筆者は問題にしている。
  - id: "Ny_64"
    book: "入門英文問題精講"
    title: "説明要素の後置①"
    pages: "p.154-155"
    type: "exercise"
    notes: |
      読むヒント: "Create Your Taste" kioskって何？
      一言: 英文を読んでいて「わからない所」が出てきた場合には「そのうちわかるよ」と楽に構えておこう。これは本当に大事なこと。
  - id: "Ny_65"
    book: "入門英文問題精講"
    title: "説明要素の後置②"
    pages: "p.156-157"
    type: "exercise"
    notes: |
      読むヒント: the first caseの内容は？
      一言: 「文と名詞の同格」なんて難しいと思うかもしれないが、日本語でも「スマホを落として、おまけに階段でこけた。一大事！」というように、最後に名詞1語でまとめることがある。
      参考書内参照: →問64（前項のダッシュによる同格を発展させた内容）
  - id: "Ny_66"
    book: "入門英文問題精講"
    title: "注意すべき副詞の位置"
    pages: "p.158-159"
    type: "exercise"
    notes: |
      読むヒント: otherwiseとは，何を意味する？
      一言: 本文では、weは「Mumsnet（母の会）の運営者」で、第1文後半の your daily life の your は「一般の人を示す you / your / you」。because以下の主語も同じく「一般の人を示すyou」であり、女性を指す。
  - id: "Ny_67"
    book: "入門英文問題精講"
    title: "注意すべき副詞句の位置"
    pages: "p.160-161"
    type: "exercise"
    notes: |
      読むヒント: despiteの品詞は？
      一言: 人間は一生懸命考えている場合には直線的な思考になり、創造的な考えは生まれにくい。いったん考えを止めると、潜在的意識が動きだし、創造的な考えを生み出すようになる。煮詰まったら散歩するなどして思考をやめるとよい。
  - id: "Ny_68"
    book: "入門英文問題精講"
    title: "否定①"
    pages: "p.162-163"
    type: "exercise"
    notes: |
      読むヒント: somethingの文中での働きは？
      一言: 「無為な時間」を過ごすことも重要。想定外の新たな発想が浮かんでくることが科学的にも証明されている。
      参考書内参照: →問65（❸の文と名詞の同格パターンが問65と同じ）
  - id: "Ny_69"
    book: "入門英文問題精講"
    title: "否定②"
    pages: "p.164-165"
    type: "exercise"
    notes: |
      読むヒント: hardlyの一語で文の意味が変わる
      一言: 英語では否定語は文の先頭近くに置くことが好まれる（立場の明確化）。それ以外では一番言いたいことを文末に置く（end focus「文末焦点」）。
  - id: "Ny_70"
    book: "入門英文問題精講"
    title: "否定③"
    pages: "p.166-167"
    type: "exercise"
    notes: |
      読むヒント: 2番目のtheyは「アメリカ人」を指す
      一言: イギリス人とアメリカ人は英語を使う点では同じだが、文化・気候・風土は異なる。同じだというのは間違い。
  - id: "Ny_71"
    book: "入門英文問題精講"
    title: "倒置①"
    pages: "p.168-169"
    type: "exercise"
    notes: |
      読むヒント: Not only の後ろの語順は？
      一言: 写真はいままでの思い出を呼び起こしてくれる。自分が写った写真でなくてもよい。ぜひ写真を撮ってほしい。
  - id: "Ny_72"
    book: "入門英文問題精講"
    title: "倒置②"
    pages: "p.170-171"
    type: "exercise"
    notes: |
      読むヒント: Only afterの後ろで倒置が起きている
      一言: 「必要は発明の母」は本当ではなく「発明は必要の母」が正しいかもしれない。需要が供給を生み出すのではなく、供給が需要を創りだす。

