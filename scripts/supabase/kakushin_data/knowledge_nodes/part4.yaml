# Part 4: その他の重要単元（テーマ17〜21）
# パイロット: Kaku_20（否定）のみ

knowledge_nodes:
  - id: "kta-001"
    name: "全体否定と部分否定の区別"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      核心: 全体否定と部分否定を区別する
      前提知識との差分: 中学では否定文の構造（don't/doesn't/didn't）がメイン。高校では否定の「意味」のニュアンス（部分否定など）がポイントになる。
      全体否定「全部〜でない」:
      (1) not〜any = no「1つも〜でない」。anyは「どれでも」の意味で、not〜anyは「どれでも〜でない」→「1つも〜でない」。語順は必ずnot〜any（× any〜notにはならない）。anyはnot以外の否定語ともペアになる（without any〜「〜なしに」など）。
      (2) not〜either = neither「どちらも〜でない」。×「どちらかが〜でない」は誤訳。日本語訳より英語（not〜either = neither）で覚えたほうがミスしない。
      部分否定「全部が全部〜というわけではない」:
      not + 全部を表す語 = 部分否定。全部を表す語: all, both, every (everything, everybody), always。
      イメージ: notの後ろに「全部」というパワフルな単語が来ると、notでは全てを打ち消しきれず残骸が残る。
      [図表: 比較表 — 全体否定(not+部分=either/any) vs. 部分否定(not+全部=all/both/always)の見分け方（p.293）]
      参考書内参照: →p.37「presentの叙述用法（出席している）」（テーマ04 形容詞）

  - id: "kta-002"
    name: "二重否定と否定の強調表現"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      核心: 否定の慣用表現は「直訳するだけ」
      否定を強調する語句:
      ・not〜at all「まったく〜でない」
      ・by no means / not〜by any means「まったく〜でない」（means＝「手段」という名詞。直訳「どんな手段を用いても〜でない」）
      ・not〜in the least「少しも〜でない」
      二重否定（否定を2つ使った表現）:
      ① never[cannot]〜without -ing「〜すると必ず…する」（直訳「…することなく〜しない」）
      ② never fail to〜「必ず〜する」（fail to〜＝「〜しない」。fail in〜「〜に失敗する」と区別）
      ③ It is not unusual[uncommon] to〜「〜することはよくあることだ」（直訳「〜することは珍しくない」）
      参考書内参照: →p.189「fail to〜の解説」（テーマ13 不定詞(2)）

  - id: "kta-003"
    name: "notを使わない否定表現"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      notを使った否定文は「〜じゃない！」とキツい印象を与える可能性があるため、遠回しに否定を伝える表現が多く存在する。どれも直訳から理解できる。
      主要表現:
      ・the last 名詞 to 原形/関係詞「最も〜しそうにない名詞だ」: lastはあくまで「ラスト」の意味。「〜ランキングでラストに来る」→「一番〜しなさそう」という遠回し表現。lastに否定の意味があるわけではない。
      ・free from〜「〜がない」: freeは本来「ない」という意味。
      ・far from〜「決して〜ではない」: 直訳「〜からほど遠い」。
      ・anything but〜「決して〜ではない」: 「〜以外(but)なら何でもアリ(anything)」。butは前置詞なので直後に名詞が来るのが本来だが、この表現では形容詞もOK。
      by no means〜 = anything but〜（同義で入試に出題される）。

  # === Kaku_17: 受動態 ===
  - id: "kta-004"
    name: "受動態の核心（形のバリエーションと使う理由）"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      核心: 受動態は「訳し方」より「形」を意識する
      前提知識との差分: 中学まではbe+p.p.を「〜される」と訳すだけ。大学入試では不自然な訳になることが多く、形のバリエーションも増える。
      ■ 受動態の書き換え3ステップ
      [図表: 表 — 受動態に書き換える3ステップ（①Oを前に出す ②Vをbe+p.p.に ③能動態のSをby〜に）（p.238）]
      ■ 受動態の後に名詞はこない
      be+p.p.の後に名詞がくっつくことはミス（一部例外あり）。
      ×）I was stolen my bag. → ◎）My bag was stolen.
      stealは「steal 物」が基本→受動態は「物 is stolen」。人 is stolen はありえない。
      ■ 受動態のバリエーション3つ
      [図表: 表 — 受動態のバリエーション（助動詞be p.p. / have been p.p. / be being p.p.）（p.239-240）]
      ・助動詞+受動態: 助動詞 be p.p.（My phone must be broken.）
      ・完了形+受動態: have been p.p.（has been canceled）
      ・進行形+受動態: be being p.p.（is being repaired）
      　beがbe -ingになり、p.p.はそのまま。英語では「左にある要素」で時制を示す。
      ■ 受動態を使う2大理由
      [図表: 表 — 受動態を使う2大理由（①Sを言いたくない→byなし ②S⇔Oの位置を変えたい→byあり）（p.240）]
      ①Sを言いたくない: 「わかりきっている」「わからない」「隠したい」→ by〜を省略。受動態は「byを伴わない」文のほうが圧倒的に多い。
      ②S⇔Oの位置を変えたい: 代表例はfollow。「後の出来事 follow 先の出来事」→受動態で「先の出来事 is followed by 後の出来事」と時系列順に。
      ■ 受動態は「〜される」と訳す必要はない
      受動態が使われる理由は「〜される」の意味を強調したいわけではないため、日本語訳で「〜する」と訳してOK。下線部和訳問題で自信を持って能動訳で答案に書いてよい。

  - id: "kta-005"
    name: "熟語動詞の受動態（前置詞を残す）"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      ■ 熟語動詞の受動態
      speak to〜のような熟語は「1つの動詞」として扱い、受動態にできる。
      前置詞を残すのがポイント: speak to → be spoken to（×be spokenにしない）。
      「toを消す」のは「動詞の綴りを勝手に変えてしまう」くらいのミス。
      ■ 入試に出る受動態の熟語リスト
      [図表: 表 — 受動態の形でよく出題される熟語（2語9個+3語以上5個）（p.242-243）]
      (1) 2語の熟語: speak to〜「話しかける」/ laugh at〜「笑う」/ run over〜「（車が）ひく」/ hear from〜「便りがある」/ put off〜「延期する」/ call off〜「中止する」/ throw away〜「捨てる」/ bring up〜「育てる」/ bring about〜「生じさせる」
      (2) 3語以上の熟語: look up to〜「尊敬する」/ look down on〜「軽蔑する」/ do away with〜「廃止する」/ take care of〜「世話する(=look after〜)」/ make fun[a fool] of〜「からかう」
      ■ 疑問詞+受動態: Who〜by? の形
      Who was Emma spoken to by?「エマはだれに話しかけられたのですか？」
      byの後は本来目的格whom。現代英語ではWhoで代用。

  - id: "kta-006"
    name: "SVOC受動態（Cの形の判別）"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      ■ SVOCの受動態: Cの形は2パターン
      [図表: 表 — SVOC受動態のCの形（①原形以外→そのまま残す ②原形→to不定詞に変える）（p.244）]
      ① そのまま残す（Cに原形以外: 名詞・to不定詞・分詞など）
      　call OC → S is called C / tell 人 to〜 → S is told to〜 / see O -ing → S is seen -ing
      ② 形を変える（Cに原形: 使役・知覚動詞）
      　原形→to不定詞に変える特別ルール。
      　make 人 原形 → 人 is made to 原形
      　理由: 受動態でOが前に出ると、SとVの新ペアが成立し、原形(v')が「ひとりぼっち」に。動詞が2つ連続するのは英語でありえない。→ 準動詞(to不定詞)に成り下がる。
      参考書内参照: →p.89「SVOCの構造」（テーマ07b）
      ■ What is S called? の形
      call OC「OをCと呼ぶ」→ S is called C → CがwhatになってWhat is S called?
      ■ 補足: 原形がきたときだけ注意
      Cに原形以外のto不定詞や分詞(-ing/p.p.)がきたときは「そのまま残す」だけ。

  - id: "kta-007"
    name: "byを使わない受動態（4分類の前置詞）"
    category: "その他の重要単元"
    priority: "P2"
    notes: |
      受動態の動作主にはbyが基本だが、他の前置詞を使った表現が熟語化している。
      ■ 4分類の熟語
      (1) 感情系:
      be interested in〜「〜に興味を持っている」/ be surprised at〜「〜に驚く」/ be excited at〜「〜にワクワクする」/ be pleased with〜「〜を気に入っている」/ be satisfied with〜「〜に満足している」
      ※感情表現が受動態になっていることを意識する。
      参考書内参照: →p.217「感情動詞」（テーマ15 分詞）
      (2) 覆う系（道具のwith「〜を使って」）:
      be covered with〜「〜で覆われている」/ be filled with〜「〜でいっぱいである」/ be crowded with〜「〜で混んでいる」
      (3) 材料・原料系:
      be made of 材料「〜でつくられている」※材料=目で見てわかるもの
      be made from 原料「〜でつくられている」※原料=目ではわからない/状態変化を伴うもの
      be made into〜「〜になる」※intoは状態変化「〜の状態に入る」
      ※ofとfromの違いを問う出題は減少傾向。
      (4) be knownの3パターン:
      be known to〜「〜に知られている」/ be known for〜「〜で知られている」※理由のfor / be known as〜「〜として知られている」

  # === Kaku_18a: 比較（原級・比較級・最上級・重要表現）===
  - id: "kta-008"
    name: "比較の3段階の形とルール（原級・比較級・最上級）"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      核心: 重要表現を「暗記する」のではなく「理屈から考える」
      前提知識との差分: 中学ではas~as/比較級-er/最上級-estの基本。高校では細かいルールや精密さが求められるが、他の単元ほど深くなく確実に得点できる。
      ■ 原級（as~as）
      (1) as~asで「まとめて」挟む: 形容詞・副詞を挟む。many[much]+名詞のときはまとめて挟む（as many pages as）。×as many as pagesとしない。
      (2) not as~asは「…ほど〜じゃない」（差を出す訳）。×「同じじゃない」とは訳さない。
      [図表: 表 — not as~as: ×「≠」ではなく◎「<」で訳す（p.253）]
      (3) 慣用表現: as~as possible / as~as人can「できるだけ〜」/ not so much A as B「AというよりむしろB」
      (4) 倍数表現: X times as~as A「AのX倍〜だ」。twice「2倍」/ half「半分」。as~asの直前に置くだけ。
      [図表: 表 — 倍数表現の形（p.254）]
      ■ 比較級（-er・more~）
      (1) 規則変化: 「綴り6字以上」→more/mostをつける。例外: pretty, strong（6字以上だが-er）。
      (2) 不規則変化: good/well→better→best, many/much→more→most, little→less→least, bad/badly→worse→worst
      [図表: 表 — 不規則変化4組（p.255）]
      (3) more/mostの2種類: ☑長い単語を比較級にする(more famous)と☑many/muchの比較級(more books)を混同しない。
      (4) lessの2つの意味: ①「より少ない」(less money) ②「より〜でなく」= 否定のイメージ(less A than B「AというよりB」= not as~as)
      [図表: 表 — more A than B vs less A than B の対比（p.256）]
      ■ 最上級（-est・most~）
      (1) 最上級にはtheをつける（共通認識できるから）。序数: the second fastest, the third most popular。
      (2) 範囲のof/in使い分け: of＝複数を示す語句（数字・all・代名詞・the year）、in＝場所・集団（the world, family等）。
      [図表: 表 — 最上級の範囲 of/in の使い分け（p.257）]
      (3) the最上級 名詞 that I have ever p.p.「今まで〜した中で一番の名詞だ」
      参考書内参照: →p.11「theの解説」（テーマ01 冠詞）

  - id: "kta-009"
    name: "比較の重要表現（書き換え・実質最上級・強調）"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      ■ likeとセットの比較: like A better[more] than B「BよりAが好き」/ like A best「Aが一番好き」/ Which do you like better, A or B?。元はI like~very much.のmuchが比較級になったもの。
      [図表: 表 — like+比較級/最上級の3パターン（p.258）]
      ■ 単数形・複数形の紛らわしい表現
      比較級 than any other 単数形「他のどの名詞より〜だ」: 主語と「1対1」で比べるから単数。
      one of the 最上級 複数形「最も〜なうちの1つ」: 先頭集団に入っている→「すごく〜（な1つ）」と訳してもOK。
      [図表: 表 — any other 単数 vs one of the 最上級 複数（p.258-259）]
      ■ "実質"最上級（遠回しの最上級表現）
      [図表: 表 — Nothingが主語: Nothing is more~than A / Nothing is as~as A（p.259）]
      [図表: 表 — No other 名詞: No other 単数 is 比較級 than ... / No other 単数 is as~as ...（p.260）]
      ■ 比較級の強調
      veryとmuchは「仲がワルい」: very good（◎） ↔ much good（×）。much better（◎） ↔ very better（×）。最上級: the very best / much the best（theの位置注意）。
      [図表: 表 — veryとmuchの整理（原級/比較級/最上級）（p.260）]
      比較級の前にstill/even/by far/far「はるかに・さらに」を置いて強調。
      ■ much less「ましてや」
      "否定文, much less~"は直訳「…じゃない。はるかにもっと少ない〜だ」→「ましてや〜はなおさらだ」。lessの前にstill/evenも可。
      ※much more（肯定文で「言うまでもなく」）は現代英語で使わない。代わりにto say nothing of / not to mentionを使う。

  - id: "kta-010"
    name: "the+比較級の表現とラテン比較級・自者比較"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      ■ 比較級なのにtheがつく表現3パターン
      [図表: 表 — the+比較級3パターン（p.262）]
      (1) the 比較級 of the two「2つのうちで〜なほう」: 「どっちかわかる→共通認識→the」。2つ→the比較級of the two、3つ→the最上級of the three。
      (2) all the 比較級 for~「〜なので、その分だけますます比較級だ」: all=強調（省略OK）、the=「その分だけ」（指示副詞）、for=理由（becauseでもOK）。
      (3) The 比較級, the 比較級「〜すればするほど、…だ」: 2文から比較対象がthe比較級になり文頭に出る。SV省略や倒置が起きることも多い。The sooner, the better.「早ければ早いほどよい」（SV省略の決まり文句）。
      ■ ラテン比較級（thanではなくtoを使う）
      [図表: 表 — ラテン比較級の重要語（p.264）]
      優劣: be superior to~「〜より優れた」/ be inferior to~「〜より劣った」
      好み: prefer A to B「BよりAが好き」/ be preferable to~「〜より好ましい」
      その他: prior to~「〜より前に」
      注意: 単語自体に「より〜」が含まれるのでmore不要（×more preferable）。-orで終わるものが多い。
      ■ 自者比較（1つの中で2つの性質を比べる）
      more 原級 than 原級「〜というより…だ」。普通の比較と違い、more+原級の形をとる。
      ■ その他の慣用表現
      比較級 and 比較級「ますます」/ more or less「多かれ少なかれ」/ sooner or later「遅かれ早かれ」/ no longer「もはや〜じゃない」(= not~any longer) / 比較級 than expected「予想より」/ know better than to~「〜しないだけの分別がある」(→p.193)

  # === Kaku_18b: 比較（no比較級than・熟語・入試問題）===
  - id: "kta-011"
    name: "no比較級than~の攻略法（矢印2つテクニック）"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      ■ no 比較級 than~「矢印2つ」の必殺技
      noから2つの矢印を向ける: ①比較級に→「逆の意味」、②than~に→「〜と同じくらい」。
      [図表: 図 — no→①比較級（逆の意味）、no→②than~（同じくらい）（p.266-267）]
      ■ no more ... than~
      ①no more = 「まったく…でない（むしろその逆）」、②no~than A = 「Aと同じくらい」。
      構造: ①が主張（感情入り）、②が誰にでもわかる具体例。
      例: The test was no more difficult than the homework assignment.
      →①「超簡単」②「課題と同じくらい」→「課題と同じくらい楽勝」
      ■ 「クジラの構文」
      A whale is no more a fish than a horse is.
      →①no more a fish「まったく魚じゃない」②than a horse is「馬と同じくらい」
      ※名詞fishには「逆」がないので「まったく魚じゃない」と訳すしかない。
      ■ no less ... than~
      ①no less =「超」（二重否定で「すごく」）。②no~than A=「Aと同じくらい」。
      例: Money is no less important than one's life.→「お金は超大切。命と同じくらい」

  - id: "kta-012"
    name: "no/not+比較級の数量熟語（4パターン整理）"
    category: "その他の重要単元"
    priority: "P2"
    notes: |
      ■ noを使った熟語（矢印2つで解決）
      [図表: 表 — no more than~ = only~ / no less than~ = as many[much] as~（p.269）]
      no more than~: ①no more「超少ない」②than~「〜と同じ」→「〜だけ（=only）」
      no less than~: ①no less「超多い」②than~「〜と同じ」→「〜も（=as many/much as）」
      ■ notを使った熟語（直訳でOK）
      [図表: 表 — not more than~ = at most / not less than~ = at least（p.270）]
      notは「除外」: He is not a teacher. = 教師を除外するだけ。
      not more than 1000 yen: 1000円より多い部分をnotで除外→「多くても1000円（=at most）」
      not less than 1000 yen: 1000円より少ない部分をnotで除外→「少なくとも1000円（=at least）」
      ■ noとnotの違いまとめ
      no = 「矢印2つ」（①逆+②同じ）→ 感情・主張が入る
      not = 「除外」→ 普通に直訳するだけ

  # === Kaku_19: 疑問詞 ===
  - id: "kta-013"
    name: "疑問詞の3品詞と入試表現（品詞判別・What is S like?・How）"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      核心: 疑問詞の品詞（代名詞・形容詞・副詞）を区別する
      前提知識との差分: 中学では「what=何、where=どこ」と訳語中心。高校では「品詞」を意識して捉え直す。この感覚が関係詞の基礎になる。
      ■ 疑問代名詞（who/whom/whose/which/what）
      名詞・代名詞と同じくS・O・Cになる。
      whatの後には「名詞が欠けている」感覚が大切（doの目的語が文頭に出たなど）。
      What made you so angry?ではwhatが主語。
      ■ 疑問形容詞（which/what）
      直後の名詞を修飾する形容詞の働き。"what + 名詞" "which + 名詞"。
      What kind of jobのように、疑問形容詞+名詞で1つの名詞のカタマリになる。
      ■ 疑問副詞（when/where/why/how）
      副詞の働き（名詞以外を修飾）。後ろに完全な形がくる（名詞が欠けない）。
      この感覚が関係副詞の基礎になる。
      ■ What is S like?「Sってどんな感じ？」
      whatは疑問代名詞（後ろに名詞欠落）、likeは前置詞（〜のような）。
      元はS is like 名詞で、名詞→whatに変化して文頭へ。
      What is it like to~?「〜するってどんな感じ？」: itは仮主語、to~が真主語。
      ■ セットのHow＝「程度」
      How + 形容詞・副詞のセットで「どのくらい～か」。
      [図表: 表 — How+形容詞・副詞の例（How long/How old/How much/How far/How soon/How often）（p.279）]
      How soonは「あとどれくらいで」。答え方: In ten minutes.のように「経過のin（〜後に）」を使う。×「〜以内に」ではない。
      ■ 単独のHow＝「方法・状態」
      「方法（どのような方法で）」: How do I get to~?
      「状態（どのような状態で）」: How are you?

  - id: "kta-014"
    name: "疑問詞を使った提案表現と「なぜ？」のバリエーション"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      ■ whyを使った提案表現（反語の発想）
      [図表: 表 — why提案3パターン（①Why don't you~?「〜したらどう？」②Why don't we~?「〜しようよ」③Why not~?「①②どちらの意味でも使える」）（p.280）]
      すべて反語の発想: 「なぜ〜しないの→いや、すべきだから〜したら？」。
      ■ whyを使わない提案表現
      ・Would you like to~?（直訳「〜したいですか」→「〜しませんか」）
      ・What do you say to -ing?（動名詞の慣用表現）
      ・How about -ing?「〜するのはどう？」
      注意: How about~の後は名詞・動名詞(-ing)。原形は不可。
      参考書内参照: →p.208「動名詞の慣用表現」（テーマ14 動名詞）
      ■ why以外の「なぜ？」
      ・How come SV?「どうしてSはVするの？」: SVの語順（普通の疑問文と違う）。
      　元はHow did it come that SV?で省略後にthat以下のSVが残った。How+comeのセットではない。
      ・What VS~for?「何のためにVするの？」: 普通の疑問文なのでVSの語順。

  - id: "kta-015"
    name: "間接疑問文・否定疑問文・付加疑問文"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      ■ 間接疑問文
      普通の文の中に疑問文を埋め込んだもの。
      最重要ルール: 間接疑問文では倒置が起きない（普通の語順SVのまま）。
      ×when does the movie start → ◎when the movie starts
      長文読解では目的語が「名詞のカタマリになる」ことも重要。
      ■ 疑問詞+to~「疑問詞～すべきか」
      名詞のカタマリをつくる。what to do「何をすべきか」/ where to live「どこに住むべきか」/ how to~「〜の仕方」。
      疑問形容詞+名詞+to~の形もある: what clothes to wear / which dress to buy。
      疑問詞+to~ = 疑問詞 S should~（元は間接疑問文→名詞のカタマリ）。
      ■ 否定疑問文
      Don't you~?のようにnotを伴う疑問文。
      攻略法: notを無視する。Don't you like~? → Do you like~?に脳内変換して答える。
      英語は「事実に合わせる」: 肯定の事実→Yes、否定の事実→No。日本語は「相手に合わせる」ので逆になる。
      ■ 付加疑問文
      文末に "～, 動詞＋主語?" を付加。主節の肯定/否定を入れ替え、主語は代名詞に変換。
      ①主節が肯定→否定をくっつける: This picture is beautiful, isn't it?
      ②主節が否定→肯定をくっつける: You didn't sleep, did you?
      ■ 命令文・Let'sの付加疑問文（特殊ルール）
      命令文, will you?「〜してくれるかな？」: 肯定・否定に関係なく常にwill you?。
      Let's~, shall we?「〜しましょうね」: Shall we~?=Let's~の書き換え。

  # === Kaku_21a: 関係詞（純粋関係詞グループ: 関係代名詞・所有格・前置詞＋関係代名詞・that） ===
  - id: "kta-016"
    name: "関係代名詞の基本（マクロ・ミクロの視点・格変化・2文接続・構造把握）"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      核心: 「何節か？」「完全か、不完全か？」という2つの視点（マクロ・ミクロ）から関係詞を攻略する
      前提知識との差分: 中学では「空所の直後に動詞があれば主格、主語＋動詞があれば目的格」で解けてしまう。高校範囲では関係副詞も出てくるため、その発想を一度ゼロにして「構造（完全・不完全）」から判断しなければならない。関係詞攻略のカギは関係代名詞にある。
      ■ マクロの視点: 文全体の中で「何節をつくるの？」
      関係詞を3つの派閥（グループ）に分けて考える:
      (1) 純粋関係詞グループ → 形容詞節をつくる（関係代名詞who/which/whom/that/whose + 関係副詞when/where/why/how + 前置詞＋関係代名詞）
      (2) whatグループ → 名詞節をつくる（関係代名詞what / 関係形容詞what）
      (3) -everグループ → 形容詞節だけはつくらない（名詞節 or 副詞節）
      [図表: 表 — 関係詞3派閥の分類と特徴（p.300-301）]
      ■ ミクロの視点: 関係詞節の中で「後ろは完全 or 不完全？」
      関係代名詞 → 後ろは不完全（名詞が欠ける）
      関係副詞 → 後ろは完全
      前置詞＋関係代名詞 → 後ろは完全
      ■ 関係代名詞は「形容詞の働き」
      関係代名詞の働きは「直前の名詞を修飾する」こと = 形容詞節をつくる。
      関係代名詞自体には「日本語訳」は存在しない。「〜するところの」という訳は応急処置にすぎず、「働き」を意識するのが本質。
      [図表: 表 — 関係代名詞の格変化（人: who/whom/whose、物: which/which/whose）（p.302）]
      ※ whose以外（who・whom・which）は「thatで代用可能」
      ■ 2つの文をつなげる手順
      ① 探して、変える: 同じものを指す語句を探して下線を引き、代名詞のほうを関係代名詞に変換する
      ② 動かして、くっつける: 関係代名詞を文頭へ移動、先行詞（最初に下線を引いた名詞）の直後にくっつける
      [図表: 表 — 2文接続の手順（p.302）]
      ■ 単純接続パターン（先行詞が文末付近）
      主格: I have an aunt who lives in Kobe.（Sheが主格→who）
      目的格: These are the cookies which he made.（themが目的格→which、文頭へ移動必要、後ろに名詞が欠ける）
      ■ 割り込みパターン（先行詞が文の途中）
      主格: The watch which belongs to my dad is broken.（関係詞カタマリが文の途中に割り込む）
      目的格: The book which Minami is reading now is a romance novel.
      ■ 構造把握の方法
      ① 関係詞を見た瞬間、[　]がスタート
      ② 2個目の動詞の直前で[　]を閉じる（2個目がなければピリオドまで）
      [図表: 表 — 形容詞節の構造把握方法（p.306-307）]
      動詞のカウント: 関係詞が出たらカウント開始（前の動詞はノーカウント）。動詞のカタマリ（進行形・完了形・不定詞・受動態）は1つの動詞扱い。
      ■ 主格の応用: whoの後ろにSVがくる形
      "( ) SV v" の形 → that節の中のSが欠けているパターン。
      例: the one ( ) I think rescued the kitten → I think {that} φ rescued... → rescuedの主語が欠けている → 主格whoが正解（立命館大）
      「I thinkは挿入」という解法は完全なこじつけ。挿入なら前後にコンマが必要（〜, I think, 〜の形）。
      参考書内参照: →p.174「後置修飾は英語の大きな特徴」（テーマ12 不定詞）
      参考書内参照: →p.72「他動詞」（テーマ07 文型）

  - id: "kta-017"
    name: "関係代名詞の省略・所有格whose・前置詞＋関係代名詞・that"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      核心: 「名詞＋SV」を見たら省略、前置詞＋関係代名詞は後ろが「完全」、thatは「前置詞・コンマの前にこない」
      ■ 目的格の関係代名詞は省略可能
      省略できるのは「目的格」だけ。
      見抜き方: 「名詞+SV」を見たら関係代名詞の省略と判断。
      省略されても後ろは「目的語が欠けた不完全な形」のまま。
      [図表: 表 — 関係代名詞が省略されるプロセス（p.309-310）]
      例: This is the toy Andy bought φ yesterday. → toyの後にSV（Andy bought）が来る→省略あり
      ■ 所有格を使って文をつなげる
      手順は主格・目的格と同じ。所有格（her/his/my等）→ whoseに変換。
      "whose 名詞" が1つのカタマリなので、まとめて前に出す。
      例: She is a writer whose novels everyone knows.（her novels → whose novels）
      ※ 文頭のSheも「同じ人」を指すが下線は引かない。代名詞の後に関係代名詞は続かない（代名詞は修飾されない。× pretty sheの形はありえない）。
      ■ whoseと結びつきやすい名詞
      whoseの直後には「無冠詞の名詞」がくる（元が所有格my/your等なので冠詞がつかない）。
      入試頻出: 「何かの一部」を表す名詞。
      家族の一部: father/mother/parents/brother/sister/son/daughter
      体の一部: eyes/hair/ears/nose/name
      [図表: 表 — whoseと結びつきやすい名詞（p.311）]
      ■ 「前置詞＋関係代名詞」の考え方
      in which / of whom のような形。2つの文を1つにする作業で理解。
      2通りの発想:
      ① whichだけ前に出す → 前置詞が後ろに残る → 後ろは「不完全」
      ② in whichをセットで前に出す → 後ろは「完全」（副詞句ごと移動するので文に影響なし）
      例: Yokohama is the city which he was born in φ. （不完全）
          Yokohama is the city in which he was born. （完全）
      意味は同じだが、構造は決定的に違う。
      [図表: 表 — 関係代名詞vs前置詞＋関係代名詞の構造の違い（p.313）]
      ■ 前置詞＋関係代名詞の注意点3つ
      ☑ 前置詞の後は「目的格」: ×with who → ◎with whom、×with that
      ☑ 「前置詞＋関係代名詞」では省略不可: ×in which省略（inだけ残って変な形に）。前置詞が後ろに残った場合は省略OK。
      ☑ 「前置詞から」形容詞節になる: ◎the city [in which he was born]。×the city in [which he was born]
      ■ 関係代名詞that
      thatは「オールマイティー」: whose以外ならthatでOK（主格・目的格どちらも代用可能）。トランプのジョーカーのイメージ。
      ■ thatが使えない2つのケース
      ① "前置詞+that" はダメ: ×for that → ◎for which
      ② 「非制限用法（直前にコンマを置く用法）」はダメ
      まとめ: 「関係代名詞thatの前には前置詞・コンマはこない」
      参考書内参照: →p.319「完全・不完全の詳細判別」（テーマ21b）
      参考書内参照: →p.322「非制限用法」（テーマ21b）

  # === Kaku_21b: 関係詞（関係副詞・判別・制限/非制限） ===
  - id: "kta-018"
    name: "関係副詞と完全/不完全の判別"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      核心: 関係代名詞と関係副詞の判別は「後ろの形（完全 or 不完全）」で決める
      ■ 関係副詞の基本
      関係副詞（where/when/why/how）は「形容詞節」をつくり、後ろは「完全」な形がくる。
      「関係副詞だから副詞節」と考えるのは誤り。関係代名詞と同じく形容詞節。
      元々「副詞（there/then等）」だったものが関係副詞に変化し、副詞が移動しても文構造に影響がないため後ろは完全。
      ■ 関係副詞の使い分け
      [図表: 表 — 関係副詞4つの使い分け（where=場所/when=時間/why=理由reason/how=様態way）（p.317）]
      関係副詞は元々「副詞」なので「格の変化」はない。代名詞に格変化はあるが副詞にはない。
      ■ 関係副詞の省略ルール3つ
      ① 関係副詞は省略できる（目的格と同様）
      ② 先行詞を省略できる（ただし両方省略はNG）
      ③ the way howは並ばない（×the way how〜）→ the wayかhowのどちらかを必ず省略
      理由: howの先行詞がwayなのは明らかすぎて「そのやり方の方法」のようにクドくなるため。
      This is how〜「このようにして〜」（the wayが省略された決まり文句。直訳「これが〜する方法だ」）
      ■ 判別の核心: 「前」ではなく「後ろ」に注目
      中学では「前を見て先行詞が人ならwho、物ならwhich」だが、高校では「後ろの形（完全 or 不完全）」で判断。
      [図表: 表 — 判別3パターン（①関係代名詞+不完全 ②関係副詞+完全 ③前置詞+関代+完全）（p.319）]
      ■ 「不完全」のパターン（これを先に理解するほうが確実）
      (1) Sが欠ける: 〜( )V の形 → 主格の関係代名詞
      (2) that節中のSが欠ける: 〜( )SV v の形 → 主格の関係代名詞
      (3) 他動詞のOが欠ける: 〜( )SV(他動詞) の形 → 目的格の関係代名詞
      (4) 前置詞のOが欠ける: 〜( )〜前置詞. の形 → 目的格の関係代名詞
      ※「関係詞が苦手」な人は「他動詞の感覚が弱い」だけ。
      ■ 「完全」のパターン（不完全じゃなければ全部完全）
      (1) 自動詞がくる: 第1文型SV / 第2文型SVC
      (2) 他動詞でOあり / 受動態: 第3文型SVO完成 / S be+p.p.（名詞不要で完全）
      [図表: 表 — 関係代名詞と関係副詞の共通点（形容詞節）と相違点（不完全vs完全）（p.320）]
      参考書内参照: →p.72「他動詞」（テーマ07 文型）

  - id: "kta-019"
    name: "制限用法と非制限用法（コンマの有無で意味が変わる）"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      核心: コンマの有無（制限用法 vs 非制限用法）で関係詞節の意味が変わる。
      ■ 制限用法と非制限用法
      制限用法（限定用法）: 普通の使い方。名詞を「制限・限定」する。用語を覚える必要はなく、今までの普通の使い方。
      非制限用法: 関係詞の直前にコンマを置く形（〜, who ...）。前の名詞を「制限しない」で、コンマの後で「補足説明」を加える感覚。「〜で、そしてそれは（その人は）……」という感じ。
      ■ コンマの有無で意味が変わる
      He has two sons, who went to college.（非制限用法: 息子は2人いて、その2人とも大学に行った。他に息子はいない）
      He has two sons who went to college.（制限用法: 大学に行った息子が2人いる。大学に行かなかった息子がいる可能性大）
      ■ 非制限用法whichの特殊用法
      whichが非制限用法で使われるとき限定: 直前の「文・文の一部」を先行詞にできる。
      ある文に対しての「補足説明・コメント」と考えればよい。
      She passed the exam, which was a big surprise.（whichの先行詞は前の文全体）
      whichの意味は厳密には「彼女が試験に合格したことは」だが、訳すときは「そのことは・それは」でOK。
      参考書内参照: →p.315「thatが使えない2つのケース②非制限用法」（テーマ21a）

  # === Kaku_21c: 関係詞（what・-everグループ・入試問題） ===
  - id: "kta-020"
    name: "関係代名詞whatと接続詞thatの区別（名詞節の後ろの形）"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      ■ 関係代名詞whatの2つの特徴（マクロ・ミクロの視点）
      (1) マクロの視点: 「名詞節」をつくる
      「先行詞を含む」=「名詞を含む」→「名詞のカタマリになる」。名詞節をつくるという発想のほうが英文を読むとき直観的にわかる。
      the thing which I want → what I want（the thingを含む名詞のカタマリ）
      名詞のカタマリなので当然「もの・こと」と訳せる。
      (2) ミクロの視点: 後ろには「不完全」がくる
      あくまで「関係代名詞」なので後ろは不完全な形。
      [図表: 表 — 純粋関係詞グループとwhatの比較（形容詞節vs名詞節、どちらも不完全）（p.323）]
      ■ 接続詞thatとの区別
      共通点: どちらも名詞節をつくり「こと」と訳せる
      相違点: 後ろの形が違う
      [図表: 表 — what vs that（what=名詞節+不完全 / that=名詞節+完全）（p.324）]
      例: What I really like is ... → likeの目的語が欠けている（不完全）
      例: That he will come here is certain. → he will come hereは完全な形（comeは自動詞、hereは副詞）
      ■ what I am型の慣用表現
      what I am「現在の私」（直訳「今現在、私があるところのもの」）/ what I was・what I used to be「過去の私」/ what she looks like「彼女の外見」（直訳「彼女が見えるところのもの」）
      She is not what she was.「彼女は昔の彼女ではない」（変わっちゃったと意訳も可）
      My parents have made me what I am.「両親のおかげで今の私がある」（make OCの形）
      ■ その他の慣用表現（副詞的に使われる）
      what we[you] call・what is called「いわゆる〜」/ what is more「さらに」/ what is better[worse]「さらに良い[悪い]ことに」
      My sister is (what is called) a bookworm.「ウチの妹はいわゆる本の虫だ」
      副詞のように使われるので、( )で括って考えればOK。入試ではこの品詞の意識までは問われない。

  - id: "kta-021"
    name: "複合関係詞(-ever)の形・意味・分解"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      ■ 複合関係詞（-ever）の「形」
      複合関係代名詞: whoever / whomever / whichever / whatever
      複合関係副詞: whenever / wherever / however
      ※thateverは存在しない。whyeverは存在するが一生見ない。
      ■ マクロの視点: 「形容詞節だけはつくらない」
      純粋関係詞=形容詞節、what=名詞節に対し、-ever=「形容詞節以外」（名詞節 or 副詞節）。
      名詞節か副詞節かは暗記せず、英文の構造からその場で判断。
      目的語の位置にあれば名詞節、SV,の後に余分なら副詞節。
      ※複合関係副詞は厳密には副詞節のみだが、「形容詞節以外」と覚えればOK。
      [図表: 表 — 複合関係代名詞と複合関係副詞の比較（何節/後ろの形）（p.327）]
      ■ ミクロの視点: 後ろの形
      複合関係代名詞→後ろは「不完全」、複合関係副詞→後ろは「完全」。
      「複合」を取ってしまえば関係代名詞・関係副詞と同じ発想。
      ■ 意味: 「譲歩」（たとえ〜でも）
      [図表: 表 — 複合関係詞の訳し方一覧（名詞節/副詞節）（p.327）]
      名詞節: 「たとえ〜でも、その人/それ」（名詞化して訳す）
      副詞節: 「たとえ〜でも」
      複合関係詞には「訳語がある」点が通常の関係詞と異なる。しかも疑問詞の訳し方に似ている。
      [図表: 表 — 複合関係詞の特徴まとめ（p.329）]
      ■ howeverの形に注意
      However 形・副 sv, SV.「たとえどれくらい〜であっても」
      直後に形容詞・副詞がくっつく形。howeverは「わがまま副詞」で形容詞・副詞を引っ張り出す。
      形容詞（補語）が前に移動→後ろが「不完全に見える」形になるが、名詞が不足しているわけではない。
      参考書内参照: →p.49「わがまま副詞」（テーマ05 副詞）
      ■ 副詞節の分解: no matter + 疑問詞
      副詞節をつくる場合: 3語（no matter 疑問詞）に分解可能。
      whoever = no matter who / however = no matter how
      ※複合関係詞はすべて（代名詞・副詞に関係なく）分解可能。
      ■ 名詞節の分解: anyone who / anything that
      名詞節をつくる場合: whoever = anyone who、whomever = anyone whom
      前置詞byの後でもby whoever（×by whomever）→ 分解するとby anyone who worked...でwhoと動詞がつながるから。

