# Part 4: その他の重要単元（テーマ17〜21）
# パイロット: Kaku_20（否定）のみ

knowledge_nodes:
  - id: "kta-001"
    name: "全体否定と部分否定の区別"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      核心: 全体否定と部分否定を区別する
      前提知識との差分: 中学では否定文の構造（don't/doesn't/didn't）がメイン。高校では否定の「意味」のニュアンス（部分否定など）がポイントになる。
      全体否定「全部〜でない」:
      (1) not〜any = no「1つも〜でない」。anyは「どれでも」の意味で、not〜anyは「どれでも〜でない」→「1つも〜でない」。語順は必ずnot〜any（× any〜notにはならない）。anyはnot以外の否定語ともペアになる（without any〜「〜なしに」など）。
      (2) not〜either = neither「どちらも〜でない」。×「どちらかが〜でない」は誤訳。日本語訳より英語（not〜either = neither）で覚えたほうがミスしない。
      部分否定「全部が全部〜というわけではない」:
      not + 全部を表す語 = 部分否定。全部を表す語: all, both, every (everything, everybody), always。
      イメージ: notの後ろに「全部」というパワフルな単語が来ると、notでは全てを打ち消しきれず残骸が残る。
      [図表: 比較表 — 全体否定(not+部分=either/any) vs. 部分否定(not+全部=all/both/always)の見分け方（p.293）]
      参考書内参照: →p.37「presentの叙述用法（出席している）」（テーマ04 形容詞）

  - id: "kta-002"
    name: "二重否定と否定の強調表現"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      核心: 否定の慣用表現は「直訳するだけ」
      否定を強調する語句:
      ・not〜at all「まったく〜でない」
      ・by no means / not〜by any means「まったく〜でない」（means＝「手段」という名詞。直訳「どんな手段を用いても〜でない」）
      ・not〜in the least「少しも〜でない」
      二重否定（否定を2つ使った表現）:
      ① never[cannot]〜without -ing「〜すると必ず…する」（直訳「…することなく〜しない」）
      ② never fail to〜「必ず〜する」（fail to〜＝「〜しない」。fail in〜「〜に失敗する」と区別）
      ③ It is not unusual[uncommon] to〜「〜することはよくあることだ」（直訳「〜することは珍しくない」）
      参考書内参照: →p.189「fail to〜の解説」（テーマ13 不定詞(2)）

  - id: "kta-003"
    name: "notを使わない否定表現"
    category: "その他の重要単元"
    priority: "P1"
    notes: |
      notを使った否定文は「〜じゃない！」とキツい印象を与える可能性があるため、遠回しに否定を伝える表現が多く存在する。どれも直訳から理解できる。
      主要表現:
      ・the last 名詞 to 原形/関係詞「最も〜しそうにない名詞だ」: lastはあくまで「ラスト」の意味。「〜ランキングでラストに来る」→「一番〜しなさそう」という遠回し表現。lastに否定の意味があるわけではない。
      ・free from〜「〜がない」: freeは本来「ない」という意味。
      ・far from〜「決して〜ではない」: 直訳「〜からほど遠い」。
      ・anything but〜「決して〜ではない」: 「〜以外(but)なら何でもアリ(anything)」。butは前置詞なので直後に名詞が来るのが本来だが、この表現では形容詞もOK。
      by no means〜 = anything but〜（同義で入試に出題される）。

