check_points:
  # kta-001
  - node_id: "kta-001"
    seq: 1
    question: "not〜anyはどういう意味か？"
    answer: "全体否定で「1つも〜でない」。noと同義。語順は必ずnot〜any。"
  - node_id: "kta-001"
    seq: 2
    question: "not〜eitherはどういう意味か？"
    answer: "全体否定で「どちらも〜でない」。neitherと同義。「どちらかが〜でない」は誤訳。"
  - node_id: "kta-001"
    seq: 3
    question: "not〜allは全体否定か部分否定か？"
    answer: "部分否定。「すべてが〜というわけではない（そうじゃないものもある）」。"
  - node_id: "kta-001"
    seq: 4
    question: "部分否定になる「全部」を表す語を4つ挙げよ。"
    answer: "all, both, every (everything/everybody), always。"
  - node_id: "kta-001"
    seq: 5
    question: "全体否定と部分否定の見分け方は？"
    answer: "not＋部分(any/either)＝全体否定、not＋全部(all/both/always)＝部分否定。"
  # kta-002
  - node_id: "kta-002"
    seq: 1
    question: "not〜by any means はどういう意味か？"
    answer: "「まったく〜でない」。直訳「どんな手段(means)を用いても〜でない」。"
  - node_id: "kta-002"
    seq: 2
    question: "never〜without -ing はどういう意味か？"
    answer: "「〜すると必ず…する」。直訳「…することなく〜しない」。"
  - node_id: "kta-002"
    seq: 3
    question: "never fail to〜 はどういう意味か？"
    answer: "「必ず〜する」。fail to〜は「〜しない」の意味。"
  - node_id: "kta-002"
    seq: 4
    question: "It is not unusual to〜 はどういう意味か？"
    answer: "「〜することはよくあることだ」。直訳「〜することは珍しくない」。"
  # kta-003
  - node_id: "kta-003"
    seq: 1
    question: "the last person to tell a lie はどういう意味か？"
    answer: "「嘘をつくような人間ではない」。直訳「嘘つきランキングでラストに来る人」。lastに否定の意味はなく、遠回しの否定表現。"
  - node_id: "kta-003"
    seq: 2
    question: "far from satisfactory はどういう意味か？"
    answer: "「決して満足ではない」。直訳「満足からほど遠い」。"
  - node_id: "kta-003"
    seq: 3
    question: "anything but pleasant はどういう意味か？"
    answer: "「決して感じがよくない」。「pleasant以外(but)なら何でもアリ(anything)」→「pleasant以外の全部」→「決してpleasantではない」。"
  # kta-008
  - node_id: "kta-008"
    seq: 1
    question: "This book has as many pages as that one. でmany pagesをまとめて挟む理由は？"
    answer: "元の文はThis book has many pages.で、many pagesを丸ごとas~asで挟む。×as many as pagesとするとpagesが宙ぶらりんになる。"
  - node_id: "kta-008"
    seq: 2
    question: "not as~asの正しい訳し方は？"
    answer: "「…ほど〜じゃない」（差を出す訳）。×「同じじゃない」では大小関係がわからない。"
  - node_id: "kta-008"
    seq: 3
    question: "比較級で「長い単語」の目安は？例外は？"
    answer: "「綴り6字以上」→more/mostをつける。例外: pretty→prettier, strong→stronger（6字以上だが-er）。"
  - node_id: "kta-008"
    seq: 4
    question: "最上級の範囲を示すof/inはどう使い分ける？"
    answer: "of=数字・all・代名詞・the year（複数を示す語句）、in=場所・集団（the world, family等）。"
  - node_id: "kta-008"
    seq: 5
    question: "lessの2つの意味は？"
    answer: "①「より少ない」（less money）②「より〜でなく」=否定のイメージ（less A than B「AというよりB」）。"
  # kta-009
  - node_id: "kta-009"
    seq: 1
    question: "比較級 than any other の後は単数形？複数形？理由は？"
    answer: "単数形。主語と「1対1で比べる」から。any other mountain「他のどの山でもいいので1つずつ比べる」。"
  - node_id: "kta-009"
    seq: 2
    question: "Nothing is more important than love. はどういう意味か？"
    answer: "「愛より大切なものはない」。Nothingを主語にして遠回しに「愛が一番大切」と伝える実質最上級の表現。"
  - node_id: "kta-009"
    seq: 3
    question: "veryとmuchの関係は？比較級にはどっちを使う？"
    answer: "「仲がワルい」（片方だけ覚えればOK）。比較級にはmuch（much better）。veryは不可（×very better）。最上級: the very best / much the best。"
  - node_id: "kta-009"
    seq: 4
    question: "I cannot read German, much less speak it. の意味は？"
    answer: "「ドイツ語が読めないし、ましてや話すことなどなおさら無理」。much lessは比較級lessの強調（もっと少ない→なおさらだめ）。"
  # kta-010
  - node_id: "kta-010"
    seq: 1
    question: "the 比較級 of the two にtheがつく理由は？"
    answer: "「2つのうち〜なほう」といえば誰のことかわかる（共通認識できる）からthe。"
  - node_id: "kta-010"
    seq: 2
    question: "all the more charming for his faults の各要素の役割は？"
    answer: "all=強調（省略可）、the=「その分だけ」（指示副詞）、for=理由。「欠点があるからなおさら魅力的」。"
  - node_id: "kta-010"
    seq: 3
    question: "be superior toのtoはなぜthanではないのか？"
    answer: "ラテン語起源の単語で、単語自体に「より〜」が含まれる。thanではなくto（前置詞）を使う。×more superiorとしない。"
  - node_id: "kta-010"
    seq: 4
    question: "His jokes are more silly than funny. のmore原級の構造は何か？"
    answer: "自者比較。1つのものの中で2つの性質を比べる「〜というより…だ」。通常の他者比較と違う変則的な形。"
  # kta-011
  - node_id: "kta-011"
    seq: 1
    question: "no more difficult than the homework の矢印2つの結果は？"
    answer: "①no more difficult→「まったく難しくない（逆の意味）」。②no~than the homework→「課題と同じくらい」。→「課題と同じくらい楽勝」。"
  - node_id: "kta-011"
    seq: 2
    question: "A whale is no more a fish than a horse is. を矢印2つで解くと？"
    answer: "①no more a fish→「まったく魚じゃない」（名詞に逆はないので否定のみ）。②than a horse is→「馬と同じくらい」。→「クジラが魚じゃないのは馬と同じ」。"
  - node_id: "kta-011"
    seq: 3
    question: "no less important than one's life の意味は？"
    answer: "no less=「超」（二重否定で打ち消しあい）→「超大切。命と同じくらい」。"
  # kta-012
  - node_id: "kta-012"
    seq: 1
    question: "I have no more than 1000 yen. の意味は？"
    answer: "「1000円しか持っていない」。①no more「超少ない」②than 1000 yen「1000円と同じ」→only 1000 yen。"
  - node_id: "kta-012"
    seq: 2
    question: "I have no less than 1000 yen. の意味は？"
    answer: "「1000円も持っている」。①no less「超多い」②than 1000 yen「1000円と同じ」→as much as 1000 yen。"
  - node_id: "kta-012"
    seq: 3
    question: "not more than 1000 yen の意味は？noとの違いは？"
    answer: "「多くても1000円」（= at most）。notは「除外」するだけ（1000円より多い部分を除外）。noのような感情・主張は入らない。"
  - node_id: "kta-012"
    seq: 4
    question: "not less than 1000 yen の意味は？"
    answer: "「少なくとも1000円」（= at least）。1000円より少ない部分をnotで除外。"
  # kta-004
  - node_id: "kta-004"
    seq: 1
    question: "受動態の進行形（be being p.p.）の語順はなぜbe beingが先にくるのか？"
    answer: "英語では「左にある要素」で時制を示す。進行形(be -ing)で時制を示すため、be beingが先（左）にくる。"
  - node_id: "kta-004"
    seq: 2
    question: "受動態を使う2大理由は何か？"
    answer: "①Sを言いたくない（by〜を省略）②S⇔Oの位置を変えたい（by〜を使う）。"
  - node_id: "kta-004"
    seq: 3
    question: "受動態はbyを伴う文と伴わない文、どちらが多いか？"
    answer: "byを伴わない文のほうが圧倒的に多い。主語を言いたくないから受動態を使い、by〜を省略する。"
  - node_id: "kta-004"
    seq: 4
    question: "×）I was stolen my bag. はなぜ間違いか？"
    answer: "stealは「steal 物」が基本。受動態は「物 is stolen」。人 is stolenはありえない。またbe+p.p.の後に名詞がくっつくのもミス。"
  # kta-005
  - node_id: "kta-005"
    seq: 1
    question: "speak to〜の受動態はbe spoken? それともbe spoken to?"
    answer: "be spoken to。speak to〜で1つの動詞扱いなので、toを残す。toを消すのは「動詞の綴りを変えてしまう」レベルのミス。"
  - node_id: "kta-005"
    seq: 2
    question: "look up to〜の受動態はどうなるか？"
    answer: "be looked up to。3語で1つの動詞扱い。toを省略してis looked upにしない。"
  - node_id: "kta-005"
    seq: 3
    question: "bring about〜はどういう意味で、受動態はどうなるか？"
    answer: "「〜を生じさせる」。受動態はbe brought about。"
  # kta-006
  - node_id: "kta-006"
    seq: 1
    question: "make 人 原形 の受動態はどうなるか？"
    answer: "人 is made to 原形。Cが原形のとき、受動態ではto不定詞に変える。"
  - node_id: "kta-006"
    seq: 2
    question: "see O -ing の受動態で -ing はどうなるか？"
    answer: "そのまま残す。S is seen -ing。原形以外（-ing/p.p./to不定詞/名詞）はそのまま。"
  - node_id: "kta-006"
    seq: 3
    question: "What is this fruit called in English? の元の能動態は？"
    answer: "call this fruit X → This fruit is called X → XがwhatになりWhat is this fruit called in English?"
  # kta-007
  - node_id: "kta-007"
    seq: 1
    question: "be pleased with〜のwithは何系の前置詞か？"
    answer: "感情系。「〜を気に入っている」。感情表現が受動態になっていることを意識する。"
  - node_id: "kta-007"
    seq: 2
    question: "be covered with〜のwithは何の意味か？"
    answer: "道具のwith「〜を使って」。覆う系: be covered with「〜で覆われている」/ be filled with / be crowded with。"
  - node_id: "kta-007"
    seq: 3
    question: "be made ofとbe made fromの違いは？"
    answer: "ofは材料（目で見てわかるもの）、fromは原料（目ではわからない/状態変化を伴うもの）。ただし出題は減少傾向。"
  - node_id: "kta-007"
    seq: 4
    question: "be known to/for/asの使い分けは？"
    answer: "to〜「〜に知られている」/ for〜「〜で知られている」（理由のfor）/ as〜「〜として知られている」。"
  # kta-013
  - node_id: "kta-013"
    seq: 1
    question: "What do you want to do? でwhatの後に何が欠けているか？"
    answer: "doの目的語が欠けている。doは他動詞で本来後ろに名詞がくるが、疑問代名詞whatに変化して文頭に出た。"
  - node_id: "kta-013"
    seq: 2
    question: "What kind of jobのwhatは疑問代名詞か疑問形容詞か？"
    answer: "疑問形容詞。直後の名詞(kind of job)を修飾している。疑問代名詞なら単独でS/O/Cになる。"
  - node_id: "kta-013"
    seq: 3
    question: "疑問副詞whereの後にはなぜ完全な形がくるのか？"
    answer: "副詞は名詞以外を修飾するので、名詞が欠ける必要がない。この感覚は関係副詞の基礎になる。"
  - node_id: "kta-013"
    seq: 4
    question: "What is S like? のlikeの品詞は何か？"
    answer: "前置詞（「〜のような」）。元はS is like 名詞で、名詞→疑問代名詞whatに変化して文頭に出た。"
  - node_id: "kta-013"
    seq: 5
    question: "How soonの答え方で使う前置詞は何か？"
    answer: "経過のin（In ten minutes.「あと10分で」）。×「〜以内に」ではない。"
  # kta-014
  - node_id: "kta-014"
    seq: 1
    question: "Why not take a rest? はどういう意味か？"
    answer: "「休憩をとったらどう？」。反語で「なぜ休憩をとらないの？→とったら？」。Why don't you~/Why don't we~のどちらの意味でも使える。"
  - node_id: "kta-014"
    seq: 2
    question: "How about~の後にくる形は？原形は使えるか？"
    answer: "名詞・動名詞(-ing)。原形は不可（×How about stay）。"
  - node_id: "kta-014"
    seq: 3
    question: "How come SV? の語順がSVになる理由は？"
    answer: "元はHow did it come that SV?で、省略後にthat以下のSVだけが残った。How+comeのセットではない。"
  - node_id: "kta-014"
    seq: 4
    question: "What do you say to -ing? のtoの後が-ingになる理由は？"
    answer: "このtoは前置詞（不定詞のtoではない）。前置詞の後は名詞・動名詞がくる。"
  # kta-015
  - node_id: "kta-015"
    seq: 1
    question: "Do you know when does the movie start? のどこが間違いか？"
    answer: "間接疑問文は倒置が起きない。×does the movie start→◎the movie starts。SVの語順にする。"
  - node_id: "kta-015"
    seq: 2
    question: "疑問詞+to~は何と書き換えられるか？"
    answer: "疑問詞 S should~。元は間接疑問文なので名詞のカタマリになる。"
  - node_id: "kta-015"
    seq: 3
    question: "Don't you like~? にYesと答えたとき、好きか嫌いか？"
    answer: "好き。notを無視してDo you like~?として答える。英語は事実に合わせてYes/Noを選ぶ。"
  - node_id: "kta-015"
    seq: 4
    question: "命令文の付加疑問文はどう作る？"
    answer: "命令文, will you?「〜してくれるかな？」。肯定・否定に関係なく常にwill you?。"
  - node_id: "kta-015"
    seq: 5
    question: "Let's~の付加疑問文はどう作る？"
    answer: "Let's~, shall we?「〜しましょうね」。Shall we~?=Let's~の書き換え。"
  # kta-016
  - node_id: "kta-016"
    seq: 1
    question: "関係代名詞の後ろは完全？不完全？理由は？"
    answer: "不完全。関係代名詞は名詞（代名詞）から変化したもの。元々あった名詞が関係代名詞として前に移動するので、後ろは名詞が欠けた（ポコッと抜けた）不完全な形になる。"
  - node_id: "kta-016"
    seq: 2
    question: "These are the cookies which he made. でwhichの後ろはなぜ不完全か？"
    answer: "themがwhichに変わって前に出たから、madeの目的語が欠けている。×These are the cookies which he made them. のようにthemを残してはいけない。"
  - node_id: "kta-016"
    seq: 3
    question: "割り込みパターン：The watch which belongs to my dad is broken. でなぜ×The watch is broken which...にならないか？"
    answer: "関係代名詞は先行詞の「直後」にくっつけるのがルール。先行詞The watchの直後に割り込む形になる。"
  - node_id: "kta-016"
    seq: 4
    question: "構造把握: 形容詞節の[ ]をどこで閉じるか？"
    answer: "2個目の動詞の直前で閉じる。2個目の動詞が出てこなければピリオドまで。動詞のカタマリ（進行形・完了形・受動態等）は1つの動詞扱い。"
  - node_id: "kta-016"
    seq: 5
    question: "the one ( ) I think rescued the kitten. にwhoとwhomどちらが入るか？"
    answer: "who（主格）。I think {that} φ rescued...で、rescuedの主語φが欠けている。「I thinkは挿入だから消す」という解法は完全なこじつけ。"
  # kta-017
  - node_id: "kta-017"
    seq: 1
    question: "This is the toy Andy bought yesterday. で何が省略されているか？"
    answer: "目的格の関係代名詞which（またはthat）。toy（名詞）+ Andy bought（SV）の形なので「名詞+SV→省略あり」と判断。boughtの目的語が欠けた不完全な形。"
  - node_id: "kta-017"
    seq: 2
    question: "whoseと結びつきやすい名詞のパターンは？"
    answer: "「何かの一部」を表す名詞。家族の一部（father/mother/parents/son/daughter）、体の一部（eyes/hair/ears/nose/name）。先行詞に「所有されている」ものがくる。whoseの直後には「無冠詞の名詞」がくる（所有格my/your等と同じ）。"
  - node_id: "kta-017"
    seq: 3
    question: "Yokohama is the city which he was born in. と Yokohama is the city in which he was born. の構造の違いは？"
    answer: "前者はwhichだけ前に出す → inの後ろが欠けて「不完全」。後者はin whichをセットで前に出す → 副詞句が移動しただけなので「完全」。意味は同じだが構造は決定的に違う。"
  - node_id: "kta-017"
    seq: 4
    question: "「前置詞＋関係代名詞」で関係代名詞の省略はできるか？"
    answer: "できない。×in ~~which~~ he was born → inだけ残って変な形に。ただし、前置詞が後ろに残った場合（which he was born in）は省略可能。"
  - node_id: "kta-017"
    seq: 5
    question: "関係代名詞thatが使えない2つのケースは？"
    answer: "① 前置詞+that はダメ（×for that → ◎for which）。② 非制限用法（直前にコンマ）はダメ。まとめ: thatの前には前置詞・コンマはこない。"
  # kta-018
  - node_id: "kta-018"
    seq: 1
    question: "関係副詞whereの後ろはなぜ「完全」になるのか？"
    answer: "副詞there（= at it）がwhereに変化しただけ。副詞が移動しても文の要素は欠けない。完全・不完全は「名詞が欠けているかどうか」で判断する。"
  - node_id: "kta-018"
    seq: 2
    question: "the way howは使えるか？なぜか？"
    answer: "使えない。howの先行詞がwayなのは明らかすぎる（「そのやり方の方法」はクドい）。the wayかhowのどちらかを必ず省略する。"
  - node_id: "kta-018"
    seq: 3
    question: "先行詞がa cityのとき、必ずwhereを使うか？"
    answer: "使わない。「前（先行詞）」ではなく「後ろ（完全 or 不完全）」に注目する。後ろが不完全（S/O欠け）ならwhich、後ろが完全ならwhere（またはin which）。"
  - node_id: "kta-018"
    seq: 4
    question: "～( ) I live. の空所にはwhereとwhichのどちらが入るか？"
    answer: "where（または in which）。liveは自動詞で後ろは「完全」（第1文型SV）。"
  - node_id: "kta-018"
    seq: 5
    question: "～( ) I visited. の空所にはwhereとwhichのどちらが入るか？"
    answer: "which。visitedは他動詞で目的語が欠けた「不完全」な形。関係詞が苦手な人は「他動詞の感覚が弱い」だけ。"
  # kta-019
  - node_id: "kta-019"
    seq: 1
    question: "He has two sons, who went to college. と He has two sons who went to college. の意味の違いは？"
    answer: "コンマあり（非制限用法）: 「息子が2人いて、2人とも大学に行った」（息子は2人だけ）。コンマなし（制限用法）: 「大学に行った息子が2人いる」（大学に行かなかった息子がいる可能性大）。"
  - node_id: "kta-019"
    seq: 2
    question: "She passed the exam, which was a big surprise. のwhichの先行詞は何か？"
    answer: "前の文全体（She passed the exam = 彼女が試験に合格したこと）。非制限用法のwhichのみ文・文の一部を先行詞にできる。訳すときは「そのことは・それは」でOK。"
  - node_id: "kta-019"
    seq: 3
    question: "非制限用法（コンマ付き）でthatを使えるか？"
    answer: "使えない。thatの前にはコンマはこない（p.315で学んだルール）。who, which, where, when等は非制限用法で使用可能。"
  # kta-020
  - node_id: "kta-020"
    seq: 1
    question: "関係代名詞whatと接続詞thatの共通点と相違点は？"
    answer: "共通点: どちらも名詞節をつくり「こと」と訳せる。相違点: 後ろの形が違う。what=不完全（関係代名詞なので名詞が欠ける）、that=完全な文がくる。"
  - node_id: "kta-020"
    seq: 2
    question: "What I really like is ... のwhatの後ろが不完全な理由は？"
    answer: "likeは他動詞なので目的語が必要だが、その目的語が欠けている。whatは関係代名詞なので後ろは常に不完全な形になる。"
  - node_id: "kta-020"
    seq: 3
    question: "what I am / what I was の意味は？ She is not what she was. をどう訳す？"
    answer: "what I am「現在の私」、what I was・what I used to be「過去の私」。She is not what she was.「彼女は昔の彼女ではない」（=彼女は変わった）。"
  - node_id: "kta-020"
    seq: 4
    question: "what is called の品詞的な働きは？ My sister is what is called a bookworm. でどう機能している？"
    answer: "副詞のように使われる慣用表現。My sister is (what is called) a bookworm.のように括弧で括って考えればOK。意味は「いわゆる〜」。入試ではこの品詞の意識までは問われない。"
  # kta-021
  - node_id: "kta-021"
    seq: 1
    question: "複合関係詞は何節をつくるか？ 名詞節か副詞節かの判別方法は？"
    answer: "「形容詞節だけはつくらない」＝名詞節 or 副詞節。判別は暗記ではなく英文構造からその場で判断。目的語の位置にあれば名詞節、SV,の後に余分ならば副詞節。"
  - node_id: "kta-021"
    seq: 2
    question: "However 形・副 sv, SV. の形で後ろが不完全に見える理由は？"
    answer: "形容詞（補語）がhoweverに引っ張り出されて前に移動したから。厳密には「名詞が不足」ではないので「不完全に見える」だけ。howeverは「わがまま副詞」に属する（→p.49）。"
  - node_id: "kta-021"
    seq: 3
    question: "副詞節をつくる場合、複合関係詞はどう分解できる？"
    answer: "3語（no matter + 疑問詞）に分解可能。whoever = no matter who、however = no matter how。複合関係詞はすべて（代名詞・副詞に関係なく）分解可能。"
  - node_id: "kta-021"
    seq: 4
    question: "by whoever worked with him でwhomeverにならない理由は？"
    answer: "分解するとby anyone who worked with himで、whoと動詞workedがつながるから。前置詞byの後だからといってwhomeverにはならない。"
  - node_id: "kta-021"
    seq: 5
    question: "複合関係詞の意味の共通点は？ 名詞節と副詞節で訳し方はどう変わる？"
    answer: "すべて「譲歩」（たとえ〜でも）の意味。名詞節なら「たとえ〜でも、その人/それ」と名詞化して訳す。副詞節なら「たとえ〜でも」。訳語がある点・疑問詞の訳し方に似ている点が通常の関係詞と異なる。"

