check_points:
  # kta-001
  - node_id: "kta-001"
    seq: 1
    question: "not〜anyはどういう意味か？"
    answer: "全体否定で「1つも〜でない」。noと同義。語順は必ずnot〜any。"
  - node_id: "kta-001"
    seq: 2
    question: "not〜eitherはどういう意味か？"
    answer: "全体否定で「どちらも〜でない」。neitherと同義。「どちらかが〜でない」は誤訳。"
  - node_id: "kta-001"
    seq: 3
    question: "not〜allは全体否定か部分否定か？"
    answer: "部分否定。「すべてが〜というわけではない（そうじゃないものもある）」。"
  - node_id: "kta-001"
    seq: 4
    question: "部分否定になる「全部」を表す語を4つ挙げよ。"
    answer: "all, both, every (everything/everybody), always。"
  - node_id: "kta-001"
    seq: 5
    question: "全体否定と部分否定の見分け方は？"
    answer: "not＋部分(any/either)＝全体否定、not＋全部(all/both/always)＝部分否定。"
  # kta-002
  - node_id: "kta-002"
    seq: 1
    question: "not〜by any means はどういう意味か？"
    answer: "「まったく〜でない」。直訳「どんな手段(means)を用いても〜でない」。"
  - node_id: "kta-002"
    seq: 2
    question: "never〜without -ing はどういう意味か？"
    answer: "「〜すると必ず…する」。直訳「…することなく〜しない」。"
  - node_id: "kta-002"
    seq: 3
    question: "never fail to〜 はどういう意味か？"
    answer: "「必ず〜する」。fail to〜は「〜しない」の意味。"
  - node_id: "kta-002"
    seq: 4
    question: "It is not unusual to〜 はどういう意味か？"
    answer: "「〜することはよくあることだ」。直訳「〜することは珍しくない」。"
  # kta-003
  - node_id: "kta-003"
    seq: 1
    question: "the last person to tell a lie はどういう意味か？"
    answer: "「嘘をつくような人間ではない」。直訳「嘘つきランキングでラストに来る人」。lastに否定の意味はなく、遠回しの否定表現。"
  - node_id: "kta-003"
    seq: 2
    question: "far from satisfactory はどういう意味か？"
    answer: "「決して満足ではない」。直訳「満足からほど遠い」。"
  - node_id: "kta-003"
    seq: 3
    question: "anything but pleasant はどういう意味か？"
    answer: "「決して感じがよくない」。「pleasant以外(but)なら何でもアリ(anything)」→「pleasant以外の全部」→「決してpleasantではない」。"

