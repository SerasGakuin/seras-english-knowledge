# Part 1: 品詞（テーマ01〜06）
# パイロット: Kaku_01（冠詞）のみ

knowledge_nodes:
  - id: "khs-001"
    name: "定冠詞theの核心（共通認識）"
    category: "品詞"
    priority: "P1"
    notes: |
      核心: theは「共通認識」
      theの核心は「共通認識」。「あなたと私（そこに居合わせた人みんな）で共通に認識できるものにtheを使う」。みんなで「せーの」で一斉に指をさせるならtheを使う。
      天体（the sun, the moon, the earth）: みんなで一斉に同じものを指させるからthe。
      方角（the east）: 「どの東？」とは聞かない。共通認識できるのでthe。
      最上級（the tallest）: 「一番背が高い人」は共通認識できるのでthe。
      序数（the first, the second, the last）: 「5番目の」は共通認識できるのでthe。
      Open the door.のように最初からtheが使われるのは、状況からどのドアか共通認識できるため。
      「最初はa、2回目にthe」は部分的な説明。1回目の言及でもtheを使う（I saw an orange car. The car was cool.）のように、2回目で特定できるからtheになる現象を切り取ったルールにすぎない。
      Do you have the time?「今何時?」: the timeは「今ここにいる自分と相手が共通認識できる時間」→「現時刻」。Do you have time?「時間ある？」とは別の意味。the有無で意味が変わる重要な会話表現。What time is it? より丁寧な表現で、入試でも出題される。
      前提知識との差分: 中学では「最初はa、2回目にthe」と習うが、Open the door.のような簡単な英文ですら崩れる不完全なルール。

  - id: "khs-002"
    name: "不定冠詞aの核心（たくさんあるものの1つ）"
    category: "品詞"
    priority: "P1"
    notes: |
      核心: aは「たくさんあるものの1つ」
      共通認識できないとき、「たくさんある中の1つ」というときにaを使う。
      theは「定冠詞（定まったものに使う）」、aは「不定冠詞（定まらないものに使う）」。
      aの派生用法（全て「たくさんある中の1つ」から理解できる）:
      ① 「〜につき」: 「1つの」→「1つずつにつき」（once a week「1週間につき1回」）
      ② 「ある〇〇」: 「たくさんある中の1つ」（in a sense「ある意味において」）
      ③ 「ある程度」: 「1つに認識できるカタマリ」（Just a moment.「ちょっと待って」）
      世間では熟語・決まり文句として扱われるが、すべて「たくさんある中の1つ」から理解できる。

  # --- Kaku_02: 名詞 ---
  - id: "khs-003"
    name: "可算名詞の複数形熟語"
    category: "品詞"
    priority: "P1"
    notes: |
      核心（可算名詞部分）: 可算名詞は「複数形の熟語」に注意
      入試で問われるのは複数形の作り方（-s/-es）ではなく「複数形がポイントになる熟語」。
      「複数形」に注意する熟語（どれも「複数でないと成立しない行為」）:
      ・make friends with ~「~と友達になる」— 友達になるには2人の人間が必要
      ・shake hands with ~「~と握手する」— 握手は2つの手で行う
      ・change trains「電車を乗り換える」— 今の電車とこれからの電車の2つ
      ・be on [形容詞] terms with ~「~とは[形容詞]の関係だ」— 関係には複数人が必要
      「神様の視点（上から見るイメージ）」: 日本人は目の前の新しい友達1人を見るが、英語では世界に2人友達が生まれたという感覚で複数形になる。
      前提知識との差分: 中学では複数形の作り方（-s, -es, y→i, child→children等）に時間を割くが、入試ではほとんど問われない。入試で得点に直結するのは「複数形を使った熟語」。

  - id: "khs-004"
    name: "不可算名詞の3パターン（目に見えない・切ってもOK・ひとまとめ）"
    category: "品詞"
    priority: "P1"
    notes: |
      核心（不可算名詞部分）: 不可算名詞は「目に見えない・切ってもOK・ひとまとめ」
      パターン(1)「目に見えない」から数えない:
      ・情報系: information, news, advice
      ・仕事系: work（仕事）, homework, housework
      ・利害系: fun, progress, damage
      workやhomeworkが「目に見えない」のは日本人にない発想。見えるのは「働く人間」「宿題のテキスト」で、仕事そのものは目に見えないという英語の感覚。
      パターン(2)「切ってもOK」だから数えない:
      ・water, sugar, bread, paper, chalk
      ・切っても性質が失われない → 具体的な形がイメージできない → 不可算
      ・逆に smartphone は切ると本来の性質が失われるから可算
      ※パターン(2)の語自体は入試であまり問われないが、「切ってもOK」の逆の発想（切ったらOKじゃない→可算）が入試頻出のworkの判別などで役立つ。
      パターン(3)「ひとまとめ」だから数えない:
      ・baggage/luggage「荷物ひとまとめ」, furniture「家具ひとまとめ」, money「お金全般」
      ・baggage = bags, furniture = chairs + tables + beds — 元から複数を含んだ単語
      ・元から複数形を含むので、さらにsをつけたり冠詞aをつけたりしない
      workの二面性（入試頻出）:
      ・work①「仕事」= 不可算（← 目に見えないから）
      ・work②「作品」= 可算（← 切ったらOKじゃない！）
      ・パターン(2)の「切ってもOK」の逆の発想で判別できる
      不可算名詞に使えない語: a/an, 複数のs, many
      不可算名詞に使える語: some, much, a lot of
      前提知識との差分: 中学では出てくるたびに1つずつ暗記する方式だが、3パターンで体系的に整理できる。
      参考書内参照: →p.15 テーマ1「冠詞」（sugarの例）

  # --- Kaku_03: 代名詞 ---
  - id: "khs-005"
    name: "the other/another/othersの使い分け"
    category: "品詞"
    priority: "P1"
    notes: |
      核心（代名詞テーマ全体）: 代名詞は「日本語訳」で考えない。英語の「視点」から考える。
      the otherとanotherの違い = theとaの違い =「共通認識できるか否か」。
      ■ 2つだけの場合: one / the other（残り1つは特定できるのでthe）
      [図表: 対比図 — 2つの丸: one / the other（p.25）]
      ■ 3つ以上の場合: one / another / ... / the other（ラスト1つはthe other）
      [図表: 対比図 — 4つの丸: one / another / ... / the other（p.26）]
      anotherの正体は "an + other"。3つ以上あるとき、2つめはどれを指すか特定できないのでtheは使えず、anがつく。
      ※「ラスト1つ」はthe otherと考えてよい。
      ■ 残り全員が特定できる場合: some / the others
      [図表: 対比図 — 8つの丸: some（白丸）/ the others（黒丸）（p.26-27）]
      ■ 残りが特定できない場合: some / others（theなし）
      [図表: 対比図 — 8つの丸+その他: some / others / その他（p.27）]
      Someで始まる文は「何人かの人」ではなく「~な人もいる」と訳すと自然。
      前提知識との差分: 中学では代名詞は I-my-me-mine の暗唱が中心。高校では the other/another, it/one, both/all などの厳密な区別が問われる。

  - id: "khs-006"
    name: "it/one/thatの判別"
    category: "品詞"
    priority: "P1"
    notes: |
      「前に出てきたもの」を指す代名詞 it/one/that の判別。3つの軸で区別する。
      ■ 判別の3軸:
      ①特定 or 不特定: it=特定、one=不特定、that=特定
      ②前置修飾 or 後置修飾: it=両方NG、one=両方OK、that/those=後置のみOK
      ③可算名詞 or 不可算名詞: it=両方OK、one=可算のみOK、that=両方OK
      ■ it vs. one（最頻出）:
      ・it =「ズバリそれっ！」（特定のもの、前に出た名詞そのもの）
      ・one =「同じ種類のそれ」（不特定、たくさんある同種類の中の1つ）
      日本語訳ではなく「特定・不特定」の視点で判別する。
      ■ thatの特徴:
      ・前置修飾NG（語源がtheと同じ。theの前に形容詞がこないのと同じ理屈）
      ・後置修飾OK: that of ~「~のそれ（と同じもの）」が頻出
      ・that of ~ではofがthatを修飾している
      ■ oneの修飾:
      ・前置修飾: this one など
      ・後置修飾: the one in the box「箱に入っているもの」

  - id: "khs-007"
    name: "2 vs. 3以上の代名詞（both/either/neither vs. all/any/none）"
    category: "品詞"
    priority: "P1"
    notes: |
      英語には「2 vs. 3以上」の視点がある。これを見落としやすいので注意。
      ■ 2つの場合にしか使えない: both「両方」/ either「どちらか・どちらでも」/ neither「どちらも~ない」
      ■ 3つ以上の場合に使う: all「全部」/ any「どれか・どれでも」/ none「どれも~ない」
      2つだけのものにallを使ってはいけない。
      None of ~「~のうち1つも…でない」: noneは代名詞で of ~の形をとれる。
      noは形容詞が主な役割で "no 名詞" の形で使う。× no of ~という形は英語に存在しない。

  # --- Kaku_04: 形容詞 ---
  - id: "khs-008"
    name: "形容詞の用法ルール（限定/叙述・ハイフン形容詞・convenient制約）"
    category: "品詞"
    priority: "P1"
    notes: |
      核心（用法の面）: 「用法」がポイントの形容詞 — 限定用法のみ・叙述用法のみ・ハイフン形容詞・人を主語にしない形容詞
      ■ 形容詞の2用法:
      ①限定用法: 名詞の前に置いて修飾。smart boy（boyを限定）
      ②叙述用法: 補語になる（主にbe動詞の後）。The boy is kind.（性質を説明）
      両方の使い方があるのが原則だが、以下の例外がある。
      (1) 限定用法のみ: only「唯一の」, elder「年上の」, live「生きている」※発音「ライヴ」
      (2) 叙述用法のみ: alike, alive, asleep, awake, afraid, aware（aで始まるものが多い）
      (3) 用法で意味が異なる: certain（限定: ある / 叙述: 確かな）、present（限定: 現在の / 叙述: 出席している）
      ■ convenientは人を主語にしない:
      ○ It is convenient for you. / × You are convenient.
      人を主語にしない形容詞: convenient, inconvenient, unnecessary
      ■ ハイフン形容詞は複数形にしない:
      three-year-old（× three-years-old）— ハイフンで結ばれて形容詞化しているので複数形にならない（形容詞に単数・複数はありえない）。
      例: five-year-old daughter, two-week vacation, four-leaf clover, three-story building
      ※storyの「階」の語源: ヨーロッパの建築物でフロアごとに歴史物語の絵を飾ったことから。
      ■ 数量形容詞（可算/不可算名詞で使い分ける）:
      「たくさんの」: 可算 many / 不可算 much
      「少しある」(肯定): 可算 a few / 不可算 a little
      「ほとんどない」(否定): 可算 few / 不可算 little
      「たくさんの」: 可算 quite a few
      a = 「ある程度のカタマリ1つ」→「少しある」(肯定)、aなし = 「1つのカタマリすらない」→「ほとんどない」(否定)。
      ■ 単数扱いする「3つのe」: each, every, either は意味が複数っぽいが単数扱い。neitherも同様。
      前提知識との差分: 中学英語では品詞を意識せず単語の意味を覚えるだけだった。高校では用法（限定/叙述）の区別が問われる。

  - id: "khs-009"
    name: "-able/-ibleの法則とavailable（能動/受動の判別）"
    category: "品詞"
    priority: "P1"
    notes: |
      核心（意味の面）: 「意味」がポイントの形容詞 — -able/-ibleの語尾で能動/受動を判別する法則
      ■ -able/-ibleの2つの特徴:
      ①可能「～できる」
      ②受動「～される」
      -able/-ibleは「～されることができる」と考えると、まぎらわしい形容詞の意味が鮮明に区別できる。
      裏返し: -able/-ible以外の語尾は能動「～する」と考えられる。
      ■ 入試で特に大事なペア（能動 vs. 受動）:
      ・forgetful（忘れっぽい: 能動）vs. forgettable（印象に残らない: 受動 ← 忘れられるような）
      ・respectful（敬意を示す: 能動）vs. respectable（立派な: 受動 ← 尊敬されるような）
      ・regretful（残念に思っている: 能動）vs. regrettable（残念な: 受動 ← 後悔されるような）
      ■ available = 「スタンバイOK」:
      avail「役立つ」+ -able → 「使われることができる」→「スタンバイOK」
      ・物がスタンバイOK → 利用できる・手に入る
      ・人がスタンバイOK → 都合がつく・手が空いている
      availableの訳語（利用できる/手に入る/都合がつく/手が空いている）を個別に暗記するのではなく、「スタンバイOK」の1イメージで統一理解。

  # --- Kaku_05: 副詞 ---
  - id: "khs-010"
    name: "副詞の品詞判別（名詞混同・-ly法則・接続副詞）"
    category: "品詞"
    priority: "P1"
    notes: |
      核心（用法の面）: 「用法」がポイントの副詞 — 品詞を意識して判別する
      ■ 名詞と勘違いしやすい副詞（場所関係の単語に多い）:
      home「家に・家で」/ here「ここに」/ there「そこに」/ abroad・overseas「海外へ」/ downtown「繁華街へ」
      名詞ではないので「直前に前置詞は不要」がポイント。× go to abroad → ○ go abroad
      ※homeには名詞用法もあるが、入試では副詞用法が問われる。
      ■ -lyがつくと品詞が「右に1つズレる」法則:
      [図表: 品詞ズレ図 — 名詞→(+ly)形容詞→(+ly)副詞（p.45）]
      名詞 + ly = 形容詞（friendly, lovely, timely, likely, unlikely）
      形容詞 + ly = 副詞（completely, carefully等）
      -lyで終わるのに副詞ではない単語: ①時間関係 daily/weekly/monthly ②その他 friendly/lovely/timely/likely/unlikely
      ■ 接続副詞は結局「副詞」:
      however等の接続副詞は意味は接続詞っぽいが、品詞は副詞 → 文をつなぐ働きはない。
      × SV however SV. → ○ SV. However, SV.
      接続副詞の例: however/nevertheless/instead/also/besides/moreover/furthermore/otherwise/therefore
      ※besidesには前置詞（～に加えて）の用法もある。
      ▶ まとめ 形容詞と副詞の区別: 形容詞=名詞を修飾・Cになる、副詞=名詞以外を修飾・M（修飾要素）になる
      前提知識との差分: 中学英語では品詞を意識することが少なく、単語の意味ばかりに意識がいく。高校では文法的視点が必要。

  - id: "khs-011"
    name: "副詞の位置ルール（enough・頻度の副詞・わがまま副詞）"
    category: "品詞"
    priority: "P1"
    notes: |
      核心（用法の面続き）: 入試に出る「位置が決まった副詞」3パターン
      副詞の位置はある程度自由だが、入試で問われるのは「位置が明確に決まっている副詞」だけ。
      ■ (1) enough:
      enoughは例外的に、修飾したい形容詞・副詞の「直後」に置く。
      [形容詞・副詞] enough to ～「～するほど[形容詞・副詞]だ」
      × enough big → ○ big enough
      ※enough [名詞] の形はOK（名詞の前は可）。入試でポイントになるのは「後ろにくるとき」だけ。
      ■ (2) 頻度の副詞（「notと同じ位置」で解決）:
      always(100%) / usually(80%) / often(60%) / sometimes(50%) / seldom・rarely(10%) / hardly ever・scarcely ever(5%) / not・never(0%)
      位置の覚え方: notの位置を知っているはず → 頻度の副詞は全てnotと同じ位置。
      be動詞の後（She is usually late. ← is notと同じ位置）、一般動詞の前（hardly ever goes ← do not goと同じ位置）。
      ■ (3) わがまま副詞（so・as・too・how・howeverの5つ）:
      普通の副詞（very等）は「謙虚」で自ら修飾する相手のそばへ移動する（a very good teacher）。
      わがまま副詞は「自らは動かず、修飾する単語を自分のそばに来させる」。
      [図表: わがまま副詞の語順 — very: a very good teacher（謙虚）vs. so: so good a teacher（わがまま）（p.48-49）]
      語順: [わがまま副詞] [形容詞] [冠詞] [名詞]
      例: so interesting a book / as nice a person as

  - id: "khs-012"
    name: "意味がまぎらわしい副詞（-ly変化・almost/nearly）"
    category: "品詞"
    priority: "P1"
    notes: |
      核心（意味の面）: 「意味」がポイントの副詞 — -lyがつくと意味が変わる副詞とalmost/nearlyの正確な意味
      ■ -lyがつくと意味が変わる副詞:
      元々副詞のものにさらに-lyがつくとガラっと意味が変わる。
      hard「熱心に」→ hardly「ほとんど～ない」（≒ scarcely）
      late「遅く」→ lately「最近」
      most「ほとんど」→ mostly「たいていの場合は／大部分は」
      near「近くに」→ nearly「ほとんど」（≒ almost）
      「hardやlateには形容詞・副詞の両方がある。だからあえて-lyがつく以上、何か別の意味を生み出す」と考えるとよい。
      ■ almost/nearlyの正確な意味（「あともうちょっと」「ちょっと足りない」）:
      almost 70%は68%などを示す。絶対に70%は超えない。「ほとんど70%」と訳すと72%を想像するかもしれないが誤り。
      「ほとんど・約」の区別:
      about/around/approximately「約」= 前後両方OK
      almost/nearly「ほとんど」= その数値には達しない
      barely「かろうじて」= わずかに上回る
      ■ 動詞を修飾するalmost/nearly:
      「もう少しで～しそう（実際はしない）」という意味。
      He nearly missed his flight. = 実際には乗り遅れなかった。
      グラフ問題で大事な知識。

  # --- Kaku_06: 接続詞 ---
  - id: "khs-013"
    name: "等位接続詞（2種類の区別・andの構造・重要表現）"
    category: "品詞"
    priority: "P1"
    notes: |
      核心: 接続詞は2種類／接続詞は「形」から入る
      ■ 接続詞の2種類:
      (1) 等位接続詞（and・but・orなど）: 2つのものを対等に結ぶ。少ない。
      (2) 従属接続詞（when・ifなどたくさん）: 副詞節をつくる（一部は名詞節も）。多い。
      ■ 等位接続詞の基本 — andの構造:
      「andを見たら後ろを見てから前を探す」
      [図表: 構造図 — andの構造。①andに反応→②直後のBに注目→③「Bと対等な品詞」をandより前で探す（p.56）]
      ※A ... and Bの形で、Aの後に長い語句が入るときに特に効果的。
      ※3つを結ぶときは A, B and C の形。
      ■ 等位接続詞を使った重要表現（AとBをセットで考える）:
      並列系: both A and B「AとB両方」/ either A or B「AかBどちらか」/ neither A nor B「AもBもどちらも〜ない」
      対比系: not A but B「AでなくB」/ not only A but also B「Aだけでなく Bも」
      both A and Bが主語のとき動詞は複数扱い（are）。
      前提知識との差分: 中学ではandやifの意味だけ覚えるが、高校では品詞としての理解が必要。

  - id: "khs-014"
    name: "従属接続詞の副詞節（形・前置詞との区別・主要接続詞・s+be省略）"
    category: "品詞"
    priority: "P1"
    notes: |
      核心（従属接続詞の「形」）: 従属接続詞は副詞節をつくる
      ■ 用語の整理:
      従属接続詞 = if, because等の「単語そのもの」
      副詞節 = 「if svというカタマリ」（従属接続詞がつくるグループ）
      主節 = メインのSV、従属節 = 従属接続詞を含むsv
      従属節を品詞の観点からは「副詞節」、主節との兼ね合いからは「従属節」と呼ぶ。
      [図表: 構造図 — 従属接続詞の構造。( If sv ), SV. で副詞節と主節を示す（p.57）]
      ■ 従属接続詞の形: ( 従属接続詞 sv ), SV.　※副詞節が後ろでもOK: SV ( 従属接続詞 sv )
      ▶ まとめ 等位接続詞 vs 従属接続詞:
      等位接続詞: 対等に結ぶ、単語・句・節・文（何でもOK）、数は少ない
      従属接続詞: 対等でない（従属）、文のみ、数は多い
      ■ 前置詞と接続詞の区別（「後ろの形」で判別）:
      前置詞: 後ろに名詞（代名詞・動名詞含む）→ 副詞句/形容詞句をつくる
      接続詞: 後ろにSV → 副詞節をつくる
      入試頻出ペア: during/while（〜の間）、by/by the time（〜までには）、because of/because（〜なので）、without/unless（〜しなければ）、in spite of・despite/though・although・even though・even if（〜だけれども）
      補足: 前置詞・接続詞「両方」の用法がある語（時関係に多い）: before/after/till/until/since/as
      ■ 従属接続詞一覧（意味と形）:
      (1)時: when/while/before/after/till・until/since/as soon as/by the time
      (2)条件: if/unless/once/in case/as long as・so long as/as far as・so far as
      (3)対比/逆接・譲歩: while・whereas/though・although/even though/even if/if（=even if）/whether
      (4)理由: because/since・as/in that/now that
      ■ 副詞節内のs+be省略（2条件を同時に満たすとき）:
      ①副詞節内のs＝主節のS　②副詞節内の動詞がbe動詞
      例: while {I am} walking → while walking / while {you are} seated → while seated

  - id: "khs-015"
    name: "名詞節をつくる接続詞（that名詞節・同格のthat・if/whether判別）"
    category: "品詞"
    priority: "P1"
    notes: |
      ■ 名詞節をつくれる従属接続詞はたった3つ: that・if・whether
      ■ 接続詞thatの名詞節:
      that sv =「svということ」。名詞と交換可能。
      I know the man. → I know that he is rich. （名詞をthat節に置き換え）
      ■ SV that〜の裏技: Vは「認識・伝達系」の動詞 →「思う・言う」の意味を当てはめれば大体わかる。
      知らない動詞でもSV that〜の形ならば「思う・言う」で通る（100%完璧ではないが十分）。
      ■ 同格のthat:
      「名詞 that sv」の形で、名詞の内容をthat以下で説明。「2つの名詞が同じように並ぶ」から「同格」。
      同格のthatをとる名詞は事実・認識・可能性系統: fact/news/knowledge/conclusion/idea/thought/belief/feeling/likelihood等
      ■ ifの3つの意味（核心: 半々の不安定）:
      ①副詞節「もし〜ならば」②副詞節「たとえ〜でも」（= even ifの形もある）③名詞節「〜かどうか」
      判別法: 他動詞の直後にif〜があれば名詞節（目的語）→「〜かどうか」
      ■ whetherの判別（核心: 2つのうちどっちか）:
      ①副詞節「〜であろうとなかろうと」②名詞節「〜かどうか」
      名詞節のときifとwhetherは同じ意味。
      ▶ まとめ if/whetherの意味: if（副詞節: もし〜/たとえ〜でも、名詞節: 〜かどうか）、whether（副詞節: 〜であろうとなかろうと、名詞節: 〜かどうか）
      参考書内参照: →テーマ7「他動詞」（knowは他動詞なので直後に名詞が必要）

  - id: "khs-016"
    name: "so~that構文（結果/程度・so that目的の判別）"
    category: "品詞"
    priority: "P1"
    notes: |
      ■ so ~ that ... の2つの意味:
      ①結果「とても〜なので（その結果）…だ」→ 前から訳す
      ②程度「…なくらい〜だ」→ 後ろから訳す
      訳し方: まず結果で訳す → 不自然なら程度に切り替え。実際には結果・程度どちらでも解釈できるものが大半。
      ■ so that〜との区別:
      soとthatがくっつくときは「目的（〜するために）」。
      so thatの後ろには必ず助動詞が必要（will/can/may、時制の一致でwould/could/might）。
      so ~ that ...: soとthatが離れている → 結果/程度
      so that sv: soとthatがくっつく + 助動詞 → 目的

