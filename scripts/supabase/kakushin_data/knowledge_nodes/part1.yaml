check_points:
  # khs-001
  - node_id: "khs-001"
    seq: 1
    question: "theはどのようなときに使うか？"
    answer: "そこに居合わせた人みんなで「共通に認識できる」ものにtheを使う。"
  - node_id: "khs-001"
    seq: 2
    question: "the sun, the eastなどにtheがつく理由は？"
    answer: "太陽や方角はみんなで一斉に指さすことができる（共通認識できる）ため。「天体のthe」「方角のthe」と個別に覚える必要はない。"
  - node_id: "khs-001"
    seq: 3
    question: "Open the door.でいきなりtheが使われる理由は？"
    answer: "状況からどのドアを指すか共通認識できるため。「最初はa」のルールが成立しない例。"
  - node_id: "khs-001"
    seq: 4
    question: "Do you have the time?はどういう意味か？Do you have time?との違いは？"
    answer: "「今何時ですか？」。the timeは共通認識できる時間＝現時刻。Do you have time?は「時間ありますか？」で別の意味。"
  # khs-002
  - node_id: "khs-002"
    seq: 1
    question: "aはどのようなときに使うか？"
    answer: "共通認識できないとき、「たくさんある中の1つ」というときにaを使う。"
  - node_id: "khs-002"
    seq: 2
    question: "once a weekのaはどういう意味か？核心からどう導けるか？"
    answer: "「〜につき」。「1つの」→「1つずつにつき」から派生。"
  - node_id: "khs-002"
    seq: 3
    question: "theとaの文法用語での名前と意味は？"
    answer: "the＝定冠詞（定まったものに使う）、a＝不定冠詞（定まらないものに使う）。"
  # khs-003
  - node_id: "khs-003"
    seq: 1
    question: "make friends withのfriendsはなぜ複数形か？"
    answer: "友達になるには2人の人間（自分と相手）が必要。英語では「神様の視点」で世界に2人友達が生まれたという感覚で複数形になる。"
  - node_id: "khs-003"
    seq: 2
    question: "change trainsはなぜ複数形か？"
    answer: "今乗ってきた電車とこれから乗る電車の2つがあるため。「複数でないと成立しない行為」の例。"
  - node_id: "khs-003"
    seq: 3
    question: "「複数形がポイントになる熟語」を4つ挙げよ。"
    answer: "make friends with ~, shake hands with ~, change trains, be on [形容詞] terms with ~。どれも「複数でないと成立しない行為」。"
  # khs-004
  - node_id: "khs-004"
    seq: 1
    question: "information, advice, newsはなぜ不可算名詞か？"
    answer: "「目に見えない」から。不可算名詞パターン(1)。"
  - node_id: "khs-004"
    seq: 2
    question: "workが「仕事」（不可算）と「作品」（可算）で扱いが変わるのはなぜか？"
    answer: "「仕事」は目に見えないから不可算。「作品」は切ったらOKじゃない（性質が失われる）から可算。パターン(2)の逆の発想。"
  - node_id: "khs-004"
    seq: 3
    question: "furniture, baggageはなぜ不可算名詞か？"
    answer: "「ひとまとめ」の概念。furniture = chairs + tables + beds のように元から複数を含んだ単語。さらにsや冠詞aをつけない。"
  - node_id: "khs-004"
    seq: 4
    question: "不可算名詞にmanyは使えるか？someは？"
    answer: "manyは使えない（much/a lot ofを使う）。someは可算・不可算の両方に使える。"
  - node_id: "khs-004"
    seq: 5
    question: "homework, houseworkはなぜ不可算名詞か？"
    answer: "「目に見えない」から。見えるのは宿題のテキストや掃除機であり、仕事そのものは目に見えないという英語の発想。"
  # khs-005
  - node_id: "khs-005"
    seq: 1
    question: "the otherとanotherの違いは何か？"
    answer: "theとaの違い。the other = 共通認識できる（残り1つが特定できる）。another = an + other で、特定できない「もう1個」。"
  - node_id: "khs-005"
    seq: 2
    question: "2つのうち1つを指した後、残りはどう表現するか？"
    answer: "one ... the other。残り1つは特定できるのでthe otherを使う。"
  - node_id: "khs-005"
    seq: 3
    question: "the othersとothers（theなし）の違いは？"
    answer: "the others = 残り全員が特定できる場合。others = 残りが特定できない場合（他にもまだいる）。"
  - node_id: "khs-005"
    seq: 4
    question: "3つ以上あるとき、1つめの次の「もう1個」はthe otherとanotherのどちらか？"
    answer: "another。まだ残りがいくつかあるので、どれを指すか特定できない。anotherの正体は an + other。"
  # khs-006
  - node_id: "khs-006"
    seq: 1
    question: "itとoneの違いは？"
    answer: "it = 特定のもの（「ズバリそれっ！」前に出た名詞そのもの）。one = 不特定のもの（「同じ種類のそれ」たくさんある中の1つ）。"
  - node_id: "khs-006"
    seq: 2
    question: "that of ~はどういう意味か？なぜthatが使われるか？"
    answer: "「~のそれ（と同じもの）」。例: that of India = the population of India。thatは後置修飾のみOKで、of ~がthatを修飾する。"
  - node_id: "khs-006"
    seq: 3
    question: "it/one/thatの修飾パターンの違いは？"
    answer: "it = 前置・後置ともNG。one = 前置・後置ともOK（this one, the one in the box等）。that = 後置のみOK（語源がtheと同じで前置修飾不可）。"
  - node_id: "khs-006"
    seq: 4
    question: "oneは不可算名詞を受けることができるか？"
    answer: "できない。oneは可算名詞のみ。itとthatは可算・不可算の両方を受けられる。"
  # khs-007
  - node_id: "khs-007"
    seq: 1
    question: "bothとallはどう使い分けるか？"
    answer: "both = 2つの場合の「両方」。all = 3つ以上の場合の「全部」。2つだけのものにallは使えない。"
  - node_id: "khs-007"
    seq: 2
    question: "neitherとnoneはどう使い分けるか？"
    answer: "neither = 2つの場合の「どちらも~ない」。none = 3つ以上の場合の「どれも~ない」。"
  - node_id: "khs-007"
    seq: 3
    question: "None of ~は使えるが、No of ~は使えない。なぜか？"
    answer: "noは形容詞で「no 名詞」の形で使う。noneは代名詞で「none of ~」の形をとれる。× no of ~という形は英語に存在しない。"
  # khs-008
  - node_id: "khs-008"
    seq: 1
    question: "限定用法のみの形容詞の例を挙げよ。"
    answer: "only「唯一の」, elder「年上の」, live「生きている」（発音はライヴ）。名詞の前に置く用法でしか使えない。"
  - node_id: "khs-008"
    seq: 2
    question: "叙述用法のみの形容詞にはどのような特徴があるか？"
    answer: "aで始まるものが多い（alike, alive, asleep, awake, afraid, aware）。名詞の前には置けず、補語としてのみ使う。"
  - node_id: "khs-008"
    seq: 3
    question: "three-years-old boysはなぜ誤りか？"
    answer: "ハイフンで結ばれて形容詞化しているため複数形にならない。正しくはthree-year-old boys。形容詞に単数・複数はありえない。"
  - node_id: "khs-008"
    seq: 4
    question: "「あなたに都合がよい」はYou are convenient.で正しいか？"
    answer: "誤り。convenientは人を主語にできない形容詞。It is convenient for you. が正しい。"
  - node_id: "khs-008"
    seq: 5
    question: "a fewとfewの違いは？"
    answer: "a few = 「少しある」（肯定的）。few = 「ほとんどない」（否定的）。aは「ある程度のカタマリ1つ」→ある = 肯定、aなし = 1つのカタマリすらない = 否定。"
  # khs-010
  - node_id: "khs-010"
    seq: 1
    question: "go to abroadは正しいか？なぜか？"
    answer: "誤り。abroadは副詞なので前置詞toは不要。正しくはgo abroad。home, here, there, overseas, downtownも同様。"
  - node_id: "khs-010"
    seq: 2
    question: "friendlyやlovelyは-lyで終わるが品詞は何か？なぜか？"
    answer: "形容詞。名詞(friend) + ly = 形容詞。-lyは品詞を「右に1つズレ」させる。形容詞 + ly = 副詞のパターンではない。"
  - node_id: "khs-010"
    seq: 3
    question: "SV however SV.はなぜ誤りか？正しくはどう書くか？"
    answer: "howeverは接続副詞＝あくまで「副詞」。接続詞のように文をつなぐ働きはない。正しくはSV. However, SV.とピリオドで文を分ける。"
  - node_id: "khs-010"
    seq: 4
    question: "-lyで終わる「形容詞」の代表例を3つ以上挙げよ。"
    answer: "daily, weekly, monthly（時間関係）、friendly, lovely, timely, likely, unlikely（その他）。名詞 + ly = 形容詞のパターン。"
  # khs-011
  - node_id: "khs-011"
    seq: 1
    question: "enough bigは正しいか？正しい語順は？"
    answer: "誤り。enoughは修飾する形容詞・副詞の直後に置く。正しくはbig enough。"
  - node_id: "khs-011"
    seq: 2
    question: "頻度の副詞の位置はどう覚えればよいか？"
    answer: "「notと同じ位置」。be動詞の後（is usually = is notと同じ位置）、一般動詞の前（hardly ever goes = do not goと同じ位置）。"
  - node_id: "khs-011"
    seq: 3
    question: "わがまま副詞5つを挙げよ。"
    answer: "so・as・too・how・however。この5つだけが[わがまま副詞][形容詞][冠詞][名詞]の語順をとる。"
  - node_id: "khs-011"
    seq: 4
    question: "a so interesting bookは正しいか？正しい語順は？"
    answer: "誤り。soはわがまま副詞なので形容詞を自分のそばに引きずり出す。正しくはso interesting a book。"
  - node_id: "khs-011"
    seq: 5
    question: "as (　) you thinkの空所にas nice a person asとa person as nice asのどちらが入るか？"
    answer: "as nice a person as。asはわがまま副詞なので[as][形容詞][冠詞][名詞]の語順。"
  # khs-012
  - node_id: "khs-012"
    seq: 1
    question: "hardlyとhardの違いは？"
    answer: "hard =「熱心に」（副詞）。hardly =「ほとんど～ない」。-lyがつくとガラっと意味が変わる。"
  - node_id: "khs-012"
    seq: 2
    question: "latelyとlateの違いは？"
    answer: "late =「遅く」。lately =「最近」。-lyがつくと別の意味になる。"
  - node_id: "khs-012"
    seq: 3
    question: "almost 70%は72%を含むか？"
    answer: "含まない。almost/nearlyは「ちょっと足りない」の意味で、その数値には絶対に達しない。68%程度を示す。「約」のabout/aroundとは異なる。"
  - node_id: "khs-012"
    seq: 4
    question: "He nearly missed his flight.は乗り遅れたのか？"
    answer: "乗り遅れなかった。動詞を修飾するnearly/almostは「もう少しで～しそう（実際はしない）」の意味。"
  # khs-009
  - node_id: "khs-009"
    seq: 1
    question: "-able/-ibleの語尾はどのような意味を持つか？"
    answer: "①可能「～できる」②受動「～される」。「～されることができる」と考えると判別に使える。"
  - node_id: "khs-009"
    seq: 2
    question: "respectfulとrespectableの違いは？"
    answer: "respectful = 能動「敬意を示す」（-fulは-able以外→能動）。respectable = 受動「立派な・尊敬されるような」（-able→受動）。"
  - node_id: "khs-009"
    seq: 3
    question: "regretfulとregrettableのどちらが「残念に思っている」か？"
    answer: "regretful（-ful = 能動「残念に思っている」）。regrettableは-able = 受動「残念な・悲しむべき」。"
  - node_id: "khs-009"
    seq: 4
    question: "availableの多義語（利用できる/手に入る/都合がつく）はどのようなイメージで統一できるか？"
    answer: "-ableから「使われることができる」→「スタンバイOK」。物がスタンバイOK = 利用できる・手に入る、人がスタンバイOK = 都合がつく・手が空いている。"
  # khs-013
  - node_id: "khs-013"
    seq: 1
    question: "等位接続詞と従属接続詞の違いは何か？"
    answer: "等位接続詞は対等に結ぶ（and/but/or等、少ない）。従属接続詞は副詞節をつくる（when/if等、多い）。等位接続詞は何でも結べるが、従属接続詞は文のみ。"
  - node_id: "khs-013"
    seq: 2
    question: "andを見たとき、何と何を結んでいるかどう判断するか？"
    answer: "「andを見たら後ろを見てから前を探す」。①andに反応→②直後のBに注目→③Bと対等な品詞をandより前で探す。"
  - node_id: "khs-013"
    seq: 3
    question: "both A and Bが主語のとき、動詞は単数扱いか複数扱いか？"
    answer: "複数扱い（are）。Both he and I are against the plan."
  - node_id: "khs-013"
    seq: 4
    question: "neither A nor Bはどういう意味か？"
    answer: "「AもBもどちらも〜ない」。並列系（both A and B, either A or B）と対比系（not A but B, not only A but also B）のグループがある。"
  # khs-014
  - node_id: "khs-014"
    seq: 1
    question: "従属接続詞の形（構造）はどうなるか？"
    answer: "(従属接続詞 sv), SV. の形。副詞節が前でも後ろでもOK: SV (従属接続詞 sv)."
  - node_id: "khs-014"
    seq: 2
    question: "duringとwhileの違いは何か？"
    answer: "during = 前置詞（後ろに名詞）。while = 接続詞（後ろにSV）。「後ろの形」で判別する。"
  - node_id: "khs-014"
    seq: 3
    question: "because ofとbecauseの違いは何か？"
    answer: "because of = 前置詞（後ろに名詞）。because = 接続詞（後ろにSV）。「後ろの形」で判別する。"
  - node_id: "khs-014"
    seq: 4
    question: "副詞節内のs+be省略ができる2つの条件は？"
    answer: "①副詞節内のs＝主節のS、②副詞節内の動詞がbe動詞。2つ同時に満たすとき省略可能。"
  - node_id: "khs-014"
    seq: 5
    question: "while walkingの省略前の形は？（主語がIの場合）"
    answer: "while I am walking。副詞節のs(I)=主節のS(I)かつbe動詞(am)なので省略可能。"
  # khs-015
  - node_id: "khs-015"
    seq: 1
    question: "名詞節をつくれる従属接続詞は何か？"
    answer: "that・if・whetherの3つだけ。多数ある従属接続詞の中で名詞節をつくれるのはこの3つに限られる。"
  - node_id: "khs-015"
    seq: 2
    question: "SV that〜の形でVの意味がわからないとき、どう推測するか？"
    answer: "裏技: Vは「認識・伝達系」の動詞なので「思う・言う」を当てはめれば大体わかる。"
  - node_id: "khs-015"
    seq: 3
    question: "同格のthatをとる名詞にはどのような特徴があるか？"
    answer: "事実・認識・可能性系統の名詞: fact/news/knowledge/conclusion/idea/thought/belief/feeling/likelihood等。「名詞 that sv」の形で名詞の内容を説明する。"
  - node_id: "khs-015"
    seq: 4
    question: "ifが「もし〜ならば」か「〜かどうか」か、どう判別するか？"
    answer: "他動詞の直後にif〜があれば名詞節（目的語）→「〜かどうか」。それ以外は副詞節→「もし〜ならば」または「たとえ〜でも」。"
  - node_id: "khs-015"
    seq: 5
    question: "名詞節のとき、ifとwhetherに意味の違いはあるか？"
    answer: "ない。名詞節のときifとwhetherは同じ意味（「〜かどうか」）。"
  # khs-016
  - node_id: "khs-016"
    seq: 1
    question: "so ~ that ... の2つの意味は何か？"
    answer: "①結果「とても〜なので（その結果）…だ」→ 前から訳す。②程度「…なくらい〜だ」→ 後ろから訳す。まず結果で訳し、不自然なら程度に切り替え。"
  - node_id: "khs-016"
    seq: 2
    question: "soとthatがくっついているときと離れているときの意味の違いは？"
    answer: "離れている（so ~ that ...）= 結果/程度。くっついている（so that sv）= 目的「〜するために」。"
  - node_id: "khs-016"
    seq: 3
    question: "so that svの後に何が必要か？"
    answer: "助動詞が必要（will/can/may、時制の一致でwould/could/might）。助動詞がないso thatはありえない。"

