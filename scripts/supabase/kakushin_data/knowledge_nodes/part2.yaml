check_points:
  # kvt-001
  - node_id: "kvt-001"
    seq: 1
    question: "フェイズ2で全ての品詞は最終的に何種類に集約されるか？"
    answer: "4種類（名詞・形容詞・副詞・動詞）。"
  - node_id: "kvt-001"
    seq: 2
    question: "前置詞＋名詞のカタマリは何の品詞として働くか？"
    answer: "副詞または形容詞。"
  - node_id: "kvt-001"
    seq: 3
    question: "句と節の共通点と相違点は？"
    answer: "共通点: どちらも「カタマリになる」こと。相違点: SVの有無（句＝SVなし、節＝SVあり）。"
  - node_id: "kvt-001"
    seq: 4
    question: "文の要素S・V・O・C・Mのうち、名詞がなれるものは？"
    answer: "S（主語）、O（目的語）、C（補語）。"
  - node_id: "kvt-001"
    seq: 5
    question: "Mになれる品詞は？"
    answer: "形容詞と副詞。Mは名詞以外を修飾する働きがある語。"
  # kvt-002
  - node_id: "kvt-002"
    seq: 1
    question: "自動詞と他動詞を簡単に判別する方法は？"
    answer: "「何を？」と聞き返せるなら他動詞、「何を？」が変で「あっそう」で終わるなら自動詞。"
  - node_id: "kvt-002"
    seq: 2
    question: "lieの活用と意味は？"
    answer: "自動詞「いる・ある・横になる」lie-lay-lain。（×「横たわる」ではなく「いる」で覚える）"
  - node_id: "kvt-002"
    seq: 3
    question: "layの活用と意味は？lieの過去形との区別は？"
    answer: "他動詞「置く・横にする」lay-laid-laid。lieの過去形layと同綴りだが、3単現の-sや目的語の有無で判別。"
  - node_id: "kvt-002"
    seq: 4
    question: "discussは自動詞か他動詞か？前置詞は必要か？"
    answer: "他動詞（「〜について」系の例外）。直後に名詞が来る。× discuss about は誤り。"
  - node_id: "kvt-002"
    seq: 5
    question: "riseとraiseの違いは？"
    answer: "rise＝自動詞「上がる」(rise-rose-risen)、raise＝他動詞「上げる」(raise-raised-raised)。"
  # kvt-003
  - node_id: "kvt-003"
    seq: 1
    question: "第1文型で知らない動詞が出たら、どう意味を推測するか？"
    answer: "「いる・ある」か「動く」と考える。第1文型の動詞は存在・移動の意味が多い。"
  - node_id: "kvt-003"
    seq: 2
    question: "第2文型の特徴は？"
    answer: "S＝Cが成り立つ。Cには形容詞か名詞が入る。"
  - node_id: "kvt-003"
    seq: 3
    question: "「動詞＋形容詞」の形のとき、文型は何で、動詞の意味はどう推測するか？"
    answer: "第2文型（SVC）。動詞は「イコール」の意味と推測する。"
  - node_id: "kvt-003"
    seq: 4
    question: "stayが第1文型と第2文型で使われたとき、それぞれどういう意味か？"
    answer: "第1文型「滞在する」（stay at a hotel）、第2文型「〜のままでいる」（stay high）。"
  - node_id: "kvt-003"
    seq: 5
    question: "第2文型をとる代表的な動詞を3グループ挙げよ。"
    answer: "①存在・継続(be, keep) ②変化(become, get, turn, grow, come, go) ③感覚(seem, appear, look, feel, sound)。"

