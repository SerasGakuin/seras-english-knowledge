check_points:
  # kvt-001
  - node_id: "kvt-001"
    seq: 1
    question: "フェイズ2で全ての品詞は最終的に何種類に集約されるか？"
    answer: "4種類（名詞・形容詞・副詞・動詞）。"
  - node_id: "kvt-001"
    seq: 2
    question: "前置詞＋名詞のカタマリは何の品詞として働くか？"
    answer: "副詞または形容詞。"
  - node_id: "kvt-001"
    seq: 3
    question: "句と節の共通点と相違点は？"
    answer: "共通点: どちらも「カタマリになる」こと。相違点: SVの有無（句＝SVなし、節＝SVあり）。"
  - node_id: "kvt-001"
    seq: 4
    question: "文の要素S・V・O・C・Mのうち、名詞がなれるものは？"
    answer: "S（主語）、O（目的語）、C（補語）。"
  - node_id: "kvt-001"
    seq: 5
    question: "Mになれる品詞は？"
    answer: "形容詞と副詞。Mは名詞以外を修飾する働きがある語。"
  # kvt-002
  - node_id: "kvt-002"
    seq: 1
    question: "自動詞と他動詞を簡単に判別する方法は？"
    answer: "「何を？」と聞き返せるなら他動詞、「何を？」が変で「あっそう」で終わるなら自動詞。"
  - node_id: "kvt-002"
    seq: 2
    question: "lieの活用と意味は？"
    answer: "自動詞「いる・ある・横になる」lie-lay-lain。（×「横たわる」ではなく「いる」で覚える）"
  - node_id: "kvt-002"
    seq: 3
    question: "layの活用と意味は？lieの過去形との区別は？"
    answer: "他動詞「置く・横にする」lay-laid-laid。lieの過去形layと同綴りだが、3単現の-sや目的語の有無で判別。"
  - node_id: "kvt-002"
    seq: 4
    question: "discussは自動詞か他動詞か？前置詞は必要か？"
    answer: "他動詞（「〜について」系の例外）。直後に名詞が来る。× discuss about は誤り。"
  - node_id: "kvt-002"
    seq: 5
    question: "riseとraiseの違いは？"
    answer: "rise＝自動詞「上がる」(rise-rose-risen)、raise＝他動詞「上げる」(raise-raised-raised)。"
  # kvt-003
  - node_id: "kvt-003"
    seq: 1
    question: "第1文型で知らない動詞が出たら、どう意味を推測するか？"
    answer: "「いる・ある」か「動く」と考える。第1文型の動詞は存在・移動の意味が多い。"
  - node_id: "kvt-003"
    seq: 2
    question: "第2文型の特徴は？"
    answer: "S＝Cが成り立つ。Cには形容詞か名詞が入る。"
  - node_id: "kvt-003"
    seq: 3
    question: "「動詞＋形容詞」の形のとき、文型は何で、動詞の意味はどう推測するか？"
    answer: "第2文型（SVC）。動詞は「イコール」の意味と推測する。"
  - node_id: "kvt-003"
    seq: 4
    question: "stayが第1文型と第2文型で使われたとき、それぞれどういう意味か？"
    answer: "第1文型「滞在する」（stay at a hotel）、第2文型「〜のままでいる」（stay high）。"
  - node_id: "kvt-003"
    seq: 5
    question: "第2文型をとる代表的な動詞を3グループ挙げよ。"
    answer: "①存在・継続(be, keep) ②変化(become, get, turn, grow, come, go) ③感覚(seem, appear, look, feel, sound)。"
  # kvt-004
  - node_id: "kvt-004"
    seq: 1
    question: "V 人 物の形で知らない動詞が出てきたら、どう意味を推測するか？"
    answer: "「与える」と考える。「奪う」系はtake/cost/save/spare/oweだけなので、それ以外はすべて「与える」。"
  - node_id: "kvt-004"
    seq: 2
    question: "「奪う」系動詞を5つ挙げ、共通点を説明せよ。"
    answer: "take（時間を奪う）/cost（金・大事なものを奪う）/save（手間を奪う）/spare（手間を奪う）/owe（金を一時的に奪う）。すべてV 人 物「人から物を奪う」が共通形。"
  - node_id: "kvt-004"
    seq: 3
    question: "spare 人 物の意味が「与える」か「奪う」かを判別する方法は？"
    answer: "物にくる名詞の種類で判別。時間・お金→「与える」（余ったものを割く）。マイナス単語（trouble等）→「奪う」（手間を省く）。"
  - node_id: "kvt-004"
    seq: 4
    question: "do 人 物で物に入れる名詞にはどんな制限があるか？"
    answer: "「善悪・利害」に関する名詞に限定（good/harm/damage/a favor等）。何でも使えるわけではない。"
  - node_id: "kvt-004"
    seq: 5
    question: "It takes 人 時間 to ~を「奪う」の観点から説明せよ。"
    answer: "take 人 時間「人から時間を奪う」の形。Itは仮主語、to~が真主語。人はよく省略される。公式丸暗記ではなく第4文型として理解する。"
  # kvt-005
  - node_id: "kvt-005"
    seq: 1
    question: "SVOOとSVOCはどう判別するか？"
    answer: "Vの後の2要素がO₁≠O₂なら第4文型SVOO、O=Cなら第5文型SVOC。Cに形容詞がきたら即断でSVOC。"
  - node_id: "kvt-005"
    seq: 2
    question: "SVOCの3ステップとは？"
    answer: "step1: SVOCをとる動詞に反応。step2: OとCの関係把握（O=C or s'v'）。step3: s'v'の吟味（能動「する」→原形/to不定詞/-ing、受動「される」→p.p.）。"
  - node_id: "kvt-005"
    seq: 3
    question: "使役・知覚動詞はなぜ原形をとれるのか？to不定詞は使えるか？"
    answer: "原形/to不定詞はカードの裏表。使役・知覚動詞は「セレブ」扱いで原形をとれる特権がある。その裏として to不定詞は不可。ただし-ing・p.p.は併用可能。"
  - node_id: "kvt-005"
    seq: 4
    question: "使役動詞make/have/letのニュアンスの違いは？"
    answer: "make=強制・必然（OCの状態をつくる、必然的に~になる）。have=利害（させた/してもらった/されたは立場の違いだけ）。let=許可（好きなように~させてあげる）。"
  - node_id: "kvt-005"
    seq: 5
    question: "make oneself understoodの意味と構造は？"
    answer: "「話が通じる」。make OC構文で、oneself(O)がunderstood(C=p.p.)される受動関係。直訳「自分自身が理解されるようにする」。"
  # kvt-006
  - node_id: "kvt-006"
    seq: 1
    question: "使役もどき（keep/leave/get）と使役動詞の決定的な違いは？"
    answer: "使役もどきは原形をとれない（セレブ特権がない）。get→to不定詞、keep/leave→-ing or p.p. or 形容詞。"
  - node_id: "kvt-006"
    seq: 2
    question: "keep me waitingのCがwaitedではなくwaitingになる理由は？"
    answer: "「私が待つ」=能動関係なので-ing。waitedだと「待たれる」という受動の意味になり不自然。"
  - node_id: "kvt-006"
    seq: 3
    question: "SV人to~の形で知らない動詞が出たとき、どう意訳するか？"
    answer: "「Sによって人は~する」と考える。動詞の正確な意味を知らなくても文意が予測できる。"
  - node_id: "kvt-006"
    seq: 4
    question: "helpの語法で特殊な点は？パターンを挙げよ。"
    answer: "原形とto不定詞の両方をとれる唯一の例外。① help 人 {to} 原形 ② help 人 with ~ ③ help {to} 原形「役立つ」④ help yourself to 物「自由に食べる」。"
  - node_id: "kvt-006"
    seq: 5
    question: "「させっぱなし」の代表例を2つ挙げ、OとCの関係を説明せよ。"
    answer: "例: keep her waiting（彼女が待つ=能動→-ing）、keep the door locked（ドアがカギをかけられる=受動→p.p.）。leave the window open（openは形容詞）。"
  # kvt-007
  - node_id: "kvt-007"
    seq: 1
    question: "現在形はどういう時間を表すか？"
    answer: "過去・現在・未来のどこにでも起こること。「昨日も今日も明日も」を表す。「現在・過去・未来形」と捉え直す。"
  - node_id: "kvt-007"
    seq: 2
    question: "What do you do?の意味は？なぜそうなるか？"
    answer: "「ご職業は？」。現在形doに注目。「昨日も今日も明日も何をするの？」→「普段何をするの？」→「お仕事は何を？」"
  - node_id: "kvt-007"
    seq: 3
    question: "「確定した未来」の正体は何か？The train arrives at 10.で説明せよ。"
    answer: "「現在・過去・未来に繰り返し行われる行為」のこと。The train arrives at 10.=「その電車は昨日も明日も10時に着く」。"
  # kvt-008
  - node_id: "kvt-008"
    seq: 1
    question: "時・条件を表す副詞節の中で未来のことを表すとき、動詞はどの形を使うか？"
    answer: "現在形。未来の形（willなど）が使えず、仕方なく現在形で代用する。"
  - node_id: "kvt-008"
    seq: 2
    question: "I don't know if he will go...のifは副詞節か名詞節か？なぜwillが使われているか？"
    answer: "名詞節「〜かどうか」。他動詞knowの目的語なので名詞節。副詞節ではないので未来のことは普通にwillを使う。"
  - node_id: "kvt-008"
    seq: 3
    question: "未来完了形を使う場面で副詞節内にいる場合、何で代用するか？"
    answer: "現在完了形（have p.p.）で代用する。"
  - node_id: "kvt-008"
    seq: 4
    question: "副詞節と名詞節の区別が入試で必要な接続詞は？出題されやすい動詞は？"
    answer: "ifとwhen。出題されやすい動詞はknow, wonder（他動詞+if/whenの形）。"
  # kvt-009
  - node_id: "kvt-009"
    seq: 1
    question: "進行形の核心は何か？"
    answer: "「途中」。「〜している」ではなく「〜している途中」と考える。"
  - node_id: "kvt-009"
    seq: 2
    question: "5秒ルールとは？具体例で説明せよ。"
    answer: "5秒ごとに中断・再開できない動詞は進行形にできない。know=記憶を消したり戻したりはできない→×be knowing。resemble=似なくなって、また似てくるは不可能→×be resembling。"
  - node_id: "kvt-009"
    seq: 3
    question: "haveはなぜ「持っている」では進行形不可だが「食べる」ではOKか？"
    answer: "「持っている」は5秒ごとに中断・再開できない→進行形不可。「食べる」は中断・再開可能→She is having lunch.はOK。"
  - node_id: "kvt-009"
    seq: 4
    question: "「予定」を表す進行形はどんな条件で使えるか？「近い未来」の正体は？"
    answer: "何かしら着手して進行しているとき。「近い未来」=時間の近さではなく着手済みかどうかが基準。1年先でも着手済みなら進行形OK。"
  - node_id: "kvt-009"
    seq: 5
    question: "5秒ルールの例外となる動詞は？"
    answer: "rain/snow/die。be dying「死にかけている（死に向かっている途中）」。It is raining.「雨が降っている」。"
  # kvt-010
  - node_id: "kvt-010"
    seq: 1
    question: "現在完了形の「矢印」はどの時間を表すか？重点はどこにあるか？"
    answer: "過去から現在までの矢印。重点は現在にある（過去の部分は曖昧でもよい）。"
  - node_id: "kvt-010"
    seq: 2
    question: "継続・完了/結果・経験のうち、なぜ経験が現在完了なのか？"
    answer: "経験自体は過去のことだが、英語では「過去にした経験を今現在まで経験値として持ち続けている」という発想。"
  - node_id: "kvt-010"
    seq: 3
    question: "forとsinceの違いは？"
    answer: "forは期間「〜の間」、sinceは起点「〜以来ずっと」。どちらも継続用法の目印。"
  - node_id: "kvt-010"
    seq: 4
    question: "完了・結果用法でよく使われる語句は？"
    answer: "just「ちょうど」、already「すでに」、yet（否定文で「まだ」・疑問文で「もう」）。"
  # kvt-011
  - node_id: "kvt-011"
    seq: 1
    question: "過去完了形はどうやって作るか？"
    answer: "現在完了形の矢印を過去にカット＆ペースト。先端を「過去の一点」にくっつける。had + p.p.。"
  - node_id: "kvt-011"
    seq: 2
    question: "「大過去」とは？"
    answer: "過去の②の時点よりもさらに過去のこと。「すごく昔」ではなく、基準となる過去の一点よりも前。"
  - node_id: "kvt-011"
    seq: 3
    question: "過去完了形の経験用法の例を説明せよ。"
    answer: "Until she came to Sapporo, she had never seen snow. 生まれてから過去の一点（札幌に来たとき）までの経験。"
  - node_id: "kvt-011"
    seq: 4
    question: "未来完了形の完了用法はどう考えるか？"
    answer: "未来の一点までに行為が完了する。例: I will have finished dinner by 10.「10時までには夕食を終えている」。"
  - node_id: "kvt-011"
    seq: 5
    question: "完了形のゾーン図を描けるか？"
    answer: "had p.p.ゾーン(大過去→過去) / have p.p.ゾーン(過去→現在) / will have p.p.ゾーン(現在→未来)。"
  # kvt-012
  - node_id: "kvt-012"
    seq: 1
    question: "完了進行形は何が強まるか？状態動詞はどうなるか？"
    answer: "継続の意味が強まる。状態動詞は進行形にできないのでhave + p.p.の形になる。"
  - node_id: "kvt-012"
    seq: 2
    question: "「〜してから年月が経った」を3通りで言え。注意点は？"
    answer: "①年月 have passed since sv ②It has been 年月 since sv ③It is 年月 since sv。注意: ①と②を混ぜて×It has passedは誤り（Itが過ぎるわけがない）。"
  - node_id: "kvt-012"
    seq: 3
    question: "have been toの2つの意味は？共通点は？"
    answer: "完了「行ってきたところだ」/ 経験「行ったことがある」。共通点: 今はここにいる（beは「いる」の意味）。"
  - node_id: "kvt-012"
    seq: 4
    question: "have gone toとhave been toの違いは？"
    answer: "have gone to=結果「行ってしまった（ここにいない）」、have been to=「行ってきた/行ったことがある（ここにいる）」。goの「離れていく」感覚。"
  # kvt-013
  - node_id: "kvt-013"
    seq: 1
    question: "仮定法の目印は何か？"
    answer: "助動詞の過去形（特にwould・could）。ifではない。ifがあっても直説法の場合がある。"
  - node_id: "kvt-013"
    seq: 2
    question: "仮定法過去は「いつ」の妄想を表すか？"
    answer: "「現在」の妄想。見た目は過去形だが、中身は現在の内容。「見た目は過去/中身は現在」。"
  - node_id: "kvt-013"
    seq: 3
    question: "ミックス仮定法の構造は？"
    answer: "If s had p.p.（過去の妄想）, S would 原形（現在の状態）。仮定法過去完了のif節 + 仮定法過去の主節。「あのとき〜だったら、今ごろ…だろうに」。"
  - node_id: "kvt-013"
    seq: 4
    question: "shouldを使った仮定法で、主節にはどんな形が来るか？"
    answer: "would原形だけでなく、命令文や直説法（willなど）も可。入試では命令文パターンが最頻出。"
  - node_id: "kvt-013"
    seq: 5
    question: "仮定法過去のif節でbe動詞はどう変化するか？"
    answer: "主語に関係なく常にwereを使う（If I were you...など）。"
  # kvt-014
  - node_id: "kvt-014"
    seq: 1
    question: "仮定法のifを省略すると何が起きるか？"
    answer: "倒置が起きる。Were/Had/Shouldが文頭に出て疑問文の語順になる。意味は変わらない。"
  - node_id: "kvt-014"
    seq: 2
    question: "倒置した副詞節が後ろに来る場合、コンマは必要か？"
    answer: "コンマなしでもOK（入れても入れなくてもOK）。ネイティブからは倒置が一目瞭然なので、コンマは余計に感じられる。"
  - node_id: "kvt-014"
    seq: 3
    question: "if節の代用表現で最も出題率が高い2つは？"
    answer: "withoutとotherwise。"
  - node_id: "kvt-014"
    seq: 4
    question: "otherwiseを使った仮定法の典型的パターンは？"
    answer: "直説法の文; otherwise, S would have p.p.（前半が直説法、otherwiseから仮定法モードに入る）。"
  # kvt-015
  - node_id: "kvt-015"
    seq: 1
    question: "without〜の言い換え3つは？"
    answer: "if it were not for 〜（現在）、if it had not been for 〜（過去）、but for 〜（主節の動詞で現在/過去を判断）。"
  - node_id: "kvt-015"
    seq: 2
    question: "It is time s 過去形で、timeの前につくことが多い語は？"
    answer: "about「そろそろ」やhigh「とっくに」。"
  - node_id: "kvt-015"
    seq: 3
    question: "I wish s 過去形は「いつ」の妄想を表すか？"
    answer: "「今」の妄想。wishと同時制。I wish s had p.p.は「あのとき」の妄想（wishより1つ前の時制）。"
  - node_id: "kvt-015"
    seq: 4
    question: "I wishの後に助動詞の過去形が不要な理由は？"
    answer: "wishの後にはif節の中身だけがくるため。助動詞の過去形は本来「主節」に必要で、if節には不要。"
  - node_id: "kvt-015"
    seq: 5
    question: "仮定法なのに助動詞の過去形が不要な2パターンは？"
    answer: "(1) shouldを使う未来の仮定法（主節に命令文やwill等が来てもOK）、(2) I wish（if節の中身がくるため）。"
  # kvt-016
  - node_id: "kvt-016"
    seq: 1
    question: "willの核心は？4つの意味は？"
    answer: "「100%必ず〜する」。①意志「〜するつもり」②予想「〜するはず」③習慣・習性「〜する習慣がある」④拒絶「（否定文で）絶対に〜しない」。"
  - node_id: "kvt-016"
    seq: 2
    question: "mayの核心は？2つの意味は？"
    answer: "「50%半々」。①許可「〜してもよい」（オススメ度50%）②予想「〜かもしれない」（予想50%）。"
  - node_id: "kvt-016"
    seq: 3
    question: "Will you〜?が依頼の意味になる理由は？"
    answer: "「〜するつもり？」→「（そのつもりなら）〜してくれる？」と派生。will「100%必ず」の核心から。"
  - node_id: "kvt-016"
    seq: 4
    question: "日本語の「かも」と英語のmayの違いは？"
    answer: "日本語の「かも」は1%〜99%で使えるが、英語のmayは50%半々の感覚。"
  # kvt-017
  - node_id: "kvt-017"
    seq: 1
    question: "mustの核心は？2つの意味は？"
    answer: "「それしかないでしょ！」。①義務「〜しなければならない」（そうするしかないでしょ！）②予想「〜に違いない」（そう考えるしかないでしょ！）。"
  - node_id: "kvt-017"
    seq: 2
    question: "must notとdon't have toの意味の違いは？"
    answer: "must not＝禁止「〜してはいけない」。don't have to＝不必要「〜する必要がない」。この区別は入試頻出。"
  - node_id: "kvt-017"
    seq: 3
    question: "mustの過去形・未来形は？"
    answer: "mustには過去形・未来形がない。過去: had to、未来: will have toで代用。"
  - node_id: "kvt-017"
    seq: 4
    question: "have got toとは？"
    answer: "have toの同意表現。have to = have got to。意味は同じ（義務/予想）。"
  # kvt-018
  - node_id: "kvt-018"
    seq: 1
    question: "canの核心は？2つの意味は？"
    answer: "「いつでも起こる」。①可能「〜できる」（いつでもできる）②可能性「ありえる」（いつでも起こりえる）。"
  - node_id: "kvt-018"
    seq: 2
    question: "can't beの意味は？省略形は？"
    answer: "「ありえない・〜のはずがない」。It can't be true.からtrueを省略したIt can't be.もよく使われる。"
  - node_id: "kvt-018"
    seq: 3
    question: "助動詞の予想判別法とは？"
    answer: "「助動詞＋状態動詞（特にbe）」がきたら予想の意味を考える。may be→かもしれない、must be→違いない、can't be→ありえない。100%ではないが大半で有効。"
  - node_id: "kvt-018"
    seq: 4
    question: "couldが「一度だけできた」に使えない理由は？代わりに何を使う？"
    answer: "canの核心「いつでも起こる」の過去形→「もしやろうと思えばいつでもできた」。一度だけの行為にはwas[were] able toを使う。"
  # kvt-019
  - node_id: "kvt-019"
    seq: 1
    question: "助動詞の過去形の大前提2つは？"
    answer: "(1)過去の意味になるとは限らない（予想系の意味は過去形でも同じ） (2)まず仮定法を考える。"
  - node_id: "kvt-019"
    seq: 2
    question: "would often/sometimesの形を見たら何と判断できるか？"
    answer: "「過去の習慣」と即断できる。would「必ず〜した」を100%から妥協した形。"
  - node_id: "kvt-019"
    seq: 3
    question: "couldの「できた」が使える場面と使えない場面は？"
    answer: "「もしやろうと思えばできた」→OK。「一度だけできた」→NG（was[were] able toを使う）。"
  - node_id: "kvt-019"
    seq: 4
    question: "mightの大半の用法は？"
    answer: "mayと同じ意味（「もしかしたら」のニュアンスが加わる程度）。9割以上がmay≒mightで使われる。"
  # kvt-020
  - node_id: "kvt-020"
    seq: 1
    question: "shouldの核心は？予想の度合いは？"
    answer: "「本来ならば〜するのが当然」。予想は80〜90%の自信。"
  - node_id: "kvt-020"
    seq: 2
    question: "仮定法現在のthat節に入る形は？入試での出題傾向は？"
    answer: "{should}[原形] または [原形]のみ。入試では「原形」が97%以上出題される。"
  - node_id: "kvt-020"
    seq: 3
    question: "命令系統の動詞をまとめて覚えるコツは？"
    answer: "全て「命令がベース」。suggest=優しい命令、insist=主張=命令、decide=度が過ぎた命令。丸暗記不要。"
  - node_id: "kvt-020"
    seq: 4
    question: "「shouldが省略される」は正しいか？"
    answer: "間違い。shouldを使う人（イギリス）と原形を使う人（アメリカ）がいるだけ。助動詞が省略されることはない。"
  # kvt-021
  - node_id: "kvt-021"
    seq: 1
    question: "ought toの否定形は？注意点は？"
    answer: "ought not to〜。notはtoの直前に置く（不定詞の原則通り）。"
  - node_id: "kvt-021"
    seq: 2
    question: "had betterの否定形は？ニュアンスは？"
    answer: "had better not [原形]。「〜しないほうがよい」。見た目はソフトだが実は「やらないとマズいぞ」。"
  - node_id: "kvt-021"
    seq: 3
    question: "助動詞needと一般動詞needの否定文の形は？"
    answer: "助動詞: need not [原形]。一般動詞: don't need to [原形]。「canと同じ vs wantと同じ」。"
  - node_id: "kvt-021"
    seq: 4
    question: "used toの2つの意味を判別する方法は？"
    answer: "後ろの動詞で判別。動作動詞→過去の習慣「よく〜したものだ」。状態動詞→過去の状態「昔は〜だった」。"
  - node_id: "kvt-021"
    seq: 5
    question: "used toとwouldの違いは？"
    answer: "used toは「過去と現在の対比」ができる（「昔は〜だったけど今はしない」）。wouldはできない。また、wouldは過去の状態には使えない。"
  # kvt-022
  - node_id: "kvt-022"
    seq: 1
    question: "助動詞have p.p.の2つのグループは？"
    answer: "予想グループ（may/must/can't have p.p.）とイヤミグループ（should/ought to have p.p.）。"
  - node_id: "kvt-022"
    seq: 2
    question: "must have p.p.の意味は？よくあるミスは？"
    answer: "「〜だったに違いない」（予想）。×「しなきゃいけなかった」は誤り。この形の助動詞はすべて予想系統。"
  - node_id: "kvt-022"
    seq: 3
    question: "should have p.p.の意味は？否定形は？"
    answer: "「〜すべきだったのに」（イヤミ）。否定: should not have p.p.「〜すべきじゃなかったのに」。"
  - node_id: "kvt-022"
    seq: 4
    question: "can't have p.p.の意味は？"
    answer: "「〜だったはずがない」（過去への予想）。×「できなかった」は誤り。≒couldn't have p.p.。"

