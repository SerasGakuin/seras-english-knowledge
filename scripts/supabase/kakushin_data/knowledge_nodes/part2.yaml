# Part 2: 動詞や時制（テーマ07〜11）
# パイロット: Kaku_07a（文型・前半）のみ

knowledge_nodes:
  - id: "kvt-001"
    name: "文の分析3フェイズ（品詞→句・節→文型）"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      核心: 品詞がわかれば、文型がわかり、意味がわかる
      フェイズ1（単語レベルの品詞）:
      ・単独で働ける品詞: 名詞・代名詞・形容詞・副詞・動詞
      ・ペアを求める品詞: 冠詞(+名詞→名詞のカタマリ)・助動詞(+動詞→動詞のカタマリ)・前置詞(+名詞→副詞/形容詞のカタマリ)・接続詞(+SV→副詞のカタマリ)
      フェイズ2（カタマリでの4大品詞）: 名詞・形容詞・副詞・動詞
      ・ペアを求める品詞が他の品詞と合わさり「カタマリ」（句・節）として4大品詞のいずれかになる。
      ・句と節の共通点: どちらも「カタマリになる」こと。相違点: SVの有無（句＝SVなし、節＝SVあり）。
      フェイズ3（文型レベル）: SV・SVC・SVO・SVOO・SVOC
      注意: 「名詞・形容詞・副詞・動詞」という用語はフェイズ1と2で重複使用される。「動詞」は3つのフェイズすべてで使われる。
      4大品詞の働き: 名詞→S/O/C、形容詞→名詞修飾 or C、副詞→M（名詞以外を修飾）、動詞→V
      文の要素: S(主語/名詞)、V(動詞)、O(目的語/名詞)、C(補語/形容詞・名詞)、M(修飾語/形容詞・副詞)
      [図表: フロー図 — フェイズ1→2→3の流れ（p.76）]

  - id: "kvt-002"
    name: "自動詞/他動詞の判別（「何を？」テスト）"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      即断判別法:
      ・他動詞: 「何を？」と聞き返せる（know「知っている」→「何を？」→他動詞）
      ・自動詞: 「何を？」が変で「あっそう」で終わる（live「住む」→「あっそう」→自動詞）
      他動詞の後には「何を」に当たる名詞（目的語）が必要。品詞の観点では「名詞」、要素の観点では「目的語」（同じもの）。
      この判別法は100%ではないが大半の動詞で使える。
      動詞ペア（自動詞/他動詞のセット）:
      ・lie(自「いる・ある・横になる」lie-lay-lain) vs. lay(他「置く・横にする」lay-laid-laid)
      ※lieの過去形layと他動詞lay現在形は同じ綴り。3単現の-sや目的語の有無で判別。
      ・rise(自「上がる」rise-rose-risen) vs. raise(他「上げる」raise-raised-raised)
      ・grow up(自「育つ」) vs. bring up(他「育てる」受動: be brought up) ※× be grown upは誤り
      ・sit(自「座る」sit-sat-sat) vs. seat(他「座らせる」seat-seated-seated)
      「何を？」が使えない他動詞（例外）:
      ①「〜に」系: resemble, answer, attend, reach(=arrive at/get to), approach, visit, join, enter
      ②「〜と」系: contact, marry(=get married to)
      ③「〜について」系: discuss(=talk about/over), mention, consider
      参考: 自動詞（自分で意味が完結/目的語不要）、他動詞（他者に影響を与える/目的語必要）という形式的説明もある。
      前提知識との差分: 中学では自動詞・他動詞の区別を明確に教わらない。高校で文型と結びつけて重要になる。

  - id: "kvt-003"
    name: "第1・第2文型の特徴と動詞の意味予測"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      第1文型 SV(M):
      ・実際にはMがつくケースがほとんど（I live.では意味を成さない→I live in Saitama.）。
      ・よく使われる動詞: ①存在・移動(be, live, come) ②出現・消失(appear, disappear, die) ③感情・その他(laugh, look, talk)
      ・意味予測: 知らない動詞でも第1文型なら「いる・ある」か「動く」と推測できる。
      ・例: He transferred to a school in Kobe. → 第1文型 → 移動系 → 「転校した」と予測可能。前置詞toの「方向・到達」も意味予測の手がかり。
      第2文型 SVC:
      ・必ずS＝Cが成り立つ。Cになるのは形容詞と名詞。
      ・よく使われる動詞: ①存在・継続(be, keep) ②変化(become, get, turn, grow, come, go) ③感覚(seem, appear, look, feel, sound)
      ・意味予測: 「動詞＋形容詞」の形なら第2文型 → 動詞の意味は「イコール」と推測。
      ・例: The temperature stayed high all night. → stay+形容詞 → temperature=high → 「気温が高いままだった」
      ・同一動詞の文型による意味の違い: stayは第1文型「滞在する」/第2文型「〜のままでいる」。stayの「滞在する」から「しばらくそこにいる」ニュアンスが加わり「〜の状態でしばらくいる」になる。
      ・「動詞の意味を暗記→文脈で訳し分ける」ではなく「文型を見抜いて意味を予想する」が先。
      参考書内参照: →p.75「注意すべき他動詞」（同テーマ内）

  - id: "kvt-004"
    name: "第4文型SVOOと「与える/奪う」の意味予測"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      第4文型SVOOの特徴: 目的語が2つ。V 人 物「人に物を与える」が基本形。O₁=与える相手（～に）、O₂=与える物（～を）。
      「与える」系動詞: give系（teach/show/lend/send）はすべてgive「与える」がベース。teach=知識を与える、show=視覚情報を与える、lend=一時的に与える、send=送るという手段で与える。
      do 人 物「人に物を与える」: doに「与える」の意味。ただし物にくる名詞は「善悪・利害」に関するものに限定（good/harm/damage/a favor等）。
      「奪う」系動詞（V 人 物「人から物を奪う」）:
      [図表: 表 — 「奪う」系統の動詞一覧。take 人 時間 / cost 人 金(命も可) / save 人 手間 / spare 人 手間 / owe 人 金（p.84）]
      ※ギブ＆テイク: give「与える」の反対がtake「とる・奪う」。この対概念で「与える」系と「奪う」系を整理。すべて「V 人 物」が共通形。
      spareの意味判別: 「与える」と「奪う」の両方の意味を持つ。物にくる名詞の種類で判別。
      ① spare 人 時間・お金 →「与える」（余ったものを与える=割く）
      ② spare 人 マイナス単語（trouble等）→「奪う」
      ※あくまで傾向。文脈がおかしければスイッチして考え直す。
      知らない動詞の意味予測: V 人 物の形なら「与える」と考えればOK。「奪う」系はtake/cost/save/spare/oweだけ覚えれば、残りは全て「与える」で予測可能。
      It takes 人 時間 to ~「人が~するのに時間がかかる」: Itは仮主語、to~が真主語。人はよく省略される。公式丸暗記ではなく「take 人 物」の形として理解する。

  - id: "kvt-005"
    name: "第5文型SVOCと使役・知覚動詞"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      SVOO vs SVOC判別:
      [図表: 表 — 第4文型(O₁≠O₂) vs 第5文型(O＝C)の判別。共通点: Vの後ろに2つの要素（p.87）]
      Cに形容詞がきたら（SVO+形容詞）即断でSVOC。
      SVOCを理解する3ステップ:
      step1: SVOCをとる動詞に反応（使役/知覚/使役もどき/命名系/SV人to~/help）
      step2: OとCの関係を把握（形容詞・名詞→O=C、動詞関係→s'v'の関係）
      step3: s'v'の吟味（能動「する」vs 受動「される」）
      Cの形式:
      ① 能動(s'がv'する): (a) 原形/to不定詞 (b) -ing
      ② 受動(s'がv'される): p.p./to be p.p.
      原形/to不定詞はカードの裏表:
      使役・知覚動詞（セレブ）→ 原形をとれる（to不定詞は不可）
      その他の動詞（庶民: allow/enable等）→ to不定詞をとる（原形は不可）
      ※使役・知覚動詞は-ing・p.p.もとれる（原形「しか」とれないわけではない）
      使役動詞（3つだけ）:
      make（強制・必然）: 「OCの状態をつくる」。必ずしも「無理やり」ではなく「必然的・結果的に~になる」でも使用。
      have（利害）: 「させた・してもらった・された」は立場の違いだけで現象は同じ。訳し方の暗記ではなく「利害」で理解。
      let（許可）: 「好きなように~させてあげる」。命令文 Let me 原形.「私に~させて」が頻出。
      知覚動詞: see/hear/feel/findの4つで入試9割対応。使い方は使役動詞と同じ（反応→s'v'→能動/受動）。
      重要表現: make oneself understood「話が通じる」=「自分自身が理解される（ようにする）」

  - id: "kvt-006"
    name: "SVOCの発展動詞（使役もどき・命名系・SV人to~・help）"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      使役もどき（keep/leave/get）: 使役動詞に意味はそっくりだが、原形をとれない（セレブ特権なし）ので明確に区別。
      keep「OをCの状態に保つ」/ leave「OをCの状態のまま放っておく」/ get「OにCさせる」
      getの形: get O to原形 / get O -ing / get O p.p.
      keepの形: keep O -ing / keep O p.p. / keep O 形容詞
      leaveの形: leave O -ing / leave O p.p. / leave O 形容詞
      「させっぱなし」の頻出5パターン:
      ① 水流しっぱなし leave[keep] the water running
      ② エンジンかけっぱなし leave[keep] the engine running
      ③ 彼女待たせっぱなし keep[leave] her waiting
      ④ ドアにカギかけっぱなし keep[leave] the door locked
      ⑤ マド開けっぱなし leave[keep] the window open ※openは形容詞
      ※keep=わかってて放置、leave=無意識or意識的放置（入試では問われない）
      命名系の動詞: call OC「OをCと呼ぶ」/ name OC「OをCと名付ける」/ elect OC「OをCに選ぶ」
      SV人to~の動詞群: allow・permit/want/ask/advise/expect/enable/cause/force
      to不定詞には「未来志向」がある→「これから人が~することをVする」。
      SV人to~の裏技: 「Sによって人は~する」と意訳。知らない動詞でもSV人to~の形なら意味予測可能。
      参考書内参照: →p.188「未来志向」
      helpの語法まとめ:
      [図表: 表 — helpの語法まとめ。(1)help人{to}原形 / help人with~ (2)help{to}原形 (3)help yourself to物（p.95）]
      ※helpは庶民出身だがセレブ階級にも出入りできる唯一の例外（原形もto不定詞も可）。

  - id: "kvt-007"
    name: "現在形の核心（「現在・過去・未来形」）"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      核心: 「現在形」は「現在・過去・未来形」
      現在形は「昨日のことも今日のことも明日のことも表す」。「過去〜現在〜未来のどこにでも起こること」を英文法では「現在形」と呼んでいるだけ。
      3つの用法はすべて核心で解決:
      ・習慣: I go to school. →「昨日も今日も明日も学校へ行く」→学生しか使えない
      ・不変の真理: The sun rises in the east. →「昨日も今日も明日も東から昇る」
      ・確定した未来: The train arrives at 10. →「昨日も明日も10時に着く」=繰り返し行われる行為
      ※習慣と不変の真理の差（休む日があるかないか）は英文法では区別しない
      What do you do?「ご職業は？」: 現在形→「昨日も今日も明日も何をするの？」→「普段何をするの？」→「お仕事は何を？」
      What do you do for fun?「趣味は何？」: 「昨日も今日も明日も楽しみを求めて何をする？」
      前提知識との差分: 中学では「動詞の変化そのもの」重視（不規則変化の暗記、副詞で時制判断）。高校では「時制の概念」を理解しているかが問われる。

  - id: "kvt-008"
    name: "時・条件を表す副詞節の現在形ルール"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      重要ルール: 「時・条件を表す副詞節の中では未来のことでも現在形を使う」
      3つのポイント:
      ① 時・条件を表す副詞節とは: when（時）・if（条件）・as soon as等の従属接続詞がつくる副詞節
      ② 副詞節の「中だけ」が特殊: 副詞節の外（主節）では未来のことは普通にwillなど未来の形を使う
      ③「未来→現在形で代用」: 未来の形が使えず、仕方なく現在形を使う。未来完了形の場面なら現在完了形で代用（→テーマ9）
      ※助動詞・助動詞相当表現（must/have to等）はすべて未来を表すことができる
      名詞節との区別:
      他動詞+when/if → 名詞節（「〜かどうか」「いつ〜か」）→ 未来のことは普通にwillを使う
      この区別が必要なのはifとwhenだけ。入試で問われやすい動詞: know, wonder
      [図表: 表 — whenが副詞節・名詞節になるとき。①従属接続詞「〜するとき」=副詞節 ②疑問詞「いつ」=名詞節（間接疑問文）（p.103）]
      ※名詞節をつくるwhenは従属接続詞ではなく「疑問詞」
      参考書内参照: →p.58「接続詞の副詞節」

  - id: "kvt-009"
    name: "進行形の核心（「途中」と5秒ルール）"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      核心: 「進行形」は「途中」
      進行形は「〜している」ではなく「〜している途中」と考える。
      状態動詞（進行形にできない動詞）:
      [図表: 表 — 状態動詞の分類。①所属・構成: belong to/resemble/have/consist of/contain ②知覚・心理: hear/see/smell/taste/like/want/know/believe/think（p.104）]
      5秒ルール: 「5秒ごとに中断・再開できない動詞は進行形にできない」
      ・know: 5秒ごとに記憶を消したり戻したりはできない→×be knowing
      ・like: 5秒ごとに好きになったり嫌いになったりはできない→×be liking
      ・resemble: 5秒ごとに似なくなって、また似てくることは不可能→×be resembling
      ルールの由来: 進行形=「途中」→「途中で中断・再開できる」動詞は進行形OK。逆手をとれば「中断・再開できない動詞は進行形不可」。
      5秒ルールの例外: rain/snow/die。be dying「死にかけている（死に向かっている途中）」
      haveの検証: 「持っている」→中断・再開不可→×be having(所有)。「食べる・飲む」→中断・再開可能→◎She is having lunch.
      「予定」を表す進行形: 「途中」→「何かしら着手して進行している」→スケジュールに書き込む予定。
      「近い未来」の正体: 時間の近さではなく「着手済みかどうか」が基準。1年先でも着手済みなら進行形OK、明日でも着手してなければ不可。
      前提知識との差分: 中学では単に「〜している」と訳すだけ。高校では「途中」の概念から各用法・例外を理解する。

  - id: "kvt-010"
    name: "完了形の核心「矢印」と現在完了形の3用法"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      核心: 完了形は「矢印」で考える！
      現在完了形（have + p.p.）のイメージ: 「過去〜現在」をつないだ矢印。重点は「現在」にある。
      ※p.p.=past participle（過去分詞）の頭文字。
      過去＋現在＝have + p.p.
      3用法（どれも矢印の範囲内で起きること）:
      ① 継続「ずっと〜している」: 過去に始まり、今現在も継続している。
      ② 完了・結果「〜したところだ」: 過去に始まり、今現在ちょうど完了した。
      ③ 経験「〜したことがある」: 過去に経験、今は「経験値」を持っている。
      経験用法の発想: 経験自体は「過去のこと」だが、英語では「過去にした経験を今現在まで持ち続けている／経験値として持っている」。
      継続用法でよく使われる語句: for「〜の間」/ since「〜以来ずっと」/ in the last[past] ○ years「ここ○年間で」/ How long「どのくらい」
      完了・結果用法でよく使われる語句: just「ちょうど」/ already「すでに」/ yet（否定文で「まだ」・疑問文で「もう」）
      経験用法でよく使われる語句: before「以前」/ once「1回」/ twice「2回」/ 〜 times「〜回」/ How many times・How often「何回」/ ever「今までに」/ never「一度も〜ない」
      前提知識との差分: 中学ではfor/sinceを見て「継続用法」と訳語を当てはめるだけ。高校・大学受験では完了形の概念そのもの（矢印の感覚）が問われる。

  - id: "kvt-011"
    name: "過去完了形・未来完了形（カット＆ペースト）"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      過去完了形（had + p.p.）: 現在完了形の矢印を過去に向けて「カット＆ペースト」。
      矢印の先端を「過去の一点」にくっつけるのがポイント。
      現在完了形=現在が基準（現在までの矢印）、過去完了形=過去のある一点が基準（過去までの矢印）。
      「過去完了形とは過去のある一点までの継続／完了・結果／経験を表す」
      大過去: 過去のさらに過去のこと。「すごく昔」ではなく「過去の②の時点よりもさらに過去」。
      過去完了形の3用法:
      ① 継続「（過去の一点まで）ずっと〜していた」
      ② 完了・結果「（過去の一点までに）ちょうど〜したところだ・その結果…だ」
      ③ 経験「（過去の一点までに）〜した経験がある」
      未来完了形（will have p.p.）: 現在完了形を「未来へ向けてカット＆ペースト」。
      現在完了形=現在までの矢印、過去完了形=過去のある一点までの矢印、未来完了形=未来のある一点までの矢印。
      未来完了形の3用法:
      ① 継続「（未来の一時点まで）ずっと〜しているでしょう」
      ② 完了・結果「（未来の一時点で）ちょうど〜したところでしょう」
      ③ 経験「（未来の一時点までに）〜する経験があるでしょう」
      [図表: フロー図 — 完了形のゾーン図。had p.p.ゾーン(大過去→過去) / have p.p.ゾーン(過去→現在) / will have p.p.ゾーン(現在→未来)（p.116）]

  - id: "kvt-012"
    name: "完了進行形と完了形の慣用表現"
    category: "動詞と時制"
    priority: "P1"
    notes: |
      現在完了進行形（have been -ing）: 文字通り「現在完了＋進行形」。現在完了形の「継続」の意味が強まる用法。
      「現在完了形（継続）」と「現在完了進行形」の区別は非常に曖昧で、入試で問われることはない。
      ※状態動詞（進行形にできない動詞）はhave + p.p.の形になる。
      過去完了進行形（had been -ing）: 現在完了進行形を過去にカット＆ペースト。
      未来完了進行形（will have been -ing）: 現在完了進行形を未来にカット＆ペースト。
      慣用表現(1)「〜してから年月が経った」:
      ① [年月] have passed since sv（過去形） ※sinceのvは「過去形」
      ② It has been [年月] since sv（過去形）
      ③ It is [年月] since sv（過去形）
      注意: ①と②を混ぜて×It has passedは誤り。「Itが過ぎる」わけがなく「年月が過ぎる（pass）」。③はsinceがあるのにisで簡略化された形。
      慣用表現(2) have been to 〜 と have gone to 〜:
      have been to〜: 【完了】〜へ行ってきたところだ / 【経験】〜へ行ったことがある → 共通点: 今はここにいる（beは「いる」の意味）
      have gone to〜: 【結果】〜へ行ってしまった（もうここにいない）→ goは「離れていく」感覚

