    goal: "frankly speaking/judging from/compared with等の判断・発言系表現を使える"
  - node_id: "kjd-017"
    seq: 3
    goal: "according to/concerning/regarding等が本来分詞構文であることを理解する"
  - node_id: "kjd-017"
    seq: 4
    goal: "weather permitting/all things considered等の意味上の主語付き表現を使える"

check_points:
  # kjd-001
  - node_id: "kjd-001"
    seq: 1
    question: "to不定詞と前置詞toをどう判別するか？"
    answer: "後ろの形で判別する。to＋動詞の原形ならto不定詞、to＋名詞（代名詞・動名詞）なら前置詞to。"
  - node_id: "kjd-001"
    seq: 2
    question: "文頭To〜が名詞的用法か副詞的用法かをどう判別するか？"
    answer: "To〜が主語になるかどうかで判別。主語になる→名詞的用法、主語にならない（後ろにS+Vがある）→副詞的用法。"
  - node_id: "kjd-001"
    seq: 3
    question: "It's difficult to wake up early. のItは何と訳すか？"
    answer: "訳さない。Itは仮主語で日本語訳はない（「それ」とは訳さない）。真主語はto wake up early。"
  - node_id: "kjd-001"
    seq: 4
    question: "「何か冷たい飲み物」を英語の語順で書くとどうなるか？"
    answer: "something cold to drink（-thing＋形容詞＋to do の語順）。"
  - node_id: "kjd-001"
    seq: 5
    question: "toを伴いやすい抽象名詞を3つ以上挙げよ。"
    answer: "time/chance/way/plan/need/decision/ability/attempt の中から3つ以上。"
  # kjd-002
  - node_id: "kjd-002"
    seq: 1
    question: "He grew up to become a manga artist. のtoは「目的」か「結果」か？"
    answer: "「結果」。grow upは無意志動詞（自分の意志でコントロールできない）なので、to以下は結果を表す。"
  - node_id: "kjd-002"
    seq: 2
    question: "only to〜はどういう意味を表すか？"
    answer: "「SVだが、結局〜しただけ」という結果（期待はずれ）の意味。"
  - node_id: "kjd-002"
    seq: 3
    question: "I was happy to see him. のto seeは何用法のどの意味か？"
    answer: "副詞的用法の「感情の理由」。感情表現happyの後のto不定詞は感情の理由（〜して）を表す。"
  - node_id: "kjd-002"
    seq: 4
    question: "too...to〜はどういう意味を表すか？"
    answer: "「あまりに…なので〜できない」。否定語がないのに否定の意味になる。本来は「〜する点において…すぎる」。"
  # kjd-003
  - node_id: "kjd-003"
    seq: 1
    question: "It is easy to do this. と It is kind of you to do this. でfor/ofが変わる理由は？"
    answer: "easyは物事の性質→for、kindは人の性質→of。「君ってkindだよね」は自然、「君ってeasyだよね」は不自然。"
  - node_id: "kjd-003"
    seq: 2
    question: "不定詞の否定形でnotはどこに置くか？"
    answer: "toの直前。not to〜の形。notは不定詞だけを否定し、主節の動詞は否定しない。"
  - node_id: "kjd-003"
    seq: 3
    question: "so〜as to...とso as to〜の意味の違いは？"
    answer: "soが離れる（so〜as to...）=結果/程度「とても〜なので…」。soがくっつく（so as to〜）=目的「〜するために」。"
  - node_id: "kjd-003"
    seq: 4
    question: "He is said to have been rich. はなぜ「以前は金持ちだった」の意味になるか？"
    answer: "完了不定詞（to have p.p.）は主節の動詞より「1つ前の時制」を表す。is said（現在）の1つ前→過去。"
  - node_id: "kjd-003"
    seq: 5
    question: "「忘れないように」をin order toを使って書くと？"
    answer: "in order not to forget。否定のnotはtoの直前に置く。"
  # kjd-004
  - node_id: "kjd-004"
    seq: 1
    question: "to不定詞が「未来志向」とはどういう意味か？"
    answer: "toは矢印（⇒）のイメージで「これから〜する」という方向性を表す。後ろにtoをとる動詞はどれも「これから〜する」ニュアンスを持つ。"
  - node_id: "kjd-004"
    seq: 2
    question: "happen to/seem to/pretend toはなぜtoをとるのか？"
    answer: "「単発のイメージ」。「（普段は違うけど）今回だけ〜する」というニュアンスがto不定詞の未来志向と合致する。"
  - node_id: "kjd-004"
    seq: 3
    question: "fail to〜とfail in〜の違いは？"
    answer: "fail to〜「〜しない・できない」、fail in〜「〜に失敗する」。意味が異なるので区別が必要。"
  - node_id: "kjd-004"
    seq: 4
    question: "never fail to〜はどういう意味か？"
    answer: "「必ず〜する」。直訳は「〜しないことは決してない」。"
  - node_id: "kjd-004"
    seq: 5
    question: "知らない動詞＋to〜の形が出たらどう推測するか？"
    answer: "「これから〜する」と考えれば意味がとれることが多い。ただし拒否のイメージ（refuse/hesitate/fail）のみ例外なので、そこだけチェックする。"
  # kjd-005
  - node_id: "kjd-005"
    seq: 1
    question: "be to構文の核心の意味は？"
    answer: "「これから〜することになっている」。従来教えられる5つの意味（予定・意図・義務・可能・運命）はすべてこの中に集約される。"
  - node_id: "kjd-005"
    seq: 2
    question: "They are to be married.のbe toは名詞的用法（SVC）か、be to構文か？"
    answer: "be to構文。are toが1つの助動詞として機能し、They≠to be marriedなのでSVC（S＝C）は不成立。"
  - node_id: "kjd-005"
    seq: 3
    question: "My dream is to live in Madrid.はbe to構文か？"
    answer: "いいえ、名詞的用法（SVC）。My dream＝to live in Madrid（S＝C）が成立するため。"
  - node_id: "kjd-005"
    seq: 4
    question: "The children are to be in bed by nine.はどう訳すか？"
    answer: "「子どもたちは9時までに寝ることになっている」。文脈によっては「義務」（〜しなければならない）のニュアンスも可能。"
  # kjd-006
  - node_id: "kjd-006"
    seq: 1
    question: "All you have to do is (to) send the letter.の文構造は？"
    answer: "SVC。All (that) you have to doがS、isがV、(to) send the letterがC。関係代名詞thatが省略されている。toは省略可能。"
  - node_id: "kjd-006"
    seq: 2
    question: "to tell the truthやto be honestは何用法か？"
    answer: "副詞句として文全体を修飾する慣用表現。「実を言うと」「正直に言って」。"
  - node_id: "kjd-006"
    seq: 3
    question: "be willing to〜はどういう意味か？"
    answer: "「進んで〜する・〜するのをいとわない」。積極的なイメージだという誤解が多いが、消極的なニュアンスの場合もある。"
  - node_id: "kjd-006"
    seq: 4
    question: "to make matters worseはどういう意味で、make OCの何にあたるか？"
    answer: "「さらに悪いことには」。makeはOCの使役動詞で、matters＝O、worse＝C。"
  - node_id: "kjd-006"
    seq: 5
    question: "be about to〜のaboutはどういう意味か？"
    answer: "aboutは本来「周りに」を表す。「これから〜する周りにいる」→「まさに〜するところだ」。"
  # kjd-007
  - node_id: "kjd-007"
    seq: 1
    question: "My hobby is collecting old coins. の-ingは動名詞か進行形か？"
    answer: "動名詞。S(My hobby)＝-ing(collecting old coins)が成立するので動名詞。S≠-ingなら進行形。"
  - node_id: "kjd-007"
    seq: 2
    question: "look forward to -ingのtoはなぜ前置詞か？"
    answer: "toの後に-ing（名詞相当）が来ているので前置詞。to不定詞ならto＋動詞の原形になるはず。"
  - node_id: "kjd-007"
    seq: 3
    question: "動名詞の意味上の主語はどこに、どんな形で置くか？"
    answer: "-ingの前に所有格または目的格を置く。文の主語と同じ場合は示さない（暗黙の了解）。"
  - node_id: "kjd-007"
    seq: 4
    question: "動名詞の否定形と受動態の形は？"
    answer: "否定形: not -ing（notを-ingの前に置く）。受動態: being p.p.（be＋p.p.が動名詞化した形）。"
  # kjd-008
  - node_id: "kjd-008"
    seq: 1
    question: "なぜメガフェプス（megafeps）のゴロ合わせだけでは不十分なのか？"
    answer: "対応できない動詞が多い。イメージ（反復/中断/逃避）で体系的に理解するほうが応用が利く。"
  - node_id: "kjd-008"
    seq: 2
    question: "mindが-ingをとるのはなぜか？"
    answer: "イヤなことが頭の中でグルグル反復するイメージだから（思考系の反復）。"
  - node_id: "kjd-008"
    seq: 3
    question: "finishが-ingをとるのはなぜか？"
    answer: "「中断」の延長で「終える」も-ingをとると考える。反復していたものが中断→終了の流れ。"
  - node_id: "kjd-008"
    seq: 4
    question: "put off/postponeが-ingをとるのはなぜか？"
    answer: "「明日でいいや」の現実逃避のイメージ。延期の根底に逃避がある。"
  - node_id: "kjd-008"
    seq: 5
    question: "be used to -ingのtoは何か？"
    answer: "前置詞。反復して慣れるイメージから動名詞がくる。get used to -ingも同様。"
  # kjd-009
  - node_id: "kjd-009"
    seq: 1
    question: "remember to〜とremember -ingの意味の違いは？"
    answer: "to〜「（これから）忘れずに〜する」、-ing「（過去に）〜したのを覚えている」。toは未来志向、-ingは過去。"
  - node_id: "kjd-009"
    seq: 2
    question: "regret to tell youはどういう意味か？"
    answer: "「残念ながらお伝えします」。直訳「これから言ったら後悔する」→「残念ながら〜する」。regret -ingなら「過去に〜したのを後悔する」。"
  - node_id: "kjd-009"
    seq: 3
    question: "stop to〜のstopとtoの品詞は？"
    answer: "stopは自動詞「立ち止まる」、toは副詞的用法（目的）。stop -ingとは構造自体が異なる。"
  - node_id: "kjd-009"
    seq: 4
    question: "to不定詞と動名詞のイメージ対比を簡潔にまとめよ。"
    answer: "動名詞=後ろ向き（過去/消極的/反復）、to不定詞=前向き（未来/積極的/単発）。"
  # kjd-010
  - node_id: "kjd-010"
    seq: 1
    question: "when it comes to -ingのtoは何か？"
    answer: "前置詞。後ろに-ingが来ていることからも分かる。前置詞toの本来の意味「方向・到達/対比」から理解する。"
  - node_id: "kjd-010"
    seq: 2
    question: "cannot help -ingのhelpはどういう意味か？"
    answer: "「避ける」（avoid相当）。helpの意味変遷: 助ける→防ぐ→避ける。「〜せざるをえない」より「反射的に思わず〜してしまう」が実用的。"
  - node_id: "kjd-010"
    seq: 3
    question: "There is no -ingでnoが使われnot -ingにならない理由は？"
    answer: "本来There is no {way of} -ingだから。名詞wayを否定するnoが使われる。"
  - node_id: "kjd-010"
    seq: 4
    question: "be worth -ingのworthの品詞は？"
    answer: "前置詞。前置詞の後に-ingがくるので動名詞。"
  - node_id: "kjd-010"
    seq: 5
    question: "spend 時間 -ingの-ingの前の前置詞は何が省略されているか？"
    answer: "in（またはon）。分詞構文との混同で省略されるようになった。入試では省略形が圧倒的に多い。"

  # kjd-011
  - node_id: "kjd-011"
    seq: 1
    question: "the smiling boyで-ingが前に来る理由は？"
    answer: "分詞が1語なので前から修飾するルール。2語以上なら後ろから（例: the woman walking towards us）。"
  - node_id: "kjd-011"
    seq: 2
    question: "the language spoken in Taiwanを「話している」と考えて-ingにしてはいけない理由は？"
    answer: "日本語訳につられてはいけない。英語では「言語が話される」という受動関係なのでp.p.(spoken)を使う。"
  - node_id: "kjd-011"
    seq: 3
    question: "分詞が名詞を修飾するとき、-ingかp.p.かをどう判別するか？"
    answer: "名詞と分詞の間のSVの関係で判別。能動関係（名詞が〜する）→-ing、受動関係（名詞が〜される）→p.p.。"
  # kjd-012
  - node_id: "kjd-012"
    seq: 1
    question: "surpriseの正しい意味は「驚く」「驚かせる」のどちらか？"
    answer: "「驚かせる」。感情動詞はほぼすべて「〜させる」という他動詞。"
  - node_id: "kjd-012"
    seq: 2
    question: "The film is exciting. と He is excited. の違いは？"
    answer: "excitingは「ワクワクさせるようなもの」（する側）、excitedは「ワクワクさせられた→ワクワクしている」（される側）。"
  - node_id: "kjd-012"
    seq: 3
    question: "He is exciting. は正しい英語か？"
    answer: "正しい。「彼は周りの人をワクワクさせるような人間だ」の意味。「人→p.p.」のルールは不十分。"
  # kjd-013
  - node_id: "kjd-013"
    seq: 1
    question: "exhaustの語源と意味は？"
    answer: "「外に(ex)エネルギーを出す」→「どっと疲れさせる」。He is exhausted.「疲れきっている」。"
  - node_id: "kjd-013"
    seq: 2
    question: "upsetの2つの意味は？"
    answer: "「焦り（狼狽させる）」と「苛立ち（むしゃくしゃさせる）」。原義は「ひっくり返す」→「心をひっくり返す」。文脈判断。"
  - node_id: "kjd-013"
    seq: 3
    question: "marvelが他の感情動詞と違う点は？"
    answer: "自動詞で「すごく驚く」。他の感情動詞は「〜させる」（他動詞）だがmarvelは「〜する」。"
  - node_id: "kjd-013"
    seq: 4
    question: "be pleased with〜の意味は？"
    answer: "「〜に喜んでいる・満足している」。withは「関連（〜について）」を表す前置詞。"

  # kjd-014
  - node_id: "kjd-014"
    seq: 1
    question: "分詞構文の正体を一言で言うと？"
    answer: "「-ingが副詞の働きをするもの」（動副詞）。主節(SV)が存在し、その前後や間に割り込む-ingのカタマリ。"
  - node_id: "kjd-014"
    seq: 2
    question: "p.p.で始まる分詞構文ではbeingはどうなるか？"
    answer: "ほぼ100%省略される。いきなりp.p.から始まっても分詞構文であることは明白だから。"
  - node_id: "kjd-014"
    seq: 3
    question: "Seen from above,...で-ingではなくp.p.が使われる理由は？"
    answer: "主節の主語が「見られる」という受動関係→p.p.。日本語「見ると」につられて-ingにしない。"
  # kjd-015
  - node_id: "kjd-015"
    seq: 1
    question: "分詞構文の訳し方を5つ覚える必要はあるか？"
    answer: "不要。位置で意味が決まる。文頭/文中→「て・で」で訳す、文末→「そして〜・〜しながら」。"
  - node_id: "kjd-015"
    seq: 2
    question: "文末の分詞構文はまず何で訳してみるか？"
    answer: "「そして〜」で訳す（前から意味をとれるので簡単）。不自然なら「〜しながら」に切り替える。"
  - node_id: "kjd-015"
    seq: 3
    question: "Feeling sleepy, he took a nap.を「て」で訳すと？"
    answer: "「眠くなって、彼は昼寝をした」。「眠くなったので」でもOK。分詞構文は適当に訳す。"
  # kjd-016
  - node_id: "kjd-016"
    seq: 1
    question: "分詞構文の否定形でnotはどこに置くか？"
    answer: "-ingの前。not -ingの形。be動詞の場合もnot beingになる。"
  - node_id: "kjd-016"
    seq: 2
    question: "having p.p.はいつ使うか？"
    answer: "分詞構文が主節より1つ前の時制を表すとき。ただし文脈から明らかなら-ingのまま使うこともある。"
  - node_id: "kjd-016"
    seq: 3
    question: "分詞構文の意味上の主語はいつ必要か？"
    answer: "分詞構文の主語と主節の主語が違うとき。-ingの前に名詞をくっつける。"
  # kjd-017
  - node_id: "kjd-017"
    seq: 1
    question: "frankly speakingは何の慣用表現か？"
    answer: "分詞構文の慣用表現（判断・発言系統）。「率直に言えば」。"
  - node_id: "kjd-017"
    seq: 2
    question: "concerning/regardingはなぜ辞書で前置詞として載っているのか？"
    answer: "本来は分詞構文だが、前置詞の働きをするようになったため。「〜に関して」。"
  - node_id: "kjd-017"
    seq: 3
    question: "weather permittingの仕組みは？"
    answer: "分詞構文の意味上の主語付き慣用表現。weatherが意味上の主語で「天気が許可(permit)すれば」→「天気が良ければ」。"

