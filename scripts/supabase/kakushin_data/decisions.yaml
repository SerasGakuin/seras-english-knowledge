decisions:
  - id: 1
    date: "2026-03-01"
    section: "Kaku_01"
    question: "入試問題(2)のDo you have the time?は例文e03と同じ文。重複登録するか？"
    decision: "重複登録しない。e03のnotesに「入試問題（芝浦工業大学）でも出題」と記録。"
    decided_by: "リード"
  - id: 2
    date: "2026-03-01"
    section: "Kaku_01"
    question: "入試問題(4)のTwice a monthは文として不完全（フラグメント）。登録するか？"
    decision: "登録しない。完全な文として成立しない断片は対象外。aの「〜につき」用法は例文e05とCHECK c03で十分カバー。"
    decided_by: "リード"
  - id: 3
    date: "2026-03-01"
    section: "Kaku_07a"
    question: "The patient waited quietly until his name was called. は>マーカーなし。例文として登録するか？"
    decision: "登録する。3フェイズ分析の唯一の実例であり、kvt-001に紐づく英文がゼロになるのを防ぐ。完全な文であり和訳も文脈から明確。"
    decided_by: "リード"
  - id: 4
    date: "2026-03-01"
    section: "Kaku_07a"
    question: "Kaku_07aにCHECK・入試問題がない（p.97-99はKaku_07bに属する）。問題ないか？"
    decision: "問題なし。分割テーマの前半にはCHECK・入試問題がないのは設計上想定済み。"
    decided_by: "リード"
  - id: 5
    date: "2026-03-01"
    section: "Kaku_01"
    question: "Gate 4レビュー: 芝浦工業大学・駒澤大学の入試問題が未登録との指摘。対応するか？"
    decision: "既存判断(decision #1, #2)を維持。芝浦工業大学はe03と同一文で重複登録不要（notesに出典記録済み）。駒澤大学はフラグメントで登録対象外。khs-001のnotesに「丁寧」情報を追記して情報補完。"
    decided_by: "リード"
  - id: 6
    date: "2026-03-01"
    section: "Kaku_07a"
    question: "Gate 4レビュー: kvt-002のcheck_pointsにgrow up/bring up, sit/seatが含まれていないとの指摘。"
    decision: "check_pointsは上限5件で既に満杯。grow up/bring up, sit/seatはnotesに詳細記載済み。check_pointsはlie/lay, rise/raise, discussなど最頻出項目を優先。understanding_goalsでもカバー。"
    decided_by: "リード"
  - id: 7
    date: "2026-03-01"
    section: "Kaku_04"
    question: "CHECK(3)「each・every・eitherを3つ書きましょう」は暗記問題で英文がない。登録するか？"
    decision: "登録しない。暗記問題で完全な英文が存在しない。知識はkhs-008のnotesに「3つのe」として記録し、check_pointsではa few/fewの判別を優先。"
    decided_by: "リード"
  - id: 8
    date: "2026-03-01"
    section: "Kaku_04"
    question: "khs-008のcheck_point seq 5（a few/few）に対応する英文がない。問題ないか？"
    decision: "問題なし。p.35-43にa few/fewの例文・CHECK・入試問題は存在しない（数量形容詞は表のみの説明）。知識はnotesとcheck_pointsで完全に保存されており、英文による実践はないが判別知識として重要なためcheck_pointsに残す。"
    decided_by: "リード"
  - id: 9
    date: "2026-03-01"
    section: "Kaku_05"
    question: "Kaku_05のCHECK 3問は全て完全な英文がない（選択・暗唱・語彙問題）。登録するか？"
    decision: "登録しない。CHECK(1)はgo abroad vs go to abroadの2択で完全な文ではない。CHECK(2)はわがまま副詞5つを挙げる暗唱問題。CHECK(3)は4語の意味を答える語彙問題。いずれも完全な英文が存在しない。知識はkhs-010/011/012のcheck_pointsとnotesで保存。"
    decided_by: "リード"
  - id: 10
    date: "2026-03-01"
    section: "Kaku_06"
    question: "Kaku_06のCHECK 3問は全て完全な英文がない（和訳問題・用語暗唱・分類問題）。登録するか？"
    decision: "登録しない。CHECK(1)は接続詞の和訳リスト問題、CHECK(2)は名詞節をつくる接続詞3つを答える暗唱問題、CHECK(3)はifの3つの意味を分類する問題。いずれも完全な英文が存在しない。知識はkhs-013/014/015のcheck_pointsとnotesで保存。"
    decided_by: "リード"
  - id: 11
    date: "2026-03-01"
    section: "Kaku_06"
    question: "「I know the man.」はthat節への置き換えの導入用の文。完全な英文だが登録するか？"
    decision: "登録しない。この文自体は接続詞の知識を実践する英文ではなく、名詞→that節の変換を示すための導入。「I know that he is rich.」（e15）の方が接続詞thatの実践例。"
    decided_by: "リード"
  - id: 12
    date: "2026-03-01"
    section: "Kaku_08"
    question: "CHECK(1)「What do you do?」はe02と同一文。重複登録するか？"
    decision: "重複登録しない。e02のnotesに「CHECK(1)の和訳問題でも出題」と記録。decision #1の先例に従う。"
    decided_by: "リード"
  - id: 13
    date: "2026-03-01"
    section: "Kaku_08"
    question: "入試問題(1)「What do you do?」（麻布大学）はe02と同一文。重複登録するか？"
    decision: "重複登録しない。e02のnotesに「入試問題(麻布大学)でも出題」と記録。decision #1の先例に従う。"
    decided_by: "リード"
  - id: 14
    date: "2026-03-02"
    section: "Kaku_19"
    question: "kta-015（間接疑問文・否定疑問文・付加疑問文）を3ノードに分割すべきか？Gate 3レビューが分割を推奨。"
    decision: "分割しない。否定疑問文の紐づく英文が2文（e18, c02）のみで、ノード抽出ルール「③紐づく英文が3文以上あるか」に違反する。3トピックとも「疑問文の応用形式」で書籍も連続して扱い、understanding_goals(5)とcheck_points(5)で全トピックをカバー済み。"
    decided_by: "リード"
