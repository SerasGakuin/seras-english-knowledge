# Kaku_15: 分詞（p.214-224）
# 例文12 + CHECK3 + 入試問題4 = 19文

sentences:
  # === 例文 ===
  - id: "kaku-15-e01"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.215"
    role: "example"
    english: "The smiling boy walked towards me."
    japanese: "笑顔を浮かべたその男の子は、私のほうに向かって歩いてきました。"
    sentence_structures:
      overall: "S V M"
      details: "(S:名詞句/現在分詞smilingが1語で前から修飾) (V:walked/自動詞) (M:前置詞句towards me)"
    notes: "分詞が1語→前から修飾の例"

  - id: "kaku-15-e02"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.216"
    role: "example"
    english: "That dog running over there is my friend's."
    japanese: "向こうで走っているあのイヌは、私の友人が飼っているイヌです。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句/現在分詞句running over thereが後ろから修飾) (V:is/be動詞) (C:所有代名詞my friend's)"
    notes: "分詞が2語以上→後ろから修飾の例"

  - id: "kaku-15-e03"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.216"
    role: "example"
    english: "The woman walking towards us is my teacher."
    japanese: "私たちに向かって歩いてきている女性は、私の先生です。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句/現在分詞句walking towards usが後ろから修飾) (V:is/be動詞) (C:名詞句my teacher)"
    notes: "能動関係「女性が歩く」→ -ing"

  - id: "kaku-15-e04"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.217"
    role: "example"
    english: "What is the language spoken in Taiwan?"
    japanese: "台湾で話されている言語は何ですか？"
    sentence_structures:
      overall: "C V S"
      details: "(C:疑問詞What) (V:is/be動詞) (S:名詞句/過去分詞句spoken in Taiwanが後ろから修飾)"
    notes: "受動関係「言語が話される」→ p.p.。日本語訳「話している」につられてspeakingにしない"

  - id: "kaku-15-e05"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.217"
    role: "example"
    english: "The magician surprised the audience."
    japanese: "そのマジシャンは観客を驚かせた。"
    sentence_structures:
      overall: "S V O"
      details: "(S:名詞句The magician) (V:surprised/他動詞/過去形/感情動詞) (O:名詞句the audience)"
    notes: "surpriseは「驚かせる」。ここでは単純な過去形で使われている"

  - id: "kaku-15-e06"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.219"
    role: "example"
    english: "I am pleased with your work."
    japanese: "君の仕事には満足しています。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:I) (V:am/be動詞) (C:過去分詞pleased/感情動詞の受動→形容詞化) (M:前置詞句with your work)"
    notes: "be pleased with〜「〜に喜んでいる・満足している」。withは「関連（〜について）」"

  - id: "kaku-15-e07"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.219"
    role: "example"
    english: "That's a fascinating idea!"
    japanese: "それ、ものすごく良いアイディアだよ！"
    sentence_structures:
      overall: "S V C"
      details: "(S:That) (V:'s/be動詞) (C:名詞句/現在分詞fascinatingが1語で前から修飾)"
    notes: "fascinate「魅了する」の-ing形。「人を魅了するアイディア」"

  - id: "kaku-15-e08"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.220"
    role: "example"
    english: "That's amazing!"
    japanese: "それはすごい！"
    sentence_structures:
      overall: "S V C"
      details: "(S:That) (V:'s/be動詞) (C:現在分詞amazing/感情動詞の能動→形容詞化)"
    notes: "あいづちのように使われることが多い"

  - id: "kaku-15-e09"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.220"
    role: "example"
    english: "He is exhausted after staying up all night."
    japanese: "彼は徹夜の後で疲れきっている。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:He) (V:is/be動詞) (C:過去分詞exhausted/感情動詞の受動→形容詞化) (M:前置詞句after+動名詞句)"
    notes: "exhaustは「外に(ex)エネルギーを出す」→「どっと疲れさせる」"

  - id: "kaku-15-e10"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.220"
    role: "example"
    english: "The sound was irritating."
    japanese: "その音はイライラさせるようなものだった。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句The sound) (V:was/be動詞) (C:現在分詞irritating/感情動詞の能動→形容詞化)"
    notes: "irritateと「イライラ」の音が似ている"

  - id: "kaku-15-e11"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.220"
    role: "example"
    english: "He was upset about not being invited to the party."
    japanese: "彼はパーティーに呼ばれなくて動揺していた。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:He) (V:was/be動詞) (C:過去分詞upset/感情動詞の受動→形容詞化) (M:前置詞句about+動名詞受動態否定形)"
    notes: "upsetは無変化(upset-upset-upset)。原義「ひっくり返す」→「心をひっくり返す」→「狼狽させる・むしゃくしゃさせる」"

  - id: "kaku-15-e12"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.220"
    role: "example"
    english: "I marveled at her ability to play the piano."
    japanese: "僕は彼女のピアノを弾く能力にすごく驚いた。"
    sentence_structures:
      overall: "S V M"
      details: "(S:I) (V:marveled/自動詞/感情動詞の例外) (M:前置詞句at+名詞句/不定詞の形容詞的用法)"
    notes: "marvelは例外的に自動詞「すごく驚く」。他の感情動詞は「〜させる」（他動詞）"

  # === CHECK ===
  - id: "kaku-15-c01"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.221"
    role: "check"
    english: "I threw a book at the barking dog."
    japanese: "私は、吠えている犬に向かって本を投げつけた。"
    sentence_structures:
      overall: "S V O M"
      details: "(S:I) (V:threw/他動詞) (O:名詞句a book) (M:前置詞句at+名詞句/現在分詞barkingが1語で前から修飾)"
    notes: "「犬が吠える」→ 能動関係 → -ing(barking)"

  - id: "kaku-15-c02"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.221"
    role: "check"
    english: "The phones sold at the store are popular among young people."
    japanese: "その店で売られている電話（スマホ）は若者の間で人気がある。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:名詞句/過去分詞句sold at the storeが後ろから修飾) (V:are/be動詞) (C:形容詞popular) (M:前置詞句among young people)"
    notes: "「電話が売られる」→ 受動関係 → p.p.(sold)。are soldを入れると後半のareの主語がなくなる"

  - id: "kaku-15-c03"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.221"
    role: "check"
    english: "His coach was satisfied with his performance."
    japanese: "彼のコーチは、彼のパフォーマンスに満足した。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:名詞句His coach) (V:was/be動詞) (C:過去分詞satisfied/感情動詞の受動→形容詞化) (M:前置詞句with his performance)"
    notes: "be satisfied with〜「〜に満足している」。コーチが「満足させられる」→ p.p."

  # === 入試問題 ===
  - id: "kaku-15-x01"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.223"
    role: "exam"
    english: "The cat sleeping peacefully in the sun is our old cat."
    japanese: "日なたで穏やかに眠っているネコは、私たちが昔から飼っているネコだ。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句/現在分詞句sleeping peacefully in the sunが後ろから修飾) (V:is/be動詞) (C:名詞句our old cat)"
    notes: "出典: 大阪学院大学。「ネコが眠っている」→ 能動関係 → -ing(sleeping)"

  - id: "kaku-15-x02"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.223"
    role: "exam"
    english: "The languages spoken in Canada are English and French."
    japanese: "カナダで話されている言語は英語とフランス語です。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句/過去分詞句spoken in Canadaが後ろから修飾) (V:are/be動詞) (C:名詞句English and French)"
    notes: "出典: 愛知工業大学。「言語が話される」→ 受動関係 → p.p.(spoken)"

  - id: "kaku-15-x03"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.223"
    role: "exam"
    english: "The movie I saw last night was very interesting."
    japanese: "私が昨夜見た映画はとても面白かった。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句/関係代名詞省略that I saw last night) (V:was/be動詞) (C:形容詞句very interesting/感情動詞の能動→形容詞化)"
    notes: "出典: 高崎経済大学。「映画が人に興味を持たせる」→ する側 → -ing(interesting)"

  - id: "kaku-15-x04"
    book: "英文法の核心"
    section_id: "Kaku_15"
    page: "p.223"
    role: "exam"
    english: "I always feel embarrassed when I have to give a speech in front of large audience."
    japanese: "大勢の聴衆の前でスピーチをしなければならないとき、いつも恥ずかしく感じる。"
    sentence_structures:
      overall: "S M V C M"
      details: "(S:I) (M:副詞always) (V:feel/知覚動詞/SVC型) (C:過去分詞embarrassed/感情動詞の受動→形容詞化) (M:when節/副詞節)"
    notes: "出典: 青山学院大学。embarrassは「恥ずかしい思いをさせる」。be動詞の代わりにfeelが使われている"

