# Kaku_18b: 比較（no比較級than・熟語・入試問題）（p.266-275）
# 例文6 + CHECK3 + 入試問題4 = 13文

sentences:
  # === 例文 ===
  - id: "kaku-18b-e01"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.266"
    role: "example"
    english: "The test was no more difficult than the homework assignment."
    japanese: "そのテストは、課題と同じくらい楽勝だった。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句The test) (V:was) (C:no more difficult than the homework assignment/no比較級than)"
    notes: "矢印2つ: ①no more difficult→「超簡単」②than the homework→「課題と同じくらい」。assignment「課題」"

  - id: "kaku-18b-e02"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.267"
    role: "example"
    english: "A whale is no more a fish than a horse is."
    japanese: "クジラが魚じゃないのは、馬が魚じゃないのと同じだ。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句A whale) (V:is) (C:no more a fish than a horse is/クジラの構文)"
    notes: "クジラの構文。①no more a fish「まったく魚じゃない」（名詞に逆はないので否定のみ）②than a horse is「馬と同じくらい」"

  - id: "kaku-18b-e03"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.268"
    role: "example"
    english: "Money is no less important than one's life."
    japanese: "お金はすごく大切だよ。命と同じくらいに。"
    sentence_structures:
      overall: "S V C"
      details: "(S:Money) (V:is) (C:no less important than one's life/no less...than)"
    notes: "no less=「超」（二重否定で打ち消しあい）。①「超大切」②「命と同じくらい」"

  - id: "kaku-18b-e04"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.269"
    role: "example"
    english: "I have no more than 1000 yen."
    japanese: "僕は1000円しか持ってないんだ。"
    sentence_structures:
      overall: "S V O"
      details: "(S:I) (V:have) (O:no more than 1000 yen/数量のno more than = only)"
    notes: "no more than~ = only~。①no more「超少ない」②than 1000 yen「1000円と同じ」→「1000円しか」"

  - id: "kaku-18b-e05"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.269"
    role: "example"
    english: "I have no less than 1000 yen."
    japanese: "1000円も持ってるんだぞ。"
    sentence_structures:
      overall: "S V O"
      details: "(S:I) (V:have) (O:no less than 1000 yen/数量のno less than = as much as)"
    notes: "no less than~ = as many[much] as~。①no less「超多い」②than 1000 yen「1000円と同じ」→「1000円も」"

  - id: "kaku-18b-e06"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.271"
    role: "example"
    english: "I have not less than 1000 yen."
    japanese: "僕は少なくとも1000円は持っているよ。"
    sentence_structures:
      overall: "S V O"
      details: "(S:I) (V:have) (O:not less than 1000 yen/数量のnot less than = at least)"
    notes: "not less than~ = at least。notは「除外」するだけ。1000円より少ない部分を除外→「少なくとも1000円」"

  # === CHECK ===
  - id: "kaku-18b-c01"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.272"
    role: "check"
    english: "She reads three times as many books as I do."
    japanese: "彼女は私の3倍の本を読む。"
    sentence_structures:
      overall: "S V O"
      details: "(S:She) (V:reads) (O:three times as many books as I do/倍数+まとめて挟む)"
    notes: "three times as~as「3倍〜だ」。as many books as（many+名詞をまとめて挟む）"

  - id: "kaku-18b-c02"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.272"
    role: "check"
    english: "Kai is the smartest student of all his classmates."
    japanese: "カイは全クラスメイトの中で一番よくできる生徒だ。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:Kai) (V:is) (C:the smartest student/最上級) (M:前置詞句of all his classmates)"
    notes: "最上級の範囲: allがあるのでof"

  - id: "kaku-18b-c03"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.272"
    role: "check"
    english: "I like math better than any other subject."
    japanese: "僕は他のどの科目よりも数学が好きです。"
    sentence_structures:
      overall: "S V O M"
      details: "(S:I) (V:like) (O:math) (M:better than any other subject/like A better than B + any other 単数形)"
    notes: "like A better than B + 比較級 than any other 単数形。mathと1対1で比べるから単数subject"

  # === 入試問題 ===
  - id: "kaku-18b-x01"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.274"
    role: "exam"
    english: "Happiness lies not so much in having as in sharing."
    japanese: "幸せは、所有することよりもむしろ共有することの中にある。"
    sentence_structures:
      overall: "S V M"
      details: "(S:Happiness) (V:lies) (M:not so much in having as in sharing/not so much A as B「AというよりB」)"
    notes: "出典: 学習院大学。not so much A as B「AというよりむしろB」。lie in~「〜にある」"

  - id: "kaku-18b-x02"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.274"
    role: "exam"
    english: "Our company's products are superior to those of the other companies."
    japanese: "我が社の製品は他社製品よりも優れている。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:名詞句Our company's products) (V:are) (C:superior/ラテン比較級) (M:前置詞句to those of the other companies)"
    notes: "出典: 中京大学。be superior to~。those=products（前出の複数名詞を受ける代名詞）"

  - id: "kaku-18b-x03"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.274"
    role: "exam"
    english: "The longer I cook it, the more delicious it will taste."
    japanese: "調理に長い時間をかければかけるほど、おいしくなるんだ。"
    sentence_structures:
      overall: "The比較級 SV, the比較級 SV"
      details: "(The longer/比較級) (S:I) (V:cook) (O:it) (the more delicious/比較級) (S:it) (V:will taste)"
    notes: "出典: 法政大学。The 比較級, the 比較級「〜すればするほど、…だ」"

  - id: "kaku-18b-x04"
    book: "英文法の核心"
    section_id: "Kaku_18b"
    page: "p.274"
    role: "exam"
    english: "In winter, it is no less cold in Japan than in Scandinavian countries."
    japanese: "冬は、スカンジナビアの国々と同様に、日本もかなり寒い。"
    sentence_structures:
      overall: "M S V C M"
      details: "(M:前置詞句In winter) (S:it/天候のit) (V:is) (C:no less cold/no less=超) (M:than in Scandinavian countries/同じくらい)"
    notes: "出典: 中京大学。no less~than...「超〜だ。…と同じくらい」。= as cold as"

