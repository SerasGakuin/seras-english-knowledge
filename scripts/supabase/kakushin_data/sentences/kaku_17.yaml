# Kaku_17: 受動態（p.238-251）
# 例文19 + CHECK3 + 入試問題3 = 25文

sentences:
  # === 例文 ===
  - id: "kaku-17-e01"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.238"
    role: "example"
    english: "English is taught by Mr. Nakano."
    japanese: "英語は中野先生が教えます。"
    sentence_structures:
      overall: "S V M"
      details: "(S:English) (V:is taught/受動態be+p.p.) (M:前置詞句by Mr. Nakano)"
    notes: "受動態の3ステップ（O前出し→be+p.p.→by~）のデモ。直訳「中野先生によって教えられます」→自然な訳「教えます」"

  - id: "kaku-17-e02"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.239"
    role: "example"
    english: "My bag was stolen."
    japanese: "私のカバンが盗まれました。"
    sentence_structures:
      overall: "S V"
      details: "(S:名詞句My bag) (V:was stolen/受動態)"
    notes: "×I was stolen my bag.は誤り。stealは「steal 物」の形→受動態は「物 is stolen」。受動態の後に名詞は来ない"

  - id: "kaku-17-e03"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.239"
    role: "example"
    english: "My phone must be broken."
    japanese: "僕の電話（スマホ）は壊れているに違いない。"
    sentence_structures:
      overall: "S V"
      details: "(S:名詞句My phone) (V:must be broken/助動詞+受動態)"
    notes: "助動詞+受動態: 助動詞 be + p.p.の形。「スマホ」でもphoneだけで表せる"

  - id: "kaku-17-e04"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.239"
    role: "example"
    english: "My flight has been canceled due to the fog."
    japanese: "僕のフライトは霧のせいで欠航になった。"
    sentence_structures:
      overall: "S V M"
      details: "(S:名詞句My flight) (V:has been canceled/完了形+受動態/have been p.p.) (M:前置詞句due to the fog)"
    notes: "完了形+受動態: have been p.p.の形。due to〜「〜が原因で」"

  - id: "kaku-17-e05"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.239"
    role: "example"
    english: "My phone is being repaired now."
    japanese: "僕の電話（スマホ）は今修理されているところだ。"
    sentence_structures:
      overall: "S V M"
      details: "(S:名詞句My phone) (V:is being repaired/進行形+受動態/be being p.p.) (M:副詞now)"
    notes: "進行形+受動態: be being p.p.の形。beがbe -ingになる。左にある要素で時制を示す"

  - id: "kaku-17-e06"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.241"
    role: "example"
    english: "The lecture was followed by a question-and-answer session."
    japanese: "講義の後には質疑応答がありました。"
    sentence_structures:
      overall: "S V M"
      details: "(S:名詞句The lecture) (V:was followed/受動態) (M:前置詞句by a question-and-answer session)"
    notes: "受動態の理由②「S⇔Oの位置を変えたい」の代表例。followは「後の出来事follow先の出来事」→受動態で時系列順に"

  - id: "kaku-17-e07"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.241"
    role: "example"
    english: "This book was written by him in 2022."
    japanese: "この本は2022年に彼が書いたものです。"
    sentence_structures:
      overall: "S V M M"
      details: "(S:名詞句This book) (V:was written/受動態) (M:前置詞句by him) (M:前置詞句in 2022)"
    notes: "直訳「彼によって書かれました」→「彼が書いた」と能動で訳してOK"

  - id: "kaku-17-e08"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.242"
    role: "example"
    english: "Jun was spoken to by a policeman."
    japanese: "ジュンは警察官に声をかけられた。"
    sentence_structures:
      overall: "S V M"
      details: "(S:Jun) (V:was spoken to/受動態/speak toで1動詞扱い/toを残す) (M:前置詞句by a policeman)"
    notes: "speak to〜で1つの動詞扱い→受動態でtoを残す。×was spoken（toを消す）は誤り"

  - id: "kaku-17-e09"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.242"
    role: "example"
    english: "Nadia was laughed at by her classmates."
    japanese: "ナディアはクラスメイトに笑われました。"
    sentence_structures:
      overall: "S V M"
      details: "(S:Nadia) (V:was laughed at/受動態/laugh atで1動詞扱い) (M:前置詞句by her classmates)"
    notes: "laugh at〜で1つの動詞と考える"

  - id: "kaku-17-e10"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.243"
    role: "example"
    english: "Who was Emma spoken to by?"
    japanese: "エマはだれに話しかけられたのですか？"
    sentence_structures:
      overall: "C V S V M"
      details: "(C:疑問詞Who) (V:was spoken to/受動態/疑問文) (S:Emma) (M:前置詞by/文末残置)"
    notes: "本来byの後は目的格whomだが現代英語ではカタい。Whoで代用"

  - id: "kaku-17-e11"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.243"
    role: "example"
    english: "What is this fruit called in English?"
    japanese: "この果物は英語で何と呼ばれていますか？"
    sentence_structures:
      overall: "C V S V M"
      details: "(C:疑問詞What) (V:is called/受動態/call OC「OをCと呼ぶ」の受動態) (S:名詞句this fruit) (M:前置詞句in English)"
    notes: "call OC → S is called C → CがwhatになりWhat is S called?の形。超頻出"

  - id: "kaku-17-e12"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.244"
    role: "example"
    english: "Kohei is called the \"King of Gymnastics.\""
    japanese: "コウヘイは〈体操界のキング〉と呼ばれている。"
    sentence_structures:
      overall: "S V C"
      details: "(S:Kohei) (V:is called/受動態/SVOC型) (C:名詞句the King of Gymnastics)"
    notes: "SVOC受動態パターン①: Cに原形以外→そのまま残す。by peopleは省略"

  - id: "kaku-17-e13"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.245"
    role: "example"
    english: "Nancy was made to work on Sunday."
    japanese: "ナンシーは日曜に働かざるをえなかった。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:Nancy) (V:was made/受動態/使役動詞make) (C:to不定詞to work/原形→to不定詞に変わる) (M:前置詞句on Sunday)"
    notes: "SVOC受動態パターン②: Cに原形→to不定詞に変える。make人原形の受動態=人is made to原形"

  - id: "kaku-17-e14"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.246"
    role: "example"
    english: "She was seen dancing."
    japanese: "彼女はダンスをしているのを見られた。"
    sentence_structures:
      overall: "S V C"
      details: "(S:She) (V:was seen/受動態/知覚動詞see) (C:現在分詞dancing/分詞はそのまま残す)"
    notes: "Cに-ing(原形以外)→そのまま残す"

  - id: "kaku-17-e15"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.246"
    role: "example"
    english: "The students were told to study harder."
    japanese: "生徒たちは、もっと一生懸命に勉強するように言われた。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句The students) (V:were told/受動態/tell人to〜) (C:to不定詞句to study harder/to〜はそのまま)"
    notes: "tell人to〜の受動態: be told to〜。Cにto不定詞→そのまま残す（原形にする必要なし）"

  - id: "kaku-17-e16"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.246"
    role: "example"
    english: "My teacher was pleased with my book report."
    japanese: "先生は、私の読書感想文に満足しました。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:名詞句My teacher) (V:was/be動詞) (C:過去分詞pleased/感情動詞の受動→形容詞化) (M:前置詞句with my book report)"
    notes: "be pleased with〜「〜を気に入っている」。感情系のby以外受動態。参考書内参照: →p.217"

  - id: "kaku-17-e17"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.247"
    role: "example"
    english: "Rush hour trains in Tokyo are always crowded with people."
    japanese: "東京のラッシュアワーの電車は、いつも人で混み合っています。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:名詞句Rush hour trains in Tokyo) (V:are/be動詞) (M:副詞always) (C:過去分詞crowded/受動→形容詞化) (M:前置詞句with people)"
    notes: "be crowded with〜「〜で混んでいる」。覆う系のby以外受動態。withは道具「〜を使って」"

  - id: "kaku-17-e18"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.247"
    role: "example"
    english: "The third little pig's house was made of bricks."
    japanese: "3番目に登場したこぶたの家はレンガでつくられていました。"
    sentence_structures:
      overall: "S V M"
      details: "(S:名詞句The third little pig's house) (V:was made/受動態) (M:前置詞句of bricks)"
    notes: "be made of 材料「〜でつくられている」。材料=目で見てわかるもの。brick「レンガ」"

  - id: "kaku-17-e19"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.247"
    role: "example"
    english: "Hiroshima is known for its oysters."
    japanese: "広島は牡蠣で有名だ。"
    sentence_structures:
      overall: "S V M"
      details: "(S:Hiroshima) (V:is known/受動態) (M:前置詞句for its oysters)"
    notes: "be known for〜「〜で知られている」。forは「理由」。oyster「牡蠣」"

  # === CHECK ===
  - id: "kaku-17-c01"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.248"
    role: "check"
    english: "Many books on Japanese culture have been published."
    japanese: "日本文化に関するたくさんの本が出版されました。"
    sentence_structures:
      overall: "S V"
      details: "(S:名詞句Many books on Japanese culture) (V:have been published/完了形+受動態/have been p.p.)"
    notes: "onは「接触→意識の接触（〜について）」"

  - id: "kaku-17-c02"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.248"
    role: "check"
    english: "He was made to sign his name to the document."
    japanese: "彼はその文書に署名をさせられた。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:He) (V:was made/受動態/使役動詞make) (C:to不定詞句to sign his name/原形→to不定詞) (M:前置詞句to the document)"
    notes: "make人原形の受動態: 人is made to原形"

  - id: "kaku-17-c03"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.248"
    role: "check"
    english: "Mr. Hirata is looked up to by every student."
    japanese: "平田先生は生徒全員から尊敬されている。"
    sentence_structures:
      overall: "S V M"
      details: "(S:Mr. Hirata) (V:is looked up to/受動態/look up toで1動詞扱い) (M:前置詞句by every student)"
    notes: "look up to〜「〜を尊敬する」で1動詞扱い。toを省略してはいけない"

  # === 入試問題 ===
  - id: "kaku-17-x01"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.249"
    role: "exam"
    english: "The illustration will not be included in the book."
    japanese: "その挿絵は本の中に入りません。"
    sentence_structures:
      overall: "S V M"
      details: "(S:名詞句The illustration) (V:will not be included/助動詞+受動態/否定) (M:前置詞句in the book)"
    notes: "出典: 国士舘大学。助動詞+受動態(will be p.p.)。空所直後に名詞がない→受動態と判断可"

  - id: "kaku-17-x02"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.249"
    role: "exam"
    english: "There are fifty computers in this room, and most of them are being used now."
    japanese: "この部屋には50台のパソコンがあります。そのほとんどが今使用中です。"
    sentence_structures:
      overall: "There V S M, and S V M"
      details: "(There構文: There are fifty computers in this room) (and) (S:名詞句most of them) (V:are being used/進行形+受動態/be being p.p.) (M:副詞now)"
    notes: "出典: 東京経済大学。進行形+受動態(be being p.p.)。空所直後にnow(副詞)=名詞なし→受動態"

  - id: "kaku-17-x03"
    book: "英文法の核心"
    section_id: "Kaku_17"
    page: "p.249"
    role: "exam"
    english: "She was made to rewrite the essay by him."
    japanese: "彼女は彼にその論文を書き直させられた。"
    sentence_structures:
      overall: "S V C O M"
      details: "(S:She) (V:was made/受動態/使役動詞make) (C:to不定詞to rewrite/原形→to不定詞) (O:名詞句the essay) (M:前置詞句by him)"
    notes: "出典: 福岡大学。make人原形の受動態: 人is made to原形。元文: He made her rewrite the essay."

