# Kaku_07a: 文型・前半（p.71-82）
# ※ CHECK・入試問題はKaku_07b（p.83-99）に属するため、このセクションは例文のみ

sentences:
  - id: "kaku-07a-e01"
    section_id: "Kaku_07a"
    drill: 0
    number: 1
    role: "example"
    english: "The patient waited quietly until his name was called."
    japanese: "その患者は、名前が呼ばれるまで静かに待った。"
    notes: "3フェイズ分析の実例として使用（p.78）。フェイズ1→2→3の全段階を示す例文。"
  - id: "kaku-07a-e02"
    section_id: "Kaku_07a"
    drill: 0
    number: 2
    role: "example"
    english: "The cat lay on the sofa."
    japanese: "ネコはソファの上にいた。"
    notes: "layはlie（自動詞「いる」）の過去形。他動詞layの現在形なら3単現sがつきlaysになるはず。直後に目的語もない。"
  - id: "kaku-07a-e03"
    section_id: "Kaku_07a"
    drill: 0
    number: 3
    role: "example"
    english: "She laid her smartphone on the table."
    japanese: "彼女はスマホをテーブルの上に置いた。"
    notes: "他動詞layの過去形laid。目的語her smartphoneがある。"
  - id: "kaku-07a-e04"
    section_id: "Kaku_07a"
    drill: 0
    number: 4
    role: "example"
    english: "My grandmother walks to the supermarket every morning."
    japanese: "祖母は毎朝、スーパーまで歩いて行く。"
    notes: "第1文型SVM。to the supermarketとevery morningが共にM。"
  - id: "kaku-07a-e05"
    section_id: "Kaku_07a"
    drill: 0
    number: 5
    role: "example"
    english: "He transferred to a school in Kobe."
    japanese: "彼は神戸の学校に転校した。"
    notes: "第1文型の意味予測例。transferを知らなくても「いる」か「動く」で推測→前置詞toから「移動」→「転校」と予測可能。"
  - id: "kaku-07a-e06"
    section_id: "Kaku_07a"
    drill: 0
    number: 6
    role: "example"
    english: "It looks delicious."
    japanese: "それ、おいしそうだね。"
    notes: "第2文型SVC。It=delicious。lookの後に形容詞。"
  - id: "kaku-07a-e07"
    section_id: "Kaku_07a"
    drill: 0
    number: 7
    role: "example"
    english: "They look tired."
    japanese: "彼らは疲れている様子です。"
    notes: "第2文型SVC。They=tired。lookを使うことで「見た目では疲れて見える」（断定のareとの違い）"
  - id: "kaku-07a-e08"
    section_id: "Kaku_07a"
    drill: 0
    number: 8
    role: "example"
    english: "The temperature stayed high all night."
    japanese: "気温は、一晩中高いままでした。"
    notes: "第2文型SVC。stay+形容詞→「〜のままでいる」。temperature=high。"
  - id: "kaku-07a-e09"
    section_id: "Kaku_07a"
    drill: 0
    number: 9
    role: "example"
    english: "Are you going to stay at a hotel?"
    japanese: "あなたはホテルに泊まる予定ですか？"
    notes: "第1文型SVM。stayの後にMの前置詞句（at a hotel）→「滞在する」の意味。第2文型との対比。"

