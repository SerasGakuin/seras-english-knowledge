# Kaku_16: 分詞構文（p.225-237）
# 例文10 + CHECK3 + 入試問題4 = 17文

sentences:
  # === 例文 ===
  - id: "kaku-16-e01"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.226"
    role: "example"
    english: "Seeing me, she ran away."
    japanese: "俺を見て、彼女は逃げた。"
    sentence_structures:
      overall: "M S V"
      details: "(M:分詞構文Seeing me/現在分詞/-ingが副詞の働き) (S:she) (V:ran away/句動詞/自動詞)"
    notes: "When she saw me, she ran away. から接続詞と主語を消し、動詞を-ingに変えた形"

  - id: "kaku-16-e02"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.227"
    role: "example"
    english: "Written in simple English, this book is good for high school students."
    japanese: "簡単な英語で書かれているので、この本は高校生に向いている。"
    sentence_structures:
      overall: "M S V C M"
      details: "(M:分詞構文Written in simple English/過去分詞/beingの省略) (S:名詞句this book) (V:is/be動詞) (C:形容詞good) (M:前置詞句for high school students)"
    notes: "受動態の分詞構文。Being Written → beingはほぼ100%省略される"

  - id: "kaku-16-e03"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.229"
    role: "example"
    english: "Feeling sleepy, he took a nap."
    japanese: "眠くなって、彼は昼寝をした。"
    sentence_structures:
      overall: "M S V O"
      details: "(M:分詞構文Feeling sleepy/現在分詞/文頭→適当に訳す) (S:he) (V:took/他動詞) (O:名詞句a nap)"
    notes: "「て」で十分に通じる。「眠くなったので」でもOK"

  - id: "kaku-16-e04"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.229"
    role: "example"
    english: "The floor, made of concrete, is very hard."
    japanese: "その床は、コンクリートでできていて、とても硬い。"
    sentence_structures:
      overall: "S M V C"
      details: "(S:名詞句The floor) (M:分詞構文made of concrete/過去分詞/文中→主語の説明) (V:is/be動詞) (C:形容詞句very hard)"
    notes: "文中の分詞構文。主語The floorの説明になっている"

  - id: "kaku-16-e05"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.229"
    role: "example"
    english: "The boy sat on the grass, looking at the bird."
    japanese: "その男の子は芝生の上に座って、（そして）その鳥を見た。／その男の子はその鳥を見ながら、芝生の上に座った。"
    sentence_structures:
      overall: "S V M M"
      details: "(S:名詞句The boy) (V:sat/自動詞) (M:前置詞句on the grass) (M:分詞構文looking at the bird/現在分詞/文末→「そして/しながら」)"
    notes: "文末の分詞構文。「そして」「しながら」のどちらでもOK"

  - id: "kaku-16-e06"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.230"
    role: "example"
    english: "Not knowing what to do, I went to him for advice."
    japanese: "どうしていいかわからなかったので、アドバイスを求めて彼のところへ行った。"
    sentence_structures:
      overall: "M S V M M"
      details: "(M:分詞構文Not knowing what to do/否定形not -ing) (S:I) (V:went/自動詞) (M:前置詞句to him) (M:前置詞句for advice)"
    notes: "分詞構文の否定形。notは-ingの前に置く"

  - id: "kaku-16-e07"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.230"
    role: "example"
    english: "Having lived in Singapore, he knows the country well."
    japanese: "シンガポールに住んでいたので、彼はその国をよく知っている。"
    sentence_structures:
      overall: "M S V O M"
      details: "(M:分詞構文Having lived in Singapore/完了形having p.p./主節より1つ前の時制) (S:he) (V:knows/他動詞) (O:名詞句the country) (M:副詞well)"
    notes: "分詞構文の完了形。「住んでいた」は主節「知っている」より前の時制なのでhaving p.p."

  - id: "kaku-16-e08"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.231"
    role: "example"
    english: "Frankly speaking, I don't want to go out with him."
    japanese: "率直に言って、私は彼とは付き合いたくないの。"
    sentence_structures:
      overall: "M S V O"
      details: "(M:分詞構文Frankly speaking/慣用表現「率直に言えば」/判断・発言系統) (S:I) (V:don't want/他動詞/否定) (O:不定詞句to go out with him)"
    notes: "go out with〜「〜と一緒に外に出かける」→「〜と付き合う」"

  - id: "kaku-16-e09"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.232"
    role: "example"
    english: "According to the weather forecast, a typhoon is coming."
    japanese: "天気予報によると、台風がやってくるとのことです。"
    sentence_structures:
      overall: "M S V"
      details: "(M:前置詞句According to the weather forecast/分詞構文由来「〜によれば」/前置詞・接続詞系統) (S:名詞句a typhoon) (V:is coming/現在進行形)"
    notes: "辞書では前置詞に分類されるが、本来は分詞構文"

  - id: "kaku-16-e10"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.232"
    role: "example"
    english: "All things considered, he did his best."
    japanese: "すべてのことを考えると、彼は全力を尽くした。"
    sentence_structures:
      overall: "M S V O"
      details: "(M:分詞構文All things considered/意味上の主語付き慣用表現/All things {being} considered) (S:he) (V:did/他動詞) (O:名詞句his best)"
    notes: "意味上の主語All thingsが残ったまま慣用表現化。「すべてのことが考慮されて」→「すべてを考慮すると」"

  # === CHECK ===
  - id: "kaku-16-c01"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.233"
    role: "check"
    english: "Feeling tired, he went to bed early."
    japanese: "疲れていたので、彼は早く寝た。"
    sentence_structures:
      overall: "M S V M M"
      details: "(M:分詞構文Feeling tired/現在分詞/能動関係「heがfeelする」) (S:he) (V:went/自動詞) (M:前置詞句to bed) (M:副詞early)"
    notes: "heとfeelの関係は能動→-ing(Feeling)。Feltにしないこと"

  - id: "kaku-16-c02"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.233"
    role: "check"
    english: "Seen from a distance, the rock looks like a cloud."
    japanese: "遠くから見ると、その岩は雲のように見える。"
    sentence_structures:
      overall: "M S V C"
      details: "(M:分詞構文Seen from a distance/過去分詞/受動関係「rockがseeされる」) (S:名詞句the rock) (V:looks/知覚動詞/SVC型) (C:前置詞句like a cloud)"
    notes: "日本語「遠くから見ると」につられて-ingにしない。英語では「岩が見られる」→受動→p.p."

  - id: "kaku-16-c03"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.233"
    role: "check"
    english: "Concerning that topic, they did not discuss it any more."
    japanese: "その話題については、もう話し合わなかった。"
    sentence_structures:
      overall: "M S V O M"
      details: "(M:前置詞句Concerning that topic/分詞構文由来の慣用表現「〜に関して」) (S:they) (V:did not discuss/他動詞/否定) (O:it) (M:副詞句any more)"
    notes: "not〜any more「もう〜ない」"

  # === 入試問題 ===
  - id: "kaku-16-x01"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.235"
    role: "exam"
    english: "Seen from above, the people on the ground looked like ants."
    japanese: "上から見ると、地上の人々はアリのように見えた。"
    sentence_structures:
      overall: "M S V C"
      details: "(M:分詞構文Seen from above/過去分詞/受動関係「peopleがseeされる」) (S:名詞句the people on the ground) (V:looked/知覚動詞/SVC型) (C:前置詞句like ants)"
    notes: "出典: 東洋英和女学院大学。Seen from〜, SV.の形は超頻出"

  - id: "kaku-16-x02"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.235"
    role: "exam"
    english: "Not paying attention, Janet picked up the wrong key."
    japanese: "注意を払っていなかったので、ジャネットは間違った鍵を手にした。"
    sentence_structures:
      overall: "M S V O"
      details: "(M:分詞構文Not paying attention/否定形not -ing/能動関係「Janetが注意を払う」) (S:Janet) (V:picked up/句動詞/他動詞) (O:名詞句the wrong key)"
    notes: "出典: 青山学院大学。分詞構文の否定形not -ing"

  - id: "kaku-16-x03"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.235"
    role: "exam"
    english: "Charmed with the sweet music of birds, I walked into the woods."
    japanese: "美しい鳥の声にうっとりと誘われて、私は森の中に入っていきました。"
    sentence_structures:
      overall: "M S V M"
      details: "(M:分詞構文Charmed with the sweet music of birds/過去分詞/受動関係「Iがcharmされる」/感情動詞) (S:I) (V:walked/自動詞) (M:前置詞句into the woods)"
    notes: "出典: 中央大学。charmは感情動詞「魅了する」。感情動詞×分詞構文のセット出題（→p.217）"

  - id: "kaku-16-x04"
    book: "英文法の核心"
    section_id: "Kaku_16"
    page: "p.235"
    role: "exam"
    english: "I will climb Mt. Fuji tomorrow morning, weather permitting."
    japanese: "天気が許せば、明日の朝には富士山に登っているだろう。"
    sentence_structures:
      overall: "S V O M M"
      details: "(S:I) (V:will climb/他動詞/未来) (O:Mt. Fuji) (M:副詞句tomorrow morning) (M:分詞構文weather permitting/意味上の主語付き慣用表現「天気が許せば」)"
    notes: "出典: 武蔵大学。weather permitting = 天気が良ければ。weatherは分詞構文の意味上の主語"

