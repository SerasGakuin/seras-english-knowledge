# Kaku_18a: 比較（原級・比較級・最上級・重要表現）（p.252-265）
# 例文28 = 28文

sentences:
  # === 例文（原級）===
  - id: "kaku-18a-e01"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.252"
    role: "example"
    english: "My cat is as cute as hers."
    japanese: "ウチのネコは彼女のネコと同じくらいかわいいんだよ。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句My cat) (V:is) (C:as cute as hers/原級比較/hers=her cat)"
    notes: "as~asの基本形。hers=her cat"

  - id: "kaku-18a-e02"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.252"
    role: "example"
    english: "This book has as many pages as that one."
    japanese: "この本はあの本と同じくらいページ数がありますよ。"
    sentence_structures:
      overall: "S V O"
      details: "(S:名詞句This book) (V:has) (O:as many pages as that one/many+名詞をまとめて挟む)"
    notes: "as many pages asの形。×as many as pagesとしない。元文: This book has many pages."

  - id: "kaku-18a-e03"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.253"
    role: "example"
    english: "Kai's dog is not as big as Minami's dog."
    japanese: "カイのイヌは、ミナミのイヌほど大きくない。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句Kai's dog) (V:is not) (C:as big as Minami's dog/否定の原級比較)"
    notes: "not as~as「…ほど〜じゃない」。×「同じじゃない」と訳さない"

  - id: "kaku-18a-e04"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.253"
    role: "example"
    english: "The dog jumped as high as he could, but he could not reach the dog food on the counter."
    japanese: "その犬はできるだけ高く跳んだが、カウンターのドッグフードには届かなかった。"
    sentence_structures:
      overall: "S V M, but S V O M"
      details: "(S:名詞句The dog) (V:jumped) (M:as high as he could/as~as人can) (but) (S:he) (V:could not reach) (O:名詞句the dog food) (M:前置詞句on the counter)"
    notes: "as~as人can「できるだけ〜」。heはthe dogを指す"

  - id: "kaku-18a-e05"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.253"
    role: "example"
    english: "She is not so much a singer as a dancer."
    japanese: "あの子は歌手というより、むしろダンサーだよ。"
    sentence_structures:
      overall: "S V C"
      details: "(S:She) (V:is) (C:not so much a singer as a dancer/not so much A as B「AというよりむしろB」)"
    notes: "not so much A as B: 直訳「Bほど十分にAではない」→「AというよりB」。A < Bの関係"

  - id: "kaku-18a-e06"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.254"
    role: "example"
    english: "Canada is about 26 times as large as Japan."
    japanese: "カナダは日本の約26倍大きい。"
    sentence_structures:
      overall: "S V C"
      details: "(S:Canada) (V:is) (C:about 26 times as large as Japan/倍数+原級比較)"
    notes: "倍数表現: X times as~as。26 times「26倍」+ about「約」"

  - id: "kaku-18a-e07"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.254"
    role: "example"
    english: "She has twice as many DVDs as I do."
    japanese: "彼女は私の2倍の（枚数の）DVDを持っています。"
    sentence_structures:
      overall: "S V O"
      details: "(S:She) (V:has) (O:twice as many DVDs as I do/倍数+まとめて挟む)"
    notes: "twice「2倍」+ as many DVDs as（まとめて挟む）。= She has twice the number of DVDs that I have."

  # === 例文（比較級）===
  - id: "kaku-18a-e08"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.256"
    role: "example"
    english: "Nancy has less money than Kate."
    japanese: "ナンシーの所持金はケイトより少ない。"
    sentence_structures:
      overall: "S V O"
      details: "(S:Nancy) (V:has) (O:less money than Kate/lessの意味①「より少ない」)"
    notes: "lessの意味①「より少ない」"

  - id: "kaku-18a-e09"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.256"
    role: "example"
    english: "Sota is less a hard-working student than a genius."
    japanese: "ソウタは勤勉なのではなく、天才なんだ。"
    sentence_structures:
      overall: "S V C"
      details: "(S:Sota) (V:is) (C:less a hard-working student than a genius/lessの意味②「より〜でなく」)"
    notes: "lessの意味②「否定のイメージ」。less A than B「AというよりB」。A < Bの関係"

  # === 例文（最上級）===
  - id: "kaku-18a-e10"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.257"
    role: "example"
    english: "Roland is the most popular boy in our school."
    japanese: "ローランドはウチの学校で一番モテる。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:Roland) (V:is) (C:the most popular boy/最上級+the) (M:前置詞句in our school)"
    notes: "最上級にtheをつける。inの後は場所・集団"

  - id: "kaku-18a-e11"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.257"
    role: "example"
    english: "The giraffe is the tallest of all animals."
    japanese: "キリンはすべての動物の中で一番背が高い。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:名詞句The giraffe) (V:is) (C:the tallest) (M:前置詞句of all animals)"
    notes: "allがあるのでof"

  - id: "kaku-18a-e12"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.257"
    role: "example"
    english: "My mother is the oldest in my family."
    japanese: "ウチの家族では母が最年長です。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:名詞句My mother) (V:is) (C:the oldest) (M:前置詞句in my family)"
    notes: "familyは集団→in"

  - id: "kaku-18a-e13"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.258"
    role: "example"
    english: "This is the most exciting game that I have ever played."
    japanese: "このゲームは私が今まで遊んだゲームの中で一番おもしろい。"
    sentence_structures:
      overall: "S V C"
      details: "(S:This) (V:is) (C:名詞句the most exciting game that I have ever played/最上級+関係代名詞that+現在完了)"
    notes: "the最上級 名詞 that I have ever p.p.「今まで〜した中で一番の名詞だ」"

  # === 例文（重要表現）===
  - id: "kaku-18a-e14"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.258"
    role: "example"
    english: "My mother likes rice better than bread."
    japanese: "母はパンよりご飯派なんです。"
    sentence_structures:
      overall: "S V O M"
      details: "(S:名詞句My mother) (V:likes) (O:rice) (M:better than bread/like A better than B)"
    notes: "like A better than B「BよりAが好き」。betterの代わりにmoreでもOK"

  - id: "kaku-18a-e15"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.258"
    role: "example"
    english: "Mt. Fuji is higher than any other mountain in Japan."
    japanese: "富士山は日本のどの山よりも高い。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:Mt. Fuji) (V:is) (C:higher/比較級) (M:than any other mountain in Japan)"
    notes: "比較級 than any other 単数形。1対1で比べるから単数"

  - id: "kaku-18a-e16"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.259"
    role: "example"
    english: "Daiki is one of the most famous singers in Japan."
    japanese: "ダイキは日本で非常に有名な歌手です。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:Daiki) (V:is) (C:one of the most famous singers) (M:前置詞句in Japan)"
    notes: "one of the 最上級 複数形。「最も〜なうちの1つ」→「すごく〜」と訳してもOK"

  - id: "kaku-18a-e17"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.259"
    role: "example"
    english: "Nothing is more important than love."
    japanese: "愛より大切なものはない。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:Nothing) (V:is) (C:more important/比較級) (M:than love)"
    notes: "実質最上級: Nothingが主語のパターン。= Love is the most important thing in life."

  - id: "kaku-18a-e18"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.260"
    role: "example"
    english: "No other boy in his class is taller than he is."
    japanese: "クラスのどの男子も彼より背が高くない。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:名詞句No other boy in his class) (V:is) (C:taller/比較級) (M:than he is)"
    notes: "実質最上級: No other+単数+比較級。= He is the tallest boy in his class."

  # === 例文（強調）===
  - id: "kaku-18a-e19"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.261"
    role: "example"
    english: "His father looks much younger than he really is."
    japanese: "彼の父親は、実際よりもうんと若く見える。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:名詞句His father) (V:looks) (C:much younger/much+比較級で強調) (M:than he really is)"
    notes: "much+比較級「はるかに〜」。veryは比較級に不可（×very younger）"

  - id: "kaku-18a-e20"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.261"
    role: "example"
    english: "Russia is by far larger than Japan."
    japanese: "ロシアは日本よりもはるかに大きい。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:Russia) (V:is) (C:by far larger/by far+比較級で強調) (M:than Japan)"
    notes: "比較級の強調語句: still/even/by far/far「はるかに・さらに」"

  - id: "kaku-18a-e21"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.261"
    role: "example"
    english: "I cannot read German, much less speak it with fluency."
    japanese: "私はドイツ語が読めないし、ましてや流暢に話すことなどなおさらできない。"
    sentence_structures:
      overall: "S V O, M V O M"
      details: "(S:I) (V:cannot read) (O:German) (M:much less/ましてや) (V:speak) (O:it) (M:前置詞句with fluency)"
    notes: "否定文, much less~「ましてや〜はなおさらだ」。lessの前にstill/evenも可"

  # === 例文（the+比較級）===
  - id: "kaku-18a-e22"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.262"
    role: "example"
    english: "Ms.Oka is the taller of the two women standing by the window."
    japanese: "岡さんは、窓際に立っている2人の女性のうち背が高いほうです。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:Ms. Oka) (V:is) (C:the taller/the+比較級) (M:前置詞句of the two women standing by the window)"
    notes: "the 比較級 of the two「2つのうちで〜なほう」。2つ→比較級、3つ→最上級"

  - id: "kaku-18a-e23"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.263"
    role: "example"
    english: "Ryo is all the more charming for his faults."
    japanese: "リョウには欠点があるからなおさら魅力的だ。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:Ryo) (V:is) (C:all the more charming/all=強調, the=その分だけ, more=比較級) (M:前置詞句for his faults/理由のfor)"
    notes: "all the 比較級 for~「〜なので、その分だけますます比較級だ」。charming「魅力的な・愛嬌がある」"

  - id: "kaku-18a-e24"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.263"
    role: "example"
    english: "The more frequently you practice speaking English, the more fluent you will become."
    japanese: "より頻繁に英語を話すことを練習すればするほど、よりペラペラになりますよ。"
    sentence_structures:
      overall: "The比較級 SV, the比較級 SV"
      details: "(The more frequently/副詞の比較級) (S:you) (V:practice) (O:speaking English) (the more fluent/形容詞の比較級) (S:you) (V:will become)"
    notes: "The 比較級, the 比較級「〜すればするほど、…だ」。frequently「頻繁に」/ fluent「流暢な」"

  - id: "kaku-18a-e25"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.264"
    role: "example"
    english: "The sooner, the better."
    japanese: "早ければ早いほどよい。"
    sentence_structures:
      overall: "The比較級, the比較級"
      details: "(The sooner/比較級) (the better/比較級) ※主語+動詞は省略"
    notes: "The比較級, the比較級のSV省略形。決まり文句"

  # === 例文（ラテン比較級・自者比較）===
  - id: "kaku-18a-e26"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.265"
    role: "example"
    english: "This smartphone is superior to other smartphones in design."
    japanese: "このスマホは他のスマホよりもデザインがいい。"
    sentence_structures:
      overall: "S V C M"
      details: "(S:名詞句This smartphone) (V:is) (C:superior to other smartphones/ラテン比較級/toを使う) (M:前置詞句in design)"
    notes: "be superior to~「〜より優れた」。ラテン比較級はthanではなくto。×more superiorとしない"

  - id: "kaku-18a-e27"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.265"
    role: "example"
    english: "Yuri prefers coffee to tea."
    japanese: "ユリは紅茶よりもコーヒーを好みます。"
    sentence_structures:
      overall: "S V O M"
      details: "(S:Yuri) (V:prefers) (O:coffee) (M:前置詞句to tea/ラテン比較級のto)"
    notes: "prefer A to B「BよりAが好き」。ラテン比較級。preferは動詞"

  - id: "kaku-18a-e28"
    book: "英文法の核心"
    section_id: "Kaku_18a"
    page: "p.265"
    role: "example"
    english: "His jokes are more silly than funny."
    japanese: "アイツの冗談は、面白いというよりバカげている。"
    sentence_structures:
      overall: "S V C"
      details: "(S:名詞句His jokes) (V:are) (C:more silly than funny/自者比較/more原級than原級)"
    notes: "自者比較: 1つの中で2つの性質を比べる。more 原級 than 原級「〜というより…だ」"

