sentences:
  # 例文（本文中の > 付き英文）
  - id: "kaku-10-e01"
    section_id: "Kaku_10"
    drill: 0
    number: 1
    role: "example"
    english: "If it rains tomorrow, the game will be cancelled."
    japanese: "明日雨が降れば、試合は中止になるだろうね。"
    notes: "直説法の例。ifがあっても仮定法ではない（助動詞の過去形がないため）"
  - id: "kaku-10-e02"
    section_id: "Kaku_10"
    drill: 0
    number: 2
    role: "example"
    english: "If I lived in Tokyo, I would go to Akihabara every weekend."
    japanese: "もし東京に住んでいたら、毎週末、秋葉原に行くんだけどなぁ。"
    notes: "仮定法過去の公式。wouldが目印"
  - id: "kaku-10-e03"
    section_id: "Kaku_10"
    drill: 0
    number: 3
    role: "example"
    english: "If I were you, I would ask him for help."
    japanese: "もし私があなた（の立場）だったら、彼に助けを求めるけどね。"
    notes: "仮定法過去。主語がIでもbe動詞はwere"
  - id: "kaku-10-e04"
    section_id: "Kaku_10"
    drill: 0
    number: 4
    role: "example"
    english: "If I had arrived at the station three minutes earlier, I could have caught the train."
    japanese: "駅にあと3分早く着いていれば、その電車に乗れたのに。"
    notes: "仮定法過去完了の公式。実際には遅れて電車に乗れなかった"
  - id: "kaku-10-e05"
    section_id: "Kaku_10"
    drill: 0
    number: 5
    role: "example"
    english: "If she had won the election, she would be the president now."
    japanese: "もし彼女が選挙に勝っていれば、彼女は今頃、大統領だろうに。"
    notes: "ミックス仮定法。if節=過去完了（過去の妄想）、主節=would原形（現在の状態）"
  - id: "kaku-10-e06"
    section_id: "Kaku_10"
    drill: 0
    number: 6
    role: "example"
    english: "If you should need my help, please call me."
    japanese: "万一、私の助けが必要なら、電話してね。"
    notes: "shouldを使った未来の仮定法。主節は命令文（入試最頻出パターン）"
  - id: "kaku-10-e07"
    section_id: "Kaku_10"
    drill: 0
    number: 7
    role: "example"
    english: "If Mike were to learn Japanese, his life would be much easier."
    japanese: "もしマイクが日本語を学んだら、彼の生活はもっとずっと楽になるだろうに。"
    notes: "were toを使った未来の仮定法。実現可能性に関係なく完全妄想"
  - id: "kaku-10-e08"
    section_id: "Kaku_10"
    drill: 0
    number: 8
    role: "example"
    english: "Had I arrived at the station three minutes earlier, I could have caught the train."
    japanese: "駅にあと3分早く着いていれば、その電車に乗れたのに。"
    notes: "if省略倒置。e04のif省略形（Had + S + p.p.）"
  - id: "kaku-10-e09"
    section_id: "Kaku_10"
    drill: 0
    number: 9
    role: "example"
    english: "Should you need my help, please call me."
    japanese: "万一、私の助けが必要なら、電話してね。"
    notes: "if省略倒置。e06のif省略形（Should + S + 原形）"
  - id: "kaku-10-e10"
    section_id: "Kaku_10"
    drill: 0
    number: 10
    role: "example"
    english: "Haruna would have come had she been invited."
    japanese: "ハルナはもし招待されたら来ただろう。"
    notes: "倒置した副詞節が後ろに来るパターン。コンマなしOK"
  - id: "kaku-10-e11"
    section_id: "Kaku_10"
    drill: 0
    number: 11
    role: "example"
    english: "Without you, my life would be boring."
    japanese: "君がいない僕の人生は退屈だろう。"
    notes: "withoutがif節の代用。wouldで仮定法を確信"
  - id: "kaku-10-e12"
    section_id: "Kaku_10"
    drill: 0
    number: 12
    role: "example"
    english: "I was very tired. Otherwise, I would have gone to the movies with you last night."
    japanese: "私はとても疲れていた。そうでなければ、昨夜は君と一緒に映画に行ったのに。"
    notes: "otherwiseがif節の代用。前半は直説法、otherwiseから仮定法モードに入る"
  - id: "kaku-10-e13"
    section_id: "Kaku_10"
    drill: 0
    number: 13
    role: "example"
    english: "If it had not been for your advice, I wouldn't have known what to do."
    japanese: "君のアドバイスがなかったら、何をしたらいいかわからなかったよ。"
    notes: "without〜のバリエーション。if it had not been for = without（仮定法過去完了）"
  - id: "kaku-10-e14"
    section_id: "Kaku_10"
    drill: 0
    number: 14
    role: "example"
    english: "It's time we went to bed."
    japanese: "もう私たちは寝る時間だよ。"
    notes: "It is time s 過去形。相手に促す表現"
  - id: "kaku-10-e15"
    section_id: "Kaku_10"
    drill: 0
    number: 15
    role: "example"
    english: "I wish I were a bird."
    japanese: "鳥だったらなぁ。"
    notes: "I wish s 過去形。「願う」と「鳥になる」が同時制 → 過去形were"
  - id: "kaku-10-e16"
    section_id: "Kaku_10"
    drill: 0
    number: 16
    role: "example"
    english: "I wish you had asked me about that earlier."
    japanese: "それに関しては、もっと早く聞いてくれたらよかったのに。"
    notes: "I wish s had p.p.。「願う」のは今、「聞く」のは過去 → had p.p."
  # CHECK（空所補充・完全形で登録）
  - id: "kaku-10-c01"
    section_id: "Kaku_10"
    drill: 1
    number: 1
    role: "check"
    english: "If I knew her telephone number, I would call her."
    japanese: "もし彼女の電話番号を知っていれば、電話するのになぁ。"
    notes: "仮定法過去。選択肢: ① knew ② had known → 正解①"
  - id: "kaku-10-c02"
    section_id: "Kaku_10"
    drill: 1
    number: 2
    role: "check"
    english: "If my father had won the lottery, he would have bought a new car."
    japanese: "もし宝くじが当たっていたら、父は新車を買っていただろう。"
    notes: "仮定法過去完了。選択肢: ① bought ② would have bought → 正解②"
  - id: "kaku-10-c03"
    section_id: "Kaku_10"
    drill: 1
    number: 3
    role: "check"
    english: "Without your help, I could never have finished high school."
    japanese: "あなたの助けがなければ、高校を卒業できなかっただろう。"
    notes: "without + 仮定法過去完了。選択肢: ① would ② could never have → 正解②"
  # 入試問題演習
  - id: "kaku-10-x01"
    section_id: "Kaku_10"
    drill: 2
    number: 1
    role: "exam"
    english: "If I had money I would buy a car."
    japanese: "お金があれば車を買うのに。"
    notes: "出典: 青山学院大学。並べ替え問題。仮定法過去"
  - id: "kaku-10-x02"
    section_id: "Kaku_10"
    drill: 2
    number: 2
    role: "exam"
    english: "Should you have any questions, please do not hesitate to contact us."
    japanese: "ご不明な点などございましたら、どうぞお気軽にご連絡ください。"
    notes: "出典: 成城大学。shouldを使った仮定法のif省略倒置。実用頻出表現"
  - id: "kaku-10-x03"
    section_id: "Kaku_10"
    drill: 2
    number: 3
    role: "exam"
    english: "We started immediately after breakfast; otherwise we would have missed the train."
    japanese: "私たちは朝食を食べてすぐに出発した。そうでなければ、電車を逃してしまっただろう。"
    notes: "出典: 東京電気大学。otherwiseがif節の代用。前半は直説法、後半は仮定法過去完了"
  - id: "kaku-10-x04"
    section_id: "Kaku_10"
    drill: 2
    number: 4
    role: "exam"
    english: "Had it not been for his earnest support, this project could not have been completed."
    japanese: "彼の熱心なサポートがなければ、この計画は完遂できなかったかもしれない。"
    notes: "出典: 中央大学。同意文: But for his earnest support, ... 。if it had not been for のif省略倒置形"

