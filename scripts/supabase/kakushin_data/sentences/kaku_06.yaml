# Kaku_06: 接続詞（p.55-70）

sentences:
  # === 本編解説の例文 ===
  - id: "kaku-06-e01"
    section_id: "Kaku_06"
    drill: 0
    number: 1
    role: "example"
    english: "She went to the supermarket and bought some eggs."
    japanese: "彼女はスーパーマーケットに行って卵をいくつか買いました。"
    notes: "andの構造: 直後のbought(過去形)に注目→前で同じ形のwentを探す。went~とbought~を結んでいる"
  - id: "kaku-06-e02"
    section_id: "Kaku_06"
    drill: 0
    number: 2
    role: "example"
    english: "Both he and I are against the plan."
    japanese: "彼も私も2人ともその計画には反対です。"
    notes: "both A and B「AとB両方」。主語がboth A and Bの場合、動詞は複数扱い（are）"
  - id: "kaku-06-e03"
    section_id: "Kaku_06"
    drill: 0
    number: 3
    role: "example"
    english: "She is not only a nurse but also a yoga instructor."
    japanese: "彼女は看護師であるだけでなく、ヨガのインストラクターでもある。"
    notes: "not only A but also B「Aだけでなく Bも」"
  - id: "kaku-06-e04"
    section_id: "Kaku_06"
    drill: 0
    number: 4
    role: "example"
    english: "When she was young, she played soccer every day."
    japanese: "彼女は若い頃、毎日サッカーをしていました。"
    notes: "従属接続詞whenの形: (When sv), SV."
  - id: "kaku-06-e05"
    section_id: "Kaku_06"
    drill: 0
    number: 5
    role: "example"
    english: "I read the new book during lunch break."
    japanese: "私はお昼休憩の間に、その新しい本を読みました。"
    notes: "during=前置詞。SV during 名詞.の形"
  - id: "kaku-06-e06"
    section_id: "Kaku_06"
    drill: 0
    number: 6
    role: "example"
    english: "I read the new book while I ate lunch."
    japanese: "私はお昼ご飯を食べている間に、その新しい本を読みました。"
    notes: "while=接続詞。SV while sv.の形。e05のduringとの対比"
  - id: "kaku-06-e07"
    section_id: "Kaku_06"
    drill: 0
    number: 7
    role: "example"
    english: "I couldn't sleep last night because my little sister was crying all night long."
    japanese: "妹が一晩中泣いていたので、私は昨夜眠れなかった。"
    notes: "because=接続詞。SV because sv.の形。all night long「一晩中」"
  - id: "kaku-06-e08"
    section_id: "Kaku_06"
    drill: 0
    number: 8
    role: "example"
    english: "I couldn't sleep last night because of my little sister. She was crying all night long."
    japanese: "妹のせいで、私は昨夜眠れなかった。妹が一晩中泣いていたのだ。"
    notes: "because of=前置詞。SV because of 名詞.の形。e07のbecauseとの対比"
  - id: "kaku-06-e09"
    section_id: "Kaku_06"
    drill: 0
    number: 9
    role: "example"
    english: "We waited until Steven came."
    japanese: "僕たちはスティーブンが来るまで待った。"
    notes: "until=従属接続詞（時）。SV until sv.「svするまでSVだ」の形。until svから訳す"
  - id: "kaku-06-e10"
    section_id: "Kaku_06"
    drill: 0
    number: 10
    role: "example"
    english: "Unless you study, you'll never pass the test."
    japanese: "勉強しないと、試験には受からないぞ。"
    notes: "unless=従属接続詞（条件）。Unless sv, SV.「svしない限りSVだ」"
  - id: "kaku-06-e11"
    section_id: "Kaku_06"
    drill: 0
    number: 11
    role: "example"
    english: "Although I live in Tokyo, I have never been to Asakusa."
    japanese: "私は東京に住んでいますが、浅草には一度も行ったことがありません。"
    notes: "although=従属接続詞（逆接・譲歩）。Although sv, SV.「svだけれどもSVだ」"
  - id: "kaku-06-e12"
    section_id: "Kaku_06"
    drill: 0
    number: 12
    role: "example"
    english: "Now that you have been accepted to university, you need to find a place to live."
    japanese: "もう大学に受かったんだから、住むところを探さなきゃね。"
    notes: "now that=従属接続詞（理由）。be accepted to university「大学に合格する」"
  - id: "kaku-06-e13"
    section_id: "Kaku_06"
    drill: 0
    number: 13
    role: "example"
    english: "I never use my smartphone while walking."
    japanese: "私は絶対に歩きながらスマホを使わない。"
    notes: "副詞節内のs+be省略。本来: while {I am} walking。副詞節のs=主節のS(I)かつbe動詞なので省略可。「歩きスマホ」= use one's smartphone while walking"
  - id: "kaku-06-e14"
    section_id: "Kaku_06"
    drill: 0
    number: 14
    role: "example"
    english: "Fasten your seatbelt while seated."
    japanese: "お座席ではシートベルトをご着用ください。"
    notes: "副詞節内のs+be省略。命令文なので主語はYou。本来: {You} Fasten ... while {you are} seated。fasten「締める」（← fastener）。be seated「座っている」（← seat「座らせる」の受動態）"
  - id: "kaku-06-e15"
    section_id: "Kaku_06"
    drill: 0
    number: 15
    role: "example"
    english: "I know that he is rich."
    japanese: "私は彼がお金持ちだということを知っている。"
    notes: "接続詞thatが名詞節をつくる例。I know the man.のthe man（名詞）をthat he is rich（名詞節）に置き換えた形"
  - id: "kaku-06-e16"
    section_id: "Kaku_06"
    drill: 0
    number: 16
    role: "example"
    english: "I venture that the price of land in Yokohama will go up in the next few years."
    japanese: "横浜の地価が今後数年間で上昇すると思います（推測します）。"
    notes: "SV that〜の裏技: Vが「認識・伝達系」→「思う・言う」と当てはめれば意味がわかる。venture=名詞「冒険」、動詞「あえて〜と述べる」"
  - id: "kaku-06-e17"
    section_id: "Kaku_06"
    drill: 0
    number: 17
    role: "example"
    english: "She is proud of the fact that her painting won an award."
    japanese: "自分の絵が受賞したという事実を、彼女は誇らしく思っている。"
    notes: "同格のthat。the fact that sv「svという事実」。同格のthatをとる名詞は事実・認識・可能性系統（fact/news/knowledge/conclusion/idea/thought/belief/feeling/likelihood等）。be proud of「〜を誇らしく思う」"
  - id: "kaku-06-e18"
    section_id: "Kaku_06"
    drill: 0
    number: 18
    role: "example"
    english: "My boss is so kind that he is liked by everybody."
    japanese: "ウチの上司はとても優しいので、みんなに好かれている。"
    notes: "so~that...構文。結果「とても〜なので…」でも程度「…なくらい〜だ」でも解釈可。程度訳: 「ウチの上司はみんなに好かれているほど優しい」"
  - id: "kaku-06-e19"
    section_id: "Kaku_06"
    drill: 0
    number: 19
    role: "example"
    english: "He got to the concert early so that he could get a good seat."
    japanese: "彼は良い席をとるために、コンサート（会場）に早く着いた。"
    notes: "so thatは「目的（〜するために）」。soとthatがくっつく形。後ろに必ず助動詞が必要（will/can/may等）"
  - id: "kaku-06-e20"
    section_id: "Kaku_06"
    drill: 0
    number: 20
    role: "example"
    english: "If he comes, I'll tell you."
    japanese: "もし彼が来たら、（あなたに）伝えるよ。"
    notes: "副詞節をつくるif。If sv, SV.「もしsvなら、SVだ」"
  - id: "kaku-06-e21"
    section_id: "Kaku_06"
    drill: 0
    number: 21
    role: "example"
    english: "Do you know if he will come?"
    japanese: "彼が来るかどうか知っていますか？"
    notes: "名詞節をつくるif。knowは他動詞→直後に名詞（目的語）が必要→if〜は名詞節→「〜かどうか」。ifの核心: 半々の不安定"
  - id: "kaku-06-e22"
    section_id: "Kaku_06"
    drill: 0
    number: 22
    role: "example"
    english: "Do you know whether he will come?"
    japanese: "彼が来るかどうか知っていますか？"
    notes: "名詞節をつくるwhether。他動詞knowの後→名詞節→「〜かどうか」。名詞節のときifとwhetherは同じ意味"

  # === 実際の入試問題演習 ===
  - id: "kaku-06-x01"
    section_id: "Kaku_06"
    drill: 2
    number: 1
    role: "exam"
    english: "When he was a little boy, he used to like both baseball and swimming."
    japanese: "彼は子どものころ、野球と水泳が好きだった。"
    notes: "出典: 駒沢大学。空所補充。正解: ④both。both A and B「AとBの両方」。used to |原形|「かつては〜していた」。参考書内参照: →p.161 used to"
  - id: "kaku-06-x02"
    section_id: "Kaku_06"
    drill: 2
    number: 2
    role: "exam"
    english: "During his vacation, the shop was temporarily closed."
    japanese: "彼の休暇中、その店は一時的に休業した。"
    notes: "出典: 法政大学。空所補充。正解: ②During。空所直後が名詞(his vacation)→前置詞が入る。During「〜の間ずっと」。③Inも前置詞だが意味が不自然"
  - id: "kaku-06-x03"
    section_id: "Kaku_06"
    drill: 2
    number: 3
    role: "exam"
    english: "While I'm enjoying my stay in France, I still miss my home country."
    japanese: "フランス滞在は楽しいが、それでも母国が恋しい。"
    notes: "出典: 南山大学。空所補充。正解: ①While。空所直後がsv(I'm enjoying)→接続詞が入る。While「〜する一方で」（対比）。While sv, SV."
  - id: "kaku-06-x04"
    section_id: "Kaku_06"
    drill: 2
    number: 4
    role: "exam"
    english: "My father was so exhausted last night that he went to bed without even eating supper."
    japanese: "父は昨夜とても疲れていたので、夕食もとらずに寝てしまいました。"
    notes: "出典: 中央大学。空所補充。正解: ②that。so〜that...「とても〜なので…」。without even -ing「〜すらしないで」"

