sentences:
  # === 例文 (e01〜e21) ===

  - id: "kaku-12-e01"
    english: "To steal money is a crime."
    japanese: "お金を盗むことは犯罪です。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "名詞的用法（Sになる）。文頭To〜が主語 → 名詞的用法と判別する例"

  - id: "kaku-12-e02"
    english: "To steal money, he entered the room."
    japanese: "お金を盗むために、彼はその部屋に入った。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "副詞的用法（目的）。文頭To〜だが後ろにS+Vがあり主語にならない → 副詞的用法と判別。e01との対比"

  - id: "kaku-12-e03"
    english: "It's difficult to wake up early."
    japanese: "早起きすることは難しい。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "仮主語構文。It=仮主語、to wake up early=真主語。元はTo wake up early is difficult."

  - id: "kaku-12-e04"
    english: "Would you like something to drink?"
    japanese: "何か飲み物はいかがですか？"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "形容詞的用法（-thing修飾）。something←to drink（後ろから修飾）。Would you like〜?「〜はいかがですか？」"

  - id: "kaku-12-e05"
    english: "There's nothing hot to eat. There are only sandwiches."
    japanese: "温かい食べ物は何もありません。サンドイッチしかないです。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "形容詞的用法（-thing＋形容詞＋to do）。nothing←hot, to eat（形容詞とto〜の両方が後ろから修飾）"

  - id: "kaku-12-e06"
    english: "Masaki had no time to take a shower."
    japanese: "マサキはシャワーを浴びる時間がありませんでした。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "形容詞的用法（抽象名詞＋to）。time←to take a shower（後ろから修飾）"

  - id: "kaku-12-e07"
    english: "She went to Starbucks to study."
    japanese: "彼女は勉強するためにスタバに行きました。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 0
    notes: "副詞的用法（目的）。to studyがwentを修飾。基本的な目的用法の導入例"

  - id: "kaku-12-e08"
    english: "He grew up to become a manga artist."
    japanese: "彼は（大きくなってから）マンガ家になった。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "副詞的用法（結果/無意志動詞）。grow upは自分の意志でコントロールできない動作 → to以下は「結果」"

  - id: "kaku-12-e09"
    english: "I hurried to the airport only to find that the plane had already left."
    japanese: "私は空港へ急いだが、飛行機はすでに出発してしまっていた。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 2
    notes: "副詞的用法（結果/only to）。SV, only to〜「SVだが、結局〜しただけ」。直訳「結局は飛行機がすでに出発したことがわかっただけ」"

  - id: "kaku-12-e10"
    english: "I was happy to see my old friend again."
    japanese: "旧友と再会できて、私は嬉しかったです。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "副詞的用法（感情の理由）。感情表現happyの後のto不定詞 → 感情の理由「〜して」"

  - id: "kaku-12-e11"
    english: "The piano was too heavy to carry."
    japanese: "そのピアノは重すぎて運べなかった。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "副詞的用法（限定/too...to）。too...to〜「あまりに…なので〜できない」。本来は「運ぶという点において重すぎる」"

  - id: "kaku-12-e12"
    english: "The piano was small enough to fit in my room."
    japanese: "そのピアノは私の部屋に入るほど小さかったです（部屋に入る大きさでした）。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "副詞的用法（限定/enough to）。...enough to〜「〜するのに十分…」。本来は「部屋にフィットするという点において十分小さい」"

  - id: "kaku-12-e13"
    english: "It's normal for him to sleep 10 hours."
    japanese: "彼が10時間寝るのは普通のことです。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "意味上の主語（for[人]）。for him=意味上の主語。「[人]にとって」ではなく「[人]が」と訳す"

  - id: "kaku-12-e14"
    english: "This problem is too difficult for us to solve."
    japanese: "この問題は、私たちが解くには難しすぎます。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 2
    notes: "意味上の主語（for[人]）＋too...to〜の複合。for us=意味上の主語がtoo...to構文に入った形"

  - id: "kaku-12-e15"
    english: "It's very kind of you to come."
    japanese: "来てくれてどうもありがとう。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 2
    notes: "意味上の主語（of[人]）。kind=人の性質を示す形容詞 → ofを使う。直訳「来てくれるとはあなたはとても優しい」→ 意訳「〜してくれてありがとう」"

  - id: "kaku-12-e16"
    english: "I left home early so as to be in time for the meeting."
    japanese: "会議に間に合うように家を早く出た。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "so as to〜（目的の明示）。in time for〜「〜に間に合う」"

  - id: "kaku-12-e17"
    english: "She stepped aside in order for me to pass."
    japanese: "彼女は、私が通るために、脇へどいてくれた。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "in order for[人] to〜。in order to〜の中に意味上の主語for[人]を置く形"

  - id: "kaku-12-e18"
    english: "My father wrote down the password in order not to forget it."
    japanese: "父は、忘れないように、パスワードを書き留めた。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "in order not to〜（否定の目的）。notはtoの直前に置く。write down「書き留める」"

  - id: "kaku-12-e19"
    english: "She was so kind as to help me."
    japanese: "彼女はとても親切だったので、私の手助けをしてくれた。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 2
    notes: "so〜as to...（離れるパターン=結果/程度）。= so〜that...と同じ意味。soとas toが離れている → 結果"

  - id: "kaku-12-e20"
    english: "My father is saving money so that he can buy a new car."
    japanese: "父は新車を買うためにお金を貯めている。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 0
    notes: "so that〜（目的）。so as to〜 = so that〜の等価関係を示す比較例。soとthatがくっつく → 目的"

  - id: "kaku-12-e21"
    english: "He is said to have been rich."
    japanese: "彼は（以前は）お金持ちだったと言われている。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "example"
    drill: 1
    notes: "完了不定詞（to have p.p.）。be said to have p.p.「〜したと言われている」。is said（現在）→ to have been（1つ前=過去）"

  # === CHECK (c01〜c03) ===

  - id: "kaku-12-c01"
    english: "She wanted something to drink."
    japanese: "彼女は飲み物を欲しがっていた。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "check"
    drill: 2
    notes: "CHECK(1)。形容詞的用法の不定詞to drinkを選ぶ。-thingで終わる単語をtoが後ろから修飾"

  - id: "kaku-12-c02"
    english: "The stew was too hot for the boy to eat."
    japanese: "シチューが熱すぎて、その少年は口にすることができなかった。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "check"
    drill: 2
    notes: "CHECK(2)。too...to〜の形。意味上の主語for the boyが入った形。tooを選択"

  - id: "kaku-12-c03"
    english: "My father is said to have been a famous singer."
    japanese: "父は有名な歌手だったと言われている。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "check"
    drill: 2
    notes: "CHECK(3)。完了不定詞to have p.p.。be said to have p.p.「〜したと言われている」。have beenを選択"

  # === 入試問題 (x01〜x04) ===

  - id: "kaku-12-x01"
    english: "It's difficult for my grandmother to walk up the stairs at the station."
    japanese: "私の祖母は駅の階段を歩いて上るのが難しい。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "exam"
    drill: 2
    notes: "入試(1)。出典: 関東学院大学。仮主語構文＋意味上の主語for my grandmother。It'sを選択"

  - id: "kaku-12-x02"
    english: "It was careless of him to make such a mistake."
    japanese: "そんなミスをするなんて彼は不注意だったね。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "exam"
    drill: 2
    notes: "入試(2)。出典: 京都女子大学。careless=人の性質を示す形容詞 → ofを選択"

  - id: "kaku-12-x03"
    english: "She drove to the station, only to find that her train was cancelled."
    japanese: "彼女は駅まで車で行ったが、自分が乗る電車は運休だった。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "exam"
    drill: 2
    notes: "入試(3)。出典: 駒澤大学。SV, only to〜（結果）。onlyを選択。in order toでは文意が通らない"

  - id: "kaku-12-x04"
    english: "The thief was believed to have entered the house by breaking a window."
    japanese: "その泥棒は窓を割って家に入ったと考えられていた。"
    book: "英文法の核心"
    section_id: "Kaku_12"
    role: "exam"
    drill: 2
    notes: "入試(4)。出典: 日本大学。完了不定詞（to have p.p.）。be believed to have p.p.「〜したと信じられている」。was believedを選択"

