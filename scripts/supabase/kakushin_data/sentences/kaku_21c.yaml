# Kaku_21c: 関係詞（what・-everグループ・入試問題）
# 例文11 + 入試2 = 13文

sentences:
  # === 例文（関係代名詞what） ===
  - id: "kaku-21c-e01"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.325"
    role: "example"
    english: "What I really like is the friendliness of the hotel's staff."
    japanese: "私が本当に気に入っているのは、ホテルのスタッフのフレンドリーさです。"
    sentence_structures:
      overall: "[What S V] V C"
      details: "[What(関係代名詞/目的格) I(S) really like(V) φ](S=名詞節) is(V) the friendliness of the hotel's staff(C)."
    notes: "関係代名詞whatの基本例。Whatの後には不完全な形（likeの目的語が欠けている）。What I really likeが名詞節で文全体の主語。"

  - id: "kaku-21c-e02"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.325"
    role: "example"
    english: "That he will come here is certain."
    japanese: "彼がここに来るのは確実だ。"
    sentence_structures:
      overall: "[That S V M] V C"
      details: "[That(接続詞) he(S) will come(V) here(M)](S=名詞節) is(V) certain(C)."
    notes: "接続詞thatとの比較例。Thatの後には完全な形（comeは自動詞、hereは副詞でhe will come hereは完全な文）。whatとの違いは「後ろの形」（what=不完全、that=完全）。"

  - id: "kaku-21c-e03"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.326"
    role: "example"
    english: "She is not what she was."
    japanese: "彼女は昔の彼女ではない。"
    sentence_structures:
      overall: "S V C [what S V]"
      details: "She(S) is(V) not [what(関係代名詞) she(S) was(V) φ](C=名詞節)."
    notes: "what I am型の慣用表現。what she was「過去の彼女」。wasの後ろの補語が欠けた不完全な形。「彼女は変わっちゃった」と意訳することも可能。"

  - id: "kaku-21c-e04"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.326"
    role: "example"
    english: "My parents have made me what I am."
    japanese: "両親のおかげで、今の私があるのです。"
    sentence_structures:
      overall: "S V O C [what S V]"
      details: "My parents(S) have made(V) me(O) [what(関係代名詞) I(S) am(V) φ](C=名詞節)."
    notes: "make OCの形。what I am「現在の私」。直訳「私の両親は、私を今の私にした」。amの後ろの補語が欠けた不完全な形。"

  - id: "kaku-21c-e05"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.326"
    role: "example"
    english: "My sister is what is called a bookworm."
    japanese: "ウチの妹は、いわゆる本の虫ってやつだ。"
    sentence_structures:
      overall: "S V C"
      details: "My sister(S) is(V) (what is called)(副詞的挿入) a bookworm(C)."
    notes: "what is called「いわゆる〜」の慣用表現。副詞のように使われるので、My sister is (what is called) a bookworm. と括弧で括って考えればOK。入試ではこの品詞の意識までは問われない。※bookworm「本の虫・大の本好き」"

  # === 例文（複合関係詞 -ever） ===
  - id: "kaku-21c-e06"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.327"
    role: "example"
    english: "She helps whoever asks her for help."
    japanese: "彼女は、助けを求める人は誰でも手をさしのべる。"
    sentence_structures:
      overall: "S V O [whoever V O M]"
      details: "She(S) helps(V) [whoever(複合関係代名詞/主格) asks(V) her(O) for help(M)](O=名詞節)."
    notes: "複合関係代名詞whoeverの名詞節の例。helpは他動詞で直後に「人」がくる。whoever asks her for helpが目的語（名詞節）。p.329で譲歩訳も示される:「たとえ誰でもその人に手をさしのべる」。"

  - id: "kaku-21c-e07"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.327"
    role: "example"
    english: "Whatever happens, she won't change her mind."
    japanese: "たとえ何が起ころうとも、彼女は決して自分の考えを変えようとしないだろう。"
    sentence_structures:
      overall: "[Whatever V], S V O"
      details: "[Whatever(複合関係代名詞/主格) happens(V)](副詞節), she(S) won't change(V) her mind(O)."
    notes: "複合関係代名詞whateverの副詞節の例。Whatever happensの後にSV（she won't change）が続き、SVはすでにあるのでWhateverのカタマリは「余分なもの」＝副詞節。譲歩「たとえ何が起ころうとも」。"

  - id: "kaku-21c-e08"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.329"
    role: "example"
    english: "Whenever he goes to Paris, he always stays at the same hotel."
    japanese: "彼はパリに行くときはいつでも、常に同じホテルに泊まる。"
    sentence_structures:
      overall: "[Whenever S V M], S M V M"
      details: "[Whenever(複合関係副詞) he(S) goes(V) to Paris(M)](副詞節), he(S) always(M) stays(V) at the same hotel(M)."
    notes: "複合関係副詞wheneverの例。後ろは完全な形（goは自動詞、to Parisは前置詞句）。複合関係詞には「訳語がある」点が通常の関係詞と異なり、「疑問詞の訳し方に似ている」。"

  - id: "kaku-21c-e09"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.330"
    role: "example"
    english: "However small it is, I want a room of my own."
    japanese: "たとえどんなに狭くても、自分自身の部屋がほしいの。"
    sentence_structures:
      overall: "[However C S V], S V O M"
      details: "[However(複合関係副詞) small(C/前方移動) it(S) is(V) φ](副詞節), I(S) want(V) a room(O) of my own(M)."
    notes: "howeverの特殊形。However 形・副 sv, SV.「たとえどれくらい〜であっても」。直後に形容詞smallがくっつき、it isの後ろの補語が前に移動→「不完全に見える」形になるが、名詞が不足しているわけではない。howeverは「わがまま副詞」（→p.49）。"

  - id: "kaku-21c-e10"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.331"
    role: "example"
    english: "However hard I tried, I couldn't solve the problem."
    japanese: "どんなに一生懸命やっても、その問題を解けなかった。"
    sentence_structures:
      overall: "[However M S V], S V O"
      details: "[However(複合関係副詞) hard(M/前方移動) I(S) tried(V)](副詞節), I(S) couldn't solve(V) the problem(O)."
    notes: "howeverの副詞前方移動パターン。副詞hardがhoweverに引っ張り出された形。= No matter how hard I tried, I couldn't solve the problem. 副詞節の場合は3語（no matter + 疑問詞）に分解可能。"

  - id: "kaku-21c-e11"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.331"
    role: "example"
    english: "He was admired by whoever worked with him."
    japanese: "彼は一緒に仕事をする誰からも称賛されていた。"
    sentence_structures:
      overall: "S V M [whoever V M]"
      details: "He(S) was admired(V) by [whoever(複合関係代名詞/主格) worked(V) with him(M)](M=名詞節)."
    notes: "名詞節の分解: whoever = anyone who。by whoever = by anyone who worked with him。前置詞byの後だからといってby whomeverにはならない。分解するとwhoと動詞workedがつながるのでwhoが正しい。"

  # === 入試問題 ===
  - id: "kaku-21c-x01"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.334"
    role: "exam"
    english: "As I heard Janet was a liar, I can't believe what she says."
    japanese: "ジャネットがうそつきだと私は聞いたので、彼女の発言を信じられない。"
    sentence_structures:
      overall: "[As S V C], S V O [what S V]"
      details: "[As(接続詞/理由) I(S) heard(V) {that} Janet(S) was(V) a liar(C)](M), I(S) can't believe(V) [what(関係代名詞/目的格) she(S) says(V) φ](O=名詞節)."
    notes: "出典: 獨協大学。入試問題(3)。空所以下はbelieveの目的語（＝名詞のカタマリ）になると考える。名詞節をつくる関係代名詞③whatを選ぶ。what she says「彼女が言うこと／彼女の発言」。文頭のasは「理由」を表し、全体は As sv, SV. の形。"

  - id: "kaku-21c-x02"
    book: "英文法の核心"
    section_id: "Kaku_21c"
    page: "p.334"
    role: "exam"
    english: "However hard the work is, we should not complain."
    japanese: "たとえ仕事がどれほど大変であっても、僕たちは文句を言うべきじゃない。"
    sentence_structures:
      overall: "[However C S V], S V"
      details: "[However(複合関係副詞) hard(C/前方移動) the work(S) is(V) φ](副詞節), we(S) should not complain(V)."
    notes: "出典: 立命館大学。入試問題(4)。空所直後のhard the work isに注目。①Howeverを選ぶ。However 形・副 sv, SV.「たとえどれくらい〜であっても、SVだ」の形。今回のhardは形容詞「難しい・大変な」で、However hard the work is, SV.「たとえどれほど仕事が大変であっても、SVだ」。"

