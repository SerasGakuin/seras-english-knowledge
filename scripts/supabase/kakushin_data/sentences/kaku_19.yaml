# Kaku_19: 疑問詞（p.276-291）
# 例文22 + CHECK3 + 入試問題4 = 29文

sentences:
  # === 例文 ===
  - id: "kaku-19-e01"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.276"
    role: "example"
    english: "What do you want to do after school?"
    japanese: "あなたは放課後に何をしたいですか？"
    sentence_structures:
      overall: "S V O M"
      details: "(O:What/疑問代名詞=doの目的語→文頭) (S:you) (V:want to do/doは他動詞) (M:前置詞句after school)"
    notes: "疑問代名詞what。doの後ろに「名詞が欠けている」感覚が関係詞の基礎になる"

  - id: "kaku-19-e02"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.277"
    role: "example"
    english: "What made you so angry?"
    japanese: "あなたはどうしてそんなに怒ったのですか？"
    sentence_structures:
      overall: "S V O C"
      details: "(S:What/疑問代名詞=主語) (V:made/make O C) (O:you) (C:so angry)"
    notes: "※直訳「何があなたをそんなに怒らせたの？」。make OC「OをCの状態にさせる」。Whatが主語になっている"

  - id: "kaku-19-e03"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.277"
    role: "example"
    english: "What kind of job do you want to get when you graduate from college?"
    japanese: "あなたは大学を卒業したら、どのような仕事に就きたいですか？"
    sentence_structures:
      overall: "O S V M"
      details: "(O:What kind of job/疑問形容詞What+名詞=getの目的語→文頭) (S:you) (V:want to get) (M:従属節when you graduate from college)"
    notes: "疑問形容詞what。Whatが名詞(kind of job)を修飾。What kind of jobが1つの名詞のカタマリ"

  - id: "kaku-19-e04"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.277"
    role: "example"
    english: "Where do you want to live after you graduate from high school?"
    japanese: "あなたは高校を卒業したらどこに住みたいですか？"
    sentence_structures:
      overall: "M S V M"
      details: "(M:Where/疑問副詞=liveを修飾) (S:you) (V:want to live/liveは自動詞) (M:従属節after you graduate from high school)"
    notes: "疑問副詞where。副詞の後ろには完全な形がくる（名詞が欠けない）。liveは自動詞なので後ろに名詞を必要としない。この感覚が関係副詞の基礎"

  - id: "kaku-19-e05"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.278"
    role: "example"
    english: "What is living in Italy like?"
    japanese: "イタリアで暮らすってどんな感じ？"
    sentence_structures:
      overall: "What is S like?"
      details: "(What:疑問代名詞/前置詞likeの目的語→文頭) (V:is) (S:living in Italy/動名詞句) (like:前置詞「〜のような」)"
    notes: "What is S like?「Sってどんな感じ？」。whatは疑問代名詞（後ろに名詞欠落）、likeは前置詞（〜のような）"

  - id: "kaku-19-e06"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.279"
    role: "example"
    english: "What is it like to live in Italy?"
    japanese: "イタリアで暮らすってどんな感じ？"
    sentence_structures:
      overall: "What is it like to~?"
      details: "(What:疑問代名詞/likeの目的語→文頭) (V:is) (S:it/仮主語) (like:前置詞) (to live in Italy:真主語)"
    notes: "What is it like to~?「〜するってどんな感じ？」。itは仮主語、to~が真主語。元はIt is like 名詞 to~.の名詞→whatに変化"

  - id: "kaku-19-e07"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.279"
    role: "example"
    english: "How soon does the train leave?"
    japanese: "電車はあとどれくらいで出ますか？"
    sentence_structures:
      overall: "How soon S V?"
      details: "(How soon:疑問副詞How+副詞soon/セットで「あとどれくらい」=程度) (S:the train) (V:leave/自動詞)"
    notes: "セットのHow=「程度」。答え方: In ten minutes.のように「経過のin（〜後に）」を使う。×「〜以内に」ではない"

  - id: "kaku-19-e08"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.280"
    role: "example"
    english: "How do I get to the museum?"
    japanese: "その博物館へはどうやって行けばいいですか？"
    sentence_structures:
      overall: "How S V M?"
      details: "(How:疑問副詞/単独「どのように」=方法) (S:I) (V:get) (M:前置詞句to the museum)"
    notes: "単独のHow=「方法（どのような方法で）」。※直訳「どのように到着しますか？」"

  - id: "kaku-19-e09"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.280"
    role: "example"
    english: "Why not take a rest?"
    japanese: "休憩をとったらどう？"
    sentence_structures:
      overall: "Why not V?"
      details: "(Why not:提案表現=Why don't you/weのどちらの意味でも使える) (V:take) (O:a rest)"
    notes: "反語の発想。「なぜ休憩をとらないの？」→「休憩をとったらどう？」"

  - id: "kaku-19-e10"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.280"
    role: "example"
    english: "Why don't we walk there?"
    japanese: "そこに歩いて行こうよ。"
    sentence_structures:
      overall: "Why don't we V M?"
      details: "(Why don't we:提案表現「〜しようよ」/we=自分たちへの提案) (V:walk) (M:there)"
    notes: "反語の発想。直訳「なぜ僕らは歩いて行かないの？」→「歩いて行こうよ」"

  - id: "kaku-19-e11"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.281"
    role: "example"
    english: "How about going to a movie?"
    japanese: "映画に行くのはどう？"
    sentence_structures:
      overall: "How about -ing?"
      details: "(How about:提案表現「〜するのはどう？」) (-ing:going to a movie/動名詞句)"
    notes: "How aboutの後は名詞・動名詞(-ing)。原形は不可"

  - id: "kaku-19-e12"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.281"
    role: "example"
    english: "How come you were absent from school yesterday?"
    japanese: "どうして昨日は学校を休んだの？"
    sentence_structures:
      overall: "How come SV?"
      details: "(How come:「どうして」/後ろSVの語順) (S:you) (V:were) (C:absent from school) (M:yesterday)"
    notes: "How come SV?の後はSVの語順。元はHow did it come that SV?で省略後にthat以下のSVが残った。How+comeのセットではない"

  - id: "kaku-19-e13"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.282"
    role: "example"
    english: "I can't remember where she was born."
    japanese: "彼女がどこで生まれたのか、私は思い出せません。"
    sentence_structures:
      overall: "S V O(間接疑問)"
      details: "(S:I) (V:can't remember) (O:where she was born/間接疑問文=名詞のカタマリ/SVの語順)"
    notes: "間接疑問文。倒置が起きず普通の語順(she was)。where she was bornがrememberの目的語（名詞のカタマリ）"

  - id: "kaku-19-e14"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.282"
    role: "example"
    english: "Do you know when the movie starts?"
    japanese: "その映画がいつ始まるのか知っていますか？"
    sentence_structures:
      overall: "S V O(間接疑問)"
      details: "(S:you) (V:know) (O:when the movie starts/間接疑問文=名詞のカタマリ/SVの語順)"
    notes: "主節は疑問文の形だが、間接疑問の部分はSVの語順。×when does the movie start"

  - id: "kaku-19-e15"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.283"
    role: "example"
    english: "When I go on a trip, I always decide where to go beforehand."
    japanese: "私は旅行に行くとき、いつも前もってどこに行くか決めておきます。"
    sentence_structures:
      overall: "M S V O M"
      details: "(M:従属節When I go on a trip) (S:I) (V:always decide) (O:where to go/疑問詞+to~=名詞のカタマリ) (M:beforehand)"
    notes: "※beforehand「前もって」。疑問詞+to~「疑問詞～すべきか」。where to goがdecideの目的語"

  - id: "kaku-19-e16"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.283"
    role: "example"
    english: "You need to decide which dress to buy."
    japanese: "あなたはどのドレスを買うか決める必要があります。"
    sentence_structures:
      overall: "S V O"
      details: "(S:You) (V:need to decide) (O:which dress to buy/疑問形容詞which+名詞+to~=名詞のカタマリ)"
    notes: "疑問形容詞which+名詞+to~の形。which dress to buyがdecideの目的語"

  - id: "kaku-19-e17"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.283"
    role: "example"
    english: "My dad showed me how to ride a bike."
    japanese: "父が私に自転車の乗り方を教えてくれました。"
    sentence_structures:
      overall: "S V O₁ O₂"
      details: "(S:My dad) (V:showed/show 人 物) (O₁:me) (O₂:how to ride a bike/疑問詞+to~=名詞のカタマリ)"
    notes: "show 人 物「人に物を（視覚的に示して）教える」。how to~「〜の仕方」（直訳「どのように〜すべきか」）"

  - id: "kaku-19-e18"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.284"
    role: "example"
    english: "Don't you like cookies?"
    japanese: "クッキー、好きじゃないんだっけ？"
    sentence_structures:
      overall: "S V O"
      details: "(S:you) (V:like) (O:cookies) (否定疑問文:notを無視→Do you like cookies?と同じ)"
    notes: "否定疑問文。notを無視してDo you like cookies?に脳内変換。Yes, I do.→「好き」/ No, I don't.→「好きじゃない」。英語は「事実に合わせる」"

  - id: "kaku-19-e19"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.286"
    role: "example"
    english: "This picture is beautiful, isn't it?"
    japanese: "この写真、きれいですよね？"
    sentence_structures:
      overall: "S V C, 付加疑問"
      details: "(S:This picture) (V:is) (C:beautiful) (付加疑問:isn't it?/主節が肯定→否定を付加、This picture→it)"
    notes: "付加疑問文。肯定文に否定の付加疑問をくっつける"

  - id: "kaku-19-e20"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.286"
    role: "example"
    english: "You didn't sleep last night, did you?"
    japanese: "昨夜、寝てないでしょ？"
    sentence_structures:
      overall: "S V M, 付加疑問"
      details: "(S:You) (V:didn't sleep) (M:last night) (付加疑問:did you?/主節が否定→肯定を付加)"
    notes: "付加疑問文。否定文に肯定の付加疑問をくっつける。答え方は否定疑問文と同じ発想"

  - id: "kaku-19-e21"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.287"
    role: "example"
    english: "Give me a tissue, will you?"
    japanese: "ティッシュを取ってくれるかな？"
    sentence_structures:
      overall: "V O₁ O₂, will you?"
      details: "(V:Give/命令文) (O₁:me) (O₂:a tissue) (付加疑問:will you?/命令文には常にwill you?)"
    notes: "命令文の付加疑問文。肯定・否定に関係なく常にwill you?。Will you~?は軽い依頼で命令文と相性が良い"

  - id: "kaku-19-e22"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.287"
    role: "example"
    english: "Let's go now, shall we?"
    japanese: "もう行きませんか？"
    sentence_structures:
      overall: "Let's V M, shall we?"
      details: "(Let's:勧誘) (V:go) (M:now) (付加疑問:shall we?/Let's~には常にshall we?)"
    notes: "Let's~の付加疑問文。Shall we~?=Let's~の書き換えなので相性が良い"

  # === CHECK ===
  - id: "kaku-19-c01"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.288"
    role: "check"
    english: "How soon will the concert start?"
    japanese: "コンサートはあとどれくらいで始まるの？"
    sentence_structures:
      overall: "How soon S V?"
      details: "(How soon:疑問副詞How+副詞soon/セットで「あとどれくらい」) (S:the concert) (V:will start)"
    notes: "How soon「あとどれくらい」。How longではなくHow soonを選ぶ"

  - id: "kaku-19-c02"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.288"
    role: "check"
    english: "Don't you like the soup?"
    japanese: "そのスープ、好きじゃないの？"
    sentence_structures:
      overall: "S V O"
      details: "(S:you) (V:like) (O:the soup) (否定疑問文:notを無視→Do you like the soup?)"
    notes: "Yesと答えたとき→「スープが好き」。否定疑問文はnotを無視して考える"

  - id: "kaku-19-c03"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.288"
    role: "check"
    english: "His mother asked him where he had been."
    japanese: "母親は彼がどこにいたのかを尋ねた。"
    sentence_structures:
      overall: "S V O₁ O₂(間接疑問)"
      details: "(S:His mother) (V:asked/ask 人 物) (O₁:him) (O₂:where he had been/間接疑問文=SVの語順)"
    notes: "間接疑問文はSVの語順。×where had he been→◎where he had been"

  # === 入試問題 ===
  - id: "kaku-19-x01"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.289"
    role: "exam"
    english: "Why don't we stay here until the rain stops?"
    japanese: "雨が止むまでここにいることにしない？"
    sentence_structures:
      overall: "Why don't we V M?"
      details: "(Why don't we:提案表現「〜しようよ」) (V:stay) (M:here) (M:従属節until the rain stops)"
    notes: "出典: 駒澤大学。How about~?は後ろに名詞・動名詞(-ing)なのでstay(原形)は不可"

  - id: "kaku-19-x02"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.289"
    role: "exam"
    english: "I do not know where to look for an academic job."
    japanese: "どこで学校の仕事を探せばいいのかわからない。"
    sentence_structures:
      overall: "S V O"
      details: "(S:I) (V:do not know) (O:where to look for an academic job/疑問詞+to~=名詞のカタマリ)"
    notes: "出典: 名古屋学院大学。where to look for~「どこで〜を探すべきか」。疑問詞+to~は名詞のカタマリでknowの目的語"

  - id: "kaku-19-x03"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.289"
    role: "exam"
    english: "I wonder what it is like to pilot a helicopter."
    japanese: "ヘリコプターを操縦するのはどんな気持ちかな。"
    sentence_structures:
      overall: "S V O(間接疑問)"
      details: "(S:I) (V:wonder) (O:what it is like to pilot a helicopter/間接疑問文=SVの語順、What is it like to~?の間接疑問形)"
    notes: "出典: 駒澤大学。What is it like to~?の間接疑問文→SVの語順でwhat it is like to~。pilot「操縦する」（動詞）"

  - id: "kaku-19-x04"
    book: "英文法の核心"
    section_id: "Kaku_19"
    page: "p.289"
    role: "exam"
    english: "Let's have a cup of coffee, shall we?"
    japanese: "コーヒーを飲みませんか？"
    sentence_structures:
      overall: "Let's V O, shall we?"
      details: "(Let's:勧誘) (V:have) (O:a cup of coffee) (付加疑問:shall we?/Let's~には常にshall we?)"
    notes: "出典: 立命館大学。Let's~, shall we?「〜しましょうね」。命令文, will you?との区別"

