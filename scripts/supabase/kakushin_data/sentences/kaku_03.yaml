# Kaku_03: 代名詞（p.25-34）

sentences:
  # === 本編解説の例文 ===
  - id: "kaku-03-e01"
    section_id: "Kaku_03"
    drill: 0
    number: 1
    role: "example"
    english: "I have two sisters. One is in Hiroshima and the other is in Okinawa."
    japanese: "私には妹が2人います。1人は広島に、もう1人は沖縄にいます。"
    notes: "「2つだけ」の場合: one / the other。残り1人は特定（共通認識）できるのでthe other"
  - id: "kaku-03-e02"
    section_id: "Kaku_03"
    drill: 0
    number: 2
    role: "example"
    english: "Some of my cousins live in Hokkaido, but the others live in Saitama."
    japanese: "私のいとこは、北海道に住んでいる人もいるが、他は全員、埼玉に住んでいる。"
    notes: "残り全員が特定できるのでthe others。Someで始まる文は「~な人もいる」と訳すと自然"
  - id: "kaku-03-e03"
    section_id: "Kaku_03"
    drill: 0
    number: 3
    role: "example"
    english: "Some teachers are from America and others are from Britain."
    japanese: "米国出身の先生もいれば、英国出身の先生もいる。"
    notes: "残りが特定できない（米国・英国以外の先生もいる）のでothers（theなし）"
  - id: "kaku-03-e04"
    section_id: "Kaku_03"
    drill: 0
    number: 4
    role: "example"
    english: "I left my book at home so I can't lend it to you today."
    japanese: "家に本を忘れちゃったから、今日君に貸すことはできないんだ。"
    notes: "itは「特定」のもの（ズバリその本）を指す"
  - id: "kaku-03-e05"
    section_id: "Kaku_03"
    drill: 0
    number: 5
    role: "example"
    english: "I didn't know we needed one."
    japanese: "プリンターが必要だなんて知らなかったよ。"
    notes: "対話の返答（A: I bought a new printer.への応答）。oneは「不特定の同種のもの」（どれでもいいプリンター1台）"
  - id: "kaku-03-e06"
    section_id: "Kaku_03"
    drill: 0
    number: 6
    role: "example"
    english: "The population of China is larger than that of India."
    japanese: "中国の人口はインドの人口よりも多い。"
    notes: "that of India = the population of India。thatは後置修飾のみOK（of ~が修飾）"
  - id: "kaku-03-e07"
    section_id: "Kaku_03"
    drill: 0
    number: 7
    role: "example"
    english: "Either will do."
    japanese: "どっちでも大丈夫だよ。"
    notes: "対話の返答（A: Do you want a pen or a pencil?への応答）。eitherは「2つ」の場合の「どちらでも」。do「役立つ・間に合う」"
  - id: "kaku-03-e08"
    section_id: "Kaku_03"
    drill: 0
    number: 8
    role: "example"
    english: "There are three French restaurants in town, but none of them is open for lunch."
    japanese: "町には3つのフランス料理のレストランがあるが、どれもランチでは営業していない。"
    notes: "「3つのお店のうち1つも~でない」にnone（3つ以上の否定）"

  # === CHECK 入試問題に向けて ===
  - id: "kaku-03-c01"
    section_id: "Kaku_03"
    drill: 1
    number: 1
    role: "check"
    english: "He has two computers. One is a desktop and the other is a laptop."
    japanese: "彼はコンピューターを2台持っています。1つはデスクトップで、もう1つはノートパソコンです。"
    notes: "空所補充。正解: the other。2つのうち残り1つは特定できるのでthe other"
  - id: "kaku-03-c02"
    section_id: "Kaku_03"
    drill: 1
    number: 2
    role: "check"
    english: "Some of my classmates like soccer and others enjoy rugby."
    japanese: "私のクラスメイトには、サッカーが好きな人もいれば、ラグビーを楽しむ人もいます。"
    notes: "空所補充。正解: others。「残り全員」ではない（他のスポーツが好きな人もいる）のでtheなし"
  - id: "kaku-03-c03"
    section_id: "Kaku_03"
    drill: 1
    number: 3
    role: "check"
    english: "None of the shops were open."
    japanese: "開いているお店は1つもなかった。"
    notes: "空所補充。正解: None。None of ~「~のうち1つも…でない」。noは形容詞で no of ~という形は不可"

  # === 実際の入試問題演習 ===
  - id: "kaku-03-x01"
    section_id: "Kaku_03"
    drill: 2
    number: 1
    role: "exam"
    english: "This soup is delicious. I'd like another bowl, please."
    japanese: "このスープはとてもおいしい。もう1杯、頂けますか。"
    notes: "出典: 慶応大学。空所補充。another = an + other で「（特定できない）もう1個」。何度もおかわりできるうちの「もう1杯」なのでanotherが正解"
  - id: "kaku-03-x02"
    section_id: "Kaku_03"
    drill: 2
    number: 2
    role: "exam"
    english: "If you need a Japanese-English dictionary, I'll lend you one."
    japanese: "もし和英辞典が必要なら、貸しますよ。"
    notes: "出典: 中部大学。空所補充。「どれでもいい1冊の辞書」なのでone（不特定）。itだと「ズバリその辞書」になってしまう"
  - id: "kaku-03-x03"
    section_id: "Kaku_03"
    drill: 2
    number: 3
    role: "exam"
    english: "The population of Beijing is larger than that of Hong Kong."
    japanese: "北京の人口は香港より多い。"
    notes: "出典: 山梨大学。空所補充。that of Hong Kong = the population of Hong Kong"
  - id: "kaku-03-x04"
    section_id: "Kaku_03"
    drill: 2
    number: 4
    role: "exam"
    english: "I tried all the keys, but none of them would open the door."
    japanese: "私はすべての鍵を試したが、どれを使ってもドアは開かなかった。"
    notes: "出典: 東京経済大学。空所補充。all the keysから鍵は3つ以上。3つ以上の否定はnone（neitherは2つの否定）"

